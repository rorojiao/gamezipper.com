// --- Geometry helpers ---
function hookOrigin(){return{x:W/2,y:H*0.15};}
function groundY(){return H*0.30;}

function hookTip(){
  var o=hookOrigin();
  var a=state.hookAngle+Math.PI/2;
  var L=Math.max(state.hookLen,30);
  return{x:o.x+Math.cos(a)*L,y:o.y+Math.sin(a)*L};
}

// --- Resize ---
function resizeCanvas(){
  var w=window.innerWidth,h=window.innerHeight;
  W=w;H=h;
  canvas.width=w*DPR;canvas.height=h*DPR;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  state.hookMax=Math.sqrt(W*W+H*H)*0.8;
}
window.addEventListener('resize',resizeCanvas);

// --- Audio ---
function ensureAudio(){
  if(audioCtx)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
function playTone(freq,dur,type,vol){
  if(!audioCtx||!state.soundOn)return;
  type=type||'square';vol=vol||0.1;
  var osc=audioCtx.createOscillator();
  var g=audioCtx.createGain();
  osc.type=type;osc.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  osc.connect(g);g.connect(audioCtx.destination);
  osc.start();osc.stop(audioCtx.currentTime+dur);
}
function playSFX(type){
  if(!audioCtx||!state.soundOn)return;
  switch(type){
    case'shoot':playTone(200,0.15,'sawtooth',0.12);break;
    case'grabGold':playTone(800,0.1,'sine',0.15);setTimeout(function(){playTone(1200,0.1,'sine',0.12);},80);break;
    case'grabDiamond':playTone(1000,0.08,'sine',0.15);setTimeout(function(){playTone(1400,0.08,'sine',0.12);},60);setTimeout(function(){playTone(1800,0.12,'sine',0.1);},120);break;
    case'grabRock':playTone(120,0.2,'sawtooth',0.1);break;
    case'grabRuby':playTone(700,0.1,'triangle',0.12);setTimeout(function(){playTone(900,0.1,'triangle',0.1);},80);break;
    case'grabBag':playTone(400,0.15,'square',0.1);break;
    case'reel':playTone(300,0.05,'sine',0.06);break;
    case'win':playTone(523,0.12,'sine',0.15);setTimeout(function(){playTone(659,0.12,'sine',0.15);},120);setTimeout(function(){playTone(784,0.2,'sine',0.15);},240);break;
    case'lose':playTone(200,0.3,'sawtooth',0.15);setTimeout(function(){playTone(150,0.4,'sawtooth',0.12);},200);break;
    case'click':playTone(600,0.05,'sine',0.08);break;
    case'tick':playTone(1000,0.03,'sine',0.05);break;
  }
}
function startBGM(){
  if(!audioCtx||!state.musicOn||bgmNodes.length)return;
  try{
    var sr=audioCtx.sampleRate;var dur=12;var bufSize=sr*dur;
    var buf=audioCtx.createBuffer(1,bufSize,sr);var d=buf.getChannelData(0);
    var chords=[[130.81,164.81,196.00],[146.83,174.61,220.00],[164.81,196.00,246.94],[146.83,174.61,220.00]];
    var chordDur=dur/chords.length;
    for(var i=0;i<bufSize;i++){
      var t=i/sr;var ci=Math.min(Math.floor(t/chordDur),chords.length-1);var chord=chords[ci];
      var s=0;
      for(var n=0;n<chord.length;n++){var f=chord[n];s+=Math.sin(2*Math.PI*f*t)*0.04;s+=Math.sin(2*Math.PI*f*2*t)*0.01;}
      var fade=t%chordDur;var fadeIn=Math.min(fade/0.5,1);var fadeOut=Math.min((chordDur-fade)/0.5,1);
      s*=fadeIn*fadeOut;d[i]=s*0.6;
    }
    var src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
    var filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=600;
    var g=audioCtx.createGain();g.gain.value=0.18;
    src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);
    src.start();bgmNodes=[src,filt,g];
  }catch(e){}
}
function stopBGM(){
  bgmNodes.forEach(function(n){try{if(n.stop)n.stop();}catch(e){}});
  bgmNodes=[];
}

// --- Particles ---
function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var sp=1+Math.random()*4;
    state.particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,color:color,size:2+Math.random()*3});
  }
}
function spawnFloat(x,y,text,color){
  state.floats.push({x:x,y:y,text:text,color:color||'#FFD700',life:1.5,vy:-1});
}

// --- Level Management ---
function startLevel(idx){
  state.level=idx;
  var lv=LEVELS[idx];
  state.target=lv.t;
  state.time=lv.time;
  state.timeFrac=0;
  state.score=0;
  state.hookState='swing';
  state.hookAngle=0;
  state.hookDir=Math.random()<0.5?1:-1;
  state.hookLen=0;
  state.hookGrab=null;
  state.objects=[];
  state.particles=[];
  state.floats=[];
  state.combo=0;
  state.comboTimer=0;
  var gy=groundY();
  var areaTop=gy+30;
  var areaBot=H-20;
  var areaH=areaBot-areaTop;
  for(var i=0;i<lv.objs.length;i++){
    var od=lv.objs[i];
    var spec=OT[od.t];
    state.objects.push({
      type:od.t,
      x:od.x*W,
      y:areaTop+od.y*areaH,
      r:spec.w/2,
      val:spec.val,
      spd:spec.spd,
      cat:spec.c,
      grabbed:false,
      rot:Math.random()*Math.PI,
      bagVal:od.t==='bag'?Math.floor(Math.random()*4)*100+50:0,
    });
  }
  state.screen='game';
  if(state.musicOn){ensureAudio();startBGM();}
}

function loadProgress(){
  try{
    var s=JSON.parse(localStorage.getItem('goldMiner_v1')||'{}');
    state.bestScores=s.bestScores||{};
    state.stars=s.stars||{};
    state.unlocked=s.unlocked||1;
    state.soundOn=s.soundOn!==false;
    state.musicOn=s.musicOn!==false;
  }catch(e){}
}
function saveProgress(){
  try{
    localStorage.setItem('goldMiner_v1',JSON.stringify({
      bestScores:state.bestScores,
      stars:state.stars,
      unlocked:state.unlocked,
      soundOn:state.soundOn,
      musicOn:state.musicOn,
    }));
  }catch(e){}
}

// --- Hook Logic ---
function dropHook(){
  if(state.hookState!=='swing')return;
  state.hookState='extending';
  state.hookLen=30;
  playSFX('shoot');
}
function useDynamite(){
  if(state.dynamite<=0||state.hookState!=='retracting'||!state.hookGrab)return;
  if(state.hookGrab.cat==='rock'||state.hookGrab.cat==='bag'){
    state.dynamite--;
    spawnParticles(hookTip().x,hookTip().y,'#FF4444',20);
    state.hookGrab=null;
    state.hookState='retracting';
    playSFX('click');
  }
}

function updateHook(dt){
  var o=hookOrigin();
  if(state.hookState==='swing'){
    state.hookAngle+=state.hookDir*state.hookSpeed*dt;
    var maxA=Math.PI*0.42;
    if(state.hookAngle>maxA){state.hookAngle=maxA;state.hookDir=-1;}
    if(state.hookAngle<-maxA){state.hookAngle=-maxA;state.hookDir=1;}
    state.hookLen=30;
  }else if(state.hookState==='extending'){
    var extSpeed=350;
    state.hookLen+=extSpeed*dt;
    // Check collision
    var tip=hookTip();
    for(var i=0;i<state.objects.length;i++){
      var obj=state.objects[i];
      if(obj.grabbed)continue;
      var dx=tip.x-obj.x,dy=tip.y-obj.y;
      if(dx*dx+dy*dy<obj.r*obj.r){
        obj.grabbed=true;
        state.hookGrab=obj;
        state.hookState='retracting';
        var sfx='grabGold';
        if(obj.cat==='diamond')sfx='grabDiamond';
        else if(obj.cat==='rock')sfx='grabRock';
        else if(obj.cat==='ruby')sfx='grabRuby';
        else if(obj.cat==='bag')sfx='grabBag';
        playSFX(sfx);
        spawnParticles(tip.x,tip.y,obj.cat==='gold'?'#FFD700':obj.cat==='diamond'?'#00D4FF':obj.cat==='ruby'?'#E0245E':'#888',8);
        break;
      }
    }
    // Check boundaries
    if(tip.x<0||tip.x>W||tip.y>H-10||state.hookLen>state.hookMax){
      state.hookState='retracting';
    }
  }else if(state.hookState==='retracting'){
    var grab=state.hookGrab;
    var reelBase=300;
    var reelSpd=grab?reelBase*grab.spd*(state.strengthPotion>0?1.5:1):reelBase*1.5;
    state.hookLen-=reelSpd*dt;
    if(state.hookLen<=30){
      state.hookLen=30;
      // Score the grab
      if(grab){
        var val=grab.val;
        if(grab.cat==='bag')val=grab.bagVal;
        state.combo++;
        state.comboTimer=3;
        if(state.combo>=3)val=Math.floor(val*1.5);
        state.score+=val;
        state.totalScore+=val;
        spawnFloat(o.x,o.y-20,'+'+val,grab.cat==='diamond'?'#00D4FF':grab.cat==='ruby'?'#E0245E':'#FFD700');
        if(state.combo>=3)spawnFloat(o.x,o.y-40,'COMBO x'+state.combo,'#FF6B6B');
      }
      state.hookGrab=null;
      state.hookState='swing';
      // Check win/lose
      if(state.score>=state.target){
        levelComplete();
      }else if(state.objects.filter(function(o){return!o.grabbed&&o.val>0;}).length===0&&state.score<state.target){
        // No more valuable objects and below target
        checkGameOver();
      }
    }
  }
}

function checkGameOver(){
  if(state.score<state.target){
    state.screen='gameOver';
    playSFX('lose');
    stopBGM();
  }
}

function levelComplete(){
  var stars=1;
  var ratio=state.score/state.target;
  if(ratio>=1.5)stars=3;
  else if(ratio>=1.2)stars=2;
  var lv=state.level;
  if(!state.stars[lv]||stars>state.stars[lv])state.stars[lv]=stars;
  if(state.score>(state.bestScores[lv]||0))state.bestScores[lv]=state.score;
  if(lv+1>=state.unlocked&&lv+1<LEVELS.length)state.unlocked=lv+2;
  saveProgress();
  state.screen='levelComplete';
  playSFX('win');
  spawnParticles(W/2,H/2,'#FFD700',30);
}

// --- Drawing ---
function drawBackground(){
  // Sky gradient
  var grad=ctx.createLinearGradient(0,0,0,groundY());
  grad.addColorStop(0,C.sky1);grad.addColorStop(0.5,C.sky2);grad.addColorStop(1,C.sky3);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,groundY());
  // Stars in sky
  ctx.fillStyle='rgba(255,255,200,0.4)';
  for(var i=0;i<20;i++){
    var sx=(i*137.5)%W;
    var sy=(i*73.3)%(groundY()*0.8);
    ctx.fillRect(sx,sy,2,2);
  }
  // Ground
  var gg=ctx.createLinearGradient(0,groundY(),0,H);
  gg.addColorStop(0,C.ground1);gg.addColorStop(0.3,C.dirt1);gg.addColorStop(0.6,C.dirt2);gg.addColorStop(1,C.ground3);
  ctx.fillStyle=gg;
  ctx.fillRect(0,groundY(),W,H-groundY());
  // Dirt texture (random dots)
  ctx.fillStyle='rgba(0,0,0,0.15)';
  for(var i=0;i<80;i++){
    var dx=((i*47.3)%W);
    var dy=groundY()+((i*89.7)%(H-groundY()));
    ctx.fillRect(dx,dy,3,3);
  }
  ctx.fillStyle='rgba(255,200,100,0.05)';
  for(var i=0;i<40;i++){
    var dx2=((i*113.7)%W);
    var dy2=groundY()+((i*67.3)%(H-groundY()));
    ctx.fillRect(dx2,dy2,2,2);
  }
}

function drawMiner(){
  var o=hookOrigin();
  // Boom/crane arm
  ctx.strokeStyle=C.hookDark;ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(o.x-40,0);ctx.lineTo(o.x,o.y);ctx.lineTo(o.x+40,0);ctx.stroke();
  // Pulley wheel
  ctx.fillStyle=C.hookDark;
  ctx.beginPath();ctx.arc(o.x,o.y,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.hook;
  ctx.beginPath();ctx.arc(o.x,o.y,6,0,Math.PI*2);ctx.fill();
  // Miner figure (simple)
  ctx.fillStyle='#4A3568';
  ctx.fillRect(o.x-30,o.y-50,25,35);
  // Head
  ctx.fillStyle='#D4A574';
  ctx.beginPath();ctx.arc(o.x-17,o.y-55,12,0,Math.PI*2);ctx.fill();
  // Helmet
  ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.arc(o.x-17,o.y-58,10,Math.PI,0);ctx.fill();
  ctx.fillRect(o.x-27,o.y-58,20,4);
  // Light
  ctx.fillStyle='#FF0';
  ctx.beginPath();ctx.arc(o.x-10,o.y-62,3,0,Math.PI*2);ctx.fill();
}

function drawHook(){
  var o=hookOrigin();
  var tip=hookTip();
  // Rope
  ctx.strokeStyle=C.rope;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(tip.x,tip.y);ctx.stroke();
  // Hook claw
  ctx.save();
  ctx.translate(tip.x,tip.y);
  var a=state.hookAngle+Math.PI/2;
  ctx.rotate(a);
  // Hook body
  ctx.fillStyle=C.hook;
  ctx.fillRect(-4,-8,8,16);
  // Claw
  ctx.strokeStyle=C.hook;ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-2,6);ctx.lineTo(-8,12);ctx.lineTo(-8,18);
  ctx.moveTo(2,6);ctx.lineTo(8,12);ctx.lineTo(8,18);
  ctx.stroke();
  ctx.restore();
  // Draw grabbed object following hook
  if(state.hookGrab){
    var obj=state.hookGrab;
    obj.x=tip.x;obj.y=tip.y+obj.r;
    drawObject(obj);
  }
}

function drawObject(obj){
  ctx.save();
  ctx.translate(obj.x,obj.y);
  if(obj.cat==='gold'){
    var gs=obj.r;
    // Gold nugget — irregular blob with shine
    ctx.fillStyle=C.goldDark;
    ctx.beginPath();
    for(var i=0;i<8;i++){
      var a=(i/8)*Math.PI*2;
      var r=gs*(0.85+Math.sin(i*2.3)*0.15);
      if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();ctx.fill();
    // Shine
    ctx.fillStyle=C.goldLight;
    ctx.beginPath();ctx.arc(-gs*0.3,-gs*0.3,gs*0.35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=C.gold;
    ctx.beginPath();ctx.arc(-gs*0.35,-gs*0.35,gs*0.2,0,Math.PI*2);ctx.fill();
  }else if(obj.cat==='diamond'){
    var ds=obj.r;
    ctx.fillStyle=C.diamond;
    ctx.beginPath();
    ctx.moveTo(0,-ds);ctx.lineTo(ds,0);ctx.lineTo(0,ds*1.2);ctx.lineTo(-ds,0);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=C.diamondLight;
    ctx.beginPath();ctx.moveTo(0,-ds);ctx.lineTo(ds*0.5,-ds*0.2);ctx.lineTo(0,0);ctx.lineTo(-ds*0.5,-ds*0.2);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,-ds);ctx.lineTo(0,ds*1.2);ctx.stroke();
  }else if(obj.cat==='ruby'){
    var rs=obj.r;
    ctx.fillStyle=C.ruby;
    ctx.beginPath();ctx.moveTo(0,-rs*1.1);ctx.lineTo(rs,0);ctx.lineTo(0,rs);ctx.lineTo(-rs,0);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=C.rubyLight;
    ctx.beginPath();ctx.moveTo(0,-rs*1.1);ctx.lineTo(rs*0.4,-rs*0.3);ctx.lineTo(-rs*0.4,-rs*0.3);
    ctx.closePath();ctx.fill();
  }else if(obj.cat==='rock'){
    var rs2=obj.r;
    ctx.fillStyle=C.rockDark;
    ctx.beginPath();
    for(var i=0;i<7;i++){
      var a2=(i/7)*Math.PI*2;
      var r2=rs2*(0.8+Math.sin(i*3.1)*0.2);
      if(i===0)ctx.moveTo(Math.cos(a2)*r2,Math.sin(a2)*r2);
      else ctx.lineTo(Math.cos(a2)*r2,Math.sin(a2)*r2);
    }
    ctx.closePath();ctx.fill();
    ctx.fillStyle=C.rock;
    ctx.beginPath();ctx.arc(-rs2*0.3,-rs2*0.3,rs2*0.3,0,Math.PI*2);ctx.fill();
  }else if(obj.cat==='bag'){
    var bs=obj.r;
    // Mystery bag — brown sack with $
    ctx.fillStyle='#8B4513';
    ctx.beginPath();ctx.arc(0,0,bs,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#A0522D';
    ctx.fillRect(-bs*0.5,-bs*1.2,bs,bs*0.4);
    ctx.fillStyle=C.gold;
    ctx.font='bold '+Math.floor(bs*1.2)+'px Arial';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('?',0,0);
  }
  ctx.restore();
}

function drawObjects(){
  for(var i=0;i<state.objects.length;i++){
    var obj=state.objects[i];
    if(obj.grabbed&&state.hookGrab!==obj)continue;
    drawObject(obj);
  }
}

function drawParticles(){
  for(var i=state.particles.length-1;i>=0;i--){
    var p=state.particles[i];
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
}
function drawFloats(){
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(var i=0;i<state.floats.length;i++){
    var f=state.floats[i];
    ctx.globalAlpha=Math.min(f.life,1);
    ctx.fillStyle=f.color;
    ctx.font='bold 22px Arial';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

function drawHUD(){
  // Top bar
  ctx.fillStyle='rgba(10,10,20,0.75)';
  ctx.fillRect(0,0,W,50);
  // Score
  ctx.fillStyle=C.text;ctx.font='bold 18px Arial';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('Score: '+state.score,12,25);
  // Target
  ctx.fillStyle=C.textGold;
  ctx.fillText('Goal: '+state.target,12+W*0.25,25);
  // Time
  var timeColor=state.time<=10?C.red:state.time<=20?C.gold:C.text;
  ctx.fillStyle=timeColor;
  ctx.fillText('Time: '+Math.ceil(state.time)+'s',12+W*0.5,25);
  // Level
  ctx.fillStyle=C.textDim;
  ctx.fillText('L'+(state.level+1),W-50,25);
  // Progress bar
  var prog=Math.min(state.score/state.target,1);
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.fillRect(0,48,W,4);
  ctx.fillStyle=prog>=1?C.green:C.gold;
  ctx.fillRect(0,48,W*prog,4);
  // Combo indicator
  if(state.combo>=2&&state.comboTimer>0){
    ctx.fillStyle=C.red;ctx.font='bold 16px Arial';ctx.textAlign='center';
    ctx.fillText('COMBO x'+state.combo,W/2,65);
  }
}

// Draw a 5-pointed star at (x,y) with given radius r
function drawStarShape(x,y,r,fill){
  ctx.fillStyle=fill;
  ctx.beginPath();
  for(var i=0;i<10;i++){
    var a=(Math.PI/5)*i-Math.PI/2;
    var rad=i%2===0?r:r*0.45;
    var px=x+Math.cos(a)*rad;
    var py=y+Math.sin(a)*rad;
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.closePath();ctx.fill();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// --- Input ---
var input={mx:0,my:0};
var buttonAreas=[];

function handleAction(action){
  playSFX('click');
  switch(action){
    case'play':startLevel(0);break;
    case'select':state.screen='levelSelect';break;
    case'back':state.screen='menu';break;
    case'menu':state.screen='menu';stopBGM();break;
    case'next':
      if(state.level<LEVELS.length-1)startLevel(state.level+1);
      else state.screen='win';
      break;
    case'retry':startLevel(state.level);break;
    case'sound':state.soundOn=!state.soundOn;saveProgress();break;
    case'music':state.musicOn=!state.musicOn;if(!state.musicOn)stopBGM();else{ensureAudio();startBGM();}saveProgress();break;
    case'level_0':case'level_1':case'level_2':case'level_3':case'level_4':
    case'level_5':case'level_6':case'level_7':case'level_8':case'level_9':
      var idx=parseInt(action.slice(6));
      if(idx<state.unlocked)startLevel(idx);
      state.screen='game';
      break;
  }
}

canvas.addEventListener('pointerdown',function(e){
  e.preventDefault();
  ensureAudio();
  var rect=canvas.getBoundingClientRect();
  input.mx=e.clientX-rect.left;
  input.my=e.clientY-rect.top;
  // Check buttons
  for(var i=0;i<buttonAreas.length;i++){
    var b=buttonAreas[i];
    if(input.mx>=b.x&&input.mx<=b.x+b.w&&input.my>=b.y&&input.my<=b.y+b.h){
      handleAction(b.action);
      return;
    }
  }
  // Game action
  if(state.screen==='game'){
    dropHook();
  }
  // Level select
  if(state.screen==='levelSelect'){
    var cols=Math.min(5,Math.floor((Math.min(W*0.9,W-20))/80));
    var cellW=80,cellH=80;
    var gridW=cols*cellW;
    var startX=(W-gridW)/2;
    var startY=(H-Math.min(H*0.85,H-100))/2+70;
    for(var lv=0;lv<LEVELS.length;lv++){
      var cx=startX+(lv%cols)*cellW+cellW/2;
      var cy=startY+Math.floor(lv/cols)*cellH+cellH/2;
      var dx=input.mx-cx,dy=input.my-cy;
      if(dx*dx+dy*dy<28*28&&lv<state.unlocked){
        startLevel(lv);
        return;
      }
    }
  }
});
canvas.addEventListener('pointermove',function(e){
  var rect=canvas.getBoundingClientRect();
  input.mx=e.clientX-rect.left;
  input.my=e.clientY-rect.top;
});

window.addEventListener('keydown',function(e){
  if(e.key===' '||e.key==='ArrowDown'){
    if(state.screen==='game'){dropHook();e.preventDefault();}
  }
  if(e.key==='d'||e.key==='D'){
    if(state.screen==='game')useDynamite();
  }
  if(e.key==='Escape'){
    if(state.screen==='game'||state.screen==='levelSelect'){state.screen='menu';stopBGM();}
  }
});

document.addEventListener('visibilitychange',function(){
  if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null;}stopBGM();}
  else if(state.screen==='game'){state.lastTime=performance.now();rafId=requestAnimationFrame(gameLoop);if(state.musicOn){ensureAudio();startBGM();}}
});

// --- Game Loop ---
function gameLoop(now){
  rafId=requestAnimationFrame(gameLoop);
  var dt=Math.min((now-(state.lastTime||now))/1000,0.05);
  state.lastTime=now;
  state.dt=dt;
  buttonAreas=[];
  // Update
  if(state.screen==='game'){
    updateHook(dt);
    // Timer
    state.timeFrac+=dt;
    if(state.timeFrac>=1){
      state.time-=Math.floor(state.timeFrac);
      state.timeFrac%=1;
      if(state.time<=10&&state.time>0)playSFX('tick');
      if(state.time<=0){
        state.time=0;
        checkGameOver();
      }
    }
    // Combo timer
    if(state.comboTimer>0){state.comboTimer-=dt;if(state.comboTimer<=0)state.combo=0;}
    // Particles
    for(var i=state.particles.length-1;i>=0;i--){
      var p=state.particles[i];
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=dt*1.5;
      if(p.life<=0)state.particles.splice(i,1);
    }
    // Floats
    for(var j=state.floats.length-1;j>=0;j--){
      var f=state.floats[j];
      f.y+=f.vy;f.life-=dt;
      if(f.life<=0)state.floats.splice(j,1);
    }
  }
  // Draw
  ctx.clearRect(0,0,W,H);
  switch(state.screen){
    case'menu':drawMenu();break;
    case'game':drawGame();break;
    case'levelSelect':drawLevelSelect();break;
    case'levelComplete':drawLevelComplete();break;
    case'gameOver':drawGameOver();break;
    case'win':drawWin();break;
  }
}

// --- Cleanup ---
function cleanup(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  stopBGM();
  timers.forEach(function(id){clearInterval(id);});
  timers=[];
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
}
window.addEventListener('beforeunload',cleanup);

// --- Init ---
loadProgress();
resizeCanvas();
state.lastTime=performance.now();
rafId=requestAnimationFrame(gameLoop);

})();
</script>
