<script>
(function(){
"use strict";

// ============================================================
//  Slingshot Puzzle  —  single-file HTML5 game
// ============================================================

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const menuPanel = document.getElementById('menu-panel');
const shotsDisplay = document.getElementById('shots-display');
const hintBubble = document.getElementById('hint-bubble');

// --- CONSTANTS ---
const SAVE_KEY = 'slingshotPuzzle_v1';
const TOTAL_LEVELS = 30;
const TIER_SIZE = 6;
const GRAVITY = 0.42;
const PROJECTILE_R = 11;
const MAX_POWER = 150;          // max drag distance (px in world coords)
const POWER_TO_VEL = 0.165;     // multiplier: drag dist -> launch velocity
const SLING_X = 0.16;           // slingshot x as fraction of gameW
const SLING_Y = 0.74;           // slingshot y as fraction of gameH
const GROUND_Y = 0.86;          // ground line as fraction of gameH
const BOUNCE_FACTOR = 1.15;     // bounce-pad velocity multiplier
const WALL_RESTITUTION = 0.55;
const TARGET_R = 16;
const BOUNCE_PAD_H = 14;
const BLOCK_BASE_HP = 1;

// --- STATE ---
let W = 0, H = 0;            // canvas CSS pixels
let scaleDpr = 1;
let gameW, gameH;            // world logical size (we render in gameW×gameH, canvas scaled)
let slingX, slingY, groundY;
let state = 'menu';          // menu | levelselect | playing | won | lost
let currentLevel = 0;
let level = null;            // current level data (clone)
let projectiles = [];        // active flying projectiles
let targets = [];            // {x,y,r,hp,maxHp,broken,points}
let walls = [];              // {x,y,w,h}
let bouncePads = [];         // {x,y,w}
let blocks = [];             // {x,y,w,h,hp,maxHp}
let particles = [];
let trailPoints = [];
let aiming = false;
let aimStart = null, aimEnd = null;
let shotsLeft = 0;
let shotsUsed = 0;
let totalTargets = 0;
let targetsHit = 0;
let levelScore = 0;
let shakeTime = 0, shakeMag = 0;
let animFrame = null;
let lastTime = 0;
let soundOn = true;
let audioCtx = null;
let musicGain = null;
let musicNodes = [];
let saveData = { version:1, stars:{}, completed:[] };

// ============================================================
//  AUDIO  (Web Audio API — procedural SFX + ambient pad)
// ============================================================
function initAudio(){
  if(audioCtx) return;
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.08;
    musicGain.connect(audioCtx.destination);
  }catch(e){ audioCtx=null; }
}
function sfx(type){
  if(!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  if(type==='stretch'){
    o.type='sawtooth'; o.frequency.setValueAtTime(140,t); o.frequency.exponentialRampToValueAtTime(90,t+0.15);
    g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.start(t); o.stop(t+0.2);
  }else if(type==='release'){
    o.type='triangle'; o.frequency.setValueAtTime(420,t); o.frequency.exponentialRampToValueAtTime(160,t+0.12);
    g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.start(t); o.stop(t+0.16);
  }else if(type==='impact'){
    o.type='square'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(50,t+0.1);
    g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.start(t); o.stop(t+0.13);
    // noise burst
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.1, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const ns = audioCtx.createBufferSource(); ns.buffer=buf;
    const ng = audioCtx.createGain(); ng.gain.value=0.15;
    ns.connect(ng); ng.connect(audioCtx.destination); ns.start(t);
  }else if(type==='break'){
    o.type='sawtooth'; o.frequency.setValueAtTime(320,t); o.frequency.exponentialRampToValueAtTime(80,t+0.18);
    g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    o.start(t); o.stop(t+0.22);
  }else if(type==='bounce'){
    o.type='sine'; o.frequency.setValueAtTime(660,t); o.frequency.exponentialRampToValueAtTime(990,t+0.08);
    g.gain.setValueAtTime(0.16,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.start(t); o.stop(t+0.11);
  }else if(type==='star'){
    o.type='sine'; o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(1320,t+0.12);
    g.gain.setValueAtTime(0.14,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
    o.start(t); o.stop(t+0.15);
  }else if(type==='win'){
    [523,659,784,1047].forEach((f,i)=>{
      const oo=audioCtx.createOscillator(),gg=audioCtx.createGain();
      oo.type='triangle'; oo.frequency.value=f;
      gg.gain.setValueAtTime(0,t+i*0.1); gg.gain.linearRampToValueAtTime(0.16,t+i*0.1+0.02);
      gg.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.4);
      oo.connect(gg); gg.connect(audioCtx.destination); oo.start(t+i*0.1); oo.stop(t+i*0.1+0.42);
    });
  }else if(type==='lose'){
    o.type='sawtooth'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(80,t+0.4);
    g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.start(t); o.stop(t+0.46);
  }else if(type==='click'){
    o.type='square'; o.frequency.value=600;
    g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    o.start(t); o.stop(t+0.06);
  }
}
function startMusic(){
  if(!audioCtx || !soundOn) return;
  stopMusic();
  // gentle ambient pad — two detuned oscillators + slow LFO
  const baseFreq = 196; // G3
  [0,7,12].forEach((semi,i)=>{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = i===0?'sine':'triangle';
    o.frequency.value = baseFreq * Math.pow(2,semi/12);
    g.gain.value = 0;
    g.gain.setTargetAtTime(0.035, audioCtx.currentTime, 1.5);
    o.connect(g); g.connect(musicGain);
    o.start();
    musicNodes.push({o,g});
  });
  // slow filter sweep LFO
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 0.08; lfoGain.gain.value = 0.02;
  lfo.connect(lfoGain); lfoGain.connect(musicGain.gain);
  lfo.start();
  musicNodes.push({o:lfo});
}
function stopMusic(){
  musicNodes.forEach(n=>{
    try{ if(n.g){ n.g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3); }
      setTimeout(()=>{ try{n.o.stop();}catch(e){} }, 500);
    }catch(e){}
  });
  musicNodes = [];
}

// ============================================================
//  SAVE / LOAD
// ============================================================
function loadSave(){
  try{
    const s = localStorage.getItem(SAVE_KEY);
    if(s){ saveData = JSON.parse(s); if(!saveData.stars) saveData.stars={}; if(!saveData.completed) saveData.completed=[]; }
  }catch(e){ saveData={version:1,stars:{},completed:[]}; }
}
function saveSave(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(saveData)); }catch(e){}
}
function getStars(lvl){ return saveData.stars[lvl]||0; }
function isCompleted(lvl){ return saveData.completed.indexOf(lvl)>=0; }
function highestUnlocked(){
  for(let i=0;i<TOTAL_LEVELS;i++){ if(!isCompleted(i)) return i; }
  return TOTAL_LEVELS-1;
}

  // ---------- TIER 3: Blocks & limited shots (13-18) ----------

  // ---------- TIER 4: Bounce mastery & combos (19-24) ----------
  L.push({name:'Bank Shot',shots:3,targets:[T(0.45,0.35)],walls:[W_(0.88,0.30,0.03,0.30)],pads:[BP(0.88,0.72,0.12)],blocks:[]});

const LEVELS = makeLevels();
const TIER_NAMES = ['Beginner','Apprentice','Skilled','Expert','Master'];

// ============================================================
//  CANVAS RESIZE
// ============================================================
function resize(){
  const dpr = window.devicePixelRatio || 1;
  const availW = window.innerWidth;
  const availH = window.innerHeight;
  // game world aspect: portrait-ish 5:7 but capped
  const targetRatio = 0.62; // w/h
  let cw, ch;
  if(availW/availH > targetRatio){
    ch = availH; cw = ch*targetRatio;
    if(cw>availW*0.96){ cw=availW*0.96; ch=cw/targetRatio; }
  }else{
    cw = availW*0.96; ch = cw/targetRatio;
    if(ch>availH*0.98){ ch=availH*0.98; cw=ch*targetRatio; }
  }
  canvas.style.width = cw+'px';
  canvas.style.height = ch+'px';
  canvas.width = Math.round(cw*dpr);
  canvas.height = Math.round(ch*dpr);
  scaleDpr = dpr;
  W = cw; H = ch;
  gameW = 400; gameH = Math.round(400/targetRatio);  // logical world units
  // map logical -> device pixels
  ctx.setTransform(canvas.width/gameW, 0, 0, canvas.height/gameH, 0, 0);
  slingX = SLING_X*gameW;
  slingY = SLING_Y*gameH;
  groundY = GROUND_Y*gameH;
}
window.addEventListener('resize', resize);

// ============================================================
//  LEVEL SETUP
// ============================================================
function loadLevel(idx){
  const def = LEVELS[idx];
  level = JSON.parse(JSON.stringify(def));
  // resolve fractions to world coords
  targets = (level.targets||[]).map(t=>({
    x:t.fx*gameW, y:t.fy*gameH, r:t.r||TARGET_R, hp:t.hp||1, maxHp:t.hp||1,
    broken:false, points:t.points||100, type:t.type||'target'
  }));
  walls = (level.walls||[]).map(w=>({x:w.fx*gameW,y:w.fy*gameH,w:w.fw*gameW,h:w.fh*gameH}));
  bouncePads = (level.pads||[]).map(p=>({x:p.fx*gameW,y:p.fy*gameH,w:p.fw*gameW,h:BOUNCE_PAD_H}));
  blocks = (level.blocks||[]).map(b=>({x:b.fx*gameW,y:b.fy*gameH,w:b.fw*gameW,h:b.fh*gameH,hp:b.hp||1,maxHp:b.hp||1}));
  projectiles = [];
  particles = [];
  trailPoints = [];
  shotsLeft = def.shots;
  shotsUsed = 0;
  totalTargets = targets.length;
  targetsHit = 0;
  levelScore = 0;
  aiming = false; aimStart=null; aimEnd=null;
  updateHud();
  if(level.hint){ showHint(level.hint); } else { hideHint(); }
}

// ============================================================
//  INPUT
// ============================================================
function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const cx = (e.touches?e.touches[0].clientX:e.clientX);
  const cy = (e.touches?e.touches[0].clientY:e.clientY);
  // CSS px -> world logical
  const wx = (cx-rect.left)/rect.width*gameW;
  const wy = (cy-rect.top)/rect.height*gameH;
  return {x:wx,y:wy};
}
function onDown(e){
  if(state!=='playing'||shotsLeft<=0) return;
  e.preventDefault();
  initAudio();
  const p = getPos(e);
  // start aiming if near slingshot or anywhere in left half (forgiving)
  aiming = true;
  aimStart = {x:slingX, y:slingY};
  aimEnd = p;
  sfx('stretch');
}
function onMove(e){
  if(!aiming) return;
  e.preventDefault();
  const p = getPos(e);
  // clamp drag distance
  let dx = p.x-aimStart.x, dy = p.y-aimStart.y;
  const dist = Math.hypot(dx,dy);
  if(dist>MAX_POWER){ dx = dx/dist*MAX_POWER; dy = dy/dist*MAX_POWER; }
  aimEnd = {x:aimStart.x+dx, y:aimStart.y+dy};
}
function onUp(e){
  if(!aiming) return;
  e.preventDefault();
  aiming = false;
  if(!aimEnd){ return; }
  const dx = aimStart.x-aimEnd.x;   // launch direction = opposite of drag
  const dy = aimStart.y-aimEnd.y;
  const dist = Math.hypot(dx,dy);
  if(dist<10){ aimEnd=null; return; }  // too small, cancel
  const vx = dx*POWER_TO_VEL;
  const vy = dy*POWER_TO_VEL;
  projectiles.push({x:slingX, y:slingY, vx, vy, r:PROJECTILE_R, life:0, bounces:0});
  shotsLeft--;
  shotsUsed++;
  trailPoints = [];
  sfx('release');
  updateHud();
  if(navigator.vibrate) navigator.vibrate(15);
}
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('touchend', onUp, {passive:false});

// ============================================================
//  PHYSICS UPDATE
// ============================================================
function rectCircleCollide(rx,ry,rw,rh,cx,cy,cr){
  const nx = Math.max(rx, Math.min(cx, rx+rw));
  const ny = Math.max(ry, Math.min(cy, ry+rh));
  const dx = cx-nx, dy = cy-ny;
  return (dx*dx+dy*dy) < cr*cr;
}

function updatePhysics(dt){
  const steps = 2; // sub-steps for stability
  for(let s=0;s<steps;s++){
    const sdt = dt/steps;
    for(let i=projectiles.length-1;i>=0;i--){
      const p = projectiles[i];
      p.vy += GRAVITY*sdt/16;
      p.x += p.vx*sdt/16;
      p.y += p.vy*sdt/16;
      p.life += sdt;

      // trail
      if(s===0) trailPoints.push({x:p.x,y:p.y,life:1});

      // ground
      if(p.y+p.r > groundY){
        p.y = groundY-p.r;
        p.vy = -p.vy*WALL_RESTITUTION;
        p.vx *= 0.7;
        p.bounces++;
        if(Math.abs(p.vy)<1.2 && Math.abs(p.vx)<1.2){ projectiles.splice(i,1); continue; }
      }
      // walls left/right/top
      if(p.x-p.r<0){ p.x=p.r; p.vx=-p.vx*WALL_RESTITUTION; }
      if(p.x+p.r>gameW){ p.x=gameW-p.r; p.vx=-p.vx*WALL_RESTITUTION; }
      if(p.y-p.r<0){ p.y=p.r; p.vy=-p.vy*WALL_RESTITUTION; }
      if(p.bounces>8 || p.life>6000){ projectiles.splice(i,1); continue; }

      // walls
      let hitWall=false;
      for(const w of walls){
        if(rectCircleCollide(w.x,w.y,w.w,w.h,p.x,p.y,p.r)){
          // resolve: push out on nearest face
          const cx = Math.max(w.x,Math.min(p.x,w.x+w.w));
          const cy = Math.max(w.y,Math.min(p.y,w.y+w.h));
          let nx=p.x-cx, ny=p.y-cy; let nl=Math.hypot(nx,ny)||0.01;
          nx/=nl; ny/=nl;
          const overlap = p.r-nl;
          p.x += nx*overlap; p.y += ny*overlap;
          const dot = p.vx*nx+p.vy*ny;
          p.vx = (p.vx-2*dot*nx)*WALL_RESTITUTION;
          p.vy = (p.vy-2*dot*ny)*WALL_RESTITUTION;
          hitWall=true; break;
        }
      }
      if(hitWall){ sfx('impact'); addImpactParticles(p.x,p.y,'#aab',6); }

      // bounce pads
      for(const bp of bouncePads){
        if(rectCircleCollide(bp.x,bp.y,bp.w,bp.h,p.x,p.y,p.r)){
          const cx = Math.max(bp.x,Math.min(p.x,bp.x+bp.w));
          const cy = Math.max(bp.y,Math.min(p.y,bp.y+bp.h));
          let nx=p.x-cx, ny=p.y-cy; let nl=Math.hypot(nx,ny)||0.01;
          nx/=nl; ny/=nl;
          p.x += nx*p.r; p.y += ny*p.r;
          const dot = p.vx*nx+p.vy*ny;
          p.vx = (p.vx-2*dot*nx)*BOUNCE_FACTOR;
          p.vy = (p.vy-2*dot*ny)*BOUNCE_FACTOR;
          sfx('bounce');
          addImpactParticles(p.x,p.y,'#ff9d3d',10);
          break;
        }
      }

      // blocks (destructible)
      for(let bi=blocks.length-1;bi>=0;bi--){
        const b = blocks[bi];
        if(rectCircleCollide(b.x,b.y,b.w,b.h,p.x,p.y,p.r)){
          const cx = Math.max(b.x,Math.min(p.x,b.x+b.w));
          const cy = Math.max(b.y,Math.min(p.y,b.y+b.h));
          let nx=p.x-cx, ny=p.y-cy; let nl=Math.hypot(nx,ny)||0.01;
          nx/=nl; ny/=nl;
          const overlap = p.r-nl;
          p.x += nx*overlap; p.y += ny*overlap;
          const dot = p.vx*nx+p.vy*ny;
          p.vx = (p.vx-2*dot*nx)*WALL_RESTITUTION;
          p.vy = (p.vy-2*dot*ny)*WALL_RESTITUTION;
          b.hp--;
          sfx('impact');
          addImpactParticles(p.x,p.y, b.maxHp>1?'#8a8a9a':'#c9a36a', 8);
          if(b.hp<=0){
            blocks.splice(bi,1);
            sfx('break');
            addBreakParticles(b.x+b.w/2,b.y+b.h/2, b.maxHp>1?'#8a8a9a':'#c9a36a');
            levelScore += 50;
          }
          break;
        }
      }

      // targets
      for(const t of targets){
        if(t.broken) continue;
        const dx=p.x-t.x, dy=p.y-t.y;
        if(dx*dx+dy*dy < (p.r+t.r)*(p.r+t.r)){
          t.hp--;
          if(t.hp<=0){
            t.broken = true;
            targetsHit++;
            levelScore += t.points;
            sfx('break');
            addBreakParticles(t.x,t.y,'#ffd93d');
            triggerShake(4,120);
          }else{
            sfx('impact');
            // knock projectile back a bit
            const nl=Math.hypot(dx,dy)||0.01;
            p.vx = (dx/nl)*Math.abs(p.vx)*0.4;
            p.vy = (dy/nl)*Math.abs(p.vy)*0.4;
          }
        }
      }
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy;
    pt.vy += 0.18; pt.vx *= 0.98;
    pt.life -= pt.decay;
    if(pt.rot!=null) pt.rot += pt.rotSpeed;
    if(pt.life<=0) particles.splice(i,1);
  }
  // trail fade
  for(let i=trailPoints.length-1;i>=0;i--){ trailPoints[i].life-=0.04; if(trailPoints[i].life<=0) trailPoints.splice(i,1); }
  if(trailPoints.length>60) trailPoints.splice(0, trailPoints.length-60);

  if(shakeTime>0) shakeTime-=dt;

  // win/lose check
  if(totalTargets>0 && targetsHit>=totalTargets){
    onLevelWin();
  }else if(projectiles.length===0 && shotsLeft<=0 && totalTargets>0 && targetsHit<totalTargets){
    // small delay handled by life; if none flying and no shots, lose
    onLevelLose();
  }
}

function addImpactParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,decay:0.05,color,size:2+Math.random()*2});
  }
}
function addBreakParticles(x,y,color){
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:0.025,color,size:3+Math.random()*3,rot:Math.random()*6,rotSpeed:(Math.random()-0.5)*0.3});
  }
}
function triggerShake(mag,dur){ shakeMag=mag; shakeTime=dur; }

// ============================================================
//  TRAJECTORY PREVIEW (predict while aiming)
// ============================================================
function predictTrajectory(){
  if(!aiming||!aimEnd) return [];
  const dx = aimStart.x-aimEnd.x, dy = aimStart.y-aimEnd.y;
  const dist = Math.hypot(dx,dy);
  if(dist<10) return [];
  let px=slingX, py=slingY;
  let pvx=dx*POWER_TO_VEL, pvy=dy*POWER_TO_VEL;
  const pts=[{x:px,y:py}];
  for(let i=0;i<60;i++){
    pvy += GRAVITY*0.5;
    px += pvx*0.5; py += pvy*0.5;
    if(py>groundY||px<0||px>gameW) break;
    pts.push({x:px,y:py});
  }
  return pts;
}

// ============================================================
//  RENDER
// ============================================================
function render(){
  ctx.save();
  // shake
  if(shakeTime>0){
    const s = shakeMag*(shakeTime/120);
    ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s);
  }
  // bg already via CSS; draw subtle stars
  ctx.clearRect(0,0,gameW,gameH);

  // distant stars (static-ish, seeded)
  ctx.fillStyle='rgba(255,255,255,0.25)';
  for(let i=0;i<30;i++){
    const sx=((i*73)%gameW), sy=((i*131)%(groundY-20));
    ctx.fillRect(sx,sy,1.5,1.5);
  }

  // ground
  const gg = ctx.createLinearGradient(0,groundY,0,gameH);
  gg.addColorStop(0,'#1a3a2e'); gg.addColorStop(1,'#0d1f1a');
  ctx.fillStyle=gg;
  ctx.fillRect(0,groundY,gameW,gameH-groundY);
  ctx.strokeStyle='rgba(78,205,196,0.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(gameW,groundY); ctx.stroke();

  // walls
  for(const w of walls){
    const wg=ctx.createLinearGradient(w.x,w.y,w.x,w.y+w.h);
    wg.addColorStop(0,'#3a4a7a'); wg.addColorStop(1,'#2a3a5a');
    ctx.fillStyle=wg; ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle='rgba(78,205,196,0.3)'; ctx.lineWidth=1; ctx.strokeRect(w.x,w.y,w.w,w.h);
  }

  // blocks (wood/stone)
  for(const b of blocks){
    const isStone = b.maxHp>1;
    const bg=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    if(isStone){ bg.addColorStop(0,'#9a9aaa'); bg.addColorStop(1,'#6a6a7a'); }
    else{ bg.addColorStop(0,'#d4a86a'); bg.addColorStop(1,'#a07a3a'); }
    ctx.fillStyle=bg; ctx.fillRect(b.x,b.y,b.w,b.h);
    // crack overlay if damaged
    if(b.hp<b.maxHp){
      ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(b.x+b.w*0.3,b.y); ctx.lineTo(b.x+b.w*0.5,b.y+b.h*0.5); ctx.lineTo(b.x+b.w*0.2,b.y+b.h);
      ctx.moveTo(b.x+b.w*0.7,b.y+b.h*0.2); ctx.lineTo(b.x+b.w*0.9,b.y+b.h*0.6);
      ctx.stroke();
    }
    ctx.strokeStyle=isStone?'rgba(60,60,80,0.6)':'rgba(80,50,20,0.6)'; ctx.lineWidth=1;
    ctx.strokeRect(b.x,b.y,b.w,b.h);
  }

  // bounce pads
  for(const bp of bouncePads){
    const pg=ctx.createLinearGradient(bp.x,bp.y,bp.x,bp.y+bp.h);
    pg.addColorStop(0,'#ffb84d'); pg.addColorStop(1,'#ff7a1a');
    ctx.fillStyle=pg;
    ctx.beginPath();
    ctx.roundRect(bp.x,bp.y,bp.w,bp.h,5);
    ctx.fill();
    // arrows
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5;
    for(let ax=bp.x+8; ax<bp.x+bp.w-8; ax+=14){
      ctx.beginPath(); ctx.moveTo(ax,bp.y+bp.h-3); ctx.lineTo(ax+4,bp.y+3); ctx.lineTo(ax+8,bp.y+bp.h-3); ctx.stroke();
    }
  }

  // targets
  for(const t of targets){
    if(t.broken) continue;
    // glow
    const gr = ctx.createRadialGradient(t.x,t.y,2,t.x,t.y,t.r+8);
    gr.addColorStop(0,'rgba(255,217,61,0.5)'); gr.addColorStop(1,'rgba(255,217,61,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(t.x,t.y,t.r+8,0,Math.PI*2); ctx.fill();
    // body
    const tg=ctx.createRadialGradient(t.x-4,t.y-4,2,t.x,t.y,t.r);
    tg.addColorStop(0,'#ffe680'); tg.addColorStop(1,'#e0a800');
    ctx.fillStyle=tg; ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,Math.PI*2); ctx.fill();
    // bullseye
    ctx.strokeStyle='rgba(160,80,0,0.6)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.r*0.55,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(200,40,40,0.8)';
    ctx.beginPath(); ctx.arc(t.x,t.y,t.r*0.2,0,Math.PI*2); ctx.fill();
  }

  // trail
  for(let i=0;i<trailPoints.length;i++){
    const tp=trailPoints[i];
    ctx.fillStyle='rgba(120,220,255,'+(tp.life*0.5)+')';
    ctx.beginPath(); ctx.arc(tp.x,tp.y,3*tp.life,0,Math.PI*2); ctx.fill();
  }

  // trajectory preview
  if(aiming){
    const traj = predictTrajectory();
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for(let i=0;i<traj.length;i+=3){
      const pt=traj[i];
      ctx.beginPath(); ctx.arc(pt.x,pt.y,2.5-i*0.02,0,Math.PI*2); ctx.fill();
    }
    // aim line
    ctx.strokeStyle='rgba(255,217,61,0.8)'; ctx.lineWidth=2;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(aimStart.x,aimStart.y); ctx.lineTo(aimEnd.x,aimEnd.y); ctx.stroke();
    ctx.setLineDash([]);
  }

  // projectiles
  for(const p of projectiles){
    const pg=ctx.createRadialGradient(p.x-3,p.y-3,1,p.x,p.y,p.r);
    pg.addColorStop(0,'#ffffff'); pg.addColorStop(0.5,'#4ecdc4'); pg.addColorStop(1,'#1a8a8a');
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1; ctx.stroke();
  }

  // particles
  for(const pt of particles){
    ctx.globalAlpha=Math.max(0,pt.life);
    ctx.fillStyle=pt.color;
    if(pt.rot!=null){
      ctx.save(); ctx.translate(pt.x,pt.y); ctx.rotate(pt.rot);
      ctx.fillRect(-pt.size/2,-pt.size/2,pt.size,pt.size); ctx.restore();
    }else{
      ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.size,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha=1;

  // slingshot (Y-frame + elastic)
  drawSlingshot();

  ctx.restore();
}

function drawSlingshot(){
  const bx=slingX, by=slingY;
  // base / post
  ctx.strokeStyle='#7a5a3a'; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(bx,groundY); ctx.lineTo(bx,by+6); ctx.stroke();
  // Y fork
  ctx.beginPath();
  ctx.moveTo(bx,by+6); ctx.lineTo(bx-14,by-16);
  ctx.moveTo(bx,by+6); ctx.lineTo(bx+14,by-16);
  ctx.stroke();
  ctx.lineCap='butt';
  // fork tips
  ctx.fillStyle='#5a3a1a';
  ctx.beginPath(); ctx.arc(bx-14,by-16,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+14,by-16,4,0,Math.PI*2); ctx.fill();

  // elastic band + pouch
  let pouchX=bx, pouchY=by-16;
  if(aiming && aimEnd){
    pouchX = aimEnd.x; pouchY = aimEnd.y;
    // clamp near sling
    let dx=pouchX-bx, dy=pouchY-(by-16); const d=Math.hypot(dx,dy);
    if(d>MAX_POWER){ pouchX=bx+dx/d*MAX_POWER; pouchY=(by-16)+dy/d*MAX_POWER; }
  }
  ctx.strokeStyle='rgba(200,160,80,0.9)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(bx-14,by-16); ctx.lineTo(pouchX,pouchY); ctx.lineTo(bx+14,by-16); ctx.stroke();
  // pouch with projectile
  if(projectiles.length===0 || aiming){
    const pg=ctx.createRadialGradient(pouchX-2,pouchY-2,1,pouchX,pouchY,PROJECTILE_R);
    pg.addColorStop(0,'#fff'); pg.addColorStop(0.5,'#4ecdc4'); pg.addColorStop(1,'#1a8a8a');
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(pouchX,pouchY,PROJECTILE_R,0,Math.PI*2); ctx.fill();
  }
}

// polyfill roundRect for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number') r=[r,r,r,r];
    this.beginPath();
    this.moveTo(x+r[0],y);
    this.arcTo(x+w,y,x+w,y+h,r[1]);
    this.arcTo(x+w,y+h,x,y+h,r[2]);
    this.arcTo(x,y+h,x,y,r[3]);
    this.arcTo(x,y,x+w,y,r[0]);
    this.closePath(); return this;
  };
}

// ============================================================
//  WIN / LOSE
// ============================================================
function computeStars(shotsUsed, shotsAllowed, totalTargets){
  // 3 stars if used <= ceil(shotsAllowed*0.6) and hit all
  // 2 stars if used <= shotsAllowed-? ; 1 star otherwise (completion)
  const ratio = shotsUsed/shotsAllowed;
  if(ratio<=0.6) return 3;
  if(ratio<=0.85) return 2;
  return 1;
}
function onLevelWin(){
  if(state!=='playing') return;
  state='won';
  sfx('win');
  if(navigator.vibrate) navigator.vibrate([30,40,30]);
  // confetti
  for(let i=0;i<40;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({x:gameW/2,y:gameH/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:1,decay:0.012,
      color:['#ffd93d','#4ecdc4','#ff6b6b','#76ff03','#e040fb'][i%5],size:4+Math.random()*4,rot:Math.random()*6,rotSpeed:(Math.random()-0.5)*0.4});
  }
  const stars = computeStars(shotsUsed, level.shots, totalTargets);
  const prev = getStars(currentLevel);
  if(stars>prev) saveData.stars[currentLevel]=stars;
  if(saveData.completed.indexOf(currentLevel)<0) saveData.completed.push(currentLevel);
  saveSave();
  setTimeout(()=>showWinPanel(stars), 700);
}
function onLevelLose(){
  if(state!=='playing') return;
  // only lose when truly out of shots AND no projectile flying
  if(projectiles.length>0) return;
  state='lost';
  sfx('lose');
  setTimeout(()=>showLosePanel(), 500);
}

// ============================================================
//  UI PANELS
// ============================================================
function showOverlay(html){
  menuPanel.innerHTML = html;
  overlay.classList.remove('hidden');
}
function hideOverlay(){ overlay.classList.add('hidden'); }

function showMenu(){
  state='menu';
  hideHint();
  showOverlay(
    '<h2>🎯 Slingshot Puzzle</h2>'+
    '<p>Pull back the elastic, aim your shot, and knock down every target! 30 physics levels across 5 tiers.</p>'+
    '<button class="big-btn btn-primary" id="play-btn">▶ Play</button>'+
    '<button class="big-btn btn-secondary" id="levels-btn">📋 Level Select</button>'+
    '<button class="big-btn btn-secondary" id="how-btn">❓ How to Play</button>'+
    '<p style="font-size:12px;margin-top:14px;color:#667">'+totalStarsEarned()+' / '+(TOTAL_LEVELS*3)+' stars earned</p>'
  );
  document.getElementById('play-btn').onclick=()=>{ sfx('click'); startLevel(highestUnlocked()); };
  document.getElementById('levels-btn').onclick=()=>{ sfx('click'); showLevelSelect(); };
  document.getElementById('how-btn').onclick=()=>{ sfx('click'); showHowTo(); };
}
function totalStarsEarned(){
  let s=0; for(let i=0;i<TOTAL_LEVELS;i++) s+=getStars(i); return s;
}
function showLevelSelect(){
  state='levelselect';
  let grid='';
  for(let t=0;t<5;t++){
    grid += '<div class="tier-label">'+TIER_NAMES[t]+' — Levels '+(t*TIER_SIZE+1)+'–'+((t+1)*TIER_SIZE)+'</div>';
    for(let i=0;i<TIER_SIZE;i++){
      const idx=t*TIER_SIZE+i;
      const unlocked = idx<=highestUnlocked();
      const stars=getStars(idx);
      const starStr = '⭐'.repeat(stars);
      grid += '<button class="level-btn'+(unlocked?'':' locked')+(idx===currentLevel?' current':'')+'" data-lvl="'+idx+'" '+(unlocked?'':'disabled')+'>'+
        (idx+1)+'<span class="mini-stars">'+(stars?starStr:'·')+'</span></button>';
    }
  }
  showOverlay(
    '<h2>Level Select</h2>'+
    '<div id="level-select-grid">'+grid+'</div>'+
    '<button class="big-btn btn-secondary" id="back-btn" style="margin-top:14px">← Back</button>'
  );
  document.getElementById('back-btn').onclick=()=>{ sfx('click'); showMenu(); };
  document.querySelectorAll('.level-btn:not(.locked)').forEach(b=>{
    b.onclick=()=>{ sfx('click'); startLevel(parseInt(b.dataset.lvl)); };
  });
}
function showHowTo(){
  showOverlay(
    '<h2>How to Play</h2>'+
    '<p style="text-align:left;font-size:14px;line-height:1.7">'+
    '<b>1. Aim:</b> Touch/click the slingshot and drag backward. A dotted line shows your trajectory.<br><br>'+
    '<b>2. Power:</b> The further you pull, the harder the shot.<br><br>'+
    '<b>3. Launch:</b> Release to fire. Knock down every target to win.<br><br>'+
    '<b>4. Bounce Pads:</b> Orange pads ricochet your shot at higher speed.<br><br>'+
    '<b>5. Blocks:</b> Wood breaks in 1 hit; stone takes 2.<br><br>'+
    '<b>6. Stars:</b> Use fewer shots to earn 3 stars!'+
    '</p>'+
    '<button class="big-btn btn-primary" id="ok-btn">Got it!</button>'
  );
  document.getElementById('ok-btn').onclick=()=>{ sfx('click'); showMenu(); };
}
function showWinPanel(stars){
  const isLast = currentLevel>=TOTAL_LEVELS-1;
  let starHtml=''; for(let i=0;i<3;i++) starHtml+='<span class="star-big'+(i<stars?' lit':'')+'">⭐</span>';
  showOverlay(
    '<h2>Level Complete!</h2>'+
    '<div class="stars-row">'+starHtml+'</div>'+
    '<p>Level '+(currentLevel+1)+' — '+(level.name||'')+'<br>Score: '+levelScore+' · Shots: '+shotsUsed+'/'+level.shots+'</p>'+
    (isLast ?
      '<p style="color:#ffd93d">🏆 You finished all 30 levels!</p>'+
      '<button class="big-btn btn-primary" id="menu-btn2">Main Menu</button>'
      :
      '<button class="big-btn btn-primary" id="next-btn">Next Level →</button>'+
      '<button class="big-btn btn-secondary" id="retry-btn">↻ Replay</button>'+
      '<button class="big-btn btn-secondary" id="menu-btn2">Menu</button>')
  );
  if(!isLast) document.getElementById('next-btn').onclick=()=>{ sfx('click'); startLevel(currentLevel+1); };
  const rb=document.getElementById('retry-btn'); if(rb) rb.onclick=()=>{ sfx('click'); startLevel(currentLevel); };
  document.getElementById('menu-btn2').onclick=()=>{ sfx('click'); showMenu(); };
}
function showLosePanel(){
  showOverlay(
    '<h2 style="color:#ff6b6b">Out of Shots!</h2>'+
    '<p>You hit '+targetsHit+' / '+totalTargets+' targets.<br>Try again!</p>'+
    '<button class="big-btn btn-primary" id="retry-btn">↻ Try Again</button>'+
    '<button class="big-btn btn-secondary" id="menu-btn2">Menu</button>'
  );
  document.getElementById('retry-btn').onclick=()=>{ sfx('click'); startLevel(currentLevel); };
  document.getElementById('menu-btn2').onclick=()=>{ sfx('click'); showMenu(); };
}

function startLevel(idx){
  currentLevel = Math.max(0,Math.min(TOTAL_LEVELS-1,idx));
  loadLevel(currentLevel);
  state='playing';
  hideOverlay();
  startMusic();
}

// ============================================================
//  HUD + HINTS
// ============================================================
function updateHud(){
  const remaining = totalTargets - targetsHit;
  shotsDisplay.textContent = '🎯 '+targetsHit+'/'+totalTargets+'  ·  ◉ '+shotsLeft;
}
let hintTimer=null;
function showHint(msg){
  hintBubble.textContent=msg; hintBubble.classList.remove('hidden');
  if(hintTimer) clearTimeout(hintTimer);
  hintTimer=setTimeout(hideHint, 5000);
}
function hideHint(){ hintBubble.classList.add('hidden'); if(hintTimer){clearTimeout(hintTimer);hintTimer=null;} }

// ============================================================
//  TOPBAR BUTTONS
// ============================================================
document.getElementById('menu-btn').onclick=()=>{
  sfx('click');
  if(state==='playing'){ showMenu(); }
  else { showMenu(); }
};
document.getElementById('sound-btn').onclick=function(){
  soundOn=!soundOn;
  this.textContent = soundOn?'🔊':'🔇';
  if(!soundOn){ stopMusic(); }
  else if(state==='playing'){ startMusic(); }
  try{ localStorage.setItem('slingshotSound', soundOn?'1':'0'); }catch(e){}
};

// ============================================================
//  GAME LOOP
// ============================================================
function gameLoop(timestamp){
  if(!lastTime) lastTime=timestamp;
  const dt = Math.min(timestamp-lastTime, 40);
  lastTime=timestamp;
  if(state==='playing'){ updatePhysics(dt); }
  else {
    // still animate particles on overlays
    for(let i=particles.length-1;i>=0;i--){
      const pt=particles[i];
      pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.18; pt.life-=pt.decay;
      if(pt.rot!=null) pt.rot+=pt.rotSpeed;
      if(pt.life<=0) particles.splice(i,1);
    }
  }
  render();
  animFrame=requestAnimationFrame(gameLoop);
}

// ============================================================
//  CLEANUP
// ============================================================
function cleanup(){
  if(animFrame) cancelAnimationFrame(animFrame);
  animFrame=null;
  stopMusic();
  if(audioCtx && audioCtx.state!=='closed'){ try{audioCtx.close();}catch(e){} }
}
window.addEventListener('beforeunload', cleanup);
window.addEventListener('pagehide', cleanup);

// ============================================================
//  INIT
// ============================================================
// restore sound pref
try{ const sp=localStorage.getItem('slingshotSound'); if(sp==='0'){ soundOn=false; document.getElementById('sound-btn').textContent='🔇'; } }catch(e){}
loadSave();
resize();
showMenu();
animFrame=requestAnimationFrame(gameLoop);

})();
</script>
