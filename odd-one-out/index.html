<script>
(function(){
"use strict";
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){
DPR=Math.min(window.devicePixelRatio||1,2);
W=window.innerWidth;
H=window.innerHeight;
const cssW=Math.min(W,540);
const cssH=H;
cv.style.width=cssW+'px';cv.style.height=cssH+'px';
cv.width=cssW*DPR;cv.height=cssH*DPR;
ctx.setTransform(DPR,0,0,DPR,0,0);
W=cssW;H=cssH;
}
resize();
window.addEventListener('resize',resize);

// в”Җв”Җ Audio в”Җв”Җ
let AC=null;
function ac(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return AC}
function beep(f,d,t,v){const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0,a.currentTime);g.gain.linearRampToValueAtTime(v||.15,a.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.start();o.stop(a.currentTime+d)}
function sndCorrect(streak){const base=440+Math.min(streak,10)*30;beep(base,.1,'triangle',.15);setTimeout(()=>beep(base*1.5,.12,'triangle',.12),60)}
function sndWrong(){beep(200,.15,'sawtooth',.12);setTimeout(()=>beep(150,.2,'sawtooth',.1),80)}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18,'triangle',.14),i*100))}
function sndTap(){beep(600,.04,'sine',.08)}
function sndHint(){beep(800,.08,'sine',.1);setTimeout(()=>beep(1000,.1,'sine',.08),60)}

// в”Җв”Җ Theme data в”Җв”Җ
const COLOR_PAIRS=[
[60,70,55],[180,75,50],[0,80,55],[280,70,55],[120,65,45],[30,85,55],[320,70,50],[200,75,45],[90,70,45],[340,75,50]
];
const EMOJIS=['рҹҳҖ','рҹҢҹ','рҹҺ®','рҹҚ•','рҹҗұ','рҹҢҲ','вҡЎ','рҹҺғ','рҹҡҖ','рҹҺЁ','рҹҺҲ','рҹ”Ҙ','рҹ’Һ','рҹҚ©','рҹҰ„','рҹҺҜ','рҹҚҖ','рҹҺё','рҹҢё','вӯҗ'];
const SHAPES=['circle','square','triangle','diamond','star','heart'];
const LETTERS=['A','B','C','D','E','F','G','H','K','M','N','P','Q','R','T','W','X','Y'];

// в”Җв”Җ Levels в”Җв”Җ
const TIERS=[
{name:'Tutorial',grid:3,timeLimit:0,hueDiff:35,type:'color',desc:'Find the different color'},
{name:'Easy',grid:4,timeLimit:30,hueDiff:22,type:'mixed',desc:'Spot the odd one out'},
{name:'Medium',grid:5,timeLimit:25,hueDiff:14,type:'mixed',desc:'The difference is subtler'},
{name:'Hard',grid:6,timeLimit:20,hueDiff:9,type:'mixed',desc:'Only one is different'},
{name:'Expert',grid:7,timeLimit:15,hueDiff:5,type:'mixed',desc:'Can your eyes find it?'}
];
const LEVELS=[];
for(let t=0;t<TIERS.length;t++){for(let i=0;i<6;i++){
const diff=Tiers(t,i);
LEVELS.push({tier:t,idx:i,grid:TIERS[t].grid,time:TIERS[t].timeLimit,hueDiff:diff.hue,type:diff.type,theme:diff.theme});
}}

function Tiers(t,i){
const tp=TIERS[t].type;
if(tp==='color')return{hue:TIERS[t].hueDiff+(i*2),type:'color',theme:0};
// mixed: rotate through themes
const themes=['color','emoji','shape','letter','number'];
const th=themes[i%themes.length];
let hd=TIERS[t].hueDiff+i;
if(th==='emoji')hd=0;if(th==='letter')hd=0;if(th==='number')hd=0;if(th==='shape')hd=0;
return{hue:hd,type:th,theme:i%5};
}

// в”Җв”Җ State в”Җв”Җ
let state='title';
let curLevel=0;
let grid=[];
let oddIdx=-1;
let timer=0,timeLeft=0;
let streak=0,score=0,stars=0;
let hints=3;
let particles=[];
let shakeAmt=0;
let flashColor=null,flashAlpha=0;
let hintGlow=-1,hintTimer=0;
let bestStreak=0,totalStars=0;
let comboText='',comboTimer=0;
let bgParticles=[];

// Load progress
try{const s=JSON.parse(localStorage.getItem('ooo_progress')||'{}');
curLevel=s.cur||0;totalStars=s.stars||0;bestStreak=s.bs||0;hints=s.hints||3;}catch(e){}

function save(){try{localStorage.setItem('ooo_progress',JSON.stringify({cur:curLevel,stars:totalStars,bs:bestStreak,hints:hints}));}catch(e){}}

// Level stars
function levelStars(lvl){try{const s=JSON.parse(localStorage.getItem('ooo_stars')||'{}');return s[lvl]||0;}catch(e){return 0;}}
function setStars(lvl,st){try{const s=JSON.parse(localStorage.getItem('ooo_stars')||'{}');const old=s[lvl]||0;if(st>old){s[lvl]=st;localStorage.setItem('ooo_stars',JSON.stringify(s));totalStars=Object.values(s).reduce((a,b)=>a+b,0);}}catch(e){}}

// в”Җв”Җ Background particles в”Җв”Җ
for(let i=0;i<20;i++){bgParticles.push({x:Math.random(),y:Math.random(),s:2+Math.random()*4,vx:(Math.random()-.5)*.0003,vy:(Math.random()-.5)*.0003,h:Math.random()*360,a:.05+Math.random()*.1});}

// в”Җв”Җ Generate grid в”Җв”Җ
function genGrid(lvl){
const g=LEVELS[lvl];
const n=g.grid;
const total=n*n;
oddIdx=Math.floor(Math.random()*total);
grid=[];
// Pick theme type
let type=g.type;
if(type==='mixed'){
const types=['color','emoji','shape','letter'];
type=types[(lvl+Math.floor(Math.random()*4))%types.length];
}
const themeIdx=Math.floor(Math.random()*1000);
if(type==='color'){
const cp=COLOR_PAIRS[themeIdx%COLOR_PAIRS.length];
for(let i=0;i<total;i++){
if(i===oddIdx){
grid.push({type:'color',h:cp[0],s:cp[1],l:cp[2]+g.hueDiff,odd:true});
}else{
grid.push({type:'color',h:cp[0],s:cp[1],l:cp[2],odd:false});
}
}
}else if(type==='emoji'){
const em=EMOJIS[themeIdx%EMOJIS.length];
const alts={'рҹҳҖ':'рҹҳғ','рҹҢҹ':'рҹ’«','рҹҺ®':'рҹ•№пёҸ','рҹҚ•':'рҹҚ•','рҹҗұ':'рҹҳә','рҹҢҲ':'рҹҢқ','вҡЎ':'вҳҮ','рҹҺғ':'рҹҸ®','рҹҡҖ':'рҹӣё','рҹҺЁ':'рҹ–ҢпёҸ','рҹҺҲ':'рҹҺҸ','рҹ”Ҙ':'рҹ•ҜпёҸ','рҹ’Һ':'рҹ’Қ','рҹҚ©':'рҹҚӘ','рҹҰ„':'рҹҗҙ','рҹҺҜ':'рҹҺ–пёҸ','рҹҚҖ':'рҹҢҝ','рҹҺё':'рҹҺ»','рҹҢё':'рҹҢә','вӯҗ':'вңЁ'};
const altEm=alts[em]||'вқ“';
for(let i=0;i<total;i++){
grid.push({type:'emoji',char:i===oddIdx?altEm:em,odd:i===oddIdx});
}
}else if(type==='shape'){
const sh=SHAPES[themeIdx%SHAPES.length];
const rot=themeIdx%8*45;
for(let i=0;i<total;i++){
grid.push({type:'shape',shape:sh,rot:i===oddIdx?rot+15:rot,scale:1,odd:i===oddIdx});
}
}else if(type==='letter'){
const L=LETTERS[themeIdx%LETTERS.length];
const alt=L.toLowerCase();
for(let i=0;i<total;i++){
grid.push({type:'letter',char:i===oddIdx?alt:L,odd:i===oddIdx});
}
}else{ // number
const num=themeIdx%9+1;
for(let i=0;i<total;i++){
grid.push({type:'number',val:i===oddIdx?num+1:num,odd:i===oddIdx});
}
}
}

// в”Җв”Җ Input в”Җв”Җ
let pendingTap=null;
function getXY(e){
const r=cv.getBoundingClientRect();
let x,y;
if(e.touches&&e.touches.length){x=e.touches[0].clientX-r.left;y=e.touches[0].clientY-r.top;}
else{x=e.clientX-r.left;y=e.clientY-r.top;}
return{x,y};
}
cv.addEventListener('click',handleTap);
cv.addEventListener('touchstart',function(e){e.preventDefault();const p=getXY(e);pendingTap=p;handleTap(p);},{passive:false});

function handleTap(e){
if(typeof e==='object'&&!e.x){e=getXY(e);}
const x=e.x,y=e.y;
if(!x&&x!==0)return;
if(state==='title'){
// Check play button
const bx=W/2-90,by=H*.55,bw=180,bh=52;
if(x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh){sndTap();state='levels';}
return;
}
if(state==='levels'){
// Level select
handleLevelTap(x,y);
return;
}
if(state==='playing'){
// Check grid tap
const gi=getGridIndex(x,y);
if(gi>=0){
if(gi===oddIdx){
// Correct!
streak++;if(streak>bestStreak)bestStreak=streak;
score+=100+streak*10;
sndCorrect(streak);
spawnParticles(x,y,'#00e676',15);
comboText=streak>=3?(streak+'x COMBO!'):'NICE!';comboTimer=40;
nextLevel();
}else{
// Wrong
streak=0;
sndWrong();
shakeAmt=8;flashColor='rgba(255,23,68,';flashAlpha=.3;
if(timeLeft>0)timeLeft=Math.max(0,timeLeft-3);
}
}
// Check hint button
const hx=W-55,hy=H-55;
if(x>=hx-22&&x<=hx+22&&y>=hy-22&&y<=hy+22&&hints>0&&state==='playing'){
useHint();
}
// Check menu button
const mx=30,my=H-55;
if(x>=mx-22&&x<=mx+22&&y>=my-22&&y<=my+22){sndTap();state='levels';}
return;
}
if(state==='complete'){
if(y>H*.65){sndTap();state='levels';}
return;
}
if(state==='allDone'){
if(y>H*.6){sndTap();state='levels';}
return;
}
}

function getGridIndex(x,y){
const g=LEVELS[curLevel];
const n=g.grid;
const pad=20;
const avail=Math.min(W,H*.5)-pad*2;
const cs=avail/n;
const ox=(W-avail)/2;
const oy=H*.22;
for(let r=0;r<n;r++){for(let c=0;c<n;c++){
const gx=ox+c*cs,gy=oy+r*cs;
if(x>=gx&&x<gx+cs&&y>=gy&&y<gy+cs)return r*n+c;
}}
return-1;
}

function useHint(){
if(hints<=0)return;
hints--;
sndHint();
hintGlow=oddIdx;hintTimer=60;
save();
}

function spawnParticles(x,y,color,n){
for(let i=0;i<n;i++){
const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:30+Math.random()*20,color,size:3+Math.random()*4});
}
}

function nextLevel(){
curLevel++;
if(curLevel>=LEVELS.length){
state='allDone';
sndWin();
return;
}
// Calculate stars for just-completed level
const prev=curLevel-1;
let st=1;
if(LEVELS[prev].time>0){
if(timeLeft>LEVELS[prev].time*.5)st=3;
else if(timeLeft>LEVELS[prev].time*.2)st=2;
}else{st=3;}
setStars(prev,st);
if(curLevel%6===0){
// Tier complete - show interstitial screen
state='complete';
sndWin();
}else{
startLevel();
}
}

function startLevel(){
const g=LEVELS[curLevel];
genGrid(curLevel);
timeLeft=g.time;
timer=0;
state='playing';
}

function handleLevelTap(x,y){
// 6 per tier, 5 tiers = 30
const cols=6,rows=5;
const bw=Math.min(60,(W-40)/cols-8),bh=bw;
const pad=(W-cols*(bw+8)-8)/2;
const oy=H*.22;
for(let t=0;t<rows;t++){
for(let i=0;i<cols;i++){
const idx=t*cols+i;
if(idx>=LEVELS.length)continue;
const bx=pad+i*(bw+8)+4,by=oy+t*(bh+12)+4;
if(x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh){
const unlocked=idx<=curLevel;
if(unlocked){
sndTap();curLevel=idx;startLevel();
}
}
}
}
// Back button
if(x<W/2+90&&x>W/2-90&&y>H*.92&&y<H*.92+44){sndTap();state='title';}
}

// в”Җв”Җ Rendering в”Җв”Җ
function drawBg(){
ctx.fillStyle='#0f0f23';ctx.fillRect(0,0,W,H);
// gradient overlay
const grd=ctx.createRadialGradient(W/2,H*.3,50,W/2,H*.3,W);
grd.addColorStop(0,'rgba(0,229,255,0.06)');grd.addColorStop(1,'rgba(0,0,0,0)');
ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
// bg particles
for(const p of bgParticles){
p.x+=p.vx;p.y+=p.vy;
if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;
ctx.fillStyle=`hsla(${p.h},70%,60%,${p.a})`;
ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.s,0,Math.PI*2);ctx.fill();
}
}

function drawItem(item,cx,cy,size){
const s=size*.7;
if(item.type==='color'){
ctx.fillStyle=`hsl(${item.h},${item.s}%,${item.l}%)`;
ctx.beginPath();ctx.arc(cx,cy,s/2,0,Math.PI*2);ctx.fill();
ctx.fillStyle=`hsla(${item.h},${item.s}%,${Math.max(0,item.l-20)}%,.5)`;
ctx.lineWidth=2;ctx.strokeStyle=`hsla(${item.h},${item.s}%,${Math.max(0,item.l-15)}%,.6)`;
ctx.stroke();
// highlight
ctx.fillStyle='rgba(255,255,255,.2)';
ctx.beginPath();ctx.arc(cx-s*.15,cy-s*.15,s*.15,0,Math.PI*2);ctx.fill();
}else if(item.type==='emoji'){
ctx.font=`${s*.8}px sans-serif`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(item.char,cx,cy);
}else if(item.type==='shape'){
ctx.save();ctx.translate(cx,cy);ctx.rotate(item.rot*Math.PI/180);
ctx.fillStyle='#e0e0ff';ctx.strokeStyle='#00e5ff';ctx.lineWidth=2;
const sh=item.shape;
ctx.beginPath();
if(sh==='circle'){ctx.arc(0,0,s/2,0,Math.PI*2);}
else if(sh==='square'){ctx.rect(-s/2,-s/2,s,s);}
else if(sh==='triangle'){ctx.moveTo(0,-s/2);ctx.lineTo(s/2,s/2);ctx.lineTo(-s/2,s/2);ctx.closePath();}
else if(sh==='diamond'){ctx.moveTo(0,-s/2);ctx.lineTo(s/2,0);ctx.lineTo(0,s/2);ctx.lineTo(-s/2,0);ctx.closePath();}
else if(sh==='star'){for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2;const r=i%2===0?s/2:s/4;ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();}
else if(sh==='heart'){ctx.moveTo(0,s*.3);ctx.bezierCurveTo(-s*.5,-s*.1,-s*.5,-s*.5,0,-s*.2);ctx.bezierCurveTo(s*.5,-s*.5,s*.5,-s*.1,0,s*.3);}
ctx.fill();ctx.stroke();ctx.restore();
}else if(item.type==='letter'){
ctx.font=`bold ${s*.7}px -apple-system,sans-serif`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillStyle='#e0e0ff';
ctx.fillText(item.char,cx,cy);
}else if(item.type==='number'){
ctx.font=`bold ${s*.7}px -apple-system,sans-serif`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillStyle='#e0e0ff';
ctx.fillText(item.val,cx,cy);
}
}

function drawGrid(){
const g=LEVELS[curLevel];
const n=g.grid;
const pad=20;
const avail=Math.min(W,H*.5)-pad*2;
const cs=avail/n;
const ox=(W-avail)/2;
const oy=H*.22;
for(let r=0;r<n;r++){for(let c=0;c<n;c++){
const idx=r*n+c;
const cx=ox+c*cs+cs/2,cy=oy+r*cs+cs/2;
const item=grid[idx];
// cell bg
ctx.fillStyle='rgba(255,255,255,.03)';
ctx.strokeStyle='rgba(0,229,255,.08)';
ctx.lineWidth=1;
const inset=cs*.08;
ctx.beginPath();ctx.roundRect(ox+c*cs+inset,oy+r*cs+inset,cs-inset*2,cs-inset*2,8);ctx.fill();ctx.stroke();
// hint glow
if(idx===hintGlow&&hintTimer>0){
ctx.fillStyle=`rgba(255,215,0,${hintTimer/60*.3})`;
ctx.beginPath();ctx.arc(cx,cy,cs*.45,0,Math.PI*2);ctx.fill();
}
drawItem(item,cx,cy,cs);
}}
}

function drawHUD(){
// Top bar
ctx.fillStyle='rgba(26,26,62,.9)';
ctx.fillRect(0,0,W,50);
ctx.fillStyle='#00e5ff';ctx.font='bold 14px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
ctx.fillText(`LVL ${curLevel+1}/${LEVELS.length}`,16,25);
ctx.textAlign='center';
ctx.fillStyle='#ffd700';ctx.font='bold 16px sans-serif';
ctx.fillText(`вҳ… ${totalStars}`,W/2,25);
// streak
ctx.textAlign='right';
ctx.fillStyle=streak>1?'#ff4081':'#888';
ctx.font='bold 14px sans-serif';
ctx.fillText(streak>1?`рҹ”Ҙ ${streak}`:'STREAK',W-16,25);

// Timer
if(timeLeft>0||LEVELS[curLevel].time>0){
const ty=58;
ctx.textAlign='center';ctx.font='bold 18px sans-serif';
const tdisp=Math.ceil(timeLeft);
if(timeLeft<=5&&timeLeft>0){ctx.fillStyle='#ff1744';}else{ctx.fillStyle='#00e676';}
ctx.fillText(`вҸұ ${tdisp}s`,W/2,ty);
// timer bar
const bw=W-40,bh=4,bx=20,by=ty+14;
ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(bx,by,bw,bh);
ctx.fillStyle=timeLeft<=5?'#ff1744':'#00e676';
ctx.fillRect(bx,by,bw*(timeLeft/LEVELS[curLevel].time),bh);
}

// Bottom buttons
const by=H-55;
// Menu
ctx.fillStyle='rgba(255,255,255,.1)';ctx.strokeStyle='rgba(0,229,255,.3)';ctx.lineWidth=1;
ctx.beginPath();ctx.arc(30,by,22,0,Math.PI*2);ctx.fill();ctx.stroke();
ctx.fillStyle='#e0e0ff';ctx.font='20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('вҳ°',30,by);
// Hint
const hx=W-55;
ctx.fillStyle=hints>0?'rgba(255,215,0,.15)':'rgba(100,100,100,.1)';
ctx.strokeStyle=hints>0?'rgba(255,215,0,.4)':'rgba(100,100,100,.2)';
ctx.beginPath();ctx.arc(hx,by,22,0,Math.PI*2);ctx.fill();ctx.stroke();
ctx.fillStyle=hints>0?'#ffd700':'#555';ctx.font='18px sans-serif';
ctx.fillText('рҹ’Ў',hx,by);
ctx.font='bold 10px sans-serif';ctx.fillStyle=hints>0?'#ffd700':'#555';
ctx.fillText(hints,hx+14,by-14);

// combo text
if(comboTimer>0){
ctx.globalAlpha=Math.min(1,comboTimer/20);
ctx.fillStyle='#ff4081';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
ctx.fillText(comboText,W/2,H*.15);
ctx.globalAlpha=1;
}
}

function drawTitle(){
drawBg();
// title
ctx.textAlign='center';ctx.textBaseline='middle';
const t=Date.now()*.001;
// animated subtitle items
const demoEmojis=['рҹ”ҙ','рҹ”ҙ','рҹ”ҙ','рҹҹў','рҹ”ҙ','рҹ”ҙ','рҹ”ҙ','рҹ”ҙ','рҹ”ҙ'];
const dn=3,ds=50;
const dtotal=dn*dn;
const dx=W/2-ds*1.5,dy=H*.12;
for(let i=0;i<dtotal;i++){
const r=Math.floor(i/dn),c=i%dn;
ctx.font='36px sans-serif';
ctx.globalAlpha=.7+Math.sin(t*2+i*.5)*.3;
ctx.fillText(demoEmojis[i],dx+c*ds,dy+r*ds);
}
ctx.globalAlpha=1;
// title text
ctx.fillStyle='#00e5ff';ctx.font='bold 42px -apple-system,sans-serif';
ctx.fillText('ODD ONE',W/2,H*.42);
ctx.fillStyle='#ff4081';
ctx.fillText('OUT',W/2,H*.48);
// subtitle
ctx.fillStyle='#888';ctx.font='14px sans-serif';
ctx.fillText('Find the different one!',W/2,H*.53);
// play button
const bx=W/2-90,by=H*.55,bw=180,bh=52;
ctx.fillStyle='rgba(0,229,255,.95)';
ctx.beginPath();ctx.roundRect(bx,by,bw,bh,14);ctx.fill();
ctx.fillStyle='#001';ctx.font='bold 20px sans-serif';
ctx.fillText('в–¶ PLAY',W/2,by+bh/2);
// progress
if(curLevel>0){
ctx.fillStyle='#666';ctx.font='12px sans-serif';
ctx.fillText(`Progress: ${curLevel}/${LEVELS.length} levels В· ${totalStars} вҳ…`,W/2,H*.64);
}
}

function drawLevels(){
drawBg();
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillStyle='#00e5ff';ctx.font='bold 22px sans-serif';
ctx.fillText('SELECT LEVEL',W/2,H*.1);
ctx.fillStyle='#888';ctx.font='12px sans-serif';
ctx.fillText(`${totalStars} вҳ… collected`,W/2,H*.14);
// grid
const cols=6,rows=5;
const bw=Math.min(60,(W-40)/cols-8),bh=bw;
const pad=(W-cols*(bw+8)-8)/2;
const oy=H*.2;
for(let t=0;t<rows;t++){
// tier label
ctx.fillStyle='#555';ctx.font='bold 10px sans-serif';ctx.textAlign='left';
ctx.fillText(TIERS[t].name,pad,oy+t*(bh+12)-8);
for(let i=0;i<cols;i++){
const idx=t*cols+i;
if(idx>=LEVELS.length)continue;
const bx=pad+i*(bw+8)+4,by=oy+t*(bh+12)+4;
const unlocked=idx<=curLevel;
const st=levelStars(idx);
ctx.fillStyle=unlocked?(idx===curLevel?'rgba(0,229,255,.2)':'rgba(0,229,255,.08)'):'rgba(50,50,80,.3)';
ctx.strokeStyle=unlocked?'rgba(0,229,255,.3)':'rgba(50,50,80,.5)';
ctx.lineWidth=1;
ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();ctx.stroke();
ctx.fillStyle=unlocked?'#e0e0ff':'#444';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(idx+1,bx+bw/2,by+bh/2);
if(st>0){
ctx.font='10px sans-serif';ctx.fillStyle='#ffd700';
ctx.fillText('вҳ…'.repeat(st),bx+bw/2,by+bh-8);
}
if(!unlocked){ctx.font='14px sans-serif';ctx.fillStyle='#333';ctx.fillText('рҹ”’',bx+bw/2,by+bh/2);}
}
}
// back button
const bbx=W/2-90,bby=H*.92,bbw=180,bbh=40;
ctx.fillStyle='rgba(255,255,255,.08)';ctx.strokeStyle='rgba(0,229,255,.2)';
ctx.beginPath();ctx.roundRect(bbx,bby,bbw,bbh,10);ctx.fill();ctx.stroke();
ctx.fillStyle='#00e5ff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('вҶҗ BACK',W/2,bby+bbh/2);
}

function drawComplete(){
drawBg();
ctx.textAlign='center';ctx.textBaseline='middle';
const tierIdx=Math.floor((curLevel-1)/6);
ctx.fillStyle='#00e676';ctx.font='bold 36px sans-serif';
ctx.fillText('TIER CLEAR!',W/2,H*.3);
ctx.fillStyle='#ffd700';ctx.font='48px sans-serif';
ctx.fillText('рҹҺү',W/2,H*.42);
ctx.fillStyle='#e0e0ff';ctx.font='16px sans-serif';
ctx.fillText(TIERS[tierIdx].name+' Complete',W/2,H*.5);
ctx.fillStyle='#888';ctx.font='13px sans-serif';
ctx.fillText(`${totalStars} вҳ… total`,W/2,H*.55);
// continue button
const by=H*.65;
ctx.fillStyle='rgba(0,229,255,.95)';
ctx.beginPath();ctx.roundRect(W/2-100,by-26,200,52,14);ctx.fill();
ctx.fillStyle='#001';ctx.font='bold 18px sans-serif';
ctx.fillText('CONTINUE в–¶',W/2,by);
}

function drawAllDone(){
drawBg();
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillStyle='#ffd700';ctx.font='bold 36px sans-serif';
ctx.fillText('вҳ… ALL CLEAR вҳ…',W/2,H*.25);
ctx.font='60px sans-serif';ctx.fillText('рҹҸҶ',W/2,H*.38);
ctx.fillStyle='#e0e0ff';ctx.font='16px sans-serif';
ctx.fillText('You found every odd one!',W/2,H*.48);
ctx.fillStyle='#888';ctx.font='14px sans-serif';
ctx.fillText(`${totalStars} вҳ… В· Best streak: ${bestStreak}`,W/2,H*.53);
const by=H*.6;
ctx.fillStyle='rgba(0,229,255,.95)';
ctx.beginPath();ctx.roundRect(W/2-100,by-26,200,52,14);ctx.fill();
ctx.fillStyle='#001';ctx.font='bold 18px sans-serif';
ctx.fillText('PLAY AGAIN вҶ»',W/2,by);
}

// в”Җв”Җ Game loop в”Җв”Җ
let lastTime=performance.now();
function loop(now){
const dt=Math.min(50,now-lastTime)/1000;
lastTime=now;

ctx.save();
// shake
if(shakeAmt>0){
ctx.translate((Math.random()-.5)*shakeAmt,(Math.random()-.5)*shakeAmt);
shakeAmt*=.85;if(shakeAmt<.5)shakeAmt=0;
}

if(state==='title'){drawTitle();}
else if(state==='levels'){drawLevels();}
else if(state==='playing'){
timer+=dt;
if(timeLeft>0){timeLeft-=dt;if(timeLeft<=0){timeLeft=0;streak=0;curLevel=Math.max(0,curLevel);state='levels';sndWrong();}}
drawBg();drawGrid();drawHUD();
// particles
for(let i=particles.length-1;i>=0;i--){
const p=particles[i];
p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--;
if(p.life<=0){particles.splice(i,1);continue;}
ctx.globalAlpha=p.life/40;
ctx.fillStyle=p.color;
ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
}
ctx.globalAlpha=1;
// hint timer
if(hintTimer>0){hintTimer--;if(hintTimer<=0)hintGlow=-1;}
if(comboTimer>0)comboTimer--;
}
else if(state==='complete'){drawBg();drawComplete();}
else if(state==='allDone'){drawBg();drawAllDone();}

ctx.restore();

// flash overlay
if(flashAlpha>0){
ctx.fillStyle=flashColor+flashAlpha+')';ctx.fillRect(0,0,W,H);
flashAlpha-=.02;
}

requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// polyfill roundRect
if(!CanvasRenderingContext2D.prototype.roundRect){
CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
if(typeof r==='number')r=[r,r,r,r];
this.moveTo(x+r[0],y);
this.lineTo(x+w-r[1],y);this.arcTo(x+w,y,x+w,y+r[1],r[1]);
this.lineTo(x+w,y+h-r[2]);this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
this.lineTo(x+r[3],y+h);this.arcTo(x,y+h,x,y+h-r[3],r[3]);
this.lineTo(x,y+r[0]);this.arcTo(x,y,x+r[0],y,r[0]);
return this;
};
}

})();
</script>
