function computeSolutionBorders(){
/* Pre-compute which cell edges should be borders (where adjacent cells belong to different blocks) */
const g=currentLevel.grid,R=currentLevel.rows,C=currentLevel.cols;
for(let r=0;r<R;r++){for(let c=0;c<C;c++){
/* Right edge */
if(c<C-1&&g[r][c]!==g[r][c+1]){prefilledBorders.add(r+','+c+',r');}
/* Bottom edge */
if(r<R-1&&g[r][c]!==g[r+1][c]){prefilledBorders.add(r+','+c+',b');}
}}
/* Mark solution borders for validation */
}

function resizeCanvas(){
const maxW=Math.min(window.innerWidth-20,520);
const maxH=Math.min(window.innerHeight-250,520);
cellSize=Math.floor(Math.min(maxW/currentLevel.cols,maxH/currentLevel.rows));

canvas.width=cellSize*currentLevel.cols+4;
canvas.height=cellSize*currentLevel.rows+4;
gridOffsetX=2;gridOffsetY=2;}

function renderGrid(){
const R=currentLevel.rows,C=currentLevel.cols,g=currentLevel.grid,col=currentLevel.color,clues=currentLevel.clues;

/* Draw cells */
for(let r=0;r<R;r++){for(let c=0;c<C;c++){

ctx.fillRect(x,y,cellSize,cellSize);}}

ctx.fillStyle=col[r][c]===1?'#f5f0e8':'#333';
ctx.fillText(clues[key],x,y);}

ctx.strokeStyle='#888';ctx.lineWidth=1;
for(let r=0;r<=R;r++){ctx.beginPath();ctx.moveTo(gridOffsetX,gridOffsetY+r*cellSize);ctx.lineTo(gridOffsetX+C*cellSize,gridOffsetY+r*cellSize);ctx.stroke();}
for(let c=0;c<=C;c++){ctx.beginPath();ctx.moveTo(gridOffsetX+c*cellSize,gridOffsetY);ctx.lineTo(gridOffsetX+c*cellSize,gridOffsetY+R*cellSize);ctx.stroke();}
/* Draw user borders (thick colored lines) */
for(const border of userBorders){
const parts=border.split(',');const r=parseInt(parts[0]),c=parseInt(parts[1]),dir=parts[2];
const isCorrect=prefilledBorders.has(border);
ctx.strokeStyle=isCorrect?'#22c55e':'#ef4444';ctx.lineWidth=4;ctx.lineCap='round';
if(dir==='r'){ctx.beginPath();ctx.moveTo(gridOffsetX+(c+1)*cellSize,gridOffsetY+r*cellSize);ctx.lineTo(gridOffsetX+(c+1)*cellSize,gridOffsetY+(r+1)*cellSize);ctx.stroke();}
else if(dir==='b'){ctx.beginPath();ctx.moveTo(gridOffsetX+c*cellSize,gridOffsetY+(r+1)*cellSize);ctx.lineTo(gridOffsetX+(c+1)*cellSize,gridOffsetY+(r+1)*cellSize);ctx.stroke();}}
/* Draw pre-filled solution borders that aren't user borders yet (faint) - for hints */
/* Don't show solution borders unless hinted */
/* Highlight hovered edge */
if(hoverEdge){const parts=hoverEdge.split(',');const r=parseInt(parts[0]),c=parseInt(parts[1]),dir=parts[2];
ctx.strokeStyle='rgba(99,102,241,0.5)';ctx.lineWidth=3;
if(dir==='r'){ctx.beginPath();ctx.moveTo(gridOffsetX+(c+1)*cellSize,gridOffsetY+r*cellSize);ctx.lineTo(gridOffsetX+(c+1)*cellSize,gridOffsetY+(r+1)*cellSize);ctx.stroke();}
else if(dir==='b'){ctx.beginPath();ctx.moveTo(gridOffsetX+c*cellSize,gridOffsetY+(r+1)*cellSize);ctx.lineTo(gridOffsetX+(c+1)*cellSize,gridOffsetY+(r+1)*cellSize);ctx.stroke();}}}

let hoverEdge=null;
function getEdgeAt(mx,my){
const R=currentLevel.rows,C=currentLevel.cols;

/* Check bottom edges */
for(let r=0;r<R-1;r++){for(let c=0;c<C;c++){
const ey=gridOffsetY+(r+1)*cellSize;

function checkSolution(){
/* Solution = all correct borders drawn AND no incorrect borders */
let allCorrect=true;let extra=false;

/* Check no extra borders */
for(const b of userBorders){if(!prefilledBorders.has(b)){extra=true;break;}}
if(allCorrect&&!extra){
onWin();return true;}
if(extra){showToast('Some borders are wrong (red)');playSFX('error');}
else{showToast('Keep going — some borders are missing');playSFX('error');}
return false;}

el.style.left=Math.random()*window.innerWidth+'px';el.style.top='-10px';
el.style.background=['#f093fb','#f5576c','#4facfe','#43e97b','#fbbf24'][i%5];
el.style.transform='rotate('+Math.random()*360+'deg)';
document.body.appendChild(el);
const dur=2000+Math.random()*1000;
el.animate([{transform:'translateY(0) rotate(0)',opacity:1},{transform:'translateY('+window.innerHeight+'px) rotate(720deg)',opacity:0}],{duration:dur,easing:'cubic-bezier(0.25,0.46,0.45,0.94)'}).onfinish=()=>el.remove();}}

/* Hint */
function useHint(){
if(hintsLeft<=0){showToast('No hints left');return;}
/* Find a correct border not yet drawn by user */
const remaining=[...prefilledBorders].filter(b=>!userBorders.has(b));
if(remaining.length===0){showToast('All correct borders drawn! Remove wrong ones.');return;}
const pick=remaining[Math.floor(Math.random()*remaining.length)];
userBorders.add(pick);hintsLeft--;
document.getElementById('hint-count').textContent='('+hintsLeft+')';
playSFX('hint');renderGrid();showToast('Hint revealed!');
if(autoCheck)checkSolution();}

/* Timer */
function startTimer(){startTime=Date.now();timerInterval=setInterval(()=>{const t=Math.floor((Date.now()-startTime)/1000);document.getElementById('stat-time').textContent=Math.floor(t/60)+':'+String(t%60).padStart(2,'0');},1000);}
function stopTimer(){clearInterval(timerInterval);}

/* Web Audio */
function initAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();bgmGain=audioCtx.createGain();bgmGain.gain.value=0.08;bgmGain.connect(audioCtx.destination);}catch(e){}}}
function playSFX(type){
if(!sfxOn)return;initAudio();if(!audioCtx)return;
const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
osc.connect(gain);gain.connect(audioCtx.destination);
const now=audioCtx.currentTime;
if(type==='on'){osc.frequency.value=600;gain.gain.setValueAtTime(0.15,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.1);}
else if(type==='off'){osc.frequency.value=400;gain.gain.setValueAtTime(0.1,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.08);}
else if(type==='hint'){osc.frequency.value=800;osc.frequency.linearRampToValueAtTime(1200,now+0.15);gain.gain.setValueAtTime(0.12,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.2);}
else if(type==='win'){[523,659,784,1047].forEach((f,i)=>{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;g.gain.setValueAtTime(0.15,now+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,now+i*0.1+0.3);o.start(now+i*0.1);o.stop(now+i*0.1+0.3);});return;}
else if(type==='error'){osc.frequency.value=200;osc.type='square';gain.gain.setValueAtTime(0.1,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);}
osc.start(now);osc.stop(now+0.3);}

const CHORDS=[[261.63,329.63,392],[349.23,440,523.23],[392,493.88,587.33],[220,277.18,329.63]];let chordIdx=0;
function startBGM(){initAudio();if(!audioCtx)return;
stopBGM();
const playChord=()=>{if(!musicOn||!isPlaying)return;
const freqs=CHORDS[chordIdx%CHORDS.length];chordIdx++;
freqs.forEach(f=>{const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
osc.connect(gain);gain.connect(bgmGain);osc.frequency.value=f;osc.type='sine';
const now=audioCtx.currentTime;
gain.gain.setValueAtTime(0,now);gain.gain.linearRampToValueAtTime(0.4,now+1);gain.gain.linearRampToValueAtTime(0,now+3);
osc.start(now);osc.stop(now+3);});};
playChord();bgmInterval=setInterval(playChord,3000);}
function stopBGM(){clearInterval(bgmInterval);bgmInterval=null;}

/* UI handlers */
document.getElementById('btn-hint').onclick=useHint;
document.getElementById('btn-check').onclick=checkSolution;
document.getElementById('btn-clear').onclick=()=>{userBorders.clear();renderGrid();showToast('Cleared');playSFX('off');};
document.getElementById('btn-restart').onclick=()=>{userBorders.clear();hintsLeft=3;document.getElementById('hint-count').textContent='('+hintsLeft+')';renderGrid();showToast('Restarted');};
document.getElementById('btn-settings').onclick=()=>document.getElementById('settings-panel').classList.toggle('show');
document.getElementById('btn-next').onclick=()=>{
document.getElementById('win-overlay').classList.remove('show');
if(currentLevelIdx<29)startLevel(currentLevelIdx+1);else{backToMenu();}};
document.getElementById('btn-menu').onclick=()=>{document.getElementById('win-overlay').classList.remove('show');backToMenu();};
document.getElementById('back-btn').onclick=backToMenu;

function backToMenu(){isPlaying=false;stopTimer();stopBGM();
document.getElementById('menu').style.display='flex';
document.getElementById('game-view').style.display='none';
document.getElementById('back-btn').style.display='none';
document.getElementById('settings-panel').classList.remove('show');
renderMenu();}

/* Settings toggles */
document.getElementById('toggle-music').onclick=function(){musicOn=!musicOn;this.classList.toggle('on',musicOn);saveSettings();if(musicOn&&isPlaying)startBGM();else stopBGM();};
document.getElementById('toggle-sfx').onclick=function(){sfxOn=!sfxOn;this.classList.toggle('on',sfxOn);saveSettings();};
document.getElementById('toggle-autocheck').onclick=function(){autoCheck=!autoCheck;this.classList.toggle('on',autoCheck);saveSettings();};

/* Keyboard */
document.addEventListener('keydown',e=>{
if(!isPlaying)return;
const k=e.key.toLowerCase();
if(k==='h')useHint();
else if(k==='c')checkSolution();
else if(k==='r'){userBorders.clear();hintsLeft=3;document.getElementById('hint-count').textContent='('+hintsLeft+')';renderGrid();}
else if(k==='escape')backToMenu();});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

window.addEventListener('resize',()=>{if(isPlaying){resizeCanvas();renderGrid();}});
document.addEventListener('visibilitychange',()=>{if(document.hidden)stopBGM();else if(isPlaying&&musicOn)startBGM();});
window.addEventListener('beforeunload',()=>{stopBGM();if(audioCtx)audioCtx.close();});

init();
</script>
