        var progress = {

            musicEnabled: true

        // Audio
        var audioCtx = null;
        var bgmGain = null;
        var sfxGain = null;
        var bgmOscillators = [];

        // ============================================
        // AUDIO SYSTEM
        // ============================================
        function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                bgmGain = audioCtx.createGain();
                bgmGain.gain.value = 0.15;
                bgmGain.connect(audioCtx.destination);

                sfxGain = audioCtx.createGain();
                sfxGain.gain.value = 0.4;
                sfxGain.connect(audioCtx.destination);
            } catch (e) {
                audioCtx = null;
            }
        }

        function resumeAudio() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, duration, type, gainNode) {
            if (!audioCtx || !progress.soundEnabled) return;
            try {
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                osc.type = type || 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(gainNode || sfxGain);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        function playPop() {
            playTone(600 + Math.random() * 200, 0.15, 'sine');
        }

        function playCombo(length) {
            var baseFreq = 400 + length * 50;
            playTone(baseFreq, 0.2, 'sine');
            setTimeout(function() { playTone(baseFreq * 1.25, 0.15, 'sine'); }, 50);
        }

        function playWin() {
            var notes = [523, 659, 784, 1047];
            notes.forEach(function(n, i) {
                setTimeout(function() { playTone(n, 0.3, 'sine'); }, i * 100);
            });
        }

        function playLose() {
            var notes = [400, 350, 300, 250];
            notes.forEach(function(n, i) {
                setTimeout(function() { playTone(n, 0.3, 'triangle'); }, i * 150);
            });
        }

        function startBGM() {
            if (!audioCtx || !progress.musicEnabled) return;
            stopBGM();
            try {
                var chords = [
                    [130.81, 164.81, 196.00],
                    [146.83, 174.61, 220.00],
                    [164.81, 196.00, 246.94],
                    [130.81, 164.81, 196.00]
                ];
                var chordIndex = 0;
                function playChord() {
                    if (!progress.musicEnabled) return;
                    chords[chordIndex].forEach(function(freq) {
                        var osc = audioCtx.createOscillator();
                        var gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
                        osc.connect(gain);
                        gain.connect(bgmGain);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 3);
                    });
                    chordIndex = (chordIndex + 1) % chords.length;
                    setTimeout(playChord, 3000);
                }
                playChord();
            } catch (e) {}
        }

        function stopBGM() {
            bgmOscillators.forEach(function(o) {
                try { o.stop(); } catch (e) {}
            });
            bgmOscillators = [];
        }

        // ============================================
        // STORAGE
        // ============================================
        function loadProgress() {
            try {
                var saved = localStorage.getItem('twodots_progress');
                if (saved) {
                    var data = JSON.parse(saved);
                    progress.unlockedLevel = data.unlockedLevel || 0;
                    progress.stars = data.stars || {};
                    progress.soundEnabled = data.soundEnabled !== false;
                    progress.musicEnabled = data.musicEnabled !== false;
                }
            } catch (e) {}
        }

        function saveProgress() {
            try {
                localStorage.setItem('twodots_progress', JSON.stringify({
                    unlockedLevel: progress.unlockedLevel,
                    stars: progress.stars,
                    soundEnabled: progress.soundEnabled,
                    musicEnabled: progress.musicEnabled
                }));
            } catch (e) {}
        }

        function resetProgress() {
            progress.unlockedLevel = 0;
            progress.stars = {};
            saveProgress();
            renderLevelSelect();
        }

        // ============================================
        // CANVAS & RENDERING
        // ============================================
        function setupCanvas() {
            var container = document.getElementById('app');
            var width = Math.min(window.innerWidth, 480);
            var height = window.innerHeight;

            canvas = document.createElement('canvas');
            canvas.className = 'game__canvas';
            canvas.width = width;
            canvas.height = height;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';

            container.innerHTML = '';
            container.appendChild(canvas);
            ctx = canvas.getContext('2d');

            canvas.addEventListener('pointerdown', onPointerDown);
            canvas.addEventListener('pointermove', onPointerMove);
            canvas.addEventListener('pointerup', onPointerUp);
            canvas.addEventListener('pointercancel', onPointerUp);
            canvas.addEventListener('pointerleave', onPointerUp);
        }

        function getScale() {
            var level = LEVELS[currentLevel] || LEVELS[0];
            gridSize = level.grid;
            var availableWidth = canvas.width - 40;
            var availableHeight = canvas.height - 280;
            var cellFromWidth = availableWidth / gridSize;
            var cellFromHeight = availableHeight / gridSize;
            cellSize = Math.min(cellFromWidth, cellFromHeight, 55);
            var gridWidth = cellSize * gridSize;
            var gridHeight = cellSize * gridSize;
            gridOffsetX = (canvas.width - gridWidth) / 2;
            gridOffsetY = 180;
        }

        function getGridPos(x, y) {
            var col = Math.floor((x - gridOffsetX) / cellSize);
            var row = Math.floor((y - gridOffsetY) / cellSize);
            if (col >= 0 && col < gridSize && row >= 0 && row < gridSize) {
                var cellX = gridOffsetX + col * cellSize + cellSize / 2;
                var cellY = gridOffsetY + row * cellSize + cellSize / 2;
                var dist = Math.sqrt((x - cellX) * (x - cellX) + (y - cellY) * (y - cellY));
                if (dist < cellSize * 0.4) {
                    return { col: col, row: row };
                }
            }
            return null;
        }

        // ============================================
        // GAME LOGIC
        // ============================================
        function initLevel(levelIndex) {
            currentLevel = levelIndex;
            var level = LEVELS[levelIndex];
            gridSize = level.grid;

            getScale();

            grid = [];
            collected = {};
            iceBlocks = {};
            anchorDots = {};
            boxes = {};
            selectedDots = [];
            score = 0;
            movesLeft = level.moves;
            particles = [];
            comboMultiplier = 1;
            tutorialStep = levelIndex < 2 ? 0 : -1;

            level.colors.forEach(function(c) {
                collected[c] = 0;
            });

            // Initialize grid with random colors
            for (var row = 0; row < gridSize; row++) {
                grid[row] = [];
                for (var col = 0; col < gridSize; col++) {
                    var colorIndex = Math.floor(Math.random() * level.colors.length);
                    grid[row][col] = level.colors[colorIndex];
                }
            }

            // Place obstacles
            level.obstacles.ice.forEach(function(pos) {
                iceBlocks[pos[1] + '_' + pos[0]] = 2;
            });

            level.obstacles.anchors.forEach(function(pos) {
                anchorDots[pos[1] + '_' + pos[0]] = true;
            });

            level.obstacles.boxes.forEach(function(pos) {
                boxes[pos[1] + '_' + pos[0]] = true;
            });

            // Ensure targets can be met (at least some of each color)
            ensureValidGrid();
        }

        function ensureValidGrid() {
            var level = LEVELS[currentLevel];
            var colorCounts = {};
            level.colors.forEach(function(c) {
                colorCounts[c] = 0;
            });

            for (var row = 0; row < gridSize; row++) {
                for (var col = 0; col < gridSize; col++) {
                    if (grid[row][col]) {
                        colorCounts[grid[row][col]]++;
                    }
                }
            }

            var totalTargets = 0;
            Object.keys(level.targets).forEach(function(colorName) {
                totalTargets += level.targets[colorName];
            });

            var totalCells = gridSize * gridSize;
            if (totalTargets > totalCells * 0.8) {
                var needed = Math.ceil((totalTargets - totalCells) / 2);
                for (var i = 0; i < needed; i++) {
                    var row = Math.floor(Math.random() * gridSize);
                    var col = Math.floor(Math.random() * gridSize);
                    var colorIndex = Math.floor(Math.random() * level.colors.length);
                    grid[row][col] = level.colors[colorIndex];
                }
            }
        }

        function isAdjacent(pos1, pos2) {
            var dr = Math.abs(pos1.row - pos2.row);
            var dc = Math.abs(pos1.col - pos2.col);
            return (dr === 1 && dc === 0) || (dr === 0 && dc === 1);
        }

        function onPointerDown(e) {
            if (animating || gameState !== GameState.PLAYING) return;
            resumeAudio();
            e.preventDefault();
            isPointerDown = true;
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            var pos = getGridPos(x, y);
            if (pos && grid[pos.row] && grid[pos.row][pos.col]) {
                selectedDots = [pos];
            }
        }

        function onPointerMove(e) {
            if (!isPointerDown || animating || gameState !== GameState.PLAYING) return;
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            var pos = getGridPos(x, y);
            if (pos && selectedDots.length > 0) {
                var last = selectedDots[selectedDots.length - 1];
                if (pos.row === last.row && pos.col === last.col) return;

                if (!grid[pos.row] || !grid[pos.row][pos.col]) return;

                var existingIndex = -1;
                for (var i = 0; i < selectedDots.length; i++) {
                    if (selectedDots[i].row === pos.row && selectedDots[i].col === pos.col) {
                        existingIndex = i;
                        break;
                    }
                }

                if (existingIndex >= 0) {
                    if (existingIndex === selectedDots.length - 2) {
                        selectedDots.pop();
                    }
                } else if (isAdjacent(last, pos)) {
                    if (grid[last.row][last.col] === grid[pos.row][pos.col]) {
                        selectedDots.push(pos);
                    }
                }
            }
        }

        function onPointerUp(e) {
            if (!isPointerDown) return;
            isPointerDown = false;
            if (animating || gameState !== GameState.PLAYING) return;

            if (selectedDots.length >= 2) {
                processConnection();
            }
            selectedDots = [];
        }

        function processConnection() {
            var color = grid[selectedDots[0].row][selectedDots[0].col];
            var now = Date.now();

            if (now - lastConnectionTime < 500) {
                comboMultiplier = Math.min(comboMultiplier + 0.5, 4);
            } else {
                comboMultiplier = 1;
            }
            lastConnectionTime = now;

            movesLeft--;

            var points = selectedDots.length * selectedDots.length * 10 * comboMultiplier;
            score += Math.floor(points);

            // Collect dots
            selectedDots.forEach(function(pos) {
                if (!anchorDots[pos.row + '_' + pos.col]) {
                    collected[color]++;
                    createPopEffect(pos.col, pos.row, color);

                    // Handle ice
                    var iceKey = pos.row + '_' + pos.col;
                    if (iceBlocks[iceKey]) {
                        iceBlocks[iceKey]--;
                        if (iceBlocks[iceKey] <= 0) {
                            delete iceBlocks[iceKey];
                        }
                    }
                } else {
                    delete anchorDots[pos.row + '_' + pos.col];
                    collected[color]++;
                    createPopEffect(pos.col, pos.row, color);
                }
            });

            // Break adjacent boxes
            var boxesToBreak = [];
            selectedDots.forEach(function(pos) {
                var adjacent = [
                    {row: pos.row - 1, col: pos.col},
                    {row: pos.row + 1, col: pos.col},
                    {row: pos.row, col: pos.col - 1},
                    {row: pos.row, col: pos.col + 1}
                ];
                adjacent.forEach(function(adj) {
                    var key = adj.row + '_' + adj.col;
                    if (boxes[key]) {
                        var idx = boxesToBreak.indexOf(key);
                        if (idx === -1) boxesToBreak.push(key);
                    }
                });
            });
            boxesToBreak.forEach(function(key) {
                delete boxes[key];
            });

            playCombo(selectedDots.length);

            animating = true;
            setTimeout(function() {
                removeDots();
                applyGravity();
                animating = false;
                checkWinLose();
            }, 200);
        }

        function removeDots() {
            selectedDots.forEach(function(pos) {
                if (grid[pos.row] && grid[pos.row][pos.col] !== null) {
                    grid[pos.row][pos.col] = null;
                }
            });
        }

        function applyGravity() {
            for (var col = 0; col < gridSize; col++) {
                var writeRow = gridSize - 1;
                for (var row = gridSize - 1; row >= 0; row--) {
                    if (grid[row][col] !== null) {
                        if (row !== writeRow) {
                            // Don't move anchor dots
                            if (!anchorDots[writeRow + '_' + col]) {
                                grid[writeRow][col] = grid[row][col];
                                grid[row][col] = null;

                                // Move ice with dot if dot moved
                                var iceKey = row + '_' + col;
                                if (iceBlocks[iceKey]) {
                                    var iceCount = iceBlocks[iceKey];
                                    delete iceBlocks[iceKey];
                                    iceBlocks[writeRow + '_' + col] = iceCount;
                                }
                            } else {
                                // Anchor stays, find next available
                                grid[writeRow - 1][col] = grid[row][col];
                                grid[row][col] = null;
                                writeRow--;
                            }
                        } else {
                            writeRow--;
                        }
                    }
                }

                // Fill empty spaces at top
                for (var row = 0; row < gridSize; row++) {
                    if (grid[row][col] === null && !anchorDots[row + '_' + col]) {
                        var level = LEVELS[currentLevel];
                        var colorIndex = Math.floor(Math.random() * level.colors.length);
                        grid[row][col] = level.colors[colorIndex];
                    }
                }
            }
        }

        function checkWinLose() {
            var level = LEVELS[currentLevel];
            var allComplete = true;
            Object.keys(level.targets).forEach(function(colorName) {
                var color = getColorByName(colorName);
                if (collected[color] < level.targets[colorName]) {
                    allComplete = false;
                }
            });

            if (allComplete) {
                gameState = GameState.WIN;
                interstitialCounter++;
                var stars = calculateStars();
                if (!progress.stars[currentLevel] || progress.stars[currentLevel] < stars) {
                    progress.stars[currentLevel] = stars;
                }
                if (currentLevel + 1 > progress.unlockedLevel) {
                    progress.unlockedLevel = currentLevel + 1;
                }
                saveProgress();
                playWin();
                renderWinScreen();

                if (interstitialCounter % 5 === 0 && typeof MagnerAds !== 'undefined') {
                    MagnerAds.push({zone: 110122});
                }
            } else if (movesLeft <= 0) {
                gameState = GameState.LOSE;
                playLose();
                renderLoseScreen();
            }
        }

        function calculateStars() {
            var level = LEVELS[currentLevel];
            var totalTargets = 0;
            Object.keys(level.targets).forEach(function(k) { totalTargets += level.targets[k]; });
            var maxScore = totalTargets * 20;
            var percentage = score / maxScore;
            if (percentage >= 1.5) return 3;
            if (percentage >= 1.0) return 2;
            return 1;
        }

        function getColorByName(name) {
            var colorMap = {
                'red': '#e74c3c',
                'green': '#2ecc71',
                'blue': '#3498db',
                'yellow': '#f1c40f',
                'purple': '#9b59b6',
                'orange': '#e67e22'
            };
            return colorMap[name] || name;
        }

        // ============================================
        // PARTICLES
        // ============================================
        function createPopEffect(col, row, color) {
            var cx = gridOffsetX + col * cellSize + cellSize / 2;
            var cy = gridOffsetY + row * cellSize + cellSize / 2;
            for (var i = 0; i < 8; i++) {
                var angle = (Math.PI * 2 / 8) * i;
                var speed = 2 + Math.random() * 3;
                particles.push({
                    x: cx,
                    y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    color: color,
                    size: 4 + Math.random() * 4
                });
            }
        }

        function updateParticles() {
            particles = particles.filter(function(p) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= 0.03;
                return p.life > 0;
            });
        }

        // ============================================
        // POWER-UPS
        // ============================================
        function useHint() {
            if (powerups.hint <= 0 || animating) return;
            powerups.hint--;
            playPop();
            findValidChain();
            renderHUD();
        }

        function findValidChain() {
            var found = null;
            outer:
            for (var row = 0; row < gridSize; row++) {
                for (var col = 0; col < gridSize; col++) {
                    if (!grid[row] || !grid[row][col]) continue;
                    var color = grid[row][col];
                    for (var dr = -1; dr <= 1; dr++) {
                        for (var dc = -1; dc <= 1; dc++) {
                            if (Math.abs(dr) + Math.abs(dc) !== 1) continue;
                            var r2 = row + dr;
                            var c2 = col + dc;
                            if (r2 >= 0 && r2 < gridSize && c2 >= 0 && c2 < gridSize) {
                                if (grid[r2] && grid[r2][c2] === color) {
                                    found = [{row: row, col: col}, {row: r2, col: c2}];
                                    break outer;
                                }
                            }
                        }
                    }
                }
            }
            if (found) {
                selectedDots = found;
                animating = true;
                setTimeout(function() {
                    selectedDots = [];
                    animating = false;
                }, 1000);
            }
        }

        function useShuffle() {
            if (powerups.shuffle <= 0 || animating) return;
            powerups.shuffle--;
            playPop();
            var level = LEVELS[currentLevel];
            var dots = [];
            for (var row = 0; row < gridSize; row++) {
                for (var col = 0; col < gridSize; col++) {
                    if (grid[row] && grid[row][col] && !anchorDots[row + '_' + col]) {
                        dots.push({row: row, col: col, color: grid[row][col]});
                    }
                }
            }
            dots.forEach(function(d) {
                var idx = Math.floor(Math.random() * dots.length);
                var temp = dots[idx].color;
                dots[idx].color = d.color;
                d.color = temp;
            });
            dots.forEach(function(d) {
                grid[d.row][d.col] = d.color;
            });
            renderHUD();
        }

        function useExtraMoves() {
            if (powerups.extraMoves <= 0 || animating) return;
            powerups.extraMoves--;
            movesLeft += 5;
            playPop();
            renderHUD();
        }

        // ============================================
        // RENDERING
        // ============================================
        function render() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            switch (gameState) {
                case GameState.TITLE:
                    renderTitleScreen();
                    break;
                case GameState.LEVEL_SELECT:
                    renderLevelSelect();
                    break;
                case GameState.PLAYING:
                case GameState.PAUSED:
                    renderGame();
                    break;
                case GameState.WIN:
                    renderGame();
                    renderOverlay();
                    break;
                case GameState.LOSE:
                    renderGame();
                    renderOverlay();
                    break;
            }

            updateParticles();
            requestAnimationFrame(render);
        }

        function renderTitleScreen() {
            var centerX = canvas.width / 2;
            var centerY = canvas.height / 2 - 50;

            // Draw logo
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 48px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Glow effect
            ctx.shadowColor = '#3498db';
            ctx.shadowBlur = 30;
            ctx.fillText('TWO', centerX, centerY - 30);
            ctx.fillStyle = '#3498db';
            ctx.shadowColor = '#9b59b6';
            ctx.fillText('DOTS', centerX, centerY + 30);
            ctx.shadowBlur = 0;

            // Subtitle
            ctx.fillStyle = '#a0a0c0';
            ctx.font = '14px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillText('CONNECT • COLLECT • CONQUER', centerX, centerY + 80);

            // Play button
            drawButton(centerX - 80, centerY + 140, 160, 50, '#3498db', 'PLAY');

            // Settings button
            drawSettingsButton(canvas.width - 44, 20);
        }

        function renderLevelSelect() {
            var chapter = CHAPTERS[selectedChapter];
            var container = document.getElementById('app');

            var html = '<div class="level-select">';
            html += '<div class="level-select__header">';
            html += '<button class="level-select__back" onclick="showTitleScreen()">';
            html += '<svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>';
            html += '</button>';
            html += '<div class="level-select__title">' + chapter.name + '</div>';
            html += '<div style="width:40px;"></div>';
            html += '</div>';

            html += '<div class="chapter-nav">';
            CHAPTERS.forEach(function(ch, i) {
                html += '<button class="chapter-nav__btn' + (i === selectedChapter ? ' chapter-nav__btn--active' : '') + '" onclick="selectChapter(' + i + ')">' + (i + 1) + '</button>';
            });
            html += '</div>';

            html += '<div class="levels-grid">';
            for (var i = 0; i < 10; i++) {
                var levelIndex = selectedChapter * 10 + i;
                var isUnlocked = levelIndex <= progress.unlockedLevel;
                var stars = progress.stars[levelIndex] || 0;

                html += '<button class="level-btn' + (isUnlocked ? ' level-btn--unlocked' : ' level-btn--locked') + '"';
                if (isUnlocked) {
                    html += ' onclick="startLevel(' + levelIndex + ')"';
                }
                html += '>';
                if (isUnlocked) {
                    html += '<div class="level-btn__number">' + (i + 1) + '</div>';
                    html += '<div class="level-btn__stars">';
                    for (var s = 0; s < 3; s++) {
                        html += '<svg class="level-btn__star' + (s < stars ? ' level-btn__star--filled' : ' level-btn__star--empty') + '" viewBox="0 0 24 24">';
                        html += '<path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>';
                        html += '</svg>';
                    }
                    html += '</div>';
                } else {
                    html += '<svg class="level-btn__lock" viewBox="0 0 24 24">';
                    html += '<path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>';
                    html += '</svg>';
                }
                html += '</button>';
            }
            html += '</div></div>';

            container.innerHTML = html;
        }

        function renderGame() {
            var level = LEVELS[currentLevel];

            // Draw grid background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            var gridWidth = cellSize * gridSize;
            var gridHeight = cellSize * gridSize;
            roundRect(ctx, gridOffsetX - 10, gridOffsetY - 10, gridWidth + 20, gridHeight + 20, 15);
            ctx.fill();

            // Draw boxes
            for (var key in boxes) {
                var parts = key.split('_');
                var row = parseInt(parts[0]);
                var col = parseInt(parts[1]);
                var x = gridOffsetX + col * cellSize;
                var y = gridOffsetY + row * cellSize;
                ctx.fillStyle = '#555';
                ctx.fillRect(x + 4, y + 4, cellSize - 8, cellSize - 8);
            }

            // Draw grid dots
            for (var row = 0; row < gridSize; row++) {
                for (var col = 0; col < gridSize; col++) {
                    if (!grid[row] || !grid[row][col]) continue;
                    var x = gridOffsetX + col * cellSize + cellSize / 2;
                    var y = gridOffsetY + row * cellSize + cellSize / 2;
                    var color = grid[row][col];

                    // Draw ice
                    var iceKey = row + '_' + col;
                    if (iceBlocks[iceKey]) {
                        ctx.fillStyle = 'rgba(150, 220, 255, 0.5)';
                        ctx.beginPath();
                        ctx.arc(x, y, cellSize * 0.45, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(200, 240, 255, 0.8)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }

                    // Draw dot
                    drawDot(x, y, color, cellSize * 0.35);

                    // Draw anchor indicator
                    if (anchorDots[row + '_' + col]) {
                        ctx.strokeStyle = '#f1c40f';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(x, y, cellSize * 0.38, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            }

            // Draw connection line
            if (selectedDots.length > 0) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                var first = selectedDots[0];
                var startX = gridOffsetX + first.col * cellSize + cellSize / 2;
                var startY = gridOffsetY + first.row * cellSize + cellSize / 2;
                ctx.moveTo(startX, startY);
                for (var i = 1; i < selectedDots.length; i++) {
                    var p = selectedDots[i];
                    var px = gridOffsetX + p.col * cellSize + cellSize / 2;
                    var py = gridOffsetY + p.row * cellSize + cellSize / 2;
                    ctx.lineTo(px, py);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Draw particles
            particles.forEach(function(p) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Draw HUD
            renderHUD();
        }

        function drawDot(x, y, color, radius) {
            // Glow
            ctx.shadowColor = color;
            ctx.shadowBlur = 15;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Highlight
            var gradient = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, 0, x, y, radius);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawButton(x, y, w, h, color, text) {
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 15;
            roundRect(ctx, x, y, w, h, h / 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x + w / 2, y + h / 2);
        }

        function drawSettingsButton(x, y) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(x + 22, y + 22, 22, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#a0a0c0';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + 22, y + 22, 10, 0, Math.PI * 2);
            ctx.stroke();

            for (var i = 0; i < 8; i++) {
                var angle = (Math.PI * 2 / 8) * i;
                ctx.beginPath();
                ctx.moveTo(x + 22 + Math.cos(angle) * 10, y + 22 + Math.sin(angle) * 10);
                ctx.lineTo(x + 22 + Math.cos(angle) * 16, y + 22 + Math.sin(angle) * 16);
                ctx.stroke();
            }
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function renderHUD() {
            var container = document.getElementById('app');
            var level = LEVELS[currentLevel];

            // Update chapter class
            var chapterNum = Math.floor(currentLevel / 10) + 1;
            container.className = 'game game--chapter-' + chapterNum;

            var colorTargets = Object.keys(level.targets);

            var html = '<div class="hud">';
            html += '<div class="hud__left">';
            html += '<button class="hud__back" onclick="showLevelSelect()">';
            html += '<svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>';
            html += '</button>';
            html += '<div class="hud__moves">';
            html += '<div class="hud__moves-label">MOVES</div>';
            html += '<div class="hud__moves-value">' + movesLeft + '</div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="hud__score">';
            html += '<div class="hud__score-label">SCORE</div>';
            html += '<div class="hud__score-value">' + score + '</div>';
            html += '</div>';
            html += '<div class="hud__right">';
            html += '<button class="hud__pause" onclick="togglePause()">';
            html += '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
            html += '</button>';
            html += '</div>';
            html += '</div>';

            html += '<div class="targets">';
            colorTargets.forEach(function(name) {
                var color = getColorByName(name);
                var collectedColor = collected[color] || 0;
                var target = level.targets[name];
                var complete = collectedColor >= target;
                html += '<div class="target">';
                html += '<div class="target__dot" style="background:' + color + ';color:' + color + '"></div>';
                html += '<div class="target__count' + (complete ? ' target__count--complete' : '') + '">' + collectedColor + '/' + target + '</div>';
                html += '</div>';
            });
            html += '</div>';

            html += '<div class="powerups">';
            html += '<div class="powerup' + (powerups.hint <= 0 ? ' powerup--disabled' : '') + '" onclick="useHint()">';
            html += '<div class="powerup__icon"><svg viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg></div>';
            html += '<div class="powerup__count">x' + powerups.hint + '</div>';
            html += '</div>';
            html += '<div class="powerup' + (powerups.shuffle <= 0 ? ' powerup--disabled' : '') + '" onclick="useShuffle()">';
            html += '<div class="powerup__icon"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></div>';
            html += '<div class="powerup__count">x' + powerups.shuffle + '</div>';
            html += '</div>';
            html += '<div class="powerup' + (powerups.extraMoves <= 0 ? ' powerup--disabled' : '') + '" onclick="useExtraMoves()">';
            html += '<div class="powerup__icon"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>';
            html += '<div class="powerup__count">x' + powerups.extraMoves + '</div>';
            html += '</div>';
            html += '</div>';

            // Tutorial
            if (tutorialStep >= 0 && currentLevel < 2) {
                var tutorialTexts = [
                    'Connect 2 or more dots of the same color',
                    'Longer chains = more points!',
                    'Collect the target number of each color'
                ];
                html += '<div class="tutorial tutorial--active">';
                html += '<div class="tutorial__text">' + tutorialTexts[tutorialStep] + '</div>';
                html += '<div class="tutorial__dots">';
                tutorialTexts.forEach(function(_, i) {
                    html += '<div class="tutorial__dot' + (i === tutorialStep ? ' tutorial__dot--active' : '') + '"></div>';
                });
                html += '</div>';
                html += '<button class="btn btn--small btn--secondary" onclick="nextTutorial()">OK</button>';
                html += '</div>';
            }

            // Pause overlay
            if (gameState === GameState.PAUSED) {
                html += '<div class="overlay overlay--active pause-screen">';
                html += '<div class="pause-screen__title">PAUSED</div>';
                html += '<div class="pause-screen__buttons">';
                html += '<button class="btn btn--primary" onclick="togglePause()">RESUME</button>';
                html += '<button class="btn btn--secondary" onclick="showLevelSelect()">LEVEL SELECT</button>';
                html += '</div></div>';
            }

            container.innerHTML = html;
        }

        function renderOverlay() {
            var container = document.getElementById('app');
            var level = LEVELS[currentLevel];
            var stars = calculateStars();

            if (gameState === GameState.WIN) {
                var html = '<div class="overlay overlay--active result-screen">';
                html += '<div class="result-screen__title result-screen__title--win">LEVEL COMPLETE!</div>';
                html += '<div class="result-screen__stars">';
                for (var i = 0; i < 3; i++) {
                    html += '<svg class="result-screen__star' + (i < stars ? ' result-screen__star--filled' : '') + '" viewBox="0 0 24 24" style="animation-delay:' + (i * 0.2) + 's">';
                    html += '<path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>';
                    html += '</svg>';
                }
                html += '</div>';
                html += '<div class="result-screen__score">Score: <span>' + score + '</span></div>';
                html += '<div class="result-screen__buttons">';
                html += '<button class="btn btn--primary" onclick="nextLevel()">NEXT LEVEL</button>';
                html += '<button class="btn btn--secondary" onclick="showLevelSelect()">LEVEL SELECT</button>';
                html += '</div></div>';
                container.innerHTML += html;
            } else if (gameState === GameState.LOSE) {
                var html = '<div class="overlay overlay--active result-screen">';
                html += '<div class="result-screen__title result-screen__title--lose">OUT OF MOVES!</div>';
                html += '<div class="result-screen__score">Target reminder:</div>';
                html += '<div class="targets" style="margin-bottom:2rem;">';
                Object.keys(level.targets).forEach(function(name) {
                    var color = getColorByName(name);
                    var collectedColor = collected[color] || 0;
                    var target = level.targets[name];
                    html += '<div class="target">';
                    html += '<div class="target__dot" style="background:' + color + ';color:' + color + '"></div>';
                    html += '<div class="target__count">' + collectedColor + '/' + target + '</div>';
                    html += '</div>';
                });
                html += '</div>';
                html += '<div class="result-screen__buttons">';
                html += '<button class="btn btn--primary" onclick="retryLevel()">RETRY</button>';
                html += '<button class="btn btn--secondary" onclick="showLevelSelect()">LEVEL SELECT</button>';
                html += '</div></div>';
                container.innerHTML += html;
            }
        }

        function renderWinScreen() {
            renderOverlay();
        }

        function renderLoseScreen() {
            renderOverlay();
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function showTitleScreen() {
            gameState = GameState.TITLE;
            var container = document.getElementById('app');
            container.className = 'game game--chapter-1';
            stopBGM();
            setupCanvas();
            renderTitleScreen();
        }

        function showLevelSelect() {
            gameState = GameState.LEVEL_SELECT;
            stopBGM();
            renderLevelSelect();
        }

        function selectChapter(index) {
            selectedChapter = index;
            renderLevelSelect();
        }

        function startLevel(index) {
            currentLevel = index;
            gameState = GameState.PLAYING;
            powerups = { hint: 3, shuffle: 2, extraMoves: 1 };
            initLevel(index);
            setupCanvas();
            startBGM();
        }

        function togglePause() {
            if (gameState === GameState.PLAYING) {
                gameState = GameState.PAUSED;
            } else if (gameState === GameState.PAUSED) {
                gameState = GameState.PLAYING;
            }
            renderHUD();
        }

        function nextLevel() {
            if (currentLevel < LEVELS.length - 1) {
                startLevel(currentLevel + 1);
            } else {
                showLevelSelect();
            }
        }

        function retryLevel() {
            startLevel(currentLevel);
        }

        function nextTutorial() {
            tutorialStep++;
            if (tutorialStep >= 3) {
                tutorialStep = -1;
            }
            renderHUD();
        }

        // ============================================
        // SETTINGS MODAL
        // ============================================
        function showSettings() {
            var container = document.getElementById('app');
            var html = '<div class="modal modal--active" id="settings-modal">';
            html += '<div class="modal__content">';
            html += '<div class="modal__title">SETTINGS</div>';
            html += '<div class="modal__row">';
            html += '<div class="modal__label">Sound Effects</div>';
            html += '<div class="toggle' + (progress.soundEnabled ? ' toggle--active' : '') + '" onclick="toggleSound()">';
            html += '<div class="toggle__knob"></div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="modal__row">';
            html += '<div class="modal__label">Music</div>';
            html += '<div class="toggle' + (progress.musicEnabled ? ' toggle--active' : '') + '" onclick="toggleMusic()">';
            html += '<div class="toggle__knob"></div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="modal__row">';
            html += '<div class="modal__label">Reset Progress</div>';
            html += '<button class="btn btn--small btn--secondary" onclick="confirmReset()">RESET</button>';
            html += '</div>';
            html += '<div style="margin-top:1.5rem;">';
            html += '<button class="btn btn--primary" onclick="closeSettings()">DONE</button>';
            html += '</div>';
            html += '</div></div>';
            container.innerHTML += html;
        }

        function closeSettings() {
            var modal = document.getElementById('settings-modal');
            if (modal) modal.remove();
        }

        function toggleSound() {
            progress.soundEnabled = !progress.soundEnabled;
            saveProgress();
            var toggle = document.querySelector('#settings-modal .toggle');
            if (toggle) toggle.classList.toggle('toggle--active', progress.soundEnabled);
        }

        function toggleMusic() {
            progress.musicEnabled = !progress.musicEnabled;
            saveProgress();
            if (progress.musicEnabled && gameState === GameState.PLAYING) {
                startBGM();
            } else {
                stopBGM();
            }
            var toggle = document.querySelectorAll('#settings-modal .toggle')[1];
            if (toggle) toggle.classList.toggle('toggle--active', progress.musicEnabled);
        }

        function confirmReset() {
            if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
                resetProgress();
                closeSettings();
            }
        }

        // ============================================
        // CANVAS CLICK HANDLERS
        // ============================================
        function handleCanvasClick(e) {
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;

            if (gameState === GameState.TITLE) {
                // Play button area
                var centerX = canvas.width / 2;
                var centerY = canvas.height / 2 - 50;
                if (x >= centerX - 80 && x <= centerX + 80 && y >= centerY + 140 && y <= centerY + 190) {
                    resumeAudio();
                    showLevelSelect();
                    return;
                }
                // Settings
                if (x >= canvas.width - 44 && x <= canvas.width && y >= 20 && y <= 64) {
                    showSettings();
                }
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        function init() {
            loadProgress();
            setupCanvas();

            canvas.addEventListener('click', handleCanvasClick);

            // Visibility change
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    if (gameState === GameState.PLAYING) {
                        gameState = GameState.PAUSED;
                    }
                }
            });

            // Before unload
            window.addEventListener('beforeunload', function() {
                cancelAnimationFrame(render);
            });

            initAudio();
            render();
        }

        // ============================================
        // EXPOSE GLOBALS FOR HTML CALLBACKS
        // ============================================
        window.showTitleScreen = showTitleScreen;
        window.showLevelSelect = showLevelSelect;
        window.selectChapter = selectChapter;
        window.startLevel = startLevel;
        window.togglePause = togglePause;
        window.nextLevel = nextLevel;
        window.retryLevel = retryLevel;
        window.nextTutorial = nextTutorial;
        window.useHint = useHint;
        window.useShuffle = useShuffle;
        window.useExtraMoves = useExtraMoves;
        window.showSettings = showSettings;
        window.closeSettings = closeSettings;
        window.toggleSound = toggleSound;
        window.toggleMusic = toggleMusic;
        window.confirmReset = confirmReset;

        // ============================================
        // START GAME
        // ============================================
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
    </script>
</body>
</html>
