    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function sfxDraw() { playSFX(440, 0.08, 'triangle', 0.1); }
function sfxErase() { playSFX(220, 0.06, 'square', 0.08); }
function sfxHint() { playSFX(660, 0.15, 'sine', 0.12); setTimeout(()=>playSFX(880,0.1,'sine',0.1), 80); }
function sfxError() { playSFX(150, 0.2, 'sawtooth', 0.1); }
function sfxWin() {
  [523, 659, 784, 1047].forEach((f,i) => setTimeout(()=>playSFX(f,0.3,'sine',0.15), i*120));
}
function sfxClick() { playSFX(500, 0.04, 'sine', 0.06); }

function startMusic() {
  if (!state.settings.music || !audioCtx || musicInterval) return;
  playChord();
  musicInterval = setInterval(playChord, 3000);
}

function playChord() {
  if (!audioCtx || !state.settings.music) return;
  const chord = MUSIC_CHORDS[musicChordIdx % MUSIC_CHORDS.length];
  musicChordIdx++;
  chord.forEach(freq => {
    try {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.5);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.8);
      osc.connect(gain);
      gain.connect(musicGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 3);
    } catch(e) {}
  });
}

function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

// ============================================================
// Edge helpers
// ============================================================
function edgeKey(r1, c1, r2, c2) {
  if (r1 < r2 || (r1 === r2 && c1 < c2)) return r1+','+c1+','+r2+','+c2;
  return r2+','+c2+','+r1+','+c1;
}

function hasEdge(r1, c1, r2, c2) {
  return state.edges.has(edgeKey(r1,c1,r2,c2));
}

function addEdge(r1, c1, r2, c2) {
  state.edges.add(edgeKey(r1,c1,r2,c2));
}

function removeEdge(r1, c1, r2, c2) {
  state.edges.delete(edgeKey(r1,c1,r2,c2));
}

function getCellEdges(r, c) {
  const result = [];
  for (let d = 0; d < 4; d++) {
    const nr = r + DR[d], nc = c + DC[d];
    if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols) {
      if (hasEdge(r,c,nr,nc)) result.push(d);
    }
  }
  return result;
}

// ============================================================
// Win checking
// ============================================================
function checkWin() {
  if (state.edges.size === 0) return false;
  const level = state.level;
  if (!level) return false;

  // Build loop cell set: cells with exactly 2 edges
  const loopCells = new Set();
  for (let r = 0; r < state.rows; r++) {
    for (let c = 0; c < state.cols; c++) {
      if (getCellEdges(r,c).length === 2) loopCells.add(r+','+c);
    }
  }

  if (loopCells.size === 0) return false;

  // Check all clues are on the loop
  for (const clue of level.clues) {
    if (!loopCells.has(clue.r+','+clue.c)) return false;
  }

  // Check single cycle: trace from first loop cell
  const startStr = loopCells.values().next().value;
  const [sr,sc] = startStr.split(',').map(Number);
  const visited = new Set();
  let cur_r = sr, cur_c = sc;
  let prev_r = -1, prev_c = -1;

  while (!visited.has(cur_r+','+cur_c)) {
    visited.add(cur_r+','+cur_c);
    const edges = getCellEdges(cur_r, cur_c);
    if (edges.length !== 2) return false;
    let next = null;
    for (const d of edges) {
      const nr = cur_r + DR[d], nc = cur_c + DC[d];
      if (nr !== prev_r || nc !== prev_c) {
        if (!visited.has(nr+','+nc) || (nr === sr && nc === sc && visited.size > 1)) {
          next = [nr, nc];
          break;
        }
      }
    }
    if (!next) break;
    prev_r = cur_r; prev_c = cur_c;
    cur_r = next[0]; cur_c = next[1];
  }

  // Check cycle closed and all loop cells visited
  if (cur_r !== sr || cur_c !== sc) return false;
  if (visited.size !== loopCells.size) return false;

  // Check clue shapes and visibility
  for (const clue of level.clues) {
    const dirs = getCellEdges(clue.r, clue.c);
    if (dirs.length !== 2) return false;
    const straight = OPP[dirs[0]] === dirs[1];
    if (clue.shape === 'circle' && !straight) return false;
    if (clue.shape === 'square' && straight) return false;
    // Visibility check
    let vis = 1;
    for (let d = 0; d < 4; d++) {
      let nr = clue.r + DR[d], nc = clue.c + DC[d];
      while (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols) {
        if (loopCells.has(nr+','+nc)) { vis++; nr += DR[d]; nc += DC[d]; }
        else break;
      }
    }
    if (vis !== clue.number) return false;
  }

  return true;
}

// ============================================================
// Hint system
// ============================================================
function useHint() {
  if (state.hintsUsed >= state.maxHints) {
    showToast('No hints left!');
    sfxError();
    return;
  }
  const level = state.level;
  const solution = level.solution;
  // Find a solution edge not yet drawn
  for (let i = 0; i < solution.length; i++) {
    const [r1,c1] = solution[i];
    const [r2,c2] = solution[(i+1) % solution.length];
    if (!hasEdge(r1,c1,r2,c2)) {
      addEdge(r1,c1,r2,c2);
      state.hintsUsed++;
      sfxHint();
      showToast('Hint revealed!');
      if (state.settings.autocheck) checkAndCelebrate();
      return;
    }
  }
  showToast('All solution edges drawn!');
}

// ============================================================
// Toast
// ============================================================
let toastTimer = null;
function showToast(msg) {
  state.toast = msg;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { state.toast = null; }, 2000);
}

// ============================================================
// Level loading
// ============================================================
function loadLevel(idx) {
  state.levelIdx = idx;
  state.level = LEVELS[idx];
  state.rows = state.level.rows;
  state.cols = state.level.cols;
  state.edges = new Set();
  state.hintsUsed = 0;
  state.startTime = Date.now();
  state.mistakes = 0;
  state.win = false;
  state.winAnim = 0;
  state.screen = 'game';
  computeLayout();
}

function computeLayout() {
  const margin = 60;
  const availW = canvas.width - margin * 2;
  const availH = canvas.height - margin * 2 - 40;
  const sizeW = availW / state.cols;
  const sizeH = availH / state.rows;
  state.cellSize = Math.floor(Math.min(sizeW, sizeH, 60));
  state.offsetX = Math.floor((canvas.width - state.cellSize * state.cols) / 2);
  state.offsetY = Math.floor((canvas.height - state.cellSize * state.rows) / 2 + 10);
}

function checkAndCelebrate() {
  if (checkWin()) {
    state.win = true;
    state.winAnim = 0;
    sfxWin();
    const time = (Date.now() - state.startTime) / 1000;
    let stars = 3;
    if (state.hintsUsed > 0) stars--;
    if (state.hintsUsed > 1) stars--;
    if (state.mistakes > 5) stars--;
    stars = Math.max(1, stars);
    state.stars[state.levelIdx] = Math.max(state.stars[state.levelIdx]||0, stars);
    state.completed.add(state.levelIdx);
    saveProgress();
  }
}

// ============================================================
// Drawing
// ============================================================
function drawBoard() {
  ctx.fillStyle = '#0a1929';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (state.screen === 'menu') { drawMenu(); return; }
  if (state.screen === 'levelSelect') { drawLevelSelect(); return; }

  const cs = state.cellSize;
  const ox = state.offsetX, oy = state.offsetY;

  // Grid background
  ctx.fillStyle = '#162d50';
  ctx.fillRect(ox - 4, oy - 4, cs * state.cols + 8, cs * state.rows + 8);

  // Cells
  for (let r = 0; r < state.rows; r++) {
    for (let c = 0; c < state.cols; c++) {
      const x = ox + c * cs, y = oy + r * cs;
      ctx.fillStyle = '#1e3a5f';
      ctx.fillRect(x, y, cs, cs);
    }
  }

  // Grid lines
  ctx.strokeStyle = '#2a4a7a';
  ctx.lineWidth = 1;
  for (let r = 0; r <= state.rows; r++) {
    ctx.beginPath();
    ctx.moveTo(ox, oy + r * cs);
    ctx.lineTo(ox + cs * state.cols, oy + r * cs);
    ctx.stroke();
  }
  for (let c = 0; c <= state.cols; c++) {
    ctx.beginPath();
    ctx.moveTo(ox + c * cs, oy);
    ctx.lineTo(ox + c * cs, oy + cs * state.rows);
    ctx.stroke();
  }

  // Draw loop edges
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = Math.max(3, cs * 0.12);
  ctx.lineCap = 'round';
  for (const edge of state.edges) {
    const [r1,c1,r2,c2] = edge.split(',').map(Number);
    const x1 = ox + c1 * cs + cs/2, y1 = oy + r1 * cs + cs/2;
    const x2 = ox + c2 * cs + cs/2, y2 = oy + r2 * cs + cs/2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // Draw clues
  for (const clue of state.level.clues) {
    const x = ox + clue.c * cs + cs/2;
    const y = oy + clue.r * cs + cs/2;
    const radius = cs * 0.32;

    // Check if clue is satisfied
    const cellEdges = getCellEdges(clue.r, clue.c);
    let satisfied = false;
    if (cellEdges.length === 2) {
      const straight = OPP[cellEdges[0]] === cellEdges[1];
      if (clue.shape === 'circle' && straight) {
        // Check visibility
        let vis = 1;
        for (let d = 0; d < 4; d++) {
          let nr = clue.r + DR[d], nc = clue.c + DC[d];
          while (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols) {
            if (getCellEdges(nr,nc).length === 2) { vis++; nr += DR[d]; nc += DC[d]; }
            else break;
          }
        }
        if (vis === clue.number) satisfied = true;
      }
      if (clue.shape === 'square' && !straight) {
        let vis = 1;
        for (let d = 0; d < 4; d++) {
          let nr = clue.r + DR[d], nc = clue.c + DC[d];
          while (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols) {
            if (getCellEdges(nr,nc).length === 2) { vis++; nr += DR[d]; nc += DC[d]; }
            else break;
          }
        }
        if (vis === clue.number) satisfied = true;
      }
    }

    // Draw shape
    if (clue.shape === 'circle') {
      ctx.fillStyle = satisfied ? '#4ade80' : '#ffffff';
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#0a1929';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else {
      ctx.fillStyle = satisfied ? '#4ade80' : '#1a1a2e';
      ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
      ctx.strokeStyle = satisfied ? '#22c55e' : '#888';
      ctx.lineWidth = 2;
      ctx.strokeRect(x - radius, y - radius, radius * 2, radius * 2);
    }

    // Number
    ctx.fillStyle = clue.shape === 'circle' ? '#0a1929' : (satisfied ? '#0a1929' : '#ffffff');
    ctx.font = 'bold ' + Math.floor(cs * 0.35) + 'px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(clue.number, x, y);
  }

  // HUD
  drawHUD();

  // Toast
  if (state.toast) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    const tw = ctx.measureText(state.toast).width;
    ctx.fillRect(canvas.width/2 - tw/2 - 20, canvas.height - 80, tw + 40, 36);
    ctx.fillStyle = '#fff';
    ctx.font = '16px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(state.toast, canvas.width/2, canvas.height - 56);
  }

  // Win overlay
  if (state.win) drawWinOverlay();
}

function drawHUD() {
  const level = state.level;
  const tierIdx = Math.floor(state.levelIdx / 6);

  // Top bar
  ctx.fillStyle = '#162d50';
  ctx.fillRect(0, 0, canvas.width, 40);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Inter, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('Level ' + level.level + ' - ' + level.tier, 10, 20);

  ctx.textAlign = 'center';
  ctx.fillText('Hints: ' + (state.maxHints - state.hintsUsed) + '/' + state.maxHints, canvas.width/2, 20);

  const time = Math.floor((Date.now() - state.startTime) / 1000);
  const mm = String(Math.floor(time/60)).padStart(2,'0');
  const ss = String(time%60).padStart(2,'0');
  ctx.textAlign = 'right';
  ctx.fillText(mm + ':' + ss, canvas.width - 10, 20);

  // Bottom buttons
  const btnY = canvas.height - 30;
  const btns = [
    {label: 'Menu', x: 50, action: 'menu'},
    {label: 'Undo', x: canvas.width/2 - 120, action: 'undo'},
    {label: state.mode === 'draw' ? '✏️ Draw' : '🗑 Erase', x: canvas.width/2, action: 'mode'},
    {label: 'Hint (H)', x: canvas.width/2 + 120, action: 'hint'},
    {label: 'Check', x: canvas.width - 50, action: 'check'},
  ];
  ctx.font = '13px Inter, sans-serif';
  ctx.textAlign = 'center';
  btns.forEach(b => {
    ctx.fillStyle = '#1e3a5f';
    ctx.fillRect(b.x - 35, btnY - 12, 70, 24);
    ctx.strokeStyle = '#3a5a8a';
    ctx.lineWidth = 1;
    ctx.strokeRect(b.x - 35, btnY - 12, 70, 24);
    ctx.fillStyle = '#fff';
    ctx.fillText(b.label, b.x, btnY);
  });
}

function drawWinOverlay() {
  state.winAnim++;
  ctx.fillStyle = 'rgba(0,0,0,' + Math.min(0.7, state.winAnim * 0.02) + ')';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (state.winAnim > 10) {
    const stars = state.stars[state.levelIdx] || 1;
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 36px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Solved!', canvas.width/2, canvas.height/2 - 40);

    // Stars
    let starStr = '';
    for (let i = 0; i < 3; i++) starStr += i < stars ? '⭐' : '☆';
    ctx.font = '40px Inter, sans-serif';
    ctx.fillText(starStr, canvas.width/2, canvas.height/2 + 10);

    ctx.fillStyle = '#fff';
    ctx.font = '18px Inter, sans-serif';
    ctx.fillText('Tap for next level', canvas.width/2, canvas.height/2 + 60);
  }

  // Confetti
  if (state.winAnim < 80 && state.winAnim % 5 === 0) {
    for (let i = 0; i < 5; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const colors = ['#ff6b6b','#4ecdc4','#ffe66d','#95e1d3','#c9b1ff'];
      ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
      ctx.fillRect(x, y, 6, 6);
    }
  }
}

function drawMenu() {
  ctx.fillStyle = '#0a1929';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Title
  ctx.fillStyle = '#00e5ff';
  ctx.font = 'bold 42px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Balance Loop', canvas.width/2, canvas.height * 0.2);

  ctx.fillStyle = '#8899bb';
  ctx.font = '16px Inter, sans-serif';
  ctx.fillText('A GMPuzzles Loop Puzzle', canvas.width/2, canvas.height * 0.2 + 36);

  // Mini preview loop
  drawMenuPreview();

  // Buttons
  const btns = [
    {label: 'Play', y: canvas.height * 0.55},

  ];
  btns.forEach(b => {
    ctx.fillStyle = '#1e3a5f';
    ctx.fillRect(canvas.width/2 - 90, b.y - 20, 180, 40);
    ctx.strokeStyle = '#3a6aaa';
    ctx.lineWidth = 2;
    ctx.strokeRect(canvas.width/2 - 90, b.y - 20, 180, 40);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Inter, sans-serif';
    ctx.fillText(b.label, canvas.width/2, b.y);
  });

  // Completed count
  ctx.fillStyle = '#4ade80';
  ctx.font = '14px Inter, sans-serif';
  ctx.fillText(state.completed.size + '/' + LEVELS.length + ' levels solved', canvas.width/2, canvas.height * 0.88);
}

function drawMenuPreview() {
  const cy = canvas.height * 0.38;
  const cx = canvas.width / 2;
  const s = 24;
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  // Draw a small loop shape
  ctx.beginPath();
  ctx.moveTo(cx - 2*s, cy);
  ctx.lineTo(cx + 2*s, cy);
  ctx.stroke();
  // White circle clue
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - s, cy, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#0a1929';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#0a1929';
  ctx.font = 'bold 12px Inter';
  ctx.fillText('3', cx - s, cy);
  // Black square clue
  ctx.fillStyle = '#333';
  ctx.fillRect(cx + s - 10, cy - 10, 20, 20);
  ctx.strokeStyle = '#888';
  ctx.strokeRect(cx + s - 10, cy - 10, 20, 20);
  ctx.fillStyle = '#fff';
  ctx.fillText('5', cx + s, cy);
}

function drawSettings() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(canvas.width/2 - 120, canvas.height * 0.35, 240, 120);
  ctx.fillStyle = '#fff';
  ctx.font = '14px Inter, sans-serif';
  ctx.textAlign = 'left';
  const baseX = canvas.width/2 - 100;
  let y = canvas.height * 0.35 + 25;
  ctx.fillText('Music: ' + (state.settings.music ? 'ON' : 'OFF'), baseX, y);
  ctx.fillText('[Tap to toggle]', baseX + 140, y);
  y += 25;
  ctx.fillText('SFX: ' + (state.settings.sfx ? 'ON' : 'OFF'), baseX, y);
  ctx.fillText('[Tap to toggle]', baseX + 140, y);

function drawLevelSelect() {
  ctx.fillStyle = '#0a1929';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#00e5ff';
  ctx.font = 'bold 24px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Select Level', canvas.width/2, 40);

  // Draw level grid
  const cols = 6;
  const cellW = Math.min(80, (canvas.width - 40) / cols);
  const cellH = cellW;
  const startX = (canvas.width - cellW * cols) / 2;
  const startY = 80;

  for (let i = 0; i < LEVELS.length; i++) {
    const r = Math.floor(i / cols);
    const c = i % cols;
    const x = startX + c * cellW;
    const y = startY + r * cellH;
    const tierIdx = Math.floor(i / 6);
    const done = state.completed.has(i);

    ctx.fillStyle = done ? TIER_COLORS[tierIdx] + '44' : '#1e3a5f';
    ctx.fillRect(x + 4, y + 4, cellW - 8, cellH - 8);
    ctx.strokeStyle = TIER_COLORS[tierIdx];
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 4, y + 4, cellW - 8, cellH - 8);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.floor(cellH * 0.4) + 'px Inter, sans-serif';
    ctx.fillText(String(i+1), x + cellW/2, y + cellH/2 - 5);

    // Stars
    const stars = state.stars[i] || 0;
    if (stars > 0) {
      ctx.font = Math.floor(cellH * 0.2) + 'px Inter';
      let s = '';
      for (let j = 0; j < stars; j++) s += '⭐';
      ctx.fillText(s, x + cellW/2, y + cellH/2 + 15);
    }
  }

  // Back button
  ctx.fillStyle = '#1e3a5f';
  ctx.fillRect(canvas.width/2 - 60, canvas.height - 50, 120, 36);
  ctx.strokeStyle = '#3a6aaa';
  ctx.lineWidth = 2;
  ctx.strokeRect(canvas.width/2 - 60, canvas.height - 50, 120, 36);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px Inter, sans-serif';
  ctx.fillText('Back', canvas.width/2, canvas.height - 32);
}

// ============================================================
// Interaction
// ============================================================
function getCellAt(px, py) {
  const cs = state.cellSize;
  const c = Math.floor((px - state.offsetX) / cs);
  const r = Math.floor((py - state.offsetY) / cs);
  if (r >= 0 && r < state.rows && c >= 0 && c < state.cols) return [r, c];
  return null;
}

function handleTap(px, py) {
  if (state.screen === 'menu') {
    const btns = [
      {y: canvas.height * 0.55, action: () => { loadLevel(0); startMusic(); }},
      {y: canvas.height * 0.65, action: () => { state.screen = 'levelSelect'; }},
      {y: canvas.height * 0.75, action: () => { state.showSettings = !state.showSettings; sfxClick(); }},
    ];
    for (const b of btns) {
      if (Math.abs(py - b.y) < 20 && Math.abs(px - canvas.width/2) < 90) {
        b.action();
        sfxClick();
        return;
      }
    }
    // Settings toggles
    if (state.showSettings) {
      const baseX = canvas.width/2 - 100;
      let y = canvas.height * 0.35 + 25;
      if (Math.abs(py - y) < 15 && px > baseX + 130 && px < baseX + 220) {
        state.settings.music = !state.settings.music;
        if (state.settings.music) startMusic(); else stopMusic();
        saveSettings();
        sfxClick();
      }
      y += 25;
      if (Math.abs(py - y) < 15 && px > baseX + 130 && px < baseX + 220) {
        state.settings.sfx = !state.settings.sfx;
        saveSettings();
        sfxClick();
      }
    }
    return;
  }

  if (state.screen === 'levelSelect') {
    // Back button
    if (py > canvas.height - 50 && py < canvas.height - 14 && Math.abs(px - canvas.width/2) < 60) {
      state.screen = 'menu';
      sfxClick();
      return;
    }
    const cols = 6;
    const cellW = Math.min(80, (canvas.width - 40) / cols);
    const cellH = cellW;
    const startX = (canvas.width - cellW * cols) / 2;
    const startY = 80;
    for (let i = 0; i < LEVELS.length; i++) {
      const r = Math.floor(i / cols);
      const c = i % cols;
      const x = startX + c * cellW;
      const y = startY + r * cellH;
      if (px > x + 4 && px < x + cellW - 4 && py > y + 4 && py < y + cellH - 4) {
        loadLevel(i);
        startMusic();
        sfxClick();
        return;
      }
    }
    return;
  }

  // Game screen
  if (state.win) {
    // Next level
    if (state.levelIdx + 1 < LEVELS.length) loadLevel(state.levelIdx + 1);
    else state.screen = 'menu';
    return;
  }

  // Bottom buttons
  const btnY = canvas.height - 30;
  const btns = [
    {x: 50, action: () => { state.screen = 'menu'; stopMusic(); }},
    {x: canvas.width/2 - 120, action: () => { undoLast(); }},
    {x: canvas.width/2, action: () => { state.mode = state.mode === 'draw' ? 'erase' : 'draw'; sfxClick(); }},
    {x: canvas.width/2 + 120, action: () => { useHint(); }},
    {x: canvas.width - 50, action: () => { manualCheck(); }},
  ];
  for (const b of btns) {
    if (Math.abs(px - b.x) < 35 && Math.abs(py - btnY) < 12) {
      b.action();
      sfxClick();
      return;
    }
  }

  // Tap on cells: toggle edge with adjacent cell
  // For simplicity: tap on a cell border area to toggle the edge
  // Better: use drag from cell to cell
}

let undoStack = [];
function saveUndo() {
  undoStack.push(new Set(state.edges));
  if (undoStack.length > 50) undoStack.shift();
}

function undoLast() {
  if (undoStack.length > 0) {
    state.edges = undoStack.pop();
    sfxErase();
  }
}

function manualCheck() {
  if (checkWin()) {
    checkAndCelebrate();
  } else {
    state.mistakes++;
    sfxError();
    showToast('Not solved yet — keep trying!');
  }
}

function handleDragStart(px, py) {
  if (state.screen !== 'game' || state.win) return;
  const cell = getCellAt(px, py);
  if (!cell) return;
  state.dragging = true;
  state.dragCells = [cell];
  saveUndo();
}

function handleDragMove(px, py) {
  if (!state.dragging || state.screen !== 'game') return;
  const cell = getCellAt(px, py);
  if (!cell) return;
  const last = state.dragCells[state.dragCells.length - 1];
  if (cell[0] === last[0] && cell[1] === last[1]) return;

  // Check adjacency
  const dr = cell[0] - last[0], dc = cell[1] - last[1];
  if (Math.abs(dr) + Math.abs(dc) !== 1) return;

  if (state.mode === 'draw') {
    if (!hasEdge(last[0],last[1],cell[0],cell[1])) {
      addEdge(last[0],last[1],cell[0],cell[1]);
      sfxDraw();
    }
  } else {
    if (hasEdge(last[0],last[1],cell[0],cell[1])) {
      removeEdge(last[0],last[1],cell[0],cell[1]);
      sfxErase();
    }
  }
  state.dragCells.push(cell);

  if (state.settings.autocheck) checkAndCelebrate();
}

function handleDragEnd() {
  state.dragging = false;
  state.dragCells = [];
}

// ============================================================
// Input events
// ============================================================
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches && e.touches[0]) {
    return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
  }
  if (e.changedTouches && e.changedTouches[0]) {
    return [e.changedTouches[0].clientX - rect.left, e.changedTouches[0].clientY - rect.top];
  }
  return [e.clientX - rect.left, e.clientY - rect.top];
}

canvas.addEventListener('mousedown', e => { e.preventDefault(); initAudio(); const [x,y]=getPos(e); handleTap(x,y); handleDragStart(x,y); });
canvas.addEventListener('mousemove', e => { if(state.dragging){const [x,y]=getPos(e); handleDragMove(x,y);} });
canvas.addEventListener('mouseup', e => { handleDragEnd(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); const [x,y]=getPos(e); handleTap(x,y); handleDragStart(x,y); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(state.dragging){const [x,y]=getPos(e); handleDragMove(x,y);} }, {passive:false});
canvas.addEventListener('touchend', e => { handleDragEnd(); });

canvas.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('keydown', e => {
  if (state.screen === 'game') {
    if (e.key === 'h' || e.key === 'H') useHint();
    if (e.key === 'r' || e.key === 'R') loadLevel(state.levelIdx);
    if (e.key === 'z' || e.key === 'Z') undoLast();
    if (e.key === 'Escape') { state.screen = 'menu'; stopMusic(); }
    if (e.key === 'Enter') manualCheck();
    if (e.key === ' ') { state.mode = state.mode === 'draw' ? 'erase' : 'draw'; sfxClick(); }
  } else if (state.screen === 'menu') {
    if (e.key === 'Enter') { loadLevel(0); startMusic(); }
  }
});

// ============================================================
// Persistence
// ============================================================
function saveProgress() {
  try {
    localStorage.setItem('bl_completed', JSON.stringify([...state.completed]));
    localStorage.setItem('bl_stars', JSON.stringify(state.stars));
  } catch(e) {}
}

function loadProgress() {
  try {
    const c = localStorage.getItem('bl_completed');
    if (c) state.completed = new Set(JSON.parse(c));
    const s = localStorage.getItem('bl_stars');
    if (s) state.stars = JSON.parse(s);
    const settings = localStorage.getItem('bl_settings');
    if (settings) state.settings = JSON.parse(settings);
  } catch(e) {}
}

function saveSettings() {
  try { localStorage.setItem('bl_settings', JSON.stringify(state.settings)); } catch(e) {}
}

// ============================================================
// Init & resize
// ============================================================
function resize() {
  canvas.width = window.innerWidth;
  // Subtract footer height so game buttons (at canvas.height-30) are not covered by #game-footer
  var footerEl = document.getElementById('game-footer');
  var footerH = (footerEl && footerEl.offsetHeight > 0) ? footerEl.offsetHeight : 0;
  canvas.height = window.innerHeight - footerH;
  if (state.screen === 'game') computeLayout();
}

// Footer may load after init — re-resize when it appears
var _footerCheck = setInterval(function(){
  var f = document.getElementById('game-footer');
  if (f && f.offsetHeight > 0) { resize(); clearInterval(_footerCheck); }
}, 1000);
setTimeout(function(){ clearInterval(_footerCheck); }, 15000);

function init() {
  resize();
  loadProgress();
  window.addEventListener('resize', resize);
  requestAnimationFrame(render);
}

function render() {
  drawBoard();
  requestAnimationFrame(render);
}

window.addEventListener('load', init);
</script>
