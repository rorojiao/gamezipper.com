<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
    <linearGradient id="crate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8a040"/>
      <stop offset="100%" stop-color="#c07828"/>
    </linearGradient>
    <linearGradient id="robot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40c8e8"/>
      <stop offset="100%" stop-color="#2090b0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="4" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)" rx="80"/>
  <!-- Grid floor lines -->
  <g opacity="0.08" stroke="#40c8e8" stroke-width="1">
    <line x1="100" y1="700" x2="924" y2="700"/>
    <line x1="150" y1="750" x2="924" y2="750"/>
    <line x1="200" y1="800" x2="924" y2="800"/>
    <line x1="100" y1="700" x2="100" y2="800"/>
    <line x1="924" y1="700" x2="924" y2="800"/>
  </g>
  <!-- Target diamond -->
  <g transform="translate(780, 620)" filter="url(#glow)">
    <polygon points="0,-40 40,0 0,40 -40,0" fill="none" stroke="#ff6040" stroke-width="3" opacity="0.8"/>
    <polygon points="0,-24 24,0 0,24 -24,0" fill="#ff6040" opacity="0.3"/>
  </g>
  <!-- Crate 1 -->
  <g filter="url(#shadow)">
    <rect x="520" y="520" width="160" height="160" rx="12" fill="url(#crate)"/>
    <rect x="545" y="545" width="110" height="110" rx="6" fill="none" stroke="#b06820" stroke-width="3"/>
    <line x1="600" y1="545" x2="600" y2="655" stroke="#b06820" stroke-width="3"/>
    <line x1="545" y1="600" x2="655" y2="600" stroke="#b06820" stroke-width="3"/>
  </g>
  <!-- Crate 2 -->
  <g filter="url(#shadow)">
    <rect x="340" y="520" width="160" height="160" rx="12" fill="url(#crate)" opacity="0.7"/>
    <rect x="365" y="545" width="110" height="110" rx="6" fill="none" stroke="#b06820" stroke-width="3" opacity="0.7"/>
    <line x1="420" y1="545" x2="420" y2="655" stroke="#b06820" stroke-width="3" opacity="0.7"/>
    <line x1="365" y1="600" x2="475" y2="600" stroke="#b06820" stroke-width="3" opacity="0.7"/>
  </g>
  <!-- Robot character -->
  <g transform="translate(260, 340)" filter="url(#glow)">
    <!-- Antenna -->
    <line x1="0" y1="-110" x2="0" y2="-140" stroke="#60d0f0" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-148" r="8" fill="#ff6040"/>
    <!-- Head -->
    <rect x="-50" y="-100" width="100" height="80" rx="16" fill="url(#robot)"/>
    <!-- Eyes -->
    <rect x="-32" y="-78" width="22" height="22" rx="5" fill="#fff"/>
    <rect x="10" y="-78" width="22" height="22" rx="5" fill="#fff"/>
    <rect x="-26" y="-72" width="12" height="12" rx="3" fill="#1a1e3a"/>
    <rect x="16" y="-72" width="12" height="12" rx="3" fill="#1a1e3a"/>
    <!-- Eye shine -->
    <rect x="-24" y="-76" width="4" height="4" rx="1" fill="#fff" opacity="0.8"/>
    <rect x="18" y="-76" width="4" height="4" rx="1" fill="#fff" opacity="0.8"/>
    <!-- Mouth -->
    <rect x="-18" y="-42" width="36" height="6" rx="3" fill="#1a1e3a" opacity="0.5"/>
    <!-- Body -->
    <rect x="-60" y="-10" width="120" height="100" rx="14" fill="url(#robot)"/>
    <!-- Body detail -->
    <rect x="-40" y="10" width="80" height="10" rx="3" fill="#1a8aa8"/>
    <circle cx="0" cy="45" r="12" fill="#1a8aa8"/>
    <circle cx="0" cy="45" r="6" fill="#40c8e8"/>
    <!-- Arms -->
    <rect x="-80" y="-5" width="25" height="70" rx="10" fill="url(#robot)"/>
    <rect x="55" y="-5" width="25" height="70" rx="10" fill="url(#robot)"/>
    <!-- Hands -->
    <circle cx="-67" cy="75" r="14" fill="#60d0f0"/>
    <circle cx="68" cy="75" r="14" fill="#60d0f0"/>
    <!-- Legs -->
    <rect x="-40" y="95" width="28" height="55" rx="10" fill="url(#robot)"/>
    <rect x="12" y="95" width="28" height="55" rx="10" fill="url(#robot)"/>
    <!-- Feet -->
    <rect x="-46" y="140" width="40" height="18" rx="8" fill="#60d0f0"/>
    <rect x="6" y="140" width="40" height="18" rx="8" fill="#60d0f0"/>
  </g>
  <!-- Push arrow -->
  <g transform="translate(380, 420)" opacity="0.6">
    <polygon points="0,0 -20,-12 -20,12" fill="#ff6040"/>
    <rect x="-40" y="-8" width="25" height="16" rx="4" fill="#ff6040"/>
  </g>
</svg>
