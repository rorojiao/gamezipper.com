<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="60%" stop-color="#0d1a2d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d061"/>
      <stop offset="40%" stop-color="#c8a44e"/>
      <stop offset="100%" stop-color="#8a6d2a"/>
    </linearGradient>
    <linearGradient id="brass2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c84e"/>
      <stop offset="50%" stop-color="#c8a44e"/>
      <stop offset="100%" stop-color="#9a7b32"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cyan-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Ambient glow circles -->
  <circle cx="600" cy="300" r="280" fill="#c8a44e" opacity="0.06"/>
  <circle cx="600" cy="300" r="200" fill="#00f2fe" opacity="0.05"/>
  
  <!-- Cyan accent glow behind lock -->
  <ellipse cx="600" cy="280" rx="200" ry="220" fill="url(#cyan-glow)" opacity="0.5"/>
  
  <!-- Lock body (padlock) -->
  <g filter="url(#glow)">
    <!-- Shackle (U-shaped top part) -->
    <path d="M 530 200 Q 530 120 600 120 Q 670 120 670 200 L 670 260 L 640 260 L 640 200 Q 640 150 600 150 Q 560 150 560 200 L 560 260 L 530 260 Z" 
          fill="none" stroke="url(#brass)" stroke-width="22" stroke-linecap="round"/>
    
    <!-- Lock body -->
    <rect x="470" y="250" width="260" height="220" rx="30" fill="url(#brass2)" stroke="#8a6d2a" stroke-width="3"/>
    
    <!-- Lock body highlight -->
    <rect x="485" y="265" width="230" height="40" rx="15" fill="#f5d061" opacity="0.3"/>
    
    <!-- Keyhole -->
    <circle cx="600" cy="340" r="30" fill="#1a1a2e"/>
    <circle cx="600" cy="340" r="22" fill="#0a0a1a"/>
    <!-- Keyhole slot -->
    <path d="M 590 340 L 590 390 L 610 390 L 610 340 Z" fill="#0a0a1a"/>
    <!-- Keyhole inner glow -->
    <circle cx="600" cy="340" r="8" fill="#00f2fe" opacity="0.6" filter="url(#glow2)"/>
  </g>
  
  <!-- Lockpick tools (crossed behind/through lock) -->
  <g opacity="0.85" filter="url(#glow2)">
    <!-- Pick 1 (diagonal) -->
    <line x1="380" y1="450" x2="720" y2="180" stroke="#c0c0c0" stroke-width="4" stroke-linecap="round"/>
    <circle cx="380" cy="450" r="12" fill="#9ca3af" stroke="#6b7280" stroke-width="2"/>
    <circle cx="720" cy="180" r="8" fill="#c0c0c0"/>
    
    <!-- Pick 2 (diagonal other way) -->
    <line x1="820" y1="450" x2="480" y2="180" stroke="#b0b0b0" stroke-width="4" stroke-linecap="round"/>
    <circle cx="820" cy="450" r="12" fill="#9ca3af" stroke="#6b7280" stroke-width="2"/>
    <circle cx="480" cy="180" r="8" fill="#c0c0c0"/>
  </g>
  
  <!-- Title text -->
  <text x="600" y="540" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" 
        fill="url(#brass)" letter-spacing="4" filter="url(#glow2)">LOCKPICK</text>
  
  <!-- Subtitle -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" 
        fill="#00f2fe" letter-spacing="3" opacity="0.8">PICK · CRACK · SOLVE</text>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="3" fill="#00f2fe" opacity="0.5"/>
  <circle cx="1100" cy="120" r="3" fill="#c8a44e" opacity="0.5"/>
  <circle cx="80" cy="500" r="2" fill="#c8a44e" opacity="0.4"/>
  <circle cx="1120" cy="550" r="2" fill="#00f2fe" opacity="0.4"/>
</svg>