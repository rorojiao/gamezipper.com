  var h = state.cellSize * lv.rows;
  var dpr = window.devicePixelRatio || 1;
  state.canvas.width = w * dpr;
  state.canvas.height = h * dpr;
  state.canvas.style.width = w + "px";
  state.canvas.style.height = h + "px";
  state.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  state.canvasW = w;
  state.canvasH = h;
  render();
}

function initLevel(idx) {
  state.currentLevel = idx;
  state.path = [];
  state.pathSet = {};
  state.isDrawing = false;
  state.hintsLeft = 3;
  state.startTime = Date.now();
  state.errorCells = [];
  document.getElementById("level-num").textContent = idx + 1;
  document.getElementById("hint-count").textContent = state.hintsLeft;
  document.getElementById("status-text").textContent = "Draw path";
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(updateTimer, 1000);
  resize();
  saveProgress();
}

function updateTimer() {
  var sec = Math.floor((Date.now() - state.startTime) / 1000);
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  document.getElementById("timer").textContent = m + ":" + (s < 10 ? "0" : "") + s;
}

function getCellFromXY(mx, my) {
  var rect = state.canvas.getBoundingClientRect();
  var x = mx - rect.left, y = my - rect.top;
  var cs = state.cellSize;
  var c = Math.floor(x / cs), r = Math.floor(y / cs);
  var lv = LEVELS[state.currentLevel];
  if (r < 0 || r >= lv.rows || c < 0 || c >= lv.cols) return null;
  return { r: r, c: c };
}

function cellKey(r, c) { return r * 1000 + c; }

function getEntryDir() {
  var lv = LEVELS[state.currentLevel];
  if (lv.in.side === "top") return 1;
  if (lv.in.side === "bottom") return 3;
  if (lv.in.side === "left") return 0;
  return 2;
}

function getStartCell() {
  var lv = LEVELS[state.currentLevel];
  if (lv.in.side === "top") return { r: 0, c: lv.in.pos };
  if (lv.in.side === "bottom") return { r: lv.rows - 1, c: lv.in.pos };
  if (lv.in.side === "left") return { r: lv.in.pos, c: 0 };
  return { r: lv.in.pos, c: lv.cols - 1 };
}

function getEndCell() {
  var lv = LEVELS[state.currentLevel];
  if (lv.out.side === "top") return { r: 0, c: lv.out.pos };
  if (lv.out.side === "bottom") return { r: lv.rows - 1, c: lv.out.pos };
  if (lv.out.side === "left") return { r: lv.out.pos, c: 0 };
  return { r: lv.out.pos, c: lv.cols - 1 };
}

function getExitDir() {
  var lv = LEVELS[state.currentLevel];
  if (lv.out.side === "top") return 3;
  if (lv.out.side === "bottom") return 1;
  if (lv.out.side === "left") return 2;
  return 0;
}

function isAdjacent(r1, c1, r2, c2) { return Math.abs(r1-r2)+Math.abs(c1-c2) === 1; }

function getMoveDir(dr, dc) {
  if (dr === 0 && dc === 1) return 0;
  if (dr === 1 && dc === 0) return 1;
  if (dr === 0 && dc === -1) return 2;
  if (dr === -1 && dc === 0) return 3;
  return -1;
}

function isPathValidSegment(r1, c1, r2, c2) {
  var lv = LEVELS[state.currentLevel];
  var outDir = getMoveDir(r2-r1, c2-c1);
  if (outDir < 0) return false;
  var idx = -1;
  for (var i = 0; i < state.path.length; i++) {
    if (state.path[i][0] === r1 && state.path[i][1] === c1) { idx = i; break; }
  }
  var inDir;
  if (idx === 0) inDir = getEntryDir();
  else if (idx > 0) {
    var prev = state.path[idx-1];
    inDir = getMoveDir(r1-prev[0], c1-prev[1]);
    if (inDir < 0) return false;
  } else return false;

  var cellType = lv.grid[r1][c1];
  if (cellType === 1) return outDir === inDir;
  return outDir !== inDir && outDir !== (inDir+2)%4;
}

function onPointerDown(e) {
  e.preventDefault();
  initAudio();
  startBGM();
  var cell = getCellFromXY(e.clientX, e.clientY);
  if (!cell) return;
  state.isDrawing = true;
  if (state.mode === "erase") { eraseAt(cell.r, cell.c); render(); return; }
  var start = getStartCell();
  if (state.path.length === 0) {
    if (cell.r === start.r && cell.c === start.c) {
      state.path.push([start.r, start.c]);
      state.pathSet[cellKey(start.r, start.c)] = true;
      sfxDraw();
    }
  } else {
    handleCellTap(cell.r, cell.c);
  }
  render();
}

function onPointerMove(e) {
  if (!state.isDrawing) return;
  e.preventDefault();
  var cell = getCellFromXY(e.clientX, e.clientY);
  if (!cell) return;
  if (state.mode === "erase") return;
  handleCellTap(cell.r, cell.c);
  render();
}

function onPointerUp(e) {
  state.isDrawing = false;
  if (state.settings.autocheck) checkSolution();
}

function handleCellTap(r, c) {
  if (state.path.length === 0) return;
  var last = state.path[state.path.length-1];
  for (var i = 0; i < state.path.length; i++) {
    if (state.path[i][0] === r && state.path[i][1] === c) {
      var removed = state.path.splice(i+1);
      for (var j = 0; j < removed.length; j++) delete state.pathSet[cellKey(removed[j][0], removed[j][1])];
      sfxErase();
      return;
    }
  }
  if (!isAdjacent(last[0], last[1], r, c)) return;
  if (state.pathSet[cellKey(r, c)]) return;
  if (!isPathValidSegment(last[0], last[1], r, c)) { sfxError(); flashError(r, c); return; }
  state.path.push([r, c]);
  state.pathSet[cellKey(r, c)] = true;
  sfxDraw();
}

function eraseAt(r, c) {
  for (var i = 0; i < state.path.length; i++) {
    if (state.path[i][0] === r && state.path[i][1] === c) {
      var removed = state.path.splice(i);
      for (var j = 0; j < removed.length; j++) delete state.pathSet[cellKey(removed[j][0], removed[j][1])];
      sfxErase();
      return;
    }
  }
}

function flashError(r, c) { state.errorCells.push({r:r, c:c, time:Date.now()}); }

function clearGrid() {
  state.path = []; state.pathSet = {}; sfxErase(); render();
}

function setMode(m) {
  state.mode = m;
  document.querySelectorAll(".mode-btn").forEach(function(b) {
    b.classList.toggle("active", b.getAttribute("data-mode") === m);
  });
}

function checkSolution() {
  var lv = LEVELS[state.currentLevel];
  var end = getEndCell();
  if (state.path.length === 0) { showHint("Start drawing from the IN arrow!"); return; }
  var last = state.path[state.path.length-1];
  if (last[0] !== end.r || last[1] !== end.c) { showHint("Path must end at the OUT arrow"); sfxError(); return; }
  var lastType = lv.grid[end.r][end.c];
  var exitDir = getExitDir();
  var actualExit;
  if (state.path.length >= 2) {
    var prev = state.path[state.path.length-2];
    actualExit = getMoveDir(end.r-prev[0], end.c-prev[1]);
  } else {
    actualExit = getEntryDir();
  }
  if (lastType === 1) {
    if (actualExit !== exitDir) { showHint("Exit direction must match OUT arrow"); sfxError(); return; }
  } else {
    if (actualExit === exitDir || actualExit === (exitDir+2)%4) { showHint("Exit direction must match OUT arrow"); sfxError(); return; }
  }
  var allIce = true;
  for (var r = 0; r < lv.rows; r++) {
    for (var c = 0; c < lv.cols; c++) {
      if (lv.grid[r][c] === 1 && !state.pathSet[cellKey(r,c)]) { allIce = false; break; }
    }
    if (!allIce) break;
  }
  if (!allIce) { showHint("All ice cells must be on the path!"); sfxError(); return; }
  winLevel();
}

function winLevel() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  var sec = Math.floor((Date.now()-state.startTime)/1000);
  var stars = 3;
  var lv = LEVELS[state.currentLevel];
  var par = lv.rows * lv.cols * 5;
  if (sec > par*2) stars = 1;
  else if (sec > par) stars = 2;
  var prev = state.stars[state.currentLevel] || 0;
  if (stars > prev) state.stars[state.currentLevel] = stars;
  saveProgress();
  sfxWin();
  spawnParticles();
  var s3 = "\u2605\u2605\u2605".substring(0, stars) + "\u2606\u2606\u2606".substring(0, 3-stars);
  document.getElementById("win-stars").textContent = s3;
  document.getElementById("win-time").textContent = "Time: " + Math.floor(sec/60) + ":" + (sec%60<10?"0":"") + (sec%60);
  document.getElementById("win-overlay").style.display = "flex";
}

function nextLevel() {
  document.getElementById("win-overlay").style.display = "none";
  if (state.currentLevel < LEVELS.length-1) initLevel(state.currentLevel+1);
  else showHint("All levels complete!");
}

function useHint() {
  if (state.hintsLeft <= 0) { showHint("No hints left!"); return; }
  state.hintsLeft--;
  document.getElementById("hint-count").textContent = state.hintsLeft;
  sfxHint();
  var lv = LEVELS[state.currentLevel];
  var sol = lv.sol;
  var revealIdx = state.path.length;
  if (revealIdx < sol.length) {
    var nc = sol[revealIdx];
    state.path.push([nc[0], nc[1]]);
    state.pathSet[cellKey(nc[0], nc[1])] = true;
    sfxDraw();
    render();
  }
}

function showHint(msg) {
  var el = document.getElementById("hint-text");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2500);
}

function spawnParticles() {
  state.particles = [];
  var cx = state.canvasW/2, cy = state.canvasH/2;
  for (var i = 0; i < 40; i++) {
    var angle = (i/40)*Math.PI*2, speed = 2+Math.random()*4;
    state.particles.push({
      x:cx, y:cy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      life:1, color:["#64ffda","#ff6b9d","#ffd166","#4ade80"][i%4], size:4+Math.random()*4
    });
  }
  if (!state.rafId) animateParticles();
}

function animateParticles() {
  state.particles.forEach(function(p) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.015; p.size *= 0.98;
  });
  state.particles = state.particles.filter(function(p) { return p.life > 0; });
  render();
  if (state.particles.length > 0) state.rafId = requestAnimationFrame(animateParticles);
  else state.rafId = null;
}

function render() {
  if (!state.ctx) return;
  var lv = LEVELS[state.currentLevel];
  if (!lv) return;
  var ctx = state.ctx, cs = state.cellSize, w = state.canvasW, h = state.canvasH;
  ctx.clearRect(0, 0, w, h);
  for (var r = 0; r < lv.rows; r++) {
    for (var c = 0; c < lv.cols; c++) {
      var x = c*cs, y = r*cs;
      var isIce = lv.grid[r][c] === 1;
      var isOnPath = state.pathSet[cellKey(r,c)];
      if (isIce) {
        ctx.fillStyle = "#3a7ca5"; ctx.fillRect(x, y, cs, cs);
        ctx.fillStyle = "#5fb3d4"; ctx.fillRect(x+2, y+2, cs-4, cs-4);
        ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x+cs*0.3, y+cs*0.2); ctx.lineTo(x+cs*0.7, y+cs*0.8);
        ctx.moveTo(x+cs*0.7, y+cs*0.2); ctx.lineTo(x+cs*0.3, y+cs*0.8);
        ctx.stroke();
      } else {
        ctx.fillStyle = "#1a1a2e"; ctx.fillRect(x, y, cs, cs);
        ctx.fillStyle = "#2a2a4a"; ctx.fillRect(x+2, y+2, cs-4, cs-4);
      }
      if (isOnPath) {
        ctx.fillStyle = isIce ? "rgba(100,255,218,0.35)" : "rgba(100,255,218,0.2)";
        ctx.fillRect(x+1, y+1, cs-2, cs-2);
      }
      ctx.strokeStyle = "rgba(100,100,140,0.3)"; ctx.lineWidth = 1; ctx.strokeRect(x, y, cs, cs);
      state.errorCells.forEach(function(err) {
        if (err.r === r && err.c === c) {
          var age = (Date.now()-err.time)/500;
          if (age < 1) { ctx.fillStyle = "rgba(239,68,68,"+(1-age)*0.5+")"; ctx.fillRect(x, y, cs, cs); }
        }
      });
    }
  }
  lv.arrows.forEach(function(a) {
    var ax = a.c*cs+cs/2, ay = a.r*cs+cs/2;
    ctx.fillStyle = "#ffd166";
    ctx.font = "bold " + Math.floor(cs*0.5) + "px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(DIR_SYMBOLS[a.dir], ax, ay);
  });
  drawArrowMarker(ctx, lv, cs, lv.in.side, lv.in.pos, true);
  drawArrowMarker(ctx, lv, cs, lv.out.side, lv.out.pos, false);
  if (state.path.length > 1) {
    ctx.strokeStyle = "#64ffda";
    ctx.lineWidth = Math.max(3, cs*0.12);
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.shadowColor = "#64ffda"; ctx.shadowBlur = 8;
    ctx.beginPath();
    for (var i = 0; i < state.path.length; i++) {
      var px = state.path[i][1]*cs+cs/2, py = state.path[i][0]*cs+cs/2;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke(); ctx.shadowBlur = 0;
    for (var i = 0; i < state.path.length; i++) {
      var px = state.path[i][1]*cs+cs/2, py = state.path[i][0]*cs+cs/2;
      ctx.fillStyle = "#64ffda";
      ctx.beginPath(); ctx.arc(px, py, cs*0.08, 0, Math.PI*2); ctx.fill();
    }
  }
  if (state.particles.length > 0) {
    state.particles.forEach(function(p) {
      ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }
  state.errorCells = state.errorCells.filter(function(e) { return (Date.now()-e.time) < 500; });
}

function drawArrowMarker(ctx, lv, cs, side, pos, isIn) {
  var mx, my, angle;
  if (side === "top") { mx = pos*cs+cs/2; my = 0; angle = isIn ? Math.PI/2 : -Math.PI/2; }
  else if (side === "bottom") { mx = pos*cs+cs/2; my = lv.rows*cs; angle = isIn ? -Math.PI/2 : Math.PI/2; }
  else if (side === "left") { mx = 0; my = pos*cs+cs/2; angle = isIn ? 0 : Math.PI; }
  else { mx = lv.cols*cs; my = pos*cs+cs/2; angle = isIn ? Math.PI : 0; }
  var color = isIn ? "#4ade80" : "#ff6b9d";
  var sz = cs*0.3;
  ctx.save(); ctx.translate(mx, my); ctx.rotate(angle);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(sz, 0);
  ctx.lineTo(-sz*0.5, -sz*0.6);
  ctx.lineTo(-sz*0.2, 0);
  ctx.lineTo(-sz*0.5, sz*0.6);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function showMenu() {
  var list = document.getElementById("menu-levels");
  var html = "";
  var tierNames = ["Beginner","Easy","Medium","Hard","Expert"];
  for (var t = 0; t < 5; t++) {
    html += '<div class="tier-header">' + tierNames[t] + '</div>';
    html += '<div class="level-grid">';
    for (var i = t*6; i < (t+1)*6; i++) {
      var stars = state.stars[i] || 0;
      var cls = "level-cell";
      if (stars > 0) cls += " completed";
      if (i === state.currentLevel) cls += " current";
      var starStr = "";
      for (var s = 0; s < stars; s++) starStr += "\u2605";
      html += '<div class="' + cls + '" data-lvl="' + i + '">' + (i+1) + '<span class="stars-mini">' + starStr + '</span></div>';
    }
    html += '</div>';
  }
  list.innerHTML = html;
  list.querySelectorAll("[data-lvl]").forEach(function(cell) {
    cell.addEventListener("click", function() {
      var lvl = parseInt(this.getAttribute("data-lvl"));
      initLevel(lvl);
      document.getElementById("menu-overlay").style.display = "none";
    });
  });
  document.getElementById("menu-overlay").style.display = "flex";
}

function toggleSettings() {
  document.getElementById("music-toggle").classList.toggle("on", state.settings.music);
  document.getElementById("sfx-toggle").classList.toggle("on", state.settings.sfx);
  document.getElementById("autocheck-toggle").classList.toggle("on", state.settings.autocheck);
  document.getElementById("settings-overlay").style.display = "flex";
}

function toggleSetting(name) {
  state.settings[name] = !state.settings[name];
  var el = document.getElementById(name + "-toggle");
  if (el) el.classList.toggle("on", state.settings[name]);
  if (name === "music") {
    if (state.settings.music) { initAudio(); startBGM(); } else stopBGM();
  }
  saveProgress();
}

function cleanup() {
  if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  stopBGM();
  if (state.audioCtx) { try { state.audioCtx.close(); } catch(e) {} state.audioCtx = null; }
}

function setupEventListeners() {
  document.getElementById("btn-levels").addEventListener("click", showMenu);
  document.getElementById("btn-settings").addEventListener("click", toggleSettings);
  document.getElementById("btn-draw").addEventListener("click", function() { setMode("draw"); });
  document.getElementById("btn-erase").addEventListener("click", function() { setMode("erase"); });
  document.getElementById("btn-hint").addEventListener("click", useHint);
  document.getElementById("btn-clear").addEventListener("click", clearGrid);
  document.getElementById("btn-check").addEventListener("click", checkSolution);
  document.getElementById("btn-close-menu").addEventListener("click", function() {
    document.getElementById("menu-overlay").style.display = "none";
  });
  document.getElementById("btn-next").addEventListener("click", nextLevel);
  document.getElementById("btn-stay").addEventListener("click", function() {
    document.getElementById("win-overlay").style.display = "none";
  });
  document.getElementById("btn-close-settings").addEventListener("click", function() {
    document.getElementById("settings-overlay").style.display = "none";
  });
  document.getElementById("music-toggle").addEventListener("click", function() { toggleSetting("music"); });
  document.getElementById("sfx-toggle").addEventListener("click", function() { toggleSetting("sfx"); });
  document.getElementById("autocheck-toggle").addEventListener("click", function() { toggleSetting("autocheck"); });
}

window.addEventListener("beforeunload", cleanup);
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
    stopBGM();
  } else {
    if (state.particles.length > 0 && !state.rafId) state.rafId = requestAnimationFrame(animateParticles);
    if (state.settings.music) startBGM();
  }
});

function init() {
  loadSave();
  setupCanvas();
  setupEventListeners();
  initLevel(state.currentLevel || 0);
}

if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
else init();
</script>
