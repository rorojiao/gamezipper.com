<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Bridges -->
  <line x1="25" y1="30" x2="75" y2="30" stroke="#00f0ff" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <line x1="25" y1="33" x2="75" y2="33" stroke="#00f0ff" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <line x1="25" y1="30" x2="25" y2="70" stroke="#a855f7" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <line x1="28" y1="30" x2="28" y2="70" stroke="#a855f7" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <line x1="75" y1="30" x2="75" y2="70" stroke="#00f0ff" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <line x1="50" y1="70" x2="75" y2="70" stroke="#a855f7" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <!-- Islands -->
  <circle cx="25" cy="30" r="12" fill="#141432" stroke="#00f0ff" stroke-width="2.5" filter="url(#glowStrong)"/>
  <text x="25" y="35" text-anchor="middle" fill="#00f0ff" font-family="Arial Black,sans-serif" font-size="14" font-weight="bold">4</text>
  <circle cx="75" cy="30" r="12" fill="#141432" stroke="#00f0ff" stroke-width="2.5" filter="url(#glowStrong)"/>
  <text x="75" y="35" text-anchor="middle" fill="#00f0ff" font-family="Arial Black,sans-serif" font-size="14" font-weight="bold">3</text>
  <circle cx="25" cy="70" r="12" fill="#141432" stroke="#a855f7" stroke-width="2.5" filter="url(#glowStrong)"/>
  <text x="25" y="75" text-anchor="middle" fill="#a855f7" font-family="Arial Black,sans-serif" font-size="14" font-weight="bold">3</text>
  <circle cx="75" cy="70" r="12" fill="#141432" stroke="#a855f7" stroke-width="2.5" filter="url(#glowStrong)"/>
  <text x="75" y="75" text-anchor="middle" fill="#a855f7" font-family="Arial Black,sans-serif" font-size="14" font-weight="bold">2</text>
  <circle cx="50" cy="70" r="10" fill="#141432" stroke="#ff006e" stroke-width="2.5" filter="url(#glowStrong)"/>
  <text x="50" y="75" text-anchor="middle" fill="#ff006e" font-family="Arial Black,sans-serif" font-size="12" font-weight="bold">2</text>
</svg>
