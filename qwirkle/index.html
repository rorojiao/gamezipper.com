<script>
// ==================== Qwirkle Game Engine ====================
(function(){
'use strict';

// --- Constants ---
var COLORS=[
  {n:'red',hex:'#e74c3c'},{n:'orange',hex:'#e67e22'},{n:'yellow',hex:'#f1c40f'},
  {n:'green',hex:'#2ecc71'},{n:'blue',hex:'#3498db'},{n:'purple',hex:'#9b59b6'}
];
var SHAPES=['circle','square','diamond','triangle','star','hexagon'];
var NUM_COLORS=6,NUM_SHAPES=6,COPIES=3;
var TOTAL_TILES=NUM_COLORS*NUM_SHAPES*COPIES; // 108
var HAND_SIZE=6;
var BOARD_W=15,BOARD_H=15; // logical grid, viewport scrolls

// --- Game State ---
var G={
  board:{}, // key "x,y" -> {color:0-5, shape:0-5, owner:'p'|'a'}
  bag:[],   // remaining tiles
  playerHand:[],
  aiHand:[],
  playerScore:0,
  aiScore:0,
  turn:'player', // 'player'|'ai'
  selectedTile:-1, // index in playerHand
  pendingPlacements:[], // [{x,y,color,shape}] tiles placed this turn, not confirmed
  level:1,
  difficulty:0, // 0=easy,1=med,2=hard
  gameOver:false,
  bagEmpty:false,
  tilesPlayed:0, // total tiles placed by both
  history:[], // for undo
  lastQwirkle:false,
  qwirkleAnnounce:null,
  // UI
  viewX:0, viewY:0, // scroll offset in grid units
  cellSize:38,
  soundOn:true,
  musicOn:true,
  audioCtx:null,
  bgmNodes:[],
  rafId:null,
  animTiles:[], // {x,y,color,shape,t:0,dur:300}
  particles:[],
  started:false,
  hintTile:null,
  hintCell:null,
};

// --- Tile representation ---
function tileKey(x,y){return x+','+y;}
function makeBag(){
  var bag=[];
  for(var c=0;c<NUM_COLORS;c++)
    for(var s=0;s<NUM_SHAPES;s++)
      for(var k=0;k<COPIES;k++)
        bag.push({color:c,shape:s});
  // Shuffle
  for(var i=bag.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=bag[i];bag[i]=bag[j];bag[j]=t;
  }
  return bag;
}
function drawTile(bag){
  if(bag.length===0)return null;
  return bag.pop();
}
function refillHand(hand,bag){
  while(hand.length<HAND_SIZE&&bag.length>0){
    hand.push(drawTile(bag));
  }
}

// ==================== Placement Validation ====================

// Check if placing tiles at given positions is valid
// placements: [{x,y,color,shape}]
// Returns {valid:bool, score:0, lines:[]}
function validatePlacements(placements){
  if(placements.length===0)return {valid:false,score:0,lines:[],msg:'No tiles placed'};
  if(placements.length===1){
    // Single tile: must be placed adjacent to existing tile (or first move)
    var p=placements[0];
    var existing=Object.keys(G.board).length;
    if(existing===0)return {valid:true,score:1,lines:[]};
    // Check adjacency
    var adj=false;
    var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
    for(var d=0;d<4;d++){
      var nx=p.x+dirs[d][0],ny=p.y+dirs[d][1];
      if(G.board[tileKey(nx,ny)]){adj=true;break;}
    }
    if(!adj)return {valid:false,score:0,lines:[],msg:'Tile must be adjacent to existing tiles'};
    // Check line constraints
    var r=checkLineConstraints(p.x,p.y,p.color,p.shape);
    return r;
  }
  // Multiple tiles: must form a single line (same row or same col)
  var xs={},ys={};
  for(var i=0;i<placements.length;i++){
    xs[placements[i].x]=true;
    ys[placements[i].y]=true;
  }
  var xKeys=Object.keys(xs),yKeys=Object.keys(ys);
  if(xKeys.length>1&&yKeys.length>1)
    return {valid:false,score:0,lines:[],msg:'Tiles must be in a single line'};

  // Temporarily place tiles, validate, then remove
  var tempBoard={};
  for(var key in G.board)tempBoard[key]=G.board[key];
  for(var i2=0;i2<placements.length;i2++){
    var p2=placements[i2];
    var k=tileKey(p2.x,p2.y);
    if(tempBoard[k])return {valid:false,score:0,lines:[],msg:'Tile overlap'};
    tempBoard[k]={color:p2.color,shape:p2.shape};
  }

  // Check each placement's line constraints using tempBoard
  var totalScore=0;
  var qwirkleBonus=0;
  var scoredLines={};
  for(var i3=0;i3<placements.length;i3++){
    var p3=placements[i3];
    var r3=checkLineConstraintsOnBoard(p3.x,p3.y,p3.color,p3.shape,tempBoard);
    if(!r3.valid)return {valid:false,score:0,lines:[],msg:r3.msg};
    // Avoid double-counting lines
    for(var li=0;li<r3.lines.length;li++){
      var line=r3.lines[li];
      var lk=line.dir+':'+line.key;
      if(!scoredLines[lk]){
        scoredLines[lk]=true;
        totalScore+=line.len;
        if(line.len===6){
          qwirkleBonus+=6;
        }
      }
    }
  }
  return {valid:true,score:totalScore+qwirkleBonus,lines:[],qwirkle:qwirkleBonus>0};
}

// Check line constraints for a single tile placement on the real board
function checkLineConstraints(x,y,color,shape){
  return checkLineConstraintsOnBoard(x,y,color,shape,G.board);
}

// Check line constraints using a given board (may include temp placements)
function checkLineConstraintsOnBoard(x,y,color,shape,board){
  // Horizontal line (same y): check both directions
  var hLine=getLine(x,y,1,0,board,color,shape);
  var vLine=getLine(x,y,0,1,board,color,shape);

  // Validate horizontal line
  if(hLine.len>1){
    var hr=validateLine(hLine.tiles,color,shape);
    if(!hr.valid)return {valid:false,score:0,lines:[],msg:hr.msg};
  }
  // Validate vertical line
  if(vLine.len>1){
    var vr=validateLine(vLine.tiles,color,shape);
    if(!vr.valid)return {valid:false,score:0,lines:[],msg:vr.msg};
  }

  var lines=[];
  var score=0;
  if(hLine.len>1){
    lines.push({dir:'h',key:y,len:hLine.len});
    score+=hLine.len;
    if(hLine.len===6)score+=6;
  }
  if(vLine.len>1){
    lines.push({dir:'v',key:x,len:vLine.len});
    score+=vLine.len;
    if(vLine.len===6)score+=6;
  }
  if(hLine.len<=1&&vLine.len<=1){
    // Isolated tile (first move or adjacency-only)
    lines.push({dir:'s',key:x+','+y,len:1});
    score=1;
  }
  return {valid:true,score:score,lines:lines};
}

// Get the full line through (x,y) in direction (dx,dy)
function getLine(x,y,dx,dy,board,color,shape){
  var tiles=[{x:x,y:y,color:color,shape:shape}];
  // Forward
  var cx=x+dx,cy=y+dy;
  while(board[tileKey(cx,cy)]){
    tiles.push({x:cx,y:cy,color:board[tileKey(cx,cy)].color,shape:board[tileKey(cx,cy)].shape});
    cx+=dx;cy+=dy;
  }
  // Backward
  cx=x-dx;cy=y-dy;
  while(board[tileKey(cx,cy)]){
    tiles.unshift({x:cx,y:cy,color:board[tileKey(cx,cy)].color,shape:board[tileKey(cx,cy)].shape});
    cx-=dx;cy-=dy;
  }
  return {len:tiles.length,tiles:tiles};
}

// Validate that a line of tiles follows Qwirkle rules
function validateLine(tiles,placedColor,placedShape){
  if(tiles.length<=1)return {valid:true};
  if(tiles.length>6)return {valid:false,msg:'Line too long (max 6)'};

  var colors={},shapes={};
  for(var i=0;i<tiles.length;i++){
    colors[tiles[i].color]=true;
    shapes[tiles[i].shape]=true;
  }
  var colorCount=Object.keys(colors).length;
  var shapeCount=Object.keys(shapes).length;

  // Rule: all same color (shapes must be unique) OR all same shape (colors must be unique)
  if(colorCount===1){
    // Same color: shapes must all be different
    if(shapeCount!==tiles.length)return {valid:false,msg:'Same color line must have unique shapes'};
  } else if(shapeCount===1){
    // Same shape: colors must all be different
    if(colorCount!==tiles.length)return {valid:false,msg:'Same shape line must have unique colors'};
  } else {
    return {valid:false,msg:'Tiles must share color or shape'};
  }
  return {valid:true};
}

// ==================== AI ====================

// Find all valid single-tile placements for a hand
function findAllValidMoves(hand,board){
  var moves=[];
  var existing=Object.keys(board);
  if(existing.length===0){
    // First move: any tile anywhere near center
    for(var i=0;i<hand.length;i++){
      moves.push({placements:[{x:7,y:7,color:hand[i].color,shape:hand[i].shape}],tileIdx:i});
    }
    return moves;
  }
  // Find all empty cells adjacent to existing tiles
  var candidates={};
  for(var key in board){
    var parts=key.split(',');
    var bx=parseInt(parts[0]),by=parseInt(parts[1]);
    var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
    for(var d=0;d<4;d++){
      var nx=bx+dirs[d][0],ny=by+dirs[d][1];
      var nk=tileKey(nx,ny);
      if(!board[nk])candidates[nk]={x:nx,y:ny};
    }
  }
  // For each candidate cell and each tile in hand, check validity
  for(var ck in candidates){
    var cell=candidates[ck];
    for(var ti=0;ti<hand.length;ti++){
      var tile=hand[ti];
      var r=checkLineConstraintsOnBoard(cell.x,cell.y,tile.color,tile.shape,board);
      if(r.valid&&r.score>0){
        moves.push({placements:[{x:cell.x,y:cell.y,color:tile.color,shape:tile.shape}],tileIdx:ti,score:r.score});
      }
    }
  }
  // Also find multi-tile moves (same line, multiple tiles from hand)
  // For efficiency, only check lines extending from each candidate
  moves=mergeMultiTileMoves(moves,hand,board);
  return moves;
}

// Find multi-tile moves: for each direction from each candidate cell,
// try placing additional tiles from hand that extend the line
function mergeMultiTileMoves(singleMoves,hand,board){
  var multiMoves=[];
  // Group single moves by tile type for quick lookup
  var byType={};
  for(var i=0;i<singleMoves.length;i++){
    var m=singleMoves[i];
    var tile=m.placements[0];
    var tk=tile.color+':'+tile.shape;
    if(!byType[tk])byType[tk]=[];
    byType[tk].push(m);
  }

  // For each direction, try to extend with more tiles from hand
  var dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  for(var i=0;i<singleMoves.length;i++){
    var base=singleMoves[i];
    var baseTile=base.placements[0];
    var usedIndices={};usedIndices[base.tileIdx]=true;

    for(var d=0;d<4;d++){
      var dx=dirs[d][0],dy=dirs[d][1];
      var placements=[{x:baseTile.x,y:baseTile.y,color:baseTile.color,shape:baseTile.shape}];
      var usedCopy={};for(var k in usedIndices)usedCopy[k]=usedIndices[k];

      // Try extending in this direction
      var extendable=true;
      while(extendable){
        extendable=false;
        var lastP=placements[placements.length-1];
        var nx=lastP.x+dx,ny=lastP.y+dy;
        if(board[tileKey(nx,ny)])break; // blocked

        // Check what tile would be valid here
        // Determine the line's constraint (same color or same shape)
        var tempBoard2={};
        for(var bb in board)tempBoard2[bb]=board[bb];
        for(var pp=0;pp<placements.length;pp++){
          tempBoard2[tileKey(placements[pp].x,placements[pp].y)]={color:placements[pp].color,shape:placements[pp].shape};
        }

        // Try each unused hand tile
        for(var hi=0;hi<hand.length;hi++){
          if(usedCopy[hi])continue;
          var ht=hand[hi];
          var r=checkLineConstraintsOnBoard(nx,ny,ht.color,ht.shape,tempBoard2);
          if(r.valid&&r.score>0){
            // Check it's in the same line direction
            // Accept the first valid extension
            placements.push({x:nx,y:ny,color:ht.color,shape:ht.shape});
            usedCopy[hi]=true;
            extendable=true;
            break;
          }
        }
      }

      if(placements.length>1){
        // Validate the full placement set
        var fullR=validatePlacementsOnBoard(placements,board);
        if(fullR.valid&&fullR.score>0){
          multiMoves.push({placements:placements.slice(),score:fullR.score,qwirkle:fullR.qwirkle,usedIndices:usedCopy});
        }
      }
    }
  }

  // Combine single and multi, deduplicate by score (keep highest)
  var allMoves=singleMoves.map(function(m){
    return {placements:m.placements,score:m.score,qwirkle:false,usedIndices:(function(){var o={};o[m.tileIdx]=true;return o;})()};
  }).concat(multiMoves);

  return allMoves;
}

// Validate placements on a specific board (not the game board)
function validatePlacementsOnBoard(placements,board){
  if(placements.length===0)return {valid:false,score:0};
  if(placements.length===1){
    var p=placements[0];
    var existing=Object.keys(board).length;
    if(existing===0)return {valid:true,score:1};
    var adj=false;
    var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
    for(var d=0;d<4;d++){
      if(board[tileKey(p.x+dirs[d][0],p.y+dirs[d][1])]){adj=true;break;}
    }
    if(!adj)return {valid:false,score:0};
    return checkLineConstraintsOnBoard(p.x,p.y,p.color,p.shape,board);
  }

  // Multi-tile: temp board
  var tempBoard={};
  for(var key in board)tempBoard[key]=board[key];
  for(var i=0;i<placements.length;i++){
    var k=tileKey(placements[i].x,placements[i].y);
    if(tempBoard[k])return {valid:false,score:0};
    tempBoard[k]={color:placements[i].color,shape:placements[i].shape};
  }
  var totalScore=0,qwirkleBonus=0;
  var scoredLines={};
  for(var i2=0;i2<placements.length;i2++){
    var p2=placements[i2];
    var r2=checkLineConstraintsOnBoard(p2.x,p2.y,p2.color,p2.shape,tempBoard);
    if(!r2.valid)return {valid:false,score:0};
    for(var li=0;li<r2.lines.length;li++){
      var line=r2.lines[li];
      var lk=line.dir+':'+line.key;
      if(!scoredLines[lk]){
        scoredLines[lk]=true;
        totalScore+=line.len;
        if(line.len===6)qwirkleBonus+=6;
      }
    }
  }
  return {valid:true,score:totalScore+qwirkleBonus,qwirkle:qwirkleBonus>0};
}

// AI turn: pick best move
function aiTakeTurn(){
  var moves=findAllValidMoves(G.aiHand,G.board);
  if(moves.length===0){
    // No valid moves: swap or pass
    if(G.bag.length>0){
      // Swap worst tiles
      var toSwap=Math.min(G.aiHand.length,Math.min(3,G.bag.length));
      for(var i=0;i<toSwap;i++){
        var tile=G.aiHand.shift();
        G.bag.unshift(tile); // Put back
      }
      G.bag.sort(function(){return Math.random()-0.5;}); // Shuffle
      refillHand(G.aiHand,G.bag);
      showToast('AI swapped tiles');
      endAITurn(0);
    } else {
      showToast('AI passed');
      endAITurn(0);
    }
    updateUI();
    return;
  }

  // Sort by score
  moves.sort(function(a,b){return b.score-a.score;});

  var chosen;
  if(G.difficulty===0){
    // Easy: pick randomly from top 50%
    var half=Math.max(1,Math.floor(moves.length/2));
    chosen=moves[Math.floor(Math.random()*Math.min(half,moves.length))];
  } else if(G.difficulty===1){
    // Medium: pick top move with 70% probability, else top 3
    if(Math.random()<0.7){
      chosen=moves[0];
    } else {
      chosen=moves[Math.floor(Math.random()*Math.min(3,moves.length))];
    }
  } else {
    // Hard: always best move, prefer Qwirkles
    var qwirkles=moves.filter(function(m){return m.qwirkle;});
    chosen=qwirkles.length>0?qwirkles[0]:moves[0];
  }

  // Apply chosen move
  var score=chosen.score;
  var placedTiles=chosen.placements;

  // Remove used tiles from AI hand
  var newHand=[];
  var usedSet={};
  for(var ui in chosen.usedIndices)usedSet[ui]=true;
  // Match placed tiles to hand indices
  var handCopy=G.aiHand.slice();
  var matched=[];
  for(var pi=0;pi<placedTiles.length;pi++){
    for(var hi2=0;hi2<handCopy.length;hi2++){
      if(handCopy[hi2]&&!usedSet[hi2])continue;
      if(handCopy[hi2]&&handCopy[hi2].color===placedTiles[pi].color&&handCopy[hi2].shape===placedTiles[pi].shape){
        matched.push(hi2);
        handCopy[hi2]=null;
        break;
      }
    }
  }
  // If we didn't match by usedIndices, match by tile content
  if(matched.length<placedTiles.length){
    handCopy=G.aiHand.slice();
    matched=[];
    for(var pi2=0;pi2<placedTiles.length;pi2++){
      for(var hi3=0;hi3<handCopy.length;hi3++){
        if(handCopy[hi3]&&handCopy[hi3].color===placedTiles[pi2].color&&handCopy[hi3].shape===placedTiles[pi2].shape){
          matched.push(hi3);
          handCopy[hi3]=null;
          break;
        }
      }
    }
  }
  G.aiHand=handCopy.filter(function(t){return t!==null;});

  // Place tiles on board with animation
  for(var ai=0;ai<placedTiles.length;ai++){
    var pt=placedTiles[ai];
    G.board[tileKey(pt.x,pt.y)]={color:pt.color,shape:pt.shape,owner:'a'};
    G.animTiles.push({x:pt.x,y:pt.y,color:pt.color,shape:pt.shape,t:0,dur:350});
    G.tilesPlayed++;
    spawnParticles(pt.x,pt.y,COLORS[pt.color].hex);
  }

  G.aiScore+=score;
  if(chosen.qwirkle){
    showToast('AI Qwirkle! +6 Bonus!',2000);
    playSound('qwirkle');
  }
  refillHand(G.aiHand,G.bag);
  endAITurn(score);
}

function endAITurn(score){
  playSound('place');
  updateUI();
  checkGameEnd();
  if(!G.gameOver){
    setTimeout(function(){
      G.turn='player';
      updateUI();
      checkPlayerMoves();
    },600);
  }
}

function checkPlayerMoves(){
  var moves=findAllValidMoves(G.playerHand,G.board);
  if(moves.length===0&&G.bag.length===0){
    // No moves and no bag: player must pass
    showToast('No valid moves — Pass to end');
  } else if(moves.length===0){
    showToast('No valid moves — Swap or Pass');
  }
}

// ==================== Rendering ====================

var boardCanvas,boardCtx,handCanvas,handCtx;

function initCanvas(){
  boardCanvas=document.getElementById('boardCanvas');
  boardCtx=boardCanvas.getContext('2d');
  handCanvas=document.getElementById('handCanvas');
  handCtx=handCanvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
}

function resizeCanvas(){
  var wrap=document.getElementById('boardWrap');
  var ww=wrap.clientWidth-8;
  var wh=wrap.clientHeight-8;
  // Calculate cell size to fit ~10x10 visible grid
  var cs=Math.min(Math.floor(ww/10),Math.floor(wh/10));
  cs=Math.max(28,Math.min(48,cs));
  G.cellSize=cs;
  var bw=cs*10,bh=cs*10;
  boardCanvas.width=bw;
  boardCanvas.height=bh;
  boardCanvas.style.width=bw+'px';
  boardCanvas.style.height=bh+'px';

  // Hand canvas: 6 tiles in a row
  var hw=cs*6+10;
  var hh=cs+10;
  handCanvas.width=hw;
  handCanvas.height=hh;
  handCanvas.style.width=hw+'px';
  handCanvas.style.height=hh+'px';

  render();
}

function drawTileShape(ctx,cx,cy,size,color,shape,alpha){
  alpha=alpha===undefined?1:alpha;
  var half=size/2;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle=color;
  ctx.strokeStyle='rgba(0,0,0,.3)';
  ctx.lineWidth=1.5;

  switch(shape){
    case 0: // circle
      ctx.beginPath();
      ctx.arc(cx,cy,half*0.8,0,Math.PI*2);
      ctx.fill();ctx.stroke();
      break;
    case 1: // square
      var sq=half*0.75;
      ctx.fillRect(cx-sq,cy-sq,sq*2,sq*2);
      ctx.strokeRect(cx-sq,cy-sq,sq*2,sq*2);
      break;
    case 2: // diamond
      ctx.beginPath();
      ctx.moveTo(cx,cy-half*0.85);
      ctx.lineTo(cx+half*0.7,cy);
      ctx.lineTo(cx,cy+half*0.85);
      ctx.lineTo(cx-half*0.7,cy);
      ctx.closePath();
      ctx.fill();ctx.stroke();
      break;
    case 3: // triangle
      ctx.beginPath();
      ctx.moveTo(cx,cy-half*0.8);
      ctx.lineTo(cx+half*0.75,cy+half*0.6);
      ctx.lineTo(cx-half*0.75,cy+half*0.6);
      ctx.closePath();
      ctx.fill();ctx.stroke();
      break;
    case 4: // star (5-point)
      ctx.beginPath();
      var spikes=5,outerR=half*0.85,innerR=half*0.4;
      for(var i=0;i<spikes*2;i++){
        var r=i%2===0?outerR:innerR;
        var a=(Math.PI/spikes)*i-Math.PI/2;
        var px=cx+Math.cos(a)*r,py=cy+Math.sin(a)*r;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.fill();ctx.stroke();
      break;
    case 5: // hexagon
      ctx.beginPath();
      for(var i2=0;i2<6;i2++){
        var a2=(Math.PI/3)*i2-Math.PI/2;
        var px2=cx+Math.cos(a2)*half*0.8,py2=cy+Math.sin(a2)*half*0.8;
        if(i2===0)ctx.moveTo(px2,py2);else ctx.lineTo(px2,py2);
      }
      ctx.closePath();
      ctx.fill();ctx.stroke();
      break;
  }
  ctx.restore();
}

function autoCenterView(){
  // Center the viewport on the placed tiles
  var keys=Object.keys(G.board);
  if(keys.length===0){G.viewX=3;G.viewY=3;return;}
  var minX=99,maxX=-99,minY=99,maxY=-99;
  for(var i=0;i<keys.length;i++){
    var p=keys[i].split(',');
    var x=parseInt(p[0]),y=parseInt(p[1]);
    if(x<minX)minX=x;if(x>maxX)maxX=x;
    if(y<minY)minY=y;if(y>maxY)maxY=y;
  }
  // Also include pending placements
  for(var i2=0;i2<G.pendingPlacements.length;i2++){
    var pp=G.pendingPlacements[i2];
    if(pp.x<minX)minX=pp.x;if(pp.x>maxX)maxX=pp.x;
    if(pp.y<minY)minY=pp.y;if(pp.y>maxY)maxY=pp.y;
  }
  var cx=(minX+maxX)/2,cy=(minY+maxY)/2;
  G.viewX=Math.round(cx-5);
  G.viewY=Math.round(cy-5);
  // Clamp
  G.viewX=Math.max(0,Math.min(BOARD_W-10,G.viewX));
  G.viewY=Math.max(0,Math.min(BOARD_H-10,G.viewY));
}

function render(){
  if(!boardCtx)return;
  var cs=G.cellSize;
  var bw=boardCanvas.width,bh=boardCanvas.height;
  // Clear
  boardCtx.fillStyle='#101025';
  boardCtx.fillRect(0,0,bw,bh);

  // Draw grid
  for(var vy=0;vy<10;vy++){
    for(var vx=0;vx<10;vx++){
      var gx=G.viewX+vx,gy=G.viewY+vy;
      var px=vx*cs,py=vy*cs;
      // Cell background
      boardCtx.fillStyle=(vx+vy)%2===0?'#13132e':'#15152e';
      boardCtx.fillRect(px,py,cs,cs);
      boardCtx.strokeStyle='#1a1a3a';
      boardCtx.lineWidth=0.5;
      boardCtx.strokeRect(px,py,cs,cs);

      // Check if this is a valid placement target (highlight)
      if(G.selectedTile>=0&&G.turn==='player'){
        var tile=G.playerHand[G.selectedTile];
        if(tile){
          // Check if placing here would be valid
          var tempBoard={};
          for(var key in G.board)tempBoard[key]=G.board[key];
          // Include pending placements
          for(var pi=0;pi<G.pendingPlacements.length;pi++){
            var pp=G.pendingPlacements[pi];
            tempBoard[tileKey(pp.x,pp.y)]={color:pp.color,shape:pp.shape};
          }
          if(!tempBoard[tileKey(gx,gy)]){
            var r=checkLineConstraintsOnBoard(gx,gy,tile.color,tile.shape,tempBoard);
            if(r.valid&&r.score>0){
              // Draw subtle highlight
              boardCtx.fillStyle='rgba(92,111,255,0.1)';
              boardCtx.fillRect(px,py,cs,cs);
              boardCtx.strokeStyle='rgba(92,111,255,0.3)';
              boardCtx.lineWidth=1;
              boardCtx.strokeRect(px+1,py+1,cs-2,cs-2);
            }
          }
        }
      }

      // Draw placed tile
      var cell=G.board[tileKey(gx,gy)];
      if(cell){
        var alpha=1;
        // Check animation
        for(var ai=0;ai<G.animTiles.length;ai++){
          var at=G.animTiles[ai];
          if(at.x===gx&&at.y===gy){
            alpha=at.t/at.dur;
            alpha=Math.min(1,alpha);
          }
        }
        var pad=Math.max(2,cs*0.08);
        // Tile background
        roundRect(boardCtx,px+pad,py+pad,cs-pad*2,cs-pad*2,4);
        boardCtx.fillStyle='rgba(255,255,255,0.92)';
        boardCtx.globalAlpha=alpha;
        boardCtx.fill();
        boardCtx.strokeStyle='rgba(0,0,0,0.15)';
        boardCtx.lineWidth=1;
        boardCtx.stroke();
        boardCtx.globalAlpha=1;
        // Shape
        drawTileShape(boardCtx,px+cs/2,py+cs/2,cs-pad*2,COLORS[cell.color].hex,cell.shape,alpha);
      }
    }
  }

  // Draw pending placements (player's unconfirmed tiles)
  for(var pi2=0;pi2<G.pendingPlacements.length;pi2++){
    var pp2=G.pendingPlacements[pi2];
    var sx=pp2.x-G.viewX,sy=pp2.y-G.viewY;
    if(sx>=0&&sx<10&&sy>=0&&sy<10){
      var px2=sx*cs,py2=sy*cs;
      var pad2=Math.max(2,cs*0.08);
      roundRect(boardCtx,px2+pad2,py2+pad2,cs-pad2*2,cs-pad2*2,4);
      boardCtx.fillStyle='rgba(255,255,255,0.7)';
      boardCtx.fill();
      boardCtx.strokeStyle='#5c6fff';
      boardCtx.lineWidth=2;
      boardCtx.setLineDash([4,3]);
      boardCtx.stroke();
      boardCtx.setLineDash([]);
      drawTileShape(boardCtx,px2+cs/2,py2+cs/2,cs-pad2*2,COLORS[pp2.color].hex,pp2.shape,0.7);
    }
  }

  // Draw hint highlight
  if(G.hintCell){
    var hx=G.hintCell.x-G.viewX,hy=G.hintCell.y-G.viewY;
    if(hx>=0&&hx<10&&hy>=0&&hy<10){
      var hpx=hx*cs,hpy=hy*cs;
      boardCtx.strokeStyle='#2ecc71';
      boardCtx.lineWidth=3;
      boardCtx.setLineDash([6,3]);
      boardCtx.strokeRect(hpx+2,hpy+2,cs-4,cs-4);
      boardCtx.setLineDash([]);
    }
  }

  // Draw particles
  for(var i3=0;i3<G.particles.length;i3++){
    var pt=G.particles[i3];
    var ppx=pt.x-G.viewX,ppy=pt.y-G.viewY;
    if(ppx>=0&&ppx<10&&ppy>=0&&ppy<10){
      boardCtx.globalAlpha=pt.life;
      boardCtx.fillStyle=pt.color;
      boardCtx.beginPath();
      boardCtx.arc(ppx*cs+cs/2+pt.dx,ppy*cs+cs/2+pt.dy,pt.size,0,Math.PI*2);
      boardCtx.fill();
      boardCtx.globalAlpha=1;
    }
  }

  // Draw scroll indicators
  drawScrollIndicators();

  // Render hand
  renderHand();
}

function renderHand(){
  var cs=G.cellSize;
  var hw=handCanvas.width,hh=handCanvas.height;
  handCtx.clearRect(0,0,hw,hh);
  handCtx.fillStyle='#12122e';
  handCtx.fillRect(0,0,hw,hh);

  var pad=5;
  var tileSize=cs;
  for(var i=0;i<G.playerHand.length;i++){
    var tile=G.playerHand[i];
    var x=pad+i*(tileSize+2);
    var y=pad;
    var isSelected=G.selectedTile===i;

    // Tile background
    roundRect(handCtx,x,y,tileSize,tileSize,5);
    if(isSelected){
      handCtx.fillStyle='#3c3c8e';
    } else {
      handCtx.fillStyle='rgba(255,255,255,0.9)';
    }
    handCtx.fill();
    handCtx.strokeStyle=isSelected?'#5c6fff':'rgba(0,0,0,0.15)';
    handCtx.lineWidth=isSelected?2.5:1;
    handCtx.stroke();

    // Shape
    drawTileShape(handCtx,x+tileSize/2,y+tileSize/2,tileSize-6,COLORS[tile.color].hex,tile.shape);

    // Check if tile is used in pending placements
    var used=false;
    for(var pi=0;pi<G.pendingPlacements.length;pi++){
      if(G.pendingPlacements[pi].handIdx===i){used=true;break;}
    }
    if(used){
      handCtx.globalAlpha=0.3;
      handCtx.fillStyle='#000';
      handCtx.fillRect(x,y,tileSize,tileSize);
      handCtx.globalAlpha=1;
    }
  }

  // Show AI hand count
  if(G.turn==='ai'){
    handCtx.fillStyle='rgba(255,107,107,0.05)';
    handCtx.fillRect(0,0,hw,hh);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawScrollIndicators(){
  // Left/right/up/down arrows if more board exists
  var cs=G.cellSize;
  var bw=boardCanvas.width,bh=boardCanvas.height;
  boardCtx.fillStyle='rgba(124,131,255,0.3)';
  if(G.viewX>0){
    boardCtx.beginPath();
    boardCtx.moveTo(5,bh/2);
    boardCtx.lineTo(15,bh/2-8);
    boardCtx.lineTo(15,bh/2+8);
    boardCtx.closePath();boardCtx.fill();
  }
  if(G.viewX<BOARD_W-10){
    boardCtx.beginPath();
    boardCtx.moveTo(bw-5,bh/2);
    boardCtx.lineTo(bw-15,bh/2-8);
    boardCtx.lineTo(bw-15,bh/2+8);
    boardCtx.closePath();boardCtx.fill();
  }
  if(G.viewY>0){
    boardCtx.beginPath();
    boardCtx.moveTo(bw/2,5);
    boardCtx.lineTo(bw/2-8,15);
    boardCtx.lineTo(bw/2+8,15);
    boardCtx.closePath();boardCtx.fill();
  }
  if(G.viewY<BOARD_H-10){
    boardCtx.beginPath();
    boardCtx.moveTo(bw/2,bh-5);
    boardCtx.lineTo(bw/2-8,bh-15);
    boardCtx.lineTo(bw/2+8,bh-15);
    boardCtx.closePath();boardCtx.fill();
  }
}

function spawnParticles(gx,gy,color){
  var cs=G.cellSize;
  var cx=(gx-G.viewX)*cs+cs/2;
  var cy=(gy-G.viewY)*cs+cs/2;
  for(var i=0;i<8;i++){
    var a=(Math.PI*2/8)*i;
    G.particles.push({
      x:gx,y:gy,
      dx:0,dy:0,
      vx:Math.cos(a)*2,vy:Math.sin(a)*2,
      color:color,size:3+Math.random()*2,
      life:1
    });
  }
}

function updateParticles(){
  for(var i=G.particles.length-1;i>=0;i--){
    var p=G.particles[i];
    p.dx+=p.vx;p.dy+=p.vy;
    p.vx*=0.9;p.vy*=0.9;
    p.life-=0.04;
    if(p.life<=0)G.particles.splice(i,1);
  }
}

function updateAnims(){
  for(var i=G.animTiles.length-1;i>=0;i--){
    var at=G.animTiles[i];
    at.t+=16;
    if(at.t>=at.dur)G.animTiles.splice(i,1);
  }
}

// ==================== Input ====================

function initInput(){
  // Board click
  boardCanvas.addEventListener('pointerdown',onBoardClick);
  boardCanvas.addEventListener('pointermove',onBoardMove);
  // Swipe to scroll
  var dragStart=null;
  boardCanvas.addEventListener('pointerdown',function(e){
    dragStart={x:e.clientX,y:e.clientY,vx:G.viewX,vy:G.viewY};
  });
  boardCanvas.addEventListener('pointerup',function(e){
    dragStart=null;
  });
  // Hand click
  handCanvas.addEventListener('pointerdown',onHandClick);
}

var isDragging=false;
function onBoardMove(e){
  // Handle scroll by drag if pressing empty space (not implemented for simplicity)
}

function onBoardClick(e){
  if(G.turn!=='player'||G.gameOver)return;
  var rect=boardCanvas.getBoundingClientRect();
  var px=(e.clientX-rect.left);
  var py=(e.clientY-rect.top);
  var cs=G.cellSize;
  var vx=Math.floor(px/cs),vy=Math.floor(py/cs);
  var gx=G.viewX+vx,gy=G.viewY+vy;

  // Check scroll arrows
  var bw=boardCanvas.width,bh=boardCanvas.height;
  if(px<18&&G.viewX>0){G.viewX--;render();return;}
  if(px>bw-18&&G.viewX<BOARD_W-10){G.viewX++;render();return;}
  if(py<18&&G.viewY>0){G.viewY--;render();return;}
  if(py>bh-18&&G.viewY<BOARD_H-10){G.viewY++;render();return;}

  if(G.selectedTile<0){
    showToast('Select a tile from your hand first');
    return;
  }

  var tile=G.playerHand[G.selectedTile];
  if(!tile)return;

  // Check if cell already has a pending placement
  for(var i=0;i<G.pendingPlacements.length;i++){
    if(G.pendingPlacements[i].x===gx&&G.pendingPlacements[i].y===gy){
      // Remove pending placement
      G.pendingPlacements.splice(i,1);
      render();
      updateButtons();
      return;
    }
  }

  // Check if cell is occupied
  if(G.board[tileKey(gx,gy)]){
    showToast('Cell occupied');
    return;
  }

  // Try to place
  var tempBoard={};
  for(var key in G.board)tempBoard[key]=G.board[key];
  for(var pi=0;pi<G.pendingPlacements.length;pi++){
    var pp=G.pendingPlacements[pi];
    tempBoard[tileKey(pp.x,pp.y)]={color:pp.color,shape:pp.shape};
  }

  // Check if this tile is already used in pending
  for(var pi2=0;pi2<G.pendingPlacements.length;pi2++){
    if(G.pendingPlacements[pi2].handIdx===G.selectedTile){
      showToast('Tile already placed — tap it to return');
      return;
    }
  }

  var r=checkLineConstraintsOnBoard(gx,gy,tile.color,tile.shape,tempBoard);
  if(!r.valid){
    showToast(r.msg||'Invalid placement');
    playSound('error');
    return;
  }

  // Add to pending placements
  G.pendingPlacements.push({x:gx,y:gy,color:tile.color,shape:tile.shape,handIdx:G.selectedTile});
  playSound('select');
  // Auto-center view if placement is near edge
  autoCenterView();
  render();
  updateButtons();
}

function onHandClick(e){
  if(G.gameOver)return;
  var rect=handCanvas.getBoundingClientRect();
  var px=e.clientX-rect.left;
  var cs=G.cellSize;
  var pad=5;
  var idx=Math.floor((px-pad)/(cs+2));
  if(idx<0||idx>=G.playerHand.length)return;

  // Check if tile is used in pending
  for(var i=0;i<G.pendingPlacements.length;i++){
    if(G.pendingPlacements[i].handIdx===idx){
      // Remove all pending placements from this tile
      G.pendingPlacements=G.pendingPlacements.filter(function(p){return p.handIdx!==idx;});
      render();
      updateButtons();
      return;
    }
  }

  G.selectedTile=G.selectedTile===idx?-1:idx;
  playSound('tap');
  render();
  updateButtons();
}

// ==================== Game Actions ====================

window.confirmPlacement=function(){
  if(G.pendingPlacements.length===0)return;
  var r=validatePlacements(G.pendingPlacements);
  if(!r.valid){
    showToast(r.msg||'Invalid placement');
    playSound('error');
    return;
  }

  // Save state for undo
  G.history.push({
    playerScore:G.playerScore,
    boardKeys:Object.keys(G.board).map(function(k){return {key:k,val:JSON.parse(JSON.stringify(G.board[k]))};}),
    playerHand:G.playerHand.slice(),
    bagLength:G.bag.length,
    tilesPlayed:G.tilesPlayed
  });

  // Apply placements
  var placements=G.pendingPlacements.slice();
  var usedIndices={};
  for(var i=0;i<placements.length;i++){
    G.board[tileKey(placements[i].x,placements[i].y)]={color:placements[i].color,shape:placements[i].shape,owner:'p'};
    usedIndices[placements[i].handIdx]=true;
    G.animTiles.push({x:placements[i].x,y:placements[i].y,color:placements[i].color,shape:placements[i].shape,t:0,dur:350});
    G.tilesPlayed++;
    spawnParticles(placements[i].x,placements[i].y,COLORS[placements[i].color].hex);
  }

  // Remove used tiles from hand
  G.playerHand=G.playerHand.filter(function(t,idx){return !usedIndices[idx];});
  // Refill
  refillHand(G.playerHand,G.bag);

  G.playerScore+=r.score;
  G.pendingPlacements=[];
  G.selectedTile=-1;
  G.hintCell=null;

  if(r.qwirkle){
    showToast('QWIRKLE! +6 Bonus!',2000);
    playSound('qwirkle');
  } else {
    showToast('+'+r.score+' points');
    playSound('place');
  }

  updateUI();
  checkGameEnd();

  if(!G.gameOver){
    G.turn='ai';
    updateUI();
    setTimeout(function(){aiTakeTurn();},800);
  }
};

window.swapTiles=function(){
  if(G.turn!=='player'||G.gameOver)return;
  if(G.bag.length===0){showToast('Bag is empty');return;}
  if(G.pendingPlacements.length>0){showToast('Undo pending tiles first');return;}

  // Swap selected tile or all tiles if none selected
  if(G.selectedTile>=0){
    var tile=G.playerHand[G.selectedTile];
    G.bag.push(tile);
    // Shuffle bag
    var bi=Math.floor(Math.random()*G.bag.length);
    var tmp=G.bag[bi];G.bag[bi]=G.bag[G.bag.length-1];G.bag[G.bag.length-1]=tmp;
    G.playerHand[G.selectedTile]=drawTile(G.bag);
    G.selectedTile=-1;
    showToast('Swapped 1 tile');
  } else {
    // Swap all tiles
    for(var i=0;i<G.playerHand.length;i++){
      G.bag.push(G.playerHand[i]);
    }
    G.bag.sort(function(){return Math.random()-0.5;});
    G.playerHand=[];
    refillHand(G.playerHand,G.bag);
    showToast('Swapped all tiles');
  }
  playSound('swap');
  updateUI();

  // Swap counts as a turn
  G.turn='ai';
  updateUI();
  setTimeout(function(){aiTakeTurn();},800);
};

window.passTurn=function(){
  if(G.turn!=='player'||G.gameOver)return;
  // Check if player actually has valid moves
  var moves=findAllValidMoves(G.playerHand,G.board);
  if(moves.length>0){
    showToast('You have valid moves — play or swap instead');
    return;
  }
  showToast('Passed');
  G.turn='ai';
  updateUI();
  setTimeout(function(){aiTakeTurn();},800);
};

window.undoMove=function(){
  if(G.history.length===0){showToast('Nothing to undo');return;}
  if(G.turn!=='player'){showToast('Wait for your turn');return;}
  var prev=G.history.pop();
  G.playerScore=prev.playerScore;
  // Restore board
  G.board={};
  for(var i=0;i<prev.boardKeys.length;i++){
    G.board[prev.boardKeys[i].key]=prev.boardKeys[i].val;
  }
  G.playerHand=prev.playerHand;
  // Can't restore exact bag, but at least length
  // (This is a simplification — full undo would restore bag state)
  G.tilesPlayed=prev.tilesPlayed;
  G.pendingPlacements=[];
  G.selectedTile=-1;
  showToast('Move undone');
  playSound('tap');
  updateUI();
};

window.restartGame=function(){
  startLevel(G.level);
};

window.toggleSound=function(){

// ==================== Progress Save ====================

function loadProgress(){
  try{
    var raw=localStorage.getItem('qwirkle_progress');
    if(raw)return JSON.parse(raw);
  }catch(e){}
  return {maxLevel:1,stars:{},bestScores:{}};
}
function saveProgress(){
  try{
    localStorage.setItem('qwirkle_progress',JSON.stringify({
      maxLevel:G.progress.maxLevel,
      stars:G.progress.stars,
      bestScores:G.progress.bestScores
    }));
  }catch(e){}
}

// ==================== Game Flow ====================

function startGame(){
  G.board={};
  G.bag=makeBag();
  G.playerHand=[];
  G.aiHand=[];
  G.playerScore=0;
  G.aiScore=0;
  G.turn='player';
  G.selectedTile=-1;
  G.pendingPlacements=[];
  G.gameOver=false;
  G.bagEmpty=false;
  G.tilesPlayed=0;
  G.history=[];
  G.particles=[];
  G.animTiles=[];
  G.hintCell=null;
  G.viewX=3;G.viewY=3;

  // Give starting tiles
  refillHand(G.playerHand,G.bag);
  refillHand(G.aiHand,G.bag);

  G.progress=loadProgress();

  updateUI();
  autoCenterView();
  render();

  // Start music if enabled
  if(G.musicOn)startBGM();
}

function startLevel(lv){
  G.level=lv;
  G.difficulty=Math.min(2,Math.floor((lv-1)/10));
  closeModal();
  startGame();
}

function checkGameEnd(){
  if(G.bag.length===0){
    G.bagEmpty=true;
    if(G.playerHand.length===0){
      G.playerScore+=6;
      endGame('You used all your tiles! +6 bonus');
    } else if(G.aiHand.length===0){
      G.aiScore+=6;
      endGame('AI used all tiles');
    }
  }
  // Check stalemate
  if(G.bagEmpty){
    var pMoves=findAllValidMoves(G.playerHand,G.board);
    var aMoves=findAllValidMoves(G.aiHand,G.board);
    if(pMoves.length===0&&aMoves.length===0){
      endGame('No more valid moves');
    }
  }
}

function endGame(msg){
  G.gameOver=true;
  stopBGM();
  playSound('end');

  // Calculate stars
  var stars=0;
  if(G.playerScore>G.aiScore)stars=1;
  if(G.playerScore>G.aiScore*1.2)stars=2;
  if(G.playerScore>G.aiScore*1.5)stars=3;

  // Save progress
  G.progress=loadProgress();
  if(!G.progress.stars)G.progress.stars={};
  if(!G.progress.bestScores)G.progress.bestScores={};
  var prevStars=G.progress.stars[G.level]||0;
  if(stars>prevStars)G.progress.stars[G.level]=stars;
  if(!G.progress.bestScores[G.level]||G.playerScore>G.progress.bestScores[G.level]){
    G.progress.bestScores[G.level]=G.playerScore;
  }
  if(stars>=1&&G.level>=G.progress.maxLevel&&G.level<30){
    G.progress.maxLevel=Math.min(30,G.level+1);
  }
  saveProgress();

  var win=G.playerScore>G.aiScore;
  var title=win?'You Win!':'AI Wins';
  var modal=document.getElementById('modalContent');
  modal.innerHTML='<h2 style="color:'+(win?'#2ecc71':'#e74c3c')+'">'+title+'</h2>'+
    '<p style="font-size:14px;margin-bottom:8px;">'+msg+'</p>'+
    '<div style="display:flex;justify-content:space-around;margin:12px 0;">'+
    '<div style="text-align:center;"><div style="color:#5c6fff;font-size:24px;font-weight:bold;">'+G.playerScore+'</div><div style="color:#667;font-size:11px;">YOU</div></div>'+
    '<div style="text-align:center;"><div style="color:#ff6b6b;font-size:24px;font-weight:bold;">'+G.aiScore+'</div><div style="color:#667;font-size:11px;">AI</div></div>'+
    '</div>'+
    '<div style="text-align:center;font-size:28px;margin:8px 0;">'+
    (stars>=1?'\u2605':'\u2606')+(stars>=2?'\u2605':'\u2606')+(stars>=3?'\u2605':'\u2606')+
    '</div>'+
    '<button class="closeBtn" onclick="closeModal();startLevel('+(G.level+1<=30?G.level+1:G.level)+')" style="margin-bottom:6px;">Next Level</button>'+
    '<button class="closeBtn" onclick="closeModal();startLevel('+G.level+')">Retry</button>'+
    '<button class="closeBtn" onclick="closeModal();showLevels()">Level Select</button>';
  document.getElementById('modalBg').classList.add('show');
}

function updateUI(){
  document.getElementById('playerScore').textContent=G.playerScore;
  document.getElementById('aiScore').textContent=G.aiScore;
  document.getElementById('bagCount').textContent=G.bag.length;

  var tl=document.getElementById('turnLabel');
  if(G.gameOver){
    tl.textContent='Game Over';
  } else if(G.turn==='player'){
    var diff=['Easy','Medium','Hard'][G.difficulty];
    tl.textContent='Your Turn (Level '+G.level+' / '+diff+' AI) — Tap a tile, then the board';
  } else {
    tl.textContent='AI is thinking...';
  }

  // Active score card highlight
  document.getElementById('playerScoreCard').classList.toggle('active',G.turn==='player'&&!G.gameOver);
  document.getElementById('aiScoreCard').classList.toggle('active',G.turn==='ai'&&!G.gameOver);

  updateButtons();
}

function updateButtons(){
  var placeBtn=document.getElementById('placeBtn');
  var swapBtn=document.getElementById('swapBtn');
  var passBtn=document.getElementById('passBtn');
  var undoBtn=document.getElementById('undoBtn');
  var canAct=G.turn==='player'&&!G.gameOver;

  placeBtn.disabled=!canAct||G.pendingPlacements.length===0;
  swapBtn.disabled=!canAct||G.bag.length===0||G.pendingPlacements.length>0;
  passBtn.disabled=!canAct;
  undoBtn.disabled=!canAct||G.history.length===0;
}

function showToast(msg,duration){
  var toast=document.getElementById('toast');
  toast.textContent=msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer=setTimeout(function(){toast.classList.remove('show');},duration||1200);
}

// ==================== Audio ====================

function initAudio(){
  try{
    G.audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }catch(e){}
}

function playSound(type){
  if(!G.soundOn||!G.audioCtx)return;
  var ctx=G.audioCtx;
  var now=ctx.currentTime;
  var osc=ctx.createOscillator();
  var gain=ctx.createGain();
  osc.connect(gain);gain.connect(ctx.destination);

  switch(type){
    case 'tap': osc.frequency.value=600;gain.gain.setValueAtTime(0.08,now);break;
    case 'select': osc.frequency.value=800;gain.gain.setValueAtTime(0.1,now);break;
    case 'place': osc.frequency.value=500;gain.gain.setValueAtTime(0.12,now);break;
    case 'swap': osc.frequency.value=400;gain.gain.setValueAtTime(0.1,now);break;
    case 'error': osc.frequency.value=200;osc.type='sawtooth';gain.gain.setValueAtTime(0.08,now);break;
    case 'qwirkle':
      // Multi-note fanfare
      [523,659,784,1047].forEach(function(f,i){
        var o=ctx.createOscillator();var g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=f;
        g.gain.setValueAtTime(0,i*0.08+now);
        g.gain.linearRampToValueAtTime(0.1,i*0.08+now+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,i*0.08+now+0.3);
        o.start(i*0.08+now);o.stop(i*0.08+now+0.3);
      });
      return;
    case 'end':
      [440,330,220].forEach(function(f,i){
        var o2=ctx.createOscillator();var g2=ctx.createGain();
        o2.connect(g2);g2.connect(ctx.destination);
        o2.frequency.value=f;
        g2.gain.setValueAtTime(0,i*0.15+now);
        g2.gain.linearRampToValueAtTime(0.1,i*0.15+now+0.02);
        g2.gain.exponentialRampToValueAtTime(0.001,i*0.15+now+0.4);
        o2.start(i*0.15+now);o2.stop(i*0.15+now+0.4);
      });
      return;
  }
  gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);
  osc.start(now);
  osc.stop(now+0.15);
}

function startBGM(){
  if(!G.audioCtx||!G.musicOn||G.bgmNodes.length>0)return;
  try{
    var sr=G.audioCtx.sampleRate;
    var dur=16;var bufSize=sr*dur;
    var buf=G.audioCtx.createBuffer(1,bufSize,sr);
    var d=buf.getChannelData(0);
    var chords=[[261.63,329.63,392.00],[293.66,369.99,440.00],[329.63,415.30,493.88],[293.66,369.99,440.00]];
    var chordDur=dur/chords.length;
    for(var i=0;i<bufSize;i++){
      var t=i/sr;
      var ci=Math.min(Math.floor(t/chordDur),chords.length-1);
      var chord=chords[ci];
      var s=0;
      for(var n=0;n<chord.length;n++){
        var f=chord[n];
        s+=Math.sin(2*Math.PI*f*t)*0.05;
        s+=Math.sin(2*Math.PI*f*2*t)*0.012;
        s+=Math.sin(2*Math.PI*f*0.5*t)*0.025;
      }
      var fade=t%chordDur;
      var fadeIn=Math.min(fade/0.8,1);
      var fadeOut=Math.min((chordDur-fade)/0.8,1);
      s*=fadeIn*fadeOut;
      var lfo=Math.sin(2*Math.PI*0.25*t)*0.12+1;
      d[i]=s*lfo*0.5;
    }
    var src=G.audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
    var filt=G.audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=800;filt.Q.value=1;
    var g=G.audioCtx.createGain();g.gain.value=G.musicOn?0.2:0;
    src.connect(filt);filt.connect(g);g.connect(G.audioCtx.destination);
    src.start();
    G.bgmNodes=[src,filt,g];
  }catch(e){}
}

function stopBGM(){
  if(G.bgmNodes.length>0){
    try{
      G.bgmNodes[0].stop();
    }catch(e){}
    G.bgmNodes=[];
  }
}

// ==================== Cleanup ====================

function cleanup(){
  if(G.rafId)cancelAnimationFrame(G.rafId);
  stopBGM();
  if(G.audioCtx){G.audioCtx.close().catch(function(){});G.audioCtx=null;}
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    if(G.rafId){cancelAnimationFrame(G.rafId);G.rafId=null;}
    stopBGM();
  } else if(!G.gameOver){
    G.rafId=requestAnimationFrame(gameLoop);
    if(G.musicOn)startBGM();
  }
});

// ==================== Game Loop ====================

function gameLoop(){
  updateParticles();
  updateAnims();
  render();
  G.rafId=requestAnimationFrame(gameLoop);
}

// ==================== Init ====================

function init(){
  initCanvas();
  initInput();
  initAudio();
  startGame();
  gameLoop();

  // Hide loading
  setTimeout(function(){
    document.getElementById('loading').classList.add('hide');
  },300);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}

})();
