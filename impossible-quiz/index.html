{q:"I'm tall when I'm young and short when I'm old. What am I?",a:["A tree","A person","A candle","A giraffe"],c:2,type:"normal",bomb:true},
{q:"What has an eye but cannot see anything?",a:["A needle","A potato","A hurricane","All of the above"],c:3,type:"normal"},
{q:"What can you break without ever touching it?",a:["Glass","A promise","A heart","A record"],c:1,type:"normal"},
{q:"What is the answer to life, the universe, and everything?",a:["Love","42","God","There is no answer"],c:1,type:"normal"},
];

function showStreak(text){const el=document.createElement('div');el.className='streak-popup';el.textContent=text;document.body.appendChild(el);setTimeout(()=>el.remove(),1000)}
function flash(color){const el=document.createElement('div');el.className='screen-flash';el.style.background=color;document.body.appendChild(el);setTimeout(()=>el.remove(),300)}
function shake(){const g=$('game');g.classList.add('shake');setTimeout(()=>g.classList.remove('shake'),400)}

function showQuestion(){
cleanup();
specialEl.innerHTML='';answersEl.innerHTML='';
if(state.qi>=TOTAL_Q){showVictory();return}
const qd=QUESTIONS[state.qi];
qText.textContent=qd.q;
bombEl.classList.add('hidden');
updateHUD();renderLives();

if(qd.bomb){
state.bombLeft=BOMB_TIME;bombEl.classList.remove('hidden');bombEl.textContent='💣 '+BOMB_TIME;
state.bombTimer=addInterval(()=>{
state.bombLeft--;bombEl.textContent='💣 '+state.bombLeft;
if(state.bombLeft<=3)sfxBomb();
if(state.bombLeft<=0){clearInterval(state.bombTimer);loseLife();showQuestion()}
},1000);
}

if(qd.type==='normal'||qd.type===undefined){
renderNormalAnswers(qd);
}
}

function renderNormalAnswers(qd){
const letters=['A','B','C','D'];
qd.a.forEach((ans,i)=>{
const btn=document.createElement('button');btn.className='answer-btn';
btn.innerHTML='<strong>'+letters[i]+'.</strong> '+ans;
regClick(btn,()=>handleAnswer(i,qd));
answersEl.appendChild(btn);
});
}

function handleAnswer(idx,qd){
const now=Date.now();if(now-state.lastClick<DEBOUNCE)return;state.lastClick=now;
if(state.bombTimer){clearInterval(state.bombTimer);state.bombTimer=null}
const correct=idx===qd.c;
const btns=answersEl.querySelectorAll('.answer-btn');
if(correct){
btns[idx].classList.add('correct');
sfxCorrect();state.score+=10+state.streak*2;state.streak++;state.answered++;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
if(state.streak>=3)showStreak(state.streak+'x Streak!');
flash('rgba(0,255,136,0.15)');
}else{
btns[idx].classList.add('wrong');btns[qd.c].classList.add('correct');
sfxWrong();state.streak=0;shake();flash('rgba(255,0,110,0.15)');loseLife();
}
state.qi++;
addTimer(()=>showQuestion(),correct?600:1000);
}

function loseLife(){state.lives--;renderLives();if(state.lives<=0)addTimer(()=>gameOver(),800)}

function gameOver(){
cleanup();showScreen('gameover-screen');
$('final-score').textContent=state.score;
$('stat-answered').textContent=state.answered;
$('stat-streak').textContent=state.bestStreak;
saveScore(state.score);
const sv=loadSave();$('go-best').textContent=sv?'Best Score: '+sv.best:'';
}

function showVictory(){
cleanup();sfxVictory();showScreen('victory-screen');
$('v-score').textContent=state.score;
$('v-answered').textContent=state.answered;
$('v-streak').textContent=state.bestStreak;
saveScore(state.score);
const sv=loadSave();$('v-best').textContent=sv?'Best Score: '+sv.best:'';
}

function startGame(){
cleanup();resetState();showScreen('question-screen');showQuestion();
}

regClick($('play-btn'),startGame);
regClick($('retry-btn'),startGame);
regClick($('replay-btn'),startGame);
regClick(skipBtn,()=>{
const avail=Math.floor(state.answered/SKIP_EVERY)-state.skipUsed;
if(avail<=0)return;
state.skipUsed++;state.qi++;
if(state.bombTimer){clearInterval(state.bombTimer);state.bombTimer=null}
sfxSkip();showQuestion();
});

const sv=loadSave();
if(sv)$('start-best').textContent='Best Score: '+sv.best;

// Background particles
const bgCanvas=$('bg');const ctx2=bgCanvas.getContext('2d');
let particles=[];function initParticles(){
bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight;
particles=[];for(let i=0;i<50;i++){particles.push({x:Math.random()*bgCanvas.width,y:Math.random()*bgCanvas.height,r:Math.random()*2+0.5,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,a:Math.random()*0.3+0.05})}}
function drawParticles(){
ctx2.clearRect(0,0,bgCanvas.width,bgCanvas.height);
particles.forEach(p=>{
ctx2.beginPath();ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx2.fillStyle='rgba(0,212,255,'+p.a+')';ctx2.fill();
p.x+=p.vx;p.y+=p.vy;
if(p.x<0)p.x=bgCanvas.width;if(p.x>bgCanvas.width)p.x=0;
if(p.y<0)p.y=bgCanvas.height;if(p.y>bgCanvas.height)p.y=0;
});
rafId=requestAnimationFrame(drawParticles);
}
initParticles();drawParticles();
window.addEventListener('resize',initParticles);
})();
</script>
</body>
