<script type="application/ld+json">{"@context":"https://schema.org","@type":"VideoGame","name":"Paper.io","description":"Capture territory by drawing trails and claiming space in this io-style arcade game with 30 levels and smart AI opponents.","genre":"Arcade,IO","gamePlatform":"Web Browser","applicationCategory":"Game","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD","availability":"https://schema.org/InStock"}}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do you play Paper.io?","acceptedAnswer":{"@type":"Answer","text":"Move your colored block around the grid using arrow keys or swipe. Leave your territory to draw a trail, then return to your territory to fill in the area. Avoid crossing other players' trails!"}},{"@type":"Question","name":"What happens if someone crosses my trail?","acceptedAnswer":{"@type":"Answer","text":"If an opponent (or you cross their trail) crosses your trail while you're outside your territory, you die and lose a life. Protect your trail by returning quickly."}},{"@type":"Question","name":"How do I win a level?","acceptedAnswer":{"@type":"Answer","text":"Each level has a target territory percentage to capture. Reach that percentage while surviving to complete the level. Higher levels require more territory and face tougher AI opponents."}}]}</script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"HowTo","name":"How to Play Paper.io","step":[{"@type":"HowToStep","text":"Use arrow keys or WASD to move your block in any direction."},{"@type":"HowToStep","text":"Leave your territory (colored area) to start drawing a trail."},{"@type":"HowToStep","text":"Return to your territory to fill in the area your trail enclosed."},{"@type":"HowToStep","text":"Avoid crossing other players' trails and protect your own trail from being crossed."},{"@type":"HowToStep","text":"Capture the target percentage of territory to complete each level."}]}</script>

.btn-secondary{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)}
.btn-secondary:hover{background:rgba(255,255,255,0.2)}
.hud{position:absolute;top:0;left:0;width:100%;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:5;pointer-events:none;font-size:14px}
.hud-item{background:rgba(10,10,26,0.7);padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(4px);font-weight:600}
.hud-item span{color:#00f0ff}
.level-info{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:6;pointer-events:none;opacity:0;transition:opacity 0.4s}
.level-info.show{opacity:1}
.level-info h2{font-size:clamp(20px,5vw,36px);color:#fff;font-weight:800}
.level-info p{color:#aaa;margin-top:6px}
.skin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;max-width:280px}
.skin-btn{width:60px;height:60px;border-radius:12px;border:3px solid transparent;cursor:pointer;transition:border-color 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center}
.skin-btn.active{border-color:#00f0ff;transform:scale(1.1)}
.skin-btn.locked{opacity:0.4;cursor:not-allowed}
.skin-color{width:36px;height:36px;border-radius:6px}
.settings-row{display:flex;gap:16px;margin:12px 0;align-items:center}
.settings-row label{color:#aaa;font-size:14px}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.15);cursor:pointer;position:relative;transition:background 0.2s}
.toggle.on{background:#7b2dff}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left 0.2s}
.toggle.on::after{left:23px}
.death-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,50,50,0.3);z-index:4;pointer-events:none;opacity:0;transition:opacity 0.2s}
.death-flash.show{opacity:1}
.capture-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,240,255,0.1);z-index:4;pointer-events:none;opacity:0;transition:opacity 0.2s}
.capture-flash.show{opacity:1}
@media(max-width:500px){.hud{padding:6px 10px;font-size:12px}.hud-item{padding:4px 10px}.btn{padding:12px 32px;font-size:16px}}
</style>
</head>

<div class="title">PAPER.IO</div>
<div class="subtitle">Capture territory. Outsmart rivals.</div>
<button class="btn btn-primary" id="btn-play">Play</button>
<button class="btn btn-secondary" id="btn-skins">Skins</button>
<button class="btn btn-secondary" id="btn-settings">Settings</button>
</div>

<div class="overlay hidden" id="skins-screen">
<div class="title" style="font-size:clamp(22px,5vw,32px)">SKINS</div>
<div class="skin-grid" id="skin-grid"></div>
<button class="btn btn-secondary" id="btn-skins-back">Back</button>
</div>

<div class="overlay hidden" id="settings-screen">
<div class="title" style="font-size:clamp(22px,5vw,32px)">SETTINGS</div>
<div class="settings-row">
<label>Sound</label>
<div class="toggle on" id="tog-sound"></div>
</div>
<div class="settings-row">
<label>Music</label>
<div class="toggle on" id="tog-music"></div>
</div>
<button class="btn btn-secondary" id="btn-settings-back">Back</button>
</div>

<div class="overlay hidden" id="level-screen">
<div class="title" style="font-size:clamp(22px,5vw,32px)">LEVEL SELECT</div>
<div id="level-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:20px;max-width:320px"></div>
<button class="btn btn-secondary" id="btn-level-back">Back</button>
</div>

<div class="overlay hidden" id="win-screen">
<div class="title" style="color:#00ff88">LEVEL COMPLETE!</div>
<div class="subtitle" id="win-stats"></div>
<div id="win-stars" style="font-size:32px;margin:12px 0"></div>
<button class="btn btn-primary" id="btn-next">Next Level</button>
<button class="btn btn-secondary" id="btn-win-menu">Menu</button>
</div>

<div class="overlay hidden" id="lose-screen">
<div class="title" style="color:#ff4466">GAME OVER</div>
<div class="subtitle" id="lose-stats"></div>
<button class="btn btn-primary" id="btn-retry">Retry</button>
<button class="btn btn-secondary" id="btn-lose-menu">Menu</button>
</div>

<div class="overlay hidden" id="tutorial-screen">
<div class="title" style="font-size:clamp(18px,4vw,28px)">HOW TO PLAY</div>
<div id="tutorial-text" style="max-width:320px;text-align:center;color:#ccc;margin:16px;line-height:1.6;font-size:clamp(13px,3vw,16px)"></div>
<button class="btn btn-primary" id="btn-tut-next">Got it</button>
</div>
</div>

<script>
(function(){
"use strict";

var W,H,canvas,ctx,dpr,rafId=null,timers=[],state='menu';
var audioCtx=null,bgmNodes=[];
var soundOn=true,musicOn=true;

var SKINS=[
{name:'Cyan',color:'#00f0ff',glow:'rgba(0,240,255,0.4)',unlock:0},
{name:'Purple',color:'#7b2dff',glow:'rgba(123,45,255,0.4)',unlock:5},

];

var AI_COLORS=[
{color:'#ff6b35',glow:'rgba(255,107,53,0.3)'},
{color:'#e83e8c',glow:'rgba(232,62,140,0.3)'},

var LEVELS=[
{grid:20,ai:2,aiType:0,target:15,diffName:'Easy'},
{grid:20,ai:2,aiType:0,target:16,diffName:'Easy'},
{grid:20,ai:3,aiType:0,target:17,diffName:'Easy'},

{grid:22,ai:3,aiType:1,target:18,diffName:'Easy'},
{grid:25,ai:3,aiType:1,target:20,diffName:'Medium'},
{grid:25,ai:4,aiType:1,target:20,diffName:'Medium'},
{grid:25,ai:4,aiType:1,target:21,diffName:'Medium'},
{grid:28,ai:4,aiType:1,target:22,diffName:'Medium'},
{grid:28,ai:4,aiType:2,target:22,diffName:'Medium'},

{grid:35,ai:6,aiType:3,target:33,diffName:'Expert'},
{grid:40,ai:6,aiType:4,target:35,diffName:'Master'},
{grid:40,ai:6,aiType:4,target:35,diffName:'Master'},
{grid:40,ai:6,aiType:4,target:36,diffName:'Master'},
{grid:40,ai:6,aiType:4,target:37,diffName:'Master'},
{grid:40,ai:6,aiType:4,target:38,diffName:'Master'},
{grid:40,ai:7,aiType:4,target:25,diffName:'Endless',timed:true,timeLimit:90},
{grid:40,ai:7,aiType:4,target:25,diffName:'Endless',timed:true,timeLimit:90},
{grid:40,ai:7,aiType:4,target:25,diffName:'Endless',timed:true,timeLimit:90},
{grid:40,ai:7,aiType:4,target:25,diffName:'Endless',timed:true,timeLimit:90},
{grid:40,ai:7,aiType:4,target:25,diffName:'Endless',timed:true,timeLimit:90}
];

var CELL_SIZE=14;
var DIRS={0:{x:0,y:-1},1:{x:1,y:0},2:{x:0,y:1},3:{x:-1,y:0}};

var player,aiPlayers,grid,gridW,gridH,currentLevel,gameTime,gameKills;
var currentSkin=0,unlockedLevel=0,saveData;

function loadSave(){
try{var d=JSON.parse(localStorage.getItem('paper_io_save'));if(d&&d.v===1)return d}catch(e){}
return{v:1,best:0,unlocked:1,skin:0,tutorial:false};
}

function saveSave(){
try{localStorage.setItem('paper_io_save',JSON.stringify(saveData))}catch(e){}
}

function initAudio(){
if(audioCtx)return;
try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
}

function playTone(freq,dur,type,vol){
if(!soundOn||!audioCtx)return;
try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type=type||'sine';o.frequency.value=freq;
g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
o.connect(g);g.connect(audioCtx.destination);
o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}
}

function sfxCapture(){playTone(523,0.15,'sine',0.12);setTimeout(function(){playTone(659,0.15,'sine',0.12)},80);setTimeout(function(){playTone(784,0.2,'sine',0.12)},160)}
function sfxKill(){playTone(200,0.1,'sawtooth',0.15);playTone(400,0.15,'square',0.1)}
function sfxDeath(){playTone(300,0.3,'sawtooth',0.2);setTimeout(function(){playTone(200,0.4,'sawtooth',0.15)},150)}
function sfxClick(){playTone(800,0.05,'sine',0.08)}
function sfxWin(){playTone(523,0.12,'sine',0.15);setTimeout(function(){playTone(659,0.12,'sine',0.15)},120);setTimeout(function(){playTone(784,0.12,'sine',0.15)},240);setTimeout(function(){playTone(1047,0.3,'sine',0.15)},360)}
function sfxPowerUp(){playTone(440,0.1,'sine',0.1);setTimeout(function(){playTone(880,0.2,'sine',0.1)},100)}
function sfxTrail(){playTone(350,0.06,'triangle',0.05)}
function sfxStep(){playTone(600,0.04,'sine',0.04)}

function startBGM(){
if(!audioCtx||!musicOn||bgmNodes.length)return;
try{
var sr=audioCtx.sampleRate,dur=8,bufSize=sr*dur;
var buf=audioCtx.createBuffer(1,bufSize,sr);var d=buf.getChannelData(0);
var chords=[[261.63,329.63,392],[349.23,440,523.25],[293.66,369.99,440],[261.63,329.63,392]];
var chordDur=dur/chords.length;
for(var i=0;i<bufSize;i++){
var t=i/sr;var ci=Math.min(Math.floor(t/chordDur),chords.length-1);var chord=chords[ci];
var s=0;
for(var n=0;n<chord.length;n++){s+=Math.sin(2*Math.PI*chord[n]*t)*0.04;s+=Math.sin(2*Math.PI*chord[n]*2*t)*0.015;s+=Math.sin(2*Math.PI*chord[n]*0.5*t)*0.02}
var fade=t%chordDur;var fadeIn=Math.min(fade/0.3,1);var fadeOut=Math.min((chordDur-fade)/0.3,1);
s*=fadeIn*fadeOut;
var bass=Math.sin(2*Math.PI*(chord[0]/2)*t)*0.03;var bsf=Math.sin(2*Math.PI*0.5*t)*0.3+1;
s+=bass*bsf;d[i]=s*0.6}
var src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
var filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=900;filt.Q.value=0.7;
var g=audioCtx.createGain();g.gain.value=musicOn?0.2:0;
src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);src.start();
bgmNodes=[src,filt,g]}catch(e){}
}

function stopBGM(){bgmNodes.forEach(function(n){try{n.stop()}catch(e){}});bgmNodes=[]}
function toggleMusic(){musicOn=!musicOn;if(bgmNodes[2])bgmNodes[2].gain.value=musicOn?0.2:0;if(!musicOn)stopBGM();else startBGM()}
function toggleSound(){soundOn=!soundOn}

function showScreen(id){
['menu-screen','skins-screen','settings-screen','level-screen','win-screen','lose-screen','tutorial-screen'].forEach(function(s){
document.getElementById(s).classList.toggle('hidden',s!==id)})
}

function buildSkinGrid(){
var g=document.getElementById('skin-grid');g.innerHTML='';
SKINS.forEach(function(s,i){
var unlocked=saveData.unlocked>=s.unlock||i===0;
var btn=document.createElement('div');btn.className='skin-btn'+(unlocked?'':' locked')+(currentSkin===i?' active':'');
var inner=document.createElement('div');inner.className='skin-color';inner.style.background=s.color;
if(!unlocked){inner.textContent=s.unlock;inner.style.color='#fff';inner.style.fontSize='12px';inner.style.display='flex';inner.style.alignItems='center';inner.style.justifyContent='center'}
btn.appendChild(inner);
btn.addEventListener('click',function(){if(unlocked){currentSkin=i;saveData.skin=i;saveSave();buildSkinGrid();sfxClick()}});
g.appendChild(btn)})
}

function buildLevelGrid(){
var g=document.getElementById('level-grid');g.innerHTML='';
for(var i=0;i<LEVELS.length;i++){
var unlocked=i<saveData.unlocked;
var btn=document.createElement('div');
btn.style.cssText='width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:'+(unlocked?'pointer':'not-allowed')+';font-weight:700;font-size:16px;transition:transform 0.15s;border:2px solid '+(unlocked?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.05)')+';color:'+(unlocked?'#fff':'#555')+';background:'+(unlocked?'rgba(123,45,255,0.15)':'rgba(255,255,255,0.03)');
btn.textContent=i+1;
if(unlocked){
btn.addEventListener('click',function(){sfxClick();startLevel(i)});
btn.addEventListener('pointerenter',function(){this.style.transform='scale(1.1)'});
btn.addEventListener('pointerleave',function(){this.style.transform='scale(1)'})}
g.appendChild(btn)}
}

function initGrid(w,h){
gridW=w;gridH=h;
grid=[];
for(var y=0;y<h;y++){grid[y]=[];for(var x=0;x<w;x++)grid[y][x]={owner:-1,trail:-1}}
}

function createPlayer(x,y,color,glow,isAI,aiIdx){
return{x:x,y:y,dx:0,dy:0,dir:-1,speed:1.2,color:color,glow:glow,
isAI:isAI,aiIdx:aiIdx||0,alive:true,trail:[],territoryCount:0,totalCells:0,
dirTimer:0,aiTarget:null,killCount:0,spawnX:x,spawnY:y,
respawnTimer:0,powerUp:null,powerUpTimer:0}
}

function spawnPlayer(p){
var cx=Math.floor(gridW/2),cy=Math.floor(gridH/2);
if(p.isAI){
var side=p.aiIdx%4;
if(side===0){p.x=2;p.y=2}
else if(side===1){p.x=gridW-3;p.y=2}
else if(side===2){p.x=2;p.y=gridH-3}
else{p.x=gridW-3;p.y=gridH-3}}
else{p.x=cx;p.y=cy}
p.spawnX=p.x;p.spawnY=p.y;p.alive=true;p.trail=[];p.dir=-1;p.dirTimer=0;
for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){
var nx=p.x+dx,ny=p.y+dy;
if(nx>=0&&nx<gridW&&ny>=0&&ny<gridH){
grid[ny][nx].owner=p.isAI?-(p.aiIdx+2):0;
p.territoryCount++}}
}

function countTerritory(owner){
var c=0;
for(var y=0;y<gridH;y++)for(var x=0;x<gridW;x++)if(grid[y][x].owner===owner)c++;
return c}
function totalCells(){return gridW*gridH}

function fillTerritory(p,owner){
if(p.trail.length<2)return 0;
var filled=0;
var trailSet=new Set();
p.trail.forEach(function(t){trailSet.add(t.x+','+t.y)});
var ox=p.spawnX,oy=p.spawnY;

var minX=gridW,maxX=0,minY=gridH,maxY=0;
p.trail.forEach(function(t){if(t.x<minX)minX=t.x;if(t.x>maxX)maxX=t.x;if(t.y<minY)minY=t.y;if(t.y>maxY)maxY=t.y});

var stack=[[ox,oy]];
var visited=new Set();
visited.add(ox+','+oy);

while(stack.length>0){
var cell=stack.pop();
var cx=cell[0],cy=cell[1];
for(var d=0;d<4;d++){
var nx=cx+DIRS[d].x,ny=cy+DIRS[d].y;
var key=nx+','+ny;
if(nx<0||nx>=gridW||ny<0||ny>=gridH)continue;
if(visited.has(key))continue;
if(trailSet.has(key)){
if(grid[ny][nx].trail===owner){continue}
else{continue}}
if(grid[ny][nx].owner!==owner&&grid[ny][nx].owner!==-1)continue;
visited.add(key);stack.push([nx,ny])}}

for(var sy=0;sy<gridH;sy++)for(var sx=0;sx<gridW;sx++){
var key2=sx+','+sy;
if(!visited.has(key2)&&grid[sy][sx].owner!==owner){
var oldOwner=grid[sy][sx].owner;
grid[sy][sx].owner=owner;filled++}}

p.trail.forEach(function(t){grid[t.y][t.x].trail=-1;grid[t.y][t.x].owner=owner;filled++});
p.territoryCount+=filled;p.trail=[];
return filled;
}

function killPlayer(p){
if(!p.alive)return;
p.alive=false;
if(p.trail.length>0){p.trail.forEach(function(t){grid[t.y][t.x].trail=-1});p.trail=[]}
if(!p.isAI){
sfxDeath();
var fl=document.getElementById('death-flash');fl.classList.add('show');
setTimeout(function(){fl.classList.remove('show')},300);
setTimeout(function(){showScreen('lose-screen');
document.getElementById('lose-stats').textContent='Territory: '+getTerritoryPct(0)+'% | Kills: '+gameKills},600);
}
else{
sfxKill();
var fl2=document.getElementById('death-flash');fl2.classList.add('show');
setTimeout(function(){fl2.classList.remove('show')},200);
p.respawnTimer=3}
}

function getTerritoryPct(idx){return Math.floor(countTerritory(idx===0?0:-(idx+2))/totalCells()*100)}

function movePlayer(p,dt){
if(!p.alive)return;
if(p.isAI&&p.respawnTimer>0){p.respawnTimer-=dt;if(p.respawnTimer<=0)spawnPlayer(p);return}

var spd=p.speed*(p.powerUp==='speed'?1.8:1);
p.x+=p.dx*spd*dt;
p.y+=p.dy*spd*dt;

var gx=Math.round(p.x),gy=Math.round(p.y);
if(gx<0||gx>=gridW||gy<0||gy>=gridH){
if(p.isAI){p.dir=-1;p.dx=0;p.dy=0;if(p.trail.length>0){p.trail.forEach(function(t){grid[t.y][t.x].trail=-1});p.trail=[]}}
else{p.x=Math.max(0,Math.min(gridW-1,p.x));p.y=Math.max(0,Math.min(gridH-1,p.y))}
return}

var cell=grid[gy][gx];

if(!p.isAI){
for(var i=0;i<aiPlayers.length;i++){
var ai=aiPlayers[i];
if(ai.alive&&cell.trail!==undefined&&cell.trail>=2&&cell.trail===-(ai.aiIdx+2)){
ai.territoryCount=0;
for(var yy=0;yy<gridH;yy++)for(var xx=0;xx<gridW;xx++)if(grid[yy][xx].owner===-(ai.aiIdx+2))grid[yy][xx].owner=-1;
killPlayer(ai);gameKills++;
ai.trail.forEach(function(t){grid[t.y][t.x].trail=-1});ai.trail=[]}}}

if(p.isAI){
for(var j=0;j<aiPlayers.length;j++){
if(j===p.aiIdx)continue;
var other=aiPlayers[j];
if(other.alive&&cell.trail!==undefined&&cell.trail>=2&&cell.trail===-(other.aiIdx+2)){
other.territoryCount=0;
for(var yy2=0;yy2<gridH;yy2++)for(var xx2=0;xx2<gridW;xx2++)if(grid[yy2][xx2].owner===-(other.aiIdx+2))grid[yy2][xx2].owner=-1;
killPlayer(other);
other.trail.forEach(function(t){grid[t.y][t.x].trail=-1});other.trail=[]}}
if(player.alive&&cell.trail!==undefined&&cell.trail===0){killPlayer(player)}}

if(!p.isAI){
for(var k=0;k<aiPlayers.length;k++){
var ai2=aiPlayers[k];
if(ai2.alive&&Math.abs(p.x-ai2.x)<0.8&&Math.abs(p.y-ai2.y)<0.8&&p.trail.length>0){
killPlayer(p);return}}}

var owner=p.isAI?-(p.aiIdx+2):0;
if(cell.owner===owner&&p.trail.length>0){
var filled=fillTerritory(p,owner);
if(filled>0&&!p.isAI){sfxCapture();
var cf=document.getElementById('capture-flash');cf.classList.add('show');
setTimeout(function(){cf.classList.remove('show')},150)}}
else if(cell.owner!==owner&&cell.trail!==owner){
if(!cell.trail||cell.trail===-1){cell.trail=owner;p.trail.push({x:gx,y:gy});
if(!p.isAI&&p.trail.length%5===0)sfxTrail()}}
}

function aiUpdate(p,dt){
if(!p.alive||p.respawnTimer>0)return;
var lvl=LEVELS[currentLevel];
var aiType=lvl.aiType;

p.dirTimer-=dt;
if(p.dirTimer<=0){
var gx=Math.floor(p.x),gy=Math.floor(p.y);
var owner=-(p.aiIdx+2);

if(aiType===0){
p.dir=Math.floor(Math.random()*4);
p.dirTimer=0.5+Math.random()*1.5;
if(gx<=1&&p.dir===3)p.dir=1;if(gx>=gridW-2&&p.dir===1)p.dir=3;
if(gy<=1&&p.dir===0)p.dir=2;if(gy>=gridH-2&&p.dir===2)p.dir=0}
else if(aiType===1){
if(p.trail.length>12){p.dir=((p.dir<0?0:p.dir)+2)%4}
else if(gx<=2||gx>=gridW-3||gy<=2||gy>=gridH-3){p.dir=Math.floor(Math.random()*2)*2+1}
else{p.dir=Math.floor(Math.random()*4)}
p.dirTimer=0.3+Math.random()*1}
else if(aiType===2){
if(p.trail.length>8){p.dir=((p.dir<0?0:p.dir)+2)%4;p.dirTimer=0.2}
else{
var bestDir=-1,bestScore=-1;
for(var d=0;d<4;d++){
var score=0;
var nx=gx+DIRS[d].x*6,ny=gy+DIRS[d].y*6;
if(nx>2&&nx<gridW-2&&ny>2&&ny<gridH-2)score+=3;
var nc=0;for(var dd=-3;dd<=3;dd++)for(var ee=-3;ee<=3;ee++){var tx=nx+dd,ty=ny+ee;if(tx>=0&&tx<gridW&&ty>=0&&ty<gridH&&grid[ty][tx].owner===owner)nc++}
score+=nc*0.2;if(score>bestScore){bestScore=score;bestDir=d}}
p.dir=bestDir>=0?bestDir:Math.floor(Math.random()*4);p.dirTimer=0.3+Math.random()*0.8}}
else if(aiType>=3){
if(p.trail.length>10){p.dir=((p.dir<0?0:p.dir)+2)%4;p.dirTimer=0.15}
else if(player.alive){
var pdx=player.x-p.x,pdy=player.y-p.y;
var pdist=Math.sqrt(pdx*pdx+pdy*pdy);
if(pdist<8&&p.trail.length<5){
var angle=Math.atan2(pdy,pdx);var bestD=Math.round(((angle+Math.PI)/(Math.PI/2)))%4;
p.dir=bestD;p.dirTimer=0.4}
else{var bDir=-1,bScore=-1;
for(var dd2=0;dd2<4;dd2++){var sc=0;
var nnx=gx+DIRS[dd2].x*8,nny=gy+DIRS[dd2].y*8;
if(nnx>3&&nnx<gridW-3&&nny>3&&nny<gridH-3)sc+=4;
for(var fff=-4;fff<=4;fff++)for(var ggg=-4;ggg<=4;ggg++){var ttx=nnx+fff,tty=nny+ggg;if(ttx>=0&&ttx<gridW&&tty>=0&&tty<gridH&&grid[tty][ttx].owner===owner)sc+=0.15}
if(sc>bScore){bScore=sc;bDir=dd2}}
p.dir=bDir>=0?bDir:Math.floor(Math.random()*4);p.dirTimer=0.25+Math.random()*0.6}}
else{p.dir=Math.floor(Math.random()*4);p.dirTimer=0.5+Math.random()}}}

if(p.dir>=0){p.dx=DIRS[p.dir].x;p.dy=DIRS[p.dir].y}
else{p.dx=0;p.dy=0}
}

function setDir(d){if(player&&player.alive){player.dir=d;player.dx=DIRS[d].x;player.dy=DIRS[d].y}}

function startLevel(idx){
initAudio();currentLevel=idx;var lvl=LEVELS[idx];
initGrid(lvl.grid,lvl.grid);
player=createPlayer(0,0,SKINS[currentSkin].color,SKINS[currentSkin].glow,false,0);
spawnPlayer(player);
aiPlayers=[];
for(var i=0;i<lvl.ai;i++){
var ai=createPlayer(0,0,AI_COLORS[i%AI_COLORS.length].color,AI_COLORS[i%AI_COLORS.length].glow,true,i);
spawnPlayer(ai);aiPlayers.push(ai)}
gameTime=0;gameKills=0;state='playing';
showScreen(null);
document.getElementById('hud').style.display='flex';
document.getElementById('hud-level').textContent=idx+1;
var info=document.getElementById('level-info');
document.getElementById('level-title').textContent='Level '+(idx+1);
document.getElementById('level-desc').textContent='Capture '+lvl.target+'% territory'+(lvl.timed?' in '+lvl.timeLimit+'s':'');
info.classList.add('show');
setTimeout(function(){info.classList.remove('show')},1500);
if(!rafId){lastTime=performance.now();rafId=requestAnimationFrame(loop)}
}

var particles=[];
function addParticles(x,y,color,count){
for(var i=0;i<count;i++){
particles.push({x:x,y:y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,
life:0.5+Math.random()*0.5,maxLife:0.5+Math.random()*0.5,color:color,size:2+Math.random()*3})}
}

var lastTime=0;
function loop(now){
if(!state||state==='menu'){rafId=null;return}
var dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;

if(state==='playing'){
gameTime+=dt;
if(player.alive){
movePlayer(player,dt);
var m=Math.floor(gameTime/60),s=Math.floor(gameTime%60);
document.getElementById('hud-time').textContent=m+':'+(s<10?'0':'')+s;
document.getElementById('hud-kills').textContent=gameKills;
document.getElementById('hud-terr').textContent=getTerritoryPct(0)+'%';

var lvl=LEVELS[currentLevel];
if(lvl.timed&&gameTime>=lvl.timeLimit&&getTerritoryPct(0)>=lvl.target){
completeLevel()}
else if(!lvl.timed&&getTerritoryPct(0)>=lvl.target){
completeLevel()}}

for(var i=0;i<aiPlayers.length;i++){
aiUpdate(aiPlayers[i],dt);movePlayer(aiPlayers[i],dt)}

for(var j=particles.length-1;j>=0;j--){
var p=particles[j];p.x+=p.vx;p.y+=p.vy;p.life-=dt;p.vy+=2*dt;
if(p.life<=0)particles.splice(j,1)}

render();
rafId=requestAnimationFrame(loop)}
else{rafId=requestAnimationFrame(loop)}
}

function render(){
if(!canvas||!ctx)return;
var cw=W/dpr,ch=H/dpr;
ctx.clearRect(0,0,cw,ch);
ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,cw,ch);

var camX=0,camY=0;
if(player.alive){
camX=player.x*CELL_SIZE-cw/2;camY=player.y*CELL_SIZE-ch/2}
var maxCamX=gridW*CELL_SIZE-cw;var maxCamY=gridH*CELL_SIZE-ch;
camX=Math.max(0,Math.min(camX,maxCamX));
camY=Math.max(0,Math.min(camY,maxCamY));

ctx.save();ctx.translate(-camX,-camY);

for(var y=0;y<gridH;y++){for(var x=0;x<gridW;x++){
var cell=grid[y][x];
if(cell.owner>=0||cell.owner<=-2){
var owner=cell.owner===0?player:aiPlayers[-(cell.owner)-2];
if(owner){
ctx.fillStyle=owner.color;ctx.globalAlpha=0.2;
ctx.fillRect(x*CELL_SIZE,y*CELL_SIZE,CELL_SIZE,CELL_SIZE);ctx.globalAlpha=1}}
if(cell.trail>=0||cell.trail<=-2){
var trailOwner=cell.trail===0?player:aiPlayers[-(cell.trail)-2];
if(trailOwner){
ctx.fillStyle=trailOwner.color;ctx.globalAlpha=0.6;
ctx.fillRect(x*CELL_SIZE,y*CELL_SIZE,CELL_SIZE,CELL_SIZE);ctx.globalAlpha=1}}}}

ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
for(var gy=0;gy<=gridH;gy++){ctx.beginPath();ctx.moveTo(0,gy*CELL_SIZE);ctx.lineTo(gridW*CELL_SIZE,gy*CELL_SIZE);ctx.stroke()}
for(var gx=0;gx<=gridW;gx++){ctx.beginPath();ctx.moveTo(gx*CELL_SIZE,0);ctx.lineTo(gx*CELL_SIZE,gridH*CELL_SIZE);ctx.stroke()}

if(player.alive){
var px=player.x*CELL_SIZE,py=player.y*CELL_SIZE;
ctx.shadowColor=SKINS[currentSkin].glow;ctx.shadowBlur=12;
ctx.fillStyle=SKINS[currentSkin].color;
ctx.fillRect(px-CELL_SIZE/2-1,py-CELL_SIZE/2-1,CELL_SIZE+2,CELL_SIZE+2);
ctx.shadowBlur=0;
if(player.trail.length>0){
ctx.strokeStyle=SKINS[currentSkin].color;ctx.lineWidth=2;ctx.globalAlpha=0.5;
ctx.beginPath();ctx.moveTo(player.trail[0].x*CELL_SIZE+CELL_SIZE/2,player.trail[0].y*CELL_SIZE+CELL_SIZE/2);
for(var ti=1;ti<player.trail.length;ti++){ctx.lineTo(player.trail[ti].x*CELL_SIZE+CELL_SIZE/2,player.trail[ti].y*CELL_SIZE+CELL_SIZE/2)}
ctx.lineTo(px,py);ctx.stroke();ctx.globalAlpha=1}}

for(var ai=0;ai<aiPlayers.length;ai++){
var a=aiPlayers[ai];
if(!a.alive)continue;
var ax=a.x*CELL_SIZE,ay=a.y*CELL_SIZE;
ctx.shadowColor=a.glow;ctx.shadowBlur=8;
ctx.fillStyle=a.color;
ctx.fillRect(ax-CELL_SIZE/2,ay-CELL_SIZE/2,CELL_SIZE,CELL_SIZE);
ctx.shadowBlur=0;
if(a.trail.length>0){
ctx.strokeStyle=a.color;ctx.lineWidth=2;ctx.globalAlpha=0.4;
ctx.beginPath();ctx.moveTo(a.trail[0].x*CELL_SIZE+CELL_SIZE/2,a.trail[0].y*CELL_SIZE+CELL_SIZE/2);
for(var at=1;at<a.trail.length;at++){ctx.lineTo(a.trail[at].x*CELL_SIZE+CELL_SIZE/2,a.trail[at].y*CELL_SIZE+CELL_SIZE/2)}
ctx.lineTo(ax,ay);ctx.stroke();ctx.globalAlpha=1}}

for(var pi=0;pi<particles.length;pi++){
var pp=particles[pi];ctx.globalAlpha=pp.life/pp.maxLife;
ctx.fillStyle=pp.color;ctx.fillRect(pp.x-pp.size/2,pp.y-pp.size/2,pp.size,pp.size)}
ctx.globalAlpha=1;

if(player.alive){
var tp=getTerritoryPct(0);
var lvl2=LEVELS[currentLevel];
var bw=80,bh=6,bx=cw/2+camX-bw/2,by=camY+12;
ctx.fillStyle='rgba(255,255,255,0.1)';roundRect(ctx,bx,by,bw,bh,3);ctx.fill();
ctx.fillStyle='#00f0ff';roundRect(ctx,bx,by,Math.min(bw,bw*tp/100),bh,3);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
ctx.fillText(tp+'%/'+lvl2.target+'%',bx+bw/2,by-4)}

ctx.restore();

var lvl3=LEVELS[currentLevel];
if(lvl3.timed){
var remain=Math.max(0,lvl3.timeLimit-gameTime);
var rm=Math.floor(remain/60),rs=Math.floor(remain%60);
ctx.fillStyle=remain<15?'#ff4466':'#00f0ff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
ctx.fillText(rm+':'+(rs<10?'0':'')+rs,cw/2,30)}
}

function roundRect(ctx,x,y,w,h,r){
ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

function completeLevel(){
state='win';sfxWin();
var pct=getTerritoryPct(0);
var stars=pct>=LEVELS[currentLevel].target+10?3:pct>=LEVELS[currentLevel].target+5?2:1;
var stats='Territory: '+pct+'% | Kills: '+gameKills+' | Time: '+Math.floor(gameTime)+'s';
document.getElementById('win-stats').textContent=stats;
var starStr='';for(var i=0;i<3;i++)starStr+=i<stars?'\u2605':'\u2606';
document.getElementById('win-stars').textContent=starStr;
document.getElementById('win-stars').style.color='#ffd700';
document.getElementById('hud').style.display='none';
if(currentLevel+1>=saveData.unlocked&&currentLevel+1<LEVELS.length){saveData.unlocked=currentLevel+2}
if(SKINS[saveData.skin+1]&&saveData.unlocked>=SKINS[saveData.skin+1].unlock){saveData.skin++}
saveSave();
setTimeout(function(){showScreen('win-screen')},500)}

function resize(){
var wrap=document.getElementById('game-wrap');
canvas=document.getElementById('gc');ctx=canvas.getContext('2d');
dpr=window.devicePixelRatio||1;
W=wrap.clientWidth;H=wrap.clientHeight;
canvas.width=W*dpr;canvas.height=H*dpr;
canvas.style.width=W+'px';canvas.style.height=H+'px';
ctx.setTransform(dpr,0,0,dpr,0,0)}

function cleanup(){
if(rafId){cancelAnimationFrame(rafId);rafId=null}
timers.forEach(function(id){clearInterval(id)});timers=[];
stopBGM();
if(audioCtx){audioCtx.close().catch(function(){});audioCtx=null}
}

window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
if(document.hidden&&rafId){cancelAnimationFrame(rafId);rafId=null}
else if(state==='playing'&&!rafId){lastTime=performance.now();rafId=requestAnimationFrame(loop)}});

var touchStartX=0,touchStartY=0;
function onPointerDown(e){
if(state!=='playing')return;e.preventDefault();
var t=e.touches?e.touches[0]:e;touchStartX=t.clientX;touchStartY=t.clientY}

function onPointerMove(e){
if(state!=='playing')return;e.preventDefault();
var t=e.touches?e.touches[0]:e;
var dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist>20){
if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?1:3)}
else{setDir(dy>0?2:0)}
touchStartX=t.clientX;touchStartY=t.clientY}}

function onPointerUp(e){if(state!=='playing')return;e.preventDefault()}

function onKeyDown(e){
if(state!=='playing')return;
switch(e.key){
case'ArrowUp':case'w':case'W':setDir(0);e.preventDefault();break;
case'ArrowRight':case'd':case'D':setDir(1);e.preventDefault();break;
case'ArrowDown':case's':case'S':setDir(2);e.preventDefault();break;
case'ArrowLeft':case'a':case'A':setDir(3);e.preventDefault();break}}

function init(){
resize();
saveData=loadSave();currentSkin=saveData.skin||0;unlockedLevel=saveData.unlocked||1;

canvas.addEventListener('pointerdown',onPointerDown);
canvas.addEventListener('pointermove',onPointerMove);
canvas.addEventListener('pointerup',onPointerUp);
canvas.addEventListener('pointercancel',onPointerUp);
document.addEventListener('keydown',onKeyDown);
window.addEventListener('resize',resize);

document.getElementById('btn-play').addEventListener('click',function(){
initAudio();sfxClick();
if(!saveData.tutorial){saveData.tutorial=true;saveSave();showTutorial()}
else{buildLevelGrid();showScreen('level-screen')}});

document.getElementById('btn-skins').addEventListener('click',function(){sfxClick();buildSkinGrid();showScreen('skins-screen')});
document.getElementById('btn-settings').addEventListener('click',function(){sfxClick();showScreen('settings-screen')});
document.getElementById('btn-skins-back').addEventListener('click',function(){sfxClick();showScreen('menu-screen')});
document.getElementById('btn-settings-back').addEventListener('click',function(){sfxClick();showScreen('menu-screen')});
document.getElementById('btn-level-back').addEventListener('click',function(){sfxClick();showScreen('menu-screen')});
document.getElementById('btn-next').addEventListener('click',function(){sfxClick();
if(currentLevel+1<LEVELS.length){startLevel(currentLevel+1)}
else{showScreen('menu-screen')}});
document.getElementById('btn-retry').addEventListener('click',function(){sfxClick();startLevel(currentLevel)});
document.getElementById('btn-win-menu').addEventListener('click',function(){sfxClick();showScreen('menu-screen')});
document.getElementById('btn-lose-menu').addEventListener('click',function(){sfxClick();showScreen('menu-screen')});
document.getElementById('btn-tut-next').addEventListener('click',function(){sfxClick();buildLevelGrid();showScreen('level-screen')});

document.getElementById('tog-sound').addEventListener('click',function(){
soundOn=!soundOn;this.classList.toggle('on',soundOn);sfxClick()});
document.getElementById('tog-music').addEventListener('click',function(){
toggleMusic();this.classList.toggle('on',musicOn);sfxClick()});

startBGM();
showScreen('menu-screen')}

var tutSteps=[
'Use ARROW KEYS or SWIPE to move your block across the grid.',
'Leave your territory to draw a trail. Return to fill in the captured area!',
'Avoid enemy trails! If someone crosses your trail, you die. Cross theirs to eliminate them!',
'Capture the target territory percentage to complete each level. Good luck!'
];
var tutStep=0;
function showTutorial(){
tutStep=0;showTutorialStep();
showScreen('tutorial-screen')}

function showTutorialStep(){
document.getElementById('tutorial-text').textContent=tutSteps[tutStep];
document.getElementById('btn-tut-next').textContent=tutStep<tutSteps.length-1?'Next':'Got it!';
document.getElementById('btn-tut-next').onclick=function(){
sfxClick();tutStep++;
if(tutStep<tutSteps.length){showTutorialStep()}
else{buildLevelGrid();showScreen('level-screen')}}}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init)}
else{init()}

})();
</script>
</body>
