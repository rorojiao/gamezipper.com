// ==================== GAME STATE ====================
var state={
  levelIdx:0,
  hintsLeft:3,
  hintsUsed:0,
  isComplete:false,
  isPlaying:true,
  currentLevel:null,
  grid:null,
  regions:null,
  regionGrid:null,
  paths:[],
  edges:{},
  dragStart:null,
  dragEnd:null,
  settings:{music:true,sfx:true,autocheck:true},
  progress:{},
  cellSize:40,
  gridOffsetX:0,
  gridOffsetY:0
};

var audioCtx=null,bgmInterval=null,bgmNoteIdx=0;
var isComplete=false,isPlaying=true;

// ==================== INIT ====================
function init(){
  loadProgress();
  loadSettings();
  setupCanvas();
  loadLevel(state.levelIdx);
  updateToggles();
}

function setupCanvas(){
  var canvas=document.getElementById('canvas');
  var wrapper=document.getElementById('canvas-wrapper');
  var maxW=wrapper.clientWidth-16;
  var lv=LV[state.levelIdx];
  if(!lv)return;
  var cell=Math.floor(Math.min(maxW/lv.cols,(window.innerHeight-280)/lv.rows));
  cell=Math.max(24,Math.min(cell,56));
  state.cellSize=cell;
  canvas.width=lv.cols*cell+4;
  canvas.height=lv.rows*cell+4;
  canvas.style.width=(lv.cols*cell+4)+'px';
  canvas.style.height=(lv.rows*cell+4)+'px';
  state.gridOffsetX=2;
  state.gridOffsetY=2;
}

// ==================== LEVEL LOADING ====================
function loadLevel(idx){
  if(idx<0||idx>=LV.length)return;
  state.levelIdx=idx;
  state.hintsLeft=3;
  state.hintsUsed=0;
  state.isComplete=false;
  state.isPlaying=true;
  isComplete=false;isPlaying=true;
  
  var lv=LV[idx];
  state.currentLevel=lv;
  state.rows=lv.rows;
  state.cols=lv.cols;
  state.regions=lv.regions;
  
  // Build region grid
  state.regionGrid=[];
  for(var r=0;r<lv.rows;r++){
    state.regionGrid.push(new Array(lv.cols).fill(-1));
  }
  for(var i=0;i<lv.regions.length;i++){
    for(var j=0;j<lv.regions[i].length;j++){
      var cell=lv.regions[i][j];
      state.regionGrid[cell[0]][cell[1]]=i;
    }
  }
  
  // Initialize paths (empty per region)
  state.paths=[];
  for(var i=0;i<lv.regions.length;i++){
    state.paths.push([]);
  }
  state.edges={};
  
  setupCanvas();
  renderGrid();
  updateInfoBar();
  document.getElementById('level-select').style.display='none';
}

// ==================== RENDERING ====================
function renderGrid(){
  var canvas=document.getElementById('canvas');
  var ctx=canvas.getContext('2d');
  var cs=state.cellSize;
  var ox=state.gridOffsetX,oy=state.gridOffsetY;
  var lv=state.currentLevel;
  
  ctx.fillStyle='#13132a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // Region colors (subtle backgrounds)
  var regionColors=['rgba(52,152,219,0.08)','rgba(231,76,60,0.08)','rgba(46,204,113,0.08)','rgba(241,196,15,0.08)','rgba(155,89,182,0.08)','rgba(230,126,34,0.08)','rgba(26,188,156,0.08)','rgba(236,240,241,0.06)','rgba(255,87,34,0.08)','rgba(33,97,140,0.08)'];
  
  for(var r=0;r<lv.rows;r++){
    for(var c=0;c<lv.cols;c++){
      var rid=state.regionGrid[r][c];
      var x=ox+c*cs,y=oy+r*cs;
      ctx.fillStyle=regionColors[rid%regionColors.length];
      ctx.fillRect(x,y,cs,cs);
    }
  }
  
  // Draw cell borders (thin)
  ctx.strokeStyle='#2a2a50';
  ctx.lineWidth=1;
  for(var r=0;r<=lv.rows;r++){
    ctx.beginPath();ctx.moveTo(ox,oy+r*cs);ctx.lineTo(ox+lv.cols*cs,oy+r*cs);ctx.stroke();
  }
  for(var c=0;c<=lv.cols;c++){
    ctx.beginPath();ctx.moveTo(ox+c*cs,oy);ctx.lineTo(ox+c*cs,oy+lv.rows*cs);ctx.stroke();
  }
  
  // Draw region borders (thick)
  ctx.strokeStyle='#5a5a8a';
  ctx.lineWidth=3;
  for(var r=0;r<lv.rows;r++){
    for(var c=0;c<lv.cols;c++){
      var rid=state.regionGrid[r][c];
      var x=ox+c*cs,y=oy+r*cs;
      // Check each neighbor
      if(r===0||state.regionGrid[r-1][c]!==rid){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cs,y);ctx.stroke();}
      if(r===lv.rows-1||state.regionGrid[r+1][c]!==rid){ctx.beginPath();ctx.moveTo(x,y+cs);ctx.lineTo(x+cs,y+cs);ctx.stroke();}
      if(c===0||state.regionGrid[r][c-1]!==rid){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cs);ctx.stroke();}
      if(c===lv.cols-1||state.regionGrid[r][c+1]!==rid){ctx.beginPath();ctx.moveTo(x+cs,y);ctx.lineTo(x+cs,y+cs);ctx.stroke();}
    }
  }
  
  // Draw paths
  drawPaths(ctx,cs,ox,oy);
  
  // Draw endpoint markers
  drawEndpoints(ctx,cs,ox,oy);
}

function drawPaths(ctx,cs,ox,oy){
  var colors=['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6','#e67e22','#1abc9c','#ecf0f1','#e84393','#27ae60'];
  
  for(var rid=0;rid<state.paths.length;rid++){
    var path=state.paths[rid];
    if(path.length<1)continue;
    var color=colors[rid%colors.length];
    
    if(path.length===1){
      // Single cell - draw a dot
      var cx=ox+path[0][1]*cs+cs/2;
      var cy=oy+path[0][0]*cs+cs/2;
      ctx.fillStyle=color;
      ctx.beginPath();ctx.arc(cx,cy,cs*0.15,0,Math.PI*2);ctx.fill();
      continue;
    }
    
    // Draw path as connected line segments
    ctx.strokeStyle=color;
    ctx.lineWidth=Math.max(4,cs*0.18);
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.beginPath();
    var first=path[0];
    ctx.moveTo(ox+first[1]*cs+cs/2,oy+first[0]*cs+cs/2);
    for(var i=1;i<path.length;i++){
      ctx.lineTo(ox+path[i][1]*cs+cs/2,oy+path[i][0]*cs+cs/2);
    }
    ctx.stroke();
    
    // Draw subtle glow
    ctx.strokeStyle=color+'40';
    ctx.lineWidth=Math.max(8,cs*0.3);
    ctx.beginPath();
    ctx.moveTo(ox+first[1]*cs+cs/2,oy+first[0]*cs+cs/2);
    for(var i=1;i<path.length;i++){
      ctx.lineTo(ox+path[i][1]*cs+cs/2,oy+path[i][0]*cs+cs/2);
    }
    ctx.stroke();
  }
  
  // Draw drag preview
  if(state.dragStart&&state.dragEnd){
    ctx.strokeStyle='rgba(255,255,255,0.3)';
    ctx.lineWidth=cs*0.1;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(ox+state.dragStart[1]*cs+cs/2,oy+state.dragStart[0]*cs+cs/2);
    ctx.lineTo(ox+state.dragEnd[1]*cs+cs/2,oy+state.dragEnd[0]*cs+cs/2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawEndpoints(ctx,cs,ox,oy){
  var colors=['#3498db','#e74c3c','#2ecc71','#f39c12','#9b59b6','#e67e22','#1abc9c','#ecf0f1','#e84393','#27ae60'];
  
  for(var rid=0;rid<state.paths.length;rid++){
    var path=state.paths[rid];
    if(path.length<2)continue;
    var color=colors[rid%colors.length];
    
    // Draw endpoint circles
    var ep1=path[0],ep2=path[path.length-1];
    [{cell:ep1,type:'start'},{cell:ep2,type:'end'}].forEach(function(ep){
      var cx=ox+ep.cell[1]*cs+cs/2;
      var cy=oy+ep.cell[0]*cs+cs/2;
      // Check endpoint adjacency violation
      var isViolating=checkEndpointViolation(rid,ep.cell);
      
      // Outer ring
      ctx.strokeStyle=isViolating?'#e74c3c':color;
      ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(cx,cy,cs*0.32,0,Math.PI*2);ctx.stroke();
      
      // Inner fill
      ctx.fillStyle=isViolating?'rgba(231,76,60,0.3)':'rgba(255,255,255,0.15)';
      ctx.beginPath();ctx.arc(cx,cy,cs*0.28,0,Math.PI*2);ctx.fill();
    });
  }
}

function checkEndpointViolation(rid,cell){
  // Check if this endpoint is adjacent to any other region's endpoint
  for(var other=0;other<state.paths.length;other++){
    if(other===rid)continue;
    var opath=state.paths[other];
    if(opath.length<1)continue;
    var eps=[opath[0]];
    if(opath.length>1)eps.push(opath[opath.length-1]);
    for(var i=0;i<eps.length;i++){
      if(Math.abs(eps[i][0]-cell[0])<=1&&Math.abs(eps[i][1]-cell[1])<=1&&(eps[i][0]!==cell[0]||eps[i][1]!==cell[1])){
        return true;
      }
    }
  }
  return false;
}

// ==================== INTERACTION ====================
function getCellFromPos(x,y){
  var canvas=document.getElementById('canvas');
  var rect=canvas.getBoundingClientRect();
  var px=x-rect.left-state.gridOffsetX;
  var py=y-rect.top-state.gridOffsetY;
  var cs=state.cellSize;
  var c=Math.floor(px/cs);
  var r=Math.floor(py/cs);
  if(r<0||r>=state.rows||c<0||c>=state.cols)return null;
  return [r,c];
}

function handlePointerDown(x,y){
  var cell=getCellFromPos(x,y);
  if(!cell)return;
  var rid=state.regionGrid[cell[0]][cell[1]];
  
  // Check if clicking on existing path endpoint
  var path=state.paths[rid];
  if(path.length>0){
    var ep1=path[0],ep2=path[path.length-1];
    if(cell[0]===ep1[0]&&cell[1]===ep1[1]){
      // Start dragging from endpoint 1
      state.dragFromEnd='start';
      state.dragRegion=rid;
      return;
    }
    if(path.length>1&&cell[0]===ep2[0]&&cell[1]===ep2[1]){
      state.dragFromEnd='end';
      state.dragRegion=rid;
      return;
    }
    // Click inside path cell - check if adjacent to endpoint for extension
    // Or click on a cell in the same region to start/extend
  }
  
  // Start new path or restart in this region
  state.paths[rid]=[cell];
  state.dragRegion=rid;
  state.dragFromEnd='end';
  state.dragStart=cell;
  state.dragEnd=cell;
  renderGrid();
}

function handlePointerMove(x,y){
  if(state.dragRegion===undefined||state.dragRegion===null)return;
  var cell=getCellFromPos(x,y);
  if(!cell)return;
  var rid=state.regionGrid[cell[0]][cell[1]];
  if(rid!==state.dragRegion)return;
  
  var path=state.paths[state.dragRegion];
  if(path.length===0)return;
  
  // Check if cell is adjacent to the current end
  var endCell=state.dragFromEnd==='start'?path[0]:path[path.length-1];
  var dr=Math.abs(cell[0]-endCell[0]);
  var dc=Math.abs(cell[1]-endCell[1]);
  if(dr+dc!==1)return;
  
  // Check not already in path
  for(var i=0;i<path.length;i++){
    if(path[i][0]===cell[0]&&path[i][1]===cell[1])return;
  }
  
  // Add to path
  if(state.dragFromEnd==='start'){
    path.unshift(cell);
  }else{
    path.push(cell);
  }
  state.dragEnd=cell;
  playSFX('draw');
  renderGrid();
}

function handlePointerUp(){
  state.dragRegion=null;
  state.dragFromEnd=null;
  state.dragStart=null;
  state.dragEnd=null;
  if(state.settings.autocheck)checkSolution(true);
}

// Canvas events
var canvas=document.getElementById('canvas');
canvas.addEventListener('pointerdown',function(e){e.preventDefault();handlePointerDown(e.clientX,e.clientY);});
canvas.addEventListener('pointermove',function(e){e.preventDefault();handlePointerMove(e.clientX,e.clientY);});
canvas.addEventListener('pointerup',function(e){e.preventDefault();handlePointerUp();});
canvas.addEventListener('pointercancel',function(e){e.preventDefault();handlePointerUp();});

// ==================== SOLUTION CHECKING ====================
function checkSolution(silent){
  var lv=state.currentLevel;
  var allComplete=true;
  
  // Check each region has a path covering all cells
  for(var rid=0;rid<lv.regions.length;rid++){
    var path=state.paths[rid];
    var regionCells=lv.regions[rid];
    if(path.length!==regionCells.length){
      allComplete=false;
      break;
    }
    // Verify path covers exactly the region cells
    var pathSet={};
    for(var i=0;i<path.length;i++){
      pathSet[path[i][0]+','+path[i][1]]=true;
    }
    for(var i=0;i<regionCells.length;i++){
      var key=regionCells[i][0]+','+regionCells[i][1];
      if(!pathSet[key]){allComplete=false;break;}
    }
  }
  
  if(!allComplete){
    if(!silent)showToast('Not all regions have complete paths yet.');
    return;
  }
  
  // Check endpoint constraints
  var endpointViolation=false;
  for(var rid=0;rid<state.paths.length;rid++){
    var path=state.paths[rid];
    if(path.length<2)continue;
    var eps=[path[0],path[path.length-1]];
    for(var ei=0;ei<eps.length;ei++){
      if(checkEndpointViolation(rid,eps[ei])){
        endpointViolation=true;
        break;
      }
    }
    if(endpointViolation)break;
  }
  
  if(endpointViolation){
    if(!silent)showToast('Endpoint violation! No two endpoints may touch.');
    renderGrid(); // Re-render to show violations in red
    return;
  }
  
  // Solution is correct!
  winLevel();
}

function showToast(msg){
  var existing=document.getElementById('toast');
  if(existing)existing.remove();
  var div=document.createElement('div');
  div.id='toast';
  div.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;z-index:400;font-size:0.85rem;max-width:90%;text-align:center';
  div.textContent=msg;
  document.body.appendChild(div);
  setTimeout(function(){div.remove();},2500);
}

function winLevel(){
  if(isComplete)return;
  isComplete=true;state.isComplete=true;
  state.isPlaying=false;isPlaying=false;
  
  // Calculate stars
  var stars=3;
  if(state.hintsUsed>0)stars=2;
  if(state.hintsUsed>2)stars=1;
  
  // Save progress
  var key='rassi-silai';
  var prev=state.progress[key]||{};
  prev[state.levelIdx]={stars:Math.max(stars,prev[state.levelIdx]?prev[state.levelIdx].stars:0),completed:true};
  state.progress[key]=prev;
  saveProgress();
  
  // Show win overlay
  document.getElementById('win-stars').textContent='\u2605'.repeat(stars)+'\u2606'.repeat(3-stars);
  document.getElementById('win-overlay').classList.add('show');
  
  playSFX('win');
  launchConfetti();
  renderGrid();
}

function launchConfetti(){
  var colors=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6'];
  for(var i=0;i<50;i++){
    var div=document.createElement('div');
    div.className='confetti';
    div.style.left=Math.random()*100+'vw';
    div.style.top='-10px';
    div.style.background=colors[Math.floor(Math.random()*colors.length)];
    div.style.borderRadius=Math.random()>0.5?'50%':'2px';
    div.style.animation='fall '+(1.5+Math.random()*2)+'s ease-in forwards';
    div.style.animationDelay=Math.random()*0.5+'s';
    document.body.appendChild(div);
    (function(d){setTimeout(function(){d.remove();},4000);})(div);
  }
}

function nextLevel(){
  closeWin();
  if(state.levelIdx<LV.length-1){
    loadLevel(state.levelIdx+1);
  }else{
    showToast('Congratulations! You completed all levels!');
  }
}

function closeWin(){
  document.getElementById('win-overlay').classList.remove('show');
}

// ==================== HINTS ====================
function useHint(){
  if(state.hintsLeft<=0){showToast('No hints left!');return;}
  var lv=state.currentLevel;
  var sol=lv.solution_paths;
  
  // Find a region without a correct path
  for(var rid=0;rid<sol.length;rid++){
    var solPath=sol[rid];
    var curPath=state.paths[rid];
    
    // Check if current path matches solution for this region
    var matches=true;
    if(curPath.length===0||curPath.length!==solPath.length){
      matches=false;
    }else{
      // Try forward match
      var fwd=true,bwd=true;
      for(var i=0;i<solPath.length;i++){
        if(curPath[i][0]!==solPath[i][0]||curPath[i][1]!==solPath[i][1])fwd=false;
        if(curPath[i][0]!==solPath[solPath.length-1-i][0]||curPath[i][1]!==solPath[solPath.length-1-i][1])bwd=false;
      }
      matches=fwd||bwd;
    }
    
    if(!matches){
      // Show the solution path for this region
      state.paths[rid]=solPath.map(function(c){return[c[0],c[1]];});
      state.hintsLeft--;
      state.hintsUsed++;
      updateInfoBar();
      playSFX('hint');
      renderGrid();
      if(state.settings.autocheck)checkSolution(true);
      return;
    }
  }
  
  showToast('All regions are already correct!');
}

// ==================== CONTROLS ====================
function clearAll(){
  for(var i=0;i<state.paths.length;i++){
    state.paths[i]=[];
  }
  renderGrid();
  playSFX('erase');
}

function toggleLevelSelect(){
  var panel=document.getElementById('level-select');
  if(panel.style.display==='block'){
    panel.style.display='none';
  }else{
    renderLevelSelect();
    panel.style.display='block';
  }
}

function renderLevelSelect(){
  var lv=LV[state.levelIdx];
  var html='';
  var tiers=['Beginner','Easy','Medium','Hard','Expert'];
  var tiersSeen={};
  
  for(var i=0;i<LV.length;i++){
    var tier=LV[i].tier;
    if(!tiersSeen[tier]){
      tiersSeen[tier]=true;
      html+='<div class="tier-group"><div class="tier-title">'+tier+'</div><div class="level-grid">';
    }
    
    var prog=state.progress['rassi-silai']||{};
    var p=prog[i]||{};
    var cls='level-btn';
    if(i===state.levelIdx)cls+=' current';
    if(p.completed)cls+=' completed';
    // Unlock logic: first level always unlocked, others unlocked if previous completed
    var locked=i>0&&!(prog[i-1]&&prog[i-1].completed)&&!p.completed;
    if(locked)cls+=' locked';
    
    var stars=p.stars?'\u2605'.repeat(p.stars):'';
    html+='<button class="'+cls+'" onclick="'+(locked?'':'selectLevel('+i+')')+'">'+(i+1)+(stars?'<div class="stars">'+stars+'</div>':'')+'</button>';
    
    // Close tier group at end
    if(i<LV.length-1&&LV[i+1].tier!==tier){
      html+='</div></div>';
    }
  }
  html+='</div></div>';
  
  document.getElementById('level-list').innerHTML=html;
}

function selectLevel(idx){
  loadLevel(idx);
}

function toggleSettings(){
  document.getElementById('settings-panel').classList.toggle('show');
}

function toggleSetting(name){
  state.settings[name]=!state.settings[name];
  saveSettings();
  updateToggles();
  if(name==='music'){
    if(state.settings.music)startBGM();
    else stopBGM();
  }
}

function updateToggles(){
  document.getElementById('toggle-music').classList.toggle('on',state.settings.music);
  document.getElementById('toggle-sfx').classList.toggle('on',state.settings.sfx);
  document.getElementById('toggle-autocheck').classList.toggle('on',state.settings.autocheck);
}

function updateInfoBar(){
  document.getElementById('level-display').textContent=(state.levelIdx+1)+'/'+LV.length;
  document.getElementById('tier-display').textContent=state.currentLevel?state.currentLevel.tier:'';
  document.getElementById('hints-display').textContent=state.hintsLeft;
  var prog=state.progress['rassi-silai']||{};
  var p=prog[state.levelIdx]||{};
  document.getElementById('stars-display').textContent=p.stars?p.stars+'/3':'--';
}

// ==================== STORAGE ====================
function loadProgress(){
  try{
    var d=localStorage.getItem('rassi-silai-progress');
    if(d)state.progress=JSON.parse(d);
  }catch(e){}
}
function saveProgress(){
  try{localStorage.setItem('rassi-silai-progress',JSON.stringify(state.progress));}catch(e){}
}
function loadSettings(){
  try{
    var d=localStorage.getItem('rassi-silai-settings');
    if(d){var s=JSON.parse(d);for(var k in s)state.settings[k]=s[k];}
  }catch(e){}
}
function saveSettings(){
  try{localStorage.setItem('rassi-silai-settings',JSON.stringify(state.settings));}catch(e){}
}

// ==================== AUDIO ====================
function ensureAudio(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
}

function playSFX(type){
  if(!state.settings.sfx)return;
  ensureAudio();
  if(!audioCtx)return;
  var freqs={draw:400,erase:200,hint:600,win:880,error:150,click:300};
  var f=freqs[type]||300;
  var osc=audioCtx.createOscillator();
  var g=audioCtx.createGain();
  osc.connect(g);g.connect(audioCtx.destination);
  osc.frequency.value=f;
  osc.type='sine';
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
  osc.start();
  osc.stop(audioCtx.currentTime+0.15);
  
  if(type==='win'){
    // Play a chord
    [523,659,784].forEach(function(nf,i){
      setTimeout(function(){
        var o2=audioCtx.createOscillator();var g2=audioCtx.createGain();
        o2.connect(g2);g2.connect(audioCtx.destination);
        o2.frequency.value=nf;o2.type='sine';
        g2.gain.setValueAtTime(0.1,audioCtx.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
        o2.start();o2.stop(audioCtx.currentTime+0.4);
      },i*100);
    });
  }
}

function startBGM(){
  if(!state.settings.music)return;
  ensureAudio();
  if(!audioCtx)return;
  stopBGM();
  bgmNoteIdx=0;
  var notes=[261,329,392,523,440,392,329,294,261,329,392,523,659,523,440,392];
  bgmInterval=setInterval(function(){
    if(!audioCtx)return;
    var f=notes[bgmNoteIdx%notes.length];
    var osc=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    osc.connect(g);g.connect(audioCtx.destination);
    osc.frequency.value=f;
    osc.type='triangle';
    g.gain.setValueAtTime(0.04,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
    osc.start();
    osc.stop(audioCtx.currentTime+0.5);
    bgmNoteIdx++;
  },400);
}

function stopBGM(){
  if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown',function(e){
  if(isComplete){if(e.key==='Enter')nextLevel();return;}
  switch(e.key.toLowerCase()){
    case'h':useHint();break;
    case'r':case'c':clearAll();break;
    case'l':toggleLevelSelect();break;
    case'escape':
      document.getElementById('level-select').style.display='none';
      document.getElementById('settings-panel').classList.remove('show');
      break;
    case'enter':checkSolution();break;
  }
});

window.addEventListener('resize',function(){setupCanvas();renderGrid();});
document.addEventListener('visibilitychange',function(){if(document.hidden)stopBGM();else if(isPlaying&&state.settings.music)startBGM();});
window.addEventListener('beforeunload',function(){stopBGM();if(audioCtx)audioCtx.close();});

// Start
init();
