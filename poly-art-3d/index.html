function init(){
canvas=document.getElementById('gameCanvas');
ctx=canvas.getContext('2d');
previewCanvas=document.getElementById('previewCanvas');
previewCtx=previewCanvas.getContext('2d');
resize();
setupEventListeners();
loadGameState();
showScreen('title');
requestAnimationFrame(gameLoop);
}

function resize(){
const container=document.getElementById('gameContainer');
const rect=container.getBoundingClientRect();
WIDTH=rect.width;
HEIGHT=rect.height;
canvas.width=WIDTH;
canvas.height=HEIGHT;
previewCanvas.width=80;
previewCanvas.height=80;
isMobile=WIDTH<768;
}

function setupEventListeners(){
window.addEventListener('resize',resize);
document.addEventListener('visibilitychange',handleVisibility);
window.addEventListener('beforeunload',cleanup);
document.addEventListener('pointerdown',handlePointerDown);
document.addEventListener('pointerup',handlePointerUp);
document.addEventListener('pointermove',handlePointerMove);
document.addEventListener('contextmenu',handleRightClick);
const clicks=document.querySelectorAll('[data-action]');
clicks.forEach(el=>{
el.addEventListener('click',e=>{
e.stopPropagation();
handleButtonClick(el.dataset.action);
});
});
const toggles=document.querySelectorAll('.toggle');
toggles.forEach(el=>{
el.addEventListener('click',e=>{
e.stopPropagation();
handleToggle(el.id);
});
});
}

function handleVisibility(){
if(document.hidden){
if(gameState.timerInterval){
clearInterval(gameState.timerInterval);
gameState.timerInterval=null;
}
}else{
if(gameState.screen==='game'&&!gameState.isPaused&&!gameState.isComplete){
startTimer();
}
}
}

function cleanup(){
if(rafId)cancelAnimationFrame(rafId);
intervals.forEach(id=>clearInterval(id));
intervals=[];
if(audioCtx){
if(bgmPlaying)stopBGM();
audioCtx.close();
audioCtx=null;
}
}

function handleButtonClick(action){
playSFX('click');
switch(action){
case 'play':showScreen('levelSelect');break;
case 'gallery':showScreen('gallery');break;
case 'settings':showScreen('settings');updateSettingsUI();break;
case 'back-title':showScreen('title');break;
case 'pause':togglePause();break;
case 'hint':useHint();break;
case 'modal-gallery':closeModal();showScreen('gallery');break;
case 'modal-next':closeModal();nextArtwork();break;
case 'reset':if(confirm('Reset all progress? This cannot be undone.')){resetProgress();}break;
}
}

function handleToggle(id){
if(id==='soundToggle'){
gameState.audioEnabled=!gameState.audioEnabled;
}else if(id==='musicToggle'){
gameState.musicEnabled=!gameState.musicEnabled;
if(gameState.musicEnabled&&gameState.screen!=='title'){
startBGM();
}else{
stopBGM();
}
}
updateSettingsUI();
saveGameState();
}

function updateSettingsUI(){
document.getElementById('soundToggle').classList.toggle('active',gameState.audioEnabled);
document.getElementById('musicToggle').classList.toggle('active',gameState.musicEnabled);
}

function showScreen(name){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(name==='levelSelect'?'levelSelect':name==='game'?'gameScreen':name)==null?document.getElementById(name==='levelSelect'?'levelSelect':name==='game'?'gameScreen':name):null;
const screenMap={title:'titleScreen','levelSelect':'levelSelect',game:'gameScreen',gallery:'gallery',settings:'settings'};
const el=document.getElementById(screenMap[name]||name+'Screen');
if(el)el.classList.add('active');
gameState.screen=name;
if(name==='levelSelect'){
renderLevelSelect();
}else if(name==='gallery'){
renderGallery();
}else if(name==='game'){
if(!gameState.currentArtwork)startGame(ARTWORKS[0]);
}
if(name!=='game'&&gameState.musicEnabled){
if(name==='title')stopBGM();
else startBGM();
}
}

function renderLevelSelect(){
const tabs=document.getElementById('categoryTabs');
tabs.innerHTML='';
CATEGORIES.forEach(cat=>{
const tab=document.createElement('button');
tab.className='category-tab'+(cat==='animals'?' active':'');
tab.textContent=cat.charAt(0).toUpperCase()+cat.slice(1);
tab.addEventListener('click',()=>{
document.querySelectorAll('.category-tab').forEach(t=>t.classList.remove('active'));
tab.classList.add('active');
renderArtworkGrid(cat);
});
tabs.appendChild(tab);
});
renderArtworkGrid('animals');
}

function renderArtworkGrid(category){
const grid=document.getElementById('artworkGrid');
grid.innerHTML='';
const filtered=ARTWORKS.filter(a=>a.category===category);
filtered.forEach(artwork=>{
const tier=getTier(artwork.difficulty);
const unlocked=gameState.unlockedTiers.includes(tier)||tier===1;
const completed=gameState.completedArtworks[artwork.name];
const card=document.createElement('div');
card.className='artwork-card'+(unlocked?'':' locked');
const preview=document.createElement('div');
preview.className='preview';
const thumb=document.createElement('canvas');
thumb.width=80;
thumb.height=80;
preview.appendChild(thumb);
card.appendChild(preview);
if(completed){
const stars=document.createElement('div');
stars.className='stars';
for(let i=0;i<3;i++){
const star=document.createElement('div');
star.className='star'+(i<gameState.totalStars[artwork.name]?' earned':'');
stars.appendChild(star);
}
card.appendChild(stars);
}
if(!unlocked){
const lock=document.createElement('div');
lock.className='lock-icon';
lock.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4" fill="none" stroke="currentColor" stroke-width="2"/></svg>';
card.appendChild(lock);
}
const name=document.createElement('div');
name.className='artwork-name';
name.textContent=artwork.name;
card.appendChild(name);
if(unlocked){
card.addEventListener('click',()=>{
playSFX('click');
startGame(artwork);
});
}
grid.appendChild(card);
drawThumbnail(thumb,artwork);
});
}

function drawThumbnail(canvas,artwork){
const ctx=canvas.getContext('2d');
const w=canvas.width;
const h=canvas.height;
ctx.clearRect(0,0,w,h);
const cellW=w/artwork.gridCols;
const cellH=h/artwork.gridRows;
artwork.pieces.forEach(p=>{
const [col,row]=p.targetPos;
const cx=col*cellW;
const cy=row*cellH;
ctx.beginPath();
const verts=p.vertices;
if(verts.length>2){
ctx.moveTo(cx+verts[0][0]*cellW,cy+verts[0][1]*cellH);
for(let i=1;i<verts.length;i++){
ctx.lineTo(cx+verts[i][0]*cellW,cy+verts[i][1]*cellH);
}
ctx.closePath();
const shade=SHADES[p.shade%4];
ctx.fillStyle=p.color;
ctx.fill();
}
});
}

function renderGallery(){
const grid=document.getElementById('galleryGrid');
grid.innerHTML='';
const completed=ARTWORKS.filter(a=>gameState.completedArtworks[a.name]);
document.getElementById('galleryProgress').textContent=completed.length+' / '+ARTWORKS.length;
document.getElementById('progressFill').style.width=(completed.length/ARTWORKS.length*100)+'%';
ARTWORKS.forEach(artwork=>{
const item=document.createElement('div');
item.className='gallery-item';
const canvas=document.createElement('canvas');
canvas.width=70;
canvas.height=70;
item.appendChild(canvas);
const name=document.createElement('div');
name.className='name';
name.textContent=artwork.name;
item.appendChild(name);
if(gameState.completedArtworks[artwork.name]){
drawThumbnail(canvas,artwork);
}else{
ctx=canvas.getContext('2d');
ctx.fillStyle='#222';
ctx.fillRect(0,0,70,70);
ctx.fillStyle='#555';
ctx.font='10px Inter';
ctx.textAlign='center';
ctx.fillText('???',35,40);
}
grid.appendChild(item);
});
ARTWORKS.forEach(artwork=>{
if(gameState.completedArtworks[artwork.name]){
drawThumbnail(document.createElement('canvas'),artwork);
}
});
}

function startGame(artwork){
gameState.currentArtwork=artwork;
gameState.selectedPiece=null;
gameState.hints=3;
gameState.moves=0;
gameState.elapsedTime=0;
gameState.isPaused=false;
gameState.isComplete=false;
gameState.placedPieces=[];
gameState.pieces=artwork.pieces.map(p=>({...p,currentShade:Math.floor(Math.random()*4)}));
gameState.scrambledPieces=[...gameState.pieces].sort(()=>Math.random()-0.5);
document.getElementById('hintCount').textContent=gameState.hints+' Hints';
document.getElementById('moves').textContent='Moves: 0';
document.getElementById('timer').textContent='0:00';
drawPreview();
showScreen('game');
startTimer();
}

function startTimer(){
if(gameState.timerInterval)clearInterval(gameState.timerInterval);
gameState.startTime=Date.now()-gameState.elapsedTime;
gameState.timerInterval=setInterval(()=>{
if(!gameState.isPaused&&!gameState.isComplete){
gameState.elapsedTime=Date.now()-gameState.startTime;
updateTimerDisplay();
}
},1000);
intervals.push(gameState.timerInterval);
}

function updateTimerDisplay(){
const s=Math.floor(gameState.elapsedTime/1000);
const m=Math.floor(s/60);
document.getElementById('timer').textContent=m+':'+(s%60<10?'0':'')+s%60;
}

function drawPreview(){
const artwork=gameState.currentArtwork;
const pCtx=previewCtx;
const w=previewCanvas.width;
const h=previewCanvas.height;
pCtx.clearRect(0,0,w,h);
const cellW=w/artwork.gridCols;
const cellH=h/artwork.gridRows;
artwork.pieces.forEach(p=>{
const [col,row]=p.targetPos;
const cx=col*cellW;
const cy=row*cellH;
pCtx.beginPath();
const verts=p.vertices;
if(verts.length>2){
pCtx.moveTo(cx+verts[0][0]*cellW,cy+verts[0][1]*cellH);
for(let i=1;i<verts.length;i++){
pCtx.lineTo(cx+verts[i][0]*cellW,cy+verts[i][1]*cellH);
}
pCtx.closePath();
const shade=SHADES[p.shade%4];
pCtx.fillStyle=p.color;
pCtx.fill();
}
});
}

function gameLoop(time){
const dt=time-lastTime;
lastTime=time;
if(gameState.screen==='game'&&!gameState.isPaused){
render(dt);
updateParticles(dt);
}
rafId=requestAnimationFrame(gameLoop);
}

function render(dt){
const ctx=gameCtx||ctx;
ctx.clearRect(0,0,WIDTH,HEIGHT);
const artwork=gameState.currentArtwork;
if(!artwork)return;
const cellW=WIDTH*0.12;
const cellH=HEIGHT*0.15;
const gridX=WIDTH*0.25;
const gridY=HEIGHT*0.1;
const scrambleAreaX=WIDTH*0.55;
const scrambleAreaY=HEIGHT*0.15;
const scrambleW=WIDTH*0.4;
const scrambleH=HEIGHT*0.7;
ctx.fillStyle='rgba(0,0,0,0.3)';
ctx.beginPath();
ctx.roundRect(gridX-cellW*0.5,gridY-cellH*0.5,cellW*artwork.gridCols+cellW,cellH*artwork.gridRows+cellH,16);
ctx.fill();
ctx.strokeStyle='rgba(255,255,255,0.1)';
ctx.lineWidth=2;
ctx.stroke();
for(let r=0;r<artwork.gridRows;r++){
for(let c=0;c<artwork.gridCols;c++){
const x=gridX+c*cellW;
const y=gridY+r*cellH;
const placed=gameState.placedPieces.find(p=>p.targetPos[0]===c&&p.targetPos[1]===r);
if(placed){
const shade=SHADES[placed.shade%4];
ctx.beginPath();
const verts=placed.vertices;
if(verts.length>2){
ctx.moveTo(x+verts[0][0]*cellW,y+verts[0][1]*cellH);
for(let i=1;i<verts.length;i++){
ctx.lineTo(x+verts[i][0]*cellW,y+verts[i][1]*cellH);
}
ctx.closePath();
ctx.fillStyle=placed.color;
ctx.fill();
ctx.shadowColor=placed.color;
ctx.shadowBlur=10;
ctx.fill();
ctx.shadowBlur=0;
}
}else{
ctx.fillStyle='rgba(255,255,255,0.05)';
ctx.beginPath();
ctx.rect(x,y,cellW,cellH);
ctx.fill();
ctx.strokeStyle='rgba(255,255,255,0.1)';
ctx.stroke();
}
}
}
const cols=Math.floor(scrambleW/cellW);
const rows=Math.floor(scrambleH/cellH);
let idx=0;
gameState.scrambledPieces.forEach((piece,pieceIdx)=>{
if(gameState.placedPieces.find(p=>p.id===piece.id))return;
const col=idx%cols;
const row=Math.floor(idx/cols);
const baseX=scrambleAreaX+col*cellW*1.2;
const baseY=scrambleAreaY+row*cellH*1.2;
const isSelected=gameState.selectedPiece&&gameState.selectedPiece.id===piece.id;
const cx=baseX+cellW*0.5;
const cy=baseY+cellH*0.5;
const scale=isSelected?1.1:1;
ctx.save();
ctx.translate(cx,cy);
ctx.scale(scale,scale);
ctx.translate(-cx,-cy);
if(isSelected){
ctx.shadowColor='#00d4ff';
ctx.shadowBlur=20;
}
ctx.beginPath();
const verts=piece.vertices;
if(verts.length>2){
ctx.moveTo(baseX+verts[0][0]*cellW,baseY+verts[0][1]*cellH);
for(let i=1;i<verts.length;i++){
ctx.lineTo(baseX+verts[i][0]*cellW,baseY+verts[i][1]*cellH);
}
ctx.closePath();
const shade=SHADES[piece.currentShade%4];
ctx.fillStyle=piece.color;
ctx.fill();
}
ctx.restore();
if(isSelected){
ctx.strokeStyle='#00d4ff';
ctx.lineWidth=3;
ctx.beginPath();
const verts=piece.vertices;
if(verts.length>2){
ctx.moveTo(baseX+verts[0][0]*cellW,baseY+verts[0][1]*cellH);
for(let i=1;i<=verts.length;i++){
ctx.lineTo(baseX+verts[i%verts.length][0]*cellW,baseY+verts[i%verts.length][1]*cellH);
}
ctx.closePath();
ctx.stroke();
}
}
piece._renderX=baseX;
piece._renderY=baseY;
piece._cellW=cellW;
piece._cellH=cellH;
idx++;
});
renderParticles(ctx);
}

function updateParticles(dt){
particles=particles.filter(p=>{
p.life-=dt;
p.x+=p.vx*dt*0.001;
p.y+=p.vy*dt*0.001;
p.vy+=200*dt*0.001;
return p.life>0;
});
}

function renderParticles(ctx){
particles.forEach(p=>{
ctx.globalAlpha=p.life/p.maxLife;
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
});
ctx.globalAlpha=1;
}

function spawnParticles(x,y,color,count){
for(let i=0;i<count;i++){
const angle=Math.random()*Math.PI*2;
const speed=50+Math.random()*150;
particles.push({
x,y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed-100,
size:2+Math.random()*4,
color,
life:500+Math.random()*500,
maxLife:1000
});
}
}

function handlePointerDown(e){
if(gameState.screen!=='game'||gameState.isPaused||gameState.isComplete)return;
const rect=canvas.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;
const piece=findPieceAt(x,y);
if(piece){
gameState.selectedPiece=piece;
gameState.dragging=true;
gameState.dragX=x;
gameState.dragY=y;
playSFX('select');
}else if(gameState.selectedPiece){
const gridPos=getGridPosition(x,y);
if(gridPos&&!isPiecePlacedAt(gridPos.col,gridPos.row)){
placePiece(gridPos.col,gridPos.row);
}
}
}

function handlePointerUp(e){
gameState.dragging=false;
}

function handlePointerMove(e){
if(!gameState.dragging||!gameState.selectedPiece)return;
const rect=canvas.getBoundingClientRect();
gameState.dragX=e.clientX-rect.left;
gameState.dragY=e.clientY-rect.top;
}

function handleRightClick(e){
e.preventDefault();
if(gameState.screen!=='game'||gameState.isPaused||gameState.isComplete)return;
if(gameState.selectedPiece){
gameState.selectedPiece.currentShade=(gameState.selectedPiece.currentShade+1)%4;
playSFX('rotate');
}else{
const rect=canvas.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;
const piece=findPieceAt(x,y);
if(piece){
piece.currentShade=(piece.currentShade+1)%4;
playSFX('rotate');
}
}
}

function findPieceAt(x,y){
for(let i=gameState.scrambledPieces.length-1;i>=0;i--){
const piece=gameState.scrambledPieces[i];
if(gameState.placedPieces.find(p=>p.id===piece.id))continue;
const px=piece._renderX;
const py=piece._renderY;
const w=piece._cellW;
const h=piece._cellH;
if(x>=px&&x<=px+w&&y>=py&&y<=py+h){
return piece;
}
}
return null;
}

function getGridPosition(x,y){
const artwork=gameState.currentArtwork;
const cellW=WIDTH*0.12;
const cellH=HEIGHT*0.15;
const gridX=WIDTH*0.25;
const gridY=HEIGHT*0.1;
const col=Math.floor((x-gridX)/cellW);
const row=Math.floor((y-gridY)/cellH);
if(col>=0&&col<artwork.gridCols&&row>=0&&row<artwork.gridRows){
return{col,row};
}
return null;
}

function isPiecePlacedAt(col,row){
return gameState.placedPieces.find(p=>p.targetPos[0]===col&&p.targetPos[1]===row);
}

function placePiece(col,row){
const piece=gameState.selectedPiece;
if(!piece)return;
gameState.moves++;
document.getElementById('moves').textContent='Moves: '+gameState.moves;
const correctPiece=gameState.currentArtwork.pieces.find(p=>p.id===piece.id);
if(correctPiece&&correctPiece.targetPos[0]===col&&correctPiece.targetPos[1]===row&&piece.currentShade===correctPiece.shade){
const placed={...piece,targetPos:[col,row]};
gameState.placedPieces.push(placed);
gameState.scrambledPieces=gameState.scrambledPieces.filter(p=>p.id!==piece.id);
gameState.selectedPiece=null;
playSFX('correct');
spawnParticles(gridX+col*cellW+cellW/2,gridY+row*cellH+cellH/2,'#10b981',15);
checkCompletion();
}else{
playSFX('wrong');
shakePiece(piece);
}
}

function shakePiece(piece){
const origX=piece._renderX;
const origY=piece._renderY;
let shake=0;
const shakeAnim=setInterval(()=>{
shake+=5;
piece._renderX=origX+Math.sin(shake)*5;
if(shake>20)clearInterval(shakeAnim);
},30);
intervals.push(shakeAnim);
}

function checkCompletion(){
if(gameState.placedPieces.length===gameState.currentArtwork.pieces.length){
gameState.isComplete=true;
clearInterval(gameState.timerInterval);
setTimeout(()=>showCompletion(),500);
}
}

function showCompletion(){
const artwork=gameState.currentArtwork;
const par=artwork.pieces.length*1.5;
const baseScore=1000;
let timeBonus=0;
const s=gameState.elapsedTime/1000;
if(s<60)timeBonus=500;
else if(s<120)timeBonus=300;
else if(s<180)timeBonus=100;
const movesOver=Math.max(0,gameState.moves-par);
const movePenalty=movesOver*5;
const hintBonus=gameState.hints===3?200:0;
const totalScore=Math.max(0,baseScore+timeBonus-movePenalty+hintBonus);
const maxScore=baseScore+500+200;
const percent=totalScore/maxScore;
let stars=1;
if(percent>=0.8)stars=3;
else if(percent>=0.5)stars=2;
gameState.completedArtworks[artwork.name]=true;
if(!gameState.totalStars[artwork.name]||gameState.totalStars[artwork.name]<stars){
gameState.totalStars[artwork.name]=stars;
}
if(!gameState.bestScores[artwork.name]||gameState.bestScores[artwork.name]<totalScore){
gameState.bestScores[artwork.name]=totalScore;
}
checkTierUnlock();
saveGameState();
document.getElementById('completedArtworkName').textContent=artwork.name;
document.getElementById('finalScore').textContent='Score: '+totalScore;
let bonusText='';
if(timeBonus>0)bonusText+='Time Bonus: +'+timeBonus+'\n';
if(hintBonus>0)bonusText+='No Hints Bonus: +'+hintBonus;
document.getElementById('bonusText').textContent=bonusText;
const starEls=[document.getElementById('star1'),document.getElementById('star2'),document.getElementById('star3')];
starEls.forEach((el,i)=>{
el.classList.remove('earned');
if(i<stars){
setTimeout(()=>{
el.classList.add('earned');
playSFX('star');
},i*300);
}
});
document.getElementById('completionModal').classList.add('active');
spawnParticles(WIDTH/2,HEIGHT/2,'#ffd700',50);
spawnParticles(WIDTH/2,HEIGHT/2,'#a855f7',30);
playSFX('complete');
}

function checkTierUnlock(){
const completedByTier={1:0,2:0,3:0};
Object.keys(gameState.completedArtworks).forEach(name=>{
const artwork=ARTWORKS.find(a=>a.name===name);
if(artwork){
const tier=getTier(artwork.difficulty);
completedByTier[tier]++;
}
});
if(completedByTier[1]>=3&&!gameState.unlockedTiers.includes(2)){
gameState.unlockedTiers.push(2);
}
if(completedByTier[2]>=3&&!gameState.unlockedTiers.includes(3)){
gameState.unlockedTiers.push(3);
}
}

function getTier(difficulty){
if(difficulty===1)return 1;
if(difficulty===2)return 2;
return 3;
}

function nextArtwork(){
const currentIdx=ARTWORKS.findIndex(a=>a.name===gameState.currentArtwork.name);
const nextIdx=(currentIdx+1)%ARTWORKS.length;
startGame(ARTWORKS[nextIdx]);
}

function closeModal(){
document.getElementById('completionModal').classList.remove('active');
}

function togglePause(){
gameState.isPaused=!gameState.isPaused;
if(gameState.isPaused){
clearInterval(gameState.timerInterval);
}else{
startTimer();
}
}

function useHint(){
if(gameState.hints<=0||gameState.isComplete)return;
const artwork=gameState.currentArtwork;
const unplaced=artwork.pieces.filter(p=>!gameState.placedPieces.find(pp=>pp.id===p.id));
if(unplaced.length===0)return;
const incorrect=unplaced.find(p=>{
const placed=gameState.scrambledPieces.find(sp=>sp.id===p.id);
return!placed||placed.currentShade!==p.shade;
})||unplaced[0];
const flash=document.getElementById('hintFlash');
const piece=gameState.scrambledPieces.find(sp=>sp.id===incorrect.id);
if(piece){
flash.style.display='block';
flash.style.left=(piece._renderX+piece._cellW/2-25)+'px';
flash.style.top=(piece._renderY+piece._cellH/2-25)+'px';
setTimeout(()=>flash.style.display='none',1500);
}
gameState.hints--;
document.getElementById('hintCount').textContent=gameState.hints+' Hints';
playSFX('hint');
}

function resetProgress(){
gameState={screen:'title',currentArtwork:null,selectedPiece:null,pieces:[],placedPieces:[],scrambledPieces:[],hints:3,moves:0,startTime:0,elapsedTime:0,timerInterval:null,isPaused:false,isComplete:false,audioEnabled:true,musicEnabled:true,unlockedTiers:[1],completedArtworks:{},bestScores:{},totalStars:{},v:1};
localStorage.removeItem('polyArt3D');
showScreen('title');
}

function loadGameState(){
try{
const saved=localStorage.getItem('polyArt3D');
if(saved){
const data=JSON.parse(saved);
if(data.v===1){
gameState={...gameState,...data};
}
}
}catch(e){}
}

function saveGameState(){
try{
localStorage.setItem('polyArt3D',JSON.stringify({
v:1,
audioEnabled:gameState.audioEnabled,
musicEnabled:gameState.musicEnabled,
unlockedTiers:gameState.unlockedTiers,
completedArtworks:gameState.completedArtworks,
bestScores:gameState.bestScores,
totalStars:gameState.totalStars
}));
}catch(e){}
}

// Audio System
function initAudio(){
if(audioCtx)return;
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function playSFX(type){
if(!gameState.audioEnabled)return;
initAudio();
const now=audioCtx.currentTime;
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
switch(type){
case 'click':
osc.frequency.value=1000;
gain.gain.setValueAtTime(0.05,now);
gain.gain.exponentialDecayTo&&gain.gain.exponentialDecayTo(0.001,now+0.03)||gain.gain.setValueAtTime(0.001,now+0.03);
osc.start(now);
osc.stop(now+0.03);
break;
case 'select':
osc.frequency.value=800;
gain.gain.setValueAtTime(0.05,now);
gain.gain.setValueAtTime(0.001,now+0.05);
osc.start(now);
osc.stop(now+0.05);
break;
case 'place':
osc.frequency.value=200;
gain.gain.setValueAtTime(0.1,now);
gain.gain.setValueAtTime(0.001,now+0.1);
osc.start(now);
osc.stop(now+0.1);
break;
case 'correct':
osc.frequency.setValueAtTime(400,now);
osc.frequency.linearRampToValueAtTime(800,now+0.2);
gain.gain.setValueAtTime(0.08,now);
gain.gain.setValueAtTime(0.001,now+0.2);
osc.start(now);
osc.stop(now+0.2);
break;
case 'wrong':
osc.type='sawtooth';
osc.frequency.value=150;
gain.gain.setValueAtTime(0.08,now);
gain.gain.setValueAtTime(0.001,now+0.15);
osc.start(now);
osc.stop(now+0.15);
break;
case 'rotate':
osc.frequency.value=600;
osc.frequency.linearRampToValueAtTime(1200,now+0.15);
gain.gain.setValueAtTime(0.04,now);
gain.gain.setValueAtTime(0.001,now+0.15);
osc.start(now);
osc.stop(now+0.15);
break;
case 'hint':
osc.frequency.setValueAtTime(600,now);
osc.frequency.linearRampToValueAtTime(1200,now+0.3);
gain.gain.setValueAtTime(0.05,now);
gain.gain.setValueAtTime(0.001,now+0.3);
osc.start(now);
osc.stop(now+0.3);
break;
case 'complete':
const notes=[523,659,784,1047];
notes.forEach((freq,i)=>{
const o=audioCtx.createOscillator();
const g=audioCtx.createGain();
o.connect(g);
g.connect(audioCtx.destination);
o.frequency.value=freq;
g.gain.setValueAtTime(0.08,now+i*0.1);
g.gain.setValueAtTime(0.001,now+i*0.1+0.2);
o.start(now+i*0.1);
o.stop(now+i*0.1+0.2);
});
break;
case 'star':
osc.frequency.value=1200;
gain.gain.setValueAtTime(0.08,now);
gain.gain.setValueAtTime(0.001,now+0.15);
osc.start(now);
osc.stop(now+0.15);
break;
}
}

function startBGM(){
if(!gameState.musicEnabled||bgmPlaying)return;
initAudio();
bgmPlaying=true;
const chords=[[261,329,392],[220,261,329],[174,220,261],[196,246,293]];
let chordIdx=0;
const playChord=()=>{
if(!bgmPlaying)return;
const chord=chords[chordIdx%chords.length];
chord.forEach((freq,i)=>{
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.type='sine';
osc.frequency.value=freq;
gain.gain.value=0.02;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+2);
});
chordIdx++;
setTimeout(playChord,2000);
};
playChord();
}

function stopBGM(){
bgmPlaying=false;
if(bgmOsc){bgmOsc.stop();bgmOsc=null;}
if(bgmGain){bgmGain=null;}
}

document.addEventListener('DOMContentLoaded',init);
})();
</script>
