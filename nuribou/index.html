// ============ GAME STATE ============
let curLevel=0, grid=[], player=[], mode='fill', hintsLeft=3, hintCells=new Set();
let startTime=Date.now(), timerInterval=null, audioCtx=null, musicGain=null, musicOn=true, sfxOn=true, autoCheck=false;
let won=false, cellSize=0;

const tiers={Beginner:'#4ade80',Easy:'#55c2a0',Medium:'#ffd166',Hard:'#ff6b9d',Expert:'#ef4444'};

function loadLevel(i){
  curLevel=i; const lv=LEVELS[i];
  grid=lv.puzzle.map(r=>r.slice());
  player=lv.solution.map(r=>r.map(v=>0)); // 0=unknown,1=black,2=white
  // pre-fill clue cells as white
  for(let r=0;r<lv.R;r++) for(let c=0;c<lv.C;c++) if(lv.puzzle[r][c]>0) player[r][c]=2;
  hintsLeft=3; hintCells=new Set(); won=false; startTime=Date.now();
  document.getElementById('info-level').textContent=i+1;
  document.getElementById('info-tier').textContent=lv.tier;
  document.getElementById('hint-count').textContent=hintsLeft;
  resizeCanvas(); draw();
}
function resizeCanvas(){
  const lv=LEVELS[curLevel]; const area=document.getElementById('game-area');
  const maxW=Math.min(area.clientWidth-20,520), maxH=area.clientHeight-20;
  cellSize=Math.floor(Math.min(maxW/lv.C, maxH/lv.R));
  cellSize=Math.max(28,cellSize);
  const canvas=document.getElementById('game');
  canvas.width=cellSize*lv.C; canvas.height=cellSize*lv.R;
}
function draw(){
  const lv=LEVELS[curLevel]; const canvas=document.getElementById('game'); const ctx=canvas.getContext('2d');
  const R=lv.R,C=lv.C;
  // detect violations for highlighting
  const viol = checkViolations();
  for(let r=0;r<R;r++) for(let c=0;c<C;c++){
    const x=c*cellSize,y=r*cellSize;
    const p=player[r][c];
    // base
    if(p===1){ ctx.fillStyle = viol.badBlack&&viol.badBlack.has(r+','+c)?'#ef4444':'#3a3a4e'; }
    else if(p===2){ ctx.fillStyle='#e8e8f5'; }
    else { ctx.fillStyle='#1a1a2e'; }
    ctx.fillRect(x,y,cellSize,cellSize);
    // clue number
    if(lv.puzzle[r][c]>0){
      ctx.fillStyle = (viol.badClue&&viol.badClue.has(r+','+c))?'#ef4444':'#0f0f1a';
      ctx.font='bold '+Math.floor(cellSize*0.5)+'px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(lv.puzzle[r][c], x+cellSize/2, y+cellSize/2);
    }
    // hint glow
    if(hintCells.has(r+','+c)){
      ctx.strokeStyle='#ffd166'; ctx.lineWidth=3;
      ctx.strokeRect(x+2,y+2,cellSize-4,cellSize-4);
    }
    // grid lines
    ctx.strokeStyle='#2a2a4a'; ctx.lineWidth=1;
    ctx.strokeRect(x,y,cellSize,cellSize);
  }
}
function checkViolations(){
  const lv=LEVELS[curLevel]; const R=lv.R,C=lv.C;
  const badBlack=new Set(), badClue=new Set();
  // 2x2 black
  for(let r=0;r<R-1;r++) for(let c=0;c<C-1;c++)
    if(player[r][c]===1&&player[r+1][c]===1&&player[r][c+1]===1&&player[r+1][c+1]===1)
      [[r,c],[r+1,c],[r,c+1],[r+1,c+1]].forEach(([a,b])=>badBlack.add(a+','+b));
  // black cell >2 neighbors or L-corner
  for(let r=0;r<R;r++) for(let c=0;c<C;c++){
    if(player[r][c]!==1) continue;
    const nb=[];
    for(const [dr,dc] of [[0,1],[1,0],[0,-1],[-1,0]]){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<R&&nc>=0&&nc<C&&player[nr][nc]===1)nb.push([dr,dc]);}
    if(nb.length>2) badBlack.add(r+','+c);
    if(nb.length===2&&(nb[0][0]+nb[1][0]!==0||nb[0][1]+nb[1][1]!==0)) badBlack.add(r+','+c);
  }
  // clue cells must be white
  for(let r=0;r<R;r++) for(let c=0;c<C;c++) if(lv.puzzle[r][c]>0&&player[r][c]===1) badClue.add(r+','+c);
  return {badBlack,badClue};
}
function checkWin(){
  const lv=LEVELS[curLevel]; const R=lv.R,C=lv.C;
  // every cell filled
  for(let r=0;r<R;r++) for(let c=0;c<C;c++) if(player[r][c]===0) return false;
  // match solution
  for(let r=0;r<R;r++) for(let c=0;c<C;c++){
    const sol=lv.solution[r][c]===1?1:2;
    if(player[r][c]!==sol) return false;
  }
  return true;
}
// ============ INPUT ============
function cellFromEvent(e){
  const canvas=document.getElementById('game'); const rect=canvas.getBoundingClientRect();
  const px=(e.clientX-rect.left)*(canvas.width/rect.width);
  const py=(e.clientY-rect.top)*(canvas.height/rect.height);
  const c=Math.floor(px/cellSize), r=Math.floor(py/cellSize);
  const lv=LEVELS[curLevel];
  if(r<0||r>=lv.R||c<0||c>=lv.C) return null;
  return [r,c];
}
function handleClick(r,c){
  if(won) return;
  const lv=LEVELS[curLevel];
  if(lv.puzzle[r][c]>0) return; // can't change clue cells
  if(mode==='fill') player[r][c]=1;
  else if(mode==='white') player[r][c]=2;
  else player[r][c]=0;
  hintCells.delete(r+','+c);
  playSfx(player[r][c]===1?'fill':player[r][c]===2?'white':'erase');
  draw();
  if(autoCheck && checkWin()) doWin();
}
document.getElementById('game').addEventListener('pointerdown',e=>{e.preventDefault();const rc=cellFromEvent(e);if(rc)handleClick(rc[0],rc[1]);});
document.getElementById('mode-fill').onclick=()=>setMode('fill');
document.getElementById('mode-white').onclick=()=>setMode('white');
document.getElementById('mode-erase').onclick=()=>setMode('erase');
function setMode(m){ mode=m;
  ['fill','white','erase'].forEach(x=>{const el=document.getElementById('mode-'+x);el.classList.toggle('active',x===m);});
  document.getElementById('info-mode').textContent=m==='fill'?'Black':m==='white'?'White':'Erase';
}
// ============ HINT ============
document.getElementById('btn-hint').onclick=()=>{
  if(won||hintsLeft<=0){showToast('No hints left!');return;}
  const lv=LEVELS[curLevel];
  const candidates=[];
  for(let r=0;r<lv.R;r++) for(let c=0;c<lv.C;c++){
    if(lv.puzzle[r][c]>0) continue;
    const sol=lv.solution[r][c]===1?1:2;
    if(player[r][c]!==sol) candidates.push([r,c]);
  }
  if(!candidates.length){showToast('All correct!');return;}
  candidates.sort(()=>Math.random()-0.5);
  const [r,c]=candidates[0];
  player[r][c]=lv.solution[r][c]===1?1:2;
  hintCells.add(r+','+c);
  hintsLeft--; document.getElementById('hint-count').textContent=hintsLeft;
  playSfx('hint'); draw();
  if(autoCheck && checkWin()) doWin();
};
// ============ CHECK ============
document.getElementById('btn-check').onclick=()=>{
  if(checkWin()){doWin();}
  else{
    const lv=LEVELS[curLevel]; let filled=0,correct=0;
    for(let r=0;r<lv.R;r++) for(let c=0;c<lv.C;c++) if(player[r][c]!==0){filled++; const sol=lv.solution[r][c]===1?1:2; if(player[r][c]===sol)correct++;}
    if(filled===0){showToast('Start filling cells!');}
    else{showToast(`${correct}/${filled} correct — keep going!`);playSfx('error');}
  }
};
// ============ MENU ============
document.getElementById('btn-menu').onclick=()=>showMenu();
function showMenu(){
  const ov=document.createElement('div'); ov.className='overlay';
  let html='<h2>🧱 Nuribou</h2><div class="menu-list">';
  let curTier='';
  for(let i=0;i<LEVELS.length;i++){
    if(LEVELS[i].tier!==curTier){curTier=LEVELS[i].tier;html+=`<div class="tier-header" style="color:${tiers[curTier]}">${curTier}</div><div class="level-grid">`;}
    const prog=getProgress(i);
    html+=`<div class="level-cell ${prog.completed?'completed':''} ${i===curLevel?'current':''}" data-lvl="${i}">${i+1}${prog.stars?`<div class="stars-mini">${'★'.repeat(prog.stars)}</div>`:''}</div>`;
    if(i<LEVELS.length-1&&LEVELS[i+1].tier!==curTier) html+='</div>';
  }
  html+='</div></div><button class="btn" id="m-settings">⚙️ Settings</button><button class="btn" id="m-close">✕ Close</button>';
  ov.innerHTML=html; document.getElementById('app').appendChild(ov);
  ov.querySelectorAll('.level-cell').forEach(el=>{el.onclick=()=>{document.getElementById('app').removeChild(ov);loadLevel(parseInt(el.dataset.lvl));startTimer();};});
  document.getElementById('m-close').onclick=()=>document.getElementById('app').removeChild(ov);
  document.getElementById('m-settings').onclick=()=>{document.getElementById('app').removeChild(ov);showSettings();};
}
function showSettings(){
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<h2>⚙️ Settings</h2><div class="settings-panel">
    <div class="settings-row"><label>🎵 Music</label><div class="toggle ${musicOn?'on':''}" id="t-music"></div></div>
    <div class="settings-row"><label>🔊 Sound Effects</label><div class="toggle ${sfxOn?'on':''}" id="t-sfx"></div></div>
    <div class="settings-row"><label>✓ Auto-check</label><div class="toggle ${autoCheck?'on':''}" id="t-auto"></div></div>
  </div><button class="btn" id="s-close">✕ Close</button>`;
  document.getElementById('app').appendChild(ov);
  document.getElementById('t-music').onclick=function(){musicOn=!musicOn;this.classList.toggle('on');if(musicOn)startMusic();else stopMusic();saveSettings();};
  document.getElementById('t-sfx').onclick=function(){sfxOn=!sfxOn;this.classList.toggle('on');saveSettings();};
  document.getElementById('t-auto').onclick=function(){autoCheck=!autoCheck;this.classList.toggle('on');saveSettings();};
  document.getElementById('s-close').onclick=()=>document.getElementById('app').removeChild(ov);
}
// ============ WIN ============
function doWin(){
  won=true; clearInterval(timerInterval);
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  let stars=1; if(elapsed<120)stars=2; if(elapsed<60)stars=3;
  saveProgress(curLevel,stars); playSfx('win'); launchConfetti();
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<h2>🎉 Solved!</h2><div class="stars">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <p>Level ${curLevel+1} complete in ${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}.</p>
    <button class="btn accent" id="w-next">${curLevel<LEVELS.length-1?'Next Level →':'Finish'}</button>
    <button class="btn" id="w-menu">☰ Menu</button>`;
  document.getElementById('app').appendChild(ov);
  document.getElementById('w-next').onclick=()=>{document.getElementById('app').removeChild(ov);if(curLevel<LEVELS.length-1){loadLevel(curLevel+1);startTimer();}};
  document.getElementById('w-menu').onclick=()=>{document.getElementById('app').removeChild(ov);showMenu();};
}
function launchConfetti(){
  const colors=['#55c2a0','#ff6b9d','#ffd166','#4ade80','#64ffda'];
  for(let i=0;i<40;i++){const d=document.createElement('div');d.className='confetti';
    d.style.left=Math.random()*100+'vw';d.style.top='-10px';d.style.background=colors[i%5];
    d.style.animationDelay=Math.random()*0.5+'s';document.body.appendChild(d);
    setTimeout(()=>d.remove(),3000);}
}
// ============ TIMER ============
function startTimer(){clearInterval(timerInterval);startTime=Date.now();timerInterval=setInterval(()=>{
  const e=Math.floor((Date.now()-startTime)/1000);document.getElementById('info-time').textContent=Math.floor(e/60)+':'+String(e%60).padStart(2,'0');
},500);}
// ============ AUDIO ============
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();musicGain=audioCtx.createGain();musicGain.gain.value=0.05;musicGain.connect(audioCtx.destination);}
function playSfx(type){if(!sfxOn)return;initAudio();
  const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  if(type==='fill'){o.frequency.value=200;o.type='square';g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);}
  else if(type==='white'){o.frequency.value=400;o.type='sine';g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);}
  else if(type==='erase'){o.frequency.value=150;o.type='triangle';g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.06);}
  else if(type==='hint'){o.frequency.value=600;o.type='sine';g.gain.setValueAtTime(0.15,t);o.frequency.exponentialRampToValueAtTime(900,t+0.15);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);}
  else if(type==='win'){[523,659,784,1047].forEach((f,i)=>{const o2=audioCtx.createOscillator();const g2=audioCtx.createGain();o2.connect(g2);g2.connect(audioCtx.destination);o2.frequency.value=f;o2.type='triangle';g2.gain.setValueAtTime(0.15,t+i*0.12);g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.3);o2.start(t+i*0.12);o2.stop(t+i*0.12+0.3);});return;}
  else if(type==='error'){o.frequency.value=120;o.type='sawtooth';g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);}
  else if(type==='click'){o.frequency.value=500;o.type='sine';g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);}
  o.start(t);o.stop(t+0.3);
}
let musicTimer=null,musicStep=0;
function startMusic(){if(!musicOn)return;initAudio();if(musicTimer)return;
  const chords=[[262,330,392,494],[220,262,330,440],[174,220,262,349],[196,247,294,392]];
  musicTimer=setInterval(()=>{if(!audioCtx)return;const chord=chords[musicStep%4];musicStep++;
    chord.forEach(f=>{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(musicGain);
      o.frequency.value=f;o.type='sine';const t=audioCtx.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.5,t+0.5);g.gain.linearRampToValueAtTime(0,t+3.5);o.start(t);o.stop(t+3.5);});},3500);
}
function stopMusic(){if(musicTimer){clearInterval(musicTimer);musicTimer=null;}}
// ============ STORAGE ============
function progressKey(){return'nuribou_progress';}
function getProgress(i){try{const p=JSON.parse(localStorage.getItem(progressKey())||'{}');return p[i]||{completed:false,stars:0};}catch(e){return{completed:false,stars:0};}}
function saveProgress(i,stars){try{const p=JSON.parse(localStorage.getItem(progressKey())||'{}');if(!p[i]||stars>p[i].stars)p[i]={completed:true,stars};localStorage.setItem(progressKey(),JSON.stringify(p));}catch(e){}}
function saveSettings(){try{localStorage.setItem('nuribou_settings',JSON.stringify({musicOn,sfxOn,autoCheck}));}catch(e){}}
function loadSettings(){try{const s=JSON.parse(localStorage.getItem('nuribou_settings')||'{}');if(s.musicOn!==undefined)musicOn=s.musicOn;if(s.sfxOn!==undefined)sfxOn=s.sfxOn;if(s.autoCheck!==undefined)autoCheck=s.autoCheck;}catch(e){}}
// ============ TOAST ============
let toastTimer=null;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1800);}
// ============ KEYBOARD ============
document.addEventListener('keydown',e=>{
  if(e.key==='1')setMode('fill');else if(e.key==='2')setMode('white');else if(e.key==='3'||e.key==='e'||e.key==='E')setMode('erase');
  else if(e.key==='h'||e.key==='H')document.getElementById('btn-hint').click();
  else if(e.key==='r'||e.key==='R')loadLevel(curLevel);
  else if(e.key==='Enter')document.getElementById('btn-check').click();
  else if(e.key==='Escape')document.getElementById('btn-menu').click();
});
// ============ INIT ============
window.addEventListener('resize',()=>{resizeCanvas();draw();});
loadSettings(); loadLevel(0); startTimer();
document.body.addEventListener('pointerdown',()=>{initAudio();startMusic();},{once:true});
</script>
