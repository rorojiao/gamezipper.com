*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#1a1a2e 100%);min-height:100vh;color:#fff;overflow-x:hidden;user-select:none;-webkit-user-select:none;touch-action:none}

function drawPlates(){gameState.plates.filter(p=>p.active).forEach(plate=>{const px=offsetX+plate.x*cellSize;const py=offsetY+plate.y*cellSize;const pw=plate.w*cellSize;const ph=plate.h*cellSize;const grad=ctx.createLinearGradient(px,py,px+pw,py+ph);grad.addColorStop(0,'#b8956e');grad.addColorStop(0.3,'#9a7a52');grad.addColorStop(0.7,'#7a5a3a');grad.addColorStop(1,'#6B4423');ctx.fillStyle=grad;ctx.beginPath();ctx.roundRect(px+3,py+3,pw-6,ph-6,6);ctx.fill();ctx.strokeStyle='#4a3015';ctx.lineWidth=2;ctx.stroke();ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;for(let i=1;i<plate.h;i++){ctx.beginPath();ctx.moveTo(px+6,py+i*cellSize);ctx.lineTo(px+pw-6,py+i*cellSize);ctx.stroke();}ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+6,py+3);ctx.lineTo(px+pw-6,py+3);ctx.stroke();});fallingPlates.forEach(f=>{ctx.save();ctx.translate(offsetX+f.plate.x*cellSize+f.plate.w*cellSize/2,f.y+f.plate.h*cellSize/2);ctx.rotate(f.rot);const px=-f.plate.w*cellSize/2;const py=-f.plate.h*cellSize/2;const pw=f.plate.w*cellSize;const ph=f.plate.h*cellSize;const grad=ctx.createLinearGradient(px,py,px+pw,py+ph);grad.addColorStop(0,'#b8956e');grad.addColorStop(0.5,'#8B6914');grad.addColorStop(1,'#6B4423');ctx.fillStyle=grad;ctx.beginPath();ctx.roundRect(px+3,py+3,pw-6,ph-6,6);ctx.fill();ctx.strokeStyle='#4a3015';ctx.lineWidth=2;ctx.stroke();ctx.restore();});}
function drawBolts(){gameState.bolts.filter(b=>b.active).forEach(bolt=>{const accessible=isBoltAccessible(bolt);if(!accessible)return;const bx=offsetX+bolt.x*cellSize+cellSize/2;const by=offsetY+bolt.y*cellSize+cellSize/2;const r=cellSize*0.38;const color=HOLE_COLORS[bolt.color];ctx.save();if(accessible){ctx.shadowColor=color;ctx.shadowBlur=12;}const grad=ctx.createRadialGradient(bx-r*0.3,by-r*0.3,0,bx,by,r);grad.addColorStop(0,'#ffffff');grad.addColorStop(0.25,color);grad.addColorStop(0.7,color+'cc');grad.addColorStop(1,color+'55');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(bx-r*0.25,by-r*0.25,r*0.35,0,Math.PI*2);ctx.fill();ctx.restore();});}
function drawAnimatingBolts(){animatingBolts.forEach(a=>{const t=a.progress;const x=a.sx+(a.targetX-a.sx)*t;const y=a.sy+(a.targetY-a.sy)*t- Math.sin(t*Math.PI)*30;const r=cellSize*0.38*(1-t*0.4);const angle=t*Math.PI*6;const color=HOLE_COLORS[a.bolt.color];ctx.save();ctx.translate(x,y);ctx.rotate(angle);ctx.globalAlpha=1-t*0.2;const grad=ctx.createRadialGradient(-r*0.3,-r*0.3,0,0,0,r);grad.addColorStop(0,'#ffffff');grad.addColorStop(0.3,color);grad.addColorStop(1,color+'88');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;ctx.stroke();ctx.restore();});}
function loop(time){if(!lastTime)lastTime=time;const dt=Math.min((time-lastTime)/1000,0.1);lastTime=time;if(gameState)update(dt);render();rafId=requestAnimationFrame(loop);}
function cleanup(){if(rafId)cancelAnimationFrame(rafId);}init();
})();
</script>
