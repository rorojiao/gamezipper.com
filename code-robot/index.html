function loadProgress(){try{var s=localStorage.getItem('code_robot_v1');if(s){var p=JSON.parse(s);PROGRESS.level=p.level||1;PROGRESS.stars=p.stars||{}}var st=localStorage.getItem('code_robot_settings');if(st){SETTINGS=Object.assign(SETTINGS,JSON.parse(st))}}catch(e){}}

/* ===== 音频系统 ===== */
function initAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}}
function playTone(freq,dur,type,vol){if(!SETTINGS.sfx||!audioCtx)return;try{var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.type=type||'square';o.frequency.value=freq;o.connect(g);g.connect(audioCtx.destination);var now=audioCtx.currentTime;g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(vol||0.15,now+0.01);g.gain.exponentialRampToValueAtTime(0.001,now+dur/1000);o.start(now);o.stop(now+dur/1000)}catch(e){}}
function sfxMove(){playTone(300,50,'square',0.1)}
function sfxTurn(){playTone(500,40,'square',0.08)}
function sfxLight(){playTone(800,120,'sine',0.12);setTimeout(function(){playTone(1000,80,'sine',0.1)},60)}
function sfxJump(){if(!SETTINGS.sfx||!audioCtx)return;try{var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.type='sawtooth';o.connect(g);g.connect(audioCtx.destination);var now=audioCtx.currentTime;o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(600,now+0.25);g.gain.setValueAtTime(0.1,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);o.start(now);o.stop(now+0.25)}catch(e){}}
function sfxWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,200,'sine',0.15)},i*100)})}
function sfxError(){playTone(120,300,'sawtooth',0.15)}

function startBGM(){
  if(!SETTINGS.music||!audioCtx||bgmNodes.length)return;
  try{
    var sr=audioCtx.sampleRate;var dur=16;var bufSize=sr*dur;
    var buf=audioCtx.createBuffer(1,bufSize,sr);var d=buf.getChannelData(0);
    var chords=[[261.63,329.63,392.00],[293.66,369.99,440.00],[329.63,415.30,493.88],[293.66,369.99,440.00]];
    var cd=dur/chords.length;
    for(var i=0;i<bufSize;i++){var t=i/sr;var ci=Math.min(Math.floor(t/cd),chords.length-1);var ch=chords[ci];var s=0;
      for(var n=0;n<ch.length;n++){var f=ch[n];s+=Math.sin(2*Math.PI*f*t)*0.06;s+=Math.sin(2*Math.PI*f*2*t)*0.015;}
      var fade=t%cd;var fi=Math.min(fade/0.8,1);var fo=Math.min((cd-fade)/0.8,1);s*=fi*fo;
      var lfo=Math.sin(2*Math.PI*0.25*t)*0.15+1;d[i]=s*lfo*0.5;}
    var src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
    var filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=800;
    var g=audioCtx.createGain();g.gain.value=0.2;
    src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);src.start();
    bgmNodes=[src,filt,g];
  }catch(e){}
}
function stopBGM(){bgmNodes.forEach(function(n){try{if(n.stop)n.stop()}catch(e){}});bgmNodes=[]}

function showMenu(){
  document.getElementById('menu-screen').style.display='flex';
  document.getElementById('level-select-screen').style.display='none';
  document.getElementById('game-screen').style.display='none';
  var solved=Object.keys(PROGRESS.stars).length;
  var stars=0;for(var k in PROGRESS.stars){stars+=PROGRESS.stars[k]}
  document.getElementById('menu-stats').textContent=solved+'/'+LEVELS.length+' levels solved | '+stars+' stars earned';
}
function startGame(){loadProgress();showLevelSelect()}
function showLevelSelect(){
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('level-select-screen').style.display='flex';
  document.getElementById('game-screen').style.display='none';
  renderLevels();
}
function renderLevels(){
  var c=document.getElementById('levels-container');c.innerHTML='';
  for(var t=1;t<=5;t++){
    var tl=document.createElement('div');tl.className='tier-label t'+t;
    tl.textContent=t===1?'Tier 1: Hello Robot':t===2?'Tier 2: Turning Point':t===3?'Tier 3: Smart Code':t===4?'Tier 4: Code Master':'Tier 5: Robot Genius';
    c.appendChild(tl);
    var g=document.createElement('div');g.className='level-grid';
    for(var i=(t-1)*6;i<t*6;i++){
      var b=document.createElement('button');b.className='level-btn';
      var locked=i>0&&!PROGRESS.stars[i-1]&&PROGRESS.level<=i;
      if(locked)b.classList.add('locked');
      b.textContent=(i+1);
      var st=getStars(i);
      if(st>0){var s=document.createElement('div');s.className='stars';s.textContent=st>=3?'***':st>=2?'**':'*';b.appendChild(s)}
      if(!locked)b.onclick=function(idx){return function(){loadLevel(idx);showGame()}}(i);
      g.appendChild(b);
    }
    c.appendChild(g);
  }
}
function showGame(){
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('level-select-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
}
function getStars(li){return PROGRESS.stars[li]||0}

/* ===== 关卡加载 ===== */
function loadLevel(idx){
  curLevel=idx;var lv=LEVELS[idx];
  document.getElementById('game-title').textContent=lv.name;
  var st=getStars(idx);
  document.getElementById('game-stars').innerHTML=st>=3?'<span class="s-on">***</span>':st>=2?'<span class="s-on">**</span><span class="s-off">*</span>':st>=1?'<span class="s-on">*</span><span class="s-off">**</span>':'<span class="s-off">***</span>';
  document.getElementById('hint-bar').innerHTML='<strong>Hint:</strong> '+lv.hint;
  program=[];sub1=[];sub2=[];resetRobot();renderProgram();renderPalette();
  /* Defer canvas resize to next frame — game-screen just became display:flex, layout not computed yet */
  requestAnimationFrame(function(){resizeCanvas();renderCanvas();});
}
function resetRobot(){
  var lv=LEVELS[curLevel];
  for(var r=0;r<lv.gridH;r++){for(var c=0;c<lv.gridW;c++){
    if(lv.grid[r][c]==='S'){robotR=r;robotC=c;break}
  }}
  robotDir=lv.startDir;litSet={};running=false;animState.active=false;
  document.getElementById('run-btn').disabled=false;
  renderCanvas();
}

/* ===== 编程面板渲染 ===== */
var CMD_DEFS=[
  {id:'FWD',cls:'cmd-fwd',label:'FWD'},
  {id:'TL',cls:'cmd-tl',label:'TL'},
  {id:'TR',cls:'cmd-tr',label:'TR'},
  {id:'JMP',cls:'cmd-jmp',label:'JMP'},
  {id:'LIT',cls:'cmd-lit',label:'LIT'},
  {id:'P1',cls:'cmd-p1',label:'P1'},
  {id:'P2',cls:'cmd-p2',label:'P2'}
];
function renderPalette(){
  var p=document.getElementById('palette');p.innerHTML='<div class="palette-label">Commands</div>';
  var lv=LEVELS[curLevel];
  CMD_DEFS.forEach(function(cd){
    var el=document.createElement('div');
    el.className='cmd-block '+cd.cls;
    if(cd.id==='P1'&&lv.p1===0){el.classList.add('disabled')}
    if(cd.id==='P2'&&lv.p2===0){el.classList.add('disabled')}
    el.textContent=cd.label;
    el.onclick=function(){addCommand(cd.id)};
    p.appendChild(el);
  });
}
function addCommand(cmd){
  if(running)return;
  var lv=LEVELS[curLevel];
  if(cmd==='P1'&&lv.p1===0)return;
  if(cmd==='P2'&&lv.p2===0)return;
  if(program.length<lv.slots){program.push(cmd);renderProgram()}
}
function clearProgram(){if(running)return;program=[];sub1=[];sub2=[];renderProgram()}
function renderProgram(){
  var lv=LEVELS[curLevel];
  var sg=document.getElementById('slots');sg.innerHTML='';
  document.getElementById('slot-count').textContent=program.length+'/'+lv.slots;
  for(var i=0;i<lv.slots;i++){
    var s=document.createElement('div');s.className='slot';s.id='slot-'+i;
    var n=document.createElement('span');n.className='slot-num';n.textContent=(i+1);s.appendChild(n);
    if(program[i]){s.classList.add('filled');var ic=document.createElement('span');ic.className='cmd-icon';ic.textContent=program[i];s.appendChild(ic)}
    s.onclick=function(idx){return function(){if(!running&&program[idx]){program.splice(idx,1);renderProgram()}}}(i);
    sg.appendChild(s);
  }
  /* P1 */
  var s1=document.getElementById('sub1');s1.innerHTML='';
  var sa1=document.getElementById('sub1-area');
  if(lv.p1>0){sa1.classList.remove('disabled')}else{sa1.classList.add('disabled')}
  for(var i=0;i<lv.p1;i++){
    var s=document.createElement('div');s.className='sub-slot';s.id='sub1slot-'+i;
    if(sub1[i]){s.classList.add('filled');s.textContent=sub1[i]}
    s.onclick=function(idx){return function(){if(!running&&sub1[idx]){sub1.splice(idx,1);renderProgram()}}}(i);
    s1.appendChild(s);
  }
  /* P2 */
  var s2=document.getElementById('sub2');s2.innerHTML='';
  var sa2=document.getElementById('sub2-area');
  if(lv.p2>0){sa2.classList.remove('disabled')}else{sa2.classList.add('disabled')}
  for(var i=0;i<lv.p2;i++){
    var s=document.createElement('div');s.className='sub-slot';s.id='sub2slot-'+i;
    if(sub2[i]){s.classList.add('filled');s.textContent=sub2[i]}
    s.onclick=function(idx){return function(){if(!running&&sub2[idx]){sub2.splice(idx,1);renderProgram()}}}(i);
    s2.appendChild(s);
  }
}

/* ===== 程序执行引擎 ===== */
function expandProgram(){
  var result=[];
  for(var i=0;i<program.length;i++){
    var cmd=program[i];
    if(cmd==='P1'){for(var j=0;j<sub1.length;j++){result.push(sub1[j])}}
    else if(cmd==='P2'){for(var j=0;j<sub2.length;j++){result.push(sub2[j])}}
    else{result.push(cmd)}
  }
  return result;
}
function runProgram(){
  if(running)return;
  initAudio();startBGM();
  resetRobot();
  var cmds=expandProgram();
  if(cmds.length===0){flashError('Program is empty!');return}
  running=true;
  document.getElementById('run-btn').disabled=true;
  executeStep(cmds,0);
}
function executeStep(cmds,stepIdx){
  if(!running)return;
  if(stepIdx>=cmds.length){
    /* 检查胜负 */
    var lv=LEVELS[curLevel];
    if(robotR>=0&&robotR<lv.gridH&&robotC>=0&&robotC<lv.gridW&&lv.grid[robotR][robotC]==='G'){
      var allLit=true;
      for(var i=0;i<lv.lights.length;i++){var lr=lv.lights[i][0],lc=lv.lights[i][1];if(!litSet[lr+','+lc]){allLit=false;break}}
      if(allLit){onWin(cmds.length);return}
      else{flashError('Not all lights are on!');running=false;document.getElementById('run-btn').disabled=false;return}
    }
    flashError('Robot did not reach the goal!');running=false;document.getElementById('run-btn').disabled=false;return;
  }
  /* 高亮当前槽 */
  highlightStep(stepIdx);
  var cmd=cmds[stepIdx];
  var lv=LEVELS[curLevel];
  if(cmd==='FWD'){
    var nr=robotR+DR[robotDir],nc=robotC+DC[robotDir];
    if(nr<0||nr>=lv.gridH||nc<0||nc>=lv.gridW||lv.grid[nr][nc]==='X'||lv.grid[nr][nc]==='H'){
      flashError('Robot fell off or hit void!');running=false;document.getElementById('run-btn').disabled=false;return;
    }
    startAnim('move',robotR,robotC,nr,nc,robotDir,300/speed,function(){robotR=nr;robotC=nc;sfxMove();executeStep(cmds,stepIdx+1)});
  }else if(cmd==='TL'){
    var nd=(robotDir+3)%4;
    startAnim('turn',robotR,robotC,robotR,robotC,nd,200/speed,function(){robotDir=nd;sfxTurn();executeStep(cmds,stepIdx+1)});
  }else if(cmd==='TR'){
    var nd=(robotDir+1)%4;
    startAnim('turn',robotR,robotC,robotR,robotC,nd,200/speed,function(){robotDir=nd;sfxTurn();executeStep(cmds,stepIdx+1)});
  }else if(cmd==='JMP'){
    var nr=robotR+DR[robotDir]*2,nc=robotC+DC[robotDir]*2;
    if(nr<0||nr>=lv.gridH||nc<0||nc>=lv.gridW||lv.grid[nr][nc]==='X'){
      flashError('Jump landing is invalid!');running=false;document.getElementById('run-btn').disabled=false;return;
    }
    startAnim('jump',robotR,robotC,nr,nc,robotDir,400/speed,function(){robotR=nr;robotC=nc;sfxJump();executeStep(cmds,stepIdx+1)});
  }else if(cmd==='LIT'){
    var key=robotR+','+robotC;litSet[key]=!litSet[key];
    sfxLight();renderCanvas();
    setTimeout(function(){executeStep(cmds,stepIdx+1)},150/speed);
  }
}
function highlightStep(stepIdx){
  /* 找到原始程序中对应的槽位并高亮 */
  document.querySelectorAll('.slot').forEach(function(s){s.classList.remove('executing')});
  /* 简化:高亮第stepIdx%slots个 */
  var lv=LEVELS[curLevel];
  var si=stepIdx%lv.slots;
  var el=document.getElementById('slot-'+si);
  if(el)el.classList.add('executing');
}
function startAnim(type,fr,fc,tr,tc,dir,dur,cb){
  animState={active:true,fromR:fr,fromC:fc,toR:tr,toC:tc,dir:dir,t:0,dur:dur,type:type,cb:cb};
}
function flashError(msg){
  sfxError();
  document.querySelectorAll('.slot.executing').forEach(function(s){s.classList.add('error')});
  var el=document.createElement('div');
  el.style.cssText='position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);background:rgba(255,68,68,.95);color:#fff;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:800;z-index:400;box-shadow:0 8px 30px rgba(255,68,68,.5)';
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(function(){el.remove()},1500);
}
function onWin(cmdCount){
  running=false;document.getElementById('run-btn').disabled=false;sfxWin();
  var lv=LEVELS[curLevel];var stars=cmdCount<=lv.par?3:cmdCount<=lv.par*1.5?2:1;
  var prev=getStars(curLevel);
  if(stars>prev){PROGRESS.stars[curLevel]=stars}
  if(curLevel+1<LEVELS.length&&curLevel+1>=PROGRESS.level){PROGRESS.level=curLevel+2}
  saveProgress();
  document.getElementById('win-stars').innerHTML=stars>=3?'<span class="s-on">***</span>':stars>=2?'<span class="s-on">**</span><span class="s-off">*</span>':'<span class="s-on">*</span><span class="s-off">**</span>';
  document.getElementById('win-stats').innerHTML='Commands used: '+cmdCount+' / Par: '+lv.par;
  document.getElementById('next-btn').style.display=curLevel+1<LEVELS.length?'':'none';
  document.getElementById('win-modal').classList.add('show');
}
function replayLevel(){document.getElementById('win-modal').classList.remove('show');resetRobot();renderProgram()}
function nextLevel(){document.getElementById('win-modal').classList.remove('show');if(curLevel+1<LEVELS.length){loadLevel(curLevel+1)}}

/* ===== Canvas渲染 ===== */
function resizeCanvas(){
  if(!canvas)return;
  var lv=LEVELS[curLevel];if(!lv)return;
  var wrap=document.getElementById('board-wrap');
  var wrapW=wrap.clientWidth||parseInt(wrap.getBoundingClientRect().width)||480;
  var size=Math.min(wrapW,480);
  if(size<50)size=480; /* fallback if layout not ready */
  canvas.width=size;canvas.height=size;
  cellSize=Math.floor(size/Math.max(lv.gridW,lv.gridH));
  gridOffX=Math.floor((size-cellSize*lv.gridW)/2);
  gridOffY=Math.floor((size-cellSize*lv.gridH)/2);
}
function renderCanvas(){
  if(!ctx||!canvas)return;
  var lv=LEVELS[curLevel];if(!lv)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  /* 绘制格子 */
  for(var r=0;r<lv.gridH;r++){
    for(var c=0;c<lv.gridW;c++){
      var x=gridOffX+c*cellSize,y=gridOffY+r*cellSize;
      var cell=lv.grid[r][c];
      if(cell==='X'){ctx.fillStyle='#111';ctx.fillRect(x,y,cellSize,cellSize);continue}
      /* 地面 */
      ctx.fillStyle='#2a2a4a';ctx.fillRect(x+1,y+1,cellSize-2,cellSize-2);
      ctx.strokeStyle='#3a3a5a';ctx.lineWidth=1;ctx.strokeRect(x+1,y+1,cellSize-2,cellSize-2);
      /* 终点 */
      if(cell==='G'){
        ctx.fillStyle='rgba(0,255,136,0.3)';ctx.fillRect(x+2,y+2,cellSize-4,cellSize-4);
        ctx.strokeStyle='#00ff88';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(x+cellSize/2,y+cellSize/2,cellSize/3,0,Math.PI*2);ctx.stroke();
      }
      /* 起点 */
      if(cell==='S'){
        ctx.strokeStyle='rgba(0,221,255,0.4)';ctx.lineWidth=1;
        ctx.setLineDash([3,3]);ctx.strokeRect(x+3,y+3,cellSize-6,cellSize-6);ctx.setLineDash([]);
      }
      /* 灯 */
      if(cell==='L'){
        var key=r+','+c;var isLit=litSet[key];
        if(isLit){
          ctx.fillStyle='rgba(255,221,68,0.4)';ctx.fillRect(x+2,y+2,cellSize-4,cellSize-4);
          ctx.fillStyle='#ffdd44';
          ctx.beginPath();ctx.arc(x+cellSize/2,y+cellSize/2,cellSize/4,0,Math.PI*2);ctx.fill();
          /* 光晕 */
          var grad=ctx.createRadialGradient(x+cellSize/2,y+cellSize/2,0,x+cellSize/2,y+cellSize/2,cellSize/2);
          grad.addColorStop(0,'rgba(255,221,68,0.3)');grad.addColorStop(1,'rgba(255,221,68,0)');
          ctx.fillStyle=grad;ctx.fillRect(x,y,cellSize,cellSize);
        }else{
          ctx.strokeStyle='#666';ctx.lineWidth=2;
          ctx.beginPath();ctx.arc(x+cellSize/2,y+cellSize/2,cellSize/4,0,Math.PI*2);ctx.stroke();
        }
      }
      /* 洞 */
      if(cell==='H'){
        ctx.fillStyle='#0a0a1a';ctx.fillRect(x+3,y+3,cellSize-6,cellSize-6);
        ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.setLineDash([4,3]);
        ctx.strokeRect(x+3,y+3,cellSize-6,cellSize-6);ctx.setLineDash([]);
      }
    }
  }
  /* 绘制机器人 */
  drawRobot();
}
function drawRobot(){
  var lv=LEVELS[curLevel];
  var ar,ac,dir=robotDir,jumpOff=0;
  if(animState.active){
    var p=Math.min(animState.t/animState.dur,1);
    var ease=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    ar=animState.fromR+(animState.toR-animState.fromR)*ease;
    ac=animState.fromC+(animState.toC-animState.fromC)*ease;
    dir=animState.dir;
    if(animState.type==='jump'){jumpOff=Math.sin(p*Math.PI)*cellSize*0.3}
  }else{ar=robotR;ac=robotC}
  var x=gridOffX+ac*cellSize+cellSize/2;
  var y=gridOffY+ar*cellSize+cellSize/2-jumpOff;
  var rs=cellSize*0.7; /* 机器人尺寸 */
  ctx.save();ctx.translate(x,y);
  /* 方向旋转 */
  var rot=[0,Math.PI/2,Math.PI,-Math.PI/2][dir];
  ctx.rotate(rot);
  /* 机器人身体 */
  ctx.fillStyle='#00ddff';
  ctx.beginPath();ctx.roundRect(-rs/2,-rs/2,rs,rs,rs*0.2);ctx.fill();
  ctx.strokeStyle='#0099cc';ctx.lineWidth=2;ctx.stroke();
  /* 眼睛 */
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-rs*0.18,-rs*0.1,rs*0.12,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(rs*0.18,-rs*0.1,rs*0.12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#003';
  ctx.beginPath();ctx.arc(-rs*0.18,-rs*0.1,rs*0.06,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(rs*0.18,-rs*0.1,rs*0.06,0,Math.PI*2);ctx.fill();
  /* 方向指示三角 */
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.beginPath();ctx.moveTo(0,-rs*0.4);ctx.lineTo(-rs*0.12,-rs*0.28);ctx.lineTo(rs*0.12,-rs*0.28);ctx.closePath();ctx.fill();
  /* 天线 */
  ctx.strokeStyle='#00ddff';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,-rs/2);ctx.lineTo(0,-rs*0.65);ctx.stroke();
  ctx.fillStyle='#ffdd44';
  ctx.beginPath();ctx.arc(0,-rs*0.68,rs*0.08,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

/* ===== 动画循环 ===== */
function loop(ts){
  if(animState.active){
    if(!animState.lastTs)animState.lastTs=ts;
    animState.t+=ts-animState.lastTs;
    animState.lastTs=ts;
    if(animState.t>=animState.dur){
      animState.active=false;animState.lastTs=0;
      var cb=animState.cb;animState.cb=null;
      renderCanvas();
      if(cb)cb();
    }else{renderCanvas()}
  }
  rafId=requestAnimationFrame(loop);
}

/* ===== 设置 ===== */
function showSettings(){document.getElementById('settings-modal').classList.add('show')}
function closeSettings(){document.getElementById('settings-modal').classList.remove('show')}
function toggleSfx(){
  SETTINGS.sfx=!SETTINGS.sfx;saveSettings();
  document.getElementById('sfx-toggle').classList.toggle('on',SETTINGS.sfx);
}
function toggleMusic(){
  SETTINGS.music=!SETTINGS.music;saveSettings();
  document.getElementById('music-toggle').classList.toggle('on',SETTINGS.music);
  if(SETTINGS.music){initAudio();startBGM()}else{stopBGM()}
}
function setSpeed(s){
  speed=s;
  document.querySelectorAll('.speed-btn').forEach(function(b){
    b.classList.toggle('active',parseInt(b.dataset.speed)===s);
  });
}

/* ===== 教程 ===== */
var tutSteps=[
  {h:'Welcome to Code Robot!',p:'You program a robot by placing command blocks into slots. The robot follows your program step by step. Goal: light up all L tiles and reach the G tile.'},
  {h:'Command Blocks',p:'FWD = move forward one cell. TL/TR = turn left/right. JMP = jump over gaps. LIT = light up the tile you are standing on. P1/P2 = call a reusable subroutine (unlocked in later levels).'},
  {h:'How to Win',p:'Tap a command in the palette to add it to your program. Fill the slots, then press RUN. Earn 3 stars by using fewer commands than the par target. Good luck!'}
];
function showTutorial(idx){
  var card=document.getElementById('tutorial-card');
  var s=tutSteps[idx];
  card.innerHTML='<h2>'+s.h+'</h2><p>'+s.p+'</p><div style="margin-top:14px">'+
    (idx>0?'<button class="ctrl-btn" onclick="showTutorial('+(idx-1)+')">BACK</button>':'')+
    (idx<tutSteps.length-1?'<button class="ctrl-btn accent" onclick="showTutorial('+(idx+1)+')">NEXT</button>':'<button class="ctrl-btn accent" onclick="document.getElementById(\'tutorial-overlay\').classList.remove(\'show\')">GOT IT</button>')+
    '</div>';
  document.getElementById('tutorial-overlay').classList.add('show');
}

/* ===== 生命周期管理 ===== */
function cleanup(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null}
  timers.forEach(function(t){clearInterval(t)});timers=[];
  stopBGM();
  if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null}
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
  if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null}}
  else if(!rafId){rafId=requestAnimationFrame(loop)}
});

/* ===== 初始化 ===== */
window.addEventListener('load',function(){
  canvas=document.getElementById('board');ctx=canvas.getContext('2d');
  loadProgress();showMenu();
  rafId=requestAnimationFrame(loop);
  window.addEventListener('resize',function(){resizeCanvas();renderCanvas()});
});
