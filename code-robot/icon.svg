<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="#0a0a1a"/>
  
  <!-- Grid pattern background -->
  <g opacity="0.15">
    <rect x="100" y="100" width="824" height="824" fill="none" stroke="#00ddff" stroke-width="2"/>
    <line x1="306" y1="100" x2="306" y2="924" stroke="#00ddff" stroke-width="1"/>
    <line x1="512" y1="100" x2="512" y2="924" stroke="#00ddff" stroke-width="1"/>
    <line x1="718" y1="100" x2="718" y2="924" stroke="#00ddff" stroke-width="1"/>
    <line x1="100" y1="306" x2="924" y2="306" stroke="#00ddff" stroke-width="1"/>
    <line x1="100" y1="512" x2="924" y2="512" stroke="#00ddff" stroke-width="1"/>
    <line x1="100" y1="718" x2="924" y2="718" stroke="#00ddff" stroke-width="1"/>
  </g>
  
  <!-- Circuit lines -->
  <g opacity="0.3" fill="none" stroke="#00ddff" stroke-width="3">
    <path d="M150 200 L250 200 L250 150"/>
    <path d="M774 200 L874 200 L874 150"/>
    <path d="M150 824 L250 824 L250 874"/>
    <path d="M774 824 L874 824 L874 874"/>
    <circle cx="250" cy="150" r="6" fill="#00ddff"/>
    <circle cx="874" cy="150" r="6" fill="#00ddff"/>
    <circle cx="250" cy="874" r="6" fill="#00ddff"/>
    <circle cx="874" cy="874" r="6" fill="#00ddff"/>
  </g>
  
  <!-- Robot head/body -->
  <rect x="340" y="320" width="344" height="300" rx="60" fill="#00ddff" opacity="0.9"/>
  <rect x="340" y="320" width="344" height="300" rx="60" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.6"/>
  
  <!-- Robot face plate -->
  <rect x="380" y="370" width="264" height="200" rx="40" fill="#0a0a1a"/>
  
  <!-- Eyes (glowing LED) -->
  <circle cx="460" cy="450" r="36" fill="#00ff88" opacity="0.9"/>
  <circle cx="460" cy="450" r="36" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <circle cx="460" cy="450" r="24" fill="#ffffff"/>
  
  <circle cx="564" cy="450" r="36" fill="#00ff88" opacity="0.9"/>
  <circle cx="564" cy="450" r="36" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <circle cx="564" cy="450" r="24" fill="#ffffff"/>
  
  <!-- Mouth/speaker -->
  <rect x="440" y="520" width="144" height="20" rx="10" fill="#00ddff" opacity="0.6"/>
  
  <!-- Antenna -->
  <line x1="512" y1="320" x2="512" y2="260" stroke="#00ddff" stroke-width="6"/>
  <circle cx="512" cy="250" r="18" fill="#ffdd44"/>
  <circle cx="512" cy="250" r="28" fill="none" stroke="#ffdd44" stroke-width="2" opacity="0.4"/>
  
  <!-- Body lower section -->
  <rect x="400" y="640" width="224" height="80" rx="20" fill="#00ddff" opacity="0.7"/>
  <rect x="420" y="660" width="60" height="40" rx="8" fill="#0a0a1a" opacity="0.6"/>
  <rect x="500" y="660" width="60" height="40" rx="8" fill="#0a0a1a" opacity="0.6"/>
  
  <!-- Command blocks at bottom -->
  <rect x="200" y="780" width="80" height="60" rx="12" fill="#00ff88" opacity="0.8"/>
  <path d="M230 800 L250 800 M240 795 L250 810 L230 810" stroke="#0a0a1a" stroke-width="3" fill="none"/>
  
  <rect x="310" y="780" width="80" height="60" rx="12" fill="#ff6b6b" opacity="0.8"/>
  <path d="M340 800 L360 800 M340 795 L340 815 M360 795 L360 815" stroke="#0a0a1a" stroke-width="3" fill="none"/>
  
  <rect x="420" y="780" width="80" height="60" rx="12" fill="#4ecdc4" opacity="0.8"/>
  <circle cx="460" cy="810" r="16" fill="#0a0a1a" opacity="0.7"/>
  
  <rect x="530" y="780" width="80" height="60" rx="12" fill="#ffdd44" opacity="0.8"/>
  <path d="M570 800 L570 820 M555 805 L555 815 M585 805 L585 815" stroke="#0a0a1a" stroke-width="3" fill="none"/>
  
  <rect x="640" y="780" width="80" height="60" rx="12" fill="#a78bfa" opacity="0.8"/>
  <path d="M670 795 L690 810 L670 825 Z" fill="#0a0a1a" opacity="0.7"/>
  
  <!-- Title accent -->
  <text x="512" y="180" text-anchor="middle" fill="#00ddff" font-family="monospace" font-size="52" font-weight="bold" opacity="0.9">CODE ROBOT</text>
</svg>