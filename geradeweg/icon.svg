<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#0a0e1a"/>
<stop offset="100%" style="stop-color:#0d1a2d"/>
</linearGradient>
<linearGradient id="loop" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#00f2fe"/>
<stop offset="100%" style="stop-color:#4facfe"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="8" result="blur"/>
<feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<rect width="512" height="512" rx="80" fill="url(#bg)"/>
<!-- Grid dots -->
<g fill="rgba(255,255,255,0.08)">
<circle cx="128" cy="128" r="6"/>
<circle cx="256" cy="128" r="6"/>
<circle cx="384" cy="128" r="6"/>
<circle cx="128" cy="256" r="6"/>
<circle cx="384" cy="256" r="6"/>
<circle cx="128" cy="384" r="6"/>
<circle cx="256" cy="384" r="6"/>
<circle cx="384" cy="384" r="6"/>
</g>
<!-- The loop path -->
<path d="M 128,128 L 384,128 L 384,384 L 128,384 Z" 
      fill="none" stroke="url(#loop)" stroke-width="20" 
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#glow)"/>
<!-- Number clues -->
<circle cx="128" cy="128" r="36" fill="#1e3050"/>
<text x="128" y="128" text-anchor="middle" dominant-baseline="central" 
      font-family="Arial,sans-serif" font-size="40" font-weight="bold" fill="#00f2fe">3</text>
<circle cx="384" cy="128" r="36" fill="#1e3050"/>
<text x="384" y="128" text-anchor="middle" dominant-baseline="central" 
      font-family="Arial,sans-serif" font-size="40" font-weight="bold" fill="#00f2fe">3</text>
<circle cx="128" cy="384" r="36" fill="#1e3050"/>
<text x="128" y="384" text-anchor="middle" dominant-baseline="central" 
      font-family="Arial,sans-serif" font-size="40" font-weight="bold" fill="#00f2fe">3</text>
<circle cx="384" cy="384" r="36" fill="#1e3050"/>
<text x="384" y="384" text-anchor="middle" dominant-baseline="central" 
      font-family="Arial,sans-serif" font-size="40" font-weight="bold" fill="#00f2fe">3</text>
</svg>