const REGION_COLORS = [
  'rgba(100,255,218,0.10)','rgba(255,107,157,0.10)','rgba(255,209,102,0.10)',

// ============== STATE ==============
const state = {
  level: 0,
  rows: 0, cols: 0,
  clues: [],
  borders: {},
  hints: 3,
  hintsUsed: 0,
  startTime: 0,

// ============== PERSISTENCE ==============
const SAVE_KEY = 'scrin_save_v1';
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { progress: {}, settings: { music: true, sfx: true, autocheck: false } };
}
function saveProgress() {
  const s = loadSave();
  const lvl = state.level;
  if (!s.progress[lvl]) s.progress[lvl] = {};
  s.progress[lvl].completed = state.won;
  s.progress[lvl].time = Math.floor((Date.now() - state.startTime) / 1000);
  s.progress[lvl].hints = state.hintsUsed;
  s.progress[lvl].stars = state.won ? computeStars() : 0;
  s.progress[lvl].borders = JSON.stringify(state.borders);
  localStorage.setItem(SAVE_KEY, JSON.stringify(s));
}
function saveSettings() {
  const s = loadSave();
  s.settings.music = state.musicOn;
  s.settings.sfx = state.sfxOn;
  s.settings.autocheck = state.autoCheck;
  localStorage.setItem(SAVE_KEY, JSON.stringify(s));
}
function getSavedBorders(lvl) {
  const s = loadSave();
  if (s.progress[lvl] && s.progress[lvl].borders) {
    return JSON.parse(s.progress[lvl].borders);
  }
  return null;
}

// ============== CANVAS ==============
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let CELL = 50;

function resize() {
  const app = document.getElementById('app');
  const w = Math.min(app.clientWidth - 16, 560);
  CELL = Math.floor((w - 4) / state.cols);
  const cw = CELL * state.cols + 4;
  const ch = CELL * state.rows + 4;
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  draw();
}

// ============== REGION DETECTION ==============
function computeRegions() {
  const R = state.rows, C = state.cols;
  const parent = [];
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      parent.push(r * C + c);
    }
  }
  function find(x) {
    while (parent[x] !== x) {
      parent[x] = parent[parent[x]];
      x = parent[x];
    }
    return x;
  }
  function union(a, b) {
    const ra = find(a), rb = find(b);
    if (ra !== rb) parent[ra] = rb;
  }
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      // Union with right neighbor (r, c+1) if no vertical border between them
      // state.borders['v_r_c'] = border between (r, c) and (r, c+1)
      if (c < C - 1 && !state.borders['v_' + r + '_' + c]) {
        union(r * C + c, r * C + c + 1);
      }
      // Union with bottom neighbor (r+1, c) if no horizontal border between them
      // state.borders['h_r_c'] = border between (r, c) and (r+1, c)
      if (r < R - 1 && !state.borders['h_' + r + '_' + c]) {
        union(r * C + c, (r + 1) * C + c);
      }
    }
  }
  const regions = {};
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const root = find(r * C + c);
      if (!regions[root]) regions[root] = [];
      regions[root].push({ r, c });
    }
  }
  return Object.values(regions);
}

function isRectangle(cells) {
  let r0 = Infinity, c0 = Infinity, r1 = -1, c1 = -1;
  for (const {r, c} of cells) {
    if (r < r0) r0 = r;
    if (c < c0) c0 = c;
    if (r > r1) r1 = r;
    if (c > c1) c1 = c;
  }
  const expected = (r1 - r0 + 1) * (c1 - c0 + 1);
  if (cells.length !== expected) return null;
  const set = new Set(cells.map(({r, c}) => r + ',' + c));
  for (let r = r0; r <= r1; r++) {
    for (let c = c0; c <= c1; c++) {
      if (!set.has(r + ',' + c)) return null;
    }
  }
  return { r0, c0, r1, c1 };
}

function checkWin() {
  const regions = computeRegions();
  let allValid = true;
  let clueCount = 0;
  for (const cells of regions) {
    if (cells.length === 0) continue;
    if (!isRectangle(cells)) {
      allValid = false;
      continue;
    }
    let foundClue = -1;
    for (const {r, c} of cells) {
      for (const cl of state.clues) {
        if (cl.r === r && cl.c === c) {
          foundClue = cl.n;
        }
      }
    }
    if (foundClue === -1) {
      allValid = false;  // every region must have a clue
    } else if (cells.length !== foundClue) {
      allValid = false;
    } else {
      clueCount++;
    }
  }
  return { allValid, clueCount, totalRegions: regions.length };
}

// ============== DRAWING ==============
function draw() {
  const R = state.rows, C = state.cols;
  ctx.fillStyle = COLORS.panel;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Region overlay
  const regions = computeRegions();
  const cellRegion = {};
  regions.forEach((cells, idx) => {
    for (const {r, c} of cells) cellRegion[r + ',' + c] = idx;
  });

  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const x = 2 + c * CELL, y = 2 + r * CELL;
      const idx = cellRegion[r + ',' + c] || 0;
      ctx.fillStyle = REGION_COLORS[idx % REGION_COLORS.length];
      ctx.fillRect(x, y, CELL, CELL);
    }
  }

  // Light grid lines
  ctx.strokeStyle = COLORS.border;
  ctx.lineWidth = 1;
  for (let r = 0; r <= R; r++) {
    ctx.beginPath();
    ctx.moveTo(2, 2 + r * CELL);
    ctx.lineTo(2 + C * CELL, 2 + r * CELL);
    ctx.stroke();
  }
  for (let c = 0; c <= C; c++) {
    ctx.beginPath();
    ctx.moveTo(2 + c * CELL, 2);
    ctx.lineTo(2 + c * CELL, 2 + R * CELL);
    ctx.stroke();
  }

  // Active borders (thick cyan)
  ctx.strokeStyle = COLORS.borderActive;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      if (state.borders['h_' + r + '_' + c]) {
        // border between (r, c) and (r+1, c) — at y = (r+1) * CELL
        const y = 2 + (r + 1) * CELL;
        ctx.beginPath();
        ctx.moveTo(2 + c * CELL, y);
        ctx.lineTo(2 + (c + 1) * CELL, y);
        ctx.stroke();
      }
      if (state.borders['v_' + r + '_' + c]) {
        // border between (r, c) and (r, c+1) — at x = (c+1) * CELL
        const x = 2 + (c + 1) * CELL;
        ctx.beginPath();
        ctx.moveTo(x, 2 + r * CELL);
        ctx.lineTo(x, 2 + (r + 1) * CELL);
        ctx.stroke();
      }
    }
  }

  // Hint highlights
  for (const key of state.hintCells) {
    const [r, c] = key.split(',').map(Number);
    const x = 2 + c * CELL, y = 2 + r * CELL;
    ctx.strokeStyle = COLORS.borderHint;
    ctx.lineWidth = 3;
    ctx.strokeRect(x + 4, y + 4, CELL - 8, CELL - 8);
  }

  // Clue numbers
  ctx.fillStyle = COLORS.clue;
  ctx.font = 'bold ' + Math.floor(CELL * 0.45) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const cl of state.clues) {
    const x = 2 + cl.c * CELL + CELL / 2;
    const y = 2 + cl.r * CELL + CELL / 2;
    ctx.fillText(cl.n, x, y);
  }
}

// ============== INPUT ==============
canvas.addEventListener('pointerdown', handlePointer);

function handlePointer(e) {
  if (state.won) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left - 2;
  const y = e.clientY - rect.top - 2;
  // The grid is at x in [0, C*CELL], y in [0, R*CELL]
  // Horizontal border between (r, c) and (r+1, c) is at y = (r+1) * CELL for r in [0, R-1]
  // Vertical border between (r, c) and (r, c+1) is at x = (c+1) * CELL for c in [0, C-1]
  // Also need outer edges (implicit) — but we don't allow toggling those.
  const tol = Math.max(8, CELL * 0.3);
  // Find nearest horizontal border line
  // r ranges -1 (top edge, implicit) to R-1 (last h border before bottom)
  // The h line at y is at integer multiple of CELL
  // For y in [0, R*CELL], the nearest h line is at y_line = round(y / CELL) * CELL
  // But we need y_line in [CELL, R*CELL] (no implicit top border toggle)
  // Actually we also need to consider r=0 (border at y=CELL between row 0 and row 1)
  // r ranges 0 to R-1: h_r is at y = (r+1) * CELL
  // r=-1 is at y=0 (top of grid, implicit — don't toggle)
  // r=R is at y=R*CELL (bottom of grid, implicit)
  let bestH = null, bestHdist = Infinity;
  for (let r = 0; r < R; r++) {
    const yLine = (r + 1) * CELL;
    const d = Math.abs(y - yLine);
    if (d < bestHdist) { bestHdist = d; bestH = r; }
  }
  let bestV = null, bestVdist = Infinity;
  for (let c = 0; c < C; c++) {
    const xLine = (c + 1) * CELL;
    const d = Math.abs(x - xLine);
    if (d < bestVdist) { bestVdist = d; bestV = c; }
  }
  if (bestHdist < tol && bestHdist <= bestVdist) {
    toggleBorder('h', bestH, findColumnAt(x));
  } else if (bestVdist < tol) {
    toggleBorder('v', findRowAt(y), bestV);
  }
  draw();
  if (state.autoCheck) checkAndMaybeWin();
  saveProgress();
}

function findColumnAt(x) {
  // x in [0, C*CELL] — find the column whose cells are near x
  const c = Math.floor(x / CELL);
  return Math.max(0, Math.min(C - 1, c));
}
function findRowAt(y) {
  const r = Math.floor(y / CELL);
  return Math.max(0, Math.min(R - 1, r));
}

function toggleBorder(type, r, c) {
  if (type === 'h') {
    const key = 'h_' + r + '_' + c;
    if (state.mode === 'place') state.borders[key] = true;
    else delete state.borders[key];
  } else {
    const key = 'v_' + r + '_' + c;
    if (state.mode === 'place') state.borders[key] = true;
    else delete state.borders[key];
  }
  playClick();
}

// ============== HINT ==============
function getSolution() {
  const L = LEVELS[state.level];
  if (!L || !L.solution) return null;
  // Build borders from solution
  // rect (r0, c0, r1, c1) → borders:
  //   top:    h_(r0-1)_c for c in [c0, c1] (only if r0 > 0; otherwise implicit)
  //   bottom: h_r1_c for c in [c0, c1] (always set — between (r1, c) and (r1+1, c))
  //   left:   v_r_(c0-1) for r in [r0, r1] (only if c0 > 0; otherwise implicit)
  //   right:  v_r_c1 for r in [r0, r1] (always set)
  const borders = {};
  for (const rect of L.solution) {
    const r0 = rect.r0, c0 = rect.c0, r1 = rect.r1, c1 = rect.c1;
    if (r0 > 0) for (let c = c0; c <= c1; c++) borders['h_' + (r0 - 1) + '_' + c] = true;
    for (let c = c0; c <= c1; c++) borders['h_' + r1 + '_' + c] = true;
    if (c0 > 0) for (let r = r0; r <= r1; r++) borders['v_' + r + '_' + (c0 - 1)] = true;
    for (let r = r0; r <= r1; r++) borders['v_' + r + '_' + c1] = true;
  }
  return borders;
}

function giveHint() {
  if (state.hints <= 0) {
    toast('No hints left!');
    return;
  }
  const sol = getSolution();
  if (!sol) return;
  const wrong = [];
  for (const key of Object.keys(sol)) {
    if (!state.borders[key]) wrong.push({ key, op: 'add' });
  }
  for (const key of Object.keys(state.borders)) {
    if (!sol[key]) wrong.push({ key, op: 'remove' });
  }
  if (wrong.length === 0) {
    toast('All borders correct!');
    return;
  }
  const w = wrong[Math.floor(Math.random() * wrong.length)];
  if (w.op === 'add') state.borders[w.key] = true;
  else delete state.borders[w.key];
  state.hints--;
  state.hintsUsed++;
  state.hintCells.clear();
  const m = w.key.match(/^([hv])_(\d+)_(\d+)$/);
  if (m) {
    const type = m[1], r = +m[2], c = +m[3];
    // Highlight adjacent cells
    if (type === 'h') {
      // border between (r, c) and (r+1, c)
      state.hintCells.add(r + ',' + c);
      state.hintCells.add((r + 1) + ',' + c);
    } else {
      state.hintCells.add(r + ',' + c);
      state.hintCells.add(r + ',' + (c + 1));
    }
  }
  draw();
  document.getElementById('hints').textContent = state.hints;
  playHint();
  saveProgress();
}

// ============== CHECK & WIN ==============
function checkAndMaybeWin() {
  const { allValid, totalRegions } = checkWin();
  if (allValid && totalRegions > 0) {
    state.won = true;
    showWin();
    playWin();
  } else {
    playError();
  }
}

function computeStars() {
  const elapsed = (Date.now() - state.startTime) / 1000;
  if (state.hintsUsed === 0 && elapsed < 60) return 3;
  if (state.hintsUsed <= 1 && elapsed < 180) return 3;
  if (state.hintsUsed <= 2) return 2;
  return 1;
}

function showWin() {
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const stars = computeStars();
  document.getElementById('winStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  document.getElementById('winStats').textContent = `Time: ${mins}:${secs.toString().padStart(2, '0')} · Hints: ${state.hintsUsed} · Regions: ${computeRegions().length}`;
  document.getElementById('winModal').classList.add('show');
  saveProgress();
}

function clearAll() {
  state.borders = {};
  state.hintCells.clear();
  draw();
  playErase();
}

// ============== AUDIO (Web Audio API) ==============
let audioCtx = null;
let musicNodes = null;
function getAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
  return audioCtx;
}
function startMusic() {
  if (!state.musicOn) return;
  const ctx = getAudio();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  if (musicNodes) return;
  const chords = [
    [261.63, 329.63, 392.00, 493.88],
    [293.66, 349.23, 440.00, 523.25],
    [220.00, 277.18, 329.63, 415.30],
    [196.00, 246.94, 293.66, 392.00],
  ];
  const oscs = [];
  const gain = ctx.createGain();
  gain.gain.value = 0.04;
  gain.connect(ctx.destination);
  chords.forEach((freqs) => {
    freqs.forEach(f => {
      const o = ctx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f;
      const g = ctx.createGain();
      g.gain.value = 0.012;
      o.connect(g);
      g.connect(gain);
      o.start();
      oscs.push({ o, g });
    });
  });
  let step = 0;
  const cycle = setInterval(() => {
    if (!state.musicOn || state.won) {
      clearInterval(cycle);
      oscs.forEach(({o}) => { try { o.stop(); } catch(e) {} });
      musicNodes = null;
      return;
    }
    step = (step + 1) % chords.length;
    const c = chords[step];
    oscs.forEach(({ o }, i) => {
      o.frequency.setTargetAtTime(c[i % 4], ctx.currentTime, 0.5);
    });
  }, 4000);
  musicNodes = { oscs, cycle };
}
function stopMusic() {
  if (musicNodes) {
    musicNodes.oscs.forEach(({o}) => { try { o.stop(); } catch(e) {} });
    musicNodes = null;
  }
}

function playTone(freq, dur, type='sine', vol=0.1) {
  if (!state.sfxOn) return;
  const ctx = getAudio();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  o.connect(g);
  g.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime + dur);
}
function playClick() { playTone(800, 0.05, 'square', 0.05); }
function playErase() { playTone(400, 0.08, 'sine', 0.06); }
function playHint() { playTone(660, 0.15, 'sine', 0.08); setTimeout(() => playTone(880, 0.15, 'sine', 0.08), 100); }
function playError() { playTone(200, 0.2, 'sawtooth', 0.08); }
function playWin() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'sine', 0.1), i * 150)); }

// ============== UI ==============
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function loadLevel(idx) {
  state.level = idx;
  const L = LEVELS[idx];
  state.rows = L.rows;
  state.cols = L.cols;
  state.clues = L.clues;
  const saved = getSavedBorders(idx);
  state.borders = saved || {};
  state.hints = 3;
  state.hintsUsed = (loadSave().progress[idx] && loadSave().progress[idx].hints) || 0;
  state.startTime = Date.now();
  state.paused = false;
  state.won = false;
  state.hintCells.clear();
  state.mode = 'place';
  document.getElementById('tier').textContent = L.tier;
  document.getElementById('lvlNum').textContent = (idx + 1);
  document.getElementById('hints').textContent = state.hints;
  document.getElementById('placeBtn').classList.add('active');
  document.getElementById('eraseBtn').classList.remove('active');
  document.getElementById('winModal').classList.remove('show');
  R = state.rows;  // global for handlePointer
  C = state.cols;
  resize();
  startTimer();
  startMusic();
}

let R = 5, C = 5;  // global for handlePointer (set in loadLevel)

function startTimer() {
  if (state._timer) clearInterval(state._timer);
  state._timer = setInterval(() => {
    if (state.paused || state.won) return;
    const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('timer').textContent = m + ':' + s.toString().padStart(2, '0');
  }, 1000);
}

function openMenu() {
  state.paused = true;
  const tierList = document.getElementById('tierList');
  const save = loadSave();
  tierList.innerHTML = '';
  const tiers = ['Beginner', 'Easy', 'Medium', 'Hard', 'Expert'];
  tiers.forEach(tier => {
    const div = document.createElement('div');
    div.className = 'tier-label';
    div.textContent = tier;
    tierList.appendChild(div);
    const grid = document.createElement('div');
    grid.className = 'lvl-grid';
    for (let i = 0; i < LEVELS.length; i++) {
      if (LEVELS[i].tier !== tier) continue;
      const btn = document.createElement('div');
      btn.className = 'lvl-btn';
      const prog = save.progress[i];
      if (prog && prog.completed) btn.classList.add('completed');
      btn.innerHTML = `<div>${i + 1}</div>${prog && prog.stars ? '<div class="lvl-stars">' + '⭐'.repeat(prog.stars) + '</div>' : ''}`;
      btn.onclick = () => {
        document.getElementById('menuOverlay').classList.remove('show');
        loadLevel(i);
      };
      grid.appendChild(btn);
    }
    tierList.appendChild(grid);
  });
  document.getElementById('menuOverlay').classList.add('show');
}

// ============== INIT ==============
window.addEventListener('DOMContentLoaded', () => {
  const s = loadSave().settings || {};
  state.musicOn = s.music !== false;
  state.sfxOn = s.sfx !== false;
  state.autoCheck = !!s.autocheck;
  document.getElementById('musicToggle').checked = state.musicOn;
  document.getElementById('sfxToggle').checked = state.sfxOn;
  document.getElementById('autocheckToggle').checked = state.autoCheck;

  document.getElementById('placeBtn').onclick = () => {
    state.mode = 'place';
    document.getElementById('placeBtn').classList.add('active');
    document.getElementById('eraseBtn').classList.remove('active');
  };
  document.getElementById('eraseBtn').onclick = () => {
    state.mode = 'erase';
    document.getElementById('eraseBtn').classList.add('active');
    document.getElementById('placeBtn').classList.remove('active');
  };
  document.getElementById('hintBtn').onclick = giveHint;
  document.getElementById('checkBtn').onclick = () => { checkAndMaybeWin(); };
  document.getElementById('clearBtn').onclick = clearAll;
  document.getElementById('menuBtn').onclick = openMenu;
  document.getElementById('menuBtn2').onclick = openMenu;
  document.getElementById('closeMenuBtn').onclick = () => {
    document.getElementById('menuOverlay').classList.remove('show');
    state.paused = false;
  };
  document.getElementById('settingsBtn').onclick = () => {
    document.getElementById('menuOverlay').classList.remove('show');
    document.getElementById('settingsPanel').classList.add('show');
  };
  document.getElementById('closeSettingsBtn').onclick = () => {
    document.getElementById('settingsPanel').classList.remove('show');
    openMenu();
  };
  document.getElementById('musicToggle').onchange = (e) => {
    state.musicOn = e.target.checked;
    saveSettings();
    if (state.musicOn) startMusic(); else stopMusic();
  };
  document.getElementById('sfxToggle').onchange = (e) => {
    state.sfxOn = e.target.checked;
    saveSettings();
  };
  document.getElementById('autocheckToggle').onchange = (e) => {
    state.autoCheck = e.target.checked;
    saveSettings();
  };
  document.getElementById('nextBtn').onclick = () => {
    if (state.level < LEVELS.length - 1) loadLevel(state.level + 1);
    else openMenu();
  };
  document.getElementById('replayBtn').onclick = () => {
    state.borders = {};
    state.won = false;
    state.startTime = Date.now();
    document.getElementById('winModal').classList.remove('show');
    draw();
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === '1') document.getElementById('placeBtn').click();
    else if (e.key === '2') document.getElementById('eraseBtn').click();
    else if (e.key === 'h' || e.key === 'H') giveHint();
    else if (e.key === 'r' || e.key === 'R') clearAll();
    else if (e.key === 'Enter') checkAndMaybeWin();
    else if (e.key === 'Escape') openMenu();
  });

  document.addEventListener('pointerdown', () => {
    if (state.musicOn) startMusic();
  }, { once: true });

  loadLevel(0);
});

window.addEventListener('beforeunload', () => {
  if (state.borders && Object.keys(state.borders).length > 0) saveProgress();
  stopMusic();
});

window.addEventListener('resize', resize);
</script>
