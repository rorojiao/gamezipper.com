<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d2a2d"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Title -->
  <text x="600" y="120" font-family="Inter,Arial,sans-serif" font-size="72" font-weight="900" fill="#FFD93D" text-anchor="middle">DUCK MERGE</text>
  <text x="600" y="170" font-family="Inter,Arial,sans-serif" font-size="28" fill="#aaa" text-anchor="middle">Drag, Merge, Evolve!</text>
  <!-- Pond -->
  <ellipse cx="600" cy="380" rx="420" ry="180" fill="rgba(26,58,74,0.5)" stroke="rgba(100,200,255,0.15)" stroke-width="2"/>
  <!-- Duck 1 (big) -->
  <ellipse cx="450" cy="350" rx="100" ry="90" fill="#FFD93D" stroke="#E6B800" stroke-width="4"/>
  <circle cx="400" cy="260" r="60" fill="#FFD93D" stroke="#E6B800" stroke-width="4"/>
  <polygon points="350,255 310,270 350,280" fill="#FF8C00"/>
  <circle cx="385" cy="245" r="14" fill="#333"/>
  <circle cx="390" cy="240" r="5" fill="#fff"/>
  <ellipse cx="490" cy="340" rx="50" ry="35" fill="#F0C800" stroke="#D4A000" stroke-width="2"/>
  <!-- Duck 2 (medium) -->
  <ellipse cx="700" cy="370" rx="70" ry="60" fill="#6BCB77" stroke="#3A9A4A" stroke-width="3"/>
  <circle cx="670" cy="310" r="42" fill="#6BCB77" stroke="#3A9A4A" stroke-width="3"/>
  <polygon points="640,305 615,315 640,322" fill="#FF8C00"/>
  <circle cx="662" cy="298" r="10" fill="#333"/>
  <circle cx="666" cy="295" r="4" fill="#fff"/>
  <!-- Duck 3 (small) -->
  <ellipse cx="830" cy="390" rx="45" ry="40" fill="#4D96FF" stroke="#2563EB" stroke-width="3"/>
  <circle cx="810" cy="350" r="28" fill="#4D96FF" stroke="#2563EB" stroke-width="3"/>
  <polygon points="790,345 775,353 790,358" fill="#FF8C00"/>
  <circle cx="803" cy="342" r="6" fill="#333"/>
  <!-- Merge arrows -->
  <text x="560" y="300" font-size="36" fill="rgba(255,255,255,0.3)">+</text>
  <text x="750" y="310" font-size="36" fill="rgba(255,255,255,0.3)">+</text>
  <!-- Stars -->
  <text x="540" y="560" font-family="Inter,Arial,sans-serif" font-size="32" fill="#FFD93D">30 Levels | 7 Duck Tiers | Combo Scoring</text>
  <text x="600" y="600" font-family="Inter,Arial,sans-serif" font-size="20" fill="#666" text-anchor="middle">GameZipper.com</text>
</svg>