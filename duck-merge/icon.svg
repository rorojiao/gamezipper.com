<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0d2a2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  <circle cx="512" cy="440" r="350" fill="url(#glow)"/>
  <!-- Pond ripple -->
  <ellipse cx="512" cy="600" rx="320" ry="120" fill="rgba(26,58,74,0.6)" stroke="rgba(100,200,255,0.2)" stroke-width="3"/>
  <ellipse cx="512" cy="600" rx="250" ry="90" fill="none" stroke="rgba(100,200,255,0.15)" stroke-width="2"/>
  <!-- Big duck body -->
  <ellipse cx="420" cy="480" rx="160" ry="140" fill="#FFD93D" stroke="#E6B800" stroke-width="6"/>
  <!-- Duck head -->
  <circle cx="340" cy="340" r="100" fill="#FFD93D" stroke="#E6B800" stroke-width="6"/>
  <!-- Beak -->
  <polygon points="260,330 180,360 260,380" fill="#FF8C00" stroke="#E67300" stroke-width="3"/>
  <!-- Eye -->
  <circle cx="310" cy="310" r="22" fill="#333"/>
  <circle cx="316" cy="304" r="8" fill="#fff"/>
  <!-- Wing -->
  <ellipse cx="480" cy="460" rx="90" ry="60" fill="#F0C800" stroke="#D4A000" stroke-width="3"/>
  <!-- Small duckling -->
  <ellipse cx="680" cy="520" rx="80" ry="70" fill="#6BCB77" stroke="#3A9A4A" stroke-width="4"/>
  <circle cx="640" cy="460" r="50" fill="#6BCB77" stroke="#3A9A4A" stroke-width="4"/>
  <polygon points="600,455 560,470 600,480" fill="#FF8C00"/>
  <circle cx="628" cy="445" r="12" fill="#333"/>
  <circle cx="632" cy="442" r="4" fill="#fff"/>
  <!-- Sparkles -->
  <circle cx="200" cy="200" r="8" fill="#FFD93D"/>
  <circle cx="800" cy="250" r="6" fill="#FFD93D"/>
  <circle cx="150" cy="500" r="5" fill="#67E8F9"/>
  <circle cx="870" cy="450" r="7" fill="#67E8F9"/>
  <circle cx="500" cy="200" r="10" fill="#FFD93D"/>
  <!-- Merge arrow -->
  <path d="M 550 350 L 600 300 L 580 310 L 580 380 L 600 370 L 550 320" fill="#fff" opacity="0.4" transform="rotate(-30 575 340)"/>
</svg>