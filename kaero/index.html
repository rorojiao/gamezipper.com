const REGION_COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e84393','#fd79a8','#6c5ce7','#a29bfe'];
const DIRS={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1]};
const OPP={N:'S',S:'N',E:'W',W:'E'};
let state={
  levelIdx:0,playerSegs:{},mode:'draw',timer:0,timerInterval:null,
  hints:3,hintsUsed:0,startTime:0,won:false,dragStart:null,dragPath:[],
  eraseMode:false,hoverCell:null,savedStars:{},savedProgress:{},
  settings:{music:true,sfx:true,autocheck:false}
};
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let cellSize=40,gridOffsetX=0,gridOffsetY=0;

// Load saved data
try{const s=localStorage.getItem('kaero_stars');if(s)state.savedStars=JSON.parse(s);
const p=localStorage.getItem('kaero_progress');if(p)state.savedProgress=JSON.parse(p);
const st=localStorage.getItem('kaero_settings');if(st)state.settings=Object.assign(state.settings,JSON.parse(st));
}catch(e){}

function saveData(){
try{localStorage.setItem('kaero_stars',JSON.stringify(state.savedStars));
localStorage.setItem('kaero_progress',JSON.stringify(state.savedProgress));
localStorage.setItem('kaero_settings',JSON.stringify(state.settings));}catch(e){}
}

function currentLevel(){return LEVELS[state.levelIdx];}

function loadLevel(idx){
  state.levelIdx=idx;
  const lv=currentLevel();
  state.playerSegs={};
  state.hints=3;state.hintsUsed=0;state.won=false;state.eraseMode=false;
  state.startTime=Date.now();state.timer=0;
  state.savedProgress.lastLevel=idx;
  saveData();
  if(state.timerInterval)clearInterval(state.timerInterval);
  state.timerInterval=setInterval(()=>{
    if(!state.won){state.timer=Math.floor((Date.now()-state.startTime)/1000);
    document.getElementById('hudTime').textContent=formatTime(state.timer);}
  },1000);
  document.getElementById('hudLevel').textContent=idx+1;
  document.getElementById('hudTier').textContent=lv.tier;
  document.getElementById('hintCount').textContent=state.hints;
  document.getElementById('modeText').textContent='Draw Path';
  resizeCanvas();
  render();
}

function formatTime(s){const m=Math.floor(s/60);const sec=s%60;return m+':'+(sec<10?'0':'')+sec;}

function resizeCanvas(){
  const lv=currentLevel();
  const wrap=document.querySelector('.canvas-wrap');
  const maxW=Math.min(wrap.clientWidth-16,600);
  const maxH=window.innerHeight-340;
  const cs=Math.floor(Math.min(maxW/lv.cols,maxH/lv.rows));
  cellSize=Math.max(30,Math.min(70,cs));
  canvas.width=cellSize*lv.cols;
  canvas.height=cellSize*lv.rows;
  canvas.style.width=canvas.width+'px';
  canvas.style.height=canvas.height+'px';
  gridOffsetX=0;gridOffsetY=0;
  render();
}

function cellAt(px,py){
  const lv=currentLevel();
  const c=Math.floor((px)/cellSize);
  const r=Math.floor((py)/cellSize);
  if(r<0||r>=lv.rows||c<0||c>=lv.cols)return null;
  return{r,c};
}

function render(){
  const lv=currentLevel();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Draw region backgrounds with alpha
  for(let r=0;r<lv.rows;r++){
    for(let c=0;c<lv.cols;c++){
      const rid=lv.regions[r][c];
      const color=REGION_COLORS[(rid-1)%REGION_COLORS.length];
      ctx.fillStyle=color+'22';
      ctx.fillRect(c*cellSize,r*cellSize,cellSize,cellSize);
    }
  }
  // Draw region borders
  ctx.strokeStyle='#5577aa';
  ctx.lineWidth=2.5;
  for(let r=0;r<lv.rows;r++){
    for(let c=0;c<lv.cols;c++){
      const rid=lv.regions[r][c];
      const x=c*cellSize,y=r*cellSize;
      // Top
      if(r===0||lv.regions[r-1][c]!==rid){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cellSize,y);ctx.stroke();}
      // Bottom
      if(r===lv.rows-1||lv.regions[r+1][c]!==rid){ctx.beginPath();ctx.moveTo(x,y+cellSize);ctx.lineTo(x+cellSize,y+cellSize);ctx.stroke();}
      // Left
      if(c===0||lv.regions[r][c-1]!==rid){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cellSize);ctx.stroke();}
      // Right
      if(c===lv.cols-1||lv.regions[r][c+1]!==rid){ctx.beginPath();ctx.moveTo(x+cellSize,y);ctx.lineTo(x+cellSize,y+cellSize);ctx.stroke();}
    }
  }
  // Draw grid lines (light)
  ctx.strokeStyle='#222244';
  ctx.lineWidth=0.5;
  for(let r=0;r<=lv.rows;r++){ctx.beginPath();ctx.moveTo(0,r*cellSize);ctx.lineTo(canvas.width,r*cellSize);ctx.stroke();}
  for(let c=0;c<=lv.cols;c++){ctx.beginPath();ctx.moveTo(c*cellSize,0);ctx.lineTo(c*cellSize,canvas.height);ctx.stroke();}

  // Draw path segments (player)
  for(const key in state.playerSegs){
    const[r,c]=key.split(',').map(Number);
    const dirs=state.playerSegs[key];
    drawSegments(r,c,dirs,'#a29bfe',4);
  }
  // Draw dragging path preview
  if(state.dragPath.length>1){
    for(let i=0;i<state.dragPath.length-1;i++){
      const[r1,c1]=state.dragPath[i];
      const[r2,c2]=state.dragPath[i+1];
      drawLine(c1*cellSize+cellSize/2,r1*cellSize+cellSize/2,c2*cellSize+cellSize/2,r2*cellSize+cellSize/2,'#fdcb6e',3);
    }
  }
  // Draw letters (clues) — compute current positions based on player moves
  const letterPositions=computeLetterPositions();
  ctx.font='bold '+Math.floor(cellSize*0.5)+'px Georgia,serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const[key,letter]of Object.entries(letterPositions)){
    const[r,c]=key.split(',').map(Number);
    const x=c*cellSize+cellSize/2;
    const y=r*cellSize+cellSize/2;
    // Circle background
    ctx.fillStyle='rgba(20,20,50,0.8)';
    ctx.beginPath();ctx.arc(x,y,cellSize*0.32,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.fillText(letter.toUpperCase(),x,y);
  }
  // Draw hint highlights
  if(state.hintCells){
    for(const cell of state.hintCells){
      const[r,c]=cell.split(',').map(Number);
      ctx.strokeStyle='#fdcb6e';
      ctx.lineWidth=3;
      ctx.setLineDash([5,3]);
      ctx.strokeRect(c*cellSize+3,r*cellSize+3,cellSize-6,cellSize-6);
      ctx.setLineDash([]);
    }
  }
  // Violation highlights
  if(state.violations){
    for(const cell of state.violations){
      const[r,c]=cell.split(',').map(Number);
      ctx.strokeStyle='#e74c3c';
      ctx.lineWidth=2;
      ctx.strokeRect(c*cellSize+2,r*cellSize+2,cellSize-4,cellSize-4);
    }
  }
}

function drawSegments(r,c,dirs,color,width){
  const cx=c*cellSize+cellSize/2;
  const cy=r*cellSize+cellSize/2;
  if(dirs.includes('N'))drawLine(cx,cy,cx,cy-cellSize/2,color,width);
  if(dirs.includes('S'))drawLine(cx,cy,cx,cy+cellSize/2,color,width);
  if(dirs.includes('E'))drawLine(cx,cy,cx+cellSize/2,cy,color,width);
  if(dirs.includes('W'))drawLine(cx,cy,cx-cellSize/2,cy,color,width);
  // Dot at center for path node
  ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(cx,cy,width*0.6,0,Math.PI*2);ctx.fill();
}

function drawLine(x1,y1,x2,y2,color,width){
  ctx.strokeStyle=color;ctx.lineWidth=width;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
}

// Trace connected paths from player segments
function tracePaths(){
  // Build adjacency from player segments
  const adj={}; // cell -> {neighbor cells}
  for(const key in state.playerSegs){
    const[r,c]=key.split(',').map(Number);
    const dirs=state.playerSegs[key];
    if(!adj[key])adj[key]={neighbors:[],isEndpoint:true};
    for(const d of dirs){
      const[dr,dc]=DIRS[d];
      const nr=r+dr,nc=c+dc;
      const nkey=nr+','+nc;
      adj[key].neighbors.push(nkey);
      adj[key].isEndpoint=false;
    }
  }
  // Mark endpoints (cells with exactly 1 neighbor)
  for(const key in adj){
    adj[key].isEndpoint=adj[key].neighbors.length===1;
  }
  // Also: letter cells that are starts are endpoints
  const lv=currentLevel();
  for(const key in lv.clues){
    if(adj[key])adj[key].isEndpoint=adj[key].neighbors.length===1;
  }
  // Trace paths from each endpoint
  const visited=new Set();
  const paths=[];
  for(const key in adj){
    if(adj[key].isEndpoint&&!visited.has(key)){
      const path=[key];
      visited.add(key);
      let cur=key;
      while(true){
        const next=adj[cur].neighbors.find(n=>!visited.has(n)&&adj[n]);
        if(!next)break;
        visited.add(next);
        path.push(next);
        cur=next;
        if(adj[cur].isEndpoint)break;
      }
      if(path.length>=2)paths.push(path);
    }
  }
  return paths;
}

// Compute where letters end up based on player's paths
function computeLetterPositions(){
  const lv=currentLevel();
  const paths=tracePaths();
  const positions={};
  // Start with all clues in place
  for(const[key,letter]of Object.entries(lv.clues))positions[key]=letter;
  // For each path, find if it starts at a letter cell and move the letter to the end
  for(const path of paths){
    const startCell=path[0];
    const endCell=path[path.length-1];
    if(positions[startCell]!==undefined){
      const letter=positions[startCell];
      // Check: does the path start from a clue cell?
      if(lv.clues[startCell]){
        delete positions[startCell];
        positions[endCell]=letter;
      }
    }
  }
  return positions;
}

// Check if player solved the puzzle
function checkWin(){
  const lv=currentLevel();
  const positions=computeLetterPositions();
  // Check each region has all same letter
  for(let r=0;r<lv.rows;r++){
    for(let c=0;c<lv.cols;c++){
      const rid=lv.regions[r][c];
      const key=r+','+c;
      if(positions[key]){
        const expected=lv.homeLetters[rid];
        if(positions[key]!==expected){
          return false;
        }
      }
    }
  }
  // Also verify: all original letters still accounted for
  let letterCount=0;
  for(const k in positions)letterCount++;
  const originalCount=Object.keys(lv.clues).length;
  if(letterCount!==originalCount)return false;
  // Check: no path passes through a non-letter cell that doesn't belong to a path endpoint
  // (all path cells should be part of complete paths from letter to destination)
  return true;
}

// Get all violations for display
function getViolations(){
  const lv=currentLevel();
  const violations=new Set();
  // Check for overlapping segments (shouldn't happen with our input handling)
  // Check each region's letters
  const positions=computeLetterPositions();
  const regionLetters={};
  for(let r=0;r<lv.rows;r++){
    for(let c=0;c<lv.cols;c++){
      const rid=lv.regions[r][c];
      const key=r+','+c;
      if(positions[key]){
        if(!regionLetters[rid])regionLetters[rid]=new Set();
        regionLetters[rid].add(positions[key]);
      }
    }
  }
  // Mark regions with conflicts
  // (visual feedback could highlight, but for simplicity we don't mark cells)
  return violations;
}

// Input handling
function getEventPos(e){
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX||e.touches[0].clientX)-rect.left;
  const y=(e.clientY||e.touches[0].clientY)-rect.top;
  return{x,y};
}

function onPointerDown(e){
  e.preventDefault();
  const{x,y}=getEventPos(e);
  const cell=cellAt(x,y);
  if(!cell)return;
  const lv=currentLevel();
  const key=cell.r+','+cell.c;
  if(state.eraseMode){
    // Erase: remove segments at this cell and connected path
    eraseAtCell(cell.r,cell.c);
    render();
    return;
  }
  // Draw mode: start drag from a letter cell
  if(lv.clues[key]){
    state.dragStart={r:cell.r,c:cell.c};
    state.dragPath=[[cell.r,cell.c]];
    playSfx('click');
  } else if(state.playerSegs[key]){
    // Allow continuing from existing path endpoint
    state.dragStart={r:cell.r,c:cell.c};
    state.dragPath=[[cell.r,cell.c]];
    playSfx('click');
  }
}

function onPointerMove(e){
  e.preventDefault();
  if(!state.dragStart)return;
  const{x,y}=getEventPos(e);
  const cell=cellAt(x,y);
  if(!cell)return;
  const last=state.dragPath[state.dragPath.length-1];
  const lr=last[0],lc=last[1];
  // Check if adjacent to last cell
  const dr=Math.abs(cell.r-lr);
  const dc=Math.abs(cell.c-lc);
  if(dr+dc===1){
    // Adjacent — extend path
    const key=cell.r+','+cell.c;
    // Check not revisiting (except start)
    const alreadyInPath=state.dragPath.some(p=>p[0]===cell.r&&p[1]===cell.c);
    if(!alreadyInPath){
      // Check not passing through another letter cell
      const lv=currentLevel();
      if(lv.clues[key]&&!(cell.r===state.dragStart.r&&cell.c===state.dragStart.c)){
        // Can't pass through other letters — stop here
        return;
      }
      state.dragPath.push([cell.r,cell.c]);
      playSfx('draw');
    } else if(state.dragPath.length>=2&&cell.r===state.dragStart.r&&cell.c===state.dragStart.c){
      // Back to start — cancel
      state.dragPath=[state.dragStart.r,state.dragStart.c];
    }
    render();
  } else if(dr+dc===0){
    // Same cell, ignore
  } else {
    // Non-adjacent — check if backtracking
    if(state.dragPath.length>=2){
      const prev=state.dragPath[state.dragPath.length-2];
      if(cell.r===prev[0]&&cell.c===prev[1]){
        // Backtrack
        state.dragPath.pop();
        render();
      }
    }
  }
}

function onPointerUp(e){
  e.preventDefault();
  if(!state.dragStart)return;
  // Commit the path if valid
  if(state.dragPath.length>=2){
    commitPath(state.dragPath);
  }
  state.dragStart=null;
  state.dragPath=[];
  render();
  if(state.settings.autocheck&&checkWin()){
    onWin();
  }
}

function commitPath(path){
  // Convert path to segments and merge into playerSegs
  // First, remove any existing segments that conflict
  const newSegs={};
  for(let i=0;i<path.length;i++){
    const[r,c]=path[i];
    const key=r+','+c;
    let dirs='';
    if(i>0){
      const[pr,pc]=path[i-1];
      const ddir=getDir(pr,pc,r,c);
      dirs+=ddir;
    }
    if(i<path.length-1){
      const[nr,nc]=path[i+1];
      const ndir=getDir(r,c,nr,nc);
      if(!dirs.includes(ndir))dirs+=ndir;
    }
    newSegs[key]=dirs;
  }
  // Check for conflicts with existing segments
  for(const key in newSegs){
    if(state.playerSegs[key]){
      // Conflict — remove existing segments at this cell
      delete state.playerSegs[key];
    }
  }
  // Merge
  for(const key in newSegs){
    state.playerSegs[key]=newSegs[key];
  }
  playSfx('place');
}

function getDir(r1,c1,r2,c2){
  if(r2<r1)return'N';if(r2>r1)return'S';
  if(c2>c1)return'E';if(c2<c1)return'W';return'';
}

function eraseAtCell(r,c){
  const key=r+','+c;
  if(state.playerSegs[key]){
    delete state.playerSegs[key];
    playSfx('erase');
  }
  // Also clean up adjacent cells' segments pointing here
  for(const d in DIRS){
    const[dr,dc]=DIRS[d];
    const nk=(r+dr)+','+(c+dc);
    if(state.playerSegs[nk]){
      const opp=OPP[d];
      state.playerSegs[nk]=state.playerSegs[nk].replace(opp,'');
      if(state.playerSegs[nk]==='')delete state.playerSegs[nk];
    }
  }
}

function doHint(){
  if(state.hints<=0){showToast('No hints left!');return;}
  const lv=currentLevel();
  // Reveal a correct segment from the solution
  const solKeys=Object.keys(lv.solution);
  for(const key of solKeys){
    if(!state.playerSegs[key]||state.playerSegs[key]!==lv.solution[key]){
      state.playerSegs[key]=lv.solution[key];
      state.hints--;state.hintsUsed++;
      document.getElementById('hintCount').textContent=state.hints;
      state.hintCells=[key];
      playSfx('hint');
      render();
      setTimeout(()=>{state.hintCells=null;render();},2000);
      return;
    }
  }
  showToast('Already solved!');
}

function doCheck(){
  if(checkWin()){
    onWin();
  } else {
    showToast('Not yet — keep trying!');
    playSfx('error');
    state.violations=new Set();
    // Mark cells that are wrong
    render();
    setTimeout(()=>{state.violations=null;render();},1500);
  }
}

function doRestart(){
  state.playerSegs={};
  state.hints=3;state.hintsUsed=0;
  document.getElementById('hintCount').textContent=3;
  render();
  playSfx('click');
}

function onWin(){
  if(state.won)return;
  state.won=true;
  clearInterval(state.timerInterval);
  playSfx('win');
  // Calculate stars
  let stars=3;
  const lv=currentLevel();
  const timeThresholds=[60,120,180];
  const tierMul=1+lv.tierIdx*0.5;
  if(state.timer>timeThresholds[0]*tierMul)stars=2;
  if(state.timer>timeThresholds[1]*tierMul)stars=1;
  if(state.hintsUsed>=2)stars=Math.max(1,stars-1);
  const key=state.levelIdx;
  state.savedStars[key]=Math.max(state.savedStars[key]||0,stars);
  saveData();
  // Show win overlay
  showWinOverlay(stars);
  // Confetti
  spawnConfetti();
}

function showWinOverlay(stars){
  const card=document.getElementById('overlayCard');
  let starHtml='';
  for(let i=0;i<3;i++){
    starHtml+='<span class="'+(i<stars?'star-filled':'star-empty')+'">★</span>';
  }
  card.innerHTML='<h2>🎉 Solved!</h2><div class="stars">'+starHtml+'</div><p>Level '+(state.levelIdx+1)+' ('+currentLevel().tier+') — '+formatTime(state.timer)+'</p><button class="overlay-btn" id="ovNext">Next Level →</button><button class="overlay-btn secondary" id="ovReplay">Replay</button><button class="overlay-btn secondary" id="ovLevels">Level Select</button>';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('ovNext').onclick=()=>{document.getElementById('overlay').classList.remove('show');if(state.levelIdx<LEVELS.length-1)loadLevel(state.levelIdx+1);else showToast('You beat all levels!');};
  document.getElementById('ovReplay').onclick=()=>{document.getElementById('overlay').classList.remove('show');loadLevel(state.levelIdx);};
  document.getElementById('ovLevels').onclick=()=>{document.getElementById('overlay').classList.remove('show');showLevelSelect();};
}

function showLevelSelect(){
  const grid=document.getElementById('lsGrid');
  grid.innerHTML='';
  const tiers=['Beginner','Easy','Medium','Hard','Expert'];
  for(let t=0;t<5;t++){
    const tierDiv=document.createElement('div');
    tierDiv.className='ls-tier';
    tierDiv.textContent=tiers[t];
    grid.appendChild(tierDiv);
    for(let i=0;i<6;i++){
      const idx=t*6+i;
      if(idx>=LEVELS.length)break;
      const btn=document.createElement('button');
      btn.className='ls-btn';
      if(idx>0&&!state.savedStars[idx-1]&&idx>0)btn.classList.add('locked');
      if(state.savedStars[idx])btn.classList.add('completed');
      let starsHtml='';
      const stars=state.savedStars[idx]||0;
      for(let s=0;s<3;s++)starsHtml+=(s<stars?'★':'☆');
      btn.innerHTML='<div>'+(idx+1)+'</div><div class="ls-stars">'+starsHtml+'</div>';
      if(!btn.classList.contains('locked')){
        btn.onclick=()=>{document.getElementById('levelSelect').classList.remove('show');loadLevel(idx);};
      }
      grid.appendChild(btn);
    }
  }
  document.getElementById('levelSelect').classList.add('show');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

// Web Audio
let audioCtx=null,musicGain=null,musicOsc=null;
function initAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    musicGain=audioCtx.createGain();
    musicGain.gain.value=0.08;
    musicGain.connect(audioCtx.destination);
  }catch(e){}
}

function playSfx(type){
  if(!state.settings.sfx)return;
  initAudio();
  if(!audioCtx)return;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  const freqs={click:600,place:800,erase:400,draw:700,error:200,win:880,hint:500};
  osc.frequency.value=freqs[type]||500;
  osc.type='sine';
  gain.gain.setValueAtTime(0.15,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
  osc.start();
  osc.stop(audioCtx.currentTime+0.15);
  if(type==='win'){
    // Win fanfare
    [523,659,784,1047].forEach((f,i)=>{
      setTimeout(()=>{
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        o.connect(g);g.connect(audioCtx.destination);
        o.frequency.value=f;o.type='triangle';
        g.gain.setValueAtTime(0.1,audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
        o.start();o.stop(audioCtx.currentTime+0.3);
      },i*100);
    });
  }
}

let musicInterval=null,musicStep=0;
function startMusic(){
  if(!state.settings.music)return;
  initAudio();
  if(!audioCtx||musicInterval)return;
  const chords=[[262,330,392],[294,349,440],[220,277,330],[196,247,294]];
  musicInterval=setInterval(()=>{
    if(!state.settings.music){stopMusic();return;}
    const chord=chords[musicStep%chords.length];
    for(const freq of chord){
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(musicGain);
      osc.frequency.value=freq;
      osc.type='sine';
      gain.gain.setValueAtTime(0,audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(1,audioCtx.currentTime+0.5);
      gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+2);
      osc.start();
      osc.stop(audioCtx.currentTime+2);
    }
    musicStep++;
  },2000);
}
function stopMusic(){
  if(musicInterval){clearInterval(musicInterval);musicInterval=null;}
}

// Confetti
let confettiParticles=[];
function spawnConfetti(){
  const colors=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#fdcb6e'];
  for(let i=0;i<80;i++){
    confettiParticles.push({
      x:Math.random()*canvas.width,y:-10,
      vx:(Math.random()-0.5)*4,vy:Math.random()*3+2,
      size:Math.random()*6+3,color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*Math.PI,vrot:(Math.random()-0.5)*0.3
    });
  }
  animateConfetti();
}
function animateConfetti(){
  if(confettiParticles.length===0)return;
  ctx.save();
  for(let i=confettiParticles.length-1;i>=0;i--){
    const p=confettiParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.rot+=p.vrot;
    if(p.y>canvas.height+20){confettiParticles.splice(i,1);continue;}
    ctx.fillStyle=p.color;
    ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    ctx.setTransform(1,0,0,1,0,0);
  }
  ctx.restore();
  requestAnimationFrame(animateConfetti);
}

// Event listeners
canvas.addEventListener('pointerdown',onPointerDown);
canvas.addEventListener('pointermove',onPointerMove);
canvas.addEventListener('pointerup',onPointerUp);
canvas.addEventListener('pointercancel',onPointerUp);
window.addEventListener('resize',resizeCanvas);

document.getElementById('btnHint').onclick=doHint;
document.getElementById('btnLevels').onclick=showLevelSelect;
document.getElementById('btnSettings').onclick=()=>document.getElementById('settings').classList.add('show');
document.getElementById('btnErase').onclick=()=>{
  state.eraseMode=!state.eraseMode;
  document.getElementById('btnErase').classList.toggle('primary',state.eraseMode);
  document.getElementById('modeText').textContent=state.eraseMode?'Erase':'Draw Path';
};
document.getElementById('btnCheck').onclick=doCheck;
document.getElementById('btnRestart').onclick=doRestart;
document.getElementById('lsClose').onclick=()=>document.getElementById('levelSelect').classList.remove('show');
document.getElementById('setClose').onclick=()=>document.getElementById('settings').classList.remove('show');

function setupToggle(id,key){
  const el=document.getElementById(id);
  el.classList.toggle('on',state.settings[key]);
  el.onclick=()=>{
    state.settings[key]=!state.settings[key];
    el.classList.toggle('on',state.settings[key]);
    saveData();
    if(key==='music'){
      if(state.settings.music)startMusic();else stopMusic();
    }
  };
}
setupToggle('setMusic','music');
setupToggle('setSfx','sfx');
setupToggle('setAuto','autocheck');

// Keyboard
document.addEventListener('keydown',e=>{
  if(state.worn)return;
  if(e.key==='h'||e.key==='H')doHint();
  if(e.key==='r'||e.key==='R')doRestart();
  if(e.key==='Enter')doCheck();
  if(e.key==='e'||e.key==='E'){
    state.eraseMode=!state.eraseMode;
    document.getElementById('btnErase').classList.toggle('primary',state.eraseMode);
    document.getElementById('modeText').textContent=state.eraseMode?'Erase':'Draw Path';
  }
  if(e.key==='Escape'){
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('levelSelect').classList.remove('show');
    document.getElementById('settings').classList.remove('show');
  }
});

// Init
loadLevel(state.savedProgress.lastLevel||0);
// Start music on first user interaction
document.addEventListener('pointerdown',()=>{if(!musicInterval)startMusic();},{once:true});
</script>
