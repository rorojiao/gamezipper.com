<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#f59e0b"/>
<title>🧪 Beta Test Zone — GameZipper</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh}
.header{text-align:center;padding:40px 20px 20px;background:linear-gradient(135deg,#1a1a3e,#2d1b69)}
.header h1{font-size:2.5em;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcf7f,#4ecdc4,#45b7d1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#aaa;margin-top:8px;font-size:1.1em}
.beta-banner{background:linear-gradient(135deg,#f59e0b,#ef4444);padding:18px 24px;margin:0 auto;max-width:1200px;border-radius:12px;text-align:center;font-size:1.1em;font-weight:700;color:#fff;letter-spacing:0.02em}
.beta-banner span{font-size:1.3em;margin-right:8px}
.categories{display:flex;gap:10px;justify-content:center;padding:20px;flex-wrap:wrap}
.cat-btn{padding:8px 20px;border-radius:25px;border:2px solid #333;background:transparent;color:#fff;cursor:pointer;font-size:0.9em;transition:all 0.3s}
.cat-btn:hover,.cat-btn.active{background:#4ecdc4;border-color:#4ecdc4;color:#000}
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;padding:20px;max-width:1200px;margin:0 auto}
.game-card{background:#1a1a2e;border-radius:16px;overflow:hidden;transition:transform 0.3s,box-shadow 0.3s,opacity 0.6s;cursor:pointer;text-decoration:none;color:#fff;opacity:0;transform:translateY(20px);position:relative}
.game-card.visible{opacity:1;transform:translateY(0)}
.game-card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(78,205,196,0.3)}
.game-thumb{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:5em;position:relative;overflow:hidden}
.game-thumb .overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s}
.game-card:hover .overlay{opacity:1}
.play-btn{background:#4ecdc4;color:#000;padding:12px 30px;border-radius:25px;font-weight:700;font-size:1em}
.game-info{padding:15px}
.game-info h3{font-size:1em;margin-bottom:5px}
.game-info .desc{font-size:.75em;color:#999;margin-bottom:6px}
.game-info .tags{display:flex;gap:5px;flex-wrap:wrap}
.game-info .tag{font-size:0.7em;padding:3px 8px;background:#2a2a4a;border-radius:10px;color:#4ecdc4}
.beta-badge{position:absolute;top:10px;right:10px;background:#f59e0b;color:#fff;padding:3px 10px;border-radius:10px;font-size:.7em;font-weight:bold;z-index:2}
.footer{text-align:center;padding:40px 20px;color:#555;border-top:1px solid #1a1a2e;margin-top:40px}
.footer a{color:#4ecdc4;text-decoration:none}
@media(max-width:600px){.header h1{font-size:1.8em}.games{grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}.game-info h3{font-size:0.85em}.game-thumb{font-size:3.5em}.beta-banner{font-size:0.95em;padding:14px 16px}.beta-badge{top:5px;right:5px;font-size:.6em;padding:2px 6px}}
</style>
</head>
<body>
<div class="header">
<h1>🧪 Beta Test Zone — GameZipper</h1>
<p>These games are currently in testing. Not yet on the main site.</p>
</div>
<div style="max-width:1200px;margin:20px auto;padding:0 20px">
<div class="beta-banner">
<span>🧪</span> BETA TEST ZONE — 这些游戏正在测试中，不对普通玩家可见
</div>
</div>
<div class="categories">
<button class="cat-btn active" onclick="filter('all',this)">🎮 All</button>
<button class="cat-btn" onclick="filter('puzzle',this)">🧩 Puzzle</button>
<button class="cat-btn" onclick="filter('arcade',this)">🕹️ Arcade</button>
<button class="cat-btn" onclick="filter('idle',this)">⏰ Idle</button>
<button class="cat-btn" onclick="filter('card',this)">🃏 Card</button>
</div>
<div class="games" id="games"></div>
<div class="footer">
<p><a href="/">← Back to GameZipper</a></p>
<p style="margin-top:8px">© 2026 GameZipper.com — Free Browser Games</p>
</div>
<script src="/js/games-data.js"></script>
<script>
function render(list){
  document.getElementById('games').innerHTML = list.map((g,i) => `
    <a class="game-card" href="${g.url}" data-cat="${g.cat}" style="transition-delay:${i*80}ms">
      <span class="beta-badge">🧪 BETA</span>
      <div class="game-thumb" style="background:${GAME_GRADIENTS[i%GAME_GRADIENTS.length]}">${g.emoji}
        <div class="overlay"><span class="play-btn">▶ PLAY</span></div>
      </div>
      <div class="game-info">
        <h3>${g.name}</h3>
        <div class="desc">${g.desc}</div>
        <div class="tags">${g.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </a>`).join('');
  requestAnimationFrame(()=>{
    document.querySelectorAll('.game-card').forEach((c,i)=>{
      setTimeout(()=>c.classList.add('visible'),i*80);
    });
  });
}

function filter(cat,btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');else document.querySelector('.cat-btn').classList.add('active');
  render(cat==='all'?betaGames:betaGames.filter(g=>g.cat===cat));
}

const betaGames = GAMES.filter(g => getGameStatus(g) === 'beta');
betaGames.sort((a,b)=>(b.isNew?1:0)-(a.isNew?1:0));
render(betaGames);

if(betaGames.length === 0){
  document.getElementById('games').innerHTML = '<p style="text-align:center;color:#888;padding:60px;font-size:1.1em">No beta games at the moment. 🎉</p>';
}
</script>
</body>
</html>
