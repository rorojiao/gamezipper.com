function sfxHint(){ playSfx(660,0.12,'sine',0.14); setTimeout(()=>playSfx(880,0.1,'sine',0.14),80); }
function sfxWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSfx(f,0.18,'triangle',0.18),i*100)); }
function sfxError(){ playSfx(110,0.2,'sawtooth',0.14); }
function sfxClick(){ playSfx(800,0.03,'sine',0.08); }

const CHORD_PROG = [
  [261.63,329.63,392,493.88], // Cmaj7
  [293.66,349.23,440,523.25], // Dm7
  [220,261.63,329.63,440],    // Am7
  [196,246.94,293.66,392],    // G
];
function startMusic(){
  if(!state.settings.music || !audioCtx) return;
  stopMusic();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.035;
  musicGain.connect(audioCtx.destination);
  let chordIdx = 0;
  function playChord(){
    if(!musicGain) return;
    const chord = CHORD_PROG[chordIdx % CHORD_PROG.length];
    chord.forEach(freq=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.connect(g); g.connect(musicGain);
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0, audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime+0.5);
      g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+3.5);
      o.start(); o.stop(audioCtx.currentTime+3.5);
    });
    chordIdx++;
  }
  playChord();
  musicInterval = setInterval(playChord, 3500);
}
function stopMusic(){
  if(musicInterval){ clearInterval(musicInterval); musicInterval=null; }
  if(musicGain){ musicGain.disconnect(); musicGain=null; }
}

// ===================== LEVEL LOGIC =====================
function loadLevel(idx){
  currentLevelData = JSON.parse(JSON.stringify(LEVELS[idx]));
  state.currentLevel = idx;
  state.mode = 'black';
  state.blacks = new Set();
  state.loopEdges = new Set();
  state.hintsUsed = 0;
  state.startTime = Date.now();
  state.elapsed = 0;
  state.paused = false;
  document.getElementById('level-info').textContent = `L${currentLevelData.id} · ${currentLevelData.tier}`;
  updateHintsUI();
  resizeCanvas();
  render();
}
function clueMap(data){
  const m = {};
  for(const [k,v] of Object.entries(data.clues)) m[k] = v;
  return m;
}
function isClue(r,c,data){ return data.clues[`${r},${c}`] !== undefined; }
function isBlack(r,c){ return state.blacks.has(`${r},${c}`); }
function inBounds(r,c,data){ return r>=0&&r<data.R&&c>=0&&c<data.C; }
function edgeKey(r1,c1,r2,c2){
  if(r1>r2||r1==r2&&c1>c2){ [r1,r2]=[r2,r1]; [c1,c2]=[c2,c1]; }
  return `${r1},${c1},${r2},${c2}`;
}
function hasEdge(r1,c1,r2,c2){ return state.loopEdges.has(edgeKey(r1,c1,r2,c2)); }
function toggleEdge(r1,c1,r2,c2){
  const k = edgeKey(r1,c1,r2,c2);
  if(state.loopEdges.has(k)){ state.loopEdges.delete(k); sfxErase(); }
  else { state.loopEdges.add(k); sfxLoop(); }
}

// ===================== INTERACTION =====================
function getCellFromEvent(e){
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  const c = Math.floor((x - offsetX) / cellSize);
  const r = Math.floor((y - offsetY) / cellSize);
  if(r<0||r>=currentLevelData.R||c<0||c>=currentLevelData.C) return null;
  return {r,c,x,y};
}
function handleClick(e){
  if(state.paused) return;
  initAudio();
  const cell = getCellFromEvent(e);
  if(!cell) return;
  const {r,c,x,y} = cell;
  const data = currentLevelData;
  if(isClue(r,c,data)) return; // can't modify clue cells
  if(state.mode === 'black'){
    const k = `${r},${c}`;
    if(isBlack(r,c)){ state.blacks.delete(k); sfxErase(); }
    else { state.blacks.add(k); sfxBlack(); }
  } else if(state.mode === 'erase'){
    const k = `${r},${c}`;
    if(isBlack(r,c)){ state.blacks.delete(k); sfxErase(); }
    // also erase adjacent edges
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc;
      if(inBounds(nr,nc,data)){
        const ek = edgeKey(r,c,nr,nc);
        if(state.loopEdges.has(ek)){ state.loopEdges.delete(ek); }
      }
    }
    sfxErase();
  } else if(state.mode === 'loop'){
    // determine which edge to toggle based on click position within cell
    const lx = (x - offsetX) % cellSize;
    const ly = (y - offsetY) % cellSize;
    const fromLeft = lx < cellSize/2;
    const fromTop = ly < cellSize/2;
    // distance to each edge
    const dL = lx, dR = cellSize - lx, dT = ly, dB = cellSize - ly;
    const minD = Math.min(dL,dR,dT,dB);
    let r2=r,c2=c;
    if(minD===dT) r2=r-1;
    else if(minD===dB) r2=r+1;
    else if(minD===dL) c2=c-1;
    else c2=c+1;
    if(inBounds(r2,c2,data) && !isBlack(r,c) && !isBlack(r2,c2)){
      toggleEdge(r,c,r2,c2);
    } else {
      sfxError();
    }
  }
  render();
  if(state.settings.autocheck) checkWin(true);
}

// ===================== WIN CHECK =====================
function checkWin(silent=false){
  const data = currentLevelData;
  const clues = data.clues;
  // 1. all clues satisfied
  for(const [k,expected] of Object.entries(clues)){
    const [r,c] = k.split(',').map(Number);
    let cnt = 0;
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      if(isBlack(r+dr,c+dc)) cnt++;
    }
    if(cnt !== expected){
      if(!silent) showToast(`Clue at (${r},${c}) wants ${expected}, sees ${cnt}`);
      if(!silent) sfxError();
      return false;
    }
  }
  // 2. no two blacks orth-adjacent
  for(const bk of state.blacks){
    const [r,c] = bk.split(',').map(Number);
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      if(isBlack(r+dr,c+dc)){
        if(!silent) showToast('Two black cells are adjacent!');
        if(!silent) sfxError();
        return false;
      }
    }
  }
  // 3. loop is a single cycle through all non-black cells (clue cells included on loop)
  const whiteCells = [];
  const whiteSet = new Set();
  for(let r=0;r<data.R;r++) for(let c=0;c<data.C;c++){
    if(!isBlack(r,c)){
      whiteCells.push(`${r},${c}`);
      whiteSet.add(`${r},${c}`);
    }
  }
  // build adjacency from edges
  const adj = {};
  whiteCells.forEach(k=>adj[k]=[]);
  state.loopEdges.forEach(ek=>{
    const [r1,c1,r2,c2] = ek.split(',').map(Number);
    const k1=`${r1},${c1}`, k2=`${r2},${c2}`;
    if(whiteSet.has(k1)&&whiteSet.has(k2)){
      adj[k1].push(k2); adj[k2].push(k1);
    }
  });
  // each white cell must have exactly 2 edges
  for(const k of whiteCells){
    if(adj[k].length !== 2){
      if(!silent) showToast(`Cell ${k} has ${adj[k].length} loop segments (needs 2)`);
      if(!silent) sfxError();
      return false;
    }
  }
  // single cycle: traverse from first cell
  if(whiteCells.length === 0) return true;
  const start = whiteCells[0];
  const visited = new Set([start]);
  let cur = start, prev = null;
  let steps = 0;
  while(steps < whiteCells.length + 1){
    const nbrs = adj[cur].filter(n=>n!==prev);
    if(nbrs.length === 0) break;
    const nxt = nbrs[0];
    if(nxt === start) break;
    if(visited.has(nxt)) break;
    visited.add(nxt);
    prev = cur; cur = nxt;
    steps++;
  }
  if(visited.size !== whiteCells.length || cur === start && visited.size !== whiteCells.length){
    if(!silent) showToast('Loop is not a single closed cycle!');
    if(!silent) sfxError();
    return false;
  }
  // check it actually returns to start
  const lastNbrs = adj[cur].filter(n=>n!==prev);
  if(!lastNbrs.includes(start)){
    if(!silent) showToast('Loop does not close!');
    if(!silent) sfxError();
    return false;
  }
  // WIN!
  win();
  return true;
}
function win(){
  state.paused = true;
  stopMusic();
  sfxWin();
  const time = Math.floor((Date.now()-state.startTime)/1000);
  const stars = time < 60 ? 3 : time < 180 ? 2 : 1;
  state.progress[currentLevelData.id] = {stars, bestTime: Math.min(state.progress[currentLevelData.id]?.bestTime||9999, time)};
  saveProgress();
  showConfetti();
  showWinOverlay(stars, time);
}
function showConfetti(){
  for(let i=0;i<50;i++){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100+'%';
    el.style.top = '-10px';
    el.style.background = ['#ff6b9d','#55c2a0','#ffd166','#4ade80','#60a5fa'][i%5];
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    el.style.transition = `top ${1+Math.random()}s ease-in, left ${1+Math.random()}s ease-out, opacity 0.3s`;
    document.getElementById('app').appendChild(el);
    setTimeout(()=>{ el.style.top = '110%'; el.style.left = (parseFloat(el.style.left)+Math.random()*20-10)+'%'; },10);
    setTimeout(()=>el.remove(), 2000);
  }
}
function showWinOverlay(stars, time){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  const isLast = state.currentLevel >= LEVELS.length - 1;
  ov.innerHTML = `
    <h2>🎉 Solved!</h2>
    <div class="stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <p>Level ${currentLevelData.id} (${currentLevelData.tier}) completed in ${Math.floor(time/60)}:${String(time%60).padStart(2,'0')}</p>
    <div class="actions">
      ${isLast ? '' : `<button class="btn primary" id="ov-next">Next Level →</button>`}
      <button class="btn" id="ov-replay">↻ Replay</button>
      <button class="btn" id="ov-levels">☰ Levels</button>
    </div>`;
  document.getElementById('app').appendChild(ov);
  const next = ov.querySelector('#ov-next');
  if(next) next.onclick = ()=>{ ov.remove(); loadLevel(state.currentLevel+1); };
  ov.querySelector('#ov-replay').onclick = ()=>{ ov.remove(); loadLevel(state.currentLevel); };
  ov.querySelector('#ov-levels').onclick = ()=>{ ov.remove(); showLevelSelect(); };
}

// ===================== HINT =====================
function giveHint(){
  if(state.hintsUsed >= state.maxHints){ showToast('No hints left!'); sfxError(); return; }
  initAudio();
  const data = currentLevelData;
  const solBlacks = new Set(data.blacks.map(b=>b.map(Number).join(',')));
  // find a cell that's in solution but not yet black, or vice versa
  const allCells = [];
  for(let r=0;r<data.R;r++) for(let c=0;c<data.C;c++){
    if(!isClue(r,c,data)) allCells.push([r,c]);
  }
  // priority: reveal a black that should be black but isn't
  const candidates = allCells.filter(([r,c])=>{
    const k=`${r},${c}`;
    const shouldBeBlack = solBlacks.has(k);
    return (shouldBeBlack && !isBlack(r,c)) || (!shouldBeBlack && isBlack(r,c));
  });
  if(candidates.length === 0){
    showToast('All black cells correct! Focus on the loop.');
    return;
  }
  const [r,c] = candidates[Math.floor(Math.random()*candidates.length)];
  const k = `${r},${c}`;
  const sol = solBlacks.has(k);
  if(sol){ state.blacks.add(k); showToast(`💡 Cell (${r+1},${c+1}) should be BLACK`); }
  else { state.blacks.delete(k); showToast(`💡 Cell (${r+1},${c+1}) should be WHITE`); }
  state.hintsUsed++;
  sfxHint();
  updateHintsUI();
  render();
}

// ===================== RENDER =====================
function resizeCanvas(){
  const wrap = document.getElementById('canvas-wrap');
  const data = currentLevelData;
  const maxW = wrap.clientWidth - 16;
  const maxH = wrap.clientHeight - 16;
  cellSize = Math.floor(Math.min(maxW / data.C, maxH / data.R));
  cellSize = Math.max(24, Math.min(cellSize, 64));
  const w = cellSize * data.C;
  const h = cellSize * data.R;
  canvas.width = w * (window.devicePixelRatio||1);
  canvas.height = h * (window.devicePixelRatio||1);
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';
  ctx.setTransform(window.devicePixelRatio||1, 0, 0, window.devicePixelRatio||1, 0, 0);
  offsetX = 0; offsetY = 0;
}
function render(){
  if(!currentLevelData) return;
  const data = currentLevelData;
  const cs = cellSize;
  const clues = data.clues;
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // draw cells
  for(let r=0;r<data.R;r++){
    for(let c=0;c<data.C;c++){
      const x=c*cs, y=r*cs;
      if(isBlack(r,c)){
        ctx.fillStyle = '#3a3a4e';
        ctx.fillRect(x+1,y+1,cs-2,cs-2);
        // inner shading
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(x+cs*0.2, y+cs*0.2, cs*0.6, cs*0.6);
      } else if(isClue(r,c,data)){
        ctx.fillStyle = '#252540';
        ctx.fillRect(x+1,y+1,cs-2,cs-2);
        // clue number
        ctx.fillStyle = '#ffd166';
        ctx.font = `bold ${Math.floor(cs*0.5)}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(clues[`${r},${c}`], x+cs/2, y+cs/2);
      } else {
        ctx.fillStyle = '#e8e8f5';
        ctx.fillRect(x+1,y+1,cs-2,cs-2);
      }
      // grid border
      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 1;
      ctx.strokeRect(x+0.5,y+0.5,cs-1,cs-1);
    }
  }
  // draw loop edges
  ctx.strokeStyle = '#55c2a0';
  ctx.lineWidth = Math.max(3, cs*0.08);
  ctx.lineCap = 'round';
  state.loopEdges.forEach(ek=>{
    const [r1,c1,r2,c2] = ek.split(',').map(Number);
    ctx.beginPath();
    ctx.moveTo(c1*cs+cs/2, r1*cs+cs/2);
    ctx.lineTo(c2*cs+cs/2, r2*cs+cs/2);
    ctx.stroke();
  });
  // draw loop dots at cells with edges
  const deg = {};
  state.loopEdges.forEach(ek=>{
    const [r1,c1,r2,c2] = ek.split(',').map(Number);
    deg[`${r1},${c1}`]=(deg[`${r1},${c1}`]||0)+1;
    deg[`${r2},${c2}`]=(deg[`${r2},${c2}`]||0)+1;
  });
  // violation highlighting: clue cells whose count doesn't match
  for(const [k,expected] of Object.entries(clues)){
    const [r,c] = k.split(',').map(Number);
    let cnt=0;
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) if(isBlack(r+dr,c+dc)) cnt++;
    if(cnt > expected){
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 3;
      ctx.strokeRect(c*cs+2, r*cs+2, cs-4, cs-4);
    }
  }
  // adjacent black violation
  for(const bk of state.blacks){
    const [r,c] = bk.split(',').map(Number);
    for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      if(isBlack(r+dr,c+dc) && (r*data.C+c)<((r+dr)*data.C+(c+dc))){
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 3;
        ctx.strokeRect(c*cs+2, r*cs+2, cs-4, cs-4);
      }
    }
  }
}

// ===================== UI =====================
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2000);
}
function updateHintsUI(){
  document.getElementById('hints-left').textContent = `💡 ${state.maxHints - state.hintsUsed}`;
}
function setMode(m){
  state.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode === m);
  });
  sfxClick();
}
function showLevelSelect(){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.style.overflowY = 'auto';
  let html = '<h2>Level Select</h2>';
  const tiers = ['Beginner','Easy','Medium','Hard','Expert'];
  tiers.forEach(tier=>{
    const tierLevels = LEVELS.filter(l=>l.tier===tier);
    if(tierLevels.length===0) return;
    html += `<div class="tier-label">${tier}</div><div class="level-grid">`;
    tierLevels.forEach(l=>{
      const prog = state.progress[l.id];
      const done = prog ? 'done' : '';
      const cur = l.id === currentLevelData.id ? 'current' : '';
      const stars = prog ? `<div class="mini-stars">${'★'.repeat(prog.stars)}</div>` : '';
      html += `<div class="level-cell ${done} ${cur}" data-id="${l.id}">${l.id}${stars}</div>`;
    });
    html += '</div>';
  });
  html += '<div class="actions"><button class="btn" id="lv-close">Close</button></div>';
  ov.innerHTML = html;
  document.getElementById('app').appendChild(ov);
  ov.querySelectorAll('.level-cell').forEach(el=>{
    el.onclick = ()=>{
      const id = parseInt(el.dataset.id);
      const idx = LEVELS.findIndex(l=>l.id===id);
      ov.remove();
      loadLevel(idx);
    };
  });
  ov.querySelector('#lv-close').onclick = ()=>ov.remove();
}
function showSettings(){
  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.innerHTML = `
    <h2>⚙ Settings</h2>
    <div class="settings-row"><label>🎵 Music</label><div class="toggle ${state.settings.music?'on':''}" id="set-music"></div></div>
    <div class="settings-row"><label>🔊 Sound Effects</label><div class="toggle ${state.settings.sfx?'on':''}" id="set-sfx"></div></div>
    <div class="settings-row"><label>✓ Auto-check</label><div class="toggle ${state.settings.autocheck?'on':''}" id="set-auto"></div></div>
    <div class="actions" style="margin-top:16px"><button class="btn primary" id="set-close">Done</button></div>`;
  document.getElementById('app').appendChild(ov);
  ov.querySelector('#set-music').onclick = function(){
    state.settings.music=!state.settings.music;
    this.classList.toggle('on');
    if(state.settings.music) startMusic(); else stopMusic();
    saveSettings();
  };
  ov.querySelector('#set-sfx').onclick = function(){
    state.settings.sfx=!state.settings.sfx;
    this.classList.toggle('on');
    saveSettings();
  };
  ov.querySelector('#set-auto').onclick = function(){
    state.settings.autocheck=!state.settings.autocheck;
    this.classList.toggle('on');
    saveSettings();
  };
  ov.querySelector('#set-close').onclick = ()=>ov.remove();
}

// ===================== PERSISTENCE =====================
function saveProgress(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress)); }catch(e){}
}
function loadProgress(){
  try{ const s = localStorage.getItem(STORAGE_KEY); if(s) state.progress = JSON.parse(s); }catch(e){}
}
function saveSettings(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); }catch(e){}
}
function loadSettings(){
  try{ const s = localStorage.getItem(SETTINGS_KEY); if(s) state.settings = {...state.settings, ...JSON.parse(s)}; }catch(e){}
}

// ===================== INIT =====================
function init(){
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  loadProgress();
  loadSettings();
  loadLevel(0);
  // event handlers
  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('contextmenu', e=>{ e.preventDefault(); });
  // touch support
  let touchStartTime = 0;
  canvas.addEventListener('touchstart', e=>{ touchStartTime = Date.now(); e.preventDefault(); }, {passive:false});
  canvas.addEventListener('touchend', e=>{
    if(Date.now()-touchStartTime < 300 && e.changedTouches.length){
      const t = e.changedTouches[0];
      handleClick({clientX:t.clientX, clientY:t.clientY});
    }
    e.preventDefault();
  }, {passive:false});
  // buttons
  document.getElementById('btn-levels').onclick = ()=>{ initAudio(); sfxClick(); showLevelSelect(); };
  document.getElementById('btn-hint').onclick = ()=>{ initAudio(); giveHint(); };
  document.getElementById('btn-check').onclick = ()=>{ initAudio(); checkWin(); };
  document.getElementById('btn-restart').onclick = ()=>{ initAudio(); sfxClick(); loadLevel(state.currentLevel); };
  document.getElementById('btn-settings').onclick = ()=>{ initAudio(); sfxClick(); showSettings(); };
  document.querySelectorAll('.mode-btn').forEach(b=> b.onclick = ()=>setMode(b.dataset.mode));
  // keyboard
  document.addEventListener('keydown', e=>{
    if(e.key==='h'||e.key==='H'){ initAudio(); giveHint(); }
    else if(e.key==='r'||e.key==='R'){ initAudio(); sfxClick(); loadLevel(state.currentLevel); }
    else if(e.key==='Enter'){ initAudio(); checkWin(); }
    else if(e.key==='Escape'){ sfxClick(); showLevelSelect(); }
    else if(e.key==='1') setMode('black');
    else if(e.key==='2') setMode('loop');
    else if(e.key==='3') setMode('erase');
  });
  // timer
  setInterval(()=>{
    if(!state.paused && currentLevelData){
      state.elapsed = Math.floor((Date.now()-state.startTime)/1000);
      document.getElementById('timer').textContent = `${Math.floor(state.elapsed/60)}:${String(state.elapsed%60).padStart(2,'0')}`;
    }
  }, 500);
  // resize
  window.addEventListener('resize', ()=>{ resizeCanvas(); render(); });
  // start music on first interaction
  const startOnce = ()=>{
    initAudio();
    if(state.settings.music) startMusic();
    document.removeEventListener('click', startOnce);
    document.removeEventListener('touchend', startOnce);
  };
  document.addEventListener('click', startOnce);
  document.addEventListener('touchend', startOnce);
}
window.addEventListener('DOMContentLoaded', init);
</script>
