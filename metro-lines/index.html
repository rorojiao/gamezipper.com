// ===== Helpers =====
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function rand(a,b){return a+Math.random()*(b-a);}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function weightedShape(level){
  // Use level spawnShapes; bias toward common shapes
  const pool=level.spawnShapes||level.shapes;
  return pick(pool);
}
function pointerToCanvas(e){
  const r=canvas.getBoundingClientRect();
  const cx=(e.clientX-r.left), cy=(e.clientY-r.top);
  // invert: canvas px = (client - off) / scale  but we draw with transform
  return {x:(cx - state.viewOffX/state.viewScale*1)/1, y:(cy - state.viewOffY/state.viewScale*1)/1};
}
// Actually we apply transform manually: a design point (dx,dy) -> screen px = off + scale*dx (in device px). client px = (device px)/dpr.
// Simpler: track client coords, convert to design via inverse of CSS transform.
function clientToDesign(clientX,clientY){
  const r=canvas.getBoundingClientRect();
  // CSS pixel offset & scale (we set canvas.style width = ww px)
  const cssW=r.width, cssH=r.height;
  const scale=Math.min(cssW/W, cssH/H);
  const offX=(cssW-W*scale)/2, offY=(cssH-H*scale)/2;
  return {x:(clientX-r.left-offX)/scale, y:(clientY-r.top-offY)/scale};
}

function findStationAt(x,y){
  for(let i=state.stations.length-1;i>=0;i--){
    const s=state.stations[i];
    if(Math.hypot(x-s.x,y-s.y)<=STATION_R+6) return s;
  }
  return null;
}

// ===== Path between two stations (right-angle "metro" style) =====
function segmentPath(a,b){
  // Return list of points from a to b using a single right-angle bend.
  const dx=b.x-a.x, dy=b.y-a.y;
  if(Math.abs(dx)<1||Math.abs(dy)<1) return [{x:a.x,y:a.y},{x:b.x,y:b.y}];
  // Decide bend orientation: prefer horizontal-then-vertical
  const midX=a.x+dx, midY=a.y; // go horizontal first then vertical
  return [{x:a.x,y:a.y},{x:a.x+dx,y:a.y},{x:b.x,y:b.y}];
}
function lineFullPath(line){
  // Concatenate segments between consecutive stations
  const pts=[];
  if(line.stations.length===0) return pts;
  pts.push({x:line.stations[0].x,y:line.stations[0].y});
  for(let i=0;i<line.stations.length-1;i++){
    const seg=segmentPath(line.stations[i],line.stations[i+1]);
    for(let j=1;j<seg.length;j++) pts.push(seg[j]);
  }
  return pts;
}
function pathLength(pts){
  let L=0;for(let i=1;i<pts.length;i++) L+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y); return L;
}
function pointAtDist(pts,d){
  // travel distance d along the path; return {x,y,segIdx}
  if(pts.length<2) return {x:pts[0]?.x||0,y:pts[0]?.y||0,segIdx:0,dir:1};
  let acc=0;
  for(let i=1;i<pts.length;i++){
    const segL=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
    if(acc+segL>=d){
      const t=(d-acc)/Math.max(segL,0.001);
      return {x:pts[i-1].x+(pts[i].x-pts[i-1].x)*t, y:pts[i-1].y+(pts[i].y-pts[i-1].y)*t, segIdx:i, dir:1};
    }
    acc+=segL;
  }
  // beyond end: clamp to last
  return {x:pts[pts.length-1].x, y:pts[pts.length-1].y, segIdx:pts.length-1, dir:1};
}

// ===== Reachability: which stations can a passenger at station S reach via lines? =====
function reachableShapes(station){
  // BFS over the line/station graph
  const visitedSt=new Set([station.id]);
  const queue=[station];
  const shapes=new Set();
  while(queue.length){
    const s=queue.shift();
    for(const ln of state.lines){
      if(!ln.stations.includes(s)) continue;
      for(const t of ln.stations){
        if(!visitedSt.has(t.id)){
          visitedSt.add(t.id);
          shapes.add(t.shape);
          queue.push(t);
        }
      }
    }
  }
  return shapes;
}

// ===== Game setup =====
function startLevel(idx,endless){
  cleanupGame();
  state.levelIdx=idx; state.isEndless=!!endless;
  const lvl = endless ? makeEndlessLevel() : LEVELS[idx];
  state.level=lvl;
  state.stations=[]; state.lines=[]; state.trains=[]; state.passengers=[];
  state.score=0; state.combo=0; state.comboTimer=0;
  state.spawnTimer=lvl.spawnInterval*0.8;
  state.weekTimer=0; state.week=0; state.elapsed=0;
  state.timeLimit=lvl.timeLimit||0;
  state.availLines=lvl.startLines; state.availTrains=lvl.startTrains; state.availCarriages=lvl.startCarriages; state.availBridges=lvl.startBridges;
  state.availColors=LINE_COLORS.slice();
  state.usedColors=[];
  state.gameOver=false; state.completed=false; state.paused=false;
  state.particles=[]; state.upgradeChoices=[]; state.pendingUpgrade=false;
  state.hintTimer=4;
  state.lastTs=performance.now();
  // river
  state.river = lvl.rivers ? {y: H/2 + (Math.random()*100-50), band: 70} : null;
  // place starting stations
  for(const ss of lvl.start){
    state.stations.push({id:state.stations.length, x:ss.x, y:ss.y, shape:ss.shape, queue:[], overcrowd:-1, spawnAnim:1});
  }
  state.screen='game';
  resumeAudio();
  startBGM();
}
function makeEndlessLevel(){
  const shapeCount = 3 + Math.floor(Math.random()*3); // 3-5 shapes
  const shapes=SHAPES.slice(0,Math.min(shapeCount+2,7));
  const start=[{x:480,y:300,shape:'circle'},{x:800,y:300,shape:'triangle'},{x:640,y:480,shape:'square'}];
  return {id:0,tier:'Endless',name:'Endless Mode',shapes, start, spawnInterval:4, spawnShapes:shapes.slice(0,4), startLines:3, startTrains:3, startCarriages:1, startBridges:2, objective:{type:'endless'}, rivers:true, timeLimit:0};
}

function spawnStation(){
  const lvl=state.level;
  // pick shape (weighted; bias away from over-represented rare shapes early)
  const pool=lvl.spawnShapes;
  // pick a position not too close to others, within margins
  let tries=0, pos=null;
  const margin=80;
  while(tries<30){
    const x=rand(margin, W-margin), y=rand(margin+60, H-margin-40);
    let ok=true;
    for(const s of state.stations){ if(Math.hypot(x-s.x,y-s.y)<120){ok=false;break;} }
    if(ok && state.river){
      // allow stations near river but not exactly on band center
      if(Math.abs(y-state.river.y)<30) ok=false;
    }
    if(ok){pos={x,y};break;}
    tries++;
  }
  if(!pos) return;
  // shape selection: ensure first 3-4 stations are common shapes; later allow rare
  let shape;
  if(state.stations.length<4) shape=pick(['circle','triangle','square'].filter(s=>lvl.shapes.includes(s))||['circle']);
  else shape=pick(pool);
  if(!lvl.shapes.includes(shape)) shape=pick(lvl.shapes);
  state.stations.push({id:state.stations.length, x:pos.x, y:pos.y, shape, queue:[], overcrowd:-1, spawnAnim:0});
  sfx('spawn');
  state.toast={text:'New station: '+shape, t:1.6};
}

function spawnPassenger(){
  if(state.stations.length<2) return;
  // pick a station that is not about to fail (random)
  const candidates=state.stations.filter(s=>s.queue.length<8);
  if(!candidates.length) return;
  const s=pick(candidates);
  // pick a destination shape that exists somewhere and differs from this station's shape
  const others=state.level.shapes.filter(sh=>sh!==s.shape && state.stations.some(st=>st.shape===sh));
  if(!others.length) return;
  const dest=pick(others);
  s.queue.push({shape:dest, t:0});
}

// ===== Lines / Trains management =====
function createLine(fromStation, color){
  if(state.availLines<=0){ state.toast={text:'No lines available! Earn one next week.', t:2}; sfx('overcrowd'); return null; }
  if(state.availColors.length===0){ state.toast={text:'Out of line colors', t:2}; return null; }
  state.availLines--;
  if(!color){ color=state.availColors.shift(); }
  else { const i=state.availColors.indexOf(color); if(i>=0) state.availColors.splice(i,1); }
  state.usedColors.push(color);
  const line={id:state.lines.length, color, stations:[fromStation], trains:[]};
  state.lines.push(line);
  return line;
}
function extendLine(line, station, atEnd){
  // avoid duplicates and immediate back-and-forth
  if(line.stations.includes(station)) return false;
  if(atEnd) line.stations.push(station); else line.stations.unshift(station);
  return true;
}
function addTrainToLine(line){
  if(state.availTrains<=0){ state.toast={text:'No trains available!', t:2}; sfx('overcrowd'); return false; }
  if(line.stations.length<2){ state.toast={text:'Connect 2+ stations first', t:2}; return false; }
  state.availTrains--;
  const train={lineId:line.id, dist:0, dir:1, passengers:[], capacity:6, stopTimer:0, carriages:0};
  line.trains.push(train); state.trains.push(train);
  return true;
}
function attachCarriage(train){
  if(state.availCarriages<=0){ state.toast={text:'No carriages available!', t:2}; sfx('overcrowd'); return false; }
  state.availCarriages--;
  train.carriages++; train.capacity+=3;
  return true;
}

// ===== Upgrade modal =====
function offerUpgrades(){
  state.pendingUpgrade=true; state.paused=true;
  const choices=[];
  if(state.availColors.length>0 && state.availLines<7) choices.push({kind:'line',label:'New Line',icon:'╱'});
  // trains: allow if any line exists with <2 trains
  const trainSlots=state.lines.filter(l=>l.stations.length>=2 && l.trains.length<2).length;
  if(state.availTrains<8 && (state.lines.length>0)) choices.push({kind:'train',label:'Extra Train',icon:'▤'});
  if(state.trains.length>0 && state.availCarriages<10) choices.push({kind:'carriage',label:'Carriage (+3 cap)',icon:'◫'});
  if(state.level.rivers && state.availBridges<10) choices.push({kind:'bridge',label:'Bridge',icon:'⋍'});
  // ensure at least 2 choices
  if(choices.length<2){
    if(state.availColors.length>0) choices.push({kind:'line',label:'New Line',icon:'╱'});
    if(choices.length<2) choices.push({kind:'carriage',label:'Carriage (+3 cap)',icon:'◫'});
    if(choices.length<2) choices.push({kind:'train',label:'Extra Train',icon:'▤'});
  }
  // pick up to 4 unique
  const uniq=[]; const seen=new Set();
  for(const c of choices){ if(!seen.has(c.kind)){seen.add(c.kind); uniq.push(c);} }
  state.upgradeChoices=uniq.slice(0,4);
  sfx('upgrade');
}
function applyUpgrade(choice){
  switch(choice.kind){
    case 'line': state.availLines++; break;
    case 'train': state.availTrains++; break;
    case 'carriage': state.availCarriages++; break;
    case 'bridge': state.availBridges++; break;
  }
  state.pendingUpgrade=false; state.paused=false; state.upgradeChoices=[];
  state.week++;
}

// ===== Game loop =====
function loop(ts){
  if(!state.running){ return; }
  const dt=Math.min(0.05,(ts-state.lastTs)/1000);
  state.lastTs=ts;
  if(state.screen==='game' && !state.paused && !state.gameOver && !state.completed){
    update(dt);
  }
  draw();
  state.rafId=requestAnimationFrame(loop);
}
function update(dt){
  state.elapsed+=dt;
  // time limit
  if(state.timeLimit>0){
    state.timeLimit-=dt;
    if(state.timeLimit<=0){
      // check survival objective
      const o=state.level.objective;
      if(o.type==='survive'){ completeLevel(true); return; }
    }
  }
  // combo timer
  if(state.comboTimer>0){ state.comboTimer-=dt; if(state.comboTimer<=0) state.combo=0; }
  // hint timer
  if(state.hintTimer>0) state.hintTimer-=dt;
  // toast
  if(state.toast){ state.toast.t-=dt; if(state.toast.t<=0) state.toast=null; }

  // station spawn
  state.spawnTimer-=dt;
  if(state.spawnTimer<=0){
    state.spawnTimer=state.level.spawnInterval;
    if(state.stations.length<26 && (state.isEndless || state.stations.length<22)){
      spawnStation();
    }
  }
  // passenger spawn (independent, faster)
  if(!state._psgTimer) state._psgTimer=1.2;
  state._psgTimer-=dt;
  if(state._psgTimer<=0){
    state._psgTimer=Math.max(0.6, state.level.spawnInterval*0.45);
    spawnPassenger();
    spawnPassenger(); // 2 per cycle for density
  }
  // weekly upgrade
  state.weekTimer+=dt;
  if(state.weekTimer>=30 && !state.pendingUpgrade){
    state.weekTimer=0;
    offerUpgrades();
    return;
  }

  // animate station spawn
  for(const s of state.stations){ if(s.spawnAnim<1) s.spawnAnim=Math.min(1,s.spawnAnim+dt*3); }

  // move trains
  for(const tr of state.trains){
    const line=state.lines.find(l=>l.id===tr.lineId);
    if(!line||line.stations.length<2){ continue; }
    const pts=lineFullPath(line);
    const total=pathLength(pts);
    if(total<1) continue;
    if(tr.stopTimer>0){ tr.stopTimer-=dt; continue; }
    const speed=110; // px/sec
    tr.dist+=speed*dt*tr.dir;
    // bounce
    if(tr.dist>=total){ tr.dist=total; tr.dir=-1; arriveStation(tr,line,line.stations[line.stations.length-1],pts,total); }
    else if(tr.dist<=0){ tr.dist=0; tr.dir=1; arriveStation(tr,line,line.stations[0],pts,total); }
    else {
      // check intermediate station crossings
      // find station nearest current position along path within threshold
      checkIntermediateStop(tr,line,pts,total);
    }
  }

  // overcrowd timers
  for(const s of state.stations){
    if(s.queue.length>=6){
      if(s.overcrowd<0) s.overcrowd=OVERCROWD_TIME;
      s.overcrowd-=dt;
      if(s.overcrowd<=0){ endGame(); return; }
      if(s.overcrowd<8 && Math.random()<0.04) sfx('overcrowd');
    } else {
      s.overcrowd=-1;
    }
  }

  // particles
  for(let i=state.particles.length-1;i>=0;i--){
    const p=state.particles[i];
    p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.r+=p.vr*dt;
    if(p.life<=0) state.particles.splice(i,1);
  }

  // objective check
  const o=state.level.objective;
  if(o && !state.completed){
    if(o.type==='deliver' && state.score>=o.count){ completeLevel(false); return; }
    if(o.type==='connect'){
      // any line with >=count stations
      if(state.lines.some(l=>l.stations.length>=o.count)){ completeLevel(false); return; }
    }
    // survive handled by timeLimit
  }
}

let _stopMemory=new WeakMap();
function checkIntermediateStop(tr,line,pts,total){
  // Determine which station the train is currently passing
  const pos=pointAtDist(pts,tr.dist);
  for(let si=0; si<line.stations.length; si++){
    const st=line.stations[si];
    const d=Math.hypot(pos.x-st.x,pos.y-st.y);
    if(d<STATION_R+4){
      const mem=_stopMemory.get(tr)||-99;
      if(si!==mem){
        _stopMemory.set(tr,si);
        tr.stopTimer=0.4;
        exchangePassengers(tr,line,st);
      }
      return;
    }
  }
}
function arriveStation(tr,line,station,pts,total){
  tr.stopTimer=0.5;
  exchangePassengers(tr,line,station);
  _stopMemory.set(tr, line.stations.indexOf(station));
}
function exchangePassengers(tr,line,station){
  // drop off passengers whose destination matches this station
  for(let i=tr.passengers.length-1;i>=0;i--){
    if(tr.passengers[i].shape===station.shape){
      tr.passengers.splice(i,1);
      deliverPassenger(station);
    }
  }
  // pick up: passengers at this station whose destination is reachable via this line
  const reach=reachableShapes(station);
  for(let i=station.queue.length-1;i>=0;i--){
    if(tr.passengers.length>=tr.capacity) break;
    const p=station.queue[i];
    if(reach.has(p.shape)){
      tr.passengers.push(p);
      station.queue.splice(i,1);
    }
  }
}
function deliverPassenger(station){
  state.score++;
  state.combo++; state.comboTimer=4;
  let bonus=0;
  if(state.combo>=5){ bonus=2; state.score+=bonus; }
  sfx('deliver');
  // particle
  for(let i=0;i<8;i++){
    state.particles.push({x:station.x,y:station.y,vx:rand(-60,60),vy:rand(-90,-20),r:rand(2,5),vr:rand(8,20),life:rand(0.4,0.8),color:'#ffffff'});
  }
}

// ===== Drawing =====
function draw(){
  // clear full canvas (device pixels)
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // letterbox background
  ctx.fillStyle='#0a0b1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // apply design transform
  ctx.setTransform(state.viewScale,0,0,state.viewScale,state.viewOffX,state.viewOffY);
  // clip to design area
  ctx.save();
  ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  if(state.screen==='title') drawTitle();
  else if(state.screen==='levelselect') drawLevelSelect();
  else if(state.screen==='howto') drawHowTo();
  else if(state.screen==='game') drawGame();
  ctx.restore();
}

function drawBg(fill){
  ctx.fillStyle=fill||'#16182d';
  ctx.fillRect(0,0,W,H);
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ---- Title screen ----
let _titleT=0;
function drawTitle(){
  _titleT+=0.016;
  drawBg('#0f0c29');
  // gradient overlay
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgba(48,43,99,0.6)'); g.addColorStop(1,'rgba(36,36,62,0.6)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // animated metro lines drifting
  ctx.lineCap='round'; ctx.lineWidth=8;

function drawMuteIcon(x,y){
  const hover=state.mouse.inside&&Math.hypot(state.mouse.x-x,state.mouse.y-y)<24;
  ctx.fillStyle=hover?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(x-8,y-4); ctx.lineTo(x-3,y-4); ctx.lineTo(x+3,y-9); ctx.lineTo(x+3,y+9); ctx.lineTo(x-3,y+4); ctx.lineTo(x-8,y+4); ctx.closePath();
  ctx.stroke();
  if(state.muted){
    ctx.strokeStyle='#e74c3c'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x-12,y-12); ctx.lineTo(x+12,y+12); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(x+6,y,7,-Math.PI/3,Math.PI/3); ctx.stroke();
  }
  state.buttons.mute={x:x-22,y:y-22,w:44,h:44};
}

function drawLevelSelect(){
  drawBg('#16182d');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff'; ctx.font='800 48px Inter';
  ctx.shadowColor='rgba(231,76,60,0.6)'; ctx.shadowBlur=20;
  ctx.fillText('Select Level', W/2, 70);
  ctx.shadowBlur=0;
  // back button
  drawTextBtn('back','\u2190 Back',40,40,120,44,false);
  state.buttons={back:state.buttons.back};
  const tiers=['Tutorial','Easy','Medium','Hard','Expert'];
  const tierColors=['#2ecc71','#3498db','#f1c40f','#e67e22','#e74c3c'];
  const cardW=150, cardH=110, gap=18, perRow=5;
  let y=140;
  for(let ti=0; ti<tiers.length; ti++){
    ctx.textAlign='left';
    ctx.fillStyle=tierColors[ti]; ctx.font='700 22px Inter';
    ctx.fillText(tiers[ti], 60, y+10);
    const tierLvls=LEVELS.filter(l=>l.tier===tiers[ti]);
    for(let i=0;i<tierLvls.length;i++){
      const col=i%perRow, row=Math.floor(i/perRow);
      const x=60+col*(cardW+gap);
      const cy=y+40+row*(cardH+gap);
      const lvl=tierLvls[i];
      const stars=state.save.levelProgress[lvl.id]||0;
      const prevDone = lvl.id===1 || (state.save.levelProgress[lvl.id-1]||0)>0;
      const locked=!prevDone;
      drawLevelCard(lvl, x, cy, cardW, cardH, stars, locked, tierColors[ti]);
    }
    const rows=Math.ceil(tierLvls.length/perRow);
    y=y+40+rows*(cardH+gap)+20;
  }
  drawMuteIcon(W-60,40);
}

// ---- Game screen ----
function drawGame(){
  // playfield
  drawBg('#1a1c33');
  // subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // river
  if(state.river){
    ctx.fillStyle='rgba(52,152,219,0.18)';
    ctx.fillRect(0,state.river.y-state.river.band/2, W, state.river.band);
    ctx.fillStyle='rgba(52,152,219,0.30)';
    ctx.fillRect(0,state.river.y-state.river.band/2, W, 4);
    ctx.fillRect(0,state.river.y+state.river.band/2-4, W, 4);
  }
  // lines
  for(const ln of state.lines){
    drawLine(ln);
  }
  // dragging preview
  if(state.dragging){
    const d=state.dragging;
    const from=d.fromStation;
    ctx.strokeStyle=d.color; ctx.lineWidth=7; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.globalAlpha=0.7;
    ctx.setLineDash([10,8]);
    ctx.beginPath();
    ctx.moveTo(from.x,from.y);
    const tx=state.mouse.inside?state.mouse.x:from.x, ty=state.mouse.inside?state.mouse.y:from.y;
    const seg=segmentPath(from,{x:tx,y:ty});
    for(let i=1;i<seg.length;i++) ctx.lineTo(seg[i].x,seg[i].y);
    ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;
  }
  // trains
  for(const tr of state.trains){
    drawTrain(tr);
  }
  // stations
  for(const s of state.stations){
    drawStation(s);
  }
  // particles
  for(const p of state.particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // HUD
  drawHUD();
  // hint
  if(state.hintTimer>0 && state.lines.length===0){
    ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='500 22px Inter'; ctx.textAlign='center';
    ctx.fillText('Drag from one station to another to draw a line!', W/2, H-60);
  }
  // toast
  if(state.toast){
    ctx.globalAlpha=clamp(state.toast.t,0,1);
    ctx.fillStyle='rgba(0,0,0,0.7)'; roundRect(W/2-160,90,320,44,12); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='600 18px Inter'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(state.toast.text, W/2, 112);
    ctx.globalAlpha=1;
  }
  // upgrade modal
  if(state.pendingUpgrade) drawUpgradeModal();
  // pause overlay
  if(state.paused && !state.pendingUpgrade) drawPauseOverlay();
  // game over / complete
  if(state.gameOver) drawGameOver();
  if(state.completed) drawComplete();
}
function drawLine(ln){
  if(ln.stations.length<2){
    // single-station stub: small dot
    if(ln.stations.length===1){
      ctx.fillStyle=ln.color; ctx.beginPath(); ctx.arc(ln.stations[0].x,ln.stations[0].y,7,0,Math.PI*2); ctx.fill();
    }
    return;
  }
  const pts=lineFullPath(ln);
  ctx.strokeStyle=ln.color; ctx.lineWidth=7; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.stroke();
}
function drawTrain(tr){
  const line=state.lines.find(l=>l.id===tr.lineId);
  if(!line||line.stations.length<2) return;
  const pts=lineFullPath(line);
  const total=pathLength(pts);
  if(total<1) return;
  const pos=pointAtDist(pts,Math.max(0,Math.min(total,tr.dist)));
  ctx.save();
  ctx.translate(pos.x,pos.y);
  // angle from previous point
  let ang=0;
  if(pos.segIdx>0){
    const a=pts[pos.segIdx-1], b=pts[pos.segIdx];
    ang=Math.atan2(b.y-a.y,b.x-a.x);
  }
  ctx.rotate(ang);
  // body
  const grad=ctx.createLinearGradient(-TRAIN_W/2,0,TRAIN_W/2,0);
  grad.addColorStop(0,line.color); grad.addColorStop(1,shade(line.color,-20));
  ctx.fillStyle=grad;
  roundRect(-TRAIN_W/2,-TRAIN_H/2,TRAIN_W,TRAIN_H,4); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1.5; ctx.stroke();
  // carriages
  for(let c=0;c<tr.carriages;c++){
    ctx.save();
    ctx.translate(-(TRAIN_W+4)*(c+1),0);
    ctx.fillStyle=shade(line.color,-10);
    roundRect(-TRAIN_W/2,-TRAIN_H/2+1,TRAIN_W-2,TRAIN_H-2,3); ctx.fill();
    ctx.restore();
  }
  // passenger dots on top
  ctx.fillStyle='#fff';
  const maxShow=Math.min(tr.passengers.length,6);
  for(let i=0;i<maxShow;i++){
    ctx.beginPath(); ctx.arc(-TRAIN_W/2+5+i*4,0,1.6,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function drawStation(s){
  const r=STATION_R*(0.6+0.4*s.spawnAnim);
  // overcrowd ring
  if(s.overcrowd>=0){
    const pct=clamp(s.overcrowd/OVERCROWD_TIME,0,1);
    ctx.strokeStyle = pct>0.5?'#f1c40f':'#e74c3c';
    ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(s.x,s.y,r+14,-Math.PI/2,-Math.PI/2+(1-pct)*Math.PI*2);
    ctx.stroke();
  }
  drawShape(ctx, s.x, s.y, s.shape, r, '#ffffff', '#16182d', 4);
  // passengers queued around perimeter
  for(let i=0;i<s.queue.length;i++){
    const p=s.queue[i];
    const a=-Math.PI/2 + i*0.5;
    const pr=r+10;
    const px=s.x+Math.cos(a)*pr, py=s.y+Math.sin(a)*pr;
    drawShape(ctx, px, py, p.shape, 5, '#16182d', '#fff', 1.5);
  }
}
function drawHUD(){
  // top bar
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,0,W,52);
  ctx.textBaseline='middle';
  // score
  ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='700 26px Inter';
  ctx.fillText('\uD83D\uDE87 '+state.score, 20, 26);
  // combo
  if(state.combo>=3){
    ctx.fillStyle='#f1c40f'; ctx.font='700 18px Inter';
    ctx.fillText('Combo x'+state.combo, 130, 26);
  }
  // objective / timer center
  ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='600 18px Inter';
  const o=state.level.objective;
  let objText='';
  if(o.type==='deliver') objText='Deliver '+state.score+' / '+o.count;
  else if(o.type==='survive') objText='Survive '+Math.ceil(state.timeLimit)+'s';
  else if(o.type==='connect') objText='Connect '+o.count+' on a line';
  else if(o.type==='endless') objText='Endless \u00B7 Week '+state.week;
  ctx.fillText(objText, W/2, 26);
  // week timer
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='500 14px Inter';
  ctx.fillText('Week '+state.week+' \u00B7 next upgrade in '+Math.max(0,Math.ceil(30-state.weekTimer))+'s', W/2, 46);
  // inventory right
  ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.font='600 16px Inter';
  ctx.fillText('Lines '+state.availLines+'  Trains '+state.availTrains+'  Cars '+state.availCarriages+(state.level.rivers?('  Bridges '+state.availBridges):''), W-120, 26);
  // pause + mute
  drawIconBtn('pause','\u275A\u275A', W-90, 8, 36);
  drawIconBtn('mute', state.muted?'\uD83D\uDD07':'\uD83D\uDD0A', W-46, 8, 36);
  // quit
  drawIconBtn('quit','\u2716', 8, 8, 36);
}

function drawComplete(){
  ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#2ecc71'; ctx.font='800 60px Inter';
  ctx.shadowColor='rgba(46,204,113,0.7)'; ctx.shadowBlur=24;
  ctx.fillText('Level Complete!', W/2, 200);
  ctx.shadowBlur=0;
  // stars
  const o=state.level.objective;
  let stars=1;
  if(state._noOvercrowd) stars=2;
  if(o.type==='deliver' && state.score>=Math.ceil(o.count*1.2)) stars=3;
  if(o.type==='survive') stars=Math.max(stars,2);
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<stars?'#f1c40f':'rgba(255,255,255,0.15)';
    ctx.font='800 56px Inter';
    ctx.fillText('\u2605', W/2-70+i*70, 290);
  }
  ctx.fillStyle='#fff'; ctx.font='600 26px Inter';
  ctx.fillText('Score: '+state.score, W/2, 360);
  const isLast = state.levelIdx>=LEVELS.length-1;
  if(!isLast && !state.isEndless) drawBigBtn('next','\u2192 Next Level', W/2, 420, true);
  drawBigBtn('retry','\u21BB Replay', W/2, state.isEndless||isLast?420:500, false);
  drawBigBtn('quitmenu','\u2630 Menu', W/2, state.isEndless||isLast?500:580, false);
}

function shade(hex,amt){
  // hex like #rrggbb, amt -100..100
  const c=hex.replace('#','');
  let r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
  r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255);
  return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}

// ===== Events =====
function hitButton(x,y){
  for(const id in state.buttons){
    const b=state.buttons[id];
    if(b&&x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h&&!b.disabled) return id;
  }
  return null;
}
function onDown(e){
  e.preventDefault();
  initAudio(); resumeAudio();
  const p=clientToDesign(e.clientX,e.clientY);
  state.mouse.x=p.x; state.mouse.y=p.y; state.mouse.inside=true;
  if(state.screen==='game' && !state.paused && !state.gameOver && !state.completed && !state.pendingUpgrade){
    // check station drag start
    const s=findStationAt(p.x,p.y);
    if(s){
      // start drag: prefer to extend an existing line endpoint, else create new
      // find a line endpoint matching this station
      let chosen=null;
      for(const ln of state.lines){
        if(ln.stations[0]===s){chosen={line:ln,fromEnd:false};break;}
        if(ln.stations[ln.stations.length-1]===s){chosen={line:ln,fromEnd:true};break;}
      }
      if(chosen){
        state.dragging={fromStation:s,existingLine:chosen.line,fromEnd:chosen.fromEnd,color:chosen.line.color,isNew:false};
      } else {
        // create new line (only if available)
        if(state.availLines>0 && state.availColors.length>0){
          state.dragging={fromStation:s,existingLine:null,fromEnd:true,color:state.availColors[0],isNew:true};
        } else {
          state.toast={text:'No lines available! Earn one next week.', t:2}; sfx('overcrowd');
        }
      }
    }
    return;
  }
}
function onMove(e){
  const p=clientToDesign(e.clientX,e.clientY);
  state.mouse.x=p.x; state.mouse.y=p.y; state.mouse.inside=true;
}
function onUp(e){
  e.preventDefault();
  const p=clientToDesign(e.clientX,e.clientY);
  state.mouse.x=p.x; state.mouse.y=p.y;
  // click handling for menus
  const bid=hitButton(p.x,p.y);
  if(state.screen==='title'){
    if(bid==='play'){sfx('click');state.screen='levelselect';return;}
    if(bid==='endless'&&!state.buttons.endless.disabled){sfx('click');startLevel(0,true);return;}
    if(bid==='howto'){sfx('click');state.screen='howto';return;}
    if(bid==='mute'){toggleMute();return;}
    return;
  }
  if(state.screen==='levelselect'){
    if(bid==='back'){sfx('click');state.screen='title';return;}
    if(bid==='mute'){toggleMute();return;}
    if(bid&&bid.startsWith('lvl')){
      const b=state.buttons[bid];
      if(b&&!b.locked){sfx('click');startLevel(LEVELS.findIndex(l=>l.id===b.levelId),false);return;}
    }
    return;
  }
  if(state.screen==='howto'){
    if(bid==='back'){sfx('click');state.screen='title';return;}
    if(bid==='mute'){toggleMute();return;}
    return;
  }
  if(state.screen==='game'){
    // dragging completion
    if(state.dragging){
      const d=state.dragging;
      const target=findStationAt(p.x,p.y);
      if(target && target!==d.fromStation){
        if(d.isNew){
          const ln=createLine(d.fromStation,d.color);
          if(ln){ extendLine(ln,target,true); addTrainToLine(ln); sfx('connect'); }
        } else if(d.existingLine){
          if(extendLine(d.existingLine,target,d.fromEnd)) sfx('connect');
        }
      }
      state.dragging=null;
      return;
    }
    // HUD buttons
    if(bid==='pause'){sfx('click');state.paused=true;return;}
    if(bid==='mute'){toggleMute();return;}
    if(bid==='quit'){sfx('click');state.paused=true;return;}
    // upgrade modal
    if(state.pendingUpgrade){
      if(bid&&bid.startsWith('upg')){const b=state.buttons[bid];if(b&&b.choice){sfx('click');applyUpgrade(b.choice);return;}}
      return;
    }
    // pause overlay
    if(state.paused){
      if(bid==='resume'){sfx('click');state.paused=false;return;}
      if(bid==='restart'){sfx('click');startLevel(state.levelIdx,state.isEndless);return;}
      if(bid==='quitmenu'){sfx('click');quitToMenu();return;}
      return;
    }
    // game over
    if(state.gameOver){
      if(bid==='retry'){sfx('click');startLevel(state.levelIdx,state.isEndless);return;}
      if(bid==='quitmenu'){sfx('click');quitToMenu();return;}
      return;
    }
    if(state.completed){
      if(bid==='next'){sfx('click');startLevel(state.levelIdx+1,false);return;}
      if(bid==='retry'){sfx('click');startLevel(state.levelIdx,state.isEndless);return;}
      if(bid==='quitmenu'){sfx('click');quitToMenu();return;}
      return;
    }
  }
}
function onLeave(){state.mouse.inside=false;}
function toggleMute(){
  state.muted=!state.muted; state.save.muted=state.muted; saveSave();
  if(masterGain) masterGain.gain.value=state.muted?0:0.5;
  sfx('click');
}
canvas.addEventListener('pointerdown',onDown);
canvas.addEventListener('pointermove',onMove);
window.addEventListener('pointerup',onUp);
canvas.addEventListener('pointerleave',onLeave);
canvas.addEventListener('contextmenu',e=>e.preventDefault());

// keyboard
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(state.screen==='game'&&!state.gameOver&&!state.completed&&!state.pendingUpgrade) state.paused=!state.paused;
    else if(state.screen==='levelselect'||state.screen==='howto') state.screen='title';
  }
  if(e.key==='m'||e.key==='M') toggleMute();
});

// ===== Outcomes =====
function endGame(){
  if(state.gameOver) return;
  state.gameOver=true; sfx('gameover');
  if(state.isEndless){
    if(state.score>state.save.endlessHigh){state.save.endlessHigh=state.score;saveSave();}
  } else {
    const cur=state.save.highScores[state.level.id]||0;
    if(state.score>cur){state.save.highScores[state.level.id]=state.score;saveSave();}
  }
}
function completeLevel(survived){
  if(state.completed) return;
  state.completed=true; sfx('complete');
  if(!state.isEndless){
    const o=state.level.objective;
    let stars=1;
    if(state._noOvercrowd) stars=2;
    if(o.type==='deliver'&&state.score>=Math.ceil(o.count*1.2)) stars=3;
    if(o.type==='survive') stars=2;
    const prev=state.save.levelProgress[state.level.id]||0;
    if(stars>prev){state.save.levelProgress[state.level.id]=stars;saveSave();}
    if(state.level.tier==='Tutorial') {state.save.tutorialSeen=true;saveSave();}
  } else {
    if(state.score>state.save.endlessHigh){state.save.endlessHigh=state.score;saveSave();}
  }
}
function quitToMenu(){ cleanupGame(); state.screen='title'; }

// ===== Cleanup =====
function cleanupGame(){
  // stop simulation but keep render loop alive
  state.stations=[];state.lines=[];state.trains=[];state.passengers=[];
  state.dragging=null;state.particles=[];state.upgradeChoices=[];state.pendingUpgrade=false;
  state.paused=false;state.gameOver=false;state.completed=false;
  state._psgTimer=0;
}
// full cleanup on page hide
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    if(state.screen==='game'&&!state.gameOver&&!state.completed&&!state.pendingUpgrade) state.paused=true;
  }
});

// ===== Init =====
resize();
state.screen='title';
state.lastTs=performance.now();
state.rafId=requestAnimationFrame(loop);
})();
</script>
