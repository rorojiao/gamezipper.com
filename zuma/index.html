    (function() {
        'use strict';

        let musicPlaying = false;

        let currentLevel = 1;

        let activePowers = {};

        let marbleQueue = [];

        let pausedTime = 0;

        // Save data

        // Level configs
        const LEVELS = generateLevels();

        function generateLevels() {
            const levels = [];
            // Tier 1: 3 colors, slow, simple paths
            for (let i = 0; i < 6; i++) {
                levels.push({
                    colors: 3,
                    speed: MARBLE_SPEED_BASE * (0.8 + i * 0.05),
                    spawnInterval: SPAWN_INTERVAL_MIN + i * 50,
                    marbleCount: 30 + i * 5,
                    timeLimit: 90,
                    path: getPathTier1(i)

            // Tier 2: 4 colors, medium, S-curves

                levels.push({
                    colors: 4,
                    speed: MARBLE_SPEED_BASE * (1.1 + i * 0.08),
                    spawnInterval: SPAWN_INTERVAL_MIN - i * 30,
                    marbleCount: 40 + i * 5,
                    timeLimit: 80,
                    path: getPathTier2(i)
                });
            }
            // Tier 3: 4 colors, faster, figure-8
            for (let i = 0; i < 6; i++) {
                levels.push({
                    colors: 4,
                    speed: MARBLE_SPEED_BASE * (1.5 + i * 0.1),
                    spawnInterval: SPAWN_INTERVAL_MIN - i * 40,
                    marbleCount: 50 + i * 5,
                    timeLimit: 70,
                    path: getPathTier3(i)
                });
            }
            // Tier 4: 5 colors, fast, complex
            for (let i = 0; i < 6; i++) {
                levels.push({
                    colors: 5,
                    speed: MARBLE_SPEED_BASE * (2.0 + i * 0.12),
                    spawnInterval: SPAWN_INTERVAL_MIN - i * 50,
                    marbleCount: 60 + i * 5,
                    timeLimit: 65,
                    path: getPathTier4(i)
                });
            }
            // Tier 5: 5-6 colors, very fast, boss
            for (let i = 0; i < 6; i++) {
                levels.push({
                    colors: 5 + (i >= 3 ? 1 : 0),
                    speed: MARBLE_SPEED_BASE * (2.8 + i * 0.15),
                    spawnInterval: SPAWN_INTERVAL_MIN - i * 60,
                    marbleCount: 80 + i * 8,
                    timeLimit: 60,
                    path: getPathTier5(i)
                });
            }
            return levels;
        }

        function getPathTier1(i) {
            const paths = [
                [[400,50],[650,100],[700,300],[550,500],[300,550],[100,350],[150,150],[400,50]],
                [[400,80],[700,150],[720,400],[500,580],[200,500],[80,250],[200,100],[400,80]],

                [[400,60],[680,120],[720,350],[580,550],[280,580],[80,350],[150,120],[400,60]]
            ];
            return paths[i] || paths[0];
        }

        function getPathTier2(i) {
            const paths = [
                [[100,100],[250,500],[550,100],[400,500],[700,100],[100,100]],
                [[80,150],[300,500],[600,100],[500,500],[200,150],[80,150]],
                [[150,80],[400,300],[150,520],[550,520],[400,300],[700,80],[150,80]],
                [[100,200],[600,200],[100,400],[600,400],[100,200]],
                [[200,100],[500,300],[200,500],[600,300],[200,100]],
                [[80,120],[350,400],[700,120],[500,450],[150,300],[80,120]]
            ];
            return paths[i] || paths[0];
        }

        function getPathTier3(i) {
            const paths = [
                [[200,100],[500,250],[200,400],[500,550],[300,300],[600,100],[200,100]],
                [[400,50],[650,200],[400,350],[650,500],[300,500],[100,350],[300,200],[400,50]],
                [[150,150],[400,300],[150,450],[550,450],[400,300],[550,150],[150,150]],
                [[100,200],[350,100],[600,250],[350,400],[100,550],[500,550],[650,300],[100,200]],
                [[200,80],[500,200],[200,380],[500,560],[650,350],[200,80]],
                [[400,60],[700,200],[500,400],[700,580],[250,580],[100,400],[250,200],[400,60]]
            ];
            return paths[i] || paths[0];
        }

        function getPathTier4(i) {
            const paths = [
                [[400,50],[700,150],[750,400],[550,600],[200,600],[50,350],[150,100],[400,50]],
                [[150,100],[400,200],[650,100],[750,300],[600,500],[300,550],[50,400],[150,100]],
                [[100,150],[350,80],[600,200],[750,400],[550,580],[250,580],[80,350],[100,150]],
                [[200,80],[500,180],[700,80],[750,300],[600,500],[350,580],[100,450],[200,80]],
                [[400,50],[650,150],[750,380],[600,580],[300,600],[80,400],[120,180],[400,50]],
                [[150,100],[400,60],[650,180],[750,400],[600,580],[300,600],[80,380],[150,100]]
            ];
            return paths[i] || paths[0];
        }

        function getPathTier5(i) {
            const paths = [
                [[400,40],[720,140],[770,380],[620,580],[280,600],[60,400],[100,160],[400,40]],
                [[100,120],[380,80],[660,180],[760,400],[620,580],[300,600],[60,380],[100,120]],
                [[200,60],[550,140],[750,340],[650,560],[350,600],[80,420],[120,200],[200,60]],
                [[400,50],[700,150],[770,380],[650,580],[320,600],[60,400],[130,170],[400,50]],
                [[150,100],[420,70],[690,170],[770,390],[640,570],[310,600],[70,390],[150,100]],
                [[100,140],[380,80],[660,200],[770,400],[640,580],[280,600],[60,380],[100,140]]
            ];
            return paths[i] || paths[0];
        }

        // Catmull-Rom spline
        function catmullRom(p0, p1, p2, p3, t) {
            const t2 = t * t, t3 = t2 * t;
            return 0.5 * ((2 * p1) + (-p0 + p2) * t + (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 + (-p0 + 3 * p1 - 3 * p2 + p3) * t3);
        }

        function computePathPoints(waypoints) {
            const points = [];
            const n = waypoints.length;
            for (let i = 0; i < n; i++) {
                const p0 = waypoints[(i - 1 + n) % n];
                const p1 = waypoints[i];
                const p2 = waypoints[(i + 1) % n];
                const p3 = waypoints[(i + 2) % n];
                const segLen = Math.hypot(p2[0] - p1[0], p2[1] - p1[1]);
                const steps = Math.max(10, Math.floor(segLen));
                for (let j = 0; j < steps; j++) {
                    const t = j / steps;
                    const x = catmullRom(p0[0], p1[0], p2[0], p3[0], t);
                    const y = catmullRom(p0[1], p1[1], p2[1], p3[1], t);
                    points.push({ x, y });
                }
            }
            return points;
        }

        function computePathLength(points) {
            let len = 0;
            for (let i = 1; i < points.length; i++) {
                len += Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y);
            }
            return len;
        }

        // Marble colors with gradients
        const MARBLE_COLORS = [
            { h: 0, s: 85, l: 55 },    // 0: Red
            { h: 45, s: 85, l: 55 },   // 1: Yellow
            { h: 120, s: 70, l: 45 },  // 2: Green
            { h: 200, s: 85, l: 55 },  // 3: Blue
            { h: 280, s: 80, l: 55 },  // 4: Purple
            { h: 320, s: 80, l: 55 },  // 5: Pink
            { h: 170, s: 80, l: 45 }   // 6: Teal (power)
        ];

        const POWERUP_TYPES = ['backward', 'slow', 'bomb', 'colorBomb', 'lightning'];

        function getMarbleColor(colorIdx, isGlowing) {
            const c = MARBLE_COLORS[colorIdx] || MARBLE_COLORS[0];
            if (isGlowing) {
                return `hsl(${c.h}, ${c.s}%, ${c.l + 20}%)`;
            }
            return `hsl(${c.h}, ${c.s}%, ${c.l}%)`;
        }

        function getMarbleGradient(ctx, x, y, r, colorIdx) {
            const c = MARBLE_COLORS[colorIdx] || MARBLE_COLORS[0];
            const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
            grad.addColorStop(0, `hsl(${c.h}, ${c.s + 10}%, ${c.l + 30}%)`);
            grad.addColorStop(0.5, `hsl(${c.h}, ${c.s}%, ${c.l}%)`);
            grad.addColorStop(1, `hsl(${c.h}, ${c.s}%, ${c.l - 20}%)`);
            return grad;
        }

        function getPowerupGradient(ctx, x, y, r, type) {
            const colors = {
                backward: ['#51cf66', '#2d8a3e'],
                slow: ['#74c0fc', '#339af0'],
                bomb: ['#ff6b6b', '#c92a2a'],
                colorBomb: ['#ffd93d', '#f59f00'],
                lightning: ['#ffd93d', '#fcc419']
            };
            const [c1, c2] = colors[type] || ['#fff', '#ccc'];
            const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
            grad.addColorStop(0, c1);
            grad.addColorStop(1, c2);
            return grad;
        }

        // Save/Load
        function loadSaveData() {
            try {
                const saved = localStorage.getItem('zuma_save');
                if (saved) {
                    const data = JSON.parse(saved);
                    saveData = { ...saveData, ...data };
                    settings = { ...settings, ...saveData.settings };
                }
            } catch (e) {}
        }

        function saveSaveData() {
            try {
                saveData.settings = settings;
                localStorage.setItem('zuma_save', JSON.stringify(saveData));
            } catch (e) {}
        }

        // Audio
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);
                masterGain.gain.value = 0.3;
                musicGain = audioCtx.createGain();
                musicGain.connect(masterGain);
                musicGain.gain.value = 0.15;
                sfxGain = audioCtx.createGain();
                sfxGain.connect(masterGain);
                sfxGain.gain.value = 0.4;
            } catch (e) {
                console.warn('Audio not available');
            }
        }

        function resumeAudio() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBGM() {
            if (!audioCtx || !settings.music || musicPlaying) return;
            try {
                musicPlaying = true;
                bgmOsc = audioCtx.createOscillator();
                bgmOsc.type = 'sawtooth';
                bgmOsc.frequency.value = 55;
                bgmFilter = audioCtx.createBiquadFilter();
                bgmFilter.type = 'lowpass';
                bgmFilter.frequency.value = 200;
                bgmFilter.Q.value = 5;
                bgmLFO = audioCtx.createOscillator();
                bgmLFO.type = 'sine';
                bgmLFO.frequency.value = 0.2;
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 50;
                bgmLFO.connect(lfoGain);
                lfoGain.connect(bgmFilter.frequency);
                bgmOsc.connect(bgmFilter);
                bgmFilter.connect(musicGain);
                bgmOsc.start();
                bgmLFO.start();
            } catch (e) {}
        }

        function stopBGM() {
            if (!musicPlaying) return;
            try {
                if (bgmOsc) { bgmOsc.stop(); bgmOsc = null; }
                if (bgmLFO) { bgmLFO.stop(); bgmLFO = null; }
            } catch (e) {}
            musicPlaying = false;
        }

        function playSFX(type) {
            if (!audioCtx || !settings.sound) return;
            try {
                const now = audioCtx.currentTime;
                if (type === 'pop') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.connect(gain);
                    gain.connect(sfxGain);
                    osc.start(now);
                    osc.stop(now + 0.1);
                } else if (type === 'shoot') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.08);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                    osc.connect(gain);
                    gain.connect(sfxGain);
                    osc.start(now);
                    osc.stop(now + 0.08);
                } else if (type === 'combo') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.setValueAtTime(600, now + 0.1);
                    osc.frequency.setValueAtTime(800, now + 0.2);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.connect(gain);
                    gain.connect(sfxGain);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'powerup') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.1);
                    osc.frequency.setValueAtTime(784, now + 0.2);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.connect(gain);
                    gain.connect(sfxGain);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } else if (type === 'levelComplete') {
                    const notes = [523, 659, 784, 1047];
                    notes.forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.3, now + i * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.3);
                        osc.connect(gain);
                        gain.connect(sfxGain);
                        osc.start(now + i * 0.15);
                        osc.stop(now + i * 0.15 + 0.3);
                    });
                } else if (type === 'gameOver') {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.connect(gain);
                    gain.connect(sfxGain);
                    osc.start(now);
                    osc.stop(now + 0.8);
                }
            } catch (e) {}
        }

        // Resize
        function resize() {
            const container = document.getElementById('gameContainer');
            const cw = container.clientWidth;
            const ch = container.clientHeight;
            const scaleX = cw / GAME_W;
            const scaleY = ch / GAME_H;
            scale = Math.min(scaleX, scaleY);
            offsetX = (cw - GAME_W * scale) / 2;
            offsetY = (ch - GAME_H * scale) / 2;
            canvas.width = cw;
            canvas.height = ch;
            canvas.style.width = cw + 'px';
            canvas.style.height = ch + 'px';
        }

        // Input
        function getGameCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
            const clientY = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
            return {
                x: (clientX - rect.left - offsetX) / scale,
                y: (clientY - rect.top - offsetY) / scale
            };
        }

        function handlePointerMove(e) {
            if (gameState !== 'playing') return;
            const pos = getGameCoords(e);
            mouseX = pos.x;
            mouseY = pos.y;
            frogAngle = Math.atan2(mouseY - GAME_H / 2, mouseX - GAME_W / 2);
        }

        function handlePointerDown(e) {
            if (gameState !== 'playing' || isPaused) return;
            e.preventDefault();
            const pos = getGameCoords(e);
            mouseX = pos.x;
            mouseY = pos.y;
            frogAngle = Math.atan2(mouseY - GAME_H / 2, mouseX - GAME_W / 2);

            // Check frog click for color swap
            const dx = pos.x - GAME_W / 2;
            const dy = pos.y - GAME_H / 2;
            if (Math.hypot(dx, dy) < 40) {
                swapColors();
                return;
            }

            shoot();
        }

        function swapColors() {
            const temp = currentColor;
            currentColor = nextColor;
            nextColor = temp;
            playSFX('shoot');
        }

        function shoot() {
            if (shootingMarble) return;
            const speed = 12;
            const dx = Math.cos(frogAngle);
            const dy = Math.sin(frogAngle);
            shootingMarble = {
                x: GAME_W / 2 + dx * 30,
                y: GAME_H / 2 + dy * 30,
                vx: dx * speed,
                vy: dy * speed,
                color: currentColor,
                radius: MARBLE_R
            };
            currentColor = nextColor;
            nextColor = Math.floor(Math.random() * levelConfig.colors);

            // Dismiss tutorial on first shot
            if (!tutorialShown) {
                tutorialShown = true;
                document.getElementById('tutorialOverlay').classList.add('hidden');
            }

            playSFX('shoot');
        }

        // Game logic
        function startLevel(level) {
            currentLevel = level;
            levelConfig = LEVELS[level - 1];
            pathPoints = computePathPoints(levelConfig.path);
            pathLength = computePathLength(pathPoints);
            chain = [];
            particles = [];
            floatingTexts = [];
            combo = 0;
            lastPopTime = 0;
            score = 0;
            spawnTimer = 0;
            gameTimer = levelConfig.timeLimit;
            powerUps = { backward: 0, slow: 0, bomb: 0, colorBomb: 0, lightning: 0 };
            activePowers = {};
            marbleQueue = [];
            currentColor = Math.floor(Math.random() * levelConfig.colors);
            nextColor = Math.floor(Math.random() * levelConfig.colors);
            shootingMarble = null;

            gameState = 'playing';
            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('levelSelectScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            document.getElementById('topBar').classList.remove('hidden');
            document.getElementById('bottomBar').classList.remove('hidden');
            document.getElementById('settingsBtn').classList.remove('hidden');

            if (!tutorialShown) {
                document.getElementById('tutorialOverlay').classList.remove('hidden');
            }

            updateUI();
            startTimer();
            playBGM();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused && gameState === 'playing') {
                    gameTimer--;
                    updateUI();
                    if (gameTimer <= 0) {
                        gameTimer = 0;
                    }
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateUI() {
            document.getElementById('scoreVal').textContent = score;
            document.getElementById('levelVal').textContent = currentLevel;
            document.getElementById('timerVal').textContent = gameTimer;

            // Update power buttons
            updatePowerButton('powerBackward', powerUps.backward, 'backward');
            updatePowerButton('powerSlow', powerUps.slow, 'slow');
            updatePowerButton('powerBomb', powerUps.bomb, 'bomb');
            updatePowerButton('powerColorBomb', powerUps.colorBomb, 'colorBomb');
            updatePowerButton('powerLightning', powerUps.lightning, 'lightning');
        }

        function updatePowerButton(id, count, type) {
            const btn = document.getElementById(id);
            if (count > 0) {
                btn.classList.add('active');
                btn.style.background = `rgba(${getPowerColor(type)}, 0.3)`;
            } else {
                btn.classList.remove('active');
                btn.style.background = '';
            }
        }

        function getPowerColor(type) {
            const colors = {
                backward: '81, 207, 102',
                slow: '116, 192, 252',
                bomb: '255, 107, 107',
                colorBomb: '255, 217, 61',
                lightning: '255, 217, 61'
            };
            return colors[type] || '255,255,255';
        }

        function usePower(type) {
            if (powerUps[type] <= 0 || activePowers[type]) return;
            powerUps[type]--;
            playSFX('powerup');
            score += 50;

            if (type === 'backward') {
                activePowers.backward = 3;
                const pushDist = Math.floor(chain.length * 0.15);
                chain.forEach(m => {
                    m.pathIdx = Math.max(0, m.pathIdx - pushDist);
                    if (m.pathIdx === 0 && m === chain[0]) {} // at start
                });
                floatingTexts.push({
                    text: 'BACKWARD!',
                    x: GAME_W / 2,
                    y: GAME_H / 2,
                    color: '#51cf66',
                    life: 1
                });
            } else if (type === 'slow') {
                activePowers.slow = 5;
                floatingTexts.push({
                    text: 'SLOW!',
                    x: GAME_W / 2,
                    y: GAME_H / 2,
                    color: '#74c0fc',
                    life: 1
                });
            } else if (type === 'bomb') {
                // Bomb destroys marbles near center
                const cx = GAME_W / 2, cy = GAME_H / 2;
                const radius = 150;
                const toRemove = [];
                chain.forEach((m, i) => {
                    const pos = pathPoints[m.pathIdx];
                    if (pos && Math.hypot(pos.x - cx, pos.y - cy) < radius) {
                        toRemove.push(i);
                        spawnParticles(pos.x, pos.y, m.color);
                    }
                });
                toRemove.reverse().forEach(i => chain.splice(i, 1));
                if (toRemove.length > 0) {
                    screenShake = 10;
                    combo++;
                    score += toRemove.length * 10 * combo;
                }
                floatingTexts.push({
                    text: 'BOOM!',
                    x: GAME_W / 2,
                    y: GAME_H / 2,
                    color: '#ff6b6b',
                    life: 1
                });
            } else if (type === 'colorBomb') {
                // Destroys all marbles of current color
                const targetColor = currentColor;
                const toRemove = [];
                chain.forEach((m, i) => {
                    if (m.color === targetColor) {
                        toRemove.push(i);
                        const pos = pathPoints[m.pathIdx];
                        if (pos) spawnParticles(pos.x, pos.y, m.color);
                    }
                });
                toRemove.reverse().forEach(i => chain.splice(i, 1));
                if (toRemove.length > 0) {
                    screenShake = 8;
                    combo++;
                    score += toRemove.length * 10 * combo;
                    floatingTexts.push({
                        text: `COLOR ${toRemove.length}!`,
                        x: GAME_W / 2,
                        y: GAME_H / 2,
                        color: '#ffd93d',
                        life: 1
                    });
                }
            } else if (type === 'lightning') {
                // Destroys marbles in line from frog
                const dx = Math.cos(frogAngle);
                const dy = Math.sin(frogAngle);
                const toRemove = [];
                chain.forEach((m, i) => {
                    const pos = pathPoints[m.pathIdx];
                    if (pos) {
                        // Check if marble is near the line from frog
                        const fx = GAME_W / 2, fy = GAME_H / 2;
                        const t = ((pos.x - fx) * dx + (pos.y - fy) * dy);
                        const projX = fx + t * dx;
                        const projY = fy + t * dy;
                        const dist = Math.hypot(pos.x - projX, pos.y - projY);
                        if (dist < 40 && t > 0) {
                            toRemove.push(i);
                            spawnParticles(pos.x, pos.y, m.color);
                        }
                    }
                });
                toRemove.reverse().forEach(i => chain.splice(i, 1));
                if (toRemove.length > 0) {
                    screenShake = 8;
                    combo++;
                    score += toRemove.length * 10 * combo;
                    floatingTexts.push({
                        text: 'LIGHTNING!',
                        x: GAME_W / 2,
                        y: GAME_H / 2,
                        color: '#ffd93d',
                        life: 1
                    });
                }
            }

            updateUI();
        }

        function spawnParticles(x, y, colorIdx) {
            const count = 8 + Math.floor(Math.random() * 5);
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
                const speed = 2 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    color: getMarbleColor(colorIdx),
                    life: 1,
                    size: 3 + Math.random() * 4
                });
            }
        }

        function spawnMarble() {
            if (chain.length >= levelConfig.marbleCount) return;
            const color = Math.floor(Math.random() * levelConfig.colors);
            // Determine if this is a powerup (5% chance after level 3)
            let isPowerup = false;
            let powerType = null;
            if (currentLevel > 3 && Math.random() < 0.05) {
                isPowerup = true;
                powerType = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
            }
            chain.push({
                color,
                pathIdx: 0,
                radius: MARBLE_R,
                scale: 1,
                popping: false,
                isPowerup,
                powerType
            });
        }

        function getMarblePos(marble) {
            const idx = Math.min(Math.floor(marble.pathIdx), pathPoints.length - 1);
            const p = pathPoints[idx];
            return p || { x: GAME_W / 2, y: GAME_H / 2 };
        }

        function update(dt) {
            if (gameState !== 'playing' || isPaused) return;

            const speedMult = activePowers.slow ? 0.5 : 1;
            const speed = levelConfig.speed * speedMult * dt;

            // Spawn
            spawnTimer += dt;
            const spawnInterval = levelConfig.spawnInterval;
            if (spawnTimer >= spawnInterval && chain.length < levelConfig.marbleCount) {
                spawnMarble();
                spawnTimer = 0;
            }

            // Move chain
            chain.forEach(m => {
                if (!m.popping) {
                    m.pathIdx += speed * (60 / dt);
                    // Clamp to path length
                    m.pathIdx = Math.min(m.pathIdx, pathPoints.length - 1);
                }
            });

            // Push marbles apart to maintain spacing
            for (let i = 0; i < chain.length - 1; i++) {
                const m1 = chain[i];
                const m2 = chain[i + 1];
                if (m1.popping || m2.popping) continue;
                const pos1 = getMarblePos(m1);
                const pos2 = getMarblePos(m2);
                const dist = Math.hypot(pos2.x - pos1.x, pos2.y - pos1.y);
                const minDist = MARBLE_R * 2.2;
                if (dist < minDist) {
                    const overlap = (minDist - dist) / 2;
                    const dx = (pos2.x - pos1.x) / dist;
                    const dy = (pos2.y - pos1.y) / dist;
                    m1.pathIdx -= overlap * 0.5;
                    m2.pathIdx += overlap * 0.5;
                    m1.pathIdx = Math.max(0, m1.pathIdx);
                    m2.pathIdx = Math.min(pathPoints.length - 1, m2.pathIdx);
                }
            }

            // Update shooting marble
            if (shootingMarble) {
                shootingMarble.x += shootingMarble.vx;
                shootingMarble.y += shootingMarble.vy;

                // Check bounds
                if (shootingMarble.x < 0 || shootingMarble.x > GAME_W ||
                    shootingMarble.y < 0 || shootingMarble.y > GAME_H) {
                    shootingMarble = null;
                } else {
                    // Check collision with chain
                    for (let i = 0; i < chain.length; i++) {
                        const m = chain[i];
                        if (m.popping) continue;
                        const pos = getMarblePos(m);
                        const dist = Math.hypot(shootingMarble.x - pos.x, shootingMarble.y - pos.y);
                        if (dist < MARBLE_R * 2) {
                            // Insert here
                            insertMarble(shootingMarble, i);
                            shootingMarble = null;
                            break;
                        }
                    }
                }
            }

            // Check game over (first marble reaches end)
            if (chain.length > 0) {
                const first = chain[0];
                if (!first.popping && first.pathIdx >= pathPoints.length - 2) {
                    gameOver();
                    return;
                }
            }

            // Check win (all marbles popped and none left)
            if (chain.length === 0 && spawnTimer >= spawnInterval) {
                levelComplete();
                return;
            }

            // Update powers
            Object.keys(activePowers).forEach(key => {
                if (activePowers[key] > 0) {
                    activePowers[key] -= dt / 1000;
                    if (activePowers[key] <= 0) {
                        activePowers[key] = 0;
                    }
                }
            });

            // Update particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);

            // Update floating texts
            floatingTexts.forEach(t => {
                t.y -= 1;
                t.life -= 0.02;
            });
            floatingTexts = floatingTexts.filter(t => t.life > 0);

            // Update screen shake
            if (screenShake > 0) screenShake *= 0.9;

            // Update combo decay
            if (Date.now() - lastPopTime > 2000) combo = 0;
        }

        function insertMarble(marble, atIndex) {
            // Find the path index where to insert
            const targetIdx = chain[atIndex].pathIdx;
            const newMarble = {
                color: marble.color,
                pathIdx: targetIdx - 1,
                radius: MARBLE_R,
                scale: 1,
                popping: false
            };

            // Check if powerup was collected
            if (marble.isPowerup && marble.powerType) {
                powerUps[marble.powerType]++;
                floatingTexts.push({
                    text: `${marble.powerType.toUpperCase()}!`,
                    x: marble.x,
                    y: marble.y,
                    color: '#ffd93d',
                    life: 1.5
                });
            }

            chain.splice(atIndex, 0, newMarble);

            // Check matches
            setTimeout(() => checkMatches(atIndex), 50);
        }

        function checkMatches(startIdx) {
            if (startIdx < 0 || startIdx >= chain.length) return;

            const marble = chain[startIdx];
            if (marble.popping) return;

            // Find consecutive same color group
            let left = startIdx;
            while (left > 0 && chain[left - 1].color === marble.color && !chain[left - 1].popping) {
                left--;
            }
            let right = startIdx;
            while (right < chain.length - 1 && chain[right + 1].color === marble.color && !chain[right + 1].popping) {
                right++;
            }

            const group = [];
            for (let i = left; i <= right; i++) {
                group.push(i);
            }

            if (group.length >= 3) {
                // Pop!
                combo++;
                lastPopTime = Date.now();
                const now = Date.now();

                group.forEach(i => {
                    chain[i].popping = true;
                    const pos = getMarblePos(chain[i]);
                    spawnParticles(pos.x, pos.y, chain[i].color);
                });

                playSFX('pop');

                const points = group.length * 10 * combo;
                score += points;

                if (combo >= 2) {
                    playSFX('combo');
                    floatingTexts.push({
                        text: `+${points} COMBO x${combo}`,
                        x: GAME_W / 2,
                        y: GAME_H / 3,
                        color: '#ffd93d',
                        life: 1.2
                    });
                    if (combo >= 3) screenShake = 5;
                }

                // Remove popped marbles after animation
                setTimeout(() => {
                    chain = chain.filter(m => !m.popping);

                    // Check for chain reaction
                    if (chain.length >= 3) {
                        // Check if marbles on both sides of gap are same color
                        checkChainReaction();
                    }
                }, 300);

                updateUI();
            }
        }

        function checkChainReaction() {
            // After popping, check if the marbles that were separated now touch and match
            for (let i = 0; i < chain.length - 2; i++) {
                const m1 = chain[i];
                const m2 = chain[i + 1];
                const m3 = chain[i + 2];
                if (m1.color === m2.color && m2.color === m3.color) {
                    setTimeout(() => checkMatches(i), 100);
                    return;
                }
            }
        }

        function gameOver() {
            gameState = 'gameover';
            stopTimer();
            stopBGM();
            playSFX('gameOver');
            document.getElementById('topBar').classList.add('hidden');
            document.getElementById('bottomBar').classList.add('hidden');
            document.getElementById('settingsBtn').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('goScore').textContent = score;
        }

        function levelComplete() {
            gameState = 'levelcomplete';
            stopTimer();
            stopBGM();
            playSFX('levelComplete');

            const timeBonus = gameTimer * 5;
            const levelBonus = 1000 + currentLevel * 200;
            const total = score + timeBonus + levelBonus;
            score += timeBonus + levelBonus;

            // Calculate stars
            const twoStarScore = 2000 + currentLevel * 100;
            const threeStarScore = 4000 + currentLevel * 200;
            let stars = 1;
            if (score >= threeStarScore) stars = 3;
            else if (score >= twoStarScore) stars = 2;

            // Save progress
            if (!saveData.completed.includes(currentLevel)) {
                saveData.completed.push(currentLevel);
            }
            if (!saveData.stars[currentLevel] || saveData.stars[currentLevel] < stars) {
                saveData.stars[currentLevel] = stars;
            }
            if (!saveData.bestScore[currentLevel] || saveData.bestScore[currentLevel] < score) {
                saveData.bestScore[currentLevel] = score;
            }
            saveSaveData();

            // Show screen
            document.getElementById('topBar').classList.add('hidden');
            document.getElementById('bottomBar').classList.add('hidden');
            document.getElementById('settingsBtn').classList.add('hidden');
            document.getElementById('levelCompleteScreen').classList.remove('hidden');
            document.getElementById('lcScore').textContent = score - timeBonus - levelBonus;
            document.getElementById('lcTime').textContent = timeBonus;
            document.getElementById('lcTotal').textContent = score;

            let starsHtml = '';
            for (let i = 0; i < 3; i++) {
                starsHtml += i < stars ?
                    '<span class="star-filled">&#9733;</span>' :
                    '<span class="star-empty">&#9733;</span>';
            }
            document.getElementById('starsDisplay').innerHTML = starsHtml;
        }

        // Render
        function render() {
            ctx.save();
            ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);

            // Apply screen shake
            if (screenShake > 0.5) {
                ctx.translate(
                    (Math.random() - 0.5) * screenShake,
                    (Math.random() - 0.5) * screenShake
                );
            }

            // Background
            const bgGrad = ctx.createLinearGradient(0, 0, GAME_W, GAME_H);
            bgGrad.addColorStop(0, '#0a0a1a');
            bgGrad.addColorStop(1, '#1a0a2e');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, GAME_W, GAME_H);

            if (gameState === 'playing' || gameState === 'paused') {
                // Draw path
                drawPath();

                // Draw chain
                chain.forEach((m, i) => {
                    const pos = getMarblePos(m);
                    drawMarble(pos.x, pos.y, m.color, m.radius * (m.scale || 1), m.popping, m.isPowerup, m.powerType);
                });

                // Draw shooting marble
                if (shootingMarble) {
                    drawMarble(shootingMarble.x, shootingMarble.y, shootingMarble.color, shootingMarble.radius, false, false, null);
                }

                // Draw frog
                drawFrog();

                // Draw trajectory
                if (shootingMarble || gameState === 'playing') {
                    drawTrajectory();
                }

                // Draw particles
                particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                // Draw floating texts
                floatingTexts.forEach(t => {
                    ctx.globalAlpha = t.life;
                    ctx.fillStyle = t.color;
                    ctx.font = 'bold 24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(t.text, t.x, t.y);
                });
                ctx.globalAlpha = 1;

                // Draw next marble preview
                drawNextPreview();
            }

            ctx.restore();
        }

        function drawPath() {
            // Draw path track
            ctx.strokeStyle = '#3a3a4a';
            ctx.lineWidth = 36;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            pathPoints.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();

            // Inner groove
            ctx.strokeStyle = '#2a2a3a';
            ctx.lineWidth = 28;
            ctx.beginPath();
            pathPoints.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();

            // Center line (subtle)
            ctx.strokeStyle = '#1a1a2a';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            pathPoints.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();
            ctx.setLineDash([]);

            // Start point (spawn)
            if (pathPoints.length > 0) {
                const start = pathPoints[0];
                ctx.fillStyle = '#4a4a5a';
                ctx.beginPath();
                ctx.arc(start.x, start.y, 20, 0, Math.PI * 2);
                ctx.fill();
            }

            // End point (skull)
            if (pathPoints.length > 0) {
                const end = pathPoints[pathPoints.length - 1];
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(end.x, end.y, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#aa2222';
                ctx.beginPath();
                ctx.arc(end.x, end.y, 16, 0, Math.PI * 2);
                ctx.fill();
                // Skull eyes
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(end.x - 6, end.y - 3, 4, 0, Math.PI * 2);
                ctx.arc(end.x + 6, end.y - 3, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawMarble(x, y, colorIdx, radius, popping, isPowerup, powerType) {
            const scale = popping ? 0.3 : 1;
            const r = radius * scale;

            if (isPowerup && powerType) {
                // Draw powerup marble
                const grad = getPowerupGradient(ctx, x, y, r, powerType);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();

                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = getPowerColor(powerType);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.shadowBlur = 0;
            } else {
                // Regular marble with 3D effect
                const grad = getMarbleGradient(ctx, x, y, r, colorIdx);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();

                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.arc(x - r * 0.3, y - r * 0.3, r * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // Outline
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function drawFrog() {
            const cx = GAME_W / 2;
            const cy = GAME_H / 2;

            // Body
            const bodyGrad = ctx.createRadialGradient(cx - 10, cy - 10, 0, cx, cy, 40);
            bodyGrad.addColorStop(0, '#5a9f5a');
            bodyGrad.addColorStop(1, '#2d8a3e');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, 38, 0, Math.PI * 2);
            ctx.fill();

            // Outline
            ctx.strokeStyle = '#1a5a1a';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Eyes (white)
            const eyeOffsetX = 15;
            const eyeY = cy - 12;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(cx - eyeOffsetX, eyeY, 12, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + eyeOffsetX, eyeY, 12, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // Pupils (track mouse)
            const pupilOffsetX = Math.cos(frogAngle) * 4;
            const pupilOffsetY = Math.sin(frogAngle) * 2;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(cx - eyeOffsetX + pupilOffsetX, eyeY + pupilOffsetY, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx + eyeOffsetX + pupilOffsetX, eyeY + pupilOffsetY, 5, 0, Math.PI * 2);
            ctx.fill();

            // Mouth
            ctx.strokeStyle = '#1a5a1a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy + 10, 10, 0.2, Math.PI - 0.2);
            ctx.stroke();
        }

        function drawTrajectory() {
            const cx = GAME_W / 2;
            const cy = GAME_H / 2;
            const dx = Math.cos(frogAngle);
            const dy = Math.sin(frogAngle);

            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(cx + dx * 45, cy + dy * 45);
            ctx.lineTo(cx + dx * 150, cy + dy * 150);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawNextPreview() {
            const cx = GAME_W / 2 + 60;
            const cy = GAME_H / 2 - 40;

            // Label
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('NEXT', cx, cy - 20);

            // Next marble
            drawMarble(cx, cy, nextColor, MARBLE_R * 0.8, false, false, null);

            // Current marble indicator
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '10px Arial';
            ctx.fillText('NOW', cx - 60, cy - 20);
            drawMarble(cx - 60, cy, currentColor, MARBLE_R * 0.8, false, false, null);
        }

        // Level select
        function showLevelSelect() {
            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('levelSelectScreen').classList.remove('hidden');

            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= 30; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';

                const isUnlocked = i === 1 || saveData.completed.includes(i - 1);
                const stars = saveData.stars[i] || 0;

                if (!isUnlocked) {
                    btn.classList.add('locked');
                }

                let starsHtml = '<div class="stars">';
                for (let s = 0; s < 3; s++) {
                    starsHtml += s < stars ?
                        '<span class="star-filled">&#9733;</span>' :
                        '<span class="star-empty">&#9733;</span>';
                }
                starsHtml += '</div>';

                btn.innerHTML = `<span>${i}</span>${isUnlocked ? starsHtml : '&#128274;'}`;
                btn.onclick = () => {
                    if (isUnlocked) {
                        startLevel(i);
                    }
                };

                grid.appendChild(btn);
            }
        }

        function showMenu() {
            gameState = 'menu';
            stopTimer();
            stopBGM();
            chain = [];
            particles = [];
            floatingTexts = [];
            document.getElementById('topBar').classList.add('hidden');
            document.getElementById('bottomBar').classList.add('hidden');
            document.getElementById('settingsBtn').classList.add('hidden');
            document.getElementById('pauseOverlay').classList.add('hidden');
            document.getElementById('menuScreen').classList.remove('hidden');
            document.getElementById('levelSelectScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('levelCompleteScreen').classList.add('hidden');
            document.getElementById('tutorialOverlay').classList.add('hidden');
        }

        // Main loop
        function gameLoop(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            if (!isPaused) {
                update(Math.min(dt, 50));
            }

            render();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

        document.getElementById('playBtn').onclick = () => {
            initAudio();
            resumeAudio();
            // Find first unlocked level
            let level = 1;
            for (let i = 30; i >= 1; i--) {
                if (saveData.completed.includes(i)) {
                    level = i + 1;
                    break;
                }
            }
            level = Math.min(level, 30);
            startLevel(level);
        };

        document.getElementById('levelSelectBtn').onclick = () => {
            initAudio();
            showLevelSelect();
        };

        document.getElementById('backToMenuBtn').onclick = showMenu;

        document.getElementById('retryBtn').onclick = () => {
            initAudio();
            resumeAudio();
            startLevel(currentLevel);
        };

        document.getElementById('goMenuBtn').onclick = showMenu;

        document.getElementById('nextLevelBtn').onclick = () => {
            initAudio();
            resumeAudio();
            if (currentLevel < 30) {
                startLevel(currentLevel + 1);
            } else {
                showMenu();
            }
        };

        document.getElementById('lcMenuBtn').onclick = showMenu;

        // Power buttons
        document.getElementById('powerBackward').onclick = () => usePower('backward');
        document.getElementById('powerSlow').onclick = () => usePower('slow');
        document.getElementById('powerBomb').onclick = () => usePower('bomb');
        document.getElementById('powerColorBomb').onclick = () => usePower('colorBomb');
        document.getElementById('powerLightning').onclick = () => usePower('lightning');

        // Settings
        document.getElementById('settingsBtn').onclick = () => {
            document.getElementById('settingsPanel').classList.toggle('hidden');
            updateSettingsUI();
        };

        function updateSettingsUI() {
            const soundToggle = document.getElementById('soundToggle');
            const musicToggle = document.getElementById('musicToggle');
            soundToggle.className = 'toggle' + (settings.sound ? ' on' : '');
            musicToggle.className = 'toggle' + (settings.music ? ' on' : '');
        }

        document.getElementById('soundToggle').onclick = () => {
            settings.sound = !settings.sound;
            updateSettingsUI();
            saveSaveData();
        };

        document.getElementById('musicToggle').onclick = () => {
            settings.music = !settings.music;
            updateSettingsUI();
            saveSaveData();
            if (settings.music) {
                playBGM();
            } else {
                stopBGM();
            }
        };

        document.getElementById('closeSettingsBtn').onclick = () => {
            document.getElementById('settingsPanel').classList.add('hidden');
        };

        // Pause
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
                if (gameState === 'playing') {
                    isPaused = !isPaused;
                    document.getElementById('pauseOverlay').classList.toggle('hidden', !isPaused);
                }
            }
        });

        document.getElementById('resumeBtn').onclick = () => {
            isPaused = false;
            document.getElementById('pauseOverlay').classList.add('hidden');
        };

        document.getElementById('pauseMenuBtn').onclick = showMenu;

        // Visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && gameState === 'playing') {
                isPaused = true;
                document.getElementById('pauseOverlay').classList.remove('hidden');
            }
        });

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
            stopTimer();
            stopBGM();
            if (audioCtx) audioCtx.close();
        });

        // Init
        loadSaveData();
        resize();
        window.addEventListener('resize', resize);
        lastTime = performance.now();
        gameLoop(lastTime);
    })();
    </script>
</body>
</html>
