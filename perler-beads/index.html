// --- Game State ---
var state={
  screen:'menu',
  level:0,
  selectedColor:1,
  grid:[],
  placed:[],
  undoStack:[],
  hintsLeft:3,
  startTime:0,
  completed:JSON.parse(localStorage.getItem('perler_progress')||'{}'),
  soundOn:localStorage.getItem('perler_sound')!=='off',
  musicOn:localStorage.getItem('perler_music')!=='off',
  ironAnim:0,
  dragPlacing:false,
  lastPlaced:-1
};

// --- Audio ---
var audioCtx=null;
function initAudio(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
}
function playSound(freq,dur,type,vol){
  if(!state.soundOn||!audioCtx)return;
  try{
    var o=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    o.type=type||'sine';
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(dur||0.15));
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+(dur||0.15));
  }catch(e){}
}
function sndPlace(){playSound(600+Math.random()*200,0.08,'square',0.08)}
function sndComplete(){
  playSound(523,0.15,'sine',0.2);
  setTimeout(function(){playSound(659,0.15,'sine',0.2)},150);
  setTimeout(function(){playSound(784,0.3,'sine',0.2)},300);
}
function sndHint(){playSound(800,0.1,'triangle',0.1)}
function sndUndo(){playSound(300,0.1,'sine',0.08)}

// --- Background Music ---
var musicGain=null,musicInterval=null;
function startMusic(){
  if(!state.musicOn||!audioCtx)return;
  stopMusic();
  musicGain=audioCtx.createGain();
  musicGain.gain.value=0.03;
  musicGain.connect(audioCtx.destination);
  var notes=[262,294,330,349,392,440,494,523];
  var i=0;
  musicInterval=setInterval(function(){
    if(!musicGain)return;
    var o=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    o.type='sine';
    o.frequency.value=notes[i%notes.length];
    g.gain.setValueAtTime(0.5,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.8);
    o.connect(g);g.connect(musicGain);
    o.start();o.stop(audioCtx.currentTime+0.8);
    i++;
  },1200);
}
function stopMusic(){
  if(musicInterval){clearInterval(musicInterval);musicInterval=null;}
  if(musicGain){musicGain.disconnect();musicGain=null;}
}

// --- Canvas Setup ---
var canvas=document.getElementById('canvas');
var ctx=canvas.getContext('2d');
var CELL=0,GRID_SIZE=0,CANVAS_PX=0;

function setupCanvas(levelData){
  GRID_SIZE=levelData.g.length;
  var maxW=Math.min(window.innerWidth-20,600);
  CELL=Math.floor(maxW/GRID_SIZE);
  CANVAS_PX=CELL*GRID_SIZE;
  canvas.width=CANVAS_PX;
  canvas.height=CANVAS_PX;
}

// --- Rendering ---
function drawBead(x,y,colorIdx,placed,alpha){
  if(alpha===undefined)alpha=1;
  var cx=x*CELL+CELL/2;
  var cy=y*CELL+CELL/2;
  var r=CELL/2-1;
  var bead=BEADS[colorIdx];
  if(!bead)return;

  ctx.globalAlpha=alpha;

  if(placed){
    // Placed bead — draw circular bead
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    var grad=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.1,cx,cy,r);
    grad.addColorStop(0,bead.glow);
    grad.addColorStop(0.6,bead.c);
    grad.addColorStop(1,bead.c);
    ctx.fillStyle=grad;
    ctx.fill();

    // Highlight
    ctx.beginPath();
    ctx.arc(cx-r*0.3,cy-r*0.3,r*0.25,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.fill();
  }else{
    // Empty cell — draw pegboard slot
    ctx.beginPath();
    ctx.arc(cx,cy,r*0.35,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.08)';
    ctx.fill();

    // Number text
    if(colorIdx>0){
      ctx.font=Math.max(10,CELL*0.28)+'px Inter,sans-serif';
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(colorIdx,cx,cy);
    }
  }
  ctx.globalAlpha=1;
}

function drawGrid(){
  ctx.clearRect(0,0,CANVAS_PX,CANVAS_PX);

  // Background pegboard
  var pegGrad=ctx.createLinearGradient(0,0,CANVAS_PX,CANVAS_PX);
  pegGrad.addColorStop(0,'#2a2a3e');
  pegGrad.addColorStop(1,'#1a1a2e');
  ctx.fillStyle=pegGrad;
  ctx.fillRect(0,0,CANVAS_PX,CANVAS_PX);

  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,.05)';
  ctx.lineWidth=1;
  for(var i=0;i<=GRID_SIZE;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,CANVAS_PX);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(CANVAS_PX,i*CELL);ctx.stroke();
  }

  var levelData=LEVELS[state.level];

  // Iron animation overlay
  if(state.ironAnim>0){
    state.ironAnim=Math.max(0,state.ironAnim-0.02);
  }

  for(var y=0;y<GRID_SIZE;y++){
    for(var x=0;x<GRID_SIZE;x++){
      var target=levelData.g[y][x];
      if(target===0)continue;
      var isPlaced=state.placed[y][x]===target;
      var highlightColor=state.selectedColor===target&&!isPlaced;

      if(highlightColor){
        // Pulsing highlight
        var pulse=0.3+0.2*Math.sin(Date.now()/200);
        ctx.fillStyle='rgba(255,214,0,'+pulse+')';
        ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
      }

      drawBead(x,y,target,isPlaced,isPlaced?1:0.6);

      if(state.ironAnim>0&&isPlaced){
        // Iron melt effect
        ctx.globalAlpha=state.ironAnim*0.3;
        ctx.fillStyle='#fff';
        ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
        ctx.globalAlpha=1;
      }
    }
  }

  if(state.ironAnim>0){
    requestAnimationFrame(drawGrid);
  }
}

function drawGridLoop(){
  if(state.screen!=='game')return;
  drawGrid();
  // Only animate when there are highlighted cells
  var hasHighlight=false;
  var levelData=LEVELS[state.level];
  for(var y=0;y<GRID_SIZE&&!hasHighlight;y++){
    for(var x=0;x<GRID_SIZE&&!hasHighlight;x++){
      if(levelData.g[y][x]===state.selectedColor&&state.placed[y][x]!==state.selectedColor){
        hasHighlight=true;
      }
    }
  }
  if(hasHighlight||state.ironAnim>0){
    requestAnimationFrame(drawGridLoop);
  }
}

// --- Game Logic ---
function startLevel(idx){
  state.level=idx;
  var ld=LEVELS[idx];
  GRID_SIZE=ld.g.length;
  state.grid=[];
  state.placed=[];
  for(var y=0;y<GRID_SIZE;y++){
    state.grid.push(ld.g[y].slice());
    state.placed.push(new Array(GRID_SIZE).fill(0));
  }
  state.undoStack=[];
  state.hintsLeft=3;
  state.startTime=Date.now();
  state.ironAnim=0;

  // Auto-select first available color
  state.selectedColor=1;
  for(var ci=1;ci<=15;ci++){
    if(colorHasRemaining(ci)){state.selectedColor=ci;break;}
  }

  setupCanvas(ld);
  buildPalette();
  showScreen('game');
  updateHUD();
  drawGridLoop();
}

function colorHasRemaining(colorIdx){
  var ld=LEVELS[state.level];
  for(var y=0;y<GRID_SIZE;y++){
    for(var x=0;x<GRID_SIZE;x++){
      if(ld.g[y][x]===colorIdx&&state.placed[y][x]!==colorIdx)return true;
    }
  }
  return false;
}

function placeBead(cellX,cellY){
  if(cellX<0||cellY<0||cellX>=GRID_SIZE||cellY>=GRID_SIZE)return;
  var ld=LEVELS[state.level];
  var target=ld.g[cellY][cellX];
  if(target===0)return;
  if(target!==state.selectedColor)return;
  if(state.placed[cellY][cellX]===target)return;

  state.undoStack.push({x:cellX,y:cellY});
  state.placed[cellY][cellX]=target;
  sndPlace();

  // Check if this color is done
  if(!colorHasRemaining(state.selectedColor)){
    // Auto-advance to next color
    for(var ci=state.selectedColor+1;ci<=15;ci++){
      if(colorHasRemaining(ci)){
        state.selectedColor=ci;
        buildPalette();
        break;
      }
    }
  }

  updateHUD();
  checkComplete();
}

function checkComplete(){
  var ld=LEVELS[state.level];
  var total=0,done=0;
  for(var y=0;y<GRID_SIZE;y++){
    for(var x=0;x<GRID_SIZE;x++){
      if(ld.g[y][x]>0){
        total++;
        if(state.placed[y][x]===ld.g[y][x])done++;
      }
    }
  }
  if(done===total){
    // Complete!
    var elapsed=(Date.now()-state.startTime)/1000;
    var stars=3;
    if(elapsed>60)stars=2;
    if(elapsed>120)stars=1;
    var hintsUsed=3-state.hintsLeft;
    if(hintsUsed>0)stars=Math.max(1,stars-1);

    state.completed[state.level]={stars:stars,time:Math.round(elapsed)};
    localStorage.setItem('perler_progress',JSON.stringify(state.completed));

    state.ironAnim=1;
    sndComplete();
    setTimeout(function(){showComplete(stars,Math.round(elapsed))},1200);
  }
}

function getProgress(){
  var ld=LEVELS[state.level];
  var total=0,done=0;
  for(var y=0;y<GRID_SIZE;y++){
    for(var x=0;x<GRID_SIZE;x++){
      if(ld.g[y][x]>0){
        total++;
        if(state.placed[y][x]===ld.g[y][x])done++;
      }
    }
  }
  return Math.round(done/total*100);
}

// --- UI ---
function showScreen(name){
  state.screen=name;
  document.getElementById('menu-screen').style.display=name==='menu'?'flex':'none';
  document.getElementById('game-screen').classList.toggle('hidden',name!=='game');
  document.getElementById('level-select').classList.toggle('show',name==='levels');
  if(name!=='game')stopMusic();
}

function updateHUD(){
  document.getElementById('hud-level').textContent='L'+(state.level+1);
  document.getElementById('hud-progress').textContent=getProgress()+'%';
}

function buildPalette(){
  var ld=LEVELS[state.level];
  var colorCounts={};
  for(var y=0;y<GRID_SIZE;y++){
    for(var x=0;x<GRID_SIZE;x++){
      var c=ld.g[y][x];
      if(c>0){
        if(!colorCounts[c])colorCounts[c]={total:0,done:0};
        colorCounts[c].total++;
        if(state.placed[y][x]===c)colorCounts[c].done++;
      }
    }
  }

  var pal=document.getElementById('palette');
  pal.innerHTML='';
  for(var ci=1;ci<=15;ci++){
    if(!colorCounts[ci])continue;
    var item=document.createElement('div');
    item.className='palette-item'+(ci===state.selectedColor?' active':'')+(colorCounts[ci].done>=colorCounts[ci].total?' done':'');
    item.style.background='radial-gradient(circle at 30% 30%,'+BEADS[ci].glow+','+BEADS[ci].c+')';
    item.textContent=ci;
    (function(idx){
      item.onclick=function(){
        state.selectedColor=idx;
        buildPalette();
        drawGridLoop();
        sndHint();
      };
    })(ci);
    var count=document.createElement('span');
    count.className='palette-count';
    count.textContent=colorCounts[ci].done+'/'+colorCounts[ci].total;
    item.appendChild(count);
    pal.appendChild(item);
  }
}

function showComplete(stars,time){
  var overlay=document.getElementById('overlay');
  var content=document.getElementById('overlay-content');
  var starStr='';
  for(var i=0;i<3;i++)starStr+=i<stars?'★':'☆';
  content.innerHTML=
    '<div class="overlay-title win">Design Complete!</div>'+
    '<div class="overlay-stars">'+starStr+'</div>'+
    '<div class="overlay-text">You ironed it in '+time+' seconds!<br>'+
    'Level '+(state.level+1)+': '+LEVELS[state.level].n+'</div>'+
    (state.level<LEVELS.length-1?
      '<button class="overlay-btn primary" id="btn-next">Next Level</button>':'')+
    '<button class="overlay-btn secondary" id="btn-replay">Replay</button>'+
    '<button class="overlay-btn secondary" id="btn-back-menu">Level Select</button>';
  overlay.classList.add('show');

  if(stars>=2){
    // Show interstitial ad on high completion
    if(typeof showMonetagInterstitial==='function'){
      try{showMonetagInterstitial();}catch(e){}
    }
  }

  var nextBtn=document.getElementById('btn-next');
  if(nextBtn){
    nextBtn.onclick=function(){
      overlay.classList.remove('show');
      startLevel(state.level+1);
    };
  }
  document.getElementById('btn-replay').onclick=function(){
    overlay.classList.remove('show');
    startLevel(state.level);
  };
  document.getElementById('btn-back-menu').onclick=function(){
    overlay.classList.remove('show');
    showLevelSelect();
  };
}

function showHowTo(){
  var overlay=document.getElementById('overlay');
  var content=document.getElementById('overlay-content');
  content.innerHTML=
    '<div class="overlay-title">How to Play</div>'+
    '<div class="overlay-text" style="text-align:left">'+

    '</div>'+
    '<button class="overlay-btn primary" id="btn-gotit">Got It!</button>';

function showLevelSelect(){
  showScreen('levels');
  var ls=document.getElementById('level-select');
  ls.innerHTML='';
  var tierNames=['','Simple','Easy','Medium','Hard','Masterpiece'];

  for(var t=1;t<=5;t++){
    var tierDiv=document.createElement('div');
    tierDiv.className='ls-tier';
    tierDiv.innerHTML='<div class="ls-tier-title">'+tierNames[t]+'</div><div class="ls-grid"></div>';
    var grid=tierDiv.querySelector('.ls-grid');

    for(var i=0;i<LEVELS.length;i++){
      if(LEVELS[i].t!==t)continue;
      var cell=document.createElement('div');
      var unlocked=i===0||state.completed[i-1];
      var completed=state.completed[i];
      cell.className='ls-cell '+(unlocked?'unlocked':'locked')+(completed?' completed':'');
      var starsStr='';
      if(completed){
        for(var s=0;s<3;s++)starsStr+=s<completed.stars?'★':'☆';
      }
      cell.innerHTML='<div class="ls-num">'+(i+1)+'</div>'+(completed?'<div class="ls-stars">'+starsStr+'</div>':'');
      (function(idx,canPlay){
        cell.onclick=function(){
          if(!canPlay)return;
          initAudio();
          startLevel(idx);
          startMusic();
        };
      })(i,unlocked);
      grid.appendChild(cell);
    }
    ls.appendChild(tierDiv);
  }
}

function showHint(){
  if(state.hintsLeft<=0)return;
  var ld=LEVELS[state.level];
  for(var y=0;y<GRID_SIZE;y++){
    for(var x=0;x<GRID_SIZE;x++){
      if(ld.g[y][x]>0&&state.placed[y][x]!==ld.g[y][x]){
        state.selectedColor=ld.g[y][x];
        state.hintsLeft--;
        buildPalette();
        sndHint();
        drawGridLoop();
        showHintMsg('Hint: Try color '+state.selectedColor+' ('+BEADS[state.selectedColor].name+')');
        return;
      }
    }
  }
}

function showHintMsg(msg){
  var el=document.getElementById('hint-msg');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show')},2000);
}

function undo(){
  if(state.undoStack.length===0)return;
  var last=state.undoStack.pop();
  state.placed[last.y][last.x]=0;
  sndUndo();
  updateHUD();
  buildPalette();
  drawGridLoop();
}

// --- Input Handling ---
function getCellFromEvent(e){
  var rect=canvas.getBoundingClientRect();
  var scaleX=canvas.width/rect.width;
  var scaleY=canvas.height/rect.height;
  var px,py;
  if(e.touches&&e.touches[0]){
    px=e.touches[0].clientX;
    py=e.touches[0].clientY;
  }else{
    px=e.clientX;
    py=e.clientY;
  }
  var cx=Math.floor((px-rect.left)*scaleX/CELL);
  var cy=Math.floor((py-rect.top)*scaleY/CELL);
  return{x:cx,y:cy};
}

canvas.addEventListener('mousedown',function(e){
  e.preventDefault();
  var c=getCellFromEvent(e);
  state.dragPlacing=true;
  state.lastPlaced=c.y*GRID_SIZE+c.x;
  placeBead(c.x,c.y);
  drawGridLoop();
});

canvas.addEventListener('mousemove',function(e){
  e.preventDefault();
  if(!state.dragPlacing)return;
  var c=getCellFromEvent(e);
  var key=c.y*GRID_SIZE+c.x;
  if(key!==state.lastPlaced){
    state.lastPlaced=key;
    placeBead(c.x,c.y);
  }
});

canvas.addEventListener('mouseup',function(e){state.dragPlacing=false;});
canvas.addEventListener('mouseleave',function(e){state.dragPlacing=false;});

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var c=getCellFromEvent(e);
  state.dragPlacing=true;
  state.lastPlaced=c.y*GRID_SIZE+c.x;
  placeBead(c.x,c.y);
  drawGridLoop();
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(!state.dragPlacing)return;
  var c=getCellFromEvent(e);
  var key=c.y*GRID_SIZE+c.x;
  if(key!==state.lastPlaced){
    state.lastPlaced=key;
    placeBead(c.x,c.y);
  }
},{passive:false});

canvas.addEventListener('touchend',function(e){state.dragPlacing=false;});

// --- Menu ---
document.getElementById('btn-continue').onclick=function(){
  initAudio();
  // Find highest unlocked level
  var startIdx=0;
  for(var i=0;i<LEVELS.length;i++){
    if(state.completed[i])startIdx=i+1;
  }
  if(startIdx>=LEVELS.length)startIdx=LEVELS.length-1;
  startLevel(startIdx);
  startMusic();
};

document.getElementById('btn-levels').onclick=function(){
  initAudio();
  showLevelSelect();
};

document.getElementById('btn-howto').onclick=function(){
  showHowTo();
};

document.getElementById('btn-menu').onclick=function(){
  showScreen('menu');
};

document.getElementById('btn-hint').onclick=function(){
  showHint();
};

document.getElementById('btn-undo').onclick=function(){
  undo();
};

document.getElementById('btn-sound-toggle').onclick=function(){
  state.soundOn=!state.soundOn;
  localStorage.setItem('perler_sound',state.soundOn?'on':'off');
  this.textContent='Sound: '+(state.soundOn?'On':'Off');
};

document.getElementById('btn-music-toggle').onclick=function(){
  state.musicOn=!state.musicOn;
  localStorage.setItem('perler_music',state.musicOn?'on':'off');
  this.textContent='Music: '+(state.musicOn?'On':'Off');
  if(state.musicOn){startMusic();}else{stopMusic();}
};

// --- Init ---
showScreen('menu');

// Resize handler
window.addEventListener('resize',function(){
  if(state.screen==='game'){
    setupCanvas(LEVELS[state.level]);
    drawGrid();
  }
});

})();
</script>
