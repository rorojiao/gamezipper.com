<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="big-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c92a2a"/>
    </linearGradient>
    <linearGradient id="tall-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c7cfa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="small-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd43b"/>
      <stop offset="100%" stop-color="#f59f00"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#5c7cfa"/>
      <stop offset="100%" stop-color="#ffd43b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- grid pattern (subtle) -->
  <g opacity="0.08" stroke="#4ade80" stroke-width="0.5">
    <line x1="0" y1="80" x2="512" y2="80"/>
    <line x1="0" y1="160" x2="512" y2="160"/>
    <line x1="0" y1="240" x2="512" y2="240"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="512"/>
    <line x1="160" y1="0" x2="160" y2="512"/>
    <line x1="240" y1="0" x2="240" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>

  <!-- Title -->
  <text x="256" y="90" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="url(#title-grad)" filter="url(#glow-filter)">BIG TALL SMALL</text>
  <text x="256" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8888aa" letter-spacing="4">A MULTI-CHARACTER PUZZLE</text>

  <!-- Big character (left) -->
  <g transform="translate(110, 270)" filter="url(#shadow)">
    <rect x="-40" y="-40" width="80" height="80" rx="12" fill="url(#big-grad)" stroke="#ff8787" stroke-width="2"/>
    <circle cx="-15" cy="-10" r="6" fill="white"/>
    <circle cx="15" cy="-10" r="6" fill="white"/>
    <circle cx="-15" cy="-10" r="3" fill="#0a0a1a"/>
    <circle cx="15" cy="-10" r="3" fill="#0a0a1a"/>
    <path d="M -12 15 Q 0 22 12 15" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <text x="110" y="380" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" fill="#ff6b6b" font-weight="900">BIG</text>
  <text x="110" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8888aa">Pushes boxes</text>

  <!-- Tall character (center) -->
  <g transform="translate(256, 270)" filter="url(#shadow)">
    <rect x="-22" y="-50" width="44" height="100" rx="10" fill="url(#tall-grad)" stroke="#748ffc" stroke-width="2"/>
    <circle cx="-8" cy="-25" r="5" fill="white"/>
    <circle cx="8" cy="-25" r="5" fill="white"/>
    <circle cx="-8" cy="-25" r="2.5" fill="#0a0a1a"/>
    <circle cx="8" cy="-25" r="2.5" fill="#0a0a1a"/>
    <path d="M -7 5 Q 0 10 7 5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="256" y="380" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" fill="#5c7cfa" font-weight="900">TALL</text>
  <text x="256" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8888aa">Jumps high</text>

  <!-- Small character (right) -->
  <g transform="translate(402, 270)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="34" fill="url(#small-grad)" stroke="#ffe066" stroke-width="2"/>
    <circle cx="-10" cy="-7" r="4.5" fill="white"/>
    <circle cx="10" cy="-7" r="4.5" fill="white"/>
    <circle cx="-10" cy="-7" r="2.2" fill="#0a0a1a"/>
    <circle cx="10" cy="-7" r="2.2" fill="#0a0a1a"/>
    <path d="M -7 8 Q 0 12 7 8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="402" y="380" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" fill="#ffd43b" font-weight="900">SMALL</text>
  <text x="402" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8888aa">Fits anywhere</text>

  <!-- Footer -->
  <text x="256" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#4ade80" letter-spacing="2">FREE ONLINE  •  30 LEVELS</text>
  <text x="256" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" letter-spacing="3">GAMEZIPPER.COM</text>
</svg>
