function resize(){
 var w=window.innerWidth,h=window.innerHeight;
 // R199 P0 fix: subtract footer height (44px) so glass/level content at canvas bottom
 // is not covered by the fixed game-footer.js bar.
 var footerH=0;
 var fe=document.getElementById('game-footer');
 if(fe&&fe.offsetHeight>0){footerH=fe.offsetHeight;}
 else{footerH=44;} // footer may not have loaded yet; reserve default
 h=h-footerH;
 var ar=GW/GH;
 var nah=w/h;
 if(nah>ar){SCALE=h/GH}else{SCALE=w/GW}
 CANVAS.width=GW;CANVAS.height=GH;
 CANVAS.style.width=w+"px";CANVAS.style.height=h+"px";
}

function getScale(){return SCALE}
function getOffset(){
 var r=CANVAS.getBoundingClientRect();
 return {x:(r.left)*GW/CANVAS.clientWidth,y:(r.top)*GH/CANVAS.clientHeight}
}

function toCanvas(cx,cy){
 var r=CANVAS.getBoundingClientRect();
 return {x:(cx-r.left)*GW/r.width,y:(cy-r.top)*GH/r.height}
}

var pointerDown=false,lastPX=0,lastPY=0;

function onPointerDown(e){
 e.preventDefault();
 initAudio();resumeAudio();
 if(clickCooldown)return;
 var p=e.touches?e.touches[0]:e;
 var pos=toCanvas(p.clientX,p.clientY);
 var ox=getOffset().x,oy=getOffset().y;
 var sx=SCALE;
 pointerDown=true;lastPX=pos.x;lastPY=pos.y;
 if(STATE==="PLAYING"&&gamePhase==="drawing"){
  var lvl=getLevel(currentLevel);
  var remainingInk=lvl.maxInk-inkUsed;
  if(remainingInk>5){
   linesDrawn.push([]);
  }
 }
}

function onPointerMove(e){
 e.preventDefault();
 if(!pointerDown)return;
 var p=e.touches?e.touches[0]:e;
 var pos=toCanvas(p.clientX,p.clientY);
 if(STATE==="PLAYING"&&gamePhase==="drawing"&&linesDrawn.length>0){
  var lvl=getLevel(currentLevel);
  var dx=pos.x-lastPX,dy=pos.y-lastPY;
  var dist=Math.sqrt(dx*dx+dy*dy);
  var remainingInk=lvl.maxInk-inkUsed;
  if(dist>3&&remainingInk>0){
   var nx=(pos.x-lastPX)/dist,ny=(pos.y-lastPY)/dist;
   var step=Math.min(dist,remainingInk);
   var newX=lastPX+nx*step,newY=lastPY+ny*step;
   linesDrawn[linesDrawn.length-1].push({x1:lastPX,y1:lastPY,x2:newX,y2:newY});
   inkUsed+=step;
   playSFX("draw");
   lastPX=newX;lastPY=newY;
  }
 } else {
  lastPX=pos.x;lastPY=pos.y;
 }
}

function onPointerUp(e){
 e.preventDefault();
 pointerDown=false;
}

CANVAS.addEventListener("touchstart",onPointerDown,{passive:false});

function calcLineLen(l){
 var t=0;
 for(var i=0;i<l.length;i++){var s=l[i];var dx=s.x2-s.x1,dy=s.y2-s.y1;t+=Math.sqrt(dx*dx+dy*dy)}
 return t;
}

function lineCircleIx(x1,y1,x2,y2,cx,cy,r){
 var dx=x2-x1,dy=y2-y1;
 var fx=x1-cx,fy=y1-cy;
 var a=dx*dx+dy*dy;
 var b=2*(fx*dx+fy*dy);
 var c=fx*fx+fy*fy-r*r;
 var disc=b*b-4*a*c;
 if(disc<0)return null;
 var sq=Math.sqrt(disc);
 var t1=(-b-sq)/(2*a);
 var t2=(-b+sq)/(2*a);
 var t=-1;
 if(t1>=0&&t1<=1)t=t1;else if(t2>=0&&t2<=1)t=t2;else return null;
 return {t:t,x:x1+t*dx,y:y1+t*dy,nx:-(y2-y1)/Math.sqrt(dx*dx+dy*dy||1),ny:(x2-x1)/Math.sqrt(dx*dx+dy*dy||1)}
}

function rectContains(r,x,y){
 return x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h;
}

function pointInGlass(p,glass){
 return p.x>=glass.x&&p.x<=glass.x+glass.w&&p.y>=glass.y&&p.y<=glass.y+glass.h;
}

function Particle(x,y){
 this.x=x;this.y=y;this.vx=(Math.random()-.5)*1.5;this.vy=Math.random()*2;
 this.r=5;
 this.active=true;
 this.settled=false;
 this.settleTimer=0;
}
Particle.prototype.update=function(dt,lvl,lines,obs,mov){
 if(!this.active)return;
 var g=980*dt;
 this.vy+=g*dt;
 this.vx*=Math.pow(.99,dt*60);
 var sp=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
 if(sp>600){var s=600/sp;this.vx*=s;this.vy*=s}
 var nx=this.vx/Math.max(sp,.001),ny=this.vy/Math.max(sp,.001);
 var nx2=this.x+nx*this.r,ny2=this.y+ny*this.r;
 var coll=false;
 var allLines=lines.slice();
 if(obs){obs.forEach(function(o){
  var segs=[
   {x1:o.x,y1:o.y,x2:o.x+o.w,y2:o.y},
   {x1:o.x,y1:o.y,x2:o.x,y2:o.y+o.h},
   {x1:o.x+o.w,y1:o.y,x2:o.x+o.w,y2:o.y+o.h},
   {x1:o.x,y1:o.y+o.h,x2:o.x+o.w,y2:o.y+o.h}
  ];
  segs.forEach(function(s){allLines.push(s)});
 });}
 if(mov){mov.forEach(function(m){
  var segs=[
   {x1:m.x,y1:m.y,x2:m.x+m.w,y2:m.y},
   {x1:m.x,y1:m.y,x2:m.x,y2:m.y+m.h},
   {x1:m.x+m.w,y1:m.y,x2:m.x+m.w,y2:m.y+m.h},
   {x1:m.x,y1:m.y+m.h,x2:m.x+m.w,y2:m.y+m.h}
  ];
  segs.forEach(function(s){allLines.push(s)});
 });}
 var isBouncy=false;
 if(lvl.bouncy){lvl.bouncy.forEach(function(b){
  var segs=[
   {x1:b.x,y1:b.y,x2:b.x+b.w,y2:b.y}
  ];
  segs.forEach(function(s){allLines.push(s)});
 });}
 for(var i=0;i<allLines.length;i++){
  var seg=allLines[i];
  var res=lineCircleIx(seg.x1,seg.y1,seg.x2,seg.y2,this.x,this.y,this.r);
  if(res){
   var bouncy=false;
   if(lvl.bouncy){
    lvl.bouncy.forEach(function(b){
     if(seg.x1>=b.x-1&&seg.x1<=b.x+b.w+1&&Math.abs(seg.y1-b.y)<2){bouncy=true}
    });
   }
   var rest=bouncy?.7:.3;
   this.x=res.x+res.nx*(this.r+1);
   this.y=res.y+res.ny*(this.r+1);
   var dot=this.vx*res.nx+this.vy*res.ny;
   this.vx=(this.vx-2*dot*res.nx)*rest;
   this.vy=(this.vy-2*dot*res.ny)*rest;
   if(bouncy){
    this.vx*=1.5;this.vy*=1.5;
    if(Math.abs(this.vy)>50)playSFX("splash");
   }
   coll=true;
   break;
  }
 }
 if(!coll){
  this.x+=this.vx*dt;
  this.y+=this.vy*dt;
 }
 if(this.y>GH+50)this.active=false;
 var sp2=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
 if(sp2<8&&this.y>GH-200){
  this.settleTimer+=dt;
  if(this.settleTimer>.5)this.settled=true;
 } else {this.settleTimer=0;this.settled=false}
};

function spawnParticles(lvl,count){
 for(var i=0;i<count;i++){
  var px=lvl.faucet.x+(Math.random()-.5)*20;
  var py=lvl.faucet.y+20;
  var p=new Particle(px,py);
  particles.push(p);
 }
}

function resetLevel(){
 var lvl=getLevel(currentLevel);
 linesDrawn=[];
 inkUsed=0;
 particles=[];
 gamePhase="drawing";
 levelComplete=false;
 completeStars=0;
 pourTimer=0;
 movingPlatforms=[];
 if(lvl.moving){
  lvl.moving.forEach(function(mp){
   movingPlatforms.push({x:mp.x,y:mp.y,w:mp.w,h:mp.h,dx:mp.dx,dy:mp.dy,speed:mp.speed,ox:mp.x,oy:mp.y,phase:Math.random()});
  });
 }
 tutorialStep=currentLevel<=2?1:0;
 showingHint=false;
 hintPoints=[];
}

function calcInkLen(){
 var t=0;
 for(var gi=0;gi<linesDrawn.length;gi++){
  for(var i=0;i<linesDrawn[gi].length;i++){
   var s=linesDrawn[gi][i];
   var dx=s.x2-s.x1,dy=s.y2-s.y1;
   t+=Math.sqrt(dx*dx+dy*dy);
  }
 }
 return t;
}

function countParticlesInGlass(lvl){
 var cnt=0;
 var gx=lvl.glass.x,gy=lvl.glass.y,gh=lvl.glass.h,gw=lvl.glass.w;
 var fillY=gy+gh-lvl.glass.fillLine;
 particles.forEach(function(p){
  if(p.active&&p.x>=gx&&p.x<=gx+gw&&p.y>=gy&&p.y<=gy+gh){
   cnt++;
  }
 });
 return cnt;
}

function calcStars(ink,maxInk,starThresholds){
 var pct=ink/maxInk;
 if(pct<=.33)return 3;
 if(pct<=.66)return 2;
 return 1;
}

function getStarsForLevel(n){
 var s=gamedata.stars[n];
 return s||0;
}

function showHint(){
 if(hintsUsed>=hintsMax)return;
 var lvl=getLevel(currentLevel);
 if(!lvl.hint||lvl.hint.length===0)return;
 hintsUsed++;
 showingHint=true;
 var hi=Math.min(hintsUsed-1,lvl.hint.length-1);
 hintPoints=lvl.hint[hi];
 saveSave();
}

function updateGame(dt){
 if(STATE!=="PLAYING")return;
 var lvl=getLevel(currentLevel);
 if(movingPlatforms.length>0){
  var t=Date.now()*.001;
  movingPlatforms.forEach(function(mp){
   mp.x=mp.ox+Math.sin(t*mp.speed+mp.phase)*mp.dx;
   mp.y=mp.oy+Math.sin(t*mp.speed+mp.phase)*mp.dy;
  });
 }
 if(gamePhase==="pouring"){
  pourTimer+=dt*60;
  var pourCount=Math.floor(pourTimer/3);
  if(pourCount>0&&particles.length<250){
   spawnParticles(lvl,Math.min(pourCount,3));
   pourTimer%=3;
   playSFX("pour");
  }
  if(pourTimer>=pourDuration){
   gamePhase="settling";
  }

 if(gamePhase==="settling"||gamePhase==="pouring"){

    if(!p.settled&&p.active)allSettled=false;
   }
  });
  var glassFill=countParticlesInGlass(lvl);

   completeStars=calcStars(inkLen,lvl.maxInk,lvl.stars);
   if(completeStars>getStarsForLevel(currentLevel)){
    gamedata.stars[currentLevel]=completeStars;
   }
   if(currentLevel>=gamedata.unlocked&&currentLevel<30){
    gamedata.unlocked=currentLevel+1;
   }
   saveSave();
   playSFX("complete");
   setTimeout(function(){playSFX("star")},400);
   if(completeStars>=1)setTimeout(function(){playSFX("star")},700);
   if(completeStars>=2)setTimeout(function(){playSFX("star")},1000);
   if(completeStars>=3)setTimeout(function(){playSFX("star")},1300);
  }
  if(!levelComplete&&allSettled&&gamePhase==="settling"&&particles.length>0){
   var glassFill2=countParticlesInGlass(lvl);
   var fillThresh2=lvl.glass.fillLine*0.5;
   if(glassFill2<fillThresh2){
    gamePhase="failed";
    setTimeout(function(){
     resetLevel();
     gamePhase="drawing";
    },1500);
   } else {
    gamePhase="complete";
    levelComplete=true;
    if(currentLevel%3===0)showInterstitial();
    var inkLen2=calcInkLen();
    completeStars=calcStars(inkLen2,lvl.maxInk,lvl.stars);
    if(completeStars>getStarsForLevel(currentLevel)){
     gamedata.stars[currentLevel]=completeStars;
    }
    if(currentLevel>=gamedata.unlocked&&currentLevel<30){
     gamedata.unlocked=currentLevel+1;
    }
    saveSave();
   }
  }
 }
}

function drawBackground(){
 var grad=CTX.createLinearGradient(0,0,0,GH);
 grad.addColorStop(0,"#0a0a1a");
 grad.addColorStop(.5,"#1a1a3e");
 grad.addColorStop(1,"#0d1a2d");
 CTX.fillStyle=grad;
 CTX.fillRect(0,0,GW,GH);
 var t=Date.now()*.0005;
 CTX.strokeStyle="rgba(0,136,255,0.04)";
 CTX.lineWidth=1;
 for(var i=0;i<5;i++){
  CTX.beginPath();
  for(var x=0;x<GW;x+=10){
   var y=GH*.5+Math.sin(x*.01+t+i)*30+Math.sin(x*.02+t*1.3+i*.5)*15;
   if(x===0)CTX.moveTo(x,y);else CTX.lineTo(x,y);
  }
  CTX.stroke();
 }
}

function drawFaucet(lvl){
 var fx=lvl.faucet.x,fy=lvl.faucet.y;
 CTX.save();
 var grd=CTX.createLinearGradient(fx-25,fy,fx+25,fy);
 grd.addColorStop(0,"#888");
 grd.addColorStop(.5,"#ddd");
 grd.addColorStop(1,"#888");
 CTX.fillStyle=grd;
 CTX.fillRect(fx-30,fy-10,60,20);
 CTX.fillRect(fx-15,fy+5,30,25);
 var innerGrd=CTX.createRadialGradient(fx,fy+18,0,fx,fy+18,12);
 innerGrd.addColorStop(0,"#1a3a5c");
 innerGrd.addColorStop(1,"#0a1a2c");
 CTX.fillStyle=innerGrd;
 CTX.beginPath();
 CTX.arc(fx,fy+18,10,0,Math.PI*2);
 CTX.fill();
 CTX.restore();
}

function drawGlass(lvl){
 var g=lvl.glass;
 CTX.save();
 CTX.strokeStyle="rgba(200,230,255,0.7)";
 CTX.lineWidth=3;
 CTX.beginPath();
 CTX.moveTo(g.x,g.y);
 CTX.lineTo(g.x,g.y+g.h);
 CTX.lineTo(g.x+g.w,g.y+g.h);
 CTX.lineTo(g.x+g.w,g.y);
 CTX.stroke();
 var fillY=g.y+g.h-g.fillLine;
 CTX.setLineDash([5,5]);
 CTX.strokeStyle="rgba(0,242,254,0.5)";
 CTX.lineWidth=2;
 CTX.beginPath();
 CTX.moveTo(g.x+5,fillY);
 CTX.lineTo(g.x+g.w-5,fillY);
 CTX.stroke();
 CTX.setLineDash([]);
 CTX.fillStyle="rgba(0,50,80,0.2)";
 CTX.fillRect(g.x+2,g.y+2,g.w-4,g.h-4);
 var glassFill=countParticlesInGlass(lvl);
 var fillPct=Math.min(glassFill/(g.fillLine*1.2),1);
 if(fillPct>0){
  var waterGrd=CTX.createLinearGradient(g.x,g.y+g.h,g.x,g.y);
  waterGrd.addColorStop(0,"rgba(0,136,255,0.6)");
  waterGrd.addColorStop(1,"rgba(0,242,254,0.4)");
  CTX.fillStyle=waterGrd;
  var waterH=(g.h-6)*fillPct;
  CTX.fillRect(g.x+3,g.y+g.h-waterH-3,g.w-6,waterH);
 }
 CTX.restore();
}

function drawObstacles(lvl){
 if(!lvl.obstacles)return;
 lvl.obstacles.forEach(function(o){
  CTX.fillStyle="#2a2a3e";
  CTX.strokeStyle="#4a4a6e";
  CTX.lineWidth=2;
  CTX.fillRect(o.x,o.y,o.w,o.h);
  CTX.strokeRect(o.x,o.y,o.w,o.h);
 });
}

function drawMoving(){
 movingPlatforms.forEach(function(mp){
  var grd=CTX.createLinearGradient(mp.x,mp.y,mp.x+mp.w,mp.y);
  grd.addColorStop(0,"#5a5a8e");
  grd.addColorStop(.5,"#8a8abe");
  grd.addColorStop(1,"#5a5a8e");
  CTX.fillStyle=grd;
  CTX.fillRect(mp.x,mp.y,mp.w,mp.h);
  CTX.strokeStyle="#aaa";
  CTX.lineWidth=1;
  CTX.strokeRect(mp.x,mp.y,mp.w,mp.h);
 });
}

function drawBouncy(lvl){
 if(!lvl.bouncy)return;
 lvl.bouncy.forEach(function(b){
  CTX.save();
  var grd=CTX.createLinearGradient(b.x,b.y,b.x+b.w,b.y);
  grd.addColorStop(0,"#ff6b8a");
  grd.addColorStop(.5,"#ff8fa3");
  grd.addColorStop(1,"#ff6b8a");
  CTX.fillStyle=grd;
  CTX.shadowColor="rgba(255,107,138,0.6)";
  CTX.shadowBlur=10;
  CTX.fillRect(b.x,b.y,b.w,b.h);
  CTX.restore();
 });
}

function drawLines(){
 if(linesDrawn.length===0)return;
 linesDrawn.forEach(function(segGroup){
  if(segGroup.length===0)return;
  CTX.save();
  CTX.lineCap="round";
  CTX.lineJoin="round";
  for(var i=0;i<segGroup.length;i++){
   var s=segGroup[i];
   CTX.shadowColor="rgba(255,200,0,0.8)";
   CTX.shadowBlur=8;
   var grd=CTX.createLinearGradient(s.x1,s.y1,s.x2,s.y2);
   grd.addColorStop(0,"#ffd700");
   grd.addColorStop(1,"#ffaa00");
   CTX.strokeStyle=grd;
   CTX.lineWidth=6;
   CTX.beginPath();
   CTX.moveTo(s.x1,s.y1);
   CTX.lineTo(s.x2,s.y2);
   CTX.stroke();
  }
  CTX.restore();
 });
}

function drawParticles(){
 particles.forEach(function(p){
  if(!p.active)return;
  CTX.save();
  var grd=CTX.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
  grd.addColorStop(0,"rgba(0,242,254,0.9)");
  grd.addColorStop(.5,"rgba(0,136,255,0.7)");
  grd.addColorStop(1,"rgba(0,80,200,0.3)");
  CTX.fillStyle=grd;
  CTX.shadowColor="rgba(0,242,254,0.5)";
  CTX.shadowBlur=6;
  CTX.beginPath();
  CTX.arc(p.x,p.y,p.r,0,Math.PI*2);
  CTX.fill();
  CTX.restore();
 });
}

function drawHint(){
 if(!showingHint||hintPoints.length<2)return;
 CTX.save();
 CTX.strokeStyle="rgba(255,100,255,0.7)";
 CTX.lineWidth=4;
 CTX.setLineDash([10,8]);
 CTX.shadowColor="rgba(255,0,255,0.5)";
 CTX.shadowBlur=8;
 CTX.beginPath();
 for(var i=0;i<hintPoints.length;i++){
  var pt=hintPoints[i];
  if(i===0)CTX.moveTo(pt.x,pt.y);else CTX.lineTo(pt.x,pt.y);
 }
 CTX.stroke();
 CTX.setLineDash([]);
 var head=hintPoints[hintPoints.length-1];
 CTX.fillStyle="rgba(255,100,255,0.8)";
 CTX.beginPath();
 CTX.arc(head.x,head.y,10,0,Math.PI*2);
 CTX.fill();
 CTX.restore();
}

function drawTutorial(){
 if(currentLevel>2||tutorialStep===0)return;
 var texts=[
  "Draw lines to guide water into the glass!",
  "Tap PLAY to pour water. Less ink = more stars!",
  "Use hints if you get stuck. Good luck!"
 ];
 var idx=Math.min(tutorialStep-1,texts.length-1);
 var text=texts[idx];
 CTX.save();
 CTX.fillStyle="rgba(0,0,0,0.85)";
 CTX.strokeStyle="rgba(0,242,254,0.5)";
 CTX.lineWidth=2;
 var tw=CTX.measureText(text).width+40;
 var tx=GW/2-tw/2,ty=GH*.35;
 var th=60;
 roundRect(CTX,tx,ty,tw,th,12);
 CTX.fill();
 CTX.stroke();
 CTX.fillStyle="#fff";
 CTX.font="16px Nunito";
 CTX.textAlign="center";
 CTX.fillText(text,GW/2,ty+th/2+6);
 CTX.restore();
}

function roundRect(ctx,x,y,w,h,r){
 ctx.beginPath();
 ctx.moveTo(x+r,y);
 ctx.lineTo(x+w-r,y);
 ctx.quadraticCurveTo(x+w,y,x+w,y+r);
 ctx.lineTo(x+w,y+h-r);
 ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
 ctx.lineTo(x+r,y+h);
 ctx.quadraticCurveTo(x,y+h,x,y+h-r);
 ctx.lineTo(x,y+r);
 ctx.quadraticCurveTo(x,y,x+r,y);
 ctx.closePath();
}

function drawInkMeter(){
 var lvl=getLevel(currentLevel);
 var pct=Math.max(0,1-inkUsed/lvl.maxInk);
 var barX=GW/2-200,barY=10,barW=400,barH=14;
 CTX.save();
 CTX.fillStyle="rgba(0,0,0,0.5)";
 roundRect(CTX,barX-2,barY-2,barW+4,barH+4,8);
 CTX.fill();
 var grd=CTX.createLinearGradient(barX,0,barX+barW,0);
 grd.addColorStop(0,"#ffd700");
 grd.addColorStop(1,"#ff8800");
 CTX.fillStyle=grd;
 roundRect(CTX,barX,barY,barW*pct,barH,6);
 CTX.fill();
 CTX.strokeStyle="rgba(255,255,255,0.3)";
 CTX.lineWidth=1;
 roundRect(CTX,barX,barY,barW,barH,6);
 CTX.stroke();
 CTX.fillStyle="#fff";
 CTX.font="bold 11px Nunito";
 CTX.textAlign="center";
 CTX.fillText(Math.round(pct*100)+"% ink",GW/2,barY+barH+14);
 CTX.restore();
}

function drawLevelIndicator(){
 CTX.save();
 CTX.fillStyle="rgba(0,0,0,0.5)";
 roundRect(CTX,GW/2-60,GH-40,120,32,10);
 CTX.fill();
 CTX.fillStyle="#88ccff";
 CTX.font="bold 14px Nunito";
 CTX.textAlign="center";
 CTX.fillText("Level "+currentLevel,GW/2,GH-20);
 CTX.restore();
}

function renderGame(){
 drawBackground();
 var lvl=getLevel(currentLevel);
 drawObstacles(lvl);
 drawBouncy(lvl);
 drawMoving();
 drawGlass(lvl);
 drawLines();
 drawHint();
 drawFaucet(lvl);
 drawParticles();
 drawTutorial();
 if(gamePhase==="drawing"||gamePhase==="settling"||gamePhase==="pouring"){
  drawInkMeter();
  drawLevelIndicator();
 }
}

function renderMenu(){
 drawBackground();
 var ui=document.getElementById("ui");
 ui.innerHTML='<div class="glass-panel" style="padding:40px;max-width:400px;width:90%">'+
  '<div class="game-title">Fill Glass</div>'+
  '<div class="game-subtitle">Draw lines to guide water into the glass</div>'+
  '<div style="display:flex;flex-direction:column;gap:12px;margin-top:8px">'+
  '<button class="btn" id="btnPlay">Play</button>'+
  '<button class="btn btn-secondary" id="btnLevels">Level Select</button>'+
  '<button class="btn" id="btnSound" style="background:linear-gradient(135deg,#4facfe,#00f2fe);box-shadow:0 4px 20px rgba(0,242,254,0.4)">Sound: ON</button>'+
  '</div></div>';
 document.getElementById("btnPlay").onclick=function(){playSFX("click");startGame(1)};
 document.getElementById("btnLevels").onclick=function(){playSFX("click");showLevelSelect()};
 document.getElementById("btnSound").onclick=function(){toggleSound()};

}

function updateSoundBtn(){
 var btn=document.getElementById("btnSound");
 if(btn)btn.textContent="Sound: "+(audioEnabled?"ON":"OFF");
}

function showLevelSelect(){
 STATE="LEVEL_SELECT";
 var ui=document.getElementById("ui");
 var html='<button class="btn btn-sm back-btn" id="btnBack">Back</button>';
 html+='<div class="glass-panel" style="padding:20px;max-width:380px;width:95%;max-height:85vh;overflow-y:auto">';
 html+='<div class="game-title" style="font-size:28px;margin-bottom:16px">Level Select</div>';
 var tiers=[1,2,3,4,5];
 tiers.forEach(function(t){
  html+='<div class="tier-section">';
  html+='<div class="tier-title">Tier '+t+'</div>';
  html+='<div class="level-grid">';
  for(var i=0;i<6;i++){
   var lvlNum=(t-1)*6+i+1;
   if(lvlNum>30)break;
   var unlocked=lvlNum<=gamedata.unlocked;
   var stars=getStarsForLevel(lvlNum);
   var cls="level-btn "+(unlocked?"unlocked":"locked");
   if(lvlNum===gamedata.unlocked&&unlocked)cls+=" current";

   if(unlocked){
    var starStr='<span class="level-stars">'+(stars>=1?'&#9733;':'_')+(stars>=2?'&#9733;':'_')+(stars>=3?'&#9733;':'_')+'</span>';
    html+=starStr;
   }
   html+='</button>';
  }
  html+='</div></div>';
 });
 html+='</div>';
 ui.innerHTML=html;
 document.getElementById("btnBack").onclick=function(){playSFX("click");renderMenu();STATE="MENU"};
 document.querySelectorAll(".level-btn.unlocked").forEach(function(btn){
  btn.onclick=function(){
   var lvl=parseInt(btn.dataset.lvl);
   playSFX("click");
   startGame(lvl);
  };
 });
}

function startGame(lvlNum){
 currentLevel=lvlNum;
 STATE="PLAYING";
 resetLevel();
 gamePhase="drawing";
 renderGameUI();
}

function renderGameUI(){
 var ui=document.getElementById("ui");
 ui.innerHTML='<div class="top-bar" id="topBar" style="display:none">'+
  '<button class="hud-btn" id="btnUndo" title="Undo" style="min-width:44px;min-height:44px">&#8630;</button>'+
  '<div class="ink-bar"><div class="ink-fill" id="inkFill" style="width:100%"></div></div>'+
  '<span class="ink-label" id="inkLabel">100%</span>'+
  '<button class="hud-btn" id="btnHint" title="Hint" style="min-width:44px;min-height:44px">&#10067;</button>'+
  '</div>'+
  '<div class="game-hud" id="gameHud">'+

  '<button class="play-btn" id="btnPlay">&#9654;</button>'+

  '</div>'+
  '<button class="sound-btn" id="btnSoundGame">&#9834;</button>'+

 var topBar=document.getElementById("topBar");
 if(topBar)topBar.style.display="flex";

 };

  playSFX("click");
  showHint();
 };
 document.getElementById("btnPlay").onclick=function(){
  playSFX("click");
  if(gamePhase==="drawing"){
   gamePhase="pouring";
   document.getElementById("btnPlay").innerHTML="&#9646;&#9646;";
   pourTimer=0;
   if(tutorialStep>0&&tutorialStep<3)tutorialStep++;
  } else if(gamePhase==="pouring"){
   gamePhase="settling";
   document.getElementById("btnPlay").innerHTML="&#9654;";
  } else if(gamePhase==="settling"||gamePhase==="complete"||gamePhase==="failed"){
   resetLevel();
   gamePhase="drawing";
   document.getElementById("btnPlay").innerHTML="&#9654;";
  }
 };
 document.getElementById("btnPause").onclick=function(){
  playSFX("click");
  pauseMenu=true;
  document.getElementById("pauseOverlay").classList.add("active");
 };
 document.getElementById("btnMenu").onclick=function(){
  playSFX("click");
  showLevelSelect();
 };
 document.getElementById("btnResume").onclick=function(){
  playSFX("click");
  pauseMenu=false;
  document.getElementById("pauseOverlay").classList.remove("active");
 };
 document.getElementById("btnRetry").onclick=function(){
  playSFX("click");
  pauseMenu=false;
  document.getElementById("pauseOverlay").classList.remove("active");
  resetLevel();
  gamePhase="drawing";
 };
 document.getElementById("btnQuit").onclick=function(){
  playSFX("click");
  pauseMenu=false;
  document.getElementById("pauseOverlay").classList.remove("active");
  showLevelSelect();
 };
 document.getElementById("btnSoundGame").onclick=function(){toggleSound()};
 updateInkMeter();
 updateSoundBtn();
}

function updateInkMeter(){
 var lvl=getLevel(currentLevel);
 var pct=Math.max(0,1-inkUsed/lvl.maxInk)*100;
 var fill=document.getElementById("inkFill");
 var label=document.getElementById("inkLabel");
 if(fill)fill.style.width=pct+"%";
 if(label)label.textContent=Math.round(pct)+"%";
}

function showComplete(){
 var ui=document.getElementById("ui");
 var lvl=getLevel(currentLevel);
 var inkLen=calcInkLen();
 var stars=calcStars(inkLen,lvl.maxInk,lvl.stars);
 var isLast=currentLevel>=30;
 ui.innerHTML='<div class="glass-panel" style="padding:32px;max-width:360px;width:90%;text-align:center">'+
  '<div class="complete-title">'+(isLast?"Game Complete!":"Level Complete!")+'</div>'+
  '<div class="stars-display" id="starsDisplay">'+
  '<span class="star" id="s1">'+(stars>=1?'&#9733;':'&#9734;')+'</span>'+
  '<span class="star" id="s2">'+(stars>=2?'&#9733;':'&#9734;')+'</span>'+
  '<span class="star" id="s3">'+(stars>=3?'&#9733;':'&#9734;')+'</span>'+
  '</div>'+
  '<div class="stats-row">'+
  '<div class="stat"><div class="stat-val">'+Math.round(inkLen)+'</div><div class="stat-label">Ink Used</div></div>'+
  '<div class="stat"><div class="stat-val">'+lvl.maxInk+'</div><div class="stat-label">Max Ink</div></div>'+
  '<div class="stat"><div class="stat-val">'+Math.round((1-inkLen/lvl.maxInk)*100)+'%</div><div class="stat-label">Efficiency</div></div>'+
  '</div>'+
  '<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">'+
  '<button class="btn" id="btnNext">'+(isLast?"Play Again":"Next Level")+'</button>'+
  '<button class="btn btn-secondary" id="btnCompleteLevels">Level Select</button>'+
  '<button class="btn btn-hint" id="btnCompleteRetry" style="background:linear-gradient(135deg,#f093fb,#f5576c);box-shadow:0 4px 20px rgba(245,87,108,0.4)">Retry for Better</button>'+
  '</div></div>';
 if(stars>0){
  var el=document.getElementById("starsDisplay");
  el.classList.add("shake");
  setTimeout(function(){el.classList.remove("shake")},500);
 }
 document.getElementById("btnNext").onclick=function(){
  playSFX("click");
  if(isLast){currentLevel=1;resetLevel();renderGameUI();STATE="PLAYING"}
  else{startGame(currentLevel+1)}
 };
 document.getElementById("btnCompleteLevels").onclick=function(){
  playSFX("click");
  showLevelSelect();
 };
 document.getElementById("btnCompleteRetry").onclick=function(){
  playSFX("click");
  resetLevel();
  renderGameUI();
  STATE="PLAYING";
 };
}

function renderUI(){
 if(STATE==="MENU")renderMenu();
}

var gameLoop=function(ts){
 animId=requestAnimationFrame(gameLoop);
 var dt=Math.min((ts-lastTime)/1000,.05);
 lastTime=ts;
 if(STATE==="PLAYING"){
  if(!pauseMenu){
   updateGame(dt);
  }
  renderGame();
  if(gamePhase==="drawing")updateInkMeter();
  if(levelComplete&&gamePhase==="complete"){
   setTimeout(function(){
    if(STATE==="PLAYING"){showComplete();STATE="COMPLETE"}
   },1800);
   levelComplete=false;
  }
 } else if(STATE==="MENU"||STATE==="LEVEL_SELECT"){
  drawBackground();
 }
};

function cleanup(){
 if(RAF){cancelAnimationFrame(RAF);RAF=null}
 if(bgmNode){clearTimeout(bgmNode);bgmNode=null}
 if(bgmGain){try{bgmGain.disconnect()}catch(e){}bgmGain=null}
 if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null}
}

window.addEventListener("beforeunload",cleanup);

// Monetag interstitial disabled (R93 P0 fix: alwingulla zone 110122 zombie)
function showInterstitial(){}

function init(){
 loadSave();
 resize();
 window.addEventListener("resize",resize);
 // R199: re-resize after footer appears (game-footer.js loads after this script)
 var _fchk=setInterval(function(){
  var fe=document.getElementById('game-footer');
  if(fe&&fe.offsetHeight>0){resize();clearInterval(_fchk);}
 },1000);
 setTimeout(function(){clearInterval(_fchk);},20000);
 renderUI();
 lastTime=performance.now();
 RAF=requestAnimationFrame(gameLoop);
 startBGM();
}

init();
})();
