</filter>
</defs>
<rect width="512" height="512" fill="url(#bg)"/>
<g transform="translate(256,256)" filter="url(#glow)">
<circle cx="-60" cy="-40" r="25" fill="#ff6b6b"/>
<circle cx="60" cy="-40" r="25" fill="#4ecdc4"/>
<circle cx="0" cy="60" r="25" fill="#ffe66d"/>
<circle cx="0" cy="-10" r="20" fill="#a8e6cf"/>
<text x="0" y="5" text-anchor="middle" fill="white" font-size="16" font-family="Arial" font-weight="bold">⚛️</text>
</g>
</svg>