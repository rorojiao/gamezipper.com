function resize(){

var footerH=(footerEl&&footerEl.offsetHeight>0)?footerEl.offsetHeight:0;

// ============ AUDIO ============
function initAudio(){
if(audioCtx)return;
try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(musicOn)startBGM();}catch(e){}
}
function playTone(freq,dur,type,vol){
if(!audioCtx||!soundOn)return;
try{var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.value=Math.min(vol||0.15,0.3);
o.connect(g);g.connect(audioCtx.destination);var t=audioCtx.currentTime;o.start(t);
g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.stop(t+dur);}catch(e){}
}
function playBuzz(){
if(!audioCtx||!soundOn)return;
try{var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.type='sawtooth';o.frequency.value=150;g.gain.value=0.06;
o.connect(g);g.connect(audioCtx.destination);var t=audioCtx.currentTime;o.start(t);
o.frequency.linearRampToValueAtTime(200,t+0.1);o.frequency.linearRampToValueAtTime(150,t+0.2);
g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.stop(t+0.2);}catch(e){}
}
function playNoise(dur,vol){
if(!audioCtx||!soundOn)return;
try{var n=audioCtx.sampleRate*dur;var buf=audioCtx.createBuffer(1,n,audioCtx.sampleRate);var d=buf.getChannelData(0);
for(var i=0;i<n;i++){d[i]=(Math.random()*2-1)*0.5;}var s=audioCtx.createBufferSource();s.buffer=buf;
var g=audioCtx.createGain();g.gain.value=vol||0.08;var f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=2000;
s.connect(f);f.connect(g);g.connect(audioCtx.destination);var t=audioCtx.currentTime;s.start(t);
g.gain.exponentialRampToValueAtTime(0.001,t+dur);s.stop(t+dur);}catch(e){}
}
function startBGM(){
if(!audioCtx||bgmNodes.length)return;
try{var sr=audioCtx.sampleRate;var dur=16;var sz=sr*dur;var buf=audioCtx.createBuffer(2,sz,sr);
var L=buf.getChannelData(0);var R=buf.getChannelData(1);
var chords=[[261.63,329.63,392],[293.66,369.99,440],[329.63,415.30,493.88],[293.66,369.99,440]];
var cd=dur/chords.length;
for(var i=0;i<sz;i++){var t=i/sr;var ci=Math.min(Math.floor(t/cd),chords.length-1);var ch=chords[ci];var s=0;
for(var n=0;n<ch.length;n++){s+=Math.sin(2*Math.PI*ch[n]*t)*0.04;s+=Math.sin(2*Math.PI*ch[n]*2*t)*0.01;}
var fade=t%cd;var fi=Math.min(fade/0.5,1);var fo=Math.min((cd-fade)/0.5,1);s*=fi*fo;
var lfo=Math.sin(2*Math.PI*0.2*t)*0.1+1;s*=lfo*0.4;L[i]=s;R[i]=s*(0.95+Math.sin(2*Math.PI*0.15*t)*0.05);}
var src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
var f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=600;f.Q.value=1;
var g=audioCtx.createGain();g.gain.value=musicOn?0.25:0;
src.connect(f);f.connect(g);g.connect(audioCtx.destination);src.start();bgmNodes=[src,f,g];}catch(e){}
}
function stopBGM(){bgmNodes.forEach(function(n){try{n.stop();}catch(e){}});bgmNodes=[];}
function setBGMVol(v){if(bgmNodes[2])bgmNodes[2].gain.value=v;}

// ============ DRAWING ============
function getCanvasPos(e){
var r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};
}
function onPointerDown(e){
if(GS!=='playing'||!isDrawing)draw_start(e);
}
function draw_start(e){
var p=getCanvasPos(e);isDrawing=true;currentDraw=[p];
initAudio();
}
function onPointerMove(e){
if(!isDrawing||GS!=='playing')return;
var p=getCanvasPos(e);var last=currentDraw[currentDraw.length-1];
var dx=p.x-last.x;var dy=p.y-last.y;
if(dx*dx+dy*dy>25){currentDraw.push(p);inkUsed+=Math.sqrt(dx*dx+dy*dy);
updateInkBar();playTone(800+inkUsed%400,0.05,'sine',0.03);}
}
function onPointerUp(e){
if(!isDrawing)return;isDrawing=false;
if(currentDraw.length>=2&&inkUsed<=inkMax){drawnLines.push({pts:currentDraw.slice()});}
currentDraw=[];
}
function updateInkBar(){var pct=Math.max(0,(1-inkUsed/inkMax)*100);document.getElementById('ink-bar').style.width=pct+'%';}

function undoLine(){
if(drawnLines.length>0){var line=drawnLines.pop();
var len=0;for(var i=1;i<line.pts.length;i++){var dx=line.pts[i].x-line.pts[i-1].x;var dy=line.pts[i].y-line.pts[i-1].y;len+=Math.sqrt(dx*dx+dy*dy);}
inkUsed=Math.max(0,inkUsed-len);updateInkBar();playTone(300,0.1,'triangle',0.1);}
}

else if(h.type==='fire'){var dx=h.tx-h.sx;var dy=h.ty-h.sy;var d=Math.sqrt(dx*dx+dy*dy)||1;hz.vx=h.spd*dx/d;hz.vy=h.spd*dy/d;hz.r=14;}
else if(h.type==='water'){var dx=h.tx-h.sx;var dy=h.ty-h.sy;var d=Math.sqrt(dx*dx+dy*dy)||1;hz.vx=h.spd*dx/d;hz.vy=h.spd*dy/d;hz.r=10;}
else if(h.type==='rock'){hz.vx=0;hz.vy=h.vy||80;hz.r=h.r||15;hz.gravity=true;}
hazards.push(hz);});

// ============ PHYSICS ============
function pointToSegDist(px,py,ax,ay,bx,by){
var dx=bx-ax;var dy=by-ay;var len2=dx*dx+dy*dy;if(len2===0)return Math.sqrt((px-ax)*(px-ax)+(py-ay)*(py-ay));
var t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/len2));
var cx=ax+t*dx;var cy=ay+t*dy;var ex=px-cx;var ey=py-cy;return{d:Math.sqrt(ex*ex+ey*ey),nx:ex||0.01,ny:ey||0.01,cx:cx,cy:cy};
}
function circleLineCollide(cx,cy,cr,pts){
for(var i=1;i<pts.length;i++){var r=pointToSegDist(cx,cy,pts[i-1].x,pts[i-1].y,pts[i].x,pts[i].y);
if(r.d<cr){return{hit:true,nx:r.nx,ny:r.ny,cd:cr-r.d};}}return{hit:false};
}
function circleRectCollide(cx,cy,cr,rx,ry,rw,rh){
var nx=Math.max(rx,Math.min(cx,rx+rw));var ny=Math.max(ry,Math.min(cy,ry+rh));
var dx=cx-nx;var dy=cy-ny;return dx*dx+dy*dy<cr*cr;
}

// ============ UPDATE ============
function update(dt){
if(GS==='simulating'){
var slowMul=timeSlowActive?0.5:1;
if(timeSlowActive){timeSlowTimer-=dt;if(timeSlowTimer<=0){timeSlowActive=false;}}
simTimer+=dt*slowMul;document.getElementById('timer-fill').style.width=Math.min(100,(simTimer/simDuration)*100)+'%';
// move hazards
for(var i=0;i<hazards.length;i++){var h=hazards[i];if(!h.alive)continue;
h.t+=dt*slowMul;
if(h.gravity){h.vy+=300*dt*slowMul;h.y+=h.vy*dt*slowMul;}
else{h.x+=h.vx*dt*slowMul;h.y+=h.vy*dt*slowMul;}
// collide with drawn lines
for(var j=0;j<drawnLines.length;j++){var col=circleLineCollide(h.x,h.y,h.r,drawnLines[j].pts);
if(col.hit){if(h.gravity){h.vy=-Math.abs(h.vy)*0.3;h.y-=col.cd;}
else{var dot=h.vx*col.nx+h.vy*col.ny;if(dot<0){h.vx-=2*dot*col.nx*0.5;h.vy-=2*dot*col.ny*0.5;}
h.x+=col.nx*col.cd;h.y+=col.ny*col.cd;}
playNoise(0.05,0.04);spawnParticles(h.x,h.y,'#FFD700',3);}}
// collide with spikes
var lv=LEVELS[currentLevel];if(lv.spikes){for(var s=0;s<lv.spikes.length;s++){var sp=lv.spikes[s];
if(circleRectCollide(h.x,h.y,h.r,sp.x,sp.y,sp.w,sp.h)){h.alive=false;spawnParticles(h.x,h.y,'#FF4444',5);playTone(200,0.15,'sawtooth',0.08);}}}
// collide with doge
var ddx=h.x-dogeX;var ddy=h.y-dogeY;if(ddx*ddx+ddy*ddy<(h.r+18)*(h.r+18)){
dogeState='hit';dogeHitTimer=1;GS='lose';playTone(200,0.4,'sawtooth',0.15);spawnParticles(dogeX,dogeY,'#FF4444',15);
setTimeout(function(){showScreen('screen-lose');},800);return;}
// out of bounds check
if(h.x<-50||h.x>W+50||h.y>H+50||h.y<-100){h.alive=false;}
// panic state
var pdist=Math.sqrt(ddx*ddx+ddy*ddy);if(pdist<120&&dogeState==='idle'){dogeState='panic';}
if(pdist>200&&dogeState==='panic'){dogeState='idle';}
// win check
if(simTimer>=simDuration){dogeState='celebrate';GS='win';
var stars=1;if(inkUsed<inkMax*0.7)stars=2;if(inkUsed<inkMax*0.4)stars=3;
levelStars[currentLevel]=Math.max(stars,levelStars[currentLevel]||0);levelCompleted[currentLevel]=true;
saveSave();spawnParticles(dogeX,dogeY-20,'#FFD700',20);spawnParticles(dogeX,dogeY-20,'#FF8C00',15);
playTone(523,0.15,'sine',0.15);setTimeout(function(){playTone(659,0.15,'sine',0.15);},100);
setTimeout(function(){playTone(784,0.3,'sine',0.15);},200);
document.getElementById('timer-bar').style.display='none';
document.getElementById('win-stars').textContent='';var st='';for(var s=0;s<3;s++)st+=(s<stars?'\u2605':'\u2606')+' ';
document.getElementById('win-stars').textContent=st;
document.getElementById('win-sub').textContent='Ink used: '+Math.round(inkUsed)+'/'+inkMax;
document.getElementById('btn-next').style.display=currentLevel<29?'inline-block':'none';
setTimeout(function(){showScreen('screen-win');},600);return;}
// bee buzz
if(h.type==='bee'&&Math.random()<dt*5)playBuzz();
}
// particles
for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1);}
// doge hit animation
if(dogeState==='hit'){dogeHitTimer-=dt;if(dogeHitTimer<=0){dogeState='idle';}}
}
}

// ============ PARTICLES ============
function spawnParticles(x,y,color,count){
for(var i=0;i<count;i++){var a=Math.random()*Math.PI*2;var spd=60+Math.random()*120;
particles.push({x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-50,life:0.5+Math.random()*0.5,maxLife:0.5+Math.random()*0.5,color:color,size:3+Math.random()*4});}
}

// ============ RENDER ============
function render(){
ctx.clearRect(0,0,W,H);
// Background
var bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0d0d1f');bg.addColorStop(1,'#1a1a2e');
ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
// Grid pattern
ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;
for(var x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(var y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
if(GS==='playing'||GS==='simulating'||GS==='win'||GS==='lose'){var lv=LEVELS[currentLevel];
// Spikes
if(lv.spikes){lv.spikes.forEach(function(sp){ctx.fillStyle='#FF3344';ctx.beginPath();
var n=Math.floor(sp.w/10);for(var i=0;i<=n;i++){var px=sp.x+i*(sp.w/n);ctx.lineTo(px,sp.y);ctx.lineTo(px+sp.w/(n*2),sp.y-sp.h);}
ctx.lineTo(sp.x+sp.w,sp.y);ctx.closePath();ctx.fill();ctx.strokeStyle='#CC2233';ctx.lineWidth=1;ctx.stroke();});}
// Hint overlay
if(showingHint&&HINTS[currentLevel]){ctx.globalAlpha=0.3;HINTS[currentLevel].forEach(function(h){ctx.fillStyle='#00D4FF';
ctx.beginPath();ctx.roundRect(h.x,h.y,h.w,h.h,5);ctx.fill();});ctx.globalAlpha=1;}
// Drawn lines
drawnLines.forEach(function(line){drawPolyline(line.pts,'#FFD700',4,'rgba(255,140,0,0.6)');});
// Current drawing
if(currentDraw.length>=2){drawPolyline(currentDraw,'#FFAA00',3,'rgba(255,170,0,0.4)');}
// Hazards
hazards.forEach(function(h){if(!h.alive)return;ctx.save();
if(h.type==='bee'){drawBee(h.x,h.y,h.r);}
else if(h.type==='fire'){drawFire(h.x,h.y,h.r);}
else if(h.type==='water'){drawWater(h.x,h.y,h.r);}
else if(h.type==='rock'){drawRock(h.x,h.y,h.r);}
ctx.restore();});
// Doge
drawDoge(dogeX,dogeY);
// Particles
particles.forEach(function(p){var a=p.life/p.maxLife;ctx.globalAlpha=a;ctx.fillStyle=p.color;
ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
}
}

function drawPolyline(pts,color,width,shadow){
if(pts.length<2)return;
ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
for(var i=1;i<pts.length;i++){ctx.lineTo(pts[i].x,pts[i].y);}
ctx.strokeStyle=color;ctx.lineWidth=width;ctx.lineCap='round';ctx.lineJoin='round';
ctx.shadowColor=shadow;ctx.shadowBlur=8;ctx.stroke();ctx.shadowBlur=0;
}

function drawDoge(x,y){
var s=dogeState==='panic'?1+Math.sin(performance.now()*0.01)*0.05:1;
ctx.save();ctx.translate(x,y);ctx.scale(s,s);
// Body
ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fillStyle='#F5D76E';ctx.fill();
ctx.strokeStyle='#D4A017';ctx.lineWidth=2;ctx.stroke();
// Ears
ctx.beginPath();ctx.ellipse(-15,-15,8,14,-0.3,0,Math.PI*2);ctx.fillStyle='#E8C84A';ctx.fill();ctx.strokeStyle='#D4A017';ctx.lineWidth=1.5;ctx.stroke();
ctx.beginPath();ctx.ellipse(15,-15,8,14,0.3,0,Math.PI*2);ctx.fill();ctx.stroke();
// Eyes
if(dogeState==='hit'){ctx.strokeStyle='#FF4444';ctx.lineWidth=3;
ctx.beginPath();ctx.moveTo(-8,-6);ctx.lineTo(-3,-1);ctx.moveTo(-3,-6);ctx.lineTo(-8,-1);ctx.stroke();
ctx.beginPath();ctx.moveTo(3,-6);ctx.lineTo(8,-1);ctx.moveTo(8,-6);ctx.lineTo(3,-1);ctx.stroke();}
else{var eyeSize=dogeState==='panic'?5:4;ctx.fillStyle='#333';
ctx.beginPath();ctx.arc(-6,-5,eyeSize,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(6,-5,eyeSize,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-5,-6,2,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(7,-6,2,0,Math.PI*2);ctx.fill();}
// Mouth
if(dogeState==='celebrate'){ctx.beginPath();ctx.arc(0,5,6,0,Math.PI);ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();}
else if(dogeState==='panic'){ctx.beginPath();ctx.arc(0,8,4,Math.PI,0);ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();
ctx.fillStyle='#66BB6A';ctx.fillRect(-10,-22,20,3);}
else if(dogeState==='hit'){ctx.beginPath();ctx.arc(0,8,4,Math.PI,0);ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();}
else{ctx.beginPath();ctx.arc(0,5,4,0,Math.PI);ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();}
// Tongue (celebrate)
if(dogeState==='celebrate'){ctx.beginPath();ctx.ellipse(0,10,3,5,0,0,Math.PI);ctx.fillStyle='#FF8A80';ctx.fill();}
ctx.restore();
}

function drawBee(x,y,r){
ctx.save();ctx.translate(x,y);
// Wings
var wingFlap=Math.sin(performance.now()*0.02)*0.3;
ctx.fillStyle='rgba(200,220,255,0.5)';
ctx.beginPath();ctx.ellipse(-r*0.7,-r*0.5,r*0.6,r*0.4+wingFlap*r,-0.3,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(r*0.7,-r*0.5,r*0.6,r*0.4+wingFlap*r,0.3,0,Math.PI*2);ctx.fill();
// Body
ctx.beginPath();ctx.ellipse(0,0,r*0.7,r,0,0,Math.PI*2);ctx.fillStyle='#FFD700';ctx.fill();
// Stripes
ctx.fillStyle='#333';ctx.fillRect(-r*0.6,-r*0.15,r*1.2,r*0.2);ctx.fillRect(-r*0.6,r*0.25,r*1.2,r*0.2);
// Eyes
ctx.fillStyle='#333';ctx.beginPath();ctx.arc(-r*0.25,-r*0.4,2,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(r*0.25,-r*0.4,2,0,Math.PI*2);ctx.fill();
// Stinger
ctx.beginPath();ctx.moveTo(0,r);ctx.lineTo(0,r+5);ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();
ctx.restore();
}

function drawFire(x,y,r){
ctx.save();ctx.translate(x,y);
var t=performance.now()*0.005;
for(var i=3;i>=0;i--){var fr=r*(1+i*0.3);var ox=Math.sin(t+i)*2;ctx.fillStyle='rgba(255,'+(100+i*40)+',0,'+(0.3-i*0.06)+')';
ctx.beginPath();ctx.arc(ox,-i*3,fr,0,Math.PI*2);ctx.fill();}
ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(0,0,r*0.5,0,Math.PI*2);ctx.fill();
ctx.restore();
}

function drawWater(x,y,r){
ctx.save();ctx.translate(x,y);
var t=performance.now()*0.006;
for(var i=2;i>=0;i--){ctx.fillStyle='rgba(0,150,255,'+(0.3-i*0.08)+')';
ctx.beginPath();ctx.arc(Math.sin(t+i)*2,Math.cos(t*0.7+i)*2,r*(1+i*0.3),0,Math.PI*2);ctx.fill();}
ctx.fillStyle='#4FC3F7';ctx.beginPath();ctx.arc(0,0,r*0.5,0,Math.PI*2);ctx.fill();
ctx.restore();
}

function drawRock(x,y,r){
ctx.save();ctx.translate(x,y);
ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle='#8D6E63';ctx.fill();
ctx.strokeStyle='#5D4037';ctx.lineWidth=2;ctx.stroke();
// Highlight
ctx.beginPath();ctx.arc(-r*0.2,-r*0.2,r*0.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fill();
ctx.restore();
}

// ============ GAME LOOP ============
function loop(ts){
rafId=requestAnimationFrame(loop);
var dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
if(GS==='simulating')update(dt);
else if(GS==='win'||GS==='lose'){for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1);}}
render();
}

// ============ NAVIGATION ============
function retryLevel(){startLevel(currentLevel);}
function nextLevel(){if(currentLevel<29){currentChapter=Math.floor((currentLevel+1)/6);startLevel(currentLevel+1);}else{showLevelSelect();}}

// ============ CLEANUP ============
function cleanup(){
if(rafId){cancelAnimationFrame(rafId);rafId=null;}
timers.forEach(function(id){clearInterval(id);});timers=[];
if(audioCtx){audioCtx.close().catch(function(){});audioCtx=null;}
}

// ============ START ============
document.addEventListener('DOMContentLoaded',init);
</script>

</body>
</html>
