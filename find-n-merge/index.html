    {n:'Seed',e:'🌱'},{n:'Sprout',e:'🌿'},{n:'Flower',e:'🌸'},{n:'Bush',e:'🌳'},{n:'Tree',e:'🎄'}

  ]}
];

// Item ID = chainIdx * 5 + tier
function itemId(c,t){return c*5+t}
function itemChain(id){return Math.floor(id/5)}
function itemTier(id){return id%5}
function itemName(id){var c=CHAINS[itemChain(id)],t=itemTier(id);return c?c.items[t].n:'?';}
function itemEmoji(id){var c=CHAINS[itemChain(id)],t=itemTier(id);return c?c.items[t].e:'?';}
function chainColor(id){var c=CHAINS[itemChain(id)];return c?c.color:'#888';}
function mergeResult(id){var t=itemTier(id);if(t>=4)return -1;return id+1;}

   stars:[35,60,100]},

  // Level 6-10: 3-step merges, more objects

   find:[itemId(0,0),4],merge:[itemId(0,2),1],

// ====== AUDIO ENGINE ======
var audioCtx = null;
var masterGain = null;
var soundOn = true;
var bgmNodes = [];

function initAudio(){
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
  }catch(e){}
}

function ensureAudio(){
  if(!audioCtx) initAudio();
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
}

function playTone(freq,dur,type,vol){
  if(!audioCtx||!soundOn) return;
  try{
    var o=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    o.type=type||'sine';
    o.frequency.value=freq;
    g.gain.value=Math.min(vol||0.15,0.3);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(masterGain);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

var bgmPlaying = false;
function startBGM(){
  if(!audioCtx||!soundOn||bgmPlaying) return;
  bgmPlaying = true;
  playBGMLoop();
}
function stopBGM(){
  bgmPlaying = false;
  bgmNodes.forEach(function(n){try{n.stop();}catch(e){}});
  bgmNodes = [];
}
function playBGMLoop(){
  if(!bgmPlaying||!audioCtx||!soundOn) return;
  try{
    var now = audioCtx.currentTime;
    // Ambient pad
    var o1=audioCtx.createOscillator();var g1=audioCtx.createGain();
    o1.type='sine';o1.frequency.value=130.81;g1.gain.value=0.04;
    g1.gain.linearRampToValueAtTime(0.06,now+2);
    g1.gain.linearRampToValueAtTime(0.03,now+7);
    g1.gain.linearRampToValueAtTime(0.001,now+8);
    o1.connect(g1);g1.connect(masterGain);o1.start(now);o1.stop(now+8);
    bgmNodes.push(o1);

    var o2=audioCtx.createOscillator();var g2=audioCtx.createGain();
    o2.type='sine';o2.frequency.value=196;g2.gain.value=0.03;
    g2.gain.linearRampToValueAtTime(0.05,now+3);
    g2.gain.linearRampToValueAtTime(0.02,now+7.5);
    g2.gain.linearRampToValueAtTime(0.001,now+8);
    o2.connect(g2);g2.connect(masterGain);o2.start(now+1);o2.stop(now+9);
    bgmNodes.push(o2);

    var o3=audioCtx.createOscillator();var g3=audioCtx.createGain();
    o3.type='triangle';o3.frequency.value=261.63;g3.gain.value=0.02;
    g3.gain.linearRampToValueAtTime(0.04,now+4);
    g3.gain.linearRampToValueAtTime(0.001,now+8);
    o3.connect(g3);g3.connect(masterGain);o3.start(now+2);o3.stop(now+10);
    bgmNodes.push(o3);

    setTimeout(function(){if(bgmPlaying)playBGMLoop();},7500);
  }catch(e){}
}

// ====== PARTICLE SYSTEM ======
var particles = [];
function spawnParticles(x,y,color,count,spread,life){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var s=Math.random()*spread+spread*0.3;
    particles.push({
      x:x,y:y,vx:Math.cos(a)*s*60,vy:Math.sin(a)*s*60,
      life:life||1,maxLife:life||1,
      color:color,size:Math.random()*4+2
    });
  }
}
function updateParticles(dt){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=120*dt; // gravity
    p.vx*=0.98;p.vy*=0.98;
    p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(ctx){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var alpha=Math.max(0,p.life/p.maxLife);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ====== SCENE GENERATION ======
function generateScene(lvlIdx){
  var lvl = LEVEL_DATA[lvlIdx];
  var theme = THEMES[Math.floor(lvlIdx/5)];
  sceneObjects = [];
  bgDecorations = [];

  // Generate background decorations
  var decorCount = 8 + lvl.extra;
  for(var i=0;i<decorCount;i++){
    var dr = Math.random()*0.4+0.3;
    bgDecorations.push({
      x:Math.random(), y:Math.random(),
      size:Math.random()*30+15,
      color:theme.decor,
      alpha:Math.random()*0.15+0.05,
      rotation:Math.random()*Math.PI*2,
      shape:Math.floor(Math.random()*3) // 0=circle,1=rect,2=diamond
    });
  }

  // Place target and distractor scene items
  var items = [];
  for(var i=0;i<lvl.scene.length;i++){
    var s = lvl.scene[i];
    items.push({chain:s[0],tier:s[1],isTarget:!!s[2]});
  }
  // Add extra distractors from random chains
  for(var i=0;i<(lvl.extra||0);i++){
    var rc=Math.floor(Math.random()*8);
    var rt=Math.floor(Math.random()*3);
    items.push({chain:rc,tier:rt,isTarget:false});
  }

  // Shuffle and place
  shuffle(items);
  var margin = 0.08;
  var placed = [];
  for(var i=0;i<items.length;i++){
    var it = items[i];
    var size = 28 + Math.random()*16;
    var x,y,tries=0,ok=false;
    while(tries<50 && !ok){
      x = margin + Math.random()*(1-margin*2);
      y = margin + Math.random()*(1-margin*2);
      ok = true;
      for(var j=0;j<placed.length;j++){
        var dx=x-placed[j].x, dy=y-placed[j].y;
        if(Math.sqrt(dx*dx+dy*dy)<0.09){ok=false;break;}
      }
      tries++;
    }
    var obj = {
      x:x, y:y, size:size,
      id: itemId(it.chain,it.tier),
      isTarget: it.isTarget,
      found: false,
      rotation: (Math.random()-0.5)*0.4,
      alpha: it.isTarget ? 0.85 : 0.6,
      pulse: 0,
      hintGlow: 0
    };
    placed.push(obj);
    sceneObjects.push(obj);
  }
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[t]=i];
  }
}

function startLevel(lvlIdx){
  ensureAudio();
  currentLevel = lvlIdx;
  var lvl = LEVEL_DATA[lvlIdx];
  timeLeft = lvl.time;
  maxEnergy = lvl.maxNrg;
  energy = lvl.maxNrg;
  energyCost = lvl.cost;
  hintsLeft = lvl.hints;
  score = 0;
  comboCount = 0;
  lastFindTime = 0;
  hintTarget = null;
  hintTimer = 0;
  particles = [];
  flyAnims = [];
  shakeAnims = [];
  mergeFlash = null;

  // Parse find goals
  findGoals = [];
  for(var i=0;i<lvl.find.length;i+=2){
    findGoals.push({id:lvl.find[i],need:lvl.find[i+1],found:0});
  }

  // Parse merge goals
  mergeGoals = [];
  for(var i=0;i<lvl.merge.length;i+=2){
    mergeGoals.push({id:lvl.merge[i],need:lvl.merge[i+1],done:0});
  }

  // Init inventory
  inventory = new Array(INV_SLOTS).fill(-1);

  // Generate scene
  generateScene(lvlIdx);
  recalcLayout();

  // Show game UI
  showScreen('game');
  document.getElementById('hud').style.display='flex';
  document.getElementById('target-panel').style.display='flex';
  document.getElementById('inv-bar').style.display='flex';
  document.getElementById('hud-lvl').textContent = lvlIdx+1;
  updateHUD();
  updateTargetPanel();
  updateInventory();

  // Tutorial for first 3 levels
  if(lvlIdx < 3 && !save.levels[lvlIdx]){
    tutorialActive = true;
    tutorialStep = 0;
    showTutorial(lvlIdx);
  } else {
    tutorialActive = false;
    hideTutorial();
  }

  gameActive = true;
  startBGM();
}

function showScreen(name){
  var screens = ['s-menu','s-levels','s-settings','s-complete'];
  screens.forEach(function(s){
    document.getElementById(s).classList.toggle('hidden', s!=='s-'+name);
  });
  if(name!=='game'){
    document.getElementById('hud').style.display='none';
    document.getElementById('target-panel').style.display='none';
    document.getElementById('inv-bar').style.display='none';
    document.getElementById('s-'+name).classList.remove('hidden');
  }
}

function updateHUD(){
  document.getElementById('hud-time').textContent = formatTime(timeLeft);
  document.getElementById('energy-bar').style.width = (energy/maxEnergy*100)+'%';
  document.getElementById('hud-score').textContent = score;
  document.getElementById('btn-hint').textContent = 'Hint ('+hintsLeft+')';
  document.getElementById('btn-hint').disabled = hintsLeft <= 0;

  // Time color
  var timeEl = document.getElementById('hud-time');
  if(timeLeft < 20) timeEl.style.color='#ff6b6b';
  else if(timeLeft < 40) timeEl.style.color='#ffd700';
  else timeEl.style.color='#00ffaa';
}

function formatTime(s){
  var m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

  var fl = document.getElementById('find-list');

    var done = g.found >= g.need;
    var div = document.createElement('div');
    div.className = 'tp-item'+(done?' done':'');
    div.innerHTML = '<span class="emoji">'+itemEmoji(g.id)+'</span><span>'+itemName(g.id)+'</span><span class="cnt">'+Math.min(g.found,g.need)+'/'+g.need+'</span>';
    fl.appendChild(div);
  });

  var ml = document.getElementById('merge-list');
  ml.innerHTML = '';
  mergeGoals.forEach(function(g){
    var done = g.done >= g.need;
    var div = document.createElement('div');
    div.className = 'tp-item'+(done?' done':'');
    div.innerHTML = '<span class="emoji">'+itemEmoji(g.id)+'</span><span>'+itemName(g.id)+'</span><span class="cnt">'+Math.min(g.done,g.need)+'/'+g.need+'</span>';
    ml.appendChild(div);
  });
}

function updateInventory(){
  var bar = document.getElementById('inv-bar');
  bar.innerHTML = '';
  for(var i=0;i<INV_SLOTS;i++){
    var slot = document.createElement('div');
    slot.className = 'inv-slot'+(inventory[i]>=0?' has-item':'');
    slot.dataset.idx = i;
    if(inventory[i]>=0){
      slot.innerHTML = itemEmoji(inventory[i])+'<div class="item-name">'+itemName(inventory[i])+'</div>';
      slot.style.borderColor = chainColor(inventory[i]);
    }
    // Pointer events for drag
    (function(idx){
      slot.addEventListener('pointerdown',function(e){onInvPointerDown(e,idx);});
    })(i);
    bar.appendChild(slot);
  }
}

// ====== SCENE TAP HANDLING ======
function onSceneTap(sx,sy){
  if(!gameActive) return;
  ensureAudio();

  // Convert to scene-relative coords
  var rx = (sx - sceneRect.x) / sceneRect.w;
  var ry = (sy - sceneRect.y) / sceneRect.h;

  // Check if tap is within scene
  if(rx<0||rx>1||ry<0||ry>1) return;

  // Check if energy available
  if(energy < energyCost){
    sfxWrong();
    return;
  }

  // Find closest object within tap radius
  var bestDist = 0.06;
  var bestObj = null;
  var bestIdx = -1;
  for(var i=sceneObjects.length-1;i>=0;i--){
    var obj = sceneObjects[i];
    if(obj.found) continue;
    var dx = rx - obj.x, dy = ry - obj.y;
    var dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < bestDist){
      bestDist = dist;
      bestObj = obj;
      bestIdx = i;
    }
  }

  if(!bestObj){
    sfxWrong();
    energy = Math.max(0, energy - energyCost);
    updateHUD();
    return;
  }

  energy = Math.max(0, energy - energyCost);

  // Check if it's a target we still need
  var goalMatch = null;
  if(bestObj.isTarget){
    for(var i=0;i<findGoals.length;i++){
      var g = findGoals[i];
      if(g.id === bestObj.id && g.found < g.need){
        goalMatch = g;
        break;
      }
    }
  }

  if(goalMatch){
    // Correct find!
    bestObj.found = true;
    goalMatch.found++;
    sfxFind();

    // Combo
    var now = performance.now()/1000;
    if(now - lastFindTime < COMBO_WINDOW){
      comboCount++;
      score += 50 * comboCount;
    } else {
      comboCount = 1;
      score += 50;
    }
    lastFindTime = now;

    // Add to inventory
    var added = false;
    for(var i=0;i<INV_SLOTS;i++){
      if(inventory[i]<0){
        inventory[i] = bestObj.id;
        added = true;
        break;
      }
    }

    // Particle effect at scene position
    var px = sceneRect.x + bestObj.x * sceneRect.w;
    var py = sceneRect.y + bestObj.y * sceneRect.h;
    spawnParticles(px, py, chainColor(bestObj.id), 12, 1.5, 0.8);

    // Fly animation from scene to inventory slot
    if(added){
      var slots = document.querySelectorAll('.inv-slot');
      var slotIdx = -1;
      for(var i=0;i<INV_SLOTS;i++){
        if(inventory[i]===bestObj.id){slotIdx=i;break;}
      }
      if(slotIdx>=0 && slots[slotIdx]){
        var sr = slots[slotIdx].getBoundingClientRect();
        flyAnims.push({
          x:px, y:py, tx:sr.left+sr.width/2, ty:sr.top+sr.height/2,
          id:bestObj.id, t:0, dur:0.4, cb:function(){
            updateInventory();
            updateTargetPanel();
            checkMergeGoals();
          }
        });
      }
    }

    updateHUD();
    updateTargetPanel();
    updateInventory();

    // Tutorial step
    if(tutorialActive && currentLevel === 0 && tutorialStep === 0){
      tutorialStep = 1;
      showTutorial(0);
    }
  } else {
    // Wrong tap or distractor
    sfxWrong();
    shakeAnims.push({idx:bestIdx, t:0, dur:0.3});
    updateHUD();
  }
}

// ====== INVENTORY DRAG & MERGE ======
var dragActive = false;
var dragItem = -1;
var dragFromSlot = -1;

function onInvPointerDown(e, idx){
  if(!gameActive || inventory[idx] < 0) return;
  ensureAudio();
  e.preventDefault();
  dragActive = true;
  dragFromSlot = idx;
  dragItem = inventory[idx];

  var ghost = document.getElementById('drag-ghost');
  ghost.textContent = itemEmoji(dragItem);
  ghost.style.display = 'block';
  ghost.style.left = e.clientX + 'px';
  ghost.style.top = e.clientY + 'px';

  // Clear the slot visually
  inventory[idx] = -1;
  updateInventory();

  var onMove = function(ev){
    ev.preventDefault();
    ghost.style.left = ev.clientX + 'px';
    ghost.style.top = ev.clientY + 'px';
    // Highlight slot under cursor
    var slots = document.querySelectorAll('.inv-slot');
    slots.forEach(function(s){s.classList.remove('drag-over');});
    var target = getSlotAt(ev.clientX, ev.clientY);
    if(target >= 0 && target !== dragFromSlot){
      slots[target].classList.add('drag-over');
    }
  };

  var onUp = function(ev){
    ev.preventDefault();
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    ghost.style.display = 'none';

    var slots = document.querySelectorAll('.inv-slot');
    slots.forEach(function(s){s.classList.remove('drag-over');});

    var targetSlot = getSlotAt(ev.clientX, ev.clientY);

    if(targetSlot >= 0 && targetSlot !== dragFromSlot){
      var targetItem = inventory[targetSlot];
      if(targetItem === dragItem){
        // MERGE!
        var result = mergeResult(dragItem);
        if(result >= 0){
          inventory[targetSlot] = result;
          sfxMerge();
          score += 100 + itemTier(result) * 50;

          // Merge flash effect
          var sr = slots[targetSlot].getBoundingClientRect();
          spawnParticles(sr.left+sr.width/2, sr.top+sr.height/2, chainColor(result), 20, 2, 1);
          mergeFlash = {x:sr.left+sr.width/2, y:sr.top+sr.height/2, t:0, dur:0.5, color:chainColor(result)};

          updateHUD();
          updateInventory();
          updateTargetPanel();
          checkMergeGoals();

          // Tutorial
          if(tutorialActive && currentLevel === 0 && tutorialStep === 1){
            tutorialStep = 2;
            showTutorial(0);
          }
          if(tutorialActive && currentLevel === 1 && tutorialStep === 0){
            tutorialStep = 1;
            showTutorial(1);
          }
        } else {
          // Already max tier, can't merge further
          inventory[targetSlot] = dragItem;
          // Put original back
          inventory[dragFromSlot] = targetItem >= 0 ? targetItem : -1;
          inventory[targetSlot] = dragItem;
          // Actually, both are same max-tier item, put one back
          inventory[dragFromSlot] = dragItem;
          updateInventory();
        }
      } else if(targetItem < 0){
        // Move to empty slot
        inventory[targetSlot] = dragItem;
        updateInventory();
      } else {
        // Different items - swap
        inventory[targetSlot] = dragItem;
        inventory[dragFromSlot] = targetItem;
        updateInventory();
      }
    } else {
      // Drop back to original slot
      inventory[dragFromSlot] = dragItem;
      updateInventory();
    }

    dragActive = false;
    dragItem = -1;
    dragFromSlot = -1;
  };

  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

function getSlotAt(x,y){
  var slots = document.querySelectorAll('.inv-slot');
  for(var i=0;i<slots.length;i++){
    var r = slots[i].getBoundingClientRect();
    if(x>=r.left && x<=r.right && y>=r.top && y<=r.bottom) return i;
  }
  return -1;
}

function checkMergeGoals(){
  var allDone = true;
  for(var i=0;i<mergeGoals.length;i++){
    var g = mergeGoals[i];
    var count = 0;
    for(var j=0;j<INV_SLOTS;j++){
      if(inventory[j]===g.id) count++;
    }
    g.done = Math.min(count, g.need);
    if(count < g.need) allDone = false;
  }
  updateTargetPanel();

  // Also check if all find goals are done
  var allFound = true;
  for(var i=0;i<findGoals.length;i++){
    if(findGoals[i].found < findGoals[i].need) allFound = false;
  }

  if(allDone && allFound){
    levelComplete();
  }
}

// ====== HINT SYSTEM ======
function useHint(){
  if(!gameActive || hintsLeft <= 0) return;
  ensureAudio();

  // Find an unfound target
  var targets = [];
  for(var i=0;i<sceneObjects.length;i++){
    var obj = sceneObjects[i];
    if(obj.found || !obj.isTarget) continue;
    // Check if this target is still needed
    for(var j=0;j<findGoals.length;j++){
      if(findGoals[j].id === obj.id && findGoals[j].found < findGoals[j].need){
        targets.push(i);
        break;
      }
    }
  }
  if(targets.length === 0) return;

  hintsLeft--;
  var idx = targets[Math.floor(Math.random()*targets.length)];
  hintTarget = idx;
  hintTimer = 3;
  sfxHint();
  updateHUD();
}

// ====== TUTORIAL ======
function showTutorial(lvl){
  var tip = document.getElementById('tutorial-tip');
  var msg = '';
  var x = '50%', y = '50%';

  if(lvl === 0){
    if(tutorialStep === 0){
      msg = 'Tap on items in the scene that match your target list! Each tap costs energy.';
      x = '20%'; y = '40%';
    } else if(tutorialStep === 1){
      msg = 'Great find! Now drag matching items in the inventory bar onto each other to merge them!';
      x = '50%'; y = '75%';
    } else if(tutorialStep === 2){
      msg = 'Merge complete! Create all required items to finish the level.';
      x = '50%'; y = '40%';
    }
  } else if(lvl === 1){
    if(tutorialStep === 0){
      msg = 'New chains available! Look for shards and sticks in the scene.';
      x = '50%'; y = '40%';
    } else {
      msg = 'Keep merging to complete your goals!';
      tip.classList.remove('show');
      return;
    }
  } else if(lvl === 2){
    msg = 'Three chains at once! Manage your inventory space wisely. Merge items to free up slots.';
    x = '50%'; y = '40%';
  }

  tip.textContent = msg;
  tip.style.left = x;
  tip.style.top = y;
  tip.classList.add('show');

  // Auto-advance after a few seconds for some steps
  if(lvl === 2 || (lvl === 1 && tutorialStep === 0)){
    setTimeout(function(){
      tip.classList.remove('show');
      tutorialActive = false;
    }, 4000);
  }
}

function hideTutorial(){
  document.getElementById('tutorial-tip').classList.remove('show');
}

// ====== LEVEL COMPLETE ======
function levelComplete(){
  gameActive = false;
  stopBGM();
  sfxComplete();

  var lvl = LEVEL_DATA[currentLevel];
  var elapsed = lvl.time - timeLeft;

  // Calculate stars
  var stars = 1;
  if(elapsed <= lvl.stars[0]) stars = 3;
  else if(elapsed <= lvl.stars[1]) stars = 2;

  // Bonus score for remaining time and energy
  score += Math.floor(timeLeft * 5);
  score += Math.floor(energy * 2);
  score += stars * 200;

  // Save
  if(!save.levels[currentLevel] || save.levels[currentLevel].stars < stars){
    save.levels[currentLevel] = {stars:stars, score:score};
  }
  writeSave(save);

  // Show complete screen
  showScreen('complete');
  document.getElementById('hud').style.display='none';
  document.getElementById('target-panel').style.display='none';
  document.getElementById('inv-bar').style.display='none';

  // Stars animation
  var starsEl = document.getElementById('complete-stars');
  starsEl.innerHTML = '';
  for(var i=0;i<3;i++){
    var span = document.createElement('span');
    span.className = 'star-anim' + (i<stars?' star-on':' star-off');
    span.textContent = i<stars?'★':'☆';
    span.style.animationDelay = (i*0.2)+'s';
    starsEl.appendChild(span);
  }

  document.getElementById('complete-score').textContent = score;

  // Next level button
  var nextBtn = document.getElementById('btn-next');
  if(currentLevel >= LEVEL_DATA.length - 1){
    nextBtn.textContent = 'All Levels Complete!';
    nextBtn.disabled = true;
  } else {
    nextBtn.textContent = 'Next Level';
    nextBtn.disabled = false;
  }

  // Dispatch event for footer
  try{document.dispatchEvent(new CustomEvent('level-complete'));}catch(e){}
}

// ====== LEVEL SELECT ======
function buildLevelGrid(){
  var grid = document.getElementById('lvl-grid');
  grid.innerHTML = '';
  var totalStars = 0;
  for(var i=0;i<LEVEL_DATA.length;i++){
    var btn = document.createElement('button');
    var unlocked = i === 0 || (save.levels[i-1] && save.levels[i-1].stars > 0);
    btn.className = 'lvl-btn' + (unlocked?'':' locked');
    var starsHtml = '<div class="stars-row">';
    var earned = save.levels[i] ? save.levels[i].stars : 0;
    totalStars += earned;
    for(var s=0;s<3;s++){
      starsHtml += '<span class="'+(s<earned?'star-on':'star-off')+'">★</span>';
    }
    starsHtml += '</div>';
    btn.innerHTML = '<span>'+(i+1)+'</span>'+starsHtml;
    btn.title = LEVEL_DATA[i].name + (unlocked?'':' (Locked)');
    if(unlocked){
      (function(idx){
        btn.addEventListener('click',function(){startLevel(idx);});
      })(i);
    }
    grid.appendChild(btn);
  }
  document.getElementById('total-stars').textContent = '★ '+totalStars+'/'+(LEVEL_DATA.length*3);
}

// ====== RENDERING ======
function render(){
  ctx.clearRect(0,0,W,H);

  if(gameState === 'menu' || gameState === 'levels' || gameState === 'settings' || gameState === 'complete'){
    renderMenuBG();
  }

  if(gameActive){
    renderScene();
  }

  // Fly animations
  for(var i=flyAnims.length-1;i>=0;i--){
    var f = flyAnims[i];
    f.t += 1/60;
    var p = Math.min(1, f.t/f.dur);
    var ep = 1 - Math.pow(1-p, 3); // ease out cubic
    var cx = f.x + (f.tx - f.x) * ep;
    var cy = f.y + (f.ty - f.y) * ep;
    ctx.globalAlpha = 1 - p*0.3;
    ctx.font = '28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(itemEmoji(f.id), cx, cy);
    ctx.globalAlpha = 1;
    if(p >= 1){
      if(f.cb) f.cb();
      flyAnims.splice(i,1);
    }
  }

  drawParticles(ctx);
}

function renderMenuBG(){
  // Animated gradient background
  var grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0a1a');
  grad.addColorStop(0.5,'#1a1a3e');
  grad.addColorStop(1,'#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Floating particles
  var t = Date.now()/1000;
  ctx.globalAlpha = 0.15;
  for(var i=0;i<20;i++){
    var x = (Math.sin(t*0.3+i*1.7)*0.4+0.5)*W;
    var y = (Math.cos(t*0.2+i*2.3)*0.4+0.5)*H;
    var s = Math.sin(t+i)*10+15;
    ctx.fillStyle = ['#00ffaa','#ffd700','#ff6b6b','#4ecdc4'][i%4];
    ctx.beginPath();
    ctx.arc(x,y,s,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function renderScene(){
  var sr = sceneRect;
  var theme = THEMES[Math.floor(currentLevel/5)];

  // Scene background
  var grad = ctx.createLinearGradient(sr.x,sr.y,sr.x,sr.y+sr.h);
  grad.addColorStop(0, theme.bg1);
  grad.addColorStop(1, theme.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(sr.x, sr.y, sr.w, sr.h);

  // Background decorations
  bgDecorations.forEach(function(d){
    var dx = sr.x + d.x * sr.w;
    var dy = sr.y + d.y * sr.h;
    ctx.globalAlpha = d.alpha;
    ctx.fillStyle = d.color;
    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(d.rotation);
    if(d.shape === 0){
      ctx.beginPath();
      ctx.arc(0,0,d.size,0,Math.PI*2);
      ctx.fill();
    } else if(d.shape === 1){
      ctx.fillRect(-d.size,-d.size*0.6,d.size*2,d.size*1.2);
    } else {
      ctx.beginPath();
      ctx.moveTo(0,-d.size);
      ctx.lineTo(d.size,0);
      ctx.lineTo(0,d.size);
      ctx.lineTo(-d.size,0);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  });
  ctx.globalAlpha = 1;

  // Scene objects
  for(var i=0;i<sceneObjects.length;i++){
    var obj = sceneObjects[i];
    if(obj.found) continue;

    var ox = sr.x + obj.x * sr.w;
    var oy = sr.y + obj.y * sr.h;
    var sz = obj.size;

    // Shake animation
    var shakeX = 0;
    for(var s=0;s<shakeAnims.length;s++){
      if(shakeAnims[s].idx === i){
        var sp = shakeAnims[s].t / shakeAnims[s].dur;
        shakeX = Math.sin(sp * Math.PI * 6) * 8 * (1-sp);
      }
    }

    ctx.save();
    ctx.translate(ox + shakeX, oy);
    ctx.rotate(obj.rotation);

    // Shadow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    roundRect(ctx, -sz*0.5+2, -sz*0.5+2, sz, sz, 8);
    ctx.fill();

    // Background
    ctx.globalAlpha = obj.alpha;
    var col = chainColor(obj.id);
    ctx.fillStyle = col;
    roundRect(ctx, -sz*0.5, -sz*0.5, sz, sz, 8);
    ctx.fill();

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, -sz*0.5, -sz*0.5, sz, sz, 8);
    ctx.stroke();

    // Emoji
    ctx.globalAlpha = 1;
    ctx.font = Math.floor(sz*0.6)+'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(itemEmoji(obj.id), 0, 0);

    // Hint glow
    if(hintTarget === i && hintTimer > 0){
      ctx.globalAlpha = Math.min(1, hintTimer) * 0.5 * (0.5 + Math.sin(Date.now()/200)*0.5);
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 3;
      roundRect(ctx, -sz*0.5-4, -sz*0.5-4, sz+8, sz+8, 10);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  // Merge flash effect
  if(mergeFlash){
    var mf = mergeFlash;
    ctx.globalAlpha = Math.max(0, 1 - mf.t/mf.dur);
    var fr = 30 + mf.t/mf.dur * 60;
    ctx.strokeStyle = mf.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(mf.x, mf.y, fr, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ====== MAIN LOOP ======
function gameLoop(timestamp){
  if(!lastTime) lastTime = timestamp;
  var dt = Math.min((timestamp - lastTime)/1000, 0.1);
  lastTime = timestamp;

  if(gameActive){
    // Timer
    timeLeft -= dt;
    if(timeLeft <= 0){
      timeLeft = 0;
      gameActive = false;
      stopBGM();
      sfxWrong();
      // Level failed - allow retry
      showScreen('complete');
      document.getElementById('hud').style.display='none';
      document.getElementById('target-panel').style.display='none';
      document.getElementById('inv-bar').style.display='none';
      document.getElementById('s-complete').querySelector('div > div:first-child').textContent = 'Time\'s Up!';
      var starsEl = document.getElementById('complete-stars');
      starsEl.innerHTML = '<span class="star-off" style="font-size:48px">☆ ☆ ☆</span>';
      document.getElementById('complete-score').textContent = score;
      document.getElementById('btn-next').textContent = 'Retry';
      document.getElementById('btn-next').disabled = false;
      document.getElementById('btn-next').onclick = function(){
        this.onclick = null;
        startLevel(currentLevel);
      };
      try{document.dispatchEvent(new CustomEvent('level-fail'));}catch(e){}
    }

    // Energy regen
    if(energy < maxEnergy){
      energy = Math.min(maxEnergy, energy + ENERGY_REGEN * dt);
    }

    // Hint timer
    if(hintTimer > 0){
      hintTimer -= dt;
      if(hintTimer <= 0){
        hintTarget = null;
      }
    }

    // Update shake animations
    for(var i=shakeAnims.length-1;i>=0;i--){
      shakeAnims[i].t += dt;
      if(shakeAnims[i].t >= shakeAnims[i].dur) shakeAnims.splice(i,1);
    }

    // Update merge flash
    if(mergeFlash){
      mergeFlash.t += dt;
      if(mergeFlash.t >= mergeFlash.dur) mergeFlash = null;
    }

    updateHUD();
  }

  updateParticles(dt);
  render();

  rafId = requestAnimationFrame(gameLoop);
}

  resetProgress: function(){
    if(confirm('Reset all progress? This cannot be undone.')){
      save = {v:SAVE_VERSION,levels:{},sound:save.sound};
      writeSave(save);
      sfxClick();
    }
  },
  exitLevel: function(){
    gameActive = false;
    stopBGM();
    hideTutorial();
    G.showLevels();
    sfxClick();
  },
  nextLevel: function(){
    if(currentLevel < LEVEL_DATA.length - 1){
      startLevel(currentLevel + 1);
    }
  }
};

// ====== INIT ======
function init(){
  setupCanvas();
  setupInput();

  // Apply saved sound preference
  if(save.sound !== undefined) soundOn = save.sound;

  // Start render loop
  lastTime = 0;
  rafId = requestAnimationFrame(gameLoop);

  // Show menu
  showScreen('menu');
}

// Cleanup on page unload
function cleanup(){
  gameActive = false;
  stopBGM();
  if(rafId) cancelAnimationFrame(rafId);
  if(audioCtx) audioCtx.close();
}

window.addEventListener('beforeunload', cleanup);
window.addEventListener('pagehide', cleanup);
document.addEventListener('visibilitychange', function(){
  if(document.hidden){
    // Pause when tab hidden
    if(gameActive){
      gameActive = false;
    }
  }
});

// Start
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
<script src="/game-footer.js"></script>
</body>
</html>
