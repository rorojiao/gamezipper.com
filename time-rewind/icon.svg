<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0420"/>
      <stop offset="50%" style="stop-color:#1a0840"/>
      <stop offset="100%" style="stop-color:#0a0420"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark neon background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  <!-- Clock face -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#00d4ff" stroke-width="12" filter="url(#glow)"/>
  <!-- Hour marks -->
  <g stroke="#00d4ff" stroke-width="8" stroke-linecap="round" filter="url(#glow)">
    <line x1="512" y1="160" x2="512" y2="200"/>
    <line x1="512" y1="824" x2="512" y2="864"/>
    <line x1="160" y1="512" x2="200" y2="512"/>
    <line x1="824" y1="512" x2="864" y2="512"/>
  </g>
  <!-- Rewind arrow -->
  <path d="M512 300 A212 212 0 1 1 300 512" fill="none" stroke="#ff00c8" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="272,512 340,444 340,580" fill="#ff00c8" filter="url(#glow)"/>
  <!-- Clock hands -->
  <line x1="512" y1="512" x2="512" y2="340" stroke="#00d4ff" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="512" y1="512" x2="640" y2="512" stroke="#00d4ff" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Center dot -->
  <circle cx="512" cy="512" r="24" fill="#ff00c8" filter="url(#glow)"/>
  <!-- Sparkle effects -->
  <circle cx="200" cy="200" r="8" fill="#00d4ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="824" cy="824" r="6" fill="#ff00c8" opacity="0.8" filter="url(#glow)"/>
  <circle cx="824" cy="200" r="10" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
</svg>
