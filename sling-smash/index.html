function initAudio(){
if(audioCtx)return;
try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
}
function playTone(freq,dur,type,vol){
if(!soundOn||!audioCtx)return;
type=type||'square';vol=vol||0.1;
var osc=audioCtx.createOscillator(),g=audioCtx.createGain();
osc.type=type;osc.frequency.value=freq;
g.gain.setValueAtTime(vol,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
osc.connect(g);g.connect(audioCtx.destination);
osc.start();osc.stop(audioCtx.currentTime+dur);
}
function sfxLaunch(){playTone(180,0.15,'sawtooth',0.12);setTimeout(function(){playTone(120,0.1,'sawtooth',0.08)},50)}
function sfxHit(m){var f=m==='ice'?800:m==='stone'?120:m==='metal'?80:300;playTone(f,0.08,'square',0.1)}
function sfxBreak(){playTone(150,0.2,'sawtooth',0.15);setTimeout(function(){playTone(80,0.15,'sawtooth',0.1)},60)}
function sfxExplode(){for(var i=0;i<6;i++)setTimeout(function(){playTone(rand(50,200),0.15,'sawtooth',0.15)},i*30)}
function sfxWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.2,'sine',0.15)},i*100)})}
function sfxLose(){[400,300,200].forEach(function(f,i){setTimeout(function(){playTone(f,0.3,'triangle',0.12)},i*150)})}
function sfxStar(){playTone(1200,0.1,'sine',0.1)}

function startBGM(){
if(!musicOn||!audioCtx||bgmNodes.length)return;
try{
var sr=audioCtx.sampleRate,dur=12,bufSize=sr*dur;
var buf=audioCtx.createBuffer(1,bufSize,sr),d=buf.getChannelData(0);
var chords=[[196,247,294],[220,277,330],[247,311,370],[220,277,330]];
var cd=dur/chords.length;
for(var i=0;i<bufSize;i++){
var t=i/sr,ci=Math.min(Math.floor(t/cd),chords.length-1),ch=chords[ci],s=0;
for(var n=0;n<ch.length;n++){var f=ch[n];s+=Math.sin(2*Math.PI*f*t)*.04;s+=Math.sin(2*Math.PI*f*2*t)*.01;}
var fade=t%cd;s*=Math.min(fade/0.5,1)*Math.min((cd-fade)/0.5,1);
d[i]=s*0.6;
}
var src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
var filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=600;
var g=audioCtx.createGain();g.gain.value=0.08;
src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);
src.start();bgmNodes=[src,filt,g];
}catch(e){}
}

function createBlock(x,y,w,h,mat,isTarget){
var m=MATS[mat];
return{x:x,y:y,w:w,h:h,vx:0,vy:0,angle:0,va:0,mass:w*h*m.density*0.01,hp:m.hp,maxHp:m.hp,mat:mat,target:!!isTarget,dead:false,settled:true};
}

function createProjectile(type){
var p=PROJ[type];
return{type:type,x:SLING_X,y:SLING_TOP_Y,vx:0,vy:0,radius:p.radius,mass:p.mass,active:false,trail:[],explode:p.explode||false,split:p.split||false,splitDone:false};
}

function stepPhysics(dt){
// Cap dt to avoid tunneling
dt=Math.min(dt,1/30);

// Update projectiles
state.projectiles.forEach(function(p){
if(!p.active)return;
// Trail
p.trail.push({x:p.x,y:p.y});
if(p.trail.length>12)p.trail.shift();
// Gravity
p.vy+=GRAVITY*dt;
// Move
p.x+=p.vx*dt;
p.y+=p.vy*dt;
// Ground collision
if(p.y+p.radius>GROUND_Y){
p.y=GROUND_Y-p.radius;
p.vy*=-RESTITUTION;
p.vx*=FRICTION;
if(Math.abs(p.vy)<30)p.vy=0;
}
// Walls
if(p.x-p.radius<0){p.x=p.radius;p.vx*=-RESTITUTION}
if(p.x+p.radius>CW){p.x=CW-p.radius;p.vx*=-RESTITUTION}
// Top
if(p.y-p.radius<0){p.y=p.radius;p.vy*=-RESTITUTION}

// Split projectile mid-flight
if(p.split&&!p.splitDone&&p.vy>0&&p.y>80){
p.splitDone=true;
for(var a=-1;a<=1;a++){
if(a===0)continue;
var np=createProjectile('ball');
np.x=p.x;np.y=p.y;
np.vx=p.vx+a*60;np.vy=p.vy*0.9;
np.active=true;np.trail=[];
state.projectiles.push(np);
}
playTone(600,0.1,'sine',0.1);
}

// Block collisions
state.blocks.forEach(function(b){
if(b.dead)return;
var overlap=checkCircleRect(p.x,p.y,p.radius,b);
if(overlap){
// Resolve
var nx=overlap.nx,ny=overlap.ny,pen=overlap.pen;
p.x+=nx*pen;p.y+=ny*pen;
// Bounce
var dot=p.vx*nx+p.vy*ny;
p.vx-=2*dot*nx*RESTITUTION;
p.vy-=2*dot*ny*RESTITUTION;
// Transfer momentum to block
var impact=Math.abs(dot);
b.vx+=nx*impact*0.3/p.mass;
b.vy+=ny*impact*0.3/p.mass;
b.va+=(Math.random()-0.5)*impact*0.02;
b.settled=false;
// Damage
var dmg=impact*0.4;
b.hp-=dmg;
sfxHit(b.mat);
spawnParticles(b.x+b.w/2,b.y+b.h/2,4,b.mat);
if(b.hp<=0){
b.dead=true;
sfxBreak();
spawnParticles(b.x+b.w/2,b.y+b.h/2,10,b.mat);
}
// Bomb explosion
if(p.explode&&impact>50){
explode(p.x,p.y);
p.active=false;
}
state.shaking=Math.min(8,state.shaking+impact*0.01);
}
});
});

// Bomb explosion triggers
state.projectiles.forEach(function(p){
if(p.active&&p.explode&&p.y>GROUND_Y-5&&!p.exploded){

b.vy+=GRAVITY*dt;

b.x+=b.vx*dt;
b.y+=b.vy*dt;

b.vy*=-RESTITUTION*0.5;
b.vx*=0.8;

b.vx=0;b.vy=0;b.va=0;b.settled=true;
}
});

var imp=-(1+RESTITUTION*0.5)*vn/(1/a.mass+1/c.mass);
a.vx-=imp*ov.nx/a.mass;
a.vy-=imp*ov.ny/a.mass;
c.vx+=imp*ov.nx/c.mass;
c.vy+=imp*ov.ny/c.mass;
a.settled=false;c.settled=false;
}
}
}
}

// Explosions
state.explosions.forEach(function(e){e.t+=dt});
state.explosions=state.explosions.filter(function(e){return e.t<e.life});

// Particles
state.particles.forEach(function(p){
p.vy+=200*dt;
p.x+=p.vx*dt;p.y+=p.vy*dt;
p.life-=dt;
p.angle+=p.va*dt;
});
state.particles=state.particles.filter(function(p){return p.life>0});

// Debris (falling broken blocks)
state.debris.forEach(function(d){
d.vy+=GRAVITY*dt;
d.x+=d.vx*dt;d.y+=d.vy*dt;
d.angle+=d.va*dt;
d.life-=dt;
if(d.y>GROUND_Y){d.y=GROUND_Y;d.vy*=-0.3;d.vx*=0.7}
});
state.debris=state.debris.filter(function(d){return d.life>0});

// Screen shake decay
state.shaking*=0.88;
if(state.shaking<0.1)state.shaking=0;

// Check win/lose
checkWinLose();
}

function checkCircleRect(cx,cy,cr,rect){
var nx=clamp(cx,rect.x,rect.x+rect.w);
var ny=clamp(cy,rect.y,rect.y+rect.h);
var dx=cx-nx,dy=cy-ny;
var d2=dx*dx+dy*dy;
if(d2>cr*cr)return null;
var d=Math.sqrt(d2)||0.001;
return{nx:dx/d,ny:dy/d,pen:cr-d};
}

function rectOverlap(a,b){
var ax2=a.x+a.w,ay2=a.y+a.h;
var bx2=b.x+b.w,by2=b.y+b.h;
if(a.x>=bx2||ax2<=b.x||a.y>=by2||ay2<=b.y)return null;
var ox=Math.min(ax2-bx2,b.x+bx2-a.x);
// Simpler: overlap amounts
var leftB=b.x,rightB=bx2,topB=b.y,bottomB=by2;
var ox1=ax2-leftB; // a pushes right
var ox2=rightB-a.x; // a pushes left
var oy1=ay2-topB;
var oy2=bottomB-a.y;
var minPen=Math.min(ox1,ox2,oy1,oy2);
var nx,ny;
if(minPen===ox1){nx=1;ny=0}
else if(minPen===ox2){nx=-1;ny=0}
else if(minPen===oy1){nx=0;ny=1}
else{nx=0;ny=-1}
return{nx:nx,ny:ny,pen:minPen};
}

function explode(x,y){
sfxExplode();
state.shaking=Math.min(12,state.shaking+6);
state.explosions.push({x:x,y:y,r:0,maxR:70,t:0,life:0.5});
// Damage blocks in radius
state.blocks.forEach(function(b){
if(b.dead)return;
var bx=b.x+b.w/2,by=b.y+b.h/2;
var d=dist(x,y,bx,by);
if(d<70){
var force=(70-d)/70;
b.hp-=force*50;
b.vx+=(bx-x)/d*force*200;
b.vy+=(by-y)/d*force*200-50;
b.va+=(Math.random()-0.5)*5;
b.settled=false;
if(b.hp<=0){
b.dead=true;
sfxBreak();
spawnParticles(bx,by,12,b.mat);
}
}
});
// Push projectiles
state.projectiles.forEach(function(p){
if(!p.active)return;
var d=dist(x,y,p.x,p.y);
if(d<70&&d>1){
var force=(70-d)/70;
p.vx+=(p.x-x)/d*force*300;
p.vy+=(p.y-y)/d*force*300;
}
});
}

function spawnParticles(x,y,n,mat){
var c=MATS[mat]?MATS[mat].color:'#aaa';
for(var i=0;i<n;i++){
state.particles.push({
x:x,y:y,
vx:rand(-80,80),vy:rand(-120,-20),
r:rand(2,5),color:c,
life:rand(0.3,PARTICLE_LIFE),
angle:rand(0,Math.PI*2),
va:rand(-5,5)
});
}
}

// ==================== WIN/LOSE ====================
function checkWinLose(){
if(state.levelComplete||state.levelFailed||state.winChecked)return;
// Check if any projectiles still active
var activeProj=state.projectiles.some(function(p){return p.active});
var allSettled=state.blocks.every(function(b){return b.dead||b.settled});

if(activeProj||!allSettled)return;

// Check targets
var remaining=state.blocks.filter(function(b){return b.target&&!b.dead}).length;

if(remaining===0){
// Win!
state.levelComplete=true;
state.winChecked=true;
var usedAmmo=state.projTypes.reduce(function(s,t){return s+t.n},0)-getRemainingAmmo();
var totalAmmo=state.projTypes.reduce(function(s,t){return s+t.n},0);
var stars=1;
if(usedAmmo<=totalAmmo*0.6)stars=2;
if(usedAmmo<=totalAmmo*0.4)stars=3;
state.stars=stars;
saveProgress(state.level,stars);
setTimeout(function(){showWinOverlay(stars)},800);
sfxWin();
}else if(getRemainingAmmo()===0){
// Lose
state.levelFailed=true;
state.winChecked=true;
setTimeout(function(){showLoseOverlay()},1000);
sfxLose();
}
}

function getRemainingAmmo(){
return state.projTypes.reduce(function(s,t){return s+t.n},0);
}

// ==================== LEVEL LOADING ====================
function loadLevel(idx){
var lv=LEVELS[idx];
if(!lv)return;
state.level=idx;
state.blocks=[];
state.projectiles=[];
state.particles=[];
state.explosions=[];
state.debris=[];
state.levelComplete=false;
state.levelFailed=false;
state.winChecked=false;
state.shaking=0;
state.flying=null;
state.aiming=false;
state.simTime=0;
state.projTypes=lv.p.map(function(p){return{type:p.t,name:PROJ[p.t].name,n:p.n,color:PROJ[p.t].color}});
state.projIndex=0;
// Auto-select first available projectile type
for(var i=0;i<state.projTypes.length;i++){
if(state.projTypes[i].n>0){state.projIndex=i;break}
}

// Create blocks
lv.b.forEach(function(b){
state.blocks.push(createBlock(b.x,b.y,b.w,b.h,b.m,false));
});
// Create targets
lv.t.forEach(function(t){
state.blocks.push(createBlock(t.x,t.y,30,30,t.m||'wood',true));
});

updateHUD();
renderProjSelector();
}

function getActiveProjType(){
var t=state.projTypes[state.projIndex];
return t&&t.n>0?t:null;
}

function consumeAmmo(){
var t=state.projTypes[state.projIndex];
if(t)t.n--;
// Auto-select next available
for(var i=0;i<state.projTypes.length;i++){
if(state.projTypes[i].n>0){state.projIndex=i;break}
}
renderProjSelector();
}

// ==================== RENDERING ====================
function setupCanvas(){
canvas=document.getElementById('game-canvas');
ctx=canvas.getContext('2d');
resizeCanvas();
}

function resizeCanvas(){
var wrap=document.getElementById('canvas-wrap');
var w=wrap.clientWidth;
dpr=window.devicePixelRatio||1;
canvas.width=w*dpr;
canvas.height=w*0.6*dpr; // 5:3 aspect ratio
canvas.style.height=(w*0.6)+'px';
scale=(w*dpr)/CW;
}

function render(){
if(!ctx)return;
ctx.save();
ctx.scale(dpr,dpr);
var cw=canvas.width/dpr,ch=canvas.height/dpr;
var sx=scale/dpr,sy=scale/dpr;
// Use uniform scale
var s=canvas.width/dpr/CW;
ctx.scale(s,s);

// Screen shake
if(state.shaking>0){
ctx.translate(rand(-state.shaking,state.shaking),rand(-state.shaking,state.shaking));
}

// Clear with sky gradient
ctx.fillStyle='#1a2a4a';
ctx.fillRect(0,0,CW,CH);

// Sky gradient
var grad=ctx.createLinearGradient(0,0,0,GROUND_Y);
grad.addColorStop(0,'#1a2a4a');
grad.addColorStop(0.5,'#2a3a5a');
grad.addColorStop(1,'#1a2030');
ctx.fillStyle=grad;
ctx.fillRect(0,0,CW,GROUND_Y);

// Stars in background
ctx.fillStyle='rgba(255,255,255,0.3)';
for(var i=0;i<25;i++){
var sx2=(i*137)%CW;
var sy2=(i*73)%(GROUND_Y-40);
ctx.fillRect(sx2,sy2,1,1);
}

// Ground
ctx.fillStyle='#2a4a2a';
ctx.fillRect(0,GROUND_Y,CW,CH-GROUND_Y);
ctx.fillStyle='#1a3a1a';
ctx.fillRect(0,GROUND_Y,CW,4);
// Grass texture
ctx.fillStyle='#3a5a3a';
for(var gx=0;gx<CW;gx+=12){
ctx.fillRect(gx+2,GROUND_Y,2,3);
}

// Draw blocks
state.blocks.forEach(function(b){
if(b.dead)return;
drawBlock(b);
});

// Draw debris
state.debris.forEach(function(d){
ctx.save();
ctx.translate(d.x+d.w/2,d.y+d.h/2);
ctx.rotate(d.angle);
ctx.globalAlpha=Math.min(1,d.life);
ctx.fillStyle=d.color;
ctx.fillRect(-d.w/2,-d.h/2,d.w,d.h);
ctx.restore();
});
ctx.globalAlpha=1;

// Draw slingshot
drawSlingshot();

// Draw projectiles
state.projectiles.forEach(function(p){
if(!p.active)return;
// Trail
p.trail.forEach(function(t,i){
ctx.globalAlpha=(i/p.trail.length)*0.3;
ctx.fillStyle=PROJ[p.type].color;
ctx.beginPath();
ctx.arc(t.x,t.y,p.radius*(i/p.trail.length),0,Math.PI*2);
ctx.fill();
});
ctx.globalAlpha=1;
drawProjectile(p);
});

// Draw aiming
if(state.aiming&&getActiveProjType()){
drawAiming();
}

// Draw particles
state.particles.forEach(function(p){
ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(p.angle);
ctx.globalAlpha=Math.min(1,p.life/PARTICLE_LIFE);
ctx.fillStyle=p.color;
ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
ctx.restore();
});
ctx.globalAlpha=1;

// Draw explosions
state.explosions.forEach(function(e){
var prog=e.t/e.life;
var r=e.maxR*prog;
ctx.globalAlpha=(1-prog)*0.8;
var eg=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,r);
eg.addColorStop(0,'#fff');
eg.addColorStop(0.3,'#ff6b35');
eg.addColorStop(0.7,'#e63946');
eg.addColorStop(1,'rgba(0,0,0,0)');
ctx.fillStyle=eg;
ctx.beginPath();
ctx.arc(e.x,e.y,r,0,Math.PI*2);
ctx.fill();
ctx.globalAlpha=1;
});

ctx.restore();
}

function drawBlock(b){
ctx.save();
ctx.translate(b.x+b.w/2,b.y+b.h/2);
if(Math.abs(b.angle)>0.01)ctx.rotate(b.angle);
var m=MATS[b.mat];
// Fill
ctx.fillStyle=m.color;
ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
// Edge
ctx.strokeStyle=m.edge;
ctx.lineWidth=2;
ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
// Damage cracks
if(b.hp<b.maxHp*0.5){
ctx.strokeStyle='rgba(0,0,0,0.3)';
ctx.lineWidth=1;
ctx.beginPath();
ctx.moveTo(-b.w/3,-b.h/3);
ctx.lineTo(b.w/4,0);
ctx.lineTo(-b.w/6,b.h/3);
ctx.stroke();
}
// Target indicator
if(b.target){
ctx.fillStyle='rgba(255,215,0,0.9)';
drawStar(0,0,6,3,5);
ctx.strokeStyle='#ff6b35';
ctx.lineWidth=2;
ctx.strokeRect(-b.w/2-1,-b.h/2-1,b.w+2,b.h+2);
}
ctx.restore();
}

function drawStar(cx,cy,outer,inner,points){
ctx.beginPath();
for(var i=0;i<points*2;i++){
var r=i%2===0?outer:inner;
var a=(i/(points*2))*Math.PI*2-Math.PI/2;
var x=cx+Math.cos(a)*r;
var y=cy+Math.sin(a)*r;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.fill();
}

function drawSlingshot(){
// Back fork
ctx.strokeStyle='#5a3a1a';
ctx.lineWidth=8;
ctx.lineCap='round';
ctx.beginPath();
ctx.moveTo(SLING_X,SLING_Y);
ctx.lineTo(SLING_X-10,SLING_Y-20);
ctx.moveTo(SLING_X,SLING_Y);
ctx.lineTo(SLING_X+10,SLING_Y-20);
ctx.stroke();
// Pole
ctx.strokeStyle='#4a2a1a';
ctx.lineWidth=10;
ctx.beginPath();
ctx.moveTo(SLING_X,SLING_Y);
ctx.lineTo(SLING_X,GROUND_Y);
ctx.stroke();
// Rubber bands
if(state.aiming&&getActiveProjType()){
ctx.strokeStyle='#333';
ctx.lineWidth=3;
ctx.beginPath();
ctx.moveTo(SLING_X-10,SLING_Y-20);
ctx.lineTo(state.slingX,state.slingY);
ctx.lineTo(SLING_X+10,SLING_Y-20);
ctx.stroke();
// Draw ball at drag position
var pt=getActiveProjType();
var pc=PROJ[pt.type];
ctx.fillStyle=pc.color;
ctx.beginPath();
ctx.arc(state.slingX,state.slingY,pc.radius,0,Math.PI*2);
ctx.fill();
ctx.strokeStyle='#222';
ctx.lineWidth=1;
ctx.stroke();
}else if(getActiveProjType()){
// Idle ball
var pt=getActiveProjType();
var pc=PROJ[pt.type];
ctx.fillStyle=pc.color;
ctx.beginPath();
ctx.arc(SLING_X,SLING_TOP_Y,pc.radius,0,Math.PI*2);
ctx.fill();
ctx.strokeStyle='#222';
ctx.lineWidth=1;
ctx.stroke();
// Rubber bands idle
ctx.strokeStyle='#333';
ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(SLING_X-10,SLING_Y-20);
ctx.lineTo(SLING_X-3,SLING_TOP_Y-3);
ctx.moveTo(SLING_X+10,SLING_Y-20);
ctx.lineTo(SLING_X+3,SLING_TOP_Y-3);
ctx.stroke();
}
}

function drawProjectile(p){
var pc=PROJ[p.type];
ctx.fillStyle=pc.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fill();
// Highlight
ctx.fillStyle='rgba(255,255,255,0.3)';
ctx.beginPath();
ctx.arc(p.x-p.radius*0.3,p.y-p.radius*0.3,p.radius*0.4,0,Math.PI*2);
ctx.fill();
// Border
ctx.strokeStyle='#222';
ctx.lineWidth=1.5;
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.stroke();
// Bomb fuse
if(p.explode){
ctx.strokeStyle='#ff6b35';
ctx.lineWidth=2;
ctx.beginPath();
ctx.moveTo(p.x,p.y-p.radius);
ctx.quadraticCurveTo(p.x+4,p.y-p.radius-6,p.x+2,p.y-p.radius-10);
ctx.stroke();
}
}

function drawAiming(){
// Trajectory preview
var dx=SLING_X-state.slingX;
var dy=SLING_TOP_Y-state.slingY;
var power=Math.min(MAX_PULL,Math.sqrt(dx*dx+dy*dy));
var ang=Math.atan2(dy,dx);
var vx=Math.cos(ang)*power*LAUNCH_POWER;
var vy=Math.sin(ang)*power*LAUNCH_POWER;
// Simulate trajectory
var tx=state.slingX,ty=state.slingY,tvx=vx,tvy=vy;
ctx.fillStyle='rgba(255,255,255,0.4)';
for(var i=0;i<40;i++){
tx+=tvx*0.03;
ty+=tvy*0.03;
tvy+=GRAVITY*0.03;
if(ty>GROUND_Y||tx>CW+50||tx<-50)break;
if(i%2===0){
ctx.beginPath();
ctx.arc(tx,ty,2,0,Math.PI*2);
ctx.fill();
}
}
// Power indicator
var powerPct=power/MAX_PULL;
ctx.fillStyle='rgba(0,0,0,0.5)';
ctx.fillRect(SLING_X-25,SLING_Y+25,50,6);
ctx.fillStyle=powerPct<0.5?'#4ade80':powerPct<0.8?'#f7b801':'#ef4444';
ctx.fillRect(SLING_X-25,SLING_Y+25,50*powerPct,6);
}

// ==================== INPUT ====================
function getCanvasPos(e){
var rect=canvas.getBoundingClientRect();
var px,py;
if(e.touches&&e.touches[0]){px=e.touches[0].clientX;py=e.touches[0].clientY}
else if(e.changedTouches&&e.changedTouches[0]){px=e.changedTouches[0].clientX;py=e.changedTouches[0].clientY}
else{px=e.clientX;py=e.clientY}
var x=(px-rect.left)/rect.width*CW;
var y=(py-rect.top)/rect.height*CH;
return{x:x,y:y};
}

function onPointerDown(e){
if(state.screen!=='game')return;
if(state.levelComplete||state.levelFailed)return;
if(!getActiveProjType())return;
e.preventDefault();
initAudio();
var pos=getCanvasPos(e);
// Check if near slingshot
if(dist(pos.x,pos.y,SLING_X,SLING_TOP_Y)<40){
state.aiming=true;
state.slingX=SLING_X;
state.slingY=SLING_TOP_Y;
}
}

function onPointerMove(e){
if(!state.aiming)return;
e.preventDefault();
var pos=getCanvasPos(e);
var dx=pos.x-SLING_X;
var dy=pos.y-SLING_TOP_Y;
var d=Math.sqrt(dx*dx+dy*dy);
// Only allow pulling back (left/down from sling)
if(dx>-5){dx=-5}
var nd=Math.min(MAX_PULL,d);
var ang=Math.atan2(dy,dx);
state.slingX=SLING_X+Math.cos(ang)*nd;
state.slingY=SLING_TOP_Y+Math.sin(ang)*nd;
}

function onPointerUp(e){
if(!state.aiming)return;
e.preventDefault();
state.aiming=false;
var dx=SLING_X-state.slingX;
var dy=SLING_TOP_Y-state.slingY;
var power=Math.sqrt(dx*dx+dy*dy);
if(power<10){
state.slingX=SLING_X;
state.slingY=SLING_TOP_Y;
return;
}
// Launch
var pt=getActiveProjType();
if(!pt)return;
var proj=createProjectile(pt.type);
proj.x=SLING_X;proj.y=SLING_TOP_Y;
var ang=Math.atan2(dy,dx);
var pwr=Math.min(MAX_PULL,power);
proj.vx=Math.cos(ang)*pwr*LAUNCH_POWER;
proj.vy=Math.sin(ang)*pwr*LAUNCH_POWER;
proj.active=true;
proj.trail=[];
state.projectiles.push(proj);
consumeAmmo();
sfxLaunch();
state.slingX=SLING_X;
state.slingY=SLING_TOP_Y;
}

// ==================== GAME LOOP ====================
function loop(t){
if(!lastTime)lastTime=t;
var dt=Math.min((t-lastTime)/1000,0.033);
lastTime=t;
if(state.screen==='game'){
stepPhysics(dt);
render();
}
rafId=requestAnimationFrame(loop);
}

function updateHUD(){
document.getElementById('level-info').textContent='Level '+(state.level+1);
var sd=document.getElementById('stars-display');
var stars=progress.levels[state.level]?progress.levels[state.level].stars:0;
sd.innerHTML='';
for(var i=0;i<3;i++){
var s=document.createElement('span');
s.className='star-icon'+(i<stars?' earned':'');
s.innerHTML='&#9733;';
sd.appendChild(s);
}
}

function renderProjSelector(){
var ps=document.getElementById('proj-selector');
ps.innerHTML='';
var hasMultiple=state.projTypes.filter(function(t){return t.n>0}).length>1;
if(!hasMultiple){
// Show ammo count
var total=getRemainingAmmo();
ps.style.display='flex';
var d=document.createElement('div');
d.className='ammo-display';
d.innerHTML='<span class="ammo-ball"></span> '+total+' left';
ps.appendChild(d);
return;
}
ps.style.display='flex';
state.projTypes.forEach(function(t,i){
if(t.n<=0)return;
var btn=document.createElement('button');

var icon=document.createElement('span');
icon.className='proj-icon';
icon.style.background=t.color;
btn.appendChild(icon);
btn.appendChild(document.createTextNode(t.name));
var cnt=document.createElement('span');
cnt.className='proj-count';
cnt.textContent=t.n;
btn.appendChild(cnt);
ps.appendChild(btn);
});
}

function showMenu(){
state.screen='menu';
document.getElementById('menu-screen').style.display='flex';
document.getElementById('game-screen').style.display='none';
document.getElementById('level-select-screen').style.display='none';
document.getElementById('overlay').classList.remove('show');

}

function startGame(){
initAudio();
startBGM();
// Find highest unlocked level
var highest=0;
for(var i=0;i<LEVELS.length;i++){
if(progress.levels[i]&&progress.levels[i].unlocked)highest=i;
}
loadLevel(highest);
state.screen='game';
document.getElementById('menu-screen').style.display='none';
document.getElementById('game-screen').style.display='flex';
document.getElementById('level-select-screen').style.display='none';
document.getElementById('overlay').classList.remove('show');
// Resize canvas after game screen is visible

}

function showLevelSelect(){
buildLevelGrid();
document.getElementById('menu-screen').style.display='none';
document.getElementById('game-screen').style.display='none';
document.getElementById('level-select-screen').style.display='flex';
}
function showLevelSelectGame(){showLevelSelect()}

function buildLevelGrid(){
var grid=document.getElementById('ls-grid');
grid.innerHTML='';
var tiers=['Easy','Medium','Hard','Expert','Master'];
tiers.forEach(function(tname,ti){
var label=document.createElement('div');
label.className='ls-tier-label';
label.textContent=tname;
grid.appendChild(label);
for(var li=0;li<6;li++){
var idx=ti*6+li;
if(idx>=LEVELS.length)break;
var lv=progress.levels[idx]||{unlocked:idx===0,stars:0};
var cell=document.createElement('div');
var cls='ls-cell '+(lv.stars>0?'completed':(lv.unlocked?'unlocked':'locked'));
cell.className=cls;
var num=document.createElement('div');
num.className='ls-cell-num';
num.textContent=idx+1;
cell.appendChild(num);
var st=document.createElement('div');
st.className='ls-cell-stars';
var starStr='';
for(var s=0;s<3;s++)starStr+=(s<(lv.stars||0))?'&#9733;':'&#183;';
st.innerHTML=starStr;
cell.appendChild(st);
if(lv.unlocked){
cell.onclick=function(){var n=idx;selectLevel(n)};
}
grid.appendChild(cell);
}
});
}

function selectLevel(idx){
loadLevel(idx);
state.screen='game';
document.getElementById('menu-screen').style.display='none';
document.getElementById('game-screen').style.display='flex';
document.getElementById('level-select-screen').style.display='none';
setTimeout(function(){resizeCanvas();},0);
}

function restartLevel(){
if(state.screen!=='game')return;
loadLevel(state.level);
document.getElementById('overlay').classList.remove('show');
}

function showWinOverlay(stars){
var ov=document.getElementById('overlay');
var title=document.getElementById('overlay-title');
title.textContent='Level Complete!';
title.className='overlay-title win';
var ss=document.getElementById('overlay-stars');
ss.innerHTML='';
for(var i=0;i<3;i++){
setTimeout(function(){sfxStar()},i*150);
ss.innerHTML+=(i<stars)?'<span style="color:#f7b801">&#9733;</span> ':'<span style="color:#555">&#9733;</span> ';
}
document.getElementById('overlay-msg').textContent=stars===3?'Perfect! Three stars!':(stars===2?'Great job!':'Level cleared!');
document.getElementById('overlay-next').style.display=state.level<LEVELS.length-1?'block':'none';
document.getElementById('overlay-retry').style.display='block';
ov.classList.add('show');
}

function showLoseOverlay(){
var ov=document.getElementById('overlay');
var title=document.getElementById('overlay-title');
title.textContent='Try Again!';
title.className='overlay-title lose';
document.getElementById('overlay-stars').textContent='';
document.getElementById('overlay-msg').textContent='Some targets are still standing. Retry!';
document.getElementById('overlay-next').style.display='none';
document.getElementById('overlay-retry').style.display='block';
ov.classList.add('show');
}

function overlayNext(){
var next=state.level+1;
if(next<LEVELS.length){
loadLevel(next);
document.getElementById('overlay').classList.remove('show');
}
}

function showHowTo(){
showToast('Drag back from the slingshot to aim, release to launch. Knock out all star targets!');
}

function updateMenuStats(){
var completed=0,totalStars=0;
progress.levels.forEach(function(l){if(l){if(l.stars>0)completed++;totalStars+=l.stars||0}});
document.getElementById('menu-stats').textContent=completed+'/'+LEVELS.length+' levels completed | '+totalStars+' stars earned';
}

// ==================== PROGRESS ====================
function loadProgress(){
try{
var s=localStorage.getItem('slingsmash_v1');
if(s)progress=JSON.parse(s);
}catch(e){}
if(!progress.levels)progress.levels=[];
// Ensure all levels exist
for(var i=0;i<LEVELS.length;i++){
if(!progress.levels[i])progress.levels[i]={unlocked:i===0,stars:0};
}
// Unlock chain
for(var i=0;i<LEVELS.length-1;i++){
if(progress.levels[i].stars>0)progress.levels[i+1].unlocked=true;
}
}

function saveProgress(idx,stars){
if(!progress.levels[idx])progress.levels[idx]={unlocked:true,stars:0};
progress.levels[idx].stars=Math.max(progress.levels[idx].stars,stars);
progress.levels[idx].unlocked=true;
if(idx+1<LEVELS.length)progress.levels[idx+1].unlocked=true;
try{localStorage.setItem('slingsmash_v1',JSON.stringify(progress))}catch(e){}
}

// ==================== CLEANUP ====================
function cleanup(){
if(rafId){cancelAnimationFrame(rafId);rafId=null}
timers.forEach(function(id){clearInterval(id)});timers=[];
stopBGM();
if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null}
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
if(document.hidden){
if(rafId){cancelAnimationFrame(rafId);rafId=null}
}else if(state.screen==='game'){
lastTime=0;
rafId=requestAnimationFrame(loop);
}
});

// ==================== INIT ====================
function init(){
setupCanvas();
loadProgress();
updateMenuStats();
// Event listeners
canvas.addEventListener('pointerdown',onPointerDown);
canvas.addEventListener('pointermove',onPointerMove);
canvas.addEventListener('pointerup',onPointerUp);
canvas.addEventListener('pointercancel',onPointerUp);
canvas.addEventListener('touchstart',function(e){e.preventDefault()},false);
canvas.addEventListener('touchmove',function(e){e.preventDefault()},false);
window.addEventListener('resize',function(){resizeCanvas()});
// Start loop
rafId=requestAnimationFrame(loop);
}

// Expose for HTML onclick
window.startGame=startGame;
window.showLevelSelect=showLevelSelect;
window.showMenu=showMenu;
window.restartLevel=restartLevel;
window.showLevelSelectGame=showLevelSelectGame;
window.overlayNext=overlayNext;
window.showHowTo=showHowTo;

if(document.readyState==='loading'){
document.addEventListener('DOMContentLoaded',init);
}else{
init();
}

})();
</script>
