// ============ INIT ============
function init(){
canvas=document.getElementById('game');
ctx=canvas.getContext('2d');
resize();
window.addEventListener('resize',resize);
canvas.addEventListener('pointerdown',onPointerDown);
canvas.addEventListener('pointermove',onPointerMove);
canvas.addEventListener('pointerup',onPointerUp);
canvas.addEventListener('pointercancel',onPointerUp);
document.getElementById('play-btn').addEventListener('click',function(){currentLevel=loadProgress();startLevel(currentLevel);});
document.getElementById('level-select-btn').addEventListener('click',showLevelSelect);
document.getElementById('back-to-menu').addEventListener('click',function(){showOverlay('menu');GS='menu';});
document.getElementById('restart-btn').addEventListener('click',function(){startLevel(currentLevel);});
document.getElementById('menu-btn').addEventListener('click',function(){showOverlay('menu');GS='menu';});
document.getElementById('next-btn').addEventListener('click',function(){if(currentLevel<29){currentLevel++;startLevel(currentLevel);}else{showOverlay('menu');GS='menu';}});
document.getElementById('retry-btn').addEventListener('click',function(){startLevel(currentLevel);});
document.getElementById('fail-retry-btn').addEventListener('click',function(){startLevel(currentLevel);});
document.getElementById('vol-btn').addEventListener('click',toggleSound);
lastTime=performance.now();
rafId=requestAnimationFrame(loop);
// Setup audio context lazily on first interaction
document.body.addEventListener('pointerdown',initAudio,{once:true});
}

function initAudio(){
if(!audioCtx){
try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
}

function resize(){
var footerEl=document.getElementById('game-footer');
var footerH=(footerEl&&footerEl.offsetHeight>0)?footerEl.offsetHeight:0;
dpr=window.devicePixelRatio||1;
var cw=window.innerWidth;
var ch=window.innerHeight-footerH;
canvas.width=cw*dpr;
canvas.height=ch*dpr;
canvas.style.width=cw+'px';
canvas.style.height=ch+'px';
// Fit virtual resolution into canvas with letterboxing
var scaleX=cw/VW;
var scaleY=ch/VH;
scale=Math.min(scaleX,scaleY);
offsetX=(cw-VW*scale)/2;
offsetY=(ch-VH*scale)/2;
ctx.setTransform(dpr*scale,0,0,dpr*scale,dpr*offsetX,dpr*offsetY);
}

// ============ COORDINATE HELPERS ============
function screenToVirtual(sx,sy){
var footerEl=document.getElementById('game-footer');
var footerH=(footerEl&&footerEl.offsetHeight>0)?footerEl.offsetHeight:0;
var rect=canvas.getBoundingClientRect();
var x=(sx-rect.left-offsetX)/scale;
var y=(sy-rect.top-offsetY)/scale;
return{x:x,y:y};
}

// ============ LEVEL MANAGEMENT ============
function startLevel(idx){
currentLevel=idx;
var lv=LV[idx];
levelData=lv;
ballsLeft=lv.b;
totalBalls=lv.b;
activeBall=null;
blocks=[];
particles=[];
trail=[];
shakeIntensity=0;
isAiming=false;
aimStart=null;aimEnd=null;
// Create blocks from level data
for(var i=0;i<(lv.t||[]).length;i++){
var t=lv.t[i];
blocks.push({x:t[0],y:t[1],w:t[2],h:t[3],type:t[4],vx:0,vy:0,rot:0,vrot:0,hit:false,falling:false,destroyed:false,opacity:1});
}
for(var i=0;i<(lv.o||[]).length;i++){
var o=lv.o[i];
blocks.push({x:o[0],y:o[1],w:o[2],h:o[3],type:o[4],vx:0,vy:0,rot:0,vrot:0,hit:false,falling:false,destroyed:false,opacity:1});
}
showOverlay(null);
document.getElementById('hud').style.display='flex';
document.getElementById('vol-btn').style.display='flex';
updateBallCount();
GS='aiming';
levelStartTime=performance.now();
// First-visit tutorial
if(idx===0&&!getProgress().tutorialDone){
showTutorial();
}
}

function showTutorial(){
var tut=document.getElementById('tutorial');
tut.style.display='block';
tut.innerHTML='<div class="tut-text" style="top:35%;left:50%;transform:translate(-50%,-50%);width:80%">Drag back from the slingshot to aim!<br>Release to launch.</div>';
setTimeout(function(){tut.style.display='none';tut.innerHTML='';},4000);
var p=getProgress();p.tutorialDone=true;saveProgress(p);
}

function updateBallCount(){
document.getElementById('ball-count').textContent=ballsLeft;
}

// ============ PROGRESS (localStorage) ============
function getProgress(){
try{var s=localStorage.getItem('slingshot_smash');if(s)return JSON.parse(s);}catch(e){}
return{level:0,stars:{},tutorialDone:false};
}
function loadProgress(){
var p=getProgress();return p.level||0;
}
function saveProgress(p){
try{localStorage.setItem('slingshot_smash',JSON.stringify(p));}catch(e){}
}
function saveLevelResult(idx,stars){
var p=getProgress();
if(!p.stars)p.stars={};
if(!p.stars[idx]||p.stars[idx]<stars)p.stars[idx]=stars;
if(idx+1>p.level&&idx<29)p.level=idx+1;
saveProgress(p);
}

// ============ LEVEL SELECT ============
function showLevelSelect(){
var container=document.getElementById('level-grid-container');
var p=getProgress();
var html='';
var tierNames=['Basic','Stacked','Protected','Multi-Target','Complex'];
for(var tier=0;tier<5;tier++){
html+='<div class="tier-label">'+tierNames[tier]+'</div><div class="level-grid">';
for(var i=0;i<6;i++){
var idx=tier*6+i;
var unlocked=idx<=p.level;
var stars=p.stars?p.stars[idx]||0:0;
var starStr='';
for(var s=0;s<3;s++)starStr+=(s<stars?'\u2605':'\u2606');
html+='<button class="lvl-btn'+(unlocked?'':' locked')+(idx===currentLevel?' current':'')+'" '+(unlocked?'onclick="startLevel('+idx+')"':'')+'>'+starStr+'<br>'+(idx+1)+'</button>';
}
html+='</div>';
}
container.innerHTML=html;
showOverlay('level-select');
GS='levelselect';
}

// ============ OVERLAY ============
function showOverlay(id){
document.getElementById('menu').style.display=(id==='menu')?'flex':'none';
document.getElementById('level-select').style.display=(id==='level-select')?'flex':'none';
document.getElementById('level-complete').style.display=(id==='level-complete')?'flex':'none';
document.getElementById('level-fail').style.display=(id==='level-fail')?'flex':'none';
if(id){document.getElementById('hud').style.display='none';}
}

// ============ INPUT ============
function onPointerDown(e){
if(GS!=='aiming'||ballsLeft<=0)return;
initAudio();
var pos=screenToVirtual(e.clientX,e.clientY);
// Check if touch is near slingshot
var dx=pos.x-SLING_X;
var dy=pos.y-SLING_Y;
if(dx*dx+dy*dy<10000){ // Within ~100px of sling
isAiming=true;
aimStart={x:SLING_X,y:SLING_Y};
aimEnd={x:pos.x,y:pos.y};
}
}

function onPointerMove(e){
if(!isAiming)return;
var pos=screenToVirtual(e.clientX,e.clientY);
aimEnd={x:pos.x,y:pos.y};
// Clamp drag distance
var dx=aimEnd.x-aimStart.x;
var dy=aimEnd.y-aimStart.y;
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist>MAX_DRAG){
aimEnd.x=aimStart.x+dx/dist*MAX_DRAG;
aimEnd.y=aimStart.y+dy/dist*MAX_DRAG;
}
// Only allow pulling back (left and/or down from sling)
if(aimEnd.x>aimStart.x+5){aimEnd.x=aimStart.x+5;}
}

function onPointerUp(e){
if(!isAiming)return;
isAiming=false;
var dx=aimStart.x-aimEnd.x; // Launch direction = opposite of drag
var dy=aimStart.y-aimEnd.y;
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist<15){aimStart=null;aimEnd=null;return;} // Too short, cancel
// Launch ball
var angle=Math.atan2(dy,dx);
var speed=dist*POWER_MULT;
activeBall={
x:SLING_X,y:SLING_Y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed,
r:BALL_R,
bounces:0
};
ballsLeft--;
updateBallCount();
trail=[];
GS='flying';
playSound('launch');
aimStart=null;aimEnd=null;
}

// ============ PHYSICS ============
function update(dt){
// Update active ball
if(activeBall){
var ball=activeBall;
ball.vy+=GRAVITY*dt;
ball.vx*=Math.pow(AIR_RESIST,dt*60);
ball.vy*=Math.pow(AIR_RESIST,dt*60);
ball.x+=ball.vx*dt;
ball.y+=ball.vy*dt;
// Trail
trail.push({x:ball.x,y:ball.y});
if(trail.length>20)trail.shift();
// Wall bounce
if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=-ball.vx*RESTITUTION;playSound('bounce');}
if(ball.x+ball.r>VW){ball.x=VW-ball.r;ball.vx=-ball.vx*RESTITUTION;playSound('bounce');}
if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=-ball.vy*RESTITUTION;playSound('bounce');}
// Ground bounce
if(ball.y+ball.r>GROUND_Y){
ball.y=GROUND_Y-ball.r;
ball.vy=-ball.vy*RESTITUTION;
ball.vx*=FRICTION;
ball.bounces++;
playSound('bounce');
}
// Block collisions
for(var i=0;i<blocks.length;i++){
var blk=blocks[i];
if(blk.destroyed||blk.falling)continue;
if(circleRectCollide(ball.x,ball.y,ball.r,blk.x,blk.y,blk.w,blk.h)){
handleBlockHit(blk,ball);
// Bounce ball
ball.vx*=-RESTITUTION*0.5;
ball.vy*=-RESTITUTION*0.5;
// Push ball out
var bcx=blk.x+blk.w/2,bcy=blk.y+blk.h/2;
var dx=ball.x-bcx,dy=ball.y-bcy;
var d=Math.sqrt(dx*dx+dy*dy);
if(d>0){ball.x=bcx+dx/d*(ball.r+Math.max(blk.w,blk.h)/2);ball.y=bcy+dy/d*(ball.r+Math.max(blk.w,blk.h)/2);}
}
}
// Ball rest detection
var speed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
if((speed<30&&Math.abs(ball.y-(GROUND_Y-ball.r))<3)||ball.bounces>8||ball.y>GROUND_Y+100){
endShot();
}
}

// Update falling blocks
for(var i=blocks.length-1;i>=0;i--){
var blk=blocks[i];
if(blk.destroyed){
blk.opacity-=dt*3;
if(blk.opacity<=0)blocks.splice(i,1);
continue;
}
if(blk.falling){
blk.vy+=GRAVITY*dt;
blk.vx*=Math.pow(0.99,dt*60);
blk.x+=blk.vx*dt;
blk.y+=blk.vy*dt;
blk.rot+=blk.vrot*dt;
// Check if off screen
if(blk.y>GROUND_Y+100||blk.x<-100||blk.x>VW+100){
blk.destroyed=true;
// Check win condition
checkWin();
}
// Ground bounce for falling blocks
if(blk.y+blk.h>GROUND_Y&&blk.y<GROUND_Y+50){
blk.y=GROUND_Y-blk.h;
blk.vy*=-0.3;
blk.vx*=0.7;
blk.vrot*=0.5;
}
}
}

// Update particles
for(var i=particles.length-1;i>=0;i--){
var p=particles[i];
p.x+=p.vx*dt;
p.y+=p.vy*dt;
p.vy+=300*dt;
p.life-=dt;
if(p.life<=0)particles.splice(i,1);
}

// Screen shake decay
if(shakeIntensity>0){
shakeX=(Math.random()-0.5)*shakeIntensity;
shakeY=(Math.random()-0.5)*shakeIntensity;
shakeIntensity*=Math.pow(0.85,dt*60);
if(shakeIntensity<0.5)shakeIntensity=0;
}
}

function circleRectCollide(cx,cy,cr,rx,ry,rw,rh){
var closestX=Math.max(rx,Math.min(cx,rx+rw));
var closestY=Math.max(ry,Math.min(cy,ry+rh));
var dx=cx-closestX,dy=cy-closestY;
return(dx*dx+dy*dy)<(cr*cr);
}

function handleBlockHit(blk,ball){
var speed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
if(blk.type==='g'){
// Glass: shatter immediately
blk.destroyed=true;
spawnParticles(blk.x+blk.w/2,blk.y+blk.h/2,'#88ccee',12);
playSound('glass');
shakeIntensity=Math.max(shakeIntensity,4);
}else if(blk.type==='w'){
// Wood: knock over
blk.falling=true;
blk.vx=ball.vx*0.3;
blk.vy=ball.vy*0.3-50;
blk.vrot=(Math.random()-0.5)*5;
spawnParticles(blk.x+blk.w/2,blk.y+blk.h/2,'#c19a6b',6);
playSound('wood');
shakeIntensity=Math.max(shakeIntensity,3);
}else if(blk.type==='s'){
// Stone: small push, heavy
blk.falling=true;
blk.vx=ball.vx*0.12;
blk.vy=ball.vy*0.12-20;
blk.vrot=(Math.random()-0.5)*2;
spawnParticles(blk.x+blk.w/2,blk.y+blk.h/2,'#888',4);
playSound('stone');
shakeIntensity=Math.max(shakeIntensity,2);
}else if(blk.type==='T'){
// Target: knocked off
blk.falling=true;
blk.vx=ball.vx*0.25;
blk.vy=ball.vy*0.25-60;
blk.vrot=(Math.random()-0.5)*6;
spawnParticles(blk.x+blk.w/2,blk.y+blk.h/2,'#e94560',10);
playSound('target');
shakeIntensity=Math.max(shakeIntensity,5);
}
}

function endShot(){
activeBall=null;
trail=[];
// Wait for blocks to settle
setTimeout(function(){
checkWin();
if(GS==='flying'){
if(ballsLeft>0){
GS='aiming';
}else{
// Check if any targets still standing
var targetsLeft=blocks.filter(function(b){return b.type==='T'&&!b.destroyed&&!b.falling;}).length;
if(targetsLeft>0){
GS='lose';
showOverlay('level-fail');
}
}
}
},800);
}

function checkWin(){
var targetsLeft=blocks.filter(function(b){return b.type==='T'&&!b.destroyed;}).length;
var targetsStanding=blocks.filter(function(b){return b.type==='T'&&!b.destroyed&&!b.falling;}).length;
var targetsFalling=blocks.filter(function(b){return b.type==='T'&&!b.destroyed&&b.falling;}).length;
if(targetsLeft===0||(targetsStanding===0&&targetsFalling===0&&targetsLeft===0)){
// Win!
if(GS==='win')return;
GS='win';
var ballsUsed=totalBalls-ballsLeft;
var stars=3;
if(ballsUsed===totalBalls)stars=1;
else if(ballsUsed>=Math.ceil(totalBalls*0.7))stars=2;
else stars=3;
// Bonus star for efficiency
if(totalBalls-ballsLeft<Math.ceil(totalBalls*0.5))stars=3;
saveLevelResult(currentLevel,stars);
var starStr='';
for(var i=0;i<3;i++)starStr+=(i<stars?'\u2605':'\u2606');
document.getElementById('result-stars').textContent=starStr;
document.getElementById('result-text').textContent='Used '+(totalBalls-ballsLeft)+' of '+totalBalls+' balls!';
setTimeout(function(){showOverlay('level-complete');},500);
playSound('win');
}
}

function spawnParticles(x,y,color,count){
for(var i=0;i<count;i++){
var angle=Math.random()*Math.PI*2;
var speed=50+Math.random()*150;
particles.push({
x:x,y:y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed-50,
color:color,
size:2+Math.random()*4,
life:0.5+Math.random()*0.5,
maxLife:1
});
}
}

// ============ RENDER ============
function render(){
ctx.save();
ctx.translate(shakeX,shakeY);
// Clear
ctx.fillStyle='#1a1a2e';
ctx.fillRect(-50,-50,VW+100,VH+100);
// Sky gradient
var skyGrad=ctx.createLinearGradient(0,0,0,GROUND_Y);
skyGrad.addColorStop(0,'#0f3460');
skyGrad.addColorStop(0.5,'#16213e');
skyGrad.addColorStop(1,'#1a1a2e');
ctx.fillStyle=skyGrad;
ctx.fillRect(0,0,VW,GROUND_Y);
// Stars (decorative)
ctx.fillStyle='rgba(255,255,255,0.3)';
for(var i=0;i<30;i++){
var sx=(i*73)%VW;
var sy=(i*47)%(GROUND_Y-50);
var sr=0.5+(i%3)*0.5;
ctx.beginPath();
ctx.arc(sx,sy,sr,0,Math.PI*2);
ctx.fill();
}
// Ground
ctx.fillStyle='#2d4a3e';
ctx.fillRect(0,GROUND_Y,VW,VH-GROUND_Y);
ctx.fillStyle='#3a5a4a';
ctx.fillRect(0,GROUND_Y,VW,4);
// Distant hills
ctx.fillStyle='rgba(20,40,30,0.5)';
ctx.beginPath();
ctx.moveTo(0,GROUND_Y);
for(var x=0;x<=VW;x+=20){
ctx.lineTo(x,GROUND_Y-20-Math.sin(x*0.02)*15);
}
ctx.lineTo(VW,GROUND_Y);
ctx.fill();
// Slingshot
drawSlingshot();
// Trajectory prediction
if(isAiming&&aimStart&&aimEnd){
drawTrajectory();
}
// Blocks
for(var i=0;i<blocks.length;i++){
drawBlock(blocks[i]);
}
// Ball trail
if(trail.length>1){
for(var i=0;i<trail.length;i++){
var alpha=i/trail.length*0.5;
ctx.fillStyle='rgba(255,200,100,'+alpha+')';
ctx.beginPath();
ctx.arc(trail[i].x,trail[i].y,3+i*0.3,0,Math.PI*2);
ctx.fill();
}
}
// Active ball
if(activeBall){
drawBall(activeBall.x,activeBall.y,activeBall.r);
}
// Particles
for(var i=0;i<particles.length;i++){
var p=particles[i];
ctx.globalAlpha=Math.max(0,p.life);
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
}
ctx.globalAlpha=1;
ctx.restore();
}

function drawSlingshot(){
ctx.save();
// Slingshot base
ctx.strokeStyle='#5c3317';
ctx.lineWidth=6;
ctx.lineCap='round';
// Y-post
ctx.beginPath();
ctx.moveTo(SLING_X,GROUND_Y);
ctx.lineTo(SLING_X,SLING_Y+10);
ctx.stroke();
// Fork left
ctx.beginPath();
ctx.moveTo(SLING_X,SLING_Y+10);
ctx.lineTo(SLING_X-14,SLING_Y-8);
ctx.stroke();
// Fork right
ctx.beginPath();
ctx.moveTo(SLING_X,SLING_Y+10);
ctx.lineTo(SLING_X+14,SLING_Y-8);
ctx.stroke();
// Rubber bands
ctx.strokeStyle='#3a2010';
ctx.lineWidth=3;
if(isAiming&&aimEnd){
ctx.beginPath();
ctx.moveTo(SLING_X-14,SLING_Y-8);
ctx.lineTo(aimEnd.x,aimEnd.y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(SLING_X+14,SLING_Y-8);
ctx.lineTo(aimEnd.x,aimEnd.y);
ctx.stroke();
// Ball in pouch
drawBall(aimEnd.x,aimEnd.y,BALL_R);
}else if(GS==='aiming'&&ballsLeft>0){
ctx.beginPath();
ctx.moveTo(SLING_X-14,SLING_Y-8);
ctx.lineTo(SLING_X+14,SLING_Y-8);
ctx.stroke();
// Ball ready
drawBall(SLING_X,SLING_Y-12,BALL_R);
}
ctx.restore();
}

function drawTrajectory(){
var dx=aimStart.x-aimEnd.x;
var dy=aimStart.y-aimEnd.y;
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist<15)return;
var angle=Math.atan2(dy,dx);
var speed=dist*POWER_MULT;
var vx=Math.cos(angle)*speed;
var vy=Math.sin(angle)*speed;
var px=SLING_X,py=SLING_Y;
ctx.fillStyle='rgba(255,255,255,0.5)';
for(var i=0;i<40;i++){
px+=vx*0.03;
py+=vy*0.03;
vy+=GRAVITY*0.03;
if(py>GROUND_Y||px<0||px>VW)break;
if(i%2===0){
ctx.beginPath();
ctx.arc(px,py,3-i*0.05,0,Math.PI*2);
ctx.fill();
}
}
}

function drawBall(x,y,r){
ctx.save();
// Shadow
ctx.fillStyle='rgba(0,0,0,0.3)';
ctx.beginPath();
ctx.arc(x+2,y+2,r,0,Math.PI*2);
ctx.fill();
// Ball gradient
var grad=ctx.createRadialGradient(x-r*0.3,y-r*0.3,0,x,y,r);
grad.addColorStop(0,'#fff5cc');
grad.addColorStop(0.5,'#e8a040');
grad.addColorStop(1,'#c07020');
ctx.fillStyle=grad;
ctx.beginPath();
ctx.arc(x,y,r,0,Math.PI*2);
ctx.fill();
// Highlight
ctx.fillStyle='rgba(255,255,255,0.4)';
ctx.beginPath();
ctx.arc(x-r*0.35,y-r*0.35,r*0.3,0,Math.PI*2);
ctx.fill();
ctx.restore();
}

function drawBlock(blk){
if(blk.opacity<=0)return;
ctx.save();
ctx.globalAlpha=blk.opacity;
var cx=blk.x+blk.w/2,cy=blk.y+blk.h/2;
ctx.translate(cx,cy);
ctx.rotate(blk.rot);
var colors={
'T':['#e94560','#c81e45'],  // Target: red
'g':['#7ec8e3','#4a90a4'],  // Glass: light blue
'w':['#c19a6b','#8b6940'],  // Wood: brown
's':['#888888','#555555']   // Stone: gray
};
var c=colors[blk.type]||colors['w'];
var grad=ctx.createLinearGradient(-blk.w/2,-blk.h/2,blk.w/2,blk.h/2);
grad.addColorStop(0,c[0]);
grad.addColorStop(1,c[1]);
ctx.fillStyle=grad;
ctx.fillRect(-blk.w/2,-blk.h/2,blk.w,blk.h);
// Border
ctx.strokeStyle='rgba(0,0,0,0.3)';
ctx.lineWidth=2;
ctx.strokeRect(-blk.w/2,-blk.h/2,blk.w,blk.h);
// Target icon
if(blk.type==='T'){
ctx.fillStyle='rgba(255,255,255,0.9)';
ctx.beginPath();
ctx.arc(0,0,Math.min(blk.w,blk.h)*0.2,0,Math.PI*2);
ctx.fill();
ctx.fillStyle=c[1];
ctx.beginPath();
ctx.arc(0,0,Math.min(blk.w,blk.h)*0.1,0,Math.PI*2);
ctx.fill();
}
// Glass shine
if(blk.type==='g'){
ctx.fillStyle='rgba(255,255,255,0.2)';
ctx.fillRect(-blk.w/2+3,-blk.h/2+3,blk.w*0.3,blk.h-6);
}
// Wood grain
if(blk.type==='w'){
ctx.strokeStyle='rgba(0,0,0,0.15)';
ctx.lineWidth=1;
for(var i=1;i<3;i++){
ctx.beginPath();
ctx.moveTo(-blk.w/2,-blk.h/2+blk.h*i/3);
ctx.lineTo(blk.w/2,-blk.h/2+blk.h*i/3);
ctx.stroke();
}
}
// Stone texture
if(blk.type==='s'){
ctx.strokeStyle='rgba(0,0,0,0.2)';
ctx.lineWidth=1;
ctx.strokeRect(-blk.w/2+4,-blk.h/2+4,blk.w*0.4,blk.h*0.3);
}
ctx.restore();
}

// ============ AUDIO ============
function playSound(type){
if(!soundOn||!audioCtx)return;
var now=audioCtx.currentTime;
var osc=audioCtx.createOscillator();
var gain=audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
switch(type){
case'launch':
osc.type='sawtooth';
osc.frequency.setValueAtTime(200,now);
osc.frequency.exponentialRampToValueAtTime(80,now+0.15);
gain.gain.setValueAtTime(0.2,now);
gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);
osc.start(now);osc.stop(now+0.15);
break;
case'bounce':
osc.type='sine';
osc.frequency.setValueAtTime(150,now);
osc.frequency.exponentialRampToValueAtTime(80,now+0.08);
gain.gain.setValueAtTime(0.1,now);
gain.gain.exponentialRampToValueAtTime(0.001,now+0.08);
osc.start(now);osc.stop(now+0.08);
break;
case'glass':
osc.type='triangle';
osc.frequency.setValueAtTime(1200,now);
osc.frequency.exponentialRampToValueAtTime(600,now+0.2);
gain.gain.setValueAtTime(0.15,now);
gain.gain.exponentialRampToValueAtTime(0.001,now+0.2);
osc.start(now);osc.stop(now+0.2);
// Noise burst
var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.1,audioCtx.sampleRate);
var d=buf.getChannelData(0);
for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.02));
var noise=audioCtx.createBufferSource();
noise.buffer=buf;
var ng=audioCtx.createGain();
ng.gain.value=0.08;
noise.connect(ng);ng.connect(audioCtx.destination);
noise.start(now);
break;
case'wood':
osc.type='square';
osc.frequency.setValueAtTime(180,now);
osc.frequency.exponentialRampToValueAtTime(60,now+0.1);
gain.gain.setValueAtTime(0.12,now);
gain.gain.exponentialRampToValueAtTime(0.001,now+0.1);
osc.start(now);osc.stop(now+0.1);
break;
case'stone':
osc.type='sawtooth';
osc.frequency.setValueAtTime(100,now);
osc.frequency.exponentialRampToValueAtTime(50,now+0.15);
gain.gain.setValueAtTime(0.15,now);
gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);
osc.start(now);osc.stop(now+0.15);
break;
case'target':
osc.type='sine';
osc.frequency.setValueAtTime(800,now);
osc.frequency.exponentialRampToValueAtTime(400,now+0.15);
gain.gain.setValueAtTime(0.2,now);
gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);
osc.start(now);osc.stop(now+0.15);
break;
case'win':
// Win fanfare: 3 ascending notes
var notes=[523,659,784];
for(var n=0;n<notes.length;n++){
var o=audioCtx.createOscillator();
var g=audioCtx.createGain();
o.connect(g);g.connect(audioCtx.destination);
o.type='triangle';
o.frequency.value=notes[n];
var t=now+n*0.12;
g.gain.setValueAtTime(0.2,t);
g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
o.start(t);o.stop(t+0.2);
}
break;
}
}

function toggleSound(){
soundOn=!soundOn;
document.getElementById('vol-btn').textContent=soundOn?'\uD83D\uDD0A':'\uD83D\uDD07';
}

// ============ GAME LOOP ============
function loop(ts){
rafId=requestAnimationFrame(loop);
var dt=Math.min((ts-lastTime)/1000,0.05);
lastTime=ts;
if(GS==='flying'||GS==='aiming')update(dt);
else if(GS==='win'||GS==='lose'){
// Update particles + falling blocks even on win/lose
for(var i=particles.length-1;i>=0;i--){
var p=particles[i];
p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.life-=dt;
if(p.life<=0)particles.splice(i,1);
}
for(var i=blocks.length-1;i>=0;i--){
var blk=blocks[i];
if(blk.destroyed){blk.opacity-=dt*3;if(blk.opacity<=0)blocks.splice(i,1);continue;}
if(blk.falling){
blk.vy+=GRAVITY*dt;
blk.x+=blk.vx*dt;blk.y+=blk.vy*dt;blk.rot+=blk.vrot*dt;
if(blk.y>GROUND_Y+100||blk.x<-100||blk.x>VW+100){blk.destroyed=true;}
if(blk.y+blk.h>GROUND_Y&&blk.y<GROUND_Y+50){blk.y=GROUND_Y-blk.h;blk.vy*=-0.3;blk.vx*=0.7;blk.vrot*=0.5;}
}
}
}
render();
}

// ============ CLEANUP ============
function cleanup(){
if(rafId){cancelAnimationFrame(rafId);rafId=null;}
timers.forEach(function(id){clearInterval(id);});timers=[];
if(audioCtx){audioCtx.close().catch(function(){});audioCtx=null;}
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
else if(GS){lastTime=performance.now();rafId=requestAnimationFrame(loop);}
});

// ============ START ============
document.addEventListener('DOMContentLoaded',init);
</script>
