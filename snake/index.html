<style>

<body>
<div class="nav">
<a href="https://gamezipper.com">← Back</a>
<span>🎮 Snake Classic</span>
<span id="soundToggle"></span>
</div>
<canvas id="c"></canvas>
<div id="hud"><span>Score: <b id="sc">0</b></span><span>Best: <b id="bs">0</b></span></div>
<div id="dpad">
<div></div><button ontouchstart="setDir(0,-1);event.preventDefault()" onclick="setDir(0,-1)">▲</button><div></div>
<button ontouchstart="setDir(-1,0);event.preventDefault()" onclick="setDir(-1,0)">◀</button>
<button ontouchstart="setDir(0,1);event.preventDefault()" onclick="setDir(0,1)">▼</button>
<button ontouchstart="setDir(1,0);event.preventDefault()" onclick="setDir(1,0)">▶</button>
</div>
<script src="../game-audio.js?v=9"></script>
<script src="../sound-toggle.js?v=9"></script>
<script>
const GRID=25,canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let cellSize=20,W,H;
function resize(){
  const isMobile='ontouchstart'in window||window.innerWidth<600;
  document.getElementById('dpad').style.display=isMobile?'grid':'none';
  const maxW=Math.min(window.innerWidth-20,600),maxH=window.innerHeight-(isMobile?200:100);
  cellSize=Math.floor(Math.min(maxW,maxH)/GRID);
  W=canvas.width=GRID*cellSize;H=canvas.height=GRID*cellSize;
}
resize();window.addEventListener('resize',resize);

var score=0,bestScore=+(localStorage.getItem('snake_best')||0);
document.getElementById('bs').textContent=bestScore;
let snake=[{x:12,y:12}],dir={x:1,y:0},nextDir={x:1,y:0},food=null,specialFood=null,specialTimer=0;
let gameState='menu',speed=150,eaten=0,shakeTime=0,particles=[],scorePopups=[];

function playEat(){try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(440,ac.currentTime);o.frequency.exponentialRampToValueAtTime(880,ac.currentTime+0.1);g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);o.start();o.stop(ac.currentTime+0.15)}catch(e){}}
function playDie(){try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(300,ac.currentTime);o.frequency.exponentialRampToValueAtTime(50,ac.currentTime+0.5);g.gain.setValueAtTime(0.4,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5);o.start();o.stop(ac.currentTime+0.5)}catch(e){}}

function spawnParticles(x,y,color,count=15){
  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*10,
      vy:(Math.random()-0.5)*10-3,
      life:1,
      color,
      size:3+Math.random()*4
    });
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=0.03;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=scorePopups.length-1;i>=0;i--){
    const s=scorePopups[i];
    s.y-=1.5;s.life-=0.02;
    if(s.life<=0)scorePopups.splice(i,1);
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  for(const s of scorePopups){
    ctx.globalAlpha=s.life;
    ctx.fillStyle=s.color;
    ctx.font='bold 20px Arial';
    ctx.textAlign='center';
    ctx.fillText('+'+s.score,s.x,s.y);
  }
  ctx.globalAlpha=1;
}

function playEat(){try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(440,ac.currentTime);o.frequency.exponentialRampToValueAtTime(880,ac.currentTime+0.1);g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);o.start();o.stop(ac.currentTime+0.15)}catch(e){}}
function playDie(){try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(300,ac.currentTime);o.frequency.exponentialRampToValueAtTime(50,ac.currentTime+0.5);g.gain.setValueAtTime(0.4,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5);o.start();o.stop(ac.currentTime+0.5)}catch(e){}}

function spawnFood(){
  let pos;
  do{pos={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)}}
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food=pos;
  if(Math.random()<0.1&&!specialFood){
    let sp;
    do{sp={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)}}
    while(snake.some(s=>s.x===sp.x&&s.y===sp.y)||(sp.x===food.x&&sp.y===food.y));
    specialFood=sp;specialTimer=5000;
  }
}

function setDir(x,y){if(gameState==='menu'){startGame();return}if(x!==-dir.x||y!==-dir.y||(snake.length===1)){nextDir={x,y}}}

function startGame(){
  snake=[{x:12,y:12}];dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;speed=150;eaten=0;specialFood=null;
  document.getElementById('sc').textContent=0;
  spawnFood();gameState='play';lastTime=performance.now();loop();
}

let lastTime=0,accumulator=0;
function loop(){
  if(gameState!=='play')return;
  const now=performance.now(),dt=now-lastTime;lastTime=now;
  accumulator+=dt;
  if(specialFood){specialTimer-=dt;if(specialTimer<=0)specialFood=null;}
  while(accumulator>=speed){step();accumulator-=speed;if(gameState!=='play')return;}
  draw();requestAnimationFrame(loop);
}

function step(){
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameState='over';playDie();shakeTime=300;
    // 死亡粒子效果
    spawnParticles(head.x*cellSize+cellSize/2,head.y*cellSize+cellSize/2,'#ff4444',25);
    if(score>bestScore){bestScore=score;localStorage.setItem('snake_best',bestScore);document.getElementById('bs').textContent=bestScore;}
    drawGameOver();return;
  }
  snake.unshift(head);
  let ate=false;
  if(food&&head.x===food.x&&head.y===food.y){
    score+=10;ate=true;eaten++;
    // 吃食物粒子 + 分数飘字
    spawnParticles(food.x*cellSize+cellSize/2,food.y*cellSize+cellSize/2,'#ff4444',12);
    scorePopups.push({x:food.x*cellSize+cellSize/2,y:food.y*cellSize+cellSize/2,score:10,color:'#ff4444',life:1});
    if(eaten%5===0)speed=Math.max(60,speed-10);playEat();spawnFood();
  }
  else if(specialFood&&head.x===specialFood.x&&head.y===specialFood.y){
    score+=50;ate=true;
    // 吃特殊食物粒子 + 分数飘字
    spawnParticles(specialFood.x*cellSize+cellSize/2,specialFood.y*cellSize+cellSize/2,'#ffd700',18);
    scorePopups.push({x:specialFood.x*cellSize+cellSize/2,y:specialFood.y*cellSize+cellSize/2,score:50,color:'#ffd700',life:1});
    playEat();specialFood=null;
  }
  else{snake.pop();}
  document.getElementById('sc').textContent=score;
}

function draw(){
  const sx=shakeTime>0?(Math.random()-0.5)*8:0,sy=shakeTime>0?(Math.random()-0.5)*8:0;
  if(shakeTime>0)shakeTime-=16;
  ctx.save();ctx.translate(sx,sy);
  ctx.fillStyle='#0a1628';ctx.fillRect(0,0,W,H);
  // grid
  ctx.strokeStyle='#0f2040';ctx.lineWidth=0.5;
  for(let i=0;i<=GRID;i++){ctx.beginPath();ctx.moveTo(i*cellSize,0);ctx.lineTo(i*cellSize,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*cellSize);ctx.lineTo(W,i*cellSize);ctx.stroke();}
  // snake
  snake.forEach((s,i)=>{
    const t=snake.length>1?i/(snake.length-1):0;
    const r=Math.round(0+(0)*t),g=Math.round(255-(255-100)*t),b=Math.round(136-(136-50)*t);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    const pad=i===0?1:2;
    ctx.beginPath();
    const x=s.x*cellSize+pad,y=s.y*cellSize+pad,w=cellSize-pad*2,h=cellSize-pad*2,radius=4;
    ctx.moveTo(x+radius,y);ctx.arcTo(x+w,y,x+w,y+h,radius);ctx.arcTo(x+w,y+h,x,y+h,radius);ctx.arcTo(x,y+h,x,y,radius);ctx.arcTo(x,y,x+w,y,radius);ctx.fill();
    if(i===0){ctx.fillStyle='#fff';const cx=s.x*cellSize+cellSize/2+dir.x*3,cy=s.y*cellSize+cellSize/2+dir.y*3;ctx.beginPath();ctx.arc(cx-dir.y*3,cy+dir.x*3,2.5,0,Math.PI*2);ctx.arc(cx+dir.y*3,cy-dir.x*3,2.5,0,Math.PI*2);ctx.fill();}
  });
  // food
  if(food){ctx.fillStyle='#ff4444';ctx.shadowColor='#ff4444';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(food.x*cellSize+cellSize/2,food.y*cellSize+cellSize/2,cellSize/3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  if(specialFood){ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=15;ctx.font=`${cellSize-4}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⭐',specialFood.x*cellSize+cellSize/2,specialFood.y*cellSize+cellSize/2);ctx.shadowBlur=0;}
  // particles
  updateParticles();
  drawParticles();
  ctx.restore();
}

function drawGameOver(){
  draw();
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 36px Arial';ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2,H/2-40);
  ctx.font='24px Arial';ctx.fillText('Score: '+score,W/2,H/2);
  ctx.fillText('Best: '+bestScore,W/2,H/2+35);
  ctx.fillStyle='#00ff88';ctx.fillRect(W/2-70,H/2+60,140,44);
  ctx.fillStyle='#000';ctx.font='bold 18px Arial';ctx.fillText('PLAY AGAIN',W/2,H/2+87);
}

function drawMenu(){
  ctx.fillStyle='#0a1628';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#00ff88';ctx.font='bold 40px Arial';ctx.textAlign='center';
  ctx.fillText('🐍 SNAKE',W/2,H/2-40);
  ctx.fillStyle='#e0e0e0';ctx.font='20px Arial';
  ctx.fillText('Press ENTER or Tap to Start',W/2,H/2+20);
}
drawMenu();

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(gameState==='menu'||gameState==='over')){startGame();return;}
  if(gameState!=='play')return;
  switch(e.key){case'ArrowUp':setDir(0,-1);break;case'ArrowDown':setDir(0,1);break;case'ArrowLeft':setDir(-1,0);break;case'ArrowRight':setDir(1,0);break;}
});

canvas.addEventListener('click',e=>{
  if(gameState==='menu'){startGame();return;}
  if(gameState==='over'){
    const rect=canvas.getBoundingClientRect(),x=(e.clientX-rect.left)*(W/rect.width),y=(e.clientY-rect.top)*(H/rect.height);
    if(x>=W/2-70&&x<=W/2+70&&y>=H/2+60&&y<=H/2+104)startGame();
  }
});

// Swipe
let touchX=0,touchY=0;
canvas.addEventListener('touchstart',e=>{const t=e.touches[0];touchX=t.clientX;touchY=t.clientY;if(gameState==='menu'||gameState==='over')startGame();},{passive:true});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],dx=t.clientX-touchX,dy=t.clientY-touchY;if(Math.abs(dx)+Math.abs(dy)>20){if(Math.abs(dx)>Math.abs(dy))setDir(dx>0?1:-1,0);else setDir(0,dy>0?1:-1);touchX=t.clientX;touchY=t.clientY;}},{passive:false});
</script>
