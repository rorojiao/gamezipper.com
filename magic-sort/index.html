function precomputeSectionRowOffsets(cols) {
  const offsets = new Uint16Array(TOTAL_LEVELS);
  for (let i = 0; i < TOTAL_LEVELS; i++) {
    let rowOff = 0;
    for (let s = 0; s < DIFF_SECTIONS.length; s++) {
      if (DIFF_SECTIONS[s].start <= i) {
        const secRow = Math.floor(DIFF_SECTIONS[s].start / cols);
        const lvlRow = Math.floor(i / cols);
        rowOff += 28; // headerH
      } else break;
    }
    offsets[i] = rowOff;
  }
  return offsets;
}

function updateStreak() {
  const today = getToday();
  if (lastPlayDate === today) return; // already counted today
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (lastPlayDate === yesterday) {
    streakCount++;

}

function getDailyLevel() {
  const seed = getDailySeed();
  // Use a simple hash to pick a level from medium+ range (100+)
  let h = seed;
  h = ((h >> 16) ^ h) * 0x45d9f3b;
  h = ((h >> 16) ^ h) * 0x45d9f3b;
  h = (h >> 16) ^ h;
  const minLv = 100;

  dailyChallengeLevel = minLv + (Math.abs(h) % (maxLv - minLv + 1));

// ─── Persistent Storage ───
function loadSave() {
  try {
    const d = JSON.parse(localStorage.getItem("magicSort_v2") || "{}");
    levelStars = d.stars || {};
    bestMoves = d.bestMoves || {};
    levelUnlocked = d.unlocked || { 0: true };
    if (d.sfx !== undefined) sfxEnabled = d.sfx;
    if (d.lastPlayed !== undefined) lastPlayedLevel = d.lastPlayed;
    if (d.extraTubeUses !== undefined) extraTubeUses = d.extraTubeUses;
    if (d.streakCount !== undefined) streakCount = d.streakCount;
    if (d.lastPlayDate !== undefined) lastPlayDate = d.lastPlayDate;
    if (d.levelsToday !== undefined) levelsToday = d.levelsToday;
  } catch (e) { levelUnlocked = { 0: true }; }
}
function saveSave() {
  try {
    localStorage.setItem("magicSort_v2", JSON.stringify({ stars: levelStars, unlocked: levelUnlocked, sfx: sfxEnabled, lastPlayed: lastPlayedLevel, bestMoves: bestMoves, extraTubeUses: extraTubeUses, streakCount, lastPlayDate, levelsToday }));
  } catch (e) {}
}
loadSave();

// ─── Game Logic ───
function initLevel(idx) {
  currentLevel = idx;
  lastPlayedLevel = idx;
  saveSave();
  const lv = LEVELS[idx];
  numColors = lv.n;
  bottles = lv.b.map(b => [...b]); // deep copy
  selectedBottle = -1;
  moves = 0;
  undoStack = [];
  animating = false;
  stopSolve();
  sortedParticles = [];
  bubbles = [];
  bottleWobbles = [];
  bottleBounces = [];
  extraTubeUsed = 0;
  levelUsedHint = false;
  levelStartTime = Date.now();
  state = "game";
}

function addExtraTube() {
  if (animating || solving) return;
  if (extraTubeUsed >= MAX_EXTRA_TUBES) { sfxError(); return; }
  if (extraTubeUses <= 0) { sfxError(); return; }
  // Check if there's already an empty bottle we added
  const hasEmpty = bottles.some(b => b.length === 0);
  // Only add if useful (existing empty tubes are not from our power-up)
  bottles.push([]); // add empty bottle
  extraTubeUses--;
  extraTubeUsed++;
  undoStack.push({ type: 'extraTube' });
  sfxHint();
  // Trigger bounce on the new bottle
  bottleBounces[bottles.length - 1] = { scale: 1.15, velocity: 0 };
  // Vibrate on mobile
  if (navigator.vibrate) navigator.vibrate(30);
  saveSave();
}

function topColor(bi) {
  const b = bottles[bi];
  return b.length > 0 ? b[b.length - 1] : -1;
}

function isSorted(bi) {
  const b = bottles[bi];
  if (b.length < 4) return false;
  const c = b[0];
  for (let i = 1; i < b.length; i++) if (b[i] !== c) return false;
  return true;
}

function isWin() {
  for (let i = 0; i < bottles.length; i++) {
    if (bottles[i].length > 0 && !isSorted(i)) return false;
  }
  return true;
}

function canPour(from, to) {
  if (from === to || bottles[from].length === 0 || bottles[to].length >= 4) return false;
  // Prevent pouring from already-sorted bottles (QoL: protect completed work)
  if (isSorted(from)) return false;
  const fc = topColor(from), tc = topColor(to);
  if (tc === -1) return true;
  return fc === tc;
}

function executePour(from, to) {
  if (animating || !canPour(from, to)) {
    if (!canPour(from, to) && bottles[from].length > 0 && from !== to) sfxError();
    return;
  }
  const fc = topColor(from);
  let count = 0;
  for (let i = bottles[from].length - 1; i >= 0; i--) {
    if (bottles[from][i] === fc) count++;
    else break;
  }
  const space = 4 - bottles[to].length;
  const pourCount = Math.min(count, space);
  if (pourCount === 0) { sfxError(); return; }

  // Save for undo
  undoStack.push({ from, to, count: pourCount });

  // Start animation
  animating = true;
  anim.from = from;
  anim.to = to;
  anim.color = fc;
  anim.count = pourCount;
  anim.progress = 0;

  // Compute screen positions for the stream
  const layout = getBottleLayout();
  anim.startX = layout.cx[from];
  anim.startY = layout.topY[from];
  anim.endX = layout.cx[to];
  anim.endY = layout.topY[to] + (4 - bottles[to].length - pourCount) * layout.layerH;

  sfxPour();
}

function completePour() {
  for (let i = 0; i < anim.count; i++) {
    bottles[anim.from].pop();
    bottles[anim.to].push(anim.color);
  }
  moves++;
  animating = false;
  selectedBottle = -1;
  sfxDrop();

  // Trigger wobble on target bottle (liquid physics splash)
  bottleWobbles[anim.to] = { amp: 3.5 + anim.count * 1.8, freq: 12 + anim.count * 3, phase: 0, decay: 0.92 + Math.random() * 0.03 };

  // Trigger bounce on target bottle
  bottleBounces[anim.to] = { scale: 1.08, velocity: 0 };

  // Check if any bottle just became sorted
  if (!isWin()) {
    if (isSorted(anim.to) && bottles[anim.to].length === 4) sfxSorted();
  }

  if (isWin()) {
    stopSolve();
    state = "win";
    winTimer = Date.now();
    // Stars: based on moves vs numColors (scales with puzzle complexity)
    // Minimum moves ~ numColors * 4; 3* at ~25% overhead, 2* at ~100% overhead
    const threshold1 = numColors * 5; // excellent (3 stars)
    const threshold2 = numColors * 8; // good (2 stars)
    const stars = moves <= threshold1 ? 3 : moves <= threshold2 ? 2 : 1;
    if (!levelStars[currentLevel] || levelStars[currentLevel] < stars) {
      levelStars[currentLevel] = stars;
    }
    if (!bestMoves[currentLevel] || moves < bestMoves[currentLevel]) {
      bestMoves[currentLevel] = moves;
    }
    if (currentLevel + 1 < TOTAL_LEVELS) {
      levelUnlocked[currentLevel + 1] = true;
    }
    // Reward extra tube uses: 3-star gives +1, and every 10 levels gives +1
    let extraReward = 0;
    if (stars === 3) extraReward++;
    if ((currentLevel + 1) % 10 === 0) extraReward++;
    if (extraReward > 0) {
      extraTubeUses += extraReward;
    }
    saveSave();
    // Record daily challenge completion
    if (currentLevel === dailyChallengeLevel) {
      dailyCompleted[getDailySeed()] = { stars, moves };
      saveDailySave();
    }
    sfxWin();
    spawnConfetti();
    updateStreak();
    levelsToday++;
    // Achievement tracking
    if (!levelUsedHint) {
      window._noHintStreak = (window._noHintStreak || 0) + 1;
    } else {
      window._noHintStreak = 0;
    }
    if (levelStartTime > 0 && (Date.now() - levelStartTime) < 30000) {
      window._speedWins = (window._speedWins || 0) + 1;
    }
    checkAchievements();
    saveSave();
    // Dispatch custom event for interstitial ad system
    try {
      window.dispatchEvent(new CustomEvent("level-complete", { detail: { level: currentLevel, stars: stars, moves: moves } }));
    } catch(e) {}
  } else if (solving) {
    // Continue auto-solve after pour completes
    setTimeout(executeNextSolveMove, 100);
  }
}

function undoMove() {
  if (undoStack.length === 0 || animating) return;
  const u = undoStack.pop();
  if (u.type === 'extraTube') {
    // Undo extra tube: remove last bottle (must be empty)
    if (bottles.length > 0 && bottles[bottles.length - 1].length === 0) {
      bottles.pop();
      extraTubeUses++;
      extraTubeUsed--;
    }
    selectedBottle = -1;
    sfxClick();
    return;
  }
  const removed = [];
  for (let i = 0; i < u.count; i++) {
    removed.push(bottles[u.to].pop());
  }
  for (let i = removed.length - 1; i >= 0; i--) {
    bottles[u.from].push(removed[i]);
  }
  selectedBottle = -1;
  sfxClick();
}

// ─── BFS Hint Solver ───
function findHint() {
  // For complex puzzles (8+ colors), limit search to prevent UI freeze
  const maxStates = numColors >= 10 ? 15000 : numColors >= 8 ? 25000 : 50000;
  const timeLimit = numColors >= 8 ? 800 : 2000; // ms
  const startTime = performance.now();

  const state = bottles.map(b => [...b]);
  const n = state.length;
  const key = (s) => s.map(b => b.join(',')).join('|');
  const visited = new Set();
  visited.add(key(state));
  const queue = [{ state, moves: [] }];
  const maxDepth = numColors * 6; // generous depth limit based on colors
  let stateCount = 0;

  while (queue.length > 0 && stateCount < maxStates) {
    // Time guard: abort if taking too long to prevent UI freeze
    if (stateCount % 500 === 0 && performance.now() - startTime > timeLimit) return null;

    const { state: cur, moves } = queue.shift();
    stateCount++;
    if (moves.length >= maxDepth) continue;

    for (let from = 0; from < cur.length; from++) {
      for (let to = 0; to < cur.length; to++) {
        if (from === to || cur[from].length === 0 || cur[to].length >= 4) continue;
        const fc = cur[from][cur[from].length - 1];
        const tc = cur[to].length > 0 ? cur[to][cur[to].length - 1] : -1;
        if (tc !== -1 && tc !== fc) continue;

        // Don't pour single color to empty (pointless unless clearing)
        if (tc === -1 && cur[from].every(c => c === fc) && cur[to].length === 0) continue;

        // Execute move
        const next = cur.map(b => [...b]);
        const count = Math.min(
          [...next[from]].reverse().filter(c => c === fc).length,
          4 - next[to].length
        );
        for (let i = 0; i < count; i++) {
          next[from].pop();
          next[to].push(fc);
        }

        const k = key(next);
        if (visited.has(k)) continue;
        visited.add(k);

        const newMoves = [...moves, { from, to, count }];

        // Check if solved
        let solved = true;
        for (const b of next) {
          if (b.length > 0 && !(b.length === 4 && b.every(c => c === b[0]))) {
            solved = false;
            break;
          }
        }

        if (solved) return newMoves;

        queue.push({ state: next, moves: newMoves });
      }
    }
  }
  return null; // no solution found within limits
}

function showHint() {
  if (animating || solving) return;
  const moves = findHint();
  if (!moves || moves.length === 0) {
    sfxError();
    return;
  }
  hintMove = moves[0];
  hintActive = true;
  hintPhase = 0;
  hintTimer = Date.now();
  levelUsedHint = true;
  sfxHint();
}

function stopSolve() {
  solving = false;
  solveMoves = [];
  solveMoveIndex = 0;
  solveConfirm = false;
  hintActive = false;
  hintMove = null;
}

function startSolve() {
  if (animating) return;
  const allMoves = findHint();
  if (!allMoves || allMoves.length === 0) {
    sfxError();
    return;
  }
  solving = true;
  solveMoves = allMoves;
  solveMoveIndex = 0;
  solveConfirm = false;
  hintActive = false;
  hintMove = null;
  sfxHint();
  // Start first move after a short delay
  setTimeout(executeNextSolveMove, 400);
}

function executeNextSolveMove() {
  if (!solving || solveMoveIndex >= solveMoves.length) {
    stopSolve();
    return;
  }
  if (animating) {
    setTimeout(executeNextSolveMove, 100);
    return;
  }
  const move = solveMoves[solveMoveIndex];
  executePour(move.from, move.to);
  solveMoveIndex++;
}

// ─── Layout Calculator ───
function getBottleLayout() {
  const total = bottles.length;
  const cols = Math.min(total, Math.max(2, Math.floor(W / 76)));
  const rows = Math.ceil(total / cols);
  const bw = Math.min(58, (W - 30) / cols - 8);
  const bh = bw * 1.65;
  const layerH = (bh * 0.82) / 4;
  const gapX = (W - cols * bw) / (cols + 1);
  const gapY = Math.min(18, (H - 120 - rows * bh) / Math.max(rows, 1));
  const startY = 106;
  const cx = [], topY = [], cy = [];
  for (let i = 0; i < total; i++) {
    const c = i % cols, r = Math.floor(i / cols);
    cx[i] = gapX + c * (bw + gapX) + bw / 2;
    cy[i] = startY + r * (bh + gapY) + bh / 2;
    topY[i] = cy[i] - bh / 2 + bh * 0.08;
  }
  return { total, cols, rows, bw, bh, layerH, gapX, gapY, startY, cx, cy, topY };
}

// RENDERING
// ═══════════════════════════════════════════

function drawMiniStar(cx, cy, outerR, innerR, points) {
  X.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i * Math.PI / points) - Math.PI / 2;
    if (i === 0) X.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    else X.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
  }
  X.closePath();
}

function roundRect(x, y, w, h, r) {
  r = Math.max(0, Math.min(r, w / 2, h / 2));
  X.beginPath();
  X.moveTo(x + r, y);
  X.lineTo(x + w - r, y);
  X.arcTo(x + w, y, x + w, y + r, r);
  X.lineTo(x + w, y + h - r);
  X.arcTo(x + w, y + h, x + w - r, y + h, r);
  X.lineTo(x + r, y + h);
  X.arcTo(x, y + h, x, y + h - r, r);
  X.lineTo(x, y + r);
  X.arcTo(x, y, x + r, y, r);
  X.closePath();
}

function drawBackground() {
  const g = X.createLinearGradient(0, 0, W * 0.3, H);
  g.addColorStop(0, "#0a0a2e");
  g.addColorStop(0.4, "#141452");
  g.addColorStop(0.7, "#1a1a4e");
  g.addColorStop(1, "#0d0d35");
  X.fillStyle = g;
  X.fillRect(0, 0, W, H);

  const t = now * 0.001;

  // ── Constellation: draw lines between nearby particles ──
  const MAX_DIST = 120; // px; connect particles closer than this
  for (let i = 0; i < bgParticles.length; i++) {
    const pi = bgParticles[i];
    const pix = pi.x * W, piy = pi.y * H;
    for (let j = i + 1; j < bgParticles.length; j++) {
      const pj = bgParticles[j];
      const dx = pj.x * W - pix;
      const dy = pj.y * H - piy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MAX_DIST) {
        const alpha = (1 - dist / MAX_DIST) * 0.22;
        const hue = (pi.hue + pj.hue) / 2;
        X.strokeStyle = `hsla(${hue},60%,75%,${alpha})`;
        X.lineWidth = 0.8;
        X.beginPath();
        X.moveTo(pix, piy);
        X.lineTo(pj.x * W, pj.y * H);
        X.stroke();
      }
    }
  }

  // Floating particles
  for (const p of bgParticles) {
    const alpha = 0.25 + 0.2 * Math.sin(t * p.speed * 3 + p.phase);
    X.fillStyle = `hsla(${p.hue},60%,70%,${alpha})`;
    X.beginPath();
    X.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    X.fill();
  }

  // ── Difficulty-based nebula effect ──
  // More intense nebula for higher difficulty levels (more colors)
  if (numColors >= 6 && state === "game") {
    const nebulaIntensity = Math.min((numColors - 5) / 11, 1); // 0 at 5 colors, 1 at 16
    const nebulaCount = Math.floor(nebulaIntensity * 3); // 0-3 nebula blobs

    for (let n = 0; n < nebulaCount; n++) {
      const nx = W * (0.15 + n * 0.35) + Math.sin(t * 0.3 + n * 2.1) * 40;
      const ny = H * (0.3 + n * 0.2) + Math.cos(t * 0.25 + n * 1.7) * 30;
      const nr = 80 + nebulaIntensity * 100 + Math.sin(t * 0.5 + n) * 20;

      // Nebula colors based on difficulty tier
      const nebulaHues = [
        [270, 60, 50], // purple (Medium)
        [320, 55, 45], // magenta (Hard+)
        [200, 50, 40]  // cyan (Extreme+)
      ];
      const nc = nebulaHues[Math.min(n, nebulaHues.length - 1)];

      const ng = X.createRadialGradient(nx, ny, 0, nx, ny, nr);
      ng.addColorStop(0, `hsla(${nc[0]},${nc[1]}%,${nc[2]}%,${nebulaIntensity * 0.06})`);
      ng.addColorStop(0.5, `hsla(${nc[0]},${nc[1]}%,${nc[2]}%,${nebulaIntensity * 0.03})`);
      ng.addColorStop(1, `hsla(${nc[0]},${nc[1]}%,${nc[2]}%,0)`);
      X.fillStyle = ng;
      X.fillRect(0, 0, W, H);
    }
  }
}

// ─── Draw a single bottle ───
function drawBottle(cx, cy, bw, bh, bottle, isSelected, isPourSource, isPourTarget, pourColor, pourCount, isSorted, bottleIndex) {
  const neckW = bw * 0.36;
  const neckH = bh * 0.07;
  const bodyTop = cy - bh / 2 + neckH;
  const bodyBot = cy + bh / 2;
  const bodyH = bodyBot - bodyTop;
  const layerH = bodyH / 4;
  const rad = bw * 0.14;

  // ── Bottle bounce scale animation ──
  const bounce = bottleBounces[bottleIndex];
  let scaleX = 1, scaleY = 1;
  if (bounce) {
    scaleX = bounce.scale;
    // Squash/stretch: vertical inverse of horizontal for liquid feel
    scaleY = 1 + (1 - bounce.scale) * 0.6;
  }

  X.save();

  // Apply bounce transform
  if (scaleX !== 1 || scaleY !== 1) {
    X.translate(cx, cy);
    X.scale(scaleX, scaleY);
    X.translate(-cx, -cy);
  }

  // ── Bottom shadow (floating effect) ──
  X.save();
  const shadowGrad = X.createRadialGradient(cx, bodyBot + 6, 0, cx, bodyBot + 6, bw * 0.65);
  shadowGrad.addColorStop(0, "rgba(30,10,60,0.55)");
  shadowGrad.addColorStop(1, "rgba(30,10,60,0)");
  X.fillStyle = shadowGrad;
  X.beginPath();
  X.ellipse(cx, bodyBot + 6, bw * 0.65, bw * 0.18, 0, 0, Math.PI * 2);
  X.fill();
  X.restore();

  // ── Sorted glow ring + star particles ──
  if (isSorted && !animating) {
    const pulse = 0.5 + 0.5 * Math.sin(now * 0.004);
    // Outer glow ring
    X.save();
    X.shadowColor = `rgba(255,215,0,${0.6 + pulse * 0.4})`;
    X.shadowBlur = 20 + pulse * 15;
    X.strokeStyle = `rgba(255,215,0,${0.4 + pulse * 0.35})`;
    X.lineWidth = 2.5;
    X.beginPath();
    X.ellipse(cx, cy, bw * 0.62, bh * 0.48, 0, 0, Math.PI * 2);
    X.stroke();
    X.restore();
    // Inner green ring
    X.save();
    X.shadowColor = `rgba(46,213,115,${0.5 + pulse * 0.3})`;
    X.shadowBlur = 12 + pulse * 8;
    X.strokeStyle = `rgba(46,213,115,${0.3 + pulse * 0.25})`;
    X.lineWidth = 1.5;
    X.beginPath();
    X.ellipse(cx, cy, bw * 0.52, bh * 0.40, 0, 0, Math.PI * 2);
    X.stroke();
    X.restore();
    // Occasionally spawn star particles
    if (Math.random() < 0.06) {
      const angle = Math.random() * Math.PI * 2;
      const dist = bw * 0.3;
      sortedParticles.push({
        x: cx + Math.cos(angle) * dist,
        y: cy - bh * 0.35,
        vx: (Math.random() - 0.5) * 1.2,
        vy: -(Math.random() * 1.5 + 0.8),
        life: 1,
        size: Math.random() * 4 + 2
      });
    }
  }

  // ── Selection glow (pulsating + floating sparkles) ──
  if (isSelected) {
    const glowPulse = 0.5 + 0.5 * Math.sin(now * 0.006);
    X.save();
    X.shadowColor = `rgba(162,155,254,${0.4 + glowPulse * 0.4})`;
    X.shadowBlur = 18 + glowPulse * 14;
    // Floating sparkles orbiting selected bottle
    for (let si = 0; si < 8; si++) {
      const angle = (now * 0.002 + si * Math.PI / 4) % (Math.PI * 2);
      const dist = bw * 0.58 + Math.sin(now * 0.003 + si * 1.7) * 7;
      const sx = cx + Math.cos(angle) * dist;
      const sy = cy - bh * 0.05 + Math.sin(angle) * dist * 0.55;
      const sparkAlpha = 0.25 + 0.45 * Math.sin(now * 0.005 + si * 2.1);
      const sparkR = 1.2 + Math.sin(now * 0.004 + si) * 0.8;
      X.fillStyle = `rgba(200,195,255,${sparkAlpha})`;
      X.beginPath();
      X.arc(sx, sy, sparkR, 0, Math.PI * 2);
      X.fill();
    }
    X.restore();
  }

  // Build bottle path (for stroke + clip)
  function bottlePath() {
    X.beginPath();
    // Top left of neck
    X.moveTo(cx - neckW / 2, cy - bh / 2);
    X.lineTo(cx - neckW / 2, bodyTop);
    // Curve out to body
    X.quadraticCurveTo(cx - neckW / 2, bodyTop + rad, cx - bw / 2, bodyTop + rad);
    // Left side
    X.lineTo(cx - bw / 2, bodyBot - rad);
    // Bottom left curve
    X.quadraticCurveTo(cx - bw / 2, bodyBot, cx - bw / 2 + rad, bodyBot);
    // Bottom
    X.lineTo(cx + bw / 2 - rad, bodyBot);
    // Bottom right curve
    X.quadraticCurveTo(cx + bw / 2, bodyBot, cx + bw / 2, bodyBot - rad);
    // Right side
    X.lineTo(cx + bw / 2, bodyTop + rad);
    // Curve in to neck
    X.quadraticCurveTo(cx + neckW / 2, bodyTop + rad, cx + neckW / 2, bodyTop);
    X.lineTo(cx + neckW / 2, cy - bh / 2);
  }

  // Glass background
  bottlePath();
  X.fillStyle = "rgba(200,210,255,0.06)";
  X.fill();
  X.strokeStyle = isSelected ? "rgba(200,195,255,0.85)" : "rgba(200,210,255,0.22)";
  X.lineWidth = isSelected ? 2.5 : 1.8;
  X.stroke();
  X.shadowBlur = 0;

  // Draw water layers (clip to bottle)
  X.save();
  bottlePath();
  X.clip();

  const displayBottle = isPourSource
    ? bottle.slice(0, bottle.length - pourCount)
    : isPourTarget
    ? [...bottle, ...Array(pourCount).fill(pourColor)]
    : bottle;

  for (let i = 0; i < displayBottle.length; i++) {
    const ci = displayBottle[i];
    const col = COLORS[ci];
    const ly = bodyBot - (i + 1) * layerH;

    // Gradient fill
    const wg = X.createLinearGradient(cx - bw / 2, ly, cx + bw / 2, ly + layerH);
    wg.addColorStop(0, col.top);
    wg.addColorStop(0.45, col.mid);
    wg.addColorStop(1, col.bot);
    X.fillStyle = wg;

    const inset = 1;
    X.fillRect(cx - bw / 2 + inset, ly + inset, bw - inset * 2, layerH - inset);

    // Highlight stripe
    X.fillStyle = "rgba(255,255,255,0.14)";
    X.fillRect(cx - bw / 2 + 5, ly + 2, bw * 0.1, layerH - 4);

    // Enhanced wave on top layer (with wobble physics)
    if (i === displayBottle.length - 1) {
      const waveT = now * 0.004;
      const wobble = bottleWobbles[bottleIndex];
      const wobbleAmp = wobble ? wobble.amp * Math.sin(wobble.phase) : 0;
      const amp = 2.5 + wobbleAmp;
      X.fillStyle = col.top;
      X.beginPath();
      X.moveTo(cx - bw / 2, ly);
      for (let wx = 0; wx <= bw; wx += 4) {
        const wobbleOffset = wobble ? wobble.amp * 0.5 * Math.sin(wobble.phase * 1.3 + wx * 0.08) : 0;
        X.lineTo(cx - bw / 2 + wx, ly + Math.sin(waveT + wx * 0.15) * amp + wobbleOffset);
      }
      X.lineTo(cx + bw / 2, ly + layerH);
      X.lineTo(cx - bw / 2, ly + layerH);
      X.closePath();
      // Subtle highlight wave
      X.fillStyle = `rgba(255,255,255,0.10)`;
      X.fill();
      // Specular highlight on wave crest
      X.fillStyle = `rgba(255,255,255,${0.12 + 0.04 * Math.sin(waveT * 1.3)})`;
      X.beginPath();
      X.moveTo(cx - bw / 2, ly);
      for (let wx = 0; wx <= bw; wx += 3) {
        const wobbleOffset = wobble ? wobble.amp * 0.5 * Math.sin(wobble.phase * 1.3 + wx * 0.08) : 0;
        const wy = ly + Math.sin(waveT + wx * 0.15) * amp + wobbleOffset;
        X.lineTo(cx - bw / 2 + wx, wy);
      }
      for (let wx = bw; wx >= 0; wx -= 3) {
        const wobbleOffset = wobble ? wobble.amp * 0.5 * Math.sin(wobble.phase * 1.3 + wx * 0.08) : 0;
        const wy = ly + Math.sin(waveT + wx * 0.15) * amp + wobbleOffset + 2;
        X.lineTo(cx - bw / 2 + wx, wy);
      }
      X.closePath();
      X.fill();

      // ── Wobble splash droplets on water surface ──
      if (wobble && wobble.amp > 1) {
        const splashAlpha = Math.min(wobble.amp / 8, 0.5);
        for (let sd = 0; sd < 3; sd++) {
          const sdAngle = wobble.phase * 1.5 + sd * 2.1;
          const sdDist = wobble.amp * 1.5 + sd * 3;
          const sdx = cx + Math.cos(sdAngle) * sdDist;
          const sdy = ly + Math.sin(sdAngle * 0.7) * wobble.amp * 0.4 - Math.abs(wobble.amp - 3) * 0.3;
          X.fillStyle = col.top;
          X.globalAlpha = splashAlpha * (1 - sd * 0.3);
          X.beginPath();
          X.arc(sdx, sdy, 1.5 - sd * 0.3, 0, Math.PI * 2);
          X.fill();
        }
        X.globalAlpha = 1;
      }
    }
  }
  X.restore();

  // ── Enhanced glass reflections (outside clip) ──
  // Primary curved highlight arc (left side)
  X.save();
  X.fillStyle = "rgba(255,255,255,0.10)";
  X.beginPath();
  X.ellipse(cx - bw / 2 + 5, bodyTop + bodyH * 0.35, 2.5, bodyH * 0.32, 0.12, 0, Math.PI * 2);
  X.fill();
  // Secondary thinner highlight
  X.fillStyle = "rgba(255,255,255,0.06)";
  X.beginPath();
  X.ellipse(cx - bw / 2 + 8, bodyTop + bodyH * 0.55, 1.5, bodyH * 0.2, 0.08, 0, Math.PI * 2);
  X.fill();
  // Right-side subtle reflection
  X.fillStyle = "rgba(255,255,255,0.04)";
  X.beginPath();
  X.ellipse(cx + bw / 2 - 6, bodyTop + bodyH * 0.25, 1.5, bodyH * 0.18, -0.1, 0, Math.PI * 2);
  X.fill();
  X.restore();

  // ── Surface bubbles (drawn on top of water) ──
  if (bottle.length > 0) {
    const surfY = bodyBot - bottle.length * layerH;
    for (const b of bubbles) {
      if (Math.abs(b.bx - cx) < bw / 2 && b.by > surfY - 2 && b.by < bodyBot) {
        X.save();
        X.globalAlpha = b.alpha;
        X.fillStyle = "rgba(255,255,255,0.7)";
        X.beginPath();
        X.arc(b.bx, b.by, b.size, 0, Math.PI * 2);
        X.fill();
        // Bubble highlight
        X.fillStyle = "rgba(255,255,255,0.9)";
        X.beginPath();
        X.arc(b.bx - b.size * 0.3, b.by - b.size * 0.3, b.size * 0.35, 0, Math.PI * 2);
        X.fill();
        X.restore();
      }
    }
  }

  // ── Animated selected glow ──
  if (isSelected) {
    const pulse = 0.5 + 0.5 * Math.sin(now * 0.006);
    X.save();
    X.shadowColor = `rgba(162,155,254,${0.5 + pulse * 0.4})`;
    X.shadowBlur = 15 + pulse * 12;
    bottlePath();
    X.strokeStyle = `rgba(162,155,254,${0.4 + pulse * 0.35})`;
    X.lineWidth = 2.5;
    X.stroke();
    X.restore();
    // Inner glow
    X.save();
    X.shadowColor = `rgba(108,92,231,${0.3 + pulse * 0.3})`;
    X.shadowBlur = 8 + pulse * 6;
    bottlePath();
    X.strokeStyle = `rgba(200,195,255,${0.25 + pulse * 0.2})`;
    X.lineWidth = 1;
    X.stroke();
    X.restore();
  }

  // Rim (single, enhanced)
  X.strokeStyle = isSelected ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.18)";
  X.lineWidth = isSelected ? 2 : 1.5;
  X.beginPath();
  X.moveTo(cx - neckW / 2 - 2, cy - bh / 2);
  X.lineTo(cx + neckW / 2 + 2, cy - bh / 2);
  X.stroke();
  // Rim glow when selected
  if (isSelected) {
    X.save();
    X.shadowColor = "rgba(162,155,254,0.6)";
    X.shadowBlur = 8;
    X.strokeStyle = "rgba(200,195,255,0.5)";
    X.lineWidth = 1;
    X.beginPath();
    X.moveTo(cx - neckW / 2 - 2, cy - bh / 2);
    X.lineTo(cx + neckW / 2 + 2, cy - bh / 2);
    X.stroke();
    X.restore();
  }

  X.restore();
}

function drawSortedBadge(cx, cy, bh) {
  X.save();
  X.fillStyle = "rgba(46,213,115,0.9)";
  X.font = "bold " + Math.round(bh * 0.2) + "px sans-serif";
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText("OK", cx, cy - bh / 2 - 12);
  X.restore();
}

// ─── Draw pour stream animation ───
function drawPourStream() {
  if (!animating) return;
  const t = anim.progress;
  const col = COLORS[anim.color];
  const layout = getBottleLayout();
  const sx = layout.cx[anim.from];
  const sy = layout.topY[anim.from];
  const dx = layout.cx[anim.to];
  const dy = layout.topY[anim.to] + (4 - bottles[anim.to].length) * layout.layerH;

  X.save();

  // ─── Main stream (wide, tapered) ───
  X.globalAlpha = 0.88;
  const streamW = layout.bw * 0.28;
  const midY = (sy + dy) / 2;
  const wave = Math.sin(now * 0.012) * 5;

  const sg = X.createLinearGradient(sx, sy, dx, dy);
  sg.addColorStop(0, col.top);
  sg.addColorStop(0.5, col.mid);
  sg.addColorStop(1, col.top);
  X.strokeStyle = sg;
  X.lineCap = "round";

  // Draw 3 overlapping strokes for a liquid-volume look
  for (let layer = 0; layer < 3; layer++) {
    const w = streamW * (1 - layer * 0.22);
    const alpha = 0.9 - layer * 0.2;
    X.globalAlpha = alpha;
    X.lineWidth = w;
    X.beginPath();
    X.moveTo(sx, sy - t * 20);
    const waveOff = wave * (1 + layer * 0.3);
    X.bezierCurveTo(sx + waveOff, midY - 25, dx - waveOff, midY + 25, dx, dy);
    X.stroke();
  }

  // Glow on main stream
  X.globalAlpha = 0.5;
  X.lineWidth = streamW * 1.4;
  X.shadowColor = col.glow;
  X.shadowBlur = 16;
  X.strokeStyle = col.glow;
  X.beginPath();
  X.moveTo(sx, sy - t * 20);
  X.bezierCurveTo(sx + wave, midY - 25, dx - wave, midY + 25, dx, dy);
  X.stroke();
  X.shadowBlur = 0;

  // ─── Drip particles (more, varied sizes) ───
  for (let d = 0; d < 8; d++) {
    const dp = (t * 1.8 + d * 0.15) % 1;
    const px = sx + (dx - sx) * dp + Math.sin(dp * 14 + d * 1.3) * 8;
    const py = sy + (dy - sy) * dp + Math.cos(dp * 10 + d) * 4;
    const dr = 1.5 + Math.sin(d * 2.7) * 1.2;
    X.fillStyle = d % 2 === 0 ? col.top : col.mid;
    X.globalAlpha = 0.5 * (1 - dp);
    X.beginPath();
    X.arc(px, py, dr, 0, Math.PI * 2);
    X.fill();
  }

  // ─── Splash at target ───
  if (t > 0.3) {
    const splashT = (t - 0.3) / 0.7;
    const splashAlpha = 0.6 * (1 - splashT * 0.5);
    for (let sp = 0; sp < 6; sp++) {
      const sAngle = (sp / 6) * Math.PI - Math.PI * 0.5 + Math.sin(now * 0.01 + sp) * 0.3;
      const sDist = 6 + splashT * 18 + Math.sin(sp * 1.5) * 5;
      const spx = dx + Math.cos(sAngle) * sDist;
      const spy = dy - Math.abs(Math.sin(sAngle)) * sDist * 0.6;
      const spr = 2 - splashT * 1.2;
      X.fillStyle = sp % 2 === 0 ? col.top : col.mid;
      X.globalAlpha = splashAlpha * (1 - splashT * 0.6);
      X.beginPath();
      X.arc(spx, spy, Math.max(0.5, spr), 0, Math.PI * 2);
      X.fill();
    }
    // Splash ring
    X.globalAlpha = 0.15 * (1 - splashT);
    X.strokeStyle = col.top;
    X.lineWidth = 1.5;
    X.beginPath();
    X.ellipse(dx, dy, splashT * 16, splashT * 6, 0, 0, Math.PI * 2);
    X.stroke();
  }

  X.restore();
}

// ─── UI Button ───
function drawButton(x, y, w, h, text, isHover, primary) {
  X.save();
  const g = X.createLinearGradient(x, y, x, y + h);
  if (primary) {
    g.addColorStop(0, isHover ? "#7c5ce7" : "#6c5ce7");
    g.addColorStop(1, isHover ? "#5a3cc4" : "#4a3ab5");
  } else {
    g.addColorStop(0, isHover ? "rgba(255,255,255,0.16)" : "rgba(255,255,255,0.08)");
    g.addColorStop(1, isHover ? "rgba(255,255,255,0.10)" : "rgba(255,255,255,0.04)");
  }
  roundRect(x, y, w, h, h * 0.3);
  X.fillStyle = g;
  X.fill();
  X.strokeStyle = primary ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.1)";
  X.lineWidth = 1.2;
  X.stroke();

  X.fillStyle = primary ? "#fff" : "rgba(255,255,255,0.85)";
  const fontSize = Math.round(Math.min(h * 0.4, 18));
  X.font = `700 ${fontSize}px 'Nunito','Baloo 2',sans-serif`;
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText(text, x + w / 2, y + h / 2 + 1);
  X.restore();
}

function hitTest(x, y, bx, by, bw, bh) {
  return x >= bx && x <= bx + bw && y >= by && y <= by + bh;
}

// ─── Stars ───
function drawStars(cx, cy, size, count) {
  for (let i = 0; i < 3; i++) {
    X.save();
    X.translate(cx + i * (size * 1.4), cy);
    X.fillStyle = i < count ? "#ffd32a" : "rgba(255,255,255,0.12)";
    drawStarShape(0, 0, size, size * 0.42);
    X.restore();
  }
}

function drawStarShape(cx, cy, outer, inner) {
  X.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = -Math.PI / 2 + i * Math.PI * 2 / 5;
    const a2 = a1 + Math.PI / 5;
    X.lineTo(cx + Math.cos(a1) * outer, cy + Math.sin(a1) * outer);
    X.lineTo(cx + Math.cos(a2) * inner, cy + Math.sin(a2) * inner);
  }
  X.closePath();
  X.fill();
}

function renderSplash() {
  drawBackground();
  splashTimer += 0.016;
  const t = Math.min(splashTimer / 1.2, 1);
  const ease = 1 - Math.pow(1 - t, 3);

  X.save();
  X.globalAlpha = ease;

  // Animated water drop icon
  const dropY = H * 0.28 - ease * 15;
  const dropBob = Math.sin(now * 0.003) * 4;

  // Glow behind drop
  const dg = X.createRadialGradient(W / 2, dropY + dropBob, 5, W / 2, dropY + dropBob, 50);
  dg.addColorStop(0, "rgba(108,92,231,0.4)");
  dg.addColorStop(1, "rgba(108,92,231,0)");
  X.fillStyle = dg;
  X.fillRect(W / 2 - 60, dropY - 60, 120, 120);

  // Drop shape
  X.fillStyle = "#6c5ce7";
  X.beginPath();
  X.moveTo(W / 2, dropY - 22 + dropBob);
  X.bezierCurveTo(W / 2 - 18, dropY + 5 + dropBob, W / 2 - 22, dropY + 20 + dropBob, W / 2, dropY + 22 + dropBob);
  X.bezierCurveTo(W / 2 + 22, dropY + 20 + dropBob, W / 2 + 18, dropY + 5 + dropBob, W / 2, dropY - 22 + dropBob);
  X.fill();
  // Shine
  X.fillStyle = "rgba(255,255,255,0.25)";
  X.beginPath();
  X.ellipse(W / 2 - 6, dropY + 2 + dropBob, 4, 7, -0.3, 0, Math.PI * 2);
  X.fill();

  // Mini colored drops around
  const miniColors = [COLORS[0].top, COLORS[1].top, COLORS[2].top, COLORS[3].top];
  for (let i = 0; i < 4; i++) {
    const angle = now * 0.001 + i * Math.PI / 2;
    const mx = W / 2 + Math.cos(angle) * 55;
    const my = dropY + dropBob + Math.sin(angle) * 25;
    X.fillStyle = miniColors[i];
    X.globalAlpha = ease * 0.6;
    X.beginPath();
    X.arc(mx, my, 5, 0, Math.PI * 2);
    X.fill();
  }
  X.globalAlpha = ease;

  // Title
  const titleSize = Math.round(Math.min(W * 0.13, 54));
  X.fillStyle = "#fff";
  X.font = `800 ${titleSize}px 'Baloo 2','Nunito',sans-serif`;
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.shadowColor = "rgba(108,92,231,0.5)";
  X.shadowBlur = 25;
  X.fillText("Magic Sort", W / 2, H * 0.42);
  X.shadowBlur = 0;

  X.fillStyle = "rgba(255,255,255,0.55)";
  X.font = `600 ${Math.round(Math.min(W * 0.038, 17))}px 'Nunito',sans-serif`;
  X.fillText("Water Color Sorting Puzzle", W / 2, H * 0.42 + titleSize * 0.6);

  // Play button
  if (t >= 0.7) {
    const bt = Math.min((t - 0.7) / 0.3, 1);
    X.globalAlpha = bt;
    const bw = Math.min(200, W * 0.55), bh = 50;
    const bx = W / 2 - bw / 2, by = H * 0.58;
    drawButton(bx, by, bw, bh, "▶  PLAY", hoverBtn === 0, true);

    // Continue button (if player has played before)
    let nextBtnY = by + bh + 12;
    if (lastPlayedLevel > 0) {
      const contW = Math.min(200, W * 0.55);
      drawButton(W / 2 - contW / 2, nextBtnY, contW, 42, "⏩  Continue Lv." + (lastPlayedLevel + 1), hoverBtn === 1, false);
      nextBtnY += 42 + 10;
    }

    // Daily Challenge button
    const dailyDone = isDailyDone();
    const dailyW = Math.min(200, W * 0.55);
    drawButton(W / 2 - dailyW / 2, nextBtnY, dailyW, 42, (dailyDone ? "✅ " : "🔥 ") + "Daily Challenge", hoverBtn === 2, true);

    // Stats summary line on splash
    const splashCompleted = Object.keys(levelStars).length;
    if (splashCompleted > 0) {
      const splashTotalStars = Object.values(levelStars).reduce((a, b) => a + b, 0);
      X.fillStyle = "rgba(255,255,255,0.3)";
      X.font = "500 11px 'Nunito',sans-serif";
      X.fillText(splashTotalStars + " ★  |  " + splashCompleted + "/" + TOTAL_LEVELS + " levels  |  Tubes: " + extraTubeUses + (streakCount >= 2 ? "  |  🔥" + streakCount + " streak" : ""), W / 2, nextBtnY + 58);
    }
  }


  // Footer — clickable link to GameZipper home
  X.globalAlpha = 0.35;
  X.fillStyle = "#fff";
  X.font = "400 12px 'Nunito',sans-serif";
  X.fillText("GameZipper.com", W / 2, H - 25);
  // Store footer link hit area for click detection
  splashFooterLink = { x: W / 2 - 50, y: H - 37, w: 100, h: 24 };
  X.restore();
}

  X.textBaseline = "middle";

  const totalStars = Object.values(levelStars).reduce((a, b) => a + b, 0);
  const maxStars = TOTAL_LEVELS * 3;
  const achieved = Object.keys(earnedAchievements).length;
  X.fillStyle = "rgba(255,255,255,0.45)";
  X.font = "600 11px 'Nunito',sans-serif";
  X.textAlign = "center";
  X.fillText(`Stars ${totalStars}/${maxStars}  |  Done ${completedCount}/${TOTAL_LEVELS}  |  🏅${achieved}/${ACHIEVEMENTS.length}`, W / 2, 52);

  // Mini progress bar
  const barW = Math.min(160, W * 0.45);
  const barH = 4;
  const barX = (W - barW) / 2;
  const barY = 60;
  roundRect(barX, barY, barW, barH, 2);
  X.fillStyle = "rgba(255,255,255,0.1)";
  X.fill();
  if (completedCount > 0) {
    const progress = Math.min(completedCount / TOTAL_LEVELS, 1);
    roundRect(barX, barY, barW * progress, barH, 2);
    const pg = X.createLinearGradient(barX, barY, barX + barW * progress, barY);
    pg.addColorStop(0, "#6c5ce7");
    pg.addColorStop(1, "#a55eea");
    X.fillStyle = pg;
    X.fill();
  }

  // Back button → GameZipper home
  drawButton(12, 8, 90, 30, "← Home", hoverBtn === 100, false);

  // Jump to level button
  drawButton(W - 78, 8, 66, 30, "Jump", hoverBtn === 101, true);

  // Grid
  const cols = Math.min(5, Math.floor((W - 30) / 68));
  const gap = 8;
  const cellW = (W - 24 - (cols - 1) * gap) / cols;
  const cellH = cellW;
  const headerH = 28; // space for difficulty section headers
  const gridTop = 70 - menuScrollY;

  // Track which section headers have been drawn (to avoid duplicates in same viewport)
  const drawnSections = new Set();

  // Use precomputed section offsets (invalidate on cols change)
  if (cols !== menuCachedCols) {
    menuCachedCols = cols;
    menuSectionOffsets = precomputeSectionRowOffsets(cols);
  }
  const secOffsets = menuSectionOffsets;

  // Viewport culling: compute visible row range
  const viewTop = 60;
  const viewBot = H + 50; // extra margin for section headers
  // Estimate first visible level: gridTop + row*(cellH+gap) + secOffset >= viewTop
  // Since secOffsets grow monotonically, we can binary search
  let startI = 0, endI = TOTAL_LEVELS;
  for (let i = 0; i < TOTAL_LEVELS; i++) {
    const row = Math.floor(i / cols);
    const y = gridTop + row * (cellH + gap) + secOffsets[i];
    if (y + cellH >= viewTop) { startI = Math.max(0, i - cols * 2); break; }
  }
  for (let i = TOTAL_LEVELS - 1; i >= 0; i--) {
    const row = Math.floor(i / cols);
    const y = gridTop + row * (cellH + gap) + secOffsets[i];
    if (y <= viewBot) { endI = Math.min(TOTAL_LEVELS, i + cols * 2); break; }
  }

  for (let i = startI; i < endI; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const x = 12 + col * (cellW + gap);
    const rowOffset = secOffsets[i];

    // Check if this is the first level of a new difficulty section
    const section = DIFF_SECTIONS.find(s => s.start === i);
    if (section && !drawnSections.has(i)) {
      drawnSections.add(i);
      const sy = gridTop + row * (cellH + gap) + headerH;
      if (sy > 50 && sy < H) {
        X.fillStyle = section.color;
        X.font = "700 13px 'Nunito',sans-serif";
        X.textAlign = "left";
        X.textBaseline = "middle";
        // Calculate section completion
        const secEndIdx = DIFF_SECTIONS[DIFF_SECTIONS.indexOf(section) + 1] ? DIFF_SECTIONS[DIFF_SECTIONS.indexOf(section) + 1].start : TOTAL_LEVELS;
        let secDone = 0;
        for (let si = section.start; si < secEndIdx; si++) { if (levelStars[si]) secDone++; }
        const secPctMenu = Math.round(secDone / Math.max(1, secEndIdx - section.start) * 100);
        X.fillText(section.label + " (" + (i + 1) + "-" + secEndIdx + ")" + (secPctMenu > 0 ? " " + secPctMenu + "%" : ""), 14, sy + headerH / 2);
        // Divider line
        X.strokeStyle = section.color + "33";
        X.lineWidth = 1;
        X.beginPath();
        X.moveTo(14, sy + headerH - 2);
        X.lineTo(W - 14, sy + headerH - 2);
        X.stroke();
      }
    }

    const y = gridTop + row * (cellH + gap) + rowOffset;
    if (y + cellH < 60 || y > H) continue;

    const unlocked = !!levelUnlocked[i];
    const stars = levelStars[i] || 0;

    // Cell (use flat colors instead of gradient per cell for performance)
    if (unlocked) {
      X.fillStyle = "rgba(108,92,231,0.18)";
    } else {
      X.fillStyle = "rgba(255,255,255,0.03)";
    }
    roundRect(x, y, cellW, cellH, 10);
    X.fill();
    X.strokeStyle = unlocked ? "rgba(108,92,231,0.45)" : "rgba(255,255,255,0.06)";
    X.lineWidth = 1.3;
    X.stroke();

    // Level number
    X.fillStyle = unlocked ? "#fff" : "rgba(255,255,255,0.2)";
    X.font = `700 ${Math.round(cellW * 0.3)}px 'Nunito',sans-serif`;
    X.textAlign = "center";
    X.textBaseline = "middle";
    const textY = y + cellH / 2 - (stars > 0 ? 8 : 0);
    X.fillText(unlocked ? (i + 1).toString() : "X", x + cellW / 2, textY);

    // Stars
    if (stars > 0) {
      drawStars(x + cellW / 2 - cellW * 0.28, y + cellH * 0.68, cellW * 0.12, stars);
    }
  }

  const totalRows = Math.ceil(TOTAL_LEVELS / cols);
  // Account for section header height in scroll area
  const sectionCount = DIFF_SECTIONS.filter(s => s.start < TOTAL_LEVELS).length;
  const headerRows = Math.ceil(sectionCount * headerH / (cellH + gap));
  menuMaxScroll = Math.max(0, (totalRows + headerRows) * (cellH + gap) + 80 - H + 10);

  // Jump dialog overlay
  if (jumpDialogOpen) renderJumpDialog();
}

function renderJumpDialog() {
  // Dim overlay
  X.fillStyle = "rgba(5,5,30,0.75)";
  X.fillRect(0, 0, W, H);

  const dw = Math.min(300, W * 0.85);
  const dh = 340;
  const dx = (W - dw) / 2;
  const dy = (H - dh) / 2;

  // Card
  X.save();
  X.shadowColor = "rgba(108,92,231,0.4)";
  X.shadowBlur = 30;
  roundRect(dx, dy, dw, dh, 16);
  X.fillStyle = "rgba(18,18,55,0.97)";
  X.fill();
  X.shadowBlur = 0;
  X.strokeStyle = "rgba(108,92,231,0.5)";
  X.lineWidth = 1.5;
  X.stroke();
  X.restore();

  // Title
  X.fillStyle = "#fff";
  X.font = "700 18px 'Baloo 2','Nunito',sans-serif";
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText("Jump to Level", W / 2, dy + 28);

  // Input field
  const inputW = 180, inputH = 44;
  const inputX = (W - inputW) / 2;
  const inputY = dy + 50;
  roundRect(inputX, inputY, inputW, inputH, 10);
  X.fillStyle = "rgba(255,255,255,0.08)";
  X.fill();
  X.strokeStyle = "rgba(108,92,231,0.6)";
  X.lineWidth = 1.5;
  X.stroke();

  // Input text with blinking cursor
  const displayText = jumpInput + (Math.floor(now / 500) % 2 === 0 ? "|" : "");
  X.fillStyle = jumpInput ? "#fff" : "rgba(255,255,255,0.3)";
  X.font = "700 22px 'Nunito',sans-serif";
  X.fillText(jumpInput ? displayText : "Enter level #", W / 2, inputY + inputH / 2);

  // Hint text
  X.fillStyle = "rgba(255,255,255,0.35)";
  X.font = "400 11px 'Nunito',sans-serif";
  X.fillText(`1 – ${TOTAL_LEVELS}  (unlocked: ${Object.keys(levelUnlocked).length})`, W / 2, inputY + inputH + 16);

  // Numpad (4 cols: 1-9, ⌫, 0, Go)
  const numPadTop = inputY + inputH + 30;
  const numPadLeft = dx + 16;
  const numPadW = dw - 32;
  const keySize = (numPadW - 10 * 2) / 3; // 3 columns with 10px gaps
  const keyH = 38;

  const keys = ["1","2","3","4","5","6","7","8","9","⌫","0","▶"];
  for (let i = 0; i < 12; i++) {
    const col = i % 3;
    const row = Math.floor(i / 3);
    const kx = numPadLeft + col * (keySize + 10);
    const ky = numPadTop + row * (keyH + 8);

    // Style special keys
    const isSpecial = keys[i] === "⌫" || keys[i] === "▶";
    if (isSpecial) {
      roundRect(kx, ky, keySize, keyH, 8);
      X.fillStyle = keys[i] === "▶" ? "rgba(108,92,231,0.35)" : "rgba(255,255,255,0.08)";
      X.fill();
      X.strokeStyle = keys[i] === "▶" ? "rgba(108,92,231,0.5)" : "rgba(255,255,255,0.15)";
      X.lineWidth = 1;
      X.stroke();
    } else {
      roundRect(kx, ky, keySize, keyH, 8);
      X.fillStyle = "rgba(255,255,255,0.06)";
      X.fill();
      X.strokeStyle = "rgba(255,255,255,0.12)";
      X.lineWidth = 1;
      X.stroke();
    }

    X.fillStyle = isSpecial ? "#fff" : "rgba(255,255,255,0.85)";
    X.font = `${isSpecial ? 700 : 600} 16px 'Nunito',sans-serif`;
    X.fillText(keys[i], kx + keySize / 2, ky + keyH / 2);
  }

  // Cancel text button at bottom
  X.fillStyle = "rgba(255,255,255,0.4)";
  X.font = "600 13px 'Nunito',sans-serif";
  X.fillText("Cancel", W / 2, dy + dh - 16);
}

function renderGame() {
  drawBackground();

  const layout = getBottleLayout();

  // HUD top bar
  // GameZipper home link (small)
  drawButton(10, 10, 28, 28, "Home", hoverBtn === 13, false);
  X.fillStyle = "rgba(255,255,255,0.9)";
  X.font = "700 15px 'Nunito',sans-serif";
  X.textAlign = "left";
  X.textBaseline = "top";
  X.fillText("Level " + (currentLevel + 1) + (streakCount >= 2 ? " 🔥" + streakCount : ""), 44, 14);
  // Difficulty badge
  const diffSec = DIFF_SECTIONS.filter(s => s.start <= currentLevel).pop();
  if (diffSec) {
    X.font = "600 10px 'Nunito',sans-serif";
    const lvTextW = X.measureText("Level " + (currentLevel + 1)).width;
    X.fillStyle = diffSec.color;
    X.globalAlpha = 0.7;
    X.fillText(diffSec.label, 44 + lvTextW + 6, 16);
    X.globalAlpha = 1;
  }

  X.textAlign = "center";
  X.fillStyle = "rgba(255,255,255,0.5)";
  X.font = "600 12px 'Nunito',sans-serif";
  X.fillText(numColors + " colors · " + bottles.length + " bottles", W / 2, 16);

  X.textAlign = "right";
  X.fillStyle = "rgba(255,255,255,0.9)";
  X.font = "700 15px 'Nunito',sans-serif";
  X.fillText("Moves: " + moves + (bestMoves[currentLevel] ? " (Best:" + bestMoves[currentLevel] + ")" : ""), W - 14, 14);

  // Sound toggle button (left side, below home)
  drawButton(10, 36, 28, 28, sfxEnabled ? "SFX" : "OFF", hoverBtn === 14, false);
  const hudY = 36;
  const hudBtnW = 46, hudBtnH = 28, hudGap = 5;
  const hudStartX = W - 14 - (hudBtnW * 4 + hudGap * 3);
  drawButton(hudStartX, hudY, hudBtnW, hudBtnH, "Menu", hoverBtn === 10, false);
  drawButton(hudStartX + hudBtnW + hudGap, hudY, hudBtnW, hudBtnH, "↩ Undo", hoverBtn === 11, undoStack.length > 0 && !solving);
  // Hint button (shows solve confirm if solving, else label based on state)
  const hintLabel = solveConfirm ? "Auto?" : "Hint";
  drawButton(hudStartX + (hudBtnW + hudGap) * 2, hudY, hudBtnW, hudBtnH, hintLabel, hoverBtn === 15, !solving || !solveConfirm);
  drawButton(hudStartX + (hudBtnW + hudGap) * 3, hudY, hudBtnW, hudBtnH, solving ? "⏹ Stop" : "↻ Reset", hoverBtn === 12, true);

  // ── Extra Tube button (left side, below SFX) ──
  const etbY = 66;
  const etbW = 80, etbH = 28;
  const etbEnabled = extraTubeUses > 0 && extraTubeUsed < MAX_EXTRA_TUBES && !solving && !animating;
  const etbLabel = "+ Tube " + extraTubeUses;
  if (etbEnabled) {
    X.save();
    roundRect(10, etbY, etbW, etbH, 6);
    X.fillStyle = hoverBtn === 16 ? "rgba(46,213,115,0.35)" : "rgba(46,213,115,0.2)";
    X.fill();
    X.strokeStyle = "rgba(46,213,115,0.6)";
    X.lineWidth = 1.2;
    X.stroke();
    X.restore();
  } else {
    roundRect(10, etbY, etbW, etbH, 6);
    X.fillStyle = "rgba(255,255,255,0.05)";
    X.fill();
    X.strokeStyle = "rgba(255,255,255,0.1)";
    X.lineWidth = 1;
    X.stroke();
  }
  X.fillStyle = etbEnabled ? "rgba(46,213,115,0.95)" : "rgba(255,255,255,0.25)";
  X.font = "700 12px 'Nunito',sans-serif";
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText(etbLabel, 10 + etbW / 2, etbY + etbH / 2);

  // ── Chapter Progress Bar (below HUD buttons) ──
  const progBarY = 96;
  const progBarH = 4;
  const progBarX = 14;
  const progBarW = W - 28;
  // Find current section boundaries
  const curSecIdx = DIFF_SECTIONS.findIndex(s => s.start > currentLevel) - 1;
  const secStart = curSecIdx >= 0 ? DIFF_SECTIONS[curSecIdx].start : 0;
  const secEnd = curSecIdx + 1 < DIFF_SECTIONS.length ? DIFF_SECTIONS[curSecIdx + 1].start : TOTAL_LEVELS;
  const secProgress = (currentLevel - secStart) / Math.max(1, secEnd - secStart);
  // Count completed levels in section
  let secCompleted = 0;
  for (let si = secStart; si < secEnd; si++) {
    if (levelStars[si]) secCompleted++;
  }
  const secPct = Math.round(secCompleted / Math.max(1, secEnd - secStart) * 100);
  // Background
  X.fillStyle = "rgba(255,255,255,0.08)";
  roundRect(progBarX, progBarY, progBarW, progBarH, 2);
  X.fill();
  // Fill
  const secColor = curSecIdx >= 0 ? DIFF_SECTIONS[curSecIdx].color : "#6c5ce7";
  X.fillStyle = secColor;
  X.globalAlpha = 0.6;
  roundRect(progBarX, progBarY, Math.max(4, progBarW * secProgress), progBarH, 2);
  X.fill();
  X.globalAlpha = 1;
  // Progress text
  X.fillStyle = "rgba(255,255,255,0.3)";
  X.font = "500 9px 'Nunito',sans-serif";
  X.textAlign = "right";
  X.textBaseline = "middle";
  X.fillText(secPct + "% done (" + secCompleted + "/" + (secEnd - secStart) + ")", W - 14, progBarY + progBarH / 2 + 1);

  // AD SLOT placeholder area
  // X.fillStyle="rgba(255,255,255,0.03)"; X.fillRect(0,H-50,W,50);

  // Draw bottles
  for (let i = 0; i < bottles.length; i++) {
    const isPS = animating && i === anim.from;
    const isPT = animating && i === anim.to;
    const pc = isPS ? anim.color : (isPT ? anim.color : -1);
    const pcount = isPS ? anim.count : (isPT ? Math.round(anim.count * anim.progress) : 0);

    drawBottle(
      layout.cx[i], layout.cy[i], layout.bw, layout.bh,
      bottles[i],
      selectedBottle === i && !animating,
      isPS, isPT, pc, pcount,
      isSorted(i),
      i
    );

    // Hint glow overlay
    if (hintActive && hintMove) {
      const elapsed = Date.now() - hintTimer;
      const glowPulse = 0.5 + 0.5 * Math.sin(elapsed * 0.008);
      const showSource = hintPhase === 0;
      const showTarget = hintPhase === 1 || hintPhase === 2;

      if ((showSource && i === hintMove.from) || (showTarget && i === hintMove.to)) {
        const alpha = (hintPhase === 0) ? (0.4 + glowPulse * 0.4) : (0.3 + glowPulse * 0.3);
        const blur = (hintPhase === 0) ? (18 + glowPulse * 14) : (12 + glowPulse * 10);
        X.save();
        X.shadowColor = `rgba(255,215,0,${alpha})`;
        X.shadowBlur = blur;
        X.strokeStyle = `rgba(255,215,0,${0.6 + glowPulse * 0.3})`;
        X.lineWidth = 3;
        // Draw bottle outline glow
        const neckW = layout.bw * 0.36;
        const neckH = layout.bh * 0.07;
        const bodyTop = layout.cy[i] - layout.bh / 2 + neckH;
        const bodyBot = layout.cy[i] + layout.bh / 2;
        const rad = layout.bw * 0.14;
        X.beginPath();
        X.moveTo(layout.cx[i] - neckW / 2, layout.cy[i] - layout.bh / 2);
        X.lineTo(layout.cx[i] - neckW / 2, bodyTop);
        X.quadraticCurveTo(layout.cx[i] - neckW / 2, bodyTop + rad, layout.cx[i] - layout.bw / 2, bodyTop + rad);
        X.lineTo(layout.cx[i] - layout.bw / 2, bodyBot - rad);
        X.quadraticCurveTo(layout.cx[i] - layout.bw / 2, bodyBot, layout.cx[i] - layout.bw / 2 + rad, bodyBot);
        X.lineTo(layout.cx[i] + layout.bw / 2 - rad, bodyBot);
        X.quadraticCurveTo(layout.cx[i] + layout.bw / 2, bodyBot, layout.cx[i] + layout.bw / 2, bodyBot - rad);
        X.lineTo(layout.cx[i] + layout.bw / 2, bodyTop + rad);
        X.quadraticCurveTo(layout.cx[i] + neckW / 2, bodyTop + rad, layout.cx[i] + neckW / 2, bodyTop);
        X.lineTo(layout.cx[i] + neckW / 2, layout.cy[i] - layout.bh / 2);
        X.stroke();
        X.restore();
      }
    }
  }

  // Draw hint arrow
  if (hintActive && hintMove && hintPhase === 2) {
    const elapsed = Date.now() - hintTimer - 1000; // after 1 second delay
    if (elapsed > 0) {
      const sx = layout.cx[hintMove.from];
      const sy = layout.cy[hintMove.from];
      const tx = layout.cx[hintMove.to];
      const ty = layout.cy[hintMove.to];
      const arrowProgress = Math.min(elapsed / 500, 1);
      const bounce = Math.sin(arrowProgress * Math.PI) * 8;
      const midX = (sx + tx) / 2;
      const midY = (sy + ty) / 2 - 30 - bounce;

      X.save();
      X.strokeStyle = `rgba(255,215,0,${0.8})`;
      X.lineWidth = 3;
      X.lineCap = "round";
      // Draw arrow line
      X.beginPath();
      X.moveTo(sx, sy - layout.bh / 2 - 10);
      X.quadraticCurveTo(midX, midY, tx, ty - layout.bh / 2 - 10);
      X.stroke();

      // Draw arrowhead
      const angle = Math.atan2((ty - layout.bh / 2 - 10) - midY, tx - midX);
      const arrowSize = 10;
      X.fillStyle = `rgba(255,215,0,${0.9})`;
      X.beginPath();
      X.moveTo(tx, ty - layout.bh / 2 - 10);
      X.lineTo(tx - arrowSize * Math.cos(angle - 0.4), ty - layout.bh / 2 - 10 - arrowSize * Math.sin(angle - 0.4));
      X.lineTo(tx - arrowSize * Math.cos(angle + 0.4), ty - layout.bh / 2 - 10 - arrowSize * Math.sin(angle + 0.4));
      X.closePath();
      X.fill();
      X.restore();
    }
  }

  // Pour stream overlay
  if (animating) {
    drawPourStream();
  }

  // ── Mini progress bar (level completion) ──
  const completedCount = Object.keys(levelStars).length;
  if (completedCount > 0) {
    const barW = Math.min(160, W * 0.4);
    const barH = 4;
    const barX = (W - barW) / 2;
    const barY = H - 16;
    const progress = Math.min(completedCount / TOTAL_LEVELS, 1);
    X.fillStyle = "rgba(255,255,255,0.08)";
    roundRect(barX, barY, barW, barH, 2);
    X.fill();
    if (progress > 0) {
      const grad = X.createLinearGradient(barX, barY, barX + barW * progress, barY);
      grad.addColorStop(0, "#6c5ce7");
      grad.addColorStop(1, "#a29bfe");
      X.fillStyle = grad;
      roundRect(barX, barY, barW * progress, barH, 2);
      X.fill();
    }
    X.fillStyle = "rgba(255,255,255,0.35)";
    X.font = "500 9px 'Nunito',sans-serif";
    X.textAlign = "center";
    X.textBaseline = "bottom";
    X.fillText(completedCount + "/" + TOTAL_LEVELS, W / 2, barY - 2);
  }

  // ── Sorted star particles (drawn on top of everything) ──
  for (const p of sortedParticles) {
    X.save();
    X.globalAlpha = p.life;
    X.fillStyle = "#ffd700";
    drawMiniStar(p.x, p.y, p.size, p.size * 0.4, 4);
    X.fill();
    X.restore();
  }
}

function renderWin() {
  drawBackground();
  renderGame(); // draw game behind

  const elapsed = Date.now() - winTimer;
  const t = Math.min(elapsed / 400, 1);
  const ease = 1 - Math.pow(1 - t, 3);

  // Initial flash burst (first 200ms)
  const flashT = Math.min(elapsed / 200, 1);
  if (flashT < 1) {
    const flashAlpha = 0.4 * (1 - flashT);
    const flashR = flashT * Math.max(W, H) * 0.8;
    const flashGrad = X.createRadialGradient(W / 2, H * 0.42, 0, W / 2, H * 0.42, flashR);
    flashGrad.addColorStop(0, `rgba(255,255,255,${flashAlpha})`);
    flashGrad.addColorStop(0.3, `rgba(162,155,254,${flashAlpha * 0.5})`);
    flashGrad.addColorStop(1, "rgba(162,155,254,0)");
    X.fillStyle = flashGrad;
    X.fillRect(0, 0, W, H);
  }

  // Dim overlay
  X.fillStyle = `rgba(5,5,30,${0.55 * ease})`;
  X.fillRect(0, 0, W, H);

  X.save();

  // Card with scale-in + bounce effect
  const cardScaleT = Math.min(elapsed / 500, 1);
  const cardEase = cardScaleT < 0.6
    ? (cardScaleT / 0.6) * 1.08  // overshoot
    : 1.08 - 0.08 * ((cardScaleT - 0.6) / 0.4); // settle back
  const cardScale = Math.min(cardEase, 1.08 - 0.08 * Math.max(0, (cardScaleT - 0.7) / 0.3));
  const finalScale = cardScaleT >= 1 ? 1 : cardScale;

  X.globalAlpha = ease;
  const cardW = Math.min(300, W * 0.85);
  const cardH = 300;
  const cardX = (W - cardW) / 2;
  const cardY = (H - cardH) / 2 - 15;

  X.save();
  X.translate(W / 2, H / 2 - 15);
  X.scale(finalScale, finalScale);
  X.translate(-(W / 2), -(H / 2 - 15));

  // Card shadow
  X.shadowColor = "rgba(108,92,231,0.3)";
  X.shadowBlur = 40;
  roundRect(cardX, cardY, cardW, cardH, 18);
  X.fillStyle = "rgba(18,18,55,0.97)";
  X.fill();
  X.shadowBlur = 0;
  X.strokeStyle = "rgba(108,92,231,0.4)";
  X.lineWidth = 1.5;
  X.stroke();

  // Card top glow accent

  accentGrad.addColorStop(0, "rgba(108,92,231,0)");
  accentGrad.addColorStop(0.5, "rgba(162,155,254,0.3)");
  accentGrad.addColorStop(1, "rgba(108,92,231,0)");
  X.fillStyle = accentGrad;
  roundRect(cardX, cardY, cardW, 3, 2);
  X.fill();

  X.restore(); // restore card scale transform

  // Celebration text
  X.fillStyle = "#fff";
  const titleSize = Math.round(Math.min(W * 0.09, 36));
  X.font = `800 ${titleSize}px 'Baloo 2','Nunito',sans-serif`;
  X.textAlign = "center";
  X.textBaseline = "middle";
  X.fillText("Complete!", W / 2, cardY + 48);

  // Stars
  const stars = levelStars[currentLevel] || 1;
  drawStars(W / 2 - 28, cardY + 82, 18, stars);

  // Stats
  X.fillStyle = "rgba(255,255,255,0.65)";
  X.font = "600 15px 'Nunito',sans-serif";
  X.fillText("Moves: " + moves, W / 2, cardY + 115);
  // Extra tube reward display
  let extraReward = 0;
  if (stars === 3) extraReward++;
  if ((currentLevel + 1) % 10 === 0) extraReward++;
  if (extraReward > 0) {
    X.fillStyle = "rgba(46,213,115,0.9)";
    X.font = "600 12px 'Nunito',sans-serif";
    X.fillText("+ Tube x" + extraReward + " earned!", W / 2, cardY + 133);
  }
  // Best record
  if (bestMoves[currentLevel]) {
    const bestStr = moves <= bestMoves[currentLevel] ? "🏆 New Best!" : "Best: " + bestMoves[currentLevel];
    X.fillStyle = moves <= bestMoves[currentLevel] ? "#ffd32a" : "rgba(255,255,255,0.4)";
    X.font = "600 12px 'Nunito',sans-serif";
    X.fillText(bestStr, W / 2, cardY + 148);
  }

  // Streak display
  if (streakCount >= 2) {
    X.fillStyle = "#ff6348";
    X.font = "700 13px 'Baloo 2','Nunito',sans-serif";
    X.fillText("🔥 " + streakCount + "-day streak! (" + levelsToday + " today)", W / 2, cardY + 165);
  }

  // Milestone badge
  const milestone = getMilestoneEmoji(currentLevel);
  if (milestone) {
    X.fillStyle = "#ffd32a";
    X.font = "700 13px 'Baloo 2','Nunito',sans-serif";
    X.fillText(milestone + " Level " + (currentLevel + 1) + " Milestone!", W / 2, cardY + (streakCount >= 2 ? 180 : 165));
  }

  // ── Overall progress bar in win screen ──
  const totalCompleted = Object.keys(levelStars).length;
  const overallPct = Math.round(totalCompleted / TOTAL_LEVELS * 100);
  const wProgY = cardY + (streakCount >= 2 || milestone ? 192 : 175);
  const wProgW = cardW * 0.7;
  const wProgX = (W - wProgW) / 2;
  const wProgH = 3;
  // Bar background
  X.fillStyle = "rgba(255,255,255,0.1)";
  roundRect(wProgX, wProgY, wProgW, wProgH, 1.5);
  X.fill();
  // Bar fill
  X.fillStyle = "rgba(108,92,231,0.7)";
  roundRect(wProgX, wProgY, Math.max(3, wProgW * (totalCompleted / TOTAL_LEVELS)), wProgH, 1.5);
  X.fill();
  // Text
  X.fillStyle = "rgba(255,255,255,0.35)";
  X.font = "500 9px 'Nunito',sans-serif";
  X.textAlign = "center";
  X.textBaseline = "top";
  X.fillText(overallPct + "% complete (" + totalCompleted + "/" + TOTAL_LEVELS + ")", W / 2, wProgY + wProgH + 2);

  // Buttons
  const btnW = 90, btnH = 40, btnGap = 8;
  const totalBtns = (currentLevel + 1 < TOTAL_LEVELS && levelUnlocked[currentLevel + 1]) ? 4 : 3;
  const totalW = totalBtns * btnW + (totalBtns - 1) * btnGap;
  const btnStartX = W / 2 - totalW / 2;
  const by = cardY + (streakCount >= 2 || milestone ? 210 : 193);
  drawButton(btnStartX, by, btnW, btnH, "↻ Retry", hoverBtn === 20, false);
  let btnIdx = 1;
  const hasNext = currentLevel + 1 < TOTAL_LEVELS && levelUnlocked[currentLevel + 1];
  if (hasNext) {
    drawButton(btnStartX + btnIdx * (btnW + btnGap), by, btnW, btnH, "Next ▶", hoverBtn === 21, true);
    btnIdx++;
  }
  drawButton(btnStartX + btnIdx * (btnW + btnGap), by, btnW, btnH, "Share", hoverBtn === 23, false);
  btnIdx++;
  drawButton(btnStartX + btnIdx * (btnW + btnGap), by, btnW, btnH, "Menu", hoverBtn === 22, false);

  // Confetti
  for (const c of confetti) {
    X.save();
    X.translate(c.x, c.y);
    X.rotate(c.rot * Math.PI / 180);
    X.globalAlpha = ease * c.life;
    X.fillStyle = c.color;
    if (c.shape === "circle") {
      X.beginPath();
      X.arc(0, 0, c.w / 2, 0, Math.PI * 2);
      X.fill();
    } else if (c.shape === "star") {
      drawMiniStar(0, 0, c.w / 2, c.w / 4, 5);
      X.fill();
    } else {
      X.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    }
    X.restore();
  }

  X.restore();
}

// UPDATE
// ═══════════════════════════════════════════

function update(dt) {
  now = performance.now();

  if (animating) {
    anim.progress += 0.035;
    if (anim.progress >= 1) {
      anim.progress = 1;
      completePour();
    }
  }

  // Update hint phases
  if (hintActive && hintMove) {
    const elapsed = Date.now() - hintTimer;
    if (hintPhase === 0 && elapsed >= 1000) {
      hintPhase = 1;
      hintTimer = Date.now();
    } else if (hintPhase === 1 && elapsed >= 1000) {
      hintPhase = 2;
      hintTimer = Date.now();
    } else if (hintPhase === 2 && elapsed >= 1500) {
      hintActive = false;
      hintMove = null;
    }
  }

  // Update solve confirm timer
  if (solveConfirm && Date.now() - solveConfirmTimer > 2000) {
    solveConfirm = false;
  }

  // Confetti physics
  if (confettiSecondWaveTimer > 0) {
    confettiSecondWaveTimer--;
    if (confettiSecondWaveTimer === 0) spawnConfettiSecondWave();
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    if (c.delay > 0) { c.delay--; continue; }
    c.x += c.vx;
    c.y += c.vy;
    c.vy += c.gravity || 0.25;
    c.vx *= 0.99;
    c.rot += c.rv;
    c.life -= 0.005;
    if (c.life <= 0 || c.y > H + 60) confetti.splice(i, 1);
  }

  // ── Sorted star particles ──
  for (let i = sortedParticles.length - 1; i >= 0; i--) {
    const p = sortedParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy -= 0.04; // float upward
    p.life -= 0.012;
    if (p.life <= 0) sortedParticles.splice(i, 1);
  }

  // ── Surface bubbles ──
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.by += b.vy;
    b.alpha -= 0.008;
    b.life -= 1;
    if (b.life <= 0 || b.alpha <= 0) bubbles.splice(i, 1);
  }
  // Spawn new bubbles occasionally
  if (state === "game" && Math.random() < 0.04) {
    const layout = getBottleLayout();
    const idx = Math.floor(Math.random() * bottles.length);
    if (bottles[idx].length > 0) {
      const bx = layout.cx[idx] + (Math.random() - 0.5) * layout.bw * 0.5;
      const topY = layout.cy[idx] - layout.bh / 2 + layout.bh * 0.07 + (4 - bottles[idx].length) * layout.layerH;
      bubbles.push({
        bx, by: topY,
        vy: -(Math.random() * 0.6 + 0.3),
        size: Math.random() * 3 + 1.5,
        alpha: 0.45 + Math.random() * 0.3,
        life: 60 + Math.random() * 40
      });
    }
  }

  // ── Bottle wobble physics (damped oscillation) ──
  for (let i = 0; i < bottleWobbles.length; i++) {
    const w = bottleWobbles[i];
    if (!w || w.amp < 0.05) { bottleWobbles[i] = null; continue; }
    w.phase += 0.15;
    w.amp *= w.decay;
    if (w.amp < 0.05) bottleWobbles[i] = null;
  }

  // ── Bottle bounce physics (spring back to scale 1) ──
  for (let i = 0; i < bottleBounces.length; i++) {
    const b = bottleBounces[i];
    if (!b) continue;
    // Spring: target = 1.0, stiffness + damping
    const target = 1.0;
    const spring = 0.3;
    const damping = 0.7;
    b.velocity += (target - b.scale) * spring;
    b.velocity *= damping;
    b.scale += b.velocity;
    if (Math.abs(b.scale - 1.0) < 0.001 && Math.abs(b.velocity) < 0.001) {
      bottleBounces[i] = null;
    }
  }
}

// ═══════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════

function getPointerPos(e) {
  const r = C.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

function onTap(px, py) {
  ensureAudio();

  // ── Splash ──
  if (state === "splash") {
    const bw = Math.min(200, W * 0.55), bh = 50;
    const bx = W / 2 - bw / 2, by = H * 0.58;
    if (hitTest(px, py, bx, by, bw, bh) && splashTimer >= 0.8) {
      sfxClick();
      state = "menu";
      menuScrollY = 0;
    }
    // Continue button
    let nextBtnY = by + bh + 12;
    if (lastPlayedLevel > 0) {
      const contW = Math.min(200, W * 0.55);
      if (hitTest(px, py, W / 2 - contW / 2, nextBtnY, contW, 42) && splashTimer >= 0.8) {
        sfxClick();
        initLevel(lastPlayedLevel);
      }
      nextBtnY += 42 + 10;
    }
    // Daily Challenge button
    const dailyW = Math.min(200, W * 0.55);
    if (hitTest(px, py, W / 2 - dailyW / 2, nextBtnY, dailyW, 42) && splashTimer >= 0.8) {
      sfxClick();
      initLevel(dailyChallengeLevel);
    }
    // Footer GameZipper.com link
    if (splashFooterLink && hitTest(px, py, splashFooterLink.x, splashFooterLink.y, splashFooterLink.w, splashFooterLink.h)) {
      window.location.href = "/"; return;
    }
    return;
  }

  // ── Menu ──
  if (state === "menu") {
    // Jump dialog handling (intercepts all taps when open)
    if (jumpDialogOpen) {
      const dw = Math.min(300, W * 0.85);
      const dh = 340;
      const dx = (W - dw) / 2;
      const dy = (H - dh) / 2;

      // Tap outside card closes dialog
      if (!hitTest(px, py, dx, dy, dw, dh)) {
        jumpDialogOpen = false; jumpInput = ""; return;
      }

      // Cancel at bottom
      if (hitTest(px, py, W / 2 - 30, dy + dh - 28, 60, 20)) {
        jumpDialogOpen = false; jumpInput = ""; sfxClick(); return;
      }

      // Numpad keys
      const inputY = dy + 50;
      const numPadTop = inputY + 44 + 30;
      const numPadLeft = dx + 16;
      const numPadW = dw - 32;
      const keySize = (numPadW - 10 * 2) / 3;
      const keyH = 38;
      const keys = ["1","2","3","4","5","6","7","8","9","⌫","0","▶"];

      for (let i = 0; i < 12; i++) {
        const col = i % 3;
        const row = Math.floor(i / 3);
        const kx = numPadLeft + col * (keySize + 10);
        const ky = numPadTop + row * (keyH + 8);
        if (hitTest(px, py, kx, ky, keySize, keyH)) {
          if (keys[i] === "⌫") {
            jumpInput = jumpInput.slice(0, -1);
            sfxClick();
          } else if (keys[i] === "▶") {
            const lv = Number(jumpInput) - 1;
            if (jumpInput.length > 0 && lv >= 0 && lv < TOTAL_LEVELS && levelUnlocked[lv]) {
              jumpDialogOpen = false; jumpInput = "";
              sfxClick(); initLevel(lv);
            } else {
              sfxError();
            }
          } else if (jumpInput.length < 4) {
            jumpInput += keys[i];
            sfxClick();
          }
          return;
        }
      }
      return;
    }

    if (hitTest(px, py, 12, 8, 90, 30)) {
      window.location.href = "/"; return;
    }
    // Daily challenge banner tap
    if (!isDailyDone() && hitTest(px, py, 8, 4, W - 16, 28)) {
      sfxClick(); initLevel(dailyChallengeLevel); return;
    }
    // Jump button
    if (hitTest(px, py, W - 78, 8, 66, 30)) {
      sfxClick(); jumpDialogOpen = true; jumpInput = ""; return;
    }
    const cols = Math.min(5, Math.floor((W - 30) / 68));
    const gap = 8;
    const cellW = (W - 24 - (cols - 1) * gap) / cols;
    const cellH = cellW;
    const headerH = 28;
    const gridTop = 70 - menuScrollY;
    // Ensure offsets are computed for tap handling
    if (cols !== menuCachedCols) {
      menuCachedCols = cols;
      menuSectionOffsets = precomputeSectionRowOffsets(cols);
    }
    const secOffsets = menuSectionOffsets;
    for (let i = 0; i < TOTAL_LEVELS; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      const x = 12 + col * (cellW + gap);
      const rowOffset = secOffsets[i];
      const y = gridTop + row * (cellH + gap) + rowOffset;
      if (y + cellH < 0 || y > H) continue; // viewport cull for tap too
      if (hitTest(px, py, x, y, cellW, cellH)) {
        if (levelUnlocked[i]) { sfxClick(); initLevel(i); }
        return;
      }
    }
    return;
  }

  // ── Game ──
  if (state === "game" && !animating) {
    // GameZipper home button
    if (hitTest(px, py, 10, 10, 28, 28)) {
      window.location.href = "/"; return;
    }
    // Sound toggle
    if (hitTest(px, py, 10, 36, 28, 28)) {
      sfxEnabled = !sfxEnabled;
      if (sfxEnabled) sfxClick();
      saveSave();
      return;
    }
    // Extra tube button
    if (hitTest(px, py, 10, 66, 80, 28)) {
      addExtraTube();
      return;
    }
    // HUD buttons
    const hudY = 36, hudBtnW = 46, hudBtnH = 28, hudGap = 5;
    const hudStartX = W - 14 - (hudBtnW * 4 + hudGap * 3);
    if (hitTest(px, py, hudStartX, hudY, hudBtnW, hudBtnH)) {
      stopSolve();
      sfxClick(); state = "menu"; menuScrollY = 0; return;
    }
    if (hitTest(px, py, hudStartX + hudBtnW + hudGap, hudY, hudBtnW, hudBtnH)) {
      if (!solving) undoMove(); return;
    }
    if (hitTest(px, py, hudStartX + (hudBtnW + hudGap) * 2, hudY, hudBtnW, hudBtnH)) {
      // Hint button - single click shows hint, double-click triggers auto-solve
      const nowClick = Date.now();
      if (solveConfirm) {
        // Second click - start solve
        solveConfirm = false;
        startSolve();
      } else if (hintTapCount > 0 && nowClick - hintTapTimer < 400) {
        // Double-click - trigger solve confirmation
        hintTapCount = 0;
        hintTapTimer = 0;
        solveConfirm = true;
        solveConfirmTimer = Date.now();
        sfxClick();
      } else {
        hintTapCount = 1;
        hintTapTimer = nowClick;
        showHint();
      }
      return;
    }
    if (hitTest(px, py, hudStartX + (hudBtnW + hudGap) * 3, hudY, hudBtnW, hudBtnH)) {
      // Reset/Stop button
      if (solving) {
        stopSolve();
        sfxClick();
      } else {
        sfxClick(); initLevel(currentLevel);
      }
      return;
    }

    // Block bottle taps during solving
    if (solving) return;

    // Bottle taps
    const layout = getBottleLayout();
    for (let i = 0; i < bottles.length; i++) {
      const bx = layout.cx[i] - layout.bw / 2 - 6;
      const by = layout.cy[i] - layout.bh / 2 - 6;
      const bw = layout.bw + 12;
      const bh = layout.bh + 12;
      if (hitTest(px, py, bx, by, bw, bh)) {
        if (selectedBottle === -1) {
          if (bottles[i].length > 0) {
            selectedBottle = i;
            sfxSelect();
            // Tap bounce effect
            bottleBounces[i] = { scale: 1.06, velocity: 0 };
          }
        } else if (selectedBottle === i) {
          selectedBottle = -1;
        } else {
          executePour(selectedBottle, i);
        }
        return;
      }
    }
    // Tapped empty area — deselect
    selectedBottle = -1;
    return;
  }

  // ── Win ──
  if (state === "win") {
    const cardW = Math.min(300, W * 0.85);
    const cardH = 300;
    const cardX = (W - cardW) / 2;
    const cardY = (H - cardH) / 2 - 15;
    const wBtnW = 90, wBtnH = 40, wBtnGap = 8;
    const milestone = getMilestoneEmoji(currentLevel);
    const hasNextBtn = currentLevel + 1 < TOTAL_LEVELS && levelUnlocked[currentLevel + 1];
    const totalBtns = hasNextBtn ? 4 : 3;
    const totalBtnW = totalBtns * wBtnW + (totalBtns - 1) * wBtnGap;
    const bsX = W / 2 - totalBtnW / 2;
    const wBy = cardY + (streakCount >= 2 || milestone ? 210 : 193);

    // Retry button (index 0)
    if (hitTest(px, py, bsX, wBy, wBtnW, wBtnH)) {
      sfxClick(); initLevel(currentLevel); return;
    }
    let bIdx = 1;
    // Next button (index 1)
    if (hasNextBtn) {
      if (hitTest(px, py, bsX + bIdx * (wBtnW + wBtnGap), wBy, wBtnW, wBtnH)) {
        sfxClick(); initLevel(currentLevel + 1); return;
      }
      bIdx++;
    }
    // Share button (index 2)
    if (hitTest(px, py, bsX + bIdx * (wBtnW + wBtnGap), wBy, wBtnW, wBtnH)) {
      shareResult(); return;
    }
    bIdx++;
    // Menu button (index 3)
    if (hitTest(px, py, bsX + bIdx * (wBtnW + wBtnGap), wBy, wBtnW, wBtnH)) {
      sfxClick(); state = "menu"; menuScrollY = 0; return;
    }
  }
}

// Pointer events (works for both mouse and touch)
C.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  const p = getPointerPos(e);
  onTap(p.x, p.y);
});

// Scroll for menu
let touchStartY = 0, touchStartScroll = 0, isScrolling = false;
C.addEventListener("touchstart", (e) => {
  if (state === "menu") {
    touchStartY = e.touches[0].clientY;
    touchStartScroll = menuScrollY;
    isScrolling = true;
  }
}, { passive: true });
C.addEventListener("touchmove", (e) => {
  if (state === "menu" && isScrolling) {
    const dy = touchStartY - e.touches[0].clientY;
    menuScrollY = Math.max(0, Math.min(menuMaxScroll, touchStartScroll + dy));
  }
}, { passive: true });
C.addEventListener("touchend", () => { isScrolling = false; }, { passive: true });

// Mouse wheel for menu
C.addEventListener("wheel", (e) => {
  if (state === "menu" && !jumpDialogOpen) {
    menuScrollY = Math.max(0, Math.min(menuMaxScroll, menuScrollY + e.deltaY * 0.5));
  }
}, { passive: true });

// Keyboard input for jump dialog
document.addEventListener("keydown", (e) => {
  if (!jumpDialogOpen) return;
  if (e.key === "Escape") { jumpDialogOpen = false; jumpInput = ""; return; }
  if (e.key === "Enter") {
    const lv = Number(jumpInput) - 1;
    if (jumpInput.length > 0 && lv >= 0 && lv < TOTAL_LEVELS && levelUnlocked[lv]) {
      jumpDialogOpen = false; jumpInput = "";
      sfxClick(); initLevel(lv);
    }
    return;
  }
  if (e.key === "Backspace") { jumpInput = jumpInput.slice(0, -1); return; }
  if (/^[0-9]$/.test(e.key) && jumpInput.length < 4) { jumpInput += e.key; }
});

// MAIN LOOP
// ═══════════════════════════════════════════

let lastTime = performance.now();
function gameLoop(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  now = timestamp;

  update(dt);

  X.clearRect(0, 0, W, H);
  if (state === "splash") renderSplash();
  else if (state === "menu") renderMenu();
  else if (state === "game") renderGame();
  else if (state === "win") renderWin();

  // Achievement popup overlay
  if (achievementPopup && achievementPopup.timer > 0) {
    achievementPopup.timer--;
    const t = achievementPopup.timer;
    let alpha = 1;
    if (t > 160) alpha = (180 - t) / 20; // fade in
    if (t < 30) alpha = t / 30; // fade out
    const popW = Math.min(260, W * 0.8);
    const popH = 50;
    const popX = (W - popW) / 2;
    const popY = 8;
    X.save();
    X.globalAlpha = alpha * 0.92;
    // Background
    X.fillStyle = "rgba(30,30,60,0.95)";
    roundRect(popX, popY, popW, popH, 12);
    X.fill();
    X.strokeStyle = "rgba(255,200,50,0.6)";
    X.lineWidth = 1.5;
    X.stroke();
    // Icon
    X.globalAlpha = alpha;
    X.font = "24px sans-serif";
    X.textAlign = "left";
    X.textBaseline = "middle";
    X.fillText(achievementPopup.icon, popX + 12, popY + popH / 2);
    // Text
    X.fillStyle = "#ffd700";
    X.font = "700 13px 'Nunito',sans-serif";
    X.textAlign = "left";
    X.fillText("Achievement Unlocked!", popX + 44, popY + 16);
    X.fillStyle = "#fff";
    X.font = "600 12px 'Nunito',sans-serif";
    X.fillText(achievementPopup.name, popX + 44, popY + 34);
    X.restore();
    if (t <= 1) achievementPopup = null;
  }

  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
