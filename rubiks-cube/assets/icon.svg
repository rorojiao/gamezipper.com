<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#0a0a1a'/>
      <stop offset='100%' style='stop-color:#1a1a2e'/>
    </linearGradient>
    <filter id='glow'>
      <feGaussianBlur stdDeviation='3' result='blur'/>
      <feMerge><feMergeNode in='blur'/><feMergeNode in='SourceGraphic'/></feMerge>
    </filter>
  </defs>
  <rect width='512' height='512' rx='64' fill='url(#bg)'/>
  
  <!-- 3D Rubik's Cube - isometric view -->
  <!-- Top face (white/yellow) -->
  <polygon points='256,80 376,150 256,220 136,150' fill='#e8e8f0' stroke='#ccc' stroke-width='2' opacity='0.95'/>
  <!-- Grid lines on top -->
  <line x1='196' y1='115' x2='316' y2='185' stroke='#bbb' stroke-width='1'/>
  <line x1='216' y1='165' x2='336' y2='115' stroke='#bbb' stroke-width='1'/>
  
  <!-- Front face (red) -->
  <polygon points='136,150 256,220 256,370 136,300' fill='#c41e3a' stroke='#a01030' stroke-width='2' opacity='0.95'/>
  <!-- Grid lines on front -->
  <line x1='136' y1='200' x2='256' y2='270' stroke='#a01030' stroke-width='1'/>
  <line x1='136' y1='250' x2='256' y2='320' stroke='#a01030' stroke-width='1'/>
  <line x1='176' y1='170' x2='176' y2='320' stroke='#a01030' stroke-width='1'/>
  <line x1='216' y1='190' x2='216' y2='340' stroke='#a01030' stroke-width='1'/>
  
  <!-- Right face (blue) -->
  <polygon points='256,220 376,150 376,300 256,370' fill='#0051ba' stroke='#003d8f' stroke-width='2' opacity='0.95'/>
  <!-- Grid lines on right -->
  <line x1='256' y1='270' x2='376' y2='200' stroke='#003d8f' stroke-width='1'/>
  <line x1='256' y1='320' x2='376' y2='250' stroke='#003d8f' stroke-width='1'/>
  <line x1='296' y1='190' x2='296' y2='340' stroke='#003d8f' stroke-width='1'/>
  <line x1='336' y1='170' x2='336' y2='320' stroke='#003d8f' stroke-width='1'/>
  
  <!-- Neon glow effect -->
  <polygon points='256,80 376,150 256,220 136,150' fill='none' stroke='#4d96ff' stroke-width='1' filter='url(#glow)' opacity='0.5'/>
  <polygon points='136,150 256,220 256,370 136,300' fill='none' stroke='#ff5800' stroke-width='1' filter='url(#glow)' opacity='0.5'/>
  <polygon points='256,220 376,150 376,300 256,370' fill='none' stroke='#4d96ff' stroke-width='1' filter='url(#glow)' opacity='0.5'/>
  
  <!-- Title -->
  <text x='256' y='440' text-anchor='middle' font-family='Arial,sans-serif' font-weight='bold' font-size='48' fill='#e8e8f0' filter='url(#glow)'>RUBIK'S CUBE</text>
  <text x='256' y='475' text-anchor='middle' font-family='Arial,sans-serif' font-size='24' fill='#4d96ff'>3D PUZZLE</text>
</svg>