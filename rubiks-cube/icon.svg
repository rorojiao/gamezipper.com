<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <g transform="translate(256,260)" filter="url(#shadow)">
    <!-- Top face (white) -->
    <g transform="matrix(0.87,-0.5,-0.29,-0.17,0,0)">
      <rect x="-120" y="-120" width="80" height="80" rx="6" fill="#fff"/>
      <rect x="-30" y="-120" width="80" height="80" rx="6" fill="#fff"/>
      <rect x="60" y="-120" width="80" height="80" rx="6" fill="#fff"/>
      <rect x="-120" y="-30" width="80" height="80" rx="6" fill="#fff"/>
      <rect x="-30" y="-30" width="80" height="80" rx="6" fill="#f0f0f0"/>
      <rect x="60" y="-30" width="80" height="80" rx="6" fill="#fff"/>
      <rect x="-120" y="60" width="80" height="80" rx="6" fill="#fff"/>
      <rect x="-30" y="60" width="80" height="80" rx="6" fill="#fff"/>
      <rect x="60" y="60" width="80" height="80" rx="6" fill="#fff"/>
    </g>
    <!-- Left face (orange) -->
    <g transform="matrix(0,-0.87,0.58,-0.33,0,0)">
      <rect x="-120" y="-120" width="80" height="80" rx="6" fill="#ff5800"/>
      <rect x="-30" y="-120" width="80" height="80" rx="6" fill="#ff5800"/>
      <rect x="60" y="-120" width="80" height="80" rx="6" fill="#ff5800"/>
      <rect x="-120" y="-30" width="80" height="80" rx="6" fill="#e04e00"/>
      <rect x="-30" y="-30" width="80" height="80" rx="6" fill="#ff5800"/>
      <rect x="60" y="-30" width="80" height="80" rx="6" fill="#ff5800"/>
      <rect x="-120" y="60" width="80" height="80" rx="6" fill="#ff5800"/>
      <rect x="-30" y="60" width="80" height="80" rx="6" fill="#ff5800"/>
      <rect x="60" y="60" width="80" height="80" rx="6" fill="#ff5800"/>
    </g>
    <!-- Right face (red) -->
    <g transform="matrix(0,0.87,-0.58,-0.33,0,0)">
      <rect x="-120" y="-120" width="80" height="80" rx="6" fill="#c41e3a"/>
      <rect x="-30" y="-120" width="80" height="80" rx="6" fill="#c41e3a"/>
      <rect x="60" y="-120" width="80" height="80" rx="6" fill="#c41e3a"/>
      <rect x="-120" y="-30" width="80" height="80" rx="6" fill="#b01830"/>
      <rect x="-30" y="-30" width="80" height="80" rx="6" fill="#c41e3a"/>
      <rect x="60" y="-30" width="80" height="80" rx="6" fill="#c41e3a"/>
      <rect x="-120" y="60" width="80" height="80" rx="6" fill="#c41e3a"/>
      <rect x="-30" y="60" width="80" height="80" rx="6" fill="#c41e3a"/>
      <rect x="60" y="60" width="80" height="80" rx="6" fill="#c41e3a"/>
    </g>
  </g>
  <!-- Colorful accent dots -->
  <circle cx="80" cy="80" r="20" fill="#ff6b6b" opacity="0.3"/>
  <circle cx="432" cy="432" r="25" fill="#4d96ff" opacity="0.3"/>
  <circle cx="430" cy="90" r="15" fill="#ffd93d" opacity="0.3"/>
  <circle cx="80" cy="430" r="18" fill="#6bcb77" opacity="0.3"/>
</svg>
