<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Sushi Stack 3D - Color Sort Puzzle</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;background:#120A04;font-family:'Arial Rounded MT Bold','Arial',sans-serif;}
    #c{display:block;width:100%;height:100%;touch-action:none;}
    #topBar{position:fixed;top:0;left:0;right:0;height:26px;background:linear-gradient(90deg,#2C1008,#5C2010,#2C1008);color:#FFD080;text-align:center;font-size:11px;font-weight:700;line-height:26px;z-index:100;letter-spacing:1px;text-decoration:none;display:block;cursor:pointer;}
    #hud{position:fixed;top:26px;left:0;right:0;display:flex;justify-content:space-around;align-items:center;height:48px;background:rgba(20,8,2,0.85);backdrop-filter:blur(4px);border-bottom:1px solid rgba(255,160,60,0.2);z-index:100;}
    .hud-item{display:flex;flex-direction:column;align-items:center;}
    .hud-label{font-size:9px;color:#C08050;text-transform:uppercase;letter-spacing:1px;}
    .hud-value{font-size:22px;font-weight:800;color:#FFD080;}
    #botBar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;align-items:center;height:64px;background:rgba(20,8,2,0.88);backdrop-filter:blur(6px);border-top:1px solid rgba(255,160,60,0.2);z-index:100;}
    .bar-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:rgba(255,160,50,0.1);border:1px solid rgba(255,160,50,0.3);border-radius:12px;padding:6px 16px;min-width:72px;user-select:none;transition:background 0.1s,transform 0.1s;}
    .bar-btn:active{background:rgba(255,160,50,0.25);transform:scale(0.93);}
    .bar-icon{font-size:20px;}
    .bar-label{font-size:10px;color:#C08050;font-weight:600;}
    .bar-count{font-size:12px;color:#FFD080;font-weight:800;}
    .bar-btn.disabled{opacity:0.35;pointer-events:none;}
    /* Overlays */
    .overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .overlay.hidden{display:none;}
    #menuScreen{background:radial-gradient(ellipse at 50% 40%,rgba(80,30,10,0.97),rgba(10,3,1,0.99));}
    .game-logo{font-size:clamp(36px,9vw,60px);font-weight:900;color:#FFD080;text-shadow:0 4px 0 #8B2010,0 8px 0 #4A0800,0 0 30px rgba(255,160,50,0.6);letter-spacing:2px;text-align:center;}
    .game-logo span{color:#FF6B35;}
    .game-sub{color:rgba(255,180,80,0.7);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:6px 0 24px;text-align:center;}
    .sushi-hero{font-size:72px;animation:float3d 2.2s ease-in-out infinite;margin-bottom:20px;}
    @keyframes float3d{0%,100%{transform:translateY(0) rotateY(0deg)}50%{transform:translateY(-16px) rotateY(20deg)}}
    .btn-3d{border:none;cursor:pointer;font-family:inherit;font-weight:800;letter-spacing:1px;border-radius:50px;transition:transform 0.1s,box-shadow 0.1s;}
    .btn-play{background:linear-gradient(135deg,#FF6B35,#E84010);color:#fff;font-size:22px;padding:15px 60px;box-shadow:0 6px 0 #8B2010,0 10px 28px rgba(255,100,50,0.45);text-shadow:0 1px 2px rgba(0,0,0,0.3);margin:10px;}
    .btn-play:active{transform:translateY(4px);box-shadow:0 2px 0 #8B2010!important;}
    .btn-levels{background:linear-gradient(135deg,#3A2010,#5A3018);color:#FFD080;font-size:16px;padding:12px 40px;box-shadow:0 4px 0 #1A0A04,0 8px 20px rgba(0,0,0,0.4);border:1px solid rgba(255,160,50,0.3);margin:6px;}
    .btn-levels:active{transform:translateY(3px);box-shadow:0 1px 0 #1A0A04!important;}
    #levelScreen{background:rgba(12,4,1,0.98);flex-direction:column;padding-top:26px;}
    .lv-header{color:#FFD080;font-size:20px;font-weight:800;padding:16px 20px;width:100%;max-width:420px;display:flex;justify-content:space-between;align-items:center;}
    .lv-close{font-size:24px;cursor:pointer;opacity:0.7;padding:4px;}
    .lv-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:10px 16px 20px;width:100%;max-width:420px;}
    .lv-cell{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;}
    .lv-cell:active{transform:scale(0.88);}
    .lv-cell.unlocked{background:linear-gradient(135deg,#2A1208,#3D1C0A);border:2px solid rgba(255,160,50,0.5);box-shadow:0 3px 0 #1A0802;}
    .lv-cell.done{background:linear-gradient(135deg,#0A2010,#143020);border:2px solid rgba(80,200,80,0.5);box-shadow:0 3px 0 #061408;}
    .lv-cell.locked{opacity:0.35;background:#1A0A04;border:1px solid rgba(255,100,30,0.15);cursor:default;}
    .lv-num{font-size:18px;font-weight:800;color:#FFD080;}
    .lv-cell.locked .lv-num{color:#604030;}
    .lv-stars{display:flex;gap:2px;margin-top:2px;}
    .st{font-size:8px;}.st.on{color:#FFD700;}.st.off{color:#3A2010;}
    /* Modals */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(8px);}
    .modal.hidden{display:none;}
    .modal-box{background:linear-gradient(145deg,#1E0C04,#301608);border:2px solid rgba(255,160,50,0.4);border-radius:24px;padding:28px 24px;width:min(90%,340px);text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.6);animation:popIn 0.38s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes popIn{from{transform:scale(0.3) rotateX(-20deg);opacity:0}to{transform:scale(1) rotateX(0deg);opacity:1}}
    .modal-title{font-size:28px;font-weight:900;color:#FFD080;margin-bottom:6px;}
    .modal-stars{font-size:40px;margin:10px 0;letter-spacing:4px;}
    .modal-score{font-size:16px;color:#C08050;margin:8px 0 20px;}
    .modal-score span{color:#FFD080;font-weight:800;font-size:22px;}
    .modal-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .mbtn{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:15px;border-radius:14px;padding:11px 22px;transition:transform 0.1s;}
    .mbtn:active{transform:scale(0.92);}
    .mbtn-primary{background:linear-gradient(135deg,#FF6B35,#E84010);color:#fff;box-shadow:0 4px 0 #8B2010;}
    .mbtn-secondary{background:rgba(255,160,50,0.12);color:#FFD080;border:1px solid rgba(255,160,50,0.35);}
    .hint-glow{animation:hintPulse 0.8s ease-in-out infinite;}
    @keyframes hintPulse{0%,100%{opacity:1}50%{opacity:0.4}}
  </style>
</head>
<body>
<!-- Top Ad Bar -->
<a id="topBar" href="https://gamezipper.com" target="_blank">🍣 More Sweet 3D Games at GameZipper.com</a>

<!-- HUD -->
<div id="hud">
  <div class="hud-item"><span class="hud-label">LEVEL</span><span class="hud-value" id="hudLevel">1</span></div>
  <div class="hud-item"><span class="hud-label">MOVES</span><span class="hud-value" id="hudMoves">0</span></div>
  <div class="hud-item"><span class="hud-label">SCORE</span><span class="hud-value" id="hudScore">0</span></div>
  <div class="hud-item"><span class="hud-label">BEST</span><span class="hud-value" id="hudBest">0</span></div>

<!-- 3D Canvas -->
<canvas id="c"></canvas>

<!-- Bottom Bar -->
<div id="botBar">
  <div class="bar-btn" id="btnUndo"><span class="bar-icon">↩️</span><span class="bar-label">Undo</span><span class="bar-count" id="undoCount">3</span></div>
  <div class="bar-btn" id="btnMenu"><span class="bar-icon">🏠</span><span class="bar-label">Menu</span></div>

<!-- Menu Screen -->
<div class="overlay" id="menuScreen">
  <div class="sushi-hero">🍣</div>
  <div class="game-logo">Sushi <span>Stack</span> 3D</div>
  <div class="game-sub">Color Sort Puzzle</div>
  <button class="btn-3d btn-play" id="btnPlay">▶ PLAY</button>
  <button class="btn-3d btn-levels" id="btnShowLevels">📋 Levels</button>
</div>

<!-- Level Select Screen -->
<div class="overlay hidden" id="levelScreen">
  <div class="lv-header">
    <span>Choose Level</span>

</div>

<!-- Win Modal -->
<div class="modal hidden" id="winModal">
  <div class="modal-box">
    <div style="font-size:42px">🎉</div>

    <div class="modal-btns">
      <button class="mbtn mbtn-primary" id="btnNext">Next ▶</button>
      <button class="mbtn mbtn-secondary" id="btnRetryWin">↩ Retry</button>

</div>

<!-- Fail Modal -->
<div class="modal hidden" id="failModal">
  <div class="modal-box">
    <div style="font-size:42px">😅</div>
    <div class="modal-title">Sushi Jammed!</div>
    <div class="modal-score">No more moves available</div>
    <div class="modal-btns">
      <button class="mbtn mbtn-primary" id="btnRetryFail">↩ Retry</button>
      <button class="mbtn mbtn-secondary" id="btnMenuFail">🏠 Menu</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── Constants ────────────────────────────────────────────────────────────────
const COLORS_HEX = [0xFF6B35, 0xB71C1C, 0x33691E, 0xF9A825, 0x00796B, 0x5D4037, 0xE65100, 0xAD1457];
const SAVE_KEY = 'sushiStack3d_v1';

const LEVEL_CONFIGS = [
  ...Array(5).fill({rods:4, empty:2, colors:2, cap:3}),
  ...Array(5).fill({rods:5, empty:1, colors:3, cap:3}),
  ...Array(10).fill({rods:5, empty:2, colors:4, cap:3}),
  ...Array(10).fill({rods:6, empty:2, colors:5, cap:3}),
  ...Array(10).fill({rods:7, empty:2, colors:5, cap:4}),
  ...Array(10).fill({rods:8, empty:2, colors:6, cap:4}),
];

// ─── Save / Load ──────────────────────────────────────────────────────────────
function loadSave() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch(e) { return {}; }
}
function writeSave(data) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}

// ─── Audio ────────────────────────────────────────────────────────────────────
let _ac = null;
function beep(freq, dur, type='sine', vol=0.15, delay=0, freq2=null) {
  try {
    if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
    const o = _ac.createOscillator(), g = _ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, _ac.currentTime + delay);
    if (freq2) o.frequency.exponentialRampToValueAtTime(freq2, _ac.currentTime + delay + dur * 0.7);
    g.gain.setValueAtTime(vol, _ac.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, _ac.currentTime + delay + dur);
    o.start(_ac.currentTime + delay);
    o.stop(_ac.currentTime + delay + dur + 0.05);
  } catch(e) {}
}
const snd = {
  pick:  () => beep(880, 0.07, 'sine', 0.14, 0, 1200),
  drop:  () => beep(320, 0.12, 'triangle', 0.18, 0, 160),
  match: () => [523,659,880,1047].forEach((f,i) => beep(f, 0.15, 'sine', 0.2, i*0.1)),
  win:   () => [392,494,587,784,988].forEach((f,i) => beep(f, 0.2, 'sine', 0.22, i*0.12)),
  error: () => beep(150, 0.1, 'sawtooth', 0.15),
};

// ─── Three.js Setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.setClearColor(0x120A04);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0D0602, 0.035);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 200);

// Lights
scene.add(new THREE.AmbientLight(0xFFF5E0, 0.55));
const dirLight = new THREE.DirectionalLight(0xFFEDD0, 1.3);
dirLight.position.set(6, 12, 6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 80;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);
const blueLight = new THREE.DirectionalLight(0x8090FF, 0.35);
blueLight.position.set(-8, 5, -4);
scene.add(blueLight);
const ptLight = new THREE.PointLight(0xFFB040, 0.6, 40);
ptLight.position.set(0, 4, 2);
scene.add(ptLight);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x2C1208, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.2;
ground.receiveShadow = true;
scene.add(ground);

// ─── Tweens ───────────────────────────────────────────────────────────────────
const tweens = [];
function tweenTo(obj, prop, target, dur, ease='linear', onDone=null) {
  // Remove existing tween for same obj+prop
  for (let i = tweens.length-1; i >= 0; i--) {
    if (tweens[i].obj === obj && tweens[i].prop === prop) tweens.splice(i, 1);
  }
  tweens.push({ obj, prop, start: obj[prop], target, dur: dur*1000, ease, onDone, t0: performance.now(), done: false });
}
function easeFunc(t, type) {
  if (type === 'easeOut') return 1-(1-t)**2;
  if (type === 'easeIn') return t*t;
  if (type === 'easeInOut') return t<0.5 ? 2*t*t : 1-(-2*t+2)**2/2;
  if (type === 'elastic') {
    const c4 = 2*Math.PI/3;
    return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;
  }
  return t;
}
function updateTweens(now) {
  for (const tw of tweens) {
    if (tw.done) continue;
    let t = Math.min((now - tw.t0) / tw.dur, 1);
    tw.obj[tw.prop] = tw.start + (tw.target - tw.start) * easeFunc(t, tw.ease);
    if (t >= 1) {
      tw.obj[tw.prop] = tw.target;
      tw.done = true;
      if (tw.onDone) tw.onDone();
    }
  }
  for (let i = tweens.length-1; i >= 0; i--) if (tweens[i].done) tweens.splice(i, 1);
}

// ─── Fly Animations ───────────────────────────────────────────────────────────
const flyAnims = [];
function lerp(a, b, t) { return a + (b-a)*t; }

// ─── Particles ────────────────────────────────────────────────────────────────
const particleSystems = [];
function spawnParticles(cx, cy, cz, colorHex, count=20) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const vel = [];
  for (let i = 0; i < count; i++) {
    pos[i*3] = cx; pos[i*3+1] = cy; pos[i*3+2] = cz;
    vel.push({
      x: (Math.random()-0.5)*4,
      y: Math.random()*3+1,
      z: (Math.random()-0.5)*4
    });
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: colorHex, size: 0.15, transparent: true, opacity: 1 });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  particleSystems.push({ pts, vel, t: 0, dur: 1.0 });
}
function updateParticles(dt) {
  for (let i = particleSystems.length-1; i >= 0; i--) {
    const ps = particleSystems[i];
    ps.t += dt;
    if (ps.t >= ps.dur) {
      scene.remove(ps.pts);
      ps.pts.geometry.dispose();
      particleSystems.splice(i, 1);
      continue;
    }
    const pos = ps.pts.geometry.attributes.position.array;
    const count = ps.vel.length;
    for (let j = 0; j < count; j++) {
      pos[j*3]   += ps.vel[j].x * dt;
      pos[j*3+1] += ps.vel[j].y * dt - 3*dt*dt*ps.t;
      pos[j*3+2] += ps.vel[j].z * dt;
    }
    ps.pts.geometry.attributes.position.needsUpdate = true;
    ps.pts.material.opacity = 1 - ps.t / ps.dur;
  }
}

// ─── Mesh Builders ────────────────────────────────────────────────────────────
function makeSushiDisc(colorIdx) {
  const group = new THREE.Group();
  const r = 0.52, h = r * 0.62;

  // 1. 海苔外圈
  const noriMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(r, r, h, 32),
    new THREE.MeshStandardMaterial({ color: 0x0D0D08, roughness: 0.85, metalness: 0.04 })
  );
  noriMesh.castShadow = true;
  group.add(noriMesh);

  // 2. 米饭环
  group.add(new THREE.Mesh(
    new THREE.CylinderGeometry(r*0.87, r*0.87, h+0.01, 32),
    new THREE.MeshStandardMaterial({ color: 0xFAF8EE, roughness: 0.92 })
  ));

  // 3. 食材芯
  const fillColor = new THREE.Color(COLORS_HEX[colorIdx]);
  const fillMat = new THREE.MeshStandardMaterial({
    color: fillColor,
    roughness: 0.5, metalness: 0.12,
    emissive: fillColor.clone().multiplyScalar(0.12)
  });
  group.add(new THREE.Mesh(new THREE.CylinderGeometry(r*0.56, r*0.56, h+0.02, 28), fillMat));

  // 4. 顶面高光
  const topMesh = new THREE.Mesh(
    new THREE.CylinderGeometry(r*0.56, r*0.56, 0.01, 28),
    new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.15, metalness: 0.15, transparent: true, opacity: 0.28 })
  );
  topMesh.position.y = h/2 + 0.005;
  group.add(topMesh);

  group.userData.ci = colorIdx;
  group.userData.discR = r;
  group.userData.discH = h;
  group.castShadow = true;
  return group;
}

function makeRodMesh(rodHeight) {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0x7B2412, roughness: 0.45, metalness: 0.18 });
  const gap = 0.19, sw = 0.065;
  [-gap, gap].forEach(dx => {
    const stick = new THREE.Mesh(new THREE.CylinderGeometry(sw, sw*1.08, rodHeight, 10), mat);
    stick.position.x = dx;
    stick.castShadow = true;
    group.add(stick);
    const cap = new THREE.Mesh(new THREE.SphereGeometry(sw, 8, 8, 0, Math.PI*2, 0, Math.PI/2), mat);
    cap.position.set(dx, rodHeight/2, 0);
    group.add(cap);
  });
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(1.15, 0.09, 0.68),
    new THREE.MeshStandardMaterial({ color: 0xC8A858, roughness: 0.75, metalness: 0.08 })
  );
  base.position.y = -rodHeight/2 - 0.05;
  base.castShadow = true;
  base.receiveShadow = true;
  group.add(base);
  return group;
}

// ─── Game State ───────────────────────────────────────────────────────────────
const state = {
  level: 0, moves: 0, score: 0, sel: -1,
  rods: [],   // { discs:[], data:[], mesh, hitBox }
  cap: 3,
  undoStack: [], undosLeft: 3,
  hintsLeft: 3,
  phase: 'menu', // menu | playing | win | fail
  busy: false,
};
let saveData = loadSave();

// ─── Layout ───────────────────────────────────────────────────────────────────
function layoutRods(rods) {
  const n = rods.length;
  const rows = n > 6 ? 2 : 1;
  const spacing = Math.min(2.0, 13 / Math.ceil(n / rows));
  rods.forEach((rod, i) => {
    const row = (rows === 2 && i >= Math.ceil(n/2)) ? 1 : 0;
    const col = row === 0 ? i : i - Math.ceil(n/2);
    const rc = row === 0 ? Math.ceil(n/2) : n - Math.ceil(n/2);
    const sx = -(rc - 1) * spacing / 2;
    const sz = -(rows - 1) * spacing * 0.75 / 2;
    rod.mesh.position.set(sx + col * spacing, 0, sz + row * spacing * 0.75);
  });
}

function discY(stackIdx) {
  const discH = 0.52 * 0.62;
  const rodH = state.cap * discH * 1.22 + discH;
  return -rodH/2 + discH/2 + 0.05 + stackIdx * (discH + 0.05);
}

// ─── Camera Positioning ───────────────────────────────────────────────────────
function positionCamera(n) {
  const dist = 7 + n * 0.7;
  camera.position.set(0, dist*0.7, dist);
  camera.lookAt(0, 0, 0);
}

// ─── Level Generation ─────────────────────────────────────────────────────────
function genLevel(idx) {
  const cfg = LEVEL_CONFIGS[Math.min(idx, LEVEL_CONFIGS.length-1)];
  let rng = (idx * 1664525 + 1013904223) >>> 0;
  const rand = () => { rng = (rng * 1664525 + 1013904223) >>> 0; return rng / 4294967295; };
  const arr = [];
  for (let c = 0; c < cfg.colors; c++) for (let k = 0; k < cfg.cap; k++) arr.push(c);
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(rand() * (i+1)); [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  const rodData = [];
  const active = cfg.rods - cfg.empty;
  for (let r = 0; r < active; r++) rodData.push(arr.slice(r*cfg.cap, (r+1)*cfg.cap));
  for (let r = 0; r < cfg.empty; r++) rodData.push([]);
  return { rodData, ...cfg };
}

// ─── Scene Cleanup ────────────────────────────────────────────────────────────
function clearScene() {
  for (const rod of state.rods) {
    scene.remove(rod.mesh);
    // dispose geometries
  }
  state.rods = [];
  tweens.length = 0;
  flyAnims.length = 0;
  for (const ps of particleSystems) scene.remove(ps.pts);
  particleSystems.length = 0;
}

// ─── Init Level ───────────────────────────────────────────────────────────────
function initLevel(idx) {
  clearScene();
  state.level = idx;
  state.moves = 0;
  state.score = 0;
  state.sel = -1;
  state.busy = false;
  state.undoStack = [];
  state.undosLeft = 3;
  state.hintsLeft = 3;
  state.phase = 'playing';

  const gen = genLevel(idx);
  state.cap = gen.cap;

  const discH = 0.52 * 0.62;
  const rodH = gen.cap * discH * 1.22 + discH;

  for (let ri = 0; ri < gen.rods; ri++) {
    const rodMesh = makeRodMesh(rodH);
    scene.add(rodMesh);

    // HitBox
    const hitGeo = new THREE.BoxGeometry(1.1, rodH + 0.5, 0.7);
    const hitMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false });
    const hitBox = new THREE.Mesh(hitGeo, hitMat);
    hitBox.userData.rodIndex = ri;
    rodMesh.add(hitBox);

    const data = gen.rodData[ri] || [];
    const discs = [];
    for (let si = 0; si < data.length; si++) {
      const disc = makeSushiDisc(data[si]);
      disc.position.y = discY(si);
      rodMesh.add(disc);
      discs.push(disc);
    }

    state.rods.push({ discs, data: [...data], mesh: rodMesh, hitBox });
  }

  layoutRods(state.rods);
  positionCamera(gen.rods);
  updateHUD();
  updateBotBar();
  updateHintHighlight(-1);
  console.log('[Sushi3D] initLevel', idx, 'rods=', state.rods.length, 'cap=', gen.cap);
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hudLevel').textContent = state.level + 1;
  document.getElementById('hudMoves').textContent = state.moves;
  document.getElementById('hudScore').textContent = state.score;
  const best = (saveData.best || {})[state.level] || 0;
  document.getElementById('hudBest').textContent = best;
}
function updateBotBar() {
  document.getElementById('undoCount').textContent = state.undosLeft;
  document.getElementById('hintCount').textContent = state.hintsLeft;
  document.getElementById('btnUndo').classList.toggle('disabled', state.undosLeft === 0 || state.undoStack.length === 0);
  document.getElementById('btnHint').classList.toggle('disabled', state.hintsLeft === 0);
}

// ─── Game Logic ───────────────────────────────────────────────────────────────
function topDisc(ri) {
  const rod = state.rods[ri];
  if (!rod || rod.discs.length === 0) return null;
  return rod.discs[rod.discs.length - 1];
}
function topColor(ri) {
  const rod = state.rods[ri];
  if (!rod || rod.data.length === 0) return -1;
  return rod.data[rod.data.length - 1];
}
function canMove(from, to) {
  if (from === to) return false;
  const fRod = state.rods[from], tRod = state.rods[to];
  if (!fRod || fRod.data.length === 0) return false;
  if (tRod.data.length >= state.cap) return false;
  if (tRod.data.length === 0) return true;
  return topColor(to) === topColor(from);
}

function checkWin() {
  return state.rods.every(r => r.data.length === 0 || (r.data.every(c => c === r.data[0]) && r.data.length === state.cap));
}
function checkFail() {
  for (let i = 0; i < state.rods.length; i++) {
    if (state.rods[i].data.length === 0) continue;
    for (let j = 0; j < state.rods.length; j++) {
      if (i !== j && canMove(i, j)) return false;
    }
  }
  return true;
}

function countTopMatch(ri) {
  const rod = state.rods[ri];
  if (rod.data.length === 0) return 0;
  const top = topColor(ri);
  let cnt = 0;
  for (let i = rod.data.length-1; i >= 0; i--) {
    if (rod.data[i] === top) cnt++;
    else break;
  }
  return cnt;
}

// ─── Selection Highlight ──────────────────────────────────────────────────────
let selOutline = null;
function updateSelHighlight(ri) {
  if (selOutline) { scene.remove(selOutline); selOutline = null; }
  if (ri < 0) return;
  const rod = state.rods[ri];
  if (!rod) return;
  const discH = 0.52 * 0.62;
  const rodH = state.cap * discH * 1.22 + discH;
  const geo = new THREE.BoxGeometry(1.3, rodH + 0.7, 0.9);
  const mat = new THREE.MeshBasicMaterial({ color: 0xFFCC44, transparent: true, opacity: 0.18, side: THREE.BackSide });
  selOutline = new THREE.Mesh(geo, mat);
  selOutline.position.copy(rod.mesh.position);
  scene.add(selOutline);
}

function updateHintHighlight(ri) {
  // Remove previous hint meshes
  scene.children.filter(c => c.userData.isHint).forEach(c => scene.remove(c));
  if (ri < 0) return;
  const rod = state.rods[ri];
  if (!rod) return;
  const discH = 0.52 * 0.62;
  const rodH = state.cap * discH * 1.22 + discH;
  const geo = new THREE.BoxGeometry(1.3, rodH + 0.7, 0.9);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00FF88, transparent: true, opacity: 0.22, side: THREE.BackSide });
  const hintMesh = new THREE.Mesh(geo, mat);
  hintMesh.position.copy(rod.mesh.position);
  hintMesh.userData.isHint = true;
  scene.add(hintMesh);
  setTimeout(() => { if (hintMesh.parent) scene.remove(hintMesh); }, 2000);
}

// ─── Match Check & Remove ─────────────────────────────────────────────────────
function checkMatchAndRemove(ri, afterDone) {
  const rod = state.rods[ri];
  const cnt = countTopMatch(ri);
  if (cnt < 3) { if (afterDone) afterDone(); return; }

  const matchDiscs = rod.discs.splice(rod.discs.length - cnt, cnt);
  rod.data.splice(rod.data.length - cnt, cnt);

  // Detach from rod, add to scene in world position
  const wpos = new THREE.Vector3();
  matchDiscs.forEach(d => {
    rod.mesh.localToWorld(wpos.copy(d.position));
    rod.mesh.remove(d);
    d.position.copy(wpos);
    scene.add(d);
  });

  // Spawn particles
  const cx = matchDiscs[0].position.x, cy = matchDiscs[0].position.y, cz = matchDiscs[0].position.z;
  spawnParticles(cx, cy, cz, COLORS_HEX[matchDiscs[0].userData.ci], 24);

  // Explode animation
  matchDiscs.forEach((d, k) => {
    const ang = Math.PI * 2 * k / cnt + Math.random();
    tweenTo(d.position, 'x', d.position.x + Math.cos(ang)*1.8, 0.45, 'easeIn');
    tweenTo(d.position, 'y', d.position.y + 1.2 + Math.random()*0.5, 0.45, 'easeIn');
    tweenTo(d.position, 'z', d.position.z + Math.sin(ang)*1.8, 0.45, 'easeIn');
  });

  state.score += 100 * cnt;
  snd.match();
  updateHUD();

  setTimeout(() => {
    matchDiscs.forEach(d => scene.remove(d));
    if (afterDone) afterDone();
  }, 500);
}

// ─── Main Tap Handler ─────────────────────────────────────────────────────────
function handleTap(ri) {
  if (state.busy || state.phase !== 'playing') return;
  console.log('[Sushi3D] handleTap ri=', ri, 'sel=', state.sel);

  const rod = state.rods[ri];
  if (!rod) return;

  if (state.sel === -1) {
    // Select
    if (rod.data.length === 0) return;
    state.sel = ri;
    updateSelHighlight(ri);
    // Float top disc up
    const td = topDisc(ri);
    if (td) tweenTo(td.position, 'y', td.position.y + 0.7, 0.2, 'elastic');
    snd.pick();
  } else if (state.sel === ri) {
    // Deselect
    const td = topDisc(ri);
    if (td) tweenTo(td.position, 'y', discY(rod.discs.length-1), 0.15, 'easeOut');
    state.sel = -1;
    updateSelHighlight(-1);
  } else {
    // Try move
    if (canMove(state.sel, ri)) {
      doMove(state.sel, ri);
    } else {
      // Invalid: shake & error sound
      snd.error();
      const td = topDisc(state.sel);
      if (td) {
        const origY = discY(state.rods[state.sel].discs.length-1) + 0.7;
        tweenTo(td.position, 'x', td.position.x + 0.15, 0.06, 'linear', () => {
          tweenTo(td.position, 'x', td.position.x - 0.3, 0.08, 'linear', () => {
            tweenTo(td.position, 'x', 0, 0.06, 'linear');
          });
        });
      }
    }
  }
  updateBotBar();
}

// ─── Do Move ─────────────────────────────────────────────────────────────────
function doMove(from, to) {
  const fromRod = state.rods[from], toRod = state.rods[to];
  const disc = fromRod.discs[fromRod.discs.length - 1];
  const colorIdx = fromRod.data[fromRod.data.length - 1];

  // Save undo
  state.undoStack.push({
    from, to,
    fromData: fromRod.data.slice(),
    toData: toRod.data.slice(),
  });
  if (state.undoStack.length > 10) state.undoStack.shift();

  // Update data
  fromRod.data.pop();
  toRod.data.push(colorIdx);

  // Update disc arrays
  fromRod.discs.pop();
  toRod.discs.push(disc);

  // Animate: detach from fromRod, fly in world space, attach to toRod
  state.busy = true;
  state.sel = -1;
  updateSelHighlight(-1);

  const wpos = new THREE.Vector3();
  fromRod.mesh.localToWorld(wpos.copy(disc.position));
  fromRod.mesh.remove(disc);
  disc.position.copy(wpos);
  scene.add(disc);

  const targetWpos = new THREE.Vector3();
  const targetLocalY = discY(toRod.discs.length - 1);
  const tmpMesh = toRod.mesh;
  targetWpos.set(tmpMesh.position.x, targetLocalY, tmpMesh.position.z);

  const fromX = disc.position.x, fromY = disc.position.y, fromZ = disc.position.z;
  const toX = targetWpos.x, toY = targetWpos.y, toZ = targetWpos.z;
  const arcH = 1.2 + Math.abs(toX - fromX) * 0.2 + Math.abs(toZ - fromZ) * 0.2;
  const FLY_DUR = 0.42;
  const fly = { t: 0, dur: FLY_DUR, disc, fromX, fromY, fromZ, toX, toY, toZ, arcH, done: false, toRod, colorIdx };
  flyAnims.push(fly);

  state.moves++;
  snd.drop();
  updateHUD();
}

// ─── Update Fly Anims ─────────────────────────────────────────────────────────
function updateFlyAnims(dt) {
  for (let i = flyAnims.length-1; i >= 0; i--) {
    const fly = flyAnims[i];
    if (fly.done) { flyAnims.splice(i, 1); continue; }
    fly.t = Math.min(fly.t + dt / fly.dur, 1);
    const ease = fly.t < 0.5 ? 2*fly.t**2 : 1-(2*(1-fly.t))**2/2;
    fly.disc.position.x = lerp(fly.fromX, fly.toX, ease);
    fly.disc.position.z = lerp(fly.fromZ, fly.toZ, ease);
    fly.disc.position.y = lerp(fly.fromY, fly.toY, ease) + Math.sin(fly.t * Math.PI) * fly.arcH;
    fly.disc.rotation.y += dt * 6;
    if (fly.t >= 1) {
      fly.done = true;
      // Re-attach to rod
      scene.remove(fly.disc);
      fly.toRod.mesh.add(fly.disc);
      fly.disc.position.set(0, discY(fly.toRod.discs.length - 1), 0);
      fly.disc.rotation.y = 0;
      // Check match
      const toIdx = state.rods.indexOf(fly.toRod);
      checkMatchAndRemove(toIdx, () => {
        state.busy = false;
        updateBotBar();
        // Check win/fail
        if (checkWin()) {
          setTimeout(() => showWin(), 300);
        } else if (checkFail()) {
          setTimeout(() => showFail(), 600);
        }
      });
    }
  }
}

// ─── Undo ─────────────────────────────────────────────────────────────────────
function doUndo() {
  if (state.busy || state.undosLeft === 0 || state.undoStack.length === 0) return;
  const u = state.undoStack.pop();
  const fromRod = state.rods[u.from], toRod = state.rods[u.to];
  const disc = toRod.discs.pop();
  fromRod.discs.push(disc);
  fromRod.data = u.fromData.slice();
  toRod.data = u.toData.slice();
  // Snap disc back
  toRod.mesh.remove(disc);
  fromRod.mesh.add(disc);
  disc.position.set(0, discY(fromRod.discs.length-1), 0);
  disc.rotation.y = 0;
  state.sel = -1;
  updateSelHighlight(-1);
  state.undosLeft--;
  state.moves++;
  updateHUD();
  updateBotBar();
  snd.pick();
}

// ─── Hint ─────────────────────────────────────────────────────────────────────
function doHint() {
  if (state.hintsLeft === 0 || state.phase !== 'playing') return;
  // Find best source rod
  for (let i = 0; i < state.rods.length; i++) {
    if (state.rods[i].data.length === 0) continue;
    for (let j = 0; j < state.rods.length; j++) {
      if (canMove(i, j)) {
        updateHintHighlight(i);
        state.hintsLeft--;
        updateBotBar();
        return;
      }
    }
  }
}

// ─── Win/Fail ─────────────────────────────────────────────────────────────────
function showWin() {
  state.phase = 'win';
  snd.win();
  // Save progress
  if (!saveData.best) saveData.best = {};
  if (!saveData.best[state.level] || state.score > saveData.best[state.level]) {
    saveData.best[state.level] = state.score;
  }
  if (!saveData.unlocked || saveData.unlocked < state.level + 2) {
    saveData.unlocked = state.level + 2;
  }
  writeSave(saveData);
  document.getElementById('winScore').textContent = state.score;
  const stars = state.moves <= 5 ? '⭐⭐⭐' : state.moves <= 10 ? '⭐⭐' : '⭐';
  document.getElementById('winStars').textContent = stars;
  document.getElementById('winModal').classList.remove('hidden');
}
function showFail() {
  state.phase = 'fail';
  snd.error();
  document.getElementById('failModal').classList.remove('hidden');
}
function hideModals() {
  document.getElementById('winModal').classList.add('hidden');
  document.getElementById('failModal').classList.add('hidden');
}

// ─── Raycaster ────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

canvas.addEventListener('pointerdown', (e) => {
  if (state.phase !== 'playing') return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = [];
  state.rods.forEach((r, i) => {
    raycaster.intersectObject(r.hitBox, true).forEach(h => hits.push({...h, ri: i}));
  });
  hits.sort((a, b) => a.distance - b.distance);
  if (hits.length) handleTap(hits[0].ri);
});
canvas.addEventListener('touchstart', (e) => {
  if (state.phase !== 'playing') return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches[0].clientX;
  const cy = e.touches[0].clientY;
  mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = [];
  state.rods.forEach((r, i) => {
    raycaster.intersectObject(r.hitBox, true).forEach(h => hits.push({...h, ri: i}));
  });
  hits.sort((a, b) => a.distance - b.distance);
  if (hits.length) handleTap(hits[0].ri);
}, { passive: false });

// ─── Resize ───────────────────────────────────────────────────────────────────
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ─── Render Loop ──────────────────────────────────────────────────────────────
let lastTime = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  updateTweens(now);
  updateFlyAnims(dt);
  updateParticles(dt);
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// ─── Level Select ─────────────────────────────────────────────────────────────
function buildLevelGrid() {
  const grid = document.getElementById('lvGrid');
  grid.innerHTML = '';
  const total = LEVEL_CONFIGS.length;
  const unlocked = saveData.unlocked || 1;
  for (let i = 0; i < total; i++) {
    const cell = document.createElement('div');
    cell.className = 'lv-cell';
    const done = (saveData.best || {})[i] !== undefined;
    if (i < unlocked) {
      cell.classList.add(done ? 'done' : 'unlocked');
      cell.innerHTML = `<span class="lv-num">${i+1}</span><div class="lv-stars"><span class="st ${done?'on':'off'}">★</span></div>`;
      cell.addEventListener('click', () => {
        document.getElementById('levelScreen').classList.add('hidden');
        initLevel(i);
        showGame();
      });
    } else {
      cell.classList.add('locked');
      cell.innerHTML = `<span class="lv-num">🔒</span>`;
    }
    grid.appendChild(cell);
  }
}

// ─── Screen Management ────────────────────────────────────────────────────────
function showMenu() {
  document.getElementById('menuScreen').classList.remove('hidden');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('botBar').style.display = 'none';
  state.phase = 'menu';
}
function showGame() {
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('levelScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('botBar').style.display = 'flex';
  hideModals();
}

// ─── Button Handlers ──────────────────────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', () => {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  const nextLevel = (saveData.unlocked || 1) - 1;
  initLevel(Math.max(0, Math.min(nextLevel, LEVEL_CONFIGS.length-1)));
  showGame();
});
document.getElementById('btnShowLevels').addEventListener('click', () => {
  buildLevelGrid();
  document.getElementById('levelScreen').classList.remove('hidden');
  document.getElementById('menuScreen').classList.add('hidden');
});
document.getElementById('lvClose').addEventListener('click', () => {
  document.getElementById('levelScreen').classList.add('hidden');
  document.getElementById('menuScreen').classList.remove('hidden');
});
document.getElementById('btnUndo').addEventListener('click', () => {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  doUndo();
});
document.getElementById('btnMenu').addEventListener('click', () => {
  hideModals();
  showMenu();
});
document.getElementById('btnHint').addEventListener('click', () => {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  doHint();
});
document.getElementById('btnNext').addEventListener('click', () => {
  hideModals();
  const next = state.level + 1;
  if (next < LEVEL_CONFIGS.length) { initLevel(next); showGame(); }
  else showMenu();
});
document.getElementById('btnRetryWin').addEventListener('click', () => {
  hideModals(); initLevel(state.level); showGame();
});
document.getElementById('btnMenuWin').addEventListener('click', () => {
  hideModals(); showMenu();
});
document.getElementById('btnRetryFail').addEventListener('click', () => {
  hideModals(); initLevel(state.level); showGame();
});
document.getElementById('btnMenuFail').addEventListener('click', () => {
  hideModals(); showMenu();
});

// ─── Expose for testing ───────────────────────────────────────────────────────
window.game = state;
window.startGame = (levelIdx) => { initLevel(levelIdx); showGame(); };
window.handleTap = handleTap;

// ─── Initial State ────────────────────────────────────────────────────────────
showMenu();
// Pre-initialize level 0 scene in background for rendering
initLevel(0);
// But show menu on top
showMenu();

console.log('[Sushi3D] Game initialized. THREE r', THREE.REVISION);
</script>
