<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#2a2a5e" stroke-width="2"/>
  <!-- Red quadrant (top-left) -->
  <path d="M50 8 A42 42 0 0 0 8 50 L50 50 Z" fill="#ff3b5c" filter="url(#glow)"/>
  <!-- Blue quadrant (top-right) -->
  <path d="M92 50 A42 42 0 0 0 50 8 L50 50 Z" fill="#3b7dff" filter="url(#glow)"/>
  <!-- Green quadrant (bottom-left) -->
  <path d="M8 50 A42 42 0 0 0 50 92 L50 50 Z" fill="#3bff5c" filter="url(#glow)"/>
  <!-- Yellow quadrant (bottom-right) -->
  <path d="M50 92 A42 42 0 0 0 92 50 L50 50 Z" fill="#ffd93b" filter="url(#glow)"/>
  <!-- Center circle -->
  <circle cx="50" cy="50" r="12" fill="#0a0a1a" stroke="#ffffff" stroke-width="2"/>
  <circle cx="50" cy="50" r="6" fill="#ffffff"/>
</svg>