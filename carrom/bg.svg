<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f39c12" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f39c12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="boardPattern" x="0" y="0" width="400" height="400" patternUnits="userSpaceOnUse">
      <!-- Subtle carrom board outline -->
      <rect x="50" y="50" width="300" height="300" rx="12" fill="none" stroke="#f39c12" stroke-width="1" opacity="0.04"/>
      <circle cx="200" cy="200" r="60" fill="none" stroke="#f39c12" stroke-width="0.8" opacity="0.04"/>
      <circle cx="200" cy="200" r="15" fill="#f39c12" opacity="0.03"/>
      <!-- Corner pockets hint -->
      <circle cx="50" cy="50" r="10" fill="#f39c12" opacity="0.03"/>
      <circle cx="350" cy="50" r="10" fill="#f39c12" opacity="0.03"/>
      <circle cx="50" cy="350" r="10" fill="#f39c12" opacity="0.03"/>
      <circle cx="350" cy="350" r="10" fill="#f39c12" opacity="0.03"/>
      <!-- Disc hints -->
      <circle cx="180" cy="180" r="12" fill="#ffffff" opacity="0.02"/>
      <circle cx="220" cy="220" r="12" fill="#333333" opacity="0.02"/>
    </pattern>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <ellipse cx="600" cy="300" rx="700" ry="500" fill="url(#glow1)"/>
  <ellipse cx="1400" cy="750" rx="600" ry="450" fill="url(#glow2)"/>

  <!-- Subtle board pattern overlay -->
  <rect width="1920" height="1080" fill="url(#boardPattern)" opacity="0.8"/>

  <!-- Floating particles -->
  <circle cx="200" cy="150" r="2" fill="#f39c12" opacity="0.15"/>
  <circle cx="450" cy="80" r="1.5" fill="#e74c3c" opacity="0.12"/>
  <circle cx="700" cy="200" r="2.5" fill="#f39c12" opacity="0.1"/>
  <circle cx="1000" cy="100" r="1.5" fill="#ffffff" opacity="0.08"/>
  <circle cx="1300" cy="180" r="2" fill="#f39c12" opacity="0.12"/>
  <circle cx="1550" cy="90" r="1.5" fill="#e74c3c" opacity="0.1"/>
  <circle cx="1750" cy="160" r="2" fill="#f39c12" opacity="0.08"/>

  <circle cx="150" cy="400" r="1.5" fill="#f39c12" opacity="0.1"/>
  <circle cx="350" cy="500" r="2" fill="#e74c3c" opacity="0.08"/>
  <circle cx="600" cy="350" r="1.5" fill="#ffffff" opacity="0.06"/>
  <circle cx="900" cy="450" r="2" fill="#f39c12" opacity="0.1"/>
  <circle cx="1150" cy="380" r="1.5" fill="#e74c3c" opacity="0.08"/>
  <circle cx="1400" cy="500" r="2" fill="#f39c12" opacity="0.1"/>
  <circle cx="1650" cy="420" r="1.5" fill="#ffffff" opacity="0.06"/>
  <circle cx="1850" cy="350" r="2" fill="#f39c12" opacity="0.08"/>

  <circle cx="100" cy="700" r="2" fill="#f39c12" opacity="0.12"/>
  <circle cx="300" cy="800" r="1.5" fill="#e74c3c" opacity="0.1"/>
  <circle cx="550" cy="650" r="2" fill="#ffffff" opacity="0.07"/>
  <circle cx="800" cy="750" r="1.5" fill="#f39c12" opacity="0.09"/>
  <circle cx="1050" cy="680" r="2" fill="#e74c3c" opacity="0.08"/>
  <circle cx="1250" cy="820" r="1.5" fill="#f39c12" opacity="0.1"/>
  <circle cx="1500" cy="700" r="2" fill="#ffffff" opacity="0.06"/>
  <circle cx="1700" cy="780" r="1.5" fill="#f39c12" opacity="0.09"/>
  <circle cx="1880" cy="650" r="2" fill="#e74c3c" opacity="0.08"/>

  <circle cx="180" cy="950" r="2" fill="#f39c12" opacity="0.1"/>
  <circle cx="420" cy="1000" r="1.5" fill="#e74c3c" opacity="0.08"/>
  <circle cx="680" cy="920" r="2" fill="#f39c12" opacity="0.09"/>
  <circle cx="950" cy="980" r="1.5" fill="#ffffff" opacity="0.06"/>
  <circle cx="1200" cy="950" r="2" fill="#f39c12" opacity="0.08"/>
  <circle cx="1480" cy="1020" r="1.5" fill="#e74c3c" opacity="0.1"/>
  <circle cx="1720" cy="960" r="2" fill="#f39c12" opacity="0.07"/>

  <!-- Center vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>