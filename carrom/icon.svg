<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </radialGradient>
    <linearGradient id="boardSurface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5b0"/>
      <stop offset="50%" stop-color="#f0e2c4"/>
      <stop offset="100%" stop-color="#dcc99a"/>
    </linearGradient>
    <linearGradient id="woodFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c3d1e"/>
      <stop offset="50%" stop-color="#8b5a2b"/>
      <stop offset="100%" stop-color="#4a2f14"/>
    </linearGradient>
    <radialGradient id="whitePiece" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </radialGradient>
    <radialGradient id="blackPiece" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <radialGradient id="queenPiece" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#aa0000"/>
    </radialGradient>
    <radialGradient id="strikerPiece" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000" flood-opacity="0.4" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Outer wooden frame -->
  <rect x="20" y="20" width="984" height="984" rx="48" ry="48" fill="url(#woodFrame)" filter="url(#shadow)"/>

  <!-- Frame inner bevel -->
  <rect x="48" y="48" width="928" height="928" rx="32" ry="32" fill="#3d2510"/>

  <!-- Board playing surface -->
  <rect x="72" y="72" width="880" height="880" rx="24" ry="24" fill="url(#boardSurface)"/>

  <!-- Outer border line -->
  <rect x="80" y="80" width="864" height="864" rx="20" ry="20" fill="none" stroke="#c4a06a" stroke-width="3"/>

  <!-- Large center circle -->
  <circle cx="512" cy="512" r="160" fill="none" stroke="#8b6914" stroke-width="3"/>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#c4a06a" stroke-width="1.5"/>

  <!-- Small center goal circles -->
  <circle cx="512" cy="512" r="40" fill="none" stroke="#8b6914" stroke-width="2"/>

  <!-- Queen center dot -->
  <circle cx="512" cy="512" r="12" fill="#8b6914"/>

  <!-- Corner pockets - dark arcs -->
  <!-- Top-left pocket -->
  <path d="M 72 160 Q 72 72 160 72" fill="none" stroke="#1a1a1a" stroke-width="22" stroke-linecap="round"/>
  <circle cx="90" cy="90" r="28" fill="#0d0d0d"/>
  <circle cx="90" cy="90" r="22" fill="#1a0d00"/>

  <!-- Top-right pocket -->
  <path d="M 864 72 Q 952 72 952 160" fill="none" stroke="#1a1a1a" stroke-width="22" stroke-linecap="round"/>
  <circle cx="934" cy="90" r="28" fill="#0d0d0d"/>
  <circle cx="934" cy="90" r="22" fill="#1a0d00"/>

  <!-- Bottom-left pocket -->
  <path d="M 72 864 Q 72 952 160 952" fill="none" stroke="#1a1a1a" stroke-width="22" stroke-linecap="round"/>
  <circle cx="90" cy="934" r="28" fill="#0d0d0d"/>
  <circle cx="90" cy="934" r="22" fill="#1a0d00"/>

  <!-- Bottom-right pocket -->
  <path d="M 864 952 Q 952 952 952 864" fill="none" stroke="#1a1a1a" stroke-width="22" stroke-linecap="round"/>
  <circle cx="934" cy="934" r="28" fill="#0d0d0d"/>
  <circle cx="934" cy="934" r="22" fill="#1a0d00"/>

  <!-- Base lines -->
  <line x1="512" y1="80" x2="512" y2="200" stroke="#c4a06a" stroke-width="2"/>
  <line x1="512" y1="824" x2="512" y2="944" stroke="#c4a06a" stroke-width="2"/>
  <line x1="80" y1="512" x2="200" y2="512" stroke="#c4a06a" stroke-width="2"/>
  <line x1="824" y1="512" x2="944" y2="512" stroke="#c4a06a" stroke-width="2"/>

  <!-- Circles at base line endpoints -->
  <circle cx="512" cy="100" r="8" fill="#8b6914"/>
  <circle cx="512" cy="924" r="8" fill="#8b6914"/>
  <circle cx="100" cy="512" r="8" fill="#8b6914"/>
  <circle cx="924" cy="512" r="8" fill="#8b6914"/>

  <!-- Diagonal corner lines -->
  <line x1="80" y1="80" x2="200" y2="200" stroke="#c4a06a" stroke-width="1.5" opacity="0.6"/>
  <line x1="944" y1="80" x2="824" y2="200" stroke="#c4a06a" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="944" x2="200" y2="824" stroke="#c4a06a" stroke-width="1.5" opacity="0.6"/>
  <line x1="944" y1="944" x2="824" y2="824" stroke="#c4a06a" stroke-width="1.5" opacity="0.6"/>

  <!-- --- Pieces in classic formation --- -->

  <!-- White pieces cluster (top-left of center) -->
  <circle cx="430" cy="430" r="32" fill="url(#whitePiece)" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="478" cy="420" r="32" fill="url(#whitePiece)" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="450" cy="470" r="32" fill="url(#whitePiece)" stroke="#aaa" stroke-width="1.5"/>

  <!-- Black pieces cluster (bottom-right of center) -->
  <circle cx="580" cy="590" r="32" fill="url(#blackPiece)" stroke="#333" stroke-width="1.5"/>
  <circle cx="538" cy="600" r="32" fill="url(#blackPiece)" stroke="#333" stroke-width="1.5"/>
  <circle cx="570" cy="555" r="32" fill="url(#blackPiece)" stroke="#333" stroke-width="1.5"/>

  <!-- Queen (red) in center -->
  <circle cx="512" cy="512" r="36" fill="url(#queenPiece)" stroke="#880000" stroke-width="2"/>
  <circle cx="512" cy="512" r="22" fill="none" stroke="#ffaaaa" stroke-width="1.5" opacity="0.5"/>

  <!-- Striker (gold) -->
  <circle cx="512" cy="680" r="38" fill="url(#strikerPiece)" stroke="#886600" stroke-width="2"/>
  <circle cx="512" cy="680" r="20" fill="none" stroke="#ffe066" stroke-width="1.5" opacity="0.6"/>

  <!-- Some additional white pieces scattered -->
  <circle cx="390" cy="510" r="32" fill="url(#whitePiece)" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="620" cy="510" r="32" fill="url(#blackPiece)" stroke="#333" stroke-width="1.5"/>

  <!-- Frame corner decorations -->
  <circle cx="20" cy="20" r="10" fill="#3d2510"/>
  <circle cx="1004" cy="20" r="10" fill="#3d2510"/>
  <circle cx="20" cy="1004" r="10" fill="#3d2510"/>
  <circle cx="1004" cy="1004" r="10" fill="#3d2510"/>
</svg>