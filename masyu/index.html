// ====== Loop Generator ======
function genLoop(R,C,rng){
  var visited=[],path=[],minLen=Math.max(6,Math.floor(R*C*0.35));
  for(var i=0;i<R;i++){visited[i]=[];for(var j=0;j<C;j++)visited[i][j]=false}
  function dfs(r,c){
    if(r<0||r>=R||c<0||c>=C||visited[r][c])return false;
    visited[r][c]=true;path.push([r,c]);
    if(path.length>=minLen){var s=path[0];if(Math.abs(r-s[0])+Math.abs(c-s[1])===1)return true}
    var dirs=[[0,1],[1,0],[0,-1],[-1,0]];
    for(var i=3;i>0;i--){var j=Math.floor(rng()*(i+1));var t=dirs[i];dirs[i]=dirs[j];dirs[j]=t}
    for(var d=0;d<4;d++){if(dfs(r+dirs[d][0],c+dirs[d][1]))return true}
    path.pop();visited[r][c]=false;return false;
  }
  var starts=[];
  for(var i=0;i<R;i++)for(var j=0;j<C;j++)starts.push([i,j]);
  for(var i=starts.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var t=starts[i];starts[i]=starts[j];starts[j]=t}
  for(var si=0;si<starts.length;si++){path=[];for(var i=0;i<R;i++){visited[i]=[];for(var j=0;j<C;j++)visited[i][j]=false}
    if(dfs(starts[si][0],starts[si][1]))return path}

  var loop=[];
  for(var c=1;c<C-1;c++)loop.push([1,c]);
  for(var r=1;r<R-1;r++)loop.push([r,C-2]);
  for(var c=C-2;c>1;c--)loop.push([R-2,c]);
  for(var r=R-2;r>1;r--)loop.push([r,1]);
  return loop;
}

// ====== Puzzle Generator ======
function edgeKey(r1,c1,r2,c2){
  if(r1<r2||(r1===r2&&c1<c2))return r1+','+c1+'-'+r2+','+c2;
  return r2+','+c2+'-'+r1+','+c1;
}
function genPuzzle(R,C,seed){
  var rng=makeRng(seed),loop=genLoop(R,C,rng);
  if(loop.length<4)return genPuzzle(R,C,seed+1);

  var cellInfo={};
  for(var i=0;i<loop.length;i++){
    var prev=(i-1+loop.length)%loop.length,next=(i+1)%loop.length;
    var dr1=loop[i][0]-loop[prev][0],dc1=loop[i][1]-loop[prev][1];
    var dr2=loop[next][0]-loop[i][0],dc2=loop[next][1]-loop[i][1];
    var isTurn=!(dr1===dr2&&dc1===dc2);
    cellInfo[loop[i][0]+','+loop[i][1]]=isTurn?1:0;
  }
  // Solution edges
  var sol=[];
  for(var i=0;i<loop.length;i++){var next=(i+1)%loop.length;sol.push(edgeKey(loop[i][0],loop[i][1],loop[next][0],loop[next][1]))}
  // Place pearls
  var allP=[];
  for(var k in cellInfo){var p=k.split(',');allP.push({r:+p[0],c:+p[1],type:cellInfo[k]})}
  // Sort: black first, then random
  allP.sort(function(a,b){return b.type-a.type||(rng()-0.5)});
  var pearls=[],target=Math.max(3,Math.floor(loop.length*0.4));
  for(var i=0;i<allP.length&&pearls.length<target;i++){
    var keep=rng()<0.65||allP[i].type===1;
    if(keep)pearls.push(allP[i]);
  }
  // Ensure at least 1 black and 1 white
  if(!pearls.some(function(p){return p.type===1})){
    for(var i=0;i<allP.length;i++){if(allP[i].type===1){pearls.push(allP[i]);break}}
  }
  if(!pearls.some(function(p){return p.type===0})){
    for(var i=0;i<allP.length;i++){if(allP[i].type===0){pearls.push(allP[i]);break}}
  }
  return{rows:R,cols:C,pearls:pearls,solution:sol};
}

// ====== Validation ======
function validateSolution(){

    for(var i=0;i<2;i++){var nr=+cur.split(',')[0]+dirs[i].dr,nc=+cur.split(',')[1]+dirs[i].dc;

      }
    }else{
      if(!straight)return false;
      var hasAdjTurn=false;
      for(var d=0;d<2;d++){
        var nr=p.r+dirs[d].dr,nc=p.c+dirs[d].dc,nk=nr+','+nc,nd=cellE[nk];
        if(nd&&nd.length===2){var ns=(nd[0].dr===-nd[1].dr&&nd[0].dc===-nd[1].dc);if(!ns)hasAdjTurn=true}

    }
  }

  var base=ROWS*COLS*1.5;
  var stars=elapsed<base?3:elapsed<base*2?2:1;
  if(!progress.done.includes(lvlIdx)){progress.done.push(lvlIdx)}
  if(!progress.stars[lvlIdx]||progress.stars[lvlIdx]<stars)progress.stars[lvlIdx]=stars;
  if(!progress.best[lvlIdx]||progress.best[lvlIdx]>elapsed)progress.best[lvlIdx]=Math.round(elapsed);
  if(progress.hints<10)progress.hints++;
  saveProgress();
  // Spawn particles
  for(var i=0;i<40;i++){particles.push({
    x:W/2,y:H/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,
    life:1,color:'hsl('+(Math.random()*60+180)+',100%,70%)',sz:Math.random()*4+2})}
}
function getStars(idx){return progress.stars[idx]||0}

// ====== Drawing ======
function drawRoundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function drawBtn(x,y,w,h,text,highlight){
  ctx.fillStyle=highlight?'rgba(0,212,255,0.3)':'rgba(255,255,255,0.08)';
  ctx.strokeStyle=highlight?'#00d4ff':'rgba(255,255,255,0.2)';
  ctx.lineWidth=1.5;drawRoundRect(x,y,w,h,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#e0e0ff';ctx.font='bold '+Math.min(16,h*0.5)+'px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x+w/2,y+h/2);
}
function hitBtn(mx,my,bx,by,bw,bh){return mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh}

function drawTitle(){
  ctx.fillStyle='#e0e0ff';ctx.font='bold '+Math.min(64,W*0.12)+'px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#00d4ff';ctx.shadowBlur=20;
  ctx.fillText('MASYU',W/2,H*0.22);
  ctx.shadowBlur=0;
  ctx.font='18px "Segoe UI",system-ui,sans-serif';ctx.fillStyle='#8080cc';
  ctx.fillText('Pearl Loop Puzzle',W/2,H*0.29);
  // Pearl icons
  var cy=H*0.22,sz=Math.min(64,W*0.12);
  ctx.beginPath();ctx.arc(W/2-sz*2.2,cy,sz*0.18,0,Math.PI*2);ctx.fillStyle='#1a1a4e';ctx.strokeStyle='#8080ff';ctx.lineWidth=2;ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.arc(W/2+sz*2.2,cy,sz*0.18,0,Math.PI*2);ctx.fillStyle='#d0d0ff';ctx.fill();ctx.stroke();
  var bw=Math.min(220,W*0.6),bh=48;
  drawBtn(W/2-bw/2,H*0.42,bw,bh,'Play',false);
  drawBtn(W/2-bw/2,H*0.52,bw,bh,'Daily Challenge',false);
  drawBtn(W/2-bw/2,H*0.62,bw,bh,'How to Play',false);
  drawBtn(W/2-bw/2,H*0.72,bw,bh,'Sound: '+(soundOn?'On':'Off'),false);
  drawBtn(W/2-bw/2,H*0.82,bw,bh,'Music: '+(musicOn?'On':'Off'),false);
}

function drawLevelSelect(){
  ctx.fillStyle='#e0e0ff';ctx.font='bold 24px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Select Level',W/2,40);
  var cols=Math.min(5,Math.floor((W-40)/70));
  var sz=Math.min(56,(W-40)/cols-8);
  var startX=(W-cols*(sz+8))/2+4;
  for(var i=0;i<LV.length;i++){
    var col=i%cols,row=Math.floor(i/cols);
    var x=startX+col*(sz+8),y=70+row*(sz+10);
    var unlocked=i===0||progress.done.includes(i-1);
    var done=progress.done.includes(i);
    var stars=getStars(i);
    ctx.fillStyle=done?'rgba(0,212,255,0.15)':unlocked?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.02)';
    ctx.strokeStyle=done?'#00d4ff':unlocked?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.05)';
    ctx.lineWidth=1.5;drawRoundRect(x,y,sz,sz,8);ctx.fill();ctx.stroke();
    ctx.fillStyle=unlocked?'#e0e0ff':'#404060';
    ctx.font='bold '+(sz*0.35)+'px "Segoe UI",system-ui,sans-serif';
    ctx.fillText(''+(i+1),x+sz/2,y+sz*0.45);
    if(done){ctx.font=(sz*0.18)+'px sans-serif';ctx.fillStyle='#ffd700';ctx.fillText('\u2605'.repeat(stars),x+sz/2,y+sz*0.78)}
  }
  drawBtn(16,H-56,80,40,'Back',false);
}

function drawGame(dt){
  // Background grid
  ctx.strokeStyle='rgba(60,60,120,0.3)';ctx.lineWidth=1;
  for(var r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(gridX,gridY+r*cellSz);ctx.lineTo(gridX+COLS*cellSz,gridY+r*cellSz);ctx.stroke()}
  for(var c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(gridX+c*cellSz,gridY);ctx.lineTo(gridX+c*cellSz,gridY+ROWS*cellSz);ctx.stroke()}
  // Hover edge
  if(hoverEdge&&!won){var mp=edgeMidpoint(hoverEdge);var h=edgeIsHoriz(hoverEdge);
    ctx.strokeStyle='rgba(0,212,255,0.25)';ctx.lineWidth=Math.max(6,cellSz*0.15);
    var c1k=hoverEdge.split('-')[0],c2k=hoverEdge.split('-')[1];
    var p1=c1k.split(','),p2=c2k.split(',');
    var cc1=cellCenter(+p1[0],+p1[1]),cc2=cellCenter(+p2[0],+p2[1]);
    ctx.beginPath();ctx.moveTo(cc1.x,cc1.y);ctx.lineTo(cc2.x,cc2.y);ctx.stroke()}
  // X marks
  for(var k in xMarks){var mp=edgeMidpoint(k);var xs=cellSz*0.12;
    ctx.strokeStyle='rgba(255,80,80,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(mp.x-xs,mp.y-xs);ctx.lineTo(mp.x+xs,mp.y+xs);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mp.x+xs,mp.y-xs);ctx.lineTo(mp.x-xs,mp.y+xs);ctx.stroke()}
  // Player edges
  ctx.strokeStyle='#00d4ff';ctx.lineWidth=Math.max(3,cellSz*0.08);ctx.lineCap='round';
  ctx.shadowColor='#00d4ff';ctx.shadowBlur=6;
  for(var k in playerEdges){
    if(!playerEdges[k])continue;
    var parts=k.split('-'),p1=parts[0].split(','),p2=parts[1].split(',');
    var c1=cellCenter(+p1[0],+p1[1]),c2=cellCenter(+p2[0],+p2[1]);
    ctx.strokeStyle=hintEdges[k]?'#50ff90':'#00d4ff';
    ctx.beginPath();ctx.moveTo(c1.x,c1.y);ctx.lineTo(c2.x,c2.y);ctx.stroke();
  }
  ctx.shadowBlur=0;
  // Pearls
  for(var i=0;i<pearls.length;i++){
    var p=pearls[i],cc=cellCenter(p.r,p.c),rad=cellSz*0.28;
    if(p.type===1){
      ctx.fillStyle='#151535';ctx.strokeStyle='#7070cc';ctx.lineWidth=2.5;
      ctx.shadowColor='#4040ff';ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(cc.x,cc.y,rad,0,Math.PI*2);ctx.fill();ctx.stroke();
    }else{
      ctx.fillStyle='#d8d8ff';ctx.strokeStyle='#7070cc';ctx.lineWidth=2.5;
      ctx.shadowColor='#8080ff';ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(cc.x,cc.y,rad,0,Math.PI*2);ctx.fill();ctx.stroke();
    }
    ctx.shadowBlur=0;
  }
  // HUD
  if(!won)timer=(Date.now()-startTime)/1000;
  ctx.fillStyle='#8080aa';ctx.font='13px "Segoe UI",system-ui,sans-serif';ctx.textAlign='left';
  ctx.fillText('Level '+(lvlIdx+1)+': '+LV[lvlIdx].n,16,24);
  ctx.textAlign='right';ctx.fillText('Time: '+Math.floor(timer)+'s',W-16,24);
  ctx.fillStyle='#ffd700';ctx.textAlign='left';ctx.fillText('Hints: '+hints,16,44);
  // Buttons
  var btnY=6,btnSz=32;
  drawBtn(W/2-80,btnY,btnSz*2,btnSz,'Undo',false);
  drawBtn(W/2+20,btnY,btnSz*1.5,btnSz,'Hint',false);
  drawBtn(W-52,btnY+34,40,24,'Menu',false);
  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var pt=particles[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life-=0.02;
    if(pt.life<=0){particles.splice(i,1);continue}
    ctx.globalAlpha=pt.life;ctx.fillStyle=pt.color;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.sz*pt.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawWin(){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
  var bw=Math.min(300,W*0.8),bh=260,bx=(W-bw)/2,by=(H-bh)/2;
  ctx.fillStyle='rgba(20,20,50,0.95)';ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;
  drawRoundRect(bx,by,bw,bh,16);ctx.fill();ctx.stroke();
  ctx.fillStyle='#e0e0ff';ctx.font='bold 28px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
  ctx.fillText('Level Complete!',W/2,by+40);
  // Stars
  var stars=getStars(lvlIdx);ctx.font='32px sans-serif';ctx.fillStyle='#ffd700';
  var starStr='';for(var i=0;i<3;i++)starStr+=(i<stars?'\u2605':'\u2606');
  ctx.fillText(starStr,W/2,by+80);
  ctx.font='16px "Segoe UI",system-ui,sans-serif';ctx.fillStyle='#8080cc';
  ctx.fillText('Time: '+Math.floor(timer)+'s',W/2,by+110);
  if(lvlIdx<LV.length-1)drawBtn(bx+20,by+bh-70,bw-40,36,'Next Level',true);
  drawBtn(bx+20,by+bh-28,(bw-50)/2,28,'Levels',false);
  drawBtn(bx+30+(bw-50)/2,by+bh-28,(bw-50)/2,28,'Replay',false);
}

function drawTutorial(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  var bw=Math.min(340,W*0.85),bh=320,bx=(W-bw)/2,by=(H-bh)/2;
  ctx.fillStyle='rgba(20,20,50,0.95)';ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;
  drawRoundRect(bx,by,bw,bh,16);ctx.fill();ctx.stroke();
  ctx.fillStyle='#e0e0ff';ctx.font='bold 20px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
  ctx.fillText('How to Play Masyu',W/2,by+30);
  ctx.font='14px "Segoe UI",system-ui,sans-serif';ctx.fillStyle='#b0b0dd';ctx.textAlign='left';
  var lines=[
    'Draw a single continuous loop through the grid.',
    '',
    '\u25CF Black Pearl: The loop must TURN here.',
    '  It goes straight for at least 1 cell',
    '  in both directions after the turn.',
    '',
    '\u25CB White Pearl: The loop goes STRAIGHT here.',
    '  At least one adjacent cell must turn.',
    '',
    'Click between cells to draw loop segments.',
    'Right-click (or long-press) to mark X.',
    '',
    'The loop must visit every pearl!'
  ];
  for(var i=0;i<lines.length;i++){
    ctx.fillText(lines[i],bx+20,by+58+i*18);
  }
  drawBtn(bx+bw/2-50,by+bh-44,100,34,'Got it!',true);
}

function drawSettings(){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
  var bw=Math.min(260,W*0.7),bh=160,bx=(W-bw)/2,by=(H-bh)/2;
  ctx.fillStyle='rgba(20,20,50,0.95)';ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;
  drawRoundRect(bx,by,bw,bh,16);ctx.fill();ctx.stroke();
  ctx.fillStyle='#e0e0ff';ctx.font='bold 20px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
  ctx.fillText('Settings',W/2,by+30);
  drawBtn(bx+20,by+50,bw-40,36,'Sound: '+(soundOn?'On':'Off'),false);
  drawBtn(bx+20,by+94,bw-40,36,'Music: '+(musicOn?'On':'Off'),false);
  drawBtn(bx+bw/2-40,by+bh-20,80,16,'Close',false);
}

// ====== Main Render ======
function render(dt){
  ctx.clearRect(0,0,W,H);
  // Background gradient
  var grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#0a0a1a');grad.addColorStop(0.5,'#1a1a3e');grad.addColorStop(1,'#0a0a2e');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  if(state==='title')drawTitle();
  else if(state==='levels')drawLevelSelect();
  else if(state==='play'){
    drawGame(dt);
    if(won)drawWin();
    if(showTut)drawTutorial();
  }else if(state==='settings')drawSettings();
}

// ====== Input ======
var pointerDown=false,longPressTimer=null,longPressKey=null;
function getPos(e){
  var rect=canvas.getBoundingClientRect();
  return{x:e.clientX-rect.left,y:e.clientY-rect.top};
}
canvas.addEventListener('pointerdown',function(e){
  e.preventDefault();initAudio();
  var pos=getPos(e);
  pointerDown=true;
  if(state==='title'){
    var bw=Math.min(220,W*0.6),bh=48;
    if(hitBtn(pos.x,pos.y,W/2-bw/2,H*0.42,bw,bh)){state='levels';return}
    if(hitBtn(pos.x,pos.y,W/2-bw/2,H*0.52,bw,bh)){// Daily challenge
      var today=new Date();var ds=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
      var pz=genPuzzle(8,8,ds);ROWS=pz.rows;COLS=pz.cols;pearls=pz.pearls;solution=pz.solution;
      playerEdges={};xMarks={};undoStack=[];hintEdges={};won=false;timer=0;startTime=Date.now();lvlIdx=-1;
      state='play';calcLayout();if(audioCtx&&musicOn&&!bgmNodes.length)startBGM();return}
    if(hitBtn(pos.x,pos.y,W/2-bw/2,H*0.62,bw,bh)){showTut=true;tutStep=0;state='play';startLevel(0);return}
    if(hitBtn(pos.x,pos.y,W/2-bw/2,H*0.72,bw,bh)){soundOn=!soundOn;return}
    if(hitBtn(pos.x,pos.y,W/2-bw/2,H*0.82,bw,bh)){musicOn=!musicOn;if(musicOn)startBGM();else stopBGM();return}
  }else if(state==='levels'){
    if(hitBtn(pos.x,pos.y,16,H-56,80,40)){state='title';return}
    var cols=Math.min(5,Math.floor((W-40)/70));
    var sz=Math.min(56,(W-40)/cols-8);
    var startX=(W-cols*(sz+8))/2+4;
    for(var i=0;i<LV.length;i++){
      var col=i%cols,row=Math.floor(i/cols);
      var x=startX+col*(sz+8),y=70+row*(sz+10);
      var unlocked=i===0||progress.done.includes(i-1);
      if(unlocked&&hitBtn(pos.x,pos.y,x,y,sz,sz)){startLevel(i);return}
    }
  }else if(state==='play'&&!won&&!showTut){
    var btnY=6,btnSz=32;
    if(hitBtn(pos.x,pos.y,W/2-80,btnY,btnSz*2,btnSz)){undo();return}
    if(hitBtn(pos.x,pos.y,W/2+20,btnY,btnSz*1.5,btnSz)){useHint();return}
    if(hitBtn(pos.x,pos.y,W-52,btnY+34,40,24)){state='title';stopBGM();return}
    var edge=nearestEdge(pos.x,pos.y);
    if(edge){
      if(e.button===2){toggleEdge(edge,true)}
      else{toggleEdge(edge,false);
        // Long press for X
        longPressKey=edge;
        clearTimeout(longPressTimer);
        longPressTimer=setTimeout(function(){if(longPressKey){delete playerEdges[longPressKey];xMarks[longPressKey]=true;sfxXMark();longPressKey=null}},500);
      }
    }
  }else if(state==='play'&&won){
    var bw=Math.min(300,W*0.8),bh=260,bx=(W-bw)/2,by=(H-bh)/2;
    if(lvlIdx<LV.length-1&&hitBtn(pos.x,pos.y,bx+20,by+bh-70,bw-40,36)){startLevel(lvlIdx+1);return}
    if(hitBtn(pos.x,pos.y,bx+20,by+bh-28,(bw-50)/2,28)){state='levels';return}
    if(hitBtn(pos.x,pos.y,bx+30+(bw-50)/2,by+bh-28,(bw-50)/2,28)){startLevel(lvlIdx);return}
  }else if(state==='play'&&showTut){
    var bw=Math.min(340,W*0.85),bh=320,bx=(W-bw)/2,by=(H-bh)/2;
    if(hitBtn(pos.x,pos.y,bx+bw/2-50,by+bh-44,100,34)){showTut=false;progress.tutDone=true;saveProgress();return}
  }
});
canvas.addEventListener('pointermove',function(e){
  e.preventDefault();
  var pos=getPos(e);
  if(state==='play'&&!won&&!showTut){hoverEdge=nearestEdge(pos.x,pos.y)}
  else{hoverEdge=null}
});
canvas.addEventListener('pointerup',function(e){
  pointerDown=false;clearTimeout(longPressTimer);longPressKey=null;
});
canvas.addEventListener('pointercancel',function(e){
  pointerDown=false;clearTimeout(longPressTimer);longPressKey=null;
});
canvas.addEventListener('contextmenu',function(e){
  e.preventDefault();
  initAudio();
  var pos=getPos(e);
  if(state==='play'&&!won&&!showTut){
    var edge=nearestEdge(pos.x,pos.y);
    if(edge)toggleEdge(edge,true);
  }
});

// ====== Main Loop ======
function loop(ts){
  var dt=ts-lastTime;lastTime=ts;
  if(dt>100)dt=16;
  render(dt);
  rafId=requestAnimationFrame(loop);
}

// ====== Init ======
function init(){
  resize();lastTime=performance.now();
  rafId=requestAnimationFrame(loop);
}
window.addEventListener('beforeunload',function(){
  if(rafId)cancelAnimationFrame(rafId);stopBGM();timers.forEach(function(id){clearInterval(id)});
});
document.addEventListener('visibilitychange',function(){
  if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null}stopBGM()}
  else{lastTime=performance.now();rafId=requestAnimationFrame(loop);if(state==='play'&&musicOn)startBGM()}
});
init();
})();
