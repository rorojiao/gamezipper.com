/* ===== SEEDED PRNG ===== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

/* ===== LEVEL CONFIGS ===== */
/* w=width, h=height, nc=number of circles, sd=seed, par=seconds for 3-star */
var LV=[
/* Tier 1: 5x6 Easy */
{w:5,h:6,nc:5,sd:1001,par:60},{w:5,h:6,nc:5,sd:1002,par:65},{w:5,h:6,nc:6,sd:1003,par:70},
{w:5,h:6,nc:6,sd:1004,par:75},{w:5,h:6,nc:6,sd:1005,par:80},{w:5,h:6,nc:7,sd:1006,par:85},
/* Tier 2: 6x6 Easy-Med */
{w:6,h:6,nc:6,sd:2007,par:100},{w:6,h:6,nc:6,sd:2008,par:110},{w:6,h:6,nc:7,sd:2009,par:120},
{w:6,h:6,nc:7,sd:2010,par:130},{w:6,h:6,nc:8,sd:2011,par:140},{w:6,h:6,nc:8,sd:2012,par:150},
/* Tier 3: 8x8 Medium */
{w:8,h:8,nc:8,sd:3013,par:200},{w:8,h:8,nc:9,sd:3014,par:220},{w:8,h:8,nc:9,sd:3015,par:240},
{w:8,h:8,nc:10,sd:3016,par:260},{w:8,h:8,nc:10,sd:3017,par:280},{w:8,h:8,nc:11,sd:3018,par:300},

{w:10,h:10,nc:11,sd:4019,par:360},{w:10,h:10,nc:12,sd:4020,par:400},{w:10,h:10,nc:12,sd:4021,par:440},
{w:10,h:10,nc:13,sd:4022,par:480},{w:10,h:10,nc:14,sd:4023,par:520},{w:10,h:10,nc:14,sd:4024,par:560},
/* Tier 5: 12-16 Hard */
{w:12,h:12,nc:15,sd:5025,par:600},{w:12,h:12,nc:16,sd:5026,par:660},
{w:14,h:14,nc:18,sd:5027,par:720},{w:14,h:14,nc:20,sd:5028,par:780},
{w:16,h:16,nc:22,sd:5029,par:840},{w:16,h:16,nc:24,sd:5030,par:900}
];
var TIERS=[0,6,12,18,24];

/* ===== PUZZLE GENERATOR ===== */
/* Generates a Hamiltonian cycle, then places circles on it */
function ek(r1,c1,r2,c2){if(r1>r2||(r1===r2&&c1>c2))return r2+','+c2+'-'+r1+','+c1;return r1+','+c1+'-'+r2+','+c2}

/* Constructive HC: build a snake cycle that always produces a valid Hamiltonian cycle.
   Pattern: row 0 right, rows 1..h-1 snake columns w-1..1, close via column 0 going up.
   Requires even h. Already has good turn/straight variety for circle placement. */
function buildLoop(w,h){
var path=[];
for(var c=0;c<w;c++)path.push(c);
for(var r=1;r<h;r++){
if(r%2===1){for(var c=w-1;c>=1;c--)path.push(r*w+c);}
else{for(var c=1;c<w;c++)path.push(r*w+c);}
}
path.push((h-1)*w);
for(var r=h-2;r>=1;r--)path.push(r*w);
return path;
}

function findHC(w,h){return buildLoop(w,h)}

function genPuzzle(w,h,nc,sd){
var rng=mulberry32(sd);
var hc=findHC(w,h);
if(!hc)return null;
/* Convert HC path to edge set and compute turn/straight per cell */
var edges=[];
var cellDirs={};/* cell -> array of [dr,dc] directions the loop uses */
for(var i=0;i<hc.length-1;i++){
var r1=Math.floor(hc[i]/w),c1=hc[i]%w;
var r2=Math.floor(hc[i+1]/w),c2=hc[i+1]%w;
edges.push(ek(r1,c1,r2,c2));
var dr=r2-r1,dc=c2-c1;
var k1=r1+','+c1,k2=r2+','+c2;
if(!cellDirs[k1])cellDirs[k1]=[];
cellDirs[k1].push([dr,dc]);
if(!cellDirs[k2])cellDirs[k2]=[];
cellDirs[k2].push([-dr,-dc]);
}
/* Close the loop */
var lr=Math.floor(hc[hc.length-1]/w),lc=hc[hc.length-1]%w;
var fr=Math.floor(hc[0]/w),fc=hc[0]%w;
edges.push(ek(lr,lc,fr,fc));
var dr=fr-lr,dc=fc-lc;
var kl=lr+','+lc,kf=fr+','+fc;
if(!cellDirs[kl])cellDirs[kl]=[];
cellDirs[kl].push([dr,dc]);
if(!cellDirs[kf])cellDirs[kf]=[];
cellDirs[kf].push([-dr,-dc]);

/* Classify each cell: straight or turn */
var cellType={};/* r,c -> 'straight' or 'turn' */
for(var k in cellDirs){
var ds=cellDirs[k];
if(ds.length===2){
var d0=ds[0],d1=ds[1];
/* Turn if directions are perpendicular */
if(d0[0]*d1[0]+d0[1]*d1[1]===0)cellType[k]='turn';
else cellType[k]='straight';
}
}

/* Place circles: select cells, assign b/w based on turn/straight */
var allCells=[];
for(var r=0;r<h;r++)for(var c=0;c<w;c++)allCells.push(r+','+c);
/* Shuffle */
for(var i=allCells.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=allCells[i];allCells[i]=allCells[j];allCells[j]=tmp;}

var circles=[];
var used={};
for(var i=0;i<allCells.length&&circles.length<nc;i++){
var k=allCells[i];
if(!cellType[k])continue;/* shouldn't happen */
var ct=cellType[k]==='turn'?'b':'w';
circles.push({r:+k.split(',')[0],c:+k.split(',')[1],t:ct});
used[k]=1;
}

return{w:w,h:h,circles:circles,solution:edges};
}

/* ===== EDGE DETECTION FROM POINTER ===== */
function edgeFromPos(px,py){
var hudH=52,pad=12,cw=window.innerWidth,ch=window.innerHeight;
var gw=cw-pad*2,gh=ch-hudH-pad*2;
var cellW=Math.floor(Math.min(gw/S.w,gh/S.h));if(cellW<10)cellW=10;
var gridW=cellW*S.w,gridH=cellW*S.h;
var ox=(cw-gridW)/2,oy=hudH+(ch-hudH-gridH)/2;
var bestDist=Infinity,bestEdge=null,threshold=0.4;
/* Check vertical edges: (r,c)-(r+1,c) for r in [0,h-2], c in [0,w] */
for(var c=0;c<=S.w;c++){
var ex=ox+c*cellW;
var dx=Math.abs(px-ex);
if(dx>cellW*threshold)continue;
var r=Math.round((py-oy)/cellW-0.5);
r=Math.max(0,Math.min(S.h-2,r));
if(r>=0&&r<S.h-1&&dx<bestDist){bestDist=dx;bestEdge=ek(r,c,r+1,c);}
}
/* Check horizontal edges: (r,c)-(r,c+1) for r in [0,h], c in [0,w-2] */
for(var r=0;r<=S.h;r++){
var ey=oy+r*cellW;
var dy=Math.abs(py-ey);
if(dy>cellW*threshold)continue;
var c=Math.round((px-ox)/cellW-0.5);
c=Math.max(0,Math.min(S.w-2,c));
if(c>=0&&c<S.w-1&&dy<bestDist){bestDist=dy;bestEdge=ek(r,c,r,c+1);}
}
return bestEdge;
}

/* ===== GAME LOGIC ===== */
function toggleEdge(e){
if(!e||S.screen!=='game')return;
S.redoStack=[];
if(S.drawnEdges.has(e)){S.undoStack.push({a:'remove',e:e});S.drawnEdges.delete(e);playTone('undraw');}
else if(S.crossedEdges.has(e)){S.undoStack.push({a:'uncross',e:e});S.crossedEdges.delete(e);playTone('undraw');}
else{S.undoStack.push({a:'draw',e:e});S.drawnEdges.add(e);S.crossedEdges.delete(e);playTone('draw');}
render();checkWin();
}
function toggleCross(e){
if(!e||S.screen!=='game')return;
S.redoStack=[];
if(S.crossedEdges.has(e)){S.undoStack.push({a:'uncross',e:e});S.crossedEdges.delete(e);playTone('undraw');}
else if(!S.drawnEdges.has(e)){S.undoStack.push({a:'cross',e:e});S.crossedEdges.add(e);playTone('cross');}
render();
}
function doUndo(){
if(!S.undoStack.length)return;var act=S.undoStack.pop();S.redoStack.push(act);
if(act.a==='draw')S.drawnEdges.delete(act.e);
else if(act.a==='remove')S.drawnEdges.add(act.e);
else if(act.a==='cross')S.crossedEdges.delete(act.e);
else if(act.a==='uncross')S.crossedEdges.add(act.e);
playTone('undraw');render();
}
function doRedo(){
if(!S.redoStack.length)return;var act=S.redoStack.pop();S.undoStack.push(act);
if(act.a==='draw')S.drawnEdges.add(act.e);
else if(act.a==='remove')S.drawnEdges.delete(act.e);
else if(act.a==='cross')S.crossedEdges.add(act.e);
else if(act.a==='uncross')S.crossedEdges.delete(act.e);
playTone('draw');render();
}
function doReset(){
S.drawnEdges=new Set();S.crossedEdges=new Set();S.undoStack=[];S.redoStack=[];
S.hints=3;S.tStart=Date.now();S.errEdges=[];playTone('undraw');render();
}
function doHint(){
if(S.hints<=0){playTone('error');return;}S.hints--;
for(var e of S.solutionEdges){if(!S.drawnEdges.has(e)){
S.undoStack.push({a:'draw',e:e});S.redoStack=[];S.drawnEdges.add(e);S.crossedEdges.delete(e);
playTone('hint');render();return;}}playTone('error');
}
function doCheck(){
S.errEdges=[];var found=false;
for(var e of S.drawnEdges){if(!S.solutionEdges.has(e)){S.errEdges.push(e);found=true;}}
if(found){playTone('error');S.errTimer=Date.now();render();setTimeout(function(){S.errEdges=[];render()},1500);}
else playTone('hint');
}
function checkWin(){
if(S.drawnEdges.size!==S.solutionEdges.size)return;
for(var e of S.solutionEdges)if(!S.drawnEdges.has(e))return;
S.elapsed=Math.floor((Date.now()-S.tStart)/1000);
var par=S.level>=0?LV[S.level].par:300;
var stars=S.elapsed<=par?3:S.elapsed<=par*1.5?2:1;
S.particles=[];for(var i=0;i<50;i++)S.particles.push({x:canvas.width/2,y:canvas.height/2,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,life:1,color:['#00d9ff','#ffd700','#ff006e'][Math.floor(Math.random()*3)]});
if(S.level>=0){save.lv[S.level]=Math.max(save.lv[S.level],stars);putSave(save);}
playTone('win');showWin(stars);
}
function showWin(stars){
document.getElementById('winTitle').textContent=S.daily?'Daily Challenge Solved!':'Puzzle Solved!';
document.getElementById('winStars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
document.getElementById('winTime').textContent='Time: '+formatTime(S.elapsed);
document.getElementById('winNext').style.display=S.level>=0&&S.level<LV.length-1?'inline-block':'none';
document.getElementById('winOv').classList.add('show');
}
function nextLevel(){document.getElementById('winOv').classList.remove('show');if(S.level>=0&&S.level<LV.length-1)startLevel(S.level+1);}
function formatTime(s){var m=Math.floor(s/60);return(m<10?'0':'')+m+':'+(s%60<10?'0':'')+(s%60)}

/* ===== RENDERING ===== */
function render(){
if(S.screen!=='game')return;
var dpr=window.devicePixelRatio||1;
var cw=window.innerWidth,ch=window.innerHeight;
canvas.width=cw*dpr;canvas.height=ch*dpr;
canvas.style.width=cw+'px';canvas.style.height=ch+'px';
ctx.setTransform(dpr,0,0,dpr,0,0);
/* Background */
var grad=ctx.createLinearGradient(0,0,cw,ch);
grad.addColorStop(0,'#0a0e27');grad.addColorStop(0.5,'#1a1f3a');grad.addColorStop(1,'#2d1b4e');
ctx.fillStyle=grad;ctx.fillRect(0,0,cw,ch);
var hudH=52,pad=12;
var gw=cw-pad*2,gh=ch-hudH-pad*2;
var cellW=Math.floor(Math.min(gw/S.w,gh/S.h));if(cellW<10)cellW=10;
var gridW=cellW*S.w,gridH=cellW*S.h;
var ox=(cw-gridW)/2,oy=hudH+(ch-hudH-gridH)/2;
S._ox=ox;S._oy=oy;S._cw=cellW;
/* Subtle grid lines */
ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
for(var r=0;r<=S.h;r++){ctx.beginPath();ctx.moveTo(ox,oy+r*cellW);ctx.lineTo(ox+gridW,oy+r*cellW);ctx.stroke();}
for(var c=0;c<=S.w;c++){ctx.beginPath();ctx.moveTo(ox+c*cellW,oy);ctx.lineTo(ox+c*cellW,oy+gridH);ctx.stroke();}
/* Grid dots */
ctx.fillStyle='rgba(255,255,255,0.2)';
for(var r=0;r<=S.h;r++)for(var c=0;c<=S.w;c++){
ctx.beginPath();ctx.arc(ox+c*cellW,oy+r*cellW,Math.max(2,cellW*0.07),0,Math.PI*2);ctx.fill();}
/* X marks */
ctx.strokeStyle='rgba(255,100,100,0.35)';ctx.lineWidth=Math.max(1,cellW*0.04);
for(var e of S.crossedEdges){
var parts=e.split('-');var a=parts[0].split(','),b=parts[1].split(',');
var x1=ox+(+a[1])*cellW,y1=oy+(+a[0])*cellW,x2=ox+(+b[1])*cellW,y2=oy+(+b[0])*cellW;
var mx=(x1+x2)/2,my=(y1+y2)/2,s=cellW*0.15;
ctx.beginPath();ctx.moveTo(mx-s,my-s);ctx.lineTo(mx+s,my+s);ctx.moveTo(mx+s,my-s);ctx.lineTo(mx-s,my+s);ctx.stroke();}
/* Error edges */
var now=Date.now();
if(S.errEdges.length>0){
ctx.save();ctx.strokeStyle='rgba(255,0,110,0.9)';ctx.lineWidth=Math.max(5,cellW*0.14);ctx.lineCap='round';
var pulse=0.5+0.5*Math.sin((now-S.errTimer)/80*Math.PI);ctx.globalAlpha=pulse;
for(var i=0;i<S.errEdges.length;i++){
var parts=S.errEdges[i].split('-');var a=parts[0].split(','),b=parts[1].split(',');
ctx.beginPath();ctx.moveTo(ox+(+a[1])*cellW,oy+(+a[0])*cellW);ctx.lineTo(ox+(+b[1])*cellW,oy+(+b[0])*cellW);ctx.stroke();}
ctx.restore();}
/* Neon cyan drawn lines */
ctx.save();ctx.strokeStyle='#00d9ff';ctx.lineWidth=Math.max(3,cellW*0.09);ctx.lineCap='round';
ctx.shadowColor='#00d9ff';ctx.shadowBlur=14;
for(var e of S.drawnEdges){
var parts=e.split('-');var a=parts[0].split(','),b=parts[1].split(',');
ctx.beginPath();ctx.moveTo(ox+(+a[1])*cellW,oy+(+a[0])*cellW);ctx.lineTo(ox+(+b[1])*cellW,oy+(+b[0])*cellW);ctx.stroke();}
ctx.restore();
/* Circles */
for(var i=0;i<S.circles.length;i++){
var ci=S.circles[i];var cx=ox+ci.c*cellW+cellW/2,cy=oy+ci.r*cellW+cellW/2;
var radius=Math.max(5,cellW*0.28);
ctx.save();
if(ci.t==='b'){
ctx.shadowColor='rgba(255,255,255,0.3)';ctx.shadowBlur=8;
ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.fillStyle='#e8eaf6';ctx.fill();
ctx.beginPath();ctx.arc(cx,cy,radius*0.55,0,Math.PI*2);ctx.fillStyle='#1a1f3a';ctx.fill();
ctx.beginPath();ctx.arc(cx,cy,radius*0.35,0,Math.PI*2);ctx.fillStyle='#e8eaf6';ctx.fill();
}else{
ctx.shadowColor='rgba(0,217,255,0.2)';ctx.shadowBlur=6;
ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);
ctx.fillStyle='rgba(10,14,39,0.85)';ctx.fill();
ctx.strokeStyle='#e8eaf6';ctx.lineWidth=Math.max(2,cellW*0.06);ctx.stroke();
}ctx.restore();}
/* Particles */
for(var i=0;i<S.particles.length;i++){
var p=S.particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=.012;
if(p.life>0){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x/dpr,p.y/dpr,4,0,Math.PI*2);ctx.fill();}}
ctx.globalAlpha=1;S.particles=S.particles.filter(function(p){return p.life>0});
/* Timer */
var elapsed=S.elapsed||Math.floor((Date.now()-S.tStart)/1000);
document.getElementById('timer').textContent=formatTime(elapsed);
/* Hint count badge */
S.rafId=requestAnimationFrame(render);
}

/* ===== INPUT ===== */
function handlePointerDown(e){
if(S.screen!=='game')return;e.preventDefault();initAudio();
var rect=canvas.getBoundingClientRect();
var px=(e.clientX||e.pageX)-rect.left,py=(e.clientY||e.pageY)-rect.top;
var edge=edgeFromPos(px,py);
if(!edge)return;
if(e.button===2||e.ctrlKey)toggleCross(edge);else toggleEdge(edge);
}
/* ===== CLEANUP ===== */
function cleanup(){if(S.rafId){cancelAnimationFrame(S.rafId);S.rafId=null;}if(audioCtx){audioCtx.close().catch(function(){});audioCtx=null;}}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){if(document.hidden){if(S.rafId){cancelAnimationFrame(S.rafId);S.rafId=null;}}else if(S.screen==='game')render();});

/* ===== INIT ===== */
function init(){
canvas=document.getElementById('c');ctx=canvas.getContext('2d');
canvas.addEventListener('pointerdown',handlePointerDown);
canvas.addEventListener('pointermove',function(e){e.preventDefault()});
canvas.addEventListener('pointerup',function(e){e.preventDefault()});
canvas.addEventListener('pointercancel',function(e){e.preventDefault()});
canvas.addEventListener('contextmenu',function(e){e.preventDefault()});
initSave();if(!save.tut)showTutorial();
var resizeTimer;
window.addEventListener('resize',function(){clearTimeout(resizeTimer);resizeTimer=setTimeout(function(){if(S.screen==='game')render()},100)});
document.addEventListener('keydown',function(e){
if(S.screen!=='game')return;
if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();if(e.shiftKey)doRedo();else doUndo();}
if(e.key==='h'&&!e.ctrlKey)doHint();if(e.key==='r'&&!e.ctrlKey)doReset();
});
}
window.addEventListener('DOMContentLoaded',init);
</script>
