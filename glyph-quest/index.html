// ============================================================
// GLYPH QUEST - Hexagonal Pipe Puzzle Game
// Single-file HTML5 Canvas game, no dependencies

(function(){
"use strict";

// --- Canvas Setup ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr, hexR, fontSize;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  hexR = W < 600 ? 30 : 40;
  fontSize = W < 600 ? 14 : 16;
}
window.addEventListener('resize', resize);
resize();

// --- Constants ---
const HEX_DIRS = [0, 1, 2, 3, 4, 5]; // 0=right, 1=upper-right, 2=upper-left, 3=left, 4=lower-left, 5=lower-right
const SQRT3 = Math.sqrt(3);
const PI = Math.PI;
const TAU = PI * 2;
const HEX_ANG = TAU / 6;

// Tile types
const T_STRAIGHT = 0, T_BEND = 1, T_TEE = 2, T_CROSS = 3, T_DEAD = 4, T_START = 5, T_END = 6, T_UNIVERSAL = 7;

// Civilization themes
const CIVS = {
  egypt:  { name:'Egypt',  bg:'#F4A261', pipe:'#E76F51', glow:'#FEFAE0', accent:'#D4A373' },
  maya:   { name:'Maya',   bg:'#2D6A4F', pipe:'#40916C', glow:'#95D5B2', accent:'#1B4332' },
  norse:  { name:'Norse',  bg:'#48CAE4', pipe:'#0096C7', glow:'#CAF0F8', accent:'#023E8A' },
  greek:  { name:'Greek',  bg:'#F8F9FA', pipe:'#ADB5BD', glow:'#E9ECEF', accent:'#6C757D' },
  japan:  { name:'Japan',  bg:'#FFB3C1', pipe:'#FF758F', glow:'#FFCCD5', accent:'#C9184A' }
};
const CIV_ORDER = ['egypt','maya','norse','greek','japan'];

// --- Audio ---
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playTone(freq, dur, type, vol) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = vol || 0.15;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxClick() { playTone(800, 0.05, 'square', 0.1); }
function sfxConnect() { playTone(220, 0.3, 'sine', 0.12); }
function sfxWin() { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.3, 'sine', 0.15), i*120)); }

// --- Hex Math ---
// Axial coordinates (q, r) for hex grid (pointy-top)
function hexToPixel(q, r, cx, cy, size) {
  const x = size * (SQRT3 * q + SQRT3/2 * r) + cx;
  const y = size * (3/2 * r) + cy;
  return {x, y};
}

function pixelToHex(px, py, cx, cy, size) {
  const x = (px - cx) / size;
  const y = (py - cy) / size;
  const q = (SQRT3/3 * x - 1/3 * y);
  const r = (2/3 * y);
  return hexRound(q, r);
}

function hexRound(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return {q: rq, r: rr};
}

// Get neighbor in direction d (0-5) from (q,r)
function hexNeighbor(q, r, d) {
  const dirs = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
  return {q: q + dirs[d][0], r: r + dirs[d][1]};
}

// Opposite direction
function oppositeDir(d) { return (d + 3) % 6; }

// --- Tile Definition ---
// Each tile type defines which directions are "open" at rotation 0
// rotation adds to each direction: (dir + rotation) % 6
const TILE_BASES = {
  [T_STRAIGHT]:  [0, 3],           // opposite sides
  [T_BEND]:     [0, 1],           // adjacent sides
  [T_TEE]:      [0, 1, 3],       // T shape
  [T_CROSS]:    [0, 1, 3, 4],    // 4 sides
  [T_DEAD]:     [0],              // dead end
  [T_START]:    [0, 1, 2, 3, 4, 5], // all open, fixed
  [T_END]:      [0, 1, 2, 3, 4, 5], // all open, fixed
  [T_UNIVERSAL]: [0, 1, 2, 3, 4, 5] // all open
};

function getOpenDirs(type, rotation) {
  const base = TILE_BASES[type];
  if (!base) return [];
  return base.map(d => (d + rotation) % 6);
}

function hasDir(openDirs, d) { return openDirs.includes(d); }

// --- Level Generation ---
// Generate a solvable level using reverse method
function generateLevel(cols, rows, numStarts, numEnds, seed) {
  // Seeded random
  let s = seed || Date.now();
  function rand() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; }

  // Create grid as flat array keyed by "q,r"
  const grid = {};
  const allHexes = [];

  for (let r = 0; r < rows; r++) {
    for (let q = 0; q < cols; q++) {
      const key = q + ',' + r;
      grid[key] = { q, r, type: null, rotation: 0, fixed: false, openDirs: [] };
      allHexes.push(key);
    }
  }

  // Pick start and end positions
  function randHex() { const k = allHexes[Math.floor(rand() * allHexes.length)]; return grid[k]; }

  // BFS path from start to end through empty cells
  function findPath(startKey, endKey) {
    const visited = new Set();
    const queue = [[startKey, [startKey]]];
    visited.add(startKey);
    while (queue.length > 0) {
      const [cur, path] = queue.shift();
      if (cur === endKey) return path;
      const c = grid[cur];
      // Try all 6 neighbors in random order
      const dirs = [0,1,2,3,4,5].sort(() => rand() - 0.5);
      for (const d of dirs) {
        const n = hexNeighbor(c.q, c.r, d);
        const nk = n.q + ',' + n.r;
        if (grid[nk] && !visited.has(nk) && (grid[nk].type === null || nk === endKey)) {
          visited.add(nk);
          queue.push([nk, [...path, nk]]);
        }
      }
    }
    return null;
  }

  // Place start and end
  const startKey = allHexes[0];
  const endKey = allHexes[allHexes.length - 1];

  // Build a spanning tree (random MST) to create the pipe network
  const inTree = new Set();
  const edges = []; // {from, to, dir}

  // Start with start cell
  inTree.add(startKey);

  while (inTree.size < allHexes.length) {
    // Pick random cell in tree, try to connect to neighbor not in tree
    const candidates = [];
    for (const k of inTree) {
      const c = grid[k];
      for (let d = 0; d < 6; d++) {
        const n = hexNeighbor(c.q, c.r, d);
        const nk = n.q + ',' + n.r;
        if (grid[nk] && !inTree.has(nk)) {
          candidates.push({from: k, to: nk, dir: d});
        }
      }
    }
    if (candidates.length === 0) break;
    const edge = candidates[Math.floor(rand() * candidates.length)];
    edges.push(edge);
    inTree.add(edge.to);
  }

  // Determine open directions for each cell based on tree edges
  const cellDirs = {};
  for (const k of allHexes) cellDirs[k] = new Set();

  for (const e of edges) {
    cellDirs[e.from].add(e.dir);
    cellDirs[e.to].add(oppositeDir(e.dir));
  }

  // Assign tile types based on number of open directions
  function dirsToType(dirs) {
    const n = dirs.length;
    if (n === 0) return T_DEAD; // shouldn't happen in MST
    if (n === 1) return T_DEAD;
    if (n === 6) return T_UNIVERSAL;
    if (n === 4) return T_CROSS;
    if (n === 3) return T_TEE;
    if (n === 2) {
      // Check if opposite or adjacent
      const [a, b] = dirs;
      if ((a + 3) % 6 === b) return T_STRAIGHT;
      return T_BEND;
    }
    return T_DEAD;
  }

  // Find best rotation for a tile type given desired directions
  function findRotation(type, desiredDirs) {
    if (type === T_UNIVERSAL) return 0;
    for (let rot = 0; rot < 6; rot++) {
      const open = getOpenDirs(type, rot);
      if (desiredDirs.length === open.length && desiredDirs.every(d => open.includes(d))) return rot;
    }
    return 0;
  }

  // Assign tiles
  for (const k of allHexes) {
    const dirs = Array.from(cellDirs[k]).sort();
    const type = dirsToType(dirs);
    const rot = findRotation(type, dirs);
    grid[k].type = type;
    grid[k].rotation = rot;
    grid[k].solutionRotation = rot;
    grid[k].openDirs = dirs;
  }

  // Mark start and end
  grid[startKey].type = T_START;
  grid[startKey].fixed = true;
  grid[startKey].rotation = 0;
  grid[startKey].solutionRotation = 0;
  grid[endKey].type = T_END;
  grid[endKey].fixed = true;
  grid[endKey].rotation = 0;
  grid[endKey].solutionRotation = 0;

  // Scramble: randomly rotate all non-fixed tiles
  let minMoves = 0;
  for (const k of allHexes) {
    if (!grid[k].fixed && grid[k].type !== T_UNIVERSAL) {
      const turns = 1 + Math.floor(rand() * 5); // 1-5 rotations
      grid[k].rotation = (grid[k].rotation + turns) % 6;
      if (turns !== 0) minMoves++;
    }
  }

  // Calculate minimum moves more accurately
  minMoves = 0;
  for (const k of allHexes) {
    const c = grid[k];
    if (c.fixed || c.type === T_UNIVERSAL) continue;
    if (c.rotation !== c.solutionRotation) minMoves++;
  }

  return {
    grid, allHexes, startKey, endKey,
    cols, rows, minMoves: Math.max(minMoves, 1)
  };
}

// --- Level Definitions ---
// Pre-generated level configs per civilization
const LEVEL_CONFIGS = [];

// Egypt: levels 1-8
LEVEL_CONFIGS.push(
  {cols:3,rows:3,civ:'egypt',star3:2},    // 1
  {cols:3,rows:3,civ:'egypt',star3:3},    // 2
  {cols:3,rows:3,civ:'egypt',star3:4},    // 3
  {cols:4,rows:3,civ:'egypt',star3:5},    // 4
  {cols:4,rows:4,civ:'egypt',star3:7},    // 5
  {cols:4,rows:4,civ:'egypt',star3:8},    // 6
  {cols:4,rows:4,civ:'egypt',star3:10},   // 7
  {cols:5,rows:4,civ:'egypt',star3:12}    // 8 boss
);
// Maya: 9-16
for (let i = 0; i < 8; i++) LEVEL_CONFIGS.push({cols:4+Math.floor(i/4),rows:4,civ:'maya',star3:8+i});
// Norse: 17-24
for (let i = 0; i < 8; i++) LEVEL_CONFIGS.push({cols:5,rows:5,civ:'norse',star3:12+i*1.5|0});
// Greek: 25-32
for (let i = 0; i < 8; i++) LEVEL_CONFIGS.push({cols:5+Math.floor(i/4),rows:5,civ:'greek',star3:18+i*1.5|0});
// Japan: 33-40
for (let i = 0; i < 8; i++) LEVEL_CONFIGS.push({cols:6+Math.floor(i/4),rows:6,civ:'japan',star3:25+i*2});
// Bonus: 41-50
for (let i = 0; i < 10; i++) LEVEL_CONFIGS.push({cols:7,rows:7,civ:CIV_ORDER[i%5],star3:35+i*2});

// Generate persistent levels with fixed seeds
const LEVELS = LEVEL_CONFIGS.map((cfg, i) => {
  const lvl = generateLevel(cfg.cols, cfg.rows, 1, 1, 1000 + i * 7);
  lvl.civ = cfg.civ;
  lvl.star3 = cfg.star3;
  lvl.index = i;
  return lvl;
});

// --- Game State ---
const STATE = {
  screen: 'menu', // menu, civSelect, levelSelect, game, win, notebook, daily, achievements
  civ: null,
  levelIdx: -1,
  level: null,
  moves: 0,
  startTime: 0,
  hints: 0,
  animating: null, // {key, from, to, t}
  particles: [],
  connectedSet: new Set(),
  winAnim: 0,
  lunaState: 'think', // think, happy, confused
  scrollY: 0,
  dailySeed: 0,
  dailyLevel: null,
  transitions: []
};

// Save data
const SAVE_KEY = 'glyphquest_save';
let save = { stars:{}, completed:{}, achievements:{}, noHintCount:0, dailyDate:'', dailyDone:false, streak3:0 };

function loadSave() {
  try { const s = localStorage.getItem(SAVE_KEY); if (s) save = JSON.parse(s); } catch(e){}
}
function saveSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch(e){}
}
loadSave();

// --- Drawing Helpers ---
function drawHex(cx, cy, r, fill, stroke, lw) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = PI/6 + i * HEX_ANG;
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw||2; ctx.stroke(); }
}

function drawPipe(cx, cy, r, dirs, color, glowColor) {
  const pipeW = r * 0.3;
  // Draw connections from center to each edge
  for (const d of dirs) {
    const a = d * HEX_ANG;
    const ex = cx + r * Math.cos(a);
    const ey = cy + r * Math.sin(a);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = color;
    ctx.lineWidth = pipeW;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, pipeW * 0.6, 0, TAU);
  ctx.fillStyle = color;
  ctx.fill();
}

// --- Luna Drawing ---
function drawLuna(x, y, w, h, state, t) {
  const scale = w / 40;
  ctx.save();
  ctx.translate(x, y);

  // Body bob
  const bob = state === 'happy' ? Math.abs(Math.sin(t * 5)) * 5 * scale : 0;
  ctx.translate(0, -bob);

  // Legs
  ctx.fillStyle = '#5D4E37';
  ctx.fillRect(10*scale, 45*scale, 6*scale, 15*scale);
  ctx.fillRect(24*scale, 45*scale, 6*scale, 15*scale);

  // Body
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(8*scale, 25*scale, 24*scale, 22*scale);

  // Head
  ctx.fillStyle = '#FFDAB9';
  ctx.beginPath();
  ctx.arc(20*scale, 18*scale, 12*scale, 0, TAU);
  ctx.fill();

  // Hair (brown short)
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.arc(20*scale, 15*scale, 13*scale, PI, 0);
  ctx.fill();

  // Explorer hat
  ctx.fillStyle = '#D2B48C';
  ctx.fillRect(6*scale, 4*scale, 28*scale, 6*scale);
  ctx.fillRect(12*scale, -2*scale, 16*scale, 8*scale);

  // Eyes
  ctx.fillStyle = '#333';
  ctx.fillRect(15*scale, 16*scale, 3*scale, 3*scale);
  ctx.fillRect(22*scale, 16*scale, 3*scale, 3*scale);

  // Mouth
  if (state === 'happy') {
    ctx.beginPath();
    ctx.arc(20*scale, 22*scale, 4*scale, 0, PI);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5*scale;
    ctx.stroke();
  } else if (state === 'confused') {
    ctx.beginPath();
    ctx.arc(22*scale, 22*scale, 2*scale, 0, TAU);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1*scale;
    ctx.stroke();
  } else {
    // thinking - hand on chin
    ctx.beginPath();
    ctx.moveTo(17*scale, 20*scale);
    ctx.lineTo(23*scale, 22*scale);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1*scale;
    ctx.stroke();
    // Hand scratching head
    ctx.fillStyle = '#FFDAB9';
    ctx.fillRect(30*scale, 8*scale, 5*scale, 5*scale);
  }

  // Question mark for confused
  if (state === 'confused') {
    ctx.fillStyle = '#FFD700';
    ctx.font = (10*scale) + 'px sans-serif';
    ctx.fillText('?', 32*scale, 8*scale);
  }

  ctx.restore();
}

// --- Particle System ---
function spawnParticles(cx, cy, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * TAU;
    const speed = 1 + Math.random() * 3;
    STATE.particles.push({
      x: cx, y: cy,
      vx: Math.cos(a) * speed,
      vy: Math.sin(a) * speed - 1,
      life: 1,
      color,
      size: 2 + Math.random() * 4
    });
  }
}

function updateParticles(dt) {
  for (let i = STATE.particles.length - 1; i >= 0; i--) {
    const p = STATE.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= dt * 1.5;
    if (p.life <= 0) STATE.particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of STATE.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, TAU);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Connectivity Check ---
function checkConnectivity(level) {
  const {grid, startKey, endKey} = level;
  const visited = new Set();
  const queue = [startKey];
  visited.add(startKey);

  while (queue.length > 0) {
    const k = queue.shift();
    const c = grid[k];
    const dirs = c.fixed || c.type === T_UNIVERSAL
      ? getOpenDirs(c.type, c.rotation)
      : getOpenDirs(c.type, c.rotation);

    for (const d of dirs) {
      const n = hexNeighbor(c.q, c.r, d);
      const nk = n.q + ',' + n.r;
      if (!grid[nk] || visited.has(nk)) continue;
      const nc = grid[nk];
      const nDirs = getOpenDirs(nc.type, nc.rotation);
      if (hasDir(nDirs, oppositeDir(d))) {
        visited.add(nk);
        queue.push(nk);
      }
    }
  }

  STATE.connectedSet = visited;
  return visited.has(endKey);
}

// --- Rendering ---
function getGridCenter(level) {
  const {cols, rows} = level;
  // Estimate grid bounds
  const cx = W / 2;
  const cy = H / 2 - 20;
  return {cx, cy};
}

function renderGame() {
  const level = STATE.level;
  if (!level) return;
  const {grid, allHexes, startKey, endKey} = level;
  const civ = CIVS[level.civ];
  const {cx, cy} = getGridCenter(level);
  const r = hexR;
  const t = performance.now() / 1000;

  // Background
  ctx.fillStyle = civ.accent;
  ctx.fillRect(0, 0, W, H);

  // Draw hexes
  for (const k of allHexes) {
    const c = grid[k];
    const pos = hexToPixel(c.q, c.r, cx, cy, r);

    // Handle animation
    let drawRot = c.rotation;
    if (STATE.animating && STATE.animating.key === k) {
      const a = STATE.animating;
      const progress = Math.min(a.t / 0.2, 1);
      const ease = progress < 0.5 ? 2*progress*progress : 1-Math.pow(-2*progress+2,2)/2;
      drawRot = a.from + (a.to - a.from) * ease;
    }

    const isConnected = STATE.connectedSet.has(k);

    // Hex background
    const bgColor = isConnected ? civ.glow : civ.bg;
    drawHex(pos.x, pos.y, r - 2, bgColor, '#00000030', 1.5);

    // Glow for connected
    if (isConnected && c.type !== T_START && c.type !== T_END) {
      const pulse = 0.3 + 0.2 * Math.sin(t * TAU / 0.6);
      ctx.globalAlpha = pulse;
      drawHex(pos.x, pos.y, r + 2, civ.glow, null);
      ctx.globalAlpha = 1;
    }

    // Draw pipe
    const dirs = getOpenDirs(c.type, Math.floor(drawRot) % 6);
    const pipeColor = c.type === T_START ? '#FFD700' : c.type === T_END ? '#FF4444' : civ.pipe;

    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.rotate(drawRot * HEX_ANG);
    // Draw pipe relative to rotation 0
    const baseDirs = TILE_BASES[c.type] || [];
    for (const d of baseDirs) {
      const a = d * HEX_ANG;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(r * 0.85 * Math.cos(a), r * 0.85 * Math.sin(a));
      ctx.strokeStyle = pipeColor;
      ctx.lineWidth = r * 0.25;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
    // Center
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.15, 0, TAU);
    ctx.fillStyle = pipeColor;
    ctx.fill();
    ctx.restore();

    // Start/End markers
    if (c.type === T_START) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r * 0.2, 0, TAU);
      ctx.fillStyle = '#FFD700';
      ctx.fill();
      // Pulsing glow
      ctx.globalAlpha = 0.4 + 0.3 * Math.sin(t * 3);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r * 0.35, 0, TAU);
      ctx.fillStyle = '#FFD700';
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    if (c.type === T_END) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r * 0.2, 0, TAU);
      ctx.fillStyle = '#FF4444';
      ctx.fill();
      ctx.globalAlpha = 0.4 + 0.3 * Math.sin(t * 3 + 1);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r * 0.35, 0, TAU);
      ctx.fillStyle = '#FF4444';
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Draw particles
  drawParticles();

  // HUD
  ctx.fillStyle = '#00000080';
  ctx.fillRect(0, 0, W, 50);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fontSize}px sans-serif`;
  ctx.textAlign = 'left';

// --- Main Render Loop ---
let lastTime = 0;
function render(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  resize(); // handle dynamic resize

  // Update animation
  if (STATE.animating) {
    STATE.animating.t += dt;
    if (STATE.animating.t >= 0.2) {
      STATE.animating = null;
    }
  }

  updateParticles(dt);
  if (STATE.screen === 'win') STATE.winAnim += dt;

  ctx.clearRect(0, 0, W, H);

  switch (STATE.screen) {
    case 'menu': renderMenu(); break;
    case 'civSelect': renderCivSelect(); break;
    case 'levelSelect': renderLevelSelect(); break;
    case 'game': renderGame(); break;
    case 'win': renderGame(); renderWin(); break;
    case 'notebook': renderNotebook(); break;
    case 'achievements': renderAchievements(); break;
    case 'daily': renderGame(); break;
  }

  requestAnimationFrame(render);
}

// --- Input Handling ---
function getClickTarget(mx, my) {
  if (STATE.screen === 'menu') {
    const btnW = Math.min(250, W * 0.6);
    const btnX = W/2 - btnW/2;
    if (mx >= btnX && mx <= btnX + btnW) {
      if (my >= H*0.55 && my <= H*0.55 + 50) return 'play';
      if (my >= H*0.55 + 65 && my <= H*0.55 + 115) return 'daily';
      if (my >= H*0.55 + 130 && my <= H*0.55 + 180) return 'achievements';
    }
    return null;
  }

  if (STATE.screen === 'civSelect') {
    if (mx < 80 && my < 40) return 'back';
    const cardW = Math.min(300, W * 0.85);
    const startX = W/2 - cardW/2;
    CIV_ORDER.forEach((key, i) => {
      const y = 80 + i * 95;
      if (mx >= startX && mx <= startX + cardW && my >= y && my <= y + 80) return 'civ_' + key;
    });
    // Re-check with return
    for (let i = 0; i < CIV_ORDER.length; i++) {
      const y = 80 + i * 95;
      if (mx >= startX && mx <= startX + cardW && my >= y && my <= y + 80) return 'civ_' + CIV_ORDER[i];
    }
    return null;
  }

  if (STATE.screen === 'levelSelect') {
    if (mx < 80 && my < 40) return 'back';
    const startIdx = CIV_ORDER.indexOf(STATE.civ) * 8;
    const cols = 4;
    const cellSize = Math.min((W - 40) / cols, 80);
    const startX = (W - cols * cellSize) / 2;
    for (let i = 0; i < 8; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = startX + col * cellSize + cellSize/2;
      const cy = 90 + row * (cellSize + 20) + cellSize/2;
      if (Math.hypot(mx - cx, my - cy) < cellSize * 0.4) return 'level_' + (startIdx + i);
    }
    return null;
  }

  if (STATE.screen === 'game' || STATE.screen === 'daily') {
    if (mx < 80 && my > H - 30) return 'back';
    if (mx > W - 60 && my < 50) return 'hint';

    const level = STATE.level;
    if (!level) return null;
    const {cx, cy} = getGridCenter(level);
    const hex = pixelToHex(mx, my, cx, cy, hexR);
    const k = hex.q + ',' + hex.r;
    if (level.grid[k] && !level.grid[k].fixed) return 'hex_' + k;
    return null;
  }

  if (STATE.screen === 'win') {
    const cx = W/2;
    const cy = H/2;
    if (mx >= cx - 100 && mx <= cx + 100) {
      if (my >= cy + 30 && my <= cy + 70) return 'notebook';
      if (my >= cy + 85 && my <= cy + 125) return 'next';
      if (my >= cy + 135 && my <= cy + 175) return 'levels';
    }
    return null;
  }

  if (STATE.screen === 'notebook') {
    if (mx >= W/2 - 60 && mx <= W/2 + 60 && my >= H - 60 && my <= H - 20) return 'close_notebook';
    return null;
  }

  if (STATE.screen === 'achievements') {
    if (mx < 80 && my < 40) return 'back';
    return null;
  }

  return null;
}

function handleClick(mx, my) {
  initAudio();
  const target = getClickTarget(mx, my);
  if (!target) return;

  sfxClick();

  if (target === 'play') {
    STATE.screen = 'civSelect';
  } else if (target === 'daily') {
    startDaily();
  } else if (target === 'achievements') {
    STATE.screen = 'achievements';
  } else if (target === 'back') {
    if (STATE.screen === 'game' || STATE.screen === 'daily') {
      STATE.screen = 'levelSelect';
      STATE.level = null;
    } else if (STATE.screen === 'levelSelect' || STATE.screen === 'achievements') {
      STATE.screen = 'civSelect';
    } else if (STATE.screen === 'civSelect') {
      STATE.screen = 'menu';
    }
  } else if (target.startsWith('civ_')) {
    STATE.civ = target.slice(4);
    STATE.screen = 'levelSelect';
  } else if (target.startsWith('level_')) {
    const idx = parseInt(target.slice(6));
    startLevel(idx);
  } else if (target.startsWith('hex_')) {
    rotateHex(target.slice(4));
  } else if (target === 'hint') {
    showHint();
  } else if (target === 'notebook') {
    STATE.screen = 'notebook';
  } else if (target === 'next') {
    startLevel(STATE.levelIdx + 1);
  } else if (target === 'levels') {
    STATE.screen = 'levelSelect';
  } else if (target === 'close_notebook') {
    STATE.screen = 'win';
  }
}

function startLevel(idx) {
  if (idx >= LEVELS.length) { STATE.screen = 'civSelect'; return; }
  const cfg = LEVEL_CONFIGS[idx];
  const level = generateLevel(cfg.cols, cfg.rows, 1, 1, 1000 + idx * 7);
  level.civ = cfg.civ;
  level.star3 = cfg.star3;
  level.index = idx;

  STATE.level = level;
  STATE.levelIdx = idx;
  STATE.moves = 0;
  STATE.startTime = performance.now();
  STATE.hints = 0;
  STATE.lunaState = 'think';
  STATE.connectedSet = new Set();
  STATE.particles = [];
  STATE.screen = 'game';

  checkConnectivity(level);
}

function startDaily() {
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
  const level = generateLevel(5, 5, 1, 1, seed);
  level.civ = CIV_ORDER[seed % 5];
  level.star3 = 8;
  level.index = -1;

  STATE.level = level;
  STATE.levelIdx = -1;
  STATE.moves = 0;
  STATE.startTime = performance.now();
  STATE.hints = 0;
  STATE.lunaState = 'think';
  STATE.connectedSet = new Set();
  STATE.particles = [];
  STATE.screen = 'daily';

  checkConnectivity(level);
}

function rotateHex(key) {
  const level = STATE.level;
  if (!level) return;
  const cell = level.grid[key];
  if (!cell || cell.fixed) return;
  if (STATE.animating) return;

  const oldRot = cell.rotation;
  cell.rotation = (cell.rotation + 1) % 6;
  STATE.moves++;
  STATE.animating = {key, from: oldRot, to: oldRot + 1, t: 0};
  sfxClick();

  const won = checkConnectivity(level);
  if (won) {
    onWin();
  } else {
    // Luna state based on progress
    const ratio = STATE.connectedSet.size / level.allHexes.length;
    STATE.lunaState = ratio > 0.5 ? 'think' : 'confused';
  }
}

function showHint() {
  const level = STATE.level;
  if (!level) return;
  STATE.hints++;
  // Find a tile that's not in solution rotation
  for (const k of level.allHexes) {
    const c = level.grid[k];
    if (!c.fixed && c.type !== T_UNIVERSAL && c.rotation !== c.solutionRotation) {
      // Flash this hex (we'll mark it temporarily)
      c.highlighted = performance.now();
      break;
    }
  }
}

function onWin() {
  STATE.screen = 'win';
  STATE.winAnim = 0;
  STATE.lunaState = 'happy';
  sfxWin();

  const level = STATE.level;
  const idx = STATE.levelIdx;
  const moves = STATE.moves;
  const s3 = level.star3;
  const stars = moves <= s3 ? 3 : moves <= s3 * 2 ? 2 : 1;

  // Save
  if (idx >= 0) {
    const prev = save.stars[idx] || 0;
    if (stars > prev) save.stars[idx] = stars;
    save.completed[idx] = true;
  }

  // Check achievements
  checkAchievements(stars);

  // Particles
  const civ = CIVS[level.civ];
  for (let i = 0; i < 50; i++) {
    spawnParticles(W/2 + (Math.random()-0.5)*200, H/2 + (Math.random()-0.5)*200, civ.glow, 1);
  }

  saveSave();
}

function checkAchievements(stars) {
  // First Glyph
  if (!save.achievements.first) {
    const any = Object.values(save.completed).some(v => v);
    if (any) save.achievements.first = true;
  }
  // Egypt Explorer
  if (!save.achievements.egypt) {
    if ([0,1,2,3,4,5,6,7].every(i => save.completed[i])) save.achievements.egypt = true;
  }
  // Three Stars
  if (stars === 3) save.achievements.stars3 = true;
  // Speed Solver
  if ((performance.now() - STATE.startTime) / 1000 < 30) save.achievements.speed = true;
  // No Hints
  if (STATE.hints === 0) {
    save.noHintCount = (save.noHintCount || 0) + 1;
    if (save.noHintCount >= 10) save.achievements.nohints = true;
  } else {
    save.noHintCount = 0;
  }
  // World Traveler
  if (!save.achievements.world) {
    const civComplete = CIV_ORDER.every((c, ci) => {
      return [0,1,2,3,4,5,6,7].every(i => save.completed[ci*8+i]);
    });
    if (civComplete) save.achievements.world = true;
  }
  // Perfect Mind
  if (stars === 3) {
    save.streak3 = (save.streak3 || 0) + 1;
    if (save.streak3 >= 10) save.achievements.perfect = true;
  } else {
    save.streak3 = 0;
  }
  // Daily
  if (STATE.screen === 'daily' || STATE.levelIdx === -1) save.achievements.daily = true;
  // Puzzle Master
  if (Object.values(save.stars).filter(v => v === 3).length >= 50) save.achievements.master = true;
  // Glyph Legend
  const allAchs = ['first','egypt','stars3','speed','nohints','world','master','daily','perfect'];
  if (allAchs.every(a => save.achievements[a])) save.achievements.legend = true;
}

function countCompleted(civ) {
  const ci = CIV_ORDER.indexOf(civ);
  if (ci < 0) return 0;
  let count = 0;
  for (let i = 0; i < 8; i++) {
    if (save.completed[ci * 8 + i]) count++;
  }
  return count;
}

// --- Event Listeners ---
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return {x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top};
  }
  return {x: e.clientX - rect.left, y: e.clientY - rect.top};
}

canvas.addEventListener('click', function(e) {
  const pos = getPos(e);
  handleClick(pos.x, pos.y);
});

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  const pos = getPos(e);
  handleClick(pos.x, pos.y);
}, {passive: false});

// Prevent double-tap zoom
canvas.addEventListener('touchend', function(e) { e.preventDefault(); }, {passive: false});

// --- Analytics ---
function trackPage() {
  const img = new Image();
  img.src = 'https://site-analytics.cap.1ktower.com/hit?s=gamezipper.com&p=/glyph-quest/';
}
trackPage();

// --- Start ---
requestAnimationFrame(render);

})();
</script>
