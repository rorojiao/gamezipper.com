<script>
window.addEventListener('resize', resize);
resize();

// ===================== CONSTANTS =====================
const SQRT3 = Math.sqrt(3);
const PI = Math.PI;
const TAU = PI * 2;
const HEX_ANG = TAU / 6;

const T_STRAIGHT = 0, T_BEND = 1, T_TEE = 2, T_CROSS = 3, T_DEAD = 4, T_START = 5, T_END = 6, T_UNIVERSAL = 7;

const CIVS = {
  egypt:  { name:'Egypt',  bg:'#F4A261', pipe:'#E76F51', glow:'#FEFAE0', accent:'#D4A373', dark:'#8B5E3C' },
  maya:   { name:'Maya',   bg:'#2D6A4F', pipe:'#40916C', glow:'#95D5B2', accent:'#1B4332', dark:'#0D2818' },
  norse:  { name:'Norse',  bg:'#48CAE4', pipe:'#0096C7', glow:'#CAF0F8', accent:'#023E8A', dark:'#001845' },
  greek:  { name:'Greek',  bg:'#F8F9FA', pipe:'#ADB5BD', glow:'#E9ECEF', accent:'#6C757D', dark:'#343A40' },
  japan:  { name:'Japan',  bg:'#FFB3C1', pipe:'#FF758F', glow:'#FFCCD5', accent:'#C9184A', dark:'#800020' }
};
const CIV_ORDER = ['egypt','maya','norse','greek','japan'];

const TILE_BASES = {
  [T_STRAIGHT]:  [0, 3],
  [T_BEND]:     [0, 1],
  [T_TEE]:      [0, 1, 3],
  [T_CROSS]:    [0, 1, 3, 4],
  [T_DEAD]:     [0],
  [T_START]:    [0, 1, 2, 3, 4, 5],
  [T_END]:      [0, 1, 2, 3, 4, 5],
  [T_UNIVERSAL]: [0, 1, 2, 3, 4, 5]
};

function getOpenDirs(type, rotation) {
  const base = TILE_BASES[type];
  if (!base) return [];
  return base.map(function(d){ return (d + rotation) % 6; });
}
function hasDir(openDirs, d) { return openDirs.indexOf(d) >= 0; }
function hexNeighbor(q, r, d) {
  var dirs = [[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
  return {q: q + dirs[d][0], r: r + dirs[d][1]};
}
function oppositeDir(d) { return (d + 3) % 6; }

// ===================== AUDIO SYSTEM =====================
var audioCtx = null;
var masterGain = null;
var bgmNodes = [];
var musicVolume = 0.3;
var musicMuted = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = musicVolume;
  masterGain.connect(audioCtx.destination);
}

function stopBGM() {
  bgmNodes.forEach(function(n){ try{n.stop();}catch(e){} try{n.disconnect();}catch(e){} });
  bgmNodes = [];
}

// Pentatonic / scale notes per civ
var CIV_SCALES = {
  egypt:  [220, 247, 293, 330, 370, 440], // A minor pentatonic-ish
  maya:   [262, 294, 330, 392, 440, 523], // C marimba
  norse:  [196, 220, 262, 294, 330, 392], // G airy
  greek:  [262, 330, 392, 523, 587, 659], // C harp arpeggio
  japan:  [293, 330, 392, 440, 587, 659]  // D pentatonic
};

function startBGM(civKey) {
  if (!audioCtx) return;
  stopBGM();
  if (musicMuted) return;

  var scale = CIV_SCALES[civKey] || CIV_SCALES.egypt;
  var now = audioCtx.currentTime;

  if (civKey === 'egypt') {
    // Low drone + bell ornaments
    playDrone(scale[0] / 2, 0.08);
    playDrone(scale[0] / 2 * 1.5, 0.04);
    // Bell pattern
    var bellNotes = [scale[4], scale[5], scale[3], scale[4], scale[2], scale[3], scale[4], scale[5]];
    scheduleMelody(bellNotes, 0.6, 'sine', 0.12, 1.2);
  } else if (civKey === 'maya') {
    // Marimba-like (short sine + harmonics)
    playDrone(scale[0] / 2, 0.05);
    var marimba = [scale[2], scale[3], scale[4], scale[5], scale[4], scale[3], scale[2], scale[1]];
    scheduleMelody(marimba, 0.3, 'triangle', 0.15, 1.0);
  } else if (civKey === 'norse') {
    // Airy pad + wind
    playDrone(scale[0], 0.06);
    playDrone(scale[2], 0.04);
    playDrone(scale[4], 0.03);
    // Wind noise (filtered)
    playWind(0.04);
    var melody = [scale[3], scale[4], scale[5], scale[4], scale[3], scale[2], scale[1], scale[2]];
    scheduleMelody(melody, 1.0, 'sine', 0.08, 2.0);
  } else if (civKey === 'greek') {
    // Harp arpeggio
    var harp = [scale[0], scale[1], scale[2], scale[3], scale[4], scale[5], scale[4], scale[3]];
    scheduleMelody(harp, 0.5, 'triangle', 0.12, 1.5);
    playDrone(scale[0] / 2, 0.04);
  } else if (civKey === 'japan') {
    // Koto-like (pentatonic, sparse)
    playDrone(scale[0], 0.04);
    var koto = [scale[0], 0, scale[2], 0, scale[4], 0, scale[5], scale[4]];
    scheduleMelody(koto.filter(function(n){return n>0;}), 0.8, 'sine', 0.1, 2.4);
  }
}

function playDrone(freq, vol) {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.value = vol;
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  bgmNodes.push(osc);
}

function playWind(vol) {
  if (!audioCtx) return;
  var bufSize = audioCtx.sampleRate * 4;
  var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  var filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  var gain = audioCtx.createGain();
  gain.gain.value = vol;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  src.start();
  bgmNodes.push(src);
}

function scheduleMelody(notes, noteDur, type, vol, offset) {
  if (!audioCtx) return;
  var now = audioCtx.currentTime + offset;
  var totalDur = notes.length * noteDur;
  // Schedule 2 loops
  for (var loop = 0; loop < 3; loop++) {
    for (var i = 0; i < notes.length; i++) {
      if (notes[i] === 0) continue;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = notes[i];
      gain.gain.setValueAtTime(0.001, now + loop * totalDur + i * noteDur);
      gain.gain.linearRampToValueAtTime(vol, now + loop * totalDur + i * noteDur + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + loop * totalDur + (i + 1) * noteDur);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(now + loop * totalDur + i * noteDur);
      osc.stop(now + loop * totalDur + (i + 1) * noteDur);
      bgmNodes.push(osc);
    }
  }
}

// SFX
function playTone(freq, dur, type, vol) {
  if (!audioCtx) return;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = vol || 0.15;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(masterGain || audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxClick() { playTone(800, 0.05, 'square', 0.08); }
function sfxConnect() { playTone(440, 0.15, 'sine', 0.1); }
function sfxWin() { [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){playTone(f,0.3,'sine',0.12);}, i*120); }); }

// Volume button
document.getElementById('volumeBtn').addEventListener('click', function(){
  initAudio();
  musicMuted = !musicMuted;
  this.textContent = musicMuted ? '🔇' : '🔊';
  if (musicMuted) { stopBGM(); }
  else if (STATE.level) { startBGM(STATE.level.civ); }
  else if (STATE.screen === 'menu') { startMenuBGM(); }
});

// ===================== HEX MATH =====================
function hexToPixel(q, r, cx, cy, size) {
  return { x: size * (SQRT3 * q + SQRT3/2 * r) + cx, y: size * (3/2 * r) + cy };
}

function pixelToHex(px, py, cx, cy, size) {
  var x = (px - cx) / size;
  var y = (py - cy) / size;
  var q = (SQRT3/3 * x - 1/3 * y);
  var r = (2/3 * y);
  return hexRound(q, r);
}

function hexRound(q, r) {
  var s = -q - r;
  var rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  var dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return {q: rq, r: rr};
}

// ===================== LEVEL GENERATION =====================
function generateLevel(cols, rows, seed) {
  var s = seed || Date.now();
  function rand() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; }

  var grid = {};
  var allHexes = [];

  for (var r = 0; r < rows; r++) {
    for (var q = 0; q < cols; q++) {
      var key = q + ',' + r;
      grid[key] = { q:q, r:r, type:null, rotation:0, fixed:false, openDirs:[], solutionRotation:0 };
      allHexes.push(key);
    }
  }

  // Build spanning tree
  var inTree = new Set();
  var edges = [];
  inTree.add(allHexes[0]);

  while (inTree.size < allHexes.length) {
    var candidates = [];
    for (var _i in inTree) {
      var k = inTree.has ? null : null;
    }
    inTree.forEach(function(ki) {
      var c = grid[ki];
      for (var d = 0; d < 6; d++) {
        var n = hexNeighbor(c.q, c.r, d);
        var nk = n.q + ',' + n.r;
        if (grid[nk] && !inTree.has(nk)) {
          candidates.push({from:ki, to:nk, dir:d});
        }
      }
    });
    if (candidates.length === 0) break;
    var edge = candidates[Math.floor(rand() * candidates.length)];
    edges.push(edge);
    inTree.add(edge.to);
  }

  var cellDirs = {};
  allHexes.forEach(function(k){ cellDirs[k] = new Set(); });
  edges.forEach(function(e){
    cellDirs[e.from].add(e.dir);
    cellDirs[e.to].add(oppositeDir(e.dir));
  });

  function dirsToType(dirs) {
    var n = dirs.length;
    if (n <= 1) return T_DEAD;
    if (n === 6) return T_UNIVERSAL;
    if (n === 4) return T_CROSS;
    if (n === 3) return T_TEE;
    if (n === 2) {
      if ((dirs[0] + 3) % 6 === dirs[1]) return T_STRAIGHT;
      return T_BEND;
    }
    return T_DEAD;
  }

  function findRotation(type, desiredDirs) {
    if (type === T_UNIVERSAL) return 0;
    for (var rot = 0; rot < 6; rot++) {
      var open = getOpenDirs(type, rot);
      if (desiredDirs.length === open.length && desiredDirs.every(function(d){ return open.indexOf(d) >= 0; })) return rot;
    }
    return 0;
  }

  var startKey = allHexes[0];
  var endKey = allHexes[allHexes.length - 1];

  allHexes.forEach(function(k){
    var dirs = Array.from(cellDirs[k]).sort();
    var type = dirsToType(dirs);
    var rot = findRotation(type, dirs);
    grid[k].type = type;
    grid[k].rotation = rot;
    grid[k].solutionRotation = rot;
    grid[k].openDirs = dirs;
  });

  grid[startKey].type = T_START;
  grid[startKey].fixed = true;
  grid[startKey].rotation = 0;
  grid[startKey].solutionRotation = 0;
  grid[endKey].type = T_END;
  grid[endKey].fixed = true;
  grid[endKey].rotation = 0;
  grid[endKey].solutionRotation = 0;

  // Scramble
  var minMoves = 0;
  allHexes.forEach(function(k){
    var c = grid[k];
    if (!c.fixed && c.type !== T_UNIVERSAL) {
      var turns = 1 + Math.floor(rand() * 5);
      c.rotation = (c.rotation + turns) % 6;
      if (c.rotation !== c.solutionRotation) minMoves++;
    }
  });

  return { grid:grid, allHexes:allHexes, startKey:startKey, endKey:endKey, cols:cols, rows:rows, minMoves:Math.max(minMoves,1) };
}

// Verify level is solvable via BFS from current state
function isSolved(level) {
  var grid = level.grid, startKey = level.startKey, endKey = level.endKey;
  var visited = new Set();
  var queue = [startKey];
  visited.add(startKey);
  while (queue.length > 0) {
    var k = queue.shift();
    var c = grid[k];
    var dirs = getOpenDirs(c.type, c.rotation);
    for (var i = 0; i < dirs.length; i++) {
      var d = dirs[i];
      var n = hexNeighbor(c.q, c.r, d);
      var nk = n.q + ',' + n.r;
      if (!grid[nk] || visited.has(nk)) continue;
      var nc = grid[nk];
      var nDirs = getOpenDirs(nc.type, nc.rotation);
      if (hasDir(nDirs, oppositeDir(d))) {
        visited.add(nk);
        queue.push(nk);
      }
    }
  }
  return visited.has(endKey);
}

// Generate verified solvable level
function generateVerifiedLevel(cols, rows, seed, maxConnDirs) {
  maxConnDirs = maxConnDirs || 6;
  for (var attempt = 0; attempt < 50; attempt++) {
    var level = generateLevel(cols, rows, seed + attempt * 13);
    // Check if current scrambled state already connects (we want player to solve it)
    // Verify the solution works
    // Temporarily set all to solution
    var grid = level.grid;
    level.allHexes.forEach(function(k){
      grid[k]._cur = grid[k].rotation;
      grid[k].rotation = grid[k].solutionRotation;
    });
    var solvable = isSolved(level);
    level.allHexes.forEach(function(k){
      grid[k].rotation = grid[k]._cur;
    });
    if (solvable) return level;
  }
  return generateLevel(cols, rows, seed);
}

// ===================== PRESET LEVELS (1-16) =====================
// Manual preset: small grids, simple pipes, verified solvable
// Format: { cols, rows, tiles: [{q,r,type,rot,solRot}], startKey, endKey }
function makePresetLevel(cols, rows, tileData, startKey, endKey) {
  var grid = {};
  var allHexes = [];
  for (var r = 0; r < rows; r++) {
    for (var q = 0; q < cols; q++) {
      var key = q+','+r;
      grid[key] = {q:q,r:r,type:T_DEAD,rotation:0,fixed:false,solutionRotation:0};
      allHexes.push(key);
    }
  }
  tileData.forEach(function(t){
    var key = t.q+','+t.r;
    if (!grid[key]) return;
    grid[key].type = t.type;
    grid[key].rotation = t.rot || 0;
    grid[key].solutionRotation = t.solRot !== undefined ? t.solRot : t.rot || 0;
    grid[key].fixed = !!t.fixed;
  });
  // Count min moves
  var minMoves = 0;
  allHexes.forEach(function(k){
    var c = grid[k];
    if (!c.fixed && c.type !== T_UNIVERSAL && c.rotation !== c.solutionRotation) minMoves++;
  });
  return {grid:grid,allHexes:allHexes,startKey:startKey,endKey:endKey,cols:cols,rows:rows,minMoves:Math.max(minMoves,1)};
}

// Level 1: 2x2 simple - just 1 bend to rotate
var PRESETS = [];
// Level 1: 3x3 very easy - mostly straight paths
PRESETS[0] = generateVerifiedLevel(3, 2, 1001, 2);
// Level 2
PRESETS[1] = generateVerifiedLevel(3, 2, 2002, 2);
// Level 3
PRESETS[2] = generateVerifiedLevel(3, 3, 3003, 2);
// Level 4
PRESETS[3] = generateVerifiedLevel(3, 3, 4004, 2);
// Level 5
PRESETS[4] = generateVerifiedLevel(4, 3, 5005, 2);
// Level 6
PRESETS[5] = generateVerifiedLevel(4, 3, 6006, 2);
// Level 7
PRESETS[6] = generateVerifiedLevel(4, 3, 7007, 3);
// Level 8
PRESETS[7] = generateVerifiedLevel(4, 4, 8008, 3);
// Maya 9-16
PRESETS[8] = generateVerifiedLevel(4, 3, 9009, 3);
PRESETS[9] = generateVerifiedLevel(4, 3, 10010, 3);
PRESETS[10] = generateVerifiedLevel(4, 4, 11011, 3);
PRESETS[11] = generateVerifiedLevel(4, 4, 12012, 3);
PRESETS[12] = generateVerifiedLevel(5, 3, 13013, 3);
PRESETS[13] = generateVerifiedLevel(5, 3, 14014, 3);
PRESETS[14] = generateVerifiedLevel(5, 4, 15015, 4);
PRESETS[15] = generateVerifiedLevel(5, 4, 16016, 4);

// ===================== LEVEL CONFIGS =====================
var LEVEL_CONFIGS = [];
// Egypt: 1-8
LEVEL_CONFIGS.push(
  {cols:3,rows:2,civ:'egypt',star3:2},
  {cols:3,rows:2,civ:'egypt',star3:2},
  {cols:3,rows:3,civ:'egypt',star3:3},
  {cols:3,rows:3,civ:'egypt',star3:3},
  {cols:4,rows:3,civ:'egypt',star3:4},
  {cols:4,rows:3,civ:'egypt',star3:4},
  {cols:4,rows:3,civ:'egypt',star3:5},
  {cols:4,rows:4,civ:'egypt',star3:6}
);
// Maya: 9-16
for (var i = 0; i < 8; i++) LEVEL_CONFIGS.push({cols:4+Math.floor(i/4),rows:3+Math.floor(i/4),civ:'maya',star3:4+i});
// Norse: 17-24
for (var i = 0; i < 8; i++) LEVEL_CONFIGS.push({cols:5,rows:4,civ:'norse',star3:8+i});
// Greek: 25-32
for (var i = 0; i < 8; i++) LEVEL_CONFIGS.push({cols:5,rows:5,civ:'greek',star3:12+i});
// Japan: 33-40
for (var i = 0; i < 8; i++) LEVEL_CONFIGS.push({cols:6,rows:5,civ:'japan',star3:18+i*2});
// Bonus: 41-50

// ===================== PARTICLES =====================
function spawnParticles(cx, cy, color, count) {
  for (var i = 0; i < count; i++) {
    var a = Math.random() * TAU;
    var speed = 1 + Math.random() * 3;
    STATE.particles.push({
      x:cx, y:cy, vx:Math.cos(a)*speed, vy:Math.sin(a)*speed - 1,
      life:1, color:color, size:2+Math.random()*4
    });
  }
}

function spawnBgParticle(civ) {
  var colors = {
    egypt: ['#FFD700','#F4A261','#FEFAE0'],
    maya: ['#40916C','#95D5B2','#2D6A4F'],
    norse: ['#48CAE4','#CAF0F8','#90E0EF'],
    greek: ['#ADB5BD','#E9ECEF','#F8F9FA'],
    japan: ['#FFB3C1','#FF758F','#FFCCD5']
  };
  var cs = colors[civ] || colors.egypt;
  STATE.bgParticles.push({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-0.5)*0.3, vy: -0.2 - Math.random()*0.3,
    life: 1, color: cs[Math.floor(Math.random()*cs.length)],
    size: 1 + Math.random()*3, maxLife: 3 + Math.random()*4, age:0
  });
}

function updateParticles(dt) {
  for (var i = STATE.particles.length-1; i >= 0; i--) {
    var p = STATE.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= dt * 1.5;
    if (p.life <= 0) STATE.particles.splice(i, 1);
  }
  for (var i = STATE.bgParticles.length-1; i >= 0; i--) {
    var p = STATE.bgParticles[i];
    p.x += p.vx; p.y += p.vy; p.age += dt;
    p.life = 1 - p.age / p.maxLife;
    if (p.life <= 0 || p.y < -10) STATE.bgParticles.splice(i, 1);
  }
}

function drawParticles() {
  for (var i = 0; i < STATE.particles.length; i++) {
    var p = STATE.particles[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, TAU);
    ctx.fill();
  }
  for (var i = 0; i < STATE.bgParticles.length; i++) {
    var p = STATE.bgParticles[i];
    ctx.globalAlpha = p.life * 0.3;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, TAU);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ===================== CONNECTIVITY =====================
function checkConnectivity(level) {
  var grid = level.grid, startKey = level.startKey, endKey = level.endKey;
  var visited = new Set();
  var queue = [startKey];
  visited.add(startKey);
  while (queue.length > 0) {
    var k = queue.shift();
    var c = grid[k];
    var dirs = getOpenDirs(c.type, c.rotation);
    for (var i = 0; i < dirs.length; i++) {
      var d = dirs[i];
      var n = hexNeighbor(c.q, c.r, d);
      var nk = n.q + ',' + n.r;
      if (!grid[nk] || visited.has(nk)) continue;
      var nc = grid[nk];
      var nDirs = getOpenDirs(nc.type, nc.rotation);
      if (hasDir(nDirs, oppositeDir(d))) {
        visited.add(nk);
        queue.push(nk);
      }
    }
  }
  STATE.connectedSet = visited;
  return visited.has(endKey);
}

// ===================== DRAWING HELPERS =====================
function drawHex(cx, cy, r, fill, stroke, lw) {
  ctx.beginPath();
  for (var i = 0; i < 6; i++) {
    var a = PI/6 + i * HEX_ANG;
    var x = cx + r * Math.cos(a);
    var y = cy + r * Math.sin(a);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw||2; ctx.stroke(); }
}

// ===================== LUNA (improved) =====================
function drawLuna(x, y, w, h, state, t) {
  var scale = w / 40;
  ctx.save();
  ctx.translate(x, y);
  var bob = state === 'happy' ? Math.abs(Math.sin(t * 5)) * 5 * scale : Math.sin(t * 2) * 2 * scale;

  ctx.beginPath();
  ctx.ellipse(20*scale, 60*scale, 14*scale, 4*scale, 0, 0, TAU);
  ctx.fill();

  ctx.fillRect(10*scale, 45*scale, 6*scale, 15*scale);
  ctx.fillRect(24*scale, 45*scale, 6*scale, 15*scale);

  ctx.fillRect(8*scale, 56*scale, 9*scale, 4*scale);
  ctx.fillRect(22*scale, 56*scale, 9*scale, 4*scale);

  // Body
  ctx.fillStyle = '#C4A882';
  ctx.beginPath();
  ctx.roundRect(8*scale, 25*scale, 24*scale, 22*scale, 3*scale);
  ctx.fill();
  // Vest
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(14*scale, 26*scale, 12*scale, 20*scale);

  // Arms

  } else {

  }

  // Head
  ctx.fillStyle = '#FFDAB9';
  ctx.beginPath();
  ctx.arc(20*scale, 16*scale, 13*scale, 0, TAU);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#6B3A2A';
  ctx.beginPath();
  ctx.arc(20*scale, 12*scale, 14*scale, PI*0.9, PI*0.1);
  ctx.fill();
  // Side hair
  ctx.fillRect(6*scale, 10*scale, 4*scale, 16*scale);
  ctx.fillRect(30*scale, 10*scale, 4*scale, 16*scale);

  // Explorer hat
  ctx.fillStyle = '#D2B48C';
  ctx.beginPath();
  ctx.ellipse(20*scale, 4*scale, 17*scale, 4*scale, 0, 0, TAU);
  ctx.fill();
  ctx.fillStyle = '#C4A06A';
  ctx.beginPath();
  ctx.roundRect(12*scale, -4*scale, 16*scale, 10*scale, 2*scale);
  ctx.fill();
  // Hat band
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(12*scale, 3*scale, 16*scale, 2*scale);

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(16*scale, 15*scale, 3*scale, 3.5*scale, 0, 0, TAU);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(24*scale, 15*scale, 3*scale, 3.5*scale, 0, 0, TAU);
  ctx.fill();
  ctx.fillStyle = '#4A3728';
  ctx.beginPath();
  ctx.arc(16*scale, 15*scale, 2*scale, 0, TAU);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(24*scale, 15*scale, 2*scale, 0, TAU);
  ctx.fill();
  // Eye highlights
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(17*scale, 14*scale, 0.8*scale, 0, TAU);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(25*scale, 14*scale, 0.8*scale, 0, TAU);
  ctx.fill();

  // Blush
  ctx.fillStyle = 'rgba(255,150,150,0.3)';
  ctx.beginPath();
  ctx.ellipse(12*scale, 19*scale, 3*scale, 2*scale, 0, 0, TAU);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(28*scale, 19*scale, 3*scale, 2*scale, 0, 0, TAU);
  ctx.fill();

  // Mouth
  if (state === 'happy') {
    ctx.beginPath();
    ctx.arc(20*scale, 21*scale, 3*scale, 0.1, PI-0.1);
    ctx.strokeStyle = '#4A3728';
    ctx.lineWidth = 1.5*scale;
    ctx.stroke();
  } else if (state === 'confused') {
    ctx.beginPath();
    ctx.arc(22*scale, 22*scale, 2*scale, 0, TAU);
    ctx.strokeStyle = '#4A3728';
    ctx.lineWidth = 1*scale;
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(20*scale, 21*scale, 2*scale, 0.2, PI-0.2);
    ctx.strokeStyle = '#4A3728';

    ctx.stroke();

  // Thought bubble for thinking
  if (state === 'think') {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';

// ===================== CIVILIZATION WIN ANIMATIONS =====================
function drawCivWinAnim(civKey, t, cx, cy) {
  if (civKey === 'egypt') {
    // Pyramid rising from sand
    var rise = Math.min(t * 60, 80);
    ctx.fillStyle = '#D4A373';
    ctx.beginPath();
    ctx.moveTo(cx, cy - rise);
    ctx.lineTo(cx - 60, cy + 80 - rise + 80);
    ctx.lineTo(cx + 60, cy + 80 - rise + 80);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Gold particles
    if (Math.random() < 0.3) {
      spawnParticles(cx + (Math.random()-0.5)*120, cy - rise, '#FFD700', 1);
    }
  } else if (civKey === 'maya') {
    // Spinning stone disk with green energy
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 2);
    ctx.fillStyle = '#2D6A4F';
    ctx.beginPath(); ctx.arc(0, 0, 50, 0, TAU); ctx.fill();
    ctx.strokeStyle = '#40916C';
    ctx.lineWidth = 3;
    ctx.stroke();
    for (var i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(45*Math.cos(i*HEX_ANG), 45*Math.sin(i*HEX_ANG));
      ctx.stroke();
    }
    ctx.restore();
    if (Math.random() < 0.2) spawnParticles(cx, cy, '#95D5B2', 2);
  } else if (civKey === 'norse') {
    // Aurora waves
    for (var i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.strokeStyle = ['rgba(72,202,228,0.5)','rgba(144,224,239,0.4)','rgba(202,240,248,0.3)'][i];
      ctx.lineWidth = 8;
      for (var x = cx-100; x < cx+100; x += 5) {
        var y = cy - 40 + i*25 + Math.sin((x-cx)*0.03 + t*2 + i) * 20;
        if (x === cx-100) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  } else if (civKey === 'greek') {
    // Temple columns
    var colH = Math.min(t * 80, 80);
    for (var i = 0; i < 4; i++) {
      var x = cx - 60 + i * 40;
      ctx.fillStyle = '#ADB5BD';
      ctx.fillRect(x - 6, cy + 60 - colH, 12, colH);
      ctx.beginPath(); ctx.arc(x, cy + 60 - colH, 10, PI, 0); ctx.fill();
    }
    // Lightning
    if (Math.sin(t * 8) > 0.8) {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy - 60);
      ctx.lineTo(cx - 10, cy - 30);
      ctx.lineTo(cx + 5, cy - 25);
      ctx.lineTo(cx - 5, cy);
      ctx.stroke();
    }
  } else if (civKey === 'japan') {
    // Torii gate rising
    var rise = Math.min(t * 60, 70);
    ctx.fillStyle = '#C9184A';
    // Pillars
    ctx.fillRect(cx - 45, cy + 40 - rise, 8, 70);
    ctx.fillRect(cx + 37, cy + 40 - rise, 8, 70);
    // Top beams
    ctx.fillRect(cx - 55, cy + 35 - rise, 110, 8);
    ctx.fillRect(cx - 50, cy + 48 - rise, 100, 5);
    // Cherry blossom particles
    if (Math.random() < 0.3) {
      spawnParticles(cx + (Math.random()-0.5)*150, cy - 80, '#FFB3C1', 1);
    }
  }
}

// ===================== RENDERING =====================
function getGridCenter(level) {
  return { cx: W/2, cy: H/2 - 20 };
}

function renderGame() {
  var level = STATE.level;
  if (!level) return;
  var grid = level.grid, allHexes = level.allHexes;
  var civ = CIVS[level.civ];
  var gc = getGridCenter(level);
  var r = hexR;
  var t = performance.now() / 1000;

  // Background gradient
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, civ.dark);
  grad.addColorStop(1, civ.accent);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Background decoration based on civ
  drawBgDecoration(level.civ, t);

  // Background particles
  if (STATE.bgParticles.length < 20 && Math.random() < 0.1) spawnBgParticle(level.civ);
  drawParticles();

  // Draw hexes
  for (var hi = 0; hi < allHexes.length; hi++) {
    var k = allHexes[hi];
    var c = grid[k];
    var pos = hexToPixel(c.q, c.r, gc.cx, gc.cy, r);

    // Animation
    var drawRot = c.rotation;
    if (STATE.animating && STATE.animating.key === k) {
      var a = STATE.animating;
      var progress = Math.min(a.t / 0.3, 1);
      // Ease out with bounce
      var ease;
      if (progress < 0.7) {
        ease = 1 - Math.pow(1 - progress / 0.7, 3);
      } else {
        var bp = (progress - 0.7) / 0.3;
        ease = 1 + Math.sin(bp * PI) * 0.08;
      }
      drawRot = a.from + (a.to - a.from) * ease;
    }

    var isConnected = STATE.connectedSet.has(k);

    // Hex shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var ang = PI/6 + i * HEX_ANG;
      var hx = pos.x + 2 + (r-1) * Math.cos(ang);
      var hy = pos.y + 3 + (r-1) * Math.sin(ang);
      if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
    }
    ctx.closePath();
    ctx.fill();

    // Hex background with breathing glow for unconnected
    var bgColor = isConnected ? civ.glow : civ.bg;
    drawHex(pos.x, pos.y, r - 2, bgColor, 'rgba(0,0,0,0.15)', 1.5);

    // Breathing glow for non-connected tiles
    if (!isConnected && c.type !== T_START && c.type !== T_END) {
      var breath = 0.08 + 0.06 * Math.sin(t * TAU / 0.8 + c.q * 0.5 + c.r * 0.7);
      ctx.globalAlpha = breath;
      drawHex(pos.x, pos.y, r + 3, civ.glow, null);
      ctx.globalAlpha = 1;
    }

    // Connected glow pulse
    if (isConnected && c.type !== T_START && c.type !== T_END) {
      var pulse = 0.15 + 0.1 * Math.sin(t * TAU / 0.6);
      ctx.globalAlpha = pulse;
      drawHex(pos.x, pos.y, r + 4, civ.glow, null);
      ctx.globalAlpha = 1;
    }

    // Draw pipe with glow
    var baseDirs = TILE_BASES[c.type] || [];
    var pipeColor = c.type === T_START ? '#FFD700' : c.type === T_END ? '#FF4444' : civ.pipe;

    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.rotate(drawRot * HEX_ANG);

    // Pipe glow (connected)
    if (isConnected) {
      for (var di = 0; di < baseDirs.length; di++) {
        var a = baseDirs[di] * HEX_ANG;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(r * 0.85 * Math.cos(a), r * 0.85 * Math.sin(a));
        ctx.strokeStyle = civ.glow;
        ctx.lineWidth = r * 0.35;
        ctx.lineCap = 'round';
        ctx.globalAlpha = 0.4 + 0.2 * Math.sin(t * 4 + di);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    // Pipe lines
    for (var di = 0; di < baseDirs.length; di++) {
      var a = baseDirs[di] * HEX_ANG;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(r * 0.85 * Math.cos(a), r * 0.85 * Math.sin(a));
      ctx.strokeStyle = pipeColor;
      ctx.lineWidth = r * 0.22;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
    // Center dot
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.12, 0, TAU);
    ctx.fillStyle = pipeColor;
    ctx.fill();

    ctx.restore();

    // Start/End markers with enhanced glow
    if (c.type === T_START) {
      ctx.globalAlpha = 0.3 + 0.2 * Math.sin(t * 3);
      ctx.beginPath(); ctx.arc(pos.x, pos.y, r * 0.4, 0, TAU);
      ctx.fillStyle = '#FFD700'; ctx.fill();
      ctx.globalAlpha = 1;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, r * 0.2, 0, TAU);
      ctx.fillStyle = '#FFD700'; ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = (r*0.3)+'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S', pos.x, pos.y + 1);
    }
    if (c.type === T_END) {
      ctx.globalAlpha = 0.3 + 0.2 * Math.sin(t * 3 + 1);
      ctx.beginPath(); ctx.arc(pos.x, pos.y, r * 0.4, 0, TAU);
      ctx.fillStyle = '#FF4444'; ctx.fill();
      ctx.globalAlpha = 1;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, r * 0.2, 0, TAU);
      ctx.fillStyle = '#FF4444'; ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = (r*0.3)+'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('E', pos.x, pos.y + 1);
    }

    // Highlight for hint
    if (c.highlighted && performance.now() - c.highlighted < 2000) {
      ctx.globalAlpha = 0.3 + 0.2 * Math.sin(t * 8);
      drawHex(pos.x, pos.y, r + 2, '#FFD700', null);
      ctx.globalAlpha = 1;
    }
  }

  // Flow particles along connected path
  drawFlowParticles(level, gc, r, t);

  // HUD bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 50);
  // Blur effect line
  ctx.fillStyle = civ.pipe;
  ctx.fillRect(0, 49, W, 2);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold '+fontSize+'px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('Level ' + (STATE.levelIdx + 1) + ' - ' + civ.name, 65, 25);
  ctx.textAlign = 'center';
  ctx.fillText('Moves: ' + STATE.moves + ' / ★' + level.star3, W/2, 25);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('💡 Hint', W - 15, 25);

  // Back button area
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, H - 45, 90, 45);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = fontSize + 'px sans-serif';
  ctx.fillText('◀ Back', 45, H - 22);

  // Luna
  drawLuna(8, H - 100, 45, 65, STATE.lunaState, t);
}

function drawBgDecoration(civKey, t) {
  ctx.globalAlpha = 0.06;
  if (civKey === 'egypt') {
    // Hieroglyphic-like shapes
    ctx.fillStyle = '#FFD700';
    for (var i = 0; i < 8; i++) {
      var x = 50 + i * (W / 8);
      var y = 80 + Math.sin(t * 0.3 + i) * 20;
      ctx.font = '28px serif';
      ctx.textAlign = 'center';
      ctx.fillText(['☥','𓂀','𓁢','𓆣','𓃭','𓅃','𓆏','𓇋'][i], x, y);
    }
  } else if (civKey === 'maya') {
    ctx.fillStyle = '#95D5B2';
    for (var i = 0; i < 6; i++) {
      var x = 60 + i * (W / 6);
      var y = H - 60 + Math.sin(t * 0.5 + i) * 15;
      ctx.beginPath();
      ctx.arc(x, y, 15, 0, TAU);
      ctx.fill();
    }
  } else if (civKey === 'norse') {
    ctx.fillStyle = '#CAF0F8';
    for (var i = 0; i < 10; i++) {
      var x = 30 + i * (W / 10);
      var y = 60 + Math.sin(t * 0.4 + i * 0.7) * 30;
      // Ice crystal
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(t * 0.2 + i);
      ctx.fillRect(-1, -8, 2, 16);
      ctx.fillRect(-8, -1, 16, 2);
      ctx.restore();
    }
  } else if (civKey === 'greek') {
    ctx.fillStyle = '#ADB5BD';
    for (var i = 0; i < 4; i++) {
      var x = W * 0.15 + i * W * 0.25;
      ctx.fillRect(x - 8, H - 200, 16, 180);
      ctx.beginPath();
      ctx.arc(x, H - 200, 14, PI, 0);
      ctx.fill();
    }
  } else if (civKey === 'japan') {
    ctx.fillStyle = '#FFB3C1';
    for (var i = 0; i < 12; i++) {
      var x = Math.random() * W;
      var y = (t * 20 + i * 70) % H;
      ctx.beginPath();
      ctx.ellipse(x, y, 3, 5, t + i, 0, TAU);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawFlowParticles(level, gc, r, t) {
  // Draw small glowing dots moving along connected pipes
  var grid = level.grid;
  STATE.connectedSet.forEach(function(k) {
    var c = grid[k];
    if (c.type === T_START || c.type === T_END) return;
    var pos = hexToPixel(c.q, c.r, gc.cx, gc.cy, r);
    var baseDirs = TILE_BASES[c.type] || [];
    for (var di = 0; di < baseDirs.length; di++) {
      var a = (baseDirs[di] + c.rotation) * HEX_ANG;
      var progress = ((t * 0.8 + c.q * 0.3 + c.r * 0.5 + di * 0.2) % 1);
      var fx = pos.x + r * 0.7 * progress * Math.cos(a);
      var fy = pos.y + r * 0.7 * progress * Math.sin(a);
      ctx.globalAlpha = 0.6 * (1 - Math.abs(progress - 0.5) * 2);
      ctx.fillStyle = CIVS[level.civ].glow;
      ctx.beginPath();
      ctx.arc(fx, fy, 2, 0, TAU);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

// ===================== MAIN LOOP =====================
var lastTime = 0;
function render(now) {
  var dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  resize();

  if (STATE.animating) {
    STATE.animating.t += dt;
    if (STATE.animating.t >= 0.3) {
      STATE.animating = null;
    }
  }

  updateParticles(dt);
  if (STATE.screen === 'win') STATE.winAnim += dt;

  ctx.clearRect(0, 0, W, H);

  switch (STATE.screen) {
    case 'menu': renderMenu(); break;
    case 'civSelect': renderCivSelect(); break;
    case 'levelSelect': renderLevelSelect(); break;
    case 'game': renderGame(); break;
    case 'win': renderWin(); break;
    case 'notebook': renderNotebook(); break;
    case 'achievements': renderAchievements(); break;
    case 'daily': renderGame(); break;
  }

  requestAnimationFrame(render);
}

// ===================== INPUT =====================
function getClickTarget(mx, my) {
  if (STATE.screen === 'menu') {
    var btnW = Math.min(260, W * 0.65);
    var btnX = W/2 - btnW/2;
    if (mx >= btnX && mx <= btnX + btnW) {
      if (my >= H*0.56 && my <= H*0.56 + 52) return 'play';
      if (my >= H*0.56 + 68 && my <= H*0.56 + 120) return 'daily';
      if (my >= H*0.56 + 136 && my <= H*0.56 + 188) return 'achievements';
    }
    return null;
  }

  if (STATE.screen === 'civSelect') {
    if (mx < 80 && my < 45) return 'back';
    var cardW = Math.min(320, W * 0.85);
    var startX = W/2 - cardW/2;
    for (var i = 0; i < CIV_ORDER.length; i++) {
      var y = 65 + i * 92;
      if (mx >= startX && mx <= startX + cardW && my >= y && my <= y + 80) return 'civ_' + CIV_ORDER[i];
    }
    return null;
  }

  if (STATE.screen === 'levelSelect') {
    if (mx < 80 && my < 45) return 'back';
    var startIdx = CIV_ORDER.indexOf(STATE.civ) * 8;
    var cols = 4;
    var cellSize = Math.min((W - 40) / cols, 80);
    var startX = (W - cols * cellSize) / 2;
    for (var i = 0; i < 8; i++) {
      var col = i % cols;
      var row = Math.floor(i / cols);
      var cx = startX + col * cellSize + cellSize/2;
      var cy = 100 + row * (cellSize + 20) + cellSize/2;
      if (Math.hypot(mx - cx, my - cy) < cellSize * 0.4) return 'level_' + (startIdx + i);
    }
    return null;
  }

  if (STATE.screen === 'game' || STATE.screen === 'daily') {
    if (mx < 90 && my > H - 45) return 'back';
    if (mx > W - 70 && my < 50) return 'hint';

    var level = STATE.level;
    if (!level) return null;
    var gc = getGridCenter(level);
    var hex = pixelToHex(mx, my, gc.cx, gc.cy, hexR);
    var k = hex.q + ',' + hex.r;
    if (level.grid[k] && !level.grid[k].fixed) return 'hex_' + k;
    return null;
  }

  if (STATE.screen === 'win') {
    var cx = W/2;
    var cy = H/2;
    if (mx >= cx - 100 && mx <= cx + 100) {
      if (my >= cy + 70 && my <= cy + 106) return 'notebook';
      if (my >= cy + 115 && my <= cy + 151) return 'next';
      if (my >= cy + 160 && my <= cy + 196) return 'levels';
    }
    return null;
  }

  if (STATE.screen === 'notebook') {
    if (mx >= W/2 - 60 && mx <= W/2 + 60 && my >= H - 55 && my <= H - 17) return 'close_notebook';
    return null;
  }

  if (STATE.screen === 'achievements') {
    if (mx < 80 && my < 45) return 'back';
    return null;
  }

  return null;
}

function handleClick(mx, my) {
  initAudio();
  var target = getClickTarget(mx, my);
  if (!target) return;
  sfxClick();

  if (target === 'play') {
    STATE.screen = 'civSelect';
  } else if (target === 'daily') {
    startDaily();
  } else if (target === 'achievements') {
    STATE.screen = 'achievements';
  } else if (target === 'back') {
    stopBGM();
    if (STATE.screen === 'game' || STATE.screen === 'daily') {
      STATE.screen = 'levelSelect'; STATE.level = null;
    } else if (STATE.screen === 'levelSelect' || STATE.screen === 'achievements') {
      STATE.screen = 'civSelect';
    } else if (STATE.screen === 'civSelect') {
      STATE.screen = 'menu';
    }
  } else if (target.startsWith('civ_')) {
    STATE.civ = target.slice(4);
    STATE.screen = 'levelSelect';
  } else if (target.startsWith('level_')) {
    startLevel(parseInt(target.slice(6)));
  } else if (target.startsWith('hex_')) {
    rotateHex(target.slice(4));
  } else if (target === 'hint') {
    showHint();
  } else if (target === 'notebook') {
    STATE.screen = 'notebook';
  } else if (target === 'next') {
    startLevel(STATE.levelIdx + 1);
  } else if (target === 'levels') {
    stopBGM();
    STATE.screen = 'levelSelect';
  } else if (target === 'close_notebook') {
    STATE.screen = 'win';
  }
}

function startMenuBGM() {
  if (!audioCtx || musicMuted) return;
  stopBGM();
  var scale = CIV_SCALES.egypt;
  playDrone(scale[0]/2, 0.03);
  scheduleMelody([scale[2], scale[4], scale[5], scale[3]], 1.5, 'sine', 0.05, 0);
}

function startLevel(idx) {
  if (idx >= LEVELS.length) { STATE.screen = 'civSelect'; return; }
  var cfg = LEVEL_CONFIGS[idx];
  var level;
  if (idx < PRESETS.length) {
    level = PRESETS[idx];
  } else {
    level = generateVerifiedLevel(cfg.cols, cfg.rows, 1000 + idx * 7);
  }
  level.civ = cfg.civ;
  level.star3 = cfg.star3;
  level.index = idx;

  STATE.level = level;
  STATE.levelIdx = idx;
  STATE.moves = 0;
  STATE.startTime = performance.now();
  STATE.hints = 0;
  STATE.lunaState = 'think';
  STATE.connectedSet = new Set();
  STATE.particles = [];
  STATE.bgParticles = [];
  STATE.screen = 'game';

  checkConnectivity(level);
  startBGM(cfg.civ);
}

function startDaily() {
  var today = new Date();
  var seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
  var level = generateVerifiedLevel(5, 5, seed);
  level.civ = CIV_ORDER[seed % 5];
  level.star3 = 8;
  level.index = -1;

  STATE.level = level;
  STATE.levelIdx = -1;
  STATE.moves = 0;
  STATE.startTime = performance.now();
  STATE.hints = 0;
  STATE.lunaState = 'think';
  STATE.connectedSet = new Set();
  STATE.particles = [];
  STATE.bgParticles = [];
  STATE.screen = 'daily';

  checkConnectivity(level);
  startBGM(level.civ);
}

function rotateHex(key) {
  var level = STATE.level;
  if (!level) return;
  var cell = level.grid[key];
  if (!cell || cell.fixed) return;
  if (STATE.animating) return;

  var oldRot = cell.rotation;
  cell.rotation = (cell.rotation + 1) % 6;
  STATE.moves++;
  STATE.animating = {key:key, from:oldRot, to:oldRot + 1, t:0};
  sfxClick();

  // Spawn small particle on hex
  var gc = getGridCenter(level);
  var pos = hexToPixel(cell.q, cell.r, gc.cx, gc.cy, hexR);
  spawnParticles(pos.x, pos.y, CIVS[level.civ].pipe, 3);

  var won = checkConnectivity(level);
  if (won) {
    onWin();
  } else {
    var ratio = STATE.connectedSet.size / level.allHexes.length;
    STATE.lunaState = ratio > 0.5 ? 'think' : 'confused';
    sfxConnect();
  }
}

function showHint() {
  var level = STATE.level;
  if (!level) return;
  STATE.hints++;
  for (var i = 0; i < level.allHexes.length; i++) {
    var c = level.grid[level.allHexes[i]];
    if (!c.fixed && c.type !== T_UNIVERSAL && c.rotation !== c.solutionRotation) {
      c.highlighted = performance.now();
      break;
    }
  }
}

function onWin() {
  STATE.screen = 'win';
  STATE.winAnim = 0;
  STATE.lunaState = 'happy';
  sfxWin();

  var level = STATE.level;
  var idx = STATE.levelIdx;
  var moves = STATE.moves;
  var s3 = level.star3;
  var stars = moves <= s3 ? 3 : moves <= s3 * 2 ? 2 : 1;

  if (idx >= 0) {
    var prev = save.stars[idx] || 0;
    if (stars > prev) save.stars[idx] = stars;
    save.completed[idx] = true;
  }

  checkAchievements(stars);

  var civ = CIVS[level.civ];
  for (var i = 0; i < 60; i++) {
    spawnParticles(W/2 + (Math.random()-0.5)*250, H/2 + (Math.random()-0.5)*250, civ.glow, 1);
  }
  saveSave();
}

function checkAchievements(stars) {
  if (!save.achievements.first && Object.values(save.completed).some(function(v){return v;})) save.achievements.first = true;
  if (!save.achievements.egypt && [0,1,2,3,4,5,6,7].every(function(i){return save.completed[i];})) save.achievements.egypt = true;
  if (stars === 3) save.achievements.stars3 = true;
  if ((performance.now() - STATE.startTime)/1000 < 30) save.achievements.speed = true;
  if (STATE.hints === 0) {
    save.noHintCount = (save.noHintCount || 0) + 1;
    if (save.noHintCount >= 10) save.achievements.nohints = true;
  } else { save.noHintCount = 0; }
  if (!save.achievements.world && CIV_ORDER.every(function(c, ci){ return [0,1,2,3,4,5,6,7].every(function(i){return save.completed[ci*8+i];}); })) save.achievements.world = true;
  if (stars === 3) {
    save.streak3 = (save.streak3 || 0) + 1;
    if (save.streak3 >= 10) save.achievements.perfect = true;
  } else { save.streak3 = 0; }
  if (STATE.screen === 'daily' || STATE.levelIdx === -1) save.achievements.daily = true;
  if (Object.values(save.stars).filter(function(v){return v===3;}).length >= 50) save.achievements.master = true;
  var allAchs = ['first','egypt','stars3','speed','nohints','world','master','daily','perfect'];
  if (allAchs.every(function(a){return save.achievements[a];})) save.achievements.legend = true;
}

function countCompleted(civ) {
  var ci = CIV_ORDER.indexOf(civ);
  if (ci < 0) return 0;
  var count = 0;
  for (var i = 0; i < 8; i++) { if (save.completed[ci * 8 + i]) count++; }
  return count;
}

// ===================== EVENTS =====================
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  if (e.touches) return {x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top};
  return {x: e.clientX - rect.left, y: e.clientY - rect.top};
}

var lastTouchTime = 0;
canvas.addEventListener('click', function(e) {
  if (Date.now() - lastTouchTime < 500) return;
  var pos = getPos(e);
  handleClick(pos.x, pos.y);
});
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  lastTouchTime = Date.now();
  var pos = getPos(e);
  handleClick(pos.x, pos.y);
}, {passive: false});
canvas.addEventListener('touchend', function(e) { e.preventDefault(); }, {passive: false});

// ===================== ANALYTICS =====================
var img = new Image();
img.src = 'https://site-analytics.cap.1ktower.com/hit?s=gamezipper.com&p=/glyph-quest/';

// ===================== START =====================
requestAnimationFrame(render);

})();
<script>
// Splash dismiss
(function(){
  var ss=document.getElementById('splash-screen');
  if(!ss)return;
  function dismiss(){ss.classList.add('fade-out');setTimeout(function(){ss.remove()},600);}
  ss.addEventListener('click',dismiss);
  ss.addEventListener('touchstart',dismiss,{passive:true});
  document.addEventListener('keydown',function e(){dismiss();document.removeEventListener('keydown',e);});
  setTimeout(dismiss,8000);
})();
</script>
