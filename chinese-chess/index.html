}catch(e){}
}

function isOwnPiece(row,col,player){
return board[row]&&board[row][col]&&board[row][col][1]===player;
}
function isEnemyPiece(row,col,player){
return board[row]&&board[row][col]&&board[row][col][1]!==player;
}
function isEmpty(row,col){
return !board[row]||!board[row][col]||board[row][col]===null;
}
function inPalace(row,col,player){
const minR=player===BLACK?1:8,maxR=player===BLACK?3:10;
return col>=4&&col<=6&&row>=minR&&row<=maxR;
}
function getRawMoves(row,col){
const piece=board[row][col];
if(!piece)return[];
const [type,player]=piece;
const moves=[];
const push=(r,c)=>{if(r>=0&&r<BOARD_ROWS&&c>=0&&c<BOARD_COLS&&(isEmpty(r,c)||isEnemyPiece(r,c,player)))moves.push([r,c])};
switch(type){
case KING:
[[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>push(row+dr,col+dc));
break;
case ADVISOR:
[[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([dr,dc])=>push(row+dr,col+dc));
break;
case ELEPHANT:
[[-2,-2],[-2,2],[2,-2],[2,2]].forEach(([dr,dc])=>{
const mr=row+dr/2,mc=col+dc/2;
if(isEmpty(mr,mc))push(row+dr,col+dc);
});
break;
case horse:
[[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr,dc])=>{
const block_r=row+Math.sign(dr),block_c=col+Math.sign(dc);
if(dr===-2||dr===2){if(!isEmpty(row+Math.sign(dr),col))return;if(isEmpty(row+dr,col+dc))moves.push([row+dr,col+dc]);}
else if(dc===-2||dc===2){if(!isEmpty(row,col+Math.sign(dc)))return;if(isEmpty(row+dr,col+dc))moves.push([row+dr,col+dc]);}
});
break;

function minimax(b,depth,alpha,beta,maximizing,player,depthLeft){

if(result.score>best){best=result.score;bestMove=m;}

}
return{score:best,move:bestMove};
}else{

const pc=board[r][c];
ctx.beginPath();
ctx.arc(boardX(c),boardY(r),pc?cs*0.4:cs*0.18,0,Math.PI*2);
ctx.fillStyle=pc?'rgba(255,100,100,0.3)':'rgba(0,230,118,0.45)';
ctx.fill();
if(!pc){
ctx.strokeStyle='rgba(0,230,118,0.7)';
ctx.lineWidth=1.5;
ctx.stroke();
}
}
}
function drawPieces(){
const cs=getCellSize();
for(let r=0;r<BOARD_ROWS;r++)for(let c=0;c<BOARD_COLS;c++){
const p=board[r][c];
if(!p)continue;
const [type,player]=p;
const x=boardX(c),y=boardY(r);
const isKing=(type===KING);
if(checkFlash>0&&isKing&&player===currentPlayer){
ctx.save();
ctx.shadowBlur=20;ctx.shadowColor='#ff0000';
ctx.beginPath();ctx.arc(x,y,PIECE_R*(cs/CELL)*1.1,0,Math.PI*2);
ctx.fillStyle=`rgba(255,0,0,${0.4+Math.sin(checkFlash*0.5)*0.3})`;
ctx.fill();ctx.restore();
}
const glow=(selected&&selected[0]===r&&selected[1]===c);
if(glow){
ctx.save();
ctx.shadowBlur=18;ctx.shadowColor='#00d4ff';
}else{ctx.save();}
ctx.beginPath();
ctx.arc(x,y,(PIECE_R*(cs/CELL))+2,0,Math.PI*2);
ctx.fillStyle=player===RED?'#c0392b':'#1a252f';
ctx.fill();
ctx.beginPath();
ctx.arc(x,y,PIECE_R*(cs/CELL),0,Math.PI*2);
const grad=ctx.createRadialGradient(x-PIECE_R*0.2*(cs/CELL),y-PIECE_R*0.2*(cs/CELL),0,x,y,PIECE_R*(cs/CELL));
if(player===RED){
grad.addColorStop(0,'#e74c3c');grad.addColorStop(1,'#c0392b');
}else{
grad.addColorStop(0,'#34495e');grad.addColorStop(1,'#1a252f');
}
ctx.fillStyle=grad;
ctx.fill();
ctx.strokeStyle=glow?'#00d4ff':(player===RED?'#922b21':'#0d1318');
ctx.lineWidth=glow?2:1;
ctx.stroke();
ctx.fillStyle='#fff';
ctx.font=`bold ${PIECE_R*(cs/CELL)*0.95}px serif`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(PIECE_CHARS[player][type],x,y+1);
ctx.restore();
}
}
function drawParticles(){
for(const p of particles){
ctx.save();
ctx.globalAlpha=p.life;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();
ctx.restore();
}
}
function render(){
drawBoard();
drawLastMoveHighlight();
drawValidMoves();
drawPieces();
drawParticles();
}
function gameLoop(){
updateParticles();
if(checkFlash>0){
checkFlash-=0.1;
if(checkFlash<0)checkFlash=0;
render();
}
rafId=requestAnimationFrame(gameLoop);
}
function startNewGame(){
clearInterval(timerInterval);
initBoard();
render();
if(currentPlayer===RED){
timerInterval=setInterval(()=>{
if(!gameOver&&!isAiThinking&&currentPlayer===RED){
redElapsed+=1;updateTimers();
}},1000);
}
}
