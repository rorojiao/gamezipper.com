.tier-group{margin-bottom:10px}
.tier-group h3{font-size:13px;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.tier-levels{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.tier-levels .lvl-btn{background:var(--cell);color:var(--muted);border:1px solid var(--cell-border);padding:6px 0;border-radius:4px;font-size:12px;cursor:pointer;text-align:center}
.tier-levels .lvl-btn:hover{background:var(--accent);color:var(--bg)}
.tier-levels .lvl-btn.completed{background:var(--green);color:var(--bg);border-color:var(--green)}
.tier-levels .lvl-btn.current{background:var(--accent);color:var(--bg);border-color:var(--accent)}
#status-msg{font-size:13px;color:var(--muted);text-align:center;min-height:18px}
#win-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:100}

.setting-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:4px 0}
.setting-row label{color:var(--muted)}
.toggle{position:relative;width:40px;height:20px;background:var(--cell-border);border-radius:10px;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--green)}

#footer-link{font-size:12px;color:var(--muted);text-align:center;padding:8px}

  // compute regions from borders for tinting
  const regionMap = computeRegions();
  // draw cell backgrounds (region tint)
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const x = OFFSET_X + c*CELL;
      const y = OFFSET_Y + r*CELL;
      const rid = regionMap[r][c];
      ctx.fillStyle = rid >= 0 ? REGION_COLORS[rid % REGION_COLORS.length] + '22' : '#23234a';
      ctx.fillRect(x, y, CELL, CELL);
    }
  }
  // draw grid lines (thin)
  ctx.strokeStyle = '#3a3a5a';
  ctx.lineWidth = 1;
  for (let r = 0; r <= R; r++) {
    ctx.beginPath();
    ctx.moveTo(OFFSET_X, OFFSET_Y + r*CELL + 0.5);
    ctx.lineTo(OFFSET_X + C*CELL, OFFSET_Y + r*CELL + 0.5);
    ctx.stroke();
  }
  for (let c = 0; c <= C; c++) {
    ctx.beginPath();
    ctx.moveTo(OFFSET_X + c*CELL + 0.5, OFFSET_Y);
    ctx.lineTo(OFFSET_X + c*CELL + 0.5, OFFSET_Y + R*CELL);
    ctx.stroke();
  }
  // draw clues
  ctx.font = `bold ${Math.floor(CELL*0.5)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const key = r+','+c;
      if (state.clues[key] !== undefined) {
        const x = OFFSET_X + c*CELL + CELL/2;
        const y = OFFSET_Y + r*CELL + CELL/2;
        // clue circle background
        ctx.fillStyle = '#0f0f1a';
        ctx.beginPath();
        ctx.arc(x, y, CELL*0.32, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffd166';
        ctx.fillText(state.clues[key], x, y + 1);
      }
    }
  }
  // draw borders (player-placed + solution-match check uses these)
  ctx.strokeStyle = '#64ffda';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  for (const key in state.borders) {
    if (!state.borders[key]) continue;
    drawBorder(key);
  }
  // hint glow borders
  ctx.strokeStyle = '#ffd166';
  ctx.lineWidth = 4;
  ctx.shadowColor = '#ffd166';
  ctx.shadowBlur = 8;
  for (const key of hintsUsed) {
    if (state.borders[key]) {
      drawBorder(key);
    }
  }
  ctx.shadowBlur = 0;
  // violation highlight: regions not size 6 or wrong clue counts
  drawViolations(regionMap);
}

function drawBorder(key) {
  const parts = key.split('_');
  const type = parts[0];
  const r = parseInt(parts[1]);
  const c = parseInt(parts[2]);
  if (type === 'h') {
    // vertical line between (r,c) and (r+1,c)
    const x = OFFSET_X + c*CELL;
    const y = OFFSET_Y + (r+1)*CELL;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + CELL, y);
    ctx.stroke();
  } else {
    // v: horizontal line between (r,c) and (r,c+1)
    const x = OFFSET_X + (c+1)*CELL;
    const y = OFFSET_Y + r*CELL;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y + CELL);
    ctx.stroke();
  }
}

function drawViolations(regionMap) {
  // Highlight regions whose size != 6 or clue count != 2 or clue mismatch
  const R = state.R, C = state.C;
  const regionCells = {};
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const rid = regionMap[r][c];
      if (rid >= 0) {
        if (!regionCells[rid]) regionCells[rid] = [];
        regionCells[rid].push([r,c]);
      }
    }
  }
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2;
  for (const rid in regionCells) {
    const cells = regionCells[rid];
    let bad = false;
    if (cells.length !== 6) bad = true;
    else {
      // check clue count
      const cellsSet = new Set(cells.map(c => c[0]+','+c[1]));
      let clueCount = 0;
      for (const [r,c] of cells) {
        const k = r+','+c;
        if (state.clues[k] !== undefined) {
          clueCount++;
          let ncnt = 0;
          for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
            if (cellsSet.has((r+dr)+','+(c+dc))) ncnt++;
          }
          if (ncnt !== state.clues[k]) { bad = true; break; }
        }
      }
      if (clueCount !== 2) bad = true;
    }
    if (bad) {
      // draw red outline around region
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 2;
      for (const [r,c] of cells) {
        const x = OFFSET_X + c*CELL;
        const y = OFFSET_Y + r*CELL;
        const cellsSet = new Set(cells.map(cc => cc[0]+','+cc[1]));
        // top
        if (!cellsSet.has((r-1)+','+c)) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+CELL,y); ctx.stroke(); }
        if (!cellsSet.has((r+1)+','+c)) { ctx.beginPath(); ctx.moveTo(x,y+CELL); ctx.lineTo(x+CELL,y+CELL); ctx.stroke(); }
        if (!cellsSet.has(r+','+(c-1))) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+CELL); ctx.stroke(); }
        if (!cellsSet.has(r+','+(c+1))) { ctx.beginPath(); ctx.moveTo(x+CELL,y); ctx.lineTo(x+CELL,y+CELL); ctx.stroke(); }
      }
    }
  }
}

// ============ REGION COMPUTATION (Union-Find from borders) ============
function computeRegions() {
  const R = state.R, C = state.C;
  const parent = {};
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) parent[r+','+c] = r+','+c;
  function find(x) { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; }
  function union(a,b) { const ra = find(a), rb = find(b); if (ra !== rb) parent[ra] = rb; }
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      // h_r_c border between (r,c) and (r+1,c): if NOT set, they're in same region
      if (r+1 < R && !state.borders['h_'+r+'_'+c]) union(r+','+c, (r+1)+','+c);
      if (c+1 < C && !state.borders['v_'+r+'_'+c]) union(r+','+c, r+','+(c+1));
    }
  }
  // assign region ids
  const rootToId = {};
  let nextId = 0;
  const map = [];
  for (let r = 0; r < R; r++) {
    map.push([]);
    for (let c = 0; c < C; c++) {
      const root = find(r+','+c);
      if (!(root in rootToId)) rootToId[root] = nextId++;
      map[r].push(rootToId[root]);
    }
  }
  return map;
}

// ============ WIN CHECK ============
function checkWin(announce) {
  if (!state.R) return false;
  const R = state.R, C = state.C;
  const regionMap = computeRegions();
  const regionCells = {};
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const rid = regionMap[r][c];
      if (!regionCells[rid]) regionCells[rid] = [];
      regionCells[rid].push([r,c]);
    }
  }
  // rule 1: every region size == 6
  for (const rid in regionCells) {
    if (regionCells[rid].length !== 6) {
      if (announce) showStatus('❌ Every region must have exactly 6 cells.');
      return false;
    }
  }
  // rule 2 + 3: every region exactly 2 clues, each clue matches in-region orth-neighbour count
  for (const rid in regionCells) {
    const cells = regionCells[rid];
    const cellsSet = new Set(cells.map(c => c[0]+','+c[1]));
    let clueCount = 0;
    for (const [r,c] of cells) {
      const k = r+','+c;
      if (state.clues[k] !== undefined) {
        clueCount++;
        let ncnt = 0;
        for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          if (cellsSet.has((r+dr)+','+(c+dc))) ncnt++;
        }
        if (ncnt !== state.clues[k]) {
          if (announce) showStatus('❌ Clue at ('+(r+1)+','+(c+1)+') should have '+state.clues[k]+' same-region neighbours, has '+ncnt+'.');
          return false;
        }
      }
    }
    if (clueCount !== 2) {
      if (announce) showStatus('❌ Every region must have exactly 2 numbers.');
      return false;
    }
  }
  // Win!
  if (announce || settings.autocheck) {
    win();
  }
  return true;
}

function win() {
  if (won) return;
  won = true;
  stopTimer();
  playSfx('win');
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const timeStr = `${mins}:${secs.toString().padStart(2,'0')}`;
  // star rating: 3 stars if <2min and 0 hints, 2 if <5min or <=2 hints, else 1
  let stars = 1;
  if (elapsed < 120 && hintsUsed.length === 0) stars = 3;
  else if (elapsed < 300 || hintsUsed.length <= 2) stars = 2;
  completed[curLevel] = { stars, time: elapsed };
  saveProgress();
  document.getElementById('win-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('win-stats').textContent = `Time: ${timeStr} · Hints used: ${hintsUsed.length}`;
  document.getElementById('win-overlay').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#64ffda','#ff6b9d','#ffd166','#55c2a0','#a78bfa'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.left = Math.random()*window.innerWidth + 'px';
    el.style.top = '-10px';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    const dx = (Math.random()-0.5)*400;
    const dy = window.innerHeight + 50;
    const rot = (Math.random()-0.5)*720;
    el.animate([
      { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${dx}px,${dy}px) rotate(${rot}deg)`, opacity: 0 }
    ], { duration: 2000 + Math.random()*1500, easing: 'cubic-bezier(.2,.6,.4,1)' });
    setTimeout(() => el.remove(), 3600);
  }
}

function closeWin() {
  document.getElementById('win-overlay').classList.remove('show');
}

function nextLevel() {
  closeWin();
  if (curLevel + 1 < LEVELS.length) {
    loadLevel(curLevel + 1);
  } else {
    showStatus('🏆 You completed all 30 levels!');
  }
}

// ============ INPUT ============
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  return { x, y };
}

function findNearestBorder(x, y) {
  // Find the nearest border line (h or v) within threshold
  const R = state.R, C = state.C;
  const threshold = CELL * 0.3;
  let best = null;
  let bestDist = threshold;
  // horizontal borders h_r_c (vertical line at x=OFFSET_X+c*CELL, between row r and r+1, for r in [-1, R-1]... actually r in [0,R-1])
  // Actually h_r_c means border between (r,c) and (r+1,c). The line is at y = OFFSET_Y + (r+1)*CELL, spanning x in [OFFSET_X+c*CELL, OFFSET_X+(c+1)*CELL]
  // We also have outer grid edges implicitly (between cell and void) — those are always borders, ignore.
  for (let r = 0; r < R-1; r++) {
    for (let c = 0; c < C; c++) {
      const bx1 = OFFSET_X + c*CELL;
      const bx2 = OFFSET_X + (c+1)*CELL;
      const by = OFFSET_Y + (r+1)*CELL;
      if (x >= bx1 - threshold && x <= bx2 + threshold && Math.abs(y - by) < bestDist) {
        bestDist = Math.abs(y - by);
        best = { type: 'h', r, c };
      }
    }
  }
  // vertical borders v_r_c (horizontal line at x=OFFSET_X+(c+1)*CELL, between col c and c+1)
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C-1; c++) {
      const bx = OFFSET_X + (c+1)*CELL;
      const by1 = OFFSET_Y + r*CELL;
      const by2 = OFFSET_Y + (r+1)*CELL;
      if (y >= by1 - threshold && y <= by2 + threshold && Math.abs(x - bx) < bestDist) {
        bestDist = Math.abs(x - bx);
        best = { type: 'v', r, c };
      }
    }
  }
  return best;
}

function handleClick(e) {
  if (won) return;
  e.preventDefault();
  const pos = getCanvasPos(e);
  const border = findNearestBorder(pos.x, pos.y);
  if (!border) return;
  const key = border.type + '_' + border.r + '_' + border.c;
  if (mode === 'place') {
    state.borders[key] = !state.borders[key];
    playSfx('click');
  } else if (mode === 'erase') {
    if (state.borders[key]) {
      delete state.borders[key];
      playSfx('click');
    }
  }
  draw();
  if (settings.autocheck) checkWin(false);
}

canvas.addEventListener('pointerdown', handleClick);

// ============ MODE / HINT / CLEAR ============
function setMode(m) {
  mode = m;
  document.getElementById('btn-place').classList.toggle('active', m === 'place');
  document.getElementById('btn-erase').classList.toggle('active', m === 'erase');
}

function useHint() {
  if (won) return;
  if (hintsLeft <= 0) {
    showStatus('💡 No hints left!');
    return;
  }
  const lv = LEVELS[curLevel];
  const sol = lv.solution_borders;
  // find a solution border not yet placed
  const candidates = sol.filter(k => !state.borders[k]);
  if (candidates.length === 0) {
    showStatus('💡 All correct borders placed!');
    return;
  }
  const pick = candidates[Math.floor(Math.random()*candidates.length)];
  state.borders[pick] = true;
  hintsUsed.push(pick);
  hintsLeft--;
  document.getElementById('hint-count').textContent = hintsLeft;
  playSfx('hint');
  draw();
  showStatus('💡 Hint: gold-glow border placed.');
  if (settings.autocheck) checkWin(false);
}

function clearBoard() {
  state.borders = {};
  hintsUsed = [];
  draw();
  showStatus('🔄 Board cleared.');
}

// ============ LEVEL LOAD ============
function loadLevel(idx) {
  curLevel = idx;
  const lv = LEVELS[idx];
  state.R = lv.R;
  state.C = lv.C;
  state.clues = Object.assign({}, lv.clues);
  state.borders = {};
  hintsLeft = 3;
  hintsUsed = [];
  won = false;
  startTime = Date.now();
  computeLayout();
  draw();
  updateLevelLabel();
  buildLevelSelect();
  startTimer();
  // clear win overlay
  document.getElementById('win-overlay').classList.remove('show');
}

function updateLevelLabel() {
  const lv = LEVELS[curLevel];
  document.getElementById('level-label').textContent = `L${curLevel+1} · ${lv.tier}`;
  document.getElementById('hint-count').textContent = hintsLeft;
}

function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('timer').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ============ LEVEL SELECT ============
function toggleLevelSelect() {
  const el = document.getElementById('level-select');
  el.classList.toggle('open');
  buildLevelSelect();
}

function buildLevelSelect() {
  const el = document.getElementById('level-select');
  if (!el.classList.contains('open')) return;
  const tiers = {};
  LEVELS.forEach((lv, i) => {
    if (!tiers[lv.tier]) tiers[lv.tier] = [];
    tiers[lv.tier].push(i);
  });
  let html = '';
  for (const tier in tiers) {
    html += `<div class="tier-group"><h3>${tier}</h3><div class="tier-levels">`;
    for (const idx of tiers[tier]) {
      const cls = idx === curLevel ? 'current' : (completed[idx] ? 'completed' : '');
      const starStr = completed[idx] ? ' '+('★'.repeat(completed[idx].stars)) : '';
      html += `<div class="lvl-btn ${cls}" onclick="loadLevel(${idx});toggleLevelSelect()">${idx+1}${starStr}</div>`;
    }
    html += `</div></div>`;
  }
  el.innerHTML = html;
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

function toggleSetting(key) {
  settings[key] = !settings[key];
  document.getElementById('toggle-'+key).classList.toggle('on', settings[key]);
  if (key === 'music') {
    if (settings.music) startMusic(); else stopMusic();
  }
  saveProgress();
}

// ============ STATUS ============
let statusTimeout = null;
function showStatus(msg) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  if (statusTimeout) clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => { el.textContent = ''; }, 3000);
}

// ============ AUDIO (Web Audio API) ============
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  return audioCtx;
}

function playSfx(type) {
  if (!settings.sfx) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  let freq = 440, dur = 0.1, wave = 'sine', vol = 0.15;
  if (type === 'click') { freq = 600; dur = 0.05; wave = 'square'; vol = 0.08; }
  else if (type === 'hint') { freq = 880; dur = 0.2; wave = 'sine'; vol = 0.15; }
  else if (type === 'win') {
    // chord
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f;
      o.type = 'sine';
      g.gain.setValueAtTime(0, now + i*0.08);
      g.gain.linearRampToValueAtTime(0.12, now + i*0.08 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + i*0.08 + 0.6);
      o.start(now + i*0.08);
      o.stop(now + i*0.08 + 0.6);
    });
    return;
  } else if (type === 'error') { freq = 200; dur = 0.2; wave = 'sawtooth'; vol = 0.1; }
  osc.frequency.value = freq;
  osc.type = wave;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(vol, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
  osc.start(now);
  osc.stop(now + dur);
}

function startMusic() {
  if (!settings.music) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  stopMusic();
  // ambient chord progression: Cmaj7 -> Dm7 -> Am7 -> G
  const chords = [
    [261.63, 329.63, 392.0, 493.88],  // Cmaj7
    [293.66, 349.23, 440.0, 587.33],  // Dm7
    [220.0, 261.63, 329.63, 392.0],   // Am7
    [196.0, 246.94, 293.66, 392.0],   // G
  ];
  let chordIdx = 0;
  const playChord = () => {
    if (!settings.music || !audioCtx) return;
    const now = ctx.currentTime;
    const chord = chords[chordIdx];
    chord.forEach(f => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f;
      o.type = 'sine';
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.04, now + 0.5);
      g.gain.linearRampToValueAtTime(0.04, now + 3.0);
      g.gain.exponentialRampToValueAtTime(0.001, now + 4.0);
      o.start(now);
      o.stop(now + 4.0);
      musicNodes.push(o);
    });
    chordIdx = (chordIdx + 1) % chords.length;
  };
  playChord();
  musicNodes.push({ _interval: setInterval(playChord, 4000) });
}

function stopMusic() {
  musicNodes.forEach(n => {
    if (n._interval) clearInterval(n._interval);
    else try { n.stop(); } catch(e) {}
  });
  musicNodes = [];
}

// ============ LOCALSTORAGE ============
function saveProgress() {
  try {
    localStorage.setItem('heki-progress', JSON.stringify({
      completed, settings, curLevel
    }));
  } catch(e) {}
}

function loadProgress() {
  try {
    const data = JSON.parse(localStorage.getItem('heki-progress') || '{}');
    if (data.completed) completed = data.completed;
    if (data.settings) settings = Object.assign(settings, data.settings);
    if (typeof data.curLevel === 'number') curLevel = data.curLevel;
  } catch(e) {}
}

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  if (e.key === '1') setMode('place');
  else if (e.key === '2') setMode('erase');
  else if (e.key === 'h' || e.key === 'H') useHint();
  else if (e.key === 'r' || e.key === 'R') clearBoard();
  else if (e.key === 'Enter') checkWin(true);
  else if (e.key === 'Escape') {
    document.getElementById('level-select').classList.toggle('open');
    document.getElementById('settings-panel').classList.remove('open');
  }
});

// ============ INIT ============
window.addEventListener('resize', () => { computeLayout(); draw(); });

function init() {
  loadProgress();
  // apply settings toggles
  document.getElementById('toggle-music').classList.toggle('on', settings.music);
  document.getElementById('toggle-sfx').classList.toggle('on', settings.sfx);
  document.getElementById('toggle-autocheck').classList.toggle('on', settings.autocheck);
  if (LEVELS.length === 0) {
    document.getElementById('status-msg').textContent = '⚠ No levels loaded.';
    return;
  }
  loadLevel(Math.min(curLevel, LEVELS.length - 1));
  // start music on first interaction (browser autoplay policy)
  const startAudioOnce = () => {
    if (settings.music) startMusic();
    document.removeEventListener('pointerdown', startAudioOnce);
  };
  document.addEventListener('pointerdown', startAudioOnce);
}

// cleanup on page hide
window.addEventListener('beforeunload', () => { stopMusic(); if (audioCtx) audioCtx.close(); });
window.addEventListener('pagehide', () => { stopMusic(); if (audioCtx) audioCtx.close(); });
document.addEventListener('visibilitychange', () => { if (document.hidden) stopMusic(); });

init();
</script>
