    var cells=[];
    for(var j=0;j<r.length;j+=2)cells.push([r[j],r[j+1]]);
    return cells;
  });
}
function getCellRegion(x,y,regions){
  for(var i=0;i<regions.length;i++){
    for(var j=0;j<regions[i].length;j++){
      if(regions[i][j][0]===x&&regions[i][j][1]===y)return i;
    }
  }
  return-1;
}

function startLevel(idx){
  state.levelIdx=idx;
  state.mode='place';
  state.hintsLeft=3;
  state.hintCells=[];
  state.placed={};
  state.violations=new Set();
  state.completed=false;
  state.particles=[];
  state.startTime=Date.now();
  state.elapsed=0;
  state.screen='game';
  if(state.timerId)clearInterval(state.timerId);
  state.timerId=setInterval(function(){state.elapsed=Math.floor((Date.now()-state.startTime)/1000);updateHud();},500);
  computeBorders();
  resizeCanvas();
  updateHud();
  document.getElementById('topTitle').textContent='Hanare - Level '+(idx+1);
}

function computeBorders(){
  var lv=getLevel(),regions=getRegionCells(lv);
  regionBorders=[];
  regionColors=[];
  var palette=[[40,40,80],[50,35,90],[35,50,85],[45,40,75],[40,45,80],[50,50,95],[35,40,70],[42,42,82],[48,38,72],[38,48,78],[45,45,90],[40,40,70],[35,45,80]];
  for(var i=0;i<regions.length;i++){
    regionColors.push(palette[i%palette.length]);
    for(var j=0;j<regions[i].length;j++){
      var cx=regions[i][j][0],cy=regions[i][j][1];
      var dirs=[[-1,0,'L'],[1,0,'R'],[0,-1,'T'],[0,1,'B']];
      for(var d=0;d<dirs.length;d++){
        var nx=cx+dirs[d][0],ny=cy+dirs[d][1];
        var neighbor=getCellRegion(nx,ny,regions);
        if(neighbor!==i)regionBorders.push({x:cx,y:cy,dir:dirs[d][2]});
      }
    }
  }
}

// ===== Rendering =====
function resizeCanvas(){
  var lv=getLevel();if(!lv)return;
  var wrap=document.getElementById('canvas-wrap');
  var maxW=wrap.clientWidth-16,maxH=wrap.clientHeight-16;
  if(maxW<100)maxW=300;if(maxH<100)maxH=300;
  var sw=maxW/lv.w,sh=maxH/lv.h;
  cellSize=Math.floor(Math.min(sw,sh));
  cellSize=Math.max(28,Math.min(cellSize,72));
  var gw=lv.w*cellSize,gh=lv.h*cellSize;
  canvas.width=gw*DPR;canvas.height=gh*DPR;
  canvas.style.width=gw+'px';canvas.style.height=gh+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  gridOffsetX=0;gridOffsetY=0;
}

function render(){
  var lv=getLevel();if(!lv)return;
  var gw=lv.w*cellSize,gh=lv.h*cellSize;
  var regions=getRegionCells(lv);
  ctx.clearRect(0,0,gw,gh);

  // Background
  ctx.fillStyle='#0f0f23';
  ctx.fillRect(0,0,gw,gh);

  // Region fills
  for(var i=0;i<regions.length;i++){
    var hasNum=false,numCorrect=false;
    for(var j=0;j<regions[i].length;j++){
      var c=regions[i][j],key=c[0]+','+c[1];
      if(state.placed[key]!==undefined){hasNum=true;break;}
    }
    var col=regionColors[i]||[40,40,80];
    for(var j=0;j<regions[i].length;j++){
      var c=regions[i][j];
      var x0=c[0]*cellSize,y0=c[1]*cellSize;
      if(hasNum){
        ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+',0.35)';
      }else{
        ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+',0.15)';
      }
      ctx.fillRect(x0,y0,cellSize,cellSize);
    }
  }

  // Thin grid lines
  ctx.strokeStyle='#2a2a4a';
  ctx.lineWidth=1;
  for(var x=0;x<=lv.w;x++){
    ctx.beginPath();ctx.moveTo(x*cellSize+.5,0);ctx.lineTo(x*cellSize+.5,gh);ctx.stroke();
  }
  for(var y=0;y<=lv.h;y++){
    ctx.beginPath();ctx.moveTo(0,y*cellSize+.5);ctx.lineTo(gw,y*cellSize+.5);ctx.stroke();
  }

  // Violation highlights
  state.violations.forEach(function(key){
    var parts=key.split(','),px=+parts[0],py=+parts[1];
    ctx.fillStyle='rgba(255,80,80,0.25)';
    ctx.fillRect(px*cellSize,py*cellSize,cellSize,cellSize);
  });

  // Hint glow
  state.hintCells.forEach(function(key){
    var parts=key.split(','),hx=+parts[0],hy=+parts[1];
    var gx=hx*cellSize+cellSize/2,gy=hy*cellSize+cellSize/2;
    var grd=ctx.createRadialGradient(gx,gy,0,gx,gy,cellSize*.6);
    grd.addColorStop(0,'rgba(255,215,0,0.35)');
    grd.addColorStop(1,'rgba(255,215,0,0)');
    ctx.fillStyle=grd;
    ctx.fillRect(hx*cellSize,hy*cellSize,cellSize,cellSize);
  });

  // Bold region borders
  ctx.strokeStyle='#7a7aba';
  ctx.lineWidth=3;
  ctx.lineCap='square';
  for(var i=0;i<regionBorders.length;i++){
    var b=regionBorders[i];
    var bx=b.x*cellSize,by=b.y*cellSize;
    ctx.beginPath();
    if(b.dir==='L'){ctx.moveTo(bx,by);ctx.lineTo(bx,by+cellSize);}
    else if(b.dir==='R'){ctx.moveTo(bx+cellSize,by);ctx.lineTo(bx+cellSize,by+cellSize);}
    else if(b.dir==='T'){ctx.moveTo(bx,by);ctx.lineTo(bx+cellSize,by);}
    else if(b.dir==='B'){ctx.moveTo(bx,by+cellSize);ctx.lineTo(bx+cellSize,by+cellSize);}
    ctx.stroke();
  }
  // Outer border
  ctx.lineWidth=4;
  ctx.strokeRect(2,2,gw-4,gh-4);

  // Draw placed numbers
  ctx.textAlign='center';ctx.textBaseline='middle';
  var fontSize=Math.floor(cellSize*0.5);
  ctx.font='bold '+fontSize+'px Segoe UI,sans-serif';
  for(var key in state.placed){
    var parts=key.split(','),nx=+parts[0],ny=+parts[1];
    var val=state.placed[key];
    ctx.fillStyle='#e0e0ff';
    ctx.fillText(String(val),nx*cellSize+cellSize/2,ny*cellSize+cellSize/2+1);
  }

  // Draw hint solution values
  for(var i=0;i<state.hintCells.length;i++){
    var key=state.hintCells[i];
    if(state.placed[key]===undefined){
      var parts=key.split(','),nx=+parts[0],ny=+parts[1];
      var sol=lv.s[key];
      if(sol!==undefined){
        ctx.fillStyle='rgba(255,215,0,0.7)';
        ctx.fillText(String(sol),nx*cellSize+cellSize/2,ny*cellSize+cellSize/2+1);
      }
    }
  }

  // Particles
  for(var i=state.particles.length-1;i>=0;i--){
    var p=state.particles[i];
    ctx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+p.a+')';
    ctx.fillRect(p.x-2,p.y-2,4,4);
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.a-=0.02;
    if(p.a<=0)state.particles.splice(i,1);
  }
}

var rafId=null;
function loop(){render();if(state.particles.length>0||state.screen==='game'){rafId=requestAnimationFrame(loop);}else{rafId=null;render();}}

// ===== Input =====
function getCellFromEvent(e){
  var lv=getLevel();if(!lv)return null;
  var rect=canvas.getBoundingClientRect();
  var px,py;
  if(e.touches&&e.touches.length){px=e.touches[0].clientX;py=e.touches[0].clientY;}
  else if(e.changedTouches&&e.changedTouches.length){px=e.changedTouches[0].clientX;py=e.changedTouches[0].clientY;}
  else{px=e.clientX;py=e.clientY;}
  var x=Math.floor((px-rect.left)/(rect.width/lv.w));
  var y=Math.floor((py-rect.top)/(rect.height/lv.h));
  if(x<0||x>=lv.w||y<0||y>=lv.h)return null;
  return{x:x,y:y};
}

function handleCellClick(x,y){
  var lv=getLevel();
  var regions=getRegionCells(lv);
  var key=x+','+y;
  var ri=getCellRegion(x,y,regions);
  if(ri<0)return;

  if(state.mode==='place'){
    // Check if this region already has a number placed
    var existingKey=null;
    for(var j=0;j<regions[ri].length;j++){
      var ck=regions[ri][j][0]+','+regions[ri][j][1];
      if(state.placed[ck]!==undefined){existingKey=ck;break;}
    }
    if(existingKey){
      // Move number to new cell or remove if same cell
      if(existingKey===key){
        delete state.placed[key];
        playSfx('erase');
      }else{
        var val=state.placed[existingKey];
        delete state.placed[existingKey];
        state.placed[key]=val;
        playSfx('place');
      }
    }else{
      // Place new number = region size
      state.placed[key]=regions[ri].length;
      playSfx('place');
    }
  }else{
    // Erase mode
    if(state.placed[key]!==undefined){
      delete state.placed[key];
      playSfx('erase');
    }
  }

  // Remove from hints if placed
  var hi=state.hintCells.indexOf(key);
  if(hi>=0)state.hintCells.splice(hi,1);

  // Autocheck
  if(settings.autocheck)checkSolution();

  if(!rafId)loop();
}

canvas.addEventListener('pointerdown',function(e){
  e.preventDefault();
  if(state.screen!=='game')return;
  var cell=getCellFromEvent(e);
  if(cell)handleCellClick(cell.x,cell.y);
});
canvas.addEventListener('touchstart',function(e){e.preventDefault();},false);

// ===== Validation =====
function checkSolution(){
  var lv=getLevel(),regions=getRegionCells(lv);
  var violations=new Set();

  // Get all placed numbers
  var nums=[];
  for(var key in state.placed){
    var parts=key.split(',');
    nums.push({x:+parts[0],y:+parts[1],v:state.placed[key]});
  }

  // Check distance constraint per row
  for(var y=0;y<lv.h;y++){
    var rn=nums.filter(function(n){return n.y===y;}).sort(function(a,b){return a.x-b.x;});
    for(var i=0;i<rn.length-1;i++){
      var gap=rn[i+1].x-rn[i].x-1;
      var diff=Math.abs(rn[i].v-rn[i+1].v);
      if(gap!==diff){
        violations.add(rn[i].x+','+rn[i].y);
        violations.add(rn[i+1].x+','+rn[i+1].y);
      }
    }
  }
  // Check distance constraint per column
  for(var x=0;x<lv.w;x++){
    var cn=nums.filter(function(n){return n.x===x;}).sort(function(a,b){return a.y-b.y;});
    for(var i=0;i<cn.length-1;i++){
      var gap=cn[i+1].y-cn[i].y-1;
      var diff=Math.abs(cn[i].v-cn[i+1].v);
      if(gap!==diff){
        violations.add(cn[i].x+','+cn[i].y);
        violations.add(cn[i+1].x+','+cn[i+1].y);
      }
    }
  }

  state.violations=violations;
  return violations.size===0;
}

function isComplete(){
  var lv=getLevel(),regions=getRegionCells(lv);
  // All regions must have a number
  for(var i=0;i<regions.length;i++){
    var found=false;
    for(var j=0;j<regions[i].length;j++){
      var key=regions[i][j][0]+','+regions[i][j][1];
      if(state.placed[key]!==undefined){found=true;break;}
    }
    if(!found)return false;
  }
  // No violations
  if(!checkSolution())return false;
  // All numbers correct value (region size)
  for(var key in state.placed){
    var parts=key.split(','),x=+parts[0],y=+parts[1];
    var ri=getCellRegion(x,y,regions);
    if(state.placed[key]!==regions[ri].length)return false;
  }
  return true;
}

function doCheck(){
  if(checkSolution()&&isComplete()){
    winLevel();
  }else if(state.violations.size>0){
    playSfx('error');
  }
  if(!rafId)loop();
}

function doHint(){
  if(state.hintsLeft<=0)return;
  var lv=getLevel();
  // Find a solution cell that hasn't been placed yet
  var candidates=[];
  for(var key in lv.s){
    if(state.placed[key]===undefined&&state.hintCells.indexOf(key)<0){
      candidates.push(key);
    }
  }
  if(candidates.length===0)return;
  var pick=candidates[Math.floor(Math.random()*candidates.length)];
  state.hintCells.push(pick);
  state.hintsLeft--;
  playSfx('hint');
  updateHud();
  if(!rafId)loop();
}

function winLevel(){
  state.completed=true;
  clearInterval(state.timerId);state.timerId=null;
  playSfx('win');
  // Calculate stars
  var time=state.elapsed;
  var tier=Math.floor(state.levelIdx/6);
  var parTimes=[[30,60,120],[45,90,180],[60,120,240],[90,180,360],[120,240,480]];
  var pt=parTimes[tier]||[60,120,240];
  var stars=3;
  if(time>pt[0])stars=2;
  if(time>pt[1])stars=1;
  if(time>pt[2])stars=1;

  var prev=progress.completed[state.levelIdx]||0;
  if(stars>prev)progress.completed[state.levelIdx]=stars;
  saveProgress();

  // Confetti
  for(var i=0;i<80;i++){
    state.particles.push({
      x:Math.random()*canvas.width/DPR,
      y:0,
      vx:(Math.random()-.5)*4,
      vy:Math.random()*3+1,
      r:Math.floor(Math.random()*255),g:Math.floor(Math.random()*255),b:Math.floor(Math.random()*255),
      a:1
    });
  }
  if(!rafId)loop();

  // Show win modal after delay
  setTimeout(function(){showWinModal(stars);},800);
}

// ===== UI =====
function updateHud(){
  document.getElementById('hudLevel').textContent='L'+(state.levelIdx+1);
  var m=Math.floor(state.elapsed/60),s=state.elapsed%60;
  document.getElementById('hudTimer').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('hudHints').textContent='Hints: '+state.hintsLeft;
  document.getElementById('hudMode').textContent=state.mode.toUpperCase();
  document.getElementById('btnMode').textContent='Mode: '+(state.mode==='place'?'Place':'Erase');
}

function showMenu(){
  state.screen='menu';
  if(state.timerId){clearInterval(state.timerId);state.timerId=null;}
  stopMusic();
  var tiers=['Beginner (5x5)','Easy (5x6)','Medium (6x6)','Hard (7x6)','Expert (7x7)'];
  var html='<div class="overlay" id="overlay"><div class="overlay__content">';
  html+='<div class="overlay__title">Hanare</div>';
  html+='<div class="overlay__subtitle">Nikoli Number Placement Puzzle</div>';
  html+='<div class="rules-box">';
  html+='<strong>Rules:</strong> Place exactly one number in each region equal to its size (cell count). ';
  html+='The gap between two adjacent numbers in a row or column must equal their absolute difference.';
  html+='</div>';

  for(var t=0;t<5;t++){
    html+='<div class="tier-header">'+tiers[t]+'</div>';
    html+='<div class="tier-grid">';
    for(var i=t*6;i<t*6+6;i++){
      if(i>=LEVELS.length)break;
      var locked=i>0&&(progress.completed[i-1]===undefined)&&i>0;
      // Actually only lock if previous level not completed and not first in tier
      locked=false; // open all levels for better UX
      var cls='level-btn';
      if(locked)cls+=' level-btn--locked';
      if(progress.completed[i])cls+=' level-btn--completed';
      var stars=progress.completed[i]||0;
      var starStr='';
      if(stars>0)starStr='<div class="level-btn__stars">'+'*'.repeat(stars)+'</div>';
      html+='<button class="'+cls+'" data-level="'+i+'" '+(locked?'disabled':'')+'>'+(i+1)+starStr+'</button>';
    }
    html+='</div>';
  }

  html+='<div style="text-align:center;margin-top:16px">';
  html+='<button class="btn" id="btnSettings">Settings</button>';
  html+='</div>';
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);

  var overlay=document.getElementById('overlay');
  overlay.querySelectorAll('[data-level]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var idx=+this.getAttribute('data-level');
      overlay.remove();
      initAudio();
      if(settings.music)startMusic();
      startLevel(idx);
      if(!rafId)loop();
    });
  });
  document.getElementById('btnSettings').addEventListener('click',function(){
    overlay.remove();showSettings();
  });
}

function showSettings(){
  var s=Object.assign({},settings);
  var html='<div class="overlay" id="overlay"><div class="overlay__content">';
  html+='<div class="overlay__title">Settings</div>';
  html+='<div class="settings-row"><span>Music</span><div class="toggle '+(s.music?'toggle--on':'')+'" id="togMusic"><div class="toggle__knob"></div></div></div>';
  html+='<div class="settings-row"><span>Sound Effects</span><div class="toggle '+(s.sfx?'toggle--on':'')+'" id="togSfx"><div class="toggle__knob"></div></div></div>';
  html+='<div class="settings-row"><span>Auto-Check</span><div class="toggle '+(s.autocheck?'toggle--on':'')+'" id="togAuto"><div class="toggle__knob"></div></div></div>';
  html+='<div style="text-align:center;margin-top:16px"><button class="btn btn--primary" id="btnCloseSettings">Done</button></div>';
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
  var ov=document.getElementById('overlay');
  function toggle(id,key){
    var el=document.getElementById(id);
    el.addEventListener('click',function(){
      s[key]=!s[key];
      el.classList.toggle('toggle--on');
      settings[key]=s[key];
      progress.settings=Object.assign({},settings);
      saveProgress();
      if(key==='music'){if(s.music)startMusic();else stopMusic();}
    });
  }
  toggle('togMusic','music');
  toggle('togSfx','sfx');
  toggle('togAuto','autocheck');
  document.getElementById('btnCloseSettings').addEventListener('click',function(){ov.remove();showMenu();});
}

function showWinModal(stars){
  var html='<div class="overlay" id="overlay"><div class="overlay__content" style="text-align:center">';
  html+='<div class="overlay__title">Solved!</div>';
  html+='<div class="win-stars">';
  for(var i=0;i<3;i++){
    html+='<span class="'+(i<stars?'star-active':'star-inactive')+'">★</span> ';
  }
  html+='</div>';
  html+='<div style="color:var(--muted);margin-bottom:8px">Level '+(state.levelIdx+1)+' completed</div>';
  html+='<div style="color:var(--muted);margin-bottom:16px">Time: '+Math.floor(state.elapsed/60)+'m '+(state.elapsed%60)+'s</div>';
  if(state.levelIdx+1<LEVELS.length){
    html+='<button class="btn btn--primary" id="btnNext">Next Level</button> ';
  }
  html+='<button class="btn" id="btnReplay">Replay</button> ';
  html+='<button class="btn" id="btnWinMenu">Menu</button>';
  html+='</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
  var ov=document.getElementById('overlay');
  var nx=document.getElementById('btnNext');
  if(nx)nx.addEventListener('click',function(){ov.remove();startLevel(state.levelIdx+1);if(!rafId)loop();});
  document.getElementById('btnReplay').addEventListener('click',function(){ov.remove();startLevel(state.levelIdx);if(!rafId)loop();});
  document.getElementById('btnWinMenu').addEventListener('click',function(){ov.remove();showMenu();});
}

// ===== Button handlers =====
document.getElementById('btnHint').addEventListener('click',function(){if(state.screen==='game')doHint();});
document.getElementById('btnCheck').addEventListener('click',function(){if(state.screen==='game')doCheck();});
document.getElementById('btnRestart').addEventListener('click',function(){if(state.screen==='game')startLevel(state.levelIdx);if(!rafId)loop();});
document.getElementById('btnMenu').addEventListener('click',function(){showMenu();});
document.getElementById('btnMode').addEventListener('click',function(){
  state.mode=state.mode==='place'?'erase':'place';
  updateHud();
  playSfx('click');
});

// ===== Keyboard =====
document.addEventListener('keydown',function(e){
  if(state.screen!=='game')return;
  if(e.key==='1'){state.mode='place';updateHud();}
  else if(e.key==='2'){state.mode='erase';updateHud();}
  else if(e.key==='h'||e.key==='H'){doHint();}
  else if(e.key==='r'||e.key==='R'){startLevel(state.levelIdx);if(!rafId)loop();}
  else if(e.key==='Enter'){doCheck();}
  else if(e.key==='Escape'){showMenu();}
});

// ===== Resize =====
window.addEventListener('resize',function(){
  if(state.screen==='game'){resizeCanvas();if(!rafId)loop();}
});

// ===== Cleanup =====
var timers=[];
function cleanup(){
  if(rafId)cancelAnimationFrame(rafId);
  if(state.timerId)clearInterval(state.timerId);
  timers.forEach(function(t){clearInterval(t);});
  stopMusic();
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    if(rafId){cancelAnimationFrame(rafId);rafId=null;}
    if(state.timerId){clearInterval(state.timerId);state.timerId=null;}
    stopMusic();
  }else if(state.screen==='game'){
    if(!rafId)loop();
    if(!state.completed){state.timerId=setInterval(function(){state.elapsed=Math.floor((Date.now()-state.startTime)/1000);updateHud();},500);}
    if(settings.music)startMusic();
  }
});

// ===== Init =====
function init(){
  // Load settings from progress
  if(progress.settings){
    settings=Object.assign(settings,progress.settings);
  }
  resizeCanvas();
  showMenu();
}
window.addEventListener('DOMContentLoaded',init);
})();
