<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is Tents and Trees?","acceptedAnswer":{"@type":"Answer","text":"Tents and Trees is a Japanese logic puzzle published by Nikoli. The grid has trees and numbers around the edge. The goal is to place a tent next to every tree so that no two tents touch, and so the number of tents in each row and column matches the given clue."}},{"@type":"Question","name":"How do the Tents rules work?","acceptedAnswer":{"@type":"Answer","text":"1) Place exactly one tent per tree, orthogonally adjacent (not diagonal). 2) No two tents may touch, even diagonally. 3) The number on the side of each row and column must equal the number of tents in that row or column."}},{"@type":"Question","name":"Is Tents hard to learn?","acceptedAnswer":{"@type":"Answer","text":"Tents is one of the friendliest logic puzzles to start with. The rules are short and visual, and every puzzle has a unique solution. Start with 5x5 grids and work up to 12x12."}},{"@type":"Question","name":"How many Tents puzzles are in this game?","acceptedAnswer":{"@type":"Answer","text":"The game includes 30 handcrafted puzzles across 5 difficulty tiers, plus a deterministic daily challenge. Progress, stars, and best times are saved in your browser."}}]}</script>

6],[10,2],[10,11],[11,5]],rowClues:[3,1,0,0,2,2,2,0,2,1,2,2],colClues:[1,2,2,1,3,2,0,1,0,3,1,1]},{name:"Misty Fjord",size:12,trees:[[1,3],[1,6],[2,1],[2,8],[2,9],[4,3],[4,10],[6,1],[6,9],[6,10],[8,6],[9,2],[9,4],[9,11],[10,4],[10,5],[10,7],[11,0]],rowClues:[1,1,2,1,2,1,1,2,2,1,1,3],colClues:[0,3,2,1,2,1,2,2,0,2,0,3]},{name:"Ancient Woods",size:12,trees:[[0,8],[1,10],[3,4],[4,0],[4,6],[4,7],[4,8],[4,9],[5,3],[6,1],[6,3],[8,8],[9,6],[9,11],[10,9],[11,0],[11,4],[11,11]],rowClues:[1,0,2,2,2,2,2,0,1,2,1,3],colClues:[2,1,0,1,2,2,1,3,2,0,4,0]},{name:"Wild Frontier",size:12,trees:[[0,5],[1,3],[2,9],[3,11],[4,0],[4,10],[5,11],[6,5],[7,1],[7,3],[7,5],[7,7],[8,9],[9,1],[10,3],[10,4],[10,9],[10,10],[11,6]],rowClues:[1,2,1,0,1,2,2,1,3,2,3,1],colClues:[3,0,2,1,2,2,1,1,2,2,1,2]},];// ===== Solver (backtracking per-tree) =====(function(){'use strict';function solveTents(trees,rowClues,colClues,n,cap){cap = cap || 2;  var treeSet = {};  for (var i=0;i<trees.length;i++) treeSet[trees[i][0]+','+trees[i][1]] = 1;  var target = trees.length;  var grid = new Array(n);  for (var r=0;r<n;r++){grid[r] = new Array(n); for (var c=0;c<n;c++) grid[r][c] = 0;}  var solutions = [];  function n4(r,c){var out = [];    if (r>0) out.push([r-1,c]);    if (r<n-1) out.push([r+1,c]);    if (c>0) out.push([r,c-1]);    if (c<n-1) out.push([r,c+1]);    return out;}  function n8(r,c){var out = [];    for (var dr=-1;dr<=1;dr++) for (var dc=-1;dc<=1;dc++){if (dr===0 && dc===0) continue;      var nr=r+dr,nc=c+dc;      if (nr>=0 && nr<n && nc>=0 && nc<n) out.push([nr,nc]);}    return out;}  function canPlace(r,c){if (treeSet[r+','+c]) return false;    var adj = n8(r,c);    for (var i=0;i<adj.length;i++) if (grid[adj[i][0]][adj[i][1]]) return false;    return true;}  function rowSum(r){var s=0; for (var c=0;c<n;c++) s+=grid[r][c]; return s;}  function colSum(c){var s=0; for (var r=0;r<n;r++) s+=grid[r][c]; return s;}  // Get valid placement options for a tree  function options(tr,tc){var opts = [];    var adj = n TORAGE_KEY = 'gz-tents-save-v1';function loadState(){try {var s = localStorage.getItem(STORAGE_KEY);    if (s) {var obj = JSON.parse(s);      for (var k in obj) if (obj.hasOwnProperty(k) && STATE.hasOwnProperty(k)) STATE[k] = obj[k];}} catch(e){}}function saveState(){try {var out = {};    for (var k in STATE) if (STATE.hasOwnProperty(k)) out[k] = STATE[k];    localStorage.setItem(STORAGE_KEY,JSON.stringify(out));} catch(e){}}// ===== Game State (current play) =====var G = {level:null,levelIdx:0,grid:null,// n x n:0=empty,1=tent,2=grass  undo:[],// stack of {r,c,prev,action}  startTime:0,elapsed:0,running:false,won:false,hintFlash:null,// {r,c,start}  // Errors  errors:[],// list of {r,c,type}};// Star thresholds per tier (seconds for 3 stars)var STAR_THRESHOLDS = [[60,120,240],// tier 1 (5x5)  [90,180,360],// tier 2 (6x6)  [150,300,600],// tier 3 (8x8)  [240,480,900],// tier 4 (10x10)  [360,720,1500]  // tier 5 (12x12)];function tierForLevel(i){return Math.floor(i / 6);}function starsForTime(levelIdx,secs){var t = tierForLevel(levelIdx);  var th = STAR_THRESHOLDS[t];  if (secs <= th[0]) return 3;  if (secs <= th[1]) return 2;  if (secs <= th[2]) return 1;  return 0;}// Initialize a levelfunction startLevel(idx){G.level = LEVELS[idx];  G.levelIdx = idx;  var n = G.level.size;  G.grid = new Array(n);  for (var r=0;r<n;r++){G.grid[r] = new Array(n); for (var c=0;c<n;c++) G.grid[r][c] = 0;}  G.undo = [];  G.startTime = performance.now();  G.elapsed = 0;  G.running = true;  G.won = false;  G.hintFlash = null;  G.errors = [];  STATE.currentLevel = idx;  saveState();  updateUI();  resizeCanvas();}// Tap cyclefunction tapCell(r,c){if (G.won) return;  // Cannot place tent on tree  if (G.level.trees.some(function(t){return t[0]===r && t[1]===c;})) return;  var prev = G.grid[r][c];  var next = (prev + 1) % 3;  G.undo.push({r:r,c:c,prev:prev,next:next});  G.grid[r][c] = next;  G.running = true;  if (next === 1) playSfx('tentPlace');  else if (next === 2) playSfx('grass');  else ueAtTime(0,startTime);      g.gain.linearRampToValueAtTime(0.06 / chord.length,startTime + 1.5);      g.gain.setValueAtTime(0.06 / chord.length,startTime + dur - 1.5);      g.gain.linearRampToValueAtTime(0,startTime + dur);      o.start(startTime);      o.stop(startTime + dur + 0.1);      bgmNodes.push(o,g,lp);});}  function scheduleBgm(){if (!bgmPlaying) return;    var t = ctxA.currentTime;    for (var c=0;c<chords.length;c++){playChordAt(t + c*chordDur,chords[c],chordDur);}    setTimeout(scheduleBgm,chords.length * chordDur * 1000);}  scheduleBgm();}function stopBgm(){bgmPlaying = false;  for (var i=0;i<bgmNodes.length;i++){try {bgmNodes[i].stop && bgmNodes[i].stop();} catch(e){}    try {bgmNodes[i].disconnect && bgmNodes[i].disconnect();} catch(e){}}  bgmNodes = [];}// ===== UI Screens =====function showOverlay(html){document.getElementById('modal').innerHTML = html;  document.getElementById('overlay').classList.add('show');}function hideOverlay(){document.getElementById('overlay').classList.remove('show');}function showTutorial(){var html = '<h2>How to Play Tents</h2>' +    '<div class="tutorial-step"><h3>1. The Goal</h3><p>Place one tent next to every tree. Each tent must be orthogonally adjacent (up,down,left,or right) to its tree.</p></div>' +    '<div class="tutorial-step"><h3>2. Tap a Cell</h3><p>Tap a cell to cycle through:empty \u2192 tent \u2192 grass mark \u2192 empty. Use grass marks to remember cells that are not tents.</p></div>' +    '<div class="tutorial-step"><h3>3. Tents Stay Apart</h3><p>No two tents may touch each other,not even diagonally. If two tents are adjacent,that is an error.</p></div>' +    '<div class="tutorial-step"><h3>4. Match the Clues</h3><p>The numbers on the side of each row and column must equal the number of tents in that row or column. Clues turn green when satisfied.</p></div>' +    '<div class="tutorial-step"><h3>5. Use Hints</h3><p>Stuck? Tap the Hint button to reveal one correct tent placement. Complete levels to earn more hints.</p></div>' +    '<div class="win-actions"><button class="btn primary" onclick="window.GZ.closeTutorial()">Got it,let\'s play</button></div>';  showOverlay(html);  STATE.tutorialShown = true;  saveState();}window.GZ = window.GZ || {};window.GZ.closeTutorial = function(){hideOverlay();};function showLevelSelect(){var tierNames = ['Meadow','Forest','Woodland','Mountain','Wilds'];  var html = '<h2>Select Level</h2>';  html += '<div class="daily-banner" id="dailyBanner"><h3>Daily Challenge</h3><p id="dailyDesc">A fresh seeded puzzle each day</p></div>';  for (var t=0;t<5;t++){var start = t*6;    var end = start+6;    html += '<div class="tier-header"><span>Tier ' + (t+1) + ' \u00b7 ' + tierNames[t] + '</span><span>' + LEVELS[start].size + 'x' + LEVELS[start].size + '</span></div>';    html += '<div class="level-select">';    for (var i=start;i<end;i++){var key = 'L'+i;      var completed = STATE.completed[key];      var stars = STATE.stars[key] || 0;      var prevDone = i === 0 || STATE.completed['L'+(i-1)];      var locked = !prevDone && i > 0;      var cls = 'level-btn';      if (completed) cls += ' completed';      if (locked) cls += ' locked';      if (i === G.levelIdx) cls += ' active';      var starStr = '';      for (var s=0;s<3;s++) starStr += s < stars ? '\u25c6' :'\u25c7';      html += '<button class="' + cls + '" data-idx="' + i + '"' + (locked ? ' disabled' :'') + '>' +        '<span class="lvl-num">' + (i+1) + '</span>' +        '<span class="stars">' + (completed ? starStr :'') + '</span>' +      '</button>';}    html += '</div>';}  html += '<div class="win-actions"><button class="btn" onclick="window.GZ.closeOverlay()">Back</button></div>';  showOverlay(html);  // Bind click handlers  var btns = document.querySelectorAll('.level-btn');  for (var b=0;b<btns.length;b++){btns[b].addEventListener('click',function(e){if (this.classList.contains('locked')) return;      var idx = parseInt(this.getAttribute('data-idx'),10);      hideOverlay();      startLevel(idx);});}  var db = document.getElementById('dailyBanner');  if (db){var today = new Date().toISOString().slice(0,10);    if (STATE.dailyDone[today]){db.classList.add('done');      document.getElementById('dailyDesc').textContent = 'Completed today. See you tomorrow!';}    db.addEventListener('click',function(){hideOverlay();      startDaily();});}}function showMenu(){var html = '<h2>Menu</h2>';  html += '<div class="settings-row">';  html += '<button class="setting-btn ' + (STATE.soundOn ? 'on' :'') + '" id="setSound">Sound:' + (STATE.soundOn ? 'On' :'Off') + '</button>';  html += '<button class="setting-btn ' + (STATE.musicOn ? 'on' :'') + '" id="setMusic">Music:' + (STATE.musicOn ? 'On' :'Off') + '</button>';  html += '</div>';  html += '<div class="win-actions">';  html += '<button class="btn primary" id="resumeBtn">Resume</button>';  html += '<button class="btn warn" id="resetLevelBtn">Reset Level</button>';  html += '<button class="btn" id="levelsMenuBtn">Level Select</button>';  html += '<button class="btn" id="helpMenuBtn">How to Play</button>';  html += '</div>';  showOverlay(html);  document.getElementById('setSound').addEventListener('click',function(){STATE.soundOn = !STATE.soundOn;    saveState();    showMenu();});  document.getElementById('setMusic').addEventListener('click',function(){STATE.musicOn = !STATE.musicOn;    saveState();    if (STATE.musicOn) startBgm(); else stopBgm();    showMenu();});  document.getElementById('resumeBtn').addEventListener('click',hideOverlay);  document.getElementById('resetLevelBtn').addEventListener('click',function(){resetLevel();    hideOverlay();});  document.getElementById('levelsMenuBtn').addEventListener('click',function(){showLevelSelect();});  document.getElementById('helpMenuBtn').addEventListener('click',function(){showTutorial();});}function showWinModal(secs,stars,isNew){var starStr = '';  for (var s=0;s<3;s++) starStr += s < stars ? '\u25c6' :'\u25c7';  var nextIdx = G.levelIdx + 1;  var hasNext = nextIdx < LEVELS.length;  var html = '<h2>' + (isNew ? 'Puzzle Solved!' :'Completed Again!') + '</h2>';  html += '<div class="win-stars">' + starStr + '</div>';  html += '<div class="win-time">' + formatTime(secs) + '</div>';  if (isNew) html += '<p style="text-align:center">+1 Hint earned</p>';  html += '<div class="win-actions">';  html += '<button class="btn primary" id="nextBtn">' + (hasNext ? 'Next Level' :'All Done') + '</button>';  html += '<button class="btn" id="winLevelsBtn">Levels</button>';  html += '<button class="btn" id="winMenuBtn">Menu</button>';  html += '</div>';  showOverlay(html);  document.getElementById('nextBtn').addEventListener('click',function(){hideOverlay();    if (hasNext) startLevel(nextIdx);    else showLevelSelect();});  document.getElementById('winLevelsBtn').addEventListener('click',function(){showLevelSelect();});  document.getElementById('winMenuBtn').addEventListener('click',function(){showMenu();});}window.GZ.closeOverlay = hideOverlay;// ===== Daily Challenge =====function seededRandom(seed){var x = Math.sin(seed) * 10000;  return x - Math.floor(x);}function startDaily(){// Seeded by today's date  var d = new Date();  var seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();  // Pick a level by seed (8x8 tier 3)  var idx = 12 + Math.floor(seededRandom(seed) * 6); // 12-17  var lvl = LEVELS[idx];  // Apply a deterministic transformation:rotate trees  var rotation = Math.floor(seededRandom(seed + 1) * 4);  var flip = seededRandom(seed + 2) > 0.5;  var n = lvl.size;  var newTrees = lvl.trees.map(function(t){var r = t[0],c = t[1];    for (var i=0;i<rotation;i++){var nr = c;      var nc = n - 1 - r;      r = nr; c = nc;}    if (flip) c = n - 1 - c;    return [r,c];});  var rowClues = lvl.rowClues.slice();  var colClues = lvl.colClues.slice();  for (var i=0;i<rotation;i++){var tmp = rowClues;    rowClues = colClues.slice().reverse();    colClues = tmp;}  if (flip) colClues = colClues.slice().reverse();  // Recompute clues from solution just to be safe  var sol = solveTents(newTrees,rowClues,colClues,n,2)[0];  if (sol){var rc = new Array(n),cc = new Array(n);    for (var r=0;r<n;r++){rc[r]=0; for (var c=0;c<n;c++) if (sol[r][c]) rc[r]++;}    for (var c=0;c<n;c++){cc[c]=0; for (var r=0;r<n;r++) if (sol[r][c]) cc[c]++;}    rowClues = rc; colClues = cc;}  // Daily level:use idx 99 to distinguish  G.level = {name:'Daily ' + d.toISOString().slice(0,10),size:n,trees:newTrees,rowClues:rowClues,colClues:colClues,daily:true,dailyDate:d.toISOString().slice(0,10)};  G.levelIdx = 99;  G.grid = new Array(n);  for (var r=0;r<n;r++){G.grid[r] = new Array(n); for (var c=0;c<n;c++) G.grid[r][c] = 0;}  G.undo = []; G.startTime = performance.now(); G.elapsed = 0;  G.running = true; G.won = false; G.hintFlash = null; G.errors = [];  updateUI();  resizeCanvas();  saveState();}// ===== Toasts =====var toastTimer = null;function showToast(msg){var existing = document.querySelector('.toast');  if (existing) existing.remove();  if (toastTimer) clearTimeout(toastTimer);  var t = document.createElement('div');  t.className = 'toast';  t.textContent = msg;  document.body.appendChild(t);  toastTimer = setTimeout(function(){t.remove();},2000);}// ===== Star background =====function buildStars(){var bg = document.getElementById('starsBg');  for (var i=0;i<40;i++){var s = document.createElement('div');    s.className = 'star';    s.style.left = Math.random()*100 + '%';    s.style.top = Math.random()*100 + '%';    s.style.width = (1+Math.random()*2) + 'px';    s.style.height = s.style.width;    s.style.animationDelay = (Math.random()*3) + 's';    s.style.animationDuration = (2+Math.random()*3) + 's';    bg.appendChild(s);}}// ===== Cleanup =====var cleaned = false;function cleanup(){if (cleaned) return;  cleaned = true;  try {if (rafId) cancelAnimationFrame(rafId);} catch(e){}  rafId = null;  try {stopBgm();} catch(e){}  try {if (audioCtx) audioCtx.close();} catch(e){}  audioCtx = null;}// ===== Init =====function init(){loadState();  buildStars();  initCanvas();  setupInput();  // Wire UI  document.getElementById('levelsBtn').addEventListener('click',showLevelSelect);  document.getElementById('helpBtn').addEventListener('click',showTutorial);  document.getElementById('menuBtn').addEventListener('click',showMenu);  document.getElementById('undoBtn').addEventListener('click',undoMove);  document.getElementById('resetBtn').addEventListener('click',resetLevel);  document.getElementById('hintBtn').addEventListener('click',useHint);  document.getElementById('soundBtn').addEventListener('click',function(){STATE.soundOn = !STATE.soundOn;    saveState();    updateNavButtons();    if (STATE.soundOn) playSfx('click');});  document.getElementById('musicBtn').addEventListener('click',function(){STATE.musicOn = !STATE.musicOn;    saveState();    updateNavButtons();    if (STATE.musicOn) startBgm();    else stopBgm();});  window.addEventListener('resize',resizeCanvas);  window.addEventListener('orientationchange',resizeCanvas);  document.addEventListener('visibilitychange',function(){if (document.hidden) {stopBgm();}    else if (STATE.musicOn) {startBgm();}});  window.addEventListener('beforeunload',cleanup);  // Resume audio on first user gesture  var firstGesture = function(){var ctxA = ensureAudio();    if (ctxA && ctxA.state === 'suspended') ctxA.resume();    if (STATE.musicOn && !bgmPlaying) startBgm();    document.removeEventListener('click',firstGesture);    document.removeEventListener('touchstart',firstGesture);    document.removeEventListener('pointerdown',firstGesture);};  document.addEventListener('click',firstGesture);  document.addEventListener('touchstart',firstGesture);  document.addEventListener('pointerdown',firstGesture);  // Load last level  var idx = STATE.currentLevel || 0;  if (idx < 0 || idx >= LEVELS.length) idx = 0;  startLevel(idx);  updateNavButtons();  if (!STATE.tutorialShown) {setTimeout(showTutorial,200);}  // Start loop  rafId = requestAnimationFrame(loop);}function updateNavButtons(){document.getElementById('soundBtn').textContent = STATE.soundOn ? 'Sound' :'Mute';  document.getElementById('musicBtn').textContent = STATE.musicOn ? 'Music' :'No Music';  document.getElementById('soundBtn').style.color = STATE.soundOn ? 'var(--green)' :'var(--txt-dim)';  document.getElementById('musicBtn').style.color = STATE.musicOn ? 'var(--green)' :'var(--txt-dim)';}if (document.readyState === 'loading'){document.addEventListener('DOMContentLoaded',init);} else {init();}// Expose for debuggingwindow.GZ = window.GZ || {};window.GZ.state = STATE;window.GZ.game = G;window.GZ.solve = solveTents;})();</script>
