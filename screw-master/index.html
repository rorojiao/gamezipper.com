// ---- Utility ----
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeOutBounce(t) {
  const n1 = 7.5625, d1 = 2.75;
  if (t < 1 / d1) return n1 * t * t;
  else if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
  else if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
  else return n1 * (t -= 2.625 / d1) * t + 0.984375;
}
function easeInOutQuad(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function easeOutBack(t) { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); }
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function hexToRgb(hex) {

}

// ---- Audio Engine (Web Audio API procedural) ----
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.enabled = true;
    this.masterGain = null;
  }
  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.5;
      this.masterGain.connect(this.ctx.destination);
    } catch (e) { this.enabled = false; }
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
  playUnscrew() {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime;
    // Whir
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.3);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.connect(g).connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.35);
    // Click
    const osc2 = this.ctx.createOscillator();
    const g2 = this.ctx.createGain();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(1200, t + 0.3);
    osc2.frequency.exponentialRampToValueAtTime(600, t + 0.35);
    g2.gain.setValueAtTime(0.08, t + 0.3);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc2.connect(g2).connect(this.masterGain);
    osc2.start(t + 0.3); osc2.stop(t + 0.4);
  }
  playPlateFall() {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime;
    // Whoosh
    const noise = this.ctx.createBufferSource();
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.5, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
    noise.buffer = buf;
    const filt = this.ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.setValueAtTime(2000, t);
    filt.frequency.exponentialRampToValueAtTime(200, t + 0.5);
    filt.Q.value = 2;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    noise.connect(filt).connect(g).connect(this.masterGain);
    noise.start(t); noise.stop(t + 0.5);
    // Impact
    const osc = this.ctx.createOscillator();
    const g2 = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t + 0.45);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.7);
    g2.gain.setValueAtTime(0.25, t + 0.45);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    osc.connect(g2).connect(this.masterGain);
    osc.start(t + 0.45); osc.stop(t + 0.7);
  }
  playLevelComplete() {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, t + i * 0.12);
      g.gain.linearRampToValueAtTime(0.15, t + i * 0.12 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.4);
      osc.connect(g).connect(this.masterGain);
      osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.4);
    });
  }
  playCombo(level) {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime;
    const freq = 400 + level * 150;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.5, t + 0.2);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(g).connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.25);
  }
  playError() {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.3);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g).connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.3);
  }
  playClick() {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();

    osc.connect(g).connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.06);
  }
  playPowerUp() {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime;
    for (let i = 0; i < 5; i++) {
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 600 + i * 200;

      g.gain.linearRampToValueAtTime(0.08, start + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.2);
      osc.connect(g).connect(this.masterGain);
      osc.start(start); osc.stop(start + 0.2);
    }

// ---- Particle System ----
class Particle {
  constructor(x, y, opts = {}) {
    this.x = x; this.y = y;
    this.vx = opts.vx || rand(-3, 3);
    this.vy = opts.vy || rand(-5, -1);
    this.life = opts.life || rand(0.5, 1.2);
    this.maxLife = this.life;
    this.size = opts.size || rand(2, 5);
    this.color = opts.color || '#FFD700';
    this.gravity = opts.gravity !== undefined ? opts.gravity : 120;
    this.friction = opts.friction || 0.98;
  }
  update(dt) {
    this.vy += this.gravity * dt;
    this.vx *= this.friction;
    this.x += this.vx * 60 * dt;
    this.y += this.vy * 60 * dt;
    this.life -= dt;
  }
  get alpha() { return clamp(this.life / this.maxLife, 0, 1); }
  get alive() { return this.life > 0; }
}

class ParticleSystem {
  constructor() { this.particles = []; }
  emit(x, y, count, opts = {}) {
    for (let i = 0; i < count; i++) {
      this.particles.push(new Particle(x, y, opts));
    }
  }
  burst(x, y, count = 20, colors = ['#FFD700', '#FF6B35', '#FFF', '#4FC3F7']) {
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + rand(-0.2, 0.2);
      const speed = rand(2, 7);
      this.particles.push(new Particle(x, y, {
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        color: colors[i % colors.length],
        size: rand(2, 6),
        life: rand(0.6, 1.5),
        gravity: 80
      }));
    }
  }
  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].update(dt);
      if (!this.particles[i].alive) this.particles.splice(i, 1);
    }
  }
  draw(ctx) {
    this.particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }
}

// ---- Save/Load ----
function loadSave() {
  try {
    const raw = localStorage.getItem('screwmaster_save');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (data.version !== SAVE_VERSION) return null;
    return data;
  } catch (e) { return null; }
}

function writeSave(data) {
  try {
    data.version = SAVE_VERSION;
    localStorage.setItem('screwmaster_save', JSON.stringify(data));
  } catch (e) {}
}

function getDefaultSave() {
  return {
    version: SAVE_VERSION,
    currentLevel: 1,
    bestScores: {},
    totalStars: 0,
    powerUps: { undo: 10, extraHole: 5, hint: 10, hammer: 3 },
    settings: { sound: true }
  };
}

// ---- Game State ----
const STATE = {
  MENU: 'menu',
  PLAYING: 'playing',
  LEVEL_COMPLETE: 'levelComplete',
  LEVEL_FAIL: 'levelFail',
  LEVEL_SELECT: 'levelSelect',
  SETTINGS: 'settings',
  ANIMATING: 'animating'
};

// ---- Main Game Class ----
class ScrewMasterGame {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.audio = new AudioEngine();
    this.particles = new ParticleSystem();
    this.levels = generateLevels();
    this.saveData = loadSave() || getDefaultSave();
    this.state = STATE.MENU;
    this.prevState = null;
    this.timers = [];
    this.rafId = null;
    this.lastTime = 0;
    this.screenShake = 0;
    this.screenShakeDecay = 0.9;

    // Game objects
    this.plates = [];
    this.bolts = [];
    this.holes = [];
    this.activeBolt = null;
    this.moveHistory = [];
    this.moveCount = 0;
    this.comboCount = 0;
    this.score = 0;
    this.currentLevelIdx = 0;
    this.animatingBolt = null;
    this.animatingPlate = null;
    this.floatingTexts = [];
    this.tutorialHighlight = null;
    this.hintBolt = null;
    this.hintPulse = 0;

    // Power-up counts for current level
    this.levelPowerUps = { undo: 3, extraHole: 2, hint: 3, hammer: 1 };

    // UI state
    this.menuButtons = [];
    this.gameButtons = [];
    this.overlayButtons = [];
    this.levelButtons = [];
    this.settingsButtons = [];
    this.backButton = null;

    // Resize
    this.resize();
    this.setupEvents();
    this.audio.init();

    // Start loop
    this.lastTime = performance.now();
    this.loop(this.lastTime);
  }

  resize() {
    const dpr = window.devicePixelRatio || 1;
    const maxW = 500, maxH = 850;
    let w = Math.min(window.innerWidth, maxW);
    let h = Math.min(window.innerHeight, maxH);

    // Maintain aspect ratio for very wide screens
    if (w / h > 0.65) {
      w = h * 0.58;
    }

    this.W = w;
    this.H = h;
    this.canvas.style.width = w + 'px';
    this.canvas.style.height = h + 'px';
    this.canvas.width = w * dpr;
    this.canvas.height = h * dpr;
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.scale = Math.min(w / 500, h / 850);
  }

  setupEvents() {
    this._onResize = () => { this.resize(); };
    this._onPointerDown = (e) => { this.onPointerDown(e); };
    this._onPointerMove = (e) => { this.onPointerMove(e); };
    this._onPointerUp = (e) => { this.onPointerUp(e); };
    window.addEventListener('resize', this._onResize);
    this.canvas.addEventListener('pointerdown', this._onPointerDown);
    this.canvas.addEventListener('pointermove', this._onPointerMove);
    this.canvas.addEventListener('pointerup', this._onPointerUp);
    this.canvas.addEventListener('pointercancel', this._onPointerUp);
  }

  cleanup() {
    window.removeEventListener('resize', this._onResize);
    this.canvas.removeEventListener('pointerdown', this._onPointerDown);
    this.canvas.removeEventListener('pointermove', this._onPointerMove);
    this.canvas.removeEventListener('pointerup', this._onPointerUp);
    this.canvas.removeEventListener('pointercancel', this._onPointerUp);
    if (this.rafId) cancelAnimationFrame(this.rafId);
    this.timers.forEach(t => clearTimeout(t));
    this.timers = [];
  }

  setTimeout(fn, ms) {
    const id = setTimeout(() => {
      this.timers = this.timers.filter(t => t !== id);
      fn();
    }, ms);
    this.timers.push(id);
    return id;
  }

  getPointerPos(e) {
    const rect = this.canvas.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }

  onPointerDown(e) {
    e.preventDefault();
    this.audio.resume();
    const pos = this.getPointerPos(e);
    this.handleTap(pos.x, pos.y);
  }

  onPointerMove(e) {
    e.preventDefault();
  }

  onPointerUp(e) {
    e.preventDefault();
  }

  handleTap(x, y) {
    switch (this.state) {
      case STATE.MENU: this.handleMenuTap(x, y); break;
      case STATE.PLAYING: this.handlePlayingTap(x, y); break;
      case STATE.LEVEL_COMPLETE: this.handleOverlayTap(x, y); break;
      case STATE.LEVEL_FAIL: this.handleOverlayTap(x, y); break;
      case STATE.LEVEL_SELECT: this.handleLevelSelectTap(x, y); break;
      case STATE.SETTINGS: this.handleSettingsTap(x, y); break;
      case STATE.ANIMATING: break; // ignore during animations
    }
  }

  // ---- Menu ----
  handleMenuTap(x, y) {
    for (const btn of this.menuButtons) {
      if (this.hitTest(x, y, btn)) {
        this.audio.playClick();
        btn.action();
        return;
      }
    }
  }

  drawMenu() {
    const ctx = this.ctx, W = this.W, H = this.H;
    this.drawBackground();

    // Title
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const titleY = H * 0.22;

    // Title glow
    ctx.shadowColor = '#4FC3F7';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#FFF';
    ctx.font = `900 ${Math.floor(42 * this.scale)}px Orbitron, sans-serif`;
    ctx.fillText('SCREW', W / 2, titleY - 25 * this.scale);
    ctx.shadowColor = '#FFD54F';
    ctx.fillText('MASTER', W / 2, titleY + 25 * this.scale);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Subtitle
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = `600 ${Math.floor(14 * this.scale)}px Inter, sans-serif`;
    ctx.fillText('Unscrew The Puzzle', W / 2, titleY + 60 * this.scale);
    ctx.restore();

    // Decorative screws
    this.drawDecorativeBolt(W * 0.2, H * 0.42, 22 * this.scale, '#B0BEC5', performance.now() / 2000);
    this.drawDecorativeBolt(W * 0.8, H * 0.42, 22 * this.scale, '#FFD54F', performance.now() / 2000 + 1);
    this.drawDecorativeBolt(W * 0.35, H * 0.48, 16 * this.scale, '#FF8A65', performance.now() / 2000 + 2);
    this.drawDecorativeBolt(W * 0.65, H * 0.48, 16 * this.scale, '#4FC3F7', performance.now() / 2000 + 3);

    // Buttons
    this.menuButtons = [];
    const btnW = 240 * this.scale, btnH = 56 * this.scale;
    const btnX = W / 2 - btnW / 2;

    this.menuButtons.push(this.drawButton(btnX, H * 0.56, btnW, btnH, 'PLAY', '#4FC3F7', () => {
      this.currentLevelIdx = this.saveData.currentLevel - 1;
      this.startLevel(this.currentLevelIdx);
    }));

    this.menuButtons.push(this.drawButton(btnX, H * 0.66, btnW, btnH, 'LEVELS', '#81C784', () => {
      this.state = STATE.LEVEL_SELECT;
    }));

    this.menuButtons.push(this.drawButton(btnX, H * 0.76, btnW, btnH, 'SETTINGS', '#FF8A65', () => {
      this.prevState = STATE.MENU;
      this.state = STATE.SETTINGS;
    }));

    // Version
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = `400 ${Math.floor(10 * this.scale)}px Inter, sans-serif`;
    ctx.fillText('v1.0.0', W / 2, H - 20 * this.scale);
    ctx.restore();
  }

  drawDecorativeBolt(x, y, r, color, rot) {
    const ctx = this.ctx;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    this.drawHexBolt(0, 0, r, color, false);
    ctx.restore();
  }

  // ---- Level Select ----
  handleLevelSelectTap(x, y) {
    // Back button
    if (this.backButton && this.hitTest(x, y, this.backButton)) {
      this.audio.playClick();
      this.state = STATE.MENU;
      return;
    }
    for (const btn of this.levelButtons) {
      if (this.hitTest(x, y, btn)) {
        this.audio.playClick();
        this.currentLevelIdx = btn.levelIdx;
        this.startLevel(btn.levelIdx);
        return;
      }
    }
  }

  drawLevelSelect() {
    const ctx = this.ctx, W = this.W, H = this.H;
    this.drawBackground();

    // Header
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.font = `700 ${Math.floor(24 * this.scale)}px Orbitron, sans-serif`;
    ctx.fillText('SELECT LEVEL', W / 2, 50 * this.scale);
    ctx.restore();

    this.backButton = this.drawBackButton();

    // Level grid
    this.levelButtons = [];
    const cols = 5, rows = 5;
    const cellW = (W - 40 * this.scale) / cols;
    const cellH = cellW;
    const startX = 20 * this.scale;
    const startY = 80 * this.scale;

    for (let i = 0; i < LEVELS_TOTAL; i++) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const cx = startX + col * cellW + cellW / 2;
      const cy = startY + row * (cellH + 8 * this.scale) + cellH / 2;
      const r = cellW * 0.38;

      const unlocked = i <= this.saveData.currentLevel - 1;
      const best = this.saveData.bestScores[i + 1];
      const stars = best ? best.stars : 0;

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);

      if (unlocked) {
        const grad = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
        grad.addColorStop(0, '#4FC3F7');
        grad.addColorStop(1, '#0288D1');
        ctx.fillStyle = grad;
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
      }
      ctx.fill();

      // Level number
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = unlocked ? '#FFF' : 'rgba(255,255,255,0.3)';
      ctx.font = `700 ${Math.floor(r * 0.8)}px Inter, sans-serif`;
      ctx.fillText(String(i + 1), cx, cy);

      // Stars
      if (stars > 0) {
        const starY = cy + r + 8 * this.scale;
        for (let s = 0; s < 3; s++) {
          const sx = cx + (s - 1) * 12 * this.scale;
          ctx.fillStyle = s < stars ? '#FFD54F' : 'rgba(255,255,255,0.15)';
          ctx.font = `${Math.floor(10 * this.scale)}px sans-serif`;
          ctx.fillText('★', sx, starY);
        }
      }
      ctx.restore();

      if (unlocked) {
        this.levelButtons.push({ x: cx - r, y: cy - r, w: r * 2, h: r * 2, levelIdx: i });
      }
    }

    // Total stars
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD54F';
    ctx.font = `600 ${Math.floor(14 * this.scale)}px Inter, sans-serif`;
    ctx.fillText(`Total Stars: ${this.saveData.totalStars} / ${LEVELS_TOTAL * 3}`, W / 2, H - 30 * this.scale);
    ctx.restore();
  }

  // ---- Settings ----
  handleSettingsTap(x, y) {
    if (this.backButton && this.hitTest(x, y, this.backButton)) {
      this.audio.playClick();
      this.state = this.prevState || STATE.MENU;
      return;
    }
    for (const btn of this.settingsButtons) {
      if (this.hitTest(x, y, btn)) {
        this.audio.playClick();
        btn.action();
        return;
      }
    }
  }

  drawSettings() {
    const ctx = this.ctx, W = this.W, H = this.H;
    this.drawBackground();

    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.font = `700 ${Math.floor(24 * this.scale)}px Orbitron, sans-serif`;
    ctx.fillText('SETTINGS', W / 2, 50 * this.scale);
    ctx.restore();

    this.backButton = this.drawBackButton();
    this.settingsButtons = [];

    const btnW = 260 * this.scale, btnH = 56 * this.scale;
    const btnX = W / 2 - btnW / 2;

    // Sound toggle
    const soundOn = this.saveData.settings.sound;
    this.settingsButtons.push(this.drawButton(btnX, H * 0.3, btnW, btnH,
      `Sound: ${soundOn ? 'ON' : 'OFF'}`,
      soundOn ? '#81C784' : '#E57373',
      () => {
        this.saveData.settings.sound = !this.saveData.settings.sound;
        this.audio.enabled = this.saveData.settings.sound;
        writeSave(this.saveData);
      }
    ));

    // Reset progress
    this.settingsButtons.push(this.drawButton(btnX, H * 0.45, btnW, btnH,
      'Reset Progress', '#E57373',
      () => {
        this.saveData = getDefaultSave();
        this.audio.enabled = true;
        writeSave(this.saveData);
      }
    ));

    // Info
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `400 ${Math.floor(12 * this.scale)}px Inter, sans-serif`;
    const infoY = H * 0.62;
    ctx.fillText('Tap bolts to unscrew them', W / 2, infoY);
    ctx.fillText('Free all plates without filling all holes', W / 2, infoY + 20 * this.scale);
    ctx.fillText('Reposition bolts between holes strategically', W / 2, infoY + 40 * this.scale);
    ctx.restore();

    // Power-up info
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `600 ${Math.floor(11 * this.scale)}px Inter, sans-serif`;
    const puY = H * 0.76;
    ctx.fillText('Power-Ups:', W / 2, puY);
    ctx.font = `400 ${Math.floor(11 * this.scale)}px Inter, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText(`Undo: ${this.saveData.powerUps.undo}  |  Extra Hole: ${this.saveData.powerUps.extraHole}`, W / 2, puY + 18 * this.scale);
    ctx.fillText(`Hint: ${this.saveData.powerUps.hint}  |  Hammer: ${this.saveData.powerUps.hammer}`, W / 2, puY + 36 * this.scale);
    ctx.restore();
  }

  // ---- Level Loading ----
  startLevel(idx) {
    const level = this.levels[idx];
    if (!level) return;

    this.currentLevelIdx = idx;
    this.state = STATE.PLAYING;
    this.moveCount = 0;
    this.comboCount = 0;
    this.score = 0;
    this.moveHistory = [];
    this.animatingBolt = null;
    this.animatingPlate = null;
    this.floatingTexts = [];
    this.hintBolt = null;
    this.hintPulse = 0;
    this.tutorialHighlight = null;

    // Level power-ups (from global pool)
    this.levelPowerUps = {
      undo: Math.min(3, this.saveData.powerUps.undo),
      extraHole: Math.min(2, this.saveData.powerUps.extraHole),
      hint: Math.min(3, this.saveData.powerUps.hint),
      hammer: Math.min(1, this.saveData.powerUps.hammer)
    };

    const W = this.W, H = this.H;
    const playAreaTop = 60 * this.scale;
    const playAreaH = H * 0.62;
    const holeAreaTop = playAreaTop + playAreaH + 10 * this.scale;

    // Build plates
    this.plates = level.plates.map((p, i) => {
      const color = PLATE_COLORS[p.colorIdx % PLATE_COLORS.length];
      return {
        x: p.x / 100 * W,
        y: p.y / 100 * playAreaH + playAreaTop,
        w: p.w / 100 * W,
        h: p.h / 100 * playAreaH,
        colorIdx: p.colorIdx,
        color: color,
        freed: false,
        falling: false,
        fallY: 0,
        fallSpeed: 0,
        wobble: 0,
        opacity: 1,
        index: i
      };
    });

    // Build bolts
    this.bolts = level.bolts.map((b, i) => {
      return {
        x: b.x / 100 * W,
        y: b.y / 100 * playAreaH + playAreaTop,
        originalX: b.x / 100 * W,
        originalY: b.y / 100 * playAreaH + playAreaTop,
        plates: b.plates.slice(),
        removed: false,
        inHole: -1,
        rotating: false,
        rotAngle: 0,
        colorIdx: i % BOLT_COLORS.length,
        color: BOLT_COLORS[i % BOLT_COLORS.length],
        radius: Math.max(14, 18 * this.scale),
        index: i
      };
    });

    // Build holes
    this.holes = [];
    const holeCount = level.holes;
    const holeSpacing = W / (holeCount + 1);
    const holeR = Math.max(14, 18 * this.scale);
    for (let i = 0; i < holeCount; i++) {
      this.holes.push({
        x: holeSpacing * (i + 1),
        y: holeAreaTop + 30 * this.scale,
        radius: holeR,
        occupied: false,
        boltIdx: -1
      });
    }

    // Tutorial
    if (level.isTutorial) {
      this.tutorialHighlight = { step: level.tutorialStep, timer: 0 };
    }
  }

  // ---- Game Logic ----
  handlePlayingTap(x, y) {
    // Check back button
    if (this.backButton && this.hitTest(x, y, this.backButton)) {
      this.audio.playClick();
      this.state = STATE.MENU;
      return;
    }

    // Check power-up buttons
    for (const btn of this.gameButtons) {
      if (this.hitTest(x, y, btn)) {
        this.audio.playClick();
        btn.action();
        return;
      }
    }

    // Check if tapped a bolt
    for (const bolt of this.bolts) {
      if (bolt.removed) continue;
      if (dist(x, y, bolt.x, bolt.y) < bolt.radius * 1.5) {
        this.tryUnscrewBolt(bolt);
        return;
      }
    }

    // Check if tapped a hole (to reposition)
    for (let i = 0; i < this.holes.length; i++) {
      const hole = this.holes[i];
      if (hole.occupied && dist(x, y, hole.x, hole.y) < hole.radius * 1.5) {
        this.tryRelocateBolt(hole.boltIdx, i);
        return;
      }
    }
  }

  tryUnscrewBolt(bolt) {
    // Find an empty hole
    const emptyHole = this.holes.find(h => !h.occupied);
    if (!emptyHole) {
      this.audio.playError();
      this.screenShake = 5;
      this.addFloatingText(bolt.x, bolt.y - 30, 'No empty holes!', '#E57373');
      return;
    }

    // Start unscrew animation
    bolt.rotating = true;
    bolt.rotAngle = 0;
    this.animatingBolt = bolt;
    this.state = STATE.ANIMATING;
    this.audio.playUnscrew();

    // Animate bolt to hole
    const targetX = emptyHole.x;
    const targetY = emptyHole.y;
    const animDuration = 400;
    const startTime = performance.now();
    const startX = bolt.x, startY = bolt.y;

    const animateBolt = () => {
      const now = performance.now();
      const t = clamp((now - startTime) / animDuration, 0, 1);

      // Rotation phase (0-0.4)
      if (t < 0.4) {
        bolt.rotAngle = (t / 0.4) * Math.PI * 4;
        bolt.x = startX;
        bolt.y = startY;
      } else {
        // Slide phase (0.4-1.0)
        bolt.rotAngle = Math.PI * 4;
        const slideT = easeOutCubic((t - 0.4) / 0.6);
        bolt.x = lerp(startX, targetX, slideT);
        bolt.y = lerp(startY, targetY, slideT);
      }

      if (t < 1) {
        requestAnimationFrame(animateBolt);
      } else {
        // Bolt placed in hole
        bolt.x = targetX;
        bolt.y = targetY;
        bolt.removed = true;
        bolt.inHole = this.holes.indexOf(emptyHole);
        bolt.rotating = false;
        emptyHole.occupied = true;
        emptyHole.boltIdx = bolt.index;
        this.animatingBolt = null;
        this.moveCount++;
        this.moveHistory.push({ type: 'unscrew', boltIdx: bolt.index, holeIdx: bolt.inHole, plates: bolt.plates.slice() });

        // Check plates
        this.checkPlatesFreed();

        // Combo
        this.comboCount++;
        if (this.comboCount >= 2) {
          const mult = Math.min(this.comboCount, 4);
          this.score += 25 * mult;
          this.audio.playCombo(this.comboCount);
          this.addFloatingText(this.W / 2, this.H * 0.35, `x${mult} COMBO!`, '#FFD54F');
        }

        // Check win/lose
        this.setTimeout(() => { this.checkWinLose(); }, 300);
      }
    };
    requestAnimationFrame(animateBolt);
  }

  tryRelocateBolt(boltIdx, fromHoleIdx) {
    const emptyHoles = this.holes.filter(h => !h.occupied);
    if (emptyHoles.length === 0) return;

    const bolt = this.bolts[boltIdx];
    const targetHole = emptyHoles[0];
    const fromHole = this.holes[fromHoleIdx];

    fromHole.occupied = false;
    fromHole.boltIdx = -1;

    // Animate relocation
    this.state = STATE.ANIMATING;
    const startX = bolt.x, startY = bolt.y;
    const animDuration = 300;
    const startTime = performance.now();

    const animate = () => {
      const t = easeOutCubic(clamp((performance.now() - startTime) / animDuration, 0, 1));
      bolt.x = lerp(startX, targetHole.x, t);
      bolt.y = lerp(startY, targetHole.y, t);
      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        bolt.x = targetHole.x;
        bolt.y = targetHole.y;
        bolt.inHole = this.holes.indexOf(targetHole);
        targetHole.occupied = true;
        targetHole.boltIdx = boltIdx;
        this.state = STATE.PLAYING;
        this.audio.playClick();
      }
    };
    requestAnimationFrame(animate);
  }

  checkPlatesFreed() {
    for (const plate of this.plates) {
      if (plate.freed) continue;

      // Check if all bolts holding this plate are removed
      const holdingBolts = this.bolts.filter(b => !b.removed && b.plates.includes(plate.index));
      if (holdingBolts.length === 0) {
        this.freePlate(plate);
      }
    }
  }

  freePlate(plate) {
    plate.freed = true;
    plate.falling = true;
    plate.fallSpeed = 0;
    plate.wobble = 0.3;
    this.audio.playPlateFall();
    this.screenShake = 8;

    // Free holes occupied by bolts that no longer hold any unfreed plates
    for (const bolt of this.bolts) {
      if (!bolt.removed) continue;
      const stillHoldsUnfreed = bolt.plates.some(pi => {
        return pi !== plate.index && !this.plates[pi].freed;
      });
      if (!stillHoldsUnfreed) {
        const hole = this.holes[bolt.inHole];
        if (hole) {
          hole.occupied = false;
          hole.boltIdx = -1;
        }
      }
    }

    // Particles
    this.particles.burst(plate.x + plate.w / 2, plate.y + plate.h / 2, 15, ['#B0BEC5', '#CFD8DC', '#FFF', '#90CAF9']);

    // Floating text
    this.addFloatingText(plate.x + plate.w / 2, plate.y, 'FREED!', '#81C784');
  }

  checkWinLose() {
    const allFreed = this.plates.every(p => p.freed);
    if (allFreed) {
      this.winLevel();
      return;
    }

    const allHolesFilled = this.holes.every(h => h.occupied);
    const remainingBolts = this.bolts.filter(b => !b.removed);
    if (allHolesFilled && remainingBolts.length > 0) {
      this.loseLevel();
      return;
    }

    this.state = STATE.PLAYING;
  }

  winLevel() {
    this.state = STATE.LEVEL_COMPLETE;
    this.audio.playLevelComplete();
    this.particles.burst(this.W / 2, this.H * 0.3, 40, ['#FFD700', '#FF6B35', '#4FC3F7', '#81C784', '#FFF']);

    // Calculate stars
    const level = this.levels[this.currentLevelIdx];
    const ratio = this.moveCount / level.optimalMoves;
    let stars = 3;
    if (ratio > 1.5) stars = 2;
    if (ratio > 2.0) stars = 1;

    // Calculate score
    const baseScore = level.baseScore;
    const moveScore = Math.max(0, (level.optimalMoves * 2 - this.moveCount) * 10);
    const totalScore = baseScore + moveScore + this.score;

    // Save
    const levelNum = this.currentLevelIdx + 1;
    const prev = this.saveData.bestScores[levelNum];
    if (!prev || totalScore > prev.score) {
      this.saveData.bestScores[levelNum] = { score: totalScore, stars: Math.max(stars, prev ? prev.stars : 0) };
    }
    if (!prev) {
      this.saveData.totalStars += stars;
    } else {
      this.saveData.totalStars += Math.max(0, stars - prev.stars);
    }
    if (this.currentLevelIdx + 1 >= this.saveData.currentLevel) {
      this.saveData.currentLevel = Math.min(this.currentLevelIdx + 2, LEVELS_TOTAL);
    }
    writeSave(this.saveData);

    this.levelResult = { score: totalScore, stars, moves: this.moveCount, optimal: level.optimalMoves };
  }

  loseLevel() {
    this.state = STATE.LEVEL_FAIL;
    this.audio.playError();
    this.screenShake = 12;
  }

  // ---- Power-Ups ----
  useUndo() {
    if (this.levelPowerUps.undo <= 0 || this.moveHistory.length === 0) return;
    if (this.state !== STATE.PLAYING) return;

    const last = this.moveHistory.pop();
    if (last.type === 'unscrew') {
      const bolt = this.bolts[last.boltIdx];
      const hole = this.holes[last.holeIdx];

      // Restore bolt
      bolt.removed = false;
      bolt.inHole = -1;
      bolt.x = bolt.originalX;
      bolt.y = bolt.originalY;

      // Free hole
      hole.occupied = false;
      hole.boltIdx = -1;

      // Restore plates if needed
      for (const plate of this.plates) {
        if (plate.freed) {
          const stillHeld = this.bolts.some(b => !b.removed && b.plates.includes(plate.index));
          if (stillHeld) {
            plate.freed = false;
            plate.falling = false;
            plate.fallY = 0;
            plate.opacity = 1;
          }
        }
      }

      this.moveCount = Math.max(0, this.moveCount - 1);
      this.comboCount = 0;
      this.levelPowerUps.undo--;
      this.saveData.powerUps.undo = Math.max(0, this.saveData.powerUps.undo - 1);
      writeSave(this.saveData);
      this.audio.playPowerUp();
    }
  }

  useExtraHole() {
    if (this.levelPowerUps.extraHole <= 0 || this.state !== STATE.PLAYING) return;

    const holeR = Math.max(14, 18 * this.scale);
    const newHole = {
      x: this.W / 2,
      y: this.holes.length > 0 ? this.holes[0].y : this.H * 0.78,
      radius: holeR,
      occupied: false,
      boltIdx: -1
    };

    // Find a good position
    const lastHole = this.holes[this.holes.length - 1];
    if (lastHole) {
      newHole.x = Math.min(this.W - 30 * this.scale, lastHole.x + 50 * this.scale);
    }

    this.holes.push(newHole);
    this.levelPowerUps.extraHole--;
    this.saveData.powerUps.extraHole = Math.max(0, this.saveData.powerUps.extraHole - 1);
    writeSave(this.saveData);
    this.audio.playPowerUp();

    // Reposition holes evenly
    this.repositionHoles();
  }

  repositionHoles() {
    const count = this.holes.length;
    const spacing = this.W / (count + 1);
    const y = this.holes[0].y;
    for (let i = 0; i < count; i++) {
      if (!this.holes[i].occupied) {
        this.holes[i].x = spacing * (i + 1);
        this.holes[i].y = y;
      } else {
        // Also move the bolt in the hole
        const bolt = this.bolts[this.holes[i].boltIdx];
        if (bolt) {
          bolt.x = spacing * (i + 1);
          bolt.y = y;
        }
        this.holes[i].x = spacing * (i + 1);
        this.holes[i].y = y;
      }
    }
  }

  useHint() {
    if (this.levelPowerUps.hint <= 0 || this.state !== STATE.PLAYING) return;

    // Find a bolt that, when removed, would free a plate
    let bestBolt = null;
    let bestScore = -1;

    for (const bolt of this.bolts) {
      if (bolt.removed) continue;
      let score = 0;
      for (const plateIdx of bolt.plates) {
        const plate = this.plates[plateIdx];
        if (plate.freed) continue;
        const remaining = this.bolts.filter(b => !b.removed && b.plates.includes(plateIdx));
        if (remaining.length <= 2) score += 10; // Close to freeing
        if (remaining.length === 1) score += 50; // Would free immediately
      }
      if (score > bestScore) {
        bestScore = score;
        bestBolt = bolt;
      }
    }

    if (bestBolt) {
      this.hintBolt = bestBolt;
      this.hintPulse = 0;
      this.levelPowerUps.hint--;
      this.saveData.powerUps.hint = Math.max(0, this.saveData.powerUps.hint - 1);
      writeSave(this.saveData);
      this.audio.playPowerUp();

      // Clear hint after 3 seconds
      this.setTimeout(() => { this.hintBolt = null; }, 3000);
    }
  }

  useHammer() {
    if (this.levelPowerUps.hammer <= 0 || this.state !== STATE.PLAYING) return;

    // Find a plate with fewest remaining bolts and free it
    let bestPlate = null;
    let minBolts = Infinity;

    for (const plate of this.plates) {
      if (plate.freed) continue;
      const remaining = this.bolts.filter(b => !b.removed && b.plates.includes(plate.index));
      if (remaining.length < minBolts) {
        minBolts = remaining.length;
        bestPlate = plate;
      }
    }

    if (bestPlate) {
      // Remove all bolts from this plate
      for (const bolt of this.bolts) {
        if (bolt.removed) continue;
        if (bolt.plates.includes(bestPlate.index)) {
          // If bolt only held this plate, just remove it
          if (bolt.plates.length === 1) {
            bolt.removed = true;
            bolt.x = -100;
            bolt.y = -100;
          } else {
            // Remove this plate from the bolt's plate list
            bolt.plates = bolt.plates.filter(pi => pi !== bestPlate.index);
          }
        }
      }
      this.freePlate(bestPlate);
      this.levelPowerUps.hammer--;
      this.saveData.powerUps.hammer = Math.max(0, this.saveData.powerUps.hammer - 1);
      writeSave(this.saveData);
      this.audio.playPowerUp();

      this.setTimeout(() => { this.checkWinLose(); }, 500);
    }
  }

  // ---- Floating Text ----
  addFloatingText(x, y, text, color) {
    this.floatingTexts.push({
      x, y, text, color,
      life: 1.5,
      maxLife: 1.5,
      vy: -40
    });
  }

  // ---- Drawing ----
  drawBackground() {
    const ctx = this.ctx, W = this.W, H = this.H;
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#0a0e27');
    grad.addColorStop(0.5, '#1a0a2e');
    grad.addColorStop(1, '#0a1a3e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Subtle grid pattern
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    const gridSize = 40 * this.scale;
    for (let x = 0; x < W; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
  }

  drawButton(x, y, w, h, text, color, action) {
    const ctx = this.ctx;
    ctx.save();

    // Glass-morphism button
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    const rgb = hexToRgb(color);
    grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.9)`);
    grad.addColorStop(1, `rgba(${Math.max(0, rgb.r - 40)},${Math.max(0, rgb.g - 40)},${Math.max(0, rgb.b - 40)},0.9)`);

    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 12 * this.scale);
    ctx.fillStyle = grad;
    ctx.fill();

    // Shine
    ctx.beginPath();
    ctx.roundRect(x + 2, y + 2, w - 4, h / 2 - 2, [10 * this.scale, 10 * this.scale, 0, 0]);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fill();

    // Border
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 12 * this.scale);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#FFF';
    ctx.font = `700 ${Math.floor(16 * this.scale)}px Inter, sans-serif`;
    ctx.fillText(text, x + w / 2, y + h / 2);

    ctx.restore();

    return { x, y, w, h, action };
  }

  drawBackButton() {
    const s = this.scale;
    const x = 15 * s, y = 15 * s, w = 40 * s, h = 40 * s;
    const ctx = this.ctx;

    ctx.save();
    ctx.beginPath();
    ctx.arc(x + w / 2, y + h / 2, w / 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Arrow
    ctx.beginPath();
    ctx.moveTo(x + w * 0.6, y + h * 0.3);
    ctx.lineTo(x + w * 0.35, y + h / 2);
    ctx.lineTo(x + w * 0.6, y + h * 0.7);
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2 * s;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();

    return { x, y, w, h };
  }

  drawPlate(plate) {
    if (plate.opacity <= 0) return;
    const ctx = this.ctx;
    ctx.save();
    ctx.globalAlpha = plate.opacity;

    const px = plate.x;
    const py = plate.y + plate.fallY;
    const pw = plate.w;
    const ph = plate.h;

    // Metallic gradient
    const grad = ctx.createLinearGradient(px, py, px, py + ph);
    grad.addColorStop(0, plate.color.top);
    grad.addColorStop(0.5, plate.color.bot);
    grad.addColorStop(1, plate.color.top);

    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 6 * this.scale);
    ctx.fillStyle = grad;
    ctx.fill();

    // Shine line
    ctx.beginPath();
    ctx.roundRect(px + 3, py + 2, pw - 6, ph * 0.3, 3 * this.scale);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fill();

    // Border
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 6 * this.scale);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1.5 * this.scale;
    ctx.stroke();

    // Inner shadow at bottom
    const innerGrad = ctx.createLinearGradient(px, py + ph * 0.7, px, py + ph);
    innerGrad.addColorStop(0, 'rgba(0,0,0,0)');
    innerGrad.addColorStop(1, 'rgba(0,0,0,0.2)');
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 6 * this.scale);
    ctx.fillStyle = innerGrad;
    ctx.fill();

    ctx.restore();
  }

  drawHexBolt(x, y, r, color, showInner = true) {
    const ctx = this.ctx;
    ctx.save();

    // Hex head
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 - Math.PI / 6;
      const bx = x + Math.cos(angle) * r;
      const by = y + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(bx, by);
      else ctx.lineTo(bx, by);
    }
    ctx.closePath();

    const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
    const rgb = hexToRgb(color);
    grad.addColorStop(0, `rgba(${Math.min(255, rgb.r + 50)},${Math.min(255, rgb.g + 50)},${Math.min(255, rgb.b + 50)},1)`);
    grad.addColorStop(1, color);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Inner circle
    if (showInner) {
      ctx.beginPath();
      ctx.arc(x, y, r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();

      // Cross slot
      ctx.beginPath();
      ctx.moveTo(x - r * 0.2, y);
      ctx.lineTo(x + r * 0.2, y);
      ctx.moveTo(x, y - r * 0.2);
      ctx.lineTo(x, y + r * 0.2);
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    ctx.restore();
  }

  drawBolt(bolt) {
    if (bolt.removed && bolt.inHole >= 0) {
      // Draw in hole (smaller)
      const ctx = this.ctx;
      ctx.save();
      ctx.globalAlpha = 0.8;
      this.drawHexBolt(bolt.x, bolt.y, bolt.radius * 0.7, bolt.color);
      ctx.restore();
      return;
    }
    if (bolt.removed) return;

    const ctx = this.ctx;
    ctx.save();

    // Apply rotation animation
    if (bolt.rotating) {
      ctx.translate(bolt.x, bolt.y);
      ctx.rotate(bolt.rotAngle);
      this.drawHexBolt(0, 0, bolt.radius, bolt.color);
    } else {
      // Shadow
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 6 * this.scale;
      ctx.shadowOffsetY = 2 * this.scale;

      this.drawHexBolt(bolt.x, bolt.y, bolt.radius, bolt.color);

      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
    }

    // Hint glow
    if (this.hintBolt === bolt) {
      ctx.beginPath();
      ctx.arc(bolt.x, bolt.y, bolt.radius * 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,215,0,${0.1 + Math.sin(this.hintPulse * 4) * 0.1})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(255,215,0,${0.5 + Math.sin(this.hintPulse * 4) * 0.3})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    ctx.restore();
  }

  drawHole(hole) {
    const ctx = this.ctx;
    ctx.save();

    // Outer ring
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fill();

    // Inner shadow
    const innerGrad = ctx.createRadialGradient(hole.x, hole.y, 0, hole.x, hole.y, hole.radius);
    innerGrad.addColorStop(0, 'rgba(0,0,0,0.8)');
    innerGrad.addColorStop(0.7, 'rgba(0,0,0,0.6)');
    innerGrad.addColorStop(1, 'rgba(80,80,100,0.3)');
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, hole.radius * 0.85, 0, Math.PI * 2);
    ctx.fillStyle = innerGrad;
    ctx.fill();

    // Rim
    ctx.beginPath();
    ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(150,150,170,0.4)';
    ctx.lineWidth = 2 * this.scale;
    ctx.stroke();

    // Empty indicator
    if (!hole.occupied) {
      ctx.beginPath();
      ctx.arc(hole.x, hole.y, 3 * this.scale, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(100,150,200,0.4)';
      ctx.fill();
    }

    ctx.restore();
  }

  drawHUD() {
    const ctx = this.ctx, W = this.W, s = this.scale;

    // Top bar background
    ctx.save();
    const grad = ctx.createLinearGradient(0, 0, 0, 55 * s);
    grad.addColorStop(0, 'rgba(0,0,0,0.6)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, 55 * s);
    ctx.restore();

    // Level number
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.font = `700 ${Math.floor(16 * s)}px Orbitron, sans-serif`;
    ctx.fillText(`Level ${this.currentLevelIdx + 1}`, W / 2, 28 * s);
    ctx.restore();

    // Move counter
    ctx.save();
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = `600 ${Math.floor(12 * s)}px Inter, sans-serif`;
    ctx.fillText(`Moves: ${this.moveCount}`, 60 * s, 28 * s);
    ctx.restore();

    // Score
    ctx.save();
    ctx.textAlign = 'right';
    ctx.fillStyle = '#FFD54F';
    ctx.font = `600 ${Math.floor(12 * s)}px Inter, sans-serif`;
    ctx.fillText(`Score: ${this.score}`, W - 15 * s, 28 * s);
    ctx.restore();

    this.backButton = this.drawBackButton();

    // Power-up buttons at bottom
    this.gameButtons = [];
    const btnSize = 44 * s;
    const bottomY = this.H - 55 * s;
    const spacing = W / 5;

    // Undo
    const undoX = spacing * 0.7;
    this.drawPowerUpBtn(undoX, bottomY, btnSize, '↩', this.levelPowerUps.undo, '#4FC3F7', () => this.useUndo());

    // Extra Hole
    const extraX = spacing * 1.7;
    this.drawPowerUpBtn(extraX, bottomY, btnSize, '+', this.levelPowerUps.extraHole, '#81C784', () => this.useExtraHole());

    // Hint
    const hintX = spacing * 2.7;
    this.drawPowerUpBtn(hintX, bottomY, btnSize, '?', this.levelPowerUps.hint, '#FFD54F', () => this.useHint());

    // Hammer
    const hammerX = spacing * 3.7;
    this.drawPowerUpBtn(hammerX, bottomY, btnSize, '⚒', this.levelPowerUps.hammer, '#FF8A65', () => this.useHammer());
  }

  drawPowerUpBtn(x, y, size, icon, count, color, action) {
    const ctx = this.ctx, s = this.scale;
    const half = size / 2;
    const available = count > 0;

    ctx.save();
    ctx.globalAlpha = available ? 1 : 0.4;

    // Circle background
    ctx.beginPath();
    ctx.arc(x, y, half, 0, Math.PI * 2);
    const rgb = hexToRgb(color);
    ctx.fillStyle = available ? `rgba(${rgb.r},${rgb.g},${rgb.b},0.3)` : 'rgba(50,50,50,0.3)';
    ctx.fill();
    ctx.strokeStyle = available ? color : 'rgba(100,100,100,0.5)';
    ctx.lineWidth = 1.5 * s;
    ctx.stroke();

    // Icon
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = available ? '#FFF' : 'rgba(255,255,255,0.3)';
    ctx.font = `700 ${Math.floor(size * 0.4)}px Inter, sans-serif`;
    ctx.fillText(icon, x, y);

    // Count badge
    ctx.beginPath();
    ctx.arc(x + half * 0.6, y - half * 0.6, 8 * s, 0, Math.PI * 2);
    ctx.fillStyle = available ? color : 'rgba(100,100,100,0.5)';
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.font = `700 ${Math.floor(8 * s)}px Inter, sans-serif`;
    ctx.fillText(String(count), x + half * 0.6, y - half * 0.6);

    ctx.restore();

    this.gameButtons.push({ x: x - half, y: y - half, w: size, h: size, action });
  }

  drawOverlay() {
    const ctx = this.ctx, W = this.W, H = this.H, s = this.scale;

    // Darken background
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    // Panel
    const panelW = W * 0.85;
    const panelH = this.state === STATE.LEVEL_COMPLETE ? 320 * s : 250 * s;
    const px = (W - panelW) / 2;
    const py = (H - panelH) / 2;

    // Glass panel
    ctx.beginPath();
    ctx.roundRect(px, py, panelW, panelH, 20 * s);
    ctx.fillStyle = 'rgba(20,20,40,0.95)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();

    if (this.state === STATE.LEVEL_COMPLETE) {
      this.drawWinOverlay(px, py, panelW, panelH);
    } else {
      this.drawLoseOverlay(px, py, panelW, panelH);
    }

    ctx.restore();
  }

  drawWinOverlay(px, py, pw, ph) {
    const ctx = this.ctx, s = this.scale;
    const result = this.levelResult;

    // Title
    ctx.save();
    ctx.textAlign = 'center';
    ctx.shadowColor = '#4FC3F7';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#4FC3F7';
    ctx.font = `900 ${Math.floor(28 * s)}px Orbitron, sans-serif`;
    ctx.fillText('LEVEL COMPLETE!', px + pw / 2, py + 45 * s);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Stars
    const starY = py + 80 * s;
    for (let i = 0; i < 3; i++) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = `${Math.floor(32 * s)}px sans-serif`;
      ctx.fillStyle = i < result.stars ? '#FFD54F' : 'rgba(255,255,255,0.15)';
      ctx.fillText('★', px + pw / 2 + (i - 1) * 40 * s, starY);
      ctx.restore();
    }

    // Score
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF';
    ctx.font = `600 ${Math.floor(16 * s)}px Inter, sans-serif`;
    ctx.fillText(`Score: ${result.score}`, px + pw / 2, py + 120 * s);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `400 ${Math.floor(12 * s)}px Inter, sans-serif`;
    ctx.fillText(`Moves: ${result.moves} (Optimal: ${result.optimal})`, px + pw / 2, py + 145 * s);
    ctx.restore();

    // Buttons
    this.overlayButtons = [];
    const btnW = pw * 0.7;
    const btnH = 48 * s;
    const btnX = px + (pw - btnW) / 2;

    if (this.currentLevelIdx < LEVELS_TOTAL - 1) {
      this.overlayButtons.push(this.drawButton(btnX, py + 175 * s, btnW, btnH, 'NEXT LEVEL', '#4FC3F7', () => {
        this.startLevel(this.currentLevelIdx + 1);
      }));
    }

    this.overlayButtons.push(this.drawButton(btnX, py + 235 * s, btnW, btnH, 'LEVELS', '#81C784', () => {
      this.state = STATE.LEVEL_SELECT;
    }));

    this.overlayButtons.push(this.drawButton(btnX, py + ph - 60 * s, btnW * 0.5, btnH * 0.8, 'RETRY', '#FF8A65', () => {
      this.startLevel(this.currentLevelIdx);
    }));
  }

  drawLoseOverlay(px, py, pw, ph) {
    const ctx = this.ctx, s = this.scale;

    // Title
    ctx.save();
    ctx.textAlign = 'center';
    ctx.shadowColor = '#E57373';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#E57373';
    ctx.font = `900 ${Math.floor(28 * s)}px Orbitron, sans-serif`;
    ctx.fillText('LEVEL FAILED', px + pw / 2, py + 50 * s);
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = `400 ${Math.floor(14 * s)}px Inter, sans-serif`;
    ctx.fillText('All holes are filled!', px + pw / 2, py + 90 * s);
    ctx.fillText('Plates still remain.', px + pw / 2, py + 112 * s);
    ctx.restore();

    // Buttons
    this.overlayButtons = [];
    const btnW = pw * 0.7;
    const btnH = 48 * s;
    const btnX = px + (pw - btnW) / 2;

    this.overlayButtons.push(this.drawButton(btnX, py + 145 * s, btnW, btnH, 'TRY AGAIN', '#4FC3F7', () => {
      this.startLevel(this.currentLevelIdx);
    }));

    this.overlayButtons.push(this.drawButton(btnX, py + ph - 60 * s, btnW * 0.5, btnH * 0.8, 'LEVELS', '#81C784', () => {
      this.state = STATE.LEVEL_SELECT;
    }));
  }

  handleOverlayTap(x, y) {
    for (const btn of this.overlayButtons) {
      if (this.hitTest(x, y, btn)) {
        this.audio.playClick();
        btn.action();
        return;
      }
    }
  }

  drawTutorialHighlight() {
    if (!this.tutorialHighlight) return;
    const ctx = this.ctx, s = this.scale;
    const step = this.tutorialHighlight.step;

    // Pulsing arrow/hand at first available bolt
    const firstBolt = this.bolts.find(b => !b.removed);
    if (!firstBolt) return;

    const pulse = Math.sin(this.tutorialHighlight.timer * 3) * 0.3 + 0.7;
    ctx.save();
    ctx.globalAlpha = pulse;

    // Glow circle around bolt
    ctx.beginPath();
    ctx.arc(firstBolt.x, firstBolt.y, firstBolt.radius * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,0,0.6)';
    ctx.lineWidth = 2 * s;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Text
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD54F';
    ctx.font = `600 ${Math.floor(12 * s)}px Inter, sans-serif`;
    ctx.fillText('Tap a bolt!', firstBolt.x, firstBolt.y - firstBolt.radius * 2);

    ctx.restore();
  }

  // ---- Update ----
  update(dt) {
    // Screen shake
    if (this.screenShake > 0.1) {
      this.screenShake *= this.screenShakeDecay;
    } else {
      this.screenShake = 0;
    }

    // Hint pulse
    this.hintPulse += dt;

    // Tutorial
    if (this.tutorialHighlight) {
      this.tutorialHighlight.timer += dt;
    }

    // Plate falling physics
    for (const plate of this.plates) {
      if (plate.falling) {
        plate.fallSpeed += 800 * dt;
        plate.fallY += plate.fallSpeed * dt;
        plate.wobble *= 0.95;

        if (plate.fallY > this.H) {
          plate.opacity = 0;
          plate.falling = false;
        } else {
          plate.opacity = Math.max(0, 1 - plate.fallY / (this.H * 0.5));
        }
      }
    }

    // Floating texts
    for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
      const ft = this.floatingTexts[i];
      ft.y += ft.vy * dt;
      ft.life -= dt;
      if (ft.life <= 0) this.floatingTexts.splice(i, 1);
    }

    // Particles
    this.particles.update(dt);
  }

  // ---- Main Draw ----
  draw() {
    const ctx = this.ctx, W = this.W, H = this.H;

    ctx.save();

    // Screen shake
    if (this.screenShake > 0.1) {
      ctx.translate(rand(-this.screenShake, this.screenShake), rand(-this.screenShake, this.screenShake));
    }

    switch (this.state) {
      case STATE.MENU:
        this.drawMenu();
        break;

      case STATE.LEVEL_SELECT:
        this.drawLevelSelect();
        break;

      case STATE.SETTINGS:
        this.drawSettings();
        break;

      case STATE.PLAYING:
      case STATE.ANIMATING:
        this.drawBackground();

        // Draw plates (back to front)
        for (const plate of this.plates) {
          this.drawPlate(plate);
        }

        // Draw holes
        for (const hole of this.holes) {
          this.drawHole(hole);
        }

        // Draw bolts (on top)
        for (const bolt of this.bolts) {
          this.drawBolt(bolt);
        }

        // Tutorial
        this.drawTutorialHighlight();

        // Floating texts
        for (const ft of this.floatingTexts) {
          ctx.save();
          ctx.globalAlpha = clamp(ft.life / ft.maxLife, 0, 1);
          ctx.textAlign = 'center';
          ctx.fillStyle = ft.color;
          ctx.font = `700 ${Math.floor(18 * this.scale)}px Inter, sans-serif`;
          ctx.fillText(ft.text, ft.x, ft.y);
          ctx.restore();
        }

        // Particles
        this.particles.draw(ctx);

        // HUD
        this.drawHUD();
        break;

      case STATE.LEVEL_COMPLETE:
      case STATE.LEVEL_FAIL:
        this.drawBackground();
        for (const plate of this.plates) this.drawPlate(plate);
        for (const hole of this.holes) this.drawHole(hole);
        for (const bolt of this.bolts) this.drawBolt(bolt);
        this.particles.draw(ctx);
        this.drawHUD();
        this.drawOverlay();
        break;
    }

    ctx.restore();
  }

  // ---- Game Loop ----
  loop(time) {
    const dt = Math.min((time - this.lastTime) / 1000, 0.05);
    this.lastTime = time;

    this.update(dt);
    this.draw();

    this.rafId = requestAnimationFrame((t) => this.loop(t));
  }

  hitTest(px, py, btn) {
    return px >= btn.x && px <= btn.x + btn.w && py >= btn.y && py <= btn.y + btn.h;
  }
}

// ---- Boot ----
let game = null;
function init() {
  if (game) game.cleanup();
  game = new ScrewMasterGame();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
