function onPointerUp(e){e.preventDefault();if(state.dragPath.length>0&&state.dragStart){state.dragPath=[];state.dragStart=null;drawGrid();}}

function checkConnection(r,c,colorId,n){var key='p'+colorId;if(!state.paths[key])return false;var p=state.paths[key];if(p.n!==n)return false;if(p.path.length!==n)return false;var hasA=false,hasB=false;for(var i=0;i<p.path.length;i++){if(p.path[i][0]===r&&p.path[i][1]===c)hasA=true;}return true;}

function checkSolution(){var lv=getCurrentLevel();var solved=0;var errors=0;lv.p.forEach(function(pair){var key='p'+pair.c;var pd=state.paths[key];if(pd&&pd.path.length===pair.n){var hasA=false,hasB=false;pd.path.forEach(function(cell){if(cell[0]===pair.a[0]&&cell[1]===pair.a[1])hasA=true;if(cell[0]===pair.b[0]&&cell[1]===pair.b[1])hasB=true;});if(hasA&&hasB)solved++;else errors++;}else if(pd)errors++;});if(solved===lv.p.length){state.completed=true;onWin();}else{playSFX('error');}}

function onWin(){playSFX('win');spawnConfetti();var time=Math.floor((Date.now()-state.startTime)/1000);var stars=3;if(state.hints===2)stars=2;if(state.hints<=1)stars=1;if(time>lv_timeLimit())stars=Math.max(1,stars-1);progress.stars[state.lv]=stars;if(state.lv+1<LEVELS.length){progress.unlocked[state.lv+1]=true;}saveProgress();var overlay=document.getElementById('win-overlay');document.getElementById('win-stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);document.getElementById('win-sub').textContent='Time: '+formatTime(time)+' | Hints used: '+(3-state.hints);overlay.classList.add('show');}
function lv_timeLimit(){var lv=getCurrentLevel();return lv.r*lv.c*8;}

var confettiParts=[];
function spawnConfetti(){var colors=['#ff6b6b','#4ecdc4','#ffe66d','#95e5d3','#c9b1ff','#ff9ff3','#feca57','#54a0ff'];var w=canvas.width||400,h=canvas.height||400;for(var i=0;i<60;i++){confettiParts.push({x:Math.random()*w,y:-20-Math.random()*100,vx:(Math.random()-0.5)*4,vy:2+Math.random()*4,size:4+Math.random()*6,rot:Math.random()*6.28,vrot:(Math.random()-0.5)*0.3,color:colors[Math.floor(Math.random()*colors.length)],life:1});}animateConfetti();}
function animateConfetti(){confettiParts=confettiParts.filter(function(p){return p.y<(canvas.height||400)+50&&p.life>0;});if(confettiParts.length===0)return;ctx.save();confettiParts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.rot+=p.vrot;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,p.life);ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore();});ctx.restore();requestAnimationFrame(animateConfetti);}

function doHint(){if(state.hints<=0)return;var lv=getCurrentLevel();var unsolved=lv.p.filter(function(p){var key='p'+p.c;var pd=state.paths[key];return!pd||pd.path.length!==p.n;});if(unsolved.length===0)return;var pair=unsolved[Math.floor(Math.random()*unsolved.length)];state.paths['p'+pair.c]={colorId:pair.c,n:pair.n,path:pair.p.map(function(c){return[c[0],c[1]];})};state.hints--;playSFX('hint');updateHUD();drawGrid();if(state.autocheck)checkSolution();}

function clearPaths(){state.paths={};state.dragPath=[];state.dragStart=null;drawGrid();updateHUD();}

function setMode(m){state.mode=m;document.getElementById('btn-draw').classList.toggle('active',m==='draw');document.getElementById('btn-erase').classList.toggle('active',m==='erase');}

function formatTime(s){var m=Math.floor(s/60);var ss=s%60;return m+':'+(ss<10?'0':'')+ss;}

function updateHUD(){var lv=getCurrentLevel();document.getElementById('hud-level').textContent='L'+(state.lv+1);document.getElementById('hud-tier').textContent=lv.t;var connected=Object.keys(state.paths).length;document.getElementById('hud-pairs').textContent=connected+'/'+lv.p.length;document.getElementById('hud-time').textContent=formatTime(Math.floor((Date.now()-state.startTime)/1000));var hintBtn=document.querySelector('.gz-toolbar .gz-btn:nth-child(3)');if(hintBtn)hintBtn.textContent='Hint ('+state.hints+')';}

function loadLevel(idx){state.lv=idx;state.paths={};state.dragPath=[];state.dragStart=null;state.hints=3;state.startTime=Date.now();state.completed=false;resizeCanvas();drawGrid();updateHUD();}

function nextLevel(){document.getElementById('win-overlay').classList.remove('show');if(state.lv+1<LEVELS.length)loadLevel(state.lv+1);else{loadLevel(0);}}

function hideOverlay(){document.getElementById('win-overlay').classList.remove('show');}

function showLevelSelect(){buildLevelSelect();document.getElementById('level-select').style.display='block';}
function hideLevelSelect(){document.getElementById('level-select').style.display='none';}

function buildLevelSelect(){var html='';var tiers={};LEVELS.forEach(function(lv,i){if(!tiers[lv.t])tiers[lv.t]=[];tiers[lv.t].push({idx:i,lv:lv});});for(var t in tiers){html+='<div class="ls-tier"><div class="ls-tier-name">'+t+'</div><div class="ls-grid">';tiers[t].forEach(function(item){var locked=!progress.unlocked[item.idx];var stars=progress.stars[item.idx];var cls=locked?'locked':'';if(stars)cls+=' completed';html+='<div class="ls-cell '+cls+'" onclick="'+(locked?'':'loadLevel('+item.idx+');hideLevelSelect();')+'">'+(item.idx+1)+(stars?'<div class="stars">'+'★'.repeat(stars)+'</div>':'')+'</div>';});html+='</div></div>';}document.getElementById('ls-content').innerHTML=html;}

function toggleSettings(){document.getElementById('settings-modal').classList.toggle('show');}
function toggleSFX(){state.sfx=!state.sfx;progress.settings.sfx=state.sfx;saveProgress();document.getElementById('toggle-sfx').classList.toggle('on',state.sfx);}
function toggleMusic(){state.music=!state.music;progress.settings.music=state.music;saveProgress();document.getElementById('toggle-music').classList.toggle('on',state.music);if(state.music)startBGM();else stopBGM();}
function toggleAutocheck(){state.autocheck=!state.autocheck;progress.settings.autocheck=state.autocheck;saveProgress();document.getElementById('toggle-autocheck').classList.toggle('on',state.autocheck);}

function cleanup(){if(rafId)cancelAnimationFrame(rafId);stopBGM();if(audioCtx){audioCtx.close().catch(function(){});audioCtx=null;}}
window.addEventListener('beforeunload',cleanup);
window.addEventListener('pagehide',cleanup);
window.addEventListener('visibilitychange',function(){if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null;}stopBGM();}else{if(!state.completed)requestAnimationFrame(timerLoop);}});

function timerLoop(){updateHUD();rafId=requestAnimationFrame(timerLoop);}

function init(){loadProgress();canvas=document.getElementById('game-canvas');ctx=canvas.getContext('2d');resizeCanvas();loadLevel(0);
// pointer events
canvas.addEventListener('pointerdown',onPointerDown);canvas.addEventListener('pointermove',onPointerMove);canvas.addEventListener('pointerup',onPointerUp);canvas.addEventListener('pointercancel',onPointerUp);
// keyboard
document.addEventListener('keydown',function(e){switch(e.key){case'1':setMode('draw');break;case'2':setMode('erase');break;case'h':case'H':doHint();break;case'r':case'R':clearPaths();break;case'Enter':checkSolution();break;case'Escape':document.getElementById('win-overlay').classList.remove('show');document.getElementById('settings-modal').classList.remove('show');break;}});
window.addEventListener('resize',function(){resizeCanvas();drawGrid();});
initAudio();if(state.music)startBGM();rafId=requestAnimationFrame(timerLoop);}

window.addEventListener('DOMContentLoaded',init);
</script>
