<script>
// ============ GAME STATE ============
let curLevel = 0;
let state = { black: {}, clues: {}, R: 0, C: 0 }; // black: { "r,c": true } for black cells; clues: object
let mode = 'shade';
let hintsLeft = 3;
let hintsUsed = [];
let startTime = Date.now();
let timerInterval = null;
let won = false;
let settings = { music: true, sfx: true, autocheck: true };
let audioCtx = null;
let musicNodes = [];
let completed = {};

// ============ CANVAS ============
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let CELL = 50;
let OFFSET_X = 20;
let OFFSET_Y = 20;

function computeLayout() {
  const R = state.R, C = state.C;
  const maxW = Math.min(window.innerWidth - 32, 700);
  // Reserve space for top-bar + help-text + controls + status + footer-link + game-footer
  // (game-footer is async-injected ~10-15s by game-footer.js; fixed magic number per R1 lesson —
  //  280 left controls 78px below fold on 1280×577 laptops; 340 keeps everything in first screen)
  const maxH = window.innerHeight - 360;
  const size = Math.max(20, Math.floor(Math.min(maxW / (C+1), maxH / (R+1))));
  CELL = Math.min(size, 64);
  OFFSET_X = Math.floor(CELL / 2);
  OFFSET_Y = Math.floor(CELL / 2);
  canvas.width = OFFSET_X*2 + C*CELL + 2;
  canvas.height = OFFSET_Y*2 + R*CELL + 2;
}

const REGION_TINTS = ['#1f3a5f','#3a2a4a','#2a4a4f','#3a4a2a','#4a2a3a','#3a4a4a'];

// ============ DRAW ============
function draw() {
  if (!state.R) return;
  const R = state.R, C = state.C;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Compute white components for region tinting (each white component gets a tint)
  const regionMap = computeRegionMap();
  // Determine region id for tinting
  // Build map: cell -> component index
  const cellComp = {};
  // get comps via getWhiteComponents-like — we keep regionMap[r][c]=root string
  // We need tint per unique root
  const roots = new Set();
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) roots.add(regionMap[r][c]);
  const rootList = [...roots];
  const rootColor = {};
  rootList.forEach((rt, i) => { rootColor[rt] = REGION_TINTS[i % REGION_TINTS.length]; });

  // draw cell backgrounds
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const x = OFFSET_X + c*CELL;
      const y = OFFSET_Y + r*CELL;
      const key = r + ',' + c;
      const isBlack = state.black[key];
      if (isBlack) {
        ctx.fillStyle = '#0a0a14';
      } else {
        const root = regionMap[r][c];
        ctx.fillStyle = rootColor[root] || '#2a2a4a';
      }
      ctx.fillRect(x, y, CELL, CELL);
    }
  }
  // draw grid lines (thin)
  ctx.strokeStyle = '#3a3a5a';
  ctx.lineWidth = 1;
  for (let r = 0; r <= R; r++) {
    ctx.beginPath();
    ctx.moveTo(OFFSET_X, OFFSET_Y + r*CELL + 0.5);
    ctx.lineTo(OFFSET_X + C*CELL, OFFSET_Y + r*CELL + 0.5);
    ctx.stroke();
  }
  for (let c = 0; c <= C; c++) {
    ctx.beginPath();
    ctx.moveTo(OFFSET_X + c*CELL + 0.5, OFFSET_Y);
    ctx.lineTo(OFFSET_X + c*CELL + 0.5, OFFSET_Y + R*CELL);
    ctx.stroke();
  }
  // draw clues
  ctx.font = `bold ${Math.floor(CELL*0.55)}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const key in state.clues) {
    const [r,c] = key.split(',').map(Number);
    const x = OFFSET_X + c*CELL + CELL/2;
    const y = OFFSET_Y + r*CELL + CELL/2;
    ctx.fillStyle = '#0f0f1a';
    ctx.beginPath();
    ctx.arc(x, y, CELL*0.36, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#ffd166';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ffd166';
    ctx.fillText(state.clues[key], x, y + 2);
  }
  // hint glow: highlight cells in hintsUsed (which are placed black cells that match the solution)
  for (const k of hintsUsed) {
    const [r,c] = k.split(',').map(Number);
    if (state.black[k]) {
      const x = OFFSET_X + c*CELL + CELL/2;
      const y = OFFSET_Y + r*CELL + CELL/2;
      ctx.fillStyle = 'rgba(255, 209, 102, 0.4)';
      ctx.fillRect(OFFSET_X + c*CELL + 2, OFFSET_Y + r*CELL + 2, CELL-4, CELL-4);
    }
  }
  // violations overlay
  drawViolations();
}

function computeRegionMap() {
  // Union-find of white cells based on player black cells. Black cells get null sentinel.
  const R = state.R, C = state.C;
  const parent = {};
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) parent[r+','+c] = r+','+c;
  function find(x) { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; }
  function union(a,b) { const ra = find(a), rb = find(b); if (ra !== rb) parent[ra] = rb; }
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      if (state.black[r+','+c]) continue; // black cell — skip
      if (r+1 < R && !state.black[(r+1)+','+c]) union(r+','+c, (r+1)+','+c);
      if (c+1 < C && !state.black[r+','+(c+1)]) union(r+','+c, r+','+(c+1));
    }
  }
  const map = [];
  for (let r = 0; r < R; r++) {
    map.push([]);
    for (let c = 0; c < C; c++) {
      // Use null for black cells so they don't appear in comps
      map[r].push(state.black[r+','+c] ? null : find(r+','+c));
    }
  }
  return map;
}

function drawViolations() {
  // For each white component, check rectangular, single-clue, clue=size.
  // For each 2x2 black, highlight edges.
  const R = state.R, C = state.C;
  const map = computeRegionMap();
  // group cells by root (skip null = black cells)
  const comps = {};
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) {
    const k = map[r][c];
    if (k == null) continue;
    if (!comps[k]) comps[k] = [];
    comps[k].push([r,c]);
  }
  // check each white comp
  for (const root in comps) {
    const cells = comps[root];
    let bad = false;
    let minR = cells[0][0], maxR = cells[0][0], minC = cells[0][1], maxC = cells[0][1];
    for (const [r,c] of cells) { minR=Math.min(minR,r);maxR=Math.max(maxR,r);minC=Math.min(minC,c);maxC=Math.max(maxC,c); }
    const cs = cells.length;
    const expected = (maxR-minR+1)*(maxC-minC+1);
    if (cs !== expected) bad = true;
    // clue count + value
    let clueCount = 0;
    for (const [r,c] of cells) {
      const k = r+','+c;
      if (state.clues[k] !== undefined) {
        clueCount++;
        if (state.clues[k] !== cs) bad = true;
      }
    }
    if (clueCount > 1) bad = true;
    if (bad) {
      // outline region in red
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 2;
      const set = new Set(cells.map(([r,c]) => r+','+c));
      for (const [r,c] of cells) {
        const x = OFFSET_X + c*CELL; const y = OFFSET_Y + r*CELL;
        if (!set.has((r-1)+','+c)) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+CELL,y); ctx.stroke(); }
        if (!set.has((r+1)+','+c)) { ctx.beginPath(); ctx.moveTo(x,y+CELL); ctx.lineTo(x+CELL,y+CELL); ctx.stroke(); }
        if (!set.has(r+','+(c-1))) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+CELL); ctx.stroke(); }
        if (!set.has(r+','+(c+1))) { ctx.beginPath(); ctx.moveTo(x+CELL,y); ctx.lineTo(x+CELL,y+CELL); ctx.stroke(); }
      }
    }
  }
  // 2x2 black
  ctx.strokeStyle = '#ff8800';
  ctx.lineWidth = 3;
  for (let r = 0; r < R-1; r++) {
    for (let c = 0; c < C-1; c++) {
      const k1=(r)+','+c, k2=(r)+','+(c+1), k3=(r+1)+','+c, k4=(r+1)+','+(c+1);
      if (state.black[k1] && state.black[k2] && state.black[k3] && state.black[k4]) {
        const x = OFFSET_X + c*CELL; const y = OFFSET_Y + r*CELL;
        ctx.beginPath();
        ctx.moveTo(x+2,y+2); ctx.lineTo(x+CELL-2,y+2);
        ctx.lineTo(x+CELL-2,y+CELL-2); ctx.lineTo(x+2,y+CELL-2);
        ctx.closePath();
        ctx.stroke();
      }
    }
  }
  // diag-connectivity violation: count white components
  const whiteComps = new Set(Object.values(map).filter(v => v != null));
  let diagCount = 0;
  const rootSetD = new Set(Object.keys(comps));
  const compAdj = {};
  for (const rtc in comps) { compAdj[rtc] = new Set(); }
  for (const [r,c] of Object.entries(comps).flatMap(kv => kv[1])) {
    const root = map[r][c];
    for (const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
      const nr=r+dr, nc=c+dc;
      if (nr>=0&&nr<R&&nc>=0&&nc<C) {
        const nroot = map[nr][nc];
        if (nroot != null && nroot !== root && rootSetD.has(nroot)) compAdj[root].add(nroot);
      }
    }
  }
  const seen = new Set();
  for (const root of Object.keys(compAdj)) {
    if (seen.has(root)) continue;
    diagCount++;
    const stack = [root]; seen.add(root);
    while (stack.length) {
      const cur = stack.pop();
      for (const n of compAdj[cur]) if (!seen.has(n)) { seen.add(n); stack.push(n); }
    }
  }
  if (diagCount > 1 && Object.keys(comps).length > 1) {
    // show status (not on canvas) — but let's draw a faint diagonal indicator
    // no-op for now (we'll show in status message)
  }
}

// ============ WIN CHECK ============
function checkWin(announce) {
  if (!state.R) return false;
  const R = state.R, C = state.C;
  // Rule 1: no 2x2 fully black
  for (let r = 0; r < R-1; r++) {
    for (let c = 0; c < C-1; c++) {
      const ks = [[r,c],[r,c+1],[r+1,c],[r+1,c+1]].map(([a,b]) => a+','+b);
      if (ks.every(k => state.black[k])) {
        if (announce) showStatus('❌ A 2x2 area is fully black. No 2x2 black allowed.');
        return false;
      }
    }
  }
  // Compute white components and verify (skip null = black cells)
  const map = computeRegionMap();
  const comps = {};
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) {
    const k = map[r][c]; if (k == null) continue;
    if (!comps[k]) comps[k] = [];
    comps[k].push([r,c]);
  }
  // Rule 2: each white comp must be rectangular
  const roots = Object.keys(comps);
  for (const root of roots) {
    const cells = comps[root];
    let minR=cells[0][0],maxR=cells[0][0],minC=cells[0][1],maxC=cells[0][1];
    for (const [r,c] of cells) { minR=Math.min(minR,r);maxR=Math.max(maxR,r);minC=Math.min(minC,c);maxC=Math.max(maxC,c); }
    if (cells.length !== (maxR-minR+1)*(maxC-minC+1)) {
      if (announce) showStatus('❌ A white region is not rectangular (must be a perfect rectangle).');
      return false;
    }
  }
  // Rule 3: at most 1 clue per region, clue = region size
  for (const root of roots) {
    const cells = comps[root];
    const cs = cells.length;
    let clueCount = 0;
    for (const [r,c] of cells) {
      const k = r+','+c;
      if (state.clues[k] !== undefined) {
        clueCount++;
        if (state.clues[k] !== cs) {
          if (announce) showStatus(`❌ Clue at (${r+1},${c+1}) should be ${state.clues[k]} (its rectangle size), but region has ${cs} cells.`);
          return false;
        }
      }
    }
    if (clueCount > 1) {
      if (announce) showStatus('❌ A white region has more than one number.');
      return false;
    }
  }
  // Rule 4: white regions not orth-adjacent — by construction they're separate components (BFS).
  // Rule 5: all whites diagonally connected
  if (roots.length > 1) {
    const rootSet = new Set(roots);
    const compAdj = {};
    roots.forEach(r => compAdj[r] = new Set());
    for (const root of roots) {
      for (const [r,c] of comps[root]) {
        for (const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
          const nr=r+dr, nc=c+dc;
          if (nr>=0&&nr<R&&nc>=0&&nc<C) {
            const nroot = map[nr][nc];
            // Skip black cells (null) and self-loops; only add if nroot is a known white component
            if (nroot != null && nroot !== root && rootSet.has(nroot)) compAdj[root].add(nroot);
          }
        }
      }
    }
    const seen = new Set();
    const stack = [roots[0]]; seen.add(roots[0]);
    while (stack.length) {
      const cur = stack.pop();
      for (const n of compAdj[cur]) if (!seen.has(n)) { seen.add(n); stack.push(n); }
    }
    if (seen.size !== roots.length) {
      if (announce) showStatus('❌ Not all white regions are diagonally connected.');
      return false;
    }
  }
  // All black cells must be considered — no clue cell can be black
  for (const key in state.clues) {
    if (state.black[key]) {
      if (announce) showStatus('❌ A clue cell cannot be black.');
      return false;
    }
  }
  // Win!
  if (announce || settings.autocheck) {
    win();
  }
  return true;
}

function win() {
  if (won) return;
  won = true;
  stopTimer();
  playSfx('win');
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const timeStr = `${mins}:${secs.toString().padStart(2,'0')}`;
  let stars = 1;
  if (elapsed < 120 && hintsUsed.length === 0) stars = 3;
  else if (elapsed < 300 || hintsUsed.length <= 2) stars = 2;
  completed[curLevel] = { stars, time: elapsed };
  saveProgress();
  document.getElementById('win-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('win-stats').textContent = `Time: ${timeStr} · Hints used: ${hintsUsed.length}`;
  document.getElementById('win-overlay').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#64ffda','#ff6b9d','#ffd166','#55c2a0','#a78bfa'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.left = Math.random()*window.innerWidth + 'px';
    el.style.top = '-10px';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    const dx = (Math.random()-0.5)*400;
    const dy = window.innerHeight + 50;
    const rot = (Math.random()-0.5)*720;
    el.animate([
      { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${dx}px,${dy}px) rotate(${rot}deg)`, opacity: 0 }
    ], { duration: 2000 + Math.random()*1500, easing: 'cubic-bezier(.2,.6,.4,1)' });
    setTimeout(() => el.remove(), 3600);
  }
}

function closeWin() {
  document.getElementById('win-overlay').classList.remove('show');
}

function nextLevel() {
  closeWin();
  if (curLevel + 1 < LEVELS.length) {
    loadLevel(curLevel + 1);
  } else {
    showStatus('🏆 You completed all 30 levels!');
  }
}

// ============ INPUT ============
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  return { x, y };
}

function handleClick(e) {
  if (won) return;
  e.preventDefault();
  const pos = getCanvasPos(e);
  // Find cell at position
  const R = state.R, C = state.C;
  if (pos.x < OFFSET_X || pos.y < OFFSET_Y) return;
  const c = Math.floor((pos.x - OFFSET_X) / CELL);
  const r = Math.floor((pos.y - OFFSET_Y) / CELL);
  if (r < 0 || r >= R || c < 0 || c >= C) return;
  const key = r+','+c;
  // Don't allow clue cells to be shaded
  if (state.clues[key] !== undefined && mode === 'shade') {
    showStatus('💡 Numbered cells must remain white.');
    return;
  }
  if (mode === 'shade') {
    if (!state.black[key]) {
      state.black[key] = true;
      // remove from hints if hinted cell changed
      const idx = hintsUsed.indexOf(key);
      if (idx >= 0) hintsUsed.splice(idx, 1);
      playSfx('click');
    }
  } else if (mode === 'erase') {
    if (state.black[key]) {
      delete state.black[key];
      playSfx('click');
    }
  }
  draw();
  if (settings.autocheck) checkWin(false);
}

canvas.addEventListener('pointerdown', handleClick);

// ============ MODE / HINT / CLEAR ============
function setMode(m) {
  mode = m;
  document.getElementById('btn-shade').classList.toggle('active', m === 'shade');
  document.getElementById('btn-erase').classList.toggle('active', m === 'erase');
}

function useHint() {
  if (won) return;
  if (hintsLeft <= 0) {
    showStatus('💡 No hints left!');
    return;
  }
  const lv = LEVELS[curLevel];
  const sol = new Set(lv.solution_black);
  // pick a solution black cell not yet placed
  const candidates = [...sol].filter(k => !state.black[k]);
  if (candidates.length === 0) {
    showStatus('💡 All correct blacks already placed!');
    return;
  }
  const pick = candidates[Math.floor(Math.random()*candidates.length)];
  state.black[pick] = true;
  hintsUsed.push(pick);
  hintsLeft--;
  document.getElementById('hint-count').textContent = hintsLeft;
  playSfx('hint');
  draw();
  showStatus('💡 Hint: a correct black cell was placed (gold tint).');
  if (settings.autocheck) checkWin(false);
}

function clearBoard() {
  state.black = {};
  hintsUsed = [];
  draw();
  showStatus('🔄 Board cleared.');
}

// ============ LEVEL LOAD ============
function loadLevel(idx) {
  curLevel = idx;
  const lv = LEVELS[idx];
  state.R = lv.R;
  state.C = lv.C;
  state.clues = Object.assign({}, lv.clues);
  state.black = {};
  hintsLeft = 3;
  hintsUsed = [];
  won = false;
  startTime = Date.now();
  computeLayout();
  draw();
  updateLevelLabel();
  buildLevelSelect();
  startTimer();
  document.getElementById('win-overlay').classList.remove('show');
}

function updateLevelLabel() {
  const lv = LEVELS[curLevel];
  document.getElementById('level-label').textContent = `L${curLevel+1} · ${lv.tier}`;
  document.getElementById('hint-count').textContent = hintsLeft;
}

function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('timer').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ============ LEVEL SELECT ============
function toggleLevelSelect() {
  const el = document.getElementById('level-select');
  el.classList.toggle('open');
  buildLevelSelect();
}

function buildLevelSelect() {
  const el = document.getElementById('level-select');
  if (!el.classList.contains('open')) return;
  const tiers = {};
  LEVELS.forEach((lv, i) => {
    if (!tiers[lv.tier]) tiers[lv.tier] = [];
    tiers[lv.tier].push(i);
  });
  let html = '';
  for (const tier in tiers) {
    html += `<div class="tier-group"><h3>${tier}</h3><div class="tier-levels">`;
    for (const idx of tiers[tier]) {
      const cls = idx === curLevel ? 'current' : (completed[idx] ? 'completed' : '');
      const starStr = completed[idx] ? ' '+('★'.repeat(completed[idx].stars)) : '';
      html += `<div class="lvl-btn ${cls}" onclick="loadLevel(${idx});toggleLevelSelect()">${idx+1}${starStr}</div>`;
    }
    html += `</div></div>`;
  }
  el.innerHTML = html;
}

function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

function toggleSetting(key) {
  settings[key] = !settings[key];
  document.getElementById('toggle-'+key).classList.toggle('on', settings[key]);
  if (key === 'music') {
    if (settings.music) startMusic(); else stopMusic();
  }
  saveProgress();
}

// ============ STATUS ============
let statusTimeout = null;
function showStatus(msg) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  if (statusTimeout) clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => { el.textContent = ''; }, 3000);
}

// ============ AUDIO (Web Audio API) ============
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  return audioCtx;
}

function playSfx(type) {
  if (!settings.sfx) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  const now = ctx.currentTime;
  if (type === 'win') {
    [523, 659, 784, 1047].forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f;
      o.type = 'sine';
      g.gain.setValueAtTime(0, now + i*0.08);
      g.gain.linearRampToValueAtTime(0.12, now + i*0.08 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + i*0.08 + 0.6);
      o.start(now + i*0.08);
      o.stop(now + i*0.08 + 0.6);
    });
    return;
  }
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  let freq = 440, dur = 0.1, wave = 'sine', vol = 0.15;
  if (type === 'click') { freq = 600; dur = 0.05; wave = 'square'; vol = 0.08; }
  else if (type === 'hint') { freq = 880; dur = 0.2; wave = 'sine'; vol = 0.15; }
  else if (type === 'error') { freq = 200; dur = 0.2; wave = 'sawtooth'; vol = 0.1; }
  osc.frequency.value = freq;
  osc.type = wave;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(vol, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
  osc.start(now);
  osc.stop(now + dur);
}

function startMusic() {
  if (!settings.music) return;
  const ctx = ensureAudio();
  if (!ctx) return;
  stopMusic();
  const chords = [
    [261.63, 329.63, 392.0, 493.88],
    [293.66, 349.23, 440.0, 587.33],
    [220.0, 261.63, 329.63, 392.0],
    [196.0, 246.94, 293.66, 392.0],
  ];
  let chordIdx = 0;
  const playChord = () => {
    if (!settings.music || !audioCtx) return;
    const now = ctx.currentTime;
    const chord = chords[chordIdx];
    chord.forEach(f => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f;
      o.type = 'sine';
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.04, now + 0.5);
      g.gain.linearRampToValueAtTime(0.04, now + 3.0);
      g.gain.exponentialRampToValueAtTime(0.001, now + 4.0);
      o.start(now);
      o.stop(now + 4.0);
      musicNodes.push(o);
    });
    chordIdx = (chordIdx + 1) % chords.length;
  };
  playChord();
  musicNodes.push({ _interval: setInterval(playChord, 4000) });
}

function stopMusic() {
  musicNodes.forEach(n => {
    if (n._interval) clearInterval(n._interval);
    else try { n.stop(); } catch(e) {}
  });
  musicNodes = [];
}

// ============ LOCALSTORAGE ============
function saveProgress() {
  try {
    localStorage.setItem('mochikoro-progress', JSON.stringify({
      completed, settings, curLevel
    }));
  } catch(e) {}
}

function loadProgress() {
  try {
    const data = JSON.parse(localStorage.getItem('mochikoro-progress') || '{}');
    if (data.completed) completed = data.completed;
    if (data.settings) settings = Object.assign(settings, data.settings);
    if (typeof data.curLevel === 'number') curLevel = data.curLevel;
  } catch(e) {}
}

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  if (e.key === '1') setMode('shade');
  else if (e.key === '2') setMode('erase');
  else if (e.key === 'h' || e.key === 'H') useHint();
  else if (e.key === 'r' || e.key === 'R') clearBoard();
  else if (e.key === 'Enter') checkWin(true);
  else if (e.key === 'Escape') {
    document.getElementById('level-select').classList.toggle('open');
    document.getElementById('settings-panel').classList.remove('open');
  }
});

// ============ INIT ============
window.addEventListener('resize', () => { computeLayout(); draw(); });

function init() {
  loadProgress();
  document.getElementById('toggle-music').classList.toggle('on', settings.music);
  document.getElementById('toggle-sfx').classList.toggle('on', settings.sfx);
  document.getElementById('toggle-autocheck').classList.toggle('on', settings.autocheck);
  if (LEVELS.length === 0) {
    document.getElementById('status-msg').textContent = '⚠ No levels loaded.';
    return;
  }
  loadLevel(Math.min(curLevel, LEVELS.length - 1));
  const startAudioOnce = () => {
    if (settings.music) startMusic();
    document.removeEventListener('pointerdown', startAudioOnce);
  };
  document.addEventListener('pointerdown', startAudioOnce);
}

window.addEventListener('beforeunload', () => { stopMusic(); if (audioCtx) audioCtx.close(); });
window.addEventListener('pagehide', () => { stopMusic(); if (audioCtx) audioCtx.close(); });
document.addEventListener('visibilitychange', () => { if (document.hidden) stopMusic(); });

init();
</script>
