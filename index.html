(function(){if(!window.GAMES||!GAMES.length)return;var idleTimer=null;var shown=false;var overlay=null;function resetTimer(){if(overlay)return;clearTimeout(idleTimer);if(!shown){idleTimer=setTimeout(showSuggestion,45000)}}function showSuggestion(){if(shown)return;shown=true;var g=GAMES[Math.floor(Math.random()*GAMES.length)];overlay=document.createElement('div');overlay.style.cssText='position:fixed;bottom:80px;right:28px;background:rgba(20,20,35,0.95);border:1px solid rgba(78,210,196,0.4);border-radius:16px;padding:14px 18px;z-index:99997;max-width:260px;box-shadow:0 8px 32px rgba(0,0,0,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;transition:opacity .3s,transform .3s';overlay.innerHTML='<div style="font-size:0.8em;color:#4ecdc4;margin-bottom:6px">Try this game?</div><div style="font-size:1.2em;margin-bottom:4px">'+g.emoji+' '+g.name+'</div><div style="font-size:0.75em;color:#888">'+g.cat+'</div><div style="position:absolute;top:8px;right:10px;color:#666;font-size:0.8em;cursor:pointer" id="gz-idle-close">&times;</div>';overlay.addEventListener('click',function(e){if(e.target.id==='gz-idle-close'){overlay.remove();overlay=null;shown=false;resetTimer();return}window.location.href=g.url});document.body.appendChild(overlay);setTimeout(function(){if(overlay){overlay.remove();overlay=null;shown=false;resetTimer()}},12000)}['mousemove','keydown','scroll','touchstart','click'].forEach(function(e){document.addEventListener(e,resetTimer,{passive:true})});resetTimer()})();

<script>
// UX-OPT: Animated counter for trust/stats section (engagement boost per 2026 research)
(function(){
  var counted=new Set();
  function animateCount(el,target){
    if(counted.has(el))return;
    counted.add(el);
    var dur=1200,start=performance.now();
    function tick(now){
      var p=Math.min((now-start)/dur,1);
      var ease=1-Math.pow(1-p,3);
      el.textContent=Math.round(target*ease);
      if(p<1)requestAnimationFrame(tick);
      else el.textContent=target;
    }
    requestAnimationFrame(tick);
  }
  function init(){
    document.querySelectorAll('[data-count]').forEach(function(el){
      var obs=new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          if(e.isIntersecting){
            animateCount(el,parseInt(el.dataset.count));
            obs.unobserve(el);
          }
        });
      },{threshold:0.5});
      obs.observe(el);
    });
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
  else init();
})();
</script>
