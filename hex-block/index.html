<script>
(function(){
"use strict";

// ===================== HEX MATH =====================
const HEX_DIRECTIONS = [
  {q:1,r:0},{q:1,r:-1},{q:0,r:-1},
  {q:-1,r:0},{q:-1,r:1},{q:0,r:1}
];
const BOARD_RADIUS = 4;
const STORAGE_KEY = 'hexblock_v1';

function hexToPixel(q,r,size,cx,cy){
  return {
    x: size * (Math.sqrt(3)*q + Math.sqrt(3)/2*r) + cx,
    y: size * (1.5*r) + cy
  };
}

function pixelToHex(px,py,size,cx,cy){
  const x = px - cx, y = py - cy;
  const q = (Math.sqrt(3)/3*x - 1/3*y)/size;
  const r = (2/3*y)/size;
  return hexRound(q,r);
}

function hexRound(fq,fr){
  const fs = -fq-fr;
  let rq=Math.round(fq), rr=Math.round(fr), rs=Math.round(fs);
  const dq=Math.abs(rq-fq), dr=Math.abs(rr-fr), ds=Math.abs(rs-fs);
  if(dq>dr&&dq>ds) rq=-rr-rs;
  else if(dr>ds) rr=-rq-rs;
  return {q:rq,r:rr};
}

function hexDist(q,r){return(Math.abs(q)+Math.abs(r)+Math.abs(q+r))/2;}

function hexKey(q,r){return q+','+r;}

// ===================== PIECE DEFINITIONS =====================
// Each piece is an array of {dq,dr} offsets from center cell {0,0}
const PIECE_DEFS = [
  // 1-cell
  [{dq:0,dr:0}],
  // 2-cell lines
  [{dq:0,dr:0},{dq:1,dr:0}],
  [{dq:0,dr:0},{dq:0,dr:1}],
  [{dq:0,dr:0},{dq:1,dr:-1}],
  // 3-cell lines
  [{dq:0,dr:0},{dq:1,dr:0},{dq:-1,dr:0}],
  [{dq:0,dr:0},{dq:0,dr:1},{dq:0,dr:-1}],
  [{dq:0,dr:0},{dq:1,dr:-1},{dq:-1,dr:1}],
  // 3-cell L-shapes (bent)
  [{dq:0,dr:0},{dq:1,dr:0},{dq:0,dr:1}],
  [{dq:0,dr:0},{dq:1,dr:0},{dq:1,dr:-1}],
  [{dq:0,dr:0},{dq:1,dr:-1},{dq:0,dr:-1}],
  [{dq:0,dr:0},{dq:0,dr:-1},{dq:-1,dr:1}],
  [{dq:0,dr:0},{dq:-1,dr:0},{dq:-1,dr:1}],
  [{dq:0,dr:0},{dq:-1,dr:0},{dq:0,dr:1}],
  // 4-cell lines
  [{dq:0,dr:0},{dq:1,dr:0},{dq:-1,dr:0},{dq:2,dr:0}],
  [{dq:0,dr:0},{dq:0,dr:1},{dq:0,dr:-1},{dq:0,dr:2}],
  [{dq:0,dr:0},{dq:1,dr:-1},{dq:-1,dr:1},{dq:2,dr:-2}],
  // 4-cell L-shapes
  [{dq:0,dr:0},{dq:1,dr:0},{dq:2,dr:0},{dq:0,dr:1}],
  [{dq:0,dr:0},{dq:1,dr:0},{dq:2,dr:0},{dq:2,dr:-1}],
  [{dq:0,dr:0},{dq:0,dr:1},{dq:0,dr:2},{dq:1,dr:0}],
  [{dq:0,dr:0},{dq:0,dr:1},{dq:0,dr:2},{dq:-1,dr:2}],
  // 4-cell T-shapes
  [{dq:0,dr:0},{dq:1,dr:0},{dq:-1,dr:0},{dq:0,dr:1}],
  [{dq:0,dr:0},{dq:1,dr:0},{dq:-1,dr:0},{dq:0,dr:-1}],
  [{dq:0,dr:0},{dq:0,dr:1},{dq:0,dr:-1},{dq:1,dr:0}],
  [{dq:0,dr:0},{dq:0,dr:1},{dq:0,dr:-1},{dq:-1,dr:0}],
  // 4-cell squares/diamonds
  [{dq:0,dr:0},{dq:1,dr:0},{dq:0,dr:1},{dq:1,dr:-1}],
  [{dq:0,dr:0},{dq:-1,dr:0},{dq:0,dr:-1},{dq:-1,dr:1}],
  // 5-cell lines
  [{dq:0,dr:0},{dq:1,dr:0},{dq:-1,dr:0},{dq:2,dr:0},{dq:-2,dr:0}],
  [{dq:0,dr:0},{dq:0,dr:1},{dq:0,dr:-1},{dq:0,dr:2},{dq:0,dr:-2}],
  [{dq:0,dr:0},{dq:1,dr:-1},{dq:-1,dr:1},{dq:2,dr:-2},{dq:-2,dr:2}],
  // 5-cell big shapes
  [{dq:0,dr:0},{dq:1,dr:0},{dq:-1,dr:0},{dq:0,dr:1},{dq:0,dr:-1}],
  [{dq:0,dr:0},{dq:1,dr:0},{dq:-1,dr:0},{dq:1,dr:-1},{dq:-1,dr:1}],
  [{dq:0,dr:0},{dq:0,dr:1},{dq:0,dr:-1},{dq:1,dr:-1},{dq:-1,dr:1}],
  // 3-cell triangles
  [{dq:0,dr:0},{dq:1,dr:0},{dq:0,dr:-1}],
  [{dq:0,dr:0},{dq:-1,dr:0},{dq:0,dr:1}],
];

const PIECE_COLORS = [
  '#00f0ff','#ff00aa','#ffdd00','#00ff88',
  '#ff6644','#aa66ff','#44ddff','#ff88cc',
  '#88ff44','#ffaa00','#66aaff','#ff4466',
];

// ===================== AUDIO =====================
let audioCtx = null;
let soundEnabled = true;

function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
}

function playTone(freq,dur,type,vol){
  if(!soundEnabled||!audioCtx) return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type=type||'sine';
    o.frequency.value=freq;
    g.gain.value=Math.min(vol||0.15,0.3);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function sfxPlace(){playTone(520,0.12,'sine',0.15);setTimeout(()=>playTone(660,0.1,'sine',0.1),60);}
function sfxClear(n){for(let i=0;i<n;i++) setTimeout(()=>playTone(800+i*200,0.15,'sine',0.12),i*80);}
function sfxCombo(){playTone(1200,0.2,'sine',0.15);setTimeout(()=>playTone(1600,0.15,'sine',0.12),100);}
function sfxGameOver(){playTone(300,0.4,'sawtooth',0.1);setTimeout(()=>playTone(200,0.6,'sawtooth',0.08),200);}

// ===================== GAME STATE =====================
let board = {};
let pieces = [null,null,null];
let pieceColors = [0,0,0];
let score = 0;
let displayScore = 0;
let bestScore = 0;
let particles = [];
let floatingTexts = [];
let comboCount = 0;
let clearing = false;
let gameOver = false;
let dragging = null;
let dragPos = {x:0,y:0};
let ghostCells = null;
let ghostValid = false;
let animations = [];

// Board canvas
const boardCanvas = document.getElementById('board-canvas');
const boardCtx = boardCanvas.getContext('2d');
let hexSize = 30;
let boardCX = 0, boardCY = 0;

function loadBest(){
  try{ bestScore = parseInt(localStorage.getItem(STORAGE_KEY+'_best'))||0; }catch(e){}
  document.getElementById('best-display').textContent = bestScore;
}

function saveBest(){
  try{ localStorage.setItem(STORAGE_KEY+'_best', bestScore); }catch(e){}
}

function initBoard(){
  board = {};
  for(let q=-BOARD_RADIUS;q<=BOARD_RADIUS;q++){
    for(let r=-BOARD_RADIUS;r<=BOARD_RADIUS;r++){
      if(hexDist(q,r)<=BOARD_RADIUS) board[hexKey(q,r)] = null;
    }
  }
}

function generatePiece(){
  const idx = Math.floor(Math.random()*PIECE_DEFS.length);
  const colorIdx = Math.floor(Math.random()*PIECE_COLORS.length);
  return {cells:PIECE_DEFS[idx].map(c=>({dq:c.dq,dr:c.dr})), colorIdx};
}

function dealPieces(){
  for(let i=0;i<3;i++){
    if(!pieces[i]){
      pieces[i]=generatePiece();
      pieceColors[i]=pieces[i].colorIdx;
    }
  }
  renderPieceTray();
}

function canPlaceAnywhere(piece){
  for(let q=-BOARD_RADIUS;q<=BOARD_RADIUS;q++){
    for(let r=-BOARD_RADIUS;r<=BOARD_RADIUS;r++){
      if(hexDist(q,r)>BOARD_RADIUS) continue;
      if(canPlace(piece,q,r)) return true;
    }
  }
  return false;
}

function canPlace(piece,bq,br){
  for(const c of piece.cells){
    const k=hexKey(bq+c.dq,br+c.dr);
    if(!(k in board)) return false;
    if(board[k]!==null) return false;
  }
  return true;
}

function placePiece(piece,bq,br){
  const color = PIECE_COLORS[piece.colorIdx];
  for(const c of piece.cells){
    board[hexKey(bq+c.dq,br+c.dr)] = color;
  }
  const pts = piece.cells.length * 10;
  addScore(pts);
  sfxPlace();

  // add placement animation
  for(const c of piece.cells){
    const pos = hexToPixel(bq+c.dq,br+c.dr,hexSize,boardCX,boardCY);
    animations.push({type:'place',x:pos.x,y:pos.y,t:0,dur:0.25});
  }

  checkLines();
}

function checkLines(){
  const toClear = new Set();

  // 3 axial directions for lines
  const directions = [
    {dq:1,dr:0},   // q-axis
    {dq:0,dr:1},   // r-axis
    {dq:1,dr:-1},  // s-axis
  ];

  for(const dir of directions){
    // Find all lines in this direction that cross the board
    // A line is defined by a constant value perpendicular to the direction
    // For dir (1,0), lines are constant r
    // For dir (0,1), lines are constant q
    // For dir (1,-1), lines are constant q+r (=s)

    let groups;
    if(dir.dq===1 && dir.dr===0){
      // Group by r
      groups = {};
      for(const k in board){
        if(board[k]!==null){
          const [q,r] = k.split(',').map(Number);
          if(!groups[r]) groups[r]=[];
          groups[r].push(q);
        }
      }
      for(const r in groups){
        const qs = groups[r].sort((a,b)=>a-b);
        // Check if this forms a complete line across the board at this r
        const lineCells = [];
        for(let q=-BOARD_RADIUS;q<=BOARD_RADIUS;q++){
          if(hexDist(q,parseInt(r))<=BOARD_RADIUS) lineCells.push({q,r:parseInt(r)});
        }
        if(lineCells.length>0 && lineCells.every(c=>board[hexKey(c.q,c.r)]!==null)){
          lineCells.forEach(c=>toClear.add(hexKey(c.q,c.r)));
        }
      }
    } else if(dir.dq===0 && dir.dr===1){
      // Group by q
      groups = {};
      for(const k in board){
        if(board[k]!==null){
          const [q,r] = k.split(',').map(Number);
          if(!groups[q]) groups[q]=[];
          groups[q].push(r);
        }
      }
      for(const q in groups){
        const lineCells = [];
        for(let r=-BOARD_RADIUS;r<=BOARD_RADIUS;r++){
          if(hexDist(parseInt(q),r)<=BOARD_RADIUS) lineCells.push({q:parseInt(q),r});
        }
        if(lineCells.length>0 && lineCells.every(c=>board[hexKey(c.q,c.r)]!==null)){
          lineCells.forEach(c=>toClear.add(hexKey(c.q,c.r)));
        }
      }
    } else {
      // Group by s = q+r
      groups = {};
      for(const k in board){
        if(board[k]!==null){
          const [q,r] = k.split(',').map(Number);
          const s=q+r;
          if(!groups[s]) groups[s]=[];
          groups[s].push(k);
        }
      }
      for(const s in groups){
        const lineCells = [];
        for(let q=-BOARD_RADIUS;q<=BOARD_RADIUS;q++){
          const r = parseInt(s)-q;
          if(hexDist(q,r)<=BOARD_RADIUS && hexKey(q,r) in board) lineCells.push({q,r});
        }
        if(lineCells.length>0 && lineCells.every(c=>board[hexKey(c.q,c.r)]!==null)){
          lineCells.forEach(c=>toClear.add(hexKey(c.q,c.r)));
        }
      }
    }
  }

  if(toClear.size>0){
    clearing = true;
    comboCount++;
    let linesCleared = 0;
    // rough line count
    const cleared = toClear.size;
    linesCleared = Math.max(1, Math.floor(cleared / 7));

    const bonus = cleared * 20 * comboCount;
    addScore(bonus);

    // Spawn particles for each cleared cell
    for(const k of toClear){
      const [q,r] = k.split(',').map(Number);
      const pos = hexToPixel(q,r,hexSize,boardCX,boardCY);
      const color = board[k] || '#ffffff';
      board[k] = null;
      for(let i=0;i<6;i++){
        const angle = Math.random()*Math.PI*2;
        const speed = 60+Math.random()*120;
        particles.push({
          x:pos.x, y:pos.y,
          vx:Math.cos(angle)*speed,
          vy:Math.sin(angle)*speed,
          life:0.6+Math.random()*0.4,
          maxLife:0.6+Math.random()*0.4,
          color, size:3+Math.random()*4
        });
      }
      // flash animation
      animations.push({type:'clear',x:pos.x,y:pos.y,t:0,dur:0.3,color:'#ffffff'});
    }

    sfxClear(linesCleared);
    if(comboCount>1) sfxCombo();

    const comboText = comboCount>1 ? `Combo x${comboCount}!` : `+${bonus}`;
    const mid = [...toClear][Math.floor(toClear.size/2)];
    const [mq,mr] = mid.split(',').map(Number);
    const mpos = hexToPixel(mq,mr,hexSize,boardCX,boardCY);
    floatingTexts.push({text:comboText,x:mpos.x,y:mpos.y,t:0,dur:1.2,color:'#ffdd00'});

    // after clearing, check for more lines (chain)
    setTimeout(()=>checkLines(), 200);
  } else {
    clearing = false;
    comboCount = 0;
    // Check if we need new pieces
    const allPlaced = pieces.every(p=>p===null);
    if(allPlaced) dealPieces();
    // Check game over
    checkGameOver();
  }
}

function checkGameOver(){
  for(let i=0;i<3;i++){
    if(pieces[i] && canPlaceAnywhere(pieces[i])) return;
  }
  gameOver = true;
  if(score > bestScore){
    bestScore = score;
    saveBest();
    document.getElementById('best-display').textContent = bestScore;
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-best').textContent =
    score >= bestScore ? 'New Best!' : `Best: ${bestScore}`;
  document.getElementById('gameover-overlay').classList.remove('hidden');
  sfxGameOver();
}

function addScore(pts){
  score += pts;
}

// ===================== RENDERING =====================
function resize(){
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  const dpr = window.devicePixelRatio || 1;

  // Calculate hex size to fit board
  const boardDiam = 2*BOARD_RADIUS+1;
  const maxW = w * 0.92;
  const maxH = h * 0.95;
  // hex width = sqrt(3)*size, height = 2*size, vertical spacing = 1.5*size
  const sizeByW = maxW / (Math.sqrt(3) * boardDiam + Math.sqrt(3));
  const sizeByH = maxH / (1.5 * boardDiam + 0.5 + 2);
  hexSize = Math.max(12, Math.min(sizeByW, sizeByH));

  boardCanvas.width = w * dpr;
  boardCanvas.height = h * dpr;
  boardCanvas.style.width = w + 'px';
  boardCanvas.style.height = h + 'px';
  boardCtx.setTransform(dpr,0,0,dpr,0,0);
  boardCX = w/2;
  boardCY = h/2;

  renderPieceTray();
}

function drawHex(ctx,x,y,size,fill,stroke,lw){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const angle = Math.PI/3*i - Math.PI/6;
    const hx = x + size*Math.cos(angle);
    const hy = y + size*Math.sin(angle);
    if(i===0) ctx.moveTo(hx,hy); else ctx.lineTo(hx,hy);
  }
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();}
}

function renderBoard(dt){
  const ctx = boardCtx;
  const w = boardCanvas.width/(window.devicePixelRatio||1);
  const h = boardCanvas.height/(window.devicePixelRatio||1);

  // Clear
  ctx.clearRect(0,0,w,h);

  // Background hex pattern
  drawBgPattern(ctx,w,h);

  // Draw board cells
  for(const k in board){
    const [q,r] = k.split(',').map(Number);
    const pos = hexToPixel(q,r,hexSize,boardCX,boardCY);
    const cellColor = board[k];

    // Empty cell
    if(!cellColor){
      drawHex(ctx,pos.x,pos.y,hexSize*0.92,'rgba(255,255,255,0.03)','rgba(255,255,255,0.08)',1);
    } else {
      // Filled cell with gradient
      const grad = ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,hexSize*0.92);
      grad.addColorStop(0, lightenColor(cellColor, 0.3));
      grad.addColorStop(1, cellColor);
      drawHex(ctx,pos.x,pos.y,hexSize*0.92,grad,'rgba(0,0,0,0.3)',1.5);

      // Inner highlight
      drawHex(ctx,pos.x-hexSize*0.05,pos.y-hexSize*0.08,hexSize*0.6,
        'rgba(255,255,255,0.1)',null);
    }
  }

  // Ghost preview
  if(ghostCells && dragging !== null){
    const piece = pieces[dragging];
    if(piece){
      for(const c of ghostCells){
        const pos = hexToPixel(c.q,c.r,hexSize,boardCX,boardCY);
        const color = PIECE_COLORS[piece.colorIdx];
        const alpha = ghostValid ? 0.5 : 0.2;
        drawHex(ctx,pos.x,pos.y,hexSize*0.92,
          ghostValid ? hexToRgba(color, alpha) : `rgba(255,60,60,${alpha})`,
          ghostValid ? 'rgba(255,255,255,0.3)' : 'rgba(255,60,60,0.4)', 2);
      }
    }
  }

  // Animations
  for(let i=animations.length-1;i>=0;i--){
    const a = animations[i];
    a.t += dt;
    if(a.t >= a.dur){ animations.splice(i,1); continue; }
    const p = a.t/a.dur;
    if(a.type==='clear'){
      const s = hexSize * (0.92 + 0.5*p);
      ctx.globalAlpha = 1-p;
      drawHex(ctx,a.x,a.y,s,'rgba(255,255,255,'+(.8*(1-p))+')','rgba(255,255,255,'+(.5*(1-p))+')',3);
      ctx.globalAlpha = 1;
    } else if(a.type==='place'){
      ctx.globalAlpha = 1-p;
      const s = hexSize * (0.92 * (0.5 + 0.5*(1-p)));
      drawHex(ctx,a.x,a.y,s,`rgba(255,255,255,${0.15*(1-p)})`,null);
      ctx.globalAlpha = 1;
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.vx *= 0.98;
    p.life -= dt;
    if(p.life<=0){ particles.splice(i,1); continue; }
    const alpha = p.life/p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Floating texts
  for(let i=floatingTexts.length-1;i>=0;i--){
    const ft = floatingTexts[i];
    ft.t += dt;
    if(ft.t>=ft.dur){ floatingTexts.splice(i,1); continue; }
    const p = ft.t/ft.dur;
    const alpha = 1 - p;
    const yOff = -50 * p;
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${Math.round(18+10*(1-p))}px 'Segoe UI',system-ui,sans-serif`;
    ctx.fillStyle = ft.color;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y + yOff);
    ctx.globalAlpha = 1;
  }
}

function drawBgPattern(ctx,w,h){
  // Subtle hex pattern in background
  ctx.globalAlpha = 0.04;
  const s = 40;
  for(let y=-s;y<h+s;y+=s*1.5){
    for(let x=-s;x<w+s;x+=s*Math.sqrt(3)){
      const off = (Math.floor(y/(s*1.5))%2) * s*Math.sqrt(3)/2;
      drawHex(ctx,x+off,y,s*0.85,'rgba(255,255,255,1)',null);
    }
  }
  ctx.globalAlpha = 1;
}

function lightenColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+Math.round((255-r)*amt));
  g=Math.min(255,g+Math.round((255-g)*amt));
  b=Math.min(255,b+Math.round((255-b)*amt));
  return `rgb(${r},${g},${b})`;
}

function hexToRgba(hex,alpha){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ===================== PIECE TRAY RENDERING =====================
function renderPieceTray(){
  for(let i=0;i<3;i++){
    const slot = document.getElementById('slot-'+i);
    const canvas = slot.querySelector('canvas');
    const piece = pieces[i];
    slot.classList.toggle('empty', !piece);
    slot.classList.toggle('invalid', piece && !canPlaceAnywhere(piece));

    if(!piece){
      canvas.width=1;canvas.height=1;
      continue;
    }

    const dpr = window.devicePixelRatio||1;
    const rect = slot.getBoundingClientRect();
    const sz = Math.min(rect.width, rect.height);
    canvas.width = sz*dpr;
    canvas.height = sz*dpr;
    canvas.style.width = sz+'px';
    canvas.style.height = sz+'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,sz,sz);

    // Calculate piece bounds
    let minQ=Infinity,maxQ=-Infinity,minR=Infinity,maxR=-Infinity;
    for(const c of piece.cells){
      minQ=Math.min(minQ,c.dq);maxQ=Math.max(maxQ,c.dq);
      minR=Math.min(minR,c.dr);maxR=Math.max(maxR,c.dr);
    }
    const cols=maxQ-minQ+1;
    const rows=maxR-minR+1;
    const pieceHexSize = Math.min(sz/(Math.sqrt(3)*(cols+1)), sz/(1.5*(rows+1)+0.5)) * 0.85;
    const cx = sz/2;
    const cy = sz/2;
    // center offset
    const midQ = (minQ+maxQ)/2;
    const midR = (minR+maxR)/2;
    const color = PIECE_COLORS[piece.colorIdx];

    for(const c of piece.cells){
      const pos = hexToPixel(c.dq-midQ,c.dr-midR,pieceHexSize,cx,cy);
      const grad = ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,pieceHexSize*0.9);
      grad.addColorStop(0, lightenColor(color,0.3));
      grad.addColorStop(1, color);
      drawHex(ctx,pos.x,pos.y,pieceHexSize*0.9,grad,'rgba(0,0,0,0.3)',1.2);
      drawHex(ctx,pos.x-pieceHexSize*0.05,pos.y-pieceHexSize*0.08,pieceHexSize*0.55,
        'rgba(255,255,255,0.1)',null);
    }
  }
}

// ===================== DRAG & DROP =====================
function startDrag(slotIdx,e){
  if(gameOver||clearing) return;
  if(!pieces[slotIdx]) return;
  initAudio();
  dragging = slotIdx;
  const touch = e.touches ? e.touches[0] : e;
  dragPos.x = touch.clientX;
  dragPos.y = touch.clientY;
  updateGhost();
}

function moveDrag(e){
  if(dragging===null) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  dragPos.x = touch.clientX;
  dragPos.y = touch.clientY;
  updateGhost();
}

function endDrag(e){
  if(dragging===null) return;
  if(ghostValid && ghostCells){
    const piece = pieces[dragging];
    // Use the first ghost cell as anchor
    const gc = ghostCells[0];
    const c0 = piece.cells[0];
    placePiece(piece, gc.q - c0.dq, gc.r - c0.dr);
    pieces[dragging] = null;
    renderPieceTray();
  }
  dragging = null;
  ghostCells = null;
  ghostValid = false;
}

function updateGhost(){
  if(dragging===null) return;
  const piece = pieces[dragging];
  if(!piece) return;

  const rect = boardCanvas.getBoundingClientRect();
  const px = dragPos.x - rect.left;
  const py = dragPos.y - rect.top;

  const hex = pixelToHex(px,py,hexSize,boardCX,boardCY);

  ghostCells = piece.cells.map(c=>({q:hex.q+c.dq, r:hex.r+c.dr}));
  ghostValid = canPlace(piece,hex.q,hex.r);
}

// ===================== MAIN LOOP =====================
let lastTime = 0;

function gameLoop(time){
  const dt = Math.min((time-lastTime)/1000, 0.05);
  lastTime = time;

  // Animate score display
  if(displayScore < score){
    displayScore += Math.max(1, Math.ceil((score-displayScore)*0.15));
    if(displayScore>score) displayScore=score;
    document.getElementById('score-display').textContent = displayScore;
  }

  renderBoard(dt);

  // Render dragging piece on top of board
  if(dragging!==null && pieces[dragging]){
    const piece = pieces[dragging];
    const ctx = boardCtx;
    const rect = boardCanvas.getBoundingClientRect();
    const px = dragPos.x - rect.left;
    const py = dragPos.y - rect.top;
    const color = PIECE_COLORS[piece.colorIdx];
    const sz = hexSize * 0.92;

    // Calculate piece center offset
    let minQ=Infinity,maxQ=-Infinity,minR=Infinity,maxR=-Infinity;
    for(const c of piece.cells){
      minQ=Math.min(minQ,c.dq);maxQ=Math.max(maxQ,c.dq);
      minR=Math.min(minR,c.dr);maxR=Math.max(maxR,c.dr);
    }
    const midQ=(minQ+maxQ)/2, midR=(minR+maxR)/2;

    ctx.globalAlpha = 0.85;
    for(const c of piece.cells){
      const pos = hexToPixel(c.dq-midQ,c.dr-midR,hexSize,px,py);
      const grad = ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,sz);
      grad.addColorStop(0, lightenColor(color,0.4));
      grad.addColorStop(1, color);
      drawHex(ctx,pos.x,pos.y,sz,grad,'rgba(255,255,255,0.3)',2);
    }
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(gameLoop);
}

// ===================== INPUT HANDLERS =====================
function setupInput(){
  const slots = document.querySelectorAll('.piece-slot');
  slots.forEach((slot,i)=>{
    slot.addEventListener('pointerdown',(e)=>{
      e.preventDefault();
      startDrag(i,e);
    });
  });

  document.addEventListener('pointermove',(e)=>{
    if(dragging!==null){
      e.preventDefault();
      moveDrag(e);
    }
  });

  document.addEventListener('pointerup',(e)=>{
    endDrag(e);
  });

  document.addEventListener('pointercancel',(e)=>{
    dragging=null;ghostCells=null;ghostValid=false;
  });

  // Prevent context menu on long press
  document.addEventListener('contextmenu',(e)=>e.preventDefault());

  document.getElementById('btn-new').addEventListener('click',()=>{initAudio();newGame();});
  document.getElementById('btn-retry').addEventListener('click',()=>{newGame();});
  document.getElementById('btn-sound').addEventListener('click',()=>{
    initAudio();
    soundEnabled=!soundEnabled;
    document.getElementById('btn-sound').textContent=soundEnabled?'Sound':'Muted';
  });

  window.addEventListener('resize',()=>{resize();});
}

function newGame(){
  gameOver=false;clearing=false;
  score=0;displayScore=0;comboCount=0;
  particles=[];floatingTexts=[];animations=[];
  document.getElementById('score-display').textContent='0';
  document.getElementById('gameover-overlay').classList.add('hidden');
  initBoard();
  pieces=[null,null,null];
  dealPieces();
  resize();
}

// ===================== INIT =====================
function init(){
  loadBest();
  initBoard();
  dealPieces();
  resize();
  setupInput();
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

init();
})();
