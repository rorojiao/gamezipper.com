<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;overflow-y:auto;overflow-x:hidden;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;color:#eee;touch-action:none;user-select:none}
body{background:linear-gradient(135deg,#020024 0%,#090979 40%,#00d4ff10 100%);min-height:100vh;padding:8px 10px 20px}
#wrap{display:flex;flex-direction:column;align-items:center;max-width:600px;margin:0 auto;padding-top:4px}

#header{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:10px}
h1{font-size:clamp(18px,5vw,24px);background:linear-gradient(135deg,#60a5fa,#a78bfa,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900;letter-spacing:1px}

#stats{display:flex;gap:10px}
.stat-box{background:rgba(0,0,0,0.5);border:1px solid rgba(96,165,250,0.4);border-radius:8px;padding:5px 12px;text-align:center}
.stat-box .label{font-size:10px;color:#60a5fa;text-transform:uppercase}
.stat-box .val{font-size:16px;font-weight:700;color:#93c5fd}

#puzzle-select{display:flex;gap:6px;margin-bottom:10px;width:100%;flex-wrap:wrap}
#puzzle-select button{background:rgba(0,0,0,0.4);border:1px solid rgba(96,165,250,0.3);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
#puzzle-select button:hover,#puzzle-select button.active{background:rgba(96,165,250,0.2);border-color:#60a5fa;color:#93c5fd}
#puzzle-select button .diff{font-size:10px;color:#a9acc1;margin-left:4px}

#grid-container{position:relative;width:100%;max-width:500px;margin-bottom:10px}
#crossword-grid{display:grid;gap:2px;padding:8px;background:rgba(0,0,0,0.4);border-radius:12px;border:1px solid rgba(96,165,250,0.2);margin:0 auto;width:fit-content}
.cell{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;background:#1a1a3e;border:1px solid rgba(96,165,250,0.3);border-radius:4px;cursor:pointer;position:relative;transition:background .1s}
.cell.block{background:#0a0a1e;cursor:default;border-color:transparent}
.cell.active{background:rgba(96,165,250,0.25);border-color:#60a5fa;box-shadow:0 0 8px rgba(96,165,250,0.4)}
.cell.word-highlight{background:rgba(96,165,250,0.15)}
.cell.correct{background:rgba(72,199,116,0.2);border-color:#4ecdc4}
.cell.wrong{background:rgba(239,68,68,0.2);border-color:#ef4444;animation:shake .3s}
.cell.revealed{background:rgba(251,191,36,0.2);border-color:#fbbf24}
.cell .num{position:absolute;top:1px;left:3px;font-size:8px;color:#60a5fa;font-weight:400;line-height:1}
.cell input{width:100%;height:100%;background:transparent;border:none;outline:none;text-align:center;font-size:18px;font-weight:700;color:#fff;caret-color:#60a5fa;text-transform:uppercase}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}

#clues-wrap{display:flex;gap:20px;width:100%;max-width:500px}
.clue-col{flex:1;background:rgba(0,0,0,0.4);border-radius:10px;padding:10px;border:1px solid rgba(96,165,250,0.2)}
.clue-col h3{font-size:13px;color:#60a5fa;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.clue-item{padding:5px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:#b8b8c8;margin-bottom:3px;transition:background .1s}
.clue-item:hover{background:rgba(96,165,250,0.15)}
.clue-item.active{background:rgba(96,165,250,0.25);color:#fff}
.clue-item .num{color:#60a5fa;font-weight:700;margin-right:4px}
.clue-item.completed{color:#4ecdc4;text-decoration:line-through}

#btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px;width:100%;max-width:500px}
.btn{background:rgba(0,0,0,0.5);border:1px solid rgba(96,165,250,0.5);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s;user-select:none}
.btn:hover{background:rgba(96,165,250,0.2);box-shadow:0 0 12px rgba(96,165,250,0.3)}
.btn:active{transform:scale(.96)}
.btn.primary{background:rgba(96,165,250,0.3);border-color:#60a5fa}
.btn.hint-btn{background:rgba(251,191,36,0.15);border-color:rgba(251,191,36,0.5);color:#fbbf24}

#timer{font-size:20px;font-weight:700;color:#93c5fd}
#hints-left{font-size:12px;color:#fbbf24;margin-top:2px}

#win-overlay,#start-overlay{position:fixed;inset:0;background:rgba(2,6,24,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;border-radius:0;backdrop-filter:blur(4px)}
#win-overlay h2,#start-overlay h2{font-size:28px;color:#4ecdc4;margin-bottom:8px}
#win-overlay p,#start-overlay p{color:#93c5fd;font-size:16px;margin-bottom:16px;text-align:center;max-width:320px;line-height:1.6}
#win-overlay .btn,#start-overlay .btn{margin-top:8px}
.hidden{display:none!important}

#start-overlay .puzzle-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;width:min(400px,90vw);padding-right:4px}
#start-overlay .puzzle-card{background:rgba(0,0,0,0.5);border:1px solid rgba(96,165,250,0.3);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s}
#start-overlay .puzzle-card:hover{border-color:#60a5fa;background:rgba(96,165,250,0.15)}
#start-overlay .puzzle-card h4{color:#fff;font-size:15px;margin-bottom:4px}
#start-overlay .puzzle-card .meta{font-size:12px;color:#a9acc1}
#start-overlay .puzzle-card .tags{display:flex;gap:6px;margin-top:6px}
#start-overlay .puzzle-card .tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.tag-easy{background:rgba(72,199,116,0.2);color:#4ecdc4}
.tag-medium{background:rgba(251,191,36,0.2);color:#fbbf24}
.tag-hard{background:rgba(239,68,68,0.2);color:#ef4444}
</style>
<script src="../game-audio.js?v=9"></script>
</head>
<body>
<div id="wrap">
  <div id="header">
    <h1>📰 CROSSWORD</h1>
    <div id="stats">
      <div class="stat-box"><div class="label">Time</div><div id="timer" class="val">00:00</div></div>
      <div class="stat-box"><div class="label">Hints</div><div id="hints-display" class="val">3/3</div></div>
    </div>
  </div>

  <div id="puzzle-select"></div>

  <div id="grid-container">
    <div id="crossword-grid"></div>
  </div>

  <div id="clues-wrap">
    <div class="clue-col" id="across-col">
      <h3>⬅ Across</h3>
      <div id="across-clues"></div>
    </div>
    <div class="clue-col" id="down-col">
      <h3>⬇ Down</h3>
      <div id="down-clues"></div>
    </div>
  </div>

  <div id="btns">
    <button class="btn hint-btn" id="hint-btn" onclick="showHint()">💡 Hint (<span id="hints-count">3</span>)</button>
    <button class="btn" id="check-btn" onclick="checkAnswer()">✅ Check</button>
    <button class="btn" id="clear-btn" onclick="clearGrid()">🗑 Clear</button>
    <button class="btn" id="reveal-btn" onclick="revealPuzzle()">🔓 Reveal</button>
    <button class="btn primary" id="new-btn" onclick="showStart()">🆕 New Puzzle</button>
  </div>
</div>

<div id="start-overlay">
  <h2>📰 Crossword Puzzle</h2>
  <p>Fill in the grid using the clues. Click a clue to highlight its word, then type letters to fill them in.</p>
  <div class="puzzle-list" id="puzzle-list"></div>
  <button class="btn primary" onclick="hideStart()" style="margin-top:14px">✕ Close</button>
</div>

<div id="win-overlay" class="hidden">
  <h2>🎉 Puzzle Complete!</h2>
  <p id="win-msg"></p>
  <button class="btn primary" onclick="showStart()">🆕 Next Puzzle</button>
  <button class="btn" onclick="hideWin()">✕ Stay</button>
</div>

<script src="/monetag-safe.js?v=9"></script>
<script src="game.js"></script>
</body>
</html>
