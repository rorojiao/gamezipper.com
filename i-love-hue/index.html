<script>
(()=>{
'use strict';

/* ============================================================
   STATE
   ============================================================ */
const STORE_KEY='ilovehue_v1';
const TOTAL_LEVELS=30;
const TIER_SIZE=6;
const TIERS=[
  {name:'Beginner',size:4,scramble:.60,type:'linear'},
  {name:'Easy',size:5,scramble:.70,type:'radial'},
  {name:'Medium',size:6,scramble:.75,type:'rainbow'},
  {name:'Hard',size:7,scramble:.80,type:'dual'},
  {name:'Expert',size:8,scramble:.85,type:'complex'}
];

const ACHIEVEMENTS=[
  {id:'first_solve',title:'First Steps',sub:'Solve your first level',icon:'1'},
  {id:'three_stars_5',title:'Perfectionist',sub:'Earn 3 stars on 5 levels',icon:'3'},
  {id:'three_stars_15',title:'Color Master',sub:'Earn 3 stars on 15 levels',icon:'M'},
  {id:'solve_10',title:'Hue Hunter',sub:'Solve 10 levels',icon:'A'},
  {id:'solve_all',title:'Complete',sub:'Solve all 30 levels',icon:'C'},
  {id:'daily_3',title:'Daily Devotee',sub:'Complete 3 daily challenges',icon:'D'},
  {id:'no_hint',title:'Pure Eye',sub:'Solve 5 levels without hints',icon:'P'},
  {id:'under_par',title:'Under Par',sub:'3-star on a Tier 5 level',icon:'U'},
  {id:'all_rainbow',title:'Rainbow Run',sub:'3-star every Tier 3 level',icon:'R'},
  {id:'speed',title:'Speed Solver',sub:'Solve a 4x4 in 5 moves or fewer',icon:'S'}
];

let state={
  v:1,
  level:1,
  unlocked:1,
  stars:{},
  achievements:[],
  noHintStreak:0,
  dailyCount:0,
  dailyDone:null,
  sfx:true,
  bgm:true
};

function loadState(){
  try{
    const s=localStorage.getItem(STORE_KEY);
    if(s){const o=JSON.parse(s);Object.assign(state,o);}
  }catch(e){}
  document.getElementById('sfx-toggle').checked=state.sfx!==false;
  document.getElementById('bgm-toggle').checked=state.bgm!==false;
}
function saveState(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}

/* ============================================================
   AUDIO
   ============================================================ */
let actx=null,masterGain=null,sfxGain=null,bgmGain=null,bgmNodes=null,bgmRunning=false;
function initAudio(){
  if(actx)return;
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=actx.createGain();
    masterGain.gain.value=.7;
    masterGain.connect(actx.destination);
    sfxGain=actx.createGain();
    sfxGain.gain.value=.55;
    sfxGain.connect(masterGain);
    bgmGain=actx.createGain();
    bgmGain.gain.value=.18;
    bgmGain.connect(masterGain);
  }catch(e){actx=null;}
}
function playTone(freq,dur,type='sine',gain=.25,slide=0){
  if(!actx||state.sfx===false)return;
  try{
    const o=actx.createOscillator();
    const g=actx.createGain();
    o.type=type;o.frequency.value=freq;
    if(slide){o.frequency.exponentialRampToValueAtTime(Math.max(20,freq+slide),actx.currentTime+dur);}
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(gain,actx.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+dur);
    o.connect(g);g.connect(sfxGain);
    o.start();o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sfxSwap(){playTone(420,.08,'triangle',.18,-80);}
function sfxCorrect(){playTone(660,.12,'sine',.15,200);}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.25,'triangle',.22),i*120));}
function sfxError(){playTone(180,.18,'sawtooth',.18,-60);}
function sfxHint(){playTone(880,.18,'sine',.16,400);}
function sfxAch(){[880,1108,1318].forEach((f,i)=>setTimeout(()=>playTone(f,.18,'triangle',.2),i*100));}

function startBGM(){
  if(!actx||bgmRunning||state.bgm===false)return;
  bgmRunning=true;
  // Ambient chord: 3 sustained sine oscillators at low gain, gently drifting
  const freqs=[174.61,220,261.63,329.63]; // F3 A3 C4 E4 (F major 7-ish)
  bgmNodes=freqs.map((f,i)=>{
    const o=actx.createOscillator();
    const g=actx.createGain();
    const lfo=actx.createOscillator();
    const lfoG=actx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.value=.07-i*.012;
    lfo.frequency.value=.05+i*.03;
    lfoG.gain.value=f*.02;
    lfo.connect(lfoG);lfoG.connect(o.frequency);
    o.connect(g);g.connect(bgmGain);
    o.start();lfo.start();
    return {o,g,lfo};
  });
}
function stopBGM(){
  if(!bgmNodes)return;
  try{
    bgmNodes.forEach(n=>{n.o.stop();n.lfo.stop();});
  }catch(e){}
  bgmNodes=null;bgmRunning=false;
}
function setBgmOn(on){
  state.bgm=on;saveState();
  if(!actx)return;
  if(on&&!bgmRunning)startBGM();
  else if(!on)stopBGM();
}
function setSfxOn(on){state.sfx=on;saveState();}

/* ============================================================
   COLOR / GRADIENT GENERATION
   ============================================================ */
function hsl(h,s,l){return `hsl(${h.toFixed(1)},${s.toFixed(1)}%,${l.toFixed(1)}%)`;}
function rng(seed){let s=seed>>>0||1;s^=s<<13;s^=s>>>17;s^=s<<5;return ((s>>>0)%1000000)/1000000;}

function getTier(level){const idx=Math.floor((level-1)/TIER_SIZE);return TIERS[idx];}

function makePalette(level){
  const t=getTier(level);
  const seed=(level*9301+49297)%233280;
  const r=rng(seed);
  const r2=rng(seed+7);
  const r3=rng(seed+13);
  let baseHue=r*360;
  let hueRange=180+r2*180;
  let sat=55+r3*30;
  let lightBase=50+r2*10;
  return {baseHue,hueRange,sat,lightBase};
}

function genTarget(level){
  const t=getTier(level);
  const n=t.size;
  const pal=makePalette(level);
  const arr=[];
  for(let r=0;r<n;r++){
    for(let c=0;c<n;c++){
      let h,s,l;
      const u=c/(n-1),v=r/(n-1);
      switch(t.type){
        case 'linear':
          h=pal.baseHue+pal.hueRange*(c<r?u:v);
          s=pal.sat;
          l=pal.lightBase+(r*4-2*(n-1));
          break;
        case 'radial':{
          const dx=u-.5,dy=v-.5;
          const d=Math.sqrt(dx*dx+dy*dy)*2;
          const ang=Math.atan2(dy,dx)*180/Math.PI;
          h=pal.baseHue+pal.hueRange*.5*d+ang*.3;
          s=pal.sat;
          l=pal.lightBase-pal.lightBase*.3*(1-d)+10;
          break;
        }
        case 'rainbow':
          h=pal.baseHue+pal.hueRange*(u*.6+Math.sin(v*Math.PI)*.4);
          s=pal.sat;
          l=pal.lightBase+Math.sin((u+v)*Math.PI*1.2)*10;
          break;
        case 'dual':
          h=pal.baseHue+pal.hueRange*u;
          s=pal.sat;
          l=pal.lightBase-20+v*40;
          break;
        case 'complex':
        default:
          h=pal.baseHue+pal.hueRange*(u*.5+Math.sin(v*Math.PI*1.5)*.3+Math.cos(u*Math.PI)*.2);
          s=pal.sat-Math.abs(u-.5)*20;
          l=pal.lightBase-15+v*35-Math.abs(u-.5)*15;
          break;
      }
      h=((h%360)+360)%360;
      s=Math.max(20,Math.min(95,s));
      l=Math.max(20,Math.min(82,l));
      arr.push({h,s,l,id:arr.length});
    }
  }
  return arr;
}

/* ============================================================
   GAME LOGIC
   ============================================================ */
let G=null;

function newGame(level,opts={}){
  const t=getTier(level);
  const n=t.size;
  const target=genTarget(level);
  const N=n*n;
  let order=Array.from({length:N},(_,i)=>i);
  if(opts.dailySeed!==undefined){
    // seeded shuffle
    const seed=opts.dailySeed;
    let s=seed;
    for(let i=N-1;i>0;i--){
      s=(s*9301+49297)%233280;
      const j=Math.floor((s/233280)*(i+1));
      [order[i],order[j]]=[order[j],order[i]];
    }
  }else if(opts.daily){
    const seed=new Date().toISOString().slice(0,10).split('-').reduce((a,b)=>a*31+parseInt(b,10),1);
    let s=seed;
    for(let i=N-1;i>0;i--){
      s=(s*9301+49297)%233280;
      const j=Math.floor((s/233280)*(i+1));
      [order[i],order[j]]=[order[j],order[i]];
    }
  }else{
    // shuffle keeping first tiles "correct" to leave them in place
    const scrambleCount=Math.max(2,Math.floor(N*t.scramble*.4));
    for(let k=0;k<scrambleCount;k++){
      let a=Math.floor(Math.random()*N);
      let b=Math.floor(Math.random()*N);
      [order[a],order[b]]=[order[b],order[a]];
    }
  }
  G={
    level,n,target,
    tiles:order.slice(),
    initial:order.slice(),
    moves:0,
    selected:-1,
    hints:3,
    hintTarget:-1,
    undoStack:[],
    won:false,
    perfect:false,
    correctSet:order.map((tid,i)=>tid===i)
  };
  // detect if some tiles are already correct -> perfect opportunity
  // we'll track no-hint-streak elsewhere
  document.getElementById('hud-level').textContent=level+(opts.daily?' (Daily)':'');
  document.getElementById('hud-hints').textContent=`Hints: ${G.hints}`;
  updateHUD();
  showGame();
}

function correctCount(){
  let c=0;
  for(let i=0;i<G.tiles.length;i++)if(G.tiles[i]===i)c++;
  return c;
}

function isCorrect(idx){return G.tiles[idx]===idx;}

function isComplete(){
  for(let i=0;i<G.tiles.length;i++)if(G.tiles[i]!==i)return false;
  return true;
}

function tryTap(idx){
  if(G.won)return;
  initAudio();
  if(G.selected<0){
    G.selected=idx;
    sfxSwap();
    return;
  }
  if(G.selected===idx){
    G.selected=-1;
    return;
  }
  // swap
  G.undoStack.push({a:G.selected,b:idx,prevCorrect:[...G.correctSet]});
  const a=G.selected,b=idx;
  const t1=G.tiles[a],t2=G.tiles[b];
  G.tiles[a]=t2;G.tiles[b]=t1;
  // update correctness
  G.correctSet[a]=(G.tiles[a]===a);
  G.correctSet[b]=(G.tiles[b]===b);
  G.selected=-1;
  G.moves++;
  updateHUD();
  sfxSwap();
  const correctNow=correctCount();
  document.getElementById('status-progress').textContent=`${correctNow} / ${G.n*G.n} correct`;
  // check win
  if(isComplete()){
    G.won=true;
    onWin();
  }
}

function undo(){
  if(!G.undoStack.length)return;
  const m=G.undoStack.pop();
  [G.tiles[m.a],G.tiles[m.b]]=[G.tiles[m.b],G.tiles[m.a]];
  G.correctSet=m.prevCorrect;
  G.moves=Math.max(0,G.moves-1);
  G.selected=-1;
  G.hintTarget=-1;
  updateHUD();
  document.getElementById('status-progress').textContent=`${correctCount()} / ${G.n*G.n} correct`;
  sfxSwap();
}

function useHint(){
  if(G.hints<=0||G.won)return;
  // find a misplaced tile
  const wrong=[];
  for(let i=0;i<G.tiles.length;i++)if(!G.correctSet[i])wrong.push(i);
  if(!wrong.length)return;
  const idx=wrong[Math.floor(Math.random()*wrong.length)];
  G.hints--;
  G.hintTarget=idx;
  document.getElementById('hud-hints').textContent=`Hints: ${G.hints}`;
  state.noHintStreak=0;
  document.getElementById('status-msg').textContent='Hint: this tile is in the wrong spot';
  sfxHint();
  // visual flash
  const f=document.createElement('div');
  f.className='hint-flash';
  document.getElementById('board-wrap').appendChild(f);
  setTimeout(()=>{if(f.parentNode)f.parentNode.removeChild(f);G.hintTarget=-1;},1300);
}

function reshuffle(){
  const n=G.n,N=n*n;
  G.tiles=Array.from({length:N},(_,i)=>i);
  const count=Math.max(2,Math.floor(N*getTier(G.level).scramble*.5));
  for(let k=0;k<count;k++){
    const a=Math.floor(Math.random()*N);
    const b=Math.floor(Math.random()*N);
    [G.tiles[a],G.tiles[b]]=[G.tiles[b],G.tiles[a]];
  }
  G.correctSet=G.tiles.map((t,i)=>t===i);
  G.selected=-1;G.hintTarget=-1;G.undoStack=[];G.moves=0;G.hints=3;G.won=false;
  document.getElementById('hud-hints').textContent=`Hints: ${G.hints}`;
  document.getElementById('status-msg').textContent='Match the gradient';
  updateHUD();
  sfxSwap();
}

function computeStars(level,moves,n){
  // 3 stars <= n^1.5, 2 stars <= n^2
  const a=Math.pow(n,1.5);
  const b=n*n;
  if(moves<=Math.ceil(a))return 3;
  if(moves<=b)return 2;
  return 1;
}

function onWin(){
  sfxWin();
  const level=G.level;
  const n=G.n;
  const stars=computeStars(level,G.moves,n);
  const prev=state.stars[level]||0;
  state.stars[level]=Math.max(prev,stars);
  // unlock next
  if(level<TOTAL_LEVELS&&state.unlocked<=level)state.unlocked=level+1;
  // daily
  const today=new Date().toISOString().slice(0,10);
  if(state.dailyDone!==today){
    state.dailyDone=today;
    state.dailyCount=(state.dailyCount||0)+1;
  }
  if(G.moves<=5&&n===4){state.speedSolve=true;}
  state.noHintStreak=(state.noHintStreak||0)+(G.hints===3?1:0);
  saveState();
  checkAchievements();
  showWinOverlay(stars,level);
  spawnConfetti();
}

function checkAchievements(){
  const solveCount=Object.keys(state.stars).length;
  const threeStars=Object.values(state.stars).filter(s=>s===3).length;
  const tier5Levels=[25,26,27,28,29,30];
  const tier5Three=tier5Levels.every(l=>state.stars[l]===3);
  const tier3Levels=[13,14,15,16,17,18];
  const tier3Three=tier3Levels.every(l=>state.stars[l]===3);
  const ach=[
    ['first_solve',solveCount>=1],
    ['three_stars_5',threeStars>=5],
    ['three_stars_15',threeStars>=15],
    ['solve_10',solveCount>=10],
    ['solve_all',solveCount>=TOTAL_LEVELS],
    ['daily_3',(state.dailyCount||0)>=3],
    ['no_hint',(state.noHintStreak||0)>=5],
    ['under_par',tier5Three],
    ['all_rainbow',tier3Three],
    ['speed',state.speedSolve===true]
  ];
  let newAch=null;
  for(const [id,cond] of ach){
    if(cond&&!state.achievements.includes(id)){
      state.achievements.push(id);
      newAch=id;
    }
  }
  saveState();
  if(newAch){
    sfxAch();
    const a=ACHIEVEMENTS.find(x=>x.id===newAch);
    showToast(`Achievement: ${a.title}`);
  }
}

/* ============================================================
   UI / RENDER
   ============================================================ */
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
let DPR=window.devicePixelRatio||1;
let CSS=520;
let rafId=null;
let bgHueShift=0;

function resize(){
  const wrap=document.getElementById('board-wrap');
  const w=wrap.clientWidth;
  CSS=Math.max(280,Math.min(520,w));
  canvas.style.width=CSS+'px';
  canvas.style.height=CSS+'px';
  canvas.width=Math.round(CSS*DPR);
  canvas.height=Math.round(CSS*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

function tilePixel(idx){
  const n=G.n;
  const margin=CSS*.04;
  const gap=Math.max(2,CSS*.012);
  const boardSize=CSS-margin*2;
  const tileSize=(boardSize-gap*(n-1))/n;
  const r=Math.floor(idx/n),c=idx%n;
  return {
    x:margin+c*(tileSize+gap),
    y:margin+r*(tileSize+gap),
    size:tileSize
  };
}

function render(){
  if(!G)return;
  ctx.clearRect(0,0,CSS,CSS);
  // background subtle grid hint
  const n=G.n;
  for(let i=0;i<n;i++)for(let j=0;j<n;j++){
    const p=tilePixel(i*n+j);
    ctx.fillStyle='rgba(255,255,255,.02)';
    roundRect(ctx,p.x,p.y,p.size,p.size,Math.max(4,p.size*.08));
    ctx.fill();
  }
  // tiles
  const radius=Math.max(4,Math.min(10,G.n===4?10:G.n===5?8:G.n===6?7:G.n===7?6:5));
  for(let i=0;i<G.tiles.length;i++){
    const p=tilePixel(i);
    const tile=G.target[G.tiles[i]];
    // shadow
    ctx.fillStyle='rgba(0,0,0,.35)';
    roundRect(ctx,p.x+1,p.y+2,p.size,p.size,radius);
    ctx.fill();
    // color
    ctx.fillStyle=hsl(tile.h,tile.s,tile.l);
    roundRect(ctx,p.x,p.y,p.size,p.size,radius);
    ctx.fill();
    // subtle highlight top
    ctx.fillStyle='rgba(255,255,255,.12)';
    roundRect(ctx,p.x,p.y,p.size,p.size*.4,radius);
    ctx.fill();
    // correct glow
    if(G.correctSet[i]){
      ctx.strokeStyle='rgba(120,255,180,.65)';
      ctx.lineWidth=2;
      roundRect(ctx,p.x+1,p.y+1,p.size-2,p.size-2,radius);
      ctx.stroke();
      ctx.shadowColor='rgba(120,255,180,.6)';
      ctx.shadowBlur=8;
      ctx.stroke();
      ctx.shadowBlur=0;
    }
    // hint flash
    if(G.hintTarget===i){
      ctx.strokeStyle='rgba(249,202,36,.95)';
      ctx.lineWidth=3;
      roundRect(ctx,p.x-1,p.y-1,p.size+2,p.size+2,radius+1);
      ctx.stroke();
      ctx.shadowColor='rgba(249,202,36,.7)';
      ctx.shadowBlur=18;
      ctx.stroke();
      ctx.shadowBlur=0;
    }
    // selected ring
    if(G.selected===i){
      ctx.strokeStyle='rgba(255,255,255,.95)';
      ctx.lineWidth=3;
      roundRect(ctx,p.x-2,p.y-2,p.size+4,p.size+4,radius+2);
      ctx.stroke();
      ctx.shadowColor='rgba(255,255,255,.8)';
      ctx.shadowBlur=14;
      ctx.stroke();
      ctx.shadowBlur=0;
    }
  }
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);
  c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

function loop(){
  render();
  rafId=requestAnimationFrame(loop);
}

/* ============================================================
   POINTER EVENTS
   ============================================================ */
function eventToIdx(e){
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  const n=G.n;
  const margin=CSS*.04;
  const gap=Math.max(2,CSS*.012);
  const boardSize=CSS-margin*2;
  const tileSize=(boardSize-gap*(n-1))/n;
  if(x<margin||y<margin||x>CSS-margin||y>CSS-margin)return -1;
  const c=Math.floor((x-margin)/(tileSize+gap));
  const r=Math.floor((y-margin)/(tileSize+gap));
  if(c<0||c>=n||r<0||r>=n)return -1;
  return r*n+c;
}
canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const idx=eventToIdx(e);
  if(idx>=0)tryTap(idx);
});
canvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

/* ============================================================
   SCREENS
   ============================================================ */
function showMenu(){
  document.getElementById('menu-screen').style.display='flex';
  document.getElementById('game-screen').style.display='none';
  buildLevelGrid();
  buildAchievements();
  updateMenuStats();
  stopBGM();
}
function showGame(){
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  resize();
  if(!rafId)loop();
  if(state.bgm!==false)startBGM();
}
function updateMenuStats(){
  const solved=Object.keys(state.stars).length;
  const stars=Object.values(state.stars).reduce((a,b)=>a+b,0);
  document.getElementById('menu-stats').innerHTML=`Solved <b>${solved}/${TOTAL_LEVELS}</b> · Stars <b>${stars}/${TOTAL_LEVELS*3}</b> · Achievements <b>${state.achievements.length}/${ACHIEVEMENTS.length}</b>`;
}
function updateHUD(){
  if(!G)return;
  document.getElementById('hud-moves').textContent=G.moves;
  const s=state.stars[G.level]||0;
  const html='★'.repeat(s)+'<span style="color:#444">'+'★'.repeat(3-s)+'</span>';
  document.getElementById('hud-stars').innerHTML=html;
  document.getElementById('btn-hint').disabled=G.hints<=0||G.won;
  document.getElementById('btn-undo').disabled=G.undoStack.length===0||G.won;
  document.getElementById('status-progress').textContent=`${correctCount()} / ${G.n*G.n} correct`;
}

function buildLevelGrid(){
  const grid=document.getElementById('level-grid');
  grid.innerHTML='';
  for(let lvl=1;lvl<=TOTAL_LEVELS;lvl++){
    const tier=Math.floor((lvl-1)/TIER_SIZE);
    if((lvl-1)%TIER_SIZE===0){
      const t=TIERS[tier];
      const lbl=document.createElement('div');
      lbl.className='lvl-tier';
      lbl.textContent=`${t.name} · ${t.size}×${t.size}`;
      grid.appendChild(lbl);
    }
    const el=document.createElement('div');
    el.className='lvl-tile'+(lvl>state.unlocked?' locked':'');
    const s=state.stars[lvl]||0;
    el.innerHTML=`<div>${lvl>state.unlocked?'?':lvl}</div>
      <div class="s-row">${lvl>state.unlocked?'':'★'.repeat(s)+'☆'.repeat(3-s)}</div>`;
    if(lvl<=state.unlocked){
      el.addEventListener('click',()=>{newGame(lvl);});
    }
    grid.appendChild(el);
  }
}

function buildAchievements(){
  const box=document.getElementById('achievements');
  box.innerHTML='';
  ACHIEVEMENTS.forEach(a=>{
    const got=state.achievements.includes(a.id);
    const row=document.createElement('div');
    row.className='ach-row'+(got?' unlocked':'');
    row.innerHTML=`<div class="ico">${got?'<span style="color:#fff;font-weight:900;font-size:16px">'+a.icon+'</span>':'<span style="color:#555;font-weight:700;font-size:14px">'+a.icon+'</span>'}</div>
      <div><div class="title">${a.title}</div><div class="sub">${a.sub}</div></div>`;
    box.appendChild(row);
  });
}

function showWinOverlay(stars,level){
  document.getElementById('ov-title').textContent=stars===3?'Perfect!':stars===2?'Well Done':'Solved';
  document.getElementById('ov-stars').innerHTML='<span class="on">'.repeat(0)+(['★','★','★'].map((s,i)=>i<stars?`<span class="on">${s}</span>`:`<span>${s}</span>`)).join(' ');
  document.getElementById('ov-stats').innerHTML=`Level <b>${level}</b> · Moves <b>${G.moves}</b> · ${G.hints===3?'No hints used':'Hints used: '+(3-G.hints)}`;
  const isDaily=!!G._daily;
  document.getElementById('ov-next').textContent=(level>=TOTAL_LEVELS&&!isDaily)?'All Done':isDaily?'Back to Menu':'Next Level';
  document.getElementById('ov-next').onclick=()=>{
    hideOverlay();
    if(isDaily){showMenu();return;}
    if(level<TOTAL_LEVELS){newGame(level+1);}else{showMenu();}
  };
  document.getElementById('ov-replay').onclick=()=>{hideOverlay();newGame(level);};
  document.getElementById('ov-menu').onclick=()=>{hideOverlay();showMenu();};
  showOverlay();
}

function showOverlay(){document.getElementById('overlay').classList.add('show');}
function hideOverlay(){document.getElementById('overlay').classList.remove('show');}

function spawnConfetti(){
  const root=document.getElementById('win-confetti');
  const colors=['#4ecdc4','#ff6b6b','#f9ca24','#a8e6cf','#ffd3b6','#ffaaa5'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[i%colors.length];
    c.style.animationDelay=Math.random()*.6+'s';
    c.style.animationDuration=(2+Math.random()*1.4)+'s';
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    root.appendChild(c);
    setTimeout(()=>{if(c.parentNode)c.parentNode.removeChild(c);},3600);
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>t.classList.remove('show'),2400);
}

document.getElementById('btn-continue').addEventListener('click',()=>{

});

document.getElementById('btn-daily').addEventListener('click',()=>{
  const today=new Date().toISOString().slice(0,10);

  // We'll synthesize: size=6, scramble=.7, rainbow type
  const fakeLevel=TOTAL_LEVELS+1; // marker; size/tier override
  G={level:fakeLevel,n:6,scramble:.7,type:'rainbow',_daily:true};
  // build directly using daily seed
  const target=genTarget(fakeLevel);
  const N=36;
  let order=Array.from({length:N},(_,i)=>i);
  let s=seed;
  for(let i=N-1;i>0;i--){
    s=(s*9301+49297)%233280;
    const j=Math.floor((s/233280)*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  G={
    level:'Daily',
    n:6,target,
    tiles:order.slice(),
    initial:order.slice(),
    moves:0,selected:-1,hints:3,hintTarget:-1,
    undoStack:[],won:false,_daily:true,

  };
  document.getElementById('hud-level').textContent='Daily';
  document.getElementById('hud-hints').textContent='Hints: 3';

  updateHUD();
  showGame();
});

document.getElementById('btn-hint').addEventListener('click',()=>{initAudio();useHint();});
document.getElementById('btn-undo').addEventListener('click',()=>{initAudio();undo();});
document.getElementById('btn-shuffle').addEventListener('click',()=>{initAudio();reshuffle();});

});
document.getElementById('bgm-toggle').addEventListener('change',e=>{
  initAudio();setBgmOn(e.target.checked);
});

window.addEventListener('resize',()=>{if(G&&document.getElementById('game-screen').style.display!=='none'){resize();}});
window.addEventListener('orientationchange',()=>setTimeout(resize,250));

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    cancelAnimationFrame(rafId);rafId=null;

  }else if(G&&document.getElementById('game-screen').style.display!=='none'){

    if(state.bgm!==false)startBGM();

  cancelAnimationFrame(rafId);rafId=null;stopBGM();
  try{if(actx)actx.close();}catch(e){}

  initAudio();
  if(actx&&actx.state==='suspended')actx.resume();
  if(state.bgm!==false)startBGM();
  document.removeEventListener('pointerdown',resumeAudio);
  document.removeEventListener('keydown',resumeAudio);
};
document.addEventListener('pointerdown',resumeAudio);
document.addEventListener('keydown',resumeAudio);
