function setupAudio(){/* lazy init */}
function ensureAudio(){if(!S.audioCtx){try{S.audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function playTone(freq,dur,type,vol){if(!S.sfxOn)return;ensureAudio();if(!S.audioCtx)return;
  try{var o=S.audioCtx.createOscillator(),g=S.audioCtx.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.value=0;g.gain.setValueAtTime(0,S.audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol||.15,S.audioCtx.currentTime+.01);
  g.gain.exponentialRampToValueAtTime(.001,S.audioCtx.currentTime+(dur||.15));
  o.connect(g);g.connect(S.audioCtx.destination);
  o.start();o.stop(S.audioCtx.currentTime+(dur||.15));}catch(e){}}

function startBGM(){if(!S.musicOn||BGM.playing)return;ensureAudio();if(!S.audioCtx)return;
  BGM.playing=true;BGM.nextTime=S.audioCtx.currentTime+.1;BGM.step=0;
  var tempo=100;var spb=60/tempo;
  var chords=[[262,330,392],[294,370,440],[330,416,494],[294,370,440]];
  function schedule(){if(!BGM.playing)return;var now=S.audioCtx.currentTime;
    while(BGM.nextTime<now+.2){var chord=chords[BGM.step%4];var dur=spb*2;
      for(var i=0;i<chord.length;i++){
        var o=S.audioCtx.createOscillator(),g=S.audioCtx.createGain();
        o.type='sine';o.frequency.value=chord[i];

  ov.innerHTML='<div class="overlay-content" style="width:min(420px,90vw);text-align:left">'+
    '<div style="font-size:20px;font-weight:700;margin-bottom:16px;text-align:center">How to Play Hebi-Ichigo</div>'+
    '<div style="font-size:14px;line-height:1.8;color:#ccc">'+
    '<p><b style="color:#2ecc71">Goal:</b> Place numbered snakes (1-5) on the grid.</p>'+
    '<p><b style="color:#3498db">Rules:</b></p>'+
    '<p>1. Each snake has numbers 1 (head) through 5 (tail) in a connected chain.</p>'+
    '<p>2. Snakes cannot share sides with other snakes.</p>'+
    '<p>3. Arrow clues in black cells show the nearest snake number visible in that direction.</p>'+
    '<p>4. From the head (1) looking toward (2), no other snake should be visible.</p>'+
    '<p><b style="color:#f39c12">Controls:</b></p>'+
    '<p>Tap a cell to cycle through numbers 1-5, then blank.</p>'+
    '<p>Keyboard: 1-5 to place, 0/Delete to erase, H for hint.</p>'+
    '</div>'+
    '<div style="margin-top:20px;text-align:center"><button class="btn btn-primary" onclick="closeOverlay()">Got it!</button></div>'+
    '</div>';
  document.body.appendChild(ov);
}

// ===== GAME =====
function startGame(idx){
  S.screen='game';S.levelIdx=idx;S.hints=3;
  var lv=LEVELS[idx];
  S.grid=[];for(var r=0;r<lv.size;r++){S.grid.push([]);for(var c=0;c<lv.size;c++){
    S.grid[r].push(lv.solution[r][c]===-1?-1:0);}}
  S.t0=Date.now();S.elapsed=0;S.selectedNum=1;
  if(S.timerInt)clearInterval(S.timerInt);
  S.timerInt=setInterval(function(){S.elapsed=Math.floor((Date.now()-S.t0)/1000);updateHud();},1000);
  buildGameUI();startBGM();
}

function buildGameUI(){
  var app=document.getElementById('app');app.innerHTML='';
  var lv=LEVELS[S.levelIdx];
  var container=document.createElement('div');container.className='fade-in';
  container.style.cssText='width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center;gap:8px';
  
  // HUD top
  var hud=document.createElement('div');hud.className='hud-top';
  hud.innerHTML='<div class="hud-info">'+
    '<span>Level '+(S.levelIdx+1)+'</span>'+
    '<span class="tier-badge t'+lv.tier+'">'+lv.tier_name+'</span>'+
    '<span id="timer">0:00</span>'+
    '<span id="hints-left">&#128161; '+S.hints+'</span>'+
    '</div>'+
    '<div class="hud-btns">'+
    '<button class="icon-btn" onclick="doHint()" title="Hint">&#128161;</button>'+
    '<button class="icon-btn" onclick="doRestart()" title="Restart">&#8635;</button>'+
    '<button class="icon-btn" onclick="pauseGame()" title="Menu">&#9776;</button>'+
    '</div>';
  container.appendChild(hud);
  
  // Canvas
  var maxW=Math.min(window.innerWidth-16,520);
  S.cellSize=Math.floor(maxW/lv.size);
  var canvasSize=S.cellSize*lv.size;
  var canvas=document.createElement('canvas');
  canvas.width=canvasSize;canvas.height=canvasSize;
  canvas.style.borderRadius='8px';
  canvas.style.touchAction='none';
  S.canvas=canvas;S.ctx=canvas.getContext('2d');
  container.appendChild(canvas);
  
  // Number selector
  var sel=document.createElement('div');sel.style.cssText='display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center';
  for(var n=1;n<=5;n++){
    sel.innerHTML+='<button class="btn btn-sm '+(n===S.selectedNum?'btn-primary':'btn-secondary')+'" id="sel-'+n+'" onclick="selectNum('+n+')">'+n+'</button>';
  }
  sel.innerHTML+='<button class="btn btn-sm btn-danger" onclick="selectNum(0)">Erase</button>';
  container.appendChild(sel);
  
  // Bottom buttons
  var btns=document.createElement('div');btns.style.cssText='display:flex;gap:8px;margin-top:4px';
  btns.innerHTML='<button class="btn btn-secondary btn-sm" onclick="checkSolution()">Check</button>';
  container.appendChild(btns);
  
  app.appendChild(container);
  drawGrid();
  
  // Pointer events
  canvas.addEventListener('pointerdown',onPointerDown);
  canvas.addEventListener('pointermove',onPointerMove);
  canvas.addEventListener('pointerup',onPointerUp);
  canvas.addEventListener('pointercancel',onPointerUp);
}

function selectNum(n){S.selectedNum=n;sfxClick();
  for(var i=1;i<=5;i++){var el=document.getElementById('sel-'+i);if(el){el.className='btn btn-sm '+(i===n?'btn-primary':'btn-secondary');}}
}

function onPointerDown(e){
  e.preventDefault();
  var rect=S.canvas.getBoundingClientRect();
  var x=(e.clientX-rect.left)/rect.width*S.canvas.width;
  var y=(e.clientY-rect.top)/rect.height*S.canvas.height;
  var c=Math.floor(x/S.cellSize),r=Math.floor(y/S.cellSize);
  var lv=LEVELS[S.levelIdx];
  if(r<0||r>=lv.size||c<0||c>=lv.size)return;
  if(S.grid[r][c]===-1)return;
  
  if(S.selectedNum===0){
    if(S.grid[r][c]>0){S.grid[r][c]=0;sfxErase();}
  }else{
    S.grid[r][c]=S.selectedNum;sfxPlace();
  }
  drawGrid();
  if(S.autoCheck)checkSolution(true);
}

function onPointerMove(e){}
function onPointerUp(e){}

// ===== DRAWING =====
function drawGrid(){
  var ctx=S.ctx,cs=S.cellSize,lv=LEVELS[S.levelIdx],N=lv.size;
  ctx.clearRect(0,0,S.canvas.width,S.canvas.height);
  
  // Background
  ctx.fillStyle='#2a2a3e';
  ctx.fillRect(0,0,S.canvas.width,S.canvas.height);
  
  // Draw cells
  for(var r=0;r<N;r++){
    for(var c=0;c<N;c++){
      var x=c*cs,y=r*cs;
      var val=S.grid[r][c];
      
      if(val===-1){
        // Black cell with clue
        ctx.fillStyle='#1a1a2a';
        ctx.fillRect(x,y,cs,cs);
        // Find clue at this position
        var clue=null;
        for(var ci=0;ci<lv.clues.length;ci++){
          if(lv.clues[ci].r===r&&lv.clues[ci].c===c){clue=lv.clues[ci];break;}}
        if(clue){
          // Draw arrow
          ctx.strokeStyle='#f0f0f0';
          ctx.lineWidth=Math.max(2,cs*.06);
          ctx.lineCap='round';
          var cx=x+cs/2,cy=y+cs/2;
          var arrows={'U':[0,-1],'D':[0,1],'L':[-1,0],'R':[1,0]};
          var d=arrows[clue.dir];
          var al=cs*.22;
          ctx.beginPath();
          ctx.moveTo(cx-d[0]*al*.5,cy-d[1]*al*.5);
          ctx.lineTo(cx+d[0]*al*.5,cy+d[1]*al*.5);
          // Arrow head
          ctx.lineTo(cx+d[0]*al*.5-d[1]*cs*.08,cy+d[1]*al*.5+d[0]*cs*.08);
          ctx.moveTo(cx+d[0]*al*.5,cy+d[1]*al*.5);
          ctx.lineTo(cx+d[0]*al*.5+d[1]*cs*.08,cy+d[1]*al*.5-d[0]*cs*.08);
          ctx.stroke();
          // Number
          ctx.fillStyle='#f0f0f0';
          ctx.font='bold '+Math.floor(cs*.26)+'px Inter,sans-serif';
          ctx.textAlign='center';
          ctx.textBaseline='middle';
          var offset=cs*.22;
          var nx=cx,ny=cy;
          if(clue.dir==='U')ny=cy+offset;
          if(clue.dir==='D')ny=cy-offset;
          if(clue.dir==='L')nx=cx+offset;
          if(clue.dir==='R')nx=cx-offset;
          ctx.fillText(clue.num,nx,ny);
        }
      }else{
        // White cell (empty or filled)
        if(val>0){
          ctx.fillStyle='#4a5a9a';
        }else{
          ctx.fillStyle='#f0f0f5';
        }
        ctx.fillRect(x,y,cs,cs);
        
        if(val>0){
          // Draw snake segment circle
          var colors=['','#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db'];
          ctx.fillStyle=colors[val]||'#fff';
          ctx.beginPath();
          ctx.arc(x+cs/2,y+cs/2,cs*.34,0,Math.PI*2);
          ctx.fill();
          // Number
          ctx.fillStyle='#fff';
          ctx.font='bold '+Math.floor(cs*.36)+'px Inter,sans-serif';
          ctx.textAlign='center';
          ctx.textBaseline='middle';
          ctx.fillText(val,x+cs/2,y+cs/2);
        }
      }
    }
  }
  
  // Grid lines (drawn on top)
  ctx.strokeStyle='#666680';
  ctx.lineWidth=1;
  for(var i=0;i<=N;i++){
    ctx.beginPath();
    ctx.moveTo(i*cs,0);
    ctx.lineTo(i*cs,N*cs);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0,i*cs);
    ctx.lineTo(N*cs,i*cs);
    ctx.stroke();
  }
  // Outer border
  ctx.strokeStyle='#888';
  ctx.lineWidth=2;
  ctx.strokeRect(0,0,N*cs,N*cs);
}

// ===== VALIDATION =====
function checkSolution(silent){
  var lv=LEVELS[S.levelIdx];
  // Check all white cells filled
  for(var r=0;r<lv.size;r++){
    for(var c=0;c<lv.size;c++){
      if(S.grid[r][c]===0)return false;}}
  
  // Compare with solution
  var match=true;
  for(var r=0;r<lv.size;r++){
    for(var c=0;c<lv.size;c++){
      var sv=S.grid[r][c]===-1?-1:S.grid[r][c];
      var lv2=lv.solution[r][c];
      // Allow different snake arrangements as long as clues are satisfied
      if(sv!==lv2){match=false;}
    }
  }
  
  // Even if not matching solution, check if valid by rules
  var valid=validateByRules();
  
  if(valid){
    winLevel();
    return true;
  }
  if(!silent)sfxError();
  return false;
}

function validateByRules(){
  var lv=LEVELS[S.levelIdx],N=lv.size;
  // Check all white cells have numbers
  for(var r=0;r<N;r++)for(var c=0;c<N;c++){
    if(S.grid[r][c]===0)return false;}
  
  // Check clue satisfaction
  for(var ci=0;ci<lv.clues.length;ci++){
    var cl=lv.clues[ci],r=cl.r,c=cl.c;
    var dirs={'U':[-1,0],'D':[1,0],'L':[0,-1],'R':[0,1]};
    var d=dirs[cl.dir];var nr=r+d[0],nc=c+d[1];
    var found=0;
    while(nr>=0&&nr<N&&nc>=0&&nc<N){
      if(S.grid[nr][nc]>0){found=S.grid[nr][nc];break;}
      if(S.grid[nr][nc]===-1)break;
      nr+=d[0];nc+=d[1];}
    if(found!==cl.num)return false;}
  
  // Check snakes are properly formed
  var visited=[],snakes=[];
  for(var r=0;r<N;r++){visited.push([]);for(var c=0;c<N;c++)visited[r].push(false);}
  for(var r=0;r<N;r++)for(var c=0;c<N;c++){
    if(S.grid[r][c]===1&&!visited[r][c]){
      var snake=[];var cr=r,cc=c;var val=1;
      while(cr>=0&&cr<N&&cc>=0&&cc<N&&S.grid[cr][cc]===val&&!visited[cr][cc]){
        visited[cr][cc]=true;snake.push([cr,cc]);
        if(val>=5)break;
        // Find next cell (val+1) in neighbors
        var found2=false;
        for(var dr=-1;dr<=1&&!found2;dr++)for(var dc=-1;dc<=1&&!found2;dc++){
          if(Math.abs(dr)+Math.abs(dc)!==1)continue;
          var nr2=cr+dr,nc2=cc+dc;
          if(nr2>=0&&nr2<N&&nc2>=0&&nc2<N&&S.grid[nr2][nc2]===val+1){
            cr=nr2;cc=nc2;val++;found2=true;}}
        if(!found2)break;}
      if(snake.length===5)snakes.push(snake);}}
  
  if(snakes.length!==lv.num_snakes)return false;
  
  // Check snakes don't touch
  var sid={};
  for(var i=0;i<snakes.length;i++)for(var j=0;j<snakes[i].length;j++){
    sid[snakes[i][j][0]+','+snakes[i][j][1]]=i;}
  for(var i=0;i<snakes.length;i++)for(var j=0;j<snakes[i].length;j++){
    var r=snakes[i][j][0],c=snakes[i][j][1];
    for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
      if(Math.abs(dr)+Math.abs(dc)!==1)continue;
      var nr=r+dr,nc=c+dc;
      var key=nr+','+nc;
      if(sid[key]!==undefined&&sid[key]!==i)return false;}}
  
  return true;
}

function winLevel(){
  if(S.timerInt){clearInterval(S.timerInt);S.timerInt=null;}
  sfxWin();stopBGM();
  var time=S.elapsed;
  var par=LEVELS[S.levelIdx].par_time;
  var stars=1;if(time<par)stars=2;if(time<par*.6)stars=3;
  var prev=S.stars[S.levelIdx]||0;
  if(stars>prev)S.stars[S.levelIdx]=stars;
  if(S.levelIdx+2>S.unlocked&&S.levelIdx+1<30)S.unlocked=S.levelIdx+2;
  saveProgress();
  
  var ov=document.createElement('div');ov.className='overlay';
  var starHtml='';for(var i=0;i<3;i++)starHtml+='<span class="'+(i<stars?'filled':'empty')+'">&#9733;</span>';
  ov.innerHTML='<div class="overlay-content pop" style="width:min(340px,90vw)">'+
    '<div style="font-size:28px;font-weight:900;background:linear-gradient(135deg,#2ecc71,#27ae60);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">Solved!</div>'+
    '<div class="star-display" style="margin-bottom:16px">'+starHtml+'</div>'+
    '<div style="color:#aaa;font-size:14px;margin-bottom:20px">Time: '+Math.floor(time/60)+':'+String(time%60).padStart(2,'0')+'</div>'+
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'+
    (S.levelIdx+1<30?'<button class="btn btn-primary" onclick="closeOverlay();startGame('+(S.levelIdx+1)+')">Next Level</button>':'')+
    '<button class="btn btn-secondary" onclick="closeOverlay();startLevelSelect()">Level Select</button>'+
    '<button class="btn btn-secondary" onclick="closeOverlay();buildMenu()">Main Menu</button>'+
    '</div></div>';
  document.body.appendChild(ov);
}

// ===== ACTIONS =====
function doHint(){
  if(S.hints<=0){showToast('No hints left!');return;}
  var lv=LEVELS[S.levelIdx];
  // Find a wrong/empty white cell
  var candidates=[];
  for(var r=0;r<lv.size;r++)for(var c=0;c<lv.size;c++){
    if(S.grid[r][c]!==lv.solution[r][c]&&lv.solution[r][c]>0){
      candidates.push({r:r,c:c,val:lv.solution[r][c]});}}
  if(candidates.length===0){showToast('Everything looks correct!');return;}
  var pick=candidates[Math.floor(Math.random()*candidates.length)];
  S.grid[pick.r][pick.c]=pick.val;S.hints--;
  sfxHint();drawGrid();updateHud();
  showToast('Hint: Cell ('+(pick.r+1)+','+(pick.c+1)+') = '+pick.val);
  if(S.autoCheck)checkSolution(true);
}

function doRestart(){
  sfxClick();startGame(S.levelIdx);
}

function pauseGame(){
  sfxClick();stopBGM();
  if(S.timerInt){clearInterval(S.timerInt);S.timerInt=null;}
  var ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="overlay-content" style="width:min(320px,90vw)">'+
    '<div style="font-size:20px;font-weight:700;margin-bottom:16px">Paused</div>'+
    '<div style="display:flex;flex-direction:column;gap:8px">'+
    '<button class="btn btn-primary" onclick="resumeGame()">Resume</button>'+
    '<button class="btn btn-secondary" onclick="closeOverlay();doRestart()">Restart Level</button>'+
    '<button class="btn btn-secondary" onclick="closeOverlay();startLevelSelect()">Level Select</button>'+
    '<button class="btn btn-secondary" onclick="closeOverlay();buildMenu()">Main Menu</button>'+
    '</div></div>';
  document.body.appendChild(ov);
}

function resumeGame(){
  closeOverlay();S.t0=Date.now()-S.elapsed*1000;
  S.timerInt=setInterval(function(){S.elapsed=Math.floor((Date.now()-S.t0)/1000);updateHud();},1000);
  startBGM();
}

function updateHud(){
  var el=document.getElementById('timer');
  if(el){var m=Math.floor(S.elapsed/60),s2=S.elapsed%60;
    el.textContent=m+':'+String(s2).padStart(2,'0');}
  var hl=document.getElementById('hints-left');
  if(hl)hl.innerHTML='&#128161; '+S.hints;
}

// ===== TOAST =====
var toastTimer=null;
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('show');},2000);
}

// ===== KEYBOARD =====
document.addEventListener('keydown',function(e){
  if(S.screen!=='game')return;
  if(e.key>='0'&&e.key<='5'){selectNum(parseInt(e.key));return;}
  if(e.key==='h'||e.key==='H'){doHint();return;}
  if(e.key==='r'||e.key==='R'){doRestart();return;}
  if(e.key==='Escape'){pauseGame();return;}
});

// ===== RESIZE =====
window.addEventListener('resize',function(){if(S.screen==='game')buildGameUI();});

// ===== CLEANUP =====
function cleanup(){
  if(S.timerInt){clearInterval(S.timerInt);S.timerInt=null;}
  if(S.rafId){cancelAnimationFrame(S.rafId);S.rafId=null;}
  stopBGM();
  if(S.audioCtx){try{S.audioCtx.close();}catch(e){}S.audioCtx=null;}
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
  if(document.hidden){stopBGM();if(S.timerInt){clearInterval(S.timerInt);S.timerInt=null;}}
  else if(S.screen==='game'){resumeGame();}
});

// ===== START =====
init();
