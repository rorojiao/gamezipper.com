<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Loop path - curved connections -->
  <path d="M 30 30 Q 50 30 50 50 Q 50 70 70 70" stroke="#00f2fe" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glowStrong)"/>
  <path d="M 70 70 Q 70 50 50 50 Q 30 50 30 30" stroke="#a855f7" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glowStrong)"/>
  <!-- Center cross connection -->
  <line x1="40" y1="50" x2="60" y2="50" stroke="#00f2fe" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="50" y1="40" x2="50" y2="60" stroke="#a855f7" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Corner nodes -->
  <circle cx="30" cy="30" r="6" fill="#141432" stroke="#00f2fe" stroke-width="2" filter="url(#glowStrong)"/>
  <circle cx="70" cy="70" r="6" fill="#141432" stroke="#a855f7" stroke-width="2" filter="url(#glowStrong)"/>
  <circle cx="50" cy="50" r="8" fill="#141432" stroke="#00f2fe" stroke-width="2" filter="url(#glowStrong)"/>
</svg>
