<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;height:100%;width:100%}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#1a1a3e 50%,#0d0d2b 100%);color:#e8e8e8;display:flex;align-items:center;justify-content:center}
#app{width:100%;max-width:480px;height:100vh;height:100dvh;position:relative;overflow:hidden;display:flex;flex-direction:column}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.screen.active{opacity:1;pointer-events:auto}
.btn{padding:14px 36px;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;min-width:44px;min-height:44px;outline:none;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,#00d4ff,#0080ff);color:#fff;box-shadow:0 4px 20px rgba(0,212,255,.3)}
.btn-primary:hover{box-shadow:0 6px 25px rgba(0,212,255,.4)}
.btn-secondary{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15)}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
.btn-sm{padding:10px 20px;font-size:14px;border-radius:10px}
.title{font-size:44px;font-weight:900;background:linear-gradient(135deg,#00d4ff,#a855f7,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
.sub{color:#777;font-size:14px;margin:8px 0 28px}
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 24px;width:100%;max-width:420px}
.pack-card{padding:20px 12px;border-radius:16px;text-align:center;cursor:pointer;transition:transform .15s;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08)}
.pack-card:active{transform:scale(.97)}
.pack-card .pn{font-size:16px;font-weight:700;margin:6px 0 2px}
.pack-card .pi{font-size:12px;color:#888}
.pack-card .ps{color:#ffd700;font-size:13px;margin-top:4px}
.pack-card.locked{opacity:.35;pointer-events:none}
.lv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:0 24px;width:100%;max-width:340px}
.lv-btn{width:54px;height:54px;border-radius:12px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-size:20px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .15s;min-width:44px;min-height:44px;outline:none;-webkit-tap-highlight-color:transparent}
.lv-btn:active{transform:scale(.93)}
.lv-btn .st{font-size:9px;color:#ffd700;margin-top:1px;letter-spacing:1px}
.lv-btn.done{border-color:rgba(0,212,255,.3);background:rgba(0,212,255,.08)}
.lv-btn.locked{opacity:.25;pointer-events:none}
.game-top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;flex-shrink:0}
.back-btn{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:8px;min-width:44px;min-height:44px;outline:none;-webkit-tap-highlight-color:transparent}
.coins{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:700;color:#ffd700}
.coin-ic{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#ffd700,#ff8c00);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff}
.grid-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden;position:relative}
.wheel-wrap{flex-shrink:0;padding:8px 0 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.word-prev{font-size:28px;font-weight:800;letter-spacing:6px;min-height:40px;color:#00d4ff;text-transform:uppercase}
.hints{display:flex;gap:8px}
.hbtn{padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#bbb;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;min-height:44px;outline:none;-webkit-tap-highlight-color:transparent;font-weight:600}
.hbtn:active{transform:scale(.95)}
.hbtn .c{color:#ffd700;font-size:10px;font-weight:400}
.bonus-area{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:340px;margin-top:4px}
.bonus-tag{padding:2px 7px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);border-radius:5px;font-size:10px;color:#ffd700;font-weight:600}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.active{opacity:1;pointer-events:auto}
.ov-stars{font-size:52px;letter-spacing:10px;margin:16px 0}
.ov-text{font-size:20px;font-weight:700;margin:6px 0}
.ov-coins{color:#ffd700;font-size:16px;margin:4px 0}
.ov-btns{display:flex;gap:12px;margin-top:24px}
.snd-btn{position:absolute;top:12px;left:12px;background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:8px;min-width:44px;min-height:44px;z-index:5;outline:none;-webkit-tap-highlight-color:transparent}
.pack-emoji{font-size:32px;margin-bottom:4px}

.pack-bg-forest{background:linear-gradient(135deg,#0a2a0a,#1a3a1a)!important}
.pack-bg-ocean{background:linear-gradient(135deg,#0a1a2a,#0a2a3a)!important}
.pack-bg-mountain{background:linear-gradient(135deg,#1a1a0a,#2a2a1a)!important}
.pack-bg-desert{background:linear-gradient(135deg,#2a1a00,#3a2a0a)!important}
.pack-bg-arctic{background:linear-gradient(135deg,#0a1a3a,#1a2a4a)!important}
.pack-bg-space{background:linear-gradient(135deg,#0a0a2a,#1a0a3a)!important}

#particle-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.pack-card{z-index:1;position:relative}

.title-letter{display:inline-block;font-size:80px;font-weight:900;margin:0 2px;animation:float 3s ease-in-out infinite}
.title-letter:nth-child(1){color:#00d4ff;animation-delay:0s}
.title-letter:nth-child(2){color:#a855f7;animation-delay:0.15s}
.title-letter:nth-child(3){color:#ff6b9d;animation-delay:0.3s}
.title-letter:nth-child(4){color:#fbbf24;animation-delay:0.45s}
.title-letter:nth-child(5){color:#4ade80;animation-delay:0.6s}
.title-letter:nth-child(6){color:#38bdf8;animation-delay:0.75s}
.title-letter:nth-child(7){color:#fb923c;animation-delay:0.9s}
.title-letter:nth-child(8){color:#c084fc;animation-delay:1.05s}
.title-letter:nth-child(9){color:#f472b6;animation-delay:1.2s}
.title-letter:nth-child(10){color:#34d399;animation-delay:1.35s}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}

.game-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:-1;transition:background 0.5s;background-size:cover;background-position:center}
.game-bg.theme-forest{background:linear-gradient(180deg,#0a2a0a 0%,#1a3a1a 40%,#0d1f0d 100%)}
.game-bg.theme-ocean{background:linear-gradient(180deg,#0a1a2a 0%,#0a2a3a 40%,#071a2a 100%)}
.game-bg.theme-mountain{background:linear-gradient(180deg,#1a1a2a 0%,#2a2a1a 40%,#1a1a0a 100%)}
.game-bg.theme-desert{background:linear-gradient(180deg,#2a1a00 0%,#3a2a0a 40%,#1a1000 100%)}
.game-bg.theme-arctic{background:linear-gradient(180deg,#0a1a3a 0%,#1a2a4a 40%,#0a1020 100%)}
.game-bg.theme-space{background:linear-gradient(180deg,#0a0a2a 0%,#1a0a3a 40%,#050510 100%)}

.hint-glow{animation:hintGlow 1s ease-in-out}
@keyframes hintGlow{0%{box-shadow:0 0 0 0 rgba(255,215,0,0.4)}50%{box-shadow:0 0 15px 5px rgba(255,215,0,0.6)}100%{box-shadow:0 0 0 0 rgba(255,215,0,0.4)}}

.progress-bar{width:100%;max-width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,#00d4ff,#a855f7);border-radius:2px;transition:width 0.3s}
</style>

function generateCrossword(words){
  const placed=[];
  const grid=new Map();
  
  function tryPlace(word,dir,r,c){
    for(let i=0;i<word.length;i++){
      const cr=dir==="across"?r:c+i;
      const cc=dir==="across"?c+i:c;
      const key=cr+","+cc;
      const existing=grid.get(key);
      if(existing&&existing!==word[i])return false;
      if(!existing){
        if(dir==="across"){
          if(grid.get((cr-1)+","+cc)||grid.get((cr+1)+","+cc))return false;
        }else{
          if(grid.get(cr+","+(cc-1))||grid.get(cr+","+(cc+1)))return false;
        }
      }
    }
    if(dir==="across"){
      if(grid.get(r+","+(c-1)))return false;
      if(grid.get(r+","+(c+word.length)))return false;
    }else{
      if(grid.get((r-1)+","+c))return false;
      if(grid.get((r+word.length)+","+c))return false;
    }
    return true;
  }
  
  function place(word,dir,r,c){
    const cells=[];
    for(let i=0;i<word.length;i++){
      const cr=dir==="across"?r:c+i;
      const cc=dir==="across"?c+i:c;
      grid.set(cr+","+cc,word[i]);
      cells.push([cr,cc]);
    }
    placed.push({word,dir,cells});
  }
  
  const sorted=[...words].sort((a,b)=>b.length-a.length);
  place(sorted[0],"across",0,0);
  
  for(let w=1;w<sorted.length;w++){
    const word=sorted[w];
    let best=null;
    for(const p of placed){
      for(let i=0;i<word.length;i++){
        for(let j=0;j<p.word.length;j++){
          if(word[i]===p.word[j]){
            let r,c,dir;
            if(p.dir==="across"){dir="down";r=p.cells[j][0]-i;c=p.cells[j][1];}
            else{dir="across";r=p.cells[j][0];c=p.cells[j][1]-i;}
            if(tryPlace(word,dir,r,c)){best={dir,r,c};break;}
          }
        }
        if(best)break;
      }
      if(best)break;
    }
    if(best)place(word,best.dir,best.r,best.c);
    else{
      const maxR=Math.max(0,...[...grid.keys()].map(k=>parseInt(k.split(",")[0])));
      place(word,"across",maxR+2,0);
    }
  }
  
  let minR=Infinity,minC=Infinity,maxR=-Infinity,maxC=-Infinity;
  for(const key of grid.keys()){
    const[r,c]=key.split(",").map(Number);
    minR=Math.min(minR,r);minC=Math.min(minC,c);
    maxR=Math.max(maxR,r);maxC=Math.max(maxC,c);
  }
  
  const cells=[];
  for(const[key,val]of grid){
    const[r,c]=key.split(",").map(Number);
    cells.push({r:r-minR,c:c-minC,letter:val});
  }
  
  return {cells,rows:maxR-minR+1,cols:maxC-minC+1,words:placed};
}

let audioCtx=null,bgmNodes=[],bgmGain=null;
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();bgmGain=audioCtx.createGain();bgmGain.gain.value=0.15;bgmGain.connect(audioCtx.destination);}
function playNote(freq,dur,type,vol){if(!state.soundOn||!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||"sine";o.frequency.value=freq;g.gain.setValueAtTime(vol||0.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);}

function startBGM(){if(!audioCtx||bgmNodes.length>0)return;[261.63,329.63,392,523.25].forEach(f=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.value=f;g.gain.value=0.06;o.connect(g);g.connect(bgmGain);o.start();bgmNodes.push({o,g})});}
function stopBGM(){bgmNodes.forEach(n=>{try{n.o.stop()}catch(e){}});bgmNodes=[];}

function renderPacks(){
  const g=document.getElementById("pack-grid");g.innerHTML="";
  PACKS.forEach((p,i)=>{
    const startLevel=i*5;
    const totalStars=Array.from({length:5},(_,j)=>state.levelStars[startLevel+j]||0).reduce((a,b)=>a+b,0);
    const unlocked=i===0||totalStars>=5;
    const card=document.createElement("div");
    card.className="pack-card"+(unlocked?"":" locked");
    card.style.background="linear-gradient(135deg,"+p.bg[0]+","+p.bg[1]+")";
    card.innerHTML="<div class=\"pack-emoji\">"+p.emoji+"</div><div class=\"pn\">"+p.name+"</div><div class=\"pi\">Levels "+(startLevel+1)+"-"+(startLevel+5)+"</div><div class=\"ps\">"+("\u2605".repeat(totalStars))+"\u2606".repeat(15-totalStars)+"</div>";
    if(unlocked)card.onclick=()=>{currentPack=i;renderLevels();showScreen("scr-levels");};
    g.appendChild(card);
  });
}

function renderLevels(){
  document.getElementById("lv-title").textContent=PACKS[currentPack].name;
  const startLevel=currentPack*5;
  document.getElementById("lv-sub").textContent="Levels "+(startLevel+1)+"-"+(startLevel+5);
  const g=document.getElementById("lv-grid");g.innerHTML="";
  for(let i=0;i<5;i++){
    const lvl=startLevel+i;const s=state.levelStars[lvl]||0;
    const unlocked=lvl===0||state.levelStars[lvl-1]>0;
    const btn=document.createElement("button");
    btn.className="lv-btn"+(s>0?" done":"")+(unlocked?"":" locked");
    btn.innerHTML=lvl+1+'<span class="st">'+"\u2605".repeat(s)+"\u2606".repeat(3-s)+"</span>";
    if(unlocked)btn.onclick=()=>startLevel(lvl);
    g.appendChild(btn);
  }
}

function startLevel(lvl){
  currentLevel=lvl;const data=LEVELS[lvl];if(!data)return;
  crossword=generateCrossword(data.words);
  wheelLetters=[...data.letters];shuffleArray(wheelLetters);
  wheelAngles=wheelLetters.map((_,i)=>(i/wheelLetters.length)*Math.PI*2-Math.PI/2);
  selectedWord=[];foundWords=new Set();bonusWords=new Set();stars=0;hintCount=0;
  buildGridCells();
  showScreen("scr-game");updateCoinsDisplay();renderBonusArea();setupCanvases();render();
}

function buildGridCells(){
  gridCells=[];
  crossword.cells.forEach(cell=>{
    gridCells.push({r:cell.r,c:cell.c,letter:cell.letter,x:0,y:0,size:CELL_SIZE,revealed:false,found:false,wordIndices:[]});
  });
  crossword.cells.forEach((cell,idx)=>{
    gridCells[idx].x=GRID_PADDING+cell.c*(CELL_SIZE+4);
    gridCells[idx].y=GRID_PADDING+cell.r*(CELL_SIZE+4);
  });
  crossword.words.forEach((w,wi)=>{
    w.cells.forEach(([r,c])=>{
      gridCells.forEach(cell=>{if(cell.r===r&&cell.c===c)cell.wordIndices.push(wi);});
    });
  });
}

function setupCanvases(){
  gridCanvas=document.getElementById("cvs-grid");gridCtx=gridCanvas.getContext("2d");
  wheelCanvas=document.getElementById("cvs-wheel");wheelCtx=wheelCanvas.getContext("2d");
  resizeCanvases();
}

function resizeCanvases(){
  if(!gridCanvas)return;
  const gridW=crossword.cols*(CELL_SIZE+4)+GRID_PADDING*2;
  const gridH=crossword.rows*(CELL_SIZE+4)+GRID_PADDING*2;
  gridCanvas.style.width=gridW+"px";gridCanvas.style.height=gridH+"px";
  gridCanvas.width=gridW*dpr;gridCanvas.height=gridH*dpr;
  gridCtx.setTransform(dpr,0,0,dpr,0,0);
  const ww=WHEEL_RADIUS*2+40;
  wheelCanvas.style.width=ww+"px";wheelCanvas.style.height=ww+"px";
  wheelCanvas.width=ww*dpr;wheelCanvas.height=ww*dpr;
  wheelCtx.setTransform(dpr,0,0,dpr,0,0);
  wheelCenter={x:ww/2,y:ww/2};
}

function render(){renderGrid();renderWheel();}

function renderGrid(){
  if(!gridCtx)return;const ctx=gridCtx;
  const w=parseFloat(gridCanvas.style.width),h=parseFloat(gridCanvas.style.height);
  ctx.clearRect(0,0,w,h);
  gridCells.forEach(cell=>{
    const x=cell.x,y=cell.y,s=cell.size;
    if(cell.found){ctx.fillStyle="rgba(0,212,255,0.25)";ctx.strokeStyle="rgba(0,212,255,0.5)";}
    else if(cell.revealed){ctx.fillStyle="rgba(255,215,0,0.2)";ctx.strokeStyle="rgba(255,215,0,0.4)";}
    else{ctx.fillStyle="rgba(255,255,255,0.06)";ctx.strokeStyle="rgba(255,255,255,0.15)";}
    ctx.beginPath();ctx.roundRect(x,y,s,s,8);ctx.fill();ctx.lineWidth=1.5;ctx.stroke();
    if(cell.found||cell.revealed){
      ctx.fillStyle=cell.found?"#00d4ff":"#ffd700";
      ctx.font="bold "+(s*0.45)+"px \"Segoe UI\",system-ui,sans-serif";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(cell.letter,x+s/2,y+s/2+1);
    }else{
      ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+s*0.3,y+s/2);ctx.lineTo(x+s*0.7,y+s/2);ctx.stroke();
    }
  });
  crossword.words.forEach(w=>{
    if(foundWords.has(w.word.toUpperCase()))return;
    const fc=gridCells.find(c=>c.r===w.cells[0][0]&&c.c===w.cells[0][1]);
    const lc=gridCells.find(c=>c.r===w.cells[w.cells.length-1][0]&&c.c===w.cells[w.cells.length-1][1]);
    if(!fc||!lc)return;
    ctx.strokeStyle="rgba(255,255,255,0.05)";ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(fc.x+fc.size/2,fc.y+fc.size/2);ctx.lineTo(lc.x+lc.size/2,lc.y+lc.size/2);ctx.stroke();ctx.setLineDash([]);
  });
}

function renderWheel(){
  if(!wheelCtx)return;const ctx=wheelCtx;
  const w=parseFloat(wheelCanvas.style.width),h=parseFloat(wheelCanvas.style.height);
  ctx.clearRect(0,0,w,h);
  const cx=wheelCenter.x,cy=wheelCenter.y,n=wheelLetters.length;
  if(selectedWord.length>1){
    ctx.strokeStyle="rgba(0,212,255,0.4)";ctx.lineWidth=3;ctx.beginPath();
    for(let i=0;i<selectedWord.length-1;i++){
      const a1=wheelAngles[selectedWord[i]],a2=wheelAngles[selectedWord[i+1]];
      if(i===0)ctx.moveTo(cx+Math.cos(a1)*WHEEL_RADIUS,cy+Math.sin(a1)*WHEEL_RADIUS);
      ctx.arc(cx,cy,WHEEL_RADIUS,Math.min(a1,a2),Math.max(a1,a2));
    }
    ctx.stroke();
  }
  for(let i=0;i<n;i++){
    const angle=wheelAngles[i];
    const lx=cx+Math.cos(angle)*WHEEL_RADIUS,ly=cy+Math.sin(angle)*WHEEL_RADIUS;
    const isSel=selectedWord.includes(i),lr=WHEEL_LETTER_RADIUS;
    if(isSel){ctx.fillStyle="#00d4ff";ctx.shadowColor="rgba(0,212,255,0.5)";ctx.shadowBlur=15;}
    else{ctx.fillStyle="rgba(255,255,255,0.1)";ctx.shadowColor="transparent";ctx.shadowBlur=0;}
    ctx.beginPath();ctx.arc(lx,ly,lr,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle=isSel?"#00d4ff":"rgba(255,255,255,0.2)";ctx.lineWidth=isSel?2:1;ctx.stroke();
    ctx.fillStyle=isSel?"#fff":"#e8e8e8";
    ctx.font="bold "+(lr*0.9)+"px \"Segoe UI\",system-ui,sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(wheelLetters[i],lx,ly+1);
  }
}

function getLetterAtPoint(x,y){
  const cx=wheelCenter.x,cy=wheelCenter.y;
  for(let i=0;i<wheelLetters.length;i++){
    const angle=wheelAngles[i];
    const lx=cx+Math.cos(angle)*WHEEL_RADIUS,ly=cy+Math.sin(angle)*WHEEL_RADIUS;
    if(Math.sqrt((x-lx)**2+(y-ly)**2)<WHEEL_LETTER_RADIUS+5)return i;
  }
  return-1;
}

function handlePointerDown(x,y){const idx=getLetterAtPoint(x,y);if(idx>=0&&!selectedWord.includes(idx)){selectedWord=[idx];sfxTap();updatePreview();render();}}
function handlePointerMove(x,y){if(selectedWord.length===0)return;const idx=getLetterAtPoint(x,y);if(idx>=0&&!selectedWord.includes(idx)){selectedWord.push(idx);sfxTap();updatePreview();render();}}
function handlePointerUp(){if(selectedWord.length<2){selectedWord=[];updatePreview();render();return;}const word=selectedWord.map(i=>wheelLetters[i]).join("");checkWord(word);selectedWord=[];updatePreview();render();}
function updatePreview(){const el=document.getElementById("word-prev");el.textContent=selectedWord.length===0?" ":selectedWord.map(i=>wheelLetters[i]).join("");}
function getCanvasCoords(canvas,cx,cy){const r=canvas.getBoundingClientRect();return{x:cx-r.left,y:cy-r.top};}

function checkWord(word){
  const w=word.toUpperCase();if(w.length<2)return;
  const levelWords=LEVELS[currentLevel].words.map(x=>x.toUpperCase());
  if(levelWords.includes(w)&&!foundWords.has(w)){
    foundWords.add(w);sfxWord();revealWordInGrid(w);
    if(foundWords.size===levelWords.length)setTimeout(()=>levelComplete(),500);
  }else if(DICT.has(w.toLowerCase())&&!levelWords.includes(w.toUpperCase())&&!bonusWords.has(w.toUpperCase())){
    bonusWords.add(w);state.coins++;state.bonusTotal++;updateCoinsDisplay();renderBonusArea();sfxBonus();
  }else if(!DICT.has(w.toLowerCase())){
    sfxWrong();
    const el=document.getElementById("word-prev");
    el.style.animation="none";el.offsetHeight;el.style.animation="shake 0.3s ease";
  }
}

function revealWordInGrid(word){
  const cw=crossword.words.find(x=>x.word.toUpperCase()===word.toUpperCase());
  if(!cw)return;
  cw.cells.forEach(([r,c])=>{const cell=gridCells.find(x=>x.r===r&&x.c===c);if(cell)cell.found=true;});
}

function levelComplete(){
  sfxComplete();stopBGM();
  stars=3;if(hintCount>0)stars=Math.max(1,3-hintCount);if(hintCount>2)stars=1;
  state.levelStars[currentLevel]=Math.max(state.levelStars[currentLevel]||0,stars);
  state.coins+=stars*10;saveState();
  document.getElementById("ov-stars").textContent="\u2605".repeat(stars)+"\u2606".repeat(3-stars);
  document.getElementById("ov-coins-text").textContent="+"+stars*10+" coins";
  document.getElementById("ov-bonus-text").textContent=bonusWords.size>0?bonusWords.size+" bonus words found!":"";
  document.getElementById("ov-complete").classList.add("active");
}

function updateCoinsDisplay(){document.getElementById("coin-disp").textContent=state.coins;}
function renderBonusArea(){const el=document.getElementById("bonus-area");el.innerHTML="";bonusWords.forEach(w=>{const t=document.createElement("span");t.className="bonus-tag";t.textContent=w.toUpperCase();el.appendChild(t);});}

function useBullseye(){
  if(state.coins<30)return;state.coins-=30;hintCount++;saveState();updateCoinsDisplay();
  const levelWords=LEVELS[currentLevel].words.map(x=>x.toUpperCase());
  for(const w of levelWords){
    if(!foundWords.has(w)){
      const cw=crossword.words.find(x=>x.word.toUpperCase()===w);
      if(cw){const[r,c]=cw.cells[0];const cell=gridCells.find(x=>x.r===r&&x.c===c);if(cell&&!cell.found){cell.revealed=true;break;}}
    }
  }
  sfxTap();render();
}

function useLightbulb(){
  if(state.coins<60)return;state.coins-=60;hintCount++;saveState();updateCoinsDisplay();
  const levelWords=LEVELS[currentLevel].words.map(x=>x.toUpperCase());
  const unfound=levelWords.filter(w=>!foundWords.has(w)).sort((a,b)=>a.length-b.length);
  if(unfound.length>0){
    revealWordInGrid(unfound[0]);foundWords.add(unfound[0]);sfxWord();
    if(foundWords.size===levelWords.length)setTimeout(()=>levelComplete(),500);
    render();
  }
}

function shuffleLetters(){shuffleArray(wheelLetters);selectedWord=[];updatePreview();render();sfxTap();}
function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function nextLevel(){document.getElementById("ov-complete").classList.remove("active");if(currentLevel<LEVELS.length-1)startLevel(currentLevel+1);else{showScreen("scr-packs");renderPacks();}}
function goToMenu(){document.getElementById("ov-complete").classList.remove("active");showScreen("scr-packs");renderPacks();}

loadState();
document.getElementById("btn-sound-title").textContent="Sound: "+(state.soundOn?"ON":"OFF");
document.getElementById("btn-snd-game").textContent=state.soundOn?"\u266B":"\u2715";
document.getElementById("btn-play").onclick=()=>{renderPacks();showScreen("scr-packs");};
document.getElementById("btn-sound-title").onclick=toggleSound;
document.getElementById("btn-snd-game").onclick=toggleSound;
document.getElementById("btn-back-packs").onclick=()=>showScreen("scr-title");
document.getElementById("btn-back-levels").onclick=()=>{renderPacks();showScreen("scr-packs");};
document.getElementById("btn-back-game").onclick=()=>{stopBGM();renderPacks();showScreen("scr-packs");};
document.getElementById("btn-hint1").onclick=useBullseye;
document.getElementById("btn-hint2").onclick=useLightbulb;
document.getElementById("btn-shuffle").onclick=shuffleLetters;
document.getElementById("btn-next").onclick=nextLevel;
document.getElementById("btn-menu").onclick=goToMenu;

const wCvs=document.getElementById("cvs-wheel");
let isDragging=false;
wCvs.addEventListener("pointerdown",e=>{e.preventDefault();const{x,y}=getCanvasCoords(wCvs,e.clientX,e.clientY);isDragging=true;handlePointerDown(x,y);});
wCvs.addEventListener("pointermove",e=>{if(!isDragging)return;e.preventDefault();const{x,y}=getCanvasCoords(wCvs,e.clientX,e.clientY);handlePointerMove(x,y);});
wCvs.addEventListener("pointerup",e=>{if(!isDragging)return;isDragging=false;handlePointerUp();});
wCvs.addEventListener("pointerleave",e=>{if(!isDragging)return;isDragging=false;handlePointerUp();});
wCvs.addEventListener("contextmenu",e=>e.preventDefault());

window.addEventListener("resize",()=>{dpr=window.devicePixelRatio||1;if(currentScreen==="scr-game"&&crossword){setupCanvases();render();}});

const shakeStyle=document.createElement("style");
shakeStyle.textContent="@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}";
document.head.appendChild(shakeStyle);

// ===== THEME SYSTEM =====
const THEME_CLASSES=["forest","ocean","mountain","desert","arctic","space"];
const THEME_ACCENTS=["#4ade80","#38bdf8","#fbbf24","#fb923c","#a5f3fc","#c084fc"];
function setTheme(packIndex){
  const cls=THEME_CLASSES[packIndex]||"forest";
  const bg=document.getElementById("game-bg");
  if(bg){
    bg.className="game-bg theme-"+cls;
    if(window.__GAME_BG){bg.style.backgroundImage="url("+window.__GAME_BG+")";}
  }
}

// ===== PROGRESS BAR =====
function updateProgress(){
  const levelWords=LEVELS[currentLevel].words;
  const pct=levelWords.length>0?(foundWords.size/levelWords.length)*100:0;
  const el=document.getElementById("progress-fill");
  if(el)el.style.width=pct+"%";
}

// ===== PARTICLE SYSTEM =====
let particles=[];
let particleCanvas=null,particleCtx=null,particleAnim=null;
function initParticles(){
  particleCanvas=document.createElement("canvas");
  particleCanvas.id="particle-canvas";
  particleCanvas.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0";
  document.body.appendChild(particleCanvas);
  particleCtx=particleCanvas.getContext("2d");
  resizeParticles();
  window.addEventListener("resize",resizeParticles);
  animateParticles();
}
function resizeParticles(){
  if(!particleCanvas)return;
  particleCanvas.width=window.innerWidth;particleCanvas.height=window.innerHeight;
}
function createParticles(count,colors){
  particles=[];
  for(let i=0;i<count;i++){
    particles.push({
      x:Math.random()*window.innerWidth,
      y:Math.random()*window.innerHeight,
      vx:(Math.random()-0.5)*0.3,
      vy:-Math.random()*0.5-0.1,
      size:Math.random()*3+1,
      opacity:Math.random()*0.3+0.1,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:Math.random()*200+100
    });
  }
}
function animateParticles(){
  if(!particleCtx)return;
  particleCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0||p.y<-10){p.y=particleCanvas.height+10;p.x=Math.random()*particleCanvas.width;p.life=Math.random()*200+100;}
    particleCtx.beginPath();
    particleCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    particleCtx.fillStyle=p.color;
    particleCtx.globalAlpha=p.opacity*(p.life>20?1:p.life/20);
    particleCtx.fill();
  });
  particleCtx.globalAlpha=1;
  particleAnim=requestAnimationFrame(animateParticles);
}

// Override startLevel to include theme + progress + particles
const _origStartLevel=startLevel;
startLevel=function(lvl){
  const packIdx=Math.floor(lvl/5);
  setTheme(packIdx);
  const colors=THEME_ACCENTS[packIdx]?[THEME_ACCENTS[packIdx],THEME_ACCENTS[packIdx]+"80","#ffffff40"]:["#00d4ff40","#a855f740"];
  createParticles(25,colors);
  _origStartLevel(lvl);
  updateProgress();
};

// Override checkWord to update progress
const _origCheckWord=checkWord;
checkWord=function(word){
  _origCheckWord(word);
  updateProgress();
};

// Init particles on load (lazy)
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",()=>{initParticles();createParticles(15,["#00d4ff30","#a855f730","#ffffff20"]);});}else{initParticles();createParticles(15,["#00d4ff30","#a855f730","#ffffff20"]);}


</script>
