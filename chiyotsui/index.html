  const t=Math.floor((Date.now()-state.startTime)/1000);
  const tier=LEVELS[state.level].tier;
  const thresholds={Beginner:[60,120],Easy:[120,240],Medium:[180,360],Hard:[300,600],Expert:[480,900]};
  const [s2,s1]=thresholds[tier]||[300,600];
  if(state.hintsUsed===0&&t<=s2)return 3;
  if(state.hintsUsed<=1&&t<=s1)return 2;
  return 1;
}
function draw(){
  const R=state.rows,C=state.cols;
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<R;r++){
    for(let c=0;c<C;c++){
      const x=2+c*CELL,y=2+r*CELL;
      const rid=state.region[r][c];
      ctx.fillStyle=REGION_COLORS[rid%REGION_COLORS.length];
      ctx.globalAlpha=0.3;
      ctx.fillRect(x,y,CELL,CELL);
      ctx.globalAlpha=1;
      if(state.grid[r][c]===1){
        ctx.fillStyle='#1a1a2e';
        ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
        ctx.fillStyle='#555580';
        ctx.fillRect(x+3,y+3,CELL-6,CELL-6);
      }
      const ck=String(r)+','+String(c);
      if(state.clues[ck]!==undefined){
        ctx.fillStyle='#0f0f1a';
        ctx.fillRect(x+CELL/4,y+CELL/4,CELL/2,CELL/2);
        ctx.fillStyle='#64ffda';
        ctx.font='bold '+Math.floor(CELL*0.4)+'px monospace';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText(String(state.clues[ck]),x+CELL/2,y+CELL/2+1);
      }
      if(state.hintCells.has(ck)){
        ctx.strokeStyle='#ffd166';
        ctx.lineWidth=3;
        ctx.strokeRect(x+2,y+2,CELL-4,CELL-4);
      }
    }
  }
  ctx.strokeStyle='#6a6a9e';
  ctx.lineWidth=1;
  for(let r=0;r<=R;r++){
    ctx.beginPath();ctx.moveTo(2,2+r*CELL);ctx.lineTo(2+C*CELL,2+r*CELL);ctx.stroke();
  }
  for(let c=0;c<=C;c++){
    ctx.beginPath();ctx.moveTo(2+c*CELL,2);ctx.lineTo(2+c*CELL,2+R*CELL);ctx.stroke();
  }
  ctx.strokeStyle='#aaaadd';
  ctx.lineWidth=2.5;
  for(let r=0;r<R;r++){
    for(let c=0;c<C;c++){
      const rid=state.region[r][c];
      if(c+1<C&&state.region[r][c+1]!==rid){
        ctx.beginPath();ctx.moveTo(2+(c+1)*CELL,2+r*CELL);ctx.lineTo(2+(c+1)*CELL,2+(r+1)*CELL);ctx.stroke();
      }
      if(r+1<R&&state.region[r+1][c]!==rid){
        ctx.beginPath();ctx.moveTo(2+c*CELL,2+(r+1)*CELL);ctx.lineTo(2+(c+1)*CELL,2+(r+1)*CELL);ctx.stroke();
      }
    }
  }
}
function handlePointer(e){
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const px=(e.clientX-rect.left)*(canvas.width/rect.width);
  const py=(e.clientY-rect.top)*(canvas.height/rect.height);
  const c=Math.floor((px-2)/CELL);
  const r=Math.floor((py-2)/CELL);
  if(r<0||r>=state.rows||c<0||c>=state.cols)return;
  const ck=String(r)+','+String(c);
  if(state.clues[ck]!==undefined)return;
  if(state.mode===1){
    if(state.grid[r][c]===0){state.grid[r][c]=1;playClick();}
    else return;
  }else{
    if(state.grid[r][c]===1){state.grid[r][c]=0;playErase();}
    else return;
  }
  draw();
  if(state.autoCheck&&checkWin())onWin();
}
function giveHint(){
  if(state.hintsUsed>=3){showToast('No hints left!');return;}
  const sol=state.solution;
  const candidates=[];
  for(let r=0;r<state.rows;r++){
    for(let c=0;c<state.cols;c++){
      if(state.grid[r][c]!==sol[r][c]&&state.clues[String(r)+','+String(c)]===undefined){
        candidates.push([r,c]);
      }
    }
  }
  if(candidates.length===0){showToast('Already correct!');return;}
  const[r,c]=candidates[Math.floor(Math.random()*candidates.length)];
  state.grid[r][c]=sol[r][c];
  state.hintCells.add(String(r)+','+String(c));
  state.hintsUsed++;
  document.getElementById('hintInfo').textContent='💡 '+(3-state.hintsUsed);
  playHint();
  draw();
  showToast('Hint revealed!');
  if(checkWin())onWin();
}
function onWin(){
  if(state.timerInterval)clearInterval(state.timerInterval);
  const stars=getStars();
  state.completed[state.level]=Math.max(state.completed[state.level]||0,stars);
  saveProgress();
  playWin();
  const t=Math.floor((Date.now()-state.startTime)/1000);
  document.getElementById('winStars').textContent='⭐'.repeat(stars);
  document.getElementById('winStats').textContent='Time: '+Math.floor(t/60)+':'+String(t%60).padStart(2,'0')+' · Hints: '+state.hintsUsed;
  document.getElementById('winOverlay').classList.add('show');
}
function clearAll(){
  for(let r=0;r<state.rows;r++){
    for(let c=0;c<state.cols;c++){
      if(state.clues[String(r)+','+String(c)]===undefined)state.grid[r][c]=0;
    }
  }
  state.hintCells.clear();
  draw();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function buildLevelSelect(){
  const container=document.getElementById('levelSelect');
  container.innerHTML='';
  const tiers=['Beginner','Easy','Medium','Hard','Expert'];
  let idx=0;
  for(const tier of tiers){
    const label=document.createElement('div');
    label.className='tier-label';
    label.textContent=tier;
    container.appendChild(label);
    const grid=document.createElement('div');
    grid.className='lvl-grid';
    for(let i=0;i<6&&idx<LEVELS.length;i++,idx++){
      const btn=document.createElement('div');
      btn.className='lvl-btn';
      const stars=state.completed[idx];
      if(stars){btn.classList.add('completed');}
      btn.innerHTML='<span>'+(idx+1)+'</span><span class="lvl-stars">'+(stars?'⭐'.repeat(stars):'')+'</span>';
      btn.onclick=()=>{initLevel(idx);document.getElementById('menuOverlay').classList.remove('show');};
      grid.appendChild(btn);
    }
    container.appendChild(grid);
  }
}
function getAudio(){
  if(!state.audioCtx){
    try{state.audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
  }
  return state.audioCtx;
}
function startMusic(){
  if(!state.musicOn)return;
  const ctx=getAudio();if(!ctx)return;
  if(state.musicNodes.length>0)return;
  const chords=[[262,330,392,494],[294,349,440,587],[220,262,330,440],[196,247,294,392]];
  let ci=0;
  function playChord(){
    if(!state.musicOn||!state.audioCtx){state.musicNodes=[];return;}
    const freqs=chords[ci%chords.length];
    const now=ctx.currentTime;
    for(const f of freqs){
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.frequency.value=f;
      osc.type='sine';
      gain.gain.setValueAtTime(0,now);
      gain.gain.linearRampToValueAtTime(0.04,now+0.5);
      gain.gain.linearRampToValueAtTime(0,now+3.5);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(now);osc.stop(now+4);
      state.musicNodes.push(osc);
    }
    ci++;
    setTimeout(playChord,3000);
  }
  playChord();
}
function stopMusic(){
  for(const n of state.musicNodes){try{n.stop();}catch(e){}}
  state.musicNodes=[];
}
function playTone(freq,dur,type='sine',vol=0.15){
  if(!state.sfxOn)return;
  const ctx=getAudio();if(!ctx)return;
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.frequency.value=freq;osc.type=type;
  gain.gain.setValueAtTime(0,ctx.currentTime);
  gain.gain.linearRampToValueAtTime(vol,ctx.currentTime+0.01);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  osc.connect(gain);gain.connect(ctx.destination);
  osc.start();osc.stop(ctx.currentTime+dur);
}
function playClick(){playTone(600,0.08,'square',0.1);}
function playErase(){playTone(300,0.1,'square',0.1);}
function playHint(){playTone(880,0.15,'sine',0.12);}
function playError(){playTone(150,0.2,'sawtooth',0.15);}
function playWin(){
  if(!state.sfxOn)return;
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'sine',0.15),i*100));
}
canvas.addEventListener('pointerdown',handlePointer);
document.getElementById('btnMode1').onclick=()=>{state.mode=1;document.getElementById('btnMode1').classList.add('active');document.getElementById('btnMode2').classList.remove('active');};
document.getElementById('btnMode2').onclick=()=>{state.mode=2;document.getElementById('btnMode2').classList.add('active');document.getElementById('btnMode1').classList.remove('active');};
document.getElementById('btnHint').onclick=giveHint;
document.getElementById('btnCheck').onclick=()=>{if(checkWin()){onWin();}else{playError();showToast('Not quite — keep trying!');}};
document.getElementById('btnClear').onclick=clearAll;
document.getElementById('btnMenu').onclick=()=>{buildLevelSelect();document.getElementById('menuOverlay').classList.add('show');};
document.getElementById('btnResume').onclick=()=>document.getElementById('menuOverlay').classList.remove('show');
document.getElementById('btnSettings').onclick=()=>{document.getElementById('settingsOverlay').classList.add('show');};
document.getElementById('btnSettingsClose').onclick=()=>document.getElementById('settingsOverlay').classList.remove('show');
document.getElementById('btnNext').onclick=()=>{document.getElementById('winOverlay').classList.remove('show');if(state.level+1<LEVELS.length)initLevel(state.level+1);else{buildLevelSelect();document.getElementById('menuOverlay').classList.add('show');}};
document.getElementById('btnReplay').onclick=()=>{document.getElementById('winOverlay').classList.remove('show');initLevel(state.level);};
document.getElementById('btnMenuFromWin').onclick=()=>{document.getElementById('winOverlay').classList.remove('show');buildLevelSelect();document.getElementById('menuOverlay').classList.add('show');};
document.getElementById('toggleMusic').onclick=function(){state.musicOn=!state.musicOn;this.classList.toggle('on');saveSettings();if(state.musicOn)startMusic();else stopMusic();};
document.getElementById('toggleSfx').onclick=function(){state.sfxOn=!state.sfxOn;this.classList.toggle('on');saveSettings();};
document.getElementById('toggleAuto').onclick=function(){state.autoCheck=!state.autoCheck;this.classList.toggle('on');saveSettings();};
document.addEventListener('keydown',e=>{
  if(document.querySelector('.overlay.show'))return;
  if(e.key==='1'){state.mode=1;document.getElementById('btnMode1').classList.add('active');document.getElementById('btnMode2').classList.remove('active');}
  else if(e.key==='2'){state.mode=2;document.getElementById('btnMode2').classList.add('active');document.getElementById('btnMode1').classList.remove('active');}
  else if(e.key==='h'||e.key==='H'){giveHint();}
  else if(e.key==='r'||e.key==='R'){clearAll();}
  else if(e.key==='Enter'){if(checkWin())onWin();else{playError();showToast('Not quite — keep trying!');}}
  else if(e.key==='Escape'){buildLevelSelect();document.getElementById('menuOverlay').classList.add('show');}
});
window.addEventListener('resize',resize);
window.addEventListener('beforeunload',()=>{stopMusic();if(state.audioCtx){try{state.audioCtx.close();}catch(e){}}});
loadSettings();
// Load completed levels from localStorage into state.completed
try {
  var _save = JSON.parse(localStorage.getItem('chiyotsui_save_v1')) || {};
  for (var _k in _save) {
    if (_k !== '_settings' && _save[_k] && _save[_k].stars) {
      state.completed[parseInt(_k,10)] = _save[_k].stars;
    }
  }
} catch(e) {}
document.getElementById('toggleMusic').classList.toggle('on',state.musicOn);
document.getElementById('toggleSfx').classList.toggle('on',state.sfxOn);
document.getElementById('toggleAuto').classList.toggle('on',state.autoCheck);
initLevel(0);
startMusic();
</script>
