<button class="btn btn-secondary" id="themeBtn">Theme: NEON</button>

<script>
(function(){
'use strict';
// ====================== CONFIG ======================
var THEMES=[
{name:'NEON',colors:['#00d4ff','#ff4d6d','#ffe66d','#00f2a0'],bg:'#0a0a1a',particle:'#00d4ff'},
{name:'CANDY',colors:['#ff6b9d','#feca57','#48dbfb','#1dd1a1'],bg:'#1a0a1a',particle:'#ff6b9d'},
{name:'OCEAN',colors:['#00cec9','#0984e3','#6c5ce7','#fdcb6e'],bg:'#001220',particle:'#00cec9'},
{name:'SUNSET',colors:['#e17055','#fdcb6e','#ff7675','#fd79a8'],bg:'#180a0a',particle:'#e17055'}
];
var BALL_R=18;
var GATE_W=6;
var SPEED_START=3.0;
var SPEED_MAX=7.5;
var SPEED_INC=0.0015;
var SPAWN_GAP_MIN=240;
var SPAWN_GAP_MAX=340;
var COMBO_MULT_INTERVAL=10;

// ====================== STATE ======================
var canvas,ctx,W,H,dpr;
var state='menu'; // menu, play, dead
var themeIdx=0;
var colors,bgColor,particleColor;
var ball;
var gates=[];
var particles=[];
var stars=[];
var score=0,combo=0,bestCombo=0;
var best=0;
var scrollSpeed;
var gateSpawnTimer=0;
var nextGateGap=SPAWN_GAP_MIN;
var rafId=null;
var lastTime=0;
var dt=0;
var audioCtx=null,bgmNodes=[],soundOn=true,musicOn=true;
var timers=[];
var frameCount=0;
var dailySeed=0;
var isDaily=false;
var shakeTime=0,shakeMag=0;

// ====================== RNG ======================
var rngState=12345;
function seedRng(s){rngState=s>>>0;}
function rng(){
rngState=(rngState*1664525+1013904223)>>>0;
return rngState/4294967296;
}
function getDailySeed(){
var d=new Date();
return (d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate());
}

// ====================== INIT ======================
function init(){
canvas=document.getElementById('game');
ctx=canvas.getContext('2d');
best=parseInt(localStorage.getItem('cs_best')||'0',10);
soundOn=localStorage.getItem('cs_sound')!=='0';
musicOn=localStorage.getItem('cs_music')!=='0';
setTheme(0);
resize();
window.addEventListener('resize',resize);
// Input
canvas.addEventListener('pointerdown',onTap);
window.addEventListener('keydown',function(e){
if(e.code==='Space'||e.code==='ArrowUp'||e.code==='ArrowDown'){e.preventDefault();onTap({preventDefault:function(){}});}
});
document.getElementById('playBtn').addEventListener('click',function(e){e.stopPropagation();startGame();});
document.getElementById('themeBtn').addEventListener('click',function(e){e.stopPropagation();cycleTheme();});
// Load saved theme
var savedTheme=parseInt(localStorage.getItem('cs_theme')||'0',10);
setTheme(savedTheme);
// Stars
initStars();
startMenuAnimation();
}

function resize(){
dpr=window.devicePixelRatio||1;
W=window.innerWidth;
H=window.innerHeight;
canvas.width=W*dpr;
canvas.height=H*dpr;
canvas.style.width=W+'px';
canvas.style.height=H+'px';
ctx.setTransform(dpr,0,0,dpr,0,0);
}

function initStars(){
stars=[];
for(var i=0;i<60;i++){
stars.push({x:rng()*W,y:rng()*H,r:rng()*1.5+0.5,a:rng()*0.5+0.2,vy:rng()*0.3+0.1});
}
}

function setTheme(idx){
themeIdx=idx%THEMES.length;
var t=THEMES[themeIdx];
colors=t.colors.slice();
bgColor=t.bg;
particleColor=t.particle;
localStorage.setItem('cs_theme',themeIdx);
var tl=document.getElementById('themeLabel');
if(tl)tl.textContent=t.name;
var tb=document.getElementById('themeBtn');
if(tb)tb.textContent='Theme: '+t.name;
updateColorPreview();
}

function cycleTheme(){
setTheme(themeIdx+1);
}

function updateColorPreview(){
var cp=document.getElementById('colorPreview');
if(!cp)return;
cp.innerHTML='';
for(var i=0;i<colors.length;i++){
var dot=document.createElement('div');
dot.className='color-dot';
dot.style.background=colors[i];
dot.style.color=colors[i];
cp.appendChild(dot);
}
}

// ====================== GAME OBJECTS ======================
function resetBall(){
ball={
x:W/2,
y:H*0.5,
r:BALL_R,
vy:0,
colorIdx:0,
bouncePhase:0
};
}

function makeGate(){
// Gate: horizontal bar split into colored segments. Ball must match a segment.
// Variant: full-circle (ring), or bar with gaps
var y=-60;
var variant=rng();
var numColors=2+Math.floor(rng()*Math.min(3,colors.length-1)); // 2-4 segments
var gate;
if(variant<0.35){
// Full bar with color segments (no gap) - ball must match segment position
var segColors=[];
var order=[];
for(var i=0;i<numColors;i++)order.push(i);
// Shuffle
for(var i=order.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var t=order[i];order[i]=order[j];order[j]=t;}
for(var i=0;i<numColors;i++)segColors.push(order[i%colors.length]);
gate={type:'bar',y:y,h:36,segments:segColors,numSeg:numColors,passed:false,rotation:0,rotSpeed:(rng()-0.5)*0.02};
}else if(variant<0.65){
// Ring - ball passes through, must match ring color
gate={type:'ring',y:y,h:0,radius:50+rng()*30,colorIdx:Math.floor(rng()*colors.length),passed:false,rotation:0,rotSpeed:(rng()-0.5)*0.03};
}else{
// Double bar with gap in middle, two color zones
var c1=Math.floor(rng()*colors.length);
var c2=(c1+1+Math.floor(rng()*(colors.length-1)))%colors.length;
gate={type:'split',y:y,h:30,gapTop:0.2+rng()*0.15,gapBot:0.2+rng()*0.15,color1:c1,color2:c2,passed:false,rotation:0,rotSpeed:0};
}
gates.push(gate);
}

function spawnParticles(x,y,color,count){
for(var i=0;i<count;i++){
var angle=rng()*Math.PI*2;
var speed=rng()*4+1;
particles.push({
x:x,y:y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed,
life:1,
color:color,
r:rng()*3+1
});
}
}

function spawnStarParticles(){
if(frameCount%2===0&&scrollSpeed>SPEED_START+1){
particles.push({x:rng()*W,y:H+10,vx:0,vy:-scrollSpeed*0.5-1,life:0.4,color:'rgba(255,255,255,0.5)',r:rng()*1.5+0.5});
}
}

// ====================== GAME FLOW ======================
function startGame(){
if(state==='play')return;
// Resume audio on user gesture
if(!audioCtx){
try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){audioCtx=null;}
}
if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();

score=0;combo=0;bestCombo=0;
scrollSpeed=SPEED_START;
gates=[];particles=[];
gateSpawnTimer=0;
nextGateGap=SPAWN_GAP_MIN;
resetBall();
state='play';
frameCount=0;
showHud(true);
showOverlay(false);
if(musicOn&&audioCtx)startBGM();
}

function gameOver(){
state='dead';
combo=0;
bestCombo=0;
spawnParticles(ball.x,ball.y,colors[ball.colorIdx],30);
shakeTime=20;shakeMag=12;
stopBGM();
playTone(200,0.15,'sawtooth',0.15);
setTimeout(function(){playTone(150,0.2,'sawtooth',0.12);},100);
setTimeout(function(){playTone(100,0.3,'sawtooth',0.1);},200);
if(score>best){
best=score;
localStorage.setItem('cs_best',best);
}
setTimeout(showGameOverScreen,600);
}

function showGameOverScreen(){
var ov=document.getElementById('overlay');
ov.innerHTML='<div class="score-display">'+score+'</div>'+
'<div class="best-score">Best: '+best+'</div>'+
'<button class="btn btn-play" id="playBtn2">PLAY AGAIN</button>'+
'<button class="btn btn-secondary" id="menuBtn">MENU</button>'+
'<div class="instr">Best combo: '+bestCombo+'x</div>';
ov.classList.add('active');
document.getElementById('playBtn2').addEventListener('click',function(e){e.stopPropagation();startGame();});
document.getElementById('menuBtn').addEventListener('click',function(e){e.stopPropagation();showMenu();});
}

function showMenu(){
state='menu';
gates=[];particles=[];
var ov=document.getElementById('overlay');
ov.innerHTML='<div class="title">COLOR SWITCH</div>'+
'<div class="subtitle">Tap to match colors!</div>'+
'<div class="color-preview" id="colorPreview"></div>'+
'<div class="theme-label" id="themeLabel">'+THEMES[themeIdx].name+'</div>'+
'<button class="btn btn-play" id="playBtn">PLAY</button>'+
'<button class="btn btn-secondary" id="themeBtn">Theme: '+THEMES[themeIdx].name+'</button>'+
'<div class="instr">Tap anywhere to switch ball color.<br>Pass through matching color gates.<br>Wrong color = game over!</div>';
ov.classList.add('active');
document.getElementById('playBtn').addEventListener('click',function(e){e.stopPropagation();startGame();});
document.getElementById('themeBtn').addEventListener('click',function(e){e.stopPropagation();cycleTheme();});
showHud(false);
setTheme(themeIdx); // re-apply theme label + preview
}

function onTap(e){
if(e&&e.preventDefault)e.preventDefault();
if(state==='menu'){
startGame();
return;
}
if(state!=='play')return;
// Cycle ball color
ball.colorIdx=(ball.colorIdx+1)%colors.length;
// Ball bounce up
ball.vy=-8;
playTone(440+ball.colorIdx*80,0.06,'sine',0.06);
}

function showHud(show){
var hud=document.getElementById('hud');
if(show){hud.classList.remove('hidden');}
else{hud.classList.add('hidden');}
}
function showOverlay(show){
var ov=document.getElementById('overlay');
if(show){ov.style.display='flex';ov.classList.add('active');}
else{ov.style.display='none';ov.classList.remove('active');}
}

// ====================== UPDATE ======================
function update(){
frameCount++;
// Stars drift
for(var i=0;i<stars.length;i++){
stars[i].y+=stars[i].vy*0.5;
if(stars[i].y>H){stars[i].y=0;stars[i].x=rng()*W;}
}

if(state==='play'){
// Speed increase
if(scrollSpeed<SPEED_MAX)scrollSpeed+=SPEED_INC*dt;

// Ball physics - gravity + bounce
ball.vy+=0.35*dt;
if(ball.vy>10)ball.vy=10;
ball.y+=ball.vy*dt;
ball.bouncePhase+=0.1*dt;

// Ball wrap top/bottom - gentle bounce off walls
if(ball.y<BALL_R){
ball.y=BALL_R;
ball.vy=Math.abs(ball.vy)*0.5;
}
if(ball.y>H-BALL_R){
ball.y=H-BALL_R;
ball.vy=-Math.abs(ball.vy)*0.7;
}

// Spawn gates
gateSpawnTimer+=scrollSpeed*dt;
if(gateSpawnTimer>=nextGateGap){
makeGate();
gateSpawnTimer=0;
nextGateGap=SPAWN_GAP_MIN+rng()*(SPAWN_GAP_MAX-SPAWN_GAP_MIN);
// Reduce gap as speed increases
var speedFactor=(scrollSpeed-SPEED_START)/(SPEED_MAX-SPEED_START);
nextGateGap=nextGateGap*(1-speedFactor*0.3);
}

// Move + check gates
for(var i=gates.length-1;i>=0;i--){
var g=gates[i];
g.y+=scrollSpeed*dt;
if(g.rotation!==undefined)g.rotation+=g.rotSpeed*dt;

// Check gate collision (ball at center x = W/2)
var ballCenter=ball.y;
var gateTop=g.y-g.h/2;
var gateBot=g.y+g.h/2;

if(!g.passed&&g.type==='bar'){
var segW=W/g.numSeg;
var ballSegX=Math.floor(ball.x/segW);
if(ballSegX<0)ballSegX=0;
if(ballSegX>=g.numSeg)ballSegX=g.numSeg-1;
// Gate passes through ball center vertically
if(g.y>BALL_R*0.5+ball.y-g.h/2&&g.y<ball.y+BALL_R+g.h/2){
// Ball is intersecting gate
var segColor=g.segments[ballSegX];
if(segColor!==ball.colorIdx&&!g.hit){
g.hit=true;
gameOver();
}
}
if(g.y>H+60){gates.splice(i,1);}
// Score when gate fully passed ball
if(!g.passed&&g.y>ball.y+BALL_R+10){
g.passed=true;
score++;
combo++;
if(combo>bestCombo)bestCombo=combo;
spawnParticles(ball.x,ball.y,colors[ball.colorIdx],8);
if(combo%5===0){
flashCombo(combo+'x');
playTone(600+combo*20,0.1,'triangle',0.08);
}
}
}else if(!g.passed&&g.type==='ring'){
var dx=ball.x-W/2; // always 0 since ball.x=W/2
var dy=ball.y-g.y;
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist<g.radius+BALL_R&&dist>g.radius-BALL_R-5&&!g.hit){
// Ball at ring level
var ballAngle=Math.atan2(dy,dx);
var ringColor=g.colorIdx;
if(ball.colorIdx!==ringColor){
g.hit=true;
gameOver();
}
}
if(!g.passed&&g.y>ball.y+BALL_R+10){
g.passed=true;
score++;
combo++;
if(combo>bestCombo)bestCombo=combo;
spawnParticles(ball.x,ball.y,colors[ball.colorIdx],8);
if(combo%5===0){
flashCombo(combo+'x');
playTone(600+combo*20,0.1,'triangle',0.08);
}
}
if(g.y>H+100){gates.splice(i,1);}
}else if(!g.passed&&g.type==='split'){
// Split bar: top and bottom segments with gap in middle
var topBot=g.y-g.h/2;
var topTop=topBot-g.h*0.3;
var botTop=g.y+g.h/2;
var botBot=botTop+g.h*0.3;
var gapY1=g.y-g.h*(0.5-g.gapTop);
var gapY2=g.y+g.h*(0.5-g.gapBot);
if(ball.y>topTop&&ball.y<gapY1&&!g.hit){
if(ball.colorIdx!==g.color1){g.hit=true;gameOver();}
}
if(ball.y>gapY2&&ball.y<botBot&&!g.hit){
if(ball.colorIdx!==g.color2){g.hit=true;gameOver();}
}
if(!g.passed&&g.y>ball.y+BALL_R+10){
g.passed=true;
score++;
combo++;
if(combo>bestCombo)bestCombo=combo;
spawnParticles(ball.x,ball.y,colors[ball.colorIdx],8);
if(combo%5===0){
flashCombo(combo+'x');
playTone(600+combo*20,0.1,'triangle',0.08);
}
}
if(g.y>H+60){gates.splice(i,1);}
}
}

// Trail particles
if(frameCount%3===0){
particles.push({x:ball.x,y:ball.y,vx:0,vy:0.5,life:0.5,color:colors[ball.colorIdx],r:BALL_R*0.8});
}
spawnStarParticles();

// Update HUD
var hs=document.getElementById('hudScore');
if(hs)hs.textContent=score;
var hb=document.getElementById('hudBest');
if(hb)hb.textContent=best;
var hc=document.getElementById('hudCombo');
if(hc){
if(combo>=3){hc.textContent=combo+'x COMBO';hc.style.color=particleColor;}
else{hc.textContent='';}
}
}else if(state==='dead'){
// Still scroll gates
for(var i=gates.length-1;i>=0;i--){
gates[i].y+=scrollSpeed*0.3*dt;
if(gates[i].y>H+100)gates.splice(i,1);
}
// Ball falls
ball.vy+=0.5*dt;
ball.y+=ball.vy*dt;
}

// Update particles
for(var i=particles.length-1;i>=0;i--){
var p=particles[i];
p.x+=p.vx*dt;
p.y+=p.vy*dt;
p.life-=0.03*dt;
if(p.life<=0)particles.splice(i,1);
}

// Shake
if(shakeTime>0){shakeTime-=dt;}
}

function flashCombo(text){
var cf=document.getElementById('comboFlash');
if(!cf)return;
cf.textContent=text;
cf.style.left='50%';
cf.style.transform='translateX(-50%)';
cf.style.color=particleColor;
cf.style.opacity='1';
cf.style.textShadow='0 0 20px '+particleColor;
clearTimeout(cf._timer);
cf._timer=setTimeout(function(){cf.style.opacity='0';},600);
}

// ====================== RENDER ======================
function render(){
// Shake offset
var sx=0,sy=0;
if(shakeTime>0){
sx=(rng()-0.5)*shakeMag*(shakeTime/20);
sy=(rng()-0.5)*shakeMag*(shakeTime/20);
}
ctx.save();
ctx.translate(sx,sy);

// Background
ctx.fillStyle=bgColor;
ctx.fillRect(0,0,W,H);

// Stars
for(var i=0;i<stars.length;i++){
var s=stars[i];
ctx.globalAlpha=s.a;
ctx.fillStyle='#ffffff';
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}
ctx.globalAlpha=1;

// Particles (behind gates)
for(var i=0;i<particles.length;i++){
var p=particles[i];
ctx.globalAlpha=Math.max(0,p.life);
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,Math.max(0.1,p.r*p.life),0,Math.PI*2);
ctx.fill();
}
ctx.globalAlpha=1;

// Gates
for(var i=0;i<gates.length;i++){
drawGate(gates[i]);
}

// Ball
if(state==='play'||state==='dead'){
drawBall();
}

// Center guide line (subtle)
if(state==='play'){
ctx.strokeStyle='rgba(255,255,255,0.05)';
ctx.lineWidth=1;
ctx.beginPath();
ctx.moveTo(W/2,0);
ctx.lineTo(W/2,H);
ctx.stroke();
}

ctx.restore();
}

function drawBall(){
var wobble=Math.sin(ball.bouncePhase)*2;
var r=ball.r+wobble*0.3;
// Glow
var grad=ctx.createRadialGradient(ball.x,ball.y,0,ball.x,ball.y,r*2.5);
grad.addColorStop(0,colors[ball.colorIdx]);
grad.addColorStop(0.5,colors[ball.colorIdx]+'80');
grad.addColorStop(1,colors[ball.colorIdx]+'00');
ctx.fillStyle=grad;
ctx.beginPath();
ctx.arc(ball.x,ball.y,r*2.5,0,Math.PI*2);
ctx.fill();
// Core
ctx.fillStyle=colors[ball.colorIdx];
ctx.beginPath();
ctx.arc(ball.x,ball.y,r,0,Math.PI*2);
ctx.fill();
// Highlight
ctx.fillStyle='rgba(255,255,255,0.4)';
ctx.beginPath();
ctx.arc(ball.x-r*0.3,ball.y-r*0.3,r*0.35,0,Math.PI*2);
ctx.fill();
}

function drawGate(g){
if(g.type==='bar'){
var segW=W/g.numSeg;
ctx.save();
ctx.translate(W/2,g.y);
ctx.rotate(g.rotation);
ctx.translate(-W/2,0);
for(var i=0;i<g.numSeg;i++){
var sc=g.segments[i];
ctx.fillStyle=colors[sc];
ctx.shadowColor=colors[sc];
ctx.shadowBlur=15;
ctx.fillRect(i*segW+2,-g.h/2,segW-4,g.h);
// Border
ctx.shadowBlur=0;
ctx.strokeStyle='rgba(255,255,255,0.2)';
ctx.lineWidth=1;
ctx.strokeRect(i*segW+2,-g.h/2,segW-4,g.h);
}
ctx.restore();
}else if(g.type==='ring'){
ctx.save();
ctx.translate(W/2,g.y);
ctx.rotate(g.rotation);
ctx.strokeStyle=colors[g.colorIdx];
ctx.shadowColor=colors[g.colorIdx];
ctx.shadowBlur=20;
ctx.lineWidth=12;
ctx.beginPath();
ctx.arc(0,0,g.radius,0,Math.PI*2);
ctx.stroke();
// Inner glow ring
ctx.shadowBlur=0;
ctx.lineWidth=2;
ctx.strokeStyle='rgba(255,255,255,0.3)';
ctx.beginPath();
ctx.arc(0,0,g.radius-7,0,Math.PI*2);
ctx.stroke();
ctx.restore();
}else if(g.type==='split'){
var h=g.h;
ctx.fillStyle=colors[g.color1];
ctx.shadowColor=colors[g.color1];
ctx.shadowBlur=15;
// Top bar
ctx.fillRect(0,g.y-h*1.3,W,h);
// Bottom bar
ctx.fillStyle=colors[g.color2];
ctx.shadowColor=colors[g.color2];
ctx.fillRect(0,g.y+h*0.3,W,h);
ctx.shadowBlur=0;
// Borders
ctx.strokeStyle='rgba(255,255,255,0.2)';
ctx.lineWidth=1;
ctx.strokeRect(0,g.y-h*1.3,W,h);
ctx.strokeRect(0,g.y+h*0.3,W,h);
}
}

// ====================== MENU ANIMATION ======================
function startMenuAnimation(){
// Idle bouncing ball + demo gates
if(rafId)cancelAnimationFrame(rafId);
lastTime=performance.now();
// Pre-populate some demo gates
gates=[];
resetBall();
state='menu';
loop();
}

// ====================== MAIN LOOP ======================
function loop(now){
now=now||performance.now();
dt=Math.min((now-lastTime)/16.67,3); // delta in frames
lastTime=now;
update();
render();
rafId=requestAnimationFrame(loop);
}

// ====================== AUDIO ======================
function playTone(freq,dur,type,vol){
if(!audioCtx||!soundOn)return;
try{
var osc=audioCtx.createOscillator();
var gain=audioCtx.createGain();
osc.type=type||'sine';
osc.frequency.value=freq;
gain.gain.setValueAtTime(vol||0.1,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+dur);
}catch(e){}
}

function startBGM(){
if(!audioCtx||!musicOn)return;
stopBGM();
try{
var sr=audioCtx.sampleRate;
var dur=12;
var bufSize=sr*dur;
var buf=audioCtx.createBuffer(1,bufSize,sr);
var d=buf.getChannelData(0);
var chords=[[261.63,329.63,392.00],[220.00,277.18,329.63],[196.00,246.94,293.66],[220.00,277.18,329.63]];
var chordDur=dur/chords.length;
for(var i=0;i<bufSize;i++){
var t=i/sr;
var ci=Math.min(Math.floor(t/chordDur),chords.length-1);
var chord=chords[ci];
var s=0;
for(var n=0;n<chord.length;n++){
var f=chord[n];
s+=Math.sin(2*Math.PI*f*t)*0.04;
s+=Math.sin(2*Math.PI*f*2*t)*0.01;
}
var fade=t%chordDur;
var fadeIn=Math.min(fade/0.5,1);
var fadeOut=Math.min((chordDur-fade)/0.5,1);
s*=fadeIn*fadeOut;
var lfo=Math.sin(2*Math.PI*0.3*t)*0.1+1;
d[i]=s*lfo*0.5;
}
var src=audioCtx.createBufferSource();
src.buffer=buf;
src.loop=true;
var filt=audioCtx.createBiquadFilter();
filt.type='lowpass';
filt.frequency.value=1200;
filt.Q.value=1;
var g=audioCtx.createGain();
g.gain.value=musicOn?0.15:0;
src.connect(filt);
filt.connect(g);
g.connect(audioCtx.destination);
src.start();
bgmNodes=[src,filt,g];
}catch(e){}
}

function stopBGM(){
for(var i=0;i<bgmNodes.length;i++){
try{
if(bgmNodes[i].stop)bgmNodes[i].stop();
if(bgmNodes[i].disconnect)bgmNodes[i].disconnect();
}catch(e){}
}
bgmNodes=[];
}

// ====================== CLEANUP ======================
function cleanup(){
if(rafId){cancelAnimationFrame(rafId);rafId=null;}
stopBGM();
if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
timers.forEach(function(t){clearTimeout(t);clearInterval(t);});
timers=[];
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
if(document.hidden){
if(rafId){cancelAnimationFrame(rafId);rafId=null;}
stopBGM();
}else if(state==='play'){
lastTime=performance.now();
rafId=requestAnimationFrame(loop);
if(musicOn&&audioCtx)startBGM();
}
});

// ====================== START ======================
if(document.readyState==='loading'){
document.addEventListener('DOMContentLoaded',init);
}else{
init();
}
})();
</script>
