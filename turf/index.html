const COLORS = {
  bg: '#0f0f1a', panel: '#1a1a2e', cell: '#e0e0f0',
  cellBlack: '#2a2a4e', border: '#3a3a6e', borderActive: '#64ffda',
  borderHint: '#ffd166', borderError: '#ff5555', text: '#e0e0f0',
  clue: '#ffd166', clueBg: '#0f0f1a'
};

const state = {
  level: 0, rows: 0, cols: 0, grid: [], clues: [],
  mode: 'black', hints: 3, hintsUsed: 0, startTime: 0,
  paused: false, musicOn: true, sfxOn: true, autoCheck: false,
  won: false, hintCells: new Set()
};

const SAVE_KEY = 'turf_save_v1';

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : { progress: {}, settings: { music: true, sfx: true, autocheck: false } };
  } catch(e) { return { progress: {}, settings: { music: true, sfx: true, autocheck: false } }; }
}

function saveProgress() {
  const s = loadSave();
  const lvl = state.level;
  if (!s.progress[lvl]) s.progress[lvl] = {};
  s.progress[lvl].completed = state.won;
  s.progress[lvl].time = Math.floor((Date.now() - state.startTime) / 1000);
  s.progress[lvl].hints = state.hintsUsed;
  s.progress[lvl].stars = state.won ? computeStars() : 0;
  s.progress[lvl].grid = state.grid.map(row => [...row]);
  localStorage.setItem(SAVE_KEY, JSON.stringify(s));
}

function saveSettings() {
  const s = loadSave();
  s.settings.music = state.musicOn;
  s.settings.sfx = state.sfxOn;
  s.settings.autocheck = state.autoCheck;
  localStorage.setItem(SAVE_KEY, JSON.stringify(s));
}

function getSavedGrid(lvl) {
  const s = loadSave();
  return s.progress[lvl] && s.progress[lvl].grid ? s.progress[lvl].grid : null;
}

// Canvas setup
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let CELL = 50;

function resize() {
  const app = document.getElementById('app');
  const w = Math.min(app.clientWidth - 16, 560);
  CELL = Math.floor((w - 4) / state.cols);
  const cw = CELL * state.cols + 4;
  const ch = CELL * state.rows + 4;
  canvas.width = cw;
  canvas.height = ch;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  draw();
}

// BFS region detection
function bfs(grid, startR, startC, targetColor) {
  const R = grid.length, C = grid[0].length;
  const visited = new Set();
  const stack = [[startR, startC]];
  visited.add(`${startR},${startC}`);
  while (stack.length > 0) {
    const [r, c] = stack.pop();
    if (grid[r][c] !== targetColor) continue;
    for (const [dr, dc] of [[0,1], [1,0], [0,-1], [-1,0]]) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < R && nc >= 0 && nc < C && !visited.has(`${nr},${nc}`) && grid[nr][nc] === targetColor) {
        visited.add(`${nr},${nc}`);
        stack.push([nr, nc]);
      }
    }
  }
  return visited;
}

function isConnected(grid, targetColor) {
  const R = grid.length, C = grid[0].length;
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      if (grid[r][c] === targetColor) {
        const region = bfs(grid, r, c, targetColor);
        const total = grid.flat().filter(v => v === targetColor).length;
        return region.size === total;
      }
    }
  }
  return true;
}

function checkWin() {
  if (!isConnected(state.grid, 0)) return false;
  if (!isConnected(state.grid, 1)) return false;

  const R = state.rows, C = state.cols;
  for (const cl of state.clues) {
    const region = bfs(state.grid, cl.r, cl.c, state.grid[cl.r][cl.c]);
    if (region.size !== cl.val) return false;
  }
  return true;
}

function draw() {
  const R = state.rows, C = state.cols;
  ctx.fillStyle = COLORS.panel;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Cells
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const x = 2 + c * CELL, y = 2 + r * CELL;
      const val = state.grid[r][c];
      ctx.fillStyle = val === 1 ? COLORS.cellBlack : COLORS.cell;
      ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
    }
  }

  // Grid lines
  ctx.strokeStyle = COLORS.border;
  ctx.lineWidth = 1;
  for (let r = 0; r <= R; r++) {
    ctx.beginPath(); ctx.moveTo(2, 2 + r * CELL); ctx.lineTo(2 + C * CELL, 2 + r * CELL); ctx.stroke();
  }
  for (let c = 0; c <= C; c++) {
    ctx.beginPath(); ctx.moveTo(2 + c * CELL, 2); ctx.lineTo(2 + c * CELL, 2 + R * CELL); ctx.stroke();
  }

  // Clues
  ctx.fillStyle = COLORS.clue;
  ctx.font = `bold ${Math.floor(CELL * 0.4)}px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const cl of state.clues) {
    const x = 2 + cl.c * CELL + CELL / 2;
    const y = 2 + cl.r * CELL + CELL / 2;
    ctx.fillStyle = COLORS.clueBg;
    ctx.beginPath(); ctx.arc(x, y, CELL * 0.35, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = COLORS.clue;
    ctx.fillText(cl.val, x, y);
  }

  // Hint glow
  ctx.strokeStyle = COLORS.borderHint;
  ctx.lineWidth = 3;
  for (const key of state.hintCells) {
    const [r, c] = key.split(',').map(Number);
    ctx.strokeRect(2 + c * CELL + 3, 2 + r * CELL + 3, CELL - 6, CELL - 6);
  }
}

// Input
canvas.addEventListener('pointerdown', handlePointer);

function handlePointer(e) {
  if (state.won) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left - 2;
  const y = e.clientY - rect.top - 2;
  const c = Math.floor(x / CELL), r = Math.floor(y / CELL);
  if (r >= 0 && r < state.rows && c >= 0 && c < state.cols) {
    state.grid[r][c] = state.mode === 'black' ? 1 : 0;
    playClick();
    draw();
    if (state.autoCheck) checkAndMaybeWin();
    saveProgress();
  }
}

function toggleMode(mode) {
  state.mode = mode;
  document.getElementById('blackBtn').classList.toggle('active', mode === 'black');
  document.getElementById('whiteBtn').classList.toggle('active', mode === 'white');
}

function giveHint() {
  if (state.hints <= 0 || state.won) {
    showToast('No hints left!');
    return;
  }
  state.hints--;
  state.hintsUsed++;
  document.getElementById('hints').textContent = state.hints;

  const lvl = LEVELS[state.level];
  for (let r = 0; r < state.rows; r++) {
    for (let c = 0; c < state.cols; c++) {
      if (state.grid[r][c] !== lvl.grid[r * lvl.cols + c]) {
        state.grid[r][c] = lvl.grid[r * lvl.cols + c];
        state.hintCells.add(`${r},${c}`);
        playHint();
        draw();
        if (checkAndMaybeWin()) return;
        return;
      }
    }
  }
}

function checkAndMaybeWin() {
  if (checkWin()) {
    state.won = true;
    playWin();
    saveProgress();
    updateMenu();
    setTimeout(() => {
      document.getElementById('winStars').textContent = '⭐'.repeat(computeStars());
      const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      const mins = Math.floor(elapsed / 60), secs = elapsed % 60;
      document.getElementById('winStats').textContent = `Time: ${mins}:${secs.toString().padStart(2, '0')} · Hints: ${state.hintsUsed}`;
      document.getElementById('winModal').classList.add('show');
    }, 500);
  }
}

function computeStars() {
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  if (state.hintsUsed === 0 && elapsed < 60) return 3;
  if (state.hintsUsed <= 1 && elapsed < 120) return 2;
  return 1;
}

function loadLevel(idx) {
  state.level = idx;
  const lvl = LEVELS[idx];
  state.rows = lvl.rows; state.cols = lvl.cols;
  state.clues = lvl.clues;
  state.won = false; state.hintsUsed = 0; state.hints = 3;
  state.hintCells.clear();
  state.startTime = Date.now();
  const saved = getSavedGrid(idx);
  state.grid = saved || Array(state.rows).fill(null).map(() => Array(state.cols).fill(0));
  document.getElementById('tier').textContent = lvl.tier;
  document.getElementById('lvlNum').textContent = idx + 1;
  document.getElementById('hints').textContent = state.hints;
  resize();
}

// Menu
function updateMenu() {
  const tierList = document.getElementById('tierList');
  tierList.innerHTML = '';
  let currentTier = '';
  for (let i = 0; i < LEVELS.length; i++) {
    const lvl = LEVELS[i];
    if (lvl.tier !== currentTier) {
      currentTier = lvl.tier;
      const label = document.createElement('div');
      label.className = 'tier-label';
      label.textContent = currentTier;
      tierList.appendChild(label);
    }
    const btn = document.createElement('button');
    btn.className = 'lvl-btn';
    const s = loadSave();
    const progress = s.progress[i] || {};
    if (progress.completed) btn.classList.add('completed');
    btn.innerHTML = `${i + 1}<div class="lvl-stars">${'⭐'.repeat(progress.stars || 0)}</div>`;
    btn.onclick = () => {
      loadLevel(i);
      document.getElementById('menuOverlay').classList.remove('show');
    };
    tierList.appendChild(btn);
  }
}

// Web Audio
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, type = 'sine') {
  if (!state.sfxOn) return;
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
  osc.stop(audioCtx.currentTime + dur);
}

function playClick() { playTone(440, 0.05); }
function playHint() { playTone(880, 0.1); }
function playWin() {
  if (!state.sfxOn) return;
  initAudio();
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.2), i * 100));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Timer
setInterval(() => {
  if (state.won || state.paused) return;
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const mins = Math.floor(elapsed / 60), secs = elapsed % 60;
  document.getElementById('timer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
}, 1000);

// Event listeners
document.getElementById('blackBtn').onclick = () => toggleMode('black');
document.getElementById('whiteBtn').onclick = () => toggleMode('white');
document.getElementById('hintBtn').onclick = giveHint;
document.getElementById('checkBtn').onclick = () => { if (checkWin()) checkAndMaybeWin(); else showToast('Not solved yet'); };
document.getElementById('clearBtn').onclick = () => { state.grid = Array(state.rows).fill(null).map(() => Array(state.cols).fill(0)); draw(); saveProgress(); };
document.getElementById('menuBtn').onclick = () => { updateMenu(); document.getElementById('menuOverlay').classList.add('show'); };
document.getElementById('menuBtn2').onclick = () => { document.getElementById('winModal').classList.remove('show'); document.getElementById('menuOverlay').classList.add('show'); };
document.getElementById('closeMenuBtn').onclick = () => document.getElementById('menuOverlay').classList.remove('show');
document.getElementById('settingsBtn').onclick = () => { document.getElementById('settingsPanel').classList.add('show'); };
document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('settingsPanel').classList.remove('show');
document.getElementById('nextBtn').onclick = () => {
  document.getElementById('winModal').classList.remove('show');
  if (state.level < LEVELS.length - 1) loadLevel(state.level + 1);
  else showToast('All levels completed!');
};
document.getElementById('replayBtn').onclick = () => {
  document.getElementById('winModal').classList.remove('show');
  loadLevel(state.level);
};
document.getElementById('musicToggle').onchange = (e) => { state.musicOn = e.target.checked; saveSettings(); };
document.getElementById('sfxToggle').onchange = (e) => { state.sfxOn = e.target.checked; saveSettings(); };
document.getElementById('autocheckToggle').onchange = (e) => { state.autoCheck = e.target.checked; saveSettings(); };

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'b' || e.key === 'B') toggleMode('black');
  if (e.key === 'w' || e.key === 'W') toggleMode('white');
  if (e.key === 'h' || e.key === 'H') giveHint();
  if (e.key === 'r' || e.key === 'R') { state.grid = Array(state.rows).fill(null).map(() => Array(state.cols).fill(0)); draw(); saveProgress(); }
  if (e.key === 'Enter') { if (checkWin()) checkAndMaybeWin(); else showToast('Not solved yet'); }
  if (e.key === 'Escape') { updateMenu(); document.getElementById('menuOverlay').classList.add('show'); }
});

// Init
const s = loadSave();
state.musicOn = s.settings.music;
state.sfxOn = s.settings.sfx;
state.autoCheck = s.settings.autocheck;
document.getElementById('musicToggle').checked = state.musicOn;
document.getElementById('sfxToggle').checked = state.sfxOn;
document.getElementById('autocheckToggle').checked = state.autoCheck;

loadLevel(0);

// Cleanup on unload / visibility hidden to release AudioContext
function closeAudioCtx() {
  if (audioCtx) {
    try { audioCtx.close(); } catch(e) {}
    audioCtx = null;
  }
}
window.addEventListener('beforeunload', closeAudioCtx);
window.addEventListener('pagehide', closeAudioCtx);
document.addEventListener('visibilitychange', () => { if (document.hidden) closeAudioCtx(); });
</script>
