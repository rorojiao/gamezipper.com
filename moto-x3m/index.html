const LEVELS=generateLevels();

/* ===== GAME STATE ===== */
let state='menu'; // menu, levelSelect, playing, levelComplete, tutorial
let currentLevelIdx=0;
let bike=null;
let camera={x:0,y:0,shake:0,shakeTime:0};
let levelTime=0;
let flipCount=0;
let flipAccum=0;
let flipBonus=0;
let lastCheckpointIdx=-1;
let respawnTimer=0;
let dead=false;
let grounded=false;
let lastTime=0;
let rafId=null;
let inputState={up:false,down:false,left:false,right:false};
let menuParticles=[];
let levelSelectScroll=0;

/* ===== BIKE ===== */
function createBike(x,y){
return{x,y,vx:0,vy:0,angle:0,angularVel:0,wheelAngle:0}}
function getWheelPositions(b){
let cos=Math.cos(b.angle),sin=Math.sin(b.angle);
let hw=WHEELBASE/2;
return{
front:{x:b.x+cos*hw,y:b.y+sin*hw},
rear:{x:b.x-cos*hw,y:b.y-sin*hw}}}

/* ===== TERRAIN COLLISION ===== */
function getTerrainYAt(terrain,px){
if(px<=terrain[0].x)return terrain[0].y;
if(px>=terrain[terrain.length-1].x)return terrain[terrain.length-1].y;
for(let i=0;i<terrain.length-1;i++){
if(px>=terrain[i].x&&px<=terrain[i+1].x){
let t=(px-terrain[i].x)/(terrain[i+1].x-terrain[i].x+eps);
return terrain[i].y+(terrain[i+1].y-terrain[i].y)*t;
}}
return terrain[terrain.length-1].y}

function getTerrainAngle(terrain,px){
let dx=15;
let y1=getTerrainYAt(terrain,px-dx);
let y2=getTerrainYAt(terrain,px+dx);
return Math.atan2(y2-y1,2*dx)}

function collideWheel(terrain,wx,wy,r){
let ty=getTerrainYAt(terrain,wx);
if(wy+r>ty){
return{collided:true,surfaceY:ty-r,pushUp:ty-r-wy,angle:getTerrainAngle(terrain,wx)}}
return{collided:false}}

/* ===== OBSTACLE COLLISION ===== */
function getObstaclePlatformY(obs,time){
if(obs.type==='platform'){
return obs.y+Math.sin(time*Math.PI*2/obs.period)*obs.dy}
return obs.y}

function checkObstacles(bike,wheels,level,time){
let hit=false;
for(let obs of level.obstacles){
if(obs.type==='barrel'){
let dx=bike.x-obs.x,dy=bike.y-obs.y;
if(Math.sqrt(dx*dx+dy*dy)<35){hit=true;spawnParticles(obs.x,obs.y,'#ff3333',20,200,0.6);spawnParticles(obs.x,obs.y,'#ff6600',15,150,0.5)}}
else if(obs.type==='spike'){
if(bike.x>=obs.x&&bike.x<=obs.x+obs.w){
let ty=getTerrainYAt(level.terrain,bike.x);
if(bike.y+WHEEL_R>ty-15){hit=true;spawnParticles(bike.x,bike.y,'#ff0044',15,180,0.5)}}}
else if(obs.type==='wall'){
let top=obs.y-obs.h;
if(bike.x>=obs.x&&bike.x<=obs.x+obs.w&&bike.y+WHEEL_R>top){
hit=true;spawnParticles(obs.x,top,'#ff6600',12,120,0.4)}}
else if(obs.type==='platform'){
let py=getObstaclePlatformY(obs,time);
if(bike.x>=obs.x&&bike.x<=obs.x+obs.w){
for(let w of[wheels.front,wheels.rear]){
if(w.y+WHEEL_R>py&&w.y+WHEEL_R<py+30&&w.vy>0){
// Push up
bike.y=py-WHEEL_R-10;
bike.vy=Math.min(bike.vy,0);
grounded=true}}}}}
return hit}

/* ===== PHYSICS UPDATE ===== */
function updatePhysics(dt,level){
if(dead||respawnTimer>0)return;
dt=Math.min(dt,0.033);
let b=bike;
let terrain=level.terrain;

// Gravity
b.vy+=GRAVITY*dt;

// Input forces
let accel=0,leanInput=0;
if(inputState.up)accel=ACCEL;
if(inputState.down)accel=-BRAKE_FORCE;
if(inputState.left)leanInput=-1;
if(inputState.right)leanInput=1;

// Apply acceleration along bike direction
if(accel!==0){
b.vx+=Math.cos(b.angle)*accel*dt;
b.vy+=Math.sin(b.angle)*accel*dt*0.5}

// Lean / angular velocity
b.angularVel+=leanInput*LEAN_SPEED*dt;
if(!grounded){b.angularVel+=leanInput*2.5*dt}
b.angularVel*=Math.pow(ANGULAR_DAMP,dt*60);
b.angle+=b.angularVel*dt;

// Terminal velocity
b.vx=Math.max(-MAX_VX,Math.min(MAX_VX,b.vx));
b.vy=Math.max(-MAX_VY,Math.min(MAX_VY,b.vy));

// Move
b.x+=b.vx*dt;
b.y+=b.vy*dt;

// Wheel collision
let wheels=getWheelPositions(b);
let fResult=collideWheel(terrain,wheels.front.x,wheels.front.y,WHEEL_R);
let rResult=collideWheel(terrain,wheels.rear.x,wheels.rear.y,WHEEL_R);
grounded=false;
let fGround=false,rGround=false;

if(rResult.collided){
b.y+=rResult.pushUp;
grounded=true;rGround=true;
// Friction and surface alignment
let surfAngle=rResult.angle;
if(b.vy>0)b.vy*=0.3;
b.vx*=0.98;
// Align to surface
if(Math.abs(leanInput)<0.5){b.angle+=(surfAngle-b.angle)*0.15}
}

if(fResult.collided){
b.y+=fResult.pushUp;
grounded=true;fGround=true;
if(b.vy>0)b.vy*=0.3;
b.vx*=0.98;
let surfAngle=fResult.angle;
if(Math.abs(leanInput)<0.5){b.angle+=(surfAngle-b.angle)*0.15}
}

// Keep bike from going below terrain
let centerTY=getTerrainYAt(terrain,b.x);
if(b.y+WHEEL_R>centerTY){
b.y=centerTY-WHEEL_R;
if(b.vy>0)b.vy=0;
grounded=true}

// Don't go left of start
if(b.x<level.startX)b.x=level.startX;

// Obstacle collision
let obsWheels=getWheelPositions(b);
if(checkObstacles(b,obsWheels,level,levelTime)){
killBike(level);return}

// Checkpoint check
for(let i=0;i<level.checkpoints.length;i++){
if(b.x>=level.checkpoints[i].x&&i>lastCheckpointIdx){
lastCheckpointIdx=i;playCheckpoint()}}

// Finish check
if(b.x>=level.finishX){completeLevel(level);return}

// Flip detection
if(!grounded){
flipAccum+=b.angularVel*dt;
if(Math.abs(flipAccum)>=Math.PI*2){
let flips=Math.floor(Math.abs(flipAccum)/(Math.PI*2));
flipCount+=flips;flipBonus+=flips;
flipAccum=flipAccum%(Math.PI*2);
playFlip();
spawnParticles(b.x,b.y,'#00ffff',12,150,0.4)}}

if(grounded)flipAccum=0;

// Engine sound
if(grounded&&(inputState.up||inputState.down)){playEngine(b.vx)}
else{stopEngine()}

// Wheel spin animation
b.wheelAngle+=b.vx*dt*0.1}

function killBike(level){
dead=true;
playCrash();
spawnParticles(bike.x,bike.y,'#ff3333',25,250,0.7);
spawnParticles(bike.x,bike.y,'#ff6600',20,200,0.6);
camera.shake=12;camera.shakeTime=0.3;
respawnTimer=1.0}

function respawnBike(level){
dead=false;
let cp=level.startX;
let cpY=level.startY;
if(lastCheckpointIdx>=0){
cp=level.checkpoints[lastCheckpointIdx].x;
cpY=getTerrainYAt(level.terrain,cp)-WHEEL_R-20}
bike.x=cp;bike.y=Math.min(cpY,level.startY);
bike.vx=0;bike.vy=0;bike.angle=0;bike.angularVel=0;
flipAccum=0;respawnTimer=0.5}

function completeLevel(level){
state='levelComplete';
stopEngine();
playLevelComplete();
let effectiveTime=levelTime-flipBonus;
if(effectiveTime<0)effectiveTime=0;
let stars=1;
if(effectiveTime<=level.starTimes[1])stars=2;
if(effectiveTime<=level.starTimes[0])stars=3;
let lnum=currentLevelIdx+1;
if(!saveData.stars[lnum]||saveData.stars[lnum]<stars)saveData.stars[lnum]=stars;
if(!saveData.bestTimes[lnum]||effectiveTime<saveData.bestTimes[lnum])saveData.bestTimes[lnum]=Math.round(effectiveTime*10)/10;
if(lnum>=saveData.currentLevel)saveData.currentLevel=Math.min(lnum+1,25);
writeSave();
// Confetti
for(let i=0;i<40;i++){let c=['#ff3333','#00ff88','#ffd700','#4488ff','#ff6600','#00ffff'][Math.floor(Math.random()*6)];
spawnParticles(bike.x+Math.random()*200-100,bike.y-100+Math.random()*50,c,1,180,1.5)}}

/* ===== RENDERING ===== */
function drawBackground(){
let grad=ctx.createLinearGradient(0,0,0,H);
grad.addColorStop(0,'#0a0a2e');grad.addColorStop(1,'#1a1a4e');
ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
// Stars
if(state==='menu'||state==='levelSelect'||state==='playing'){
for(let i=0;i<50;i++){let sx=(i*137+camera.x*0.02)%W;let sy=(i*97)%H;
ctx.fillStyle='rgba(255,255,255,'+(0.2+Math.sin(Date.now()*0.001+i)*0.15)+')';
ctx.fillRect(sx,sy,1.5,1.5)}}}

function drawTerrain(terrain,ox,oy){
if(terrain.length<2)return;
// Fill
ctx.beginPath();ctx.moveTo(terrain[0].x-ox,terrain[0].y-oy);
for(let i=1;i<terrain.length;i++)ctx.lineTo(terrain[i].x-ox,terrain[i].y-oy);
ctx.lineTo(terrain[terrain.length-1].x-ox,H+50);ctx.lineTo(terrain[0].x-ox,H+50);ctx.closePath();
ctx.fillStyle='#1a1a2e';ctx.fill();
// Edge
ctx.beginPath();ctx.moveTo(terrain[0].x-ox,terrain[0].y-oy);
for(let i=1;i<terrain.length;i++)ctx.lineTo(terrain[i].x-ox,terrain[i].y-oy);
ctx.strokeStyle='#00ff88';ctx.lineWidth=3;ctx.shadowColor='#00ff88';ctx.shadowBlur=8;
ctx.stroke();ctx.shadowBlur=0}

function drawObstacles(obstacles,ox,oy,time){
for(let obs of obstacles){
let sx=obs.x-ox,sy=obs.y-oy;
if(obs.type==='ramp'){
ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+obs.w,sy);ctx.lineTo(sx+obs.w,sy-obs.h);ctx.closePath();
ctx.fillStyle='rgba(255,215,0,0.3)';ctx.fill();ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.stroke()}
else if(obs.type==='barrel'){
ctx.beginPath();ctx.arc(sx,sy,18,0,Math.PI*2);
ctx.fillStyle='rgba(255,51,51,0.4)';ctx.fill();ctx.strokeStyle='#ff3333';ctx.lineWidth=2;
ctx.shadowColor='#ff3333';ctx.shadowBlur=12;ctx.stroke();ctx.shadowBlur=0;
ctx.fillStyle='#ff3333';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText('!',sx,sy+5)}
else if(obs.type==='platform'){
let py=getObstaclePlatformY(obs,time);
ctx.fillStyle='rgba(68,136,255,0.5)';
ctx.fillRect(sx,py-oy,obs.w,12);
ctx.strokeStyle='#4488ff';ctx.lineWidth=2;ctx.strokeRect(sx,py-oy,obs.w,12)}
else if(obs.type==='spike'){
ctx.fillStyle='#ff0044';
for(let s=0;s<obs.w;s+=12){
ctx.beginPath();ctx.moveTo(sx+s,sy);ctx.lineTo(sx+s+6,sy-20);ctx.lineTo(sx+s+12,sy);ctx.fill()}}
else if(obs.type==='wall'){
ctx.fillStyle='rgba(255,102,0,0.3)';ctx.fillRect(sx,sy-obs.h,obs.w,obs.h);
ctx.strokeStyle='#ff6600';ctx.lineWidth=2;ctx.strokeRect(sx,sy-obs.h,obs.w,obs.h)}}}

function drawCheckpoints(level,ox,oy){
for(let i=0;i<level.checkpoints.length;i++){
let cx=level.checkpoints[i].x-ox;
let ty=getTerrainYAt(level.terrain,level.checkpoints[i].x)-oy;
// Flag pole
ctx.strokeStyle='#00ff88';ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(cx,ty);ctx.lineTo(cx,ty-50);ctx.stroke();
// Flag
ctx.fillStyle=i<=lastCheckpointIdx?'#00ff88':'#006633';
ctx.beginPath();ctx.moveTo(cx,ty-50);ctx.lineTo(cx+20,ty-40);ctx.lineTo(cx,ty-30);ctx.fill()}}

function drawFinish(fx,ox,oy,terrain){
let sx=fx-ox;
let ty=getTerrainYAt(terrain,fx)-oy;
// Checkered pattern
let size=10;let rows=6;let cols=3;
for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){
ctx.fillStyle=(r+c)%2===0?'#ffffff':'#333333';
ctx.fillRect(sx+c*size-15,ty-rows*size+r*size-10,size,size)}}
// Banner
ctx.fillStyle='#ffd700';ctx.font='bold 14px Arial';ctx.textAlign='center';
ctx.fillText('FINISH',sx,ty-rows*size-15)}

function drawBike(b,ox,oy){
let sx=b.x-ox,sy=b.y-oy;
ctx.save();ctx.translate(sx,sy);ctx.rotate(b.angle);
// Body
ctx.strokeStyle='#00ffff';ctx.lineWidth=2.5;ctx.shadowColor='#00ffff';ctx.shadowBlur=6;
// Frame
ctx.beginPath();ctx.moveTo(-WHEELBASE/2,0);ctx.lineTo(-8,-20);ctx.lineTo(10,-22);ctx.lineTo(WHEELBASE/2,0);ctx.stroke();
// Seat
ctx.fillStyle='#ff6600';ctx.fillRect(-10,-22,12,4);
// Rider silhouette
ctx.fillStyle='rgba(0,255,255,0.4)';
ctx.beginPath();ctx.arc(0,-30,9,0,Math.PI*2);ctx.fill(); // Head
ctx.strokeStyle='#00ffff';ctx.lineWidth=1.5;ctx.stroke();
ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(-5,-10);ctx.stroke(); // Body
ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(8,-12);ctx.stroke();
// Wheels
let hw=WHEELBASE/2;
ctx.strokeStyle='#00ffff';ctx.lineWidth=2;
ctx.beginPath();ctx.arc(-hw,0,WHEEL_R,0,Math.PI*2);ctx.stroke();
ctx.beginPath();ctx.arc(hw,0,WHEEL_R,0,Math.PI*2);ctx.stroke();
// Wheel spokes
for(let w of[-hw,hw]){for(let s=0;s<4;s++){
let a=b.wheelAngle+s*Math.PI/2;
ctx.beginPath();ctx.moveTo(w+Math.cos(a)*WHEEL_R*0.4,Math.sin(a)*WHEEL_R*0.4);
ctx.lineTo(w+Math.cos(a)*WHEEL_R,Math.sin(a)*WHEEL_R);ctx.stroke()}}
ctx.shadowBlur=0;ctx.restore()}

function drawHUD(level){
// Level name
ctx.fillStyle='#00ffff';ctx.font='bold 18px Arial';ctx.textAlign='left';
ctx.fillText(level.name,15,30);
// Timer
let effectiveTime=levelTime-flipBonus;if(effectiveTime<0)effectiveTime=0;
let timeStr='Time: '+effectiveTime.toFixed(1)+'s';
ctx.fillStyle='#ffffff';ctx.font='bold 20px Arial';ctx.textAlign='right';
ctx.fillText(timeStr,W-15,30);
// Flip counter
if(flipBonus>0){
ctx.fillStyle='#ffd700';ctx.font='bold 16px Arial';ctx.textAlign='right';
ctx.fillText('Flips: '+flipBonus+' (-'+flipBonus+'s)',W-15,55)}
// Checkpoint progress
let progress=Math.min(1,bike.x/level.finishX);
ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(W/2-100,10,200,8);
ctx.fillStyle='#00ff88';ctx.fillRect(W/2-100,10,200*progress,8);
ctx.strokeStyle='rgba(0,255,136,0.4)';ctx.lineWidth=1;ctx.strokeRect(W/2-100,10,200,8)}

/* ===== SCREENS ===== */
function drawMenu(){
drawBackground();
// Title glow
let pulse=0.7+Math.sin(Date.now()*0.003)*0.3;
ctx.save();
ctx.shadowColor='#00ffff';ctx.shadowBlur=30*pulse;
ctx.fillStyle='#00ffff';ctx.font='bold 72px Arial';ctx.textAlign='center';
ctx.fillText('MOTO X3M',W/2,H*0.28);
ctx.shadowBlur=0;
ctx.fillStyle='#ff6600';ctx.font='bold 18px Arial';
ctx.fillText('Physics Motorcycle Racing',W/2,H*0.36);
ctx.restore();
// Play button
let bw=220,bh=60,bx=W/2-bw/2,by=H*0.50;
let hover=inputState._menuHover;
ctx.fillStyle=hover?'rgba(0,255,136,0.3)':'rgba(0,255,136,0.15)';
ctx.strokeStyle='#00ff88';ctx.lineWidth=3;
roundRect(bx,by,bw,bh,12);ctx.fill();ctx.stroke();
ctx.fillStyle='#00ff88';ctx.font='bold 28px Arial';ctx.textAlign='center';
ctx.fillText('PLAY',W/2,by+bh/2+10);
// Credits
ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='14px Arial';
ctx.fillText('Use Arrow Keys or WASD to control',W/2,H*0.70);
ctx.fillText('Perform flips for time bonuses!',W/2,H*0.75);
ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='12px Arial';
ctx.fillText('GameZipper.com',W/2,H*0.92);
// Store button bounds for click detection
menuBtn={x:bx,y:by,w:bw,h:bh}}
let menuBtn={x:0,y:0,w:0,h:0};

function drawLevelSelect(){
drawBackground();
ctx.fillStyle='#00ffff';ctx.font='bold 36px Arial';ctx.textAlign='center';
ctx.shadowColor='#00ffff';ctx.shadowBlur=10;
ctx.fillText('SELECT LEVEL',W/2,50);ctx.shadowBlur=0;
let cols=5,btnW=70,btnH=70,gap=12;
let gridW=cols*btnW+(cols-1)*gap;
let startX=(W-gridW)/2;
let startY=80;
levelButtons=[];
for(let i=0;i<25;i++){
let row=Math.floor(i/cols),col=i%cols;
let bx=startX+col*(btnW+gap),by=startY+row*(btnH+gap);
let unlocked=i<saveData.currentLevel;
let stars=saveData.stars[i+1]||0;
ctx.fillStyle=unlocked?'rgba(0,255,136,0.1)':'rgba(100,100,100,0.1)';
ctx.strokeStyle=unlocked?'#00ff88':'#444444';ctx.lineWidth=2;
roundRect(bx,by,btnW,btnH,8);ctx.fill();ctx.stroke();
ctx.fillStyle=unlocked?'#ffffff':'#666666';ctx.font='bold 24px Arial';ctx.textAlign='center';
ctx.fillText(''+(i+1),bx+btnW/2,by+btnW/2+2);
// Stars
for(let s=0;s<3;s++){
let starX=bx+btnW/2-15+s*15,starY=by+btnH-14;
drawStar(starX,starY,6,s<stars?'#ffd700':'#333333')}
levelButtons.push({x:bx,y:by,w:btnW,h:btnH,idx:i})}}
let levelButtons=[];

function drawStar(x,y,r,color){
ctx.fillStyle=color;ctx.beginPath();
for(let i=0;i<5;i++){let a=Math.PI/2+i*Math.PI*2/5;let a2=a+Math.PI*2/10;
ctx.lineTo(x+Math.cos(-a)*r,y-Math.sin(a)*r);
ctx.lineTo(x+Math.cos(-a2)*r*0.4,y-Math.sin(a2)*r*0.4)}
ctx.fill()}

function drawLevelComplete(level){
drawBackground();
let lnum=currentLevelIdx+1;
let effectiveTime=levelTime-flipBonus;if(effectiveTime<0)effectiveTime=0;
let stars=1;
if(effectiveTime<=level.starTimes[1])stars=2;
if(effectiveTime<=level.starTimes[0])stars=3;
ctx.fillStyle='#00ffff';ctx.font='bold 36px Arial';ctx.textAlign='center';
ctx.shadowColor='#00ffff';ctx.shadowBlur=10;
ctx.fillText('LEVEL COMPLETE!',W/2,H*0.15);ctx.shadowBlur=0;
// Stars
for(let s=0;s<3;s++){
let sx=W/2-60+s*60,sy=H*0.28;
drawStar(sx,sy,20,s<stars?'#ffd700':'#333333')}
// Time info
ctx.fillStyle='#ffffff';ctx.font='22px Arial';
ctx.fillText('Time: '+effectiveTime.toFixed(1)+'s',W/2,H*0.42);
let best=saveData.bestTimes[lnum];
if(best!==undefined){ctx.fillStyle='#aaaaaa';ctx.font='18px Arial';
ctx.fillText('Best: '+best.toFixed(1)+'s',W/2,H*0.48)}
if(flipBonus>0){ctx.fillStyle='#ffd700';ctx.font='18px Arial';
ctx.fillText('Flip Bonus: -'+flipBonus+'s',W/2,H*0.54)}
// Buttons
let btns=[];
let btnW2=160,btnH2=50,gap=20;
let totalW=btnW2*3+gap*2;
let bsx=(W-totalW)/2,bsy=H*0.65;
let labels=['Menu','Retry','Next'];
let colors=['#ff6600','#00ffff','#00ff88'];
for(let i=0;i<3;i++){
let bx=bsx+i*(btnW2+gap);
ctx.fillStyle='rgba(255,255,255,0.05)';ctx.strokeStyle=colors[i];ctx.lineWidth=2;
roundRect(bx,bsy,btnW2,btnH2,10);ctx.fill();ctx.stroke();
ctx.fillStyle=colors[i];ctx.font='bold 20px Arial';ctx.textAlign='center';
ctx.fillText(labels[i],bx+btnW2/2,bsy+btnH2/2+7);
btns.push({x:bx,y:bsy,w:btnW2,h:btnH2,action:i})}
completeButtons=btns}
let completeButtons=[];

function drawTutorial(){
ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#00ffff';ctx.font='bold 32px Arial';ctx.textAlign='center';
ctx.fillText('HOW TO PLAY',W/2,H*0.12);
ctx.fillStyle='#ffffff';ctx.font='20px Arial';
let instructions=[
['Up / W','Accelerate'],['Down / S','Brake'],
['Left / A','Lean Back'],['Right / D','Lean Forward']];
let startY2=H*0.22;
for(let i=0;i<instructions.length;i++){
let y=startY2+i*50;
ctx.fillStyle='#ff6600';ctx.textAlign='right';ctx.fillText(instructions[i][0],W/2-20,y);
ctx.fillStyle='#ffffff';ctx.textAlign='left';ctx.fillText(instructions[i][1],W/2+20,y)}
ctx.fillStyle='#ffd700';ctx.textAlign='center';ctx.font='18px Arial';
ctx.fillText('Perform backflips for time bonuses!',W/2,H*0.55);
ctx.fillText('Reach the finish line as fast as you can!',W/2,H*0.62);
// Tap to start
let pulse2=0.5+Math.sin(Date.now()*0.004)*0.5;
ctx.fillStyle='rgba(0,255,136,'+pulse2+')';ctx.font='bold 24px Arial';ctx.textAlign='center';
ctx.fillText('Click or Tap to Start',W/2,H*0.80)}

function roundRect(x,y,w,h,r){
ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

/* ===== GAME LOOP ===== */
function gameLoop(timestamp){
if(!lastTime)lastTime=timestamp;
let dt=(timestamp-lastTime)/1000;
lastTime=timestamp;
if(dt>0.1)dt=0.1;

if(state==='menu'){drawMenu()}
else if(state==='levelSelect'){drawLevelSelect()}
else if(state==='playing'){
let level=LEVELS[currentLevelIdx];
if(respawnTimer>0){respawnTimer-=dt;if(respawnTimer<=0)respawnBike(level)}
if(!dead&&respawnTimer<=0){
levelTime+=dt;
updatePhysics(dt,level)}
updateParticles(dt);
// Camera
let targetCX=bike.x-W*0.35;
let targetCY=bike.y-H*0.5;
camera.x+=(targetCX-camera.x)*0.08;
camera.y+=(targetCY-camera.y)*0.05;
camera.y=Math.max(-200,Math.min(100,camera.y));
// Screen shake
let shakeOX=0,shakeOY=0;
if(camera.shakeTime>0){camera.shakeTime-=dt;shakeOX=(Math.random()-0.5)*camera.shake;shakeOY=(Math.random()-0.5)*camera.shake;camera.shake*=0.9}
let ox=camera.x+shakeOX,oy=camera.y+shakeOY;
// Draw
drawBackground();
drawTerrain(level.terrain,ox,oy);
drawObstacles(level.obstacles,ox,oy,levelTime);
drawCheckpoints(level,ox,oy);
drawFinish(level.finishX,ox,oy,level.terrain);
drawParticles(ox,oy);
if(!dead||respawnTimer>0.5)drawBike(bike,ox,oy);
drawHUD(level)}
else if(state==='levelComplete'){
drawLevelComplete(LEVELS[currentLevelIdx]);
updateParticles(dt);
drawParticles(0,0)}
else if(state==='tutorial'){drawTutorial()}

rafId=requestAnimationFrame(gameLoop)}

/* ===== INPUT ===== */
let keys={};
function onKeyDown(e){
if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space'].includes(e.code))e.preventDefault();
keys[e.code]=true;updateInput();
initAudio()}
function onKeyUp(e){keys[e.code]=false;updateInput()}
function updateInput(){
inputState.up=keys['ArrowUp']||keys['KeyW'];
inputState.down=keys['ArrowDown']||keys['KeyS'];
inputState.left=keys['ArrowLeft']||keys['KeyA'];
inputState.right=keys['ArrowRight']||keys['KeyD']}

function getClickTarget(mx,my){
if(state==='menu'){
if(mx>=menuBtn.x&&mx<=menuBtn.x+menuBtn.w&&my>=menuBtn.y&&my<=menuBtn.y+menuBtn.h)return 'play'}
return null}

function onMouseDown(e){
initAudio();playClick();
let rect=canvas.getBoundingClientRect();
let mx=(e.clientX-rect.left)*(canvas.width/rect.width);
let my=(e.clientY-rect.top)*(canvas.height/rect.height);
handleClick(mx,my)}

function handleClick(mx,my){
if(state==='menu'){
if(mx>=menuBtn.x&&mx<=menuBtn.x+menuBtn.w&&my>=menuBtn.y&&my<=menuBtn.y+menuBtn.h){
if(!saveData.tutorialShown){state='tutorial';saveData.tutorialShown=true;writeSave()}
else{state='levelSelect'}}}
else if(state==='levelSelect'){
for(let btn of levelButtons){
if(mx>=btn.x&&mx<=btn.x+btn.w&&my>=btn.y&&my<=btn.y+btn.h){
if(btn.idx<saveData.currentLevel){
currentLevelIdx=btn.idx;startLevel();return}}}}
else if(state==='tutorial'){state='levelSelect'}
else if(state==='levelComplete'){
for(let btn of completeButtons){
if(mx>=btn.x&&mx<=btn.x+btn.w&&my>=btn.y&&my<=btn.y+btn.h){
if(btn.action===0){state='menu';stopEngine()}
else if(btn.action===1){startLevel()}
else if(btn.action===2){currentLevelIdx=Math.min(currentLevelIdx+1,24);startLevel()}
return}}}
else if(state==='playing'&&!dead&&!keys['KeyP']){
// Pause? No, just ignore
}}

function startLevel(){
state='playing';
let level=LEVELS[currentLevelIdx];
bike=createBike(level.startX,level.startY);
bike.y=getTerrainYAt(level.terrain,bike.x)-WHEEL_R-20;
camera.x=bike.x-W*0.35;camera.y=bike.y-H*0.5;
camera.shake=0;camera.shakeTime=0;
levelTime=0;flipCount=0;flipAccum=0;flipBonus=0;
lastCheckpointIdx=-1;dead=false;respawnTimer=0;grounded=false;
particles=[]}

document.addEventListener('keydown',onKeyDown);
document.addEventListener('keyup',onKeyUp);
canvas.addEventListener('mousedown',onMouseDown);
canvas.addEventListener('touchstart',function(e){
e.preventDefault();initAudio();playClick();
if(e.touches.length>0){
let rect=canvas.getBoundingClientRect();
let mx=(e.touches[0].clientX-rect.left)*(canvas.width/rect.width);
let my=(e.touches[0].clientY-rect.top)*(canvas.height/rect.height);
handleClick(mx,my)}},{passive:false});

// Touch controls
function setupTouch(id,keyName){
let el=document.getElementById(id);if(!el)return;
el.addEventListener('touchstart',function(e){e.preventDefault();initAudio();keys[keyName]=true;updateInput()},{passive:false});
el.addEventListener('touchend',function(e){e.preventDefault();keys[keyName]=false;updateInput()},{passive:false});
el.addEventListener('touchcancel',function(e){keys[keyName]=false;updateInput()})}
setupTouch('btnAccel','ArrowUp');
setupTouch('btnBrake','ArrowDown');
setupTouch('btnLeanBack','ArrowLeft');
setupTouch('btnLeanFwd','ArrowRight');

// Start game loop
rafId=requestAnimationFrame(gameLoop);

/* ===== CLEANUP ===== */
window.cleanup=function(){
if(rafId){cancelAnimationFrame(rafId);rafId=null}
stopEngine();
if(engineOsc){try{engineOsc.stop()}catch(e){};engineOsc=null}
if(audioCtx){try{audioCtx.close()}catch(e){};audioCtx=null}
document.removeEventListener('keydown',onKeyDown);
document.removeEventListener('keyup',onKeyUp);
canvas.removeEventListener('mousedown',onMouseDown);
particles=[];levelButtons=[];completeButtons=[]};
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null}}
else if(state==='playing'){lastTime=performance.now();rafId=requestAnimationFrame(gameLoop)}});

})();
</script>

<script>
(function(){
  try{
    var overlay=document.getElementById("gz-restart-overlay");
    var btn=document.getElementById("gz-restart-btn");
    if(!overlay||!btn)return;
    btn.addEventListener("click",function(){location.reload();});
    function show(){overlay.style.display="flex";}
    function hide(){overlay.style.display="none";}
    window.gzShowRestart=show;
    window.gzHideRestart=hide;
    // Throttled game-over auto-detect: poll every 600ms, not MutationObserver
    // (per-game rAF loops would otherwise fire 1000s of callbacks/sec)
    var sels=["#game-over","#gameOver",".game-over",".gameover","[data-game-over]",".lose-screen",".win-screen",".defeat",".victory"];
    function check(){
      for(var i=0;i<sels.length;i++){
        var el=document.querySelector(sels[i]);
        if(el){
          var s=el.getAttribute("data-gz-checked");
          if(s==="1"){if(overlay.style.display==="none")show();return;}
          var cs=getComputedStyle(el);
          if(cs.display!=="none"&&cs.visibility!=="hidden"&&cs.opacity!=="0"){
            el.setAttribute("data-gz-checked","1");
            show();
            return;
          }
        }
      }
    }
    setInterval(check,600);
    // Keyboard: R restarts
    document.addEventListener("keydown",function(e){
      if((e.key==="r"||e.key==="R")&&!e.ctrlKey&&!e.metaKey&&!e.altKey){
        var tag=(document.activeElement&&document.activeElement.tagName)||"";
        if(tag==="INPUT"||tag==="TEXTAREA")return;
        location.reload();
      }
    });
  }catch(e){console.warn("gz-restart overlay init failed",e);}
})();
</script>
