// Level generation
function generateLevels(){
let levels=[];
for(let i=0;i<40;i++)levels.push(genLevel(i));
return levels;
}

function genLevel(idx){
let pts=[],obs=[],coins=[];
let diff=idx/39;
let len=2000+diff*6000;
let segs=Math.floor(len/80);
let y=300,startY=300;

// Starting flat
pts.push({x:0,y:startY});
for(let i=0;i<5;i++){pts.push({x:(i+1)*40,y:startY})}

let cx=200;
for(let s=0;s<segs;s++){
let segType;
if(idx<5)segType=Math.random()<0.7?'flat':'hill';
else if(idx<10)segType=['hill','hill','gap','flat'][Math.floor(Math.random()*4)];
else if(idx<15)segType=['hill','gap','ramp','hill'][Math.floor(Math.random()*4)];
else if(idx<20)segType=['hill','gap','ramp','spike','hill'][Math.floor(Math.random()*5)];
else if(idx<25)segType=['hill','gap','ramp','spike','loop'][Math.floor(Math.random()*5)];
else if(idx<30)segType=['gap','ramp','spike','hill','gap'][Math.floor(Math.random()*5)];
else segType=['gap','ramp','spike','hill','gap','ramp'][Math.floor(Math.random()*6)];

let hillH=30+diff*80;

if(segType==='flat'){
let w=40+Math.random()*60;
y+=((Math.random()-0.5)*10);
pts.push({x:cx+w,y});
cx+=w;
}else if(segType==='hill'){
let w=60+Math.random()*100;
let peak=y-hillH*(0.5+Math.random()*0.5);
let steps=3+Math.floor(Math.random()*3);
for(let j=1;j<=steps;j++){
let t=j/steps;
let py=y+(peak-y)*Math.sin(t*Math.PI);
pts.push({x:cx+w*j/steps,y:py});
}
y=pts[pts.length-1].y;
cx+=w;
}else if(segType==='gap'){
let gapW=40+diff*100;
y+=10;
pts.push({x:cx+10,y});
let endY=y+10;
pts.push({x:cx+10+gapW+20,y:endY});
cx+=10+gapW+20;
y=endY;
if(Math.random()<0.5+diff*0.3){
let coinY=Math.min(y,pts[pts.length-2]?pts[pts.length-2].y:y)-50;
coins.push({x:cx-gapW/2-10,y:coinY,collected:false});
}
}else if(segType==='ramp'){
let w=80;
pts.push({x:cx,y});
pts.push({x:cx+w*0.7,y:y-hillH*0.8});
pts.push({x:cx+w,y:y-hillH*0.3});
y-=hillH*0.3;
cx+=w;
if(Math.random()<0.4){
coins.push({x:cx+w*0.3,y:y-hillH*1.5,collected:false});
}
}else if(segType==='spike'){
let w=40;
pts.push({x:cx,y});
obs.push({type:'spike',x:cx+10,y:y-15,w:20,h:15});
pts.push({x:cx+w,y:y+(Math.random()-0.5)*10});
y=pts[pts.length-1].y;
cx+=w;
coins.push({x:cx-20,y:y-60,collected:false});
}else if(segType==='loop'){
let w=120,r=50;
let baseY=y;
for(let j=0;j<=8;j++){
let a=(j/8)*Math.PI*2;
pts.push({x:cx+w*j/8,y:baseY-r-Math.sin(a)*r});
}
pts.push({x:cx+w,y:baseY});
y=baseY;
cx+=w;
coins.push({x:cx-w/2,y:baseY-r*2.5,collected:false});
}
}

// Ending flat + finish flag
for(let i=0;i<5;i++){pts.push({x:cx+(i+1)*40,y})}
pts.push({x:cx+250,y});

let finishX=cx+200;
let parTime=Math.max(8,(len/80)*(3-diff*0.5));

return{points:pts,obstacles:obs,coins,parTime:Math.round(parTime),finishX,sky:idx%5,idx};
}

let LEVELS=generateLevels();

// Physics helpers
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2)}

function getTerrainY(pts,x){
if(x<=pts[0].x)return pts[0].y;
for(let i=0;i<pts.length-1;i++){
if(x>=pts[i].x&&x<=pts[i+1].x){
let t=(x-pts[i].x)/(pts[i+1].x-pts[i].x+EPS);
return pts[i].y+(pts[i+1].y-pts[i].y)*t;
}}
return pts[pts.length-1].y;
}

function getTerrainAngle(pts,x){
let dx=4;
return Math.atan2(getTerrainY(pts,x+dx)-getTerrainY(pts,x-dx),dx*2);
}

function getTerrainNormal(pts,x){
let a=getTerrainAngle(pts,x);
return{x:-Math.sin(a),y:Math.cos(a)};
}

// Game state
function createGame(levelIdx){
let lvl=LEVELS[levelIdx];
let vd=getVehicle(save.vehicle);
return{
levelIdx,level:lvl,vehicle:{
x:lvl.points[2].x,y:lvl.points[2].y-vd.h,
vx:0,vy:0,angle:0,angularVel:0,
speed:0,wheelRot:0,
airborne:false,grounded:false,
flipCount:0,flipAccum:0,lastAngle:0,
mass:vd.mass,maxSpeed:vd.maxSpeed,grip:vd.grip,
w:vd.w,h:vd.h,color:vd.color,accent:vd.accent,
noBarrierCrash:vd.noBarrierCrash||false
},
time:0,coins:0,score:0,
state:'playing',
stars:0,
engineTimer:0,
dustTimer:0,
startTime:performance.now()
};
}

function updateGame(g,dt){
if(g.state!=='playing')return;
let v=g.vehicle;
let lvl=g.level;

g.time+=dt;

// Input
let accel=0,lean=0;
if(keys['ArrowRight']||keys['KeyD']||touchBtns.right)accel=1;
if(keys['ArrowLeft']||keys['KeyA']||touchBtns.left)accel=-1;
if(keys['ArrowUp']||keys['KeyW']||touchBtns.up)lean=-1;
if(keys['ArrowDown']||keys['KeyS']||touchBtns.down)lean=1;

// Physics
let terrY=getTerrainY(lvl.points,v.x);
let terrA=getTerrainAngle(lvl.points,v.x);
let normal=getTerrainNormal(lvl.points,v.x);
v.vy+=GRAVITY;

// Acceleration
let force=accel*v.maxSpeed*0.08*v.grip;
v.vx+=force;

// Airborne lean
if(!v.grounded)v.angularVel+=lean*0.003;

// Speed limit
let spd=Math.sqrt(v.vx*v.vx+v.vy*v.vy);
if(spd>v.maxSpeed){v.vx*=v.maxSpeed/spd;v.vy*=v.maxSpeed/spd}
v.speed=Math.abs(v.vx);

// Drag
v.vx*=0.995;
v.angularVel*=0.98;

// Position
v.x+=v.vx;
v.y+=v.vy;
v.angle+=v.angularVel;
v.wheelRot+=v.speed*0.1;

// Ground collision
let bottomY=v.y+v.h*0.5;
if(bottomY>=terrY&&v.x>lvl.points[0].x&&v.x<lvl.points[lvl.points.length-1].x){
v.y=terrY-v.h*0.5;

// Bounce/suspension
let impactV=v.vy;
if(impactV>3){
cam.shake=Math.min(impactV*1.5,12);
spawnDust(v.x,v.y+v.h*0.5,Math.min(8,Math.floor(impactV)));
}
v.vy*=-0.2;
if(Math.abs(v.vy)<0.5)v.vy=0;

// Align to terrain
let targetAngle=terrA;
v.angle=lerp(v.angle,targetAngle,v.grip*0.15);
v.grounded=true;
v.airborne=false;

// Friction
v.vx*=(0.98-v.grip*0.02);

// Dust
g.dustTimer+=dt;
if(g.dustTimer>0.05&&v.speed>2){
g.dustTimer=0;
spawnDust(v.x-Math.sign(v.vx)*v.w*0.3,v.y+v.h*0.5,1);
}
}else{
v.grounded=false;
v.airborne=true;
}

// Flip tracking
if(v.airborne){
let angleDiff=v.angle-v.lastAngle;
if(angleDiff>Math.PI)angleDiff-=Math.PI*2;
if(angleDiff<-Math.PI)angleDiff+=Math.PI*2;
v.flipAccum+=angleDiff;
if(Math.abs(v.flipAccum)>=Math.PI*2){
v.flipCount++;
v.flipAccum-=Math.sign(v.flipAccum)*Math.PI*2;
spawnFloatingText(v.x,v.y-40,'FLIP +500',COL_COIN);
g.score+=500;
}
}
v.lastAngle=v.angle;

// Crash: flipped over on ground
if(v.grounded&&Math.abs(v.angle%(Math.PI*2))>Math.PI*0.6&&Math.abs(v.angle%(Math.PI*2))<Math.PI*1.4){
triggerCrash(g);return;
}

// Crash: fell too far
if(v.y>1500){triggerCrash(g);return}

// Obstacle collision
for(let ob of lvl.obstacles){
let dx=Math.abs(v.x-ob.x),dy=Math.abs(v.y-ob.y);
if(dx<ob.w*0.5+v.w*0.3&&dy<ob.h*0.5+v.h*0.3){
if(ob.type==='spike'){
if(!v.noBarrierCrash){triggerCrash(g);return}
}else if(ob.type==='barrier'){
if(!v.noBarrierCrash){triggerCrash(g);return}
}
}
}

// Coin collection
for(let c of lvl.coins){
if(!c.collected&&dist(v.x,v.y,c.x,c.y)<35){
c.collected=true;
g.coins++;
g.score+=100;
spawnCoinSparkle(c.x,c.y);
spawnFloatingText(c.x,c.y-10,'+100',COL_COIN);
playSound('coin');
}
}

// Finish
if(v.x>=lvl.finishX){triggerWin(g)}

// Camera
let lookAhead=v.vx*15;
cam.x=lerp(cam.x,v.x+lookAhead-W*0.35,0.06);
cam.y=lerp(cam.y,v.y-H*0.5,0.06);
cam.shake*=0.9;

// Engine sound
g.engineTimer+=dt;
if(g.engineTimer>0.08&&v.speed>0.5){
g.engineTimer=0;
playSound('engine');
}

// Particles
particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=dt;if(p.type==='dust')p.vy-=0.02});
particles=particles.filter(p=>p.life>0);
floatingTexts.forEach(f=>{f.y-=1;f.life-=dt});
floatingTexts=floatingTexts.filter(f=>f.life>0);
}

function triggerCrash(g){
g.state='crashed';
cam.shake=15;
spawnSparks(g.vehicle.x,g.vehicle.y,20);
playSound('crash');
}

function triggerWin(g){
g.state='won';
let timeBonus=Math.max(0,Math.round((g.level.parTime*3-g.time)*10));
g.score+=timeBonus;
let t=g.time;
if(t<=g.level.parTime)g.stars=3;
else if(t<=g.level.parTime*1.5)g.stars=2;
else g.stars=1;
saveLevelResult(g.levelIdx,g.time,g.coins,g.stars);
save.coins+=g.coins;
writeSave();
playSound('win');
setTimeout(()=>playSound('star'),300);
}

function drawTerrain(pts,sx,sy){
if(pts.length<2)return;
ctx.save();
ctx.translate(-cam.x+(cam.shake>0.5?(Math.random()-0.5)*cam.shake:0),
-cam.y+(cam.shake>0.5?(Math.random()-0.5)*cam.shake:0));

// Terrain fill
ctx.beginPath();
ctx.moveTo(pts[0].x,pts[0].y);
for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y+600);
ctx.lineTo(pts[0].x,pts[0].y+600);
ctx.closePath();
let tGrad=ctx.createLinearGradient(0,200,0,800);
tGrad.addColorStop(0,'#2d5a27');tGrad.addColorStop(0.3,'#1a3d15');tGrad.addColorStop(1,'#0d1f0a');
ctx.fillStyle=tGrad;ctx.fill();

// Terrain edge line
ctx.beginPath();
ctx.moveTo(pts[0].x,pts[0].y);
for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
ctx.strokeStyle='#4a8a3a';ctx.lineWidth=3;ctx.stroke();

// Grass tufts

let p=pts[i];
ctx.fillStyle='#5aaa3a';

function drawObstacles(obs){

-cam.y+(cam.shake>0.5?(Math.random()-0.5)*cam.shake:0));
for(let o of obs){
if(o.type==='spike'){
ctx.fillStyle=COL_DANGER;
ctx.beginPath();

ctx.lineTo(o.x,o.y-o.h/2);

ctx.lineTo(o.x+o.w/8,o.y+o.h/4);

}

function drawVehicle(v){
ctx.save();
ctx.translate(v.x-cam.x,v.y-cam.y);
ctx.rotate(v.angle);

let hw=v.w/2,hh=v.h/2;

// Shadow
ctx.fillStyle='rgba(0,0,0,0.3)';
ctx.beginPath();ctx.ellipse(0,hh+4,hw*0.8,5,0,0,Math.PI*2);ctx.fill();

// Body
ctx.fillStyle=v.color;
ctx.beginPath();
let r=6;
ctx.moveTo(-hw+r,-hh);
ctx.lineTo(hw-r,-hh);
ctx.quadraticCurveTo(hw,-hh,hw,-hh+r);
ctx.lineTo(hw,hh-r);
ctx.quadraticCurveTo(hw,hh,hw-r,hh);
ctx.lineTo(-hw+r,hh);
ctx.quadraticCurveTo(-hw,hh,-hw,hh-r);
ctx.lineTo(-hw,-hh+r);
ctx.quadraticCurveTo(-hw,-hh,-hw+r,-hh);
ctx.fill();

// Accent stripe
ctx.fillStyle=v.accent;
ctx.fillRect(-hw+6,-hh+4,v.w-12,6);

// Windshield
ctx.fillStyle='rgba(100,180,255,0.5)';
ctx.beginPath();
ctx.moveTo(hw*0.3,-hh+2);
ctx.lineTo(hw*0.7,-hh+2);
ctx.lineTo(hw*0.6,-hh+hh*0.5);
ctx.lineTo(hw*0.2,-hh+hh*0.5);
ctx.closePath();ctx.fill();

// Wheels
let wheelR=v.h*0.3;
ctx.fillStyle='#222';
[-1,1].forEach(side=>{
let wx=side*hw*0.6,wy=hh+2;
ctx.beginPath();ctx.arc(wx,wy,wheelR,0,Math.PI*2);ctx.fill();
// Tire tread
ctx.strokeStyle='#444';ctx.lineWidth=2;
ctx.beginPath();
let wa=v.wheelRot;
for(let a=0;a<Math.PI*2;a+=Math.PI/3){
ctx.moveTo(wx+Math.cos(wa+a)*wheelR*0.6,wy+Math.sin(wa+a)*wheelR*0.6);
ctx.lineTo(wx+Math.cos(wa+a)*wheelR,wy+Math.sin(wa+a)*wheelR);
}
ctx.stroke();
// Hub
ctx.fillStyle='#666';
ctx.beginPath();ctx.arc(wx,wy,wheelR*0.3,0,Math.PI*2);ctx.fill();
});

ctx.restore();
}

function drawParticles(){

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

roundRect(cx-btnW2/2,btnY-btnH2/2,btnW2,btnH2,12);ctx.fill();
ctx.fillStyle='#000';ctx.font='bold 22px sans-serif';
ctx.fillText('PLAY',cx,btnY+7);

// Vehicle select
let vsY=btnY+70;
ctx.fillStyle='#666';ctx.font='14px sans-serif';
ctx.fillText('Select Vehicle (tap to cycle)',cx,vsY);

// Total stats
ctx.fillStyle='#888';ctx.font='13px sans-serif';
ctx.fillText('Stars: '+save.totalStars+' | Coins: '+save.coins,cx,vsY+30);

// Controls help
ctx.fillStyle='#555';ctx.font='12px sans-serif';
ctx.fillText('Arrow Keys / WASD to drive | Up/Down to lean',cx,H-30);

// Handle click
if(clicked){
if(playHover){
initAudio();resumeAudio();
clicked=false;
}
// Cycle vehicle on tap near vehicle display
if(mouseY>vehY-40&&mouseY<vehY+80){
let idx=VEHICLES.findIndex(v=>v.id===save.vehicle);
let next=(idx+1)%VEHICLES.length;
// Skip locked
for(let i=0;i<VEHICLES.length;i++){
let tryIdx=(next+i)%VEHICLES.length;
if(isVehicleUnlocked(VEHICLES[tryIdx].id)){
save.vehicle=VEHICLES[tryIdx].id;writeSave();break;
}
}
}
}
}

function drawLevelSelect(){
drawBg();
let cx=W/2;

// Title
ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.textAlign='center';
ctx.fillText('SELECT LEVEL',cx,45);

// Back button
ctx.fillStyle='rgba(255,255,255,0.15)';roundRect(15,12,60,36,8);ctx.fill();
ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.textAlign='center';
ctx.fillText('< Back',45,35);

// Grid
let cols=Math.min(5,Math.floor((W-40)/80));
let rows=Math.ceil(40/cols);
let cellW=70,cellH=70,gap=8;
let gridW=cols*(cellW+gap)-gap;
let startX=(W-gridW)/2;
let startY=70;
let scrollOff=clamp(mouseY<0?0:0,-100,Math.max(0,rows*(cellH+gap)-(H-100)));

for(let i=0;i<40;i++){
let col=i%cols,row=Math.floor(i/cols);
let bx=startX+col*(cellW+gap);
let by=startY+row*(cellH+gap)-scrollOff;

if(by<60||by>H)continue;

let unlocked=isLevelUnlocked(i);
let stars=getLevelStars(i);
let hover=mouseX>bx&&mouseX<bx+cellW&&mouseY>by&&mouseY<by+cellH;

ctx.fillStyle=unlocked?(hover?'rgba(0,255,136,0.2)':'rgba(255,255,255,0.08)'):'rgba(255,255,255,0.03)';
roundRect(bx,by,cellW,cellH,8);ctx.fill();

if(unlocked){
ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
ctx.fillText(''+(i+1),bx+cellW/2,by+cellH/2-5);
// Stars
let starStr='';for(let s=0;s<3;s++)starStr+=s<stars?'*':'-';
ctx.fillStyle=stars>=3?COL_COIN:stars>=2?'#ccc':'#888';
ctx.font='14px sans-serif';
ctx.fillText(starStr,bx+cellW/2,by+cellH/2+18);
}else{
ctx.fillStyle='#333';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
ctx.fillText(''+(i+1),bx+cellW/2,by+cellH/2-5);
ctx.fillStyle='#444';ctx.font='14px sans-serif';
ctx.fillText('LOCKED',bx+cellW/2,by+cellH/2+18);
}
}

// Check vehicle unlocks
for(let v of VEHICLES){
let ulvl=v.unlockLevel-1;// 0-indexed
if(getLevelStars(ulvl-1)>=1&&!isVehicleUnlocked(v.id)){
unlockVehicle(v.id);
}
}

// Handle click
if(clicked){
if(mouseX>15&&mouseX<75&&mouseY>12&&mouseY<48){scene='title';clicked=false;return}
for(let i=0;i<40;i++){
let col=i%cols,row=Math.floor(i/cols);
let bx=startX+col*(cellW+gap);
let by=startY+row*(cellH+gap)-scrollOff;
if(mouseX>bx&&mouseX<bx+cellW&&mouseY>by&&mouseY<by+cellH&&isLevelUnlocked(i)){
game=createGame(i);scene='playing';particles=[];floatingTexts=[];
cam.x=game.vehicle.x-W*0.35;cam.y=game.vehicle.y-H*0.5;
clicked=false;return;
}
}
}
}

function drawPauseMenu(){
ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
let cx=W/2,cy=H/2;
ctx.fillStyle='#fff';ctx.font='bold 32px sans-serif';ctx.textAlign='center';
ctx.fillText('PAUSED',cx,cy-80);

let btns=['Resume','Restart','Level Select'];
btns.forEach((t,i)=>{
let by=cy-30+i*60,bw=200,bh=45;
let hover=mouseX>cx-bw/2&&mouseX<cx+bw/2&&mouseY>by-bh/2&&mouseY<by+bh/2;
ctx.fillStyle=hover?'rgba(0,255,136,0.3)':'rgba(255,255,255,0.1)';
roundRect(cx-bw/2,by-bh/2,bw,bh,8);ctx.fill();
ctx.fillStyle='#fff';ctx.font='18px sans-serif';
ctx.fillText(t,cx,by+6);

if(clicked&&hover){
if(i===0)scene='playing';
else if(i===1){game=createGame(game.levelIdx);scene='playing';particles=[];floatingTexts=[];}
else{scene='levelSelect'}
clicked=false;
}
});
}

function drawGameOver(){
ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
let cx=W/2,cy=H/2;

// Crash text with shake
let sh=performance.now()*0.02;
ctx.fillStyle=COL_DANGER;ctx.font='bold 36px sans-serif';ctx.textAlign='center';
ctx.fillText('CRASHED!',cx+Math.sin(sh)*2,cy-80+Math.cos(sh)*2);

ctx.fillStyle='#888';ctx.font='16px sans-serif';
ctx.fillText('Time: '+game.time.toFixed(1)+'s',cx,cy-30);

let btns=['Retry','Level Select'];
btns.forEach((t,i)=>{
let by=cy+20+i*60,bw=200,bh=45;
let hover=mouseX>cx-bw/2&&mouseX<cx+bw/2&&mouseY>by-bh/2&&mouseY<by+bh/2;
ctx.fillStyle=hover?(i===0?'rgba(0,255,136,0.3)':'rgba(255,255,255,0.2)'):'rgba(255,255,255,0.1)';
roundRect(cx-bw/2,by-bh/2,bw,bh,8);ctx.fill();
ctx.fillStyle='#fff';ctx.font='18px sans-serif';
ctx.fillText(t,cx,by+6);

if(clicked&&hover){
if(i===0){game=createGame(game.levelIdx);scene='playing';particles=[];floatingTexts=[];}
else{scene='levelSelect'}
clicked=false;
}
});
}

function drawLevelComplete(){
ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
let cx=W/2,cy=H*0.35;

ctx.fillStyle=COL_NEON;ctx.font='bold 32px sans-serif';ctx.textAlign='center';
ctx.fillText('LEVEL COMPLETE!',cx,cy);

// Stars
let starY=cy+50;
for(let i=0;i<3;i++){
let filled=i<game.stars;
ctx.fillStyle=filled?COL_COIN:'#333';
ctx.font='bold 40px sans-serif';
ctx.fillText(filled?'*':'-',cx-50+i*50,starY);
}

// Stats
let sy=starY+50;
ctx.fillStyle='#fff';ctx.font='16px sans-serif';
ctx.fillText('Time: '+game.time.toFixed(1)+'s (Par: '+game.level.parTime+'s)',cx,sy);
ctx.fillText('Coins: '+game.coins,cx,sy+30);
ctx.fillText('Score: '+game.score,cx,sy+60);

// Next level unlock check
let nextLvl=game.levelIdx+1;
if(nextLvl<40){
for(let v of VEHICLES){
if(v.unlockLevel-1===nextLvl&&!isVehicleUnlocked(v.id)){
ctx.fillStyle=COL_COIN;ctx.font='bold 16px sans-serif';
ctx.fillText(v.name+' Unlocked!',cx,sy+95);
}
}
}

let btns=nextLvl<40?['Next Level','Retry','Level Select']:['Retry','Level Select'];
let bty=sy+120;
btns.forEach((t,i)=>{
let by=bty+i*55,bw=200,bh=45;
let hover=mouseX>cx-bw/2&&mouseX<cx+bw/2&&mouseY>by-bh/2&&mouseY<by+bh/2;
ctx.fillStyle=hover?'rgba(0,255,136,0.3)':'rgba(255,255,255,0.1)';
roundRect(cx-bw/2,by-bh/2,bw,bh,8);ctx.fill();
ctx.fillStyle='#fff';ctx.font='18px sans-serif';
ctx.fillText(t,cx,by+6);

if(clicked&&hover){
if(t==='Next Level'&&nextLvl<40){game=createGame(nextLvl);scene='playing';particles=[];floatingTexts=[];}
else if(t==='Retry'){game=createGame(game.levelIdx);scene='playing';particles=[];floatingTexts=[];}
else{scene='levelSelect'}
clicked=false;
}
});
}

// Main loop
function update(timestamp){
if(!lastTime)lastTime=timestamp;
dt=Math.min((timestamp-lastTime)/1000,0.05);
lastTime=timestamp;

ctx.clearRect(0,0,W,H);

if(scene==='title'){
drawTitle();
}else if(scene==='levelSelect'){
drawLevelSelect();
}else if(scene==='playing'){
if(game)updateGame(game,dt);
drawBg();
drawTerrain(game.level.points);
drawObstacles(game.level.obstacles);
drawCoins(game.level.coins);
drawFinish(game.level.finishX,game.level.points);
drawVehicle(game.vehicle);
drawParticles();
drawHUD(game);
drawMobileControls();

if(game.state==='crashed'){
drawGameOver();
}else if(game.state==='won'){
drawLevelComplete();
}else{
// Pause check
if(keys['Escape']||keys['KeyP']){
scene='paused';
keys['Escape']=false;keys['KeyP']=false;
}
// Mute toggle area
if(clicked){
let mbx=W-15-5-30,mby=15+40;
if(mouseX>mbx&&mouseX<mbx+30&&mouseY>mby&&mouseY<mby+30){muted=!muted;if(masterGain)masterGain.gain.value=muted?0:1}
clicked=false;
}
}
}else if(scene==='paused'){
drawBg();
drawTerrain(game.level.points);
drawObstacles(game.level.obstacles);
drawCoins(game.level.coins);
drawFinish(game.level.finishX,game.level.points);
drawVehicle(game.vehicle);
drawHUD(game);
drawPauseMenu();
}

clicked=false;
animFrame=requestAnimationFrame(update);
}

// Input
function onKeyDown(e){keys[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()}
function onKeyUp(e){keys[e.code]=false}
document.addEventListener('keydown',onKeyDown);
document.addEventListener('keyup',onKeyUp);

function handleInputStart(x,y){
initAudio();resumeAudio();
mouseX=x;mouseY=y;

if(scene==='playing'&&game&&game.state==='playing'){
// Check mobile control buttons
if(isMobile){
let btnW=W*0.22,btnH=70,margin=15,bottom=H-btnH-margin;
if(y>bottom&&y<bottom+btnH){
if(x>margin&&x<margin+btnW){touchBtns.left=true;return}
if(x>W-btnW-margin&&x<W-margin){touchBtns.right=true;return}
}
let leanW=50,leanH=50;
if(y>bottom-leanH-10&&y<bottom-10){
if(x>margin&&x<margin+leanW){touchBtns.up=true;return}
if(x>W-leanW-margin&&x<W-margin){touchBtns.down=true;return}
}
}
}
clicked=true;
}

function handleInputEnd(){
touchBtns={left:false,right:false,up:false,down:false};
}

function handleInputMove(x,y){mouseX=x;mouseY=y}

function onMouseDown(e){handleInputStart(e.clientX,e.clientY)}
function onMouseMove(e){handleInputMove(e.clientX,e.clientY)}
function onMouseUp(){handleInputEnd()}
function onTouchStart(e){e.preventDefault();let t=e.touches[0];handleInputStart(t.clientX,t.clientY)}
function onTouchMove(e){e.preventDefault();let t=e.touches[0];handleInputMove(t.clientX,t.clientY)}
function onTouchEnd(e){e.preventDefault();handleInputEnd()}
function onTouchCancel(e){e.preventDefault();handleInputEnd()}
C.addEventListener('mousedown',onMouseDown);
C.addEventListener('mousemove',onMouseMove);
C.addEventListener('mouseup',onMouseUp);
C.addEventListener('touchstart',onTouchStart,{passive:false});
C.addEventListener('touchmove',onTouchMove,{passive:false});
C.addEventListener('touchend',onTouchEnd,{passive:false});
C.addEventListener('touchcancel',onTouchCancel,{passive:false});

// Init
loadSave();
lastTime=0;
animFrame=requestAnimationFrame(update);

// Centralized cleanup/destroy
function destroy(){
if(animFrame){cancelAnimationFrame(animFrame);animFrame=null}
document.removeEventListener('keydown',onKeyDown);
document.removeEventListener('keyup',onKeyUp);
C.removeEventListener('mousedown',onMouseDown);
C.removeEventListener('mousemove',onMouseMove);
C.removeEventListener('mouseup',onMouseUp);
C.removeEventListener('touchstart',onTouchStart);
C.removeEventListener('touchmove',onTouchMove);
C.removeEventListener('touchend',onTouchEnd);
C.removeEventListener('touchcancel',onTouchCancel);
window.removeEventListener('resize',resize);
if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null;masterGain=null}
particles=[];floatingTexts=[];game=null;keys={};
}
window.driveFuryDestroy=destroy;
function onBeforeUnload(){destroy()}
window.addEventListener('beforeunload',onBeforeUnload);

})();
</script>
