<script>

(function(){
'use strict';

// ==================== CONFIG ====================
var CANVAS_W = 450;
var CANVAS_H = 540;
var CELL = 45;
var GRID_W = 10;
var GRID_H = 12;

// Cell types
var T = {
  EMPTY: 0,     // dug/empty space
  DIRT: 1,      // brown dirt (safe to dig)
  STONE: 2,     // gray stone (safe to dig, slower)
  ROCK: 3,      // hard rock (impassable)
  GEM_BLUE: 4,  // blue gem (10 pts)
  GEM_GREEN: 5, // green gem (15 pts)
  GEM_RED: 6,   // red gem (25 pts)
  GEM_GOLD: 7,  // gold gem (50 pts)
  BOMB: 8,      // bomb (game over)
  WATER: 9,     // water source (flows when dug)
  LAVA: 10,     // lava source (spreads when dug)
  KEY: 11,      // key (unlocks doors)
  DOOR: 12,     // locked door (needs key)
  DIGGER: 13,   // player digger position
  EXIT: 14,     // exit/portal
};

// Tier themes
var THEMES = [
  {name:'Surface',bg:'#3d2b1f',dirt:'#6b4423',stone:'#7a6b5d',accent:'#8bc34a'},
  {name:'Topsoil',bg:'#2e2018',dirt:'#5a3a1a',stone:'#6b5b4a',accent:'#ffa726'},
  {name:'Bedrock',bg:'#1f1812',dirt:'#4a3018',stone:'#5a5a5a',accent:'#42a5f5'},
  {name:'Caverns',bg:'#15101a',dirt:'#3a2820',stone:'#4a3a4a',accent:'#ab47bc'},
  {name:'Magma',bg:'#1a0a05',dirt:'#3a1a0f',stone:'#5a2a1a',accent:'#ff5722'},
  {name:'Abyss',bg:'#0a0510',dirt:'#2a1525',stone:'#3a2535',accent:'#e040fb'},
];

// ==================== LEVEL GENERATION ====================
// Deterministic PRNG (mulberry32)
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function genLevel(n){
  var rng = mulberry32(n * 7919 + 42);
  var tier = Math.floor((n - 1) / 5);
  if (tier > 5) tier = 5;

  var gw = GRID_W;
  var gh = GRID_H;
  var grid = [];

  // Fill with dirt
  for (var y = 0; y < gh; y++){
    grid[y] = [];
    for (var x = 0; x < gw; x++){
      grid[y][x] = T.DIRT;
    }
  }

  // Border with rock
  for (var x = 0; x < gw; x++){
    grid[0][x] = T.ROCK;
    grid[gh-1][x] = T.ROCK;
  }
  for (var y = 0; y < gh; y++){
    grid[y][0] = T.ROCK;
    grid[y][gw-1] = T.ROCK;
  }

  // Digger starts at top center
  var startX = Math.floor(gw / 2);
  var startY = 1;
  grid[startY][startX] = T.DIGGER;

  // Place exit at bottom
  var exitX = Math.floor(gw / 2);
  var exitY = gh - 2;
  grid[exitY][exitX] = T.EXIT;

  // Gem count scales with level
  var gemCount = 3 + Math.floor(n / 3);
  if (gemCount > 12) gemCount = 12;

  // Place gems
  var placed = 0;
  var attempts = 0;
  while (placed < gemCount && attempts < 200){
    attempts++;
    var gx = 1 + Math.floor(rng() * (gw - 2));
    var gy = 2 + Math.floor(rng() * (gh - 4));
    if (grid[gy][gx] === T.DIRT){
      var r = rng();
      var gemType;
      if (tier >= 4 && r < 0.1) gemType = T.GEM_GOLD;
      else if (tier >= 2 && r < 0.25) gemType = T.GEM_RED;
      else if (r < 0.45) gemType = T.GEM_GREEN;
      else gemType = T.GEM_BLUE;
      grid[gy][gx] = gemType;
      placed++;
    }
  }

  // Place bombs (introduced in tier 1+, scale with difficulty)
  if (tier >= 1){
    var bombCount = 2 + tier;
    placed = 0;
    attempts = 0;
    while (placed < bombCount && attempts < 200){
      attempts++;
      var bx = 1 + Math.floor(rng() * (gw - 2));
      var by = 3 + Math.floor(rng() * (gh - 5));
      if (grid[by][bx] === T.DIRT){
        // Don't place bombs too close to start
        if (Math.abs(bx - startX) + Math.abs(by - startY) < 3) continue;
        grid[by][bx] = T.BOMB;
        placed++;
      }
    }
  }

  // Place rock walls (introduced in tier 2+)
  if (tier >= 2){
    var rockCount = 3 + tier * 2;
    placed = 0;
    attempts = 0;
    while (placed < rockCount && attempts < 200){
      attempts++;
      var rx = 1 + Math.floor(rng() * (gw - 2));
      var ry = 2 + Math.floor(rng() * (gh - 4));
      if (grid[ry][rx] === T.DIRT){
        grid[ry][rx] = T.ROCK;
        placed++;
      }
    }
  }

  // Place stone patches (introduced in tier 1+)
  if (tier >= 1){
    var stoneCount = 2 + tier;
    placed = 0;
    attempts = 0;
    while (placed < stoneCount && attempts < 100){
      attempts++;
      var sx = 1 + Math.floor(rng() * (gw - 2));
      var sy = 2 + Math.floor(rng() * (gh - 4));
      if (grid[sy][sx] === T.DIRT){
        grid[sy][sx] = T.STONE;
        placed++;
      }
    }
  }

  // Place water sources (introduced in tier 3+)
  if (tier >= 3){
    var waterCount = tier >= 4 ? 2 : 1;
    placed = 0;
    attempts = 0;
    while (placed < waterCount && attempts < 100){
      attempts++;
      var wx = 1 + Math.floor(rng() * (gw - 2));
      var wy = 3 + Math.floor(rng() * (gh - 5));
      if (grid[wy][wx] === T.DIRT){
        grid[wy][wx] = T.WATER;
        placed++;
      }
    }
  }

  // Place lava sources (introduced in tier 4+)
  if (tier >= 4){
    var lavaCount = tier >= 5 ? 2 : 1;
    placed = 0;
    attempts = 0;
    while (placed < lavaCount && attempts < 100){
      attempts++;
      var lx = 1 + Math.floor(rng() * (gw - 2));
      var ly = 4 + Math.floor(rng() * (gh - 6));
      if (grid[ly][lx] === T.DIRT){
        grid[ly][lx] = T.LAVA;
        placed++;
      }
    }
  }

  // Place keys & doors (introduced in tier 5+)
  if (tier >= 5){
    // Key
    placed = false;
    attempts = 0;
    while (!placed && attempts < 100){
      attempts++;
      var kx = 1 + Math.floor(rng() * (gw - 2));
      var ky = 3 + Math.floor(rng() * (gh - 5));
      if (grid[ky][kx] === T.DIRT){
        grid[ky][kx] = T.KEY;
        placed = true;
      }
    }
    // Door near exit
    grid[exitY - 1][exitX] = T.DOOR;
    if (exitX > 1 && rng() > 0.5) grid[exitY - 1][exitX - 1] = T.DOOR;
    if (exitX < gw - 2 && rng() > 0.5) grid[exitY - 1][exitX + 1] = T.DOOR;
  }

  // Calculate total gems needed
  var totalGems = 0;
  for (var y2 = 0; y2 < gh; y2++){
    for (var x2 = 0; x2 < gw; x2++){
      if (grid[y2][x2] >= T.GEM_BLUE && grid[y2][x2] <= T.GEM_GOLD) totalGems++;
    }
  }

  // Par time (seconds) based on grid size + gem count
  var parTime = 30 + gemCount * 8 + tier * 10;

  return {
    grid: grid,
    totalGems: totalGems,
    parTime: parTime,
    tier: tier,
    startX: startX,
    startY: startY,
    exitX: exitX,
    exitY: exitY,
    scanner: tier >= 2 ? 1 : 0,  // peek tool
    shield: tier >= 3 ? 1 : 0,   // survive one hazard
  };
}

// Pre-generate all 30 levels
var LEVELS = [];
for (var i = 1; i <= 30; i++){
  LEVELS.push(genLevel(i));
}

// ==================== GAME STATE ====================
var state = {
  screen: 'menu',
  currentLevel: 1,
  maxUnlocked: 1,
  stars: {},
  paused: false,
  soundOn: true,

  grid: null,
  diggerX: 0,
  diggerY: 0,
  gemsCollected: 0,
  totalGems: 0,
  score: 0,
  startTime: 0,
  elapsedTime: 0,
  gameOver: false,
  won: false,
  scanner: 0,
  shield: 0,
  hasKey: false,
  scanMode: false,
  flooded: [],
  burned: [],
  particles: [],
  flashTime: 0,
  flashColor: null,
  beltAnimOffset: 0,
};

function loadSave(){
  try {
    var s = localStorage.getItem('treasure_dig_save');
    if (s){
      var d = JSON.parse(s);
      state.maxUnlocked = d.maxUnlocked || 1;
      state.stars = d.stars || {};
    }
    var snd = localStorage.getItem('td_sound');
    if (snd !== null) state.soundOn = snd === '1';
  } catch(e){}
}
function saveSave(){
  try {
    localStorage.setItem('treasure_dig_save', JSON.stringify({
      maxUnlocked: state.maxUnlocked,
      stars: state.stars
    }));
  } catch(e){}
}

// ==================== AUDIO ====================
var audioCtx = null;
function ensureAudio(){
  if (!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type, vol){
  if (!audioCtx || !state.soundOn) return;
  dur = dur || 0.1; type = type || 'sine'; vol = vol || 0.15;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function sndDig(){ playTone(200, 0.06, 'square', 0.08); }
function sndGem(){ playTone(660, 0.08, 'sine', 0.12); setTimeout(function(){playTone(880, 0.1, 'sine', 0.1);}, 50); }
function sndBomb(){ playTone(80, 0.3, 'sawtooth', 0.2); }
function sndWater(){ playTone(300, 0.15, 'sine', 0.08); }
function sndLava(){ playTone(120, 0.2, 'sawtooth', 0.1); }
function sndKey(){ playTone(440, 0.05, 'triangle', 0.1); setTimeout(function(){playTone(660, 0.05, 'triangle', 0.1);}, 60); }
function sndDoor(){ playTone(300, 0.1, 'square', 0.08); }
function sndWin(){ playTone(523, 0.1, 'sine', 0.15); setTimeout(function(){playTone(659, 0.1, 'sine', 0.15);}, 100); setTimeout(function(){playTone(784, 0.15, 'sine', 0.15);}, 200); }
function sndLose(){ playTone(200, 0.1, 'sawtooth', 0.12); setTimeout(function(){playTone(150, 0.2, 'sawtooth', 0.1);}, 100); }
function sndScan(){ playTone(800, 0.04, 'sine', 0.06); }
function sndClick(){ playTone(400, 0.03, 'square', 0.05); }

// ==================== CANVAS ====================
var canvas = document.getElementById('game-canvas');
var ctx = canvas.getContext('2d');
var dpr = window.devicePixelRatio || 1;

function setupCanvas(){
  var wrap = document.getElementById('canvas-wrap');
  var maxW = Math.min(450, wrap.clientWidth);
  var scale = maxW / CANVAS_W;
  canvas.style.width = maxW + 'px';
  canvas.style.height = (CANVAS_H * scale) + 'px';
  canvas.width = CANVAS_W * dpr;
  canvas.height = CANVAS_H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ==================== LEVEL LOGIC ====================
function startLevel(n){
  var lv = LEVELS[n - 1];
  state.currentLevel = n;
  state.grid = [];
  for (var y = 0; y < lv.grid.length; y++){
    state.grid[y] = lv.grid[y].slice();
  }
  state.diggerX = lv.startX;
  state.diggerY = lv.startY;
  state.totalGems = lv.totalGems;
  state.gemsCollected = 0;
  state.score = 0;
  state.startTime = performance.now();
  state.elapsedTime = 0;
  state.gameOver = false;
  state.won = false;
  state.scanner = lv.scanner;
  state.shield = lv.shield;
  state.hasKey = false;
  state.scanMode = false;
  state.flooded = [];
  state.burned = [];
  state.particles = [];
  state.flashTime = 0;
  state.paused = false;
  updateHUD();
  showScreen('game');
}

function updateHUD(){
  var lv = LEVELS[state.currentLevel - 1];
  document.getElementById('hud-gems').textContent = state.gemsCollected + '/' + state.totalGems;
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-level').textContent = 'L' + state.currentLevel;
  var tools = [];
  if (state.scanner > 0) tools.push('Scan:' + state.scanner);
  if (state.shield > 0) tools.push('Shield:' + state.shield);
  if (state.hasKey) tools.push('Key');
  document.getElementById('hud-tools').textContent = tools.length ? tools.join(' ') : '--';
  var pct = state.totalGems > 0 ? (state.gemsCollected / state.totalGems * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function digCell(x, y){
  if (state.gameOver || state.won || state.paused) return;
  if (x < 0 || x >= GRID_W || y < 0 || y >= GRID_H) return;

  // Must be adjacent to digger (or scan mode)
  if (!state.scanMode){
    var dx = Math.abs(x - state.diggerX);
    var dy = Math.abs(y - state.diggerY);
    if (dx + dy !== 1) return; // must be orthogonally adjacent
  }

  var cell = state.grid[y][x];

  // Can't dig rock
  if (cell === T.ROCK) return;

  // Handle door (needs key)
  if (cell === T.DOOR){
    if (state.hasKey){
      state.grid[y][x] = T.EMPTY;
      state.hasKey = false;
      sndDoor();
      moveDigger(x, y);
      return;
    } else {
      return; // can't dig through locked door
    }
  }

  // Handle digger position move
  var wasScanMode = state.scanMode;
  state.scanMode = false;

  // Handle cell contents
  if (cell === T.DIRT || cell === T.STONE){
    state.grid[y][x] = T.EMPTY;
    sndDig();
    moveDigger(x, y);
  } else if (cell === T.EMPTY){
    moveDigger(x, y);
  } else if (cell >= T.GEM_BLUE && cell <= T.GEM_GOLD){
    var pts = [0, 0, 0, 0, 10, 15, 25, 50][cell];
    state.score += pts;
    state.gemsCollected++;
    state.grid[y][x] = T.EMPTY;
    sndGem();
    spawnParticles(x * CELL + CELL/2, y * CELL + CELL/2, '#00d4ff', 8);
    moveDigger(x, y);
    checkWin();
  } else if (cell === T.BOMB){
    if (state.shield > 0){
      state.shield--;
      state.grid[y][x] = T.EMPTY;
      sndDig();
      state.flashTime = 0.5;
      state.flashColor = '#ffff00';
      moveDigger(x, y);
    } else {
      state.grid[y][x] = T.EMPTY;
      sndBomb();
      state.flashTime = 0.5;
      state.flashColor = '#ff0000';
      spawnParticles(x * CELL + CELL/2, y * CELL + CELL/2, '#ff4444', 20);
      state.gameOver = true;
      setTimeout(function(){ showResult(false); }, 800);
    }
  } else if (cell === T.WATER){
    state.grid[y][x] = T.EMPTY;
    sndWater();
    moveDigger(x, y);
    floodWater(x, y);
  } else if (cell === T.LAVA){
    state.grid[y][x] = T.EMPTY;
    sndLava();
    moveDigger(x, y);
    spreadLava(x, y);
  } else if (cell === T.KEY){
    state.hasKey = true;
    state.grid[y][x] = T.EMPTY;
    sndKey();
    spawnParticles(x * CELL + CELL/2, y * CELL + CELL/2, '#ffd700', 6);
    moveDigger(x, y);
  } else if (cell === T.EXIT){
    moveDigger(x, y);
    if (state.gemsCollected >= state.totalGems){
      checkWin();
    }
  }

  updateHUD();
}

function moveDigger(x, y){
  state.diggerX = x;
  state.diggerY = y;
}

function floodWater(sx, sy){
  var queue = [[sx, sy]];
  while (queue.length > 0){
    var pos = queue.shift();
    var cx = pos[0], cy = pos[1];
    var neighbors = [[cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]];
    for (var i = 0; i < neighbors.length; i++){
      var nx = neighbors[i][0], ny = neighbors[i][1];
      if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) continue;
      var c = state.grid[ny][nx];
      if (c === T.EMPTY && state.flooded.indexOf(nx + ',' + ny) < 0){
        // Check if adjacent to digger
        if (nx === state.diggerX && ny === state.diggerY){
          // Water reached digger! Flood them out
          if (state.shield > 0){
            state.shield--;
            state.flashTime = 0.3;
            state.flashColor = '#6688ff';
          } else {
            state.gameOver = true;
            state.flashTime = 0.5;
            state.flashColor = '#6688ff';
            setTimeout(function(){ showResult(false); }, 600);
            return;
          }
        }
        state.flooded.push(nx + ',' + ny);
        queue.push([nx, ny]);
      }
    }
  }
}

function spreadLava(sx, sy){
  var queue = [[sx, sy]];
  while (queue.length > 0){
    var pos = queue.shift();
    var cx = pos[0], cy = pos[1];
    var neighbors = [[cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]];
    for (var i = 0; i < neighbors.length; i++){
      var nx = neighbors[i][0], ny = neighbors[i][1];
      if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) continue;
      var c = state.grid[ny][nx];
      if (c === T.EMPTY && state.burned.indexOf(nx + ',' + ny) < 0){
        if (nx === state.diggerX && ny === state.diggerY){
          if (state.shield > 0){
            state.shield--;
            state.flashTime = 0.3;
            state.flashColor = '#ff6600';
          } else {
            state.gameOver = true;
            state.flashTime = 0.5;
            state.flashColor = '#ff6600';
            setTimeout(function(){ showResult(false); }, 600);
            return;
          }
        }
        // Lava burns dirt and gems
        if (c !== T.ROCK){
          state.burned.push(nx + ',' + ny);
          state.grid[ny][nx] = T.EMPTY;
          queue.push([nx, ny]);
        }
      }
    }
  }
}

function checkWin(){
  if (state.gemsCollected >= state.totalGems){
    // Need to reach exit
    if (state.diggerX === LEVELS[state.currentLevel - 1].exitX &&
        state.diggerY === LEVELS[state.currentLevel - 1].exitY){
      state.won = true;
      sndWin();
      var earnedStars = calcStars();
      var prevStars = state.stars[state.currentLevel] || 0;
      if (earnedStars > prevStars){
        state.stars[state.currentLevel] = earnedStars;
      }
      if (state.currentLevel >= state.maxUnlocked && state.currentLevel < 30){
        state.maxUnlocked = state.currentLevel + 1;
      }
      saveSave();
      setTimeout(function(){ showResult(true); }, 400);
    }
  }
}

function calcStars(){
  var lv = LEVELS[state.currentLevel - 1];
  var timeBonus = state.elapsedTime < lv.parTime * 0.5 ? 1 : 0;
  var gemBonus = state.gemsCollected >= state.totalGems ? 1 : 0;
  var baseStar = 1; // Always 1 star for completion
  return Math.min(3, baseStar + timeBonus + gemBonus);
}

// ==================== PARTICLES ====================
function spawnParticles(x, y, color, count){
  for (var i = 0; i < count; i++){
    var angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    var speed = 40 + Math.random() * 60;
    state.particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 30,
      life: 0.6 + Math.random() * 0.3,
      maxLife: 0.9,
      color: color,
      size: 2 + Math.random() * 3,
    });
  }
}

// ==================== RENDERING ====================
function render(){
  var lv = LEVELS[state.currentLevel - 1];
  var theme = THEMES[lv.tier];

  // Background
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Guard: grid not yet populated (menu state) — render background only
  if (!state.grid || !state.grid.length) return;

  // Render grid
  for (var y = 0; y < GRID_H; y++){
    for (var x = 0; x < GRID_W; x++){
      var cell = state.grid[y][x];
      var px = x * CELL;
      var py = y * CELL;

      if (cell === T.DIRT){
        // Dirt texture
        ctx.fillStyle = theme.dirt;
        ctx.fillRect(px, py, CELL, CELL);
        // Texture dots
        ctx.fillStyle = 'rgba(0,0,0,.15)';
        for (var i = 0; i < 3; i++){
          var dx2 = ((x * 7 + i * 13) % CELL);
          var dy2 = ((y * 11 + i * 17) % CELL);
          ctx.fillRect(px + dx2, py + dy2, 2, 2);
        }
      } else if (cell === T.STONE){
        ctx.fillStyle = theme.stone;
        ctx.fillRect(px, py, CELL, CELL);
        ctx.strokeStyle = 'rgba(0,0,0,.3)';
        ctx.strokeRect(px + 2, py + 2, CELL - 4, CELL - 4);
      } else if (cell === T.ROCK){
        // Hard rock with crosshatch
        ctx.fillStyle = '#333';
        ctx.fillRect(px, py, CELL, CELL);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px, py); ctx.lineTo(px + CELL, py + CELL);
        ctx.moveTo(px + CELL, py); ctx.lineTo(px, py + CELL);
        ctx.stroke();
        ctx.strokeStyle = '#222';
        ctx.strokeRect(px, py, CELL, CELL);
      } else if (cell === T.EMPTY || cell === T.DIGGER){
        // Dark background for dug areas
        ctx.fillStyle = '#0a0505';
        ctx.fillRect(px, py, CELL, CELL);

        // Flooded cells
        if (state.flooded.indexOf(x + ',' + y) >= 0){
          ctx.fillStyle = 'rgba(50,100,200,.4)';
          ctx.fillRect(px, py, CELL, CELL);
          // Water shimmer
          ctx.fillStyle = 'rgba(100,150,255,.2)';
          var shim = Math.sin(performance.now() / 300 + x + y) * 2;
          ctx.fillRect(px + 2, py + CELL/2 + shim, CELL - 4, 3);
        }
        // Burned cells
        if (state.burned.indexOf(x + ',' + y) >= 0){
          ctx.fillStyle = 'rgba(200,60,0,.3)';
          ctx.fillRect(px, py, CELL, CELL);
        }
      } else if (cell >= T.GEM_BLUE && cell <= T.GEM_GOLD){
        // Gem background (dirt)
        ctx.fillStyle = theme.dirt;
        ctx.fillRect(px, py, CELL, CELL);
        // Draw gem
        drawGem(px + CELL/2, py + CELL/2, cell);
      } else if (cell === T.BOMB){
        // Bomb hidden in dirt - only visible in scan mode
        ctx.fillStyle = theme.dirt;
        ctx.fillRect(px, py, CELL, CELL);
        // Subtle warning dot
        ctx.fillStyle = 'rgba(255,50,50,.2)';
        ctx.beginPath();
        ctx.arc(px + CELL/2, py + CELL/2, 3, 0, Math.PI * 2);
        ctx.fill();
      } else if (cell === T.WATER){
        ctx.fillStyle = theme.dirt;
        ctx.fillRect(px, py, CELL, CELL);
        ctx.fillStyle = 'rgba(50,100,200,.5)';
        ctx.beginPath();
        ctx.arc(px + CELL/2, py + CELL/2, 5, 0, Math.PI * 2);
        ctx.fill();
      } else if (cell === T.LAVA){
        ctx.fillStyle = theme.dirt;
        ctx.fillRect(px, py, CELL, CELL);
        ctx.fillStyle = 'rgba(255,80,0,.6)';
        ctx.beginPath();
        ctx.arc(px + CELL/2, py + CELL/2, 6, 0, Math.PI * 2);
        ctx.fill();
      } else if (cell === T.KEY){
        ctx.fillStyle = theme.dirt;
        ctx.fillRect(px, py, CELL, CELL);
        drawKey(px + CELL/2, py + CELL/2);
      } else if (cell === T.DOOR){
        ctx.fillStyle = '#6a4a2a';
        ctx.fillRect(px, py, CELL, CELL);
        ctx.strokeStyle = '#aa7744';
        ctx.lineWidth = 2;
        ctx.strokeRect(px + 4, py + 4, CELL - 8, CELL - 8);
        // Lock
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(px + CELL/2, py + CELL/2, 4, 0, Math.PI * 2);
        ctx.fill();
      } else if (cell === T.EXIT){
        ctx.fillStyle = '#0a0505';
        ctx.fillRect(px, py, CELL, CELL);
        // Portal glow
        var glow = Math.sin(performance.now() / 400) * 0.2 + 0.6;
        ctx.fillStyle = 'rgba(100,255,100,' + glow + ')';
        ctx.beginPath();
        ctx.arc(px + CELL/2, py + CELL/2, CELL/3, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#88ff88';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(px + CELL/2, py + CELL/2, CELL/3, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  // Draw digger
  drawDigger(state.diggerX * CELL + CELL/2, state.diggerY * CELL + CELL/2);

  // Scan mode overlay
  if (state.scanMode){
    for (var sy = 0; sy < GRID_H; sy++){
      for (var sx = 0; sx < GRID_W; sx++){
        var sc = state.grid[sy][sx];
        if (sc === T.BOMB){
          var spx = sx * CELL, spy = sy * CELL;
          ctx.strokeStyle = 'rgba(255,50,50,.6)';
          ctx.lineWidth = 2;
          ctx.strokeRect(spx + 2, spy + 2, CELL - 4, CELL - 4);
        }
      }
    }
  }

  // Particles
  for (var i = state.particles.length - 1; i >= 0; i--){
    var p = state.particles[i];
    var alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Flash overlay
  if (state.flashTime > 0){
    ctx.globalAlpha = state.flashTime;
    ctx.fillStyle = state.flashColor || '#ff0000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.globalAlpha = 1;
  }

  // Paused overlay
  if (state.paused){
    ctx.fillStyle = 'rgba(0,0,0,.7)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Paused', CANVAS_W / 2, CANVAS_H / 2);
  }
}

function drawGem(cx, cy, type){
  var colors = {4:'#00d4ff', 5:'#00ff66', 6:'#ff4466', 7:'#ffd700'};
  var color = colors[type] || '#00d4ff';
  var size = type === T.GEM_GOLD ? 10 : 8;

  // Glow
  ctx.fillStyle = color + '40';
  ctx.beginPath();
  ctx.arc(cx, cy, size + 4, 0, Math.PI * 2);
  ctx.fill();

  // Diamond shape
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx, cy - size);
  ctx.lineTo(cx + size, cy);
  ctx.lineTo(cx, cy + size);
  ctx.lineTo(cx - size, cy);
  ctx.closePath();
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath();
  ctx.moveTo(cx - 2, cy - size + 2);
  ctx.lineTo(cx, cy - size);
  ctx.lineTo(cx + 2, cy - size + 2);
  ctx.closePath();
  ctx.fill();
}

function drawKey(cx, cy){
  ctx.fillStyle = '#ffd700';
  // Key head (circle)
  ctx.beginPath();
  ctx.arc(cx, cy - 5, 5, 0, Math.PI * 2);
  ctx.fill();
  // Key shaft
  ctx.fillRect(cx - 1.5, cy, 3, 8);
  // Key teeth
  ctx.fillRect(cx + 1.5, cy + 5, 4, 2);
  ctx.fillRect(cx + 1.5, cy + 2, 3, 2);
}

function drawDigger(cx, cy){
  // Body
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.arc(cx, cy, 12, 0, Math.PI * 2);
  ctx.fill();

  // Hat/helmet
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.arc(cx, cy - 4, 9, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(cx - 9, cy - 4, 18, 3);

  // Light on helmet
  ctx.fillStyle = '#ffff00';
  ctx.beginPath();
  ctx.arc(cx, cy - 10, 3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(cx - 4, cy, 1.5, 0, Math.PI * 2);
  ctx.arc(cx + 4, cy, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Shield aura
  if (state.shield > 0){
    ctx.strokeStyle = 'rgba(100,200,255,.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, 16, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ==================== GAME LOOP ====================
var lastTime = performance.now();
var rafId = null;

function gameLoop(now){
  var dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (state.screen === 'game' && !state.paused && !state.gameOver && !state.won){
    state.elapsedTime += dt;

    // Update particles
    for (var i = state.particles.length - 1; i >= 0; i--){
      var p = state.particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 120 * dt;
      p.life -= dt;
      if (p.life <= 0) state.particles.splice(i, 1);
    }

    // Flash decay
    if (state.flashTime > 0){
      state.flashTime -= dt;
      if (state.flashTime < 0) state.flashTime = 0;
    }

    // Update HUD timer
    if (Math.floor(state.elapsedTime) !== Math.floor(state.elapsedTime - dt)){
      updateHUD();
    }
  }

  render();
  rafId = requestAnimationFrame(gameLoop);
}

// ==================== INPUT ====================
function handleClick(e){
  if (state.screen !== 'game' || state.paused || state.gameOver) return;
  ensureAudio();
  var rect = canvas.getBoundingClientRect();
  var scale = CANVAS_W / rect.width;
  var mx = (e.clientX - rect.left) * scale;
  var my = (e.clientY - rect.top) * scale;
  var gx = Math.floor(mx / CELL);
  var gy = Math.floor(my / CELL);

  if (state.scanMode && state.scanner > 0){
    state.scanner--;
    state.scanMode = false;
    sndScan();
    // Briefly reveal all bombs (1 second)
    setTimeout(function(){ updateHUD(); }, 1000);
    // Show scan overlay for 1s
    state.scanMode = true;
    setTimeout(function(){ state.scanMode = false; }, 1500);
    updateHUD();
  } else {
    digCell(gx, gy);
  }
}

canvas.addEventListener('pointerdown', function(e){
  e.preventDefault();
  handleClick(e);
});

// ==================== UI ====================
function showScreen(name){
  state.screen = name;
  document.getElementById('menu-overlay').classList.toggle('show', name === 'menu');
  document.getElementById('levelselect-overlay').classList.toggle('show', name === 'levelselect');
  document.getElementById('tutorial-overlay').classList.toggle('show', name === 'tutorial');
  document.getElementById('pause-overlay').classList.toggle('show', name === 'pause');
  // Result overlay is shown separately
}

function showResult(win){
  var overlay = document.getElementById('result-overlay');
  var title = document.getElementById('result-title');
  var stars = document.getElementById('result-stars');
  var stats = document.getElementById('result-stats');

  if (win){
    title.textContent = 'Level Complete!';
    title.style.color = '';
    var earnedStars = calcStars();
    var starStr = '';
    for (var s = 0; s < 3; s++) starStr += s < earnedStars ? '*' : '.';
    stars.textContent = starStr;
    stats.textContent = 'Collected ' + state.gemsCollected + '/' + state.totalGems +
      ' gems | Score: ' + state.score + ' | Time: ' + Math.floor(state.elapsedTime) + 's';
  } else {
    title.textContent = 'Game Over';
    title.style.background = 'linear-gradient(135deg,#ff4444,#ff6666)';
    title.style.webkitBackgroundClip = 'text';
    title.style.backgroundClip = 'text';
    stars.textContent = '.';
    stats.textContent = 'Collected ' + state.gemsCollected + '/' + state.totalGems + ' gems';
  }

  overlay.classList.add('show');
}

function hideResult(){
  document.getElementById('result-overlay').classList.remove('show');
}

function updateMenuStats(){
  var totalStars = 0;
  for (var k in state.stars) totalStars += state.stars[k];
  var html = 'Levels: ' + state.maxUnlocked + '/30 | Stars: ' + totalStars + '/90';
  document.getElementById('menu-stats').textContent = html;
}

function buildLevelSelect(){
  var grid = document.getElementById('level-select-grid');
  grid.innerHTML = '';
  for (var i = 1; i <= 30; i++){
    var card = document.createElement('div');
    var locked = i > state.maxUnlocked;
    card.className = 'level-card' + (locked ? ' locked' : '');
    var starStr = '';
    var stars = state.stars[i] || 0;
    for (var s = 0; s < 3; s++) starStr += s < stars ? '*' : '.';
    card.innerHTML = '<div class="lv-num">' + i + '</div><div class="lv-stars">' + starStr + '</div>';
    if (!locked){
      (function(n){
        card.addEventListener('click', function(){
          sndClick();
          hideResult();
          startLevel(n);
        });
      })(i);
    }
    grid.appendChild(card);
  }
}

});
document.getElementById('btn-level-select').addEventListener('click', function(){

document.getElementById('btn-sound').addEventListener('click', function(){

document.getElementById('btn-next-level').addEventListener('click', function(){

  if (state.currentLevel < 30) startLevel(state.currentLevel + 1);

});
document.getElementById('btn-retry').addEventListener('click', function(){

document.getElementById('btn-result-menu').addEventListener('click', function(){

document.getElementById('btn-pause-restart').addEventListener('click', function(){

  showScreen('game');

  updateMenuStats();
  showScreen('menu');
});

// ==================== CLEANUP ====================
var timers = [];
function cleanup(){
  if (rafId){ cancelAnimationFrame(rafId); rafId = null; }
  timers.forEach(function(id){ clearInterval(id); });
  timers = [];
  if (audioCtx){ audioCtx.close().catch(function(){}); audioCtx = null; }
}
window.addEventListener('beforeunload', cleanup);
document.addEventListener('visibilitychange', function(){
  if (document.hidden){
    if (rafId){ cancelAnimationFrame(rafId); rafId = null; }
  } else if (state.screen === 'game'){
    lastTime = performance.now();
    rafId = requestAnimationFrame(gameLoop);
  }
});

// ==================== INIT ====================
setupCanvas();
window.addEventListener('resize', setupCanvas);
loadSave();
document.getElementById('btn-sound').textContent = 'Sound: ' + (state.soundOn ? 'On' : 'Off');
updateMenuStats();
showScreen('menu');
rafId = requestAnimationFrame(gameLoop);

console.log('Treasure Dig v1.0 loaded - 30 levels ready');

})();

<!-- RAF Guard (prevents background tab drain) -->
<script>
(function(){
var _origRAF = window.requestAnimationFrame;
var _origCAF = window.cancelAnimationFrame;
var _rafId = null;
window.requestAnimationFrame = function(cb){ return _rafId = _origRAF.call(window, cb); };
window.cancelAnimationFrame = function(id){ if(id) _origCAF.call(window, id); _rafId = null; };
window.addEventListener('beforeunload', function(){ if(_rafId) window.cancelAnimationFrame(_rafId); });
document.addEventListener('visibilitychange', function(){
  if (!document.hidden && _rafId === null){
    _rafId = _origRAF.call(window, function(){ _rafId = null; });
  }
});
})();
</script>
