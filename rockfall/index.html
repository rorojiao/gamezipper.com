 init(){if(this.ctx)return;try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();this.master=this.ctx.createGain();this.master.gain.value=0.5;this.master.connect(this.ctx.destination);}catch(e){}},

};

/* ---------- Level loading ---------- */
function loadLevel(i){
  curLvl=i;const lv=LEVELS[i];
  ROWS=lv.map.length;COLS=lv.map[0].length;
  grid=[];gemsTotal=0;gemsGot=0;moves=0;history=[];
  for(let r=0;r<ROWS;r++){const row=[];for(let c=0;c<COLS;c++){const ch=lv.map[r].charAt(c);const t=GLYPH[ch]!==undefined?GLYPH[ch]:EMPTY;if(ch==='P'){pr=r;pc=c;row.push(EMPTY);}else{if(t===GEM)gemsTotal++;row.push(t);}}grid.push(row);}
  state='play';hintCell=null;shakeT=0;winFlash=0;
}
function snapshot(){history.push({g:grid.map(r=>r.slice()),pr,pc,gemsGot,moves});if(history.length>200)history.shift();}
function undo(){if(history.length===0)return;const s=history.pop();grid=s.g;pr=s.pr;pc=s.pc;gemsGot=s.gemsGot;moves=s.moves;state='play';AC.click();}

/* ---------- Gravity settle (columnar: straight-down + crush) ----------
   After each move, repeatedly drop every unsupported boulder/gem one cell.
   Magic wall: a boulder that would fall onto a MWALL converts to GEM and
   the gem occupies the cell just below the wall (wall stays). */
function settle(){
  let safety=0,changed=true,crushed=false,collected=false;
  while(changed&&safety++<2000){
    changed=false;
    for(let r=ROWS-2;r>=0;r--){
      for(let c=0;c<COLS;c++){
        const t=grid[r][c];
        if(t!==BOULDER&&t!==GEM)continue;
        const below=grid[r+1][c];
        if(below===EMPTY){
          /* straight fall */
          grid[r+1][c]=t;grid[r][c]=EMPTY;changed=true;
          if(pr===r+1&&pc===c){
            if(t===GEM){gemsGot++;collected=true;}
            else{crushed=true;}
          }
        }else if(below===MWALL&&t===BOULDER){
          /* convert boulder -> gem passing through magic wall */
          if(r+2<=ROWS-1&&grid[r+2][c]===EMPTY){
            grid[r][c]=EMPTY;grid[r+2][c]=GEM;changed=true;
            if(pr===r+2&&pc===c){gemsGot++;collected=true;}
          }else{
            /* can't pass: boulder rests on wall, becomes gem in place */
            grid[r][c]=GEM;changed=true;
            if(pr===r&&pc===c){gemsGot++;collected=true;}
          }
        }
      }
    }
    if(crushed)break;
  }
  if(collected)AC.gem();
  return crushed;
}

/* ---------- Movement ---------- */
function tryMove(dr,dc){
  if(state!=='play')return;
  const nr=pr+dr,nc=pc+dc;
  if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return;
  const tgt=grid[nr][nc];
  if(tgt===WALL)return;
  if(tgt===DIRT){snapshot();grid[nr][nc]=EMPTY;pr=nr;pc=nc;moves++;AC.dig();afterMove();}
  else if(tgt===EMPTY||tgt===EXIT){snapshot();pr=nr;pc=nc;moves++;if(tgt!==EXIT)AC.step();afterMove();}
  else if(tgt===GEM){snapshot();grid[nr][nc]=EMPTY;gemsGot++;pr=nr;pc=nc;moves++;AC.gem();afterMove();}
  else if(tgt===BOULDER){
    /* push: cell beyond must be empty (or magic-wall slot empty) */
    const br=nr+dr,bc=nc+dc;
    if(br>=0&&br<ROWS&&bc>=0&&bc<COLS&&grid[br][bc]===EMPTY){
      snapshot();grid[br][bc]=BOULDER;grid[nr][nc]=EMPTY;pr=nr;pc=nc;moves++;AC.push();afterMove();
    }
  }else if(tgt===MWALL){return;}
}
function afterMove(){
  const crushed=settle();
  if(crushed){state='dead';shakeT=18;AC.crush();checkAch('first_crush',true);return;}
  /* exit check */
  if(grid[pr][pc]===EXIT){
    if(gemsGot>=gemsTotal){winLevel();return;}
  }
}
function winLevel(){
  state='win';winFlash=30;AC.win();
  const over=moves-LEVELS[curLvl].par;
  let stars=over<=0?3:over<=Math.ceil(LEVELS[curLvl].par*0.4)?2:1;
  const prev=Save.data.stars[curLvl]||0;
  if(stars>prev)Save.data.stars[curLvl]=stars;
  if(curLvl+1>Save.data.unlocked-1&&curLvl+1<LEVELS.length)Save.data.unlocked=curLvl+2;
  Save.save();checkAch('first_win',true);
  if(totalStars()>=90)checkAch('master',true);
}

function totalStars(){let s=0;for(const k in Save.data.stars)s+=Save.data.stars[k];return s;}

  if(belowAd&&belowAd.offsetHeight>0)adH+=belowAd.offsetHeight+6;
  const avW=Math.max(220,wrap.clientWidth-12),avH=Math.max(220,wrap.clientHeight-adH);
  scale=Math.min(avW/PLAY_W,avH/(PLAY_W+HUD_H));
  const W=Math.round(PLAY_W*scale),H=Math.round((PLAY_W+HUD_H)*scale);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);
}
function cellGeom(){
  /* compute cell size + origin to center current grid (or 11x9 default) */
  const cols=grid?COLS:11,rows=grid?ROWS:9;
  const area=PLAY_W;
  cell=Math.floor(Math.min(area/cols,(PLAY_W-HUD_H-10)/rows));
  const gw=cell*cols,gh=cell*rows;
  ox=Math.round((area-gw)/2);
  oy=HUD_H+Math.round((PLAY_W-HUD_H-gh)/2);
}
function loop(){animT+=0.016;draw();MUSIC.tick();requestAnimationFrame(loop);}

function draw(){
  const W=canvas.width,H=canvas.height;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.scale(scale,scale);
  /* background */
  ctx.fillStyle='#150d04';ctx.fillRect(0,0,PLAY_W,PLAY_W+HUD_H);
  if(state==='menu')drawMenu();
  else if(state==='select')drawSelect();
  else{drawHUD();drawLevel();if(state==='dead')drawDead();else if(state==='win')drawWin();}
  /* floats */
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.life--;f.y+=0.6;if(f.life<=0)floats.splice(i,1);ctx.globalAlpha=Math.min(1,f.life/40);ctx.fillStyle='#ffd24a';ctx.font='bold 20px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText(f.t,PLAY_W/2,40-f.y);ctx.globalAlpha=1;}
  ctx.restore();
}
function drawHUD(){
  ctx.fillStyle='#241808';ctx.fillRect(0,0,PLAY_W,HUD_H);
  ctx.strokeStyle='#3a2a10';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,HUD_H);ctx.lineTo(PLAY_W,HUD_H);ctx.stroke();
  /* left: level name + gems */
  ctx.fillStyle='#ffe9b8';ctx.font='bold 14px Segoe UI,sans-serif';ctx.textAlign='left';
  ctx.fillText(LEVELS[curLvl].name,12,21);
  ctx.fillStyle='#7fd8ff';ctx.font='bold 17px Segoe UI,sans-serif';
  ctx.fillText('\u{1F48E} '+gemsGot+'/'+gemsTotal,12,44);
  /* center: moves + par */
  ctx.fillStyle='#cfcfcf';ctx.font='13px Segoe UI,sans-serif';ctx.textAlign='center';
  ctx.fillText('Moves '+moves+'   Par '+LEVELS[curLvl].par,PLAY_W/2,21);
  ctx.fillStyle='#ffd24a';ctx.font='13px Segoe UI,sans-serif';
  ctx.fillText('\u2B50 '+(Save.data.stars[curLvl]||0),PLAY_W/2,44);
  /* right: buttons */
  drawBtn('\u21B6',PLAY_W-150,8,30,30);
  drawBtn('\u{1F4A1}',PLAY_W-112,8,30,30);
  drawBtn('\u2630',PLAY_W-74,8,30,30);
  drawBtn(Save.data.mute?'\u{1F507}':'\u{1F50A}',PLAY_W-36,8,30,30);
}
function drawBtn(txt,x,y,w,h){ctx.fillStyle='#3a2a10';roundRect(x,y,w,h,6);ctx.fill();ctx.fillStyle='#ffe9b8';ctx.font='16px Segoe UI,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(txt,x+w/2,y+h/2);ctx.textBaseline='alphabetic';}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function drawLevel(){
  cellGeom();
  let sx=0,sy=0;if(shakeT>0){sx=(Math.random()-0.5)*shakeT;sy=(Math.random()-0.5)*shakeT;shakeT-=1;}
  ctx.save();ctx.translate(sx,sy);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)drawCell(r,c,grid[r][c]);
  /* hint highlight */
  if(hintCell&&hintTimer>0){ctx.strokeStyle='rgba(255,210,74,'+(0.4+0.4*Math.sin(animT*8))+')';ctx.lineWidth=3;ctx.strokeRect(ox+hintCell.c*cell+2,oy+hintCell.r*cell+2,cell-4,cell-4);hintTimer--;}
  drawPlayer();
  if(winFlash>0){ctx.fillStyle='rgba(255,255,200,'+(winFlash/30*0.5)+')';ctx.fillRect(ox,oy,COLS*cell,ROWS*cell);winFlash-=1;}
  ctx.restore();
}
function drawCell(r,c,t){
  const x=ox+c*cell,y=oy+r*cell,s=cell;
  if(t===EMPTY){ctx.fillStyle='#1c130a';ctx.fillRect(x,y,s,s);return;}
  if(t===DIRT){ctx.fillStyle='#5a3d1e';ctx.fillRect(x,y,s,s);ctx.fillStyle='#6e4d24';for(let i=0;i<4;i++){const px=x+((r*7+c*3+i*13)%s),py=y+((r*5+c*11+i*7)%s);ctx.fillRect(px,py,3,3);}ctx.fillStyle='#3d2812';ctx.fillRect(x,y+s-2,s,2);return;}
  if(t===WALL){ctx.fillStyle='#7a7a82';ctx.fillRect(x,y,s,s);ctx.fillStyle='#9aa0aa';ctx.fillRect(x+2,y+2,s-4,s-6);ctx.fillStyle='#5a5a62';ctx.fillRect(x+2,y+s-5,s-4,3);return;}
  if(t===MWALL){ctx.fillStyle='#3a1a4a';ctx.fillRect(x,y,s,s);ctx.strokeStyle='#b46cff';ctx.lineWidth=3;for(let i=-s;i<s*2;i+=8){ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i+s,y+s);ctx.stroke();}return;}
  if(t===EXIT){const open=gemsGot>=gemsTotal;ctx.fillStyle=open?'#0e3a1e':'#3a1414';ctx.fillRect(x,y,s,s);ctx.fillStyle=open?'#3dffa0':'#a04040';ctx.font='bold '+Math.floor(s*0.6)+'px Segoe UI,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(open?'🚪':'🔒',x+s/2,y+s/2+1);ctx.textBaseline='alphabetic';return;}
  if(t===GEM||t===BOULDER){
    const cx=x+s/2,cy=y+s/2,rad=s*0.36;
    if(t===GEM){ctx.fillStyle='#0fb6d8';ctx.beginPath();ctx.moveTo(cx,y+s*0.18);ctx.lineTo(x+s*0.82,cy);ctx.lineTo(cx,y+s*0.82);ctx.lineTo(x+s*0.18,cy);ctx.closePath();ctx.fill();ctx.fillStyle='#9ff0ff';ctx.beginPath();ctx.moveTo(cx,y+s*0.18);ctx.lineTo(x+s*0.82,cy);ctx.lineTo(cx,cy);ctx.closePath();ctx.fill();}
    else{ctx.fillStyle='#8a8a92';ctx.beginPath();ctx.arc(cx,cy,rad,0,7);ctx.fill();ctx.fillStyle='#b4b4be';ctx.beginPath();ctx.arc(cx-rad*0.3,cy-rad*0.3,rad*0.45,0,7);ctx.fill();ctx.strokeStyle='#5a5a62';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,rad,0,7);ctx.stroke();}
  }
}
function drawPlayer(){
  const x=ox+pc*cell,y=oy+pr*cell,s=cell,cx=x+s/2,cy=y+s/2,rad=s*0.34;
  ctx.fillStyle='#ff8a3d';ctx.beginPath();ctx.arc(cx,cy,rad,0,7);ctx.fill();
  ctx.fillStyle='#3a1d08';ctx.beginPath();ctx.arc(cx-rad*0.3,cy-rad*0.1,rad*0.14,0,7);ctx.fill();ctx.beginPath();ctx.arc(cx+rad*0.3,cy-rad*0.1,rad*0.14,0,7);ctx.fill();
  ctx.strokeStyle='#c45a18';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,rad,0,7);ctx.stroke();
}

/* ---------- Menu / Select / Overlays ---------- */
function drawMenu(){
  ctx.textAlign='center';
  ctx.fillStyle='#ff8a3d';ctx.font='bold 52px Segoe UI,sans-serif';ctx.fillText('🪨 ROCKFALL',PLAY_W/2,150);
  ctx.fillStyle='#ffe9b8';ctx.font='18px Segoe UI,sans-serif';ctx.fillText('Dig · Dodge · Collect Gems',PLAY_W/2,190);
  /* demo boulder */
  ctx.save();cellGeom();
  const dg=[['###########'],['#.........#'],['#.O.*.P..E#'],['###########']];
  ctx.restore();
  drawBigBtn('▶  PLAY',PLAY_W/2,300,240,60,'#3d8a2e','#5fc040');
  drawBigBtn('☰  LEVELS',PLAY_W/2,375,240,52,'#2a5a8a','#4a90d8');
  drawBigBtn((Save.data.mute?'🔇':'🔊')+' Sound',PLAY_W/2,440,200,44,'#5a3d1e','#7a5a2e');
  const ts=totalStars();ctx.fillStyle='#ffd24a';ctx.font='16px Segoe UI,sans-serif';ctx.fillText('⭐ '+ts+' / '+(LEVELS.length*3)+' stars · '+(Save.data.unlocked-1)+'/'+LEVELS.length+' cleared',PLAY_W/2,505);
}
function drawBigBtn(txt,cx,cy,w,h,c1,c2){const x=cx-w/2;const hover=hitBtn(cx,cy,w,h);ctx.fillStyle=hover?c2:c1;roundRect(x,cy-h/2,w,h,12);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 22px Segoe UI,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(txt,cx,cy+1);ctx.textBaseline='alphabetic';}
let mouseX=-1,mouseY=-1;
function hitBtn(cx,cy,w,h){if(mouseX<0)return false;const x=cx-w/2,y=cy-h/2;return mouseX>x&&mouseX<x+w&&mouseY>y&&mouseY<y+h;}

function drawSelect(){
  ctx.fillStyle='#ffe9b8';ctx.font='bold 26px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('Select Cave',PLAY_W/2,40);
  const cols=5,bs=78,gap=12,startY=80;
  const tw=cols*bs+(cols-1)*gap;const sx0=(PLAY_W-tw)/2;
  for(let i=0;i<LEVELS.length;i++){
    const cc=i%cols,rr=Math.floor(i/cols);
    const x=sx0+cc*(bs+gap),y=startY+rr*(bs+gap*0.7+10);
    const unlocked=i<=Save.data.unlocked-1;
    const hover=unlocked&&mouseX>x&&mouseX<x+bs&&mouseY>y&&mouseY<y+bs;
    ctx.fillStyle=unlocked?(hover?'#5fc040':'#3a2a10'):'#241808';roundRect(x,y,bs,bs,10);ctx.fill();
    ctx.strokeStyle=unlocked?'#7a5a2e':'#3a2a10';ctx.lineWidth=2;roundRect(x,y,bs,bs,10);ctx.stroke();
    if(unlocked){ctx.fillStyle='#ffe9b8';ctx.font='bold 20px Segoe UI,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(i+1,x+bs/2,y+bs/2-6);const st=Save.data.stars[i]||0;ctx.font='15px Segoe UI,sans-serif';ctx.fillText('⭐'.repeat(st)+'☆'.repeat(3-st),x+bs/2,y+bs/2+18);ctx.textBaseline='alphabetic';}
    else{ctx.fillStyle='#5a4a2e';ctx.font='24px Segoe UI,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔒',x+bs/2,y+bs/2);ctx.textBaseline='alphabetic';}
  }
  drawBigBtn('⬅ Menu',PLAY_W/2,PLAY_W-18,160,42,'#5a3d1e','#7a5a2e');
}
function drawDead(){
  ctx.fillStyle='rgba(10,4,0,0.72)';ctx.fillRect(0,0,PLAY_W,PLAY_W+HUD_H);
  ctx.fillStyle='#ff5a4a';ctx.font='bold 44px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('CRUSHED!',PLAY_W/2,PLAY_W/2-30);
  ctx.fillStyle='#ffe9b8';ctx.font='18px Segoe UI,sans-serif';ctx.fillText('A boulder flattened you.',PLAY_W/2,PLAY_W/2+8);
  drawBigBtn('↶ Undo',PLAY_W/2-95,PLAY_W/2+70,170,50,'#2a5a8a','#4a90d8');
  drawBigBtn('↻ Retry',PLAY_W/2+95,PLAY_W/2+70,170,50,'#8a2a2a','#d84040');
  drawBigBtn('☰ Levels',PLAY_W/2,PLAY_W/2+140,180,44,'#5a3d1e','#7a5a2e');
}
function drawWin(){
  ctx.fillStyle='rgba(0,20,0,0.74)';ctx.fillRect(0,0,PLAY_W,PLAY_W+HUD_H);
  ctx.fillStyle='#3dffa0';ctx.font='bold 44px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('CAVE CLEARED!',PLAY_W/2,PLAY_W/2-50);
  const over=moves-LEVELS[curLvl].par;const stars=over<=0?3:over<=Math.ceil(LEVELS[curLvl].par*0.4)?2:1;
  ctx.font='40px Segoe UI,sans-serif';ctx.fillText('⭐'.repeat(stars)+'☆'.repeat(3-stars),PLAY_W/2,PLAY_W/2+5);
  ctx.fillStyle='#ffe9b8';ctx.font='17px Segoe UI,sans-serif';ctx.fillText('Moves '+moves+' · Par '+LEVELS[curLvl].par,PLAY_W/2,PLAY_W/2+45);
  const next=curLvl+1<LEVELS.length;
  if(next)drawBigBtn('Next ▶',PLAY_W/2-95,PLAY_W/2+110,170,50,'#3d8a2e','#5fc040');
  drawBigBtn('↻ Replay',PLAY_W/2+(next?95:0),PLAY_W/2+110,170,50,'#5a3d1e','#7a5a2e');
  drawBigBtn('☰ Levels',PLAY_W/2,PLAY_W/2+175,180,44,'#2a5a8a','#4a90d8');
}

/* ---------- Input ---------- */
function ptToCanvas(e){const r=canvas.getBoundingClientRect();const x=(e.clientX-r.left),y=(e.clientY-r.top);return{x:x/scale,y:y/scale};}
function handleClick(x,y){
  AC.init();if(!MUSIC.playing)MUSIC.start();mouseX=x;mouseY=y;
  if(state==='menu'){
    if(hitBtn(PLAY_W/2,300,240,60)){loadLevel(Math.min(Math.max(Save.data.unlocked-1,0),LEVELS.length-1));AC.click();return;}
    if(hitBtn(PLAY_W/2,375,240,52)){state='select';AC.click();return;}
    if(hitBtn(PLAY_W/2,440,200,44)){Save.data.mute=!Save.data.mute;AC.sfxOn=!Save.data.mute;MUSIC.on=!Save.data.mute;Save.save();AC.click();return;}
  }else if(state==='select'){
    const cols=5,bs=78,gap=12,startY=80,tw=cols*bs+(cols-1)*gap,sx0=(PLAY_W-tw)/2;
    for(let i=0;i<LEVELS.length;i++){const cc=i%cols,rr=Math.floor(i/cols);const bx=sx0+cc*(bs+gap),by=startY+rr*(bs+gap*0.7+10);if(i<=Save.data.unlocked-1&&x>bx&&x<bx+bs&&y>by&&y<by+bs){loadLevel(i);AC.click();return;}}
    if(hitBtn(PLAY_W/2,PLAY_W-18,160,42)){state='menu';AC.click();return;}
  }else if(state==='dead'){
    if(hitBtn(PLAY_W/2-95,PLAY_W/2+70,170,50)){undo();return;}
    if(hitBtn(PLAY_W/2+95,PLAY_W/2+70,170,50)){loadLevel(curLvl);AC.click();return;}
    if(hitBtn(PLAY_W/2,PLAY_W/2+140,180,44)){state='select';AC.click();return;}
  }else if(state==='win'){
    const next=curLvl+1<LEVELS.length;
    if(next&&hitBtn(PLAY_W/2-95,PLAY_W/2+110,170,50)){loadLevel(curLvl+1);AC.click();return;}
    if(hitBtn(PLAY_W/2+(next?95:0),PLAY_W/2+110,170,50)){loadLevel(curLvl);AC.click();return;}
    if(hitBtn(PLAY_W/2,PLAY_W/2+175,180,44)){state='select';AC.click();return;}
  }else if(state==='play'){
    /* HUD buttons */
    if(hitBtn(PLAY_W-135,23,30,30)){undo();return;}
    if(hitBtn(PLAY_W-97,23,30,30)){showHint();return;}
    if(hitBtn(PLAY_W-59,23,30,30)){state='select';AC.click();return;}
    if(hitBtn(PLAY_W-21,23,30,30)){Save.data.mute=!Save.data.mute;AC.sfxOn=!Save.data.mute;MUSIC.on=!Save.data.mute;Save.save();AC.click();return;}
  }
}
function showHint(){
  /* find nearest uncollected gem, flash it */
  let best=null,bd=1e9;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c]===GEM){const d=Math.abs(r-pr)+Math.abs(c-pc);if(d<bd){bd=d;best={r,c};}}
  if(best){hintCell=best;hintTimer=120;checkAch('undoer',false);} /* ach placeholder */
  if(history.length>0)checkAch('undoer',true); /* mark 'second thoughts' loosely if used undo */
}
/* keyboard */
window.addEventListener('keydown',e=>{
  AC.init();if(!MUSIC.playing)MUSIC.start();
  const k=e.key.toLowerCase();
  if(state==='play'){
    if(k==='arrowup'||k==='w'){tryMove(-1,0);e.preventDefault();}
    else if(k==='arrowdown'||k==='s'){tryMove(1,0);e.preventDefault();}
    else if(k==='arrowleft'||k==='a'){tryMove(0,-1);e.preventDefault();}
    else if(k==='arrowright'||k==='d'){tryMove(0,1);e.preventDefault();}
    else if(k==='z'||k==='u'){undo();}
    else if(k==='r'){loadLevel(curLvl);}
  }else if(k==='enter'){if(state==='menu')loadLevel(0);else if(state==='win'&&curLvl+1<LEVELS.length)loadLevel(curLvl+1);}
});
/* mouse */
canvas.addEventListener('mousedown',e=>{const p=ptToCanvas(e);handleClick(p.x,p.y);});
canvas.addEventListener('mousemove',e=>{const p=ptToCanvas(e);mouseX=p.x;mouseY=p.y;});
canvas.addEventListener('mouseleave',()=>{mouseX=mouseY=-1;});
/* touch: swipe to move, tap for buttons */
let tsx=0,tsy=0,tst=0;
canvas.addEventListener('touchstart',e=>{const t=e.touches[0];const r=canvas.getBoundingClientRect();tsx=t.clientX-r.left;tsy=t.clientY-r.top;tst=Date.now();AC.init();if(!MUSIC.playing)MUSIC.start();e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];const r=canvas.getBoundingClientRect();
  const ex=t.clientX-r.left,ey=t.clientY-r.top;const dx=ex-tsx,dy=ey-tsy;const adx=Math.abs(dx),ady=Math.abs(dy);
  if(state==='play'&&Math.max(adx,ady)>24){
    if(adx>ady){tryMove(0,dx>0?1:-1);}else{tryMove(dy>0?1:-1,0);}
  }else{handleClick(ex/scale,ey/scale);}
  e.preventDefault();
},{passive:false});
window.addEventListener('resize',resize);resize();

/* gem hundred achievement check on collect */
const _origGem=AC.gem;let gemCount=0;
AC.gem=function(){_origGem.call(AC);gemCount++;if(gemCount>=100)checkAch('gem_hundred',true);};

/* apply saved mute */
if(Save.data.mute){AC.sfxOn=false;MUSIC.on=false;}
requestAnimationFrame(loop);
</script>
