this.x+=this.vx*dt;this.y+=this.vy*dt;
this.vy+=300*dt; // gravity
this.life-=dt;
this.alpha=Math.max(0,this.life/this.maxLife);
}
get dead(){return this.life<=0}
}

class ParticleSystem{
constructor(){this.particles=[]}
emit(x,y,count,colors,spread,speed,lifeRange,sizeRange){
for(let i=0;i<count;i++){
const angle=Math.random()*Math.PI*2;
const spd=speed*(0.5+Math.random()*0.5);
const l=lifeRange[0]+Math.random()*(lifeRange[1]-lifeRange[0]);
const s=sizeRange[0]+Math.random()*(sizeRange[1]-sizeRange[0]);
this.particles.push(new Particle(
x+(-spread/2+Math.random()*spread),
y+(-spread/2+Math.random()*spread),
Math.cos(angle)*spd,Math.sin(angle)*spd-100,
l,colors[Math.floor(Math.random()*colors.length)],s
));
}}
burst(x,y,count){
const cols=['#00e5ff','#ff00ff','#ffeb3b','#76ff03','#ff5252','#e040fb'];
this.emit(x,y,count,cols,30,250,[0.5,1.5],[3,8]);
}
confetti(cx,cy,w,h,count){
const cols=['#00e5ff','#ff00ff','#ffeb3b','#76ff03','#ff5252','#e040fb','#ff6d00','#64ffda'];
for(let i=0;i<count;i++){
const px=Math.random()*w;
const angle=-Math.PI/2+(-0.5+Math.random())*1;
const spd=150+Math.random()*300;
const l=1+Math.random()*2;
this.particles.push(new Particle(cx-w/2+px,cy+h/2,Math.cos(angle)*spd,Math.sin(angle)*spd,l,cols[Math.floor(Math.random()*cols.length)],3+Math.random()*5));
}}
coinBurst(x,y){this.emit(x,y,12,['#ffd700','#ffeb3b','#ff9800'],20,180,[0.4,0.9],[4,7])}
update(dt){this.particles=this.particles.filter(p=>{p.update(dt);return!p.dead})}
draw(ctx){
for(const p of this.particles){
ctx.globalAlpha=p.alpha;
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size*p.alpha,0,Math.PI*2);
ctx.fill();
}
ctx.globalAlpha=1;
}
clear(){this.particles=[]}
}

function lerp(a,b,t){return a+(b-a)*t}
function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function easeOutBack(t){const c1=1.70158;const c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2)}
function easeInCubic(t){return t*t*t}
function easeOutElastic(t){const c4=(2*Math.PI)/3;return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

/* ═══════════════════════════════════════════════════
   BUTTON HELPER
   ═══════════════════════════════════════════════════ */
function drawRoundRect(ctx,x,y,w,h,r){
ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function hitTest(mx,my,rx,ry,rw,rh){return mx>=rx&&mx<=rx+rw&&my>=ry&&my<=ry+rh}

/* ═══════════════════════════════════════════════════
   MAIN GAME CLASS
   ═══════════════════════════════════════════════════ */
class Game{
constructor(){
this.canvas=document.getElementById(CANVAS_ID);
this.ctx=this.canvas.getContext('2d');
this.sound=new SoundEngine();
this.particles=new ParticleSystem();
this.save=loadSave();
this.state='menu'; // menu, playing, daily, levelSelect, achievementPopup, tutorial, settings
this.W=0;this.H=0;this.dpr=1;
this.time=0;this.lastTime=0;this.dt=0;
this.rafId=null;
this.timers=[];
this.shakeAmount=0;
this.shakeTime=0;

// Playing state
this.currentLevelIdx=0;
this.answerSlots=[]; // {letter, sourceIdx, revealed}
this.letterPool=[];  // {letter, used, x, y, targetX, targetY, animProgress}
this.hintsUsed=0;
this.revealedPositions=new Set();
this.removedIndices=new Set();
this.levelStartTime=0;

// Animation state
this.levelTransition={active:false,progress:0,dir:1};
this.coinAnim={active:false,x:0,y:0,amount:0,progress:0};
this.wrongAnim={active:false,progress:0};
this.correctAnim={active:false,progress:0};
this.achievementQueue=[];

// Tutorial
this.tutorialStep=0;

// Daily
this.dailyPuzzle=null;

// UI
this.buttons=[];
this.scrollY=0;
this.targetScrollY=0;

// Fonts
this.fontLoaded=false;

this.resize();
this.setupEvents();
this.sound.init();
this.checkDailyPuzzle();
}

resize(){
this.dpr=Math.min(window.devicePixelRatio||1,2);
this.W=window.innerWidth;
this.H=window.innerHeight;
this.canvas.width=this.W*this.dpr;
this.canvas.height=this.H*this.dpr;
this.canvas.style.width=this.W+'px';
this.canvas.style.height=this.H+'px';
this.ctx.setTransform(this.dpr,0,0,this.dpr,0,0);
if(this.state==='playing'||this.state==='daily')this.layoutLevel();
}

setupEvents(){
this._onResize=()=>this.resize();
this._onPointerDown=(e)=>this.onPointerDown(e);
this._onPointerMove=(e)=>this.onPointerMove(e);
this._onPointerUp=(e)=>this.onPointerUp(e);
this._onKeyDown=(e)=>this.onKeyDown(e);
window.addEventListener('resize',this._onResize);
this.canvas.addEventListener('pointerdown',this._onPointerDown);
this.canvas.addEventListener('pointermove',this._onPointerMove);
this.canvas.addEventListener('pointerup',this._onPointerUp);
document.addEventListener('keydown',this._onKeyDown);
this.canvas.addEventListener('touchstart',(e)=>e.preventDefault(),{passive:false});
}

cleanup(){
if(this.rafId)cancelAnimationFrame(this.rafId);
window.removeEventListener('resize',this._onResize);
this.canvas.removeEventListener('pointerdown',this._onPointerDown);
this.canvas.removeEventListener('pointermove',this._onPointerMove);
this.canvas.removeEventListener('pointerup',this._onPointerUp);
document.removeEventListener('keydown',this._onKeyDown);
for(const t of this.timers)clearTimeout(t);
this.timers=[];
}

/* ─── Pointer Events ─── */
getPos(e){
const r=this.canvas.getBoundingClientRect();
return{x:e.clientX-r.left,y:e.clientY-r.top};
}

onPointerDown(e){
const p=this.getPos(e);
this.pointerDown=true;
this.pointerPos=p;
this.sound.resume();
this.handleTap(p.x,p.y);
}
onPointerMove(e){}
onPointerUp(e){this.pointerDown=false}

onKeyDown(e){
if(e.key==='Backspace'||e.key==='Delete'){
if(this.state==='playing'||this.state==='daily')this.removeLastLetter();
}
}

handleTap(x,y){
if(this.shakeTime>0)return;

// Achievement popup dismiss
if(this.achievementQueue.length>0&&this.state!=='tutorial'){
if(this.achievementQueue.length>0){
this.achievementQueue.shift();
if(this.achievementQueue.length===0)this.achievementPopup=null;
}
return;
}

switch(this.state){
case 'menu':this.tapMenu(x,y);break;
case 'playing':case 'daily':this.tapPlaying(x,y);break;
case 'levelSelect':this.tapLevelSelect(x,y);break;
case 'tutorial':this.tapTutorial(x,y);break;
case 'settings':this.tapSettings(x,y);break;
}
}

/* ─── MENU ─── */
tapMenu(x,y){
const cx=this.W/2,cy=this.H/2;
const bw=Math.min(260,this.W*0.6),bh=56,gap=16;
const by=cy-bh;

if(hitTest(x,y,cx-bw/2,by,bw,bh)){
// Play
this.startLevel(this.save.currentLevel-1);
this.sound.playTap();
}else if(hitTest(x,y,cx-bw/2,by+bh+gap,bw,bh)){
// Daily
if(this.canPlayDaily()){
this.startDaily();
}else{
this.showAlreadyPlayed();
}
this.sound.playTap();
}else if(hitTest(x,y,cx-bw/2,by+(bh+gap)*2,bw,bh)){
// Level Select
this.state='levelSelect';this.scrollY=0;this.targetScrollY=0;
this.sound.playTap();
}else if(hitTest(x,y,cx-bw/2,by+(bh+gap)*3,bw,bh)){
// Settings
this.state='settings';
this.sound.playTap();
}
}

/* ─── PLAYING ─── */
tapPlaying(x,y){
const lvl=this.getCurrentLevelData();
if(!lvl)return;

// Back button
if(hitTest(x,y,12,12,44,44)){this.goToMenu();this.sound.playTap();return}

// Hint buttons
const hbY=this.getHintButtonY();
const hbW=90,hbH=40,gap=10;
const totalHW=hbW*3+gap*2;
const hbX=(this.W-totalHW)/2;

// Reveal
if(hitTest(x,y,hbX,hbY,hbW,hbH)){
this.useHintReveal();this.sound.playTap();return;
}
// Remove
if(hitTest(x,y,hbX+hbW+gap,hbY,hbW,hbH)){
this.useHintRemove();this.sound.playTap();return;
}
// Skip
if(hitTest(x,y,hbX+(hbW+gap)*2,hbY,hbW,hbH)){
this.useHintSkip();this.sound.playTap();return;
}

// Answer slots — tap to remove letter
for(let i=0;i<this.answerSlots.length;i++){
const s=this.answerSlots[i];
if(!s||s.revealed)continue;
const pos=this.getSlotPos(i);
if(hitTest(x,y,pos.x,pos.y,pos.w,pos.h)){
this.removeLetterAt(i);
this.sound.playLetterDeselect();
return;
}
}

// Letter pool
for(let i=0;i<this.letterPool.length;i++){
const lp=this.letterPool[i];
if(lp.used||this.removedIndices.has(i))continue;
if(hitTest(x,y,lp.x,lp.y,lp.w,lp.h)){
this.selectLetter(i);
this.sound.playLetterSelect();
return;
}
}
}

/* ─── LEVEL SELECT ─── */
tapLevelSelect(x,y){
// Back
if(hitTest(x,y,12,12,44,44)){this.state='menu';this.sound.playTap();return}
// Level buttons
const cols=5,cellW=64,cellH=64,gap=10;
const totalW=cols*(cellW+gap)-gap;
const startX=(this.W-totalW)/2;
const startY=100-this.scrollY;
for(let i=0;i<LEVELS.length;i++){
const col=i%cols,row=Math.floor(i/cols);
const lx=startX+col*(cellW+gap);
const ly=startY+row*(cellH+gap);
if(hitTest(x,y,lx,ly,cellW,cellH)){
if(this.isLevelUnlocked(i)){
this.startLevel(i);
this.sound.playTap();
}
return;
}
}
}

tapTutorial(x,y){
this.tutorialStep++;
if(this.tutorialStep>=3){
this.save.tutorialDone=true;
writeSave(this.save);
if(!this.save.tutorialDone){
this.state='menu';
}else{
this.state='menu';
}
}
this.sound.playTap();
}

tapSettings(x,y){
// Back
if(hitTest(x,y,12,12,44,44)){this.state='menu';this.sound.playTap();return}
// Sound toggle
const cx=this.W/2,cy=this.H/2-40;
if(hitTest(x,y,cx-80,cy-22,160,44)){
this.sound.enabled=!this.sound.enabled;
this.sound.playTap();
return;
}
// Reset progress
if(hitTest(x,y,cx-80,cy+60,160,44)){
this.save=defaultSave();writeSave(this.save);
this.sound.playTap();
return;
}
}

/* ─── LEVEL DATA ─── */
getCurrentLevelData(){
if(this.state==='daily')return this.dailyPuzzle;
return LEVELS[this.currentLevelIdx];
}

isLevelUnlocked(idx){
if(idx===0)return true;
// Unlock if previous level completed or current level pointer >= idx+1
return this.save.completedLevels.includes(idx)||this.save.currentLevel>idx+1;
}

/* ─── START LEVEL ─── */
startLevel(idx){
this.currentLevelIdx=idx;
this.state='playing';
this.hintsUsed=0;
this.revealedPositions=new Set();
this.removedIndices=new Set();
this.levelTransition={active:true,progress:0,dir:1};
this.wrongAnim={active:false,progress:0};
this.correctAnim={active:false,progress:0};
this.levelStartTime=performance.now();
this.save.levelStartTime=this.levelStartTime;
this.save.hintsUsedThisLevel=0;
this.layoutLevel();
writeSave(this.save);

if(!this.save.tutorialDone){
this.state='tutorial';
this.tutorialStep=0;
}
}

startDaily(){
this.dailyPuzzle=getDailyPuzzle();
this.state='daily';
this.hintsUsed=0;
this.revealedPositions=new Set();
this.removedIndices=new Set();
this.levelTransition={active:true,progress:0,dir:1};
this.wrongAnim={active:false,progress:0};
this.correctAnim={active:false,progress:0};
this.levelStartTime=performance.now();
this.layoutLevel();
}

canPlayDaily(){
const today=getTodayStr();
return this.save.dailyPuzzle.date!==today;
}

showAlreadyPlayed(){
// Brief flash — we'll just skip
}

/* ─── LAYOUT LEVEL ─── */
layoutLevel(){
const lvl=this.getCurrentLevelData();
if(!lvl)return;
const answer=lvl.answer;
const answerLen=answer.length;

// Build scrambled pool
const allLetters=answer.split('').concat(lvl.extra.split(''));
const shuffled=shuffleArray(allLetters);

// Answer slots
this.answerSlots=new Array(answerLen).fill(null);

// Letter pool
const poolW=Math.min(this.W-40,500);
const tileSize=Math.min(44,(poolW-Math.min(7,shuffled.length-1)*6)/Math.min(7,shuffled.length));
const actualTileSize=Math.max(MIN_TAP_SIZE,tileSize);
const cols=Math.min(7,shuffled.length);
const rows=Math.ceil(shuffled.length/cols);
const gapX=6,gapY=6;
const poolTotalW=cols*(actualTileSize+gapX)-gapX;
const poolStartX=(this.W-poolTotalW)/2;
const poolStartY=this.getPoolStartY();

this.letterPool=shuffled.map((letter,i)=>{
const col=i%cols,row=Math.floor(i/cols);
return{
letter,i,used:false,removed:false,
x:poolStartX+col*(actualTileSize+gapX),
y:poolStartY+row*(actualTileSize+gapY),
w:actualTileSize,h:actualTileSize,
animProgress:0,animType:null,
fromX:0,fromY:0
};
});
}

getPoolStartY(){
// Answer area is roughly center-ish; pool below it
const emojiGridBottom=this.getEmojiGridY()+this.getEmojiGridSize()+20;
const slotAreaBottom=this.getSlotAreaY()+60+20;
return Math.max(emojiGridBottom,slotAreaBottom)+80;
}

getEmojiGridY(){return 70}
getEmojiGridSize(){
const avail=this.H*0.28;
return Math.min(avail,this.W*0.6,280);
}

getSlotAreaY(){
return this.getEmojiGridY()+this.getEmojiGridSize()+20;
}

getSlotPos(idx){
const lvl=this.getCurrentLevelData();
const len=lvl.answer.length;
const tileW=Math.min(44,(this.W-40-(len-1)*6)/len);
const tw=Math.max(MIN_TAP_SIZE,tileW);
const totalW=len*(tw+6)-6;
const sx=(this.W-totalW)/2;
const sy=this.getSlotAreaY();
return{x:sx+idx*(tw+6),y:sy,w:tw,h:tw};
}

getHintButtonY(){
const poolRows=Math.ceil(this.letterPool.length/7);
const tileSize=this.letterPool.length>0?this.letterPool[0].h:44;
const poolBottom=this.getPoolStartY()+poolRows*(tileSize+6)+16;
return Math.min(poolBottom,this.H-60);
}

/* ─── LETTER SELECTION ─── */
selectLetter(poolIdx){
const lvl=this.getCurrentLevelData();
const lp=this.letterPool[poolIdx];
if(lp.used||this.removedIndices.has(poolIdx))return;

// Find first empty slot
let slotIdx=-1;
for(let i=0;i<this.answerSlots.length;i++){
// If this position is revealed, skip
if(this.revealedPositions.has(i))continue;
if(this.answerSlots[i]===null){slotIdx=i;break}
}
if(slotIdx===-1)return;

lp.used=true;
this.answerSlots[slotIdx]={letter:lp.letter,sourceIdx:poolIdx,revealed:false};

// Check answer
const filled=this.answerSlots.filter((s,i)=>s!==null||this.revealedPositions.has(i));
const allFilled=this.answerSlots.every((s,i)=>s!==null||this.revealedPositions.has(i));

if(allFilled){
this.checkAnswer();
}
}

removeLetterAt(slotIdx){
const s=this.answerSlots[slotIdx];
if(!s||s.revealed)return;
this.letterPool[s.sourceIdx].used=false;
this.answerSlots[slotIdx]=null;
}

removeLastLetter(){
for(let i=this.answerSlots.length-1;i>=0;i--){
if(this.answerSlots[i]&&!this.answerSlots[i].revealed){
this.removeLetterAt(i);
this.sound.playLetterDeselect();
return;
}
}
}

checkAnswer(){
const lvl=this.getCurrentLevelData();
const guess=this.answerSlots.map((s,i)=>{
if(s)return s.letter;
// Revealed position
return lvl.answer[i];
}).join('');

if(guess===lvl.answer){
this.onCorrect();
}else{
this.onWrong();
}
}

onCorrect(){
const lvl=this.getCurrentLevelData();
this.correctAnim={active:true,progress:0};
this.sound.playCorrect();

// Calculate coins
let reward=COIN_REWARD_NO_HINT;
if(this.hintsUsed===1)reward=COIN_REWARD_1_HINT;
else if(this.hintsUsed>=2)reward=COIN_REWARD_MANY_HINTS;

const elapsed=(performance.now()-this.levelStartTime)/1000;

if(this.state==='daily'){
reward=COIN_REWARD_DAILY;
const today=getTodayStr();
const sp=this.save.dailyPuzzle;
const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
const yStr=`${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;

if(sp.lastStreakDate===yStr){
sp.streak++;
}else{
sp.streak=1;
}
if(sp.streak>=STREAK_BONUS_DAYS){
reward+=COIN_REWARD_STREAK_BONUS;
this.sound.playStreak();
}
sp.bestStreak=Math.max(sp.bestStreak,sp.streak);
sp.lastStreakDate=today;
sp.date=today;
sp.completed=true;
this.sound.playDailyComplete();
}else{
// Mark level completed
if(!this.save.completedLevels.includes(this.currentLevelIdx)){
this.save.completedLevels.push(this.currentLevelIdx);
}
if(this.save.currentLevel<=this.currentLevelIdx+1){
this.save.currentLevel=Math.min(this.currentLevelIdx+2,LEVELS.length);
}
if(!this.save.bestTimes[this.currentLevelIdx]||elapsed<this.save.bestTimes[this.currentLevelIdx]){
this.save.bestTimes[this.currentLevelIdx]=elapsed;
}
}

this.save.coins+=reward;
this.save.totalCoinsEarned+=reward;
writeSave(this.save);

// Coin animation
const cx=this.W/2,cy=this.H/2;
this.coinAnim={active:true,x:cx,y:cy,amount:reward,progress:0};

// Particles
this.particles.confetti(cx,cy,this.W,this.H,60);

// Check achievements
this.checkAchievements(elapsed);

// Sound
this.sound.playCoin();
setTimeout(()=>this.sound.playLevelComplete(),400);

// Transition to next level or menu
const tid=setTimeout(()=>{
if(this.state==='daily'){
this.state='menu';
}else if(this.currentLevelIdx<LEVELS.length-1){
this.startLevel(this.currentLevelIdx+1);
}else{
this.state='menu';
}
},2200);
this.timers.push(tid);
}

onWrong(){
this.wrongAnim={active:true,progress:0};
this.sound.playWrong();
this.shakeAmount=8;
this.shakeTime=0.4;

// Clear all non-revealed letters after brief delay
const tid=setTimeout(()=>{
for(let i=0;i<this.answerSlots.length;i++){
const s=this.answerSlots[i];
if(s&&!s.revealed){
this.letterPool[s.sourceIdx].used=false;
this.answerSlots[i]=null;
}
}
},600);
this.timers.push(tid);
}

/* ─── HINTS ─── */
useHintReveal(){
if(this.save.coins<HINT_COST_REVEAL)return;
const lvl=this.getCurrentLevelData();

// Find unrevealed position
const candidates=[];
for(let i=0;i<lvl.answer.length;i++){
if(this.revealedPositions.has(i))continue;
// Check if already filled correctly
if(this.answerSlots[i]&&this.answerSlots[i].letter===lvl.answer[i])continue;
candidates.push(i);
}
if(candidates.length===0)return;

this.save.coins-=HINT_COST_REVEAL;
this.hintsUsed++;
this.save.hintsUsedThisLevel=this.hintsUsed;
writeSave(this.save);

const pos=candidates[Math.floor(Math.random()*candidates.length)];
this.revealedPositions.add(pos);

// Remove any existing letter in that slot
if(this.answerSlots[pos]){
this.letterPool[this.answerSlots[pos].sourceIdx].used=false;
this.answerSlots[pos]=null;
}

// Find the correct letter in pool and mark it
const needed=lvl.answer[pos];
for(let i=0;i<this.letterPool.length;i++){
if(!this.letterPool[i].used&&this.letterPool[i].letter===needed){
this.letterPool[i].used=true;
break;
}
}

this.answerSlots[pos]={letter:needed,sourceIdx:-1,revealed:true};
this.sound.playHint();

// Check if complete
const allFilled=this.answerSlots.every((s,i)=>s!==null||this.revealedPositions.has(i));
if(allFilled)this.checkAnswer();
}

useHintRemove(){
if(this.save.coins<HINT_COST_REMOVE)return;
const lvl=this.getCurrentLevelData();

// Find wrong letters in pool
const correctLetters=new Set(lvl.answer.split(''));
const candidates=[];
for(let i=0;i<this.letterPool.length;i++){
if(this.letterPool[i].used||this.removedIndices.has(i))continue;
if(!correctLetters.has(this.letterPool[i].letter)){
candidates.push(i);
}
}

if(candidates.length===0)return;

this.save.coins-=HINT_COST_REMOVE;
this.hintsUsed++;
this.save.hintsUsedThisLevel=this.hintsUsed;
writeSave(this.save);

const toRemove=shuffleArray(candidates).slice(0,Math.min(4,candidates.length));
for(const idx of toRemove)this.removedIndices.add(idx);
this.sound.playHint();
}

useHintSkip(){
if(this.save.coins<HINT_COST_SKIP)return;
this.save.coins-=HINT_COST_SKIP;
writeSave(this.save);

if(this.state==='daily'){
this.state='menu';
}else if(this.currentLevelIdx<LEVELS.length-1){
this.startLevel(this.currentLevelIdx+1);
}else{
this.state='menu';
}
this.sound.playHint();
}

/* ─── ACHIEVEMENTS ─── */
checkAchievements(elapsed){
const completed=this.save.completedLevels.length;
const checks=[
{id:'first_solve',cond:completed>=1},
{id:'five_levels',cond:completed>=5},
{id:'ten_levels',cond:completed>=10},
{id:'twenty_levels',cond:completed>=20},
{id:'all_levels',cond:completed>=80},
{id:'no_hints',cond:this.hintsUsed===0},
{id:'streak_3',cond:this.save.dailyPuzzle.streak>=3},
{id:'streak_7',cond:this.save.dailyPuzzle.streak>=7},
{id:'coins_100',cond:this.save.totalCoinsEarned>=100},
{id:'coins_500',cond:this.save.totalCoinsEarned>=500},
{id:'speed_demon',cond:elapsed<10&&elapsed>0},
{id:'daily_first',cond:this.state==='daily'}
];

for(const c of checks){
if(c.cond&&!this.save.achievements.includes(c.id)){
this.save.achievements.push(c.id);
this.achievementQueue.push(ACHIEVEMENTS.find(a=>a.id===c.id));
this.sound.playAchievement();
}
}
writeSave(this.save);
}

/* ─── CHECK DAILY ─── */
checkDailyPuzzle(){
const today=getTodayStr();
const sp=this.save.dailyPuzzle;
// Reset streak if missed a day
if(sp.lastStreakDate&&sp.lastStreakDate!==today){
const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
const yStr=`${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
if(sp.lastStreakDate!==yStr&&sp.date!==today){
sp.streak=0;
}
}
}

goToMenu(){
this.state='menu';
this.particles.clear();
}

/* ═══════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════ */
render(){
const ctx=this.ctx;
const W=this.W,H=this.H;

// Clear
ctx.clearRect(0,0,W,H);

// Background gradient
const bgGrad=ctx.createLinearGradient(0,0,W,H);
bgGrad.addColorStop(0,'#0f0f1a');
bgGrad.addColorStop(0.5,'#1a1a2e');
bgGrad.addColorStop(1,'#16213e');
ctx.fillStyle=bgGrad;
ctx.fillRect(0,0,W,H);

// Animated background dots
ctx.globalAlpha=0.03;
for(let i=0;i<30;i++){
const x=((i*137+this.time*8)%W);
const y=((i*97+this.time*3)%(H));
ctx.fillStyle='#00e5ff';
ctx.beginPath();ctx.arc(x,y,2+Math.sin(this.time+i)*1,0,Math.PI*2);ctx.fill();
}
ctx.globalAlpha=1;

// Shake
if(this.shakeTime>0){
const sx=(Math.random()-0.5)*this.shakeAmount;
const sy=(Math.random()-0.5)*this.shakeAmount;
ctx.save();ctx.translate(sx,sy);
}

switch(this.state){
case 'menu':this.drawMenu(ctx);break;
case 'playing':case 'daily':this.drawPlaying(ctx);break;
case 'levelSelect':this.drawLevelSelect(ctx);break;
case 'tutorial':this.drawTutorial(ctx);break;
case 'settings':this.drawSettings(ctx);break;
}

// Particles always on top
this.particles.draw(ctx);

// Achievement popup
this.drawAchievementPopup(ctx);

// Coin animation
if(this.coinAnim.active){
const ca=this.coinAnim;
const alpha=1-ca.progress;
const yOff=-80*easeOutCubic(ca.progress);
ctx.globalAlpha=alpha;
ctx.fillStyle='#ffd700';
ctx.font='bold 28px Nunito';
ctx.textAlign='center';
ctx.fillText('+'+ca.amount+' coins',ca.x,ca.y+yOff);
ctx.globalAlpha=1;
}

if(this.shakeTime>0)ctx.restore();
}

/* ─── DRAW MENU ─── */
drawMenu(ctx){
const W=this.W,H=this.H,cx=W/2;

// Title
ctx.textAlign='center';
ctx.textBaseline='middle';

// Glow behind title
const glowGrad=ctx.createRadialGradient(cx,140,0,cx,140,200);
glowGrad.addColorStop(0,'rgba(0,229,255,0.08)');
glowGrad.addColorStop(1,'rgba(0,229,255,0)');
ctx.fillStyle=glowGrad;
ctx.fillRect(0,0,W,300);

// Title text
ctx.fillStyle='#00e5ff';
ctx.font='900 36px "Fredoka One",Nunito';
ctx.shadowColor='#00e5ff';
ctx.shadowBlur=20;
ctx.fillText('4 Pics 1 Word',cx,120);
ctx.shadowBlur=0;

ctx.fillStyle='rgba(255,255,255,0.7)';
ctx.font='600 16px Nunito';
ctx.fillText('Guess the word from 4 emoji pictures!',cx,160);

// Decorative emoji
const demoEmoji=["🐶","🍕","🎵","🌙"];
const demoSize=48;
const demoY=210;
const demoSpacing=demoSize+20;
const demoStartX=cx-((demoEmoji.length*demoSpacing)-20)/2;
for(let i=0;i<demoEmoji.length;i++){
const ex=demoStartX+i*demoSpacing+demoSize/2;
const bob=Math.sin(this.time*2+i*0.8)*4;
ctx.font=`${demoSize}px sans-serif`;
ctx.textAlign='center';
ctx.fillText(demoEmoji[i],ex,demoY+bob);
}

// Buttons
const bw=Math.min(260,W*0.6),bh=56,gap=16;
const by=H/2-bh-20;

// Play button
this.drawButton(ctx,cx-bw/2,by,bw,bh,'▶  PLAY','#00e5ff','#006064');
// Daily button
const dailyAvail=this.canPlayDaily();
const dailyLabel=dailyAvail?'📅  DAILY PUZZLE':'📅  COMPLETED';
const dailyCol=dailyAvail?'#76ff03':'#555';
this.drawButton(ctx,cx-bw/2,by+bh+gap,bw,bh,dailyLabel,dailyCol,dailyAvail?'#1b5e20':'#333');

// Streak indicator
if(this.save.dailyPuzzle.streak>0){
ctx.fillStyle='#ff6d00';
ctx.font='bold 16px Nunito';
ctx.textAlign='center';
ctx.fillText('🔥 '+this.save.dailyPuzzle.streak+' day streak',cx,by+bh*2+gap*2+20);
}

// Levels button
this.drawButton(ctx,cx-bw/2,by+(bh+gap)*2,bw,bh,'📋  LEVELS','#e040fb','#4a148c');
// Settings button
this.drawButton(ctx,cx-bw/2,by+(bh+gap)*3,bw,bh,'⚙  SETTINGS','#78909c','#37474f');

// Progress bar
const completed=this.save.completedLevels.length;
const pct=completed/LEVELS.length;
ctx.fillStyle='rgba(255,255,255,0.1)';
drawRoundRect(ctx,cx-100,H-60,200,12,6);ctx.fill();
if(pct>0){
const pGrad=ctx.createLinearGradient(cx-100,0,cx-100+200*pct,0);
pGrad.addColorStop(0,'#00e5ff');pGrad.addColorStop(1,'#ff00ff');
ctx.fillStyle=pGrad;
drawRoundRect(ctx,cx-100,H-60,200*pct,12,6);ctx.fill();
}
ctx.fillStyle='rgba(255,255,255,0.6)';
ctx.font='12px Nunito';ctx.textAlign='center';
ctx.fillText(completed+'/'+LEVELS.length+' levels completed',cx,H-35);

// Coin counter
this.drawCoinCounter(ctx);
}

/* ─── DRAW PLAYING ─── */
drawPlaying(ctx){
const W=this.W,H=this.H,lvl=this.getCurrentLevelData();
if(!lvl)return;

// Header bar
ctx.fillStyle='rgba(0,0,0,0.3)';
ctx.fillRect(0,0,W,56);

// Back button
ctx.fillStyle='rgba(255,255,255,0.7)';
drawRoundRect(ctx,12,12,44,44,10);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 22px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('←',34,34);

// Level indicator
if(this.state==='daily'){
ctx.fillStyle='#76ff03';ctx.font='bold 14px Nunito';ctx.textAlign='center';
ctx.fillText('DAILY PUZZLE',W/2,22);
ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='13px Nunito';
ctx.fillText(getTodayStr(),W/2,40);
}else{
const pack=PACKS.find(p=>this.currentLevelIdx+1>=p.from&&this.currentLevelIdx+1<=p.to);
ctx.fillStyle=pack?pack.color:'#fff';ctx.font='bold 14px Nunito';ctx.textAlign='center';
ctx.fillText((pack?pack.name+' ':'')+'Level '+(this.currentLevelIdx+1),W/2,22);
// Progress within pack
if(pack){
const packDone=this.save.completedLevels.filter(i=>i>=pack.from-1&&i<=pack.to-1).length;
const packTotal=pack.to-pack.from+1;
ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='12px Nunito';
ctx.fillText(packDone+'/'+packTotal,W/2,40);
}
}

// Coin counter
this.drawCoinCounter(ctx);

// Wrong animation shake on slots
const wrongOff=this.wrongAnim.active?Math.sin(this.wrongAnim.progress*Math.PI*4)*10:0;

// Emoji grid — 2x2
const gridSize=this.getEmojiGridSize();
const gridX=(W-gridSize)/2;
const gridY=this.getEmojiGridY();
const cellSize=gridSize/2-8;

for(let i=0;i<4;i++){
const col=i%2,row=Math.floor(i/2);
const cx=gridX+col*(cellSize+16)+cellSize/2;
const cy=gridY+row*(cellSize+16)+cellSize/2;

// Card bg
ctx.fillStyle='rgba(255,255,255,0.06)';
drawRoundRect(ctx,cx-cellSize/2,cy-cellSize/2,cellSize,cellSize,16);ctx.fill();
ctx.strokeStyle='rgba(255,255,255,0.1)';
ctx.lineWidth=1;
drawRoundRect(ctx,cx-cellSize/2,cy-cellSize/2,cellSize,cellSize,16);ctx.stroke();

// Emoji
const scale=1+Math.sin(this.time*1.5+i)*0.02;
ctx.save();
ctx.translate(cx,cy);ctx.scale(scale,scale);
ctx.font=`${Math.min(cellSize*0.6,60)}px sans-serif`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(lvl.emoji[i],0,0);
ctx.restore();
}

// Answer slots
const answerLen=lvl.answer.length;
for(let i=0;i<answerLen;i++){
const pos=this.getSlotPos(i);
const slot=this.answerSlots[i];

// Slot background
ctx.fillStyle='rgba(255,255,255,0.08)';
drawRoundRect(ctx,pos.x+wrongOff,pos.y,pos.w,pos.h,10);ctx.fill();
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1.5;
drawRoundRect(ctx,pos.x+wrongOff,pos.y,pos.w,pos.h,10);ctx.stroke();

if(slot){
const isRevealed=slot.revealed;
const isCorrectSlot=this.correctAnim.active;

ctx.fillStyle=isRevealed?'rgba(0,229,255,0.2)':'rgba(224,64,251,0.2)';
drawRoundRect(ctx,pos.x+wrongOff,pos.y,pos.w,pos.h,10);ctx.fill();

ctx.fillStyle=isRevealed?'#00e5ff':'#fff';
ctx.font=`bold ${Math.min(22,pos.w*0.5)}px Nunito`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(slot.letter,pos.x+wrongOff+pos.w/2,pos.y+pos.h/2);
}
}

// Correct celebration overlay
if(this.correctAnim.active){
const alpha=0.3*(1-this.correctAnim.progress);
ctx.fillStyle=`rgba(0,229,255,${alpha})`;
ctx.fillRect(0,0,W,H);
}

// Letter pool
for(let i=0;i<this.letterPool.length;i++){
const lp=this.letterPool[i];
if(lp.used||this.removedIndices.has(i))continue;

// Background
const pulse=1+Math.sin(this.time*3+i*0.3)*0.03;
ctx.save();
ctx.translate(lp.x+lp.w/2,lp.y+lp.h/2);ctx.scale(pulse,pulse);
ctx.translate(-lp.w/2,-lp.h/2);

const grad=ctx.createLinearGradient(0,0,lp.w,lp.h);
grad.addColorStop(0,'rgba(224,64,251,0.25)');
grad.addColorStop(1,'rgba(0,229,255,0.25)');
ctx.fillStyle=grad;
drawRoundRect(ctx,0,0,lp.w,lp.h,10);ctx.fill();

ctx.strokeStyle='rgba(224,64,251,0.4)';ctx.lineWidth=1.5;
drawRoundRect(ctx,0,0,lp.w,lp.h,10);ctx.stroke();

ctx.fillStyle='#fff';
ctx.font=`bold ${Math.min(20,lp.w*0.45)}px Nunito`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(lp.letter,lp.w/2,lp.h/2);

ctx.restore();
}

// Hint buttons
this.drawHintButtons(ctx);

// Daily streak indicator
if(this.state==='daily'&&this.save.dailyPuzzle.streak>0){
ctx.fillStyle='#ff6d00';ctx.font='bold 14px Nunito';ctx.textAlign='center';
ctx.fillText('🔥 '+this.save.dailyPuzzle.streak+' day streak',W/2,H-20);
}
}

/* ─── DRAW HINT BUTTONS ─── */
drawHintButtons(ctx){
const hbY=this.getHintButtonY();
const hbW=90,hbH=40,gap=10;
const totalHW=hbW*3+gap*2;
const hbX=(this.W-totalHW)/2;

const hints=[
{label:'💡 Reveal',cost:HINT_COST_REVEAL,color:'#00e5ff',dark:'#006064'},
{label:'✂ Remove',cost:HINT_COST_REMOVE,color:'#76ff03',dark:'#1b5e20'},
{label:'⏭ Skip',cost:HINT_COST_SKIP,color:'#ff6d00',dark:'#e65100'}

}
}

/* ─── DRAW LEVEL SELECT ─── */
drawLevelSelect(ctx){
const W=this.W;
ctx.fillStyle='rgba(0,0,0,0.3)';
ctx.fillRect(0,0,W,56);

// Back
ctx.fillStyle='rgba(255,255,255,0.7)';
drawRoundRect(ctx,12,12,44,44,10);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 22px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('←',34,34);

ctx.fillStyle='#e040fb';ctx.font='bold 18px Nunito';ctx.textAlign='center';
ctx.fillText('SELECT LEVEL',W/2,34);

// Pack labels and level grid
const cols=5,cellW=64,cellH=64,gap=10;
const totalW=cols*(cellW+gap)-gap;
const startX=(W-totalW)/2;
let y=80-this.scrollY;

for(const pack of PACKS){
// Pack header
ctx.fillStyle=pack.color;
ctx.font='bold 16px Nunito';ctx.textAlign='left';
ctx.fillText(pack.name+' ('+pack.from+'-'+pack.to+')',startX,y+16);
y+=30;

for(let lvl=pack.from-1;lvl<pack.to;lvl++){
const col=(lvl-(pack.from-1))%cols;
const row=Math.floor((lvl-(pack.from-1))/cols);
const lx=startX+col*(cellW+gap);
const ly=y+row*(cellH+gap);

const completed=this.save.completedLevels.includes(lvl);
const unlocked=this.isLevelUnlocked(lvl);
const isCurrent=lvl===this.save.currentLevel-1;

if(completed){
const grad=ctx.createLinearGradient(lx,ly,lx+cellW,ly+cellH);
grad.addColorStop(0,'#00e5ff');grad.addColorStop(1,'#00bfa5');
ctx.fillStyle=grad;
}else if(isCurrent){
ctx.fillStyle='rgba(224,64,251,0.3)';
ctx.strokeStyle='#e040fb';ctx.lineWidth=2;
}else if(unlocked){
ctx.fillStyle='rgba(255,255,255,0.1)';
}else{
ctx.fillStyle='rgba(255,255,255,0.03)';
}
drawRoundRect(ctx,lx,ly,cellW,cellH,12);ctx.fill();

if(!completed&&unlocked){
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
drawRoundRect(ctx,lx,ly,cellW,cellH,12);ctx.stroke();
}

ctx.fillStyle=completed?'#fff':unlocked?'rgba(255,255,255,0.8)':'rgba(255,255,255,0.2)';
ctx.font=`bold ${completed?16:14}px Nunito`;
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(completed?'✓':String(lvl+1),lx+cellW/2,ly+cellH/2);
}

const rowsInPack=Math.ceil((pack.to-pack.from+1)/cols);
y+=rowsInPack*(cellH+gap)+20;
}
}

/* ─── DRAW TUTORIAL ─── */
drawTutorial(ctx){
// Draw the playing state behind
const prevState=this.state;
this.state='playing';
this.drawPlaying(ctx);
this.state=prevState;

// Overlay
ctx.fillStyle='rgba(0,0,0,0.7)';
ctx.fillRect(0,0,this.W,this.H);

const steps=[
{title:'Look at the Emoji',desc:'4 emoji pictures share one word.\nCan you figure it out?',highlight:'emoji'},
{title:'Think of the Word',desc:'What do all 4 pictures have\nin common? That\'s your answer!',highlight:'answer'},
{title:'Tap the Letters',desc:'Select letters from the pool\nto spell your answer. Good luck!',highlight:'pool'}
];

const step=steps[this.tutorialStep]||steps[0];
const cx=this.W/2,cy=this.H/2;

// Card
ctx.fillStyle='rgba(30,30,50,0.95)';
drawRoundRect(ctx,cx-160,cy-80,320,160,20);ctx.fill();
ctx.strokeStyle='rgba(0,229,255,0.3)';ctx.lineWidth=2;
drawRoundRect(ctx,cx-160,cy-80,320,160,20);ctx.stroke();

// Step indicator
ctx.fillStyle='rgba(255,255,255,0.4)';
ctx.font='12px Nunito';ctx.textAlign='center';
ctx.fillText((this.tutorialStep+1)+' / 3',cx,cy-60);

ctx.fillStyle='#00e5ff';
ctx.font='bold 22px Nunito';
ctx.fillText(step.title,cx,cy-30);

ctx.fillStyle='rgba(255,255,255,0.8)';
ctx.font='15px Nunito';
const lines=step.desc.split('\n');
for(let i=0;i<lines.length;i++){
ctx.fillText(lines[i],cx,cy+5+i*22);
}

// Next button
ctx.fillStyle='rgba(0,229,255,0.2)';
drawRoundRect(ctx,cx-60,cy+55,120,36,18);ctx.fill();
ctx.fillStyle='#00e5ff';ctx.font='bold 14px Nunito';
ctx.fillText(this.tutorialStep<2?'NEXT':'GOT IT!',cx,cy+77);
}

/* ─── DRAW SETTINGS ─── */
drawSettings(ctx){
const W=this.W,cx=W/2;

ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,W,56);
ctx.fillStyle='rgba(255,255,255,0.7)';
drawRoundRect(ctx,12,12,44,44,10);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 22px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('←',34,34);
ctx.fillStyle='#78909c';ctx.font='bold 18px Nunito';ctx.textAlign='center';
ctx.fillText('SETTINGS',cx,34);

const cy=H/2-40;

// Sound toggle
ctx.fillStyle='rgba(255,255,255,0.7)';
ctx.font='16px Nunito';ctx.textAlign='center';
ctx.fillText('Sound: '+(this.sound.enabled?'ON':'OFF'),cx,cy);

ctx.fillStyle=this.sound.enabled?'rgba(0,229,255,0.3)':'rgba(255,255,255,0.1)';
drawRoundRect(ctx,cx-80,cy-22,160,44,12);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 16px Nunito';
ctx.fillText(this.sound.enabled?'🔊 Sound ON':'🔇 Sound OFF',cx,cy+5);

// Reset button
ctx.fillStyle='rgba(255,82,82,0.2)';
drawRoundRect(ctx,cx-80,cy+60,160,44,12);ctx.fill();
ctx.fillStyle='#ff5252';ctx.font='bold 14px Nunito';
ctx.fillText('Reset Progress',cx,cy+87);
}

/* ─── DRAW ACHIEVEMENT POPUP ─── */
drawAchievementPopup(ctx){
if(this.achievementQueue.length===0)return;
const ach=this.achievementQueue[0];
if(!ach)return;

const W=this.W,popupW=Math.min(320,W-40);
const popupH=70;
const x=(W-popupW)/2;
const y=70;
const alpha=Math.min(1,(this.time%100)*2);

ctx.globalAlpha=0.95;
ctx.fillStyle='rgba(20,20,40,0.95)';
drawRoundRect(ctx,x,y,popupW,popupH,16);ctx.fill();
ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
drawRoundRect(ctx,x,y,popupW,popupH,16);ctx.stroke();

ctx.textAlign='left';
ctx.font='24px sans-serif';
ctx.fillText(ach.icon,x+16,y+42);

ctx.fillStyle='#ffd700';
ctx.font='bold 14px Nunito';ctx.textAlign='left';
ctx.fillText(ach.name,x+55,y+30);

ctx.fillStyle='rgba(255,255,255,0.7)';
ctx.font='12px Nunito';
ctx.fillText(ach.desc,x+55,y+50);

ctx.globalAlpha=1;
}

/* ─── SHARED UI ELEMENTS ─── */
drawButton(ctx,x,y,w,h,text,color,dark){
const grad=ctx.createLinearGradient(x,y,x+w,y+h);
grad.addColorStop(0,color);grad.addColorStop(1,dark);
ctx.fillStyle=grad;
drawRoundRect(ctx,x,y,w,h,16);ctx.fill();

// Glow
ctx.shadowColor=color;ctx.shadowBlur=12;
drawRoundRect(ctx,x,y,w,h,16);ctx.stroke();
ctx.shadowBlur=0;

// Border
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
drawRoundRect(ctx,x,y,w,h,16);ctx.stroke();

ctx.fillStyle='#fff';ctx.font='bold 18px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(text,x+w/2,y+h/2);
}

drawSmallButton(ctx,x,y,w,h,text,color,dark,enabled){
ctx.fillStyle=enabled?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.02)';
drawRoundRect(ctx,x,y,w,h,10);ctx.fill();

if(enabled){
ctx.strokeStyle=color;ctx.lineWidth=1.5;
drawRoundRect(ctx,x,y,w,h,10);ctx.stroke();
}

ctx.fillStyle=enabled?'#fff':'rgba(255,255,255,0.3)';
ctx.font='bold 12px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(text,x+w/2,y+h/2);
}

drawCoinCounter(ctx){
const x=this.W-12,y=12;
ctx.fillStyle='rgba(0,0,0,0.4)';
drawRoundRect(ctx,x-100,y,100,36,18);ctx.fill();

ctx.fillStyle='#ffd700';ctx.font='20px sans-serif';ctx.textAlign='left';
ctx.fillText('🪙',x-92,y+24);

ctx.fillStyle='#ffd700';ctx.font='bold 16px Nunito';ctx.textAlign='right';
ctx.fillText(this.save.coins,x-10,y+25);
}

/* ═══════════════════════════════════════════════════
   UPDATE LOOP
   ═══════════════════════════════════════════════════ */
update(dt){
this.time+=dt;
this.particles.update(dt);

// Shake decay
if(this.shakeTime>0){
this.shakeTime-=dt;
this.shakeAmount*=0.92;
}

// Level transition
if(this.levelTransition.active){
this.levelTransition.progress+=dt*2;
if(this.levelTransition.progress>=1){
this.levelTransition.active=false;
this.levelTransition.progress=1;
}
}

// Wrong animation
if(this.wrongAnim.active){
this.wrongAnim.progress+=dt*2;
if(this.wrongAnim.progress>=1)this.wrongAnim.active=false;
}

// Correct animation
if(this.correctAnim.active){
this.correctAnim.progress+=dt*1.2;
if(this.correctAnim.progress>=1)this.correctAnim.active=false;
}

// Coin animation
if(this.coinAnim.active){
this.coinAnim.progress+=dt*1.5;
if(this.coinAnim.progress>=1)this.coinAnim.active=false;
}
}

/* ─── GAME LOOP ─── */
loop(now){
this.rafId=requestAnimationFrame((t)=>this.loop(t));
const dt=Math.min((now-(this.lastTime||now))/1000,0.1);
this.lastTime=now;
this.update(dt);
this.render();
}

start(){
this.lastTime=performance.now();
this.loop(this.lastTime);
}
}
