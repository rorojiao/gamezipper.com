/* === ICHIMAGA GAME ENGINE === */
var canvas=document.getElementById('game-canvas');
var ctx=canvas.getContext('2d');
var state={
  levelIdx:0,
  grid:[],
  rows:0,cols:0,
  edges:{}, /* key "r1,c1,r2,c2" -> true/false */
  playerEdges:new Set(), /* set of edge keys that player turned ON */
  cellSize:0,
  hintsLeft:3,
  startTime:0,
  elapsed:0,
  timer:null,
  completed:false,
  hintsUsed:0,
  showHint:false,
  hintCell:null,
  progress:JSON.parse(localStorage.getItem('ichimaga_progress')||'{}'),
  settings:JSON.parse(localStorage.getItem('ichimaga_settings')||'{"sfx":true,"music":true,"autocheck":false}')
};

var TIER_NAMES=['Beginner','Easy','Medium','Hard','Expert'];
var TIER_RANGES=[[1,6],[7,12],[13,18],[19,24],[25,30]];

function edgeKey(r1,c1,r2,c2){
  if(r1>r2||(r1===r2&&c1>c2)){var t=r1;r1=r2;r2=t;t=c1;c1=c2;c2=t;}
  return r1+','+c1+','+r2+','+c2;
}

function buildEdgeList(){
  var edges=[];
  for(var r=0;r<state.rows;r++){
    for(var c=0;c<state.cols;c++){
      if(c+1<state.cols)edges.push({r1:r,c1:c,r2:r,c2:c+1,h:true});
      if(r+1<state.rows)edges.push({r1:r,c1:c,r2:r+1,c2:c,v:true});
    }
  }
  return edges;
}

function getCellDegree(r,c){
  var deg=0;
  var neighbors=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
  for(var i=0;i<4;i++){
    var nr=neighbors[i][0],nc=neighbors[i][1];
    if(nr<0||nr>=state.rows||nc<0||nc>=state.cols)continue;
    if(state.playerEdges.has(edgeKey(r,c,nr,nc)))deg++;
  }
  return deg;
}

function toggleEdge(r1,c1,r2,c2){
  var key=edgeKey(r1,c1,r2,c2);
  if(state.playerEdges.has(key)){
    state.playerEdges.delete(key);
  }else{
    state.playerEdges.add(key);
  }
  if(state.settings.sfx)playSfx('toggle');
}

function loadLevel(idx){
  if(idx<0||idx>=LEVELS.length)return;
  state.levelIdx=idx;
  var lv=LEVELS[idx];
  state.rows=lv.r;state.cols=lv.c;
  state.grid=lv.g;
  state.solution=lv.s;
  state.playerEdges=new Set();
  state.hintsLeft=3;
  state.hintsUsed=0;
  state.completed=false;
  state.startTime=Date.now();
  state.elapsed=0;
  state.showHint=false;
  state.hintCell=null;
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(function(){
    if(!state.completed){
      state.elapsed=Math.floor((Date.now()-state.startTime)/1000);
      document.getElementById('hud-time').textContent=formatTime(state.elapsed);
    }
  },1000);
  document.getElementById('hud-level').textContent=idx+1;
  resizeCanvas();
  render();
}

function resizeCanvas(){
  var wrap=document.getElementById('canvas-wrap');
  var maxW=wrap.clientWidth-24;
  var maxH=window.innerHeight-220;
  var sz=Math.min(maxW/state.cols,maxH/state.rows);
  sz=Math.min(sz,60);
  sz=Math.max(sz,28);
  state.cellSize=Math.floor(sz);
  canvas.width=state.cellSize*state.cols+2;
  canvas.height=state.cellSize*state.rows+2;
}

function formatTime(s){
  var m=Math.floor(s/60),sec=s%60;
  return m+':'+(sec<10?'0':'')+sec;
}

/* === RENDERING === */
function render(){
  var cs=state.cellSize;
  var w=canvas.width,h=canvas.height;
  ctx.fillStyle='#12122e';
  ctx.fillRect(0,0,w,h);

  /* Draw grid lines (faint) */
  ctx.strokeStyle='#1a1a3a';
  ctx.lineWidth=1;
  for(var r=0;r<=state.rows;r++){
    ctx.beginPath();
    ctx.moveTo(0,r*cs+1);
    ctx.lineTo(state.cols*cs+1,r*cs+1);
    ctx.stroke();
  }
  for(var c=0;c<=state.cols;c++){
    ctx.beginPath();
    ctx.moveTo(c*cs+1,0);
    ctx.lineTo(c*cs+1,state.rows*cs+1);
    ctx.stroke();
  }

  /* Draw player edges (magnetic connections) */
  state.playerEdges.forEach(function(key){
    var parts=key.split(',');
    var r1=+parts[0],c1=+parts[1],r2=+parts[2],c2=+parts[3];
    var x1=c1*cs+cs/2+1, y1=r1*cs+cs/2+1;
    var x2=c2*cs+cs/2+1, y2=r2*cs+cs/2+1;
    /* Glow */
    ctx.strokeStyle='rgba(108,108,255,.3)';
    ctx.lineWidth=cs*0.18;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
    /* Main line */
    ctx.strokeStyle='#6c6cff';
    ctx.lineWidth=cs*0.08;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
  });

  /* Draw circles with numbers */
  for(var r=0;r<state.rows;r++){
    for(var c=0;c<state.cols;c++){
      var cx=c*cs+cs/2+1;
      var cy=r*cs+cs/2+1;
      var num=state.grid[r][c];
      var deg=getCellDegree(r,c);
      var radius=cs*0.36;

      /* Circle background */
      ctx.beginPath();
      ctx.arc(cx,cy,radius,0,Math.PI*2);
      if(deg===num&&num>0){
        ctx.fillStyle='#1a4a1a';
      }else if(deg>num){
        ctx.fillStyle='#4a1a1a';
      }else{
        ctx.fillStyle='#1e1e42';
      }
      ctx.fill();
      ctx.strokeStyle=deg===num&&num>0?'#4caf50':(deg>num?'#ff5252':'#3a3a6a');
      ctx.lineWidth=2;
      ctx.stroke();

      /* Number text */
      ctx.fillStyle=deg===num&&num>0?'#4ecdc4':(deg>num?'#ff5252':'#e8e8f0');
      ctx.font='bold '+Math.floor(cs*0.42)+'px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(num.toString(),cx,cy);
    }
  }

  /* Draw hint highlight */
  if(state.showHint&&state.hintCell){
    var hr=state.hintCell.r,hc=state.hintCell.c;
    var hx=hc*cs+cs/2+1,hy=hr*cs+cs/2+1;
    ctx.strokeStyle='#ffd700';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(hx,hy,cs*0.42,0,Math.PI*2);
    ctx.stroke();
  }
}

/* === INTERACTION === */
var dragStart=null;
var lastToggledKey=null;

function getCellFromXY(x,y){
  var rect=canvas.getBoundingClientRect();
  var scale=canvas.width/rect.width;
  var cx=(x-rect.left)*scale;
  var cy=(y-rect.top)*scale;
  var cs=state.cellSize;
  var c=Math.floor((cx-1)/cs);
  var r=Math.floor((cy-1)/cs);
  if(r<0||r>=state.rows||c<0||c>=state.cols)return null;
  return {r:r,c:c};
}

function handlePointerDown(x,y){
  var cell=getCellFromXY(x,y);
  if(!cell)return;
  dragStart=cell;
  lastToggledKey=null;
}

function handlePointerMove(x,y){
  if(!dragStart)return;
  var cell=getCellFromXY(x,y);
  if(!cell)return;
  if(cell.r===dragStart.r&&cell.c===dragStart.c)return;

  /* Only toggle if adjacent */
  var dr=Math.abs(cell.r-dragStart.r);
  var dc=Math.abs(cell.c-dragStart.c);
  if(dr+dc===1){
    var key=edgeKey(dragStart.r,dragStart.c,cell.r,cell.c);
    if(key!==lastToggledKey){
      toggleEdge(dragStart.r,dragStart.c,cell.r,cell.c);
      lastToggledKey=key;
      dragStart=cell; /* Continue dragging from new cell */
      render();
      if(state.settings.autocheck)checkAutoWin();
    }
  }
}

function handlePointerUp(){
  dragStart=null;
  lastToggledKey=null;
  if(state.settings.autocheck)checkAutoWin();
}

canvas.addEventListener('pointerdown',function(e){
  e.preventDefault();
  handlePointerDown(e.clientX,e.clientY);
});
canvas.addEventListener('pointermove',function(e){
  e.preventDefault();
  if(dragStart)handlePointerMove(e.clientX,e.clientY);
});
canvas.addEventListener('pointerup',function(e){
  e.preventDefault();
  handlePointerUp();
});
canvas.addEventListener('pointercancel',function(e){
  e.preventDefault();
  handlePointerUp();
});

/* Single tap also toggles nearest edge */
canvas.addEventListener('click',function(e){
  if(dragStart)return; /* Already handled by pointer events */
});

/* === GAME LOGIC === */
function isAllDegreesMatch(){
  for(var r=0;r<state.rows;r++){
    for(var c=0;c<state.cols;c++){
      if(getCellDegree(r,c)!==state.grid[r][c])return false;
    }
  }
  return true;
}

function isAllConnected(){
  /* BFS from first cell with degree>0 */
  var visited={};
  var startR=-1,startC=-1;
  for(var r=0;r<state.rows&&startR<0;r++){
    for(var c=0;c<state.cols&&startR<0;c++){
      if(state.grid[r][c]>0){startR=r;startC=c;}
    }
  }
  if(startR<0)return true; /* All zeros */
  var queue=[[startR,startC]];
  visited[startR+','+startC]=true;
  while(queue.length){
    var cur=queue.shift();
    var r=cur[0],c=cur[1];
    var neighbors=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
    for(var i=0;i<4;i++){
      var nr=neighbors[i][0],nc=neighbors[i][1];
      if(nr<0||nr>=state.rows||nc<0||nc>=state.cols)continue;
      if(visited[nr+','+nc])continue;
      var key=edgeKey(r,c,nr,nc);
      if(state.playerEdges.has(key)){
        visited[nr+','+nc]=true;
        queue.push([nr,nc]);
      }
    }
  }
  /* Check all cells with target degree>0 are visited */
  for(var r=0;r<state.rows;r++){
    for(var c=0;c<state.cols;c++){
      if(state.grid[r][c]>0&&!visited[r+','+c])return false;
    }
  }
  return true;
}

function checkWin(){
  if(state.completed)return false;
  if(!isAllDegreesMatch())return false;
  if(!isAllConnected())return false;
  return true;
}

function checkAutoWin(){
  if(checkWin()){
    onWin();
  }
}

function doCheck(){
  if(checkWin()){
    onWin();
  }else{
    var degOk=isAllDegreesMatch();
    var connOk=isAllConnected();
    if(degOk&&!connOk){
      showToast('All numbers match, but not fully connected!');
    }else if(!degOk&&connOk){
      showToast('Connected, but some numbers are wrong!');
    }else{
      showToast('Not solved yet - check numbers and connections');
    }
    if(state.settings.sfx)playSfx('error');
  }
}

function onWin(){
  state.completed=true;
  if(state.timer)clearInterval(state.timer);
  var stars=calcStars(state.elapsed,state.hintsUsed);
  state.progress[state.levelIdx]=Math.max(state.progress[state.levelIdx]||0,stars);
  localStorage.setItem('ichimaga_progress',JSON.stringify(state.progress));
  document.getElementById('hud-stars').textContent=Object.keys(state.progress).length;
  if(state.settings.sfx)playSfx('win');
  showWinModal(stars);
}

function calcStars(time,hints){
  var stars=3;
  if(time>180)stars--;
  if(time>360)stars--;
  if(hints>0)stars--;
  if(hints>2)stars--;
  if(stars<1)stars=1;
  return stars;
}

function showWinModal(stars){
  var display=document.getElementById('win-stars-display');
  display.innerHTML='';
  for(var i=0;i<3;i++){
    var s=document.createElement('div');
    s.className='win-star'+(i<stars?' earned':'');
    s.innerHTML='&#9733;';
    display.appendChild(s);
  }
  document.getElementById('win-time').textContent='Time: '+formatTime(state.elapsed)+' | Hints used: '+state.hintsUsed;
  document.getElementById('win-title').textContent='Level '+(state.levelIdx+1)+' Complete!';
  document.getElementById('modal-win').classList.add('show');
  /* Confetti */
  spawnConfetti();
}

/* === HINTS === */
function doHint(){
  if(state.hintsLeft<=0){
    showToast('No hints left!');
    return;
  }
  /* Find a cell where the player's degree doesn't match and hint it */
  for(var r=0;r<state.rows;r++){
    for(var c=0;c<state.cols;c++){
      var target=state.grid[r][c];
      var deg=getCellDegree(r,c);
      if(deg!==target){
        state.hintsLeft--;
        state.hintsUsed++;
        state.showHint=true;
        state.hintCell={r:r,c:c};
        render();
        setTimeout(function(){state.showHint=false;state.hintCell=null;render();},3000);
        showToast('Hint! Cell ('+(r+1)+','+(c+1)+') needs '+target+' connections (currently '+deg+')');
        if(state.settings.sfx)playSfx('hint');
        return;
      }
    }
  }
  /* All degrees match but maybe connectivity issue */
  showToast('All numbers match! Check connections.');
}

/* === LEVEL NAVIGATION === */
function nextLevel(){
  if(state.levelIdx<LEVELS.length-1){
    loadLevel(state.levelIdx+1);
  }
}
function prevLevel(){
  if(state.levelIdx>0){
    loadLevel(state.levelIdx-1);
  }
}
function doRestart(){
  state.playerEdges=new Set();
  state.hintsLeft=3;
  state.hintsUsed=0;
  state.completed=false;
  state.startTime=Date.now();
  state.elapsed=0;
  if(state.timer)clearInterval(state.timer);
  state.timer=setInterval(function(){
    state.elapsed=Math.floor((Date.now()-state.startTime)/1000);
    document.getElementById('hud-time').textContent=formatTime(state.elapsed);
  },1000);
  render();
}

/* === MODALS === */
function showLevelSelect(){
  var grid=document.getElementById('level-grid');
  grid.innerHTML='';
  for(var t=0;t<TIER_RANGES.length;t++){
    var header=document.createElement('div');
    header.className='tier-header';
    header.textContent=TIER_NAMES[t];
    grid.appendChild(header);
    for(var lv=TIER_RANGES[t][0];lv<=TIER_RANGES[t][1];lv++){
      var btn=document.createElement('div');
      btn.className='level-btn';
      btn.textContent=lv;
      var idx=lv-1;
      var isCompleted=state.progress[idx]!==undefined;
      var isUnlocked=idx===0||state.progress[idx-1]!==undefined;
      if(idx===state.levelIdx)btn.classList.add('current');
      if(isCompleted)btn.classList.add('completed');
      else if(isUnlocked)btn.classList.add('unlocked');
      else btn.classList.add('locked');
      if(isUnlocked){
        (function(i){btn.onclick=function(){loadLevel(i);closeModal('modal-levels');};})(idx);
      }
      grid.appendChild(btn);
    }
  }
  document.getElementById('modal-levels').classList.add('show');
}

function toggleSettings(){
  document.getElementById('modal-settings').classList.toggle('show');
}

function closeModal(id){
  document.getElementById(id).classList.remove('show');
}

document.getElementById('set-close').onclick=function(){closeModal('modal-settings');};

function setupToggle(id,key){
  var el=document.getElementById(id);
  if(state.settings[key])el.classList.add('on');
  el.onclick=function(){
    state.settings[key]=!state.settings[key];
    el.classList.toggle('on');
    localStorage.setItem('ichimaga_settings',JSON.stringify(state.settings));
    if(key==='music'){
      if(state.settings.music)startBGM();else stopBGM();
    }
  };
}

/* === TOAST === */
var toastTimer=null;
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('show');},2500);
}

/* === KEYBOARD === */
document.addEventListener('keydown',function(e){
  if(e.key==='h'||e.key==='H')doHint();
  else if(e.key==='r'||e.key==='R')doRestart();
  else if(e.key==='Enter')doCheck();
  else if(e.key==='Escape')closeModal('modal-levels'),closeModal('modal-settings'),closeModal('modal-win');
  else if(e.key==='ArrowLeft')prevLevel();
  else if(e.key==='ArrowRight')nextLevel();
});

/* === AUDIO === */
var audioCtx=null;
var bgmNodes=[];
function ensureAudio(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
}

function playSfx(type){
  if(!state.settings.sfx)return;
  ensureAudio();
  if(!audioCtx)return;
  var now=audioCtx.currentTime;
  var osc=audioCtx.createOscillator();
  var gain=audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  switch(type){
    case'toggle':
      osc.frequency.setValueAtTime(440,now);
      osc.frequency.exponentialRampToValueAtTime(660,now+.08);
      gain.gain.setValueAtTime(.12,now);
      gain.gain.exponentialRampToValueAtTime(.001,now+.1);
      osc.start(now);osc.stop(now+.1);
      break;
    case'hint':
      osc.frequency.setValueAtTime(880,now);
      gain.gain.setValueAtTime(.1,now);
      gain.gain.exponentialRampToValueAtTime(.001,now+.3);
      osc.start(now);osc.stop(now+.3);
      break;
    case'win':
      [523,659,784,1047].forEach(function(f,i){
        var o=audioCtx.createOscillator();
        var g=audioCtx.createGain();
        o.connect(g);g.connect(audioCtx.destination);
        o.frequency.value=f;
        g.gain.setValueAtTime(.15,now+i*.12);
        g.gain.exponentialRampToValueAtTime(.001,now+i*.12+.3);
        o.start(now+i*.12);o.stop(now+i*.12+.3);
      });
      break;
    case'error':
      osc.type='square';
      osc.frequency.setValueAtTime(220,now);
      osc.frequency.exponentialRampToValueAtTime(110,now+.15);
      gain.gain.setValueAtTime(.1,now);
      gain.gain.exponentialRampToValueAtTime(.001,now+.15);
      osc.start(now);osc.stop(now+.15);
      break;
  }
}

function startBGM(){
  if(!state.settings.music)return;
  ensureAudio();
  if(!audioCtx||bgmNodes.length)return;
  try{
    var sr=audioCtx.sampleRate;
    var dur=16;
    var bufSize=sr*dur;
    var buf=audioCtx.createBuffer(1,bufSize,sr);
    var d=buf.getChannelData(0);
    var chords=[[261.63,329.63,392.00],[293.66,369.99,440.00],[329.63,415.30,493.88],[293.66,369.99,440.00]];
    var chordDur=dur/chords.length;
    for(var i=0;i<bufSize;i++){
      var t=i/sr;
      var ci=Math.min(Math.floor(t/chordDur),chords.length-1);
      var chord=chords[ci];
      var s=0;
      for(var n=0;n<chord.length;n++){
        var f=chord[n];
        s+=Math.sin(2*Math.PI*f*t)*.05;
        s+=Math.sin(2*Math.PI*f*2*t)*.01;
        s+=Math.sin(2*Math.PI*f*.5*t)*.02;
      }
      var fade=t%chordDur;
      var fadeIn=Math.min(fade/.8,1);
      var fadeOut=Math.min((chordDur-fade)/.8,1);
      s*=fadeIn*fadeOut;
      var lfo=Math.sin(2*Math.PI*.25*t)*.12+1;
      d[i]=s*lfo*.5;
    }
    var src=audioCtx.createBufferSource();
    src.buffer=buf;src.loop=true;
    var filt=audioCtx.createBiquadFilter();
    filt.type='lowpass';filt.frequency.value=800;filt.Q.value=1;
    var g=audioCtx.createGain();
    g.gain.value=.2;
    src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);
    src.start();
    bgmNodes=[src,filt,g];
  }catch(e){}
}

function stopBGM(){
  bgmNodes.forEach(function(n){try{if(n.stop)n.stop();}catch(e){}});
  bgmNodes=[];
}

/* === CONFETTI === */
function spawnConfetti(){
  var colors=['#ff6b6b','#4ecdc4','#ffe66d','#a29bfe','#6c6cff','#4caf50'];
  var particles=[];
  for(var i=0;i<60;i++){
    particles.push({
      x:canvas.width/2+(Math.random()-.5)*100,
      y:canvas.height/2,
      vx:(Math.random()-.5)*8,
      vy:Math.random()*-8-2,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:1,
      size:3+Math.random()*4
    });
  }
  function animateConfetti(){
    ctx.save();
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy+=.3;
      p.life-=.015;
      if(p.life<=0){particles.splice(i,1);continue;}
      ctx.globalAlpha=p.life;
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    }
    ctx.restore();
    if(particles.length>0){
      requestAnimationFrame(animateConfetti);
    }else{
      render(); /* Restore normal render */
    }
  }
  animateConfetti();
}

/* === RESIZE === */
window.addEventListener('resize',function(){
  resizeCanvas();
  render();
});

/* === VISIBILITY CLEANUP === */
document.addEventListener('visibilitychange',function(){
  if(document.hidden){stopBGM();}
  else if(state.settings.music){startBGM();}
});

function cleanup(){
  if(state.timer)clearInterval(state.timer);
  stopBGM();
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
}
window.addEventListener('beforeunload',cleanup);

/* === INIT === */
document.getElementById('hud-stars').textContent=Object.keys(state.progress).length;
setupToggle('set-sfx','sfx');
setupToggle('set-music','music');
setupToggle('set-autocheck','autocheck');
loadLevel(0);
render();
</script>
