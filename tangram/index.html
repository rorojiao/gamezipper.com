// ──── Audio System ────
let audioCtx = null;
let masterGain = null;
let bgmPlaying = false;

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

function playTone(freq, dur, type='sine', vol=0.15){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfx(name){
  if(!audioCtx) return;
  switch(name){
    case 'pickup': playTone(600,0.08,'sine',0.12); break;
    case 'drop': playTone(300,0.1,'sine',0.1); break;
    case 'snap': playTone(880,0.15,'sine',0.15); playTone(1100,0.15,'sine',0.1); break;
    case 'rotate': playTone(500,0.06,'triangle',0.08); break;
    case 'flip': playTone(400,0.08,'triangle',0.08); playTone(600,0.08,'triangle',0.06); break;
    case 'hint': playTone(700,0.2,'sine',0.1); setTimeout(()=>playTone(900,0.2,'sine',0.1),100); break;
    case 'complete': playTone(523,0.3,'sine',0.15); setTimeout(()=>playTone(659,0.3,'sine',0.15),150); setTimeout(()=>playTone(784,0.4,'sine',0.15),300); break;
    case 'star': playTone(1000,0.15,'sine',0.12); setTimeout(()=>playTone(1200,0.2,'sine',0.12),100); break;
    case 'button': playTone(500,0.05,'sine',0.06); break;
  }
}

function startBGM(){
  if(bgmPlaying||!audioCtx) return;
  bgmPlaying = true;
  const notes=[261.6,293.7,329.6,349.2,392.0,440.0,493.9,523.3];
  let idx=0;
  function playNext(){
    if(!bgmPlaying) return;
    playTone(notes[idx%notes.length],2.5,'sine',0.03);
    playTone(notes[idx%notes.length]*0.5,2.5,'sine',0.02);
    idx++;
    setTimeout(playNext,2000);
  }
  playNext();
}

function stopBGM(){ bgmPlaying=false; }

// ──── Piece Class ────
class Piece {
  constructor(defIdx){
    const def = PIECE_DEFS[defIdx];
    this.defIdx = defIdx;
    this.name = def.name;
    this.color = COLORS[def.color];
    this.colorIdx = def.color;
    this.canFlip = !!def.canFlip;
    this.pts = def.pts.map(p=>[p[0]*U, p[1]*U]);
    this.x = 0; this.y = 0;
    this.rotation = 0;
    this.flipped = false;
    this.placed = false;
    this.targetX = 0; this.targetY = 0; this.targetRot = 0; this.targetFlip = false;
    this.dragging = false;
    this.animScale = 1;
  }

  getTransformedPts(){
    const cos = Math.cos(this.rotation), sin = Math.sin(this.rotation);
    let pts = this.pts;
    if(this.flipped){
      pts = pts.map(p=>[-p[0], p[1]]);
    }
    // Center on centroid
    let cx=0,cy=0;
    for(const p of pts){cx+=p[0];cy+=p[1];}
    cx/=pts.length; cy/=pts.length;
    return pts.map(p=>{
      let dx=p[0]-cx, dy=p[1]-cy;
      return [this.x + dx*cos - dy*sin, this.y + dx*sin + dy*cos];
    });
  }

  containsPoint(px,py){
    const pts = this.getTransformedPts();
    let inside = false;
    for(let i=0,j=pts.length-1; i<pts.length; j=i++){
      const [xi,yi]=pts[i], [xj,yj]=pts[j];
      if((yi>py)!==(yj>py) && px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
    }
    return inside;
  }

  draw(ctx, highlight, ghost){
    const pts = this.getTransformedPts();
    ctx.save();
    if(ghost){
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.globalAlpha = this.dragging ? 0.85 : 1;
      ctx.fillStyle = this.color;
      ctx.strokeStyle = highlight ? '#fff' : 'rgba(255,255,255,0.3)';
      ctx.lineWidth = highlight ? 2.5 : 1;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = highlight ? 15 : 5;
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }
}

// ──── Level Setup ────
function setupLevel(n){
  currentLevel = n;
  const lvl = LEVELS[n];
  pieces = [];
  hintsUsed = 0;
  hintsLeft = 3;
  levelComplete = false;
  confettiParticles = [];
  timerStart = performance.now();
  timerElapsed = 0;
  selectedPiece = null;
  isDragging = false;

  // Create pieces at tray positions
  const trayW = W - 24;
  const pieceSpacing = trayW / 7;
  for(let i=0;i<7;i++){
    const p = new Piece(i);
    p.x = 12 + pieceSpacing * i + pieceSpacing/2;
    p.y = trayY + 50;
    p.rotation = 0;
    p.flipped = false;
    pieces.push(p);
  }

  // Parse solution positions (in game coords) → screen coords
  for(const sol of lvl.solutions){
    const pi = sol[0];
    const p = pieces[pi];
    p.targetX = playArea.x + sol[1] * scale;
    p.targetY = playArea.y + sol[2] * scale;
    p.targetRot = sol[3] * DEG45;
    p.targetFlip = !!sol[4];
  }

  // Tutorial
  tutorialStep = lvl.tutorial;
  if(tutorialStep >= 0) showTutorial(tutorialStep);
  else hideTutorial();

  document.getElementById('level-info').textContent = `Level ${n+1} - ${lvl.name}`;
  document.getElementById('hints-left').textContent = `Hints: ${hintsLeft}`;
  document.getElementById('complete-overlay').classList.remove('active');
}

// ──── Drawing ────
function drawTargetSilhouette(){
  const lvl = LEVELS[currentLevel];
  const pts = lvl.target;
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.setLineDash([8,4]);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(playArea.x + pts[0][0]*scale, playArea.y + pts[0][1]*scale);
  for(let i=1;i<pts.length;i++){
    ctx.lineTo(playArea.x + pts[i][0]*scale, playArea.y + pts[i][1]*scale);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawTray(){
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  const r=12;
  const x=8, y=trayY-8, w=W-16, h=H-trayY-56;
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

function drawConfetti(dt){
  for(let i=confettiParticles.length-1;i>=0;i--){
    const p = confettiParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 300 * dt;
    p.life -= dt;
    if(p.life <= 0){ confettiParticles.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha = Math.min(1, p.life);
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
    p.rot += p.vr * dt;
  }
}

function spawnConfetti(){
  for(let i=0;i<80;i++){
    confettiParticles.push({
      x: W/2 + (Math.random()-0.5)*200,
      y: H/2 - 50,
      vx: (Math.random()-0.5)*400,
      vy: -200 - Math.random()*300,
      rot: Math.random()*TAU,
      vr: (Math.random()-0.5)*10,
      w: 4+Math.random()*6,
      h: 4+Math.random()*6,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      life: 1.5 + Math.random()*1.5
    });
  }
}

function drawPieceScale(p){
  return scale * 0.95;
}

function render(dt){
  ctx.clearRect(0,0,W,H);

  // Background gradient
  const grd = ctx.createLinearGradient(0,0,W,H);
  grd.addColorStop(0,'#0a0a1a');
  grd.addColorStop(1,'#1a1a2e');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  if(currentScreen === 'title'){
    drawTitleAnim(dt);
  } else if(currentScreen === 'game'){
    drawTargetSilhouette();
    drawTray();

    // Draw placed (non-dragging) pieces first, then dragging piece on top
    for(const p of pieces){
      if(!p.dragging) p.draw(ctx, p === selectedPiece && !levelComplete);
    }
    for(const p of pieces){
      if(p.dragging) p.draw(ctx, true);
    }
    drawConfetti(dt);

    // Timer
    if(!levelComplete){
      timerElapsed = (performance.now() - timerStart) / 1000;
    }
    const mins = Math.floor(timerElapsed/60);
    const secs = Math.floor(timerElapsed%60);
    document.getElementById('timer-display').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  }

  animFrame++;
}

}

// ──── Input Handling ────
function getEventPos(e){
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] || e.changedTouches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

function findPieceAt(x,y){
  // Check in reverse order (top piece first)
  for(let i=pieces.length-1;i>=0;i--){
    if(pieces[i].containsPoint(x,y)) return pieces[i];
  }
  return null;
}

function onPointerDown(e){
  if(currentScreen !== 'game' || levelComplete) return;
  e.preventDefault();
  initAudio();
  const pos = getEventPos(e);
  const piece = findPieceAt(pos.x, pos.y);

  const now = performance.now();

  if(piece){
    // Double tap detection
    if(lastTapPiece === piece && now - lastTapTime < 350){
      if(piece.canFlip){
        piece.flipped = !piece.flipped;
        sfx('flip');
      } else {
        piece.rotation += DEG45;
        sfx('rotate');
      }
      lastTapTime = 0;
      lastTapPiece = null;
      checkSnap(piece);
      checkWin();
      return;
    }

    lastTapTime = now;
    lastTapPiece = piece;
    selectedPiece = piece;
    isDragging = true;
    piece.dragging = true;
    dragOffset.x = pos.x - piece.x;
    dragOffset.y = pos.y - piece.y;
    sfx('pickup');

    // Bring to front
    const idx = pieces.indexOf(piece);
    pieces.splice(idx,1);
    pieces.push(piece);
  } else {
    selectedPiece = null;
    lastTapPiece = null;
  }
}

function onPointerMove(e){
  if(!isDragging || !selectedPiece) return;
  e.preventDefault();
  const pos = getEventPos(e);
  selectedPiece.x = pos.x - dragOffset.x;
  selectedPiece.y = pos.y - dragOffset.y;
}

function onPointerUp(e){
  if(!isDragging || !selectedPiece) return;
  e.preventDefault();
  isDragging = false;
  selectedPiece.dragging = false;
  sfx('drop');
  checkSnap(selectedPiece);

  // Tutorial advance on first drag
  if(tutorialStep === 0) advanceTutorial();

  checkWin();
}

function checkSnap(piece){
  if(!piece) return;
  const dx = piece.x - piece.targetX;
  const dy = piece.y - piece.targetY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const angleDiff = Math.abs(normalizeAngle(piece.rotation - piece.targetRot));

  if(dist < SNAP_DIST * scale && angleDiff < SNAP_ANGLE && piece.flipped === piece.targetFlip){
    piece.x = piece.targetX;
    piece.y = piece.targetY;
    piece.rotation = piece.targetRot;
    piece.placed = true;
    sfx('snap');
  } else {
    piece.placed = false;
  }
}

function normalizeAngle(a){
  while(a > PI) a -= TAU;
  while(a < -PI) a += TAU;
  return a;
}

function checkWin(){
  if(levelComplete) return;
  const allPlaced = pieces.every(p => p.placed);
  if(allPlaced){
    levelComplete = true;
    sfx('complete');
    spawnConfetti();
    setTimeout(()=>sfx('star'), 300);

    const lvl = LEVELS[currentLevel];
    const timeSec = timerElapsed;
    const timeBonus = Math.max(0, Math.round(MAX_TIME_BONUS * (1 - timeSec / (lvl.parTime * 3))));
    const score = Math.max(50, BASE_SCORE + timeBonus - hintsUsed * HINT_PENALTY);
    const stars = score >= 250 ? 3 : score >= 200 ? 2 : 1;

    // Save
    const prev = saveData.completed[currentLevel+1];
    if(!prev || prev.stars < stars){
      saveData.completed[currentLevel+1] = { stars, time: Math.round(timeSec), hints: hintsUsed };
    }
    if(currentLevel + 2 > saveData.currentLevel) saveData.currentLevel = currentLevel + 2;
    writeSave();

    // Show overlay
    document.getElementById('complete-stars').innerHTML =
      Array(3).fill(0).map((_,i) => `<span class="${i<stars?'star-anim':''}">${i<stars?'&#9733;':'&#9734;'}</span>`).join('');
    document.getElementById('complete-score').textContent = `Score: ${score}`;
    document.getElementById('complete-overlay').classList.add('active');
  }
}

// ──── Button handlers ────
function rotatePiece(){
  if(!selectedPiece || levelComplete) return;
  selectedPiece.rotation += DEG45;
  sfx('rotate');
  checkSnap(selectedPiece);
  if(tutorialStep === 1) advanceTutorial();
  checkWin();
}

function flipPiece(){
  if(!selectedPiece || levelComplete || !selectedPiece.canFlip) return;
  selectedPiece.flipped = !selectedPiece.flipped;
  sfx('flip');
  checkSnap(selectedPiece);
  if(tutorialStep === 2) advanceTutorial();
  checkWin();
}

function useHint(){
  if(levelComplete || hintsLeft <= 0) return;
  sfx('hint');
  hintsLeft--;
  hintsUsed++;
  document.getElementById('hints-left').textContent = `Hints: ${hintsLeft}`;

  // Find first unplaced piece and snap it
  for(const p of pieces){
    if(!p.placed){
      p.x = p.targetX;
      p.y = p.targetY;
      p.rotation = p.targetRot;
      p.flipped = p.targetFlip;
      p.placed = true;
      break;
    }
  }
  checkWin();
}

function resetLevel(){
  setupLevel(currentLevel);
  sfx('button');
}

// ──── Screen Navigation ────
function showScreen(name){
  currentScreen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name+'-screen').classList.add('active');
  if(name === 'title') initTitlePieces();
  if(name === 'level') buildLevelList();
  if(name === 'game') startBGM();
  else stopBGM();
}

function buildLevelList(){
  const list = document.getElementById('level-list');
  list.innerHTML = '';
  for(let t=0;t<5;t++){
    const label = document.createElement('div');
    label.className = 'tier-label';
    label.textContent = TIER_NAMES[t];
    list.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'level-grid';
    for(let i=0;i<6;i++){
      const ln = t*6+i+1;
      const card = document.createElement('div');
      card.className = 'level-card' + (isLevelUnlocked(ln) ? '' : ' locked');
      const s = getLevelStars(ln);
      card.innerHTML = `<span>${ln}</span><div class="stars">${[1,2,3].map(j => j<=s?'&#9733;':'<span class="empty">&#9734;</span>').join('')}</div>`;
      if(isLevelUnlocked(ln)){
        card.addEventListener('click', ()=>{ sfx('button'); setupLevel(ln-1); showScreen('game'); });
      }
      grid.appendChild(card);
    }
    list.appendChild(grid);
  }
}

// ──── Wire UI ────
document.getElementById('btn-play').addEventListener('click', ()=>{ initAudio(); sfx('button'); showScreen('level'); });
document.getElementById('btn-back-title').addEventListener('click', ()=>{ sfx('button'); showScreen('title'); });
document.getElementById('btn-back-levels').addEventListener('click', ()=>{ sfx('button'); showScreen('level'); });
document.getElementById('btn-rotate').addEventListener('click', rotatePiece);
document.getElementById('btn-flip').addEventListener('click', flipPiece);
document.getElementById('btn-hint').addEventListener('click', useHint);
document.getElementById('btn-reset').addEventListener('click', resetLevel);
document.getElementById('btn-replay').addEventListener('click', ()=>{ sfx('button'); resetLevel(); });
document.getElementById('btn-next').addEventListener('click', ()=>{
  sfx('button');
  if(currentLevel < LEVELS.length - 1){
    setupLevel(currentLevel+1);
  } else {
    showScreen('level');
  }
});

// ──── Canvas Events ────
canvas.addEventListener('pointerdown', onPointerDown, {passive:false});
canvas.addEventListener('pointermove', onPointerMove, {passive:false});
canvas.addEventListener('pointerup', onPointerUp, {passive:false});
canvas.addEventListener('pointercancel', onPointerUp, {passive:false});

// ──── Game Loop ────
let lastTime = 0;
function loop(ts){
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  render(dt);
  animFrame = requestAnimationFrame(loop);
}

// ──── Cleanup ────
function cleanup(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=0;}
  window.removeEventListener('resize',resize);
  window.removeEventListener('beforeunload',cleanup);
  const c=document.getElementById('c');
  if(c){c.getContext('2d').clearRect(0,0,c.width,c.height);}
  confettiParticles=[];
}
window.addEventListener('beforeunload',cleanup);

// ──── Init ────
window.addEventListener('resize', resize);
loadSave();
resize();
initTitlePieces();
requestAnimationFrame(loop);

// ──── Analytics (placeholder) ────
if(typeof gtag === 'undefined'){
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  // Add your analytics ID here: gtag('config', 'UA-XXXXX-Y');
}

})();
