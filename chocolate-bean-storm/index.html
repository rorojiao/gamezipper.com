<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chocolate Bean Storm</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <div id="score-panel">
                <div id="score-label">分数</div>
                <div id="score-value">0</div>
            </div>
            <div id="wave-panel">
                <div id="wave-label">关卡</div>
                <div id="wave-value">1</div>
            </div>
            <div id="combo-display"></div>
        </div>
        <div id="start-screen" class="screen">
            <h1 class="game-title">🍫 Chocolate<br>Bean Storm</h1>
            <p class="game-subtitle">瞄准射击，匹配三颗同色巧克力豆！</p>
            <button id="start-btn" class="game-btn">开始游戏</button>
            <div class="how-to-play">
                <h3>玩法说明</h3>
                <p>🖱️ 移动鼠标/手指瞄准</p>
                <p>👆 点击/触摸发射巧克力豆</p>
                <p>🌈 匹配3个以上同色豆子消除</p>
                <p>⚡ 彩虹豆可以匹配任意颜色</p>
                <p>🎯 每关有固定射击次数</p>
                <p>🏆 清除所有豆子过关</p>
            </div>
        </div>
        <div id="game-over-screen" class="screen hidden">
            <h1 class="game-title">游戏结束</h1>
            <div id="final-score-panel">
                <div>最终分数</div>
                <div id="final-score">0</div>
            </div>
            <div id="final-wave-panel">
                <div>到达关卡</div>
                <div id="final-wave">1</div>
            </div>
            <button id="restart-btn" class="game-btn">再来一局</button>
        </div>
    </div>
    <script src="js/game.js"></script>
</body>
</html>
