function craftLevel(n) {

// ============================================================
// RANDOM LEVELS 13-30 with path verification
// ============================================================
function generateLevel(n) {
  const speed = getSpeed(n);
  const zone = getZone(n);
  const lvl = { num:n, speed, zone, width: 3000+n*200, platforms:[], obstacles:[], cores:[], stars:[], checkpoint:null, portals:[], lasers:[], fogDensity:0 };

  const floor = H-60;
  const midY = floor/2;
  const numSeg = 8+n*2;
  const segW = (lvl.width-400)/numSeg;

  for (let i = 0; i < numSeg; i++) {
    const x = 200+i*segW;
    const r = Math.random();

    if (n<=15) {
      const isFloor = r<0.55;
      lvl.platforms.push({x, y:isFloor?floor:0, w:segW*0.7, h:60, type:isFloor?'floor':'ceiling'});
      if (r>0.45) lvl.obstacles.push({x:x+segW*0.35, y:midY+(Math.random()-0.5)*80, r:15, type:'saw', angle:0});
    } else if (n<=18) {
      lvl.platforms.push({x, y:r<0.5?floor:0, w:segW*0.6, h:60, type:r<0.5?'floor':'ceiling'});
      if (i%4===2) lvl.obstacles.push({x:x+segW*0.3, y:0, w:20, h:H, type:'electric', timer:0});
      if (i%6===0 && i>0) lvl.portals.push({x1:x, y1:floor-80, x2:x+segW*3, y2:80, color:'#e040fb'});
    } else if (n<=21) {
      const top=r<0.5;
      lvl.platforms.push({x, y:top?80:floor-40, w:segW*0.5, h:20, type:'mid'});
      if (r>0.3) lvl.obstacles.push({x:x+segW*0.3, y:top?200:midY, r:14, type:'saw', angle:0});
    } else if (n<=24) {
      const crumbling=r>0.6;
      lvl.platforms.push({x, y:r<0.5?floor:0, w:segW*0.55, h:60, type:r<0.5?'floor':'ceiling', crumbling, crumbleTimer:0});
      if (r>0.4) lvl.obstacles.push({x:x+segW*0.35, y:midY+(Math.random()-0.5)*100, r:15, type:'saw', angle:0});
    } else {
      lvl.platforms.push({x, y:r<0.35?floor:r<0.65?midY:0, w:segW*0.5, h:60, type:r<0.35?'floor':r<0.65?'mid':'ceiling'});
      if (r>0.35) lvl.obstacles.push({x:x+segW*0.35, y:midY+(Math.random()-0.5)*120, r:16, type:'saw', angle:0});
      if (n>=28) lvl.hasChaser=true;
    }

    if (r>0.5) lvl.stars.push({x:x+segW*0.5, y:midY+(Math.random()-0.5)*120, collected:false});
  }

  for (let i=0;i<3;i++) {
    const cx=300+(lvl.width-600)*(i+1)/4;
    lvl.cores.push({x:cx, y:midY+(Math.random()-0.5)*80, collected:false});
  }

  lvl.checkpoint = {x:lvl.width*0.5, y:midY, reached:false};
  lvl.platforms.unshift({x:0, y:floor, w:250, h:60, type:'floor'});
  lvl.platforms.push({x:lvl.width-200, y:floor, w:200, h:60, type:'floor'});
  lvl.endX = lvl.width-100;

  // Ensure consecutive platforms alternate enough for playability
  // Simple check: if 3+ consecutive same-side platforms, flip the middle one
  const sorted = lvl.platforms.slice().sort((a,b)=>a.x-b.x);
  let sameCount = 0;
  for (let i=1;i<sorted.length;i++) {
    const prevTop = sorted[i-1].y < midY;
    const curTop = sorted[i].y < midY;
    if (prevTop === curTop) { sameCount++; } else { sameCount = 0; }
    if (sameCount >= 3 && sorted[i].w > 80) {
      sorted[i].y = curTop ? floor : 0;
      sorted[i].type = curTop ? 'floor' : 'ceiling';
      sameCount = 0;
    }
  }

  return lvl;
}

function getLevel(n) {
  if (n <= 12) return craftLevel(n);
  return generateLevel(n);
}

// ============================================================
// BGM SYSTEM (Web Audio API)
// ============================================================
const BGM = {
  ctx: null,
  masterGain: null,
  musicGain: null,
  sfxGain: null,
  currentNodes: [],
  playing: false,
  volume: 0.3,

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain();
    this.musicGain.gain.value = this.volume;
    this.musicGain.connect(this.masterGain);
    this.sfxGain = this.ctx.createGain();
    this.sfxGain.gain.value = 0.5;
    this.sfxGain.connect(this.masterGain);
  },

  stop() {
    this.currentNodes.forEach(n => { try { n.stop(); } catch(e){} try { n.disconnect(); } catch(e){} });
    this.currentNodes = [];
    this.playing = false;
  },

  playZone(zoneIdx) {
    this.init();
    this.stop();
    const ac = this.ctx;
    const g = this.musicGain;
    const nodes = [];

    // Create a simple looping pattern for each zone
    const createLoop = (freqs, type, vol, interval, dur) => {
      const osc = ac.createOscillator();
      const gn = ac.createGain();
      osc.type = type;
      gn.gain.value = vol;
      osc.connect(gn);
      gn.connect(g);
      let noteIdx = 0;
      const schedule = () => {
        const t = ac.currentTime;
        osc.frequency.setValueAtTime(freqs[noteIdx % freqs.length], t);
        noteIdx++;
        // Soft envelope
        gn.gain.setValueAtTime(vol, t);
        gn.gain.linearRampToValueAtTime(vol * 0.6, t + dur * 0.8);
      };
      osc.start();
      schedule();
      const timer = setInterval(schedule, interval);
      nodes.push(osc);
      osc._timer = timer;
    };

    switch(zoneIdx) {
      case 0: // Factory - electronic beat
        createLoop([110,110,82.41,110], 'square', 0.08, 500, 0.4);
        createLoop([220,261.63,293.66,220], 'sine', 0.06, 1000, 0.8);
        createLoop([55,55,65.41,55], 'triangle', 0.1, 500, 0.3);
        break;
      case 1: // Greenhouse - light piano + arpeggios
        createLoop([261.63,329.63,392,523.25,392,329.63], 'sine', 0.07, 400, 0.35);
        createLoop([130.81,164.81,196,130.81], 'triangle', 0.05, 800, 0.6);
        break;
      case 2: // Data Center - sawtooth + delay feel
        createLoop([146.83,174.61,196,146.83], 'sawtooth', 0.04, 300, 0.2);
        createLoop([293.66,349.23,392,293.66], 'square', 0.03, 600, 0.15);
        createLoop([73.42,73.42,87.31,73.42], 'triangle', 0.06, 300, 0.25);
        break;
      case 3: // Sky Bridge - ethereal sine chords
        createLoop([392,493.88,587.33,493.88], 'sine', 0.05, 1200, 1.0);
        createLoop([293.66,369.99,440,369.99], 'sine', 0.04, 1200, 1.0);
        createLoop([196,196,220,196], 'triangle', 0.03, 600, 0.8);
        break;
      case 4: // Launch Pad - epic bass + rising
        createLoop([65.41,65.41,73.42,82.41,73.42,65.41], 'sawtooth', 0.06, 400, 0.35);
        createLoop([130.81,164.81,196,261.63,196,164.81], 'sine', 0.05, 400, 0.3);
        createLoop([523.25,587.33,659.25,783.99], 'sine', 0.03, 2000, 1.5);
        break;
    }
    this.currentNodes = nodes;
    this.playing = true;
  },

  setVolume(v) {
    this.volume = v;
    if (this.musicGain) this.musicGain.gain.value = v;
  },

  playSFX(type) {
    this.init();
    const ac = this.ctx;
    const g = ac.createGain();
    g.connect(this.sfxGain);
    const t = ac.currentTime;
    switch(type) {
      case 'bounce': {
        const o = ac.createOscillator(); o.connect(g);
        o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(600,t+0.1);
        g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15);
        o.start(t); o.stop(t+0.15); break;
      }
      case 'flip': {
        const o = ac.createOscillator(); o.connect(g);
        o.type='sawtooth'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(800,t+0.12);
        g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15);
        o.start(t); o.stop(t+0.15); break;
      }
      case 'collect': {
        const o = ac.createOscillator(); o.connect(g);
        o.type='sine'; o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(1320,t+0.1);
        g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.2);
        o.start(t); o.stop(t+0.2); break;
      }
      case 'die': {
        const o = ac.createOscillator(); o.connect(g);
        o.type='square'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(50,t+0.3);
        g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.4);
        o.start(t); o.stop(t+0.4); break;
      }
      case 'win': {
        const o = ac.createOscillator(); o.connect(g);
        o.type='sine';
        o.frequency.setValueAtTime(523,t); o.frequency.setValueAtTime(659,t+0.1); o.frequency.setValueAtTime(784,t+0.2); o.frequency.setValueAtTime(1047,t+0.3);
        g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.5);
        o.start(t); o.stop(t+0.5); break;
      }
    }
  }
};

let particles = [];
let scorePopups = [];
let shakeTimer = 0, shakeX = 0, shakeY = 0;

function spawnParticles(x, y, color, count, spread, type='dot') {
  for (let i=0; i<count; i++) {
    particles.push({
      x, y, vx:(Math.random()-0.5)*spread, vy:(Math.random()-0.5)*spread,
      life:30+Math.random()*25, maxLife:55, r:2+Math.random()*3, color, type,
      glow: type==='glow' || type==='ring'
    });
  }
}

function spawnRing(x, y, color) {
  particles.push({ x, y, vx:0, vy:0, life:20, maxLife:20, r:5, color, type:'ring', glow:true });
}

function spawnFirework(x, y) {
  const colors = ['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff','#44ffff'];
  const c = colors[Math.floor(Math.random()*colors.length)];
  for (let i=0;i<20;i++) {
    const a = Math.PI*2*i/20;
    const sp = 3+Math.random()*3;
    particles.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, life:40+Math.random()*20, maxLife:60, r:3, color:c, type:'glow', glow:true });
  }
}

function spawnScorePopup(x, y, text) {

}

// INPUT

let inputPressed = false, inputJustPressed = false;

function handleInput() {
  if (inputJustPressed) { BGM.init(); inputJustPressed = false; return true; }
  return false;
}

document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') { e.preventDefault(); if(!inputPressed) inputJustPressed=true; inputPressed=true; }
  if (e.code==='Escape'||e.code==='KeyP') { if(state===STATE.PLAYING) togglePause(); else if(state===STATE.PAUSED) togglePause(); }
});
document.addEventListener('keyup', e => { if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') inputPressed=false; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if(!inputPressed) inputJustPressed=true; inputPressed=true; }, {passive:false});
canvas.addEventListener('touchend', () => { inputPressed=false; });
canvas.addEventListener('mousedown', e => { if(!inputPressed) inputJustPressed=true; inputPressed=true; });

// ============================================================
// UI BUTTONS
// ============================================================
let buttons = [];
function addButton(x,y,w,h,text,cb) { buttons.push({x,y,w,h,text,cb,hover:false,glow:0}); }
function clearButtons() { buttons=[]; }

function drawButton(b, color) {
  // Glow animation
  b.glow = (b.glow||0) + 0.05;
  const glowPulse = Math.sin(b.glow)*0.3+0.7;

  ctx.fillStyle = b.hover ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.08)';
  ctx.strokeStyle = color || '#00BFFF';
  ctx.lineWidth = b.hover ? 3 : 2;
  ctx.shadowColor = color || '#00BFFF';
  ctx.shadowBlur = b.hover ? 15*glowPulse : 0;
  roundRect(b.x,b.y,b.w,b.h,12);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(b.text, b.x+b.w/2, b.y+b.h/2);
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function hitButton(mx,my) {
  for (const b of buttons) { if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h) { b.cb(); return true; } }
  return false;
}

canvas.addEventListener('click', e => {
  const rect=canvas.getBoundingClientRect();
  hitButton((e.clientX-rect.left)*(W/rect.width), (e.clientY-rect.top)*(H/rect.height));
});
canvas.addEventListener('touchstart', e => {
  if(buttons.length&&e.touches.length) {
    const t=e.touches[0], rect=canvas.getBoundingClientRect();
    hitButton((t.clientX-rect.left)*(W/rect.width), (t.clientY-rect.top)*(H/rect.height));
  }
}, {passive:true});

// ============================================================
// PAUSE
// ============================================================
function togglePause() {
  if (state === STATE.PLAYING) {
    state = STATE.PAUSED;
    clearButtons();
    const bw=160, bh=44;
    addButton(W/2-bw/2, H/2-40, bw, bh, '▶ Resume', () => { state=STATE.PLAYING; clearButtons(); });
    addButton(W/2-bw/2, H/2+20, bw, bh, '↻ Retry', () => startLevel(currentLevel, false));
    addButton(W/2-bw/2, H/2+80, bw, bh, 'Menu', () => { state=STATE.MENU; clearButtons(); BGM.stop(); });
  } else if (state === STATE.PAUSED) {
    state = STATE.PLAYING;
    clearButtons();
  }
}

// ============================================================
// BACKGROUND
// ============================================================
function drawBackground(zone, zoneIdx) {
  // 4-color gradient
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, zone.bg[0]); grd.addColorStop(0.33, zone.bg[1]); grd.addColorStop(0.66, zone.bg[2]); grd.addColorStop(1, zone.bg[3]);
  ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

  // Far layer - zone-specific decorations
  const farOffset = -cam.x*0.1;
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let i=0;i<15;i++) {
    const bx = ((i*180+farOffset)%(W+200))-100;
    if (zoneIdx===0) { // Factory: building silhouettes
      ctx.fillRect(bx, H*0.4, 60, H*0.6);
      ctx.fillRect(bx+10, H*0.3, 40, 30);
    } else if (zoneIdx===1) { // Greenhouse: tree silhouettes
      ctx.beginPath(); ctx.arc(bx+30, H*0.5, 40, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(bx+27, H*0.5, 6, H*0.3);
    } else if (zoneIdx===2) { // Data Center: circuit towers
      ctx.fillRect(bx, H*0.3, 20, H*0.7);
      ctx.fillRect(bx-10, H*0.5, 40, 4);
    } else if (zoneIdx===3) { // Sky Bridge: clouds
      ctx.beginPath(); ctx.ellipse(bx+40, H*0.35+Math.sin(i)*20, 60, 20, 0, 0, Math.PI*2); ctx.fill();
    } else { // Launch Pad: stars + rockets
      ctx.beginPath(); ctx.arc(bx, H*0.2+Math.sin(i*3)*50, 2, 0, Math.PI*2); ctx.fill();
    }
  }

  // Mid layer
  const midOffset = -cam.x*0.3;
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  for (let i=0;i<10;i++) {
    const bx = ((i*220+midOffset)%(W+250))-125;
    if (zoneIdx===0) { ctx.fillRect(bx, H*0.6, 80, 3); ctx.fillRect(bx+30, H*0.55, 3, 50); }
    else if (zoneIdx===1) { ctx.fillRect(bx, H*0.7, 50, 3); }
    else if (zoneIdx===2) { ctx.fillRect(bx, H*0.5, 100, 2); }
    else if (zoneIdx===3) { ctx.beginPath(); ctx.ellipse(bx+50, H*0.6, 40, 15, 0, 0, Math.PI*2); ctx.fill(); }
    else { ctx.fillRect(bx, H*0.65, 30, 40); }
  }

  // Speed lines
  if (level && level.speed > 5) {
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (let i=0;i<8;i++) {
      const sy = ((Date.now()*0.15+i*100)%H);
      ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(40+Math.random()*30,sy); ctx.stroke();
    }
  }

  // Floating particles in background
  ctx.fillStyle = zone.particles || 'rgba(255,255,255,0.15)';
  for (const p of bgParticles) {
    p.x -= p.speed;
    p.y += Math.sin(Date.now()*0.001+p.phase)*0.3;
    if (p.x < -10) p.x = W+10;
    ctx.globalAlpha = 0.15+Math.sin(Date.now()*0.002+p.phase)*0.1;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAW PLAYER
// ============================================================
function drawPlayer() {
  if (!player.alive && player.winTimer <= 0) return;
  const px = player.x - cam.x;
  const py = player.y - cam.y;

  ctx.save();
  ctx.translate(px + player.w/2, py + player.h/2);

  // Smooth rotation toward target
  const rotDiff = player.targetRotation - player.rotation;
  player.rotation += rotDiff * 0.15;
  ctx.rotate(player.rotation);

  // Squash/stretch
  let sx=1, sy=1;
  if (player.squash > 0) {
    const t = player.squash/10;
    sx = 1+0.25*t; sy = 1-0.2*t;
  } else if (Math.abs(player.vy) > 3) {
    // Stretch in air
    const stretch = Math.min(Math.abs(player.vy)*0.015, 0.15);
    sx = 1-stretch; sy = 1+stretch;
  }
  ctx.scale(sx, sy);

  // Outer glow
  const glowR = 22+Math.sin(Date.now()*0.004)*3;
  const glow = ctx.createRadialGradient(0,0,8, 0,0,glowR);
  glow.addColorStop(0, 'rgba(0,191,255,0.25)');
  glow.addColorStop(1, 'rgba(0,191,255,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(-glowR,-glowR,glowR*2,glowR*2);

  // Body
  ctx.fillStyle = '#e8e8e8';
  ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill();

  // Circuit lines (pulsing)
  const pulse = 0.4+Math.sin(Date.now()*0.005)*0.3;
  ctx.strokeStyle = '#00BFFF';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = pulse;
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-7,0); ctx.lineTo(7,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(0,7); ctx.stroke();
  // Diagonal circuits
  ctx.beginPath(); ctx.moveTo(-5,-5); ctx.lineTo(5,5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,-5); ctx.lineTo(-5,5); ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // Eye (follows movement direction)
  const eyeOffX = player.vy !== 0 ? (player.gravityDir > 0 ? 1 : -1) * 1 : 0;
  const eyeOffY = player.vy !== 0 ? (player.gravityDir > 0 ? 1 : -1) * 1 : 0;
  ctx.fillStyle = '#00BFFF';
  ctx.shadowColor = '#00BFFF'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.arc(4+eyeOffX, -2+eyeOffY, 5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#001a33';
  ctx.beginPath(); ctx.arc(5+eyeOffX*1.5, -2+eyeOffY*1.5, 2.5, 0, Math.PI*2); ctx.fill();

  // Antenna
  ctx.strokeStyle = '#00BFFF'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0,-15); ctx.lineTo(0,-22); ctx.stroke();
  ctx.fillStyle = '#00BFFF';
  ctx.beginPath(); ctx.arc(0,-23, 2, 0, Math.PI*2); ctx.fill();

  ctx.restore();

  // Trail
  if (player.alive && state === STATE.PLAYING) {
    player.trail.push({x:player.x+15, y:player.y+15, life:15});
    if (player.trail.length > 20) player.trail.shift();
  }
  for (let i=0;i<player.trail.length;i++) {
    const t = player.trail[i];
    t.life--;
    if (t.life <= 0) { player.trail.splice(i,1); i--; continue; }
    const a = t.life/15;
    const r = 4*a;
    const grad = ctx.createRadialGradient(t.x-cam.x, t.y-cam.y, 0, t.x-cam.x, t.y-cam.y, r*2);
    grad.addColorStop(0, `rgba(0,191,255,${a*0.5})`);
    grad.addColorStop(1, 'rgba(0,191,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(t.x-cam.x, t.y-cam.y, r*2, 0, Math.PI*2); ctx.fill();
  }
}

// ============================================================
// DRAW LEVEL
// ============================================================
function drawLevel() {
  if (!level) return;
  const z = level.zone;

  for (const p of level.platforms) {
    const px = p.x-cam.x;
    if (px>W+100||px+p.w<-100) continue;
    ctx.fillStyle = p.bouncy ? '#4ade80' : z.ground;
    if (p.crumbling && p.crumbleTimer > 0) ctx.globalAlpha = Math.max(0,1-p.crumbleTimer/30);
    ctx.fillRect(px, p.y-cam.y, p.w, p.h);
    // Platform edge glow
    ctx.shadowColor = z.accent; ctx.shadowBlur = 4;
    ctx.strokeStyle = z.accent + '44'; ctx.lineWidth = 1;
    ctx.strokeRect(px, p.y-cam.y, p.w, p.h);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  for (const o of level.obstacles) {
    const ox = o.x-cam.x;
    if (ox>W+50||ox<-50) continue;
    if (o.type==='saw') {
      ctx.save(); ctx.translate(ox, o.y-cam.y); ctx.rotate(o.angle);
      ctx.fillStyle = z.obstacle; ctx.shadowColor = z.obstacle; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(0,0,o.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      for(let i=0;i<6;i++) { const a=i*Math.PI/3; ctx.beginPath(); ctx.moveTo(Math.cos(a)*(o.r-4),Math.sin(a)*(o.r-4)); ctx.lineTo(Math.cos(a)*(o.r+5),Math.sin(a)*(o.r+5)); ctx.stroke(); }
      ctx.shadowBlur = 0; ctx.restore(); o.angle += 0.1;
    } else if (o.type==='electric') {
      const on = Math.floor(Date.now()/500)%2;
      if(on) { ctx.fillStyle=z.obstacle; ctx.fillRect(ox,0,o.w,H); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); for(let yy=0;yy<H;yy+=20){ctx.lineTo(ox+Math.random()*o.w,yy);} ctx.stroke(); }
    } else if (o.type==='vine') {
      ctx.fillStyle=z.obstacle; ctx.fillRect(ox-5, o.y-cam.y, 10, 60);
    }
  }

  for (const l of level.lasers) {
    const lx=l.x-cam.x; if(lx>W+20||lx<-20) continue;
    l.timer++; if(l.timer>l.period) l.on=!l.on, l.timer=0;
    if(l.on) { ctx.strokeStyle='#ff0044'; ctx.lineWidth=4; ctx.shadowColor='#ff0044'; ctx.shadowBlur=10; ctx.beginPath(); ctx.moveTo(lx,l.y1-cam.y); ctx.lineTo(lx,l.y2-cam.y); ctx.stroke(); ctx.shadowBlur=0; }
  }

  for (const p of level.portals) {
    for(const [px,py] of [[p.x1,p.y1],[p.x2,p.y2]]) {
      const sx=px-cam.x, sy=py-cam.y;
      ctx.strokeStyle=p.color; ctx.lineWidth=3;
      ctx.beginPath(); ctx.ellipse(sx,sy,20,30,0,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle=p.color+'33'; ctx.fill();
    }
  }

  // Cores - enhanced glow
  for (const c of level.cores) {
    if(c.collected) continue;
    const cx=c.x-cam.x, cy=c.y-cam.y;
    const pulse = Math.sin(Date.now()*0.005)*3;
    ctx.fillStyle='#00BFFF'; ctx.shadowColor='#00BFFF'; ctx.shadowBlur=20+pulse;
    ctx.beginPath(); ctx.arc(cx,cy,10+pulse,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.fill();
    // Inner sparkle
    ctx.fillStyle = `rgba(255,255,255,${0.3+Math.sin(Date.now()*0.008)*0.3})`;
    ctx.beginPath(); ctx.arc(cx-2,cy-2,3,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Stars
  for (const s of level.stars) {
    if(s.collected) continue;
    const sx=s.x-cam.x, sy=s.y-cam.y;
    ctx.save(); ctx.translate(sx,sy); ctx.rotate(Date.now()*0.002);
    ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
    drawStar(0,0,5,8,4);
    ctx.shadowBlur = 0; ctx.restore();
  }

  // Checkpoint
  if(level.checkpoint && !level.checkpoint.reached) {
    const cx=level.checkpoint.x-cam.x, cy=level.checkpoint.y-cam.y;
    ctx.fillStyle='#4ade80'; ctx.shadowColor='#4ade80'; ctx.shadowBlur=10;
    ctx.fillRect(cx-3,cy-15,6,30); ctx.fillRect(cx,cy-15,15,10);
    ctx.shadowBlur=0;
  }

  // Fog
  if(level.fogDensity>0) {
    const fogR=H*level.fogDensity;
    const fogGrd=ctx.createRadialGradient(player.x-cam.x+15,player.y-cam.y+15,fogR*0.3,player.x-cam.x+15,player.y-cam.y+15,fogR);
    fogGrd.addColorStop(0,'rgba(0,0,0,0)'); fogGrd.addColorStop(1,'rgba(0,0,0,0.85)');
    ctx.fillStyle=fogGrd; ctx.fillRect(0,0,W,H);
  }

  // End marker
  const ex=level.endX-cam.x;
  if(ex<W+50) {
    ctx.fillStyle='#4ade80'; ctx.shadowColor='#4ade80'; ctx.shadowBlur=15;
    ctx.fillRect(ex-5,H-200-cam.y,10,140); ctx.fillRect(ex-5,0,10,200);
    ctx.font='bold 14px system-ui'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('EXIT',ex,H-80-cam.y); ctx.shadowBlur=0;
  }
}

function drawStar(cx,cy,spikes,outerR,innerR) {
  ctx.beginPath();
  for(let i=0;i<spikes*2;i++) {
    const r=i%2===0?outerR:innerR;
    const a=(i*Math.PI/spikes)-Math.PI/2;
    if(i===0) ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    else ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
}

  progGrd.addColorStop(0,'#00BFFF'); progGrd.addColorStop(1,'#4ade80');
  ctx.fillStyle = progGrd;
  ctx.fillRect(W/2-100, 10, 200*prog, 8);
  // Pulse dot at progress point
  const dotX = W/2-100+200*prog;
  ctx.fillStyle = '#fff'; ctx.shadowColor='#4ade80'; ctx.shadowBlur=6+Math.sin(Date.now()*0.005)*3;
  ctx.beginPath(); ctx.arc(dotX, 14, 4, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Pause button (top right area)
  const pauseBtnX = W-44, pauseBtnY = 70;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(pauseBtnX, pauseBtnY, 32, 32);
  ctx.fillStyle = '#fff'; ctx.fillRect(pauseBtnX+10, pauseBtnY+8, 4, 16);
  ctx.fillRect(pauseBtnX+18, pauseBtnY+8, 4, 16);

  // Store pause button bounds for click detection
  if (!drawHUD._pauseBtn) {
    canvas.addEventListener('click', e => {
      const rect=canvas.getBoundingClientRect();
      const mx=(e.clientX-rect.left)*(W/rect.width);
      const my=(e.clientY-rect.top)*(H/rect.height);
      if(state===STATE.PLAYING && mx>=W-44 && mx<=W-12 && my>=70 && my<=102) togglePause();
    });
    drawHUD._pauseBtn = true;
  }
}

// ============================================================
// PARTICLES
// ============================================================
function updateParticles() {
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.05; // slight gravity on particles
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}

function drawParticles() {
  for(const p of particles) {
    const a = p.life/p.maxLife;
    ctx.globalAlpha = a;
    if(p.type==='ring') {
      const r = (1-a)*40+5;
      ctx.strokeStyle = p.color; ctx.lineWidth = 2*a;
      ctx.beginPath(); ctx.arc(p.x-cam.x, p.y-cam.y, r, 0, Math.PI*2); ctx.stroke();
    } else if(p.glow) {
      const grad = ctx.createRadialGradient(p.x-cam.x,p.y-cam.y,0,p.x-cam.x,p.y-cam.y,p.r*3);
      grad.addColorStop(0, p.color); grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(p.x-cam.x,p.y-cam.y,p.r*3,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x-cam.x,p.y-cam.y,p.r*a,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function updateScorePopups() {
  for(let i=scorePopups.length-1;i>=0;i--) { scorePopups[i].y-=1.5; scorePopups[i].life--; if(scorePopups[i].life<=0) scorePopups.splice(i,1); }
}
function drawScorePopups() {
  for(const p of scorePopups) {
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle='#4ade80'; ctx.font='bold 18px system-ui'; ctx.textAlign='center';
    const s=1+((p.maxLife-p.life)/p.maxLife)*0.3;
    ctx.save(); ctx.translate(p.x-cam.x, p.y-cam.y); ctx.scale(s,s);
    ctx.fillText(p.text,0,0); ctx.restore();
  }
  ctx.globalAlpha=1;
}

// ============================================================
// COLLISION
// ============================================================
function rectCollide(ax,ay,aw,ah,bx,by,bw,bh) { return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by; }
function circRectCollide(cx,cy,cr,rx,ry,rw,rh) { const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh)),dx=cx-nx,dy=cy-ny; return dx*dx+dy*dy<cr*cr; }

// ============================================================
// START LEVEL
// ============================================================
function startLevel(n, fromCheckpoint) {
  currentLevel=n;
  level=getLevel(n);
  resetPlayer(fromCheckpoint&&level.checkpoint ? level.checkpoint.x : 100,
              fromCheckpoint&&level.checkpoint ? level.checkpoint.y : H-120);
  cam.x=0; cam.y=0;
  particles=[]; scorePopups=[];
  levelDeaths=0; checkpointUsed=false;
  clearButtons(); state=STATE.PLAYING;

  // Start zone BGM
  const zoneIdx = Math.min(Math.floor((n-1)/6), 4);
  if (soundEnabled) BGM.playZone(zoneIdx);
}

function startInfinite() {
  infiniteMode=true; infiniteScore=0;
  level=generateLevel(25);
  level.speed=5; level.width=99999; level.endX=99999; level.hasChaser=true;
  resetPlayer(100,H-120);
  cam.x=0; cam.y=0; particles=[]; scorePopups=[];
  clearButtons(); state=STATE.PLAYING;
  if(soundEnabled) BGM.playZone(4);
}

// ============================================================
// GAME UPDATE
// ============================================================
function updateGame() {
  if(state!==STATE.PLAYING||!player.alive) return;

  // Slow motion
  if(slowMotion>0) { slowMotion--; if(slowMotion%2!==0) return; }

  const spd = level.speed;
  player.x += spd;

  // Flip gravity
  if(handleInput() && player.flipCooldown<=0) {
    player.gravityDir *= -1;
    player.flipCooldown = FLIP_COOLDOWN;
    player.targetRotation += Math.PI; // smooth rotation
    BGM.playSFX('flip');
    spawnParticles(player.x+15, player.y+15, '#00BFFF', 8, 5, 'glow');
  }
  player.flipCooldown = Math.max(0, player.flipCooldown-1);

  // Gravity
  player.vy += GRAVITY * player.gravityDir;
  player.y += player.vy;

  if(player.squash>0) player.squash--;
  if(scoreBounce>0) scoreBounce -= 0.1;

  // Wind
  if(level.wind) player.y += level.wind*0.5;

  // Platform collision
  let onGround=false;
  for(const p of level.platforms) {
    if(p.crumbling && p.crumbleTimer>25) continue;
    if(rectCollide(player.x,player.y,player.w,player.h, p.x,p.y,p.w,p.h)) {
      if(player.gravityDir===1 && player.vy>0 && player.y+player.h>p.y && player.y<p.y) {
        player.y=p.y-player.h; player.vy=0; onGround=true; player.squash=8;
        if(p.bouncy) { player.vy=-12; BGM.playSFX('bounce'); }
        if(p.crumbling) p.crumbleTimer=(p.crumbleTimer||0)+1;
      } else if(player.gravityDir===-1 && player.vy<0 && player.y<p.y+p.h && player.y+player.h>p.y+p.h) {
        player.y=p.y+p.h; player.vy=0; onGround=true; player.squash=8;
        if(p.bouncy) { player.vy=12; BGM.playSFX('bounce'); }
      }
    }
  }

  // Bounds
  if(player.y<0) { player.y=0; player.vy=0; }
  if(player.y+player.h>H) { player.y=H-player.h; player.vy=0; }

  // Obstacles
  for(const o of level.obstacles) {
    if(o.type==='saw') { if(circRectCollide(o.x,o.y,o.r,player.x,player.y,player.w,player.h)) { killPlayer(); return; } }
    else if(o.type==='electric') { const on=Math.floor(Date.now()/500)%2; if(on&&rectCollide(player.x,player.y,player.w,player.h,o.x,0,o.w,H)) { killPlayer(); return; } }
    else if(o.type==='vine') { if(rectCollide(player.x,player.y,player.w,player.h,o.x-5,o.y,10,60)) { killPlayer(); return; } }
  }

  // Lasers
  for(const l of level.lasers) {
    if(l.on&&player.x<l.x+4&&player.x+player.w>l.x-4&&player.y+player.h>l.y1&&player.y<l.y2) { killPlayer(); return; }
  }

  // Portals
  for(const p of level.portals) {
    if(Math.hypot(player.x+15-p.x1,player.y+15-p.y1)<30) { player.x=p.x2; player.y=p.y2; BGM.playSFX('flip'); }
  }

  // Core collection - enhanced
  for(const c of level.cores) {
    if(!c.collected&&Math.hypot(player.x+15-c.x,player.y+15-c.y)<25) {
      c.collected=true; totalCores++; score+=50; scoreBounce=1;
      BGM.playSFX('collect');
      spawnParticles(c.x,c.y,'#00BFFF',15,7,'glow');
      spawnRing(c.x,c.y,'#00BFFF');
      spawnScorePopup(c.x,c.y,'+50');
    }
  }

  // Star collection - enhanced
  for(const s of level.stars) {
    if(!s.collected&&Math.hypot(player.x+15-s.x,player.y+15-s.y)<20) {
      s.collected=true; totalStars++; score+=10; scoreBounce=1;
      BGM.playSFX('collect');
      spawnParticles(s.x,s.y,'#ffd700',10,5,'glow');
      spawnRing(s.x,s.y,'#ffd700');
      spawnScorePopup(s.x,s.y,'+10');
    }
  }

  // Checkpoint
  if(level.checkpoint&&!level.checkpoint.reached&&player.x>level.checkpoint.x) {
    level.checkpoint.reached=true;
    spawnParticles(level.checkpoint.x,level.checkpoint.y,'#4ade80',10,5,'glow');
  }

  // Chaser
  if(level.hasChaser) {
    level.chaserX=(level.chaserX||player.x-300)+spd*0.85;
    if(player.x-level.chaserX<0) { killPlayer(); return; }
  }

  // Win
  if(player.x>=level.endX) { winLevel(); return; }

  // Infinite mode
  if(infiniteMode) {
    infiniteScore=Math.floor(player.x/10);
    level.speed=5+infiniteScore/2000;
    if(player.x>(level._lastGenX||0)+500) {
      level._lastGenX=player.x;
      const segW=200, y=Math.random()<0.5?H-60:0;
      level.platforms.push({x:player.x+400,y,w:segW*0.6,h:60,type:y===0?'ceiling':'floor'});
      if(Math.random()>0.4) level.obstacles.push({x:player.x+500,y:H/2+(Math.random()-0.5)*150,r:16,type:'saw',angle:0});
      if(Math.random()>0.5) level.stars.push({x:player.x+450,y:H/2+(Math.random()-0.5)*100,collected:false});
    }
  }

  // Camera
  cam.x = player.x - W*0.3;
  cam.y = 0;

  // Shake
  if(shakeTimer>0) { shakeX=(Math.random()-0.5)*6; shakeY=(Math.random()-0.5)*6; shakeTimer--; }
  else { shakeX=shakeY=0; }

  checkAchievements();
}

function killPlayer() {
  player.alive = false;
  levelDeaths++; deaths++; deathsSinceAd++;
  consecutiveNoDeath = 0;
  BGM.playSFX('die');
  // Enhanced death particles - fragments + red flash + slow-mo
  spawnParticles(player.x+15, player.y+15, '#ff4444', 20, 8, 'glow');
  spawnParticles(player.x+15, player.y+15, '#ff8800', 10, 6, 'dot');
  screenFlash = 8;
  slowMotion = 18; // ~0.3s slow-mo
  shakeTimer = 12;

  setTimeout(() => {
    if(state!==STATE.PLAYING) return;
    state=STATE.DEAD; clearButtons();
    const bw=140, bh=44;
    addButton(W/2-bw-10, H/2+20, bw, bh, 'Retry', () => startLevel(currentLevel, false));
    if(level.checkpoint&&level.checkpoint.reached) {
      addButton(W/2+10, H/2+20, bw, bh, 'Checkpoint', () => { checkpointUsed=true; startLevel(currentLevel,true); });
    }
    addButton(W/2-bw/2, H/2+75, bw, bh, 'Menu', () => { state=STATE.MENU; clearButtons(); BGM.stop(); });
    if(deathsSinceAd>=3) { deathsSinceAd=0; try{window.GZMonetagSafe&&GZMonetagSafe.maybeLoad();}catch(e){} }
  }, 600);
}

function winLevel() {
  player.alive=false; player.winTimer=60;
  consecutiveNoDeath++;
  levelsCompleted.add(currentLevel);
  for(let z=0;z<5;z++) { let c=true; for(let l=z*6+1;l<=z*6+6;l++) if(!levelsCompleted.has(l)) c=false; if(c) zonesCompleted.add(z); }
  if(currentLevel>=30) infiniteUnlocked=true;
  BGM.playSFX('win');
  score+=100; scoreBounce=1;

  // Fireworks!
  for(let i=0;i<5;i++) {
    setTimeout(() => spawnFirework(player.x-50+Math.random()*100, player.y-50+Math.random()*100), i*200);
  }

  setTimeout(() => {
    state=STATE.WIN; clearButtons();
    addButton(W/2-70, H/2+50, 140, 44, currentLevel<30?'Next Level':'Menu', () => {
      if(currentLevel<30) { currentLevel++; saveGame(); startLevel(currentLevel,false); } else { state=STATE.MENU; clearButtons(); BGM.stop(); }
    });
    addButton(W/2-70, H/2+105, 140, 44, 'Menu', () => { state=STATE.MENU; clearButtons(); BGM.stop(); });
    saveGame(); checkAchievements();
    try{window.GZMonetagSafe&&GZMonetagSafe.maybeLoad();}catch(e){}
  }, 1000);
}

// ============================================================
// ACHIEVEMENTS
// ============================================================
function checkAchievements() {
  const checks = {
    'First Bounce': levelsCompleted.size>=1,
    'Speed Demon': [...levelsCompleted].some(l=>getSpeed(l)>6),
    'Collector': totalStars>=100,
    'Zone Master': zonesCompleted.size>=1,
    'Perfect Run': levelDeaths===0&&state===STATE.WIN,
    'Checkpoint Hero': !checkpointUsed&&state===STATE.WIN,
    'Core Hunter': totalCores>=50,
    'Unstoppable': consecutiveNoDeath>=5,
    'Explorer': levelsCompleted.size>=30,
    'Infinite Runner': infiniteScore>10000
  };
  for(const [name,ok] of Object.entries(checks)) { if(ok&&!achievements[name]) { achievements[name]=true; saveGame(); } }
}

// Loading screen
let loadingDone = false;
let loadingTimer = 0;
function drawLoading() {
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#050510'); grd.addColorStop(1,'#0a0a2e');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

  // Animated dots
  loadingTimer++;
  ctx.fillStyle='#00BFFF'; ctx.font='bold 36px system-ui'; ctx.textAlign='center';
  ctx.fillText('BOUNCE BOT', W/2, H/2-30);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='16px system-ui';
  const dots = '.'.repeat(Math.floor(loadingTimer/20)%4);
  ctx.fillText('Loading'+dots, W/2, H/2+20);

  // Animated circle
  ctx.strokeStyle='#00BFFF'; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.arc(W/2, H/2+60, 15, loadingTimer*0.05, loadingTimer*0.05+Math.PI*1.5);
  ctx.stroke();

  // Auto transition after 1.5 seconds
  if(loadingTimer > 90 && !loadingDone) {
    loadingDone = true;
    state = STATE.MENU;
  }
}

function drawMenu() {
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#050510'); grd.addColorStop(0.5,'#0d0d2b'); grd.addColorStop(1,'#1a1a3e');

  for(let i=0;i<20;i++) {
    const px = (W*0.5+Math.sin(t+i*0.7)*W*0.4);

function drawWin() {

  ctx.fillText('LEVEL COMPLETE!', W/2, H/2-50);
  ctx.fillStyle='#fff'; ctx.font='20px system-ui';
  const starsEarned = level ? level.stars.filter(s=>s.collected).length : 0;
  ctx.fillText(`★ ${starsEarned}/${level?level.stars.length:0}   ◆ ${level?level.cores.filter(c=>c.collected).length:0}/${level?level.cores.length:0}`, W/2, H/2-15);
  ctx.fillStyle='#ffd700'; ctx.font='16px system-ui';
  ctx.fillText(`Score: ${score}`, W/2, H/2+10);
  for(const b of buttons) drawButton(b,'#4ade80');
}

function drawPaused() {
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.font='bold 28px system-ui'; ctx.textAlign='center';
  ctx.fillText('PAUSED', W/2, H/2-80);
  for(const b of buttons) drawButton(b,'#00BFFF');
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime=0;
function loop(time) {
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  ctx.save();

  // Screen shake
  if(shakeTimer>0) ctx.translate(shakeX,shakeY);

  switch(state) {
    case STATE.LOADING: drawLoading(); break;
    case STATE.MENU: drawMenu(); break;
    case STATE.ACHIEVEMENTS: drawAchievements(); break;
    case STATE.SETTINGS:
      drawSettings();
      // Volume slider interaction
      break;
    case STATE.PLAYING:
      updateGame();
      if(level) {
        const zi = Math.min(Math.floor((currentLevel-1)/6),4);
        drawBackground(level.zone, zi);
        drawLevel(); drawPlayer(); drawParticles(); drawScorePopups(); drawHUD();
        if(infiniteMode) { ctx.fillStyle='#fff'; ctx.font='bold 16px system-ui'; ctx.textAlign='center'; ctx.fillText(`Infinite Score: ${infiniteScore}`,W/2,85); }
      }
      break;
    case STATE.DEAD:
      if(level) {
        const zi = Math.min(Math.floor((currentLevel-1)/6),4);
        drawBackground(level.zone, zi);
        drawLevel(); drawParticles();
      }
      drawDead(); break;
    case STATE.WIN:
      if(level) {
        const zi = Math.min(Math.floor((currentLevel-1)/6),4);
        drawBackground(level.zone, zi);
        drawLevel();
        player.winTimer--; player.rotation+=0.12;
        drawPlayer(); drawParticles();
      }
      drawWin(); break;
    case STATE.PAUSED:
      if(level) {
        const zi = Math.min(Math.floor((currentLevel-1)/6),4);
        drawBackground(level.zone, zi);
        drawLevel(); drawPlayer();
      }
      drawPaused(); break;
  }

  ctx.restore();

  // Screen flash (red on death)
  if(screenFlash>0) {
    ctx.fillStyle=`rgba(255,0,0,${screenFlash/10})`;
    ctx.fillRect(0,0,W,H);
    screenFlash--;
  }

  updateParticles();
  updateScorePopups();
}

requestAnimationFrame(loop);

// Settings volume slider click handler
canvas.addEventListener('click', e => {
  if(state!==STATE.SETTINGS) return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  if(mx>=W/2-80 && mx<=W/2+80 && my>=235 && my<=260) {
    musicVolume = Math.max(0,Math.min(1,(mx-(W/2-80))/160));
    BGM.setVolume(musicVolume);
    saveGame();
  }
});
</script>

// Splash dismiss
(function(){
  var ss=document.getElementById('splash-screen');
  if(!ss)return;
  function dismiss(){ss.classList.add('fade-out');setTimeout(function(){ss.remove()},600);}
  ss.addEventListener('click',dismiss);
  ss.addEventListener('touchstart',dismiss,{passive:true});
  document.addEventListener('keydown',function e(){dismiss();document.removeEventListener('keydown',e);});
  setTimeout(dismiss,8000);
})();
</script>
