const SAVE_VERSION = 1;
const SAVE_KEY = 'happyGlassSave';
let saveData = {version:SAVE_VERSION,levels:{},totalStars:0,hints:5,music:true,sfx:true,volume:0.7};

function loadSave(){
  try{
    const d=localStorage.getItem(SAVE_KEY);
    if(d){const p=JSON.parse(d);if(p.version===SAVE_VERSION){saveData=p;return}}
  }catch(e){}
  saveData={version:SAVE_VERSION,levels:{},totalStars:0,hints:5,music:true,sfx:true,volume:0.7};
}
function writeSave(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(saveData))}catch(e){}
}
function getLevelStars(n){return saveData.levels[n]?saveData.levels[n].stars:0}
function isLevelUnlocked(n){if(n<=1)return true;return getLevelStars(n-1)>0}
function setLevelResult(n,stars){
  if(!saveData.levels[n]||saveData.levels[n].stars<stars){
    const old=saveData.levels[n]?saveData.levels[n].stars:0;
    saveData.levels[n]={stars};
    saveData.totalStars+=stars-old;
    writeSave();
  }
}

let audioCtx=null;
let masterGain=null;
let musicGain=null;
let sfxGain=null;
let bgmInterval=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=saveData.volume;
  masterGain.connect(audioCtx.destination);
  musicGain=audioCtx.createGain();
  musicGain.gain.value=saveData.music?0.12:0;
  musicGain.connect(masterGain);
  sfxGain=audioCtx.createGain();
  sfxGain.gain.value=saveData.sfx?0.3:0;
  sfxGain.connect(masterGain);
}

function resumeAudio(){
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
}

function playNote(freq,dur,type='sine',gainNode=sfxGain,vol=0.3){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(gainNode);
  o.start();o.stop(audioCtx.currentTime+dur+0.01);
}

const BGM_NOTES=[60,64,67,69,67,64,60,62,64,67,72,69,67,64,60,62];
let bgmIdx=0;
function startBGM(){
  if(bgmInterval)return;
  bgmIdx=0;
  bgmInterval=setInterval(()=>{
    if(!audioCtx||!saveData.music)return;
    const midi=BGM_NOTES[bgmIdx%BGM_NOTES.length];
    const freq=440*Math.pow(2,(midi-69)/12);
    playNote(freq,0.45,'sine',musicGain,0.5);
    if(bgmIdx%2===0){
      const bass=440*Math.pow(2,(midi-24-69)/12);
      playNote(bass,0.6,'triangle',musicGain,0.3);
    }
    bgmIdx++;
  },420);
}
function stopBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null}}

function sfx(name){
  if(!audioCtx||!saveData.sfx)return;
  resumeAudio();
  const t=audioCtx.currentTime;
  switch(name){
    case'drip':playNote(800,0.08);break;
    case'splash':{const n=audioCtx.createBufferSource();const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.12,audioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3));n.buffer=buf;const g=audioCtx.createGain();g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);n.connect(g);g.connect(sfxGain);n.start()}break;
    case'draw':playNote(500,0.04,'sine',sfxGain,0.1);break;
    case'ding':playNote(880,0.3,'sine',sfxGain,0.4);setTimeout(()=>playNote(1100,0.25,'sine',sfxGain,0.3),120);break;
    case'star':playNote(660,0.15);setTimeout(()=>playNote(880,0.15),80);setTimeout(()=>playNote(1100,0.2),160);break;
    case'win':{const ns=[523,659,784,1047];ns.forEach((f,i)=>setTimeout(()=>playNote(f,0.3,'sine',sfxGain,0.4),i*100))}break;
    case'click':playNote(600,0.03,'square',sfxGain,0.08);break;
    case'pour':playNote(300+Math.random()*200,0.06,'sine',sfxGain,0.05);break;
  }
}

function screenToGame(sx,sy){return{x:(sx-offX)/scale,y:(sy-offY)/scale}}
function gameToScreen(gx,gy){return{x:gx*scale+offX,y:gy*scale+offY}}

// ============================================================
// GLASS HELPERS
// ============================================================
function glassVerts(g){
  const tl={x:g.cx-g.tw/2,y:g.cy},tr={x:g.cx+g.tw/2,y:g.cy};
  const bl={x:g.cx-g.bw/2,y:g.cy+g.h},br={x:g.cx+g.bw/2,y:g.cy+g.h};
  return[tl,tr,br,bl];
}
function pointInTrapezoid(px,py,g){
  const v=glassVerts(g);
  const edges=[[v[0],v[1]],[v[1],v[2]],[v[2],v[3]],[v[3],v[0]]];
  let inside=true;
  for(const[a,b]of edges){
    const cross=(b.x-a.x)*(py-a.y)-(b.y-a.y)*(px-a.x);
    if(cross>0){inside=false;break}
  }
  return inside;
}

// ============================================================
// PHYSICS
// ============================================================
function ptSegDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1;
  const len2=dx*dx+dy*dy;
  if(len2<0.001)return{dist:Math.hypot(px-x1,py-y1),cx:x1,cy:y1};
  let t=((px-x1)*dx+(py-y1)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  const cx=x1+t*dx,cy=y1+t*dy;
  return{dist:Math.hypot(px-cx,py-cy),cx,cy};
}

function getAllSegments(){
  const segs=[];
  // Drawn lines
  for(const line of drawnLines){
    for(let i=0;i<line.length-1;i++){
      segs.push({x1:line[i].x,y1:line[i].y,x2:line[i+1].x,y2:line[i+1].y});
    }
  }
  // Obstacles (rects -> 4 segments each)
  if(level){
    for(const o of level.obs){
      segs.push({x1:o.x,y1:o.y,x2:o.x+o.w,y2:o.y});
      segs.push({x1:o.x+o.w,y1:o.y,x2:o.x+o.w,y2:o.y+o.h});
      segs.push({x1:o.x+o.w,y1:o.y+o.h,x2:o.x,y2:o.y+o.h});
      segs.push({x1:o.x,y1:o.y+o.h,x2:o.x,y2:o.y});
    }
    // Glass walls
    const v=glassVerts(level.glass);
    segs.push({x1:v[3].x,y1:v[3].y,x2:v[0].x,y2:v[0].y}); // left
    segs.push({x1:v[3].x,y1:v[3].y,x2:v[2].x,y2:v[2].y}); // bottom
    segs.push({x1:v[2].x,y1:v[2].y,x2:v[1].x,y2:v[1].y}); // right
  }
  return segs;
}

function updatePhysics(dt){
  if(!level)return;
  const segs=getAllSegments();
  const pr=PARTICLE_R;
  const cr=pr+LINE_R;
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    if(!p.active)continue;
    // Gravity
    p.vy+=GRAVITY*dt;
    // Clamp speed
    const spd=Math.hypot(p.vx,p.vy);
    if(spd>MAX_SPEED){const f=MAX_SPEED/spd;p.vx*=f;p.vy*=f}
    // Move
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    // Collision with segments
    for(const s of segs){
      const r=ptSegDist(p.x,p.y,s.x1,s.y1,s.x2,s.y2);
      if(r.dist<cr&&r.dist>0.01){
        const nx=(p.x-r.cx)/r.dist;
        const ny=(p.y-r.cy)/r.dist;
        const overlap=cr-r.dist;
        p.x+=nx*overlap;
        p.y+=ny*overlap;
        const dot=p.vx*nx+p.vy*ny;
        if(dot<0){
          p.vx-=(1+DAMPING)*dot*nx;
          p.vy-=(1+DAMPING)*dot*ny;
          // Friction
          const tx=-ny,ty=nx;
          const td=p.vx*tx+p.vy*ty;
          p.vx-=td*(1-FRICTION);
          p.vy-=td*(1-FRICTION);
        }
      }
    }
    // Boundaries
    if(p.x<pr){p.x=pr;p.vx=Math.abs(p.vx)*DAMPING}
    if(p.x>GW-pr){p.x=GW-pr;p.vx=-Math.abs(p.vx)*DAMPING}
    if(p.y>GH-pr){p.y=GH-pr;p.vy=-Math.abs(p.vy)*DAMPING;p.vx*=0.95}
    if(p.y<0){p.y=0;p.vy=Math.abs(p.vy)*DAMPING}
    // Glass check
    p.inGlass=pointInTrapezoid(p.x,p.y,level.glass);
  }
  // Fill level
  let inG=0;
  for(const p of particles)if(p.active&&p.inGlass)inG++;
  fillLevel=Math.min(inG/GLASS_CAPACITY,1);
}

// PARTICLE SPAWNING
// ============================================================
function spawnParticle(){
  for(let i=0;i<particles.length;i++){
    if(!particles[i].active){
      const p=particles[i];
      p.x=level.faucet.x+(Math.random()-0.5)*8;
      p.y=level.faucet.y+30;
      p.vx=(Math.random()-0.5)*20;
      p.vy=30+Math.random()*20;
      p.active=true;
      p.inGlass=false;
      return true;
    }
  }
  return false;
}

function initParticles(){
  particles=[];
  for(let i=0;i<MAX_PARTICLES;i++){
    particles.push({x:0,y:0,vx:0,vy:0,active:false,inGlass:false});
  }
}

// RENDERING
// ============================================================
function render(){
  ctx.clearRect(0,0,cW,cH);
  if(gameState==='MENU'||gameState==='LEVELS'){
    // Background only
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(0,0,cW,cH);
    return;
  }
  ctx.save();
  ctx.translate(offX,offY);
  ctx.scale(scale,scale);

  // Background
  const bgGrad=ctx.createLinearGradient(0,0,0,GH);
  bgGrad.addColorStop(0,'#1a1a2e');
  bgGrad.addColorStop(1,'#16213e');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,GW,GH);

  if(level){
    // Obstacles
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.strokeStyle='rgba(255,255,255,0.2)';
    ctx.lineWidth=2;
    for(const o of level.obs){
      ctx.beginPath();
      ctx.rect(o.x,o.y,o.w,o.h);
      ctx.fill();ctx.stroke();
    }

    // Hint
    if(showingHint&&level.hint){
      ctx.save();
      ctx.setLineDash([6,6]);
      ctx.strokeStyle='rgba(255,217,61,0.4)';
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(level.hint[0].x,level.hint[0].y);
      for(let i=1;i<level.hint.length;i++)ctx.lineTo(level.hint[i].x,level.hint[i].y);
      ctx.stroke();
      ctx.restore();
    }

    // Drawn lines
    ctx.save();
    ctx.strokeStyle='rgba(0,210,255,0.9)';
    ctx.lineWidth=5;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.shadowColor='rgba(0,210,255,0.5)';ctx.shadowBlur=10;
    for(const line of drawnLines){
      if(line.length<2)continue;
      ctx.beginPath();
      ctx.moveTo(line[0].x,line[0].y);
      for(let i=1;i<line.length;i++)ctx.lineTo(line[i].x,line[i].y);
      ctx.stroke();
    }
    // Current stroke
    if(currentStroke.length>1){
      ctx.beginPath();
      ctx.moveTo(currentStroke[0].x,currentStroke[0].y);
      for(let i=1;i<currentStroke.length;i++)ctx.lineTo(currentStroke[i].x,currentStroke[i].y);
      ctx.stroke();
    }
    ctx.restore();

    // Faucet
    drawFaucet();

    // Water particles
    drawWater();

    // Glass
    drawGlass();
  }

  ctx.restore();
}

function drawFaucet(){
  const fx=level.faucet.x,fy=level.faucet.y;
  ctx.fillStyle='#4a4a6a';
  ctx.fillRect(fx-20,fy-10,40,20);
  ctx.fillStyle='#5a5a7a';
  ctx.fillRect(fx-8,fy+10,16,20);
  // Pipe highlight
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(fx-18,fy-8,36,4);
  // Drip animation when simulating
  if(gameState==='SIMULATING'){
    const drip=(Date.now()%500)/500;
    ctx.fillStyle='rgba(0,180,255,0.6)';
    ctx.beginPath();
    ctx.arc(fx,fy+30+drip*15,3,0,Math.PI*2);
    ctx.fill();
  }
}

function drawWater(){
  ctx.save();
  for(const p of particles){
    if(!p.active)continue;
    const grad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,PARTICLE_R+1);
    grad.addColorStop(0,'rgba(80,200,255,0.9)');
    grad.addColorStop(0.6,'rgba(30,140,255,0.7)');
    grad.addColorStop(1,'rgba(0,100,220,0.0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(p.x,p.y,PARTICLE_R+1,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawGlass(){
  const g=level.glass;
  const v=glassVerts(g);
  glassAnimT+=0.02;

  // Glass fill water level
  if(fillLevel>0){
    const fillH=fillLevel*g.h;
    const fillY=g.cy+g.h-fillH;
    const topRatio=1-(fillY-g.cy)/g.h;
    const lw=g.bw+(g.tw-g.bw)*topRatio;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(g.cx-lw/2,fillY);
    ctx.lineTo(g.cx+lw/2,fillY);
    ctx.lineTo(v[2].x,v[2].y);
    ctx.lineTo(v[3].x,v[3].y);
    ctx.closePath();
    const wGrad=ctx.createLinearGradient(0,fillY,0,g.cy+g.h);
    wGrad.addColorStop(0,'rgba(0,180,255,0.4)');
    wGrad.addColorStop(1,'rgba(0,120,220,0.6)');
    ctx.fillStyle=wGrad;
    ctx.fill();
    ctx.restore();
  }

  // Glass outline
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=3;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(v[0].x,v[0].y);
  ctx.lineTo(v[3].x,v[3].y);
  ctx.lineTo(v[2].x,v[2].y);
  ctx.lineTo(v[1].x,v[1].y);
  ctx.stroke();
  // Glass shine
  ctx.strokeStyle='rgba(255,255,255,0.12)';
  ctx.lineWidth=8;
  ctx.beginPath();
  ctx.moveTo(v[0].x+4,v[0].y+10);
  ctx.lineTo(v[3].x+4,v[3].y-10);
  ctx.stroke();
  ctx.restore();

  // Face
  drawFace(g);
}

function drawFace(g){
  const cx=g.cx,cy=g.cy+g.h*0.38;
  const eyeSpread=g.tw*0.17;
  const eyeY=cy-6;

  // Eyes
  const blinkCycle=Math.sin(glassAnimT*0.8);
  const eyeH=blinkCycle>0.95?1:5;
  ctx.fillStyle='#2a2a4a';
  // Left eye
  ctx.beginPath();
  ctx.ellipse(cx-eyeSpread,eyeY,4,eyeH,0,0,Math.PI*2);
  ctx.fill();
  // Right eye
  ctx.beginPath();
  ctx.ellipse(cx+eyeSpread,eyeY,4,eyeH,0,0,Math.PI*2);
  ctx.fill();
  // Eye highlights
  if(eyeH>2){
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath();ctx.arc(cx-eyeSpread+1.5,eyeY-1.5,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+eyeSpread+1.5,eyeY-1.5,1.5,0,Math.PI*2);ctx.fill();
  }

  // Mouth
  const mouthY=cy+10;
  const mouthW=g.tw*0.12;
  ctx.strokeStyle='#2a2a4a';
  ctx.lineWidth=2.5;
  ctx.lineCap='round';
  ctx.beginPath();
  if(fillLevel>0.6){
    // Happy
    ctx.arc(cx,mouthY-3,mouthW,0.15*Math.PI,0.85*Math.PI);
  }else if(fillLevel>0.2){
    // Neutral
    ctx.moveTo(cx-mouthW,mouthY);
    ctx.quadraticCurveTo(cx,mouthY+3,cx+mouthW,mouthY);
  }else{
    // Sad
    ctx.arc(cx,mouthY+8,mouthW,1.15*Math.PI,1.85*Math.PI);
  }
  ctx.stroke();

  // Blush when happy
  if(fillLevel>0.5){
    ctx.fillStyle='rgba(255,107,157,0.25)';
    ctx.beginPath();ctx.ellipse(cx-eyeSpread-5,mouthY-4,6,4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+eyeSpread+5,mouthY-4,6,4,0,0,Math.PI*2);ctx.fill();
  }
}

// ============================================================
// CONFETTI
// ============================================================
function spawnConfetti(){
  confettiParticles=[];
  for(let i=0;i<50;i++){
    confettiParticles.push({
      x:cW/2+(Math.random()-0.5)*200,
      y:cH/2-100,
      vx:(Math.random()-0.5)*8,
      vy:-Math.random()*10-5,
      color:['#00d2ff','#ff6b9d','#ffd93d','#4ade80','#a78bfa'][Math.floor(Math.random()*5)],
      size:Math.random()*6+3,
      life:1
    });
  }
}
function updateConfetti(dt){
  for(let i=confettiParticles.length-1;i>=0;i--){
    const c=confettiParticles[i];
    c.x+=c.vx;c.y+=c.vy;c.vy+=0.3;c.life-=dt*0.8;
    if(c.life<=0)confettiParticles.splice(i,1);
  }
}
function drawConfetti(){
  for(const c of confettiParticles){
    ctx.globalAlpha=c.life;
    ctx.fillStyle=c.color;
    ctx.fillRect(c.x-c.size/2,c.y-c.size/2,c.size,c.size*0.6);
  }
  ctx.globalAlpha=1;
}

// ============================================================
// INPUT HANDLING
// ============================================================
let pointerDown=false;

canvas.addEventListener('pointerdown',e=>{
  if(gameState!=='DRAWING')return;
  initAudio();resumeAudio();
  pointerDown=true;
  isDrawing=true;
  const pos=screenToGame(e.clientX,e.clientY);
  // Check within game bounds
  if(pos.x<0||pos.x>GW||pos.y<0||pos.y>GH){isDrawing=false;return}
  currentStroke=[pos];
  sfx('draw');
});

canvas.addEventListener('pointermove',e=>{
  if(!isDrawing||gameState!=='DRAWING')return;
  const pos=screenToGame(e.clientX,e.clientY);
  // Clamp to game bounds
  pos.x=Math.max(0,Math.min(GW,pos.x));
  pos.y=Math.max(0,Math.min(GH,pos.y));
  const last=currentStroke[currentStroke.length-1];
  const dist=Math.hypot(pos.x-last.x,pos.y-last.y);
  if(dist>3){
    if(inkUsed+dist<=level.inkLimit){
      currentStroke.push(pos);
      inkUsed+=dist;
      updateInkBar();
    }
  }
});

canvas.addEventListener('pointerup',e=>{
  if(!isDrawing)return;
  isDrawing=false;pointerDown=false;
  if(currentStroke.length>1){
    drawnLines.push([...currentStroke]);
  }
  currentStroke=[];
});

canvas.addEventListener('pointercancel',e=>{
  isDrawing=false;pointerDown=false;
  if(currentStroke.length>1)drawnLines.push([...currentStroke]);
  currentStroke=[];
});

// Prevent default touch behaviors
canvas.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

// ============================================================
// UI MANAGEMENT
// ============================================================
const $=id=>document.getElementById(id);

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('game-hud').classList.remove('active');
  $('overlay-win').classList.remove('active');
  $('overlay-tutorial').classList.remove('active');
  if(name==='menu'){$('screen-menu').classList.add('active');gameState='MENU';stopBGM();startBGM()}
  else if(name==='levels'){$('screen-levels').classList.add('active');gameState='LEVELS';buildLevelGrid()}
  else if(name==='game'){$('game-hud').classList.add('active');gameState='DRAWING'}
  else if(name==='settings'){$('screen-settings').classList.add('active')}
}

function buildLevelGrid(){
  const grid=$('levels-grid');
  grid.innerHTML='';
  for(let i=1;i<=LEVELS.length;i++){
    const btn=document.createElement('div');
    btn.className='level-btn';
    const unlocked=isLevelUnlocked(i);
    const stars=getLevelStars(i);
    if(!unlocked)btn.classList.add('locked');
    if(stars>0)btn.classList.add('completed');
    btn.innerHTML=`<span class="lnum">${i}</span><span class="lstars">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</span>`;
    if(unlocked){
      btn.addEventListener('click',()=>{
        initAudio();resumeAudio();sfx('click');
        startLevel(i-1);
      });
    }
    grid.appendChild(btn);
  }
}

function startLevel(idx){
  currentLevel=idx;
  level=LEVELS[idx];
  drawnLines=[];currentStroke=[];
  inkUsed=0;fillLevel=0;showingHint=false;
  spawnTimer=0;spawnedCount=0;simTime=0;
  settled=false;prevFillCheck=0;prevFillLevel=0;
  confettiParticles=[];
  initParticles();
  $('level-label').textContent='Level '+(idx+1);
  updateInkBar();
  $('btn-play-game').classList.remove('reset');
  $('btn-play-game').innerHTML='&#x25B6;';
  showScreen('game');
  // Tutorial
  if(level.tutorial){
    $('tutorial-text').textContent=level.tutorial;
    $('overlay-tutorial').classList.add('active');
    setTimeout(()=>$('overlay-tutorial').classList.remove('active'),3500);
  }
}

function updateInkBar(){
  if(!level)return;
  const pct=Math.max(0,1-inkUsed/level.inkLimit)*100;
  $('ink-fill').style.width=pct+'%';
}

function triggerWin(){
  gameState='WIN';
  sfx('win');
  // Calculate stars
  let stars=1;
  if(inkUsed<=level.stars[0])stars=3;
  else if(inkUsed<=level.stars[1])stars=2;
  setLevelResult(currentLevel+1,stars);
  // Show win overlay
  $('win-title').textContent=stars===3?'Perfect!':stars===2?'Great Job!':'Level Complete!';
  let starsHTML='';
  for(let i=0;i<3;i++){
    starsHTML+=`<span class="star ${i<stars?'earned':'empty'}">${i<stars?'★':'☆'}</span>`;
  }
  $('win-stars').innerHTML=starsHTML;
  // Animate stars
  setTimeout(()=>{
    const starEls=$('win-stars').querySelectorAll('.star.earned');
    starEls.forEach((s,i)=>{
      setTimeout(()=>{s.style.transform='scale(1.3)';sfx('star');setTimeout(()=>s.style.transform='scale(1)',150)},i*200);
    });
  },300);
  spawnConfetti();
  setTimeout(()=>$('overlay-win').classList.add('active'),600);
}

// ============================================================
// BUTTON HANDLERS
// ============================================================
$('btn-play').addEventListener('click',()=>{initAudio();resumeAudio();sfx('click');showScreen('levels')});
$('btn-settings-menu').addEventListener('click',()=>{sfx('click');showScreen('settings')});
$('btn-back-levels').addEventListener('click',()=>{sfx('click');showScreen('menu')});
$('btn-settings-levels').addEventListener('click',()=>{sfx('click');showScreen('settings')});
$('btn-back-game').addEventListener('click',()=>{sfx('click');stopBGM();startBGM();showScreen('levels')});
$('btn-settings-game').addEventListener('click',()=>{sfx('click');showScreen('settings')});
$('btn-close-settings').addEventListener('click',()=>{sfx('click');showScreen(lastScreen||'menu')});

let lastScreen='menu';
const origShowScreen=showScreen;
showScreen=function(name){
  if(name==='settings'&&gameState!=='MENU'&&gameState!=='LEVELS'){
    lastScreen='game';
  }else if(gameState!=='MENU'&&gameState!=='LEVELS'&&name!=='settings'){
    lastScreen='levels';
  }else{
    lastScreen=name==='settings'?(gameState==='MENU'?'menu':'levels'):name;
  }
  origShowScreen(name);
};

$('btn-play-game').addEventListener('click',()=>{
  initAudio();resumeAudio();
  if(gameState==='DRAWING'){
    // Start simulation
    gameState='SIMULATING';
    sfx('click');
    $('btn-play-game').classList.add('reset');
    $('btn-play-game').innerHTML='&#x21BA;';
    $('btn-play-game').title='Reset';
  }else if(gameState==='SIMULATING'){
    // Reset
    resetLevel();
  }
});

$('btn-hint').addEventListener('click',()=>{
  initAudio();resumeAudio();
  if(gameState!=='DRAWING')return;
  if(saveData.hints>0){
    saveData.hints--;
    writeSave();
    showingHint=true;
    sfx('star');
    setTimeout(()=>showingHint=false,3000);
  }else{
    $('tutorial-text').textContent='No hints remaining!';
    $('overlay-tutorial').classList.add('active');
    setTimeout(()=>$('overlay-tutorial').classList.remove('active'),2000);
  }
});

$('btn-retry').addEventListener('click',()=>{sfx('click');$('overlay-win').classList.remove('active');resetLevel()});
$('btn-next').addEventListener('click',()=>{
  sfx('click');
  $('overlay-win').classList.remove('active');
  if(currentLevel+1<LEVELS.length){
    startLevel(currentLevel+1);
  }else{
    showScreen('levels');
  }
});

function resetLevel(){
  drawnLines=[];currentStroke=[];
  inkUsed=0;fillLevel=0;showingHint=false;
  spawnTimer=0;spawnedCount=0;simTime=0;
  settled=false;prevFillCheck=0;prevFillLevel=0;
  confettiParticles=[];
  initParticles();
  gameState='DRAWING';
  updateInkBar();
  $('btn-play-game').classList.remove('reset');
  $('btn-play-game').innerHTML='&#x25B6;';
  $('btn-play-game').title='Play';
}

// Settings toggles
$('toggle-music').addEventListener('click',function(){
  this.classList.toggle('on');
  saveData.music=this.classList.contains('on');
  if(musicGain)musicGain.gain.value=saveData.music?0.12:0;
  if(saveData.music)startBGM();else stopBGM();
  writeSave();
});
$('toggle-sfx').addEventListener('click',function(){
  this.classList.toggle('on');
  saveData.sfx=this.classList.contains('on');
  if(sfxGain)sfxGain.gain.value=saveData.sfx?0.3:0;
  writeSave();
});
$('volume-slider').addEventListener('input',function(){
  saveData.volume=this.value/100;
  if(masterGain)masterGain.gain.value=saveData.volume;
  writeSave();
});


// ============================================================
// CLEANUP
// ============================================================
function cleanup(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}
  particles.length=0;
  drawnLines.length=0;
  confetti.length=0;
  spawnedCount=0;
  simTime=0;
  fillLevel=0;
  settled=false;
  gameState='DRAWING';
  lastTime=null;
  spawnTimer=0;
}
window.addEventListener('beforeunload',cleanup);

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp){
  animFrame=requestAnimationFrame(gameLoop);
  if(!lastTime)lastTime=timestamp;
  let dt=(timestamp-lastTime)/1000;
  lastTime=timestamp;
  // Clamp dt
  if(dt>0.05)dt=0.05;

  if(gameState==='SIMULATING'){
    // Spawn particles
    spawnTimer+=dt;
    const spawnInterval=1/SPAWN_RATE;
    while(spawnTimer>=spawnInterval&&spawnedCount<MAX_PARTICLES){
      spawnParticle();
      spawnedCount++;
      spawnTimer-=spawnInterval;
      if(spawnedCount%5===0)sfx('pour');
    }
    simTime+=dt;
    // Physics substeps
    const steps=3;
    const subDt=dt/steps;
    for(let s=0;s<steps;s++)updatePhysics(subDt);
    // Check win
    if(fillLevel>=WIN_FILL&&!settled){
      settled=true;
      triggerWin();
    }
    // Check if settled (failed)
    if(spawnedCount>=MAX_PARTICLES&&simTime>3&&!settled){
      simTime+=0; // just let it run
      if(simTime>10&&fillLevel<WIN_FILL){
        // Show subtle prompt
      }
    }
  }

  // Confetti
  if(confettiParticles.length>0)updateConfetti(dt);

  render();

  // Draw confetti on screen coords
  if(confettiParticles.length>0)drawConfetti();
}

// ============================================================
// INITIALIZATION
// ============================================================
function init(){
  loadSave();
  resize();
  window.addEventListener('resize',resize);
  // Restore settings UI
  $('toggle-music').classList.toggle('on',saveData.music);
  $('toggle-sfx').classList.toggle('on',saveData.sfx);
  $('volume-slider').value=saveData.volume*100;
  initParticles();
  // Start loop
  animFrame=requestAnimationFrame(gameLoop);
  showScreen('menu');
  // Auto-init audio on first interaction
  document.addEventListener('click',()=>{initAudio();resumeAudio();startBGM()},{once:true});
  document.addEventListener('touchstart',()=>{initAudio();resumeAudio();startBGM()},{once:true});
}

init();
