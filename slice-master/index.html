        var settings = {

        };

        function initCanvas() {
            var w = window.innerWidth;
            var h = window.innerHeight;
            var scale = Math.min(w / 800, h / 720);
            canvas.width = 800 * scale;
            canvas.height = 720 * scale;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.3;
            masterGain.connect(audioCtx.destination);
        }

        function playSliceSound(pitch) {
            if (!settings.sfx || !audioCtx) return;
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            var filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 800 + pitch * 200;
            osc.type = 'sawtooth';
            osc.frequency.value = 200 + pitch * 100;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialDecayTo = function(val, time) {
                gain.gain.exponentialRampToValueAtTime(Math.max(val, 0.001), time);
            };
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playCompleteSound() {
            if (!settings.sfx || !audioCtx) return;
            var notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach(function(freq, i) {
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
                gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + i * 0.1 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.1 + 0.4);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.4);
            });
        }

        function playClickSound() {
            if (!settings.sfx || !audioCtx) return;
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function startMusic() {
            if (!settings.music || !audioCtx || musicOsc) return;
            musicGain = audioCtx.createGain();
            musicGain.gain.value = 0.08;
            musicGain.connect(masterGain);
            var lfo = audioCtx.createOscillator();
            var lfoGain = audioCtx.createGain();
            lfo.frequency.value = 0.5;
            lfoGain.gain.value = 20;
            lfo.connect(lfoGain);
            lfoGain.connect(musicGain.gain);
            lfo.start();
            timers.push({ type: 'interval', id: setInterval(function() {
                if (!settings.music || !musicGain) return;
                var notes = [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94];
                var note = notes[Math.floor(Math.random() * notes.length)];
                var osc = audioCtx.createOscillator();
                var env = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = note;
                env.gain.setValueAtTime(0, audioCtx.currentTime);
                env.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
                env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
                osc.connect(env);
                env.connect(musicGain);
                osc.start();
                osc.stop(audioCtx.currentTime + 2);
            }, 2000) });
        }

        function stopMusic() {
            if (musicGain) {
                musicGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                setTimeout(function() {
                    if (musicGain) {
                        musicGain.disconnect();
                        musicGain = null;
                    }
                }, 500);
            }
        }

        function loadSettings() {
            try {
                var data = localStorage.getItem('sliceMaster_v1');
                if (data) {
                    var parsed = JSON.parse(data);
                    if (parsed.v === 1) {
                        settings.save = parsed;
                        settings.hints = parsed.hints || 3;
                    }
                }
            } catch (e) {}
        }

        function saveSettings() {
            try {
                settings.save.v = 1;
                settings.save.hints = settings.hints;
                localStorage.setItem('sliceMaster_v1', JSON.stringify(settings.save));
            } catch (e) {}
        }

        function showScreen(screenId) {
            var screens = ['menuScreen', 'levelSelectScreen', 'settingsScreen', 'gameScreen'];
            screens.forEach(function(id) {
                document.getElementById(id).classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'gameScreen') {
                gameState.screen = 'game';
            } else if (screenId === 'menuScreen') {
                gameState.screen = 'menu';
            } else if (screenId === 'levelSelectScreen') {
                gameState.screen = 'levelSelect';
            } else if (screenId === 'settingsScreen') {
                gameState.screen = 'settings';
            }
        }

        function buildLevelGrid() {
            var grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            var currentChapter = 0;
            var unlockedUntil = settings.save.level || 0;
            for (var i = 0; i < LEVELS.length; i++) {
                var lvl = LEVELS[i];
                if (lvl.chapter !== currentChapter) {
                    currentChapter = lvl.chapter;
                    var header = document.createElement('div');
                    header.className = 'chapter-header';
                    header.innerHTML = '<span class="chapter-num">CHAPTER ' + currentChapter + '</span><span class="chapter-name">' + CHAPTER_NAMES[currentChapter] + '</span>';
                    grid.appendChild(header);
                }
                var btn = document.createElement('button');
                btn.className = 'level-btn';
                var stars = settings.save.stars[i] || 0;
                var unlocked = i <= unlockedUntil;
                if (!unlocked) {
                    btn.classList.add('locked');
                } else if (stars > 0) {
                    btn.classList.add('completed');
                }
                btn.innerHTML = '<span>' + (i + 1) + '</span>';
                if (unlocked) {
                    btn.innerHTML += '<span class="stars-display">' + getStarSymbols(stars) + '</span>';
                }
                (function(index) {
                    btn.addEventListener('click', function() {
                        if (index <= unlockedUntil) {
                            playClickSound();
                            startLevel(index);
                        }
                    });
                })(i);
                grid.appendChild(btn);
            }
        }

        function getStarSymbols(count) {
            var s = '';
            for (var i = 0; i < 3; i++) {
                s += i < count ? '\u2605' : '\u2606';
            }
            return s;
        }

        function startLevel(levelIndex) {
            gameState.currentLevel = levelIndex;
            gameState.shapes = [];
            gameState.obstacles = [];
            gameState.movingObstacles = [];
            gameState.particles = [];
            gameState.cutLines = [];
            gameState.cutStart = null;
            gameState.cutEnd = null;
            gameState.cutsRemaining = LEVELS[levelIndex].cuts;
            gameState.cutsUsed = 0;
            gameState.score = 0;
            gameState.levelScore = 0;
            gameState.isDrawing = false;
            gameState.completed = false;
            gameState.animatingPieces = [];
            gameState.undoStack = [];
            gameState.starAnimation = 0;

            var levelData = LEVELS[levelIndex];
            levelData.shapes.forEach(function(s) {
                gameState.shapes.push(createShape(s));
            });

            if (levelData.obstacles) {
                levelData.obstacles.forEach(function(o) {
                    gameState.obstacles.push({ x: o.x, y: o.y, w: o.w, h: o.h });
                });
            }

            if (levelData.movingObstacles) {
                levelData.movingObstacles.forEach(function(o) {
                    gameState.movingObstacles.push({
                        x: o.x, y: o.y, w: o.w, h: o.h,
                        baseX: o.x, range: o.range, speed: o.speed, phase: 0
                    });
                });
            }

            gameState.tutorialStep = levelIndex < 3 ? 0 : -1;
            updateHUD();
            showScreen('gameScreen');
            document.getElementById('completeOverlay').classList.remove('active');
            document.getElementById('tutorialOverlay').classList.remove('active');
        }

        function createShape(data) {
            var vertices = [];
            var color = getRandomColor();
            if (data.type === 'circle') {
                vertices = createCircleVertices(data.x, data.y, data.r);
            } else if (data.type === 'rect') {
                vertices = createRectVertices(data.x, data.y, data.w, data.h);
            } else if (data.type === 'triangle') {
                vertices = createPolygonVertices(data.x, data.y, data.r, 3);
            } else if (data.type === 'pentagon') {
                vertices = createPolygonVertices(data.x, data.y, data.r, 5);
            } else if (data.type === 'hexagon') {
                vertices = createPolygonVertices(data.x, data.y, data.r, 6);
            } else if (data.type === 'star') {
                vertices = createStarVertices(data.x, data.y, data.r);
            }
            return {
                type: data.type,
                x: data.x,
                y: data.y,
                r: data.r || 0,
                w: data.w || 0,
                h: data.h || 0,
                target: data.target,
                vertices: vertices,
                originalVertices: vertices.map(function(v) { return { x: v.x, y: v.y }; }),
                color: color,
                pieces: [{ vertices: vertices.map(function(v) { return { x: v.x, y: v.y }; }), parent: null }],
                velocity: { x: 0, y: 0 },
                angularVel: 0,
                rotation: 0,
                sliced: false
            };
        }

        function getRandomColor() {
            var colors = ['#00ffff', '#ff00ff', '#ffff00', '#00ff00', '#ff8800', '#ff0088'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function createCircleVertices(cx, cy, r) {
            var verts = [];
            var segments = 32;
            for (var i = 0; i < segments; i++) {
                var angle = (i / segments) * Math.PI * 2;
                verts.push({
                    x: cx + Math.cos(angle) * r,
                    y: cy + Math.sin(angle) * r
                });
            }
            return verts;
        }

        function createRectVertices(cx, cy, w, h) {
            return [
                { x: cx - w / 2, y: cy - h / 2 },
                { x: cx + w / 2, y: cy - h / 2 },
                { x: cx + w / 2, y: cy + h / 2 },
                { x: cx - w / 2, y: cy + h / 2 }
            ];
        }

        function createPolygonVertices(cx, cy, r, sides) {
            var verts = [];
            for (var i = 0; i < sides; i++) {
                var angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
                verts.push({
                    x: cx + Math.cos(angle) * r,
                    y: cy + Math.sin(angle) * r
                });
            }
            return verts;
        }

        function createStarVertices(cx, cy, r) {
            var verts = [];
            var points = 5;
            var inner = r * 0.4;
            for (var i = 0; i < points * 2; i++) {
                var radius = i % 2 === 0 ? r : inner;
                var angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
                verts.push({
                    x: cx + Math.cos(angle) * radius,
                    y: cy + Math.sin(angle) * radius
                });
            }
            return verts;
        }

        function lineIntersection(p1, p2, p3, p4) {
            var d = (p1.x - p2.x) * (p3.y - p4.y) - (p1.y - p2.y) * (p3.x - p4.x);
            if (Math.abs(d) < 0.0001) return null;
            var t = ((p1.x - p3.x) * (p3.y - p4.y) - (p1.y - p3.y) * (p3.x - p4.x)) / d;
            var u = -((p1.x - p2.x) * (p1.y - p3.y) - (p1.y - p2.y) * (p1.x - p3.x)) / d;
            if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
                return {
                    x: p1.x + t * (p2.x - p1.x),
                    y: p1.y + t * (p2.y - p1.y),
                    t: t
                };
            }
            return null;
        }

        function lineRectIntersection(p1, p2, rect) {
            var intersections = [];
            var edges = [
                [{ x: rect.x - rect.w / 2, y: rect.y - rect.h / 2 }, { x: rect.x + rect.w / 2, y: rect.y - rect.h / 2 }],
                [{ x: rect.x + rect.w / 2, y: rect.y - rect.h / 2 }, { x: rect.x + rect.w / 2, y: rect.y + rect.h / 2 }],
                [{ x: rect.x + rect.w / 2, y: rect.y + rect.h / 2 }, { x: rect.x - rect.w / 2, y: rect.y + rect.h / 2 }],
                [{ x: rect.x - rect.w / 2, y: rect.y + rect.h / 2 }, { x: rect.x - rect.w / 2, y: rect.y - rect.h / 2 }]
            ];
            edges.forEach(function(edge) {
                var inter = lineIntersection(p1, p2, edge[0], edge[1]);
                if (inter) intersections.push(inter);
            });
            return intersections;
        }

        function splitPolygon(vertices, p1, p2) {
            var intersections = [];
            for (var i = 0; i < vertices.length; i++) {
                var j = (i + 1) % vertices.length;
                var inter = lineIntersection(p1, p2, vertices[i], vertices[j]);
                if (inter) {
                    intersections.push({ point: inter, edgeIndex: i });
                }
            }
            if (intersections.length < 2) return [vertices];

            intersections.sort(function(a, b) { return a.point.t - b.point.t; });
            var int1 = intersections[0];
            var int2 = intersections[1];

            var poly1 = [];
            var poly2 = [];

            for (var k = 0; k <= int1.edgeIndex; k++) {
                poly1.push({ x: vertices[k].x, y: vertices[k].y });
            }
            poly1.push({ x: int1.point.x, y: int1.point.y });
            poly1.push({ x: int2.point.x, y: int2.point.y });
            for (var k = int2.edgeIndex + 1; k < vertices.length; k++) {
                poly1.push({ x: vertices[k].x, y: vertices[k].y });
            }

            for (var k = int1.edgeIndex + 1; k <= int2.edgeIndex; k++) {
                poly2.push({ x: vertices[k].x, y: vertices[k].y });
            }
            poly2.push({ x: int2.point.x, y: int2.point.y });
            poly2.push({ x: int1.point.x, y: int1.point.y });

            return [poly1, poly2];
        }

        function isPointInPolygon(point, vertices) {
            var inside = false;
            for (var i = 0, j = vertices.length - 1; i < vertices.length; j = i++) {
                var xi = vertices[i].x, yi = vertices[i].y;
                var xj = vertices[j].x, yj = vertices[j].y;
                if (((yi > point.y) !== (yj > point.y)) &&
                    (point.x < (xj - xi) * (point.y - yi) / (yj - yi) + xi)) {
                    inside = !inside;
                }
            }
            return inside;
        }

        function performCut(p1, p2) {
            var shapesHit = [];
            var cutLength = Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2);
            for (var i = 0; i < gameState.shapes.length; i++) {
                var shape = gameState.shapes[i];
                var shapeHit = false;
                for (var j = 0; j < shape.pieces.length; j++) {
                    var piece = shape.pieces[j];
                    var hasInter = false;
                    for (var k = 0; k < piece.vertices.length; k++) {
                        var m = (k + 1) % piece.vertices.length;
                        if (lineIntersection(p1, p2, piece.vertices[k], piece.vertices[m])) {
                            hasInter = true;
                            break;
                        }
                    }
                    if (hasInter && piece.vertices.length >= 3) {
                        var newPieces = splitPolygon(piece.vertices, p1, p2);
                        if (newPieces.length === 2) {
                            shapeHit = true;
                            shape.pieces.splice(j, 1);
                            shape.pieces.push({ vertices: newPieces[0], parent: shape, velocity: { x: 0, y: 0 }, angularVel: 0, rotation: 0 });
                            shape.pieces.push({ vertices: newPieces[1], parent: shape, velocity: { x: 0, y: 0 }, angularVel: 0, rotation: 0 });
                            j--;
                        }
                    }
                }
                if (shapeHit) {
                    shapesHit.push(shape);
                    shape.sliced = true;
                    spawnSliceParticles(p1, p2, shape.color);
                    gameState.screenShake = 8;
                    playSliceSound(cutLength / 100);
                }
            }
            if (shapesHit.length > 0) {
                gameState.comboCount = shapesHit.length;
            }
            return shapesHit;
        }

        function checkObstacleCollision(p1, p2) {
            var allObstacles = gameState.obstacles.concat(gameState.movingObstacles);
            for (var i = 0; i < allObstacles.length; i++) {
                var o = allObstacles[i];
                var intersections = lineRectIntersection(p1, p2, { x: o.x, y: o.y, w: o.w, h: o.h });
                if (intersections.length > 0) {
                    return true;
                }
            }
            return false;
        }

        function spawnSliceParticles(p1, p2, color) {
            var count = 15;
            var dx = p2.x - p1.x;
            var dy = p2.y - p1.y;
            var len = Math.sqrt(dx * dx + dy * dy);
            for (var i = 0; i < count; i++) {
                var t = Math.random();
                var x = p1.x + dx * t;
                var y = p1.y + dy * t;
                var angle = Math.random() * Math.PI * 2;
                var speed = 50 + Math.random() * 150;
                gameState.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 1.5 + Math.random(),
                    size: 2 + Math.random() * 4,
                    color: color
                });
            }
        }

        function spawnCelebrationParticles() {
            var colors = ['#00ffff', '#ff00ff', '#ffff00', '#00ff00', '#ff8800'];
            for (var i = 0; i < 80; i++) {
                var angle = Math.random() * Math.PI * 2;
                var speed = 100 + Math.random() * 300;
                gameState.particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.5 + Math.random() * 0.5,
                    size: 3 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function calculateLevelResult() {
            var totalPieces = 0;
            var totalTarget = 0;
            var allCorrect = true;
            gameState.shapes.forEach(function(shape) {
                var pieceCount = shape.pieces.length;
                totalPieces += pieceCount;
                totalTarget += shape.target;
                if (pieceCount !== shape.target) {
                    allCorrect = false;
                }
            });
            var diff = Math.abs(totalPieces - totalTarget);
            var stars = 1;
            if (diff === 0) stars = 3;
            else if (diff <= 1) stars = 2;
            else if (diff <= 2) stars = 1.5;
            var score = Math.round(gameState.levelScore * stars);
            return { stars: Math.round(stars), score: score, totalPieces: totalPieces, totalTarget: totalTarget };
        }

        function completeLevel(result) {
            gameState.completed = true;
            playCompleteSound();
            spawnCelebrationParticles();
            gameState.starAnimation = 0;

            var levelIndex = gameState.currentLevel;
            var prevStars = settings.save.stars[levelIndex] || 0;
            if (result.stars > prevStars) {
                settings.save.stars[levelIndex] = result.stars;
            }
            if (levelIndex >= settings.save.level) {
                settings.save.level = levelIndex + 1;
            }
            saveSettings();

            var overlay = document.getElementById('completeOverlay');
            overlay.classList.add('active');
            document.getElementById('completeTitle').textContent = result.stars >= 3 ? 'PERFECT!' : 'LEVEL COMPLETE!';
            document.getElementById('completeStars').textContent = getStarSymbols(Math.round(result.stars));
            document.getElementById('completeScore').textContent = 'Score: ' + result.score + ' | Pieces: ' + result.totalPieces + '/' + result.totalTarget;

            var nextBtn = document.getElementById('nextLevelBtn');
            if (gameState.currentLevel >= LEVELS.length - 1) {
                nextBtn.textContent = 'BACK TO MENU';
            } else {
                nextBtn.textContent = 'NEXT LEVEL';
            }
        }

        function updateHUD() {
            document.getElementById('levelInfo').textContent = 'Level ' + (gameState.currentLevel + 1);
            document.getElementById('hintDisplay').textContent = 'Hints: ' + settings.hints;
            var cutsDiv = document.getElementById('cutsDisplay');
            cutsDiv.innerHTML = '';
            var totalCuts = LEVELS[gameState.currentLevel].cuts;
            for (var i = 0; i < totalCuts; i++) {
                var icon = document.createElement('div');
                icon.className = 'cut-icon' + (i < gameState.cutsRemaining ? '' : ' used');
                cutsDiv.appendChild(icon);
            }
        }

        function showTutorial() {
            var tutorials = [
                'Draw a line across the shape to slice it!',
                'Try to create exactly the target number of pieces!',
                'You can use multiple cuts - plan carefully!'
            ];
            var step = gameState.tutorialStep;
            if (step >= 0 && step < tutorials.length) {
                document.getElementById('tutorialText').textContent = tutorials[step];
                document.getElementById('tutorialArrow').textContent = '\u270B';
                document.getElementById('tutorialOverlay').classList.add('active');
            } else {
                document.getElementById('tutorialOverlay').classList.remove('active');
            }
        }

        function showHint() {
            if (settings.hints <= 0 || gameState.completed) return;
            settings.hints--;
            saveSettings();
            updateHUD();
            gameState.showingHint = true;
            gameState.hintAngle = 0;
            playClickSound();

            var shape = gameState.shapes[0];
            if (shape && shape.pieces.length > 0) {
                var center = getPolygonCenter(shape.pieces[0].vertices);
                var hintAngle = Math.random() * Math.PI * 2;
                var hintDist = 150;
                gameState.hintLine = {
                    x1: center.x + Math.cos(hintAngle) * hintDist,
                    y1: center.y + Math.sin(hintAngle) * hintDist,
                    x2: center.x - Math.cos(hintAngle) * hintDist,
                    y2: center.y - Math.sin(hintAngle) * hintDist
                };
            }

            setTimeout(function() {
                gameState.showingHint = false;
                gameState.hintLine = null;
            }, 2000);
        }

        function undoLastCut() {
            if (gameState.undoStack.length === 0 || gameState.completed) return;
            var lastState = gameState.undoStack.pop();
            gameState.shapes = lastState.shapes;
            gameState.cutsRemaining++;
            gameState.cutsUsed--;
            gameState.levelScore -= 50;
            updateHUD();
            playClickSound();
        }

        function getPolygonCenter(vertices) {
            var cx = 0, cy = 0;
            vertices.forEach(function(v) {
                cx += v.x;
                cy += v.y;
            });
            return { x: cx / vertices.length, y: cy / vertices.length };
        }

        function getPointerPos(e) {
            var rect = canvas.getBoundingClientRect();
            var scaleX = canvas.width / rect.width;
            var scaleY = canvas.height / rect.height;
            var clientX = e.clientX;
            var clientY = e.clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function onPointerDown(e) {
            if (gameState.completed) return;
            e.preventDefault();
            initAudio();
            if (settings.music) startMusic();
            var pos = getPointerPos(e);
            gameState.isDrawing = true;
            gameState.cutStart = pos;
            gameState.cutEnd = pos;
        }

        function onPointerMove(e) {
            if (!gameState.isDrawing || gameState.completed) return;
            e.preventDefault();
            gameState.cutEnd = getPointerPos(e);
        }

        function onPointerUp(e) {
            if (!gameState.isDrawing || gameState.completed) return;
            e.preventDefault();
            gameState.isDrawing = false;

            var p1 = gameState.cutStart;
            var p2 = gameState.cutEnd;
            var dist = Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2);

            if (dist > 30 && gameState.cutsRemaining > 0) {
                if (checkObstacleCollision(p1, p2)) {
                    playClickSound();
                    gameState.cutStart = null;
                    gameState.cutEnd = null;
                    return;
                }

                var shapesCopy = JSON.parse(JSON.stringify(gameState.shapes));
                var hitShapes = performCut(p1, p2);

                if (hitShapes.length > 0) {
                    var undoState = {
                        shapes: shapesCopy,
                        cutsRemaining: gameState.cutsRemaining
                    };
                    gameState.undoStack.push(undoState);

                    gameState.cutsRemaining--;
                    gameState.cutsUsed++;
                    var baseScore = hitShapes.length * 100;
                    var comboBonus = gameState.comboCount > 1 ? (gameState.comboCount - 1) * 50 : 0;
                    var cutScore = baseScore + comboBonus;
                    gameState.levelScore += cutScore;

                    gameState.cutLines.push({ x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, alpha: 1 });

                    if (gameState.tutorialStep >= 0 && gameState.tutorialStep < 3) {
                        gameState.tutorialStep++;
                        if (gameState.tutorialStep >= 3) {
                            gameState.tutorialStep = -1;
                        }
                    }

                    if (gameState.tutorialStep >= 0) {
                        showTutorial();
                    }

                    updateHUD();

                    setTimeout(function() {
                        checkLevelComplete();
                    }, 500);
                }
            }

            gameState.cutStart = null;
            gameState.cutEnd = null;
        }

        function checkLevelComplete() {
            if (gameState.cutsRemaining === 0 || allShapesFullySliced()) {
                var result = calculateLevelResult();
                completeLevel(result);
            }
        }

        function allShapesFullySliced() {
            var totalPieces = 0;
            gameState.shapes.forEach(function(shape) {
                totalPieces += shape.pieces.length;
            });
            var totalTarget = 0;
            gameState.shapes.forEach(function(shape) {
                totalTarget += shape.target;
            });
            return totalPieces >= totalTarget;
        }

        function update(dt) {
            if (gameState.screen !== 'game') return;

            gameState.movingObstacles.forEach(function(o) {
                o.phase += o.speed * dt;
                o.x = o.baseX + Math.sin(o.phase * 0.01) * o.range;
            });

            gameState.particles.forEach(function(p) {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vy += 300 * dt;
                p.life -= p.decay * dt;
            });
            gameState.particles = gameState.particles.filter(function(p) { return p.life > 0; });

            gameState.cutLines.forEach(function(line) {
                line.alpha -= dt * 2;
            });
            gameState.cutLines = gameState.cutLines.filter(function(line) { return line.alpha > 0; });

            if (gameState.screenShake > 0) {
                gameState.screenShake -= dt * 30;
                if (gameState.screenShake < 0) gameState.screenShake = 0;
            }

            if (gameState.starAnimation < 1 && gameState.completed) {
                gameState.starAnimation += dt * 2;
                if (gameState.starAnimation > 1) gameState.starAnimation = 1;
            }
        }

        function draw() {
            var scale = Math.min(window.innerWidth / 800, window.innerHeight / 720);
            ctx.save();
            ctx.scale(scale, scale);

            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, 800, 720);

            var gradient = ctx.createLinearGradient(0, 0, 800, 720);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(1, '#1a1a3e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 720);

            if (gameState.screen !== 'game') {
                ctx.restore();
                return;
            }

            var shakeX = gameState.screenShake > 0 ? (Math.random() - 0.5) * gameState.screenShake : 0;
            var shakeY = gameState.screenShake > 0 ? (Math.random() - 0.5) * gameState.screenShake : 0;
            ctx.translate(shakeX, shakeY);

            gameState.obstacles.forEach(function(o) {
                ctx.fillStyle = '#333';
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                ctx.fillRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h);
                ctx.strokeRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h);
            });

            gameState.movingObstacles.forEach(function(o) {
                ctx.fillStyle = '#ff4444';
                ctx.strokeStyle = '#ff6666';
                ctx.lineWidth = 2;
                ctx.fillRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h);
                ctx.strokeRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h);
            });

            gameState.shapes.forEach(function(shape) {
                shape.pieces.forEach(function(piece) {
                    if (piece.vertices.length < 3) return;
                    ctx.beginPath();
                    ctx.moveTo(piece.vertices[0].x, piece.vertices[0].y);
                    for (var i = 1; i < piece.vertices.length; i++) {
                        ctx.lineTo(piece.vertices[i].x, piece.vertices[i].y);
                    }
                    ctx.closePath();

                    ctx.shadowColor = shape.color;
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = shape.color + '33';
                    ctx.fill();
                    ctx.strokeStyle = shape.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                });

                var center = getPolygonCenter(shape.pieces[0] ? shape.pieces[0].vertices : shape.originalVertices);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Segoe UI';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Target: ' + shape.target, center.x, center.y - 40);
            });

            gameState.cutLines.forEach(function(line) {
                ctx.strokeStyle = 'rgba(255, 255, 255, ' + line.alpha * 0.5 + ')';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.moveTo(line.x1, line.y1);
                ctx.lineTo(line.x2, line.y2);
                ctx.stroke();
            });

            if (gameState.cutStart && gameState.cutEnd) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.setLineDash([10, 5]);
                ctx.beginPath();
                ctx.moveTo(gameState.cutStart.x, gameState.cutStart.y);
                ctx.lineTo(gameState.cutEnd.x, gameState.cutEnd.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            if (gameState.showingHint && gameState.hintLine) {
                var hint = gameState.hintLine;
                ctx.strokeStyle = 'rgba(255, 204, 0, ' + (0.5 + Math.sin(gameState.hintAngle * 10) * 0.3) + ')';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(hint.x1, hint.y1);
                ctx.lineTo(hint.x2, hint.y2);
                ctx.stroke();

                var arrowSize = 12;
                var angle = Math.atan2(hint.y2 - hint.y1, hint.x2 - hint.x1);
                ctx.fillStyle = 'rgba(255, 204, 0, ' + (0.5 + Math.sin(gameState.hintAngle * 10) * 0.3) + ')';
                ctx.beginPath();
                ctx.moveTo(hint.x2, hint.y2);
                ctx.lineTo(hint.x2 - arrowSize * Math.cos(angle - 0.4), hint.y2 - arrowSize * Math.sin(angle - 0.4));
                ctx.lineTo(hint.x2 - arrowSize * Math.cos(angle + 0.4), hint.y2 - arrowSize * Math.sin(angle + 0.4));
                ctx.closePath();
                ctx.fill();

                gameState.hintAngle += 0.016;
            }

            gameState.particles.forEach(function(p) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            ctx.restore();
        }

        function gameLoop(time) {
            var dt = Math.min((time - gameState.lastTime) / 1000, 0.1);
            gameState.lastTime = time;

            if (isVisible) {
                update(dt);
                draw();
            }

            animFrameId = requestAnimationFrame(gameLoop);
        }

        function init() {
            loadSettings();
            initCanvas();

            window.addEventListener('resize', initCanvas);

            document.addEventListener('visibilitychange', function() {
                isVisible = !document.hidden;
            });

            window.addEventListener('beforeunload', cleanup);

            canvas.addEventListener('pointerdown', onPointerDown);
            canvas.addEventListener('pointermove', onPointerMove);
            canvas.addEventListener('pointerup', onPointerUp);
            canvas.addEventListener('pointercancel', function() { gameState.isDrawing = false; });

            canvas.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
            canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
            canvas.addEventListener('touchend', function(e) { e.preventDefault(); }, { passive: false });

            document.getElementById('playBtn').addEventListener('click', function() {
                playClickSound();
                buildLevelGrid();
                showScreen('levelSelectScreen');
            });

            document.getElementById('settingsBtn').addEventListener('click', function() {
                playClickSound();
                showScreen('settingsScreen');
            });

            document.getElementById('levelBackBtn').addEventListener('click', function() {
                playClickSound();
                showScreen('menuScreen');
            });

            document.getElementById('settingsBackBtn').addEventListener('click', function() {
                playClickSound();
                showScreen('menuScreen');
            });

            document.getElementById('sfxToggle').addEventListener('click', function() {
                settings.sfx = !settings.sfx;
                this.classList.toggle('on', settings.sfx);
                if (settings.sfx) playClickSound();
                saveSettings();
            });

            document.getElementById('musicToggle').addEventListener('click', function() {
                settings.music = !settings.music;
                this.classList.toggle('on', settings.music);
                if (settings.music) startMusic();
                else stopMusic();
                saveSettings();
            });

            document.getElementById('resetBtn').addEventListener('click', function() {
                if (confirm('Reset all progress? This cannot be undone.')) {
                    settings.save = { v: 1, level: 0, stars: {}, hints: 3 };
                    settings.hints = 3;
                    saveSettings();
                    playClickSound();
                    alert('Progress reset!');
                }
            });

            document.getElementById('pauseBtn').addEventListener('click', function() {
                playClickSound();
                showScreen('menuScreen');
            });

            document.getElementById('nextLevelBtn').addEventListener('click', function() {
                playClickSound();
                if (gameState.currentLevel < LEVELS.length - 1) {
                    startLevel(gameState.currentLevel + 1);
                } else {
                    showScreen('menuScreen');
                }
            });

            document.getElementById('retryBtn').addEventListener('click', function() {
                playClickSound();
                startLevel(gameState.currentLevel);
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    undoLastCut();
                } else if (e.key === 'h') {
                    showHint();
                }
            });

            gameState.lastTime = performance.now();
            gameLoop(gameState.lastTime);
        }

        function cleanup() {
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            timers.forEach(function(t) {
                if (t.type === 'interval') clearInterval(t.id);
            });
            timers = [];
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
        }

        init();
    })();
    </script>
</body>
</html>
