  if(bgmTimer)clearInterval(bgmTimer);
  bgmTimer=setInterval(()=>{
    if(!soundOn||!audioCtx)return;
    const f=bgmNotes[bgmIdx%bgmNotes.length];
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f*.5;
    o.connect(g);g.connect(audioCtx.destination);
    const t=audioCtx.currentTime;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(.04,t+.05);
    g.gain.linearRampToValueAtTime(0,t+.6);
    o.start(t);o.stop(t+.6);
    bgmIdx++;
  },600);
}
function stopBGM(){if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null}}

// ---- Game State ----
let currentLevelIdx=0;
let selGrid=-1,selR=-1,selC=-1;  // selected cell (grid, row, col)
let notesMode=false;
let mistakes=0;
let startTime=0,timerInterval=null;
let undoStack=[];
// Board state: 3 grids, each 9x9. entries[grid][r][c] = digit or 0. notes[grid][r][c] = Set of candidate digits
let entries,notes,given;
let levelComplete=false;

function loadLevel(idx){
  currentLevelIdx=idx;
  const lvl=LEVELS.levels[idx];
  entries=[];notes=[];given=[];
  for(let g=0;g<3;g++){
    const puz=g===0?lvl.puzzleA:g===1?lvl.puzzleB:lvl.puzzleC;
    const e=[],n=[],gi=[];
    for(let r=0;r<9;r++){
      e.push(puz[r].slice());
      n.push([[],[],[],[],[],[],[],[],[]].map(()=>new Set()));
      gi.push(puz[r].map(v=>v!==0));
    }
    entries.push(e);notes.push(n);given.push(gi);
  }
  mistakes=0;undoStack=[];selGrid=-1;levelComplete=false;
  startTime=Date.now();
  updateHUD();
  draw();
  saveProgress();
}

function updateHUD(){
  const lvl=LEVELS.levels[currentLevelIdx];
  document.getElementById('hud-level').textContent=lvl.id;
  document.getElementById('hud-tier').textContent=lvl.tier;
  document.getElementById('hud-mistakes').textContent=mistakes;
  document.getElementById('hud-maxmistake').textContent=MAX_MISTAKES;
  // Update level buttons
  document.querySelectorAll('.lvl-btn').forEach((b,i)=>{
    b.classList.toggle('current',i===currentLevelIdx);
  });
}

function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(levelComplete)return;
    const el=Math.floor((Date.now()-startTime)/1000);
    const m=Math.floor(el/60),s=el%60;
    document.getElementById('hud-timer').textContent=m+':'+(s<10?'0':'')+s;
  },1000);
}

// ---- Canvas Rendering ----
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
let CELL=34,ORIGIN_X=0,ORIGIN_Y=0;

function resizeCanvas(){
  const wrap=document.getElementById('game-wrap');
  const maxW=Math.min(wrap.clientWidth,900);
  // 21 cols + padding
  CELL=Math.floor(maxW/23);
  if(CELL<14)CELL=14;
  if(CELL>38)CELL=38;
  const w=21*CELL+2, h=9*CELL+2;
  const dpr=window.devicePixelRatio||1;
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ORIGIN_X=1;ORIGIN_Y=1;
  draw();
}

// Map combined col c (0-20) → grid+local
// Grid A: combined 0-8 (local 0-8)
// Grid B: combined 6-14 (local = combined-6)
// Grid C: combined 12-20 (local = combined-12)
function getGridsForCol(c){
  const res=[];
  if(c>=0&&c<=8)res.push(0);      // Grid A
  if(c>=6&&c<=14)res.push(1);     // Grid B
  if(c>=12&&c<=20)res.push(2);    // Grid C
  return res;
}

function draw(){
  const W=21*CELL,H=9*CELL;
  ctx.clearRect(0,0,W+2,H+2);
  // Draw cells
  for(let r=0;r<9;r++){
    for(let cc=0;cc<21;cc++){
      const x=ORIGIN_X+cc*CELL,y=ORIGIN_Y+r*CELL;
      const isShared=(cc>=6&&cc<=8)||(cc>=12&&cc<=14);
      let bg=CELL_BG;
      ctx.fillStyle=isShared?'rgba(251,191,36,.1)':'#143039';
      ctx.fillRect(x,y,CELL,CELL);
    }
  }
  // Thin grid lines
  ctx.strokeStyle='#1e4a52';ctx.lineWidth=.5;
  for(let i=0;i<=21;i++){
    const x=ORIGIN_X+i*CELL+.5;
    ctx.beginPath();ctx.moveTo(x,ORIGIN_Y);ctx.lineTo(x,ORIGIN_Y+9*CELL);ctx.stroke();
  }
  for(let i=0;i<=9;i++){
    const y=ORIGIN_Y+i*CELL+.5;
    ctx.beginPath();ctx.moveTo(ORIGIN_X,y);ctx.lineTo(ORIGIN_X+21*CELL,y);ctx.stroke();
  }
  // Selected cell highlight + related
  if(selGrid>=0){
    const localGridOffset=[0,6,12][selGrid];
    highlightRelated(selGrid,selR,selC);
  }
  // Grid borders + 3x3 box lines
  drawGridBorder(0,0,'#2dd4bf');       // Grid A teal
  drawGridBorder(6,1,'#22d3ee');       // Grid B cyan
  drawGridBorder(12,2,'#34d399');      // Grid C emerald
  // Shared stack highlights
  drawSharedBox(6);drawSharedBox(12);
  // Numbers + notes
  drawNumbers();
}

const CELL_BG='#143039';

function drawGridBorder(offset,gridIdx,color){
  const x=ORIGIN_X+offset*CELL,y=ORIGIN_Y;
  ctx.strokeStyle=color;ctx.lineWidth=2.5;
  ctx.strokeRect(x+.5,y+.5,9*CELL-1,9*CELL-1);
  // 3x3 box lines
  ctx.lineWidth=1.5;
  for(let i=1;i<3;i++){
    const bx=x+i*3*CELL+.5;
    ctx.beginPath();ctx.moveTo(bx,y);ctx.lineTo(bx,y+9*CELL);ctx.stroke();
    const by=y+i*3*CELL+.5;
    ctx.beginPath();ctx.moveTo(x,by);ctx.lineTo(x+9*CELL,by);ctx.stroke();
  }
}
function drawSharedBox(offset){
  const x=ORIGIN_X+offset*CELL,y=ORIGIN_Y;
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  ctx.strokeRect(x+.5,y+.5,3*CELL-1,9*CELL-1);
}
function highlightRelated(grid,r,c){
  const offset=[0,6,12][grid];
  // Highlight same row, col, box in that grid
  ctx.fillStyle='rgba(45,212,191,.08)';
  for(let cc=0;cc<9;cc++)fillCellLocal(grid,r,cc,'rgba(45,212,191,.08)');
  for(let rr=0;rr<9;rr++)fillCellLocal(grid,rr,c,'rgba(45,212,191,.08)');
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let rr=br;rr<br+3;rr++)for(let cc=bc;cc<bc+3;cc++)fillCellLocal(grid,rr,cc,'rgba(45,212,191,.08)');
  // Selected cell stronger
  fillCellLocal(grid,r,c,'rgba(45,212,191,.3)');
  // Same value highlight
  const sv=entries[grid][r][c];
  if(sv>0){
    for(let rr=0;rr<9;rr++)for(let cc=0;cc<9;cc++){
      if(entries[grid][rr][cc]===sv)fillCellLocal(grid,rr,cc,'rgba(34,211,238,.15)');
    }
  }
}
function fillCellLocal(grid,r,c,color){
  const offset=[0,6,12][grid];
  const x=ORIGIN_X+(offset+c)*CELL,y=ORIGIN_Y+r*CELL;
  ctx.fillStyle=color;ctx.fillRect(x,y,CELL,CELL);
}

function drawNumbers(){
  for(let grid=0;grid<3;grid++){
    const offset=[0,6,12][grid];
    for(let r=0;r<9;r++){
      for(let c=0;c<9;c++){
        const x=ORIGIN_X+(offset+c)*CELL,y=ORIGIN_Y+r*CELL;
        const v=entries[grid][r][c];
        if(v>0){
          const isGiven=given[grid][r][c];
          const sol=getSolution(grid,r,c);
          const isError=isGiven?false:(v!==sol);
          ctx.fillStyle=isError?'#f87171':isGiven?'#b8eef0':'#2dd4bf';
          ctx.font='bold '+Math.floor(CELL*.55)+'px sans-serif';
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(v,x+CELL/2,y+CELL/2);
        }else{
          // Notes
          const ns=notes[grid][r][c];
          if(ns.size>0){
            ctx.fillStyle='#5a8a90';
            ctx.font=Math.floor(CELL*.22)+'px sans-serif';
            ctx.textAlign='center';ctx.textBaseline='middle';
            for(let d=1;d<=9;d++){
              if(ns.has(d)){
                const nr=Math.floor((d-1)/3),nc=(d-1)%3;
                ctx.fillText(d,x+CELL*(nc/3+1/6),y+CELL*(nr/3+1/6));
              }
            }
          }
        }
      }
    }
  }
}
function getSolution(grid,r,c){
  const lvl=LEVELS.levels[currentLevelIdx];
  const sol=grid===0?lvl.solutionA:grid===1?lvl.solutionB:lvl.solutionC;
  return sol[r][c];
}

// ---- Input Handling ----
function canvasToCell(px,py){
  const rect=canvas.getBoundingClientRect();
  const x=px-rect.left,y=py-rect.top;
  const cc=Math.floor(x/CELL),r=Math.floor(y/CELL);
  if(r<0||r>=9||cc<0||cc>=21)return null;
  // Which grid? If in a shared col, prefer: if only one grid has it, that grid.
  // For shared cols, pick the first grid (A>B>C priority) unless already selected in another.
  const grids=getGridsForCol(cc);
  if(grids.length===0)return null;
  // For shared cells, prefer grid that matches current selection, else first
  let g=grids[0];
  if(grids.length>1&&selGrid>=0&&grids.includes(selGrid))g=selGrid;
  const localC=g===0?cc:g===1?cc-6:cc-12;
  return{grid:g,r:r,c:localC};
}

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();initAudio();
  const cell=canvasToCell(e.clientX,e.clientY);
  if(!cell){selGrid=-1;draw();return}
  selGrid=cell.grid;selR=cell.r;selC=cell.c;
  sfxClick();draw();
});

function placeDigit(d){
  if(levelComplete||selGrid<0)return;
  if(given[selGrid][selR][selC])return;
  initAudio();
  if(notesMode){
    if(d===0){notes[selGrid][selR][selC].clear()}
    else{
      const s=notes[selGrid][selR][selC];
      if(s.has(d))s.delete(d);else s.add(d);
      // Clear note if cell has a value
      if(entries[selGrid][selR][selC]>0)entries[selGrid][selR][selC]=0;
    }
    saveMove();
    sfxClick();draw();
  }else{
    undoStack.push({grid:selGrid,r:selR,c:selC,
      prevVal:entries[selGrid][selR][selC],prevNotes:new Set(notes[selGrid][selR][selC])});
    entries[selGrid][selR][selC]=d;
    if(d>0){
      notes[selGrid][selR][selC].clear();
      const sol=getSolution(selGrid,selR,selC);
      if(d===sol){
        sfxPlace();
        // Clear notes in related cells
        clearRelatedNotes(selGrid,selR,selC,d);
      }else{
        sfxWrong();mistakes++;
        if(mistakes>=MAX_MISTAKES){showMsg('Too many mistakes! Reset to retry.');}
      }
    }else{sfxClick()}
    draw();updateHUD();saveProgress();
    checkWin();
  }
}
function clearRelatedNotes(grid,r,c,d){
  for(let cc=0;cc<9;cc++)notes[grid][r][cc].delete(d);
  for(let rr=0;rr<9;rr++)notes[grid][rr][c].delete(d);
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let rr=br;rr<br+3;rr++)for(let cc=bc;cc<bc+3;cc++)notes[grid][rr][cc].delete(d);
  // Also clear from shared grid
  const offset=[0,6,12][grid];
  // Shared AB: A cols 6-8 = B cols 0-2
  // Shared BC: B cols 6-8 = C cols 0-2
}
function saveMove(){}  // notes don't need undo for simplicity

function checkWin(){
  for(let g=0;g<3;g++)for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if(entries[g][r][c]!==getSolution(g,r,c))return false;
  }
  levelComplete=true;
  if(timerInterval)clearInterval(timerInterval);
  stopBGM();
  sfxWin();
  // Mark done in progress
  let prog=getProgress();
  if(!prog.completed.includes(currentLevelIdx))prog.completed.push(currentLevelIdx);
  prog.bestTimes=prog.bestTimes||{};
  const t=Math.floor((Date.now()-startTime)/1000);
  if(!prog.bestTimes[currentLevelIdx]||t<prog.bestTimes[currentLevelIdx])prog.bestTimes[currentLevelIdx]=t;
  localStorage.setItem('tripleDoku_progress_v1',JSON.stringify(prog));
  // Show modal
  setTimeout(()=>{
    const stars=mistakes===0?3:mistakes<=2?2:1;
    document.getElementById('modal-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
    document.getElementById('modal-time').textContent='Time: '+fmtTime(t);
    document.getElementById('modal-mistakes').textContent='Mistakes: '+mistakes;
    document.getElementById('modal-bg').classList.add('show');
    buildLevelSelect();
  },300);
  return true;
}
function fmtTime(s){const m=Math.floor(s/60);return m+':'+(s%60<10?'0':'')+(s%60)}

// ---- Controls ----
document.getElementById('btn-notes').addEventListener('click',()=>{
  notesMode=!notesMode;
  document.getElementById('btn-notes').classList.toggle('active',notesMode);
  sfxClick();
});
document.getElementById('btn-hint').addEventListener('click',()=>{
  if(levelComplete||selGrid<0)return;
  if(given[selGrid][selR][selC]){showMsg('Select an empty cell first');return}
  initAudio();sfxHint();
  const sol=getSolution(selGrid,selR,selC);
  entries[selGrid][selR][selC]=sol;
  notes[selGrid][selR][selC].clear();
  given[selGrid][selR][selC]=true; // lock it
  undoStack.push({grid:selGrid,r:selR,c:selC,prevVal:0,prevNotes:new Set(),hint:true});
  draw();saveProgress();checkWin();
});
document.getElementById('btn-undo').addEventListener('click',()=>{
  if(undoStack.length===0||levelComplete)return;
  const m=undoStack.pop();
  entries[m.grid][m.r][m.c]=m.prevVal;
  notes[m.grid][m.r][m.c]=m.prevNotes;
  if(m.hint)given[m.grid][m.r][m.c]=false;
  sfxClick();draw();
});
document.getElementById('btn-check').addEventListener('click',()=>{
  if(levelComplete)return;
  sfxClick();
  let errs=0;
  for(let g=0;g<3;g++)for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if(!given[g][r][c]&&entries[g][r][c]>0&&entries[g][r][c]!==getSolution(g,r,c))errs++;
  }
  showMsg(errs===0?'No errors found! 💚':errs+' error(s) found');
});
document.getElementById('btn-reset').addEventListener('click',()=>{
  sfxClick();
  loadLevel(currentLevelIdx);
  startTimer();
});
document.getElementById('btn-sound').addEventListener('click',()=>{
  soundOn=!soundOn;
  document.getElementById('btn-sound').textContent=soundOn?'🔊 Sound':'🔇 Muted';
  if(soundOn){initAudio();startBGM()}else{stopBGM()}
  document.getElementById('btn-sound').classList.toggle('active',soundOn);
});
document.getElementById('modal-next').addEventListener('click',()=>{
  document.getElementById('modal-bg').classList.remove('show');
  if(currentLevelIdx<LEVELS.levels.length-1){
    loadLevel(currentLevelIdx+1);startTimer();buildLevelSelect();
  }else{showMsg('🏆 You completed all 27 levels!')}
});
document.getElementById('modal-replay').addEventListener('click',()=>{
  document.getElementById('modal-bg').classList.remove('show');
  loadLevel(currentLevelIdx);startTimer();
});

// ---- Numpad ----
const np=document.getElementById('numpad');
for(let d=1;d<=9;d++){
  const b=document.createElement('button');
  b.className='np-btn';b.textContent=d;
  b.addEventListener('click',()=>placeDigit(d));
  np.appendChild(b);
}
const bErase=document.createElement('button');
bErase.className='np-btn';bErase.textContent='⌫';
bErase.addEventListener('click',()=>placeDigit(0));
np.appendChild(bErase);

// ---- Keyboard ----
document.addEventListener('keydown',e=>{
  if(e.key>='1'&&e.key<='9'){placeDigit(parseInt(e.key));e.preventDefault()}
  else if(e.key==='Backspace'||e.key==='Delete'||e.key==='0'){placeDigit(0);e.preventDefault()}
  else if(e.key==='n'||e.key==='N'){
    notesMode=!notesMode;
    document.getElementById('btn-notes').classList.toggle('active',notesMode);
  }
});

// ---- Level Selector ----
function buildLevelSelect(){
  const prog=getProgress();
  const tiers={};
  LEVELS.levels.forEach((lvl,i)=>{
    if(!tiers[lvl.tier])tiers[lvl.tier]=[];
    tiers[lvl.tier].push({idx:i,lvl});
  });
  const order=['Beginner','Easy','Medium','Hard','Expert','Master'];
  const container=document.getElementById('level-select');
  container.innerHTML='';
  order.forEach(tier=>{
    if(!tiers[tier])return;
    const row=document.createElement('div');row.className='tier-row';
    const label=document.createElement('div');label.className='tier-label';
    label.textContent=tier;row.appendChild(label);
    const btns=document.createElement('div');btns.className='level-btns';
    tiers[tier].forEach(({idx,lvl})=>{
      const b=document.createElement('button');b.className='lvl-btn';b.textContent=lvl.id;
      const isDone=prog.completed.includes(idx);
      const isLocked=idx>0&&!prog.completed.includes(idx-1)&&idx!==currentLevelIdx&&idx>prog.completed.length;
      if(idx===currentLevelIdx)b.classList.add('current');
      else if(isDone)b.classList.add('done');
      b.addEventListener('click',()=>{
        loadLevel(idx);startTimer();buildLevelSelect();
      });
      btns.appendChild(b);
    });
    row.appendChild(btns);container.appendChild(row);
  });
}

// ---- Progress ----
function getProgress(){
  try{
    const p=JSON.parse(localStorage.getItem('tripleDoku_progress_v1'));
    if(p&&p.version===1)return p;
  }catch(e){}
  return{version:1,completed:[],bestTimes:{}};
}
function saveProgress(){
  const prog=getProgress();
  prog.entries=prog.entries||{};
  prog.entries[currentLevelIdx]={e:entries.map(g=>g.map(r=>r.slice())),n:notes.map(g=>g.map(r=>r.map(s=>[...s])))};
  prog.mistakes=prog.mistakes||{};
  prog.mistakes[currentLevelIdx]=mistakes;
  localStorage.setItem('tripleDoku_progress_v1',JSON.stringify(prog));
}

// ---- Messaging ----
let msgTimer=null;
function showMsg(text){
  const el=document.getElementById('msg');
  el.textContent=text;el.classList.add('show');
  if(msgTimer)clearTimeout(msgTimer);
  msgTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

// ---- Init ----
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
loadLevel(0);
startTimer();
buildLevelSelect();
document.getElementById('btn-sound').classList.add('active');

// Cleanup function
function cleanup(){
  if(timerInterval)clearInterval(timerInterval);
  stopBGM();
}
window.addEventListener('beforeunload',cleanup);
</script>
