// Region colors (12 pastel palette)
const REGION_COLORS=['#e8eaf6','#fce4ec','#e0f2f1','#fff3e0','#f3e5f5','#e1f5fe','#f1f8e9','#fffde7','#fbe9e7','#e8f5e9','#ede7f6','#e0f7fa','#f0f4c8','#d1c4e9','#b2dfdb','#ffccbc'];

// Game state
let currentLevel=null,levelIdx=0,board=[],selectedCell=null,selectedNumber=0,hintsLeft=3,mode='place';
let progress={},musicOn=true,sfxOn=true,autocheckOn=false;
let audioCtx=null,musicGain=null,musicInterval=null;

// Load progress
try{progress=JSON.parse(localStorage.getItem('kazunori_progress')||'{}')}catch(e){progress={}}

// Canvas
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let cellSize=50,gridOffsetX=0,gridOffsetY=0;

// === AUDIO ===
function initAudio(){
if(audioCtx)return;
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
musicGain=audioCtx.createGain();
musicGain.gain.value=0.08;
musicGain.connect(audioCtx.destination);
}
function playSfx(freq,dur,type,vol){
if(!sfxOn)return;
initAudio();
const o=audioCtx.createOscillator();
const g=audioCtx.createGain();
o.type=type||'sine';
o.frequency.value=freq;
g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(dur||0.15));
o.connect(g);g.connect(audioCtx.destination);
o.start();o.stop(audioCtx.currentTime+(dur||0.15));
}
const SFX={
place:()=>playSfx(523,0.1,'triangle',0.12),
erase:()=>playSfx(330,0.08,'triangle',0.1),
win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSfx(f,0.2,'triangle',0.15),i*100))},
error:()=>playSfx(150,0.2,'sawtooth',0.1),
hint:()=>playSfx(880,0.15,'sine',0.12),
click:()=>playSfx(440,0.05,'square',0.08)
};
const CHORDS=[[262,330,392,494],[294,349,440,523],[220,277,330,415],[196,247,294,392]];
let chordIdx=0;
function startMusic(){
if(!musicOn)return;
initAudio();
if(musicInterval)clearInterval(musicInterval);
musicInterval=setInterval(()=>{
if(!musicOn||!audioCtx)return;
const chord=CHORDS[chordIdx%CHORDS.length];
chord.forEach(freq=>{
const o=audioCtx.createOscillator();
const g=audioCtx.createGain();
o.type='sine';o.frequency.value=freq;
var t=audioCtx.currentTime;
g.gain.setValueAtTime(0,t);
g.gain.linearRampToValueAtTime(0.5,t+0.5);
g.gain.linearRampToValueAtTime(0,t+2);
o.connect(g);g.connect(musicGain);
o.start();o.stop(t+2);
});
chordIdx++;
},2000);
}
function stopMusic(){if(musicInterval){clearInterval(musicInterval);musicInterval=null}}

// === MENU ===
function buildMenu(){
const tierList=document.getElementById('tier-list');
const tierNames=['Beginner','Easy','Medium','Hard','Expert'];
let html='';
for(let t=0;t<5;t++){
const solved=Object.keys(progress).filter(k=>{const lv=LEVELS[parseInt(k)];return lv&&lv.tier===t&&progress[k]>0}).length;
html+=`<div class="tier-section"><div class="tier-label">${tierNames[t]} (${solved}/6 solved)</div><div class="level-grid">`;
for(let i=0;i<6;i++){
const idx=t*6+i;
const stars=progress[idx]||0;
const starStr=stars?'★'.repeat(stars):'';
html+=`<button class="level-btn ${stars>0?'solved':''}" onclick="startLevel(${idx})">${idx+1}<span class="stars">${starStr}</span></button>`;
}
html+='</div></div>';
}
tierList.innerHTML=html;
}

// === GAME LOGIC ===
function startLevel(idx){
levelIdx=idx;
currentLevel=LEVELS[idx];
const rows=currentLevel.rows,cols=currentLevel.cols;
board=[];
for(let r=0;r<rows;r++)board.push(new Array(cols).fill(0));
hintsLeft=3;
selectedCell=null;
selectedNumber=0;
document.getElementById('menu').style.display='none';
document.getElementById('game-view').style.display='flex';
document.getElementById('game-view').style.flexDirection='column';
document.getElementById('game-view').style.alignItems='center';
document.getElementById('level-info').textContent=`Level ${idx+1} — ${currentLevel.tierName}`;
document.getElementById('hints-left').textContent=`Hints: ${hintsLeft}`;
buildNumberPad();
setupCanvas();
render();
startMusic();
}
function getMaxNumber(r,c){
const rid=currentLevel.regions[`${r},${c}`];
let count=0;
for(const key in currentLevel.regions){if(currentLevel.regions[key]===rid)count++}
return Math.max(1,Math.floor(count/2));
}
function buildNumberPad(){
const pad=document.getElementById('number-pad');
if(!currentLevel)return;
// Find max number across all regions
let maxNum=1;
for(let r=0;r<currentLevel.rows;r++)for(let c=0;c<currentLevel.cols;c++)maxNum=Math.max(maxNum,getMaxNumber(r,c));
let html='';
for(let n=1;n<=maxNum;n++){
html+=`<button class="num-btn" onclick="selectNumber(${n})">${n}</button>`;
}
html+=`<button class="num-btn erase" onclick="selectNumber(0)">✕</button>`;
pad.innerHTML=html;
}
function selectNumber(n){
selectedNumber=n;
SFX.click();
}
function setupCanvas(){
const rows=currentLevel.rows,cols=currentLevel.cols;
const maxW=Math.min(window.innerWidth-32,500);
const maxH=window.innerHeight-300;
const cellW=Math.floor(maxW/cols);
const cellH=Math.floor(maxH/rows);
cellSize=Math.min(cellW,cellH,60);
if(cellSize<25)cellSize=25;
canvas.width=cellSize*cols+2;
canvas.height=cellSize*rows+2;
gridOffsetX=1;gridOffsetY=1;
}

function getRegion(r,c){return currentLevel.regions[`${r},${c}`]||0}

function render(){
if(!currentLevel)return;
const rows=currentLevel.rows,cols=currentLevel.cols;
ctx.clearRect(0,0,canvas.width,canvas.height);

// Draw cells
for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){
const x=gridOffsetX+c*cellSize;
const y=gridOffsetY+r*cellSize;
const rid=getRegion(r,c);
const colorIdx=(rid-1)%REGION_COLORS.length;
const bgColor=REGION_COLORS[colorIdx];

// Cell background
ctx.fillStyle=bgColor;
ctx.fillRect(x,y,cellSize,cellSize);

// Highlight selected cell
if(selectedCell&&selectedCell.r===r&&selectedCell.c===c){
ctx.fillStyle='rgba(99,102,241,0.25)';
ctx.fillRect(x,y,cellSize,cellSize);
}

// Hint cells
if(selectedCell&&selectedCell.hint&&selectedCell.r===r&&selectedCell.c===c){
ctx.strokeStyle='#fbbf24';
ctx.lineWidth=3;
ctx.strokeRect(x+2,y+2,cellSize-4,cellSize-4);
}

// Number
if(board[r][c]>0){
ctx.fillStyle='#1a1a2e';
ctx.font=`bold ${Math.floor(cellSize*0.5)}px system-ui`;
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.fillText(board[r][c],x+cellSize/2,y+cellSize/2);
}
}
}

// Draw region borders (thick lines where region changes)
ctx.strokeStyle='#1a1a2e';
ctx.lineWidth=3;
for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){
const x=gridOffsetX+c*cellSize;
const y=gridOffsetY+r*cellSize;
// Top border
if(r===0||getRegion(r-1,c)!==getRegion(r,c)){
ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cellSize,y);ctx.stroke();
}
// Bottom border
if(r===rows-1||getRegion(r+1,c)!==getRegion(r,c)){
ctx.beginPath();ctx.moveTo(x,y+cellSize);ctx.lineTo(x+cellSize,y+cellSize);ctx.stroke();
}
// Left border
if(c===0||getRegion(r,c-1)!==getRegion(r,c)){
ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cellSize);ctx.stroke();
}
// Right border
if(c===cols-1||getRegion(r,c+1)!==getRegion(r,c)){
ctx.beginPath();ctx.moveTo(x+cellSize,y);ctx.lineTo(x+cellSize,y+cellSize);ctx.stroke();
}
}
}

// Draw border sum clues (circles on edges)
if(currentLevel.clues){
currentLevel.clues.forEach(clue=>{
const midR=(clue.r1+clue.r2)/2;
const midC=(clue.c1+clue.c2)/2;
const x=gridOffsetX+midC*cellSize+cellSize/2;
const y=gridOffsetY+midR*cellSize+cellSize/2;
// Circle
ctx.beginPath();
ctx.arc(x,y,Math.max(8,cellSize*0.18),0,Math.PI*2);
ctx.fillStyle='#1a1a2e';
ctx.fill();
// Number
ctx.fillStyle='#fff';
ctx.font=`bold ${Math.floor(cellSize*0.25)}px system-ui`;
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.fillText(clue.sum,x,y);
});
}

// Draw 2x2 violation highlight
for(let r=0;r<rows-1;r++){
for(let c=0;c<cols-1;c++){
if(board[r][c]>0&&board[r][c]===board[r][c+1]&&board[r][c]===board[r+1][c]&&board[r][c]===board[r+1][c+1]){
const x=gridOffsetX+c*cellSize;
const y=gridOffsetY+r*cellSize;
ctx.strokeStyle='rgba(239,68,68,0.6)';
ctx.lineWidth=4;
ctx.strokeRect(x+2,y+2,cellSize*2-4,cellSize*2-4);
}
}
}
}

// === INPUT ===
function handleCanvasClick(e){
if(!currentLevel)return;
const rect=canvas.getBoundingClientRect();
const scaleX=canvas.width/rect.width;
const scaleY=canvas.height/rect.height;
const x=(e.clientX-rect.left)*scaleX-gridOffsetX;
const y=(e.clientY-rect.top)*scaleY-gridOffsetY;
const c=Math.floor(x/cellSize);
const r=Math.floor(y/cellSize);
if(r<0||r>=currentLevel.rows||c<0||c>=currentLevel.cols)return;

const maxNum=getMaxNumber(r,c);
if(selectedNumber>maxNum){
showToast('Number too high for this region');
SFX.error();
return;
}
if(board[r][c]===selectedNumber){
board[r][c]=0;
SFX.erase();
}else{
board[r][c]=selectedNumber;
if(selectedNumber>0)SFX.place();
}
if(autocheckOn)checkSolution(true);
render();
}

// Long press for erase
let pressTimer=null;
canvas.addEventListener('pointerdown',e=>{
pressTimer=setTimeout(()=>{
if(!currentLevel)return;
const rect=canvas.getBoundingClientRect();
const scaleX=canvas.width/rect.width;
const scaleY=canvas.height/rect.height;
const x=(e.clientX-rect.left)*scaleX-gridOffsetX;
const y=(e.clientY-rect.top)*scaleY-gridOffsetY;
const c=Math.floor(x/cellSize);
const r=Math.floor(y/cellSize);
if(r>=0&&r<currentLevel.rows&&c>=0&&c<currentLevel.cols){
board[r][c]=0;SFX.erase();render();
}
},500);
});
canvas.addEventListener('pointerup',e=>{if(pressTimer){clearTimeout(pressTimer);pressTimer=null;handleCanvasClick(e)}});
canvas.addEventListener('pointerleave',()=>{if(pressTimer){clearTimeout(pressTimer);pressTimer=null}});

// === SOLUTION CHECK ===
function checkSolution(silent){
if(!currentLevel)return false;
const rows=currentLevel.rows,cols=currentLevel.cols;

// Check all cells filled
for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(board[r][c]===0){
if(!silent)showToast('Some cells are empty');
return false;
}

// Check region constraints
const regionMap={};
for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
const rid=getRegion(r,c);
if(!regionMap[rid])regionMap[rid]={};
const num=board[r][c];
if(!regionMap[rid][num])regionMap[rid][num]=[];
regionMap[rid][num].push([r,c]);
}

for(const rid in regionMap){
const cells=regionMap[rid];
const regionSize=Object.keys(currentLevel.regions).filter(k=>currentLevel.regions[k]===parseInt(rid)).length;
const maxN=Math.floor(regionSize/2);
// Check each number 1..maxN appears exactly twice
for(let n=1;n<=maxN;n++){
if(!cells[n]||cells[n].length!==2){
if(!silent)showToast(`Region ${rid}: number ${n} must appear exactly twice`);
SFX.error();return false;
}
const[[r1,c1],[r2,c2]]=cells[n];
if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1){
if(!silent)showToast(`Number ${n} cells must be adjacent`);
SFX.error();return false;
}
}
}

// Check no 2x2
for(let r=0;r<rows-1;r++)for(let c=0;c<cols-1;c++){
if(board[r][c]>0&&board[r][c]===board[r][c+1]&&board[r][c]===board[r+1][c]&&board[r][c]===board[r+1][c+1]){
if(!silent)showToast('2×2 same number block detected');
SFX.error();return false;
}
}

// Check border clues
if(currentLevel.clues){
for(const clue of currentLevel.clues){
const sum=board[clue.r1][clue.c1]+board[clue.r2][clue.c2];
if(sum!==clue.sum){
if(!silent)showToast(`Border clue ${clue.sum} not satisfied (got ${sum})`);
SFX.error();return false;
}
}
}

// WIN!
if(!silent){
SFX.win();
const stars=hintsLeft===3?3:hintsLeft>=1?2:1;
progress[levelIdx]=Math.max(progress[levelIdx]||0,stars);
localStorage.setItem('kazunori_progress',JSON.stringify(progress));
showWinOverlay(stars);
spawnConfetti();
}
return true;
}

function useHint(){
if(!currentLevel||hintsLeft<=0){showToast('No hints left');return}
hintsLeft--;
document.getElementById('hints-left').textContent=`Hints: ${hintsLeft}`;
// Find an empty or wrong cell
const rows=currentLevel.rows,cols=currentLevel.cols;
for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){
if(board[r][c]!==currentLevel.solution[r][c]){
board[r][c]=currentLevel.solution[r][c];
selectedCell={r,c,hint:true};
SFX.hint();
render();
setTimeout(()=>{selectedCell=null;render()},1500);
return;
}
}
}
showToast('Everything looks correct!');
}

function restartLevel(){
if(!currentLevel)return;
const rows=currentLevel.rows,cols=currentLevel.cols;
board=[];
for(let r=0;r<rows;r++)board.push(new Array(cols).fill(0));
hintsLeft=3;
document.getElementById('hints-left').textContent=`Hints: ${hintsLeft}`;
SFX.click();
render();
}
function goToMenu(){
stopMusic();
document.getElementById('game-view').style.display='none';
document.getElementById('menu').style.display='flex';
document.getElementById('menu').style.flexDirection='column';
document.getElementById('menu').style.alignItems='center';
buildMenu();
}
function nextLevel(){
closeOverlay();
if(levelIdx<LEVELS.length-1)startLevel(levelIdx+1);
else goToMenu();
}

// === UI HELPERS ===
function showToast(msg){
const t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2000);
}
function showWinOverlay(stars){
document.getElementById('overlay-title').textContent='Solved!';
document.getElementById('overlay-stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
document.getElementById('overlay-msg').textContent=`Level ${levelIdx+1} complete with ${stars} star${stars>1?'s':''}!`;
document.getElementById('overlay').classList.add('show');
}
function closeOverlay(){document.getElementById('overlay').classList.remove('show')}
function toggleSettings(){document.getElementById('settings-panel').classList.toggle('show')}
function toggleMusic(){
musicOn=!musicOn;
document.getElementById('music-toggle').classList.toggle('on',musicOn);
if(musicOn)startMusic();else stopMusic();
}
function toggleSfx(){
sfxOn=!sfxOn;
document.getElementById('sfx-toggle').classList.toggle('on',sfxOn);
}
function toggleAutocheck(){
autocheckOn=!autocheckOn;
document.getElementById('autocheck-toggle').classList.toggle('on',autocheckOn);
}
function spawnConfetti(){
for(let i=0;i<50;i++){
const el=document.createElement('div');
el.className='confetti';
el.style.left=Math.random()*window.innerWidth+'px';
el.style.top='-10px';
el.style.background=['#6366f1','#8b5cf6','#22c55e','#fbbf24','#ef4444'][Math.floor(Math.random()*5)];
el.style.borderRadius=Math.random()>0.5?'50%':'0';
document.body.appendChild(el);
const dx=(Math.random()-0.5)*300;
const dy=window.innerHeight+50;
const dur=2000+Math.random()*1000;
el.animate([{transform:`translate(0,0) rotate(0deg)`},{transform:`translate(${dx}px,${dy}px) rotate(${Math.random()*720}deg)`}],{duration:dur,easing:'ease-out'}).onfinish=()=>el.remove();
}
}

// Keyboard
document.addEventListener('keydown',e=>{
if(!currentLevel||document.getElementById('game-view').style.display==='none')return;
const rows=currentLevel.rows,cols=currentLevel.cols;
switch(e.key){
case'Escape':goToMenu();break;
case'r':case'R':restartLevel();break;
case'h':case'H':useHint();break;
case'Enter':checkSolution();break;
case'1':case'2':case'3':case'4':case'5':
const n=parseInt(e.key);
if(selectedCell&&n<=getMaxNumber(selectedCell.r,selectedCell.c)){
board[selectedCell.r][selectedCell.c]=n;SFX.place();render();
}
break;
case'Backspace':case'Delete':case'0':
if(selectedCell){board[selectedCell.r][selectedCell.c]=0;SFX.erase();render()}
break;
case'ArrowUp':if(selectedCell){selectedCell.r=Math.max(0,selectedCell.r-1);render()}break;
case'ArrowDown':if(selectedCell){selectedCell.r=Math.min(rows-1,selectedCell.r+1);render()}break;
case'ArrowLeft':if(selectedCell){selectedCell.c=Math.max(0,selectedCell.c-1);render()}break;
case'ArrowRight':if(selectedCell){selectedCell.c=Math.min(cols-1,selectedCell.c+1);render()}break;
}
});

window.addEventListener('resize',()=>{if(currentLevel){setupCanvas();render()}});

// Init
buildMenu();
</script>
