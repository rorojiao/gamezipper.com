// ─── Shape rotation/flip helpers ──────────────────────────────────
function normalizeCells(cells) {
  const minR = Math.min(...cells.map(c=>c[0]));
  const minC = Math.min(...cells.map(c=>c[1]));
  return cells.map(([r,c])=>[r-minR, c-minC]).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
}
function rotateCells(cells) {
  return cells.map(([r,c])=>[c,-r]);
}
function flipCells(cells) {
  return cells.map(([r,c])=>[r,-c]);
}
function orientShape(baseCells, rotation, flipped) {
  let cells = baseCells.map(c=>[...c]);
  if (flipped) cells = flipCells(cells);
  for (let i = 0; i < rotation; i++) cells = rotateCells(cells);
  return normalizeCells(cells);
}

// ─── Audio (Web Audio API procedural) ─────────────────────────────
let audioCtx = null;
let musicGain = null;
let sfxGain = null;
let musicInterval = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.08;
    musicGain.connect(audioCtx.destination);
    sfxGain = audioCtx.createGain();
    sfxGain.gain.value = 0.15;
    sfxGain.connect(audioCtx.destination);
  } catch(e) { console.log('Audio not supported'); }
}

function playSFX(freq, dur=0.1, type='sine', vol=1) {
  if (!state.settings.sfx || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.frequency.value = freq;
  osc.type = type;
  g.gain.value = vol * 0.3;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(g); g.connect(sfxGain);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function sfxPlace() { playSFX(440, 0.08, 'square'); setTimeout(()=>playSFX(660,0.06,'square'),40); }
function sfxErase() { playSFX(300, 0.08, 'sawtooth'); }
function sfxError() { playSFX(150, 0.15, 'sawtooth', 0.5); }
function sfxHint() { playSFX(800, 0.1, 'sine'); setTimeout(()=>playSFX(1000,0.08,'sine'),60); }
function sfxWin() {
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSFX(f,0.2,'sine',1.5),i*100));
}

const CHORD_PROG = [
  [261.63, 329.63, 392, 493.88], // Cmaj7
  [293.66, 349.23, 440, 523.25], // Dm7
  [220, 261.63, 329.63, 392],    // Am7
  [196, 246.94, 293.66, 349.23]  // G7
];
let chordIdx = 0;

function startMusic() {
  if (!state.settings.music || !audioCtx || musicInterval) return;
  playChord();
  musicInterval = setInterval(playChord, 2500);
}
function playChord() {
  if (!audioCtx || !state.settings.music) return;
  const chord = CHORD_PROG[chordIdx % CHORD_PROG.length];
  chordIdx++;
  chord.forEach(freq => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = 'sine';
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.3);
    g.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 2.4);
    osc.connect(g); g.connect(musicGain);
    osc.start(); osc.stop(audioCtx.currentTime + 2.5);
  });
}
function stopMusic() { if (musicInterval) { clearInterval(musicInterval); musicInterval = null; } }

// ─── Level Loading ────────────────────────────────────────────────
function initLevel(idx) {
  const lv = LEVELS[idx];
  state.levelIdx = idx;
  state.grid = Array(lv.R).fill(null).map(()=>Array(lv.C).fill(null));
  state.placed = [];
  state.hintsUsed = 0;
  state.hintsLeft = state.maxHints;
  state.eraseMode = false;
  state.selectedShape = null;
  state.rotation = 0;
  state.flipped = false;
  // Compute cell size based on grid dimensions
  const maxDim = Math.max(lv.R, lv.C);
  state.cellSize = Math.floor(340 / maxDim);
  state.offsetX = (360 - lv.C * state.cellSize) / 2;
  state.offsetY = (360 - lv.R * state.cellSize) / 2;
  const canvas = document.getElementById('board');
  canvas.width = 360; canvas.height = 360;
  // Load saved progress
  const saved = localStorage.getItem('pentopia_progress');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      state.completed = new Set(s.completed || []);
      state.stars = s.stars || {};
    } catch(e) {}
  }
  updateUI();
  render();
}

function getLevelShapes() {
  return LEVELS[state.levelIdx].shapes.map(s => s.type);
}

function getClues() {
  return LEVELS[state.levelIdx].clues;
}

function isClueCell(r, c) {
  return getClues().some(cl => cl.r === r && cl.c === c);
}

function getClue(r, c) {
  return getClues().find(cl => cl.r === r && cl.c === c);
}

          }
        } else {
          // Empty cell
          ctx.fillStyle = '#1e1c2e';
          ctx.fillRect(x+1, y+1, cs-2, cs-2);
          ctx.strokeStyle = '#2a2640';
          ctx.lineWidth = 1;
          ctx.strokeRect(x, y, cs, cs);
        }
      }
    }
  }

  // Draw hover preview
  if (state.hoverCell && state.selectedShape && !state.eraseMode) {
    const [hr, hc] = state.hoverCell;
    const cells = orientShape(PENTO_SHAPES[state.selectedShape], state.rotation, state.flipped);
    const minR = Math.min(...cells.map(c=>c[0]));
    const minC = Math.min(...cells.map(c=>c[1]));
    const valid = canPlaceShape(cells, hr - minR, hc - minC);
    ctx.globalAlpha = 0.4;
    cells.forEach(([dr, dc]) => {
      const r = hr - minR + dr, c = hc - minC + dc;
      if (r >= 0 && r < lv.R && c >= 0 && c < lv.C) {
        const x = ox + c * cs, y = oy + r * cs;
        ctx.fillStyle = valid ? SHAPE_COLORS[state.selectedShape] : '#ef4444';
        ctx.fillRect(x+1, y+1, cs-2, cs-2);
      }
    });
    ctx.globalAlpha = 1;
  }

  // Grid border
  ctx.strokeStyle = '#4a4470';
  ctx.lineWidth = 2;
  ctx.strokeRect(ox, oy, lv.C * cs, lv.R * cs);
}

// ─── Game Logic ───────────────────────────────────────────────────
function canPlaceShape(cells, baseR, baseC) {
  const lv = LEVELS[state.levelIdx];
  for (const [dr, dc] of cells) {
    const r = baseR + dr, c = baseC + dc;
    if (r < 0 || r >= lv.R || c < 0 || c >= lv.C) return false;
    if (state.grid[r][c] !== null) return false;
    if (isClueCell(r, c)) return false;
    // Check no adjacency (8-neighbors) with other shapes
    for (let nr = r-1; nr <= r+1; nr++) {
      for (let nc = c-1; nc <= c+1; nc++) {
        if (nr === r && nc === c) continue;
        if (nr < 0 || nr >= lv.R || nc < 0 || nc >= lv.C) continue;
        // Adjacency is OK within the SAME shape being placed
        const isSelfCell = cells.some(([cdr,cdc])=>baseR+cdr===nr && baseC+cdc===nc);
        if (isSelfCell) continue;
        if (state.grid[nr][nc] !== null) return false;
      }
    }
  }
  return true;
}

function placeShape(cells, baseR, baseC, shapeType) {
  if (!canPlaceShape(cells, baseR, baseC)) { sfxError(); return false; }
  const placedCells = [];
  for (const [dr, dc] of cells) {
    const r = baseR + dr, c = baseC + dc;
    state.grid[r][c] = shapeType;
    placedCells.push([r, c]);
  }
  state.placed.push({ type: shapeType, cells: placedCells });
  sfxPlace();
  updateUI();
  render();
  if (state.settings.autocheck) checkWin();
  return true;
}

function removeShapeAt(r, c) {
  const idx = state.placed.findIndex(p => p.cells.some(([pr,pc])=>pr===r && pc===c));
  if (idx === -1) return false;
  const shape = state.placed[idx];
  shape.cells.forEach(([sr, sc]) => { state.grid[sr][sc] = null; });
  state.placed.splice(idx, 1);
  sfxErase();
  updateUI();
  render();
  return true;
}

function clueSatisfied(r, c) {
  const clue = getClue(r, c);
  if (!clue) return false;
  const lv = LEVELS[state.levelIdx];
  const dirs = new Set(clue.dirs);
  const actual = new Set();
  for (const [d, [dr, dc]] of Object.entries(DIR_MAP)) {
    let rr = r + dr, cc = c + dc;
    while (rr >= 0 && rr < lv.R && cc >= 0 && cc < lv.C) {
      if (state.grid[rr][cc] !== null) { actual.add(d); break; }
      rr += dr; cc += dc;
    }
  }
  return actual.size === dirs.size && [...actual].every(d => dirs.has(d));
}

function allCluesSatisfied() {
  return getClues().every(cl => clueSatisfied(cl.r, cl.c));
}

function checkWin() {
  const lv = LEVELS[state.levelIdx];
  const expectedShapes = lv.shapes.length;
  // Check all expected shapes placed
  if (state.placed.length !== expectedShapes) return false;
  // Check all clues satisfied
  if (!allCluesSatisfied()) return false;
  // Check no adjacency violations
  for (let i = 0; i < state.placed.length; i++) {
    for (let j = i+1; j < state.placed.length; j++) {
      for (const [r1,c1] of state.placed[i].cells) {
        for (const [r2,c2] of state.placed[j].cells) {
          if (Math.abs(r1-r2)<=1 && Math.abs(c1-c2)<=1 && !(r1===r2&&c1===c2)) return false;
        }
      }
    }
  }
  // Check no duplicate shapes
  const types = state.placed.map(p=>p.type);
  if (new Set(types).size !== types.length) return false;
  // WIN!
  onWin();
  return true;
}

function onWin() {
  sfxWin();
  state.completed.add(state.levelIdx);
  const stars = Math.max(1, 3 - Math.floor(state.hintsUsed));
  state.stars[state.levelIdx] = Math.max(state.stars[state.levelIdx]||0, stars);
  localStorage.setItem('pentopia_progress', JSON.stringify({
    completed: [...state.completed],
    stars: state.stars
  }));
  setTimeout(() => {
    showWinOverlay(stars);
    spawnConfetti();
  }, 300);
}

function showWinOverlay(stars) {
  const ov = document.getElementById('overlay');
  const content = document.getElementById('overlay-content');
  const next = state.levelIdx < 29;
  const starStr = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  content.innerHTML = `
    <h3>🎉 Level Complete!</h3>
    <p style="font-size:1.8em;color:#ffd700;">${starStr}</p>
    <p>You placed all ${LEVELS[state.levelIdx].shapes.length} shapes correctly!</p>
    ${next ? '<button class="btn" id="ov-next" style="margin:8px;">Next Level →</button>' : '<p style="color:#4ade80;">🏆 All levels complete!</p>'}
    <button class="btn" id="ov-replay" style="margin:8px;">↺ Replay</button>
    <button class="btn" id="ov-menu" style="margin:8px;">📋 Level Select</button>
  `;
  ov.classList.add('show');
  if (next) document.getElementById('ov-next').onclick = () => { ov.classList.remove('show'); initLevel(state.levelIdx+1); };
  document.getElementById('ov-replay').onclick = () => { ov.classList.remove('show'); initLevel(state.levelIdx); };
  document.getElementById('ov-menu').onclick = () => { ov.classList.remove('show'); showLevelSelect(); };
}

function spawnConfetti() {
  const colors = ['#ef4444','#f59e0b','#22c55e','#06b6d4','#8b5cf6','#ec4899'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random()*100+'vw';
    el.style.top = '-20px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius = Math.random()>0.5?'50%':'2px';
    document.body.appendChild(el);
    const dur = 2 + Math.random()*2;
    el.animate([
      { transform:`translate(0,0) rotate(0deg)`, opacity:1 },
      { transform:`translate(${(Math.random()-0.5)*200}px, ${window.innerHeight+40}px) rotate(${Math.random()*720}deg)`, opacity:0 }
    ], { duration:dur*1000, easing:'cubic-bezier(0.3,0,0.7,1)' });
    setTimeout(()=>el.remove(), dur*1000);
  }
}

// ─── Hints ────────────────────────────────────────────────────────
function useHint() {
  if (state.hintsLeft <= 0) { showMessage('No hints left!'); sfxError(); return; }
  const lv = LEVELS[state.levelIdx];
  // Find first unplaced shape and reveal its location
  for (const solShape of lv.shapes) {
    const alreadyPlaced = state.placed.some(p => p.type === solShape.type &&
      p.cells.length === solShape.cells.length &&
      p.cells.every(([r,c]) => solShape.cells.some(([sr,sc])=>sr===r&&sc===c)));
    if (!alreadyPlaced) {
      // Show this shape's position
      const hd = document.getElementById('hint-display');
      hd.innerHTML = `💡 The <b style="color:${SHAPE_COLORS[solShape.type]}">${solShape.type}</b> shape goes at row ${solShape.cells[0][0]+1}, col ${solShape.cells[0][1]+1}`;
      hd.classList.add('show');
      setTimeout(()=>hd.classList.remove('show'), 4000);
      state.hintsUsed++;
      state.hintsLeft--;
      sfxHint();
      updateUI();
      return;
    }
  }
  showMessage('All shapes already placed correctly!');
}

// ─── UI Updates ───────────────────────────────────────────────────
function updateUI() {
  document.getElementById('lvl-num').textContent = state.levelIdx + 1;
  document.getElementById('tier-name').textContent = LEVELS[state.levelIdx].tierName;
  document.getElementById('hints-left').textContent = state.hintsLeft;
  const stars = state.stars[state.levelIdx] || 0;
  document.getElementById('star-display').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);

  // Build palette
  const palette = document.getElementById('palette');
  const shapes = getLevelShapes();
  palette.innerHTML = '';
  shapes.forEach(type => {
    const btn = document.createElement('div');
    btn.className = 'pento-btn';
    btn.textContent = type;
    btn.style.color = SHAPE_COLORS[type];
    const used = state.placed.some(p => p.type === type);
    if (used) btn.classList.add('used');
    if (state.selectedShape === type) btn.classList.add('selected');
    if (!used) {
      btn.onclick = () => {
        if (state.selectedShape === type) {
          state.selectedShape = null;
        } else {
          state.selectedShape = type;
          state.eraseMode = false;
        }
        updateUI(); render();
      };
    }
    palette.appendChild(btn);
  });

  // Button states
  document.getElementById('btn-erase').classList.toggle('active', state.eraseMode);
  document.getElementById('status').textContent = state.eraseMode
    ? 'Click a placed shape to erase it.'
    : (state.selectedShape ? `Selected: ${state.selectedShape} — Rotate=${state.rotation*90}° Flip=${state.flipped?'Yes':'No'} — click grid to place` : 'Select a pentomino from the palette');
}

function showMessage(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

// ─── Level Select ─────────────────────────────────────────────────
function showLevelSelect() {
  const ov = document.getElementById('overlay');
  const content = document.getElementById('overlay-content');
  let html = '<h3>📋 Level Select</h3>';
  const tiers = [...new Set(LEVELS.map(l=>l.tierName))];
  tiers.forEach(tierName => {
    html += `<div class="tier-header">${tierName}</div><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;">`;
    LEVELS.filter(l=>l.tierName===tierName).forEach(lv => {
      const idx = lv.level - 1;
      const completed = state.completed.has(idx);
      const current = idx === state.levelIdx;
      const stars = state.stars[idx] || 0;
      html += `<div class="lvl-btn ${completed?'completed':''} ${current?'current':''}" data-lvl="${idx}">${lv.level}<span class="stars">${'★'.repeat(stars)}</span></div>`;
    });
    html += '</div>';
  });
  html += '<button class="btn" id="ls-close" style="margin-top:10px;">Close</button>';
  content.innerHTML = html;
  ov.classList.add('show');
  document.querySelectorAll('.lvl-btn[data-lvl]').forEach(btn => {
    btn.onclick = () => { ov.classList.remove('show'); initLevel(parseInt(btn.dataset.lvl)); };
  });
  document.getElementById('ls-close').onclick = () => ov.classList.remove('show');
}

// ─── Canvas Interaction ───────────────────────────────────────────
function getCellFromEvent(e) {
  const canvas = document.getElementById('board');
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  const lv = LEVELS[state.levelIdx];
  const c = Math.floor((x - state.offsetX) / state.cellSize);
  const r = Math.floor((y - state.offsetY) / state.cellSize);
  if (r < 0 || r >= lv.R || c < 0 || c >= lv.C) return null;
  return [r, c];
}

function handleCanvasClick(e) {
  initAudio();
  const cell = getCellFromEvent(e);
  if (!cell) return;
  const [r, c] = cell;

  if (state.eraseMode) {
    removeShapeAt(r, c);
    return;
  }

  if (!state.selectedShape) {
    // If clicking a placed shape, pick it up (remove)
    if (state.grid[r][c]) removeShapeAt(r, c);
    return;
  }

  const cells = orientShape(PENTO_SHAPES[state.selectedShape], state.rotation, state.flipped);
  const minR = Math.min(...cells.map(cc=>cc[0]));
  const minC = Math.min(...cells.map(cc=>cc[1]));
  const placed = placeShape(cells, r - minR, c - minC, state.selectedShape);
  if (placed) {
    // Keep selection for re-placing, but deselect if all instances used
    // (each shape is unique so once placed, mark as used)
    state.selectedShape = null;
    updateUI();
  }
}

function handleCanvasMove(e) {
  const cell = getCellFromEvent(e);
  if (cell && state.selectedShape && !state.eraseMode) {
    state.hoverCell = cell;
    render();
  } else if (state.hoverCell) {
    state.hoverCell = null;
    render();
  }
}

// ─── Event Listeners ──────────────────────────────────────────────
document.getElementById('board').addEventListener('click', handleCanvasClick);
document.getElementById('board').addEventListener('mousemove', handleCanvasMove);
document.getElementById('board').addEventListener('mouseleave', () => { state.hoverCell = null; render(); });
document.getElementById('board').addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  handleCanvasClick({ clientX: touch.clientX, clientY: touch.clientY });
});

document.getElementById('btn-rotate').onclick = () => { state.rotation = (state.rotation + 1) % 4; updateUI(); render(); };
document.getElementById('btn-flip').onclick = () => { state.flipped = !state.flipped; updateUI(); render(); };
document.getElementById('btn-erase').onclick = () => {
  state.eraseMode = !state.eraseMode;
  if (state.eraseMode) state.selectedShape = null;
  updateUI(); render();
};
document.getElementById('btn-hint').onclick = useHint;
document.getElementById('btn-check').onclick = () => {
  if (checkWin()) { /* onWin handles */ }
  else {
    // Check clues and give feedback
    const unsatisfied = getClues().filter(cl => !clueSatisfied(cl.r, cl.c));
    if (unsatisfied.length === 0 && state.placed.length === LEVELS[state.levelIdx].shapes.length) {
      showMessage('Almost! Check shape adjacency rules.');
    } else {
      showMessage(`${unsatisfied.length} clues not satisfied yet.`);
    }
    sfxError();
  }
};
document.getElementById('btn-clear').onclick = () => {
  initLevel(state.levelIdx);
};
document.getElementById('btn-levels').onclick = showLevelSelect;
document.getElementById('btn-settings').onclick = () => {
  document.getElementById('settings-panel').classList.toggle('show');
};
document.getElementById('set-close').onclick = () => {
  document.getElementById('settings-panel').classList.remove('show');
};
document.getElementById('set-music').onclick = function() {
  state.settings.music = !state.settings.music;
  this.classList.toggle('on');
  if (state.settings.music) startMusic(); else stopMusic();
  localStorage.setItem('pentopia_settings', JSON.stringify(state.settings));
};
document.getElementById('set-sfx').onclick = function() {
  state.settings.sfx = !state.settings.sfx;
  this.classList.toggle('on');
  localStorage.setItem('pentopia_settings', JSON.stringify(state.settings));
};
document.getElementById('set-autocheck').onclick = function() {
  state.settings.autocheck = !state.settings.autocheck;
  this.classList.toggle('on');
  localStorage.setItem('pentopia_settings', JSON.stringify(state.settings));
};

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case 'r': case 'R': state.rotation = (state.rotation+1)%4; updateUI(); render(); break;
    case 'f': case 'F': state.flipped = !state.flipped; updateUI(); render(); break;
    case 'h': case 'H': useHint(); break;
    case 'e': case 'E':
      state.eraseMode = !state.eraseMode;
      if (state.eraseMode) state.selectedShape = null;
      updateUI(); render(); break;
    case 'Escape': document.getElementById('overlay').classList.remove('show'); break;
    case 'Enter':
      if (!document.getElementById('overlay').classList.contains('show')) checkWin();
      break;
  }
});

// ─── Init ─────────────────────────────────────────────────────────
function loadSettings() {
  const saved = localStorage.getItem('pentopia_settings');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      Object.assign(state.settings, s);
      document.getElementById('set-music').classList.toggle('on', s.music);
      document.getElementById('set-sfx').classList.toggle('on', s.sfx);
      document.getElementById('set-autocheck').classList.toggle('on', s.autocheck);
    } catch(e) {}
  }
}

loadSettings();
initLevel(0);

// Start audio on first interaction
document.addEventListener('click', () => { initAudio(); startMusic(); }, { once: true });
document.addEventListener('touchstart', () => { initAudio(); startMusic(); }, { once: true });

</script>
