<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#3d1f5c"/>
    </linearGradient>
    <linearGradient id="hex1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0b429"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <linearGradient id="hex2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0b429"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Honeycomb: 6 outer hexagons + 1 center -->
  <g transform="translate(256 256)">
    <!-- Outer hexagons (using flat-top hex) -->
    <g>
      <!-- Top -->
      <polygon points="0,-180 52,-150 52,-90 0,-60 -52,-90 -52,-150" fill="url(#hex1)" stroke="#ffd700" stroke-width="3"/>
      <text x="0" y="-105" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#1a0a2e" text-anchor="middle">A</text>
      <!-- Top-right -->
      <polygon points="156,-90 208,-60 208,0 156,30 104,0 104,-60" fill="url(#hex2)" stroke="#ffd700" stroke-width="3"/>
      <text x="156" y="0" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#1a0a2e" text-anchor="middle">B</text>
      <!-- Bottom-right -->
      <polygon points="156,30 208,60 208,120 156,150 104,120 104,60" fill="url(#hex1)" stroke="#ffd700" stroke-width="3"/>
      <text x="156" y="115" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#1a0a2e" text-anchor="middle">C</text>
      <!-- Bottom -->
      <polygon points="0,60 52,90 52,150 0,180 -52,150 -52,90" fill="url(#hex2)" stroke="#ffd700" stroke-width="3"/>
      <text x="0" y="135" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#1a0a2e" text-anchor="middle">D</text>
      <!-- Bottom-left -->
      <polygon points="-156,30 -104,60 -104,120 -156,150 -208,120 -208,60" fill="url(#hex1)" stroke="#ffd700" stroke-width="3"/>
      <text x="-156" y="115" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#1a0a2e" text-anchor="middle">E</text>
      <!-- Top-left -->
      <polygon points="-156,-90 -104,-60 -104,0 -156,30 -208,0 -208,-60" fill="url(#hex2)" stroke="#ffd700" stroke-width="3"/>
      <text x="-156" y="0" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#1a0a2e" text-anchor="middle">F</text>
    </g>
    <!-- Center hexagon (larger, golden, with star) -->
    <polygon points="0,-78 67,-39 67,39 0,78 -67,39 -67,-39" fill="url(#hex1)" stroke="#fff" stroke-width="4"/>
    <text x="0" y="20" font-family="Arial Black, sans-serif" font-size="60" font-weight="900" fill="#1a0a2e" text-anchor="middle">★</text>
  </g>
</svg>