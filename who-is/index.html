function initAudio(){
if(window.audioCtx)return;
window.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}
function playSFX(type){
if(!soundEnabled||!window.audioCtx)return;
var ctx=window.audioCtx;
var now=ctx.currentTime;
if(type==='tap'){
var osc=ctx.createOscillator();
var gain=ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value=800;
osc.type='sine';
gain.gain.setValueAtTime(0.1,now);
gain.gain.exponentialRampToValueAtTime(0.01,now+0.1);
osc.start(now);
osc.stop(now+0.1);
}else if(type==='correct'){
var freqs=[523.25,659.25,783.99];
for(var i=0;i<freqs.length;i++){
var osc2=ctx.createOscillator();
var gain2=ctx.createGain();
osc2.connect(gain2);
gain2.connect(ctx.destination);
osc2.frequency.value=freqs[i];
osc2.type='sine';
gain2.gain.setValueAtTime(0.15,now+i*0.1);
gain2.gain.exponentialRampToValueAtTime(0.01,now+i*0.1+0.3);
osc2.start(now+i*0.1);
osc2.stop(now+i*0.1+0.3);
}
}else if(type==='wrong'){
var osc3=ctx.createOscillator();
var gain3=ctx.createGain();
osc3.connect(gain3);
gain3.connect(ctx.destination);
osc3.frequency.value=150;
osc3.type='sawtooth';
gain3.gain.setValueAtTime(0.15,now);
gain3.gain.exponentialRampToValueAtTime(0.01,now+0.3);
osc3.start(now);
osc3.stop(now+0.3);
}else if(type==='hint'){
var osc4=ctx.createOscillator();
var gain4=ctx.createGain();
osc4.connect(gain4);
gain4.connect(ctx.destination);
osc4.frequency.setValueAtTime(400,now);
osc4.frequency.exponentialRampToValueAtTime(800,now+0.2);
osc4.type='sine';
gain4.gain.setValueAtTime(0.1,now);
gain4.gain.exponentialRampToValueAtTime(0.01,now+0.3);
osc4.start(now);
osc4.stop(now+0.3);
}else if(type==='coin'){
var osc5=ctx.createOscillator();
var gain5=ctx.createGain();
osc5.connect(gain5);
gain5.connect(ctx.destination);
osc5.frequency.setValueAtTime(1200,now);
osc5.frequency.setValueAtTime(1500,now+0.05);
osc5.type='square';
gain5.gain.setValueAtTime(0.08,now);
gain5.gain.exponentialRampToValueAtTime(0.01,now+0.15);
osc5.start(now);
osc5.stop(now+0.15);
}else if(type==='complete'){
var freqs2=[523.25,659.25,783.99,1046.5];
for(var j=0;j<freqs2.length;j++){
var osc6=ctx.createOscillator();
var gain6=ctx.createGain();
osc6.connect(gain6);
gain6.connect(ctx.destination);
osc6.frequency.value=freqs2[j];
osc6.type='sine';
gain6.gain.setValueAtTime(0.15,now+j*0.15);
gain6.gain.exponentialRampToValueAtTime(0.01,now+j*0.15+0.4);
osc6.start(now+j*0.15);
osc6.stop(now+j*0.15+0.4);
}
}
}
function startBGM(){
if(!musicEnabled||!window.audioCtx||bgmInterval)return;
var notes=[220,246.94,261.63,293.66,329.63,293.66,261.63,246.94];
var noteIdx=0;
var ctx=window.audioCtx;
var masterGain=ctx.createGain();
masterGain.gain.value=0.04;
masterGain.connect(ctx.destination);
function playNote(){
if(!musicEnabled||!masterGain)return;
var osc=ctx.createOscillator();
var g=ctx.createGain();
osc.connect(g);
g.connect(masterGain);
osc.frequency.value=notes[noteIdx%notes.length];
osc.type='sine';
g.gain.setValueAtTime(0.3,masterGain.context.currentTime);
g.gain.exponentialRampToValueAtTime(0.01,masterGain.context.currentTime+0.8);
osc.start();
osc.stop(masterGain.context.currentTime+0.8);
noteIdx++;
}
playNote();
bgmInterval=setInterval(playNote,1000);
}
function stopBGM(){
if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}
}
function toggleSound(){
soundEnabled=!soundEnabled;
document.getElementById('soundIcon').style.opacity=soundEnabled?1:0.4;
if(!soundEnabled)stopBGM();
else startBGM();
}

var data=JSON.parse(saved);
if(data.v===1){
gameData=data;
coins=gameData.coins||0;
currentLevel=gameData.currentLevel||1;
}
}
}catch(e){}
updateCoinsDisplay();
}

try{
gameData.coins=coins;
gameData.currentLevel=currentLevel;
gameData.stars[currentLevel]=Math.max(gameData.stars[currentLevel]||0,stars);
localStorage.setItem('whoIsProgress',JSON.stringify(gameData));
}catch(e){}
}

currentLevel=levelNum;
currentChapter=Math.ceil(levelNum/5);

wrongCount=0;
levelStartTime=Date.now();
particles=[];
ripples=[];
gameState='game';
document.getElementById('titleScreen').classList.add('hidden');
document.getElementById('chaptersScreen').classList.add('hidden');
document.getElementById('levelSelectScreen').classList.add('hidden');
document.getElementById('resultScreen').classList.add('hidden');

document.getElementById('uiBottom').style.display='flex';

document.getElementById('hintsLeft').textContent=hintsLeft;

}
function setupLevel(levelNum){
var lvl=LEVELS[levelNum-1];

interactions=[];
correctInteraction=null;
if(lvl.type==='choice'){
for(var i=0;i<lvl.options.length;i++){
interactions.push({type:'answer',index:i,label:lvl.options[i],x:150,y:320+i*60,w:500,h:50});
}
correctInteraction={type:'answer',index:lvl.answer};
}else if(lvl.type==='tap'){
interactions.push({type:'tap',id:lvl.clues[0],x:100,y:100,w:600,h:400});
correctInteraction={type:'tap',id:lvl.clues[0]};
}else if(lvl.type==='find3'){
for(var w=0;w<lvl.wrongs.length;w++){
var pos=getWrongPosition(lvl.wrongs[w]);
interactions.push({type:'wrong',id:lvl.wrongs[w],x:pos.x,y:pos.y,w:pos.w,h:pos.h});
}
correctInteraction={type:'find3',found:[]};
}else if(lvl.type==='interaction'){
setupInteractionLevel(lvl);
}
}

function getEventPos(e){
var rect=canvas.getBoundingClientRect();
var scaleX=W/rect.width;
var scaleY=H/rect.height;
var clientX=e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:0);
var clientY=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0);
return{x:(clientX-rect.left)*scaleX,y:(clientY-rect.top)*scaleY};
}
function handlePointerDown(e){
e.preventDefault();
if(gameState!=='game')return;
initAudio();
var pos=getEventPos(e);
addRipple(pos.x,pos.y);
playSFX('tap');
var lvl=levelData;
if(lvl.type==='choice'){
for(var i=0;i<interactions.length;i++){
var int=interactions[i];
if(pos.x>=int.x&&pos.x<=int.x+int.w&&pos.y>=int.y&&pos.y<=int.y+int.h){
playSFX('tap');
if(i===correctInteraction.index){
handleCorrect(int);
}else{
handleWrong(int);
}
}
}
}else if(lvl.type==='tap'){
for(var j=0;j<interactions.length;j++){
var int2=interactions[j];
if(pos.x>=int2.x&&pos.x<=int2.x+int2.w&&pos.y>=int2.y&&pos.y<=int2.y+int2.h){
if(int2.id===correctInteraction.id){
handleCorrect(int2);
}else{
handleWrong(int2);
}
}
}
}else if(lvl.type==='find3'){
var found=false;
for(var k=0;k<interactions.length;k++){
var int3=interactions[k];
if(pos.x>=int3.x&&pos.x<=int3.x+int3.w&&pos.y>=int3.y&&pos.y<=int3.y+int3.h){
if(correctInteraction.found.indexOf(int3.id)===-1){
correctInteraction.found.push(int3.id);
found=true;
playSFX('correct');
addParticles(pos.x,pos.y,'correct');
if(correctInteraction.found.length===3){
setTimeout(function(){handleLevelComplete();},500);
}
}
}
}
if(!found&&correctInteraction.found.length<3){
playSFX('wrong');
wrongCount++;
}
}else if(lvl.type==='interaction'){
handleInteractionDown(pos);
}
}
function handleInteractionDown(pos){
var lvl=levelData;
if(lvl.correctAction==='putfish'){
for(var i=0;i<interactions.length;i++){
var int=interactions[i];
if(int.type==='drag'&&pos.x>=int.x&&pos.x<=int.x+int.w&&pos.y>=int.y&&pos.y<=int.y+int.h){
draggedElement=int;
dragStart={x:pos.x-int.x,y:pos.y-int.y};
}
}
}else if(lvl.correctAction==='tv'){
for(var j=0;j<interactions.length;j++){
var int2=interactions[j];
if(int2.id==='cloth'&&pos.x>=int2.x&&pos.x<=int2.x+int2.w&&pos.y>=int2.y&&pos.y<=int2.y+int2.h){
correctInteraction.step=1;
playSFX('correct');
}else if(int2.id==='power'&&correctInteraction.step>=1&&pos.x>=int2.x&&pos.x<=int2.x+int2.w&&pos.y>=int2.y&&pos.y<=int2.y+int2.h){
correctInteraction.done=true;
handleLevelComplete();
}
}
}else if(lvl.correctAction==='fridge'){
for(var k=0;k<interactions.length;k++){
var int3=interactions[k];
if(int3.type==='drag'&&!correctInteraction.done&&pos.x>=int3.x&&pos.x<=int3.x+int3.w&&pos.y>=int3.y&&pos.y<=int3.y+int3.h){
draggedElement=int3;
dragStart={x:pos.x-int3.x,y:pos.y-int3.y};
}else if(int3.id==='fridge'&&correctInteraction.step===0&&pos.x>=int3.x&&pos.x<=int3.x+int3.w&&pos.y>=int3.y&&pos.y<=int3.y+int3.h){
correctInteraction.step=1;
playSFX('correct');
}else if(int3.id==='fridge'&&correctInteraction.step===1&&pos.x>=int3.x&&pos.x<=int3.x+int3.w&&pos.y>=int3.y&&pos.y<=int3.y+int3.h){
correctInteraction.done=true;
handleLevelComplete();
}
}
}else if(lvl.correctAction==='code'){
for(var m=0;m<interactions.length;m++){
var int4=interactions[m];
if(int4.type==='numpad'){
var btnSize=60;
var startX=int4.x+10;
var startY=int4.y+10;
for(var row=0;row<4;row++){
for(var col=0;col<3;col++){
var bx=startX+col*(btnSize+5);
var by=startY+row*(btnSize+5);
if(pos.x>=bx&&pos.x<=bx+btnSize&&pos.y>=by&&pos.y<=by+btnSize){
var val=row===3?(col===0?'C':col===1?'0':'OK'):String(row*3+col+1);
if(val==='C'){
int4.input='';
}else if(val==='OK'){
if(int4.input===int4.code){
correctInteraction.done=true;
handleLevelComplete();
}else{
int4.input='';
playSFX('wrong');
}
}else{
if(int4.input.length<4){
int4.input+=val;
playSFX('tap');
}
}
}
}
}
}
}
}
function handlePointerMove(e){
if(gameState!=='game'||!draggedElement)return;
e.preventDefault();
var pos=getEventPos(e);
draggedElement.x=pos.x-dragStart.x;
draggedElement.y=pos.y-dragStart.y;
if(draggedElement.id==='fish'&&correctInteraction&&!correctInteraction.done){
var target=findInteraction('target');
if(target){
var dx=draggedElement.x+draggedElement.w/2-(target.x+target.w/2);
var dy=draggedElement.y+draggedElement.h/2-(target.y+target.h/2);
if(Math.sqrt(dx*dx+dy*dy)<50){
correctInteraction.done=true;
draggedElement.x=target.x+(target.w-draggedElement.w)/2;
draggedElement.y=target.y+(target.h-draggedElement.h)/2;
playSFX('correct');
handleLevelComplete();
}
}
}
}
function handlePointerUp(){
draggedElement=null;
}
function findInteraction(id){
for(var i=0;i<interactions.length;i++){
if(interactions[i].id===id)return interactions[i];
}
return null;
}
function handleCorrect(int){
playSFX('correct');
addParticles(W/2,H/2,'correct');
if(levelData.type==='choice'){
int.correct=true;
}
setTimeout(function(){handleLevelComplete();},600);
}
function handleWrong(int){
playSFX('wrong');
addParticles(int.x+int.w/2,int.y+int.h/2,'wrong');
wrongCount++;

function handleLevelComplete(){
var elapsed=(Date.now()-levelStartTime)/1000;
var timeBonus=0;
if(elapsed<30)timeBonus=50;
else if(elapsed<60)timeBonus=25;
var hintPenalty=hintsLeft<3?(3-hintsLeft)*25:0;
score=100+timeBonus-hintPenalty;
if(score<50)score=50;
stars=hintsLeft===3?3:hintsLeft===2?2:1;
var coinsEarned=10+(elapsed<30?5:0);
coins+=coinsEarned;
gameData.stars[currentLevel]=Math.max(gameData.stars[currentLevel]||0,stars);
saveGame();
playSFX('complete');
showResult(coinsEarned);
}
function showResult(coinsEarned){

document.getElementById('resultScreen').classList.remove('hidden');
document.getElementById('resultTitle').textContent='Solved!';

document.getElementById('scoreDisplay').textContent='+'+score+' points';
document.getElementById('coinsEarned').textContent='+'+coinsEarned+' coins';

var star=document.createElement('div');
star.innerHTML='<svg viewBox="0 0 24 24" class="star '+(i<stars?'earned':'')+'"><path fill="'+(i<stars?'#ffd700':'#444')+'" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
starsDiv.appendChild(star);

updateCoinsDisplay();
}

function addRipple(x,y){
ripples.push({x:x,y:y,r:0,alpha:1});
}
function addParticles(x,y,type){
var count=type==='correct'?20:10;
for(var i=0;i<count;i++){
var angle=(Math.PI*2*i)/count;
var speed=2+Math.random()*3;
particles.push({
x:x,
y:y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed,
alpha:1,
color:type==='correct'?'#00ff88':'#ff0066',
size:3+Math.random()*4
});
}
}
function updateParticles(){
particles=particles.filter(function(p){
p.x+=p.vx;
p.y+=p.vy;
p.alpha-=0.02;
p.vy+=0.1;
return p.alpha>0;
});
ripples=ripples.filter(function(r){
r.r+=4;
r.alpha-=0.05;
return r.alpha>0;
});
}
function render(){
if(gameState!=='game')return;
ctx.clearRect(0,0,W,H);
drawScene();
drawUI();
updateParticles();
drawParticles();
animFrameId=requestAnimationFrame(render);
}

ctx.fillStyle=bgGrad;
ctx.fillRect(0,0,W,H);
if(lvl.type==='choice'&&lvl.chapter===1){

ctx.fillStyle='#fff';
ctx.font='14px Nunito';
ctx.fillText('Find the BIGGEST number',280,120);
}else if(action==='fridge'){
var fridgeInt=findInteraction('fridge');
ctx.fillStyle='#888';
ctx.fillRect((fridgeInt?fridgeInt.x:350),(fridgeInt?fridgeInt.y:250),100,150);
ctx.strokeStyle='#fff';
ctx.lineWidth=2;
ctx.strokeRect((fridgeInt?fridgeInt.x:350),(fridgeInt?fridgeInt.y:250),100,150);
if(correctInteraction.step<1){
var elepInt=findInteraction('elephant');
ctx.fillStyle='#888';
ctx.beginPath();
ctx.ellipse((elepInt?elepInt.x:100)+40,(elepInt?elepInt.y:400)+30,35,25,0,0,Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.ellipse((elepInt?elepInt.x:100)+75,(elepInt?elepInt.y:400)+10,15,20,0.3,0,Math.PI*2);
ctx.fill();
}
ctx.fillStyle='#fff';
ctx.font='14px Nunito';
ctx.fillText('Put the elephant in the fridge',280,100);
}else if(action==='tv'){
var clothInt=findInteraction('cloth');
ctx.fillStyle='#333';
ctx.fillRect(300,180,200,130);
if(correctInteraction.step<1){
ctx.fillStyle='#888';
ctx.fillRect((clothInt?clothInt.x:300),(clothInt?clothInt.y:200),200,120);
}else{
ctx.fillStyle='#00ff88';
ctx.fillRect(320,200,160,90);
ctx.fillStyle='#000';
ctx.font='20px Nunito';
ctx.fillText('TV ON!',360,250);
}
var powerInt=findInteraction('power');
ctx.fillStyle='#ff0000';
ctx.beginPath();
ctx.arc((powerInt?powerInt.x:380)+20,(powerInt?powerInt.y:320)+15,8,0,Math.PI*2);
ctx.fill();
}else if(action==='code'){
var padInt=findInteraction('pad');
ctx.fillStyle='#222';
ctx.fillRect((padInt?padInt.x:280),(padInt?padInt.y:250),240,180);
ctx.fillStyle='#fff';
ctx.font='24px monospace';
ctx.fillText((padInt?padInt.input:'')||'____',(padInt?padInt.x:290),(padInt?padInt.y:280));
var btnSize=60;
var startX=(padInt?padInt.x:280)+10;
var startY=(padInt?padInt.y:250)+40;
for(var row=0;row<4;row++){
for(var col=0;col<3;col++){
var bx=startX+col*(btnSize+5);
var by=startY+row*(btnSize+5);
var val=row===3?(col===0?'C':col===1?'0':'OK'):String(row*3+col+1);
ctx.fillStyle='#444';
ctx.fillRect(bx,by,btnSize,btnSize);
ctx.fillStyle='#fff';
ctx.font='18px Nunito';
ctx.fillText(val,bx+20,by+38);
}
}
}
}
function drawRoad(x,y,w,h){
ctx.fillStyle='#333';
ctx.fillRect(x,y,w,h);
ctx.strokeStyle='#fff';
ctx.lineWidth=2;
ctx.setLineDash([20,20]);
ctx.beginPath();
ctx.moveTo(x+w/2,y);
ctx.lineTo(x+w/2,y+h);
ctx.stroke();
ctx.setLineDash([]);
}
function drawCat(x,y){
ctx.fillStyle='#ff8800';
ctx.beginPath();
ctx.ellipse(x,y,30,25,0,0,Math.PI*2);
ctx.fill();
ctx.beginPath();
ctx.moveTo(x-15,y-20);
ctx.lineTo(x-10,y-35);
ctx.lineTo(x-5,y-20);
ctx.moveTo(x+5,y-20);
ctx.lineTo(x+10,y-35);
ctx.lineTo(x+15,y-20);
ctx.fill();
ctx.fillStyle='#000';
ctx.fillRect(x-10,y-5,5,5);
ctx.fillRect(x+5,y-5,5,5);
ctx.fillRect(x-3,y+5,6,4);
}
function drawChapter7_8Scene(levelNum){
ctx.fillStyle='#1a1a2e';
ctx.fillRect(50,80,700,450);
var lvl=LEVELS[levelNum-1];
if(lvl.type==='choice'){
drawCharacter(150,250,0,'#4488ff','Person A','I ate lunch');
drawCharacter(350,250,1,'#ff4444','Person B','Not hungry');
drawCharacter(550,250,0,'#44ff44','Person C','Just had cake');
ctx.fillStyle='rgba(255,0,102,0.3)';
if(interactions[2])ctx.fillRect(interactions[2].x,interactions[2].y,interactions[2].w,interactions[2].h);
}else if(lvl.type==='tap'){
drawDesk(400,350);
ctx.fillStyle='rgba(0,255,136,0.3)';
ctx.fillRect(380,350,60,50);
ctx.fillStyle='#d4a574';
ctx.fillRect(390,360,40,30);
ctx.fillStyle='#fff';
ctx.font='10px Nunito';
ctx.fillText('Letter',400,380);
}else if(lvl.type==='find3'){
ctx.fillStyle='#e0e0e0';
ctx.fillRect(100,150,600,350);
drawBathtub(200,300);
drawMirror(500,180);
drawTowel(600,350);
ctx.fillStyle='rgba(255,0,102,0.3)';
lvl.wrongs.forEach(function(w){
var pos=getWrongPosition(w);
ctx.fillRect(pos.x,pos.y,pos.w,pos.h);
});
}else if(lvl.type==='interaction'){
if(lvl.correctAction==='tv'){
drawChapter6Scene('tv');
}else{
ctx.fillStyle='#333';
ctx.fillRect(300,180,200,130);
ctx.fillStyle='#888';
ctx.fillRect(300,200,200,100);
ctx.fillStyle='#fff';
ctx.font='14px Nunito';
ctx.fillText('Turn on the TV',320,160);
}
}else{
drawDefaultScene();
}
}
function drawBathtub(x,y){
ctx.fillStyle='#fff';
ctx.fillRect(x,y,150,80);
ctx.fillStyle='#87ceeb';
ctx.fillRect(x+5,y+5,140,60);
ctx.fillStyle='#ff8800';
ctx.beginPath();
ctx.ellipse(x+75,y+35,30,20,0,0,Math.PI*2);
ctx.fill();
ctx.fillStyle='#000';
ctx.fillRect(x+68,30,5,5);
}
function drawMirror(x,y){
ctx.fillStyle='#888';
ctx.fillRect(x-40,y-60,80,100);
ctx.fillStyle='#add8e6';
ctx.fillRect(x-35,y-55,70,90);
}
function drawTowel(x,y){
ctx.fillStyle='#fff';
ctx.fillRect(x,y,60,100);
ctx.fillStyle='rgba(0,255,136,0.3)';
ctx.fillRect(x+10,y+20,40,60);
}
function drawDefaultScene(){
ctx.fillStyle='#2a2a4a';
ctx.fillRect(100,150,600,350);
ctx.strokeStyle='#00ff88';
ctx.lineWidth=2;
ctx.strokeRect(100,150,600,350);
ctx.fillStyle='#fff';
ctx.font='18px Nunito';
ctx.fillText('Level '+currentLevel,350,300);
}
function drawUI(){
var lvl=levelData;
if(!lvl)return;
ctx.fillStyle='rgba(0,0,0,0.7)';
ctx.fillRect(0,500,W,100);
ctx.fillStyle='#fff';
ctx.font='bold 20px Nunito';
ctx.fillText(lvl.question,50,540);
if(lvl.type==='choice'||lvl.type==='find3'){
var opts=lvl.options||['Option A','Option B','Option C'];
ctx.font='16px Nunito';
for(var i=0;i<interactions.length;i++){
var int=interactions[i];
if(!int)continue;
ctx.fillStyle=int.correct?'#00ff88':int.wrong?'#ff0066':'rgba(30,30,70,0.9)';
ctx.fillRect(int.x,int.y,int.w,int.h);
ctx.strokeStyle=int.correct?'#00ff88':int.wrong?'#ff0066':'#4488ff';
ctx.lineWidth=2;
ctx.strokeRect(int.x,int.y,int.w,int.h);
ctx.fillStyle='#fff';
ctx.fillText(int.label,int.x+15,int.y+32);
}
}
if(lvl.type==='find3'){
ctx.fillStyle='#ffd700';
ctx.font='bold 16px Nunito';
ctx.fillText('Found: '+(correctInteraction.found?correctInteraction.found.length:0)+'/3',W-120,540);
}
}
function drawParticles(){
for(var i=0;i<particles.length;i++){
var p=particles[i];
ctx.fillStyle=p.color;
ctx.globalAlpha=p.alpha;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
}
ctx.globalAlpha=1;
for(var j=0;j<ripples.length;j++){
var r=ripples[j];
ctx.strokeStyle='rgba(0,255,136,'+r.alpha+')';
ctx.lineWidth=2;
ctx.beginPath();
ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
ctx.stroke();
}
}
canvas.addEventListener('pointerdown',handlePointerDown);
canvas.addEventListener('pointermove',handlePointerMove);
canvas.addEventListener('pointerup',handlePointerUp);
canvas.addEventListener('pointercancel',handlePointerUp);
document.addEventListener('visibilitychange',function(){
if(document.hidden){
stopBGM();
}else if(gameState==='game'&&musicEnabled){
startBGM();
}
});
window.addEventListener('beforeunload',function(){
stopBGM();
if(window.audioCtx){
window.audioCtx.close();
}
});
function cleanup(){stopBGM();if(window.audioCtx){window.audioCtx.close();}var c=document.getElementById('gameCanvas');if(c){c.removeEventListener('pointerdown',handlePointerDown);c.removeEventListener('pointermove',handlePointerMove);c.removeEventListener('pointerup',handlePointerUp);c.removeEventListener('pointercancel',handlePointerUp);}}
loadGame();
showTitle();
})();
</script>
