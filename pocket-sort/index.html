*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a 0%,#1a1a2e 50%,#0d0d1f 100%);color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow-x:hidden;user-select:none;touch-action:none;-webkit-user-select:none}
canvas{display:block;touch-action:none}
.game-wrap{max-width:480px;margin:0 auto;padding:8px;min-height:100vh;display:flex;flex-direction:column;position:relative}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.title{font-size:20px;font-weight:700;color:#fff;text-shadow:0 0 20px rgba(255,215,0,0.5)}
.level-badge{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px}
.stars-display{color:#ffd700;font-size:18px;letter-spacing:2px}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
canvas{border-radius:12px;box-shadow:0 4px 30px rgba(0,0,0,0.5)}
.controls{display:flex;gap:8px;justify-content:center;padding:8px 0;flex-wrap:wrap}
.btn{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:1px solid #3a3a5a;color:#e0e0e0;padding:10px 16px;border-radius:12px;font-size:14px;cursor:pointer;transition:all .2s;touch-action:manipulation;min-width:70px;text-align:center}
.btn:hover{background:linear-gradient(135deg,#3a3a6a,#2a2a5a);border-color:#5a5a8a}
.btn:active{transform:scale(0.95)}
.btn-primary{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;border-color:#ffd700;font-weight:700}
.btn-primary:hover{background:linear-gradient(135deg,#ffe44d,#ffa040)}
.btn-danger{background:linear-gradient(135deg,#ff4444,#cc0000);color:#fff;border-color:#ff4444}
.btn-sm{padding:6px 10px;font-size:12px}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.active{display:flex}
.modal{background:linear-gradient(135deg,#1a1a3a,#0d0d2a);border:1px solid #3a3a5a;border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center;max-height:90vh;overflow-y:auto}
.modal h2{color:#ffd700;margin-bottom:12px;font-size:22px;text-shadow:0 0 15px rgba(255,215,0,0.4)}
.modal p{color:#b0b0c0;margin-bottom:8px;font-size:14px;line-height:1.6}
.modal .btn{margin:4px}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
.level-cell{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:1px solid #3a3a5a;border-radius:10px;padding:10px 4px;cursor:pointer;transition:all .2s;text-align:center;font-size:13px;font-weight:600}
.level-cell:hover{border-color:#ffd700;background:linear-gradient(135deg,#3a3a6a,#2a2a5a)}
.level-cell.locked{opacity:0.4;cursor:not-allowed}
.level-cell.current{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,0.3)}
.level-cell .mini-stars{color:#ffd700;font-size:10px;margin-top:2px}
.info-row{display:flex;justify-content:space-between;align-items:center;margin:8px 0;font-size:14px;color:#b0b0c0}
.info-row span{color:#ffd700;font-weight:700}
.powerups{display:flex;gap:8px;justify-content:center;padding:4px 0}
.pu-btn{position:relative;background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:1px solid #3a3a5a;color:#e0e0e0;width:50px;height:50px;border-radius:12px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pu-btn:hover{border-color:#ffd700;background:linear-gradient(135deg,#3a3a6a,#2a2a5a)}
.pu-btn:active{transform:scale(0.9)}
.pu-btn .pu-count{position:absolute;top:-4px;right:-4px;background:#ffd700;color:#000;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pu-btn:disabled{opacity:0.3;cursor:not-allowed}
.tier-label{font-size:12px;color:#888;margin:4px 0;text-align:center}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a2a4a}
.settings-row label{font-size:14px;color:#b0b0c0}
.toggle{width:44px;height:24px;background:#2a2a4a;border-radius:12px;position:relative;cursor:pointer;transition:background .3s}
.toggle.on{background:#ffd700}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .3s}
.toggle.on::after{left:22px}
</style>
</head>

// --- AUDIO ---
var audioCtx=null;
var bgmNodes=[];
var timers=[];

function initAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }catch(e){}
}

function playTone(freq,dur,vol,type){
  if(!audioCtx||!state.soundOn)return;
  try{
    var o=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    o.type=type||"sine";
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(dur||0.15));
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+(dur||0.15));
  }catch(e){}
}

function sfxTap(){playTone(800,0.06,0.12,"square")}
function sfxPlace(){playTone(520,0.1,0.15,"sine")}
function sfxMerge(){playTone(880,0.2,0.2,"sine");setTimeout(function(){playTone(1100,0.15,0.15,"sine")},80)}
function sfxWin(){playTone(523,0.15,0.2);setTimeout(function(){playTone(659,0.15,0.2)},120);setTimeout(function(){playTone(784,0.15,0.2)},240);setTimeout(function(){playTone(1047,0.3,0.25)},360)}
function sfxError(){playTone(200,0.15,0.1,"sawtooth")}

function startBGM(){
  if(!audioCtx||bgmNodes.length||!state.musicOn)return;
  try{
    var sr=audioCtx.sampleRate;var dur=16;var bufSize=sr*dur;
    var buf=audioCtx.createBuffer(1,bufSize,sr);var d=buf.getChannelData(0);
    var chords=[[261.63,329.63,392],[293.66,369.99,440],[329.63,415.3,493.88],[293.66,369.99,440]];
    var chordDur=dur/chords.length;
    for(var i=0;i<bufSize;i++){
      var t=i/sr;var ci=Math.min(Math.floor(t/chordDur),chords.length-1);var chord=chords[ci];
      var s=0;
      for(var n=0;n<chord.length;n++){
        var f=chord[n];
        s+=Math.sin(2*Math.PI*f*t)*0.05;
        s+=Math.sin(2*Math.PI*f*2*t)*0.012;
        s+=Math.sin(2*Math.PI*f*0.5*t)*0.025;
      }
      var fade=t%chordDur;var fadeIn=Math.min(fade/0.8,1);var fadeOut=Math.min((chordDur-fade)/0.8,1);
      s*=fadeIn*fadeOut;
      var lfo=Math.sin(2*Math.PI*0.25*t)*0.12+1;
      d[i]=s*lfo*0.5;
    }
    var src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
    var filt=audioCtx.createBiquadFilter();filt.type="lowpass";filt.frequency.value=700;filt.Q.value=1;
    var g=audioCtx.createGain();g.gain.value=0.25;
    src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);
    src.start();bgmNodes=[src,filt,g];
  }catch(e){}
}

function stopBGM(){
  bgmNodes.forEach(function(n){try{n.stop&&n.stop();n.disconnect&&n.disconnect()}catch(e){}});
  bgmNodes=[];
}

function updateBGMVolume(){
  if(bgmNodes.length<3)return;
  bgmNodes[2].gain.value=state.musicOn?0.25:0;
}

// --- CANVAS ---
var canvas,ctx;
var CW=0,CH=0;

function setupCanvas(){
  canvas=document.getElementById("gameCanvas");
  ctx=canvas.getContext("2d");
  resizeCanvas();
}

function resizeCanvas(){
  var wrap=document.querySelector(".canvas-wrap");
  var w=Math.min(wrap.clientWidth-16,460);
  var lv=LEVELS[state.level];
  var totalCols=lv.colors+lv.extra;
  var colW=COIN_SIZE+COL_GAP;
  var needW=totalCols*colW+COL_GAP*2;
  CW=Math.max(w,Math.min(needW+20,460));
  CH=Math.min(Math.max(w*1.3,420),640);
  canvas.width=CW*window.devicePixelRatio;
  canvas.height=CH*window.devicePixelRatio;
  canvas.style.width=CW+"px";
  canvas.style.height=CH+"px";
  ctx.setTransform(window.devicePixelRatio,0,0,window.devicePixelRatio,0,0);
}

// --- LEVEL GENERATION ---
function generateLevel(lvl){
  var lv=LEVELS[lvl];
  var cols=lv.colors;
  var perCol=lv.perColor;
  var extra=lv.extra;
  state.numExtra=extra;
  state.par=lv.par;
  state.moves=0;
  state.undoStack=[];
  state.undoLeft=3;
  state.shuffleLeft=1;
  state.extraLeft=1;
  state.selected=-1;
  state.animating=false;
  state.mergeAnims=[];
  state.moveAnims=[];
  state.particles=[];

  // Create coin pool
  var pool=[];
  for(var c=1;c<=cols;c++){
    for(var p=0;p<perCol;p++){
      pool.push(c);
    }
  }

  // Shuffle pool
  for(var i=pool.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;
  }

  // Distribute into columns
  var numMainCols=cols;
  var allCols=[];
  for(var c=0;c<numMainCols;c++)allCols.push([]);
  for(var i=0;i<pool.length;i++){
    allCols[i%numMainCols].push(pool[i]);
  }

  // Check solvability hint: if all same-color coins are stacked, reshuffle
  var attempts=0;
  while(attempts<20&&hasCompleteColumn(allCols)){
    for(var i=pool.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;
    }
    allCols=[];
    for(var c=0;c<numMainCols;c++)allCols.push([]);
    for(var i=0;i<pool.length;i++){
      allCols[i%numMainCols].push(pool[i]);
    }
    attempts++;
  }

  state.columns=[];
  for(var c=0;c<numMainCols;c++){
    state.columns.push(allCols[c].slice());
  }
  state.extraCols=[];
  for(var e=0;e<extra;e++){
    state.extraCols.push([]);
  }
}

function hasCompleteColumn(cols){
  for(var c=0;c<cols.length;c++){
    if(cols[c].length<2)continue;
    var allSame=true;
    for(var i=1;i<cols[c].length;i++){
      if(cols[c][i]!==cols[c][0]){allSame=false;break}
    }
    if(allSame)return true;
  }
  return false;
}

// --- RENDERING ---
function getColumnX(ci,isExtra){
  var lv=LEVELS[state.level];
  var totalCols=lv.colors+lv.extra;
  var colW=COIN_SIZE+COL_GAP;
  var totalW=totalCols*colW-COL_GAP;
  var startX=(CW-totalW)/2;
  if(isExtra){
    return startX+(lv.colors+ci)*colW;
  }
  return startX+ci*colW;
}

function getColumnY(){
  return CH-20;
}

function drawCoin(x,y,colorIdx,scale,alpha){
  if(!colorIdx||colorIdx<1)return;
  var c=COLORS[colorIdx];
  var r=COIN_SIZE/2*scale;
  ctx.save();
  ctx.globalAlpha=alpha||1;

  // Glow
  var grd=ctx.createRadialGradient(x,y,r*0.3,x,y,r*1.5);
  grd.addColorStop(0,c.glow);
  grd.addColorStop(1,"transparent");
  ctx.fillStyle=grd;
  ctx.fillRect(x-r*2,y-r*2,r*4,r*4);

  // Outer circle
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=c.fill;
  ctx.fill();
  ctx.strokeStyle=c.dark;
  ctx.lineWidth=2;
  ctx.stroke();

  // Inner highlight
  ctx.beginPath();
  ctx.arc(x-r*0.15,y-r*0.15,r*0.7,0,Math.PI*2);
  var ig=ctx.createRadialGradient(x-r*0.2,y-r*0.3,0,x,y,r*0.7);
  ig.addColorStop(0,c.light);
  ig.addColorStop(1,c.fill);
  ctx.fillStyle=ig;
  ctx.fill();

  // Dollar sign
  ctx.fillStyle=c.dark;
  ctx.font="bold "+Math.round(r*0.9)+"px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("$",x,y+1);

  // Shine
  ctx.beginPath();
  ctx.ellipse(x-r*0.25,y-r*0.35,r*0.25,r*0.12,-0.3,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,0.4)";
  ctx.fill();

  ctx.restore();
}

function drawColumn(ci,isExtra){
  var col=isExtra?state.extraCols[ci]:state.columns[ci];
  var x=getColumnX(ci,isExtra);
  var baseY=getColumnY();
  var colH=LEVELS[state.level].perColor*COIN_SIZE+10;
  var maxH=baseY-80;

  // Column tube
  var tubeX=x-COIN_SIZE/2-3;
  var tubeW=COIN_SIZE+6;
  ctx.save();
  ctx.fillStyle="rgba(255,255,255,0.04)";
  ctx.strokeStyle="rgba(255,255,255,0.1)";
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.roundRect(tubeX,baseY-colH-5,tubeW,colH+10,6);
  ctx.fill();
  ctx.stroke();

  // Selection highlight
  var selIdx=isExtra?-1:ci;
  if(state.selected===selIdx&&!isExtra){
    ctx.strokeStyle="#ffd700";
    ctx.lineWidth=2;
    ctx.shadowColor="#ffd700";
    ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.roundRect(tubeX-2,baseY-colH-7,tubeW+4,colH+14,8);
    ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.restore();

  // Draw coins
  for(var i=0;i<col.length;i++){
    var coinY=baseY-10-i*(COIN_SIZE-2);
    drawCoin(x,coinY,col[i],1,1);
  }

  // Empty indicator
  if(col.length===0){
    ctx.save();
    ctx.fillStyle="rgba(255,255,255,0.08)";
    ctx.beginPath();
    ctx.arc(x,baseY-COIN_SIZE/2-2,COIN_SIZE/3,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawParticles(){
  for(var i=state.particles.length-1;i>=0;i--){
    var p=state.particles[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.15;
    p.life-=0.02;
    if(p.life<=0){state.particles.splice(i,1);continue}
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawMergeAnims(){
  for(var i=state.mergeAnims.length-1;i>=0;i--){
    var a=state.mergeAnims[i];
    a.t+=0.04;
    if(a.t>=1){state.mergeAnims.splice(i,1);continue}
    var scale=1+Math.sin(a.t*Math.PI)*0.5;
    drawCoin(a.x,a.y,a.color,scale,1-a.t*0.5);
  }
}

function drawMoveAnims(){
  for(var i=state.moveAnims.length-1;i>=0;i--){
    var a=state.moveAnims[i];
    a.t+=ANIM_SPEED;
    if(a.t>=1){
      a.toCol.push(a.color);
      state.moveAnims.splice(i,1);
      if(state.moveAnims.length===0){
        state.animating=false;
        checkMerge();
      }
      continue;
    }
    var t=a.t;
    var cx=a.fromX+(a.toX-a.fromX)*t;
    var cy=a.fromY+(a.toY-a.fromY)*t-Math.sin(t*Math.PI)*60;
    drawCoin(cx,cy,a.color,1,1);
  }
}

function drawTopInfo(){
  // Tier label
  var tier=Math.floor(state.level/6)+1;
  ctx.save();
  ctx.fillStyle="rgba(255,255,255,0.3)";
  ctx.font="12px sans-serif";
  ctx.textAlign="center";
  ctx.fillText("Tier "+tier+" | "+LEVELS[state.level].colors+" Colors",CW/2,20);
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,CW,CH);

  // Background
  var bg=ctx.createLinearGradient(0,0,0,CH);
  bg.addColorStop(0,"#0d0d1f");
  bg.addColorStop(1,"#1a1a2e");
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,CW,CH);

  drawTopInfo();

  // Draw columns
  for(var c=0;c<state.columns.length;c++)drawColumn(c,false);
  for(var e=0;e<state.extraCols.length;e++)drawColumn(e,true);

  // Animations
  drawMoveAnims();
  drawMergeAnims();
  drawParticles();

  requestAnimationFrame(render);
}

// --- GAME LOGIC ---
function getColFromPos(px,py){
  var lv=LEVELS[state.level];
  var colW=COIN_SIZE+COL_GAP;
  var totalCols=lv.colors+lv.extra;
  var totalW=totalCols*colW-COL_GAP;
  var startX=(CW-totalW)/2;
  var baseY=getColumnY();
  var colH=lv.perColor*COIN_SIZE+10;

  if(py<baseY-colH-15||py>baseY+15)return-1;

  for(var c=0;c<lv.colors;c++){
    var cx=startX+c*colW;
    if(px>=cx-COIN_SIZE/2-5&&px<=cx+COIN_SIZE/2+5){
      return c;
    }
  }
  // Check extra columns
  for(var e=0;e<state.extraCols.length;e++){
    var cx=startX+(lv.colors+e)*colW;
    if(px>=cx-COIN_SIZE/2-5&&px<=cx+COIN_SIZE/2+5){
      return lv.colors+e; // encoded index
    }
  }
  return-1;
}

function getColumn(idx){
  var lv=LEVELS[state.level];
  if(idx<lv.colors)return state.columns[idx];
  return state.extraCols[idx-lv.colors];
}

function handleTap(px,py){
  if(state.animating)return;
  initAudio();

  var colIdx=getColFromPos(px,py);
  if(colIdx<0){
    state.selected=-1;
    return;
  }

  var lv=LEVELS[state.level];
  var col=getColumn(colIdx);

  if(state.selected<0){
    // Select source
    if(col.length===0)return;
    state.selected=colIdx;
    sfxTap();
    return;
  }

  // Deselect
  if(state.selected===colIdx){
    state.selected=-1;
    sfxTap();
    return;
  }

  // Try to move
  var srcCol=getColumn(state.selected);
  if(srcCol.length===0){state.selected=-1;return}

  var coinColor=srcCol[srcCol.length-1];

  // Can place: empty or same color on top
  if(col.length===0||(col.length<lv.perColor&&col[col.length-1]===coinColor)){
    // Save undo
    saveUndo();

    // Animate move
    var fromX=getColumnX(state.selected<lv.colors?state.selected:-1,state.selected>=lv.colors);
    var fromY=getColumnY()-10-(srcCol.length-1)*(COIN_SIZE-2);
    var toX=getColumnX(colIdx<lv.colors?colIdx:-1,colIdx>=lv.colors);
    var toY=getColumnY()-10-col.length*(COIN_SIZE-2);

    srcCol.pop();
    state.animating=true;
    state.moveAnims.push({
      color:coinColor,
      fromX:fromX,fromY:fromY,
      toX:toX,toY:toY,
      toCol:col,
      t:0
    });

    state.moves++;
    state.selected=-1;
    updateUI();
    sfxPlace();
  }else{
    // Invalid move - try selecting new column instead
    if(col.length>0){
      state.selected=colIdx;
      sfxTap();
    }else{
      sfxError();
    }
  }
}

function saveUndo(){
  state.undoStack.push({
    columns:state.columns.map(function(c){return c.slice()}),
    extraCols:state.extraCols.map(function(c){return c.slice()}),
    moves:state.moves
  });
  if(state.undoStack.length>50)state.undoStack.shift();
}

function doUndo(){
  if(state.undoStack.length===0||state.undoLeft<=0||state.animating)return;
  var prev=state.undoStack.pop();
  state.columns=prev.columns;
  state.extraCols=prev.extraCols;
  state.moves=prev.moves;
  state.undoLeft--;
  state.selected=-1;
  updateUI();
  sfxTap();
}

function doShuffle(){
  if(state.shuffleLeft<=0||state.animating)return;
  // Collect all coins, shuffle, redistribute
  var pool=[];
  state.columns.forEach(function(c){pool=pool.concat(c)});
  state.columns.forEach(function(c){c.length=0});
  // Shuffle
  for(var i=pool.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;
  }
  var ci=0;
  pool.forEach(function(coin){state.columns[ci%state.columns.length].push(coin);ci++});
  state.shuffleLeft--;
  state.selected=-1;
  updateUI();
  sfxTap();
}

function doExtraSlot(){
  if(state.extraLeft<=0||state.animating)return;
  state.extraCols.push([]);
  state.numExtra++;
  state.extraLeft--;
  state.selected=-1;
  resizeCanvas();
  updateUI();
  sfxTap();
}

function checkMerge(){
  var lv=LEVELS[state.level];
  var merged=false;

  // Check all columns for complete sets
  function checkCol(col,x){
    if(col.length===lv.perColor){
      var allSame=true;
      for(var i=1;i<col.length;i++){
        if(col[i]!==col[0]){allSame=false;break}
      }
      if(allSame){
        // Merge animation
        var baseY=getColumnY();
        for(var i=0;i<col.length;i++){
          var cy=baseY-10-i*(COIN_SIZE-2);
          state.mergeAnims.push({x:x,y:cy,color:col[0],t:0});
          // Particles
          for(var p=0;p<6;p++){
            state.particles.push({
              x:x,y:cy,
              vx:(Math.random()-0.5)*6,
              vy:(Math.random()-0.5)*6-2,
              size:Math.random()*4+2,
              life:1,
              color:COLORS[col[0]].fill
            });
          }
        }
        col.length=0;
        merged=true;
        sfxMerge();
      }
    }
  }

  for(var c=0;c<state.columns.length;c++){
    checkCol(state.columns[c],getColumnX(c,false));
  }
  for(var e=0;e<state.extraCols.length;e++){
    checkCol(state.extraCols[e],getColumnX(e,true));
  }

  // Check win
  if(checkWin()){
    setTimeout(function(){showWin()},500);
  }
}

function checkWin(){
  for(var c=0;c<state.columns.length;c++){
    if(state.columns[c].length>0)return false;
  }
  for(var e=0;e<state.extraCols.length;e++){
    if(state.extraCols[e].length>0)return false;
  }
  return true;
}

function showWin(){
  state.screen="win";
  var par=state.par;
  var moves=state.moves;
  var stars=1;
  if(moves<=par)stars=3;
  else if(moves<=par+Math.ceil(par*0.3))stars=2;
  state.stars=stars;
  state.score+=stars*100+Math.max(0,(par*3-moves)*5);

  // Update best
  if(stars>state.bestStars[state.level])state.bestStars[state.level]=stars;
  if(moves<state.bestMoves[state.level])state.bestMoves[state.level]=moves;
  if(state.level+1>=state.unlocked&&state.level+1<TOTAL_LEVELS){
    state.unlocked=state.level+2;
  }
  saveGame();

  // Show modal
  var winTitle=document.getElementById("winTitle");
  var winStars=document.getElementById("winStars");
  var winMsg=document.getElementById("winMsg");
  winTitle.textContent="Level "+(state.level+1)+" Complete!";
  var starStr="";
  for(var i=0;i<3;i++)starStr+=(i<stars)?"\u2605":"\u2606";
  winStars.textContent=starStr;
  winMsg.textContent="Moves: "+moves+" | Par: "+par+" | Score: "+state.score;

  document.getElementById("winModal").classList.add("active");
  sfxWin();
  startBGM();
}

function restartLevel(){
  document.getElementById("winModal").classList.remove("active");
  generateLevel(state.level);
  resizeCanvas();
  updateUI();
}

function nextLevel(){
  document.getElementById("winModal").classList.remove("active");
  if(state.level<TOTAL_LEVELS-1){
    state.level++;
    generateLevel(state.level);
    resizeCanvas();
    updateUI();
  }
}

function loadLevel(lvl){
  state.level=lvl;
  generateLevel(lvl);
  resizeCanvas();
  updateUI();
  closeAllModals();
}

// --- UI ---
function updateUI(){
  document.getElementById("levelBadge").textContent="Level "+(state.level+1);
  document.getElementById("moveCount").textContent=state.moves;
  document.getElementById("parMoves").textContent=state.par;
  document.getElementById("scoreDisplay").textContent=state.score;
  document.getElementById("undoCount").textContent=state.undoLeft;
  document.getElementById("shuffleCount").textContent=state.shuffleLeft;
  document.getElementById("extraCount").textContent=state.extraLeft;

  var par=state.par;
  var moves=state.moves;
  var stars=0;
  if(moves<=par)stars=3;
  else if(moves<=par+Math.ceil(par*0.3))stars=2;
  else if(moves>0)stars=1;
  var starStr="";
  for(var i=0;i<3;i++)starStr+=(i<stars)?"\u2605":"\u2606";
  document.getElementById("starsDisplay").textContent=starStr;
}

function buildLevelGrid(){
  var grid=document.getElementById("levelGrid");
  grid.innerHTML="";
  for(var i=0;i<TOTAL_LEVELS;i++){
    var cell=document.createElement("div");
    cell.className="level-cell";
    if(i>=state.unlocked)cell.classList.add("locked");
    if(i===state.level)cell.classList.add("current");

    var stars=state.bestStars[i];
    var sStr="";
    for(var s=0;s<3;s++)sStr+=(s<stars)?"\u2605":"\u2606";

    cell.innerHTML="<div>"+(i+1)+"</div><div class='mini-stars'>"+sStr+"</div>";
    if(i<state.unlocked){
      (function(idx){
        cell.addEventListener("click",function(){loadLevel(idx)});
      })(i);
    }
    grid.appendChild(cell);
  }
}

function closeAllModals(){
  document.querySelectorAll(".modal-overlay").forEach(function(m){m.classList.remove("active")});
}

// --- SAVE / LOAD ---
function saveGame(){
  var data={
    level:state.level,
    unlocked:state.unlocked,
    score:state.score,
    bestStars:state.bestStars,
    bestMoves:state.bestMoves,
    soundOn:state.soundOn,
    musicOn:state.musicOn,
    vibrateOn:state.vibrateOn
  };
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(data))}catch(e){}
}

function loadGame(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return;
    var data=JSON.parse(raw);
    if(data.unlocked)state.unlocked=data.unlocked;
    if(data.score)state.score=data.score;
    if(data.bestStars)state.bestStars=data.bestStars;
    if(data.bestMoves)state.bestMoves=data.bestMoves;
    if(typeof data.soundOn==="boolean")state.soundOn=data.soundOn;
    if(typeof data.musicOn==="boolean")state.musicOn=data.musicOn;
    if(typeof data.vibrateOn==="boolean")state.vibrateOn=data.vibrateOn;
    if(data.level!==undefined)state.level=Math.min(data.level,TOTAL_LEVELS-1);
  }catch(e){}
}

// --- INPUT ---
function getInputPos(e){
  var rect=canvas.getBoundingClientRect();
  var touch=e.touches?e.touches[0]:e;
  return{
    x:touch.clientX-rect.left,
    y:touch.clientY-rect.top
  };
}

function onPointerDown(e){
  e.preventDefault();
  var pos=getInputPos(e);
  handleTap(pos.x,pos.y);
}

// --- CLEANUP ---
var rafId=null;
function cleanup(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null}
  timers.forEach(function(id){clearInterval(id)});
  timers=[];
  stopBGM();
  if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null}
}

// --- INIT ---
function init(){
  loadGame();
  setupCanvas();
  generateLevel(state.level);
  updateUI();

  // Canvas input
  canvas.addEventListener("pointerdown",onPointerDown);
  canvas.addEventListener("touchstart",function(e){e.preventDefault()},false);

  // Buttons
  document.getElementById("btnRestart").addEventListener("click",function(){
    restartLevel();
  });
  document.getElementById("btnLevels").addEventListener("click",function(){
    buildLevelGrid();
    document.getElementById("levelModal").classList.add("active");
  });
  document.getElementById("closeLevels").addEventListener("click",function(){
    document.getElementById("levelModal").classList.remove("active");
  });
  document.getElementById("btnMenu").addEventListener("click",function(){
    document.getElementById("menuModal").classList.add("active");
  });
  document.getElementById("menuResume").addEventListener("click",closeAllModals);
  document.getElementById("menuLevels").addEventListener("click",function(){
    closeAllModals();
    buildLevelGrid();
    document.getElementById("levelModal").classList.add("active");
  });
  document.getElementById("menuRestart").addEventListener("click",function(){
    closeAllModals();
    restartLevel();
  });
  document.getElementById("menuSettings").addEventListener("click",function(){
    closeAllModals();
    document.getElementById("settingsModal").classList.add("active");
    updateSettingsUI();
  });
  document.getElementById("closeSettings").addEventListener("click",closeAllModals);

  document.getElementById("btnUndo").addEventListener("click",doUndo);
  document.getElementById("btnShuffle").addEventListener("click",doShuffle);
  document.getElementById("btnExtra").addEventListener("click",doExtraSlot);

  document.getElementById("winReplay").addEventListener("click",restartLevel);
  document.getElementById("winNext").addEventListener("click",nextLevel);

  // Settings toggles
  document.getElementById("toggleSound").addEventListener("click",function(){
    state.soundOn=!state.soundOn;
    this.classList.toggle("on",state.soundOn);
    saveGame();
  });
  document.getElementById("toggleMusic").addEventListener("click",function(){
    state.musicOn=!state.musicOn;
    this.classList.toggle("on",state.musicOn);
    updateBGMVolume();
    if(state.musicOn)startBGM();else stopBGM();
    saveGame();
  });
  document.getElementById("toggleVibrate").addEventListener("click",function(){
    state.vibrateOn=!state.vibrateOn;
    this.classList.toggle("on",state.vibrateOn);
    saveGame();
  });

  // Resize
  window.addEventListener("resize",function(){
    resizeCanvas();
  });

  // Visibility
  document.addEventListener("visibilitychange",function(){
    if(document.hidden){
      stopBGM();
    }
  });

  // Lifecycle
  window.addEventListener("beforeunload",function(){
    saveGame();
    cleanup();
  });

  // Start render loop
  render();
}

function updateSettingsUI(){
  document.getElementById("toggleSound").classList.toggle("on",state.soundOn);
  document.getElementById("toggleMusic").classList.toggle("on",state.musicOn);
  document.getElementById("toggleVibrate").classList.toggle("on",state.vibrateOn);
}

// RoundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==="number")r=[r,r,r,r];
    this.moveTo(x+r[0],y);
    this.lineTo(x+w-r[1],y);
    this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);
    this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);
    this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);
    this.arcTo(x,y,x+r[0],y,r[0]);
    this.closePath();
  };
}

if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",init);
}else{
  init();
}

})();
</script>
