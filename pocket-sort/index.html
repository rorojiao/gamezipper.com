<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a 0%,#1a1a2e 50%,#0d0d1f 100%);color:#e0e0e0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow-x:hidden;user-select:none;touch-action:none;-webkit-user-select:none}
canvas{display:block;touch-action:none}
.game-wrap{max-width:480px;margin:0 auto;padding:8px;min-height:100vh;display:flex;flex-direction:column;position:relative}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.title{font-size:20px;font-weight:700;color:#fff;text-shadow:0 0 20px rgba(255,215,0,0.5)}
.level-badge{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;font-size:13px;font-weight:700;padding:4px 12px;border-radius:20px}
.stars-display{color:#ffd700;font-size:18px;letter-spacing:2px}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
canvas{border-radius:12px;box-shadow:0 4px 30px rgba(0,0,0,0.5)}
.controls{display:flex;gap:8px;justify-content:center;padding:8px 0;flex-wrap:wrap}
.btn{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:1px solid #3a3a5a;color:#e0e0e0;padding:10px 16px;border-radius:12px;font-size:14px;cursor:pointer;transition:all .2s;touch-action:manipulation;min-width:70px;text-align:center}
.btn:hover{background:linear-gradient(135deg,#3a3a6a,#2a2a5a);border-color:#5a5a8a}
.btn:active{transform:scale(0.95)}
.btn-primary{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;border-color:#ffd700;font-weight:700}
.btn-primary:hover{background:linear-gradient(135deg,#ffe44d,#ffa040)}
.btn-danger{background:linear-gradient(135deg,#ff4444,#cc0000);color:#fff;border-color:#ff4444}
.btn-sm{padding:6px 10px;font-size:12px}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.active{display:flex}
.modal{background:linear-gradient(135deg,#1a1a3a,#0d0d2a);border:1px solid #3a3a5a;border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center;max-height:90vh;overflow-y:auto}
.modal h2{color:#ffd700;margin-bottom:12px;font-size:22px;text-shadow:0 0 15px rgba(255,215,0,0.4)}
.modal p{color:#b0b0c0;margin-bottom:8px;font-size:14px;line-height:1.6}
.modal .btn{margin:4px}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
.level-cell{background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:1px solid #3a3a5a;border-radius:10px;padding:10px 4px;cursor:pointer;transition:all .2s;text-align:center;font-size:13px;font-weight:600}
.level-cell:hover{border-color:#ffd700;background:linear-gradient(135deg,#3a3a6a,#2a2a5a)}
.level-cell.locked{opacity:0.4;cursor:not-allowed}
.level-cell.current{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,0.3)}
.level-cell .mini-stars{color:#ffd700;font-size:10px;margin-top:2px}
.info-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;font-size:14px;color:#b0b0c0}
.info-row span{color:#ffd700;font-weight:700}
.combo-text{color:#ff8c00;font-weight:700;font-size:13px}
.powerups{display:flex;gap:8px;justify-content:center;padding:4px 0}
.pu-btn{position:relative;background:linear-gradient(135deg,#2a2a4a,#1a1a3a);border:1px solid #3a3a5a;color:#e0e0e0;width:50px;height:50px;border-radius:12px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pu-btn:hover{border-color:#ffd700;background:linear-gradient(135deg,#3a3a6a,#2a2a5a)}
.pu-btn:active{transform:scale(0.9)}
.pu-btn .pu-count{position:absolute;top:-4px;right:-4px;background:#ffd700;color:#000;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pu-btn:disabled{opacity:0.3;cursor:not-allowed}
.pu-btn.targeting{border-color:#ff4444;box-shadow:0 0 10px rgba(255,68,68,0.5)}
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin:4px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ff8c00);border-radius:3px;transition:width .3s}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a2a4a}
.settings-row label{font-size:14px;color:#b0b0c0}
.toggle{width:44px;height:24px;background:#2a2a4a;border-radius:12px;position:relative;cursor:pointer;transition:background .3s}
.toggle.on{background:#ffd700}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .3s}
.toggle.on::after{left:22px}
</style>
</head>

<div class="game-wrap">
  <div class="header">
    <div class="title">Pocket Sort</div>
    <div class="level-badge" id="levelBadge">Level 1</div>
    <div style="display:flex;gap:4px;align-items:center">
      <span class="stars-display" id="starsDisplay"></span>
      <button class="btn btn-sm" id="btnMenu" title="Menu">&#9776;</button>
    </div>
  </div>
  <div class="info-row">
    <div>Moves: <span id="moveCount">0</span> / <span id="parMoves">-</span></div>
    <div class="combo-text" id="comboDisplay"></div>
    <div>Score: <span id="scoreDisplay">0</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div class="powerups">
    <button class="pu-btn" id="btnUndo" title="Undo">&#8630;<span class="pu-count" id="undoCount">3</span></button>
    <button class="pu-btn" id="btnShuffle" title="Shuffle">&#9851;<span class="pu-count" id="shuffleCount">1</span></button>
    <button class="pu-btn" id="btnClear" title="Clear Slot">&#10005;<span class="pu-count" id="clearCount">1</span></button>
    <button class="pu-btn" id="btnReveal" title="Reveal Hidden">&#9673;<span class="pu-count" id="revealCount">1</span></button>
  </div>
  <div class="controls">
    <button class="btn" id="btnRestart">Restart</button>
    <button class="btn btn-primary" id="btnLevels">Levels</button>
  </div>
</div>

<!-- Level Select Modal -->
<div class="modal-overlay" id="levelModal">
  <div class="modal">
    <h2>Select Level</h2>
    <div class="level-grid" id="levelGrid"></div>
    <button class="btn" id="closeLevels">Close</button>
  </div>
</div>

<!-- Win Modal -->
<div class="modal-overlay" id="winModal">
  <div class="modal">
    <h2 id="winTitle">Level Complete!</h2>
    <div id="winStars" style="font-size:40px;margin:12px 0;color:#ffd700"></div>
    <p id="winMsg"></p>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn" id="winReplay">Replay</button>
      <button class="btn btn-primary" id="winNext">Next Level</button>
    </div>
  </div>
</div>

<!-- Menu Modal -->
<div class="modal-overlay" id="menuModal">
  <div class="modal">
    <h2>Pocket Sort</h2>
    <p>Sort coins by color into matching slots. Fill a column with same-color coins to merge and clear them! Watch out for Frosted, Hidden, and Linked coins.</p>
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary" id="menuResume">Resume</button>
      <button class="btn" id="menuLevels">Level Select</button>
      <button class="btn" id="menuRestart">Restart Level</button>
      <button class="btn" id="menuSettings">Settings</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <div class="settings-row"><label>Sound Effects</label><div class="toggle on" id="toggleSound"></div></div>
    <div class="settings-row"><label>Music</label><div class="toggle on" id="toggleMusic"></div></div>
    <div class="settings-row"><label>Vibration</label><div class="toggle" id="toggleVibrate"></div></div>
    <button class="btn" id="closeSettings" style="margin-top:16px">Close</button>
  </div>
</div>

function playTone(freq,dur,vol,type){
  if(!audioCtx||!S.soundOn)return;
  try{
    var o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type||"sine"; o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(dur||0.15));
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+(dur||0.15)+0.01);
  }catch(e){}
}

function startBGM(){
  if(!audioCtx||bgmNodes.length||!S.musicOn)return;
  try{
    var sr=audioCtx.sampleRate, dur=16, bufSize=sr*dur;
    var buf=audioCtx.createBuffer(1,bufSize,sr), d=buf.getChannelData(0);
    var chords=[[261.63,329.63,392],[293.66,369.99,440],[329.63,415.3,493.88],[293.66,369.99,440]];
    var cd=dur/chords.length;
    for(var i=0;i<bufSize;i++){
      var t=i/sr, ci=Math.min(Math.floor(t/cd),chords.length-1), ch=chords[ci], s=0;
      for(var n=0;n<ch.length;n++){
        var f=ch[n];
        s+=Math.sin(2*Math.PI*f*t)*0.04;
        s+=Math.sin(2*Math.PI*f*2*t)*0.01;
        s+=Math.sin(2*Math.PI*f*0.5*t)*0.02;
      }
      var fade=t%cd, fi=Math.min(fade/0.8,1), fo=Math.min((cd-fade)/0.8,1);
      s*=fi*fo*(Math.sin(2*Math.PI*0.25*t)*0.1+1)*0.5;
      d[i]=s;
    }
    var src=audioCtx.createBufferSource(); src.buffer=buf; src.loop=true;
    var flt=audioCtx.createBiquadFilter(); flt.type="lowpass"; flt.frequency.value=600; flt.Q.value=1;
    var g=audioCtx.createGain(); g.gain.value=0.3;
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
    src.start(); bgmNodes=[src,flt,g];
  }catch(e){}
}
function stopBGM(){
  bgmNodes.forEach(function(n){try{n.stop&&n.stop();n.disconnect()}catch(e){}});
  bgmNodes=[];
}
function updateBGMVol(){if(bgmNodes.length>=3)bgmNodes[2].gain.value=S.musicOn?0.3:0;}

// ===== LEVEL GENERATION =====
function mkCoin(c,t){return {c:c,t:t||T_NORM,frozen:t===T_FROST,hidden:t===T_HIDE}}
function coinColor(coin){return coin.c}
function coinSame(a,b){return a.c===b.c}

function generateLevel(lvl){
  var lv=LEVELS[lvl];
  S.numMain=lv.c; S.capacity=lv.pc; S.numExtra=lv.ex;
  S.par=lv.par; S.moves=0; S.combo=0; S.maxCombo=0;
  S.undoStack=[]; S.undoLeft=3; S.shuffleLeft=1; S.clearLeft=1; S.revealLeft=1;
  S.selected=-1; S.targeting=null; S.animating=false;
  S.moveAnims=[]; S.mergeAnims=[]; S.particles=[]; S.comboAnims=[];
  S.shakePow=0; S.shakeX=0; S.shakeY=0;

  // Create coin pool
  var pool=[];
  for(var c=1;c<=lv.c;c++){
    for(var p=0;p<lv.pc;p++) pool.push(mkCoin(c,T_NORM));
  }

  // Assign special types
  var specialCount=Math.max(1,Math.floor(pool.length*0.12));
  lv.sp.forEach(function(sp){
    var type=sp==="frost"?T_FROST:sp==="hide"?T_HIDE:T_LINK;
    var indices=[];
    for(var i=0;i<pool.length;i++) if(pool[i].t===T_NORM) indices.push(i);
    shuffle(indices);
    for(var i=0;i<specialCount&&i<indices.length;i++){
      pool[indices[i]]=mkCoin(pool[indices[i]].c,type);
    }
  });

  // Shuffle and distribute
  var attempts=0;
  do{
    shuffle(pool);
    S.cols=[];
    for(var i=0;i<lv.c;i++) S.cols.push([]);
    for(var i=0;i<pool.length;i++) S.cols[i%lv.c].push(pool[i]);
    attempts++;
  } while(attempts<30 && hasBadStart());

  // Add extra empty columns
  for(var i=0;i<lv.ex;i++) S.cols.push([]);

  // Calculate totals
  S.totalCoins=0; S.clearedCoins=0;
  S.cols.forEach(function(col){ S.totalCoins+=col.length; });

  // Tutorial
  if(TUTORIALS[lvl]){
    S.tutorialStep=0;
    S.tutorialText=TUTORIALS[lvl][0].t;
    S.tutorialTimer=TUTORIALS[lvl][0].d;
  } else {
    S.tutorialStep=-1; S.tutorialText=""; S.tutorialTimer=0;
  }
}

function hasBadStart(){
  for(var i=0;i<S.cols.length;i++){
    var col=S.cols[i];
    if(col.length<2)continue;
    var same=true;
    for(var j=1;j<col.length;j++) if(col[j].c!==col[0].c){same=false;break;}
    if(same) return true;
  }
  return false;
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i]; arr[i]=arr[j]; arr[j]=t;
  }
}

// ===== RENDERING HELPERS =====
function getColX(ci){
  var total=S.cols.length, tw=total*COL_W-COL_GAP;
  return (CW-tw)/2+ci*COL_W+COL_W/2;
}
function getBaseY(){ return CH-24; }
function coinY(ci,idx){ return getBaseY()-8-idx*(COIN_R*2-4); }

function drawCoin(x,y,coin,sc,al){
  var r=COIN_R*(sc||1), cIdx=coin.c, c=COLORS[cIdx];
  if(!c)return;
  ctx.save();
  ctx.globalAlpha=al||1;

  // Hidden unrevealed
  if(coin.t===T_HIDE && coin.hidden){
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle="#3a3a4a"; ctx.fill();
    ctx.strokeStyle="#5a5a6a"; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle="#7a7a8a"; ctx.font="bold "+Math.round(r*1.1)+"px sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("?",x,y+1);
    ctx.restore(); return;
  }

  // Glow
  var grd=ctx.createRadialGradient(x,y,r*0.2,x,y,r*1.6);
  grd.addColorStop(0,c.g); grd.addColorStop(1,"transparent");
  ctx.fillStyle=grd; ctx.fillRect(x-r*2,y-r*2,r*4,r*4);

  // Base
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=c.f; ctx.fill();
  ctx.strokeStyle=c.d; ctx.lineWidth=1.5; ctx.stroke();

  // Highlight
  var ig=ctx.createRadialGradient(x-r*0.2,y-r*0.3,0,x,y,r*0.8);
  ig.addColorStop(0,c.l); ig.addColorStop(1,c.f);
  ctx.beginPath(); ctx.arc(x,y,r*0.82,0,Math.PI*2);
  ctx.fillStyle=ig; ctx.fill();

  // Symbol
  ctx.fillStyle=c.d; ctx.font="bold "+Math.round(r*0.95)+"px sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  var sym=coin.t===T_LINK?"@":"$";
  ctx.fillText(sym,x,y+1);

  // Shine
  ctx.beginPath(); ctx.ellipse(x-r*0.25,y-r*0.35,r*0.22,r*0.1,-0.3,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,0.35)"; ctx.fill();

  // Frosted overlay
  if(coin.t===T_FROST && coin.frozen){
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle="rgba(100,200,255,0.35)"; ctx.fill();
    ctx.strokeStyle="rgba(150,220,255,0.6)"; ctx.lineWidth=1.5; ctx.stroke();
    // Ice crystals
    ctx.strokeStyle="rgba(200,240,255,0.5)"; ctx.lineWidth=1;
    for(var i=0;i<3;i++){
      var a=i*Math.PI*2/3+0.5, cx=x+Math.cos(a)*r*0.4, cy=y+Math.sin(a)*r*0.4;
      ctx.beginPath();
      ctx.moveTo(cx-Math.cos(a)*r*0.2,cy-Math.sin(a)*r*0.2);
      ctx.lineTo(cx+Math.cos(a)*r*0.2,cy+Math.sin(a)*r*0.2);
      ctx.stroke();
    }
  }

  // Linked indicator
  if(coin.t===T_LINK){
    ctx.strokeStyle="rgba(255,200,0,0.7)"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(x+r*0.55,y-r*0.55,r*0.22,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+r*0.75,y-r*0.35,r*0.15,0,Math.PI*2); ctx.stroke();
  }

  ctx.restore();
}

function drawColumn(ci){
  var col=S.cols[ci], x=getColX(ci), baseY=getBaseY();
  var colH=S.capacity*(COIN_R*2)+12, maxH=baseY-60;
  if(colH>maxH) colH=maxH;

  // Tube
  ctx.save();
  var tx=x-COIN_R-4, tw=COIN_R*2+8;
  ctx.fillStyle="rgba(255,255,255,0.03)";
  ctx.strokeStyle="rgba(255,255,255,0.08)";
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(tx,baseY-colH-4,tw,colH+8,8); ctx.fill(); ctx.stroke();

  // Selection highlight
  if(S.selected===ci){
    ctx.strokeStyle="#ffd700"; ctx.lineWidth=2;
    ctx.shadowColor="#ffd700"; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.roundRect(tx-2,baseY-colH-6,tw+4,colH+12,10); ctx.stroke();
    ctx.shadowBlur=0;
  }

  // Targeting highlight
  if(S.targeting==="clear" && S.selected===ci){
    ctx.strokeStyle="#ff4444"; ctx.lineWidth=2;
    ctx.shadowColor="#ff4444"; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.roundRect(tx-2,baseY-colH-6,tw+4,colH+12,10); ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.restore();

  // Coins
  for(var i=0;i<col.length;i++){
    var isTop=(S.selected===ci && i>=col.length-countTopSame(col));
    var cy=coinY(ci,i);
    if(isTop){
      // Selected coins pulse upward
      var pulse=Math.sin(Date.now()*0.006)*2;
      drawCoin(x,cy-pulse-4,col[i],1.05,1);
    } else {
      drawCoin(x,cy,col[i],1,1);
    }
  }

  // Empty indicator
  if(col.length===0){
    ctx.save(); ctx.fillStyle="rgba(255,255,255,0.06)";
    ctx.beginPath(); ctx.arc(x,baseY-COIN_R-4,COIN_R*0.6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function countTopSame(col){
  if(!col.length) return 0;
  var top=col[col.length-1], n=1;
  for(var i=col.length-2;i>=0;i--){
    if(col[i].c===top.c && !col[i].frozen && !col[i].hidden) n++;
    else break;
  }
  return n;
}

function drawParticles(){
  for(var i=S.particles.length-1;i>=0;i--){
    var p=S.particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.018;
    if(p.life<=0){S.particles.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawMergeAnims(dt){
  for(var i=S.mergeAnims.length-1;i>=0;i--){
    var a=S.mergeAnims[i];
    a.t+=dt*2.5;
    if(a.t>=1){S.mergeAnims.splice(i,1);continue;}
    var sc=1+Math.sin(a.t*Math.PI)*0.6;
    drawCoin(a.x,a.y,a.coin,sc,1-a.t*0.7);
  }
}

function drawMoveAnims(dt){
  for(var i=S.moveAnims.length-1;i>=0;i--){
    var a=S.moveAnims[i];
    a.t+=dt*4;
    if(a.t>=1){
      a.t=1;
    }
    var t=easeInOut(a.t);
    var cx=a.fx+(a.tx-a.fx)*t;
    var cy=a.fy+(a.ty-a.fy)*t-Math.sin(t*Math.PI)*50;
    drawCoin(cx,cy,a.coin,1,1);
    if(a.t>=1){
      a.resolve();
      S.moveAnims.splice(i,1);
      if(S.moveAnims.length===0){
        S.animating=false;
        postMoveCheck();
      }
    }
  }
}

function drawComboAnims(dt){
  for(var i=S.comboAnims.length-1;i>=0;i--){
    var a=S.comboAnims[i];
    a.t+=dt;
    if(a.t>=1.5){S.comboAnims.splice(i,1);continue;}
    var al=a.t<0.3?a.t/0.3:Math.max(0,1-(a.t-0.3)/1.2);
    var sc=a.t<0.2?1+a.t*2:1.4-Math.max(0,(a.t-0.2)*0.3);
    ctx.save();
    ctx.globalAlpha=al;
    ctx.fillStyle="#ffd700";
    ctx.font="bold "+Math.round(20*sc)+"px sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.shadowColor="#ffd700"; ctx.shadowBlur=10;
    ctx.fillText(a.text,a.x,a.y-a.t*40);
    ctx.restore();
  }
}

function drawTutorial(dt){
  if(S.tutorialStep<0||!TUTORIALS[S.level])return;
  var tut=TUTORIALS[S.level];
  S.tutorialTimer-=dt*1000;
  if(S.tutorialTimer<=0){
    S.tutorialStep++;
    if(S.tutorialStep>=tut.length){S.tutorialStep=-1;S.tutorialText="";return;}
    S.tutorialText=tut[S.tutorialStep].t;
    S.tutorialTimer=tut[S.tutorialStep].d;
  }
  if(!S.tutorialText)return;
  ctx.save();
  // Banner at top
  var h=40;
  ctx.fillStyle="rgba(0,0,0,0.7)";
  ctx.beginPath(); ctx.roundRect(8,8,CW-16,h,8); ctx.fill();
  ctx.fillStyle="#ffd700";
  ctx.font="bold 13px sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(S.tutorialText,CW/2,8+h/2);
  // Animated hand
  if(S.tutorialStep===0 && tut.length>1){
    var t=Date.now()*0.002;
    var hx=CW/2+Math.sin(t)*30, hy=CH/2+Math.cos(t)*15+30;
    ctx.fillStyle="rgba(255,255,255,0.5)";
    ctx.beginPath(); ctx.arc(hx,hy,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.8)";
    ctx.beginPath(); ctx.arc(hx+8,hy-12,6,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawProgressBar(){
  var pct=S.totalCoins>0?(S.clearedCoins/S.totalCoins)*100:0;
  document.getElementById("progressFill").style.width=pct+"%";
}

function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

// ===== MAIN RENDER =====
var lastTime=0, rafId=null;

function render(ts){
  var dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;

  // Screen shake
  if(S.shakePow>0.5){
    S.shakeX=(Math.random()-0.5)*S.shakePow;
    S.shakeY=(Math.random()-0.5)*S.shakePow;
    S.shakePow*=0.88;
  } else { S.shakeX=0; S.shakeY=0; S.shakePow=0; }

  ctx.save();
  ctx.translate(S.shakeX,S.shakeY);

  // Clear
  ctx.clearRect(-10,-10,CW+20,CH+20);
  var bg=ctx.createLinearGradient(0,0,0,CH);
  bg.addColorStop(0,"#0d0d1f"); bg.addColorStop(1,"#1a1a2e");
  ctx.fillStyle=bg; ctx.fillRect(0,0,CW,CH);

  // Tier info
  var tier=Math.floor(S.level/6)+1;
  ctx.save();
  ctx.fillStyle="rgba(255,255,255,0.2)";
  ctx.font="11px sans-serif"; ctx.textAlign="center";
  ctx.fillText("Tier "+tier+" • "+LEVELS[S.level].c+" Colors",CW/2,16);
  ctx.restore();

  // Columns
  for(var i=0;i<S.cols.length;i++) drawColumn(i);

  // Animations
  drawMoveAnims(dt);
  drawMergeAnims(dt);
  drawParticles();
  drawComboAnims(dt);
  drawTutorial(dt);

  ctx.restore();

  rafId=requestAnimationFrame(render);
}

// ===== GAME LOGIC =====
function getColAt(px,py){
  var baseY=getBaseY(), colH=S.capacity*(COIN_R*2)+16;
  if(py<baseY-colH-20||py>baseY+10) return -1;
  for(var i=0;i<S.cols.length;i++){
    var cx=getColX(i);
    if(px>=cx-COL_W/2&&px<=cx+COL_W/2) return i;
  }
  return -1;
}

function handleTap(px,py){
  if(S.animating)return;
  initAudio();

  // Tutorial advance on tap
  if(S.tutorialStep>=0 && TUTORIALS[S.level]){
    S.tutorialStep++;
    var tut=TUTORIALS[S.level];
    if(S.tutorialStep>=tut.length){S.tutorialStep=-1;S.tutorialText="";}
    else {S.tutorialText=tut[S.tutorialStep].t;S.tutorialTimer=tut[S.tutorialStep].d;}
  }

  // Clear Slot targeting mode
  if(S.targeting==="clear"){
    var ci=getColAt(px,py);
    if(ci>=0 && S.cols[ci].length>0){
      saveUndo();
      var col=S.cols[ci];
      for(var i=0;i<col.length;i++){
        spawnParticles(getColX(ci),coinY(ci,i),col[i].c,4);
      }
      S.clearedCoins+=col.length;
      col.length=0;
      S.clearLeft--;
      S.targeting=null;
      S.selected=-1;
      updateUI();
      sfxClear();
      if(checkWin()) setTimeout(showWin,400);
    } else {
      S.targeting=null; S.selected=-1;
      updateUI();
    }
    return;
  }

  var ci=getColAt(px,py);
  if(ci<0){S.selected=-1;return;}

  var col=S.cols[ci];

  // Nothing selected yet
  if(S.selected<0){
    if(col.length===0)return;
    // Can't select if top coin is frozen
    var top=col[col.length-1];
    if(top.frozen){sfxError();return;}
    // Can't select if top coin is hidden
    if(top.hidden){sfxError();return;}
    S.selected=ci;
    sfxTap();
    return;
  }

  // Deselect
  if(S.selected===ci){S.selected=-1;sfxTap();return;}

  // Try move
  var srcCol=S.cols[S.selected];
  if(!srcCol.length){S.selected=-1;return;}

  // Count how many we'd move
  var pickCount=countTopSame(srcCol);
  if(pickCount===0){S.selected=-1;return;}
  var pickCoins=srcCol.slice(srcCol.length-pickCount);
  var pickColor=pickCoins[0].c;

  // Validate destination
  var canPlace=false;
  if(col.length===0){
    canPlace=true;
  } else if(col.length<S.capacity){
    var dtop=col[col.length-1];
    if(dtop.c===pickColor && !dtop.hidden && !dtop.frozen){
      canPlace=(col.length+pickCount<=S.capacity);
    }
  }

  if(canPlace){
    executeMove(S.selected,ci,pickCoins);
  } else {
    // Try selecting new column instead
    if(col.length>0 && !col[col.length-1].frozen && !col[col.length-1].hidden){
      S.selected=ci;
      sfxTap();
    } else {
      sfxError();
    }
  }
}

function executeMove(fromCI,toCI,pickCoins){
  saveUndo();
  var srcCol=S.cols[fromCI];
  var dstCol=S.cols[toCI];
  var pickCount=pickCoins.length;

  // Remove from source
  srcCol.splice(srcCol.length-pickCount,pickCount);

  // Create animations
  S.animating=true;
  S.moveAnims=[];
  var resolved=0;
  var totalAnim=pickCount;

  for(var i=0;i<pickCount;i++){
    (function(idx){
      var fx=getColX(fromCI), fy=coinY(fromCI,srcCol.length+idx);
      var tx=getColX(toCI), ty=coinY(toCI,dstCol.length+idx);
      S.moveAnims.push({
        coin:pickCoins[idx], fx:fx, fy:fy, tx:tx, ty:ty, t:idx*0.08,
        resolve:function(){
          dstCol.push(pickCoins[idx]);
          // Reveal hidden coins in destination when placing on top
          revealInColumn(toCI);
        }
      });
    })(i);
  }

  S.moves++;
  S.selected=-1;
  updateUI();
  sfxPlace();
}

function postMoveCheck(){
  // Reveal hidden coins adjacent to moves
  // (already done in resolve)

  // Check for merges
  checkAllMerges();

  // Check win
  if(checkWin()) setTimeout(showWin,400);
}

function checkAllMerges(){
  var merged=true;
  var passCount=0;
  while(merged && passCount<10){
    merged=false;
    passCount++;
    for(var ci=0;ci<S.cols.length;ci++){
      var col=S.cols[ci];
      if(col.length!==S.capacity)continue;
      var allSame=true;
      for(var j=1;j<col.length;j++){
        if(col[j].c!==col[0].c){allSame=false;break;}
      }
      if(!allSame)continue;

      // Check no frozen/hidden blocking
      var blocked=false;
      for(var j=0;j<col.length;j++){
        if(col[j].frozen||col[j].hidden){blocked=true;break;}
      }
      if(blocked)continue;

      // MERGE!
      var color=col[0].c;
      var hasLinked=false;
      for(var j=0;j<col.length;j++){
        if(col[j].t===T_LINK) hasLinked=true;
        var x=getColX(ci), y=coinY(ci,j);
        S.mergeAnims.push({coin:col[j],x:x,y:y,t:0});
        spawnParticles(x,y,color,8+S.combo*2);
      }

      col.length=0;
      S.clearedCoins+=S.capacity;
      merged=true;
      S.combo++;
      if(S.combo>S.maxCombo) S.maxCombo=S.combo;

      // Combo effects
      if(S.combo>1){
        sfxCombo(S.combo);
        S.shakePow=Math.min(3+S.combo*2,15);
        S.comboAnims.push({text:S.combo+"x Combo!",x:getColX(ci),y:coinY(ci,0),t:0});
      } else {
        sfxMerge();
        S.shakePow=3;
      }

      // Linked chain reaction: check adjacent columns for same-color complete set
      if(hasLinked){
        linkedChain(ci,color);
      }

      // Unfreeze frosted coins in adjacent columns
      unfrostAdjacent(ci);
    }
  }
}

function linkedChain(mergeCI,color){
  for(var d=-1;d<=1;d+=2){
    var adj=mergeCI+d;
    if(adj<0||adj>=S.cols.length)continue;
    var col=S.cols[adj];
    if(col.length!==S.capacity)continue;
    var allSame=true,allColor=true;
    for(var j=0;j<col.length;j++){
      if(col[j].c!==color)allColor=false;
      if(col[j].frozen||col[j].hidden)allSame=false;
    }
    if(allSame&&allColor){
      // Chain merge!
      for(var j=0;j<col.length;j++){
        var x=getColX(adj), y=coinY(adj,j);
        S.mergeAnims.push({coin:col[j],x:x,y:y,t:0});
        spawnParticles(x,y,color,10);
      }
      col.length=0;
      S.clearedCoins+=S.capacity;
      sfxChain();
      S.shakePow=Math.min(S.shakePow+4,18);
    }
  }
}

function unfrostAdjacent(ci){
  for(var d=-1;d<=1;d+=2){
    var adj=ci+d;
    if(adj<0||adj>=S.cols.length)continue;
    var col=S.cols[adj];
    for(var j=0;j<col.length;j++){
      if(col[j].frozen){
        col[j].frozen=false;
        sfxFrost();
        spawnParticles(getColX(adj),coinY(adj,j),col[j].c,3);
      }
    }
  }
}

function revealInColumn(ci){
  var col=S.cols[ci], revealed=false;
  for(var j=0;j<col.length;j++){
    if(col[j].hidden){
      col[j].hidden=false;
      revealed=true;
    }
  }
  if(revealed) sfxReveal();

  // Also reveal in adjacent columns
  for(var d=-1;d<=1;d+=2){
    var adj=ci+d;
    if(adj<0||adj>=S.cols.length)continue;
    var acol=S.cols[adj];
    for(var j=0;j<acol.length;j++){
      if(acol[j].hidden){
        acol[j].hidden=false;
        sfxReveal();
      }
    }
  }
}

function checkWin(){
  for(var i=0;i<S.cols.length;i++){
    if(S.cols[i].length>0) return false;
  }
  return true;
}

function spawnParticles(x,y,colorIdx,count){
  var c=COLORS[colorIdx]; if(!c)return;
  for(var i=0;i<count;i++){
    S.particles.push({
      x:x, y:y,
      vx:(Math.random()-0.5)*7,
      vy:(Math.random()-0.5)*7-2,
      size:Math.random()*3+1.5,
      life:1,
      color:c.f
    });
  }
}

// ===== POWER-UPS =====
function saveUndo(){
  S.undoStack.push({
    cols:S.cols.map(function(c){return c.map(function(coin){
      return {c:coin.c,t:coin.t,frozen:coin.frozen,hidden:coin.hidden};
    })}),
    moves:S.moves, combo:S.combo, clearedCoins:S.clearedCoins
  });
  if(S.undoStack.length>50) S.undoStack.shift();
}

function doUndo(){
  if(!S.undoStack.length||S.undoLeft<=0||S.animating)return;
  var prev=S.undoStack.pop();
  S.cols=prev.cols; S.moves=prev.moves;
  S.combo=prev.combo; S.clearedCoins=prev.clearedCoins;
  S.undoLeft--; S.selected=-1; S.targeting=null;
  updateUI(); sfxTap();
}

function doShuffle(){
  if(S.shuffleLeft<=0||S.animating)return;
  saveUndo();
  var pool=[];
  S.cols.forEach(function(col){ pool=pool.concat(col); col.length=0; });
  shuffle(pool);
  var ci=0;
  // Only redistribute into main columns (not extras)
  var mainCols=S.numMain;
  pool.forEach(function(coin){ S.cols[ci%mainCols].push(coin); ci++; });
  S.shuffleLeft--; S.selected=-1; S.combo=0;
  updateUI(); sfxTap();
}

function doClearSlot(){
  if(S.clearLeft<=0||S.animating)return;
  if(S.targeting==="clear"){S.targeting=null;S.selected=-1;updateUI();return;}
  S.targeting="clear"; S.selected=-1;
  updateUI(); sfxTap();
  // Update clear button visual
  document.getElementById("btnClear").classList.add("targeting");
}

function doReveal(){
  if(S.revealLeft<=0||S.animating)return;
  saveUndo();
  var revealed=false;
  S.cols.forEach(function(col,ci){
    for(var j=0;j<col.length;j++){
      if(col[j].hidden){
        col[j].hidden=false;
        spawnParticles(getColX(ci),coinY(ci,j),col[j].c,4);
        revealed=true;
      }
    }
  });
  S.revealLeft--;
  if(revealed) sfxReveal();
  updateUI();
}

// ===== WIN =====
function showWin(){
  S.screen="win";
  var par=S.par, moves=S.moves, stars=1;
  if(moves<=par) stars=3;
  else if(moves<=par+Math.ceil(par*0.3)) stars=2;
  S.stars=stars;
  S.score+=stars*100+Math.max(0,(par*3-moves)*5)+S.maxCombo*50;

  if(stars>S.bestStars[S.level]) S.bestStars[S.level]=stars;
  if(moves<S.bestMoves[S.level]) S.bestMoves[S.level]=moves;
  if(S.level+1>=S.unlocked && S.level+1<TOTAL_LEVELS) S.unlocked=S.level+2;
  saveGame();

  document.getElementById("winTitle").textContent="Level "+(S.level+1)+" Complete!";
  var ss=""; for(var i=0;i<3;i++) ss+=(i<stars)?"★":"☆";
  document.getElementById("winStars").textContent=ss;
  document.getElementById("winMsg").textContent="Moves: "+moves+" | Par: "+par+" | Combo: "+S.maxCombo+"x | Score: "+S.score;
  document.getElementById("winModal").classList.add("active");
  sfxWin(); startBGM();
}

function restartLevel(){
  closeAllModals();
  generateLevel(S.level);
  resizeCanvas(); updateUI();
}
function nextLevel(){
  closeAllModals();
  if(S.level<TOTAL_LEVELS-1){S.level++;generateLevel(S.level);resizeCanvas();updateUI();}
}
function loadLevel(lvl){
  S.level=lvl; generateLevel(lvl); resizeCanvas(); updateUI(); closeAllModals();
}

// ===== UI =====
function updateUI(){
  document.getElementById("levelBadge").textContent="Level "+(S.level+1);
  document.getElementById("moveCount").textContent=S.moves;
  document.getElementById("parMoves").textContent=S.par;
  document.getElementById("scoreDisplay").textContent=S.score;
  document.getElementById("undoCount").textContent=S.undoLeft;
  document.getElementById("shuffleCount").textContent=S.shuffleLeft;
  document.getElementById("clearCount").textContent=S.clearLeft;
  document.getElementById("revealCount").textContent=S.revealLeft;

  // Combo
  var comboEl=document.getElementById("comboDisplay");
  comboEl.textContent=S.combo>1?S.combo+"x Combo":"";

  // Stars
  var par=S.par, moves=S.moves, stars=0;
  if(moves<=par) stars=3;
  else if(moves<=par+Math.ceil(par*0.3)) stars=2;
  else if(moves>0) stars=1;
  var ss=""; for(var i=0;i<3;i++) ss+=(i<stars)?"★":"☆";
  document.getElementById("starsDisplay").textContent=ss;

  // Clear button targeting visual
  var clearBtn=document.getElementById("btnClear");
  if(S.targeting==="clear") clearBtn.classList.add("targeting");
  else clearBtn.classList.remove("targeting");

  drawProgressBar();
}

function buildLevelGrid(){
  var grid=document.getElementById("levelGrid");
  grid.innerHTML="";
  for(var i=0;i<TOTAL_LEVELS;i++){
    var cell=document.createElement("div");
    cell.className="level-cell";
    if(i>=S.unlocked) cell.classList.add("locked");
    if(i===S.level) cell.classList.add("current");
    var stars=S.bestStars[i], ss="";
    for(var s=0;s<3;s++) ss+=(s<stars)?"★":"☆";
    cell.innerHTML="<div>"+(i+1)+"</div><div class='mini-stars'>"+ss+"</div>";
    if(i<S.unlocked){
      (function(idx){cell.addEventListener("click",function(){loadLevel(idx)});})(i);
    }
    grid.appendChild(cell);
  }
}

function closeAllModals(){
  document.querySelectorAll(".modal-overlay").forEach(function(m){m.classList.remove("active")});
}

// ===== SAVE / LOAD =====
function saveGame(){
  var data={
    v:SAVE_VER,
    level:S.level, unlocked:S.unlocked, score:S.score,
    bestStars:S.bestStars, bestMoves:S.bestMoves,
    soundOn:S.soundOn, musicOn:S.musicOn, vibrateOn:S.vibrateOn
  };
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(data))}catch(e){}
}

function loadGame(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return;
    var data=JSON.parse(raw);
    if(data.v!==SAVE_VER){
      // Migrate: reset save for incompatible versions
      localStorage.removeItem(SAVE_KEY);
      return;
    }
    if(data.unlocked) S.unlocked=Math.min(data.unlocked,TOTAL_LEVELS);
    if(data.score) S.score=data.score;
    if(data.bestStars&&data.bestStars.length===TOTAL_LEVELS) S.bestStars=data.bestStars;
    if(data.bestMoves&&data.bestMoves.length===TOTAL_LEVELS) S.bestMoves=data.bestMoves;
    if(typeof data.soundOn==="boolean") S.soundOn=data.soundOn;
    if(typeof data.musicOn==="boolean") S.musicOn=data.musicOn;
    if(typeof data.vibrateOn==="boolean") S.vibrateOn=data.vibrateOn;
    if(data.level!==undefined) S.level=Math.min(data.level,TOTAL_LEVELS-1);
  }catch(e){}
}

// ===== INPUT =====
function onPointerDown(e){
  e.preventDefault();
  var rect=canvas.getBoundingClientRect();
  var touch=e.touches?e.touches[0]:e;
  var px=touch.clientX-rect.left, py=touch.clientY-rect.top;
  handleTap(px,py);
}

// ===== CLEANUP =====
var listeners=[];
function addListener(el,ev,fn,opts){
  el.addEventListener(ev,fn,opts);
  listeners.push({el:el,ev:ev,fn:fn});
}

function cleanup(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  listeners.forEach(function(l){l.el.removeEventListener(l.ev,l.fn);});
  listeners=[];
  audioTimerIds.forEach(function(id){clearTimeout(id);});
  audioTimerIds=[];
  stopBGM();
  if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null;}
}

// ===== INIT =====
function init(){
  loadGame();
  setupCanvas();
  generateLevel(S.level);
  updateUI();

  // Canvas input
  addListener(canvas,"pointerdown",onPointerDown);
  addListener(canvas,"touchstart",function(e){e.preventDefault()},{passive:false});

  // Buttons
  addListener(document.getElementById("btnRestart"),"click",restartLevel);
  addListener(document.getElementById("btnLevels"),"click",function(){
    buildLevelGrid();document.getElementById("levelModal").classList.add("active");
  });
  addListener(document.getElementById("closeLevels"),"click",closeAllModals);
  addListener(document.getElementById("btnMenu"),"click",function(){
    document.getElementById("menuModal").classList.add("active");
  });
  addListener(document.getElementById("menuResume"),"click",closeAllModals);
  addListener(document.getElementById("menuLevels"),"click",function(){
    closeAllModals();buildLevelGrid();document.getElementById("levelModal").classList.add("active");
  });
  addListener(document.getElementById("menuRestart"),"click",function(){closeAllModals();restartLevel();});
  addListener(document.getElementById("menuSettings"),"click",function(){
    closeAllModals();document.getElementById("settingsModal").classList.add("active");updateSettingsUI();
  });
  addListener(document.getElementById("closeSettings"),"click",closeAllModals);
  addListener(document.getElementById("btnUndo"),"click",doUndo);
  addListener(document.getElementById("btnShuffle"),"click",doShuffle);
  addListener(document.getElementById("btnClear"),"click",doClearSlot);
  addListener(document.getElementById("btnReveal"),"click",doReveal);
  addListener(document.getElementById("winReplay"),"click",restartLevel);
  addListener(document.getElementById("winNext"),"click",nextLevel);

  // Settings toggles
  addListener(document.getElementById("toggleSound"),"click",function(){
    S.soundOn=!S.soundOn;this.classList.toggle("on",S.soundOn);saveGame();
  });
  addListener(document.getElementById("toggleMusic"),"click",function(){
    S.musicOn=!S.musicOn;this.classList.toggle("on",S.musicOn);
    updateBGMVol();if(S.musicOn)startBGM();else stopBGM();saveGame();
  });
  addListener(document.getElementById("toggleVibrate"),"click",function(){
    S.vibrateOn=!S.vibrateOn;this.classList.toggle("on",S.vibrateOn);saveGame();
  });

  // Resize
  addListener(window,"resize",resizeCanvas);

  // Visibility
  addListener(document,"visibilitychange",function(){if(document.hidden)stopBGM();});

  // Lifecycle
  addListener(window,"beforeunload",function(){saveGame();cleanup();});

  // Start render loop
  rafId=requestAnimationFrame(render);
}

function updateSettingsUI(){
  document.getElementById("toggleSound").classList.toggle("on",S.soundOn);
  document.getElementById("toggleMusic").classList.toggle("on",S.musicOn);
  document.getElementById("toggleVibrate").classList.toggle("on",S.vibrateOn);
}

// RoundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==="number")r=[r,r,r,r];
    this.moveTo(x+r[0],y);
    this.lineTo(x+w-r[1],y);
    this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);
    this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);
    this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);
    this.arcTo(x,y,x+r[0],y,r[0]);
    this.closePath();
  };
}

if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",init);
}else{
  init();
}

})();
