<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a1a;--board-bg:#12122a;--grid-border:#2a2a5a;--grid-active:#00f0ff;
  --cyan:#00f0ff;--magenta:#ff00aa;--purple:#8b00ff;--gold:#ffd700;
  --text:#e0e0ff;--text-dim:#8080a0;
  --panel-bg:rgba(10,10,30,0.95);--btn-bg:#1a1a3a;
}
html,body{width:100%;height:100%;overflow-x:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none;-webkit-user-select:none;touch-action:none;}
canvas{display:block;position:absolute;top:0;left:0;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;}
.screen.active{display:flex;}
.btn{background:var(--btn-bg);border:2px solid var(--cyan);color:var(--cyan);padding:12px 32px;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px;min-width:160px;text-align:center;}
.btn:hover{background:var(--cyan);color:var(--bg);box-shadow:0 0 20px var(--cyan);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-gold{border-color:var(--gold);color:var(--gold);}
.btn-gold:hover{background:var(--gold);color:var(--bg);box-shadow:0 0 20px var(--gold);}
.btn-magenta{border-color:var(--magenta);color:var(--magenta);}
.btn-magenta:hover{background:var(--magenta);color:var(--bg);box-shadow:0 0 20px var(--magenta);}
.btn-sm{padding:8px 16px;font-size:13px;min-width:100px;}
#title-screen{background:linear-gradient(180deg,#0a0a1a 0%,#1a0a2a 100%);}
.title-logo{font-size:48px;font-weight:bold;color:var(--cyan);text-shadow:0 0 30px var(--cyan),0 0 60px var(--cyan);margin-bottom:10px;letter-spacing:4px;}
.title-sub{font-size:18px;color:var(--magenta);margin-bottom:50px;letter-spacing:2px;}
.title-btns{display:flex;flex-direction:column;gap:15px;}
#level-screen{background:var(--bg);padding:20px;overflow-y:auto;}
.level-header{font-size:24px;color:var(--cyan);margin-bottom:20px;text-align:center;}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:400px;margin:0 auto;}
.level-btn{width:60px;height:60px;background:var(--btn-bg);border:2px solid var(--grid-border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:bold;color:var(--text);transition:all 0.2s;}
.level-btn.unlocked{border-color:var(--cyan);}
.level-btn.unlocked:hover{border-color:var(--gold);transform:scale(1.05);}
.level-btn.current{border-color:var(--gold);box-shadow:0 0 15px var(--gold);}
.level-btn.locked{opacity:0.4;cursor:not-allowed;}
.level-stars{font-size:10px;color:var(--gold);margin-top:2px;}
.back-btn{position:absolute;top:20px;left:20px;padding:8px 16px;font-size:14px;}
#game-screen{flex-direction:row;flex-wrap:wrap;align-items:flex-start;justify-content:center;padding:10px;gap:10px;}
.game-hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:var(--panel-bg);border-radius:8px;border:1px solid var(--grid-border);margin-bottom:5px;}
.hud-left{display:flex;gap:15px;align-items:center;}
.hud-right{display:flex;gap:10px;align-items:center;}
.stat{font-size:14px;display:flex;align-items:center;gap:5px;}
.stat-icon{width:20px;height:20px;}
.stat-val{font-weight:bold;color:var(--gold);}
.hud-btn{padding:6px 12px;font-size:12px;min-width:auto;}
#board-container{display:flex;flex-direction:column;align-items:center;}
#board-canvas{border:2px solid var(--grid-active);border-radius:8px;background:var(--board-bg);}
#spawn-zone{display:flex;gap:10px;margin-top:10px;padding:10px;background:var(--panel-bg);border-radius:8px;border:1px solid var(--grid-border);}
.spawn-slot{width:50px;height:50px;background:var(--btn-bg);border:2px solid var(--grid-border);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.spawn-slot.has-item{border-color:var(--cyan);cursor:grab;}
.spawn-slot.has-item:active{cursor:grabbing;}
#right-panel{display:flex;flex-direction:column;gap:10px;width:120px;}
.panel-section{background:var(--panel-bg);border:1px solid var(--grid-border);border-radius:8px;padding:10px;}
.panel-title{font-size:12px;color:var(--text-dim);margin-bottom:8px;text-align:center;text-transform:uppercase;letter-spacing:1px;}
.energy-bar{height:16px;background:var(--btn-bg);border-radius:4px;overflow:hidden;border:1px solid var(--grid-border);}
.energy-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--magenta));transition:width 0.3s;}
.storage-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}
.storage-slot{width:40px;height:40px;background:var(--btn-bg);border:1px solid var(--grid-border);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.storage-slot.has-item{border-color:var(--purple);}
#orders-panel{width:100%;max-width:500px;}
.orders-grid{display:flex;flex-direction:column;gap:8px;}
.order-card{background:var(--btn-bg);border:1px solid var(--grid-border);border-radius:6px;padding:8px;display:flex;align-items:center;gap:10px;}
.order-card.completed{border-color:var(--gold);opacity:0.7;}
.order-rewards{display:flex;gap:8px;font-size:12px;}
.order-reward{color:var(--gold);}
.order-items{display:flex;gap:5px;flex-wrap:wrap;}
.order-item{width:30px;height:30px;background:var(--board-bg);border:1px solid var(--grid-border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;}
.order-req{color:var(--magenta);font-size:11px;}
.order-claim{font-size:11px;padding:4px 10px;margin-left:auto;}
#game-over-screen,#level-complete-screen{background:rgba(10,10,26,0.95);}
.modal{background:var(--panel-bg);border:2px solid var(--grid-active);border-radius:12px;padding:30px;text-align:center;max-width:350px;width:90%;}
.modal-title{font-size:28px;font-weight:bold;margin-bottom:15px;}
.modal-title.win{color:var(--gold);text-shadow:0 0 20px var(--gold);}
.modal-title.lose{color:var(--magenta);text-shadow:0 0 20px var(--magenta);}
.modal-stars{font-size:36px;color:var(--gold);margin:15px 0;}
.modal-rewards{display:flex;justify-content:center;gap:20px;margin:15px 0;font-size:18px;color:var(--gold);}
.modal-btns{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.modal-info{font-size:13px;color:var(--text-dim);margin:10px 0;}
#settings-screen{background:rgba(10,10,26,0.98);}
.settings-modal{background:var(--panel-bg);border:2px solid var(--grid-border);border-radius:12px;padding:25px;max-width:300px;width:90%;}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--grid-border);}
.settings-row:last-child{border-bottom:none;}
.toggle{width:50px;height:26px;background:var(--btn-bg);border:2px solid var(--grid-border);border-radius:13px;cursor:pointer;position:relative;transition:all 0.2s;}
.toggle.on{background:var(--cyan);border-color:var(--cyan);}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:var(--text);border-radius:50%;top:1px;left:2px;transition:all 0.2s;}
.toggle.on::after{left:24px;}
#ad-banner{position:fixed;bottom:0;left:0;width:100%;min-height:50px;background:#000;z-index:100;display:flex;align-items:center;justify-content:center;}
#ad-native{position:absolute;top:10px;right:10px;width:300px;background:var(--panel-bg);border:1px solid var(--grid-border);border-radius:8px;padding:10px;z-index:50;}
.particle{position:absolute;pointer-events:none;border-radius:50%;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.float{animation:float 2s ease-in-out infinite;}
.combo-text{position:absolute;font-size:24px;font-weight:bold;color:var(--gold);text-shadow:0 0 10px var(--gold);pointer-events:none;z-index:100;}
@media(max-width:500px){
  .title-logo{font-size:32px;}
  .title-sub{font-size:14px;}
  .level-grid{grid-template-columns:repeat(5,1fr);gap:8px;}
  .level-btn{width:50px;height:50px;font-size:14px;}
  #right-panel{width:100px;}
  .storage-grid{grid-template-columns:repeat(2,1fr);}
  .storage-slot{width:35px;height:35px;}
  #spawn-zone{gap:8px;}
  .spawn-slot{width:45px;height:45px;}
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="title-screen" class="screen active">

  <div id="settings-screen" class="screen">
    <div class="settings-modal">

      <div class="settings-row">
        <button class="btn btn-sm" id="btn-reset-progress" style="width:100%;margin-top:10px;">Reset Progress</button>

      </div>

</div>
<div id="ad-banner" data-tag="110120"></div>
<script>
(function(){
"use strict";
const CFG={
  VERSION:1,
  COLS:5,ROWS:7,
  BOARD_W:5,BOARD_H:7,
  CELL_SIZE:56,
  SPAWN_SLOTS:3,
  STORAGE_SLOTS:7,
  START_ENERGY:5,
  MAX_UNDO:3,
  HINT_COOLDOWN:30000,
  COMBO_WINDOW:5000,
  COMBO_THRESHOLD:3,
  SAVE_KEY:'mergeKingdom_v1',
  INTERSTITIAL_INTERVAL:2,
  THEMES:['Nature','Food','Craft','Treasure','Magic','Mythic'],
  CHAINS:{
    Nature:{name:'Nature',color:'#00ff44',tiers:['Seed','Sprout','Sapling','Tree','Fruit Tree','Bouquet','Garden','Enchanted Grove']},
    Food:{name:'Food',color:'#ffaa00',tiers:['Milk','Cheese','Butter','Cake','Wedding Cake','Star Restaurant','Gourmet Feast','Master Chef']},
    Craft:{name:'Craft',color:'#ff6600',tiers:['Ore','Iron','Tools','Hammer','Machine','Factory','Industrial Complex','Engineering Marvel']},
    Treasure:{name:'Treasure',color:'#ffd700',tiers:['Shell','Pearl','Ring','Bracelet','Crown','Dragon Treasure','Royal Vault','Kingdom Fortune']},
    Magic:{name:'Magic',color:'#aa00ff',tiers:['Firefly','Magic Dust','Potion','Staff','Spellbook','Archmage','Grand Sorcerer','Archmage Supreme']},
    Mythic:{name:'Mythic',color:'#ff0066',tiers:['Bone','Soul Fire','Ghost','Vampire','Werewolf','Lich King','Abyss Lord','Elder Being']}
  },
  LEVEL_CONFIG:function(lv){
    const unlocked=[];
    if(lv<=5){unlocked.push('Nature','Food');}
    else if(lv<=12){unlocked.push('Nature','Food','Craft','Treasure');}
    else if(lv<=20){unlocked.push('Nature','Food','Craft','Treasure','Magic');}
    else{unlocked.push('Nature','Food','Craft','Treasure','Magic','Mythic');}
    const baseStars=3+Math.floor((lv-1)/5);
    return{unlockedThemes:unlocked,targetStars:Math.min(baseStars,10),orderCount:lv<=5?1:lv<=15?2:3};
  }
};
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let W,H,SCALE=1;
let gameState={screen:'title',level:1,coins:0,totalStars:0,unlockedLevels:1,progress:{}};
let board=[];
let spawnItems=[];
let storageItems=[];
let orders=[];
let energy=CFG.START_ENERGY;
let undoStack=[];
let hintCooldown=0;
let comboCount=0;
let comboTimer=0;
let lastMergeTime=0;
let particles=[];
let floatingTexts=[];
let animatingMerges=[];
let dragItem=null;
let dragFrom=null;
let dragOffset={x:0,y:0};
let settings={sound:true,music:true,vibration:true};
let audioCtx=null;
let bgmGain=null;
let bgmOscillators=[];
let adInterstitialCount=0;
let rafId=null;
let lastTime=0;
let timers=[];
const itemCache=new Map();
function $(id){return document.getElementById(id);}
function initCanvas(){
  W=window.innerWidth;
  H=window.innerHeight;
  canvas.width=W;
  canvas.height=H;
  SCALE=Math.min(W/1280,H/720,1);
}
function resize(){
  initCanvas();
  if(gameState.screen==='game')renderBoard();
}
window.addEventListener('resize',resize);
function initUI(){
  $('btn-play').onclick=()=>showScreen('level-select');
  $('btn-levels').onclick=()=>{renderLevelGrid();showScreen('level-select');};
  $('btn-settings-title').onclick=()=>showScreen('settings');
  $('btn-back-levels').onclick=()=>showScreen('title');
  $('btn-hint').onclick=showHint;
  $('btn-undo').onclick=doUndo;
  $('btn-menu').onclick=()=>showScreen('title');
  $('btn-retry').onclick=()=>startLevel(gameState.level);
  $('btn-levels-retry').onclick=()=>{renderLevelGrid();showScreen('level-select');};
  $('btn-menu-retry').onclick=()=>showScreen('title');
  $('btn-next-level').onclick=()=>{if(gameState.level<30)startLevel(gameState.level+1);else showScreen('title');};
  $('btn-replay').onclick=()=>startLevel(gameState.level);
  $('btn-menu-complete').onclick=()=>showScreen('title');
  $('btn-close-settings').onclick=()=>showScreen(gameState.screen==='settings'?'title':'game');
  $('toggle-sound').onclick=function(){settings.sound=!settings.sound;this.classList.toggle('on',settings.sound);};
  $('toggle-music').onclick=function(){settings.music=!settings.music;this.classList.toggle('on',settings.music);if(audioCtx){if(settings.music)startBGM();else stopBGM();}};};
  $('toggle-vibration').onclick=function(){settings.vibration=!settings.vibration;this.classList.toggle('on',settings.vibration);};
  $('btn-reset-progress').onclick=function(){if(confirm('Reset all progress?')){localStorage.removeItem(CFG.SAVE_KEY);gameState={screen:'title',level:1,coins:0,totalStars:0,unlockedLevels:1,progress:{}};showScreen('title');}};
  $('btn-close-settings').onclick=()=>{const prev=getPrevScreen();showScreen(prev);};
  initStorageSlots();
  initSpawnSlots();
}
function initStorageSlots(){
  const grid=$('storage-grid');
  grid.innerHTML='';
  for(let i=0;i<CFG.STORAGE_SLOTS;i++){
    const slot=document.createElement('div');
    slot.className='storage-slot';
    slot.dataset.index=i;
    slot.onclick=()=>onStorageClick(i);
    grid.appendChild(slot);
  }
}
function initSpawnSlots(){
  for(let i=0;i<CFG.SPAWN_SLOTS;i++){
    const slot=$(`spawn-${i}`);
    slot.onclick=()=>onSpawnClick(i);
  }
}
function getPrevScreen(){return gameState.screen;}
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  if(name==='game'){
    $('game-screen').classList.add('active');
    gameState.screen='game';
    initAdBanner();
    initAdNative();
  }else if(name==='title'){

}
function renderLevelGrid(){

  grid.innerHTML='';

    const btn=document.createElement('button');
    btn.className='level-btn';

function startLevel(lv){
  gameState.level=lv;
  energy=CFG.START_ENERGY;
  board=Array(CFG.BOARD_W*CFG.BOARD_H).fill(null);
  spawnItems=[null,null,null];
  storageItems=[];
  orders=[];
  undoStack=[];

  comboTimer=0;

function generateSpawnItem(){
  const config=CFG.LEVEL_CONFIG(gameState.level);
  const availableThemes=config.unlockedThemes;
  const theme=availableThemes[Math.floor(Math.random()*availableThemes.length)];
  const chain=CFG.CHAINS[theme];
  const tier=Math.random()<0.8?0:Math.random()<0.7?1:2;
  return{theme,chain,tier,id:Date.now()+Math.random()};
}
function generateOrders(config){
  orders=[];
  const orderCount=config.orderCount||3;
  for(let i=0;i<orderCount;i++){
    orders.push(generateOrder(config,i===0));
  }
}
function generateOrder(config,forceSimple){
  const availableThemes=config.unlockedThemes;
  const theme=availableThemes[Math.floor(Math.random()*availableThemes.length)];
  const chain=CFG.CHAINS[theme];
  const maxTier=Math.min(chain.tiers.length-1,3+Math.floor(gameState.level/5));
  const tier=forceSimple?0:Math.floor(Math.random()*(maxTier+1));
  const count=1+Math.floor(Math.random()*Math.min(3,1+Math.floor(gameState.level/8)));
  const itemDef={theme,chain,tier};
  const rewards={coins:20+gameState.level*10+count*15,stars:1};
  return{itemDef,count,rewards,completed:false,claimed:false};
}
function updateHUD(){
  $('hud-level').textContent='Lv.'+gameState.level;
  $('hud-coins').textContent=gameState.coins;
  $('hud-stars').textContent=gameState.totalStars;
  $('btn-undo').textContent='Undo ('+(CFG.MAX_UNDO-undoStack.length)+')';
  $('btn-undo').disabled=undoStack.length===0;
}
function updateEnergyBar(){
  const pct=(energy/CFG.START_ENERGY)*100;
  $('energy-fill').style.width=pct+'%';
  $('energy-text').textContent=energy+'/'+CFG.START_ENERGY;
}
function renderBoard(){
  const cellSize=Math.min(56*SCALE,(W-200)/CFG.BOARD_W-4);
  const boardW=cellSize*CFG.BOARD_W;
  const boardH=cellSize*CFG.BOARD_H;
  const bx=(W-boardW)/2;
  const by=(H-boardH)/2-40;
  const canvas2=$('board-canvas');
  canvas2.width=boardW+4;
  canvas2.height=boardH+4;
  const bctx=canvas2.getContext('2d');
  bctx.clearRect(0,0,canvas2.width,canvas2.height);
  bctx.strokeStyle='#2a2a5a';
  bctx.lineWidth=1;
  for(let x=0;x<=CFG.BOARD_W;x++){
    bctx.beginPath();
    bctx.moveTo(x*cellSize,0);
    bctx.lineTo(x*cellSize,boardH);
    bctx.stroke();
  }
  for(let y=0;y<=CFG.BOARD_H;y++){
    bctx.beginPath();
    bctx.moveTo(0,y*cellSize);
    bctx.lineTo(boardW,y*cellSize);
    bctx.stroke();
  }
  for(let i=0;i<board.length;i++){
    const item=board[i];
    if(!item)continue;
    const col=i%CFG.BOARD_W;
    const row=Math.floor(i/CFG.BOARD_W);
    const cx=col*cellSize+cellSize/2;
    const cy=row*cellSize+cellSize/2;
    drawItem(bctx,cx,cy,cellSize*0.8,item);
  }
  canvas2.onclick=function(e){
    const rect=canvas2.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=e.clientY-rect.top;
    const col=Math.floor(x/cellSize);
    const row=Math.floor(y/cellSize);
    if(col>=0&&col<CFG.BOARD_W&&row>=0&&row<CFG.BOARD_H){
      onBoardClick(row*CFG.BOARD_W+col);
    }
  };
  canvas2.onmousedown=canvas2.ontouchstart=function(e){
    e.preventDefault();
    const rect=canvas2.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const x=clientX-rect.left;
    const y=clientY-rect.top;
    const col=Math.floor(x/cellSize);
    const row=Math.floor(y/cellSize);
    if(col>=0&&col<CFG.BOARD_W&&row>=0&&row<CFG.BOARD_H){
      const idx=row*CFG.BOARD_W+col;
      if(board[idx]){
        dragItem=board[idx];
        dragFrom={type:'board',index:idx};
        dragOffset={x:x-col*cellSize,y:y-row*cellSize};
        board[idx]=null;
      }
    }
  };
}
function onBoardClick(idx){
  if(!board[idx]){
    if(dragItem&&dragFrom){
      const col=idx%CFG.BOARD_W;
      const row=Math.floor(idx/CFG.BOARD_W);
      const cellSize=parseInt($('board-canvas').width)/CFG.BOARD_W;
      const cx=col*cellSize+cellSize/2;
      const cy=row*cellSize+cellSize/2;
      placeItem(dragItem,cx,cy,idx);
    }
  }else{
    if(dragItem&&itemsMatch(dragItem,board[idx])){
      const col=idx%CFG.BOARD_W;
      const row=Math.floor(idx/CFG.BOARD_W);
      const cellSize=parseInt($('board-canvas').width)/CFG.BOARD_W;
      const cx=col*cellSize+cellSize/2;
      const cy=row*cellSize+cellSize/2;
      mergeItems(dragItem,board[idx],cx,cy,idx);
    }
  }
}
function onSpawnClick(slotIdx){
  if(!spawnItems[slotIdx])return;
  if(dragItem&&dragFrom){
    returnItemToSpawn();
  }
  dragItem=spawnItems[slotIdx];
  dragFrom={type:'spawn',index:slotIdx};
  spawnItems[slotIdx]=null;
  playSFX('click');
  renderSpawnZone();
}
function onStorageClick(slotIdx){
  if(!storageItems[slotIdx])return;
  if(dragItem&&dragFrom){
    swapWithStorage(slotIdx);
  }else if(dragItem&&dragFrom.type==='spawn'){
    const emptyIdx=storageItems.findIndex(s=>s===null);
    if(emptyIdx>=0){
      storageItems[emptyIdx]=spawnItems[dragFrom.index];
      spawnItems[dragFrom.index]=null;
      dragItem=null;
      dragFrom=null;
      renderSpawnZone();
      renderStorage();
    }
  }else{
    dragItem=storageItems[slotIdx];
    dragFrom={type:'storage',index:slotIdx};
    storageItems[slotIdx]=null;
    renderStorage();
  }
}
function swapWithStorage(slotIdx){
  const storageItem=storageItems[slotIdx];
  if(dragFrom.type==='spawn'){
    if(itemsMatch(dragItem,storageItem)){
      const mergedTier=Math.min(dragItem.tier+1,CFG.CHAINS[dragItem.theme].tiers.length-1);
      const newItem={...dragItem,tier:mergedTier,id:Date.now()};
      spawnItems[dragFrom.index]=newItem;
      storageItems[slotIdx]=null;
      spawnParticles($('spawn-'+dragFrom.index),newItem);
      playSFX('merge');
      addCombo();
    }else{
      const temp=storageItems[slotIdx];
      storageItems[slotIdx]=spawnItems[dragFrom.index];
      spawnItems[dragFrom.index]=temp;
    }
  }else if(dragFrom.type==='board'){
    if(itemsMatch(dragItem,storageItem)){
      const mergedTier=Math.min(dragItem.tier+1,CFG.CHAINS[dragItem.theme].tiers.length-1);
      const newItem={...dragItem,tier:mergedTier,id:Date.now()};
      board[dragFrom.index]=newItem;
      storageItems[slotIdx]=null;
      playSFX('merge');
      addCombo();
    }else{
      const temp=storageItems[slotIdx];
      storageItems[slotIdx]=board[dragFrom.index];
      board[dragFrom.index]=temp;
    }
  }
  dragItem=null;
  dragFrom=null;
  renderBoard();
  renderSpawnZone();
  renderStorage();
  checkOrders();
}
function placeItem(item,cx,cy,idx){
  if(energy<=0){
    showFloatingText(cx,cy,'No Energy!','#ff0000');
    if(dragFrom.type==='spawn')spawnItems[dragFrom.index]=item;
    else if(dragFrom.type==='board')board[dragFrom.index]=item;
    else if(dragFrom.type==='storage')storageItems[dragFrom.index]=item;
    dragItem=null;dragFrom=null;
    renderBoard();renderSpawnZone();renderStorage();
    playSFX('warn');
    return;
  }
  saveUndoState();
  energy--;
  updateEnergyBar();
  board[idx]=item;
  dragItem=null;dragFrom=null;
  playSFX('place');
  checkMergeAt(idx);
  checkOrders();
  renderBoard();
  renderSpawnZone();
  updateHUD();
  checkGameOver();
}
function mergeItems(item1,item2,cx,cy,idx){
  saveUndoState();
  energy--;
  updateEnergyBar();
  const newTier=Math.min(item1.tier+1,CFG.CHAINS[item1.theme].tiers.length-1);
  const newItem={...item1,tier:newTier,id:Date.now()};
  board[idx]=newItem;
  dragItem=null;dragFrom=null;
  spawnParticlesAtBoard(idx,newItem);
  playSFX('merge');
  addCombo();
  checkMergeAt(idx);
  checkOrders();
  renderBoard();
  updateHUD();
  checkGameOver();
}
function checkMergeAt(idx){
  const item=board[idx];
  if(!item)return;
  const col=idx%CFG.BOARD_W;
  const row=Math.floor(idx/CFG.BOARD_W);
  const neighbors=[[col-1,row],[col+1,row],[col,row-1],[col,row+1]];
  for(const[nc,nr]of neighbors){
    if(nc<0||nc>=CFG.BOARD_W||nr<0||nr>=CFG.BOARD_H)continue;
    const nIdx=nr*CFG.BOARD_W+nc;
    if(board[nIdx]&&itemsMatch(item,board[nIdx])){
      const cellSize=parseInt($('board-canvas').width)/CFG.BOARD_W;
      const cx2=nc*cellSize+cellSize/2;
      const cy2=nr*cellSize+cellSize/2;
      setTimeout(()=>mergeItems(item,board[nIdx],cx2,cy2,nIdx),150);
      return;
    }
  }
}
function itemsMatch(a,b){
  return a&&b&&a.theme===b.theme&&a.tier===b.tier&&a.tier<CFG.CHAINS[a.theme].tiers.length-1;
}
function saveUndoState(){
  if(undoStack.length>=CFG.MAX_UNDO)undoStack.shift();
  undoStack.push({board:[...board],spawnItems:[...spawnItems],storageItems:[...storageItems],energy,orders:orders.map(o=>({...o}))});
}
function doUndo(){
  if(undoStack.length===0)return;
  const state=undoStack.pop();
  board=state.board;
  spawnItems=state.spawnItems;
  storageItems=state.storageItems;
  energy=state.energy;
  orders=state.orders;
  updateEnergyBar();
  renderBoard();
  renderSpawnZone();
  renderStorage();
  renderOrders();
  updateHUD();
  playSFX('click');
}
function showHint(){
  if(hintCooldown>0)return;
  const pair=findMergePair();
  if(pair){
    hintCooldown=CFG.HINT_COOLDOWN;
    flashCell(pair.a);
    flashCell(pair.b);
    playSFX('hint');
  }
}
function findMergePair(){
  for(let i=0;i<board.length;i++){
    if(!board[i])continue;
    const col=i%CFG.BOARD_W;
    const row=Math.floor(i/CFG.BOARD_W);
    const neighbors=[[col-1,row],[col+1,row],[col,row-1],[col,row+1]];
    for(const[nc,nr]of neighbors){
      if(nc<0||nc>=CFG.BOARD_W||nr<0||nr>=CFG.BOARD_H)continue;
      const nIdx=nr*CFG.BOARD_W+nc;
      if(board[nIdx]&&itemsMatch(board[i],board[nIdx])){
        return{a:i,b:nIdx};
      }
    }
  }
  for(let i=0;i<spawnItems.length;i++){
    if(!spawnItems[i])continue;
    for(let j=i+1;j<spawnItems.length;j++){
      if(spawnItems[j]&&itemsMatch(spawnItems[i],spawnItems[j])){
        return{a:{type:'spawn',index:i},b:{type:'spawn',index:j}};
      }
    }
  }
  return null;
}
function flashCell(idx){
  const cellSize=parseInt($('board-canvas').width)/CFG.BOARD_W;
  const col=idx%CFG.BOARD_W;
  const row=Math.floor(idx/CFG.BOARD_W);
  const bx=$('board-canvas').getBoundingClientRect();
  const x=bx.left+col*cellSize+cellSize/2;
  const y=bx.top+row*cellSize+cellSize/2;
  showFloatingText(x,y,'Hint!','#00f0ff');
}
function addCombo(){
  const now=Date.now();
  if(now-lastMergeTime<CFG.COMBO_WINDOW){
    comboCount++;
    if(comboCount>=CFG.COMBO_THRESHOLD){
      const bonus=comboCount*10;
      gameState.coins+=bonus;
      updateHUD();
      showFloatingText(W/2,H/2,'Combo x'+comboCount+'! +'+bonus,'#ffd700');
      playSFX('combo');
    }
  }else{
    comboCount=1;
  }
  lastMergeTime=now;
  comboTimer=CFG.COMBO_WINDOW;
}
function showFloatingText(x,y,text,color){
  const el=document.createElement('div');
  el.className='combo-text';
  el.textContent=text;
  el.style.left=x+'px';
  el.style.top=y+'px';
  el.style.color=color;
  document.body.appendChild(el);
  const startTime=Date.now();
  const anim=()=>{
    const elapsed=Date.now()-startTime;
    const progress=elapsed/1000;
    el.style.transform=`translateY(${-progress*50}px) scale(${1-progress*0.3})`;
    el.style.opacity=1-progress;
    if(progress<1)requestAnimationFrame(anim);
    else el.remove();
  };
  requestAnimationFrame(anim);
}
function spawnParticles(el,item){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  spawnParticlesAt(cx,cy,item);
}
function spawnParticlesAt(cx,cy,item){
  const chain=CFG.CHAINS[item.theme];
  const color=chain.color;
  for(let i=0;i<12;i++){
    const angle=(Math.PI*2/12)*i;
    const speed=2+Math.random()*3;
    particles.push({
      x:cx,y:cy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:1,
      color,
      size:4+Math.random()*4
    });
  }
}
function spawnParticlesAtBoard(idx,item){
  const cellSize=parseInt($('board-canvas').width)/CFG.BOARD_W;
  const bx=$('board-canvas').getBoundingClientRect();
  const col=idx%CFG.BOARD_W;
  const row=Math.floor(idx/CFG.BOARD_W);
  const cx=bx.left+col*cellSize+cellSize/2;
  const cy=bx.top+row*cellSize+cellSize/2;
  spawnParticlesAt(cx,cy,item);
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.1;
    p.life-=dt*2;
    if(p.life<=0)particles.splice(i,1);
  }
}
function renderParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}
function renderSpawnZone(){
  for(let i=0;i<CFG.SPAWN_SLOTS;i++){
    const slot=$(`spawn-${i}`);
    const item=spawnItems[i];
    if(item){
      slot.classList.add('has-item');
      const iconCanvas=document.createElement('canvas');
      iconCanvas.width=40;iconCanvas.height=40;
      const ictx=iconCanvas.getContext('2d');
      drawItem(ictx,20,20,36,item);
      const existing=slot.querySelector('canvas');
      if(existing)slot.removeChild(existing);
      slot.appendChild(iconCanvas);
    }else{
      slot.classList.remove('has-item');
      const existing=slot.querySelector('canvas');
      if(existing)slot.removeChild(existing);
    }
  }
}
function renderStorage(){
  const slots=document.querySelectorAll('.storage-slot');
  slots.forEach((slot,i)=>{
    const item=storageItems[i];
    if(item){
      slot.classList.add('has-item');
      const iconCanvas=document.createElement('canvas');
      iconCanvas.width=32;iconCanvas.height=32;
      const ictx=iconCanvas.getContext('2d');

      const existing=slot.querySelector('canvas');
      if(existing)slot.removeChild(existing);
      slot.appendChild(iconCanvas);
    }else{
      slot.classList.remove('has-item');
      const existing=slot.querySelector('canvas');
      if(existing)slot.removeChild(existing);
    }

}
function renderOrders(){
  const list=$('orders-list');
  list.innerHTML='';
  for(let i=0;i<orders.length;i++){
    const order=orders[i];
    const card=document.createElement('div');
    card.className='order-card'+(order.completed?' completed':'');
    const chain=CFG.CHAINS[order.itemDef.theme];
    const tierName=chain.tiers[order.itemDef.tier];
    card.innerHTML=`
      <div class="order-item" style="font-size:9px;">${tierName.substring(0,3)}</div>
      <div class="order-req">x${order.count}</div>
      <div class="order-rewards"><span class="order-reward">${order.rewards.coins}</span><span class="order-reward">${order.rewards.stars}</span></div>
      ${order.completed&&!order.claimed?'<button class="btn btn-sm btn-gold order-claim">Claim</button>':''}
    `;
    if(order.completed&&!order.claimed){
      card.querySelector('.order-claim').onclick=()=>claimOrder(i);
    }
    list.appendChild(card);
  }
}
function claimOrder(idx){
  const order=orders[idx];
  gameState.coins+=order.rewards.coins;
  gameState.totalStars+=order.rewards.stars;
  order.claimed=true;
  orders[idx]=generateOrder(CFG.LEVEL_CONFIG(gameState.level),false);
  playSFX('order');
  showFloatingText(W/2,H/2,'+'+order.rewards.coins+' Coins','#ffd700');
  updateHUD();
  renderOrders();
  checkLevelComplete();
}
function checkOrders(){
  for(let i=0;i<orders.length;i++){
    if(orders[i].completed||orders[i].claimed)continue;
    const order=orders[i];
    let count=0;
    for(const item of board){
      if(item&&item.theme===order.itemDef.theme&&item.tier===order.itemDef.tier){
        count++;
      }
    }
    for(const item of storageItems){
      if(item&&item.theme===order.itemDef.theme&&item.tier===order.itemDef.tier){
        count++;
      }
    }
    if(count>=order.count){
      order.completed=true;
      renderOrders();
    }
  }
}
function checkGameOver(){
  if(energy>0)return;
  let hasSellable=false;
  for(const item of board){
    if(item&&item.tier<=2)hasSellable=true;
  }
  for(const item of storageItems){
    if(item&&item.tier<=2)hasSellable=true;
  }
  if(!hasSellable){
    setTimeout(()=>showScreen('game-over'),500);
  }
}
function checkLevelComplete(){
  const config=CFG.LEVEL_CONFIG(gameState.level);
  let earnedStars=0;
  for(const order of orders){
    if(order.claimed)earnedStars+=order.rewards.stars;
  }
  if(earnedStars>=config.targetStars){
    const starsEarned=Math.min(earnedStars,config.targetStars);
    const coinsEarned=50+gameState.level*20+starsEarned*30;
    gameState.coins+=coinsEarned;
    if(!gameState.progress[gameState.level]||gameState.progress[gameState.level].stars<starsEarned){
      gameState.progress[gameState.level]={stars:starsEarned};
    }
    if(starsEarned>0&&gameState.level>=gameState.unlockedLevels&&gameState.level<30){
      gameState.unlockedLevels=gameState.level+1;
    }
    $('complete-stars').textContent='★'.repeat(starsEarned);
    $('complete-coins').textContent='+'+coinsEarned+' Coins';
    $('complete-stars-count').textContent='+'+starsEarned+' Stars';
    saveGame();
    setTimeout(()=>showScreen('level-complete'),300);
    playSFX('win');
  }
}
function drawItem(ctx,cx,cy,size,item){
  if(!item)return;
  const chain=CFG.CHAINS[item.theme];
  const tier=item.tier;
  const color=chain.color;
  const alpha=0.5+tier*0.05;
  ctx.save();
  ctx.translate(cx,cy);
  const scale=0.7+Math.min(tier,CFG.CHAINS[item.theme].tiers.length-1)*0.05;
  ctx.scale(scale,scale);
  ctx.globalAlpha=alpha;
  const grad=ctx.createRadialGradient(0,0,0,0,0,size/2);
  grad.addColorStop(0,color);
  grad.addColorStop(1,'#000');
  ctx.fillStyle=grad;
  ctx.shadowColor=color;
  ctx.shadowBlur=10+tier*2;
  switch(item.theme){
    case'Nature':drawNature(ctx,size,color,tier);break;
    case'Food':drawFood(ctx,size,color,tier);break;
    case'Craft':drawCraft(ctx,size,color,tier);break;
    case'Treasure':drawTreasure(ctx,size,color,tier);break;
    case'Magic':drawMagic(ctx,size,color,tier);break;
    case'Mythic':drawMythic(ctx,size,color,tier);break;
    default:ctx.beginPath();ctx.arc(0,0,size/3,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='#fff';
  ctx.font='bold '+(size/4)+'px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.shadowBlur=0;
  ctx.fillText('T'+(tier+1),0,0);
  ctx.restore();
}
function drawNature(ctx,size,color,tier){
  const s=size/2.5;
  if(tier===0){ctx.beginPath();ctx.ellipse(0,0,s*0.5,s*0.7,0,0,Math.PI*2);ctx.fill();}
  else if(tier===1){ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*0.5,s*0.5);ctx.lineTo(-s*0.5,s*0.5);ctx.closePath();ctx.fill();}
  else if(tier===2){ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*0.3,0);ctx.lineTo(0,s);ctx.lineTo(-s*0.3,0);ctx.closePath();ctx.fill();}
  else if(tier===3){ctx.beginPath();ctx.arc(0,-s*0.2,s*0.6,0,Math.PI*2);ctx.fill();ctx.fillRect(-s*0.1,s*0.2,s*0.2,s*0.6);}
  else if(tier===4){ctx.beginPath();ctx.arc(0,-s*0.3,s*0.5,0,Math.PI*2);ctx.fill();ctx.fillStyle=color;for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-s*0.2+i*s*0.2,s*0.1,s*0.15,0,Math.PI*2);ctx.fill();}}
  else if(tier===5){ctx.beginPath();for(let i=0;i<5;i++){const a=(Math.PI*2/5)*i-Math.PI/2;ctx.lineTo(Math.cos(a)*s*0.6,Math.sin(a)*s*0.6);}ctx.closePath();ctx.fill();}
  else if(tier===6){ctx.beginPath();for(let i=0;i<6;i++){const a=(Math.PI*2/6)*i;ctx.lineTo(Math.cos(a)*s*0.7,Math.sin(a)*s*0.7);}ctx.closePath();ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(0,0,s*0.3,0,Math.PI*2);ctx.fill();}
  else{ctx.beginPath();ctx.arc(0,0,s*0.6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(-s*0.2,-s*0.2,s*0.2,0,Math.PI*2);ctx.fill();}
}

  else if(tier===5){ctx.beginPath();ctx.arc(0,0,s*0.7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=0.4;ctx.beginPath();ctx.arc(0,-s*0.2,s*0.25,0,Math.PI*2);ctx.fill();}
  else if(tier===6){ctx.beginPath();for(let i=0;i<8;i++){const a=(Math.PI*2/8)*i;ctx.lineTo(Math.cos(a)*s*0.8,Math.sin(a)*s*0.8);}ctx.closePath();ctx.fill();}
  else{ctx.beginPath();ctx.arc(0,0,s*0.8,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(0,0,s*0.5,0,Math.PI*2);ctx.stroke();}
}

  else if(tier===2){ctx.beginPath();ctx.ellipse(0,0,s*0.5,s*0.3,0,0,Math.PI*2);ctx.fill();ctx.fillRect(-s*0.6,-s*0.1,s*1.2,s*0.2);}
  else if(tier===3){ctx.beginPath();ctx.arc(0,0,s*0.5,0,Math.PI*2);ctx.fill();for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(Math.cos(i*Math.PI/2)*s*0.25,Math.sin(i*Math.PI/2)*s*0.25,s*0.12,0,Math.PI*2);ctx.fill();}}
  else if(tier===4){ctx.beginPath();for(let i=0;i<5;i++){const a=(Math.PI*2/5)*i-Math.PI/2;const r=i===0||i===4?s*0.6:s*0.3;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();}
  else if(tier===5){ctx.beginPath();ctx.arc(0,0,s*0.6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=0.3;ctx.fillRect(-s*0.4,-s*0.2,s*0.8,s*0.4);}
  else if(tier===6){ctx.fillRect(-s*0.6,-s*0.4,s*1.2,s*0.8);ctx.fillStyle='#000';ctx.globalAlpha=0.3;ctx.fillRect(-s*0.4,-s*0.2,s*0.8,s*0.4);}
  else{ctx.beginPath();ctx.arc(0,0,s*0.7,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.globalAlpha=0.5;ctx.beginPath();ctx.arc(0,0,s*0.5,0,Math.PI*2);ctx.stroke();}
}

  else{ctx.beginPath();ctx.arc(0,0,s*0.7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.globalAlpha=0.4;ctx.beginPath();ctx.arc(0,0,s*0.3,0,Math.PI*2);ctx.fill();}

function returnItemToSpawn(){
  if(!dragItem||!dragFrom)return;
  if(dragFrom.type==='spawn')return;
  if(dragFrom.type==='board'){
    board[dragFrom.index]=dragItem;
  }else if(dragFrom.type==='storage'){
    storageItems[dragFrom.index]=dragItem;
  }
  dragItem=null;dragFrom=null;
  renderBoard();renderSpawnZone();renderStorage();
}
document.addEventListener('mousemove',function(e){
  if(!dragItem)return;
  dragOffset.x=e.clientX;
  dragOffset.y=e.clientY;
});
document.addEventListener('touchmove',function(e){
  if(!dragItem)return;
  e.preventDefault();
  dragOffset.x=e.touches[0].clientX;
  dragOffset.y=e.touches[0].clientY;
},{passive:false});
document.addEventListener('mouseup',function(e){
  if(!dragItem||!dragFrom)return;
  const bx=$('board-canvas').getBoundingClientRect();
  const by2=$('board-canvas').getBoundingClientRect();
  const cellSize=parseInt($('board-canvas').width)/CFG.BOARD_W;
  if(e.clientX>=bx.left&&e.clientX<=bx.right&&e.clientY>=by2.top&&e.clientY<=by2.bottom){
    const col=Math.floor((e.clientX-bx.left)/cellSize);
    const row=Math.floor((e.clientY-by2.top)/cellSize);
    if(col>=0&&col<CFG.BOARD_W&&row>=0&&row<CFG.BOARD_H){
      const idx=row*CFG.BOARD_W+col;
      if(board[idx]){
        if(itemsMatch(dragItem,board[idx])){
          mergeItems(dragItem,board[idx],col*cellSize+cellSize/2,row*cellSize+cellSize/2,idx);
          return;
        }else{
          board[dragFrom.index]=dragItem;
          dragItem=null;dragFrom=null;
          renderBoard();return;
        }
      }else{
        placeItem(dragItem,col*cellSize+cellSize/2,row*cellSize+cellSize/2,idx);
        return;
      }
    }
  }
  if(dragFrom.type==='board')board[dragFrom.index]=dragItem;
  else if(dragFrom.type==='storage')storageItems[dragFrom.index]=dragItem;
  dragItem=null;dragFrom=null;
  renderBoard();renderSpawnZone();renderStorage();
});

  if(!dragItem||!dragFrom)return;
  const bx=$('board-canvas').getBoundingClientRect();
  const by2=$('board-canvas').getBoundingClientRect();
  const cellSize=parseInt($('board-canvas').width)/CFG.BOARD_W;
  const cx=e.changedTouches[0].clientX;
  const cy=e.changedTouches[0].clientY;
  if(cx>=bx.left&&cx<=bx.right&&cy>=by2.top&&cy<=by2.bottom){

function initAudio(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }catch(e){}
}
function startBGM(){
  if(!audioCtx)return;
  stopBGM();
  bgmGain=audioCtx.createGain();
  bgmGain.gain.value=0.15;
  bgmGain.connect(audioCtx.destination);
  const notes=[130.81,146.83,164.81,174.61,196.00,220.00,246.94];
  const playNote=(freq,time,dur)=>{
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.value=freq;
    g.gain.setValueAtTime(0.3,time);
    g.gain.exponentialRampToValueAtTime(0.01,time+dur);
    osc.connect(g);
    g.connect(bgmGain);
    osc.start(time);
    osc.stop(time+dur);
  };
  const scheduleLoop=()=>{
    const now=audioCtx.currentTime;
    for(let i=0;i<16;i++){
      const noteIdx=i%notes.length;
      const octave=i<8?1:2;
      const freq=notes[noteIdx]*octave;
      playNote(freq,now+i*0.5,0.4);
    }
    const loopDur=16*0.5;
    const t=setTimeout(()=>{if(settings.music)scheduleLoop();},loopDur*1000-100);
    timers.push(t);
  };
  scheduleLoop();
}
function stopBGM(){
  if(bgmGain){try{bgmGain.disconnect();}catch(e){}}
  bgmGain=null;
  timers.forEach(t=>clearTimeout(t));
  timers=[];
}
function playSFX(type){
  if(!audioCtx||!settings.sound)return;
  const now=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  switch(type){
    case'merge':
      osc.type='sine';
      osc.frequency.setValueAtTime(523.25,now);
      osc.frequency.exponentialRampToValueAtTime(783.99,now+0.1);
      gain.gain.setValueAtTime(0.3,now);
      gain.gain.exponentialRampToValueAtTime(0.01,now+0.2);
      osc.start(now);
      osc.stop(now+0.2);
      break;
    case'click':
      osc.type='square';
      osc.frequency.value=200;
      gain.gain.setValueAtTime(0.1,now);
      gain.gain.exponentialRampToValueAtTime(0.01,now+0.05);
      osc.start(now);
      osc.stop(now+0.05);
      break;
    case'place':
      osc.type='triangle';
      osc.frequency.value=300;
      gain.gain.setValueAtTime(0.15,now);
      gain.gain.exponentialRampToValueAtTime(0.01,now+0.08);
      osc.start(now);
      osc.stop(now+0.08);
      break;
    case'warn':
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(150,now);
      gain.gain.setValueAtTime(0.2,now);
      gain.gain.exponentialRampToValueAtTime(0.01,now+0.3);
      osc.start(now);
      osc.stop(now+0.3);
      break;
    case'win':
      osc.type='sine';
      [261.63,329.63,392.00,523.25].forEach((f,i)=>{
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        o.type='sine';
        o.frequency.value=f;
        o.connect(g);
        g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.2,now+i*0.15);
        g.gain.exponentialRampToValueAtTime(0.01,now+i*0.15+0.3);
        o.start(now+i*0.15);
        o.stop(now+i*0.15+0.3);
      });
      break;
    case'order':
      osc.type='sine';
      osc.frequency.setValueAtTime(880,now);
      osc.frequency.setValueAtTime(1100,now+0.1);
      gain.gain.setValueAtTime(0.2,now);
      gain.gain.exponentialRampToValueAtTime(0.01,now+0.3);
      osc.start(now);
      osc.stop(now+0.3);
      break;
    case'combo':
      osc.type='sine';
      [523.25,659.25,783.99,1046.50].forEach((f,i)=>{
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        o.type='sine';
        o.frequency.value=f;
        o.connect(g);
        g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.15,now+i*0.08);
        g.gain.exponentialRampToValueAtTime(0.01,now+i*0.08+0.15);
        o.start(now+i*0.08);
        o.stop(now+i*0.08+0.15);
      });
      break;
    case'hint':
      osc.type='sine';
      osc.frequency.setValueAtTime(600,now);
      osc.frequency.setValueAtTime(800,now+0.1);
      gain.gain.setValueAtTime(0.15,now);
      gain.gain.exponentialRampToValueAtTime(0.01,now+0.2);
      osc.start(now);
      osc.stop(now+0.2);
      break;
  }
}

function saveGame(){
  const data={
    version:CFG.VERSION,
    level:gameState.level,
    coins:gameState.coins,
    totalStars:gameState.totalStars,
    unlockedLevels:gameState.unlockedLevels,
    progress:gameState.progress,
    settings
  };
  localStorage.setItem(CFG.SAVE_KEY,JSON.stringify(data));
}
function loadGame(){
  try{
    const raw=localStorage.getItem(CFG.SAVE_KEY);
    if(!raw)return;
    const data=JSON.parse(raw);
    if(data.version!==CFG.VERSION){
      localStorage.removeItem(CFG.SAVE_KEY);
      return;
    }
    gameState.level=data.level||1;
    gameState.coins=data.coins||0;
    gameState.totalStars=data.totalStars||0;
    gameState.unlockedLevels=data.unlockedLevels||1;
    gameState.progress=data.progress||{};
    if(data.settings){
      settings={...settings,...data.settings};
      $('toggle-sound').classList.toggle('on',settings.sound);
      $('toggle-music').classList.toggle('on',settings.music);
      $('toggle-vibration').classList.toggle('on',settings.vibration);
    }
  }catch(e){}
}
function gameLoop(time){
  const dt=Math.min((time-lastTime)/1000,0.1);
  lastTime=time;
  ctx.clearRect(0,0,W,H);
  updateParticles(dt);
  renderParticles();
  if(hintCooldown>0){
    hintCooldown-=dt*1000;
    if(hintCooldown<=0){hintCooldown=0;}
  }
  rafId=requestAnimationFrame(gameLoop);
}
function cleanup(){
  if(rafId)cancelAnimationFrame(rafId);
  stopBGM();
  timers.forEach(t=>clearTimeout(t));
  timers=[];
  window.removeEventListener('resize',resize);
  document.removeEventListener('mousemove',arguments.callee);
  document.removeEventListener('mouseup',arguments.callee);
  document.removeEventListener('touchmove',arguments.callee);
  document.removeEventListener('touchend',arguments.callee);
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    saveGame();
    stopBGM();
  }else{
    if(gameState.screen==='game'&&settings.music)startBGM();
  }
});
window.addEventListener('error',function(e){
  console.error('Game error:',e.error);
});
initCanvas();
initUI();
loadGame();
lastTime=performance.now();
rafId=requestAnimationFrame(gameLoop);
})();
