<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#1a2a1a"/>
    <stop offset="100%" stop-color="#0a0a1a"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7fff00" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#7fff00" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="128" height="128" rx="20" fill="url(#bg)"/>
<!-- Grid lines -->
<line x1="32" y1="32" x2="96" y2="32" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="32" y1="64" x2="96" y2="64" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="32" y1="96" x2="96" y2="96" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="32" y1="32" x2="32" y2="96" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="64" y1="32" x2="64" y2="96" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="96" y1="32" x2="96" y2="96" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="3,3"/>
<!-- Beam paths (glowing green) -->
<line x1="32" y1="32" x2="96" y2="32" stroke="#7fff00" stroke-width="3" stroke-linecap="round"/>
<line x1="96" y1="32" x2="96" y2="96" stroke="#7fff00" stroke-width="3" stroke-linecap="round"/>
<line x1="32" y1="32" x2="32" y2="64" stroke="#7fff00" stroke-width="3" stroke-linecap="round"/>
<line x1="32" y1="64" x2="64" y2="64" stroke="#7fff00" stroke-width="3" stroke-linecap="round"/>
<line x1="64" y1="64" x2="64" y2="96" stroke="#7fff00" stroke-width="3" stroke-linecap="round"/>
<line x1="64" y1="96" x2="96" y2="96" stroke="#7fff00" stroke-width="3" stroke-linecap="round"/>
<!-- Glow effects on beams -->
<line x1="32" y1="32" x2="96" y2="32" stroke="#7fff00" stroke-width="8" stroke-linecap="round" opacity=".2"/>
<line x1="96" y1="32" x2="96" y2="96" stroke="#7fff00" stroke-width="8" stroke-linecap="round" opacity=".2"/>
<!-- Circles (fireflies) -->
<circle cx="32" cy="32" r="10" fill="#ffdd00"/>
<circle cx="96" cy="32" r="10" fill="#ffdd00"/>
<circle cx="96" cy="96" r="10" fill="#ffdd00"/>
<circle cx="64" cy="96" r="8" fill="#ffdd00"/>
<circle cx="32" cy="64" r="8" fill="#ffdd00"/>
<!-- Circle inner numbers -->
<text x="32" y="36" text-anchor="middle" font-size="11" font-weight="bold" fill="#0a0a1a" font-family="sans-serif">1</text>
<text x="96" y="36" text-anchor="middle" font-size="11" font-weight="bold" fill="#0a0a1a" font-family="sans-serif">0</text>
<!-- Direction dots -->
<circle cx="42" cy="32" r="3" fill="white"/>
<circle cx="96" cy="42" r="3" fill="white"/>
<circle cx="86" cy="96" r="2.5" fill="white"/>
<circle cx="32" cy="54" r="2.5" fill="white"/>
<!-- Glow halos -->
<circle cx="32" cy="32" r="18" fill="url(#glow)"/>
<circle cx="96" cy="32" r="18" fill="url(#glow)"/>
<circle cx="96" cy="96" r="18" fill="url(#glow)"/>
</svg>