/* ========== SAVE / LOAD ========== */
function getDefaultSave(){
  return{version:2,currentLevel:0,starsPerLevel:{},coins:100,achievements:[],dailyCompleted:{},noHelpLevels:[],soundOn:true,showTutorial:true};
}
function loadSave(){
  try{
    const s=JSON.parse(localStorage.getItem(SAVE_KEY));
    if(!s||s.version!==2) return getDefaultSave();
    return s;
  }catch(e){return getDefaultSave();}
}
function saveToDisk(){
  const s={
    version:2,
    currentLevel:G.currentLevel,
    starsPerLevel:G.starsPerLevel,
    coins:G.coins,
    achievements:[...G.achievements],
    dailyCompleted:G.dailyCompleted,
    noHelpLevels:[...G.noHelpLevels],
    soundOn:G.soundOn,
    showTutorial:G.showTutorial
  };
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(s));}catch(e){}
}
function applySave(s){
  G.currentLevel=s.currentLevel||0;
  G.starsPerLevel=s.starsPerLevel||{};
  G.coins=s.coins||100;
  G.achievements=new Set(s.achievements||[]);
  G.dailyCompleted=s.dailyCompleted||{};
  G.noHelpLevels=new Set(s.noHelpLevels||[]);
  G.soundOn=s.soundOn!==false;
  G.showTutorial=s.showTutorial!==false;
  updateUI();
}

/* ========== AUDIO (Web Audio API, procedural) ========== */
function ensureAudio(){
  if(!G.audioCtx){
    try{G.audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
    catch(e){return null;}
  }
  if(G.audioCtx.state==='suspended') G.audioCtx.resume();
  return G.audioCtx;
}
function playSound(type){
  if(!G.soundOn) return;
  const ac=ensureAudio();if(!ac) return;
  const t=ac.currentTime;
  try{
    switch(type){
      case 'select':{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='sine';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(1200,t+0.06);
        g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
        o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.08);
        break;
      }
      case 'pour':{
        const buf=ac.createBuffer(1,ac.sampleRate*0.5,ac.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*0.15));
        const src=ac.createBufferSource();src.buffer=buf;
        const flt=ac.createBiquadFilter();flt.type='bandpass';flt.frequency.setValueAtTime(2000,t);flt.Q.setValueAtTime(1,t);
        const g=ac.createGain();g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
        src.connect(flt);flt.connect(g);g.connect(ac.destination);src.start(t);
        break;
      }
      case 'complete':{
        [523,659,784,1047].forEach((f,i)=>{
          const o=ac.createOscillator(),g=ac.createGain();
          o.type='sine';o.frequency.setValueAtTime(f,t+i*0.1);
          g.gain.setValueAtTime(0.15,t+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.3);
          o.connect(g);g.connect(ac.destination);o.start(t+i*0.1);o.stop(t+i*0.1+0.3);
        });
        break;
      }
      case 'win':{
        [523,587,659,698,784,880,988,1047].forEach((f,i)=>{
          const o=ac.createOscillator(),g=ac.createGain();
          o.type='triangle';o.frequency.setValueAtTime(f,t+i*0.08);
          g.gain.setValueAtTime(0.12,t+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.25);
          o.connect(g);g.connect(ac.destination);o.start(t+i*0.08);o.stop(t+i*0.08+0.25);
        });
        break;
      }
      case 'click':{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='sine';o.frequency.setValueAtTime(600,t);
        g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
        o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.04);
        break;
      }
      case 'undo':{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='sine';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(400,t+0.15);
        g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
        o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.18);
        break;
      }
      case 'error':{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='square';o.frequency.setValueAtTime(150,t);
        g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
        o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.15);
        break;
      }
      case 'flower':{
        [880,1100,1320].forEach((f,i)=>{
          const o=ac.createOscillator(),g=ac.createGain();
          o.type='sine';o.frequency.setValueAtTime(f,t+i*0.12);
          g.gain.setValueAtTime(0.1,t+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.2);
          o.connect(g);g.connect(ac.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.2);
        });
        break;
      }
    }
  }catch(e){}
}
function startBGM(){
  if(!G.soundOn) return;
  const ac=ensureAudio();if(!ac) return;
  stopBGM();
  try{
    G.bgmGain=ac.createGain();
    G.bgmGain.gain.setValueAtTime(0.03,ac.currentTime);
    G.bgmGain.connect(ac.destination);
    const notes=[130.81,164.81,196.00,261.63];
    notes.forEach((f,i)=>{
      const o=ac.createOscillator();
      o.type='sine';o.frequency.setValueAtTime(f,ac.currentTime);
      const flt=ac.createBiquadFilter();flt.type='lowpass';flt.frequency.setValueAtTime(400,ac.currentTime);
      o.connect(flt);flt.connect(G.bgmGain);
      o.start();
      G.bgmOscs.push(o);
    });
  }catch(e){}
}
function stopBGM(){
  G.bgmOscs.forEach(o=>{try{o.stop();}catch(e){}});
  G.bgmOscs=[];
  if(G.bgmGain){try{G.bgmGain.disconnect();}catch(e){}}
  G.bgmGain=null;
}

/* ========== LAYOUT HELPERS ========== */
function getBottleLayout(){
  const n=G.bottles.length;
  if(n<=5){return{cols:5,rows:1,maxPerRow:5};}
  if(n<=8){return{cols:4,rows:2,maxPerRow:4};}
  if(n<=9){return{cols:5,rows:2,maxPerRow:5};}
  return{cols:5,rows:2,maxPerRow:5};
}
function getBottleRect(idx){
  const n=G.bottles.length;
  const layout=getBottleLayout();
  const padX=30,padY=40;
  const gapX=14,gapY=20;
  const availW=CANVAS_W-padX*2;
  const availH=CANVAS_H-padY*2;
  const bw=(availW-gapX*(layout.cols-1))/layout.cols;
  const bottleH=layout.rows===1?availH:(availH-gapY)/layout.rows;
  const row=Math.floor(idx/layout.maxPerRow);
  const col=idx%layout.maxPerRow;
  const totalW=bw*layout.cols+gapX*(layout.cols-1);
  const totalH=bottleH*layout.rows+gapY*(layout.rows-1);
  const offsetX=(CANVAS_W-totalW)/2;
  const offsetY=padY+(CANVAS_H-padY*2-totalH)/2;
  const x=offsetX+col*(bw+gapX);
  const y=offsetY+row*(bottleH+gapY);
  return{x,y,w:bw,h:bottleH};
}

/* ========== PARTICLE SYSTEM ========== */
function spawnPourParticles(fromRect,toRect,color,sandY,progress){
  const c=SAND_COLORS[color];
  const sx=fromRect.x+fromRect.w/2;
  const sy=fromRect.y+20;
  const tx=toRect.x+toRect.w/2;
  const ty=toRect.y+20+toRect.h*0.3;
  const p=Math.min(1,progress);
  for(let i=0;i<3;i++){
    G.particles.push({
      x:sx+(tx-sx)*p+(Math.random()-0.5)*8,
      y:sy+(ty-sy)*p*0.6+Math.sin(p*Math.PI)*(-40)+(Math.random()-0.5)*6,
      vx:(Math.random()-0.5)*1.5,
      vy:Math.random()*2+1,
      r:Math.random()*3+2,
      color:c.particle,
      alpha:1,
      life:1
    });
  }
}
function spawnConfetti(cx,cy,count){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*4+2;
    G.confetti.push({
      x:cx,y:cy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-3,
      r:Math.random()*4+3,
      color:SAND_COLORS[Math.floor(Math.random()*SAND_COLORS.length)].particle,
      alpha:1,
      life:1,
      rot:Math.random()*Math.PI*2,
      rotV:(Math.random()-0.5)*0.2
    });
  }
}
function spawnFlowerParticles(cx,cy,color){
  const c=SAND_COLORS[color];
  for(let i=0;i<20;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*2+1;
    G.flowers.push({
      x:cx,y:cy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-2,
      r:Math.random()*3+1,
      color:c.hi,
      alpha:1,
      life:1
    });
  }
}
function updateParticles(dt){
  G.particles.forEach(p=>{
    p.x+=p.vx*dt*60;
    p.y+=p.vy*dt*60;
    p.vy+=0.1*dt*60;
    p.life-=dt*2;
    p.alpha=Math.max(0,p.life);
  });
  G.particles=G.particles.filter(p=>p.life>0);
  G.confetti.forEach(p=>{
    p.x+=p.vx*dt*60;
    p.y+=p.vy*dt*60;
    p.vy+=0.08*dt*60;
    p.vx*=0.99;
    p.rot+=p.rotV;
    p.life-=dt*0.7;
    p.alpha=Math.max(0,p.life);
  });
  G.confetti=G.confetti.filter(p=>p.life>0);
  G.flowers.forEach(p=>{
    p.x+=p.vx*dt*60;
    p.y+=p.vy*dt*60;
    p.vy+=0.04*dt*60;
    p.life-=dt*1.2;
    p.alpha=Math.max(0,p.life);
  });
  G.flowers=G.flowers.filter(p=>p.life>0);
}

/* ========== RENDERING ========== */
function drawBottle(idx){
  const rect=getBottleRect(idx);
  const bottle=G.bottles[idx];
  const isSelected=G.selected===idx;
  const isHint=G.hintHighlight===idx;
  const cx=rect.x+rect.w/2;
  const cap=G.capacity;
  const sandH=(rect.h-30)/cap;
  const bottleTop=rect.y+10;
  const bottleW=rect.w*0.65;
  const wallThick=3;

  // Bottle glow
  if(isSelected){
    ctx.save();
    ctx.shadowColor='rgba(108,99,255,0.5)';
    ctx.shadowBlur=20;
    ctx.strokeStyle='rgba(108,99,255,0.6)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.roundRect(cx-bottleW/2-4,bottleTop-6,bottleW+8,rect.h-4,8);
    ctx.stroke();
    ctx.restore();
  }
  if(isHint){
    ctx.save();
    ctx.shadowColor='rgba(255,217,102,0.5)';
    ctx.shadowBlur=15+Math.sin(Date.now()/200)*5;
    ctx.strokeStyle='rgba(255,217,102,0.7)';
    ctx.lineWidth=2;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.roundRect(cx-bottleW/2-4,bottleTop-6,bottleW+8,rect.h-4,8);
    ctx.stroke();
    ctx.restore();
  }

  // Glass bottle body
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(cx-bottleW/2,bottleTop,bottleW,rect.h-12,6);
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=wallThick;
  ctx.stroke();

  // Glass highlight
  const grad=ctx.createLinearGradient(cx-bottleW/2,bottleTop,cx+bottleW/2,bottleTop);
  grad.addColorStop(0,'rgba(255,255,255,0.08)');
  grad.addColorStop(0.3,'rgba(255,255,255,0.02)');
  grad.addColorStop(0.7,'rgba(255,255,255,0.0)');
  grad.addColorStop(1,'rgba(255,255,255,0.05)');
  ctx.fillStyle=grad;
  ctx.fillRect(cx-bottleW/2+wallThick,bottleTop+wallThick,bottleW-wallThick*2,rect.h-12-wallThick);
  ctx.restore();

  // Bottle neck
  ctx.save();
  ctx.beginPath();
  const neckW=bottleW*0.45;
  ctx.roundRect(cx-neckW/2,bottleTop-8,neckW,14,4);
  ctx.fillStyle='rgba(255,255,255,0.03)';
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.restore();

  // Sand layers (draw from bottom)
  const innerTop=bottleTop+wallThick;
  const innerH=rect.h-12-wallThick*2;
  const layerH=innerH/cap;
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(cx-bottleW/2+wallThick,innerTop,bottleW-wallThick*2,innerH,3);
  ctx.clip();

  for(let i=0;i<bottle.length;i++){
    const colorIdx=bottle[i];
    const c=SAND_COLORS[colorIdx];
    const yPos=innerTop+innerH-(i+1)*layerH;
    const lh=layerH+1; // slight overlap

    // Sand layer gradient
    const sg=ctx.createLinearGradient(cx-bottleW/2,yPos,cx+bottleW/2,yPos);
    sg.addColorStop(0,c.shadow);
    sg.addColorStop(0.3,c.hex);
    sg.addColorStop(0.7,c.hex);
    sg.addColorStop(1,c.shadow);
    ctx.fillStyle=sg;
    ctx.fillRect(cx-bottleW/2+wallThick,yPos,bottleW-wallThick*2,lh);

    // Sand texture (subtle noise)
    ctx.fillStyle='rgba(255,255,255,0.06)';
    for(let px=0;px<bottleW-wallThick*2;px+=4){
      if(Math.sin(px*7+i*13+idx*31)>0.3){
        ctx.fillRect(cx-bottleW/2+wallThick+px,yPos+layerH*0.2,2,layerH*0.3);
      }
    }

    // Top highlight
    if(i===bottle.length-1){
      ctx.fillStyle='rgba(255,255,255,0.12)';
      ctx.fillRect(cx-bottleW/2+wallThick,yPos,bottleW-wallThick*2,2);
    }
  }

  // Check if sorted (single color)
  if(bottle.length>0 && bottle.length===cap && bottle.every(c=>c===bottle[0])){
    // Bloom flower on top
    const flowerY=innerTop-5;
    drawFlower(cx,flowerY,bottle[0]);
  }
  ctx.restore();
}

function drawFlower(x,y,colorIdx){
  const c=SAND_COLORS[colorIdx];
  const t=Date.now()/1000;
  ctx.save();
  // Stem
  ctx.strokeStyle='#2ecc71';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(x,y+8);
  ctx.lineTo(x,y-4);
  ctx.stroke();
  // Petals
  const petalCount=5;
  const pr=5+Math.sin(t*2)*0.5;
  for(let i=0;i<petalCount;i++){
    const a=(i/petalCount)*Math.PI*2-Math.PI/2;
    ctx.beginPath();
    ctx.ellipse(x+Math.cos(a)*pr,y-4+Math.sin(a)*pr,3,5,a,0,Math.PI*2);
    ctx.fillStyle=c.hi;
    ctx.globalAlpha=0.8;
    ctx.fill();
  }
  // Center
  ctx.globalAlpha=1;
  ctx.beginPath();
  ctx.arc(x,y-4,3,0,Math.PI*2);
  ctx.fillStyle='#ffd966';
  ctx.fill();
  ctx.restore();
}

function render(dt){
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);

  if(G.screen==='title'){
    drawTitleScreen();
  } else if(G.screen==='play'||G.screen==='tutorial'){
    drawGameBoard(dt);
  }

  // Draw confetti on confetti canvas
  if(G.confetti.length>0){
    cctx.clearRect(0,0,confettiCanvas.width/DPR,confettiCanvas.height/DPR);
    G.confetti.forEach(p=>{
      cctx.save();
      cctx.globalAlpha=p.alpha;
      cctx.translate(p.x,p.y);
      cctx.rotate(p.rot);
      cctx.fillStyle=p.color;
      cctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      cctx.restore();
    });
  } else {
    cctx.clearRect(0,0,confettiCanvas.width/DPR,confettiCanvas.height/DPR);
  }
}

function drawTitleScreen(){

  const t=Date.now()/1000;
  ctx.save();
  for(let i=0;i<30;i++){
    const x=(Math.sin(t*0.3+i*1.7)*0.4+0.5)*CANVAS_W;
    const y=(Math.cos(t*0.2+i*2.3)*0.4+0.5)*CANVAS_H;
    const c=SAND_COLORS[i%6];
    ctx.fillStyle=c.particle;
    ctx.globalAlpha=0.15+Math.sin(t+i)*0.05;
    ctx.beginPath();
    ctx.arc(x,y,3+Math.sin(t*0.5+i)*2,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  // Title
  ctx.fillStyle='#f0e6ff';
  ctx.font='700 36px Fredoka, sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.shadowColor='rgba(108,99,255,0.4)';
  ctx.shadowBlur=20;
  ctx.fillText('Sand Sort Puzzle',CANVAS_W/2,CANVAS_H*0.28);
  ctx.shadowBlur=0;

  // Subtitle
  ctx.font='400 16px Fredoka, sans-serif';
  ctx.fillStyle='rgba(138,127,170,0.8)';
  ctx.fillText('Sort the sand, find your calm',CANVAS_W/2,CANVAS_H*0.35);

  // Decorative bottles
  const demoColors=[[0],[1,2],[],[2,0,1],[]];

  const demoStartX=(CANVAS_W-totalDemoW)/2;

    const bx=demoStartX+i*(demoW+gap);

    ctx.fillStyle='rgba(255,255,255,0.04)';

      const sy=demoY+demoH-(li+1)*layerH;
      ctx.fillStyle=c.hex;
      ctx.fillRect(bx+3,sy,demoW-6,layerH);
    });
  });

  // Play button
  const btnY=CANVAS_H*0.72;
  const btnW=200,btnH=52;
  const btnX=(CANVAS_W-btnW)/2;
  ctx.beginPath();
  ctx.roundRect(btnX,btnY,btnW,btnH,14);
  const bg=ctx.createLinearGradient(btnX,btnY,btnX+btnW,btnY+btnH);
  bg.addColorStop(0,'#6c63ff');bg.addColorStop(1,'#e94560');
  ctx.fillStyle=bg;
  ctx.fill();
  ctx.shadowColor='rgba(108,99,255,0.4)';
  ctx.shadowBlur=16;
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';
  ctx.font='600 20px Fredoka, sans-serif';
  ctx.fillText('Play',CANVAS_W/2,btnY+btnH/2);

  // Daily challenge button
  const dBtnY=btnY+btnH+16;
  ctx.beginPath();
  ctx.roundRect(btnX,dBtnY,btnW,44,12);
  ctx.fillStyle='rgba(255,255,255,0.07)';
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.12)';
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.fillStyle='rgba(138,127,170,0.9)';
  ctx.font='500 15px Fredoka, sans-serif';
  const dayStr=getDayString();
  ctx.fillText('Daily Challenge - '+dayStr,CANVAS_W/2,dBtnY+22);

  // Achievements button
  const aBtnY=dBtnY+56;
  ctx.beginPath();
  ctx.roundRect(btnX,aBtnY,btnW,40,10);
  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.fill();
  ctx.fillStyle='rgba(138,127,170,0.8)';
  ctx.font='500 14px Fredoka, sans-serif';
  ctx.fillText('Achievements ('+G.achievements.size+'/'+ACHIEVEMENTS.length+')',CANVAS_W/2,aBtnY+20);

  ctx.textAlign='left';
  ctx.restore();
}

function drawGameBoard(dt){
  // Background subtle particles
  const t=Date.now()/1000;
  ctx.save();
  for(let i=0;i<8;i++){
    const x=Math.sin(t*0.1+i*3)*CANVAS_W*0.5+CANVAS_W/2;
    const y=Math.cos(t*0.08+i*2.5)*CANVAS_H*0.5+CANVAS_H/2;
    ctx.fillStyle='rgba(108,99,255,'+(0.03+Math.sin(t+i)*0.01)+')';
    ctx.beginPath();
    ctx.arc(x,y,40+Math.sin(t*0.3+i)*10,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Draw bottles
  for(let i=0;i<G.bottles.length;i++){
    drawBottle(i);
  }

  // Draw particles
  ctx.save();
  G.particles.forEach(p=>{
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  G.flowers.forEach(p=>{
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;
  ctx.restore();

  // Pour animation arc
  if(G.pourAnim){
    const pa=G.pourAnim;
    const fromR=getBottleRect(pa.fromIdx);
    const toR=getBottleRect(pa.toIdx);
    const color=SAND_COLORS[pa.colorIdx];
    const p=pa.progress;

    // Draw flowing sand stream
    const sx=fromR.x+fromR.w/2;
    const sy=fromR.y+15;
    const ex=toR.x+toR.w/2;
    const ey=toR.y+20+toR.h*0.3;
    const midX=(sx+ex)/2;
    const arcY=Math.min(sy,ey)-50;

    ctx.save();
    ctx.strokeStyle=color.hex;
    ctx.lineWidth=6;
    ctx.lineCap='round';
    ctx.globalAlpha=0.8;

    // Draw as filled stream
    const streamLen=p;
    ctx.beginPath();
    for(let t2=0;t2<=streamLen;t2+=0.02){
      const px=(1-t2)*(1-t2)*sx+2*(1-t2)*t2*midX+t2*t2*ex;
      const py=(1-t2)*(1-t2)*sy+2*(1-t2)*t2*arcY+t2*t2*ey;
      if(t2===0) ctx.moveTo(px,py);
      else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.restore();

    // Spawn particles along stream
    spawnPourParticles(fromR,toR,pa.colorIdx,0,p);
  }
}

/* ========== GAME LOGIC ========== */
function loadLevel(idx){
  const lvl=LEVELS[idx];
  G.bottles=lvl.bottles.map(b=>[...b]);
  G.capacity=0;
  lvl.bottles.forEach(b=>{if(b.length>G.capacity)G.capacity=b.length;});
  G.moves=0;
  G.par=lvl.par;
  G.selected=-1;
  G.history=[];
  G.particles=[];
  G.confetti=[];
  G.flowers=[];
  G.animating=false;
  G.pourAnim=null;
  G.extraBottleUsed=false;
  G.hintHighlight=-1;
  G.hintTimer=0;
  G.comboCount=0;
  G.currentLevel=idx;
  G.screen='play';
  updateUI();
}

function getDayString(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getDailySeed(){
  const d=new Date();
  return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}

function loadDailyChallenge(){
  const seed=getDailySeed();
  G.dailySeed=seed;
  // Deterministic daily puzzle from seed
  const rng=mulberry32(seed);
  const numColors=3+Math.floor(rng()*3); // 3-5 colors
  const numBottles=numColors+2;
  const cap=4;
  const bottles=[];
  // Create a solved state then shuffle
  for(let i=0;i<numColors;i++){
    bottles.push(Array(cap).fill(i));
  }
  bottles.push([]);
  bottles.push([]);
  // Shuffle by making random valid moves backward
  for(let i=0;i<50;i++){
    const nonEmpty=bottles.reduce((a,b,j)=>b.length>0?[...a,j]:a,[]);
    if(nonEmpty.length===0) continue;
    const fi=nonEmpty[Math.floor(rng()*nonEmpty.length)];
    const targets=bottles.reduce((a,b,j)=>j!==fi&&b.length<cap?[...a,j]:a,[]);
    if(targets.length===0) continue;
    const ti=targets[Math.floor(rng()*targets.length)];
    bottles[ti].push(bottles[fi].pop());
  }
  G.bottles=bottles;
  G.capacity=cap;
  G.moves=0;
  G.par=20;
  G.selected=-1;
  G.history=[];
  G.particles=[];
  G.confetti=[];
  G.flowers=[];
  G.animating=false;
  G.pourAnim=null;
  G.extraBottleUsed=false;
  G.hintHighlight=-1;
  G.hintTimer=0;
  G.comboCount=0;
  G.screen='daily';
  updateUI();
}

function mulberry32(a){
  return function(){
    let t=a+=0x6D2B79F5;
    t=Math.imul(t^t>>>15,t|1);
    t^=t+Math.imul(t^t>>>7,t|61);
    return((t^t>>>14)>>>0)/4294967296;
  };
}

function canPour(fromIdx,toIdx){
  if(fromIdx===toIdx) return false;
  const from=G.bottles[fromIdx];
  const to=G.bottles[toIdx];
  if(from.length===0) return false;
  if(to.length>=G.capacity) return false;
  const topColor=from[from.length-1];
  if(to.length===0) return true;
  return to[to.length-1]===topColor;
}

function pourSand(fromIdx,toIdx){
  if(!canPour(fromIdx,toIdx)) return false;
  const from=G.bottles[fromIdx];
  const to=G.bottles[toIdx];
  const topColor=from[from.length-1];

  // Save to history
  G.history.push({from:fromIdx,to:toIdx,color:topColor,fromLen:from.length,toLen:to.length});

  // Start pour animation
  G.animating=true;
  G.pourAnim={
    fromIdx,toIdx,colorIdx:topColor,progress:0,duration:0.35
  };
  playSound('pour');

  return true;
}

function finishPour(){
  const pa=G.pourAnim;
  if(!pa) return;
  const from=G.bottles[pa.fromIdx];
  const to=G.bottles[pa.toIdx];
  const color=from[from.length-1];

  // Move the sand
  from.pop();
  to.push(color);

  G.moves++;
  G.pourAnim=null;
  G.animating=false;
  G.hintHighlight=-1;

  updateUI();
  checkBottleComplete(pa.toIdx);
  checkWin();
}

function checkBottleComplete(idx){
  const b=G.bottles[idx];
  if(b.length===G.capacity && b.every(c=>c===b[0])){
    // Bottle sorted!
    playSound('flower');
    const rect=getBottleRect(idx);
    spawnFlowerParticles(rect.x+rect.w/2,rect.y, b[0]);
    G.comboCount++;
  }
}

function checkWin(){
  // All non-empty bottles must be single color and full
  const allSorted=G.bottles.every(b=>{
    if(b.length===0) return true;
    if(b.length!==G.capacity) return false;
    return b.every(c=>c===b[0]);
  });
  if(!allSorted) return;

  // WIN!
  playSound('win');
  const stars=getStars();
  const levelKey=G.screen==='daily'?'daily_'+getDayString():String(G.currentLevel);
  const prevStars=G.starsPerLevel[levelKey]||0;
  if(stars>prevStars){
    G.starsPerLevel[levelKey]=stars;
  }

  // Coins
  const coinReward=[10,20,30][stars-1];
  const comboBonus=Math.min(G.comboCount*5,30);
  G.coins+=coinReward+comboBonus;

  // Track no-help
  if(G.screen==='play'){
    const usedHelp=G.history.some((h,i)=>{
      return G.history._usedUndo||G.history._usedHint;
    });
    if(!G.history._usedUndo&&!G.history._usedHint){
      G.noHelpLevels.add(G.currentLevel);
    }
  }

  // Daily challenge tracking
  if(G.screen==='daily'){
    G.dailyCompleted[getDayString()]=stars;
  }

  // Spawn confetti
  spawnConfetti(CANVAS_W/2,CANVAS_H/2,60);

  // Check achievements
  checkAchievements();

  saveToDisk();
  updateUI();

  // Show win modal after a short delay
  G.timers.push(setTimeout(()=>{
    showWinModal(stars,coinReward+comboBonus);
  },600));
}

function getStars(){
  if(G.screen==='daily') return G.moves<=G.par?3:G.moves<=G.par*1.5?2:1;
  const lvl=LEVELS[G.currentLevel];
  const par=lvl.par;
  if(G.moves<=par) return 3;
  if(G.moves<=Math.ceil(par*1.5)) return 2;
  return 1;
}

function starString(count){
  return '&#9733;'.repeat(count)+'&#9734;'.repeat(3-count);
}

/* ========== ACHIEVEMENTS ========== */
function checkAchievements(){
  const unlocked=[];
  const completedLevels=Object.keys(G.starsPerLevel).filter(k=>!k.startsWith('daily')).length;
  const threeStarLevels=Object.values(G.starsPerLevel).filter(s=>s>=3).length;

  // First Sort
  if(completedLevels>=1&&!G.achievements.has('first_sort')){
    G.achievements.add('first_sort');unlocked.push('first_sort');
  }
  // Quick Thinker
  if(threeStarLevels>=5&&!G.achievements.has('quick_thinker')){
    G.achievements.add('quick_thinker');unlocked.push('quick_thinker');
  }
  // Sand Master
  if(completedLevels>=10&&!G.achievements.has('sand_master')){
    G.achievements.add('sand_master');unlocked.push('sand_master');
  }
  // Perfect Run - 5 consecutive 3-star
  if(!G.achievements.has('perfect_run')){
    for(let i=0;i<=25;i++){
      let run=true;
      for(let j=i;j<i+5&&j<30;j++){
        if((G.starsPerLevel[String(j)]||0)<3){run=false;break;}
      }
      if(run){G.achievements.add('perfect_run');unlocked.push('perfect_run');break;}
    }
  }
  // Daily Player
  if(Object.keys(G.dailyCompleted).length>0&&!G.achievements.has('daily_player')){
    G.achievements.add('daily_player');unlocked.push('daily_player');
  }
  // No Help Needed
  if(G.noHelpLevels.size>=5&&!G.achievements.has('no_help')){
    G.achievements.add('no_help');unlocked.push('no_help');
  }
  // Halfway There
  if(completedLevels>=15&&!G.achievements.has('halfway')){
    G.achievements.add('halfway');unlocked.push('halfway');
  }
  // Legend
  if(completedLevels>=30&&!G.achievements.has('legend')){
    G.achievements.add('legend');unlocked.push('legend');
  }

  if(unlocked.length>0){
    const ach=ACHIEVEMENTS.find(a=>a.id===unlocked[0]);
    if(ach) showToast('Achievement: '+ach.name+'!');
  }
  saveToDisk();
}

/* ========== HINT SYSTEM ========== */
function findHint(){
  // Simple BFS to find a good move
  for(let f=0;f<G.bottles.length;f++){
    for(let t=0;t<G.bottles.length;t++){
      if(canPour(f,t)){
        // Prefer moves that build on same color
        const from=G.bottles[f];
        const to=G.bottles[t];
        if(to.length>0 && to[to.length-1]===from[from.length-1]) return {from:f,to:t};
      }
    }
  }
  // Fallback: any valid move
  for(let f=0;f<G.bottles.length;f++){
    for(let t=0;t<G.bottles.length;t++){
      if(canPour(f,t)) return {from:f,to:t};
    }
  }
  return null;
}

/* ========== POWER-UPS ========== */
function doUndo(){
  if(G.history.length===0||G.animating) return;
  if(G.coins<10){showToast('Not enough coins!');playSound('error');return;}
  G.coins-=10;
  const last=G.history.pop();
  // Reverse the move
  const to=G.bottles[last.to];
  const from=G.bottles[last.from];
  if(to.length>0&&to[to.length-1]===last.color){
    to.pop();
    from.push(last.color);
  }
  G.moves=Math.max(0,G.moves-1);
  G.history._usedUndo=true;
  G.selected=-1;
  playSound('undo');
  updateUI();
  saveToDisk();
}

function doHint(){
  if(G.animating) return;
  if(G.coins<20){showToast('Not enough coins!');playSound('error');return;}
  const hint=findHint();
  if(!hint){showToast('No hints available!');return;}
  G.coins-=20;
  G.hintHighlight=hint.from;
  G.hintTimer=3;
  G.history._usedHint=true;
  playSound('click');
  updateUI();
  saveToDisk();

  // Also highlight target briefly
  G.timers.push(setTimeout(()=>{
    G.hintHighlight=hint.to;
    G.timers.push(setTimeout(()=>{
      G.hintHighlight=-1;
    },1000));
  },1000));
}

function doExtraBottle(){
  if(G.animating||G.extraBottleUsed) return;
  if(G.coins<50){showToast('Not enough coins!');playSound('error');return;}
  G.coins-=50;
  G.bottles.push([]);
  G.extraBottleUsed=true;
  playSound('click');
  showToast('Extra bottle added!');
  updateUI();
  saveToDisk();
}

function doRestart(){
  if(G.animating) return;
  if(G.screen==='daily'){
    loadDailyChallenge();
  } else {
    loadLevel(G.currentLevel);
  }
  playSound('click');
}

/* ========== INPUT ========== */
function getTapBottle(mx,my){
  for(let i=0;i<G.bottles.length;i++){
    const r=getBottleRect(i);
    if(mx>=r.x-5&&mx<=r.x+r.w+5&&my>=r.y-10&&my<=r.y+r.h+5) return i;
  }
  return -1;
}

function handleTap(mx,my){
  if(G.screen==='title'){
    handleTitleTap(mx,my);
    return;
  }
  if(G.screen!=='play'&&G.screen!=='daily'&&G.screen!=='tutorial') return;
  if(G.animating) return;

  const idx=getTapBottle(mx,my);
  if(idx<0){
    G.selected=-1;
    return;
  }

  if(G.selected<0){
    // Select
    if(G.bottles[idx].length>0){
      G.selected=idx;
      playSound('select');
    }
  } else if(G.selected===idx){
    // Deselect
    G.selected=-1;
    playSound('click');
  } else {
    // Try pour
    if(canPour(G.selected,idx)){
      pourSand(G.selected,idx);
      G.selected=-1;
    } else {
      // If tapped a non-empty bottle, select that instead
      if(G.bottles[idx].length>0){
        G.selected=idx;
        playSound('select');
      } else {
        playSound('error');
        G.selected=-1;
      }
    }
  }
}

function handleTitleTap(mx,my){
  const btnW=200,btnH=52;
  const btnX=(CANVAS_W-btnW)/2;
  const btnY=CANVAS_H*0.72;

  // Play button
  if(mx>=btnX&&mx<=btnX+btnW&&my>=btnY&&my<=btnY+btnH){
    playSound('click');
    if(G.showTutorial&&G.currentLevel===0&&!G.starsPerLevel['0']){
      startTutorial();
    } else {
      loadLevel(G.currentLevel);
    }
    return;
  }
  // Daily challenge
  const dBtnY=btnY+btnH+16;
  if(mx>=btnX&&mx<=btnX+btnW&&my>=dBtnY&&my<=dBtnY+44){
    playSound('click');
    loadDailyChallenge();
    return;
  }
  // Achievements
  const aBtnY=dBtnY+56;
  if(mx>=btnX&&mx<=btnX+btnW&&my>=aBtnY&&my<=aBtnY+40){
    playSound('click');
    showAchievementsModal();
    return;
  }
}

function canvasCoords(e){
  const rect=canvas.getBoundingClientRect();
  const sx=CANVAS_W/rect.width;
  const sy=CANVAS_H/rect.height;
  let cx,cy;
  if(e.touches&&e.touches.length>0){
    cx=(e.touches[0].clientX-rect.left)*sx;
    cy=(e.touches[0].clientY-rect.top)*sy;
  } else {
    cx=(e.clientX-rect.left)*sx;
    cy=(e.clientY-rect.top)*sy;
  }
  return{cx,cy};
}

/* ========== UI UPDATE ========== */
function updateUI(){
  const lvl=G.screen==='daily'?'Daily':String(G.currentLevel+1);
  document.getElementById('lvlNum').textContent=lvl;
  document.getElementById('moveCount').textContent=G.moves;
  document.getElementById('parCount').textContent=G.par;

  const levelKey=G.screen==='daily'?'daily_'+getDayString():String(G.currentLevel);
  const best=G.starsPerLevel[levelKey];
  document.getElementById('starCount').innerHTML=best?'&#9733;'.repeat(best)+'&#9734;'.repeat(3-best):'-';

  document.getElementById('coinsVal').textContent=G.coins;
  document.getElementById('btnSound').innerHTML=G.soundOn?'&#x1F50A;':'&#x1F507;';

  // Progress bar
  const completed=Object.keys(G.starsPerLevel).filter(k=>!k.startsWith('daily')).length;
  document.getElementById('progressFill').style.width=((completed/30)*100)+'%';

  // Button states
  document.getElementById('btnUndo').disabled=G.history.length===0||G.animating;
  document.getElementById('btnExtra').disabled=G.extraBottleUsed||G.animating;
  document.getElementById('btnHint').disabled=G.animating;
}

/* ========== GLOBAL ACTION HANDLER ========== */
window._sandAction=function(action,data){
  playSound('click');
  switch(action){
    case 'next':
      hideOverlay();
      if(G.currentLevel<LEVELS.length-1){
        G.currentLevel++;
        saveToDisk();
        loadLevel(G.currentLevel);
      }
      break;
    case 'replay':
      hideOverlay();
      if(G.screen==='daily') loadDailyChallenge();
      else loadLevel(G.currentLevel);
      break;
    case 'levels':
      hideOverlay();
      showLevelSelect();
      break;
    case 'level':
      hideOverlay();
      loadLevel(data);
      break;
    case 'daily':
      hideOverlay();
      loadDailyChallenge();
      break;
    case 'title':
      hideOverlay();
      G.screen='title';
      break;
    case 'close':
      hideOverlay();
      break;
    case 'toggleSound':
      G.soundOn=!G.soundOn;
      if(G.soundOn) startBGM(); else stopBGM();
      showSettingsModal();
      saveToDisk();
      break;
    case 'settings':
      showSettingsModal();
      break;
    case 'resetConfirm':
      showResetConfirm();
      break;
    case 'reset':
      localStorage.removeItem(SAVE_KEY);
      applySave(getDefaultSave());
      hideOverlay();
      G.screen='title';
      showToast('Progress reset!');
      break;
    case 'achievements':
      showAchievementsModal();
      break;
    case 'tutorialNext':
      G.tutorialStep++;
      if(G.tutorialStep>=4){
        hideOverlay();
        G.showTutorial=false;
        saveToDisk();
      } else {
        showTutorialOverlay();
      }
      break;
    case 'tutorialSkip':
      hideOverlay();
      G.showTutorial=false;
      saveToDisk();
      break;
  }
};

/* ========== MAIN LOOP ========== */
function gameLoop(ts){
  if(G.cleanup) return;
  const dt=Math.min(0.05,(ts-(G.lastTime||ts))/1000);
  G.lastTime=ts;

  // Hint timer
  if(G.hintTimer>0){
    G.hintTimer-=dt;
    if(G.hintTimer<=0) G.hintHighlight=-1;
  }

  // Pour animation
  if(G.pourAnim){
    G.pourAnim.progress+=dt/G.pourAnim.duration;
    if(G.pourAnim.progress>=1){
      G.pourAnim.progress=1;
      finishPour();
    }
  }

  updateParticles(dt);
  render(dt);

  G.rafId=requestAnimationFrame(gameLoop);
}

/* ========== EVENT HANDLERS ========== */
function setupEvents(){
  // Canvas pointer events
  let lastTap=0;
  function onPointerDown(e){
    e.preventDefault();
    const now=Date.now();
    if(now-lastTap<200) return; // duplicate-click prevention
    lastTap=now;
    const{cx,cy}=canvasCoords(e);
    G.mouseX=cx;G.mouseY=cy;
    handleTap(cx,cy);
  }

  canvas.addEventListener('pointerdown',onPointerDown,{passive:false});

  // Prevent context menu on canvas
  canvas.addEventListener('contextmenu',e=>e.preventDefault());

  // Header buttons
  document.getElementById('btnSound').addEventListener('click',()=>{
    G.soundOn=!G.soundOn;
    if(G.soundOn) startBGM(); else stopBGM();
    updateUI();
    saveToDisk();
    playSound('click');
  });
  document.getElementById('btnLevels').addEventListener('click',()=>{
    playSound('click');
    showLevelSelect();
  });
  document.getElementById('btnSettings').addEventListener('click',()=>{
    playSound('click');
    showSettingsModal();
  });

  // Bottom buttons
  document.getElementById('btnUndo').addEventListener('click',doUndo);
  document.getElementById('btnRestart').addEventListener('click',doRestart);
  document.getElementById('btnHint').addEventListener('click',doHint);
  document.getElementById('btnExtra').addEventListener('click',doExtraBottle);

  // Keyboard
  document.addEventListener('keydown',e=>{
    if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();doUndo();}
    if(e.key==='r'&&!e.ctrlKey){doRestart();}
    if(e.key==='h'&&!e.ctrlKey){doHint();}
  });

  // Resize
  window.addEventListener('resize',()=>{
    setupCanvas();
  });
}

/* ========== CLEANUP ========== */
function cleanup(){
  G.cleanup=true;
  cancelAnimationFrame(G.rafId);
  G.timers.forEach(t=>clearTimeout(t));
  G.timers=[];
  stopBGM();
  if(G.audioCtx){
    try{G.audioCtx.close();}catch(e){}
  }
}

/* ========== INIT ========== */
function init(){
  setupCanvas();
  applySave(loadSave());
  setupEvents();
  if(G.soundOn) startBGM();
  ensureAudio();
  G.rafId=requestAnimationFrame(gameLoop);
}

// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number') r={tl:r,tr:r,br:r,bl:r};
    const radii=typeof r==='object'?(r.r||r.tl||0):r;
    const rad=typeof radii==='number'?radii:(radii.tl||0);
    this.moveTo(x+rad,y);
    this.lineTo(x+w-rad,y);this.quadraticCurveTo(x+w,y,x+w,y+rad);
    this.lineTo(x+w,y+h-rad);this.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
    this.lineTo(x+rad,y+h);this.quadraticCurveTo(x,y+h,x,y+h-rad);
    this.lineTo(x,y+rad);this.quadraticCurveTo(x,y,x+rad,y);
    this.closePath();
    return this;
  };
}

init();
})();
</script>
