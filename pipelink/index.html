function init(){loadProgress();loadSettings();setupCanvas();loadLevel(0);updateToggles();}

function setupCanvas(){
  var canvas=document.getElementById('canvas');
  var wrapper=document.getElementById('canvas-wrapper');
  var maxW=wrapper.clientWidth-16;
  var lv=LV[state.levelIdx];
  if(!lv)return;
  var cell=Math.floor(Math.min(maxW/lv.cols,(window.innerHeight-280)/lv.rows));
  cell=Math.max(24,Math.min(cell,50));
  state.cellSize=cell;
  canvas.width=lv.cols*cell+4;
  canvas.height=lv.rows*cell+4;
}

function loadLevel(idx){
  if(idx<0||idx>=LV.length)return;
  state.levelIdx=idx;
  state.hintsLeft=3;state.hintsUsed=0;
  state.isComplete=false;isComplete=false;
  var lv=LV[idx];
  state.currentLevel=lv;
  state.grid=[];
  for(var r=0;r<lv.rows;r++){
    var row=[];for(var c=0;c<lv.cols;c++)row.push(0);
    state.grid.push(row);
  }
  // Apply clues
  state.clues={};
  for(var key in lv.clues){
    var parts=key.split(',');
    var r=parseInt(parts[0]),c=parseInt(parts[1]);
    state.grid[r][c]=lv.clues[key];
    state.clues[key]=true;
  }
  setupCanvas();renderGrid();updateInfoBar();
  document.getElementById('level-select').style.display='none';
}

function renderGrid(){
  var canvas=document.getElementById('canvas');
  var ctx=canvas.getContext('2d');
  var cs=state.cellSize;
  var lv=state.currentLevel;
  ctx.fillStyle='#13132a';ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid lines
  ctx.strokeStyle='#2a2a50';ctx.lineWidth=1;
  for(var r=0;r<=lv.rows;r++){ctx.beginPath();ctx.moveTo(2,2+r*cs);ctx.lineTo(2+lv.cols*cs,2+r*cs);ctx.stroke();}
  for(var c=0;c<=lv.cols;c++){ctx.beginPath();ctx.moveTo(2+c*cs,2);ctx.lineTo(2+c*cs,2+lv.rows*cs);ctx.stroke();}
  // Draw pipes
  for(var r=0;r<lv.rows;r++){
    for(var c=0;c<lv.cols;c++){
      drawPipe(ctx,r,c,state.grid[r][c],cs);
    }
  }
  // Check connectivity
  var valid=checkAllConnected();
  if(valid&&state.settings.autocheck&&allCellsFilled())checkSolution(true);
}

function drawPipe(ctx,r,c,ptype,cs){
  if(ptype===0)return;
  var cx=2+c*cs+cs/2,cy=2+r*cs+cs/2;
  var isClue=state.clues[r+','+c];
  var lw=Math.max(3,cs*0.16);
  
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.strokeStyle=isClue?'#00b894':'#e0e0f0';
  ctx.lineWidth=lw;
  
  var dirs=PIPE_DIRS[ptype];
  // Draw each segment from center to edge
  for(var i=0;i<dirs.length;i++){
    var d=dirs[i];
    var dx=DIR_DELTA[d][1]*cs/2,dy=DIR_DELTA[d][0]*cs/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+dx,cy+dy);ctx.stroke();
  }
  
  // Glow for clue pipes
  if(isClue){
    ctx.strokeStyle='rgba(0,184,148,0.3)';ctx.lineWidth=lw*2;
    for(var i=0;i<dirs.length;i++){
      var d=dirs[i];var dx=DIR_DELTA[d][1]*cs/2,dy=DIR_DELTA[d][0]*cs/2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+dx,cy+dy);ctx.stroke();
    }
  }
}

function getCellFromPos(x,y){
  var canvas=document.getElementById('canvas');
  var rect=canvas.getBoundingClientRect();
  var px=x-rect.left-2,py=y-rect.top-2;
  var cs=state.cellSize;
  var c=Math.floor(px/cs),r=Math.floor(py/cs);
  if(r<0||r>=state.currentLevel.rows||c<0||c>=state.currentLevel.cols)return null;
  return [r,c];
}

function handleClick(x,y){
  var cell=getCellFromPos(x,y);
  if(!cell)return;
  var r=cell[0],c=cell[1];
  // Don't modify clue cells
  if(state.clues[r+','+c])return;
  // Cycle: 0->1->2->3->4->5->6->7->0
  state.grid[r][c]=(state.grid[r][c]+1)%PIPE_TYPES;
  playSFX('draw');
  renderGrid();
}

function handleLongPress(x,y){
  var cell=getCellFromPos(x,y);
  if(!cell)return;
  var r=cell[0],c=cell[1];
  if(state.clues[r+','+c])return;
  state.grid[r][c]=0;
  playSFX('erase');
  renderGrid();
}

// Pointer events
var canvas=document.getElementById('canvas');
var pressTimer=null,longPressed=false;
canvas.addEventListener('pointerdown',function(e){
  e.preventDefault();
  longPressed=false;
  var x=e.clientX,y=e.clientY;
  pressTimer=setTimeout(function(){longPressed=true;handleLongPress(x,y);},500);
});
canvas.addEventListener('pointerup',function(e){
  e.preventDefault();
  if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}
  if(!longPressed)handleClick(e.clientX,e.clientY);
});
canvas.addEventListener('pointermove',function(e){e.preventDefault();});

function allCellsFilled(){
  for(var r=0;r<state.currentLevel.rows;r++)
    for(var c=0;c<state.currentLevel.cols;c++)
      if(state.grid[r][c]===0)return false;
  return true;
}

function checkAllConnected(){
  // Check: every non-empty cell's connections are reciprocated by neighbor
  var lv=state.currentLevel;
  for(var r=0;r<lv.rows;r++){
    for(var c=0;c<lv.cols;c++){
      var pt=state.grid[r][c];if(pt===0)continue;
      var dirs=PIPE_DIRS[pt];
      for(var i=0;i<dirs.length;i++){
        var d=dirs[i];
        var nr=r+DIR_DELTA[d][0],nc=c+DIR_DELTA[d][1];
        if(nr<0||nr>=lv.rows||nc<0||nc>=lv.cols)return false;
        var npt=state.grid[nr][nc];
        if(npt===0)return false;
        var ndirs=PIPE_DIRS[npt];
        if(OPPOSITE[d]&&!ndirs.includes(OPPOSITE[d]))return false;
      }
    }
  }
  return true;
}

function checkSolution(silent){
  if(!allCellsFilled()){if(!silent)showToast('Fill all cells first!');return;}
  if(!checkAllConnected()){if(!silent)showToast('Some connections are broken!');return;}
  
  var lv=state.currentLevel;
  var visited={};
  var startKey=null;
  for(var r=0;r<lv.rows;r++)for(var c=0;c<lv.cols;c++)if(state.grid[r][c]!==0){startKey=r+','+c;r=lv.rows;break;}
  var curKey=startKey,entryDir=null,valid=true;
  for(var step=0;step<lv.rows*lv.cols*4+10;step++){
    if(visited[curKey]){if(curKey!==startKey)valid=false;break;}
    visited[curKey]=true;
    var parts=curKey.split(',');var cr=parseInt(parts[0]),cc=parseInt(parts[1]);
    var pt=state.grid[cr][cc];var dirs=PIPE_DIRS[pt];
    var exitDir=null;
    if(pt===7){if(entryDir)exitDir=OPPOSITE[entryDir];else exitDir=dirs[0];}
    else{for(var i=0;i<dirs.length;i++){if(dirs[i]!==entryDir){exitDir=dirs[i];break;}}}
    if(!exitDir){valid=false;break;}
    entryDir=OPPOSITE[exitDir];
    var nr=cr+DIR_DELTA[exitDir][0],nc=cc+DIR_DELTA[exitDir][1];
    if(nr<0||nr>=lv.rows||nc<0||nc>=lv.cols){valid=false;break;}
    curKey=nr+','+nc;
  }
  if(valid&&Object.keys(visited).length===lv.rows*lv.cols){winLevel();return;}
  if(!silent)showToast('Loop does not close or does not visit all cells!');
}

function showToast(msg){
  var ex=document.getElementById('toast');if(ex)ex.remove();
  var d=document.createElement('div');d.id='toast';
  d.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;z-index:400;font-size:0.85rem;max-width:90%;text-align:center';
  d.textContent=msg;document.body.appendChild(d);
  setTimeout(function(){d.remove();},2500);
}

function winLevel(){
  if(isComplete)return;
  isComplete=true;state.isComplete=true;
  var stars=3;if(state.hintsUsed>0)stars=2;if(state.hintsUsed>2)stars=1;
  var key='pipelink';var prev=state.progress[key]||{};
  prev[state.levelIdx]={stars:Math.max(stars,prev[state.levelIdx]?prev[state.levelIdx].stars:0),completed:true};
  state.progress[key]=prev;saveProgress();
  document.getElementById('win-stars').textContent='\u2605'.repeat(stars)+'\u2606'.repeat(3-stars);
  document.getElementById('win-overlay').classList.add('show');
  playSFX('win');launchConfetti();
}

function launchConfetti(){
  var colors=['#e74c3c','#00b894','#0984e3','#f39c12','#6c5ce7'];
  for(var i=0;i<50;i++){
    var d=document.createElement('div');d.className='confetti';
    d.style.left=Math.random()*100+'vw';d.style.top='-10px';
    d.style.background=colors[Math.floor(Math.random()*colors.length)];
    d.style.borderRadius=Math.random()>0.5?'50%':'2px';
    d.style.animation='fall '+(1.5+Math.random()*2)+'s ease-in forwards';
    d.style.animationDelay=Math.random()*0.5+'s';
    document.body.appendChild(d);
    (function(el){setTimeout(function(){el.remove();},4000);})(d);
  }
}

function nextLevel(){closeWin();if(state.levelIdx<LV.length-1)loadLevel(state.levelIdx+1);else showToast('All levels complete!');}
function closeWin(){document.getElementById('win-overlay').classList.remove('show');}

function useHint(){
  if(state.hintsLeft<=0){showToast('No hints left!');return;}
  var lv=state.currentLevel;var sol=lv.solution;
  // Find first wrong cell
  for(var r=0;r<lv.rows;r++){
    for(var c=0;c<lv.cols;c++){
      var key=r+','+c;
      var correct=sol[key];
      if(state.grid[r][c]!==correct){
        state.grid[r][c]=correct;
        // If it was a clue, mark it
        if(!state.clues[key])state.clues[key]=true; // Show as hint
        state.hintsLeft--;state.hintsUsed++;updateInfoBar();
        playSFX('hint');renderGrid();
        return;
      }
    }
  }
  showToast('All cells are already correct!');
}

function clearAll(){
  for(var r=0;r<state.currentLevel.rows;r++)
    for(var c=0;c<state.currentLevel.cols;c++)
      if(!state.clues[r+','+c])state.grid[r][c]=0;
  renderGrid();playSFX('erase');
}

function toggleLevelSelect(){
  var p=document.getElementById('level-select');
  if(p.style.display==='block'){p.style.display='none';}
  else{renderLevelSelect();p.style.display='block';}
}

function renderLevelSelect(){
  var html='';var tiersSeen={};
  for(var i=0;i<LV.length;i++){
    var tier=LV[i].tier;
    if(!tiersSeen[tier]){tiersSeen[tier]=true;html+='<div class="tier-group"><div class="tier-title">'+tier+'</div><div class="level-grid">';}
    var prog=state.progress['pipelink']||{};var p=prog[i]||{};
    var cls='level-btn';if(i===state.levelIdx)cls+=' current';if(p.completed)cls+=' completed';
    var locked=i>0&&!(prog[i-1]&&prog[i-1].completed)&&!p.completed;if(locked)cls+=' locked';
    var stars=p.stars?'\u2605'.repeat(p.stars):'';
    html+='<button class="'+cls+'" onclick="'+(locked?'':'selectLevel('+i+')')+'">'+(i+1)+(stars?'<div class="stars">'+stars+'</div>':'')+'</button>';
    if(i<LV.length-1&&LV[i+1].tier!==tier)html+='</div></div>';
  }
  html+='</div></div>';
  document.getElementById('level-list').innerHTML=html;
}

function selectLevel(idx){loadLevel(idx);}
function toggleSettings(){document.getElementById('settings-panel').classList.toggle('show');}
function toggleSetting(name){
  state.settings[name]=!state.settings[name];saveSettings();updateToggles();
  if(name==='music'){if(state.settings.music)startBGM();else stopBGM();}
}
function updateToggles(){
  document.getElementById('toggle-music').classList.toggle('on',state.settings.music);
  document.getElementById('toggle-sfx').classList.toggle('on',state.settings.sfx);
  document.getElementById('toggle-autocheck').classList.toggle('on',state.settings.autocheck);
}
function updateInfoBar(){
  document.getElementById('level-display').textContent=(state.levelIdx+1)+'/'+LV.length;
  document.getElementById('tier-display').textContent=state.currentLevel?state.currentLevel.tier:'';
  document.getElementById('hints-display').textContent=state.hintsLeft;
  var prog=state.progress['pipelink']||{};var p=prog[state.levelIdx]||{};
  document.getElementById('stars-display').textContent=p.stars?p.stars+'/3':'--';
}

function loadProgress(){try{var d=localStorage.getItem('pipelink-progress');if(d)state.progress=JSON.parse(d);}catch(e){}}
function saveProgress(){try{localStorage.setItem('pipelink-progress',JSON.stringify(state.progress));}catch(e){}}
function loadSettings(){try{var d=localStorage.getItem('pipelink-settings');if(d){var s=JSON.parse(d);for(var k in s)state.settings[k]=s[k];}}catch(e){}}
function saveSettings(){try{localStorage.setItem('pipelink-settings',JSON.stringify(state.settings));}catch(e){}}

function ensureAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
function playSFX(type){
  if(!state.settings.sfx)return;ensureAudio();if(!audioCtx)return;
  var freqs={draw:500,erase:200,hint:700,win:880,error:150};
  var f=freqs[type]||300;var osc=audioCtx.createOscillator();var g=audioCtx.createGain();
  osc.connect(g);g.connect(audioCtx.destination);osc.frequency.value=f;osc.type='sine';
  g.gain.setValueAtTime(0.12,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);
  osc.start();osc.stop(audioCtx.currentTime+0.12);
  if(type==='win'){
    [523,659,784].forEach(function(nf,i){setTimeout(function(){
      var o2=audioCtx.createOscillator();var g2=audioCtx.createGain();
      o2.connect(g2);g2.connect(audioCtx.destination);o2.frequency.value=nf;o2.type='sine';
      g2.gain.setValueAtTime(0.08,audioCtx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
      o2.start();o2.stop(audioCtx.currentTime+0.4);
    },i*100);});
  }
}
function startBGM(){
  if(!state.settings.music)return;ensureAudio();if(!audioCtx)return;stopBGM();
  bgmNoteIdx=0;var notes=[261,329,392,523,440,392,329,294];
  bgmInterval=setInterval(function(){
    if(!audioCtx)return;var f=notes[bgmNoteIdx%notes.length];
    var osc=audioCtx.createOscillator();var g=audioCtx.createGain();
    osc.connect(g);g.connect(audioCtx.destination);osc.frequency.value=f;osc.type='triangle';
    g.gain.setValueAtTime(0.03,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
    osc.start();osc.stop(audioCtx.currentTime+0.5);bgmNoteIdx++;
  },400);
}
function stopBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}}

document.addEventListener('keydown',function(e){
  if(isComplete){if(e.key==='Enter')nextLevel();return;}
  switch(e.key.toLowerCase()){
    case'h':useHint();break;
    case'r':clearAll();break;
    case'enter':checkSolution();break;
    case'l':toggleLevelSelect();break;
    case'escape':
      document.getElementById('level-select').style.display='none';
      document.getElementById('settings-panel').classList.remove('show');
      break;
  }
});
window.addEventListener('resize',function(){setupCanvas();renderGrid();});
window.addEventListener('beforeunload',function(){stopBGM();if(audioCtx)audioCtx.close();});
init();
</script>
