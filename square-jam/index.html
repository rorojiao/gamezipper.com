<script>
var LEVELS=[];
var state={level:1,mode:'draw',borders:{},hintsLeft:3,stars:{},timer:0,timerInterval:null,startTime:0,solved:false,showHint:null,hintGlow:0};
var settings={music:true,sfx:true,autocheck:false};
var audioCtx=null,bgmNodes=[];
var canvas,ctx,cellSize=40,gridOffset={x:0,y:0};
var dragStart=null,isDragging=false;
var rafId=null;
var lastTouchTime=0;

function init(){
loadSettings();
loadProgress();
canvas=document.getElementById('canvas');
ctx=canvas.getContext('2d');
LEVELS=window.__LEVELS__;
setupEvents();
loadLevel(state.level);
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
startTimer();
if(settings.music){initAudio();startBGM();}
drawAll();
}

function loadSettings(){
try{var s=localStorage.getItem('squarejam_settings');if(s)settings=JSON.parse(s);}catch(e){}
}
function saveSettings(){try{localStorage.setItem('squarejam_settings',JSON.stringify(settings));}catch(e){}}
function loadProgress(){
try{var s=localStorage.getItem('squarejam_progress');if(s){var d=JSON.parse(s);state.stars=d.stars||{};state.level=d.level||1;}}catch(e){}
}
function saveProgress(){
try{localStorage.setItem('squarejam_progress',JSON.stringify({stars:state.stars,level:state.level}));}catch(e){}
}

function loadLevel(num){
var lv=LEVELS[num-1];
if(!lv)return;
state.level=num;
state.hintsLeft=3;
state.startTime=Date.now();
state.solved=false;
state.showHint=null;
state.hintGlow=0;
state.borders={};
var rows=lv.rows,cols=lv.cols;
// Initialize all internal edges as 'open' (no border between cells)
// Outer boundary is implicit — computePlayerRegions skips out-of-bounds neighbors
for(var r=0;r<=rows;r++)for(var c=0;c<=cols;c++){
if(r<rows&&c<cols){
if(c+1<cols)setEdge(r,c,r,c+1,'open');
if(r+1<rows)setEdge(r,c,r+1,c,'open');
}
}

document.getElementById('hud-level').textContent=num;
document.getElementById('hud-hints').textContent=state.hintsLeft;
updateStarsDisplay();
resizeCanvas();
drawAll();
}

function edgeKey(r1,c1,r2,c2){
if(r1===r2&&c1===c2)return null;
var a,b;
if(r1<r2||(r1===r2&&c1<c2)){a=[r1,c1];b=[r2,c2];}
else{a=[r2,c2];b=[r1,c1];}
return a[0]+','+a[1]+','+b[0]+','+b[1];
}
function getEdge(r1,c1,r2,c2){var k=edgeKey(r1,c1,r2,c2);return k?state.borders[k]||'open':'wall';}
function setEdge(r1,c1,r2,c2,val){var k=edgeKey(r1,c1,r2,c2);if(k)state.borders[k]=val;}

function toggleEdge(r1,c1,r2,c2){
var k=edgeKey(r1,c1,r2,c2);
if(!k)return;
if(state.mode==='draw'){
state.borders[k]=state.borders[k]==='drawn'?'open':'drawn';
}else{
state.borders[k]='open';
}
}

function resizeCanvas(){
var lv=LEVELS[state.level-1];if(!lv)return;
var maxW=Math.min(window.innerWidth-32,500);
var maxH=Math.min(window.innerHeight-280,500);
var size=Math.min(maxW,maxH);
cellSize=Math.floor(size/Math.max(lv.rows,lv.cols));
cellSize=Math.max(24,Math.min(cellSize,60));
var w=cellSize*lv.cols,h=cellSize*lv.rows;
canvas.width=w;canvas.height=h;
gridOffset={x:0,y:0};
drawAll();
}

function drawAll(){
var lv=LEVELS[state.level-1];if(!lv)return;
var rows=lv.rows,cols=lv.cols;
var w=canvas.width,h=canvas.height;
ctx.fillStyle='#0a0a1a';
ctx.fillRect(0,0,w,h);
// Draw cells with alternating background
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
var x=c*cellSize,y=r*cellSize;
ctx.fillStyle=(r+c)%2===0?'#1a1a34':'#1e1e3a';
ctx.fillRect(x,y,cellSize,cellSize);
}
// Draw region coloring based on player's edges
var regionIds=computePlayerRegions();
var palette=['#1a1a34','#2a2a50','#1a2a3a','#2a1a2a','#1a3a2a','#3a2a1a','#2a2a1a','#1a1a3a','#2a3a1a','#3a1a2a','#1a2a2a','#2a1a1a'];
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
var rid=regionIds[r][c];
var idx=((rid-1)%palette.length+palette.length)%palette.length;
ctx.fillStyle=palette[idx];
ctx.globalAlpha=0.3;
ctx.fillRect(c*cellSize,r*cellSize,cellSize,cellSize);
}
ctx.globalAlpha=1;
// Draw clues
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
if(lv.clues[r][c]>0){
var cx=c*cellSize+cellSize/2,cy=r*cellSize+cellSize/2;
ctx.fillStyle='#fdcb6e';
ctx.font='bold '+Math.floor(cellSize*0.55)+'px sans-serif';
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(lv.clues[r][c],cx,cy);
}
}
// Draw hint glow
if(state.showHint&&state.hintGlow>0){
var e=state.showHint;
ctx.strokeStyle='rgba(253,203,110,'+state.hintGlow+')';
ctx.lineWidth=5;
var x1,y1,x2,y2;
var er1=e[0],ec1=e[1],er2=e[2],ec2=e[3];
x1=ec1*cellSize;y1=er1*cellSize;x2=ec2*cellSize;y2=er2*cellSize;
ctx.beginPath();
if(er1===er2){ctx.moveTo(Math.min(x1,x2),Math.max(y1,y2));ctx.lineTo(Math.max(x1,x2),Math.max(y1,y2));}
else{ctx.moveTo(Math.max(x1,x2),Math.min(y1,y2));ctx.lineTo(Math.max(x1,x2),Math.max(y1,y2));}
ctx.stroke();
state.hintGlow-=0.02;
if(state.hintGlow<=0){state.showHint=null;}
}
// Draw grid lines
ctx.strokeStyle='#3a3a5c';ctx.lineWidth=1;
for(var r=0;r<=rows;r++){
ctx.beginPath();ctx.moveTo(0,r*cellSize);ctx.lineTo(cols*cellSize,r*cellSize);ctx.stroke();
}
for(var c=0;c<=cols;c++){
ctx.beginPath();ctx.moveTo(c*cellSize,0);ctx.lineTo(c*cellSize,rows*cellSize);ctx.stroke();
}
// Draw player borders
ctx.strokeStyle='#6c5ce7';ctx.lineWidth=3;ctx.lineCap='round';
for(var key in state.borders){
if(state.borders[key]!=='drawn')continue;
var parts=key.split(',');var r1=+parts[0],c1=+parts[1],r2=+parts[2],c2=+parts[3];
if(r1===r2){
// horizontal edge between (r1,c1) and (r1,c2) — but c2=c1+1
var y=r1*cellSize;
ctx.beginPath();ctx.moveTo(c1*cellSize+cellSize,y);ctx.lineTo((c1+1)*cellSize+cellSize,y);ctx.stroke();
ctx.beginPath();ctx.moveTo(c1*cellSize,y);ctx.lineTo((c1+1)*cellSize,y);ctx.stroke();
}else{
// vertical edge between (r1,c1) and (r2,c1) — r2=r1+1
var x=c1*cellSize;
ctx.beginPath();ctx.moveTo(x,r1*cellSize+cellSize);ctx.lineTo(x,(r1+1)*cellSize+cellSize);ctx.stroke();
ctx.beginPath();ctx.moveTo(x,r1*cellSize);ctx.lineTo(x,(r1+1)*cellSize);ctx.stroke();
}
}
// Draw solution borders (faint guide during win)
if(state.solved){
var sol=lv._solution;
ctx.strokeStyle='rgba(46,204,113,0.8)';ctx.lineWidth=4;
for(var i=0;i<sol.length;i++){
var sr=sol[i][0],sc=sol[i][1],ss=sol[i][2];
ctx.strokeRect(sc*cellSize,sr*cellSize,ss*cellSize,ss*cellSize);
}
}
if(state.hintGlow>0||state.showHint){rafId=requestAnimationFrame(drawAll);}
}

function computePlayerRegions(){
var lv=LEVELS[state.level-1];if(!lv)return[];
var rows=lv.rows,cols=lv.cols;
var visited=[];
for(var r=0;r<rows;r++){visited.push(new Array(cols).fill(false));}
var regionIds=[];
for(var r=0;r<rows;r++){regionIds.push(new Array(cols).fill(0));}
var rid=1;
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
if(!visited[r][c]){
var queue=[[r,c]];visited[r][c]=true;
while(queue.length>0){
var cur=queue.shift();var cr=cur[0],cc=cur[1];
regionIds[cr][cc]=rid;
var neighbors=[[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]];
for(var n=0;n<4;n++){
var nr=neighbors[n][0],nc=neighbors[n][1];
if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
if(visited[nr][nc])continue;
var edge=getEdge(cr,cc,nr,nc);
if(edge!=='drawn'&&edge!=='wall'){
visited[nr][nc]=true;
queue.push([nr,nc]);
}
}
}
rid++;
}
}
return regionIds;
}

function checkSolution(){
var lv=LEVELS[state.level-1];if(!lv)return false;
var rows=lv.rows,cols=lv.cols;
var regionIds=computePlayerRegions();
var regionCells={};
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
var rid=regionIds[r][c];
if(!regionCells[rid])regionCells[rid]=[];
regionCells[rid].push([r,c]);
}
// Each region must be a square
var regionSizes={};
for(var rid in regionCells){
var cells=regionCells[rid];
var rs=cells.map(function(x){return x[0];});
var cs2=cells.map(function(x){return x[1];});
var rmin=Math.min.apply(null,rs),rmax=Math.max.apply(null,rs);
var cmin=Math.min.apply(null,cs2),cmax=Math.max.apply(null,cs2);
var h=rmax-rmin+1,w=cmax-cmin+1;
if(h!==w)return false;
if(cells.length!==h*w)return false;
regionSizes[rid]=h;
}
// Clue check
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
if(lv.clues[r][c]>0){
var rid=regionIds[r][c];
if(lv.clues[r][c]!==regionSizes[rid])return false;
}
}
// Tatami rule
var vertexRegions={};
for(var rid in regionCells){
var cells=regionCells[rid];
var rs=cells.map(function(x){return x[0];});
var cs2=cells.map(function(x){return x[1];});
var rmin=Math.min.apply(null,rs),rmax=Math.max.apply(null,rs);
var cmin=Math.min.apply(null,cs2),cmax=Math.max.apply(null,cs2);
var corners=[[rmin,cmin],[rmin,cmax+1],[rmax+1,cmin],[rmax+1,cmax+1]];
for(var ci=0;ci<4;ci++){
var key=corners[ci][0]+','+corners[ci][1];
if(!vertexRegions[key])vertexRegions[key]={};
vertexRegions[key][rid]=true;
}
}
for(var key in vertexRegions){
if(Object.keys(vertexRegions[key]).length>=4)return false;
}
return true;
}

function doCheck(){
if(checkSolution()){
onWin();
}else{
playTone(220,0.15,'square',0.1);
showOverlay('Not yet!','Keep trying. Some borders or clue constraints are not satisfied.');
}
}

function onWin(){
if(state.solved)return;
state.solved=true;
stopTimer();
var elapsed=Math.floor((Date.now()-state.startTime)/1000);
var starCount=3;
if(state.hintsLeft<3)starCount=2;
if(elapsed>120)starCount=Math.min(starCount,1);
if(state.hintsLeft===0&&elapsed>180)starCount=1;
var lv=LEVELS[state.level-1];
lv._solution=lv._solution||[];
var stars=state.stars[state.level]||0;
if(starCount>stars){state.stars[state.level]=starCount;saveProgress();}
playWinFanfare();
spawnConfetti();
showOverlay('Level Complete! ('+formatTime(elapsed)+')',
'<div class="stars">'+renderStars(starCount)+'</div>'+
'<p>Hints used: '+(3-state.hintsLeft)+'</p>',
state.level<30?
'<button class="btn" onclick="closeOverlay();loadLevel('+(state.level+1)+');startTimer();">Next Level →</button>':
'<button class="btn" onclick="closeOverlay();">All Complete!</button>',
'<button class="btn" onclick="closeOverlay();showLevelSelect();">Level Select</button>'
);
updateStarsDisplay();
}
function renderStars(n){var s='';for(var i=0;i<3;i++){s+='<span class="star'+(i<n?' lit':'')+'">★</span>';}return s;}
function updateStarsDisplay(){
var stars=state.stars[state.level]||0;
document.getElementById('hud-stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
}

function showOverlay(title,body){
var btns=Array.prototype.slice.call(arguments,2);
var html='<h2>'+title+'</h2>';
if(body)html+='<div>'+body+'</div>';
for(var i=0;i<btns.length;i++){if(btns[i])html+=btns[i];}
document.getElementById('overlay-content').innerHTML=html;
document.getElementById('overlay').classList.add('show');
}
function closeOverlay(){document.getElementById('overlay').classList.remove('show');}

function startTimer(){
state.startTime=Date.now();
if(state.timerInterval)clearInterval(state.timerInterval);
state.timerInterval=setInterval(function(){
var elapsed=Math.floor((Date.now()-state.startTime)/1000);
document.getElementById('hud-time').textContent=formatTime(elapsed);
},1000);
}
function stopTimer(){if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null;}}
function formatTime(s){var m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0');}

function doHint(){
if(state.hintsLeft<=0){showOverlay('No hints left','Use them wisely!');return;}
var lv=LEVELS[state.level-1];if(!lv)return;
var rows=lv.rows,cols=lv.cols;
// Find a solution border that player hasn't drawn
var sol=lv._solution||[];
if(sol.length===0){
// Reconstruct solution borders from regions data
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
var rid=lv.regions[r][c];
if(r+1<rows&&lv.regions[r+1][c]!==rid)sol.push([r,c,r+1,c]);
if(c+1<cols&&lv.regions[r][c+1]!==rid)sol.push([r,c,r,c+1]);
}
lv._solution=sol;
}
var candidates=[];
for(var i=0;i<sol.length;i++){
var e=sol[i];
var k=edgeKey(e[0],e[1],e[2],e[3]);
if(k&&state.borders[k]!=='drawn')candidates.push(e);
}
if(candidates.length===0){showOverlay('All borders drawn!','Press Check to verify.');return;}
var pick=candidates[Math.floor(Math.random()*candidates.length)];
state.showHint=pick;
state.hintGlow=1.0;
state.hintsLeft--;
document.getElementById('hud-hints').textContent=state.hintsLeft;
playTone(660,0.1,'sine',0.08);
drawAll();
}

function doRestart(){loadLevel(state.level);startTimer();}

function showLevelSelect(){
closeOverlay();
var body=document.getElementById('ls-body');
var html='';
var tiers=[{name:'Beginner',start:1,end:6},{name:'Easy',start:7,end:12},{name:'Medium',start:13,end:18},{name:'Hard',start:19,end:24},{name:'Expert',start:25,end:30}];
for(var t=0;t<tiers.length;t++){
var tier=tiers[t];
html+='<div class="tier-section"><div class="tier-title">'+tier.name+'</div><div class="tier-grid">';
for(var lv=tier.start;lv<=tier.end;lv++){
var locked=lv>1&&!state.stars[lv-1];
var stars=state.stars[lv]||0;
var starStr='';
for(var s=0;s<stars;s++)starStr+='★';
html+='<div class="level-btn'+(locked?' locked':'')+(stars>0?' completed':'')+'" data-level="'+lv+'"'+(locked?'':' onclick="selectLevel('+lv+')"')+'>'+lv;
if(stars>0)html+='<div class="mini-stars">'+starStr+'</div>';
html+='</div>';
}
html+='</div></div>';
}
body.innerHTML=html;
document.getElementById('level-select').classList.add('show');
}
function selectLevel(num){
document.getElementById('level-select').classList.remove('show');
loadLevel(num);startTimer();
}

function setupEvents(){
document.getElementById('btn-draw').addEventListener('click',function(){setMode('draw');});
document.getElementById('btn-erase').addEventListener('click',function(){setMode('erase');});
document.getElementById('btn-hint').addEventListener('click',doHint);
document.getElementById('btn-check').addEventListener('click',doCheck);
document.getElementById('btn-restart').addEventListener('click',doRestart);
document.getElementById('btn-levels').addEventListener('click',showLevelSelect);
document.getElementById('btn-settings').addEventListener('click',function(){document.getElementById('settings-modal').classList.add('show');});
document.getElementById('settings-close').addEventListener('click',function(){document.getElementById('settings-modal').classList.remove('show');});
document.getElementById('ls-close').addEventListener('click',function(){document.getElementById('level-select').classList.remove('show');});

document.getElementById('toggle-music').addEventListener('click',function(){
settings.music=!settings.music;
this.classList.toggle('on',settings.music);
saveSettings();
if(settings.music){initAudio();startBGM();}else{stopBGM();}
});
document.getElementById('toggle-sfx').addEventListener('click',function(){
settings.sfx=!settings.sfx;
this.classList.toggle('on',settings.sfx);
saveSettings();
});
document.getElementById('toggle-autocheck').addEventListener('click',function(){
settings.autocheck=!settings.autocheck;
this.classList.toggle('on',settings.autocheck);
saveSettings();
});

// Canvas pointer events
canvas.addEventListener('pointerdown',onPointerDown);
canvas.addEventListener('pointermove',onPointerMove);
canvas.addEventListener('pointerup',onPointerUp);
canvas.addEventListener('pointercancel',onPointerUp);
canvas.addEventListener('contextmenu',function(e){e.preventDefault();});

document.addEventListener('keydown',onKeyDown);
}
function setMode(m){
state.mode=m;
document.getElementById('btn-draw').classList.toggle('active',m==='draw');
document.getElementById('btn-erase').classList.toggle('active',m==='erase');
}

function getCellFromEvent(e){
var rect=canvas.getBoundingClientRect();
var x=(e.clientX-rect.left)*(canvas.width/rect.width);
var y=(e.clientY-rect.top)*(canvas.height/rect.height);
var c=Math.floor(x/cellSize);
var r=Math.floor(y/cellSize);
return{r:r,c:c,x:x,y:y};
}
function onPointerDown(e){
e.preventDefault();
canvas.setPointerCapture(e.pointerId);
var pos=getCellFromEvent(e);
dragStart=pos;
isDragging=true;
// Determine which edge to toggle based on position within cell
handleEdgeToggle(pos);
}
function onPointerMove(e){
if(!isDragging)return;
e.preventDefault();
var pos=getCellFromEvent(e);
handleEdgeToggle(pos);
}
function onPointerUp(e){
isDragging=false;
dragStart=null;
if(settings.autocheck){
if(checkSolution())onWin();
}
drawAll();
}

function handleEdgeToggle(pos){
var lv=LEVELS[state.level-1];if(!lv)return;
var rows=lv.rows,cols=lv.cols;
var r=pos.r,c=pos.c;
if(r<0||r>=rows||c<0||c>=cols)return;
var lx=pos.x-c*cellSize,ly=pos.y-r*cellSize;
var threshold=cellSize*0.15;
var toggled=false;
// Check proximity to each edge
if(ly<threshold&&r>0){
var e1=edgeKey(r,c,r-1,c);
if(e1){state.borders[e1]=state.mode==='draw'?'drawn':'open';toggled=true;playTone(440,0.05,'sine',0.05);}
}
else if(ly>cellSize-threshold&&r<rows-1){
var e2=edgeKey(r,c,r+1,c);
if(e2){state.borders[e2]=state.mode==='draw'?'drawn':'open';toggled=true;playTone(440,0.05,'sine',0.05);}
}
if(lx<threshold&&c>0){
var e3=edgeKey(r,c,r,c-1);
if(e3){state.borders[e3]=state.mode==='draw'?'drawn':'open';toggled=true;playTone(440,0.05,'sine',0.05);}
}
else if(lx>cellSize-threshold&&c<cols-1){
var e4=edgeKey(r,c,r,c+1);
if(e4){state.borders[e4]=state.mode==='draw'?'drawn':'open';toggled=true;playTone(440,0.05,'sine',0.05);}
}
if(toggled)drawAll();
}

function onKeyDown(e){
var k=e.key.toLowerCase();
if(k==='1'){setMode('draw');}
else if(k==='2'){setMode('erase');}
else if(k==='h'){doHint();}
else if(k==='r'){doRestart();}
else if(k==='enter'){doCheck();}
else if(k==='escape'){
document.getElementById('level-select').classList.remove('show');
document.getElementById('settings-modal').classList.remove('show');
closeOverlay();
}
}

// === Audio ===
function initAudio(){
if(audioCtx)return;
try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
function playTone(freq,dur,type,vol){
if(!settings.sfx||!audioCtx)return;
try{
var osc=audioCtx.createOscillator();
var g=audioCtx.createGain();
osc.type=type||'sine';
osc.frequency.value=freq;
g.gain.setValueAtTime(vol||0.1,audioCtx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
osc.connect(g);g.connect(audioCtx.destination);
osc.start();osc.stop(audioCtx.currentTime+dur);
}catch(e){}
}
function playWinFanfare(){
if(!settings.sfx)return;
var notes=[523,659,784,1047];
for(var i=0;i<notes.length;i++){
setTimeout(playTone.bind(null,notes[i],0.3,'sine',0.15),i*120);
}
}
function startBGM(){
if(!audioCtx||!settings.music||bgmNodes.length>0)return;
try{
var sr=audioCtx.sampleRate;
var dur=16;var bufSize=sr*dur;
var buf=audioCtx.createBuffer(1,bufSize,sr);
var d=buf.getChannelData(0);
var chords=[[261.63,329.63,392.00],[293.66,369.99,440.00],[329.63,415.30,493.88],[293.66,369.99,440.00]];
var chordDur=dur/chords.length;
for(var i=0;i<bufSize;i++){
var t=i/sr;
var ci=Math.min(Math.floor(t/chordDur),chords.length-1);
var chord=chords[ci];
var s=0;
for(var n=0;n<chord.length;n++){
var f=chord[n];
s+=Math.sin(2*Math.PI*f*t)*0.06;
s+=Math.sin(2*Math.PI*f*2*t)*0.015;
s+=Math.sin(2*Math.PI*f*0.5*t)*0.03;
}
var fade=t%chordDur;
var fadeIn=Math.min(fade/0.8,1);
var fadeOut=Math.min((chordDur-fade)/0.8,1);
s*=fadeIn*fadeOut;
var lfo=Math.sin(2*Math.PI*0.25*t)*0.15+1;
d[i]=s*lfo*0.5;
}
var src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
var filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=800;filt.Q.value=1;
var g=audioCtx.createGain();g.gain.value=0.25;
src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);
src.start();
bgmNodes=[src,filt,g];
}catch(e){}
}
function stopBGM(){
for(var i=0;i<bgmNodes.length;i++){
try{bgmNodes[i].stop?bgmNodes[i].stop():null;}catch(e){}
try{bgmNodes[i].disconnect();}catch(e){}
}
bgmNodes=[];
}

// === Confetti ===
function spawnConfetti(){
var colors=['#6c5ce7','#00cec9','#fdcb6e','#e74c3c','#2ecc71','#fd79a8'];
for(var i=0;i<50;i++){
var el=document.createElement('div');
el.className='confetti';
el.style.left=Math.random()*window.innerWidth+'px';
el.style.top='-10px';
el.style.background=colors[Math.floor(Math.random()*colors.length)];
el.style.borderRadius=Math.random()>0.5?'50%':'0';
document.body.appendChild(el);
var xVel=(Math.random()-0.5)*4;
var yVel=2+Math.random()*4;
var rot=Math.random()*360;
var rotVel=(Math.random()-0.5)*10;
var startTime=Date.now();
var life=3000+Math.random()*2000;
function animate(){
var elapsed=Date.now()-startTime;
if(elapsed>life){el.remove();return;}
rot+=rotVel;
yVel+=0.1;
var y=parseFloat(el.style.top)+yVel;
var x=parseFloat(el.style.left)+xVel;
el.style.top=y+'px';el.style.left=x+'px';
el.style.transform='rotate('+rot+'deg)';
requestAnimationFrame(animate);
}
animate();
}
}

// === Cleanup ===
var timers=[];
function cleanup(){
if(rafId)cancelAnimationFrame(rafId);
stopTimer();
stopBGM();
if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
}
window.addEventListener('beforeunload',cleanup);
window.addEventListener('pagehide',cleanup);
window.addEventListener('visibilitychange',function(){
if(document.hidden){if(rafId)cancelAnimationFrame(rafId);rafId=null;stopBGM();}
else{if(!state.solved){drawAll();}if(settings.music)startBGM();}
});

document.addEventListener('DOMContentLoaded',function(){init();});
</script>
