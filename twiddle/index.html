<style>
:root{
  --bg1:#0a0e27;--bg2:#131a3a;--bg3:#1b1140;
  --pink:#f472b6;--cyan:#22d3ee;--violet:#a78bfa;--amber:#fbbf24;
  --panel:rgba(255,255,255,0.05);--panel-brd:rgba(255,255,255,0.12);
  --txt:#e8ecff;--mut:#9aa3c7;--err:#f87171;--ok:#34d399;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow-x:hidden;user-select:none;-webkit-user-select:none}
body{
  background:radial-gradient(1200px 600px at 20% -10%,#2a1040 0%,transparent 60%),
             radial-gradient(1000px 700px at 110% 10%,#0e2a4a 0%,transparent 55%),
             linear-gradient(160deg,var(--bg1),var(--bg2) 60%,#070a1c);
  color:var(--txt);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
}
h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em}
.title{font-size:clamp(28px,6vw,46px);background:linear-gradient(90deg,var(--pink),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 30px rgba(244,114,182,.2)}
.subtitle{color:var(--mut);font-size:14px;margin-top:4px}
#app{width:100%;max-width:760px;padding:14px 14px 28px;display:flex;flex-direction:column;align-items:center;flex:1}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.btn{background:linear-gradient(135deg,rgba(244,114,182,.16),rgba(34,211,238,.16));border:1px solid var(--panel-brd);color:var(--txt);padding:11px 16px;border-radius:12px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:7px;transition:transform .12s,background .2s,box-shadow .2s;min-height:44px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(244,114,182,.15)}
.btn:active{transform:translateY(0)}
.btn.primary{background:linear-gradient(135deg,var(--pink),var(--cyan));color:#0a0e27}
.btn.ghost{background:var(--panel)}
.btn.sm{padding:8px 11px;font-size:13px;border-radius:10px}
/* HUD */
#hud{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.hud-left{display:flex;align-items:center;gap:8px}
.chip{background:var(--panel);border:1px solid var(--panel-brd);padding:7px 12px;border-radius:999px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.chip .lab{color:var(--mut);font-weight:600}
.hud-right{display:flex;gap:6px;flex-wrap:wrap}
/* Canvas */
#stage{position:relative;width:100%;display:flex;justify-content:center}
canvas{display:block;touch-action:none;background:rgba(8,11,30,.5);border:1px solid var(--panel-brd);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.45)}
/* Controls */
#ctrls{width:100%;display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.dir-btn{display:flex;align-items:center;gap:8px}
.dir-label{font-size:12px;color:var(--mut);font-weight:700}
/* Level select */
#menu{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:6px}
.tiers{width:100%;display:flex;flex-direction:column;gap:14px}
.tier-row{}
.tier-name{font-size:15px;font-weight:800;color:var(--pink);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.lvl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:8px}
.lvl-btn{aspect-ratio:1;background:var(--panel);border:1px solid var(--panel-brd);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:background .15s,transform .08s;font-weight:800;font-size:16px;position:relative}
.lvl-btn:hover{background:rgba(244,114,182,.12)}
.lvl-btn:active{transform:scale(.94)}
.lvl-btn.locked{opacity:.35;cursor:not-allowed}
.lvl-btn.current{border-color:var(--cyan);background:rgba(34,211,238,.1)}
.lvl-btn .stars{font-size:10px;line-height:1;letter-spacing:-1px}
.lvl-btn .star-on{color:var(--amber)}
.lvl-btn .star-off{color:rgba(255,255,255,.15)}
/* Win overlay */
#win{position:fixed;inset:0;background:rgba(8,11,30,.88);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.win-card{background:linear-gradient(135deg,rgba(244,114,182,.12),rgba(34,211,238,.12));border:1px solid var(--panel-brd);border-radius:24px;padding:32px 28px;text-align:center;max-width:360px;width:100%;display:flex;flex-direction:column;align-items:center;gap:14px}
.win-stars{font-size:36px;letter-spacing:2px}
.win-stars .s-on{color:var(--amber);text-shadow:0 0 20px rgba(251,191,36,.5)}
.win-stars .s-off{color:rgba(255,255,255,.15)}
.win-stats{display:flex;gap:16px;font-size:14px}
.win-stat{display:flex;flex-direction:column;align-items:center}
.win-stat .v{font-size:22px;font-weight:800;color:var(--cyan)}
.win-stat .l{font-size:11px;color:var(--mut)}
/* Tutorial */
#tut{position:fixed;inset:0;background:rgba(8,11,30,.88);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:90;padding:20px}
.tut-card{background:var(--bg2);border:1px solid var(--panel-brd);border-radius:20px;padding:28px 24px;max-width:380px;width:100%;text-align:center;display:flex;flex-direction:column;gap:14px}
.tut-step{font-size:13px;color:var(--cyan);font-weight:700}
.tut-title{font-size:20px;font-weight:800}
.tut-body{font-size:14px;color:var(--mut);line-height:1.6}
.tut-dots{display:flex;gap:6px;justify-content:center}
.tut-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15)}
.tut-dot.on{background:var(--pink)}
/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--bg2);border:1px solid var(--panel-brd);padding:10px 18px;border-radius:12px;font-size:14px;font-weight:600;transition:transform .3s;z-index:80;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
/* Particles */
#particles{position:fixed;inset:0;pointer-events:none;z-index:99}
@media(max-width:480px){
  #app{padding:10px 10px 20px}
  .btn{padding:10px 13px;font-size:13px}
  .chip{padding:6px 10px;font-size:12px}
}
</style>
</head>

var audioCtx = null;
var bgmNodes = [];
function initAudio(){
  if(audioCtx) return;
  try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
}
function playTone(freq, dur, type, vol){
  if(!audioCtx || !state.soundOn) return;
  try{
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(vol || 0.15, audioCtx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e){}
}
function sfxRotate(){ playTone(440, 0.08, 'sine', 0.12); setTimeout(function(){ playTone(550, 0.06, 'sine', 0.1); }, 30); }
function sfxWin(){
  [523, 659, 784, 1047].forEach(function(f, i){
    setTimeout(function(){ playTone(f, 0.25, 'sine', 0.18); }, i * 100);
  });
}
function sfxStar(){ playTone(880, 0.15, 'triangle', 0.12); }
function sfxClick(){ playTone(300, 0.04, 'square', 0.08); }
function sfxHint(){ playTone(660, 0.1, 'triangle', 0.1); }

function startBGM(){
  if(!audioCtx || !state.bgmOn || bgmNodes.length) return;
  try{
    var sr = audioCtx.sampleRate;
    var dur = 12;
    var bufSize = sr * dur;
    var buf = audioCtx.createBuffer(1, bufSize, sr);
    var d = buf.getChannelData(0);
    var chords = [[196,247,294],[220,277,330],[247,311,370],[220,277,330]];
    var chordDur = dur / chords.length;
    for(var i=0;i<bufSize;i++){
      var t = i / sr;
      var ci = Math.min(Math.floor(t / chordDur), chords.length-1);
      var chord = chords[ci];
      var s = 0;
      for(var n=0;n<chord.length;n++){
        var f = chord[n];
        s += Math.sin(2*Math.PI*f*t) * 0.04;
        s += Math.sin(2*Math.PI*f*2*t) * 0.01;
      }
      var fade = t % chordDur;
      var fadeIn = Math.min(fade/0.5, 1);
      var fadeOut = Math.min((chordDur-fade)/0.5, 1);
      s *= fadeIn * fadeOut;
      d[i] = s * 0.6;
    }
    var src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    var filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 1200; filt.Q.value = 0.8;
    var g = audioCtx.createGain();
    g.gain.value = 0.15;
    src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    src.start();
    bgmNodes = [src, filt, g];
  } catch(e){}
}
function stopBGM(){
  bgmNodes.forEach(function(n){ try{ if(n.stop) n.stop(); }catch(e){} });
  bgmNodes = [];
}

// ===== CANVAS =====
var canvas = document.getElementById('board');
var ctx = canvas.getContext('2d');
var cellSize = 0;
var gridOffsetX = 0, gridOffsetY = 0;

function resizeCanvas(){
  var sz = state.size;
  var container = document.getElementById('stage');
  var maxW = Math.min(container.clientWidth, 520);
  var maxH = Math.min(window.innerHeight - 240, 520);
  var dim = Math.min(maxW, maxH);
  var padding = 16;
  var avail = dim - padding * 2;
  cellSize = Math.floor(avail / sz);
  var totalW = cellSize * sz + padding * 2;
  canvas.width = totalW;
  canvas.height = totalW;
  canvas.style.width = totalW + 'px';
  canvas.style.height = totalW + 'px';
  gridOffsetX = padding;
  gridOffsetY = padding;
}

function tileColor(val, size){
  var n = size * size;
  var hue = ((val - 1) / n) * 300;
  return 'hsl(' + hue + ', 65%, 55%)';
}

function drawBoard(){
  var sz = state.size;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = 'rgba(8,11,30,0.3)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw tiles
  for(var r=0; r<sz; r++){
    for(var c=0; c<sz; c++){
      var x = gridOffsetX + c * cellSize;
      var y = gridOffsetY + r * cellSize;
      var val = state.tiles[r * sz + c];
      drawTile(x, y, val, sz);
    }
  }

  // Draw intersection dots
  for(var i=0; i<sz-1; i++){
    for(var j=0; j<sz-1; j++){
      var ix = gridOffsetX + (j+1) * cellSize;
      var iy = gridOffsetY + (i+1) * cellSize;
      var isHint = state.hintMove && state.hintMove[0]===i && state.hintMove[1]===j;
      ctx.fillStyle = isHint ? 'rgba(251,191,36,0.9)' : 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(ix, iy, isHint ? 8 : 4, 0, Math.PI*2);
      ctx.fill();
      if(isHint){
        // Draw highlight box around the 2x2 block
        var bx = gridOffsetX + j * cellSize;
        var by = gridOffsetY + i * cellSize;
        ctx.strokeStyle = 'rgba(251,191,36,0.7)';
        ctx.lineWidth = 3;
        ctx.setLineDash([6,4]);
        ctx.strokeRect(bx+2, by+2, cellSize*2-4, cellSize*2-4);
        ctx.setLineDash([]);
        // Draw rotation arrow
        var cx = ix, cy = iy;
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        var radius = 14;
        var startA, endA;
        if(state.hintMove[2] === 1){ startA = -Math.PI/2; endA = startA + Math.PI*1.5; }
        else { startA = Math.PI/2; endA = startA - Math.PI*1.5; }
        ctx.arc(cx, cy, radius, startA, endA, state.hintMove[2] !== 1);
        ctx.stroke();
        // Arrowhead
        var ahAngle = state.hintMove[2] === 1 ? endA : endA;
        var ahX = cx + Math.cos(ahAngle) * radius;
        var ahY = cy + Math.sin(ahAngle) * radius;
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.moveTo(ahX, ahY);
        ctx.lineTo(ahX - 5 * Math.cos(ahAngle - 0.5), ahY - 5 * Math.sin(ahAngle - 0.5));
        ctx.lineTo(ahX - 5 * Math.cos(ahAngle + 0.5), ahY - 5 * Math.sin(ahAngle + 0.5));
        ctx.closePath();
        ctx.fill();
      }
    }
  }
}

function drawTile(x, y, val, sz){
  var pad = 3;
  var w = cellSize - pad * 2;
  var h = cellSize - pad * 2;
  // Tile background with gradient
  var grad = ctx.createLinearGradient(x+pad, y+pad, x+pad+w, y+pad+h);
  var color = tileColor(val, sz);
  grad.addColorStop(0, color);
  grad.addColorStop(1, adjustHsl(color, -15));
  ctx.fillStyle = grad;
  roundRect(ctx, x+pad, y+pad, w, h, 8);
  ctx.fill();
  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Number
  var fontSize = Math.max(14, cellSize * 0.4);
  ctx.font = 'bold ' + fontSize + 'px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 2;
  ctx.fillText(String(val), x + cellSize/2, y + cellSize/2);
  ctx.shadowBlur = 0;
}

function roundRect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

function adjustHsl(hslStr, lightDelta){
  var m = hslStr.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);
  if(!m) return hslStr;
  var h = parseInt(m[1]), s = parseInt(m[2]), l = Math.max(0, Math.min(100, parseInt(m[3]) + lightDelta));
  return 'hsl(' + h + ',' + s + '%,' + l + '%)';
}

// ===== GAME LOGIC =====
function rotateBlock(r, c, dir){
  var sz = state.size;
  var n = sz;
  // Extract 2x2 block
  var sub = [];
  for(var i=0; i<2; i++){
    for(var j=0; j<2; j++){
      sub.push(state.tiles[(r+i)*sz + (c+j)]);
    }
  }
  // Rotate: CW = [0,2,3,1] mapping, CCW = [1,3,2,0] mapping
  // sub indices: 0=tl, 1=tr, 2=bl, 3=br
  // CW: tl->tr, tr->br, br->bl, bl->tl => new[tr]=old[tl], new[br]=old[tr], new[bl]=old[br], new[tl]=old[bl]
  var ns;
  if(dir === 1){ // CW
    ns = [sub[2], sub[0], sub[3], sub[1]];
  } else { // CCW
    ns = [sub[1], sub[3], sub[0], sub[2]];
  }
  for(var i=0; i<2; i++){
    for(var j=0; j<2; j++){
      state.tiles[(r+i)*sz + (c+j)] = ns[i*2 + j];
    }
  }
}

function isSolved(){
  var sz = state.size;
  for(var i=0; i<sz*sz; i++){
    if(state.tiles[i] !== i+1) return false;
  }
  return true;
}

function startLevel(idx){
  state.levelIdx = idx;
  var lv = LEVELS[idx];
  state.size = lv.size;
  state.tiles = lv.board.slice();
  state.moves = 0;
  state.dir = 1;
  state.history = [];
  state.startTime = Date.now();
  state.elapsed = 0;
  state.hintMove = null;
  state.solved = false;
  state.screen = 'game';
  resizeCanvas();
  showScreen('game');
  updateHUD();
  startTimer();
  if(state.rafId) cancelAnimationFrame(state.rafId);
  drawBoard();
}

function doRotate(r, c, dir){
  if(state.solved) return;
  // Save history
  state.history.push({tiles: state.tiles.slice(), move: [r, c, dir]});
  rotateBlock(r, c, dir);
  state.moves++;
  state.hintMove = null;
  if(state.hintTimer){ clearTimeout(state.hintTimer); state.hintTimer = null; }
  sfxRotate();
  drawBoard();
  updateHUD();
  if(isSolved()){
    onWin();
  }
}

function doUndo(){
  if(state.history.length === 0 || state.solved) return;
  var last = state.history.pop();
  state.tiles = last.tiles;
  state.moves = Math.max(0, state.moves - 1);
  sfxClick();
  drawBoard();
  updateHUD();
}

function doReset(){
  var lv = LEVELS[state.levelIdx];
  state.tiles = lv.board.slice();
  state.moves = 0;
  state.history = [];
  state.hintMove = null;
  sfxClick();
  drawBoard();
  updateHUD();
}

function doHint(){
  if(state.solved) return;
  // Find the first move from the solution that hasn't been applied
  var lv = LEVELS[state.levelIdx];
  var sol = lv.solution;
  // We can't easily track which solution step we're on, so let's use a simple approach:
  // Try each solution move in order and show the first one that would help
  // Actually, let's just show the first move of the solution
  state.hintMove = [sol[0][0], sol[0][1], sol[0][2]];
  sfxHint();
  drawBoard();
  if(state.hintTimer) clearTimeout(state.hintTimer);
  state.hintTimer = setTimeout(function(){ state.hintMove = null; drawBoard(); }, 3000);
  showToast('Hint: rotate the highlighted block');
}

function onWin(){
  state.solved = true;
  stopTimer();
  sfxWin();
  var par = LEVELS[state.levelIdx].depth;
  var stars = 1;
  if(state.moves <= par) stars = 3;
  else if(state.moves <= Math.ceil(par * 1.5)) stars = 2;
  // Save stars
  var lid = LEVELS[state.levelIdx].id;
  var oldStars = save.stars[lid] || 0;
  if(stars > oldStars){
    save.stars[lid] = stars;
    setTimeout(function(){ sfxStar(); }, 500);
  }
  // Save best time
  var timeSec = Math.floor(state.elapsed / 1000);
  if(!save.best[lid] || timeSec < save.best[lid]){
    save.best[lid] = timeSec;
  }
  saveSave();
  // Particles
  fireParticles();
  // Show win overlay
  setTimeout(function(){
    document.getElementById('win-moves').textContent = state.moves;
    document.getElementById('win-time').textContent = formatTime(state.elapsed);
    document.getElementById('win-par').textContent = par;
    var starsHtml = '';
    for(var i=0; i<3; i++){
      starsHtml += '<span class="' + (i < stars ? 's-on' : 's-off') + '">&#9733;</span>';
    }
    document.getElementById('win-stars').innerHTML = starsHtml;
    // Show/hide next button
    var nextBtn = document.getElementById('win-next');
    if(state.levelIdx >= LEVELS.length - 1){
      nextBtn.textContent = 'All Done!';
      nextBtn.classList.remove('primary');
      nextBtn.classList.add('ghost');
    } else {
      nextBtn.textContent = 'Next Level';
      nextBtn.classList.add('primary');
      nextBtn.classList.remove('ghost');
    }
    document.getElementById('win').classList.remove('hidden');
  }, 600);
}

// ===== TIMER =====
function startTimer(){
  state.timers.forEach(function(t){ clearInterval(t); });
  state.timers = [];
  state.timers.push(setInterval(function(){
    if(!state.solved){
      state.elapsed = Date.now() - state.startTime;
      updateHUD();
    }
  }, 1000));
}
function stopTimer(){
  state.timers.forEach(function(t){ clearInterval(t); });
  state.timers = [];
}
function formatTime(ms){
  var s = Math.floor(ms / 1000);
  var m = Math.floor(s / 60);
  s = s % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

// ===== HUD =====
function updateHUD(){
  document.getElementById('hud-level').textContent = state.levelIdx + 1;
  document.getElementById('hud-moves').textContent = state.moves;
  document.getElementById('hud-time').textContent = formatTime(state.elapsed);
}

// ===== SCREEN MANAGEMENT =====
function showScreen(name){
  document.getElementById('game-screen').classList.toggle('hidden', name !== 'game');
  document.getElementById('menu').classList.toggle('hidden', name !== 'menu');
  if(name === 'menu') buildLevelSelect();
}

// ===== LEVEL SELECT =====
function buildLevelSelect(){
  var container = document.getElementById('tiers-container');
  container.innerHTML = '';
  var tiers = {};
  LEVELS.forEach(function(lv, i){
    if(!tiers[lv.tier]) tiers[lv.tier] = [];
    tiers[lv.tier].push({idx: i, lv: lv});
  });
  Object.keys(tiers).forEach(function(tierName){
    var row = document.createElement('div');
    row.className = 'tier-row';
    var name = document.createElement('div');
    name.className = 'tier-name';
    name.textContent = tierName;
    row.appendChild(name);
    var grid = document.createElement('div');
    grid.className = 'lvl-grid';
    tiers[tierName].forEach(function(item){
      var btn = document.createElement('button');
      btn.className = 'lvl-btn';
      var lv = item.lv;
      var stars = save.stars[lv.id] || 0;
      var unlocked = item.idx === 0 || (save.stars[LEVELS[item.idx-1].id] && save.stars[LEVELS[item.idx-1].id] > 0);
      if(!unlocked) btn.classList.add('locked');
      if(item.idx === state.levelIdx && state.screen === 'game') btn.classList.add('current');
      var html = '<span>' + lv.id + '</span>';
      if(unlocked){
        var sHtml = '';
        for(var s=0; s<3; s++){
          sHtml += '<span class="' + (s < stars ? 'star-on' : 'star-off') + '">&#9733;</span>';
        }
        html += '<span class="stars">' + sHtml + '</span>';
      } else {
        html += '<span class="stars" style="font-size:10px;color:rgba(255,255,255,.3)">&#128274;</span>';
      }
      btn.innerHTML = html;
      if(unlocked){
        btn.addEventListener('click', function(){
          initAudio();
          startLevel(item.idx);
        });
      }
      grid.appendChild(btn);
    });
    row.appendChild(grid);
    container.appendChild(row);
  });
}

// ===== TUTORIAL =====
var tutStep = 0;
var tutData = [
  {title: 'Sort the Tiles', body: 'Your goal is to arrange all numbered tiles in ascending order, from 1 to N, reading left-to-right, top-to-bottom.'},
  {title: 'Rotate 2x2 Blocks', body: 'Tap at a point where four tiles meet (the dots between tiles). The 2x2 block around that point rotates in your selected direction.'},
  {title: 'Switch Direction', body: 'Use the CW/CCW button to switch rotation direction. Fewer moves earns more stars. Use Undo if you make a mistake!'}
];
function showTutorial(){
  tutStep = 0;
  document.getElementById('tut').classList.remove('hidden');
  updateTutorial();
}
function updateTutorial(){
  document.getElementById('tut-num').textContent = tutStep + 1;
  document.getElementById('tut-title').textContent = tutData[tutStep].title;
  document.getElementById('tut-body').textContent = tutData[tutStep].body;
  var dots = '';
  for(var i=0; i<tutData.length; i++){
    dots += '<span class="tut-dot ' + (i === tutStep ? 'on' : '') + '"></span>';
  }
  document.getElementById('tut-dots').innerHTML = dots;
  document.getElementById('tut-next').textContent = tutStep === tutData.length - 1 ? 'Start Playing' : 'Next';
}

// ===== PARTICLES =====
var pCanvas = document.getElementById('particles');
var pCtx = pCanvas.getContext('2d');
var particles = [];
function fireParticles(){
  pCanvas.classList.remove('hidden');
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
  particles = [];
  var cx = window.innerWidth / 2;
  var cy = window.innerHeight / 2;
  for(var i=0; i<80; i++){
    var angle = (Math.PI*2 * i) / 80 + Math.random()*0.3;
    var speed = 3 + Math.random() * 6;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1.0,
      color: 'hsl(' + Math.floor(Math.random()*60 + 30) + ', 80%, 60%)',
      size: 3 + Math.random() * 4
    });
  }
  animateParticles();
}
function animateParticles(){
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  var alive = false;
  particles.forEach(function(p){
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.012;
    if(p.life > 0){
      alive = true;
      pCtx.globalAlpha = p.life;
      pCtx.fillStyle = p.color;
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      pCtx.fill();
    }
  });
  pCtx.globalAlpha = 1;
  if(alive){
    requestAnimationFrame(animateParticles);
  } else {
    pCanvas.classList.add('hidden');
  }
}

// ===== TOAST =====
var toastTimer = null;
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2000);
}

// ===== INPUT =====
function handlePointer(e){
  if(state.screen !== 'game' || state.solved) return;
  e.preventDefault();
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width / rect.width;
  var scaleY = canvas.height / rect.height;
  var x = (e.clientX - rect.left) * scaleX;
  var y = (e.clientY - rect.top) * scaleY;

  // Find nearest intersection point
  var sz = state.size;
  var bestI = -1, bestJ = -1, bestDist = Infinity;
  for(var i=0; i<sz-1; i++){
    for(var j=0; j<sz-1; j++){
      var ix = gridOffsetX + (j+1) * cellSize;
      var iy = gridOffsetY + (i+1) * cellSize;
      var dx = x - ix, dy = y - iy;
      var dist = dx*dx + dy*dy;
      if(dist < bestDist){
        bestDist = dist;
        bestI = i; bestJ = j;
      }
    }
  }
  if(bestI >= 0 && bestDist < cellSize * cellSize){
    doRotate(bestI, bestJ, state.dir);
  }
}

// ===== EVENT LISTENERS =====
canvas.addEventListener('pointerdown', handlePointer);
canvas.addEventListener('contextmenu', function(e){ e.preventDefault(); });

document.getElementById('btn-dir').addEventListener('click', function(){
  state.dir = state.dir === 1 ? -1 : 1;
  this.textContent = state.dir === 1 ? 'CW' : 'CCW';
  sfxClick();
});
document.getElementById('btn-undo').addEventListener('click', doUndo);
document.getElementById('btn-reset').addEventListener('click', doReset);
document.getElementById('btn-hint').addEventListener('click', doHint);
document.getElementById('btn-menu').addEventListener('click', function(){
  state.screen = 'menu';
  stopTimer();
  showScreen('menu');
});

document.getElementById('btn-mute').addEventListener('click', function(){
  state.soundOn = !state.soundOn;
  this.textContent = state.soundOn ? 'Sound' : 'Muted';
  this.classList.toggle('ghost', !state.soundOn);
  if(state.soundOn) sfxClick();
});
document.getElementById('btn-bgm').addEventListener('click', function(){
  initAudio();
  state.bgmOn = !state.bgmOn;
  this.textContent = state.bgmOn ? 'Music' : 'No Music';
  this.classList.toggle('ghost', !state.bgmOn);
  if(state.bgmOn) startBGM(); else stopBGM();
});

document.getElementById('btn-play').addEventListener('click', function(){
  initAudio();
  if(!save.tutorialSeen){
    showTutorial();
  } else {
    startLevel(0);
  }
});
document.getElementById('btn-tut').addEventListener('click', showTutorial);

document.getElementById('tut-next').addEventListener('click', function(){
  if(tutStep < tutData.length - 1){
    tutStep++;
    updateTutorial();
  } else {
    document.getElementById('tut').classList.add('hidden');
    save.tutorialSeen = true;
    saveSave();
    startLevel(0);
  }
});
document.getElementById('tut-skip').addEventListener('click', function(){
  document.getElementById('tut').classList.add('hidden');
  save.tutorialSeen = true;
  saveSave();
});

document.getElementById('win-replay').addEventListener('click', function(){
  document.getElementById('win').classList.add('hidden');
  startLevel(state.levelIdx);
});
document.getElementById('win-next').addEventListener('click', function(){
  document.getElementById('win').classList.add('hidden');
  if(state.levelIdx < LEVELS.length - 1){
    startLevel(state.levelIdx + 1);
  } else {
    state.screen = 'menu';
    showScreen('menu');
  }
});
document.getElementById('win-menu').addEventListener('click', function(){
  document.getElementById('win').classList.add('hidden');
  state.screen = 'menu';
  showScreen('menu');
});

// Resize handler
window.addEventListener('resize', function(){
  if(state.screen === 'game'){
    resizeCanvas();
    drawBoard();
  }
});

// Visibility change — pause timer
document.addEventListener('visibilitychange', function(){
  if(document.hidden){
    if(state.timers.length) stopTimer();
  } else {
    if(state.screen === 'game' && !state.solved){
      // Adjust start time for elapsed
      state.startTime = Date.now() - state.elapsed;
      startTimer();
    }
  }
});

// Cleanup
function cleanup(){
  if(state.rafId){ cancelAnimationFrame(state.rafId); state.rafId = null; }
  stopTimer();
  stopBGM();
  if(audioCtx){ try{ audioCtx.close(); }catch(e){} audioCtx = null; }
}
window.addEventListener('beforeunload', cleanup);

// Init
buildLevelSelect();
</script>
