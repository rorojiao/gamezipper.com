(function(){

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function deep(o){return JSON.parse(JSON.stringify(o))}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function easeOut(t){return 1-Math.pow(1-t,3)}
function easeInOut(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}

var audioCtx=null, masterGain=null, bgmNodes=[], sfxOn=true, musicOn=true;

function ensureAudio(){

function playTone(freq,dur,type,vol,ramp){
  if(!sfxOn||!audioCtx)return;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();

  var n=audioCtx.createBufferSource(),buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate);

// ===================== LEVEL GENERATION =====================

function getPossibleFolds(R,C){
  var folds=[];
  for(var r=0;r<R-1;r++){
    var T=r+1,B=R-r-1;
    if(T<=B)folds.push({axis:'h',idx:r,dir:'up'});
    if(B<=T)folds.push({axis:'h',idx:r,dir:'down'});
  }
  for(var c=0;c<C-1;c++){
    var L=c+1,Ri=C-c-1;
    if(L<=Ri)folds.push({axis:'v',idx:c,dir:'left'});
    if(Ri<=L)folds.push({axis:'v',idx:c,dir:'right'});
  }
  return folds;
}

function applyFold(grid,R,C,fold){
  var g=deep(grid);
  var newR=R,newC=C;
  if(fold.axis==='v'){
    var c=fold.idx;
    if(fold.dir==='left'){
      var L=c+1;
      for(var r=0;r<R;r++){
        for(var i=0;i<L;i++){
          var src=c-i,dst=c+1+i;

        }
      }
      for(var r=0;r<R;r++)g[r]=g[r].slice(c+1);
      newC=C-c-1;
    }else{
      var Ri=C-c-1;
      for(var r=0;r<R;r++){
        for(var i=0;i<Ri;i++){
          var src=c+1+i,dst=c-i;
          g[r][dst]=g[r][dst].concat(g[r][src]);
          g[r][src]=[];
        }
      }
      for(var r=0;r<R;r++)g[r]=g[r].slice(0,c+1);
      newC=c+1;
    }
  }else{
    var r=fold.idx;
    if(fold.dir==='up'){
      var T=r+1;
      for(var cc=0;cc<C;cc++){
        for(var i=0;i<T;i++){
          var src=r-i,dst=r+1+i;
          g[dst][cc]=g[dst][cc].concat(g[src][cc]);
          g[src][cc]=[];
        }
      }
      g.splice(0,r+1);
      newR=R-r-1;
    }else{
      var B=R-r-1;
      for(var cc=0;cc<C;cc++){
        for(var i=0;i<B;i++){
          var src=r+1+i,dst=r-i;
          g[dst][cc]=g[dst][cc].concat(g[src][cc]);
          g[src][cc]=[];
        }
      }
      g.splice(r+1);

function genLevel(size,numFolds,numColors,rng){

  // Convert to stack grid
  var grid=[];
  for(var r=0;r<size;r++){grid[r]=[];for(var c=0;c<size;c++){grid[r][c]=[start[r][c]]}}
  var R=size,C=size;
  var solution=[];
  var folds=getPossibleFolds(R,C);
  // Shuffle folds for variety
  for(var i=folds.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=folds[i];folds[i]=folds[j];folds[j]=tmp}
  for(var f=0;f<numFolds;f++){
    folds=getPossibleFolds(R,C);
    if(!folds.length)break;
    // Pick a fold preferring ones that keep grid bigger
    var best=null,bestSz=0;
    for(var fi=0;fi<folds.length;fi++){
      var res=applyFold(grid,R,C,folds[fi]);
      var sz=res.rows*res.cols;
      if(sz>bestSz||(!best&&sz>0)){bestSz=sz;best=folds[fi]}
    }
    // Add some randomness
    if(rng()<0.4&&folds.length>1){best=folds[Math.floor(rng()*folds.length)]}
    if(!best)break;
    var result=applyFold(grid,R,C,best);
    grid=result.grid;R=result.rows;C=result.cols;
    solution.push(best);
  }
  var target=getVisible(grid,R,C);
  return{size:size,start:start,target:target,tR:R,tC:C,optimal:solution.length,par:solution.length+1,maxFolds:solution.length+3,solution:solution};
}

  // Expert 23-27: 4x4, 4-5 folds
  for(var i=0;i<5;i++){

function populateLevels(){
  var groups={tutorial:[0,1,2],easy:[3,4,5,6,7],medium:[8,9,10,11,12,13,14],hard:[15,16,17,18,19,20,21],expert:[22,23,24,25,26],master:[27,28,29]};

      if(unlocked){
        btn.addEventListener('click',function(){ensureAudio();sfxClick();startLevel(idx)}.bind(null,idx));
      }

// ===================== CANVAS SETUP =====================
function setupCanvas(){
  canvasWrap=document.getElementById('canvas-wrap');
  canvas=document.getElementById('game-canvas');
  if(!canvasWrap||!canvas)return;
  dpr=window.devicePixelRatio||1;
  var rect=canvasWrap.getBoundingClientRect();
  W=rect.width;H=rect.height;
  canvas.width=Math.round(W*dpr);
  canvas.height=Math.round(H*dpr);
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  calcLayout();
}

function calcLayout(){
  if(!gRows||!gCols)return;
  var pad=24;
  var targetSpace=90;
  var availW=W-pad*2;
  var availH=H-pad*2-targetSpace;
  cellSz=Math.floor(Math.min(availW/gCols,availH/gRows,120));
  cellSz=Math.max(cellSz,30);
  paperW=cellSz*gCols;
  paperH=cellSz*gRows;
  paperX=Math.floor((W-paperW)/2);
  paperY=Math.floor((H-targetSpace-paperH)/2)+10;

  // Target layout
  tgtCellSz=Math.min(18,Math.floor((targetSpace-30)/Math.max(allLevels[curLevel]?allLevels[curLevel].tR:1,allLevels[curLevel]?allLevels[curLevel].tC:1)));
  tgtCellSz=Math.max(tgtCellSz,10);
  var lv=allLevels[curLevel];
  if(lv){
    var tw=tgtCellSz*lv.tC,th=tgtCellSz*lv.tR;
    tgtX=W-tw-16;
    tgtY=H-th-16;
  }
}

// ===================== RENDERING =====================
function renderGame(){
  if(!ctx||curLevel<0)return;
  ctx.clearRect(0,0,W,H);

  // Draw target label and target grid
  var lv=allLevels[curLevel];
  if(lv){
    ctx.save();
    ctx.globalAlpha=0.6;
    ctx.fillStyle='#fff';
    ctx.font='bold 11px system-ui,sans-serif';
    ctx.textAlign='right';
    ctx.fillText('TARGET',tgtX+lv.tC*tgtCellSz,tgtY-6);
    ctx.restore();

    // Target background
    var tw=lv.tC*tgtCellSz,th=lv.tR*tgtCellSz;
    ctx.fillStyle='rgba(0,0,0,0.3)';
    roundRect(ctx,tgtX-3,tgtY-3,tw+6,th+6,4);ctx.fill();
    for(var r=0;r<lv.tR;r++){
      for(var c=0;c<lv.tC;c++){
        var color=lv.target[r][c];
        ctx.fillStyle=color||'#333';
        roundRect(ctx,tgtX+c*tgtCellSz+1,tgtY+r*tgtCellSz+1,tgtCellSz-2,tgtCellSz-2,2);
        ctx.fill();
      }
    }
  }

  if(animating&&foldAnim){
    renderFoldAnim();
    return;
  }

  // Paper shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  roundRect(ctx,paperX+4,paperY+4,paperW,paperH,6);ctx.fill();

  // Paper background
  ctx.fillStyle=PAPER_BG;
  roundRect(ctx,paperX,paperY,paperW,paperH,6);ctx.fill();

  // Cells
  for(var r=0;r<gRows;r++){
    for(var c=0;c<gCols;c++){
      var stack=grid[r][c];
      if(!stack||!stack.length)continue;
      var color=stack[stack.length-1];
      var cx=paperX+c*cellSz,cy=paperY+r*cellSz;
      ctx.fillStyle=color;
      roundRect(ctx,cx+2,cy+2,cellSz-4,cellSz-4,Math.min(6,cellSz*0.1));
      ctx.fill();
      // Subtle highlight
      ctx.fillStyle='rgba(255,255,255,0.12)';
      roundRect(ctx,cx+2,cy+2,cellSz-4,(cellSz-4)*0.35,Math.min(6,cellSz*0.1));
      ctx.fill();
    }
  }

  // Grid lines (crease lines)
  ctx.save();
  ctx.setLineDash([4,4]);
  ctx.lineWidth=1;
  for(var c=1;c<gCols;c++){
    var x=paperX+c*cellSz;
    var isHover=hoverCrease&&hoverCrease.axis==='v'&&hoverCrease.idx===c-1;
    ctx.strokeStyle=isHover?'rgba(108,92,231,0.9)':'rgba(0,0,0,0.15)';
    ctx.lineWidth=isHover?2.5:1;
    ctx.setLineDash(isHover?[]:[4,4]);
    ctx.beginPath();ctx.moveTo(x,paperY+2);ctx.lineTo(x,paperY+paperH-2);ctx.stroke();
  }
  for(var r=1;r<gRows;r++){
    var y=paperY+r*cellSz;
    var isHover=hoverCrease&&hoverCrease.axis==='h'&&hoverCrease.idx===r-1;
    ctx.strokeStyle=isHover?'rgba(108,92,231,0.9)':'rgba(0,0,0,0.15)';
    ctx.lineWidth=isHover?2.5:1;
    ctx.setLineDash(isHover?[]:[4,4]);
    ctx.beginPath();ctx.moveTo(paperX+2,y);ctx.lineTo(paperX+paperW-2,y);ctx.stroke();
  }
  ctx.restore();

  // Hint arrow
  if(hintFold&&hintTimer>0){
    drawHintArrow();
  }
}

function renderFoldAnim(){
  var t=easeInOut(foldAnim.progress);
  var fold=foldAnim.fold;
  var fR=foldAnim.fromR,fC=foldAnim.fromC;

  // Always draw the base side normally
  // During animation, draw the folding side transforming

  if(t<0.5){
    // Phase 1: folding side compressing
    var p=t*2; // 0->1

    // Draw base side
    drawPaperBase(foldAnim.fromGrid,fR,fC,fold,false);

    // Draw folding side compressing
    ctx.save();
    ctx.globalAlpha=1-p*0.3;
    if(fold.axis==='v'){
      var c=fold.idx;
      if(fold.dir==='left'){
        // Left side (cols 0..c) compressing rightward
        var L=c+1;
        var compressW=cellSz*(1-p);
        for(var r=0;r<fR;r++){
          for(var i=0;i<L;i++){
            var stack=foldAnim.fromGrid[r][i];
            if(!stack||!stack.length)continue;
            var color=stack[stack.length-1];
            var baseX=paperX+(c+1)*cellSz;
            var dx=baseX-(L-i)*compressW;
            ctx.fillStyle=color;
            roundRect(ctx,dx+2,paperY+r*cellSz+2,compressW-4,cellSz-4,4);
            ctx.fill();
          }
        }
      }else{
        // Right side (cols c+1..fC-1) compressing leftward
        var R=fC-c-1;
        var compressW=cellSz*(1-p);
        for(var r=0;r<fR;r++){
          for(var i=0;i<R;i++){
            var stack=foldAnim.fromGrid[r][c+1+i];
            if(!stack||!stack.length)continue;
            var color=stack[stack.length-1];
            var baseX=paperX+(c+1)*cellSz;
            var dx=baseX+i*compressW;
            ctx.fillStyle=color;
            roundRect(ctx,dx+2,paperY+r*cellSz+2,compressW-4,cellSz-4,4);
            ctx.fill();
          }
        }
      }
    }else{
      var r=fold.idx;
      if(fold.dir==='up'){
        var T=r+1;
        var compressH=cellSz*(1-p);
        for(var cc=0;cc<fC;cc++){
          for(var i=0;i<T;i++){
            var stack=foldAnim.fromGrid[r-i][cc];
            if(!stack||!stack.length)continue;
            var color=stack[stack.length-1];
            var baseY=paperY+(r+1)*cellSz;
            var dy=baseY-(T-i)*compressH;
            ctx.fillStyle=color;
            roundRect(ctx,paperX+cc*cellSz+2,dy+2,cellSz-4,compressH-4,4);
            ctx.fill();
          }
        }
      }else{
        var B=fR-r-1;
        var compressH=cellSz*(1-p);
        for(var cc=0;cc<fC;cc++){
          for(var i=0;i<B;i++){
            var stack=foldAnim.fromGrid[r+1+i][cc];
            if(!stack||!stack.length)continue;
            var color=stack[stack.length-1];
            var baseY=paperY+(r+1)*cellSz;
            var dy=baseY+i*compressH;
            ctx.fillStyle=color;
            roundRect(ctx,paperX+cc*cellSz+2,dy+2,cellSz-4,compressH-4,4);
            ctx.fill();
          }
        }
      }
    }
    ctx.restore();
  }else{
    // Phase 2: folded cells appearing on destination
    var p=(t-0.5)*2; // 0->1
    drawPaperBase(foldAnim.fromGrid,fR,fC,fold,false);

    ctx.save();
    ctx.globalAlpha=0.3+0.7*p;
    // Draw the destination cells with new stacked colors
    var toG=foldAnim.toGrid,toR=foldAnim.toR,toC=foldAnim.toC;
    // Recalculate layout for new grid size
    var newCellSz=Math.min((W-48)/toC,(H-48)/toR,120);
    newCellSz=Math.max(newCellSz,30);
    var newPW=newCellSz*toC,newPH=newCellSz*toR;
    var newPX=Math.floor((W-newPW)/2);
    var newPY=Math.floor((H-90-newPH)/2)+10;

    // Interpolate paper position
    var ix=lerp(paperX,newPX,p);
    var iy=lerp(paperY,newPY,p);
    var ics=lerp(cellSz,newCellSz,p);

    // Draw new paper
    ctx.fillStyle=PAPER_BG;
    roundRect(ctx,ix,iy,newPW*p,newPH*p,6);ctx.fill();

    for(var r=0;r<toR;r++){
      for(var c=0;c<toC;c++){
        var stack=toG[r][c];
        if(!stack||!stack.length)continue;
        var color=stack[stack.length-1];
        ctx.fillStyle=color;
        roundRect(ctx,ix+c*ics+2,iy+r*ics+2,ics-4,ics-4,Math.min(6,ics*0.1));
        ctx.fill();
      }
    }
    ctx.restore();
  }
}

function drawPaperBase(g,R,C,fold,isSrc){
  // Draw the base (non-folding) side
  for(var r=0;r<R;r++){
    for(var c=0;c<C;c++){
      var stack=g[r][c];
      if(!stack||!stack.length)continue;
      var color=stack[stack.length-1];
      ctx.fillStyle=color;
      roundRect(ctx,paperX+c*cellSz+2,paperY+r*cellSz+2,cellSz-4,cellSz-4,Math.min(6,cellSz*0.1));
      ctx.fill();
    }
  }
}

function drawHintArrow(){
  ctx.save();
  ctx.globalAlpha=0.6+0.4*Math.sin(Date.now()/200);
  ctx.strokeStyle='#6c5ce7';
  ctx.lineWidth=3;
  ctx.setLineDash([]);
  var fold=hintFold;
  if(fold.axis==='v'){
    var x=paperX+(fold.idx+1)*cellSz;
    ctx.beginPath();ctx.moveTo(x,paperY-10);ctx.lineTo(x,paperY+paperH+10);ctx.stroke();
    // Arrow
    var dir=fold.dir;
    ctx.fillStyle='#6c5ce7';
    ctx.beginPath();
    if(dir==='left'){
      ctx.moveTo(x-10,paperY+paperH/2-10);ctx.lineTo(x-20,paperY+paperH/2);ctx.lineTo(x-10,paperY+paperH/2+10);
    }else{
      ctx.moveTo(x+10,paperY+paperH/2-10);ctx.lineTo(x+20,paperY+paperH/2);ctx.lineTo(x+10,paperY+paperH/2+10);
    }
    ctx.fill();
  }else{
    var y=paperY+(fold.idx+1)*cellSz;
    ctx.beginPath();ctx.moveTo(paperX-10,y);ctx.lineTo(paperX+paperW+10,y);ctx.stroke();
    ctx.fillStyle='#6c5ce7';
    ctx.beginPath();
    if(fold.dir==='up'){
      ctx.moveTo(paperX+paperW/2-10,y-10);ctx.lineTo(paperX+paperW/2,y-20);ctx.lineTo(paperX+paperW/2+10,y-10);
    }else{
      ctx.moveTo(paperX+paperW/2-10,y+10);ctx.lineTo(paperX+paperW/2,y+20);ctx.lineTo(paperX+paperW/2+10,y+10);
    }
    ctx.fill();
  }
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);r=Math.max(r,0);
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ===================== CONFETTI =====================
function spawnConfetti(){
  confettiParts=[];
  for(var i=0;i<60;i++){
    confettiParts.push({
      x:W/2,y:H/2,
      vx:(Math.random()-0.5)*12,
      vy:-Math.random()*12-4,
      color:PALETTE[Math.floor(Math.random()*PALETTE.length)],
      size:Math.random()*6+3,
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*15,
      life:1
    });
  }
}

function updateConfetti(dt){
  for(var i=confettiParts.length-1;i>=0;i--){
    var p=confettiParts[i];
    p.x+=p.vx;p.vy+=0.25;p.y+=p.vy;
    p.rot+=p.rotV;p.life-=dt*0.7;
    if(p.life<=0||p.y>H+50)confettiParts.splice(i,1);
  }
}

function drawConfetti(){
  for(var i=0;i<confettiParts.length;i++){
    var p=confettiParts[i];
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle=p.color;
    ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    ctx.restore();
  }
}

// ===================== FOLD LOGIC =====================
function executeFold(fold){
  if(animating||curLevel<0)return;
  // Validate fold
  var valid=false;
  var poss=getPossibleFolds(gRows,gCols);
  for(var i=0;i<poss.length;i++){if(poss[i].axis===fold.axis&&poss[i].idx===fold.idx&&poss[i].dir===fold.dir){valid=true;break}}
  if(!valid)return;

  // Save state for undo
  undoStack.push({grid:deep(grid),rows:gRows,cols:gCols,foldCount:foldCount});
  document.getElementById('undo-btn').disabled=false;

  var fromGrid=deep(grid);
  var fromR=gRows,fromC=gCols;
  var result=applyFold(grid,gRows,gCols,fold);
  var toGrid=result.grid;
  var toR=result.rows,toC=result.cols;

  sfxFold();
  foldCount++;

  // Start animation
  animating=true;
  var startT=performance.now();
  foldAnim={progress:0,fold:fold,startTime:startT,fromGrid:fromGrid,fromR:fromR,fromC:fromC,toGrid:toGrid,toR:toR,toC:toC};

  // After animation, apply the fold
  setTimeout(function(){
    grid=toGrid;gRows=toR;gCols=toC;
    animating=false;foldAnim=null;
    calcLayout();
    sfxSnap();

    // Check win
    if(checkWin()){
      onWin();
    }
  },FOLD_MS);

  updateFoldInfo();
}

function checkWin(){
  var lv=allLevels[curLevel];
  if(!lv)return false;
  if(gRows!==lv.tR||gCols!==lv.tC)return false;
  var vis=getVisible(grid,gRows,gCols);
  for(var r=0;r<lv.tR;r++){
    for(var c=0;c<lv.tC;c++){
      if(vis[r][c]!==lv.target[r][c])return false;
    }
  }
  return true;
}

function onWin(){
  var lv=allLevels[curLevel];
  var elapsed=(Date.now()-startTime)/1000;
  var timeBonus=Math.max(0,Math.floor(500*(1-elapsed/120)));
  var foldBonus=Math.max(0,Math.floor(500*(lv.optimal/Math.max(foldCount,1))));
  var score=1000+timeBonus+foldBonus;

  var stars=1;
  if(foldCount<=lv.par)stars=2;
  if(foldCount<=lv.optimal)stars=3;

  var prev=getLevelSave(curLevel+1);
  if(!prev.completed||score>prev.score){
    setLevelSave(curLevel+1,{stars:Math.max(stars,prev.stars),score:Math.max(score,prev.score),completed:true});
  }else{
    setLevelSave(curLevel+1,{stars:Math.max(stars,prev.stars),score:prev.score,completed:true});
  }

  sfxSuccess();
  setTimeout(sfxFanfare,400);
  spawnConfetti();

  // Show complete screen after a short delay
  setTimeout(function(){
    showComplete(stars,score);
  },800);

  // Analytics
  try{document.dispatchEvent(new CustomEvent('level-complete'));}catch(e){}
  try{document.dispatchEvent(new CustomEvent('gameover'));}catch(e){}
}

function showComplete(stars,score){
  var el=document.getElementById('complete-stars');
  var html='';
  for(var i=1;i<=3;i++){
    var cls=i<=stars?'star-on':'star-off';
    html+='<span class="'+cls+'" style="animation:starPop .4s ease '+((i-1)*0.15)+'s both">★</span>';
  }
  el.innerHTML=html;
  document.getElementById('complete-score').textContent='Score: '+score;
  showScreen('complete');

  // Next level button
  var nextBtn=document.getElementById('next-btn');
  if(curLevel+1<allLevels.length){
    nextBtn.style.display='';nextBtn.textContent='Next Level';
  }else{
    nextBtn.style.display='none';
  }
}

// ===================== INPUT =====================
function findCrease(mx,my){
  // Convert to paper-relative coordinates
  var rx=mx-paperX,ry=my-paperY;
  if(rx<0||rx>paperW||ry<0||ry>paperH)return null;

  var best=null,bestDist=Infinity;
  var threshold=cellSz*0.45;

  // Vertical creases
  for(var c=0;c<gCols-1;c++){
    var cx=(c+1)*cellSz;
    var dist=Math.abs(rx-cx);
    if(dist<threshold&&dist<bestDist){
      bestDist=dist;
      var L=c+1,R=gCols-c-1;
      var dir;
      if(L<R)dir='left';
      else if(R<L)dir='right';
      else dir=rx<cx?'left':'right';
      best={axis:'v',idx:c,dir:dir};
    }
  }
  // Horizontal creases
  for(var r=0;r<gRows-1;r++){
    var cy=(r+1)*cellSz;
    var dist=Math.abs(ry-cy);
    if(dist<threshold&&dist<bestDist){
      bestDist=dist;
      var T=r+1,B=gRows-r-1;
      var dir;
      if(T<B)dir='up';
      else if(B<T)dir='down';
      else dir=ry<cy?'up':'down';
      best={axis:'h',idx:r,dir:dir};
    }
  }
  return best;
}

function getPointerPos(e){
  var rect=canvas.getBoundingClientRect();
  var x,y;
  if(e.touches&&e.touches.length){
    x=e.touches[0].clientX-rect.left;y=e.touches[0].clientY-rect.top;
  }else if(e.changedTouches&&e.changedTouches.length){
    x=e.changedTouches[0].clientX-rect.left;y=e.changedTouches[0].clientY-rect.top;
  }else{
    x=e.clientX-rect.left;y=e.clientY-rect.top;
  }
  return{x:x,y:y};
}

function onPointerMove(e){
  if(animating||screen!=='game')return;
  var pos=getPointerPos(e);
  hoverCrease=findCrease(pos.x,pos.y);
  canvas.style.cursor=hoverCrease?'pointer':'default';
}

function onPointerDown(e){
  e.preventDefault();
  if(animating||screen!=='game')return;
  ensureAudio();
  var pos=getPointerPos(e);
  var crease=findCrease(pos.x,pos.y);
  if(crease){
    sfxClick();
    hintFold=null;hintTimer=0;
    executeFold(crease);
  }
}

// ===================== HINT SYSTEM =====================
function showHint(){
  if(curLevel<0||animating)return;
  var lv=allLevels[curLevel];
  if(!lv||!lv.solution||!lv.solution.length)return;
  // Try to find a matching solution step
  // Simple: just show the first solution fold
  hintFold=lv.solution[0];
  hintTimer=3;
}

// ===================== GAME ACTIONS =====================
function startLevel(idx){
  curLevel=idx;
  var lv=allLevels[idx];
  if(!lv)return;

  // Init grid from level start
  grid=[];
  for(var r=0;r<lv.size;r++){
    grid[r]=[];
    for(var c=0;c<lv.size;c++){
      grid[r][c]=[lv.start[r][c]];
    }
  }
  gRows=lv.size;gCols=lv.size;
  foldCount=0;
  undoStack=[];
  startTime=Date.now();
  hintFold=null;hintTimer=0;
  levelStartGrid=deep(grid);
  tutorialText=lv.tutorial||'';

  document.getElementById('level-title').textContent='Level '+(idx+1);
  document.getElementById('undo-btn').disabled=true;
  updateFoldInfo();

  showScreen('game');
  // Delay canvas setup to allow layout to compute
  requestAnimationFrame(function(){setupCanvas()});
  if(musicOn)startBGM();

  // Tutorial hint
  if(tutorialText){
    var existing=document.querySelector('.tutorial-hint');
    if(existing)existing.remove();
    var hint=document.createElement('div');
    hint.className='tutorial-hint';
    hint.textContent=tutorialText;
    document.getElementById('canvas-wrap').appendChild(hint);
    setTimeout(function(){if(hint.parentNode)hint.remove()},5000);
  }
}

function resetLevel(){
  if(curLevel<0||animating)return;
  grid=deep(levelStartGrid);
  gRows=allLevels[curLevel].size;
  gCols=allLevels[curLevel].size;
  foldCount=0;undoStack=[];
  hintFold=null;hintTimer=0;
  document.getElementById('undo-btn').disabled=true;
  updateFoldInfo();
  calcLayout();
  sfxClick();
}

function undoFold(){
  if(animating||!undoStack.length)return;
  var state=undoStack.pop();
  grid=state.grid;gRows=state.rows;gCols=state.cols;foldCount=state.foldCount;
  document.getElementById('undo-btn').disabled=undoStack.length===0;
  updateFoldInfo();
  calcLayout();
  sfxClick();
}

function updateFoldInfo(){
  var lv=allLevels[curLevel];
  var info='Folds: '+foldCount;
  if(lv)info+=' / '+lv.maxFolds;
  document.getElementById('fold-info').textContent=info;
}

// ===================== GAME LOOP =====================
function gameLoop(ts){
  if(!running)return;
  rafId=requestAnimationFrame(gameLoop);

  var dt=Math.min((ts-(lastFrame||ts))/1000,0.1);
  lastFrame=ts;

  // Update animations
  if(animating&&foldAnim){
    foldAnim.progress=Math.min(1,(ts-foldAnim.startTime)/FOLD_MS);
  }

  // Update hint timer
  if(hintTimer>0){
    hintTimer-=dt;
    if(hintTimer<=0){hintFold=null;hintTimer=0}
  }

  // Update confetti
  if(confettiParts.length)updateConfetti(dt);

  // Render
  if(screen==='game'&&ctx){
    renderGame();
    if(confettiParts.length)drawConfetti();
  }
}

var lastFrame=0;

// ===================== INIT =====================
function init(){
  loadSave();
  generateAllLevels();
  populateLevels();

  // Get canvas reference (actual sizing done in startLevel)
  canvas=document.getElementById('game-canvas');
  ctx=canvas?canvas.getContext('2d'):null;

  // Button handlers
  document.getElementById('play-btn').addEventListener('click',function(){ensureAudio();sfxClick();populateLevels();showScreen('levels')});
  document.getElementById('menu-settings-btn').addEventListener('click',function(){ensureAudio();sfxClick();showScreen('settings')});
  document.getElementById('levels-back').addEventListener('click',function(){sfxClick();showScreen('menu')});
  document.getElementById('game-back').addEventListener('click',function(){sfxClick();stopBGM();curLevel=-1;populateLevels();showScreen('levels')});
  document.getElementById('undo-btn').addEventListener('click',undoFold);
  document.getElementById('hint-btn').addEventListener('click',function(){ensureAudio();sfxClick();showHint()});
  document.getElementById('reset-btn').addEventListener('click',resetLevel);
  document.getElementById('next-btn').addEventListener('click',function(){sfxClick();if(curLevel+1<allLevels.length)startLevel(curLevel+1)});
  document.getElementById('complete-levels-btn').addEventListener('click',function(){sfxClick();stopBGM();curLevel=-1;populateLevels();showScreen('levels')});
  document.getElementById('settings-back').addEventListener('click',function(){sfxClick();showScreen('menu')});
  document.getElementById('reset-progress-btn').addEventListener('click',function(){
    save={version:1,levels:{},totalStars:0};writeSave();populateLevels();sfxClick();
  });
  document.getElementById('sfx-toggle').addEventListener('change',function(){sfxOn=this.checked});
  document.getElementById('music-toggle').addEventListener('change',function(){musicOn=this.checked;if(musicOn){ensureAudio();startBGM()}else{stopBGM()}});

  // Canvas input
  canvas.addEventListener('mousemove',onPointerMove);
  canvas.addEventListener('mousedown',onPointerDown);
  canvas.addEventListener('touchstart',onPointerDown,{passive:false});
  canvas.addEventListener('touchmove',function(e){e.preventDefault();onPointerMove(e)},{passive:false});

  // Resize
  window.addEventListener('resize',function(){if(screen==='game')requestAnimationFrame(function(){setupCanvas()})});

  // Start loop
  running=true;
  rafId=requestAnimationFrame(gameLoop);

  showScreen('menu');
}

function cleanup(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null}
  if(audioCtx){try{audioCtx.close()}catch(e){}}
  stopBGM();
  canvas.removeEventListener('pointerdown',onPointerDown);
  canvas.removeEventListener('pointermove',onPointerMove);
  canvas.removeEventListener('pointerup',onPointerUp);
  window.removeEventListener('resize',setupCanvas);
}
window.addEventListener('beforeunload',function(){writeSave();cleanup()});
window.addEventListener('visibilitychange',function(){if(document.hidden){writeSave();stopBGM()}else if(currentScreen==='game'){startBGM()}});

init();
})();
</script>
