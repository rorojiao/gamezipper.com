var bgmTimer=null,bgmStep=0;
function startBGM(){if(!AC||bgmTimer)return;var notes=[0,3,5,7,5,3,0,-2,0,3,7,5,3,0,-5,0];var base=261.63;bgmStep=0;bgmTimer=setInterval(function(){if(mut||!AC)return;var semis=notes[bgmStep%notes.length];var f=base*Math.pow(2,semis/12);try{var o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=f;g.gain.value=0.02;g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.3);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.3);}catch(e){}bgmStep++;},350);}

W=window.innerWidth;H=window.innerHeight;

TILE=Math.min(Math.floor(availW/GW),Math.floor(availH/GH),64);

// Load level
function loadLevel(idx){
var lv=LEVELS[idx];if(!lv)return;
GW=lv.w;GH=lv.h;resize();
S.level=idx;
S.px=lv.px;S.py=lv.py;
S.warps=lv.warps;
S.grid=[];S.stars=[];S.collected=[];S.doors=[];
S.moveHistory=[];S.keys=0;S.gotStars=0;S.anim=0;S.warpAnim=0;S.warping=false;S.particles=[];
var ex=lv.ex||0,ey=lv.ey||0;
for(var y=0;y<GH;y++){
S.grid[y]=[];
for(var x=0;x<GW;x++){
var t=lv.grid[y][x];
S.grid[y][x]=t;
if(t===2){S.stars.push({x:x,y:y,got:false});}
if(t===4){S.doors.push({x:x,y:y,open:false});}
if(t===3){S.exitX=x;S.exitY=y;}
}
}
S.starCount=S.stars.length;
// Find exit if not ex/ey
for(var y=0;y<GH;y++)for(var x=0;x<GW;x++)if(lv.grid[y][x]===3){S.exitX=x;S.exitY=y;}
// Remove explicit ex/ey override (used for levels without grid exit)
if(ex>0||ey>0){
// ex/ey is relative to inside walls, convert to grid coords
}
updateHUD();
}

function updateHUD(){
var lv=LEVELS[S.level];
document.getElementById('hudLevel').textContent='L'+(S.level+1)+' '+lv.name;
document.getElementById('hudStars').textContent='Stars: '+S.gotStars+'/'+S.starCount;
document.getElementById('hudWarp').textContent='Warps: '+S.warps;
}

// Move player
function canWalk(x,y){
if(x<0||x>=GW||y<0||y>=GH)return false;
var t=S.grid[y][x];
if(t===1)return false;
if(t===4){var d=findDoor(x,y);if(d&&!d.open)return false;}
return true;
}
function findDoor(x,y){for(var i=0;i<S.doors.length;i++)if(S.doors[i].x===x&&S.doors[i].y===y)return S.doors[i];return null;}

function tryMove(dx,dy){
if(S.warping)return;
var nx=S.px+dx,ny=S.py+dy;
// Check one-way tiles
if(canWalk(nx,ny)){
// Check one-way: tile at current position might restrict direction
var cur=S.grid[S.py][S.px];
if(cur===6&&dy!==1&&dy!==-1&&dx!==0)return; // up-only
if(cur===7&&dy!==-1&&dy!==1&&dx!==0)return; // down-only
if(cur===8&&dx!==1&&dx!==-1&&dy!==0)return; // left-only
if(cur===9&&dx!==-1&&dx!==1&&dy!==0)return; // right-only
// Check one-way at destination
var dest=S.grid[ny][nx];
if(dx===0&&dy===-1&&(dest===7))return; // can't enter down-only from below going up
if(dx===0&&dy===1&&(dest===6))return; // can't enter up-only from above going down
if(dx===1&&dest===8)return; // can't enter left-only from left going right
if(dx===-1&&dest===9)return; // can't enter right-only from right going left

S.moveHistory.push({px:S.px,py:S.py,warps:S.warps,gotStars:S.gotStars,keys:S.keys,collected:S.collected.slice(),doors:S.doors.map(function(d){return{x:d.x,y:d.y,open:d.open};})});
S.px=nx;S.py=ny;S.anim=1;sfxStep();
checkTile();
}else{
sfxBlock();
}
}

function checkTile(){
var t=S.grid[S.py][S.px];
if(t===2){
var st=findStar(S.px,S.py);
if(st&&!st.got){st.got=true;S.gotStars++;S.grid[S.py][S.px]=0;sfxStar();spawnParticles(S.px,S.py,'#ff8',8);}
updateHUD();
}
if(t===5){S.keys++;S.grid[S.py][S.px]=0;sfxKey();spawnParticles(S.px,S.py,'#8f8',6);}
if(t===4){var d=findDoor(S.px,S.py);}
if(t===3){
if(S.gotStars>=S.starCount){
sfxWin();
setTimeout(function(){showWin();},300);
}
}
}

function findStar(x,y){for(var i=0;i<S.stars.length;i++)if(S.stars[i].x===x&&S.stars[i].y===y)return S.stars[i];return null;}

// Warp to tile
function tryWarp(gx,gy){
if(S.warping||S.warps<=0)return;
if(gx<0||gx>=GW||gy<0||gy>=GH)return;
var t=S.grid[gy][gx];
if(t===1)return;
if(gx===S.px&&gy===S.py)return;
// Save state
S.moveHistory.push({px:S.px,py:S.py,warps:S.warps,gotStars:S.gotStars,keys:S.keys,collected:S.collected.slice(),doors:S.doors.map(function(d){return{x:d.x,y:d.y,open:d.open};})});
// Check if need key for door
if(t===4){var d=findDoor(gx,gy);if(d&&!d.open){if(S.keys>0){d.open=true;S.keys--;sfxDoor();}else{sfxBlock();S.moveHistory.pop();return;}}}
S.warping=true;S.warpTX=gx;S.warpTY=gy;S.warpAnim=1;S.warps--;
sfxWarp();
}

function finishWarp(){
S.px=S.warpTX;S.py=S.warpTY;S.warping=false;S.warpAnim=0;
spawnParticles(S.px,S.py,'#f8a',12);
checkTile();
}

function undo(){
if(S.moveHistory.length===0||S.warping)return;
var h=S.moveHistory.pop();
S.px=h.px;S.py=h.py;S.warps=h.warps;S.gotStars=h.gotStars;S.keys=h.keys;
S.collected=h.collected.slice();
S.doors=h.doors.map(function(d){return{x:d.x,y:d.y,open:d.open};});
// Restore stars
for(var i=0;i<S.stars.length;i++){
var wasGot=h.collected.indexOf(S.stars[i].x+','+S.stars[i].y)>=0;
S.stars[i].got=wasGot;
if(wasGot){S.grid[S.stars[i].y][S.stars[i].x]=0;}else{S.grid[S.stars[i].y][S.stars[i].x]=2;}
}
updateHUD();
}

function restartLevel(){
loadLevel(S.level);
}

// Particles
function spawnParticles(gx,gy,color,count){
for(var i=0;i<count;i++){
S.particles.push({x:gx*TILE+TILE/2,y:gy*TILE+TILE/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:1,color:color});
}
}
function updateParticles(){
for(var i=S.particles.length-1;i>=0;i--){
var p=S.particles[i];
p.x+=p.vx;p.y+=p.vy;p.life-=0.03;
if(p.life<=0)S.particles.splice(i,1);
}
}

// Render
function render(){
S.time+=0.016;
X.fillStyle='#0d0d1f';
X.fillRect(0,0,C.width,C.height);

// Draw grid
for(var y=0;y<GH;y++){
for(var x=0;x<GW;x++){
var t=S.grid[y][x];
var px=x*TILE,py=y*TILE;
// Floor
if(t!==1){
X.fillStyle='rgba(30,30,60,0.4)';
X.fillRect(px+1,py+1,TILE-2,TILE-2);
// Grid lines
X.strokeStyle='rgba(60,60,100,0.15)';
X.lineWidth=1;
X.strokeRect(px+0.5,py+0.5,TILE-1,TILE-1);
}
// Wall
if(t===1){
X.fillStyle='#2a2a4e';
X.fillRect(px,py,TILE,TILE);
X.fillStyle='rgba(50,50,90,0.5)';
X.fillRect(px+2,py+2,TILE-4,3);
X.fillStyle='rgba(20,20,40,0.5)';
X.fillRect(px+2,py+TILE-5,TILE-4,3);
}
// Star
if(t===2){
drawStar(px+TILE/2,py+TILE/2,TILE*0.25,S.time);
}
// Exit portal
if(t===3){
drawPortal(px+TILE/2,py+TILE/2,TILE*0.35,S.time);
}
// Door
if(t===4){
var d=findDoor(x,y);
X.fillStyle=d&&d.open?'rgba(40,80,40,0.3)':'rgba(100,60,20,0.7)';
X.fillRect(px+3,py+3,TILE-6,TILE-6);
X.strokeStyle=d&&d.open?'rgba(80,200,80,0.5)':'rgba(200,120,40,0.8)';
X.lineWidth=2;
X.strokeRect(px+3,py+3,TILE-6,TILE-6);
// Keyhole
if(!d||!d.open){
X.fillStyle='#6a4010';
X.beginPath();X.arc(px+TILE/2,py+TILE/2,3,0,Math.PI*2);X.fill();
}
}
// Key
if(t===5){
drawKey(px+TILE/2,py+TILE/2,TILE*0.3,S.time);
}
// One-way arrows
if(t>=6&&t<=9){
X.fillStyle='rgba(80,80,160,0.15)';
X.fillRect(px+1,py+1,TILE-2,TILE-2);
X.fillStyle='rgba(120,120,220,0.5)';
X.font=''+Math.floor(TILE*0.4)+'px sans-serif';
X.textAlign='center';X.textBaseline='middle';
var arrow=t===6?'u25B2':t===7?'u25BC':t===8?'u25C0':'u25B6';
var ch=String.fromCharCode(parseInt(arrow.substring(1),16));
X.fillText(ch,px+TILE/2,py+TILE/2);
}
}
}

// Draw stars overlay (collected check)
// Draw player
if(!S.warping){
drawPlayer(S.px*TILE+TILE/2,S.py*TILE+TILE/2,TILE*0.3);
}else{
// Warp animation
var progress=1-S.warpAnim;
var fromX=S.moveHistory.length>0?S.moveHistory[S.moveHistory.length-1].px:TILE/2;
var fromY=S.moveHistory.length>0?S.moveHistory[S.moveHistory.length-1].py:TILE/2;
var fx=(fromX)*TILE+TILE/2;
var fy=(fromY)*TILE+TILE/2;
var tx=S.warpTX*TILE+TILE/2;
var ty=S.warpTY*TILE+TILE/2;
var cx=fx+(tx-fx)*(1-S.warpAnim);
var cy=fy+(ty-fy)*(1-S.warpAnim);
// Trail
for(var i=0;i<5;i++){
var a=S.warpAnim+i*0.1;
if(a>0&&a<1){
var tx2=fx+(tx-fx)*(1-a);
var ty2=fy+(ty-fy)*(1-a);
X.globalAlpha=a*0.3;
drawPlayer(tx2,ty2,TILE*0.3*(1-a*0.5));
}
}
X.globalAlpha=1;
drawPlayer(cx,cy,TILE*0.3);
S.warpAnim-=0.06;
if(S.warpAnim<=0){finishWarp();}
}

// Particles
for(var i=0;i<S.particles.length;i++){
var p=S.particles[i];
X.globalAlpha=p.life;
X.fillStyle=p.color;
X.beginPath();X.arc(p.x,p.y,3*p.life,0,Math.PI*2);X.fill();
}
X.globalAlpha=1;

// Walk anim decay
if(S.anim>0)S.anim-=0.08;

// Render loop
updateParticles();
requestAnimationFrame(render);
}

function drawPlayer(cx,cy,r){
// Glow
var glow=X.createRadialGradient(cx,cy,0,cx,cy,r*2.5);
glow.addColorStop(0,'rgba(100,200,255,0.4)');
glow.addColorStop(1,'rgba(100,200,255,0)');
X.fillStyle=glow;
X.fillRect(cx-r*3,cy-r*3,r*6,r*6);
// Body
var bounce=S.anim>0?Math.sin(S.anim*Math.PI)*3:0;
X.fillStyle='#4af';
X.beginPath();X.arc(cx,cy-bounce,r,0,Math.PI*2);X.fill();
X.fillStyle='#8cf';
X.beginPath();X.arc(cx-r*0.3,cy-bounce-r*0.3,r*0.35,0,Math.PI*2);X.fill();
// Eyes
X.fillStyle='#fff';
X.beginPath();X.arc(cx-r*0.3,cy-bounce-r*0.1,r*0.18,0,Math.PI*2);X.fill();
X.beginPath();X.arc(cx+r*0.3,cy-bounce-r*0.1,r*0.18,0,Math.PI*2);X.fill();
X.fillStyle='#0d0d1f';
X.beginPath();X.arc(cx-r*0.3,cy-bounce-r*0.1,r*0.09,0,Math.PI*2);X.fill();
X.beginPath();X.arc(cx+r*0.3,cy-bounce-r*0.1,r*0.09,0,Math.PI*2);X.fill();
}

function drawStar(cx,cy,r,t){
var rot=t*0.5;
var pulse=Math.sin(t*3)*0.1+1;
X.save();
X.translate(cx,cy);
X.rotate(rot);
X.scale(pulse,pulse);
// Glow
var glow=X.createRadialGradient(0,0,0,0,0,r*2);
glow.addColorStop(0,'rgba(255,220,80,0.3)');
glow.addColorStop(1,'rgba(255,220,80,0)');
X.fillStyle=glow;
X.fillRect(-r*2,-r*2,r*4,r*4);
// Star shape
X.fillStyle='#fd8';
X.beginPath();
for(var i=0;i<10;i++){
var angle=(i*Math.PI/5)-Math.PI/2;
var radius=i%2===0?r:r*0.4;
X.lineTo(Math.cos(angle)*radius,Math.sin(angle)*radius);
}
X.closePath();X.fill();
X.strokeStyle='#fa6';X.lineWidth=1.5;X.stroke();
X.restore();
}

function drawPortal(cx,cy,r,t){
var rot=t*2;
// Outer glow
var glow=X.createRadialGradient(cx,cy,0,cx,cy,r*1.8);
var ready=S.gotStars>=S.starCount;
var c1=ready?'rgba(80,255,120,0.4)':'rgba(120,120,200,0.2)';
var c2=ready?'rgba(80,255,120,0)':'rgba(120,120,200,0)';
glow.addColorStop(0,c1);glow.addColorStop(1,c2);
X.fillStyle=glow;
X.fillRect(cx-r*2,cy-r*2,r*4,r*4);
// Rings
for(var i=0;i<3;i++){
var rr=r*(1-i*0.25)*(1+Math.sin(t*3+i)*0.05);
X.strokeStyle=ready?'rgba(100,255,150,'+(0.5-i*0.1)+')':'rgba(150,150,220,'+(0.4-i*0.08)+')';
X.lineWidth=2;
X.beginPath();
for(var a=0;a<=Math.PI*2;a+=0.1){
var wobble=Math.sin(a*5+t*3+i)*2;
var rx=cx+Math.cos(a+rot*(i+1))*(rr+wobble);
var ry=cy+Math.sin(a+rot*(i+1))*(rr+wobble);
if(a===0)X.moveTo(rx,ry);else X.lineTo(rx,ry);
}
X.stroke();
}
// Center
X.fillStyle=ready?'rgba(100,255,150,0.3)':'rgba(150,150,220,0.2)';
X.beginPath();X.arc(cx,cy,r*0.4,0,Math.PI*2);X.fill();
}

function drawKey(cx,cy,r,t){
var bob=Math.sin(t*2)*2;
X.save();
X.translate(cx,cy+bob);
X.rotate(t*0.3);
// Glow
var glow=X.createRadialGradient(0,0,0,0,0,r*1.5);
glow.addColorStop(0,'rgba(150,255,150,0.3)');
glow.addColorStop(1,'rgba(150,255,150,0)');
X.fillStyle=glow;X.fillRect(-r*2,-r*2,r*4,r*4);
// Key ring
X.strokeStyle='#8f8';X.lineWidth=3;
X.beginPath();X.arc(-r*0.3,0,r*0.35,0,Math.PI*2);X.stroke();
// Shaft
X.strokeStyle='#8f8';X.lineWidth=3;
X.beginPath();X.moveTo(0,0);X.lineTo(r,0);X.stroke();
// Teeth
X.beginPath();X.moveTo(r*0.7,0);X.lineTo(r*0.7,r*0.3);X.stroke();
X.beginPath();X.moveTo(r,0);X.lineTo(r,r*0.25);X.stroke();
X.restore();
}

// Input
var touchStartX=0,touchStartY=0;
C.addEventListener('touchstart',function(e){
e.preventDefault();
var t=e.touches[0];
var rect=C.getBoundingClientRect();
touchStartX=t.clientX-rect.left;
touchStartY=t.clientY-rect.top;
},{passive:false});

C.addEventListener('touchend',function(e){
e.preventDefault();
var t=e.changedTouches[0];
var rect=C.getBoundingClientRect();
var ex=t.clientX-rect.left;
var ey=t.clientY-rect.top;
var dx=ex-touchStartX,dy=ey-touchStartY;
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist<15){
// Tap = warp
var gx=Math.floor(ex/TILE);
var gy=Math.floor(ey/TILE);
tryWarp(gx,gy);
}else{
// Swipe = move
if(Math.abs(dx)>Math.abs(dy)){
if(dx>0)tryMove(1,0);else tryMove(-1,0);
}else{
if(dy>0)tryMove(0,1);else tryMove(0,-1);
}
}
},{passive:false});

C.addEventListener('click',function(e){
var rect=C.getBoundingClientRect();
var cx=e.clientX-rect.left,cy=e.clientY-rect.top;
var gx=Math.floor(cx/TILE),gy=Math.floor(cy/TILE);
tryWarp(gx,gy);
});

document.addEventListener('keydown',function(e){
if(S.warping)return;
switch(e.key){
case 'ArrowUp':case 'w':case 'W':tryMove(0,-1);e.preventDefault();break;
case 'ArrowDown':case 's':case 'S':tryMove(0,1);e.preventDefault();break;
case 'ArrowLeft':case 'a':case 'A':tryMove(-1,0);e.preventDefault();break;
case 'ArrowRight':case 'd':case 'D':tryMove(1,0);e.preventDefault();break;
case 'r':case 'R':restartLevel();break;
case 'z':case 'Z':undo();break;
}
});

// Win modal
function showWin(){
var lv=LEVELS[S.level];
var stars=S.gotStars;
var warpsUsed=lv.warps-S.warps;
var warpsLeft=S.warps;
var rating=3;
if(warpsLeft===0&&lv.warps>0)rating=2;
if(S.gotStars<S.starCount)rating=1;
// Save progress
try{
var saved=JSON.parse(localStorage.getItem('hopwarp')||'{}');
if(!saved.levels)saved.levels={};
if(!saved.levels[S.level]||saved.levels[S.level].rating<rating)
saved.levels[S.level]={rating:rating,stars:stars};
saved.lastLevel=Math.max(saved.lastLevel||0,S.level+1);
localStorage.setItem('hopwarp',JSON.stringify(saved));
}catch(e){}
var mc=document.getElementById('modalContent');
var nextBtn=S.level<LEVELS.length-1?'<button class="btn-big" onclick="nextLevel()">Next Level</button>':'';
mc.innerHTML='<h2>Level Complete!</h2><p>'+lv.name+'</p><div class="stars-display">'+drawRatingStars(rating)+'</div><p>Stars: '+stars+'/'+S.starCount+' &middot; Warps used: '+warpsUsed+'</p><button class="btn-big" onclick="restartLevel()">Replay</button> '+nextBtn+' <button class="btn-big sec" onclick="closeModal()">Level Select</button>';
document.getElementById('modal').className='show';
}

function drawRatingStars(r){
var s='';
for(var i=0;i<3;i++)s+=(i<r)?'\u2605':'\u2606';
return s;
}

function nextLevel(){
closeModal();
if(S.level<LEVELS.length-1){loadLevel(S.level+1);}
}
function closeModal(){
document.getElementById('modal').className='';
buildLevelSelect();
}

// Level select
function toggleLevelSelect(){
var ls=document.getElementById('levelSelect');
if(ls.className==='show'){ls.className='';}
else{buildLevelSelect();ls.className='show';}
}

function buildLevelSelect(){
var saved={};
try{saved=JSON.parse(localStorage.getItem('hopwarp')||'{}');}catch(e){}
var grid=document.getElementById('lvlGrid');
grid.innerHTML='';
for(var i=0;i<LEVELS.length;i++){
var btn=document.createElement('div');
btn.className='lvl-btn';
var unlocked=(i===0)||(saved.lastLevel&&saved.lastLevel>=i);
var completed=saved.levels&&saved.levels[i];
if(!unlocked)btn.className+=' locked';
if(completed)btn.className+=' completed';
if(i===S.level)btn.className+=' current';
btn.textContent=(i+1);
if(completed){
var ms=document.createElement('div');
ms.className='mini-stars';
ms.textContent=completed.rating+'\u2605';
btn.appendChild(ms);
}
if(unlocked){
btn.onclick=(function(idx){return function(){loadLevel(idx);document.getElementById('levelSelect').className='';startBGM();};})(i);
}
grid.appendChild(btn);
}
}

// Tutorial
function showTutorial(){
var tc=document.getElementById('tutContent');
tc.innerHTML='<h3>How to Play Hop Warp</h3>'+
'<p><span class="key">WASD</span> or <span class="key">Arrows</span> to walk</p>'+
'<p><span class="key">Click</span> or <span class="key">Tap</span> any tile to WARP there</p>'+
'<p><span class="key">Swipe</span> on mobile to walk</p>'+
'<p>Collect all <span style="color:#ff8">stars</span> to open the exit portal</p>'+
'<p>Each level has limited <span style="color:#f8a">warp charges</span> \u2014 use them wisely!</p>'+
'<p>Pick up <span style="color:#8f8">keys</span> to open doors</p>'+
'<p><span class="key">Z</span> to undo &middot; <span class="key">R</span> to restart</p>'+
'<button class="btn-big" onclick="document.getElementById(\'tutorial\').className=\'\'">Start Playing</button>';
document.getElementById('tutorial').className='show';
}

// Init
function init(){
initAudio();
loadLevel(0);
// Show tutorial on first visit
try{
if(!localStorage.getItem('hopwarp')){
showTutorial();
localStorage.setItem('hopwarp','{}');
}
}catch(e){}
render();
}

// Cleanup
var rafId=null;
function cleanup(){
stopBGM();
if(AC){AC.close().catch(function(){});AC=null;}
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
if(document.hidden){stopBGM();}
else if(AC&&!bgmTimer){startBGM();}
});

// Start
init();
</script>
