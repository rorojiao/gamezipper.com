<script>
// ==================== AUDIO SYSTEM (Web Audio API ASMR) ====================
let audioCtx = null;
let soundEnabled = true;

function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, dur, type, vol, freqEnd) {
  if (!soundEnabled) return;
  const ctx = getAudio();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  if (freqEnd !== undefined) {
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, freqEnd), ctx.currentTime + dur);
  }
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(vol || 0.15, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + dur);
}

function playNoise(dur, vol, filterFreq) {
  if (!soundEnabled) return;
  const ctx = getAudio();
  if (!ctx) return;
  const bufSize = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = filterFreq || 800;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(vol || 0.08, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  src.start();
}

// ASMR sound effects
function sndDyeSplash() {
  playNoise(0.25, 0.12, 600);
  playTone(400, 0.2, 'sine', 0.1, 200);
  setTimeout(() => playTone(300, 0.15, 'triangle', 0.06, 150), 80);
}
function sndSelect() {
  playTone(600, 0.08, 'sine', 0.08);
}
function sndClick() {
  playTone(500, 0.05, 'square', 0.05, 400);
}
function sndUndo() {
  playTone(350, 0.15, 'sawtooth', 0.06, 550);
}
function sndHint() {
  playTone(800, 0.1, 'sine', 0.08);
  setTimeout(() => playTone(1000, 0.1, 'sine', 0.06), 100);
}
function sndStar() {
  playTone(880, 0.15, 'triangle', 0.1);
  setTimeout(() => playTone(1100, 0.15, 'triangle', 0.08), 120);
  setTimeout(() => playTone(1320, 0.2, 'triangle', 0.08), 240);
}
function sndWin() {
  // Celebration fanfare
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'triangle', 0.12), i * 120));
  setTimeout(() => playTone(1047, 0.4, 'sine', 0.1), 480);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-toggle');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundEnabled);
  localStorage.setItem('tie-dye-sound', soundEnabled ? '1' : '0');
  if (soundEnabled) sndClick();
}

// ==================== GAME LOGIC ====================
// Game Constants
const GRID_SIZE = 12;
const CELL_SIZE = 400 / GRID_SIZE;
const TIERS = [
  {name:"Beginner",start:1,end:10,colors:2},
  {name:"Easy",start:11,end:20,colors:3},
  {name:"Medium",start:21,end:30,colors:4},
  {name:"Hard",start:31,end:40,colors:5},
  {name:"Expert",start:41,end:50,colors:6}
];
const DYE_COLORS = [
  {name:"Red",hsl:[0,80,50],hex:"#e63946"},
  {name:"Yellow",hsl:[50,90,50],hex:"#f4a261"},
  {name:"Blue",hsl:[220,80,50],hex:"#457b9d"},
  {name:"Green",hsl:[140,70,45],hex:"#2a9d8f"},
  {name:"Purple",hsl:[280,70,50],hex:"#9b5de5"},
  {name:"Orange",hsl:[30,90,55],hex:"#fb8500"},
  {name:"Pink",hsl:[340,80,65],hex:"#ff006e"},
  {name:"Teal",hsl:[180,70,45],hex:"#06d6a0"}
];

// Game State
let gameState = {
  currentLevel: 1,
  grid: [],
  targetGrid: [],
  history: [],
  dyeCount: 0,
  selectedDye: null,
  levelsCompleted: {},
  totalStars: 0
};

// Canvas
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const targetCanvas = document.getElementById('target-canvas');
const targetCtx = targetCanvas.getContext('2d');

// Initialize
function init() {
  // Restore sound preference
  const savedSound = localStorage.getItem('tie-dye-sound');
  if (savedSound === '0') toggleSound();
  loadProgress();
  updateStats();
  setupTouchHandlers();
}

function loadProgress() {
  const saved = localStorage.getItem('tie-dye-progress');
  if (saved) {
    try {
      gameState.levelsCompleted = JSON.parse(saved);
      gameState.totalStars = Object.values(gameState.levelsCompleted).reduce((a,b) => a + (b.stars || 0), 0);
    } catch(e) { gameState.levelsCompleted = {}; }
  }
}

function saveProgress() {
  localStorage.setItem('tie-dye-progress', JSON.stringify(gameState.levelsCompleted));
  updateStats();
}

function updateStats() {
  const completed = Object.keys(gameState.levelsCompleted).length;
  document.getElementById('stat-completed').textContent = completed;
  document.getElementById('stat-stars').textContent = gameState.totalStars;

  let currentTier = "Beginner";
  for (const tier of TIERS) {
    if (completed >= tier.end) currentTier = tier.name;
  }
  document.getElementById('stat-tier').textContent = currentTier;
}

// Screen Management
function showMenu() {
  document.getElementById('menu-screen').style.display = 'flex';
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('complete-modal').style.display = 'none';
  updateStats();
}

function showLevelSelect() {
  sndClick();
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('complete-modal').style.display = 'none';
  renderTierNav();
  renderLevelGrid();
}

function renderTierNav() {
  const nav = document.getElementById('tier-nav');
  nav.innerHTML = '';

  TIERS.forEach((tier, i) => {
    const btn = document.createElement('button');
    btn.className = 'tier-btn';
    btn.textContent = tier.name;
    btn.onclick = () => selectTier(i);
    if (i === currentTierIndex) btn.classList.add('active');
    nav.appendChild(btn);
  });
}

let currentTierIndex = 0;

function selectTier(index) {
  sndClick();
  currentTierIndex = index;
  document.querySelectorAll('.tier-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
  renderLevelGrid();
}

function renderLevelGrid() {
  const tier = TIERS[currentTierIndex];
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';

  for (let level = tier.start; level <= tier.end; level++) {
    const btn = document.createElement('button');
    btn.className = 'level-btn';

    const completed = gameState.levelsCompleted[level];
    if (completed) {
      btn.classList.add('completed');
      btn.innerHTML = `<span class="level-num">${level}</span><span class="stars">${'★'.repeat(completed.stars || 0)}${'☆'.repeat(3 - (completed.stars || 0))}</span>`;
    } else if (level === tier.start || gameState.levelsCompleted[level - 1]) {
      btn.innerHTML = `<span class="level-num">${level}</span>`;
    } else {
      btn.classList.add('locked');
      btn.innerHTML = '🔒';
    }

    if (!btn.classList.contains('locked')) {
      btn.onclick = () => startLevel(level);
    }

    grid.appendChild(btn);
  }
}

function startLevel(level) {
  sndClick();
  gameState.currentLevel = level;
  gameState.dyeCount = 0;
  gameState.history = [];
  gameState.selectedDye = null;

  generateLevel(level);
  renderGame();
  renderPalette();

  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('complete-modal').style.display = 'none';

  // Show tutorial for level 1
  if (level === 1) {
    showTutorial();
  }
}

// Level Generation
function generateLevel(level) {
  const tierIndex = TIERS.findIndex(t => level >= t.start && level <= t.end);
  const tier = TIERS[tierIndex];
  const numColors = tier.colors;
  const levelInTier = level - tier.start + 1;

  // Initialize blank grid
  gameState.grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));
  gameState.targetGrid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));

  // Generate pattern based on tier
  const availableColors = DYE_COLORS.slice(0, numColors);

  if (levelInTier <= 3) {
    // Simple solid patterns
    const color = availableColors[(levelInTier - 1) % numColors];
    for (let r = 2; r < GRID_SIZE - 2; r++) {
      for (let c = 2; c < GRID_SIZE - 2; c++) {
        gameState.targetGrid[r][c] = {hsl: [...color.hsl], intensity: 0.9};
      }
    }
  } else if (levelInTier <= 6) {
    // Gradient patterns
    const color1 = availableColors[0];
    const color2 = availableColors[1];
    for (let r = 2; r < GRID_SIZE - 2; r++) {
      for (let c = 2; c < GRID_SIZE - 2; c++) {
        const t = (r + c) / (GRID_SIZE * 2);
        const h = color1.hsl[0] + t * (color2.hsl[0] - color1.hsl[0]);
        gameState.targetGrid[r][c] = {hsl: [h, 75, 50], intensity: 0.85};
      }
    }
  } else if (levelInTier <= 8) {
    // Stripe patterns
    const colors = availableColors.slice(0, 2);
    for (let r = 2; r < GRID_SIZE - 2; r++) {
      const color = colors[r % 2];
      for (let c = 2; c < GRID_SIZE - 2; c++) {
        gameState.targetGrid[r][c] = {hsl: [...color.hsl], intensity: 0.9};
      }
    }
  } else {
    // Bullseye / spiral patterns
    const colors = availableColors;
    const centerX = Math.floor(GRID_SIZE / 2);
    const centerY = Math.floor(GRID_SIZE / 2);

    for (let r = 2; r < GRID_SIZE - 2; r++) {
      for (let c = 2; c < GRID_SIZE - 2; c++) {
        const dist = Math.sqrt((r - centerX) ** 2 + (c - centerY) ** 2);
        const colorIndex = Math.floor(dist / 2) % colors.length;
        const color = colors[colorIndex];
        gameState.targetGrid[r][c] = {hsl: [...color.hsl], intensity: 0.85};
      }
    }
  }

  document.getElementById('current-level').textContent = level;
  document.getElementById('dye-count').textContent = 0;
}

// Rendering
function renderGame() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw fabric texture
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const x = c * CELL_SIZE;
      const y = r * CELL_SIZE;

      ctx.strokeStyle = 'rgba(0,0,0,0.05)';
      ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);

      const cell = gameState.grid[r][c];
      if (cell && cell.intensity > 0.1) {
        const [h, s, l] = cell.hsl;
        ctx.fillStyle = `hsla(${h}, ${s}%, ${l}%, ${cell.intensity})`;
        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);

        // Add subtle texture
        ctx.fillStyle = `hsla(${h}, ${s}%, ${l + 10}%, ${cell.intensity * 0.3})`;
        ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, 2);
      }
    }
  }

  // Draw target preview
  renderTarget();
}

function renderTarget() {
  targetCanvas.width = 80;
  targetCanvas.height = 80;
  const targetCellSize = 80 / GRID_SIZE;

  targetCtx.fillStyle = '#fff';
  targetCtx.fillRect(0, 0, 80, 80);

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = gameState.targetGrid[r][c];
      if (cell && cell.intensity > 0.1) {
        const [h, s, l] = cell.hsl;
        targetCtx.fillStyle = `hsla(${h}, ${s}%, ${l}%, ${cell.intensity})`;
        targetCtx.fillRect(c * targetCellSize, r * targetCellSize, targetCellSize, targetCellSize);
      }
    }
  }
}

function renderPalette() {
  const palette = document.getElementById('dye-palette');
  const tier = TIERS.find(t => gameState.currentLevel >= t.start && gameState.currentLevel <= t.end);
  const numColors = tier.colors;
  const availableColors = DYE_COLORS.slice(0, numColors);

  palette.innerHTML = '';

  availableColors.forEach((color, i) => {
    const bottle = document.createElement('div');
    bottle.className = 'dye-bottle';
    bottle.dataset.colorIndex = i;

    const cap = document.createElement('div');
    cap.className = 'bottle-cap';
    bottle.appendChild(cap);

    const body = document.createElement('div');
    body.className = 'bottle-body';
    body.style.background = `linear-gradient(180deg, ${color.hex}, ${adjustColor(color.hex, -20)})`;
    bottle.appendChild(body);

    bottle.onclick = () => selectDye(i);

    palette.appendChild(bottle);
  });
}

function selectDye(index) {
  sndSelect();
  gameState.selectedDye = index;
  document.querySelectorAll('.dye-bottle').forEach((bottle, i) => {
    bottle.classList.toggle('selected', i === index);
  });
}

function adjustColor(hex, amount) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + amount));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
  const b = Math.max(0, Math.min(255, (num & 0x000FF) + amount));
  return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
}

// Dye Application
function applyDye(row, col) {
  if (gameState.selectedDye === null) return;
  if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return;

  const color = DYE_COLORS[gameState.selectedDye];

  // Save state for undo
  const prevGrid = gameState.grid.map(row => row.map(cell => cell ? {...cell} : null));
  gameState.history.push(prevGrid);

  // Apply dye with flood fill
  applyDyeSpread(row, col, color.hsl);

  gameState.dyeCount++;
  document.getElementById('dye-count').textContent = gameState.dyeCount;

  sndDyeSplash();
  renderGame();
  checkWin();
}

function applyDyeSpread(startRow, startCol, colorHsl) {
  const visited = new Set();
  const queue = [[startRow, startCol, 1]];

  while (queue.length > 0) {
    const [r, c, intensity] = queue.shift();
    const key = `${r},${c}`;

    if (visited.has(key) || r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) continue;
    if (intensity <= 0.1) continue;

    visited.add(key);

    // Apply dye with blending
    const existing = gameState.grid[r][c];
    if (existing) {
      // Blend colors
      const [h1, s1, l1] = existing.hsl;
      const [h2, s2, l2] = colorHsl;
      const newIntensity = Math.min(1, existing.intensity + intensity * 0.5);

      // Hue blending (weighted average)
      let h;
      if (Math.abs(h1 - h2) > 180) {
        h = (h1 + h2 + 360) / 2 % 360;
      } else {
        h = (h1 + h2) / 2;
      }

      gameState.grid[r][c] = {
        hsl: [h, (s1 + s2) / 2, (l1 + l2) / 2],
        intensity: newIntensity
      };
    } else {
      gameState.grid[r][c] = {
        hsl: [...colorHsl],
        intensity: intensity
      };
    }

    // Spread to neighbors
    queue.push([r-1, c, intensity * 0.7]);
    queue.push([r+1, c, intensity * 0.7]);
    queue.push([r, c-1, intensity * 0.7]);
    queue.push([r, c+1, intensity * 0.7]);
  }
}

function undo() {
  if (gameState.history.length === 0) return;

  gameState.grid = gameState.history.pop();
  gameState.dyeCount = Math.max(0, gameState.dyeCount - 1);
  document.getElementById('dye-count').textContent = gameState.dyeCount;

  sndUndo();
  renderGame();
}

function checkWin() {
  let matchCount = 0;
  let totalCells = 0;

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const current = gameState.grid[r][c];
      const target = gameState.targetGrid[r][c];

      if (target && target.intensity > 0.1) {
        totalCells++;
        if (current && current.intensity > 0.1) {
          const hDiff = Math.abs(current.hsl[0] - target.hsl[0]);
          const hDiff2 = Math.abs(hDiff - 360);
          const minHDiff = Math.min(hDiff, hDiff2);

          if (minHDiff < 30 && Math.abs(current.intensity - target.intensity) < 0.3) {
            matchCount++;
          }
        }
      }
    }
  }

  const accuracy = totalCells > 0 ? matchCount / totalCells : 0;

  if (accuracy >= 0.7) {
    setTimeout(() => showComplete(accuracy), 500);
  }
}

function showComplete(accuracy) {
  const stars = accuracy >= 0.95 ? 3 : accuracy >= 0.85 ? 2 : 1;

  document.getElementById('modal-stars').textContent = '★'.repeat(stars) + '☆'.repeat(3 - stars);
  document.getElementById('score-value').textContent = Math.round(accuracy * 100) + '%';

  // Save progress
  const prevStars = (gameState.levelsCompleted[gameState.currentLevel] && gameState.levelsCompleted[gameState.currentLevel].stars) || 0;
  if (stars > prevStars) {
    gameState.levelsCompleted[gameState.currentLevel] = {stars};
    gameState.totalStars += stars - prevStars;
    saveProgress();
  }

  sndWin();
  setTimeout(() => { for (let i = 0; i < stars; i++) setTimeout(() => sndStar(), i * 200); }, 300);
  document.getElementById('complete-modal').style.display = 'flex';
}

function nextLevel() {
  sndClick();
  if (gameState.currentLevel < 50) {
    startLevel(gameState.currentLevel + 1);
  } else {
    showLevelSelect();
  }
}

function resetProgress() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    localStorage.removeItem('tie-dye-progress');
    gameState.levelsCompleted = {};
    gameState.totalStars = 0;
    updateStats();
    renderLevelGrid();
    sndClick();
  }
}

// Tutorial
function showTutorial() {
  const tutorial = document.createElement('div');
  tutorial.className = 'tutorial-overlay';
  tutorial.innerHTML = `
    <div class="tutorial-box">
      <h3 class="tutorial-title">🎨 Welcome to Tie Dye!</h3>
      <p class="tutorial-text">Select a dye color from the bottom panel, then tap the fabric to apply it. Colors spread and blend together. Match the target pattern to complete each level!</p>
      <button class="tutorial-btn" onclick="sndClick();this.parentElement.parentElement.remove()">Got it!</button>
    </div>
  `;
  document.body.appendChild(tutorial);
}

// Touch/Mouse Handlers
function setupTouchHandlers() {
  // Helper to get grid coords from event position
  function getGridPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (clientX - rect.left) * scaleX;
    const y = (clientY - rect.top) * scaleY;
    const col = Math.floor(x / CELL_SIZE);
    const row = Math.floor(y / CELL_SIZE);
    return {row, col};
  }

  canvas.addEventListener('mousedown', (e) => {
    if (gameState.selectedDye !== null) {
      const {row, col} = getGridPos(e.clientX, e.clientY);
      applyDye(row, col);
    }
  });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (gameState.selectedDye !== null) {
      const touch = e.changedTouches[0];
      const {row, col} = getGridPos(touch.clientX, touch.clientY);
      applyDye(row, col);
    }
  });
}

// Hint System
let hintTimeout = null;
function showHint() {
  if (gameState.dyeCount >= 15) {
    alert('Try using fewer dye applications for a higher score!');
    return;
  }

  // Find a cell that needs dye
  for (let r = 2; r < GRID_SIZE - 2; r++) {
    for (let c = 2; c < GRID_SIZE - 2; c++) {
      const target = gameState.targetGrid[r][c];
      const current = gameState.grid[r][c];

      if (target && target.intensity > 0.5 && (!current || current.intensity < 0.3)) {
        // Select the best dye color
        const tier = TIERS.find(t => gameState.currentLevel >= t.start && gameState.currentLevel <= t.end);
        const availableColors = DYE_COLORS.slice(0, tier.colors);

        let bestColorIndex = 0;
        let bestDiff = Infinity;

        availableColors.forEach((color, i) => {
          const hDiff = Math.abs(color.hsl[0] - target.hsl[0]);
          if (hDiff < bestDiff) {
            bestDiff = hDiff;
            bestColorIndex = i;
          }
        });

        selectDye(bestColorIndex);
        sndHint();

        // Draw pulsing highlight on the cell
        if (hintTimeout) clearTimeout(hintTimeout);
        let pulseCount = 0;
        const pulseCell = () => {
          renderGame();
          if (pulseCount >= 6) return;
          ctx.strokeStyle = pulseCount % 2 === 0 ? '#ff0' : 'rgba(255,255,0,0.3)';
          ctx.lineWidth = 4;
          ctx.strokeRect(c * CELL_SIZE + 2, r * CELL_SIZE + 2, CELL_SIZE - 4, CELL_SIZE - 4);
          pulseCount++;
          hintTimeout = setTimeout(pulseCell, 200);
        };
        pulseCell();
        return;
      }
    }
  }
}

// Initialize
init();
</script>
