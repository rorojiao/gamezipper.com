var CELL_GAP=4;

/* ==================== STATE ==================== */
var state={
  levelIdx:0,
  grid:null,      // 2D array: null=empty, {color, pathIdx}=occupied
  paths:[],       // Array of {color, plug, socket, cells:[[r,c]...]}
  activePath:null,// Index of path being dragged
  cellSize:0,
  canvasSize:0,
  dpr:1,
  rafId:null,

  musicOn:true,
  reduceMotion:false,
  audioCtx:null,
  bgmNodes:[],

/* ==================== AUDIO ==================== */
function initAudio(){
  if(state.audioCtx)return;
  try{
    var AC=window.AudioContext||window.webkitAudioContext;
    state.audioCtx=new AC();
  }catch(e){}
}

function playSFX(freq,dur,type){
  if(!state.soundOn||!state.audioCtx)return;
  try{
    var ctx=state.audioCtx;
    var osc=ctx.createOscillator();
    var gain=ctx.createGain();
    osc.type=type||'sine';
    osc.frequency.value=freq;
    gain.gain.setValueAtTime(0.15,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+(dur||0.15));
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+(dur||0.15));
  }catch(e){}
}

function sfxDraw(){playSFX(300+Math.random()*100,0.05,'square')}
function sfxConnect(){playSFX(523,0.1,'sine');setTimeout(function(){playSFX(659,0.1,'sine')},80)}
function sfxWin(){
  var notes=[523,659,784,1047];
  notes.forEach(function(n,i){setTimeout(function(){playSFX(n,0.15,'sine')},i*100)});
}
function sfxError(){playSFX(150,0.1,'sawtooth')}

function startBGM(){
  if(!state.musicOn||!state.audioCtx||state.bgmNodes.length>0)return;
  try{
    var ctx=state.audioCtx;
    var sr=ctx.sampleRate;
    var dur=16;
    var bufSize=sr*dur;
    var buf=ctx.createBuffer(1,bufSize,sr);
    var d=buf.getChannelData(0);
    var chords=[[261.63,329.63,392.00],[293.66,369.99,440.00],[329.63,415.30,493.88],[293.66,369.99,440.00]];
    var chordDur=dur/chords.length;
    for(var i=0;i<bufSize;i++){
      var t=i/sr;
      var ci=Math.min(Math.floor(t/chordDur),chords.length-1);
      var chord=chords[ci];
      var s=0;
      for(var n=0;n<chord.length;n++){
        var f=chord[n];
        s+=Math.sin(2*Math.PI*f*t)*0.06;
        s+=Math.sin(2*Math.PI*f*2*t)*0.015;
        s+=Math.sin(2*Math.PI*f*0.5*t)*0.03;
      }
      var fade=t%chordDur;
      var fadeIn=Math.min(fade/0.8,1);
      var fadeOut=Math.min((chordDur-fade)/0.8,1);
      s*=fadeIn*fadeOut;
      var lfo=Math.sin(2*Math.PI*0.25*t)*0.15+1;
      d[i]=s*lfo*0.5;
    }
    var src=ctx.createBufferSource();
    src.buffer=buf;
    src.loop=true;
    var filt=ctx.createBiquadFilter();
    filt.type='lowpass';
    filt.frequency.value=800;
    filt.Q.value=1;
    var g=ctx.createGain();
    g.gain.value=state.musicOn?0.25:0;
    src.connect(filt);
    filt.connect(g);
    g.connect(ctx.destination);
    src.start();
    state.bgmNodes=[src,filt,g];
  }catch(e){}
}

function stopBGM(){
  state.bgmNodes.forEach(function(n){
    try{if(n.stop)n.stop();}catch(e){}
    try{n.disconnect();}catch(e){}
  });
  state.bgmNodes=[];
}

/* ==================== SAVE / LOAD ==================== */
function loadProgress(){
  try{
    var data=JSON.parse(localStorage.getItem('plugmaster_save'));
    if(data&&data.completed){
      state.completed=data.completed;
      state.levelIdx=data.levelIdx||0;
      state.soundOn=data.soundOn!==false;
      state.musicOn=data.musicOn!==false;
    }
  }catch(e){}
}

function saveProgress(){
  try{
    localStorage.setItem('plugmaster_save',JSON.stringify({
      completed:state.completed,
      levelIdx:state.levelIdx,
      soundOn:state.soundOn,
      musicOn:state.musicOn,
      v:1
    }));
  }catch(e){}
}

/* ==================== GRID INIT ==================== */
function initLevel(idx){
  state.levelIdx=idx;
  var lv=LEVELS[idx];
  var size=lv.size;
  state.grid=[];
  for(var r=0;r<size;r++){
    state.grid.push(new Array(size).fill(null));
  }
  state.paths=[];
  // Mark walls
  lv.walls.forEach(function(w){
    state.grid[w[0]][w[1]]={color:'#333',isWall:true};
  });
  // Mark plugs/sockets
  lv.pairs.forEach(function(p,i){
    state.grid[p.plug[0]][p.plug[1]]={color:p.color,pathIdx:i,isPlug:true};
    state.grid[p.socket[0]][p.socket[1]]={color:p.color,pathIdx:i,isSocket:true};
    state.paths.push({color:p.color,plug:p.plug,socket:p.socket,cells:[]});
  });
  state.activePath=null;
  state.isDragging=false;
  state.hintCells=null;
  state.particles=[];
  computeCanvasSize();
  updateLevelLabel();
  draw();
}

function computeCanvasSize(){
  var lv=LEVELS[state.levelIdx];
  var size=lv.size;
  var maxDim=Math.min(window.innerWidth-20,460);
  state.cellSize=Math.floor((maxDim-CELL_GAP*(size+1))/size);
  state.canvasSize=state.cellSize*size+CELL_GAP*(size+1);
  var canvas=document.getElementById('game-canvas');
  state.dpr=window.devicePixelRatio||1;
  canvas.width=state.canvasSize*state.dpr;
  canvas.height=state.canvasSize*state.dpr;
  canvas.style.width=state.canvasSize+'px';
  canvas.style.height=state.canvasSize+'px';
  var ctx=canvas.getContext('2d');
  ctx.setTransform(state.dpr,0,0,state.dpr,0,0);
}

/* ==================== DRAWING ==================== */
function draw(){
  var canvas=document.getElementById('game-canvas');
  var ctx=canvas.getContext('2d');
  var lv=LEVELS[state.levelIdx];
  var size=lv.size;
  var cs=state.cellSize;
  var gap=CELL_GAP;

  // Clear
  ctx.fillStyle='#0d1117';
  ctx.fillRect(0,0,state.canvasSize,state.canvasSize);

  // Draw grid cells
  for(var r=0;r<size;r++){
    for(var c=0;c<size;c++){
      var x=gap+c*(cs+gap);
      var y=gap+r*(cs+gap);
      var cell=state.grid[r][c];

      // Background
      ctx.fillStyle='#161b22';
      roundRect(ctx,x,y,cs,cs,6);
      ctx.fill();

      // Wall
      if(cell&&cell.isWall){
        ctx.fillStyle='#2d333b';
        roundRect(ctx,x+2,y+2,cs-4,cs-4,4);
        ctx.fill();
        // Diagonal lines
        ctx.strokeStyle='#444';
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(x+6,y+6);
        ctx.lineTo(x+cs-6,y+cs-6);
        ctx.moveTo(x+cs-6,y+6);
        ctx.lineTo(x+6,y+cs-6);
        ctx.stroke();
      }

      // Path fill (cell occupied by a path)
      if(cell&&!cell.isWall&&!cell.isPlug&&!cell.isSocket){
        ctx.fillStyle=hexToRgba(cell.color,0.25);
        roundRect(ctx,x+1,y+1,cs-2,cs-2,5);
        ctx.fill();
      }
    }
  }

  // Draw paths
  state.paths.forEach(function(path,idx){
    if(path.cells.length===0)return;
    ctx.strokeStyle=path.color;
    ctx.lineWidth=cs*0.35;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.beginPath();
    path.cells.forEach(function(cell,i){
      var cx=gap+cell[1]*(cs+gap)+cs/2;
      var cy=gap+cell[0]*(cs+gap)+cs/2;
      if(i===0)ctx.moveTo(cx,cy);
      else ctx.lineTo(cx,cy);
    });
    ctx.stroke();

    // Glow effect for completed paths
    if(path.cells.length>0&&isPathComplete(idx)){
      ctx.shadowColor=path.color;
      ctx.shadowBlur=8;
      ctx.strokeStyle=hexToRgba(path.color,0.6);
      ctx.lineWidth=cs*0.35;
      ctx.stroke();
      ctx.shadowBlur=0;
    }
  });

  // Draw plugs and sockets
  lv.pairs.forEach(function(p,i){
    var path=state.paths[i];
    var connected=path.cells.length>0&&isPathComplete(i);

    // Socket (hollow circle)
    drawSocket(ctx,p.socket,cs,gap,p.color,connected);

    // Plug (filled circle)
    drawPlug(ctx,p.plug,cs,gap,p.color,connected);
  });

  // Draw hint cells
  if(state.hintCells){
    state.hintCells.forEach(function(cell){
      var x=gap+cell[1]*(cs+gap);
      var y=gap+cell[0]*(cs+gap);
      ctx.strokeStyle='rgba(255,255,255,0.5)';
      ctx.lineWidth=2;
      ctx.setLineDash([4,4]);
      roundRect(ctx,x+1,y+1,cs-2,cs-2,5);
      ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  // Draw particles
  state.particles.forEach(function(pt){
    ctx.fillStyle=hexToRgba(pt.color,pt.life);
    ctx.beginPath();
    ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);
    ctx.fill();
  });
}

function drawPlug(ctx,pos,cs,gap,color,glow){
  var cx=gap+pos[1]*(cs+gap)+cs/2;
  var cy=gap+pos[0]*(cs+gap)+cs/2;
  var rad=cs*0.32;

  if(glow){
    ctx.shadowColor=color;
    ctx.shadowBlur=12;
  }

  // Outer ring
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.arc(cx,cy,rad,0,Math.PI*2);
  ctx.fill();

  // Inner circle (plug prong)
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(cx,cy,rad*0.5,0,Math.PI*2);
  ctx.fill();

  // Two prong lines
  ctx.strokeStyle='#fff';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(cx-rad*0.25,cy-rad*0.2);
  ctx.lineTo(cx-rad*0.25,cy+rad*0.2);
  ctx.moveTo(cx+rad*0.25,cy-rad*0.2);
  ctx.lineTo(cx+rad*0.25,cy+rad*0.2);
  ctx.stroke();

  ctx.shadowBlur=0;
}

function drawSocket(ctx,pos,cs,gap,color,glow){
  var cx=gap+pos[1]*(cs+gap)+cs/2;
  var cy=gap+pos[0]*(cs+gap)+cs/2;
  var rad=cs*0.32;

  if(glow){
    ctx.shadowColor=color;
    ctx.shadowBlur=12;
  }

  // Outer ring
  ctx.strokeStyle=color;
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.arc(cx,cy,rad,0,Math.PI*2);
  ctx.stroke();

  // Inner dot
  ctx.fillStyle=hexToRgba(color,0.3);
  ctx.beginPath();
  ctx.arc(cx,cy,rad*0.4,0,Math.PI*2);
  ctx.fill();

  // Two socket holes
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.arc(cx-rad*0.25,cy,2,0,Math.PI*2);
  ctx.arc(cx+rad*0.25,cy,2,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function hexToRgba(hex,a){
  var r=parseInt(hex.slice(1,3),16);
  var g=parseInt(hex.slice(3,5),16);
  var b=parseInt(hex.slice(5,7),16);
  return'rgba('+r+','+g+','+b+','+a+')';
}

/* ==================== GAME LOGIC ==================== */
function isPathComplete(idx){
  var path=state.paths[idx];
  if(path.cells.length<2)return false;
  var last=path.cells[path.cells.length-1];
  return last[0]===path.socket[0]&&last[1]===path.socket[1];
}

function isAllConnected(){
  for(var i=0;i<state.paths.length;i++){
    if(!isPathComplete(i))return false;
  }
  return true;
}

function isAllFilled(){
  var lv=LEVELS[state.levelIdx];
  var size=lv.size;
  for(var r=0;r<size;r++){
    for(var c=0;c<size;c++){
      var cell=state.grid[r][c];
      if(!cell||cell.isWall)return false;
      if(!cell.isPlug&&!cell.isSocket){
        // Check if this cell is part of a path
        var inPath=false;
        state.paths.forEach(function(p){
          p.cells.forEach(function(pc){
            if(pc[0]===r&&pc[1]===c)inPath=true;
          });
        });
        if(!inPath)return false;
      }
    }
  }
  return true;
}

function getCellFromPoint(x,y){
  var lv=LEVELS[state.levelIdx];
  var size=lv.size;
  var cs=state.cellSize;
  var gap=CELL_GAP;
  var c=Math.floor((x-gap)/(cs+gap));
  var r=Math.floor((y-gap)/(cs+gap));
  if(r<0||r>=size||c<0||c>=size)return null;
  return[r,c];
}

function isAdjacent(c1,c2){
  var dr=Math.abs(c1[0]-c2[0]);
  var dc=Math.abs(c1[1]-c2[1]);
  return(dr+dc===1);
}

function clearPath(idx){
  var path=state.paths[idx];
  path.cells.forEach(function(cell){
    var g=state.grid[cell[0]][cell[1]];
    if(g&&!g.isPlug&&!g.isSocket&&!g.isWall){
      state.grid[cell[0]][cell[1]]=null;
    }
  });
  path.cells=[];
}

function removeCellsAfter(idx,cell){
  var path=state.paths[idx];
  var foundIdx=-1;
  for(var i=0;i<path.cells.length;i++){
    if(path.cells[i][0]===cell[0]&&path.cells[i][1]===cell[1]){
      foundIdx=i;
      break;
    }
  }
  if(foundIdx>=0&&foundIdx<path.cells.length-1){
    for(var i=path.cells.length-1;i>foundIdx;i--){
      var c=path.cells[i];
      var g=state.grid[c[0]][c[1]];
      if(g&&!g.isPlug&&!g.isSocket&&!g.isWall){
        state.grid[c[0]][c[1]]=null;
      }
      path.cells.pop();
    }
  }
}

function canEnterCell(r,c,excludePathIdx){
  var lv=LEVELS[state.levelIdx];
  var cell=state.grid[r][c];
  if(!cell)return true;
  if(cell.isWall)return false;
  if(cell.isPlug&&cell.pathIdx!==excludePathIdx)return false;
  if(cell.isSocket&&cell.pathIdx!==excludePathIdx)return false;
  if(cell.pathIdx!==undefined&&cell.pathIdx!==excludePathIdx)return false;
  return true;
}

function startPath(idx,r,c){
  var path=state.paths[idx];
  var plug=path.plug;
  if(r!==plug[0]||c!==plug[1])return false;
  clearPath(idx);
  path.cells=[[r,c]];
  state.activePath=idx;
  state.isDragging=true;
  state.lastCell=[r,c];
  sfxDraw();
  return true;
}

function extendPath(r,c){
  if(state.activePath===null)return;
  var idx=state.activePath;
  var path=state.paths[idx];
  var last=path.cells[path.cells.length-1];
  var lv=LEVELS[state.levelIdx];

  // Same cell
  if(last[0]===r&&last[1]===c)return;

  // Check if retracted (going back)
  if(path.cells.length>=2){
    var prev=path.cells[path.cells.length-2];
    if(prev[0]===r&&prev[1]===c){
      // Retract one step
      var removed=path.cells.pop();
      var g=state.grid[removed[0]][removed[1]];
      if(g&&!g.isPlug&&!g.isSocket&&!g.isWall){
        state.grid[removed[0]][removed[1]]=null;
      }
      state.lastCell=[r,c];
      return;
    }
  }

  // Must be adjacent
  if(!isAdjacent(last,[r,c]))return;

  // Check target cell
  var targetCell=state.grid[r][c];
  if(targetCell&&targetCell.isWall)return;
  if(targetCell&&targetCell.pathIdx!==undefined&&targetCell.pathIdx!==idx){
    // Hit another path — clear that path (Flow Free style)
    if(!targetCell.isPlug&&!targetCell.isSocket){
      clearPath(targetCell.pathIdx);
    }else{
      return;
    }
  }

  // Reaching the matching socket
  if(targetCell&&targetCell.isSocket&&targetCell.pathIdx===idx){
    path.cells.push([r,c]);
    state.lastCell=[r,c];
    sfxConnect();
    // Check win
    checkWin();
    return;
  }

  // Reaching wrong socket/plug
  if(targetCell&&targetCell.isSocket&&targetCell.pathIdx!==idx)return;
  if(targetCell&&targetCell.isPlug&&targetCell.pathIdx!==idx)return;

  // Already in this path — retract to that point
  for(var i=0;i<path.cells.length;i++){
    if(path.cells[i][0]===r&&path.cells[i][1]===c){
      removeCellsAfter(idx,[r,c]);
      state.lastCell=[r,c];
      return;
    }
  }

  // Add cell
  path.cells.push([r,c]);
  state.grid[r][c]={color:path.color,pathIdx:idx};
  state.lastCell=[r,c];
  sfxDraw();
}

function endDrag(){
  state.isDragging=false;
  // If path not connected to socket, keep partial path (user can continue from plug later)
  if(state.activePath!==null){
    var path=state.paths[state.activePath];
    if(path.cells.length>0&&!isPathComplete(state.activePath)){
      // Keep partial path for potential continuation
    }
  }
  state.activePath=null;
  state.lastCell=null;
  draw();
}

function checkWin(){
  if(isAllConnected()){
    var filled=isAllFilled();
    var stars=filled?3:2;
    // Bonus star if no unnecessary backtracks (simplified: always 3 if filled, 2 if not, min 1)
    if(stars<3&&state.paths.length<=3)stars=3; // Easy levels always 3
    var oldStars=state.completed[state.levelIdx]||0;
    if(stars>oldStars){
      state.completed[state.levelIdx]=stars;
    }
    saveProgress();
    sfxWin();
    spawnParticles();
    showWinOverlay(stars,filled);
  }
}

function spawnParticles(){
  var lv=LEVELS[state.levelIdx];
  var gap=CELL_GAP;
  var cs=state.cellSize;
  lv.pairs.forEach(function(p){
    var cx=gap+p.plug[1]*(cs+gap)+cs/2;
    var cy=gap+p.plug[0]*(cs+gap)+cs/2;
    for(var i=0;i<12;i++){
      var angle=Math.PI*2*i/12;
      var speed=2+Math.random()*3;
      state.particles.push({
        x:cx,y:cy,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        r:3+Math.random()*3,
        color:p.color,
        life:1
      });
    }
  });
  animateParticles();
}

function animateParticles(){
  if(state.particles.length===0)return;
  state.particles.forEach(function(pt){
    pt.x+=pt.vx;
    pt.y+=pt.vy;
    pt.vy+=0.1;
    pt.life-=0.02;
    pt.r*=0.97;
  });
  state.particles=state.particles.filter(function(pt){return pt.life>0});
  draw();
  if(state.particles.length>0){
    state.rafId=requestAnimationFrame(animateParticles);
  }
}

/* ==================== INPUT ==================== */
function onPointerDown(e){
  e.preventDefault();
  initAudio();
  if(state.musicOn)startBGM();
  var canvas=document.getElementById('game-canvas');
  var rect=canvas.getBoundingClientRect();
  var x=e.clientX-rect.left;
  var y=e.clientY-rect.top;
  var cell=getCellFromPoint(x,y);
  if(!cell)return;

  var r=cell[0],c=cell[1];
  var cellData=state.grid[r][c];

  // If touching a plug, start a new path
  if(cellData&&cellData.isPlug){
    startPath(cellData.pathIdx,r,c);
    draw();
    return;
  }

  // If touching end of an existing partial path, continue it
  if(cellData&&cellData.pathIdx!==undefined&&!cellData.isWall){
    var idx=cellData.pathIdx;
    var path=state.paths[idx];
    if(path.cells.length>0){
      var last=path.cells[path.cells.length-1];
      if(last[0]===r&&last[1]===c&&!isPathComplete(idx)){
        state.activePath=idx;
        state.isDragging=true;
        state.lastCell=[r,c];
        return;
      }
    }
  }

  // Touch any cell of an existing path to truncate
  if(cellData&&cellData.pathIdx!==undefined){
    removeCellsAfter(cellData.pathIdx,[r,c]);
    draw();
  }
}

function onPointerMove(e){
  if(!state.isDragging||state.activePath===null)return;
  e.preventDefault();
  var canvas=document.getElementById('game-canvas');
  var rect=canvas.getBoundingClientRect();
  var x=e.clientX-rect.left;
  var y=e.clientY-rect.top;
  var cell=getCellFromPoint(x,y);
  if(!cell)return;
  if(state.lastCell&&cell[0]===state.lastCell[0]&&cell[1]===state.lastCell[1])return;
  extendPath(cell[0],cell[1]);
  draw();
}

function onPointerUp(e){
  e.preventDefault();
  endDrag();
}

function onPointerCancel(e){
  endDrag();
}

/* ==================== UI ==================== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function updateLevelLabel(){
  var idx=state.levelIdx;
  var tier=Math.floor(idx/6);
  document.getElementById('level-label').textContent='Level '+(idx+1)+' - '+TIER_NAMES[tier];
  var stars=state.completed[idx]||0;
  var s='';
  for(var i=0;i<3;i++){
    s+=i<stars?'\u2605':'\u2606';
  }
  document.getElementById('star-display').textContent=s;
}

function showWinOverlay(stars,filled){
  var overlay=document.getElementById('win-overlay');
  var starsEl=document.getElementById('win-stars');
  var msgEl=document.getElementById('win-msg');
  var s='';
  for(var i=0;i<3;i++){
    s+=i<stars?'<span class="star-filled">\u2605</span>':'<span class="star-empty">\u2606</span>';
  }
  starsEl.innerHTML=s;
  if(filled){
    msgEl.textContent='Perfect! All cells filled!';
  }else if(stars>=3){
    msgEl.textContent='Excellent work!';
  }else{
    msgEl.textContent='Good job! Fill all cells for 3 stars!';
  }
  overlay.classList.add('active');

  // Hide next button on last level
  var nextBtn=document.getElementById('btn-next-level');
  if(state.levelIdx>=LEVELS.length-1){
    nextBtn.textContent='Back to Menu';
  }else{
    nextBtn.textContent='Next Level';
  }
}

function hideWinOverlay(){
  document.getElementById('win-overlay').classList.remove('active');
}

function buildLevelSelect(){
  var container=document.getElementById('tier-list');
  container.innerHTML='';
  for(var tier=0;tier<5;tier++){
    var section=document.createElement('div');
    section.className='tier-section';
    var header=document.createElement('div');
    header.className='tier-header';
    header.textContent=TIER_NAMES[tier];
    section.appendChild(header);
    var grid=document.createElement('div');
    grid.className='level-grid';
    for(var lv=tier*6;lv<tier*6+6;lv++){
      var cell=document.createElement('div');
      cell.className='level-cell';
      var isCompleted=state.completed[lv];
      var isUnlocked=lv===0||state.completed[lv-1];
      if(isCompleted){
        cell.classList.add('completed');
        cell.textContent=lv+1;
        var starsDiv=document.createElement('div');
        starsDiv.className='stars-mini';
        var s='';
        for(var i=0;i<3;i++)s+=i<isCompleted?'\u2605':'\u2606';
        starsDiv.textContent=s;
        cell.appendChild(starsDiv);
      }else if(isUnlocked){
        cell.classList.add('unlocked');
        if(lv===state.levelIdx)cell.classList.add('current');
        cell.textContent=lv+1;
      }else{
        cell.classList.add('locked');
        cell.textContent='\u25A0';
      }
      if(isUnlocked||isCompleted){
        (function(idx){
          cell.addEventListener('click',function(){
            initLevel(idx);
            showScreen('game-screen');
          });
        })(lv);
      }
      grid.appendChild(cell);
    }
    section.appendChild(grid);
    container.appendChild(section);
  }
}

function showHint(){
  // Highlight a plug that isn't connected yet
  for(var i=0;i<state.paths.length;i++){
    if(!isPathComplete(i)){
      state.hintCells=[state.paths[i].plug];
      draw();
      if(state.hintTimer)clearTimeout(state.hintTimer);
      state.hintTimer=setTimeout(function(){
        state.hintCells=null;
        draw();
      },2000);
      return;
    }
  }
  // All connected but maybe not filled
  sfxError();
}

function toggleSound(){
  state.soundOn=!state.soundOn;
  document.getElementById('ctrl-sound').classList.toggle('active',state.soundOn);
  saveProgress();
}

function toggleMusic(){
  state.musicOn=!state.musicOn;
  document.getElementById('ctrl-music').classList.toggle('active',state.musicOn);
  if(state.musicOn){initAudio();startBGM();}
  else{stopBGM();}
  saveProgress();
}

/* ==================== LOOP ==================== */
function loop(){
  draw();
  state.rafId=requestAnimationFrame(loop);
}

/* ==================== CLEANUP ==================== */
function cleanup(){
  if(state.rafId){cancelAnimationFrame(state.rafId);state.rafId=null;}
  if(state.hintTimer){clearTimeout(state.hintTimer);state.hintTimer=null;}
  stopBGM();
  if(state.audioCtx){try{state.audioCtx.close();}catch(e){}state.audioCtx=null;}
}

/* ==================== INIT ==================== */
function init(){
  loadProgress();

  var canvas=document.getElementById('game-canvas');

  // Pointer events
  canvas.addEventListener('pointerdown',onPointerDown);
  canvas.addEventListener('pointermove',onPointerMove);
  canvas.addEventListener('pointerup',onPointerUp);
  canvas.addEventListener('pointercancel',onPointerCancel);

  // Prevent touch scrolling on canvas
  canvas.addEventListener('touchstart',function(e){e.preventDefault()},{passive:false});
  canvas.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});

  // Menu buttons
  document.getElementById('btn-play').addEventListener('click',function(){
    initAudio();
    if(state.musicOn)startBGM();
    initLevel(state.levelIdx);
    showScreen('game-screen');
    state.rafId=requestAnimationFrame(loop);
  });
  document.getElementById('btn-levels').addEventListener('click',function(){
    buildLevelSelect();
    showScreen('select-screen');
  });
  document.getElementById('btn-settings-menu').addEventListener('click',function(){
    document.getElementById('settings-modal').classList.add('active');
  });

  // Game buttons
  document.getElementById('btn-back').addEventListener('click',function(){
    if(state.rafId){cancelAnimationFrame(state.rafId);state.rafId=null;}
    showScreen('menu-screen');
  });
  document.getElementById('btn-hint').addEventListener('click',showHint);
  document.getElementById('ctrl-reset').addEventListener('click',function(){
    initLevel(state.levelIdx);
  });
  document.getElementById('ctrl-prev').addEventListener('click',function(){
    if(state.levelIdx>0){initLevel(state.levelIdx-1);}
  });
  document.getElementById('ctrl-next').addEventListener('click',function(){
    if(state.levelIdx<LEVELS.length-1){initLevel(state.levelIdx+1);}
  });
  document.getElementById('ctrl-sound').addEventListener('click',toggleSound);
  document.getElementById('ctrl-music').addEventListener('click',toggleMusic);

  // Set initial toggle states
  document.getElementById('ctrl-sound').classList.toggle('active',state.soundOn);
  document.getElementById('ctrl-music').classList.toggle('active',state.musicOn);

  // Select screen back
  document.getElementById('btn-back-select').addEventListener('click',function(){
    showScreen('menu-screen');
  });

  // Win overlay buttons
  document.getElementById('btn-next-level').addEventListener('click',function(){
    hideWinOverlay();
    if(state.levelIdx<LEVELS.length-1){
      initLevel(state.levelIdx+1);
    }else{
      if(state.rafId){cancelAnimationFrame(state.rafId);state.rafId=null;}
      showScreen('menu-screen');
    }
  });
  document.getElementById('btn-replay').addEventListener('click',function(){
    hideWinOverlay();
    initLevel(state.levelIdx);
  });
  document.getElementById('btn-back-win').addEventListener('click',function(){
    hideWinOverlay();
    if(state.rafId){cancelAnimationFrame(state.rafId);state.rafId=null;}
    buildLevelSelect();
    showScreen('select-screen');
  });

  // Settings modal
  document.getElementById('btn-close-settings').addEventListener('click',function(){
    document.getElementById('settings-modal').classList.remove('active');
  });
  document.getElementById('toggle-sfx').addEventListener('click',function(){
    this.classList.toggle('on');
    state.soundOn=this.classList.contains('on');
    document.getElementById('ctrl-sound').classList.toggle('active',state.soundOn);
    saveProgress();
  });
  document.getElementById('toggle-music').addEventListener('click',function(){
    this.classList.toggle('on');
    state.musicOn=this.classList.contains('on');
    document.getElementById('ctrl-music').classList.toggle('active',state.musicOn);
    if(state.musicOn){initAudio();startBGM();}else{stopBGM();}
    saveProgress();
  });
  document.getElementById('toggle-motion').addEventListener('click',function(){
    this.classList.toggle('on');
    state.reduceMotion=this.classList.contains('on');
  });

  // Sync settings toggles
  document.getElementById('toggle-sfx').classList.toggle('on',state.soundOn);
  document.getElementById('toggle-music').classList.toggle('on',state.musicOn);

  // Resize
  window.addEventListener('resize',function(){
    if(document.getElementById('game-screen').classList.contains('active')){
      computeCanvasSize();
      draw();
    }
  });

  // Cleanup
  window.addEventListener('beforeunload',cleanup);
  document.addEventListener('visibilitychange',function(){
    if(document.hidden){
      if(state.rafId){cancelAnimationFrame(state.rafId);state.rafId=null;}
      stopBGM();
    }else{
      if(document.getElementById('game-screen').classList.contains('active')){
        state.rafId=requestAnimationFrame(loop);
        if(state.musicOn)startBGM();
      }
    }
  });

  // Show menu
  showScreen('menu-screen');
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}

})();
</script>
