name: Deploy to GitHub Pages

# ═══════════════════════════════════════════════════════════════════
# PLAN-D: Schedule-only deployment (2026-07-06)
# ═══════════════════════════════════════════════════════════════════
# This repo gets 100+ pushes/day from watchdog tunnel-rotation +
# dev pipeline. Every push triggering a deploy caused ~280 deploy
# attempts/day → GitHub Pages CDN "Deployment failed, try again later".
#
# STRATEGY: Deploy on a fixed schedule (every 2 hours) instead of on
# every push. Commits accumulate; the next scheduled run deploys the
# latest main. Max delay for content changes: 2 hours.
#
#   - gamezipper.com:  cron '7 */2 * * *'  (odd-offset to avoid overlap)
#   - gamezipper-tools: cron '37 */2 * * *' (30 min apart → no CDN conflict)
#
# Pushes NO LONGER trigger deploys. For urgent releases, use
# workflow_dispatch (Actions tab → Run workflow).
# ═══════════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '7 */2 * * *'  # every 2 hours at minute 7
  workflow_dispatch:        # manual trigger for urgent releases

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    continue-on-error: true  # CDN conflicts are non-fatal
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
      - name: Retry on failure
        if: failure()
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
