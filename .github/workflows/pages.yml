name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Run every 10 minutes to catch any missed deploys.
    # Combined with cancel-in-progress, this means at most 1 deploy per 10min,
    # regardless of how many commits land in that window.
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel ANY in-progress run when a new one starts.
# This is the core fix: 242 pushes/day → at most 1 active deploy at any time.
# No more CDN conflicts because there's never 2 concurrent deploys.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Check if deployment is needed
        id: check
        run: |
          # For scheduled runs, always deploy (to catch missed pushes).
          # For push events, the cancel-in-progress handles deduplication.
          echo "should_deploy=true" >> $GITHUB_OUTPUT
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.should_deploy != 'skip'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
