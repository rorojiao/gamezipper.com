name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress deployment when a new push arrives.
# This handles within-repo concurrent pushes from watchdog.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        # Retry on "Deployment failed, try again later" — this error is a
        # transient GitHub CDN issue caused by cross-repo concurrent deploys.
        # The watchdog pushes gamezipper.com + gamezipper-tools back-to-back,
        # and when both deploy jobs hit GitHub's CDN simultaneously, one fails.
        # Retrying after a short delay resolves it.
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
