name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Backup deploy every 10 minutes to catch any missed pushes.
    # With cancel-in-progress, this means at most 1 active deploy at a time.
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# CRITICAL FIX (2026-07-05): This repo gets 100+ pushes/day from watchdog + pipeline.
# Without this, concurrent deploys cause "Deployment failed, try again later" CDN errors.
# cancel-in-progress ensures only 1 deploy runs at a time — newer cancels older.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy with retry
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
      - name: Retry deployment on failure
        if: failure()
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
