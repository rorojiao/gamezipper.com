name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# ROOT CAUSE FIX (2026-07-06): This repo gets 100+ pushes/day from watchdog.
# Previous schedule:*/10 cron added 144 more deploys/day. All gone now.
# cancel-in-progress ensures only 1 deploy runs at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    continue-on-error: true  # CDN conflicts happen; don't send failure emails
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
      - name: Retry on failure
        id: retry_deployment
        if: failure()
        uses: actions/deploy-pages@v4
        with:
          error_count: 30
          reporting_interval: 5000
          timeout: 600000
