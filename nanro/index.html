try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}

function playTone(freq,dur,vol,type){
if(!sfxOn||!audioCtx)return;
try{
var o=audioCtx.createOscillator();var g=audioCtx.createGain();
o.type=type||'sine';o.frequency.value=freq;
g.gain.setValueAtTime(0,audioCtx.currentTime);

o.connect(g);g.connect(audioCtx.destination);
o.start();o.stop(audioCtx.currentTime+dur);
}catch(e){}
}

function startBGM(){
if(!musicOn||!audioCtx||bgmNodes.length)return;
try{
var sr=audioCtx.sampleRate;var dur=16;var bufSize=sr*dur;
var buf=audioCtx.createBuffer(1,bufSize,sr);var d=buf.getChannelData(0);
var chords=[[261.63,329.63,392],[293.66,369.99,440],[329.63,415.3,493.88],[293.66,369.99,440]];
var chordDur=dur/chords.length;
for(var i=0;i<bufSize;i++){
var t=i/sr;var ci=Math.min(Math.floor(t/chordDur),chords.length-1);var chord=chords[ci];
var s=0;
for(var n=0;n<chord.length;n++){var f=chord[n];s+=Math.sin(2*Math.PI*f*t)*0.04;s+=Math.sin(2*Math.PI*f*2*t)*0.01;}
var fade=t%chordDur;var fadeIn=Math.min(fade/0.8,1);var fadeOut=Math.min((chordDur-fade)/0.8,1);
s*=fadeIn*fadeOut;d[i]=s;
}
var src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
var filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=800;

}catch(e){}
}

}

});
document.getElementById('btn-replay').addEventListener('click',startLevel);
document.getElementById('btn-menu-win').addEventListener('click',showMenu);
document.getElementById('btn-levels-back').addEventListener('click',function(){
document.getElementById('level-select').style.display='none';
showMenu();
});
document.getElementById('btn-settings-back').addEventListener('click',function(){
document.getElementById('settings-modal').style.display='none';
});

document.getElementById('toggle-sfx').addEventListener('click',function(){
this.classList.toggle('on');sfxOn=this.classList.contains('on');
});
document.getElementById('toggle-music').addEventListener('click',function(){
this.classList.toggle('on');musicOn=this.classList.contains('on');
if(musicOn)startBGM();else stopBGM();
});
document.getElementById('toggle-autocheck').addEventListener('click',function(){
this.classList.toggle('on');autoCheck=this.classList.contains('on');
});

document.addEventListener('keydown',function(e){
if(!isPlaying)return;
var k=e.key;
if(k>='1'&&k<='4'){selectedNum=parseInt(k);
document.querySelectorAll('.num-btn').forEach(function(b){b.classList.remove('on')});
var btn=document.querySelector('.num-btn[data-n="'+k+'"]');if(btn)btn.classList.add('on');
}
if(k==='0'||k==='Delete'||k==='Backspace'){selectedNum=0;
document.querySelectorAll('.num-btn').forEach(function(b){b.classList.remove('on')});
document.querySelector('.num-btn.erase').classList.add('on');
}
if(k==='h'||k==='H')doHint();
if(k==='r'||k==='R')doRestart();
if(k==='Escape')showMenu();
if(k==='Enter')doCheck();
});
}

function startLevel(){
document.getElementById('menu-screen').style.display='none';
document.getElementById('win-overlay').style.display='none';
document.getElementById('level-select').style.display='none';
isPlaying=true;
var lvl=LEVELS[currentLevel];
playerGrid=[];
for(var r=0;r<lvl.rows;r++){
playerGrid[r]=[];
for(var c=0;c<lvl.cols;c++)playerGrid[r][c]=0;
}
var clues=lvl.clues;
for(var key in clues){
var parts=key.split(',');var r=parseInt(parts[0]);var c=parseInt(parts[1]);
playerGrid[r][c]=clues[key];
}
hintsLeft=3;revealedCells=[];
selectedNum=1;
document.querySelectorAll('.num-btn').forEach(function(b){b.classList.remove('on')});
document.querySelector('.num-btn[data-n="1"]').classList.add('on');
resizeCanvas();
renderGrid();
if(musicOn)startBGM();
var prog=loadProgress();prog.lastLevel=currentLevel;saveProgress(prog);
}

function resizeCanvas(){
var lvl=LEVELS[currentLevel];
var maxW=Math.min(window.innerWidth-16,560);
var maxH=window.innerHeight-220;
var cellW=Math.floor(maxW/lvl.cols);
var cellH=Math.floor(maxH/lvl.rows);
var cellSize=Math.max(28,Math.min(cellW,cellH,60));
canvas.width=cellSize*lvl.cols;
canvas.height=cellSize*lvl.rows;
}

function handleClick(x,y){
var lvl=LEVELS[currentLevel];
var cellSize=canvas.width/lvl.cols;
var c=Math.floor(x/cellSize);
var r=Math.floor(y/(canvas.height/lvl.rows));
if(r<0||r>=lvl.rows||c<0||c>=lvl.cols)return;
var key=r+','+c;
if(lvl.clues[key])return;
if(revealedCells.indexOf(key)>=0)return;
playerGrid[r][c]=selectedNum;
if(selectedNum>0)sfxPlace();else sfxErase();
renderGrid();
if(autoCheck&&checkWin())onWin();
}

function renderGrid(){
var lvl=LEVELS[currentLevel];
var cs=canvas.width/lvl.cols;
var rs=canvas.height/lvl.rows;
ctx.clearRect(0,0,canvas.width,canvas.height);

for(var r=0;r<lvl.rows;r++){
for(var c=0;c<lvl.cols;c++){
var x=c*cs;var y=r*rs;
var rid=lvl.region_map[r][c];
var bg=regionColors[rid%regionColors.length];
ctx.fillStyle=bg;ctx.globalAlpha=0.12;
ctx.fillRect(x,y,cs,rs);
ctx.globalAlpha=1;

var clueKey=r+','+c;
if(lvl.clues[clueKey]){
ctx.fillStyle='#4488ff';
ctx.font='bold '+Math.floor(cs*0.5)+'px system-ui';
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(lvl.clues[clueKey],x+cs/2,y+rs/2);
}else if(playerGrid[r]&&playerGrid[r][c]>0){
var color='#e0e0ff';
if(revealedCells.indexOf(clueKey)>=0)color='#fbbf24';
if(autoCheck){
var sol=lvl.solution[r][c];
if(playerGrid[r][c]!==sol)color='#ef4444';
}
ctx.fillStyle=color;
ctx.font='bold '+Math.floor(cs*0.5)+'px system-ui';
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(playerGrid[r][c],x+cs/2,y+rs/2);
}

// Region borders
ctx.strokeStyle='#5a5a8a';ctx.lineWidth=1;
var top=r>0&&lvl.region_map[r-1][c]!==rid;
var bot=r<lvl.rows-1&&lvl.region_map[r+1][c]!==rid;
var left=c>0&&lvl.region_map[r][c-1]!==rid;
var right=c<lvl.cols-1&&lvl.region_map[r][c+1]!==rid;
ctx.beginPath();
if(top){ctx.moveTo(x,y);ctx.lineTo(x+cs,y)}
if(bot){ctx.moveTo(x,y+rs);ctx.lineTo(x+cs,y+rs)}
if(left){ctx.moveTo(x,y);ctx.lineTo(x,y+rs)}
if(right){ctx.moveTo(x+cs,y);ctx.lineTo(x+cs,y+rs)}
ctx.stroke();

// Outer border
if(r===0){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+cs,0);ctx.stroke()}
if(r===lvl.rows-1){ctx.beginPath();ctx.moveTo(x,rs*lvl.rows);ctx.lineTo(x+cs,rs*lvl.rows);ctx.stroke()}
if(c===0){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(0,y+rs);ctx.stroke()}
if(c===lvl.cols-1){ctx.beginPath();ctx.moveTo(cs*lvl.cols,y);ctx.lineTo(cs*lvl.cols,y+rs);ctx.stroke()}
}
}

// Thick region borders
ctx.strokeStyle='#7a7aaa';ctx.lineWidth=2.5;
for(var r=0;r<lvl.rows;r++){
for(var c=0;c<lvl.cols;c++){
var rid=lvl.region_map[r][c];
var x=c*cs;var y=r*rs;
if(r===0||lvl.region_map[r-1][c]!==rid){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cs,y);ctx.stroke()}
if(r===lvl.rows-1||lvl.region_map[r+1][c]!==rid){ctx.beginPath();ctx.moveTo(x,y+rs);ctx.lineTo(x+cs,y+rs);ctx.stroke()}
if(c===0||lvl.region_map[r][c-1]!==rid){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+rs);ctx.stroke()}
if(c===lvl.cols-1||lvl.region_map[r][c+1]!==rid){ctx.beginPath();ctx.moveTo(x+cs,y);ctx.lineTo(x+cs,y+rs);ctx.stroke()}
}
}
}

function checkWin(){
var lvl=LEVELS[currentLevel];
for(var r=0;r<lvl.rows;r++){
for(var c=0;c<lvl.cols;c++){
if(playerGrid[r][c]!==lvl.solution[r][c])return false;
}
}
return true;
}

function checkErrors(){
var lvl=LEVELS[currentLevel];
var errs=[];
for(var r=0;r<lvl.rows;r++){
for(var c=0;c<lvl.cols;c++){
var key=r+','+c;
if(lvl.clues[key])continue;
if(playerGrid[r][c]>0&&playerGrid[r][c]!==lvl.solution[r][c])errs.push([r,c]);
}
}
return errs;
}

function doHint(){
if(hintsLeft<=0){showToast('No hints left!');return;}
var lvl=LEVELS[currentLevel];
var candidates=[];
for(var r=0;r<lvl.rows;r++){
for(var c=0;c<lvl.cols;c++){
var key=r+','+c;
if(lvl.clues[key])continue;
if(revealedCells.indexOf(key)>=0)continue;
if(playerGrid[r][c]!==lvl.solution[r][c])candidates.push([r,c]);
}
}
if(candidates.length===0){showToast('All correct!');return;}
var pick=candidates[Math.floor(Math.random()*candidates.length)];
var r=pick[0],c=pick[1];
playerGrid[r][c]=lvl.solution[r][c];
revealedCells.push(r+','+c);
hintsLeft--;
sfxHint();
renderGrid();
showToast('Hint used! '+hintsLeft+' left.');
if(checkWin())onWin();
}

function doCheck(){
var errs=checkErrors();
if(checkWin()){onWin();}
else if(errs.length>0){sfxError();showToast(errs.length+' error(s) found!');}
else{showToast('No errors, but not complete yet.');}
}

function doRestart(){
startLevel();
}

function onWin(){
isPlaying=false;
sfxWin();
stopBGM();
var prog=loadProgress();
var key='l'+currentLevel;
if(!prog.solved)prog.solved={};
var stars=3;
if(hintsLeft===2)stars=2;
if(hintsLeft<=1)stars=1;
if(!prog.solved[key]||prog.solved[key]<stars)prog.solved[key]=stars;
saveProgress(prog);
var starStr='';
for(var i=0;i<3;i++)starStr+=(i<stars?'\u2605':'\u2606');
document.getElementById('win-stars').textContent=starStr;
document.getElementById('win-overlay').style.display='flex';
}

function showMenu(){
isPlaying=false;
stopBGM();
document.getElementById('menu-screen').style.display='flex';
document.getElementById('win-overlay').style.display='none';
document.getElementById('level-select').style.display='none';
updateMenuStats();
}

function showLevelSelect(){
document.getElementById('menu-screen').style.display='none';
document.getElementById('level-select').style.display='flex';
var list=document.getElementById('level-list');
list.innerHTML='';
var tiers=['beginner','easy','medium','hard','expert'];
var prog=loadProgress();
tiers.forEach(function(tier,ti){
var header=document.createElement('div');header.className='tier-header';header.textContent=tier;
list.appendChild(header);
var grid=document.createElement('div');grid.className='level-grid';
for(var li=0;li<6;li++){
var idx=ti*6+li;
var cell=document.createElement('div');
cell.className='level-cell';
cell.textContent=idx+1;
var solved=prog.solved&&prog.solved['l'+idx];
if(solved){cell.classList.add('solved');
var s=document.createElement('div');s.className='stars';s.textContent='★'.repeat(solved);cell.appendChild(s);
}
(function(idx2){cell.addEventListener('click',function(){
currentLevel=idx2;startLevel();
});})(idx);
grid.appendChild(cell);
}
list.appendChild(grid);
});
}

function updateMenuStats(){
var prog=loadProgress();
var count=prog.solved?Object.keys(prog.solved).length:0;
document.getElementById('menu-stats').textContent=count+'/30 levels solved';
}

function loadProgress(){
try{return JSON.parse(localStorage.getItem('nanro_progress')||'{}');}catch(e){return{};}
}
function saveProgress(p){
try{localStorage.setItem('nanro_progress',JSON.stringify(p));}catch(e){}
}

function showToast(msg){
var t=document.getElementById('toast');
t.textContent=msg;t.classList.add('show');
setTimeout(function(){t.classList.remove('show');},2000);
}

window.addEventListener('resize',function(){if(isPlaying){resizeCanvas();renderGrid();}});
document.addEventListener('visibilitychange',function(){
if(document.hidden){stopBGM();}
else if(isPlaying&&musicOn){startBGM();}
});
window.addEventListener('beforeunload',function(){stopBGM();if(audioCtx)audioCtx.close();});

init();
</script>
