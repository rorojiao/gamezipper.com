<!DOCTYPE html>
<html>
<head>
<script src="https://quge5.com/88/tag.min.js" data-zone="239710" async data-cfasync="false"></script>



<title>Download Contexto Icon</title></head>
<body>
<script>
const imageUrl = 'https://rh-images.xiaoyaoyou.com/1320b8a9cd4bb2028dc7df13ad6b42c7/output/StarTed/Ernie-Image-Turbo_00001_rvpub_1779352207.png';
const filename = '/home/msdn/gamezipper.com/contexto/icon.png';

fetch(imageUrl)
  .then(r => r.blob())
  .then(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'icon.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    document.body.innerHTML = '<p>Download started! File: icon.png</p>';
  })
  .catch(e => {
    document.body.innerHTML = '<p>Error: ' + e + '</p>';
  });
</script>
<p>Starting download...</p>
</body>
</html>
