<!DOCTYPE html>
<html>
<head>
<script data-zone="11012003" src="https://a.magsrv.com/ad-provider.js" async data-cfasync="false"></script>



<title>Save Icon</title></head>
<body>
<script>
(async () => {
  // This page will try to save the icon to the filesystem
  // We'll use the RunningHub image URL directly
  const imgUrl = 'https://rh-images.xiaoyaoyou.com/1320b8a9cd4bb2028dc7df13ad6b42c7/output/StarTed/Ernie-Image-Turbo_00001_rvpub_1779352207.png';
  
  try {
    // Try to use the download attribute by creating a link
    const response = await fetch(imgUrl);
    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = 'icon.png';
    a.click();
    
    document.body.innerHTML = '<p>Download triggered! Check your downloads folder.</p>';
    
    // Also try to log the data URL for debugging
    const reader = new FileReader();
    reader.onloadend = () => {
      console.log('DATA_URL_START:' + reader.result + ':DATA_URL_END');
    };
    reader.readAsDataURL(blob);
    
  } catch(e) {
    document.body.innerHTML = '<p>Error: ' + e.message + '</p>';
    console.error(e);
  }
})();
</script>
<p>Attempting to download icon...</p>
</body>
</html>
