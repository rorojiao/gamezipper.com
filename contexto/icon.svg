<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74cff"/>
      <stop offset="50%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="128" fill="url(#bg)"/>
  
  <!-- Brain outline - simplified stylized brain shape -->
  <g filter="url(#shadow)" transform="translate(512, 480)">
    <!-- Left hemisphere -->
    <path d="M-180,-120 C-280,-120 -340,-40 -340,60 C-340,160 -260,220 -160,220 C-100,220 -60,180 -40,140 C-20,180 20,220 80,220 C180,220 260,160 260,60 C260,-40 200,-120 100,-120 C60,-120 20,-100 0,-70 C-20,-100 -80,-120 -130,-120 C-150,-120 -170,-115 -180,-110 Z" 
          fill="none" stroke="url(#nodeGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    
    <!-- Right hemisphere -->
    <path d="M180,-120 C80,-120 20,-100 0,-70 C-20,-100 -60,-120 -100,-120 C-150,-120 -170,-115 -180,-110 C-280,-110 -340,-30 -340,70 C-340,170 -260,230 -160,230 C-80,230 -30,190 0,230 C30,190 80,230 160,230 C260,230 340,170 340,70 C340,-30 280,-110 180,-110 Z" 
          fill="none" stroke="url(#nodeGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.5"/>
    
    <!-- Brain folds / wrinkles -->
    <path d="M-200,-20 Q-160,0 -120,-20 Q-80,0 -40,-20" fill="none" stroke="url(#nodeGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M-220,60 Q-180,80 -140,60 Q-100,80 -60,60" fill="none" stroke="url(#nodeGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M40,60 Q80,80 120,60 Q160,80 200,60" fill="none" stroke="url(#nodeGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M-160,140 Q-120,160 -80,140" fill="none" stroke="url(#nodeGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M60,140 Q100,160 140,140" fill="none" stroke="url(#nodeGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  </g>
  
  <!-- Connected nodes representing semantic web -->
  <!-- Central node (brain) -->
  <circle cx="512" cy="480" r="40" fill="url(#nodeGrad)" filter="url(#glow)"/>
  
  <!-- Node connections -->
  <g stroke="url(#grad1)" stroke-width="4" stroke-linecap="round" opacity="0.8">
    <line x1="512" y1="480" x2="280" y2="280"/>
    <line x1="512" y1="480" x2="740" y2="260"/>
    <line x1="512" y1="480" x2="180" y2="520"/>
    <line x1="512" y1="480" x2="840" y2="500"/>
    <line x1="512" y1="480" x2="320" y2="700"/>
    <line x1="512" y1="480" x2="700" y2="720"/>
    <line x1="512" y1="480" x2="512" y2="200"/>
    <line x1="512" y1="480" x2="512" y2="780"/>
    <line x1="280" y1="280" x2="180" y2="180"/>
    <line x1="280" y1="280" x2="380" y2="180"/>
    <line x1="740" y1="260" x2="640" y2="160"/>
    <line x1="740" y1="260" x2="840" y2="160"/>
    <line x1="180" y1="520" x2="100" y2="420"/>
    <line x1="180" y1="520" x2="80" y2="600"/>
    <line x1="840" y1="500" x2="920" y2="400"/>
    <line x1="840" y1="500" x2="940" y2="580"/>
    <line x1="320" y1="700" x2="220" y2="800"/>
    <line x1="320" y1="700" x2="400" y2="820"/>
    <line x1="700" y1="720" x2="620" y2="820"/>
    <line x1="700" y1="720" x2="800" y2="800"/>
    <line x1="512" y1="200" x2="440" y2="100"/>
    <line x1="512" y1="200" x2="584" y2="100"/>
    <line x1="512" y1="780" x2="440" y2="880"/>
    <line x1="512" y1="780" x2="584" y2="880"/>
  </g>
  
  <!-- Outer nodes -->
  <circle cx="280" cy="280" r="24" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="740" cy="260" r="24" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="180" cy="520" r="24" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="840" cy="500" r="24" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="320" cy="700" r="24" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="700" cy="720" r="24" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="512" cy="200" r="24" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="512" cy="780" r="24" fill="url(#nodeGrad)" filter="url(#glow)"/>
  
  <!-- Outer satellite nodes -->
  <circle cx="180" cy="180" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="380" cy="180" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="640" cy="160" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="840" cy="160" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="100" cy="420" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="80" cy="600" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="920" cy="400" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="940" cy="580" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="220" cy="800" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="400" cy="820" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="620" cy="820" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="800" cy="800" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="440" cy="100" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="584" cy="100" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="440" cy="880" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="584" cy="880" r="16" fill="url(#nodeGrad)" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Glowing dots on connections -->
  <g fill="#fff" opacity="0.9">
    <circle cx="396" cy="380" r="6"/>
    <circle cx="626" cy="370" r="6"/>
    <circle cx="346" cy="500" r="6"/>
    <circle cx="676" cy="490" r="6"/>
    <circle cx="416" cy="590" r="6"/>
    <circle cx="606" cy="600" r="6"/>
    <circle cx="512" cy="340" r="6"/>
    <circle cx="512" cy="630" r="6"/>
  </g>
</svg>
