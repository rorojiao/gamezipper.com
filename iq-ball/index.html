    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

      var t=i/sr,ci=Math.min(Math.floor(t/chordDur),chords.length-1),chord=chords[ci];

        var f=chord[n];

        s+=Math.sin(2*Math.PI*f*2*t)*0.01;

}

// === GAME OBJECTS ===
var ball={x:0,y:0,vx:0,vy:0,r:14,hooked:false,hookX:0,hookY:0,hookLen:0,ropeAngle:0};
var target={x:0,y:0,r:18};
var particles=[];
var grappleLine={active:false,x1:0,y1:0,x2:0,y2:0,alpha:1};
var hintPoint=null;
var hintAlpha=0;
var showTutorial=true;
var levelTime=0;
var movingPlatforms=[];

// === PHYSICS ===
var GRAVITY=0.4;
var ROPE_DAMPING=0.995;
var BALL_DAMPING=0.999;
var MAX_ROPE=250;
var MIN_ROPE=30;
var GRAPPLE_SPEED=15;

// === SAVE/LOAD ===
function saveProgress(){
  try{
    localStorage.setItem("iqball_v1",JSON.stringify({stars:bestStars,unlocked:unlocked}));
  }catch(e){}
}

function loadProgress(){
  try{
    var d=JSON.parse(localStorage.getItem("iqball_v1"));
    if(d&&d.v!==undefined){bestStars=d.stars||{};unlocked=d.unlocked||1;}
    else if(d){bestStars=d.stars||{};unlocked=d.unlocked||1;}
  }catch(e){}
}

// === LEVEL MANAGEMENT ===
function loadLevel(idx){
  if(idx<0||idx>=LEVELS.length)return;
  currentLevel=idx;
  var lv=LEVELS[idx];
  ball.x=lv.bx;ball.y=lv.by;ball.vx=0;ball.vy=0;
  ball.hooked=false;ball.ropeAngle=0;
  grappleLine.active=false;
  clicks=0;particles=[];hintAlpha=0;hintPoint=null;
  levelTime=0;
  movingPlatforms=[];
  if(lv.moving){
    for(var i=0;i<lv.moving.length;i++){
      var m=lv.moving[i];
      movingPlatforms.push({x:m.x,y:m.y,w:m.w,h:m.h,type:m.type,
        origX:m.x,origY:m.y,axis:m.axis,range:m.range,speed:m.speed,phase:i*1.5});
    }
  }
  target.x=lv.t[0];target.y=lv.t[1];target.r=lv.t[2];
  updateHUD();
  state="game";
}

function updateHUD(){
  document.getElementById("hud-level").textContent=currentLevel+1;
  document.getElementById("hud-clicks").textContent=clicks;
  var lv=LEVELS[currentLevel];
  document.getElementById("hud-par").textContent=lv.par;
  var stars=getStars();
  var s="";
  for(var i=0;i<3;i++)s+=i<stars?"\u2605":"\u2606";
  document.getElementById("hud-stars").innerHTML=s;
}

function getStars(){
  var lv=LEVELS[currentLevel];
  if(clicks<=lv.par)return 3;
  if(clicks<=lv.par+2)return 2;
  return 1;
}

// === GRAPPLE MECHANICS ===
function findNearestGrapplePoint(mx,my){
  var lv=LEVELS[currentLevel];
  var best=null,bestDist=Infinity;
  // Check level bodies for grappleable surfaces
  for(var i=0;i<lv.b.length;i++){
    var b=lv.b[i];
    if(b[4]!=="w")continue; // only wood
    var bx=b[0],by=b[1],bw=b[2],bh=b[3];
    // Find closest point on rectangle to (mx,my)
    var cx=Math.max(bx,Math.min(mx,bx+bw));
    var cy=Math.max(by,Math.min(my,by+bh));
    var dx=mx-cx,dy=my-cy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<bestDist){bestDist=dist;best={x:cx,y:cy};}
  }
  // Check moving platforms
  for(var i=0;i<movingPlatforms.length;i++){
    var m=movingPlatforms[i];
    if(m.type!=="w")continue;
    var cx=Math.max(m.x,Math.min(mx,m.x+m.w));
    var cy=Math.max(m.y,Math.min(my,m.y+m.h));
    var dx=mx-cx,dy=my-cy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<bestDist){bestDist=dist;best={x:cx,y:cy};}
  }
  return best;
}

function shootGrapple(mx,my){
  if(ball.hooked){
    // Detach current grapple
    ball.hooked=false;
    grappleLine.active=false;
    playDetach();
  }
  var gp=findNearestGrapplePoint(mx,my);
  if(!gp)return;
  var dx=gp.x-ball.x,dy=gp.y-ball.y;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>MAX_ROPE)return; // too far
  
  ball.hookX=gp.x;ball.hookY=gp.y;
  ball.hooked=true;
  ball.hookLen=dist;
  grappleLine.active=true;
  grappleLine.x1=ball.x;grappleLine.y1=ball.y;
  grappleLine.x2=gp.x;grappleLine.y2=gp.y;
  grappleLine.alpha=1;
  clicks++;
  playGrapple();
  setTimeout(function(){playAttach()},80);
  updateHUD();
}

// === COLLISION ===
function checkCollision(x,y,r){
  var lv=LEVELS[currentLevel];
  for(var i=0;i<lv.b.length;i++){
    var b=lv.b[i];
    if(b[4]!=="s"&&b[4]!=="m")continue;
    var bx=b[0],by=b[1],bw=b[2],bh=b[3];
    // Circle vs AABB
    var cx=Math.max(bx,Math.min(x,bx+bw));
    var cy=Math.max(by,Math.min(y,by+bh));
    var dx=x-cx,dy=y-cy;
    if(dx*dx+dy*dy<r*r)return true;
  }
  return false;
}

function resolveCollisions(){
  var lv=LEVELS[currentLevel];
  for(var i=0;i<lv.b.length;i++){
    var b=lv.b[i];
    if(b[4]!=="s"&&b[4]!=="m")continue;
    var bx=b[0],by=b[1],bw=b[2],bh=b[3];
    var cx=Math.max(bx,Math.min(ball.x,bx+bw));
    var cy=Math.max(by,Math.min(ball.y,by+bh));
    var dx=ball.x-cx,dy=ball.y-cy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<ball.r&&dist>0){
      var overlap=ball.r-dist;
      var nx=dx/dist,ny=dy/dist;
      ball.x+=nx*overlap;
      ball.y+=ny*overlap;
      // Reflect velocity
      var dot=ball.vx*nx+ball.vy*ny;
      if(dot<0){
        ball.vx-=2*dot*nx*0.6;
        ball.vy-=2*dot*ny*0.6;
        playBounce();
      }
    }
  }
}

// === PHYSICS UPDATE ===
function updatePhysics(dt){
  levelTime+=dt;
  
  // Update moving platforms
  for(var i=0;i<movingPlatforms.length;i++){
    var m=movingPlatforms[i];
    if(m.axis==="x"){
      m.x=m.origX+Math.sin(levelTime*m.speed+m.phase)*m.range;
    }else{
      m.y=m.origY+Math.sin(levelTime*m.speed+m.phase)*m.range;
    }
  }
  
  // Gravity
  ball.vy+=GRAVITY*dt;
  
  if(ball.hooked){
    // Rope constraint
    var dx=ball.x-ball.hookX,dy=ball.y-ball.hookY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>ball.hookLen){
      // Constrain to rope length
      var nx=dx/dist,ny=dy/dist;
      ball.x=ball.hookX+nx*ball.hookLen;
      ball.y=ball.hookY+ny*ball.hookLen;
      // Remove radial velocity component (keep tangential)
      var radVel=ball.vx*nx+ball.vy*ny;
      if(radVel>0){
        ball.vx-=radVel*nx;
        ball.vy-=radVel*ny;
      }
      playSwing();
    }
    // Damping
    ball.vx*=ROPE_DAMPING;
    ball.vy*=ROPE_DAMPING;
  }else{
    ball.vx*=BALL_DAMPING;
    ball.vy*=BALL_DAMPING;
  }
  
  // Move
  ball.x+=ball.vx*dt;
  ball.y+=ball.vy*dt;
  
  // Collisions
  resolveCollisions();
  
  // Update grapple line visuals
  if(ball.hooked){
    grappleLine.x1=ball.x;grappleLine.y1=ball.y;
    // Check if hook point is still valid (for moving platforms)
    var gp=findNearestGrapplePoint(ball.hookX,ball.hookY);
    if(gp){ball.hookX=gp.x;ball.hookY=gp.y;grappleLine.x2=gp.x;grappleLine.y2=gp.y;}
  }
  
  // Boundary
  if(ball.x<ball.r){ball.x=ball.r;ball.vx*=-0.5;}
  if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx*=-0.5;}
  if(ball.y<ball.r){ball.y=ball.r;ball.vy*=-0.5;}
  if(ball.y>H-ball.r){ball.y=H-ball.r;ball.vy*=-0.5;}
  
  // Check win
  var tdx=ball.x-target.x,tdy=ball.y-target.y;
  if(Math.sqrt(tdx*tdx+tdy*tdy)<ball.r+target.r){
    winLevel();
  }
}

// === WIN ===
function winLevel(){
  state="win";
  var stars=getStars();
  if(!bestStars[currentLevel]||bestStars[currentLevel]<stars){
    bestStars[currentLevel]=stars;
  }
  if(currentLevel+1>=unlocked&&currentLevel+1<LEVELS.length){
    unlocked=currentLevel+2;
  }
  saveProgress();
  playWin();
  
  // Particles
  for(var i=0;i<40;i++){
    var angle=Math.random()*Math.PI*2;
    var speed=2+Math.random()*5;
    particles.push({x:target.x,y:target.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1,color:["#ffd700","#ff6b6b","#7df","#f8f","#afa"][Math.floor(Math.random()*5)],r:2+Math.random()*3});
  }
  
  // Show overlay
  var ws=document.getElementById("win-stars");
  var st="";
  for(var i=0;i<3;i++)st+=i<stars?"\u2605":"\u2606";
  ws.innerHTML=st;
  document.getElementById("win-info").textContent=clicks+" clicks (Par: "+LEVELS[currentLevel].par+")";
  document.getElementById("win-overlay").classList.add("show");
}

// === RENDERING ===
function drawLevel(){
  var lv=LEVELS[currentLevel];
  
  // Draw bodies
  for(var i=0;i<lv.b.length;i++){
    var b=lv.b[i];
    if(b[4]==="w"){
      ctx.fillStyle="#8B6914";
      ctx.strokeStyle="#A0822A";
    }else if(b[4]==="m"){
      ctx.fillStyle="#4a4a5a";
      ctx.strokeStyle="#6a6a7a";
    }else{
      ctx.fillStyle="#2a2a4a";
      ctx.strokeStyle="#3a3a5a";
    }
    ctx.lineWidth=2;
    ctx.fillRect(b[0],b[1],b[2],b[3]);
    ctx.strokeRect(b[0],b[1],b[2],b[3]);
    
    // Wood grain effect
    if(b[4]==="w"){
      ctx.strokeStyle="rgba(160,130,42,0.3)";
      ctx.lineWidth=1;
      for(var j=0;j<b[3];j+=8){
        ctx.beginPath();
        ctx.moveTo(b[0],b[1]+j);
        ctx.lineTo(b[0]+b[2],b[1]+j);
        ctx.stroke();
      }
    }
    
    // Metal shine
    if(b[4]==="m"){
      var mg=ctx.createLinearGradient(b[0],b[1],b[0],b[1]+b[3]);
      mg.addColorStop(0,"rgba(150,150,180,0.3)");
      mg.addColorStop(0.5,"rgba(80,80,100,0.1)");
      mg.addColorStop(1,"rgba(150,150,180,0.2)");
      ctx.fillStyle=mg;
      ctx.fillRect(b[0],b[1],b[2],b[3]);
    }
  }
  
  // Draw moving platforms
  for(var i=0;i<movingPlatforms.length;i++){
    var m=movingPlatforms[i];
    if(m.type==="w"){
      ctx.fillStyle="#8B6914";ctx.strokeStyle="#A0822A";
    }else{
      ctx.fillStyle="#4a4a5a";ctx.strokeStyle="#6a6a7a";
    }
    ctx.lineWidth=2;
    ctx.fillRect(m.x,m.y,m.w,m.h);
    ctx.strokeRect(m.x,m.y,m.w,m.h);
  }
}

function drawTarget(){
  var pulse=1+Math.sin(levelTime*3)*0.05;
  ctx.save();
  ctx.translate(target.x,target.y);
  ctx.scale(pulse,pulse);
  
  // Outer glow
  var glow=ctx.createRadialGradient(0,0,target.r,0,0,target.r*2);
  glow.addColorStop(0,"rgba(255,60,60,0.3)");
  glow.addColorStop(1,"rgba(255,60,60,0)");
  ctx.fillStyle=glow;
  ctx.beginPath();ctx.arc(0,0,target.r*2,0,Math.PI*2);ctx.fill();
  
  // Target rings
  ctx.fillStyle="#ff3333";
  ctx.beginPath();ctx.arc(0,0,target.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#ffffff";
  ctx.beginPath();ctx.arc(0,0,target.r*0.7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#ff3333";
  ctx.beginPath();ctx.arc(0,0,target.r*0.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#ffffff";
  ctx.beginPath();ctx.arc(0,0,target.r*0.15,0,Math.PI*2);ctx.fill();
  
  ctx.restore();
}

function drawBall(){
  ctx.save();
  ctx.translate(ball.x,ball.y);
  
  // Glow
  var glow=ctx.createRadialGradient(0,0,ball.r,0,0,ball.r*2);
  glow.addColorStop(0,"rgba(130,80,255,0.2)");
  glow.addColorStop(1,"rgba(130,80,255,0)");
  ctx.fillStyle=glow;
  ctx.beginPath();ctx.arc(0,0,ball.r*2,0,Math.PI*2);ctx.fill();
  
  // Body
  var grad=ctx.createRadialGradient(-3,-3,2,0,0,ball.r);
  grad.addColorStop(0,"#b080ff");
  grad.addColorStop(1,"#6030c0");
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(0,0,ball.r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#8050d0";ctx.lineWidth=2;ctx.stroke();
  
  // Eyes
  var ex=4,ey=-2;
  // Eye direction based on velocity
  var speed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
  var edx=ball.vx/(speed+0.1)*2,edy=ball.vy/(speed+0.1)*1;
  // Left eye
  ctx.fillStyle="#fff";
  ctx.beginPath();ctx.ellipse(-ex,ey,5,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#222";
  ctx.beginPath();ctx.arc(-ex+edx,ey+edy,2.5,0,Math.PI*2);ctx.fill();
  // Right eye
  ctx.fillStyle="#fff";
  ctx.beginPath();ctx.ellipse(ex,ey,5,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#222";
  ctx.beginPath();ctx.arc(ex+edx,ey+edy,2.5,0,Math.PI*2);ctx.fill();
  
  // Grapple hook (on top of ball)
  ctx.strokeStyle="#aaa";ctx.lineWidth=3;ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo(0,-ball.r);
  ctx.lineTo(0,-ball.r-8);
  ctx.quadraticCurveTo(5,-ball.r-12,8,-ball.r-8);
  ctx.stroke();
  
  ctx.restore();
}

function drawGrappleLine(){
  if(!grappleLine.active)return;
  ctx.save();
  ctx.strokeStyle="rgba(180,180,200,"+grappleLine.alpha+")";
  ctx.lineWidth=2.5;
  ctx.setLineDash([6,4]);
  ctx.beginPath();
  ctx.moveTo(ball.x,ball.y);
  ctx.lineTo(ball.hookX,ball.hookY);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Hook point indicator
  ctx.fillStyle="#ffd700";
  ctx.beginPath();ctx.arc(ball.hookX,ball.hookY,4,0,Math.PI*2);ctx.fill();
  
  ctx.restore();
}

function drawParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.02;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawHint(){
  if(!hintPoint)return;
  hintAlpha+=0.03;
  if(hintAlpha>1)hintAlpha=1;
  var pulse=0.5+Math.sin(levelTime*4)*0.3;
  ctx.save();
  ctx.globalAlpha=hintAlpha*pulse;
  ctx.strokeStyle="#ffd700";ctx.lineWidth=2;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.arc(hintPoint.x,hintPoint.y,20,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
  // Arrow
  ctx.fillStyle="#ffd700";
  ctx.font="bold 16px sans-serif";ctx.textAlign="center";
  ctx.fillText("?",hintPoint.x,hintPoint.y+5);
  ctx.restore();
}

function drawBackground(){
  // Dark gradient
  var bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"#0d0d2b");
  bg.addColorStop(1,"#1a1a3a");
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);
  
  // Subtle grid
  ctx.strokeStyle="rgba(60,60,100,0.15)";ctx.lineWidth=1;
  for(var x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawTutorial(){
  if(currentLevel>0||!showTutorial)return;
  var lv=LEVELS[0];
  ctx.save();
  ctx.fillStyle="rgba(200,200,255,0.7)";
  ctx.font="16px sans-serif";ctx.textAlign="center";
  ctx.fillText("Click anywhere to shoot your grappling hook!",W/2,H-30);
  ctx.font="13px sans-serif";
  ctx.fillStyle="rgba(170,170,220,0.5)";
  ctx.fillText("Aim at the brown (wood) surfaces",W/2,H-10);
  ctx.restore();
}

function drawLevelName(){
  if(levelTime>3)return;
  var alpha=Math.max(0,1-levelTime/3);
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle="#e0e0ff";ctx.font="bold 24px sans-serif";ctx.textAlign="center";
  var lv=LEVELS[currentLevel];
  ctx.fillText("Level "+(currentLevel+1)+": "+(lv.name||""),W/2,40);
  ctx.restore();
}

// === MAIN LOOP ===
var lastTime=0;
function loop(timestamp){
  rafId=requestAnimationFrame(loop);
  var dt=Math.min((timestamp-lastTime)/16.67,3);
  lastTime=timestamp;
  
  ctx.clearRect(0,0,W,H);
  drawBackground();
  
  if(state==="game"){
    updatePhysics(dt);
  }
  
  if(state==="game"||state==="win"){
    drawLevel();
    drawTarget();
    drawGrappleLine();
    drawBall();
    drawParticles();
    drawHint();
    drawTutorial();
    drawLevelName();
  }
}

// === INPUT ===
function handleClick(mx,my){
  if(state!=="game")return;
  initAudio();
  if(bgmNodes.length===0)startBGM();
  shootGrapple(mx,my);
}

canvas.addEventListener("pointerdown",function(e){
  e.preventDefault();
  var rect=canvas.getBoundingClientRect();
  var scaleX=W/rect.width,scaleY=H/rect.height;
  var mx=(e.clientX-rect.left)*scaleX;
  var my=(e.clientY-rect.top)*scaleY;
  handleClick(mx,my);
});

canvas.addEventListener("pointermove",function(e){e.preventDefault()});
canvas.addEventListener("pointercancel",function(e){e.preventDefault()});

// Keyboard controls for desktop
document.addEventListener("keydown",function(e){
  if(e.code==="Space"&&state==="game"){
    e.preventDefault();
    if(ball.hooked){ball.hooked=false;grappleLine.active=false;playDetach();}
  }
  if(e.code==="KeyR"){
    playClick();loadLevel(currentLevel);
  }
});

// === UI BUTTONS ===
document.getElementById("btn-reset").addEventListener("click",function(){playClick();loadLevel(currentLevel)});
document.getElementById("btn-levels").addEventListener("click",function(){playClick();showLevelMenu()});
document.getElementById("close-levels").addEventListener("click",function(){playClick();hideLevelMenu()});
document.getElementById("btn-hint").addEventListener("click",function(){
  playClick();
  var lv=LEVELS[currentLevel];
  if(lv.hint){hintPoint={x:lv.hint[0],y:lv.hint[1]};hintAlpha=0;}
});
document.getElementById("btn-settings").addEventListener("click",function(){playClick();document.getElementById("settings-panel").classList.add("show")});
document.getElementById("close-settings").addEventListener("click",function(){playClick();document.getElementById("settings-panel").classList.remove("show")});

document.getElementById("toggle-sfx").addEventListener("click",function(){
  sfxOn=!sfxOn;this.textContent=sfxOn?"ON":"OFF";saveProgress()});
document.getElementById("toggle-music").addEventListener("click",function(){
  musicOn=!musicOn;this.textContent=musicOn?"ON":"OFF";
  if(musicOn&&audioCtx)startBGM();else stopBGM();saveProgress()});

document.getElementById("win-replay").addEventListener("click",function(){playClick();document.getElementById("win-overlay").classList.remove("show");loadLevel(currentLevel)});
document.getElementById("win-next").addEventListener("click",function(){
  playClick();document.getElementById("win-overlay").classList.remove("show");
  if(currentLevel+1<LEVELS.length)loadLevel(currentLevel+1);
});

document.getElementById("start-btn").addEventListener("click",function(){
  initAudio();startBGM();playClick();
  document.getElementById("title-screen").classList.add("hidden");
  loadLevel(0);
});

// === LEVEL MENU ===
function showLevelMenu(){
  var grid=document.getElementById("level-grid");
  grid.innerHTML="";
  for(var i=0;i<LEVELS.length;i++){
    var btn=document.createElement("button");
    btn.className="lvl-btn"+(i+1>unlocked?" locked":"");
    var s=bestStars[i]||0;
    var starsHtml="";
    for(var j=0;j<3;j++)starsHtml+=j<s?"\u2605":"<span class='empty'>\u2606</span>";
    btn.innerHTML="<span>"+(i+1)+"</span><span class='stars'>"+starsHtml+"</span>";
    (function(idx){
      btn.addEventListener("click",function(){
        playClick();hideLevelMenu();loadLevel(idx);
      });
    })(i);
    grid.appendChild(btn);
  }
  document.getElementById("level-menu").classList.add("show");
}

function hideLevelMenu(){
  document.getElementById("level-menu").classList.remove("show");
}

// === CLEANUP ===
function cleanup(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  timers.forEach(function(id){clearInterval(id)});timers=[];
  stopBGM();
}
window.addEventListener("beforeunload",cleanup);
document.addEventListener("visibilitychange",function(){
  if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
  else if(state==="game"){lastTime=performance.now();rafId=requestAnimationFrame(loop);}
});

// === INIT ===
loadProgress();
lastTime=performance.now();
rafId=requestAnimationFrame(loop);

})();
</script>
</body>
</html>
