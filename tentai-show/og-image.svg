<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a1a4a"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </radialGradient>
    <radialGradient id="galaxy" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(600,315)">
    <!-- Galaxy dots with symmetry -->
    <circle cx="-100" cy="-50" r="20" fill="#00ffff" opacity="0.9"/>
    <circle cx="100" cy="50" r="20" fill="#00ffff" opacity="0.9"/>
    <circle cx="50" cy="-100" r="15" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="-50" cy="100" r="15" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="0" cy="0" r="12" fill="#ffd700" opacity="0.9"/>
    <!-- Symmetry lines -->
    <line x1="-120" y1="-60" x2="120" y2="60" stroke="#00ffff" stroke-width="2" opacity="0.5"/>
    <line x1="60" y1="-120" x2="-60" y2="120" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <!-- Dashed grid -->
    <g stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="5,5">
      <line x1="-200" y1="0" x2="200" y2="0"/>
      <line x1="0" y1="-150" x2="0" y2="150"/>
    </g>
    <!-- Title -->
    <text x="0" y="220" text-anchor="middle" font-family="Orbitron,sans-serif" font-size="48" font-weight="900" fill="#00ffff">TENTAI SHOW</text>
    <text x="0" y="265" text-anchor="middle" font-family="Exo 2,sans-serif" font-size="24" fill="#8b5cf6">Galaxies Symmetry Puzzle</text>
  </g>
</svg>
