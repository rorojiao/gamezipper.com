canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair}

#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px)}

#overlay .best{font-size:clamp(12px,3vw,16px);color:#4ecdc4;margin:8px 0 24px;text-align:center}

.btn{display:inline-block;background:linear-gradient(135deg,#4ecdc4,#44a08d);color:#000;font-weight:700;font-size:clamp(14px,4vw,18px);padding:12px 36px;border-radius:30px;border:none;cursor:pointer;margin:8px;text-decoration:none;text-align:center;transition:transform .2s,box-shadow .2s}
