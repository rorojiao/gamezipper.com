const STACKLANDS=(function(){
'use strict';

/* ---------- 1. CONFIG ---------- */
const SAVE_KEY='stacklands_save_v1';
const SAVE_VERSION=1;
const NIGHT_START=0.64;     // fraction of cycle when night begins

const CAT={villager:'#22c55e',resource:'#f59e0b',building:'#3b82f6',weapon:'#a855f7',enemy:'#ef4444',special:'#06b6d4'};
function def(o){return Object.assign({stackable:true},o);}
const CARD_TYPES={
  /* villagers */
  villager:def({name:'Villager',cat:'villager',emoji:'🧑‍🌾',hp:3,maxhp:3,dmg:1,villager:true,desc:'Gathers resources from anything you stack it on. Needs 1 food each moon cycle.'}),

function multisetOf(types){const m={};for(const t of types)m[t]=(m[t]||0)+1;return m;}
function msEqual(a,b){const ka=Object.keys(a),kb=Object.keys(b);if(ka.length!==kb.length)return false;for(const k of ka)if(a[k]!==(b[k]||0))return false;return true;}
function msContains(big,sub){for(const k in sub)if((big[k]||0)<sub[k])return false;return true;}

// resolve a stack's multiset to an action. hasV = whether a villager is present
function resolveRecipe(ms){
  const hasV=(ms.villager||0)>0;
  if(hasV){
    for(const r of EQUIP)if(msEqual(ms,multisetOf(r.in)))return {mode:'equip',r};
    for(const r of RECURRING)if(msEqual(ms,multisetOf(r.in)))return {mode:'recurring',r};
    for(const r of GATHER)if(msEqual(ms,multisetOf(r.in)))return {mode:'gather',r};
    return null;
  }
  for(const r of CRAFT)if(msEqual(ms,multisetOf(r.in)))return {mode:'craft',r};
  // subset craft (pure material stacks): pick the largest matching recipe
  let best=null;
  for(const r of CRAFT){const need=multisetOf(r.in);if(msContains(ms,need)){const sz=r.in.length;if(!best||sz>best.in.length)best=r;}}
  if(best)return {mode:'craft',r:best,subset:true};
  return null;
}

}

/* ---------- 6. AUDIO ---------- */
const Audio2={ctx:null,master:null,bgmGain:null,melTimer:null,started:false};
function audioInit(){
  if(Audio2.started)return;
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    Audio2.ctx=new AC();
    Audio2.master=Audio2.ctx.createGain();
    Audio2.master.gain.value=SAVE.mute?0:0.9;
    Audio2.master.connect(Audio2.ctx.destination);
    Audio2.started=true;
  }catch(e){Audio2.started=false;}
}
function resumeAudio(){if(Audio2.ctx&&Audio2.ctx.state==='suspended')Audio2.ctx.resume();}
function tone(freq,dur,type,vol,when){
  if(!Audio2.ctx)return;
  const t0=(when||Audio2.ctx.currentTime);
  const o=Audio2.ctx.createOscillator(),g=Audio2.ctx.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol||0.2,t0+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(Audio2.master);o.start(t0);o.stop(t0+dur+0.02);
}
function sweep(f1,f2,dur,type,vol){
  if(!Audio2.ctx)return;const t0=Audio2.ctx.currentTime;
  const o=Audio2.ctx.createOscillator(),g=Audio2.ctx.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(f1,t0);o.frequency.exponentialRampToValueAtTime(f2,t0+dur);
  g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol||0.2,t0+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(Audio2.master);o.start(t0);o.stop(t0+dur+0.02);
}
function noiseBurst(dur,vol){
  if(!Audio2.ctx)return;const t0=Audio2.ctx.currentTime;
  const n=Math.floor(Audio2.ctx.sampleRate*dur);
  const buf=Audio2.ctx.createBuffer(1,n,Audio2.ctx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const src=Audio2.ctx.createBufferSource();src.buffer=buf;
  const f=Audio2.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=1400;
  const g=Audio2.ctx.createGain();g.gain.value=vol||0.25;
  src.connect(f);f.connect(g);g.connect(Audio2.master);src.start(t0);
}
function sfx(name){

const BGM_NOTES=[220,261.63,293.66,329.63,392,293.66,261.63,196];
function startBGM(){
  if(!Audio2.started||Audio2.melTimer||SAVE.mute)return;
  // warm pad
  const pad=Audio2.ctx.createGain();pad.gain.value=0.05;pad.connect(Audio2.master);
  [110,164.81].forEach(f=>{const o=Audio2.ctx.createOscillator();o.type='sine';o.frequency.value=f;o.connect(pad);o.start();});
  // slow LFO on pad
  const lfo=Audio2.ctx.createOscillator(),lg=Audio2.ctx.createGain();lfo.frequency.value=0.08;lg.gain.value=0.025;lfo.connect(lg);lg.connect(pad.gain);lfo.start();
  Audio2.bgmGain=pad;
  // gentle melody
  let i=0;
  Audio2.melTimer=setInterval(()=>{
    if(SAVE.mute)return;
    const f=BGM_NOTES[i%BGM_NOTES.length];i++;
    tone(f/2,1.1,'sine',0.05);
    if(i%4===0)tone(f,0.5,'triangle',0.04);
  },2200);
}
function stopBGM(){

  if(Audio2.bgmGain){try{Audio2.bgmGain.gain.linearRampToValueAtTime(0,Audio2.ctx.currentTime+0.4);}catch(e){}Audio2.bgmGain=null;}
}

/* ---------- 9. RENDER CARDS ---------- */
const cardNodes=new Map(); // id -> element
function renderCards(){

  const present=new Set(state.cards.map(c=>c.id));
  for(const [id,node] of cardNodes){if(!present.has(id)){node.remove();cardNodes.delete(id);}}
  // stacks: group by root to compute layer/offset
  const stacks={};
  for(const c of state.cards){(stacks[c.stack]=stacks[c.stack]||[]).push(c);}
  for(const root in stacks){
    const members=stacks[root].sort((a,b)=>a.layer-b.layer);
    members.forEach((c,i)=>{

}

/* ---------- 10. RECIPE RESOLUTION ON DROP ---------- */
function stackMembers(rootId){return state.cards.filter(c=>c.stack===rootId).sort((a,b)=>a.layer-b.layer);}
function stackMultiset(rootId){const m={};for(const c of stackMembers(rootId))m[c.type]=(m[c.type]||0)+1;return m;}

function onCardDropped(dragged,targetCard){
  // targetCard may be null (independent)
  if(!targetCard){
    dragged.stack=dragged.id;dragged.layer=0;
    return;
  }
  const R=targetCard.stack;
  if(R===dragged.id){dragged.stack=dragged.id;dragged.layer=0;return;}
  // join stack R
  dragged.stack=R;dragged.layer=stackMembers(R).length;
  dragged.x=targetCard.x;dragged.y=targetCard.y;
  // resolve
  const ms=stackMultiset(R);
  const res=resolveRecipe(ms);
  if(!res){sfx('place');return;}
  if(res.mode==='gather'||res.mode==='recurring'){
    sfx('place'); // production deferred to cycle
    burst(dragged.x,dragged.y,'#fbbf24',10);
    return;
  }
  if(res.mode==='equip'){
    // consume the weapon card, mark villager
    const slot=res.r.slot;
    const weapon=state.cards.find(c=>c.stack===R&&CARD_TYPES[c.type].weapon===slot);
    const vil=state.cards.find(c=>c.stack===R&&c.type==='villager');
    if(weapon){removeCard(weapon);}
    if(vil){vil.equipped[slot]=true;}
    // villager becomes independent
    if(vil){vil.stack=vil.id;vil.layer=0;}
    sfx('equip');burst(dragged.x,dragged.y,'#a855f7',14);
    if(vil)flashCard(vil.id);
    return;
  }
  if(res.mode==='craft'){
    const r=res.r;
    const keep=new Set(r.keep||[]);
    // consume inputs (not kept types)
    const need=multisetOf(r.in);
    const members=stackMembers(R);
    const toRemove=[];
    for(const t in need){
      let cnt=need[t];
      if(keep.has(t))continue;
      for(const c of members){if(cnt<=0)break;if(c.type===t&&!toRemove.includes(c)){toRemove.push(c);cnt--;}}
    }
    const cx=members[0]?members[0].x:dragged.x, cy=members[0]?members[0].y:dragged.y;
    for(const c of toRemove)removeCard(c);
    // outputs
    r.out.forEach((ot,i)=>{
      const ox=cx+(i*18-9), oy=cy-CH*0.5-16;
      spawnCard(ot,clamp(ox,CW/2,dom.board.clientWidth-CW/2),clamp(oy,CH/2,dom.board.clientHeight-CH/2));
      state.produced[ot]=(state.produced[ot]||0)+1;
    });
    // idea conversion
    if(r.out[0]==='idea'){const ic=state.cards[state.cards.length-1];scheduleIdea(ic);}
    // kept cards become independent
    state.cards.filter(c=>c.stack===R).forEach(c=>{c.stack=c.id;c.layer=0;});
    sfx('combine');burst(cx,cy,'#22c55e',20);
    return;
  }
}

function removeCard(c){
  const idx=state.cards.indexOf(c);if(idx>=0)state.cards.splice(idx,1);
  const n=cardNodes.get(c.id);if(n){n.remove();cardNodes.delete(c.id);}
}
function spawnCard(type,x,y){
  const c=newCard(type,x,y);state.cards.push(c);
  ensureNode(c).classList.add('spawn');
  // position
  renderCards();
  return c;
}
function flashCard(id){const n=cardNodes.get(id);if(n){n.classList.add('flash-gather');setTimeout(()=>n&&n.classList.remove('flash-gather'),500);}}

// gather/recurring production handled in cycle tick; but also precompute working configs:
function gatherConfigs(){
  // returns list of {rootId, recipe} for active gather + recurring stacks
  const out=[];
  const roots={};for(const c of state.cards)roots[c.stack]=1;
  for(const root in roots){
    const ms=stackMultiset(root);
    const res=resolveRecipe(ms);
    if(res&&(res.mode==='gather'||res.mode==='recurring'))out.push({root,mode:res.mode,r:res.r});
  }
  return out;
}

/* ---------- 11. CYCLE / MOON TIMER ---------- */
function advanceCycle(){
  state.cycle++;
  const lv=state.level;
  // 1. recurring production counters (baby/coin every N)
  const cfgs=gatherConfigs();
  // 2. gather resources each cycle
  const hasSaw=hasBuilding('sawmill'), hasSmelt=hasBuilding('smelter');
  for(const cfg of cfgs){
    if(cfg.mode==='gather'){
      const r=cfg.r;
      let qty=1;
      if(r.out[0]==='wood'&&hasSaw)qty=2;
      if(r.out[0]==='iron'&&hasSmelt)qty=2;
      const root=state.cards.find(c=>c.id===cfg.root||c.stack===cfg.root);
      const base=findRootCard(cfg.root);
      for(let i=0;i<qty;i++){
        const ox=(base?base.x:dom.board.clientWidth/2)+(i*16-8)+ (Math.random()*10-5);
        const oy=(base?base.y:dom.board.clientHeight/2)-CH*0.5-12;
        spawnCard(r.out[0],clamp(ox,CW/2,dom.board.clientWidth-CW/2),clamp(oy,CH/2,dom.board.clientHeight-CH/2));
        state.produced[r.out[0]]=(state.produced[r.out[0]]||0)+1;
      }
      if(base){flashCard(base.id);sparkle(base.x,base.y);}
    }else if(cfg.mode==='recurring'){
      // track counter on root
      const base=findRootCard(cfg.root);
      if(!base)continue;
      base.acc=(base.acc||0)+1;
      if(base.acc>=cfg.r.every){
        base.acc=0;
        if(cfg.r.sell){
          // consume one sellable material, produce coin
          const sell=findSellable();
          if(sell){removeCard(sell);const c=spawnCard('coin',clamp(base.x+CW,8,dom.board.clientWidth-CW/2),base.y);state.produced.coin=(state.produced.coin||0)+1;sfx('coin');}
        }else{
          const c=spawnCard(cfg.r.out[0],clamp(base.x+CW,8,dom.board.clientWidth-CW/2),clamp(base.y-CH,8,dom.board.clientHeight-CH/2));
          state.produced[cfg.r.out[0]]=(state.produced[cfg.r.out[0]]||0)+1;
        }
      }
    }
  }
  sfx('gather');
  // 3. building auto food (farm/garden) every 2 cycles
  state.farmAcc++;
  if(state.farmAcc%2===0){
    if(hasBuilding('farm')){const b=findBuilding('farm');const c=spawnCard('berry',b.x+CW,b.y);state.produced.berry=(state.produced.berry||0)+1;}
    if(hasBuilding('garden')){const b=findBuilding('garden');const c=spawnCard('carrot',b.x+CW,b.y);state.produced.carrot=(state.produced.carrot||0)+1;}
  }
  // 4. food consumption
  feedVillagers();
  // 5. babies grow
  for(const c of state.cards.slice()){
    if(c.type==='baby'){c.grow=(c.grow||3)-1;if(c.grow<=0){c.type='villager';const T=CARD_TYPES.villager;c.hp=T.hp;c.maxhp=T.maxhp;c.dmg=T.dmg;const n=cardNodes.get(c.id);if(n)n.remove();cardNodes.delete(c.id);ensureNode(c);sfx('combine');burst(c.x,c.y,'#22c55e',14);}}
  }
  // 6. enemy spawns
  if(lv.enemies){for(const e of lv.enemies){if(e.c===state.cycle){for(let i=0;i<e.n;i++)spawnEnemy(e.t);}}}
  // 7. check goals
  renderCards();
  checkGoals();
}
function findRootCard(rootId){return state.cards.find(c=>c.id===rootId)||state.cards.find(c=>c.stack===rootId);}
function findSellable(){const sell=['wood','stone','plank','iron','berry','coal','stick','gold','carrot','meat'];for(const t of sell){const c=state.cards.find(x=>x.type===t);if(c)return c;}return null;}
function hasBuilding(b){return state.cards.some(c=>c.type===b);}
function findBuilding(b){return state.cards.find(c=>c.type===b);}

function spawnEnemy(type){
  const T=CARD_TYPES[type];
  const margin=20;
  const x=margin+Math.random()*(dom.board.clientWidth-CW-margin*2);
  const y=margin+Math.random()*(dom.board.clientHeight-CH-margin*2);
  const c=newCard(type,x,y);c.hp=T.hp;c.maxhp=T.maxhp;c.dmg=T.dmg;
  state.cards.push(c);
  ensureNode(c).classList.add('spawn');
  redFlash();sfx('spawn');burst(x,y,'#ef4444',16);
  renderCards();
}
function feedVillagers(){
  const vils=state.cards.filter(c=>c.type==='villager'||c.type==='baby');
  // food priority: berry, carrot, meat, cookedberry
  const foodPref=['berry','carrot','meat','cookedberry'];
  for(const v of vils){
    let ate=false;
    for(const ft of foodPref){
      const f=state.cards.find(c=>c.type===ft);
      if(f){removeCard(f);ate=true;
        // cooked/meat heal more
        const heal=CARD_TYPES[ft].food||1;
        v.hp=Math.min(v.maxhp,v.hp+heal);
        break;}
    }
    if(ate){v.starve=0;}
    else if(!state.level.noStarve){
      v.starve=(v.starve||0)+1;
      if(v.starve>=3){v.starve=0;v.hp-=1;burst(v.x,v.y,'#f59e0b',6);
        if(v.hp<=0)killVillager(v);}
    }
  }
}
function killVillager(c){
  state.deaths++;sfx('death');burst(c.x,c.y,'#ef4444',22);removeCard(c);
  // lose check
  const remain=state.cards.some(x=>x.type==='villager'||x.type==='baby');
  if(!remain && !state.over){loseGame();}
}

/* ---------- 12. COMBAT ---------- */
function villagerDmg(v){return 1+(v.equipped.sword?2:0)+(hasBuilding('forge')?1:0);}
function villagerArmor(v){return (v.equipped.shield?1:0)+(v.equipped.helmet?1:0)+(hasBuilding('stonewall')?1:0);}
function combatTick(){
  const enemies=state.cards.filter(c=>CARD_TYPES[c.type].enemy);
  if(!enemies.length)return;
  const vils=()=>state.cards.filter(c=>c.type==='villager');
  for(const e of enemies){
    // find adjacent villagers
    const adj=vils().filter(v=>dist(v,e)<CW*0.82);
    if(!adj.length)continue;
    // villagers strike first (gang up)
    let dmg=0;for(const v of adj)dmg+=villagerDmg(v);
    e.hp-=dmg;
    hitFx(e);
    if(e.hp<=0){defeatEnemy(e);continue;}
    // enemy counters nearest adjacent villager
    let target=adj[0];for(const v of adj)if(dist(v,e)<dist(target,e))target=v;
    const d=Math.max(1,e.dmg-villagerArmor(target));
    target.hp-=d;hitFx(target);
    if(target.hp<=0)killVillager(target);
  }
  renderCards();
}
function defeatEnemy(e){
  state.defeated++;
  state.defeatedTypes[e.type]=(state.defeatedTypes[e.type]||0)+1;
  sfx('death');burst(e.x,e.y,'#fbbf24',24);
  const T=CARD_TYPES[e.type];
  if(T.drop==='coin'){const n=T.boss?3:1;for(let i=0;i<n;i++){const c=spawnCard('coin',e.x+(i*16-8),e.y);}}
  removeCard(e);
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function moveEnemies(dt){
  const enemies=state.cards.filter(c=>CARD_TYPES[c.type].enemy);
  if(!enemies.length)return;
  for(const e of enemies){
    const vils=state.cards.filter(c=>c.type==='villager');
    if(!vils.length)break;
    let nearest=vils[0];for(const v of vils)if(dist(v,e)<dist(nearest,e))nearest=v;
    const d=dist(e,nearest);
    if(d>CW*0.7){
      const step=ENEMY_SPEED*dt/1000;
      const ang=Math.atan2(nearest.y-e.y,nearest.x-e.x);
      e.x=clamp(e.x+Math.cos(ang)*step,CW/2,dom.board.clientWidth-CW/2);
      e.y=clamp(e.y+Math.sin(ang)*step,CH/2,dom.board.clientHeight-CH/2);
    }
  }
}

let drag=null; // {card, offX, offY, moved, pressTimer, longFired}
let deckBusy=false;
function attachGameHandlers(){

function cardFromEvent(e){
  const n=e.target.closest('.card');if(!n)return null;const id=parseInt(n.dataset.id);return state.cards.find(c=>c.id===id);
}
function boardCoords(clientX,clientY){
  const r=dom.board.getBoundingClientRect();
  return {x:clientX-r.left,y:clientY-r.top};
}
function onPointerDown(e){
  if(state.over||state.paused)return;
  const card=cardFromEvent(e);
  if(!card)return;
  resumeAudio();
  const p=boardCoords(e.clientX,e.clientY);
  drag={card,offX:p.x-card.x,offY:p.y-card.y,moved:false,startX:e.clientX,startY:e.clientY,
    longFired:false,pressTimer:setTimeout(()=>{if(drag&&!drag.moved){drag.longFired=true;showTooltip(card,e.clientX,e.clientY);}},520)};
  // detach from stack visually while dragging
  card._origStack=card.stack;card._origLayer=card.layer;
  card.stack=card.id;card.layer=0;
  const node=cardNodes.get(card.id);node.classList.add('dragging');
  sfx('pickup');
  try{board.setPointerCapture(e.pointerId);}catch(err){}
}
function onPointerMove(e){
  if(!drag)return;
  const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;
  if(!drag.moved&&Math.hypot(dx,dy)>6){drag.moved=true;if(drag.pressTimer){clearTimeout(drag.pressTimer);drag.pressTimer=null;}}
  if(drag.longFired)return; // long press showing tooltip, don't drag
  const p=boardCoords(e.clientX,e.clientY);
  const c=drag.card;
  c.x=clamp(p.x-drag.offX,CW/2,dom.board.clientWidth-CW/2);
  c.y=clamp(p.y-drag.offY,CH/2,dom.board.clientHeight-CH/2);
  const node=cardNodes.get(c.id);
  node.style.left=(c.x-CW/2)+'px';node.style.top=(c.y-CH/2)+'px';
  node.style.transform='translate(0,0) rotate(0deg) scale(1.06)';
}
function onPointerUp(e){
  if(!drag)return;
  if(drag.pressTimer){clearTimeout(drag.pressTimer);drag.pressTimer=null;}
  const c=drag.card;const node=cardNodes.get(c.id);
  node.classList.remove('dragging');
  if(drag.longFired){ // was tooltip
    // restore stack
    c.stack=c._origStack;c.layer=c._origLayer;renderCards();drag=null;return;
  }
  if(!drag.moved){
    // tap: restore + treat as nothing (could open tooltip via long press already)
    c.stack=c._origStack;c.layer=c._origLayer;renderCards();drag=null;return;
  }
  // find drop target
  let target=null,best=HIT();
  for(const other of state.cards){
    if(other===c)continue;
    const d=dist(other,c);
    if(d<best){best=d;target=other;}
  }
  onCardDropped(c,target);
  renderCards();
  checkGoals();
  drag=null;
}
function HIT(){return CW*0.78;}

/* ---------- 15. PARTICLES / EFFECTS ---------- */
let particles=[];
function sparkle(x,y){for(let i=0;i<8;i++)particles.push({x,y,vx:(Math.random()-.5)*60,vy:-Math.random()*60-20,life:0.6,max:0.6,c:'#fde68a',s:2+Math.random()*2});}
function burst(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=40+Math.random()*120;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.5+Math.random()*0.3,max:0.8,c:color,s:2+Math.random()*3});}}
function hitFx(c){const n=cardNodes.get(c.id);if(n){n.classList.remove('hit');void n.offsetWidth;n.classList.add('hit');}burst(c.x,c.y,'#f87171',6);sfx('hit');}
function redFlash(){dom.overlay.style.transition='none';dom.overlay.style.background='rgba(239,68,68,.28)';setTimeout(()=>{dom.overlay.style.transition='background .8s ease';},20);}
function updateParticles(dt){
  if(!dom.fx||!dom.fx.getContext)return;
  const ctx=dom.fx.getContext('2d');
  ctx.clearRect(0,0,dom.fx.width,dom.fx.height);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt/1000;p.vy+=180*dt/1000;p.x+=p.vx*dt/1000;p.y+=p.vy*dt/1000;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,7);ctx.fill();
  }
  ctx.globalAlpha=1;
}

/* ---------- 16. RENDER LOOP ---------- */
function startLoop(){if(running)return;running=true;lastTs=performance.now();rafId=window.requestAnimationFrame(loop);}
function stopLoop(){running=false;if(rafId){window.cancelAnimationFrame(rafId);rafId=null;}}
function loop(ts){
  if(!running)return;
  const dt=Math.min(64,ts-lastTs);lastTs=ts;
  if(state&&!state.paused&&!state.over){
    state.cycleElapsed+=dt;
    if(state.cycleElapsed>=state.cycleMs){state.cycleElapsed-=state.cycleMs;advanceCycle();}
    // combat
    combatAcc+=dt;
    if(combatAcc>=COMBAT_MS){combatAcc=0;combatTick();}
    // enemy movement during night-ish (always gentle)
    moveEnemies(dt);
    // idea conversions
    processIdeas(dt);
    // day/night overlay
    const prog=state.cycleElapsed/state.cycleMs;
    updateOverlay(prog);
    renderCards(); // cheap (positions changed by enemy move)
    updateHUD();
    updateCycleBar(prog);
  }
  updateParticles(dt);
  rafId=window.requestAnimationFrame(loop);
}
function updateOverlay(prog){
  let r,g,b,a;
  if(prog<NIGHT_START){
    // day
    const t=prog/NIGHT_START;
    a=0.06+0.02*Math.sin(t*Math.PI);
    dom.overlay.style.background=`rgba(255,220,100,${a.toFixed(3)})`;
    dom.starsfx.style.opacity=0;
  }else{
    const t=(prog-NIGHT_START)/(1-NIGHT_START);
    a=0.10+t*0.20;
    dom.overlay.style.background=`rgba(50,80,150,${a.toFixed(3)})`;
    dom.starsfx.style.opacity=t.toFixed(2);
  }
}
function updateCycleBar(prog){
  if(!dom.cycleFill)return;
  dom.cycleFill.style.width=(prog*100).toFixed(1)+'%';
  const night=prog>=NIGHT_START;
  dom.phaseTag.textContent=night?'🌙 Night':'☀️ Day';
  dom.phaseTag.className='phase-tag '+(night?'phase-night':'phase-day');
  dom.cycleNum.textContent='Cycle '+(state.cycle+1);
}
function updateHUD(){
  if(!state)return;
  const lv=state.level;
  dom.hudLevel.textContent=lv.id+'. '+lv.name;
  dom.hudChap.textContent=CH_EMOJI[lv.ch]+' '+CHAPTERS[lv.ch];
  dom.hudCycle.textContent=state.cycle+1;
  dom.hudCoin.textContent=coinCount();
  // goal
  const g=goalProgress(lv.goal);
  dom.hudGoal.textContent=g.label;
  dom.hudGoalBar.style.width=Math.min(100,g.cur/g.max*100)+'%';
  // bonus
  if(lv.bonus){const b=goalProgress(lv.bonus);dom.hudBonus.textContent=b.label;dom.hudBonusBar.style.width=Math.min(100,b.cur/b.max*100)+'%';}
  else{dom.hudBonus.textContent='—';dom.hudBonusBar.style.width='0%';}
  // deck
  dom.deckCount.textContent=state.deck.length;
  dom.deck.classList.toggle('empty',state.deck.length===0||coinCount()<1);
  // hint
  if(state.hint){dom.hintBar.textContent=state.hint;dom.hintBar.style.display='block';}
  else dom.hintBar.style.display='none';
}

/* ---------- GOALS ---------- */
function countOnBoard(type){return state.cards.filter(c=>c.type===type).length;}
function villagerCount(){return state.cards.filter(c=>c.type==='villager'||c.type==='baby').length;}
function goalProgress(g){
  switch(g.k){
    case 'produce':return {cur:state.produced[g.card]||0,max:g.n,label:`${CARD_TYPES[g.card].name} ×${state.produced[g.card]||0}/${g.n}`};
    case 'have':return {cur:countOnBoard(g.card),max:g.n,label:`${CARD_TYPES[g.card].name} ×${countOnBoard(g.card)}/${g.n}`};
    case 'villagers':return {cur:villagerCount(),max:g.n,label:`Villagers ${villagerCount()}/${g.n}`};
    case 'defeat':return {cur:state.defeated,max:g.n,label:`Defeat ${state.defeated}/${g.n}`};
    case 'defeattype':return {cur:state.defeatedTypes&&state.defeatedTypes[g.card]||0,max:g.n,label:`Slay ${CARD_TYPES[g.card].name} ${(state.defeatedTypes&&state.defeatedTypes[g.card])||0}/${g.n}`};
    case 'survive':return {cur:state.cycle,max:g.n,label:`Survive ${Math.min(state.cycle,g.n)}/${g.n} cycles`};
    case 'buildall':{const done=g.list.filter(b=>state.produced[b]>0||countOnBoard(b)>0).length;return {cur:done,max:g.list.length,label:`Build ${done}/${g.list.length} structures`};}
  }
  return {cur:0,max:1,label:''};
}
function goalMet(g){return goalProgress(g).cur>=goalProgress(g).max;}
function checkGoals(){
  if(state.over)return;
  if(goalMet(state.level.goal)){winGame();}
}

/* ---------- WIN / LOSE ---------- */
function winGame(){
  if(state.over)return;state.over=true;state.won=true;
  sfx('win');
  const bonusMet=state.level.bonus?goalMet(state.level.bonus):false;
  const stars=1+(state.deaths===0?1:0)+(bonusMet?1:0);
  // save
  if(!SAVE.stars[state.level.id]||stars>SAVE.stars[state.level.id])SAVE.stars[state.level.id]=stars;
  if(state.level.id>=SAVE.unlocked&&state.level.id<LEVELS.length)SAVE.unlocked=state.level.id+1;
  SAVE.last=Math.min(LEVELS.length,state.level.id+1);persistSave();
  // modal
  const bg=el('div','modal-bg');
  let starHTML='';for(let i=0;i<3;i++)starHTML+=`<span class="${i<stars?'s':'e'}">★</span>`;
  bg.innerHTML='<div class="modal"><div class="star-row">'+starHTML+'</div><h2 class="win">Level Complete!</h2>'+
    '<p>'+state.level.name+' cleared'+(state.deaths===0?' — no casualties!':'')+'</p>'+
    '<div class="stats"><div><b>'+state.cycle+'</b>Cycles</div><div><b>'+state.defeated+'</b>Defeated</div><div><b>'+state.deaths+'</b>Lost</div></div>'+
    '<div class="modal-actions">'+
    (state.level.id<LEVELS.length?'<button class="btn gold" id="w-next">▶ Next Level</button>':'<button class="btn gold" id="w-next">🏆 You Win!</button>')+
    '<button class="btn ghost" id="w-replay">↺ Replay</button>'+
    '<button class="btn ghost" id="w-menu">🏠 Menu</button></div></div>';
  dom.app.appendChild(bg);
  const next=bg.querySelector('#w-next');
  next.onclick=()=>{sfx('click');bg.remove();if(state.level.id<LEVELS.length)startLevel(state.level.id+1);else showMenu();};
  bg.querySelector('#w-replay').onclick=()=>{sfx('click');bg.remove();startLevel(state.level.id);};
  bg.querySelector('#w-menu').onclick=()=>{sfx('click');bg.remove();cleanupLevel();showMenu();};
}
function loseGame(){
  if(state.over)return;state.over=true;state.won=false;
  sfx('lose');
  const bg=el('div','modal-bg');
  bg.innerHTML='<div class="modal"><h2 class="lose">Village Fallen</h2><p>All your villagers were lost. Regroup and try again — every defeat teaches a new strategy.</p>'+
    '<div class="modal-actions"><button class="btn gold" id="l-retry">↺ Try Again</button><button class="btn ghost" id="l-menu">🏠 Menu</button></div></div>';
  dom.app.appendChild(bg);
  bg.querySelector('#l-retry').onclick=()=>{sfx('click');bg.remove();startLevel(state.level.id);};
  bg.querySelector('#l-menu').onclick=()=>{sfx('click');bg.remove();cleanupLevel();showMenu();};
}

/* ---------- IDEA / TIMER MGMT ---------- */
const timers=[];
function after(fn,ms){const id=setTimeout(fn,ms);timers.push(id);return id;}
function clearTimers(){timers.forEach(clearTimeout);timers.length=0;}
function scheduleIdea(card){card.convertAt=performance.now()+900;}
const IDEA_POOL=['villager','sword','shield','plank','plank','iron','coal','berry','berry','stone','coin','coin','helmet'];
function processIdeas(dt){
  const now=performance.now();
  for(const c of state.cards.slice()){
    if(c.type==='idea'&&c.convertAt&&now>=c.convertAt){
      const pick=IDEA_POOL[Math.floor(Math.random()*IDEA_POOL.length)];
      const x=c.x,y=c.y;removeCard(c);
      const nc=spawnCard(pick,x,y);state.produced[pick]=(state.produced[pick]||0)+1;
      burst(x,y,'#06b6d4',18);sfx('combine');
    }
  }
}

/* ---------- 17. START / CLEANUP ---------- */
function startLevel(id){
  cleanupLevel();
  hideTooltip();
  const level=LEVELS[id-1];
  if(!level){showMenu();return;}
  SAVE.last=id;persistSave();
  state=freshState(level);
  state.defeatedTypes={};
  buildGameScreen();
  layout();
  // wait a tick for layout
  after(()=>{
    layout();
    dealLevel();
    updateHUD();
    combatAcc=0;
    startLoop();
  },30);
}
function cleanupLevel(){
  stopLoop();
  clearTimers();
  particles=[];
  combatAcc=0;
  state=null;
  cardNodes.forEach(n=>n.remove());cardNodes.clear();
  hideTooltip();
  // remove any stray modals
  document.querySelectorAll('.modal-bg').forEach(m=>m.remove());
}
function syncMute(){
  if(Audio2.master){try{Audio2.master.gain.value=SAVE.mute?0:0.9;}catch(e){}}
  const fab=document.getElementById('muteFab');if(fab)fab.textContent=SAVE.mute?'🔇':'🔊';
  if(SAVE.mute)stopBGM();
}

/* ---------- INIT ---------- */
function init(){
  dom.app=document.getElementById('app');
  syncMute();
  document.getElementById('muteFab').onclick=()=>{audioInit();SAVE.mute=!SAVE.mute;persistSave();syncMute();if(!SAVE.mute){resumeAudio();startBGM();}};
  window.addEventListener('resize',()=>{layout();if(state)renderCards();});
  // first interaction primes audio
  const prime=()=>{audioInit();resumeAudio();startBGM();window.removeEventListener('pointerdown',prime);};
  window.addEventListener('pointerdown',prime);
  showMenu();
}
function cleanup(){
  cleanupLevel();
  stopBGM();
  clearTimers();
  window.removeEventListener('resize',layout);
}

return {init,cleanup,startLevel,CARD_TYPES,LEVELS,RECIPES:{GATHER,RECURRING,EQUIP,CRAFT},resolveRecipe,
  // exposed helpers for quick sanity checks
  _internals:{multisetOf,resolveRecipe,goalProgress}};
})();
window.STACKLANDS=STACKLANDS;
document.addEventListener('DOMContentLoaded',STACKLANDS.init);
</script>
