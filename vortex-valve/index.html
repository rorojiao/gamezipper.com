<script>
// ═══════════════════════════════════════════════════════════
// VORTEX VALVE — Fluid Flow Calibration Puzzle
// ═══════════════════════════════════════════════════════════

// Level data: [K dials, N positions, offsets[], links[[src,dst,ratio]], par]
const LEVELS=[{K:2,N:6,o:[4,5],l:[],p:3},{K:2,N:6,o:[5,5],l:[],p:2},{K:2,N:6,o:[2,5],l:[],p:3},{K:2,N:6,o:[2,3],l:[],p:5},{K:2,N:6,o:[3,5],l:[],p:4},{K:3,N:8,o:[1,5,1],l:[],p:5},{K:3,N:8,o:[5,2,3],l:[],p:8},{K:3,N:8,o:[5,3,3],l:[],p:9},{K:3,N:8,o:[2,5,7],l:[],p:6},{K:3,N:8,o:[2,3,3],l:[],p:8},{K:3,N:8,o:[1,6,7],l:[[1,0,1]],p:6},{K:3,N:8,o:[5,2,3],l:[[2,1,1]],p:7},{K:3,N:8,o:[7,6,4],l:[[1,2,-1]],p:5},{K:3,N:8,o:[6,6,7],l:[[1,0,1]],p:3},{K:3,N:8,o:[6,5,3],l:[[1,0,1]],p:7},{K:4,N:10,o:[7,2,4,4],l:[[3,1,1],[1,0,1]],p:11},{K:4,N:10,o:[4,1,6,5],l:[[0,1,-1],[1,2,-1]],p:15},{K:4,N:10,o:[1,8,3,4],l:[[2,1,-1],[1,0,1]],p:8},{K:4,N:10,o:[7,9,1,3],l:[[3,0,-1],[0,2,-1]],p:5},{K:4,N:10,o:[6,3,9,8],l:[[0,3,-1],[3,1,-1]],p:12},{K:4,N:12,o:[7,11,1,1],l:[[1,3,1],[3,2,-1]],p:11},{K:4,N:12,o:[11,5,2,5],l:[[0,3,1],[3,2,1]],p:16},{K:4,N:12,o:[2,10,6,6],l:[[2,1,-1],[1,3,-1]],p:14},{K:4,N:12,o:[8,8,6,1],l:[[3,0,-1],[0,2,-1]],p:11},{K:4,N:12,o:[6,2,11,2],l:[[1,3,1],[3,2,1]],p:9},{K:5,N:12,o:[7,7,1,2,1],l:[[3,1,1],[1,0,-1],[0,2,-1]],p:9},{K:5,N:12,o:[2,5,2,9,1],l:[[0,2,1],[2,4,1],[4,3,-1]],p:10},{K:5,N:12,o:[10,5,1,9,3],l:[[3,1,-1],[1,4,1],[4,2,-1]],p:10},{K:5,N:12,o:[1,2,11,9,7],l:[[0,3,-1],[3,1,-1],[1,2,-1]],p:9},{K:5,N:12,o:[8,2,10,11,3],l:[[3,2,1],[2,4,-1],[4,0,-1]],p:8}];

const TIER_NAMES=['','Apprentice','Operator','Technician','Engineer','Expert','Master'];
const VALVE_COLORS=['#00E5FF','#7C4DFF','#FFD700','#00E676','#FF5252'];

// ── State ──
let currentLevel=1,level=null,history=[],moves=0,hintTimer=0;
let canvas,ctx,W,H,dpr=1;
let progress={level:1,stars:{}};
let audioCtx=null,bgmNodes=[],soundOn=true,musicOn=true;
let particles=[],fluidAnim=0,winAnim=0;
let dialPositions=[]; // current positions array
let linkedMap={}; // src -> [{dst,ratio}]
let rafId=null,timers=[];

// ── Audio ──
function initAudio(){
  if(audioCtx)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}

function playTone(freq,dur,type,vol){
  if(!soundOn||!audioCtx)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(vol||.15,audioCtx.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function sfxClick(){playTone(300,.08,'square',.1);}
function sfxRotate(){playTone(400+Math.random()*100,.1,'triangle',.12);}
function sfxAlign(){playTone(659,.15,'sine',.15);setTimeout(()=>playTone(880,.2,'sine',.12),80);}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.3,'triangle',.18),i*100));}
function sfxError(){playTone(150,.2,'sawtooth',.1);}

function startBGM(){
  if(!musicOn||!audioCtx||bgmNodes.length)return;
  try{
    const sr=audioCtx.sampleRate,dur=12,bufSize=sr*dur;
    const buf=audioCtx.createBuffer(1,bufSize,sr),d=buf.getChannelData(0);
    const chords=[[220,277,330],[196,247,294],[220,262,330],[247,294,370]];
    const cd=dur/chords.length;
    for(let i=0;i<bufSize;i++){
      const t=i/sr,ci=Math.min(Math.floor(t/cd),chords.length-1),ch=chords[ci];
      let s=0;
      for(let n=0;n<ch.length;n++){const f=ch[n];s+=Math.sin(2*Math.PI*f*t)*.04;s+=Math.sin(2*Math.PI*f*2*t)*.01;}
      const fade=t%cd,fi=Math.min(fade/.5,1),fo=Math.min((cd-fade)/.5,1);
      s*=fi*fo;d[i]=s*.6;
    }
    const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
    const filt=audioCtx.createBiquadFilter();filt.type='lowpass';filt.frequency.value=600;
    const g=audioCtx.createGain();g.gain.value=.15;
    src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);
    src.start();bgmNodes=[src,filt,g];
  }catch(e){}
}

function stopBGM(){bgmNodes.forEach(n=>{try{n.stop&&n.stop();n.disconnect&&n.disconnect();}catch(e){}});bgmNodes=[];}

// ── Progress ──
function loadProgress(){
  try{const s=localStorage.getItem('vortexValve');if(s)progress=JSON.parse(s);}catch(e){progress={level:1,stars:{}};}
  if(!progress.stars)progress.stars={};
}
function saveProgress(){
  try{localStorage.setItem('vortexValve',JSON.stringify(progress));}catch(e){}
}

// ── Level Logic ──
function mod(a,n){return((a%n)+n)%n;}

function loadLevel(n){
  const lv=LEVELS[n-1];if(!lv)return;
  level=lv;
  dialPositions=lv.o.slice();
  linkedMap={};
  (lv.l||[]).forEach(l=>{
    if(!linkedMap[l[0]])linkedMap[l[0]]=[];
    linkedMap[l[0]].push({dst:l[1],ratio:l[2]});
  });
  history=[];moves=0;hintTimer=0;winAnim=0;
  document.getElementById('hintBar').style.display='none';
  buildDialPanel();
  updateHUD();
}

function rotateDial(dial,delta){
  if(!level||winAnim>0)return;
  initAudio();
  history.push(dialPositions.slice());
  dialPositions[dial]=mod(dialPositions[dial]+delta,level.N);
  sfxRotate();
  // Apply links
  if(linkedMap[dial]){
    linkedMap[dial].forEach(lk=>{
      dialPositions[lk.dst]=mod(dialPositions[lk.dst]+delta*lk.ratio,level.N);
    });
  }
  moves++;
  particles.push({type:'rotate',dial:dial,life:1});
  checkWin();
  updateDialPanel();
}

function checkWin(){
  if(!level)return false;
  const allZero=dialPositions.every(p=>p===0);
  if(allZero){
    winAnim=1;
    const stars=moves<=level.p?3:moves<=level.p*1.5?2:1;
    progress.stars[currentLevel]=Math.max(progress.stars[currentLevel]||0,stars);
    if(currentLevel<30)progress.level=Math.max(progress.level,currentLevel+1);
    saveProgress();
    sfxWin();
    // Win particles
    for(let i=0;i<30;i++)particles.push({type:'win',x:W/2,y:H/2,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,life:1,color:VALVE_COLORS[i%5]});
    setTimeout(()=>showWin(stars),600);
    return true;
  }
  return false;
}

function undoMove(){
  if(history.length===0||winAnim>0)return;
  dialPositions=history.pop();
  moves=Math.max(0,moves-1);
  sfxClick();
  updateDialPanel();
}

function resetLevel(){
  if(!level)return;
  dialPositions=level.o.slice();
  history=[];moves=0;winAnim=0;
  document.getElementById('hintBar').style.display='none';
  sfxClick();
  updateDialPanel();
}

function nextHint(){
  if(!level)return;
  // Find a dial not at 0 and suggest rotation direction (shortest path)
  for(let i=0;i<level.K;i++){
    if(dialPositions[i]!==0){
      const pos=dialPositions[i],N=level.N;
      const cwSteps=(N-pos)%N;
      const ccwSteps=pos;
      const dir=cwSteps<=ccwSteps?'+1':'-1';
      const steps=Math.min(cwSteps,ccwSteps);
      const hb=document.getElementById('hintBar');
      hb.textContent='Valve '+(i+1)+': Rotate '+dir+' ('+steps+' step'+(steps>1?'s':'')+')';
      hb.style.display='block';
      hintTimer=180;
      sfxClick();
      return;
    }
  }
}

function showWin(stars){
  document.getElementById('winOverlay').classList.remove('hidden');
  let starStr='';
  for(let i=0;i<3;i++)starStr+=i<stars?'★':'☆';
  document.getElementById('winStars').textContent=starStr;
  document.getElementById('winTitle').textContent=stars===3?'Perfect!':stars===2?'Calibrated!':'Done!';
  document.getElementById('winStats').textContent='Moves: '+moves+' / Par: '+level.p;
  document.getElementById('nextBtn').style.display=currentLevel<30?'inline-block':'none';
}

function startLevel(n){
  currentLevel=n;loadLevel(n);
  document.getElementById('menuOverlay').classList.add('hidden');
  document.getElementById('winOverlay').classList.add('hidden');
  if(musicOn){initAudio();startBGM();}
}

function nextLevel(){document.getElementById('winOverlay').classList.add('hidden');startLevel(Math.min(30,currentLevel+1));}
function retryLevel(){document.getElementById('winOverlay').classList.add('hidden');startLevel(currentLevel);}

function showMenu(){
  document.getElementById('menuOverlay').classList.remove('hidden');
  document.getElementById('winOverlay').classList.add('hidden');
  document.getElementById('contLvl').textContent=currentLevel;
  buildMenuGrid();
}

function buildMenuGrid(){
  const grid=document.getElementById('menuContent');
  let html='<div class="tier-grid">';
  for(let i=1;i<=30;i++){
    const locked=i>progress.level;
    const stars=progress.stars[i]||0;
    const cls=locked?'locked':(stars?'done':'');
    const starStr=stars?'★'.repeat(stars):'';
    html+='<button class="'+cls+'" '+(locked?'':'onclick="startLevel('+i+')"')+'>'+i+'<span class="stars">'+starStr+'</span></button>';
  }
  html+='</div>';
  // Settings
  html+='<div style="display:flex;gap:12px;margin-top:8px">';
  html+='<button class="btn btn-sm" id="sndBtn" onclick="toggleSound()">Sound: '+(soundOn?'ON':'OFF')+'</button>';
  html+='<button class="btn btn-sm" id="musBtn" onclick="toggleMusic()">Music: '+(musicOn?'ON':'OFF')+'</button>';
  html+='</div>';
  grid.innerHTML=html;
}

function toggleSound(){soundOn=!soundOn;document.getElementById('sndBtn').textContent='Sound: '+(soundOn?'ON':'OFF');}
function toggleMusic(){
  musicOn=!musicOn;
  document.getElementById('musBtn').textContent='Music: '+(musicOn?'ON':'OFF');
  if(musicOn){initAudio();startBGM();}else{stopBGM();}
}

function updateHUD(){
  document.getElementById('lvlInfo').textContent='L'+currentLevel;
  if(level)document.getElementById('parInfo').textContent='Par: '+level.p+' | Moves: '+moves;
}

// ── Dial Panel ──
function buildDialPanel(){
  const panel=document.getElementById('dialPanel');
  let html='';
  for(let i=0;i<level.K;i++){
    const linked=linkedMap[i]||(Object.keys(linkedMap).some(src=>linkedMap[src].some(l=>l.dst===i)));
    const cls=linked?'dial-btn linked':'dial-btn';
    html+='<div class="'+cls+'" id="dial'+i+'">';
    html+='<span class="dn">V'+(i+1)+'</span>';
    html+='<button class="btn btn-sm" onclick="rotateDial('+i+',1)">◀</button>';
    html+='<span class="dp" id="dp'+i+'">'+dialPositions[i]+'/'+level.N+'</span>';
    html+='<button class="btn btn-sm" onclick="rotateDial('+i+',-1)">▶</button>';
    html+='</div>';
  }
  panel.innerHTML=html;
  updateDialPanel();
}

function updateDialPanel(){
  if(!level)return;
  for(let i=0;i<level.K;i++){
    const dp=document.getElementById('dp'+i);
    if(dp)dp.textContent=dialPositions[i]+'/'+level.N;
    const db=document.getElementById('dial'+i);
    if(db){
      if(dialPositions[i]===0)db.classList.add('aligned');
      else db.classList.remove('aligned');
    }
  }
  updateHUD();
}

// ── Rendering ──
function resizeCanvas(){
  const c=document.getElementById('cv');
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  c.width=W*dpr;c.height=H*dpr;
  c.style.width=W+'px';c.style.height=H+'px';
  ctx=c.getContext('2d');ctx.scale(dpr,dpr);
}

function drawValve(cx,cy,radius,pos,N,color,aligned,index){
  // Outer pipe ring
  ctx.strokeStyle='#1a2848';ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(cx,cy,radius+6,0,Math.PI*2);ctx.stroke();

  // Inner valve body (dark)
  ctx.fillStyle='#0f1628';
  ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.fill();

  // Pressure gradient background (red→yellow→green based on offset)
  const offset=Math.min(pos,N-pos);
  const pct=offset/(N/2);
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,radius);
  if(aligned){
    grad.addColorStop(0,'rgba(0,230,118,.15)');
    grad.addColorStop(1,'rgba(0,230,118,0)');
  }else{
    const intensity=pct*.25;
    grad.addColorStop(0,'rgba(255,82,82,'+intensity+')');
    grad.addColorStop(.5,'rgba(255,145,0,'+(intensity*.5)+')');
    grad.addColorStop(1,'rgba(255,82,82,0)');
  }
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.fill();

  // Position ticks
  ctx.strokeStyle='#2a3a5a';ctx.lineWidth=1.5;
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2-Math.PI/2;
    const r1=radius-8,r2=radius-2;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
    ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);
    ctx.stroke();
  }

  // Target indicator (top, position 0)
  ctx.strokeStyle=aligned?'#00E676':'#2a3a5a';ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(cx,cy-radius-6);ctx.lineTo(cx-5,cy-radius-14);ctx.lineTo(cx+5,cy-radius-14);
  ctx.closePath();ctx.stroke();

  // Vortex blade (rotates to show position)
  const bladeAngle=(pos/N)*Math.PI*2-Math.PI/2;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(bladeAngle);

  // Blade glow
  if(!aligned){
    ctx.shadowColor=color;ctx.shadowBlur=15;
  }
  // Vortex spiral blade
  ctx.strokeStyle=color;ctx.lineWidth=3;
  ctx.beginPath();
  for(let t=0;t<=1;t+=.05){
    const r=radius*.8*t;
    const a=t*Math.PI*1.5;
    const x=Math.cos(a)*r,y=Math.sin(a)*r;
    if(t===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.shadowBlur=0;

  // Center hub
  ctx.fillStyle=aligned?'#00E676':color;
  ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0f1628';
  ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();

  ctx.restore();

  // Valve number
  ctx.fillStyle='#5a6a8a';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('V'+(index+1),cx,cy+radius+20);
}

function drawLink(fromIdx,toIdx,ratio,valves){
  const v1=valves[fromIdx],v2=valves[toIdx];
  if(!v1||!v2)return;
  ctx.strokeStyle='rgba(124,77,255,.4)';ctx.lineWidth=2;
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(v1.x,v1.y);ctx.lineTo(v2.x,v2.y);ctx.stroke();
  ctx.setLineDash([]);
  // Link indicator at midpoint
  const mx=(v1.x+v2.x)/2,my=(v1.y+v2.y)/2;
  ctx.fillStyle='#7C4DFF';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText(ratio>0?'1:1':'1:-1',mx,my-6);
}

function render(){
  if(!ctx)return;
  fluidAnim+=.016;
  if(winAnim>0)winAnim+=.016;

  // Clear
  ctx.fillStyle='#080c18';ctx.fillRect(0,0,W,H);

  // Background grid (industrial pipeline feel)
  ctx.strokeStyle='rgba(26,40,72,.3)';ctx.lineWidth=1;
  const gs=40;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Flowing particles in background
  for(let i=0;i<15;i++){
    const t=(fluidAnim*.3+i*.7)%1;
    const x=t*W,y=H*.5+Math.sin(t*Math.PI*4+i)*H*.3;
    ctx.fillStyle='rgba(0,229,255,'+(.08*(1-t))+')';
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
  }

  if(!level)return;

  // Calculate valve positions
  const K=level.K;
  const valveRadius=Math.min(60,Math.min(W,H)*.12);
  const spacing=Math.min(W*0.8/K,120);
  const startX=(W-(K-1)*spacing)/2;
  const valveY=H*.42;
  const valves=[];
  for(let i=0;i<K;i++){
    valves.push({x:startX+i*spacing,y:valveY});
  }

  // Draw links first (behind valves)
  (level.l||[]).forEach(lk=>{
    drawLink(lk[0],lk[1],lk[2],valves);
  });

  // Draw inlet/outlet pipes
  ctx.strokeStyle='#1a2848';ctx.lineWidth=6;
  // Inlet pipe (left side)
  ctx.beginPath();ctx.moveTo(0,valveY);ctx.lineTo(valves[0].x-valveRadius-6,valveY);ctx.stroke();
  // Outlet pipe (right side)
  ctx.beginPath();ctx.lineTo(valves[K-1].x+valveRadius+6,valveY);ctx.lineTo(W,valveY);ctx.stroke();
  // Connect between valves
  for(let i=0;i<K-1;i++){
    ctx.beginPath();ctx.moveTo(valves[i].x+valveRadius+6,valves[i].y);
    ctx.lineTo(valves[i+1].x-valveRadius-6,valves[i+1].y);ctx.stroke();
  }

  // Animated fluid flow in pipes
  const flowColor='rgba(0,229,255,.6)';
  ctx.strokeStyle=flowColor;ctx.lineWidth=3;
  ctx.setLineDash([12,8]);
  ctx.lineDashOffset=-fluidAnim*30;
  ctx.beginPath();ctx.moveTo(0,valveY);
  for(let i=0;i<K;i++){
    ctx.lineTo(valves[i].x-valveRadius-6,valves[i].y);
    ctx.moveTo(valves[i].x+valveRadius+6,valves[i].y);
    if(i<K-1)ctx.lineTo(valves[i+1].x-valveRadius-6,valves[i+1].y);
  }
  ctx.lineTo(W,valveY);
  ctx.stroke();
  ctx.setLineDash([]);ctx.lineDashOffset=0;

  // Draw valves
  for(let i=0;i<K;i++){
    const aligned=dialPositions[i]===0;
    drawValve(valves[i].x,valves[i].y,valveRadius,dialPositions[i],level.N,VALVE_COLORS[i%5],aligned,i);
  }

  // Draw particles
  particles=particles.filter(p=>{
    p.life-=.02;
    if(p.life<=0)return false;
    if(p.type==='rotate'){
      const v=valves[p.dial];if(!v)return false;
      ctx.strokeStyle='rgba(0,229,255,'+p.life+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(v.x,v.y,valveRadius+(1-p.life)*20,0,Math.PI*2);ctx.stroke();
    }else if(p.type==='win'){
      p.x+=p.vx;p.y+=p.vy;p.vy+=.3;
      ctx.fillStyle=p.color;ctx.globalAlpha=p.life;
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
    return true;
  });

  // Hint timer
  if(hintTimer>0){hintTimer--;if(hintTimer<=0)document.getElementById('hintBar').style.display='none';}

  rafId=requestAnimationFrame(render);
}

// ── Canvas Click (tap valve area for rotation) ──
function onCanvasClick(e){
  if(!level||winAnim>0)return;
  const rect=canvas.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  const K=level.K;
  const valveRadius=Math.min(60,Math.min(W,H)*.12);
  const spacing=Math.min(W*0.8/K,120);
  const startX=(W-(K-1)*spacing)/2;
  const valveY=H*.42;
  for(let i=0;i<K;i++){
    const vx=startX+i*spacing;
    const dx=cx-vx,dy=cy-valveY;
    if(Math.sqrt(dx*dx+dy*dy)<valveRadius+10){
      // Tap right half = +1, left half = -1
      rotateDial(i,dx>0?-1:1);
      return;
    }
  }
}

// ── Cleanup ──
function cleanup(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  timers.forEach(id=>clearInterval(id));timers=[];
  stopBGM();
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null;}stopBGM();}
  else if(!document.getElementById('menuOverlay').classList.contains('hidden')||level){rafId=requestAnimationFrame(render);if(musicOn){initAudio();startBGM();}}
});

// ── Init ──
window.addEventListener('load',()=>{
  loadProgress();
  canvas=document.getElementById('cv');
  resizeCanvas();
  canvas.addEventListener('pointerdown',onCanvasClick);
  canvas.addEventListener('pointercancel',()=>{});
  window.addEventListener('resize',resizeCanvas);
  rafId=requestAnimationFrame(render);
  showMenu();
});

window.addEventListener('DOMContentLoaded',()=>{
  // Attach game footer
  if(typeof initGameFooter==='function'){
    initGameFooter('vortex-valve','Vortex Valve','puzzle');
  }
});
</script>
