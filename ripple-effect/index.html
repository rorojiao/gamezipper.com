*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg1:#0a0a1a;--bg2:#1a1a3e;--accent:#00f0ff;--accent2:#ff00ff;--accent3:#00ff88;--glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.12);--text:#ffffff;--text-dim:#8888aa;--danger:#ff4466;--success:#00ff88;--gold:#ffd700;--font-display:'Orbitron',sans-serif;--font-body:'Inter',sans-serif}
html,body{width:100%;height:100%;overflow-x:hidden;user-select:none;-webkit-user-select:none;font-family:var(--font-body);background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text)}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh}
#app{width:100%;max-width:1280px;min-height:100vh;min-height:100dvh;position:relative;display:flex;flex-direction:column;align-items:center}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .3s}
.screen.active{display:flex}
.overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.overlay.active{display:flex}
.glass{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
h1,h2,h3{font-family:var(--font-display);text-shadow:0 0 20px rgba(0,240,255,.4),0 0 40px rgba(0,240,255,.15)}
.btn{font-family:var(--font-body);font-weight:600;border:none;border-radius:12px;cursor:pointer;transition:transform .15s,box-shadow .15s,background .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;outline:none;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.95)}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0088ff);color:#000;padding:14px 32px;font-size:16px;box-shadow:0 4px 20px rgba(0,240,255,.3)}
.btn-primary:hover{box-shadow:0 6px 30px rgba(0,240,255,.5)}
.btn-secondary{background:var(--glass);border:1px solid var(--glass-border);color:var(--text);padding:12px 24px;font-size:14px}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
.btn-icon{width:48px;height:48px;border-radius:12px;background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-size:20px}
.btn-icon:hover{background:rgba(255,255,255,.12)}
.title{font-family:var(--font-display);font-size:clamp(28px,6vw,48px);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.subtitle{color:var(--text-dim);font-size:clamp(13px,2.5vw,16px);margin-bottom:32px;text-align:center;padding:0 20px}
#mainMenu .menu-buttons{display:flex;flex-direction:column;gap:12px;width:min(300px,85vw)}
#mainMenu .menu-buttons .btn{width:100%;font-size:16px;padding:16px}
#levelSelect{padding:20px;overflow-y:auto}
.level-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;width:min(600px,90vw);margin:20px auto}
.level-btn{width:100%;aspect-ratio:1;border-radius:12px;background:var(--glass);border:1px solid var(--glass-border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;font-family:var(--font-body)}
.level-btn:hover:not(.locked){border-color:var(--accent);box-shadow:0 0 15px rgba(0,240,255,.2)}
.level-btn.locked{opacity:.4;cursor:default}
.level-btn.locked::after{content:'🔒';font-size:14px;position:absolute}
.level-btn .num{font-size:20px;font-weight:700;color:var(--text)}
.level-btn .stars{font-size:10px;margin-top:4px;color:var(--gold)}
.level-btn.completed{border-color:rgba(0,255,136,.3)}
.back-btn{position:absolute;top:16px;left:16px;z-index:5}
#gameScreen{padding:0;justify-content:flex-start}
#topBar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;gap:8px;flex-shrink:0}
#topBar .stat{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-dim);font-variant-numeric:tabular-nums}
#topBar .stat .val{color:var(--text);font-weight:600;font-size:15px}
#gameCanvas{touch-action:none;max-width:100%;flex-shrink:0}
#bottomBar{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;flex-shrink:0;flex-wrap:wrap}
.numpad{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.num-btn{width:48px;height:48px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:all .15s;-webkit-tap-highlight-color:transparent}
.num-btn:active{transform:scale(.9)}
.num-btn.active{border-color:var(--accent);box-shadow:0 0 10px rgba(0,240,255,.3)}
.num-btn.disabled{opacity:.3;pointer-events:none}
.num-btn.erase{font-size:16px;color:var(--danger)}
.action-btns{display:flex;gap:6px}
#progressBar{width:90%;max-width:400px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:4px auto;overflow:hidden}
#progressFill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .3s;width:0}
.panel{padding:24px;max-width:min(400px,90vw);width:100%}
.panel h2{text-align:center;margin-bottom:20px;font-size:20px}
.panel .close-btn{position:absolute;top:12px;right:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:rgba(255,255,255,.04);border-radius:10px;padding:12px;text-align:center}
.stat-card .label{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.stat-card .value{font-size:22px;font-weight:700;font-family:var(--font-display);color:var(--accent)}
.achieve-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.achieve-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:rgba(255,255,255,.03)}
.achieve-item.unlocked{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2)}
.achieve-item .icon{font-size:24px;width:36px;text-align:center}
.achieve-item .info .name{font-weight:600;font-size:14px}
.achieve-item .info .desc{font-size:11px;color:var(--text-dim)}
.tutorial-step{padding:24px;text-align:center}
.tutorial-step .step-title{font-family:var(--font-display);font-size:18px;margin-bottom:16px;color:var(--accent)}
.tutorial-step .step-text{font-size:14px;line-height:1.6;color:var(--text-dim);margin-bottom:20px}
.tutorial-step .step-visual{width:200px;height:200px;margin:0 auto 20px;border-radius:12px;background:rgba(0,0,0,.3)}
.tutorial-dots{display:flex;gap:8px;justify-content:center;margin:16px 0}
.tutorial-dots .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2)}
.tutorial-dots .dot.active{background:var(--accent)}
.daily-info{text-align:center;padding:20px}
.daily-info .date{font-family:var(--font-display);font-size:14px;color:var(--accent);margin-bottom:4px}
.daily-info .grid-size{color:var(--text-dim);font-size:13px;margin-bottom:16px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.settings-row .label{font-size:14px}
.toggle{width:48px;height:26px;border-radius:13px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--accent)}
.toggle .knob{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle.on .knob{left:24px}
#toastContainer{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;animation:toastIn .3s ease,toastOut .3s ease 2.7s;pointer-events:auto;white-space:nowrap}
.toast.success{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.3);color:var(--success)}
.toast.error{background:rgba(255,68,102,.15);border:1px solid rgba(255,68,102,.3);color:var(--danger)}
.toast.info{background:rgba(0,240,255,.15);border:1px solid rgba(0,240,255,.3);color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(0,240,255,.2)}50%{box-shadow:0 0 25px rgba(0,240,255,.5)}}
.shake{animation:shake .4s ease}
#levelSelect .header{display:flex;align-items:center;width:min(600px,90vw);margin:0 auto;padding-top:50px;gap:12px}
#levelSelect .header h2{font-size:20px}
@media(max-width:480px){
.num-btn{width:42px;height:42px;font-size:18px}
.btn-icon{width:42px;height:42px}
#topBar .stat{font-size:11px}
#topBar .stat .val{font-size:13px}
}

<script>
const G=(()=>{
'use strict';

/* ========== CONSTANTS ========== */
const SAVE_KEY='rippleEffectSave_v1';
const REGION_TINTS=[
  'rgba(0,180,255,.07)','rgba(255,80,80,.07)','rgba(80,255,80,.07)',
  'rgba(255,200,0,.07)','rgba(200,80,255,.07)','rgba(0,255,200,.07)',
  'rgba(255,120,0,.07)','rgba(120,0,255,.07)','rgba(0,255,120,.07)',
  'rgba(255,0,120,.07)','rgba(120,255,0,.07)','rgba(0,120,255,.07)'
];
const LEVELS=[];
for(let i=1;i<=30;i++){
  let sz;
  if(i<=5)sz=6;else if(i<=12)sz=8;else if(i<=22)sz=10;else sz=12;
  LEVELS.push({id:i,size:sz,difficulty:.3+(i/30)*.25,seed:i*7919+42});
}
const ACHIEVEMENTS=[
  {id:'firstWin',name:'First Victory',desc:'Complete your first level',icon:'&#127942;'},
  {id:'speedDemon',name:'Speed Demon',desc:'Complete a level in under 2 minutes',icon:'&#9889;'},
  {id:'perfectionist',name:'Perfectionist',desc:'Complete a level with no errors',icon:'&#11088;'},
  {id:'hintMaster',name:'Hint Master',desc:'Use all 3 hints and still win',icon:'&#129504;'},
  {id:'streak3',name:'Daily Streak',desc:'Complete 3 daily challenges in a row',icon:'&#128293;'},
  {id:'halfway',name:'Halfway There',desc:'Complete 15 levels',icon:'&#127775;'},
  {id:'completionist',name:'Completionist',desc:'Complete all 30 levels',icon:'&#127775;'},
  {id:'noHints',name:'Pure Logic',desc:'Complete a level without hints',icon:'&#129504;'}
];

/* ========== UTILITIES ========== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function createRNG(seed){return mulberry32(seed)}
function shuffle(arr,rng){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

/* ========== PUZZLE GENERATOR ========== */
function generateRegions(size,rng){
  const grid=Array.from({length:size},()=>Array(size).fill(-1));
  const regions=[];
  const cells=[];
  for(let r=0;r<size;r++)for(let c=0;c<size;c++)cells.push([r,c]);
  shuffle(cells,rng);
  let rid=0;
  for(const[sr,sc]of cells){
    if(grid[sr][sc]!==-1)continue;
    const target=2+Math.floor(rng()*4);
    const region=[[sr,sc]];
    grid[sr][sc]=rid;
    let tries=0;
    while(region.length<target&&tries<100){
      tries++;
      const candidates=[];
      for(const[rr,cc]of region){
        for(const[dr,dc]of[[0,1],[0,-1],[1,0],[-1,0]]){
          const nr=rr+dr,nc=cc+dc;
          if(nr>=0&&nr<size&&nc>=0&&nc<size&&grid[nr][nc]===-1)candidates.push([nr,nc]);
        }
      }
      if(!candidates.length)break;
      const[nr,nc]=candidates[Math.floor(rng()*candidates.length)];
      region.push([nr,nc]);
      grid[nr][nc]=rid;
    }
    regions.push(region);
    rid++;
  }
  // merge singletons
  for(let i=regions.length-1;i>=0;i--){
    if(regions[i].length>1)continue;
    const[r,c]=regions[i][0];
    let merged=false;
    for(const[dr,dc]of[[0,1],[0,-1],[1,0],[-1,0]]){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<size&&nc>=0&&nc<size&&grid[nr][nc]!==i){
        const targetRid=grid[nr][nc];
        regions[targetRid].push([r,c]);
        grid[r][c]=targetRid;
        regions.splice(i,1);
        // reassign ids
        for(let rr=0;rr<size;rr++)for(let cc=0;cc<size;cc++){
          if(grid[rr][cc]===i)grid[rr][cc]=targetRid;
        }
        merged=true;break;
      }
    }
    if(!merged){/* edge case: all singletons, force merge */}
  }
  // rebuild grid ids to be sequential
  const newGrid=Array.from({length:size},()=>Array(size).fill(-1));
  for(let i=0;i<regions.length;i++){
    for(const[r,c]of regions[i])newGrid[r][c]=i;
  }
  return{regions,regionMap:newGrid};
}

function canPlace(r,c,val,solution,regionUsed,size){
  const regionId=arguments[7]!==undefined?arguments[7]:null;
  // row check
  for(let cc=Math.max(0,c-val);cc<=Math.min(size-1,c+val);cc++){
    if(cc!==c&&solution[r][cc]===val)return false;
  }
  // col check
  for(let rr=Math.max(0,r-val);rr<=Math.min(size-1,r+val);rr++){
    if(rr!==r&&solution[rr][c]===val)return false;
  }
  return true;
}

function generateSolution(size,regions,regionMap,rng){
  const solution=Array.from({length:size},()=>Array(size).fill(0));
  const regionUsed=regions.map(()=>new Set());
  // order cells: fill smaller regions first
  const cellOrder=[];
  const sortedRegions=[...regions].sort((a,b)=>a.length-b.length);
  for(const region of sortedRegions)for(const[r,c]of region)cellOrder.push([r,c]);
  const regionSizes=regions.map(r=>r.length);

  function backtrack(idx){
    if(idx===cellOrder.length)return true;
    const[r,c]=cellOrder[idx];
    const rid=regionMap[r][c];
    const maxVal=regionSizes[rid];
    const vals=[];
    for(let v=1;v<=maxVal;v++)vals.push(v);
    shuffle(vals,rng);
    for(const val of vals){
      if(regionUsed[rid].has(val))continue;
      if(!canPlace(r,c,val,solution,regionUsed,size))continue;
      solution[r][c]=val;
      regionUsed[rid].add(val);
      if(backtrack(idx+1))return true;
      solution[r][c]=0;
      regionUsed[rid].delete(val);
    }
    return false;
  }
  return backtrack(0)?solution:null;
}

function countSolutions(size,regions,regionMap,partial,limit){
  const grid=partial.map(r=>[...r]);
  const regionUsed=regions.map(()=>new Set());
  const regionSizes=regions.map(r=>r.length);
  const emptyCells=[];
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    if(grid[r][c]>0){regionUsed[regionMap[r][c]].add(grid[r][c]);}
    else emptyCells.push([r,c]);
  }
  // MRV: sort by fewest possibilities
  let count=0;
  function getPossible(r,c){
    const rid=regionMap[r][c];const maxV=regionSizes[rid];const possible=[];
    for(let v=1;v<=maxV;v++){
      if(regionUsed[rid].has(v))continue;
      let ok=true;
      for(let cc=Math.max(0,c-v);cc<=Math.min(size-1,c+v);cc++){if(cc!==c&&grid[r][cc]===v){ok=false;break;}}
      if(!ok)continue;
      for(let rr=Math.max(0,r-v);rr<=Math.min(size-1,r+v);rr++){if(rr!==r&&grid[rr][c]===v){ok=false;break;}}
      if(ok)possible.push(v);
    }
    return possible;
  }
  function bt(idx){
    if(count>=limit)return;
    if(idx===emptyCells.length){count++;return;}
    // find cell with fewest options from remaining
    let bestIdx=idx,bestLen=999;
    for(let i=idx;i<emptyCells.length;i++){
      const[r,c]=emptyCells[i];
      const p=getPossible(r,c);
      if(p.length<bestLen){bestLen=p.length;bestIdx=i;}
      if(bestLen<=1)break;
    }
    if(bestIdx!==idx)[emptyCells[idx],emptyCells[bestIdx]]=[emptyCells[bestIdx],emptyCells[idx]];
    const[r,c]=emptyCells[idx];
    const rid=regionMap[r][c];
    const possible=getPossible(r,c);
    for(const val of possible){
      if(count>=limit)break;
      grid[r][c]=val;regionUsed[rid].add(val);
      bt(idx+1);
      grid[r][c]=0;regionUsed[rid].delete(val);
    }
    if(bestIdx!==idx)[emptyCells[idx],emptyCells[bestIdx]]=[emptyCells[bestIdx],emptyCells[idx]];
  }
  bt(0);
  return count;
}

function createPuzzle(size,regions,regionMap,solution,difficulty,rng){
  const given=Array.from({length:size},()=>Array(size).fill(true));
  const cells=[];
  for(let r=0;r<size;r++)for(let c=0;c<size;c++)cells.push([r,c]);
  shuffle(cells,rng);
  const total=size*size;
  const target=Math.floor(total*difficulty);
  let removed=0;
  const checkUnique=size<=8;
  for(const[r,c]of cells){
    if(removed>=target)break;
    given[r][c]=false;
    if(checkUnique){
      const partial=Array.from({length:size},(_,rr)=>Array.from({length:size},(_,cc)=>given[rr][cc]?solution[rr][cc]:0));
      if(countSolutions(size,regions,regionMap,partial,2)!==1){given[r][c]=true;continue;}
    }
    removed++;
  }
  // for large grids, ensure at least 1 given per region
  if(!checkUnique){
    for(let i=0;i<regions.length;i++){
      const hasGiven=regions[i].some(([r,c])=>given[r][c]);
      if(!hasGiven){
        const[r,c]=regions[i][Math.floor(rng()*regions[i].length)];
        given[r][c]=true;removed--;
      }
    }
  }
  return given;
}

function generateLevel(config){
  const rng=createRNG(config.seed);
  const{size,difficulty}=config;
  let regions,regionMap,solution;
  // retry if generation fails
  for(let attempt=0;attempt<10;attempt++){
    const r=createRNG(config.seed+attempt*9973);
    const gen=generateRegions(size,r);
    regions=gen.regions;regionMap=gen.regionMap;
    solution=generateSolution(size,regions,regionMap,r);
    if(solution)break;
  }
  if(!solution)return null;
  const puzzle=createPuzzle(size,regions,regionMap,solution,difficulty,rng);
  return{size,regions,regionMap,solution,puzzle,maxNum:Math.max(...regions.map(r=>r.length))};
}

/* ========== AUDIO SYSTEM ========== */
let audioCtx=null;
let masterGain=null;
let musicGain=null;
let musicNodes=[];

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=0.5;masterGain.connect(audioCtx.destination);
  musicGain=audioCtx.createGain();musicGain.gain.value=0.15;musicGain.connect(masterGain);
}
function resumeAudio(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume()}

function playTone(freq,dur,type,vol,freqEnd){
  if(!audioCtx||!state.settings.sound)return;
  resumeAudio();
  const o=audioCtx.createOscillator();const g=audioCtx.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  if(freqEnd)o.frequency.exponentialRampToValueAtTime(Math.max(20,freqEnd),audioCtx.currentTime+dur);
  g.gain.setValueAtTime(vol||.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(masterGain);o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxClick(){playTone(800,.06,'sine',.1)}
function sfxPlace(){playTone(600,.1,'triangle',.12);playTone(900,.08,'sine',.08)}
function sfxError(){playTone(200,.25,'sawtooth',.1,100)}
function sfxHint(){playTone(1200,.1,'sine',.1);setTimeout(()=>playTone(1500,.15,'sine',.1),80)}
function sfxCombo(n){playTone(400+n*100,.1,'triangle',.1)}
function sfxComplete(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.3,'triangle',.12),i*120));
}
function sfxLevelComplete(){
  [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,.4,'triangle',.15),i*150));
}

let bgmPlaying=false;
function startBGM(){
  if(!audioCtx||!state.settings.music||bgmPlaying)return;
  resumeAudio();bgmPlaying=true;
  function playPad(){
    if(!bgmPlaying||!state.settings.music)return;
    const now=audioCtx.currentTime;
    const chords=[[261,329,392],[293,349,440],[261,349,392],[246,311,370]];
    const chord=chords[Math.floor(Math.random()*chords.length)];
    chord.forEach(f=>{
      const o=audioCtx.createOscillator();const g=audioCtx.createGain();const filt=audioCtx.createBiquadFilter();
      o.type='sine';o.frequency.value=f+(Math.random()-.5)*2;
      filt.type='lowpass';filt.frequency.value=800;
      g.gain.setValueAtTime(0,audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(.04,now+1);
      g.gain.linearRampToValueAtTime(0,now+5);
      o.connect(filt);filt.connect(g);g.connect(musicGain);
      o.start(now);o.stop(now+5.5);
    });
    setTimeout(playPad,4500);
  }
  playPad();
}
function stopBGM(){bgmPlaying=false}

/* ========== GAME STATE ========== */
const state={
  screen:'mainMenu',
  currentLevel:null,
  levelData:null,
  playerGrid:null,
  selectedCell:null,
  score:0,
  combo:1,
  comboCount:0,
  errors:0,
  hintsUsed:0,
  hintsBank:3,
  timer:0,
  timerRunning:false,
  paused:false,
  moveHistory:[],
  redoStack:[],
  levelCache:{},
  save:{version:1,levelProgress:{},stats:{gamesPlayed:0,bestTimes:{},winStreak:0,dailyStreak:0,totalHints:0,completedDaily:[]},achievements:{},settings:{sound:true,music:true,timer:true,regions:true},hintsBank:3,lastDaily:''},

  dailyMode:false,

/* ========== CANVAS & RENDERING ========== */
let canvas,ctx;
let cellSize=0,gridOffset={x:0,y:0};
let canvasW=0,canvasH=0;
let animCells={};
let particles=[];
let rafId=null;
let lastFrameTime=0;
let hoverRegion=-1;

function setupCanvas(){
  canvas=document.getElementById('gameCanvas');
  ctx=canvas.getContext('2d');
  resizeCanvas();
}

function resizeCanvas(){
  if(!state.levelData)return;
  const dpr=window.devicePixelRatio||1;
  const topBar=document.getElementById('topBar').offsetHeight;
  const bottomBar=document.getElementById('bottomBar').offsetHeight;
  const progBar=document.getElementById('progressBar').offsetHeight;
  const availW=Math.min(window.innerWidth,1280);
  const availH=window.innerHeight-topBar-bottomBar-progBar-20;
  const sz=state.levelData.size;
  const maxCellW=Math.floor((availW-40)/sz);
  const maxCellH=Math.floor((availH-40)/sz);
  cellSize=Math.max(30,Math.min(maxCellW,maxCellH,64));
  canvasW=cellSize*sz+4;canvasH=cellSize*sz+4;
  canvas.style.width=canvasW+'px';canvas.style.height=canvasH+'px';
  canvas.width=canvasW*dpr;canvas.height=canvasH*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  gridOffset={x:2,y:2};
}

function getCellFromPos(px,py){
  const rect=canvas.getBoundingClientRect();
  const x=px-rect.left-gridOffset.x;
  const y=py-rect.top-gridOffset.y;
  const c=Math.floor(x/cellSize);
  const r=Math.floor(y/cellSize);
  const sz=state.levelData?state.levelData.size:0;
  if(r>=0&&r<sz&&c>=0&&c<sz)return{r,c};
  return null;
}

function render(timestamp){
  if(!ctx||!state.levelData){rafId=requestAnimationFrame(render);return;}
  const dt=lastFrameTime?(timestamp-lastFrameTime)/1000:0;
  lastFrameTime=timestamp;
  const{size,regions,regionMap,solution,puzzle,maxNum}=state.levelData;
  const pg=state.playerGrid;
  // clear
  ctx.clearRect(0,0,canvasW,canvasH);
  // region backgrounds
  if(state.settings.regions){
    for(let i=0;i<regions.length;i++){
      const tint=REGION_TINTS[i%REGION_TINTS.length];
      if(i===hoverRegion){
        ctx.fillStyle=tint.replace(/[\d.]+\)$/,'.15)');
      }else{
        ctx.fillStyle=tint;
      }
      for(const[r,c]of regions[i]){
        ctx.fillRect(gridOffset.x+c*cellSize,gridOffset.y+r*cellSize,cellSize,cellSize);
      }
    }
  }
  // grid lines
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
  for(let i=0;i<=size;i++){
    ctx.beginPath();ctx.moveTo(gridOffset.x+i*cellSize,gridOffset.y);ctx.lineTo(gridOffset.x+i*cellSize,gridOffset.y+size*cellSize);ctx.stroke();
    ctx.beginPath();ctx.moveTo(gridOffset.x,gridOffset.y+i*cellSize);ctx.lineTo(gridOffset.x+size*cellSize,gridOffset.y+i*cellSize);ctx.stroke();
  }
  // region borders (thick)
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2.5;
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      const rid=regionMap[r][c];
      const x=gridOffset.x+c*cellSize;const y=gridOffset.y+r*cellSize;
      // right border
      if(c===size-1||regionMap[r][c+1]!==rid){
        ctx.beginPath();ctx.moveTo(x+cellSize,y);ctx.lineTo(x+cellSize,y+cellSize);ctx.stroke();
      }
      // bottom border
      if(r===size-1||regionMap[r+1][c]!==rid){
        ctx.beginPath();ctx.moveTo(x,y+cellSize);ctx.lineTo(x+cellSize,y+cellSize);ctx.stroke();
      }
      // left border
      if(c===0||regionMap[r][c-1]!==rid){
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cellSize);ctx.stroke();
      }
      // top border
      if(r===0||regionMap[r-1][c]!==rid){
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cellSize,y);ctx.stroke();
      }
    }
  }
  // selected cell highlight
  if(state.selectedCell){
    const{r,c}=state.selectedCell;
    const x=gridOffset.x+c*cellSize;const y=gridOffset.y+r*cellSize;
    ctx.fillStyle='rgba(0,240,255,.15)';
    ctx.fillRect(x+1,y+1,cellSize-2,cellSize-2);
    ctx.strokeStyle='rgba(0,240,255,.6)';ctx.lineWidth=2;
    ctx.strokeRect(x+1,y+1,cellSize-2,cellSize-2);
  }
  // hint highlights
  if(state._hintCells){
    for(const{r,c,type}of state._hintCells){
      const x=gridOffset.x+c*cellSize;const y=gridOffset.y+r*cellSize;
      if(type==='error'){ctx.fillStyle='rgba(255,68,102,.2)';ctx.fillRect(x+1,y+1,cellSize-2,cellSize-2);}
      if(type==='reveal'){ctx.fillStyle='rgba(0,255,136,.15)';ctx.fillRect(x+1,y+1,cellSize-2,cellSize-2);}
    }
  }
  // numbers
  const fontSize=Math.max(14,cellSize*.45);
  ctx.font=`700 ${fontSize}px 'Inter',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      const val=pg[r][c];
      if(val===0)continue;
      const x=gridOffset.x+c*cellSize+cellSize/2;
      const y=gridOffset.y+r*cellSize+cellSize/2;
      const key=r+','+c;
      const anim=animCells[key];
      if(anim){
        anim.t+=dt*4;if(anim.t>=1){anim.t=1;delete animCells[key];}
        const s=.5+.5*anim.t;
        const a=anim.t;
        ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.globalAlpha=a;
      }
      const isGiven=puzzle[r][c];
      ctx.fillStyle=isGiven?'rgba(255,255,255,.9)':'rgba(0,240,255,.95)';
      if(anim)ctx.restore();
      if(anim){
        ctx.save();ctx.translate(x,y);const s2=.5+.5*anim.t;ctx.scale(s2,s2);ctx.globalAlpha=anim.t;
        ctx.fillStyle=isGiven?'rgba(255,255,255,.9)':'rgba(0,240,255,.95)';
        ctx.fillText(val,0,0);ctx.restore();
      }else{
        ctx.fillText(val,x,y);
      }
    }
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=.15*dt*60;p.life-=dt*1.5;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  rafId=requestAnimationFrame(render);
}

function addParticles(cx,cy,count,colors){
  for(let i=0;i<count;i++){
    particles.push({
      x:cx,y:cy,
      vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:1,size:2+Math.random()*3
    });
  }
}

function addCelebrationParticles(){
  if(!state.levelData)return;
  const{size}=state.levelData;
  for(let i=0;i<80;i++){
    const cx=gridOffset.x+Math.random()*size*cellSize;
    const cy=gridOffset.y+Math.random()*size*cellSize;
    addParticles(cx,cy,1,['#00f0ff','#ff00ff','#00ff88','#ffd700','#ff4466']);
  }
}

/* ========== INPUT HANDLING ========== */
function setupInput(){
  canvas.addEventListener('pointerdown',onPointerDown);
  canvas.addEventListener('pointermove',onPointerMove);
  document.addEventListener('keydown',onKeyDown);
}

function onPointerDown(e){
  e.preventDefault();
  resumeAudio();initAudio();
  const cell=getCellFromPos(e.clientX,e.clientY);
  if(!cell)return;
  if(state.levelData.puzzle[cell.r][cell.c])return;
  state.selectedCell=cell;
  sfxClick();
  updateNumpad();
}

function onPointerMove(e){
  const cell=getCellFromPos(e.clientX,e.clientY);
  if(cell&&state.levelData){
    const newHover=state.levelData.regionMap[cell.r][cell.c];
    if(newHover!==hoverRegion){hoverRegion=newHover;}
  }else{hoverRegion=-1;}
}

function onKeyDown(e){
  if(state.screen!=='gameScreen'||state.paused)return;
  const sel=state.selectedCell;
  if(!sel)return;
  const num=parseInt(e.key);
  if(num>=1&&num<=9){placeNumber(num);return;}
  if(e.key==='Backspace'||e.key==='Delete'){placeNumber(0);return;}
  if(e.key==='ArrowUp'&&sel.r>0){state.selectedCell={r:sel.r-1,c:sel.c};updateNumpad();}
  if(e.key==='ArrowDown'&&sel.r<(state.levelData?.size||0)-1){state.selectedCell={r:sel.r+1,c:sel.c};updateNumpad();}
  if(e.key==='ArrowLeft'&&sel.c>0){state.selectedCell={r:sel.r,c:sel.c-1};updateNumpad();}
  if(e.key==='ArrowRight'&&sel.c<(state.levelData?.size||0)-1){state.selectedCell={r:sel.r,c:sel.c+1};updateNumpad();}
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
}

/* ========== GAME LOGIC ========== */
function placeNumber(num){
  if(!state.selectedCell||!state.levelData)return;
  const{r,c}=state.selectedCell;
  const{solution,puzzle,size}=state.levelData;
  if(puzzle[r][c])return;
  const old=state.playerGrid[r][c];
  if(old===num)return;
  // save move for undo
  state.moveHistory.push({r,c,old,new:num});
  state.redoStack=[];
  state.playerGrid[r][c]=num;
  animCells[r+','+c]={t:0};
  if(num===0){sfxClick();updateProgress();writeSave();return;}
  // check if correct
  if(num===solution[r][c]){
    state.score+=10*state.combo;
    state.comboCount++;
    if(state.comboCount%3===0){state.combo=Math.min(state.combo+1,5);sfxCombo(state.combo);showToast(`Combo x${state.combo}!`,'success');}
    sfxPlace();
  }else{
    state.combo=1;state.comboCount=0;state.errors++;
    sfxError();
    // shake
    const key=r+','+c;
    animCells[key]={t:0,shake:true};
  }
  updateUI();updateProgress();
  checkWin();
  writeSave();
}

function checkWin(){
  const{size,solution}=state.levelData;
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    if(state.playerGrid[r][c]!==solution[r][c])return;
  }
  onLevelComplete();
}

function onLevelComplete(){
  state.timerRunning=false;
  sfxLevelComplete();
  addCelebrationParticles();
  // calculate score
  const timeBonus=Math.max(0,500-Math.floor(state.timer));
  const errorPenalty=state.errors*50;
  const finalScore=state.score+timeBonus-errorPenalty;
  const stars=state.errors===0?3:state.errors<=2?2:1;
  // achievements
  unlockAchieve('firstWin');
  if(state.timer<120)unlockAchieve('speedDemon');
  if(state.errors===0)unlockAchieve('perfectionist');
  if(state.hintsUsed===3)unlockAchieve('hintMaster');
  if(state.hintsUsed===0)unlockAchieve('noHints');
  // save progress
  const lid=state.dailyMode?'daily':state.currentLevel;
  const lp=state.save.levelProgress;
  if(!lp[lid]||lp[lid].stars<stars){
    lp[lid]={completed:true,stars,bestTime:Math.min(state.timer,lp[lid]?.bestTime||99999),bestScore:Math.max(finalScore,lp[lid]?.bestScore||0)};
  }
  state.save.stats.gamesPlayed++;
  state.save.stats.bestTimes[lid]=Math.min(state.timer,state.save.stats.bestTimes[lid]||99999);
  state.hintsBank+=1;// earn 1 hint per completion
  state.save.hintsBank=state.hintsBank;
  // count completed for achievements
  const completedCount=Object.values(lp).filter(l=>l.completed).length;
  if(completedCount>=15)unlockAchieve('halfway');
  if(completedCount>=30)unlockAchieve('completionist');
  writeSave();
  // show complete overlay
  setTimeout(()=>{
    document.getElementById('completeStars').innerHTML='&#9733;'.repeat(stars)+'&#9734;'.repeat(3-stars);
    document.getElementById('completeStats').innerHTML=`Time: ${formatTime(state.timer)} | Errors: ${state.errors} | Hints: ${state.hintsUsed}`;
    document.getElementById('completeScore').textContent=finalScore;
    showOverlay('completeMenu');
  },600);
}

/* ========== UNDO / REDO ========== */
function undo(){
  if(!state.moveHistory.length)return;
  const move=state.moveHistory.pop();
  state.redoStack.push(move);
  state.playerGrid[move.r][move.c]=move.old;
  animCells[move.r+','+move.c]={t:0};
  updateUI();updateProgress();writeSave();
}
function redo(){
  if(!state.redoStack.length)return;
  const move=state.redoStack.pop();
  state.moveHistory.push(move);
  state.playerGrid[move.r][move.c]=move.new;
  animCells[move.r+','+move.c]={t:0};
  updateUI();updateProgress();writeSave();
}

/* ========== HINTS ========== */
function useHint(type){
  if(state.hintsBank<=0&&state.hintsUsed>=3){showToast('No hints remaining','error');return;}
  if(!state.selectedCell&&type!==1){showToast('Select a cell first','info');return;}
  const{r,c}=state.selectedCell||{r:0,c:0};
  const{solution,puzzle,size,regionMap,regions}=state.levelData;
  if(puzzle[r][c]){showToast('This cell is given','info');return;}
  state.hintsUsed++;
  if(state.hintsUsed>3){state.hintsBank--;state.save.hintsBank=state.hintsBank;}
  state.save.stats.totalHints=(state.save.stats.totalHints||0)+1;
  sfxHint();
  if(!state._hintCells)state._hintCells=[];
  if(type===0){
    // reveal cell
    state.playerGrid[r][c]=solution[r][c];
    state._hintCells.push({r,c,type:'reveal'});
    animCells[r+','+c]={t:0};
    showToast('Cell revealed!','success');
  }else if(type===1){
    // check errors
    let errors=0;
    for(let rr=0;rr<size;rr++)for(let cc=0;cc<size;cc++){
      if(state.playerGrid[rr][cc]>0&&state.playerGrid[rr][cc]!==solution[rr][cc]){
        state._hintCells.push({r:rr,c:cc,type:'error'});errors++;
      }
    }
    showToast(errors?`${errors} error(s) found`:'No errors!','info');
    setTimeout(()=>{state._hintCells=[]},2000);
  }else if(type===2){
    // show possible numbers
    const rid=regionMap[r][c];const maxV=regions[rid].length;
    const possible=[];
    for(let v=1;v<=maxV;v++){
      // check region
      let inRegion=false;
      for(const[rr,rc]of regions[rid])if(state.playerGrid[rr][rc]===v){inRegion=true;break;}
      if(inRegion)continue;
      // check row/col
      let ok=true;
      for(let cc=Math.max(0,c-v);cc<=Math.min(size-1,c+v);cc++){if(cc!==c&&state.playerGrid[r][cc]===v){ok=false;break;}}
      if(!ok)continue;
      for(let rr=Math.max(0,r-v);rr<=Math.min(size-1,r+v);rr++){if(rr!==r&&state.playerGrid[rr][c]===v){ok=false;break;}}
      if(ok)possible.push(v);
    }
    showToast(`Possible: ${possible.join(', ')||'None'}`,'info');
  }
  writeSave();updateUI();
}

/* ========== TIMER ========== */
let timerInterval=null;
function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  state.timerRunning=true;
  timerInterval=setInterval(()=>{
    if(!state.timerRunning||state.paused)return;
    state.timer++;
    document.getElementById('timerDisplay').textContent=formatTime(state.timer);
  },1000);
}
function stopTimer(){state.timerRunning=false;if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
function formatTime(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

/* ========== UI FUNCTIONS ========== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  state.screen=id;
  if(id==='levelSelect')buildLevelGrid();
}
function showOverlay(id){document.getElementById(id).classList.add('active');}
function hideOverlay(id){document.getElementById(id).classList.remove('active');}
function closeOverlay(id){hideOverlay(id);}
function showToast(msg,type){
  const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

function buildLevelGrid(){
  const grid=document.getElementById('levelGrid');grid.innerHTML='';
  for(let i=0;i<LEVELS.length;i++){
    const lv=LEVELS[i];
    const prog=state.save.levelProgress[lv.id];
    const unlocked=i===0||(state.save.levelProgress[LEVELS[i-1]?.id]?.completed);
    const btn=document.createElement('div');
    btn.className='level-btn'+(unlocked?'':' locked')+(prog?.completed?' completed':'');
    btn.innerHTML=`<span class="num">${lv.id}</span><span class="stars">${'&#9733;'.repeat(prog?.stars||0)}${'&#9734;'.repeat(3-(prog?.stars||0))}</span>`;
    if(unlocked)btn.onclick=()=>startLevel(lv.id);
    grid.appendChild(btn);
  }
}

function updateUI(){
  document.getElementById('scoreDisplay').textContent=state.score;
  document.getElementById('comboDisplay').textContent='x'+state.combo;
  document.getElementById('timerDisplay').textContent=formatTime(state.timer);
  document.getElementById('undoBtn').style.opacity=state.moveHistory.length?.9:.3;
  document.getElementById('redoBtn').style.opacity=state.redoStack.length?.9:.3;
}

function updateProgress(){
  if(!state.levelData)return;
  const{size,puzzle}=state.levelData;
  let total=0,filled=0;
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    if(!puzzle[r][c]){total++;if(state.playerGrid[r][c]>0)filled++;}
  }
  const pct=total?Math.round(filled/total*100):100;
  document.getElementById('progressFill').style.width=pct+'%';
}

function updateNumpad(){
  const pad=document.getElementById('numpad');
  if(!state.levelData)return;
  const max=state.levelData.maxNum;
  if(pad.children.length!==max+1){
    pad.innerHTML='';
    for(let i=1;i<=max;i++){
      const b=document.createElement('button');b.className='num-btn';b.textContent=i;
      b.onclick=()=>placeNumber(i);pad.appendChild(b);
    }
    const eb=document.createElement('button');eb.className='num-btn erase';eb.innerHTML='&#9003;';
    eb.onclick=()=>placeNumber(0);pad.appendChild(eb);
  }
}

/* ========== LEVEL MANAGEMENT ========== */
function startLevel(id){
  initAudio();
  const config=LEVELS.find(l=>l.id===id);
  if(!config)return;
  showScreen('gameScreen');
  document.getElementById('levelDisplay').textContent=id;
  // generate or load from cache
  if(!state.levelCache[id]){
    showToast('Generating puzzle...','info');
    setTimeout(()=>{
      const data=generateLevel(config);
      if(!data){showToast('Generation failed, retrying...','error');return;}
      state.levelCache[id]=data;
      initGameState(id,data,false);
    },50);
  }else{
    initGameState(id,state.levelCache[id],false);
  }
}

function startDaily(){
  initAudio();
  const today=new Date();
  const seed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
  const dateStr=today.toISOString().slice(0,10);
  // check if already completed today
  const dailySize=8+Math.floor((today.getDay()+today.getDate())%3)*2;
  const config={id:'daily',size:dailySize,difficulty:.45,seed};
  showScreen('gameScreen');
  document.getElementById('levelDisplay').textContent='Daily';
  state.dailyMode=true;
  if(!state.levelCache['daily_'+seed]){
    const data=generateLevel(config);
    if(!data){showToast('Generation failed','error');return;}
    state.levelCache['daily_'+seed]=data;
    initGameState('daily',data,true);
  }else{
    initGameState('daily',state.levelCache['daily_'+seed],true);
  }
}

function initGameState(id,data,isDaily){
  state.currentLevel=id;
  state.levelData=data;
  state.playerGrid=Array.from({length:data.size},(_, r)=>Array.from({length:data.size},(_, c)=>data.puzzle[r][c]?data.solution[r][c]:0));
  state.selectedCell=null;
  state.score=0;state.combo=1;state.comboCount=0;state.errors=0;state.hintsUsed=0;
  state.timer=0;state.paused=false;state.moveHistory=[];state.redoStack=[];
  state._hintCells=[];state.dailyMode=isDaily;
  animCells={};particles=[];
  setupCanvas();setupInput();updateNumpad();updateUI();updateProgress();
  startTimer();
  if(state.settings.music){startBGM();}
}

function showPause(){state.paused=true;showOverlay('pauseMenu');}
function resume(){state.paused=false;hideOverlay('pauseMenu');}
function restartLevel(){
  hideOverlay('pauseMenu');hideOverlay('completeMenu');
  if(state.currentLevel){
    if(typeof state.currentLevel==='number')startLevel(state.currentLevel);
    else startDaily();
  }
}
function nextLevel(){
  hideOverlay('completeMenu');
  const next=typeof state.currentLevel==='number'?state.currentLevel+1:null;
  if(next&&next<=30)startLevel(next);
  else showScreen('levelSelect');
}
function quitToMenu(){
  stopTimer();stopBGM();
  hideOverlay('pauseMenu');hideOverlay('completeMenu');
  state.levelData=null;
  showScreen('mainMenu');
}

/* ========== TUTORIAL ========== */
const TUTORIAL_STEPS=[
  {title:'Welcome to Ripple Effect',text:'A Nikoli logic puzzle where you fill a grid with numbers. Each grid is divided into regions (rooms) shown by thick borders.',visual:'welcome'},
  {title:'Rule 1: Fill Regions',text:'Each region must contain consecutive numbers 1 to N, where N is the number of cells in that region. A 3-cell region uses {1, 2, 3}.',visual:'region'},
  {title:'Rule 2: Distance Rule',text:'If two identical numbers appear in the same row or column, there must be at least N cells with OTHER numbers between them. Two 3s need 3 cells apart.',visual:'distance'},
  {title:'Using Hints',text:'You have 3 hints per level: Reveal a cell, Check for errors, or Show possible numbers. Earn more by completing levels!',visual:'hints'},
  {title:'Scoring',text:'Earn 10 points per correct cell, multiplied by your combo. Complete levels quickly for time bonuses. Get 1-3 stars based on accuracy!',visual:'score'},
  {title:'Ready to Play!',text:'Start with Level 1 (6x6 grid) and work your way up to 12x12. Good luck!',visual:'ready'}
];

function showTutorial(){
  state.tutorialStep=0;
  renderTutorial();
  showOverlay('tutorialMenu');
}
function renderTutorial(){
  const step=TUTORIAL_STEPS[state.tutorialStep];
  const content=document.getElementById('tutorialContent');
  // draw mini visual
  let visualHTML='<div class="step-visual"><canvas id="tutorialCanvas" width="200" height="200"></canvas></div>';
  content.innerHTML=`<div class="tutorial-step"><div class="step-title">${step.title}</div>${visualHTML}<div class="step-text">${step.text}</div></div>`;
  // draw tutorial canvas
  setTimeout(()=>drawTutorialVisual(step.visual),50);
  // dots
  const dots=document.getElementById('tutorialDots');
  dots.innerHTML=TUTORIAL_STEPS.map((_,i)=>`<div class="dot${i===state.tutorialStep?' active':''}"></div>`).join('');
  document.getElementById('tutPrev').style.visibility=state.tutorialStep>0?'visible':'hidden';
  document.getElementById('tutNext').textContent=state.tutorialStep===TUTORIAL_STEPS.length-1?'Play!':'Next';
}
function drawTutorialVisual(type){
  const tc=document.getElementById('tutorialCanvas');
  if(!tc)return;
  const tctx=tc.getContext('2d');
  tctx.clearRect(0,0,200,200);
  const cs=40;const ox=20;const oy=20;
  if(type==='welcome'||type==='ready'){
    // draw a simple 4x4 grid with regions
    tctx.strokeStyle='rgba(255,255,255,.3)';tctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      tctx.beginPath();tctx.moveTo(ox+i*cs,oy);tctx.lineTo(ox+i*cs,oy+4*cs);tctx.stroke();
      tctx.beginPath();tctx.moveTo(ox,oy+i*cs);tctx.lineTo(ox+4*cs,oy+i*cs);tctx.stroke();
    }
    tctx.strokeStyle='rgba(255,255,255,.8)';tctx.lineWidth=3;
    // region borders
    tctx.strokeRect(ox,oy,2*cs,2*cs);
    tctx.strokeRect(ox+2*cs,oy,2*cs,cs);
    tctx.strokeRect(ox+2*cs,oy+cs,2*cs,cs);
    tctx.strokeRect(ox,oy+2*cs,cs,2*cs);
    tctx.strokeRect(ox+cs,oy+2*cs,3*cs,2*cs);
  }else if(type==='region'){
    // show a 3-cell region with 1,2,3
    const colors=['rgba(0,240,255,.2)','rgba(0,240,255,.2)','rgba(0,240,255,.2)'];
    [[0,0],[0,1],[1,0]].forEach(([r,c],i)=>{
      tctx.fillStyle=colors[i];tctx.fillRect(ox+c*cs,oy+r*cs,cs,cs);
    });
    tctx.strokeStyle='rgba(0,240,255,.8)';tctx.lineWidth=3;
    tctx.beginPath();tctx.moveTo(ox+2*cs,oy);tctx.lineTo(ox+2*cs,oy+2*cs);tctx.lineTo(ox,oy+2*cs);tctx.stroke();
    tctx.font='bold 18px Inter';tctx.fillStyle='#00f0ff';tctx.textAlign='center';tctx.textBaseline='middle';
    [[0,0,1],[0,1,2],[1,0,3]].forEach(([r,c,v])=>tctx.fillText(v,ox+c*cs+cs/2,oy+r*cs+cs/2));
  }else if(type==='distance'){
    // show distance rule
    tctx.font='bold 16px Inter';tctx.textAlign='center';tctx.textBaseline='middle';
    const nums=[1,2,3,0,0,0,3,2,1];
    nums.forEach((v,i)=>{
      const x=ox+i*20;const y=oy+40;
      tctx.fillStyle=v?'rgba(0,240,255,.8)':'rgba(255,255,255,.2)';
      tctx.fillText(v||'·',x+10,y);
    });
    tctx.font='12px Inter';tctx.fillStyle='#ff4466';
    tctx.fillText('Two 3s → need 3 cells between them',ox+80,oy+90);
    // arrows
    tctx.strokeStyle='rgba(255,68,102,.5)';tctx.lineWidth=1;
    tctx.beginPath();tctx.moveTo(ox+70,oy+55);tctx.lineTo(ox+130,oy+55);tctx.stroke();
  }else{
    // generic grid
    tctx.strokeStyle='rgba(255,255,255,.3)';tctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      tctx.beginPath();tctx.moveTo(ox+i*cs,oy);tctx.lineTo(ox+i*cs,oy+4*cs);tctx.stroke();
      tctx.beginPath();tctx.moveTo(ox,oy+i*cs);tctx.lineTo(ox+4*cs,oy+i*cs);tctx.stroke();
    }
  }
}
function tutorialPrev(){if(state.tutorialStep>0){state.tutorialStep--;renderTutorial();}}
function tutorialNext(){
  if(state.tutorialStep<TUTORIAL_STEPS.length-1){state.tutorialStep++;renderTutorial();}
  else{closeTutorial();showScreen('levelSelect');}
}
function closeTutorial(){hideOverlay('tutorialMenu');}

/* ========== CLEANUP ========== */
let cleanupFns=[];
function cleanup(){
  stopTimer();stopBGM();
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  particles=[];animCells={};
  // remove listeners
  if(canvas){
    canvas.removeEventListener('pointerdown',onPointerDown);
    canvas.removeEventListener('pointermove',onPointerMove);
  }
  cleanupFns.forEach(fn=>{try{fn();}catch(e){}});
  cleanupFns=[];
}

/* ========== INIT ========== */
function init(){
  loadSave();
  // start render loop (runs always, but only draws when level active)
  rafId=requestAnimationFrame(render);
  // handle resize
  window.addEventListener('resize',()=>{if(state.levelData)resizeCanvas();});
  // audio on first interaction
  document.addEventListener('pointerdown',()=>{initAudio();resumeAudio();},{once:true});
}

init();

/* ========== PUBLIC API ========== */
return{
  showScreen,showOverlay,hideOverlay,closeOverlay,
  startLevel,startDaily,
  showPause,resume,restartLevel,nextLevel,quitToMenu,
  undo,redo,useHint,
  placeNumber,
  showSettings,toggleSetting,
  showStats,
  showTutorial,tutorialPrev,tutorialNext,closeTutorial,
  showToast,
};

})();
</script>
