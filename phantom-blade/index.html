<script>
const PB=(()=>{
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W=400,H=600;

function resize(){
  const wrap=document.getElementById('wrap');
  W=wrap.clientWidth;H=wrap.clientHeight;
  const dpr=Math.min(window.devicePixelRatio||1,2);
  C.width=W*dpr;C.height=H*dpr;
  C.style.width=W+'px';C.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  DISC_X=W/2;DISC_Y=H*0.3;DISC_R=Math.min(W,H)*0.16;
  KNIFE_LEN=DISC_R*0.8;
}
window.addEventListener('resize',resize);

// Dynamic positions
let DISC_X=200,DISC_Y=180,DISC_R=80,KNIFE_LEN=50;
const KNIFE_W=4,COLLISION_ANGLE=0.12;

// Sound
let soundOn=true,audioCtx=null;
const bgm=new Audio('../audio/phantom-blade.mp3');
bgm.loop=true;bgm.volume=0.14;
let bgmStarted=false;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function initAudio(){getAudio();if(!bgmStarted&&soundOn){bgm.play().catch(()=>{});bgmStarted=true;}}
document.addEventListener('click',function s(){initAudio();document.removeEventListener('click',s);},{once:true});
document.addEventListener('visibilitychange',()=>{document.hidden?bgm.pause():(soundOn&&bgmStarted?bgm.play().catch(()=>{}):0);});

function toggleSound(){soundOn=!soundOn;document.getElementById('sndBtn').textContent=soundOn?'🔊':'🔇';soundOn?(bgm.play().catch(()=>{})):bgm.pause();}

function playHit(){
  if(!soundOn)return;const a=getAudio(),t=a.currentTime;
  const o=a.createOscillator(),g=a.createGain();
  o.type='square';o.frequency.setValueAtTime(1800,t);o.frequency.exponentialRampToValueAtTime(400,t+0.08);
  g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.12);
}
function playBoom(){
  if(!soundOn)return;const a=getAudio(),t=a.currentTime;
  const buf=a.createBuffer(1,a.sampleRate*0.4,a.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.08));
  const s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();
  f.type='lowpass';f.frequency.value=300;s.buffer=buf;
  g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  s.connect(f);f.connect(g);g.connect(a.destination);s.start(t);
}
function playFail(){
  if(!soundOn)return;const a=getAudio(),t=a.currentTime;
  const o=a.createOscillator(),g=a.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+0.3);
  g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.3);
}

// Particles
let particles=[];
function addParticle(x,y,color,count,speed,life){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,v=Math.random()*speed+speed*0.3;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life,maxLife:life,color,size:Math.random()*3+1,gravity:0});
  }
}
function addGravityParticle(x,y,color,count,speed,life){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,v=Math.random()*speed+speed*0.3;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-speed*0.5,life,maxLife:life,color,size:Math.random()*3+1.5,gravity:150});
  }
}

// Stars
const stars=[];
for(let i=0;i<60;i++)stars.push({x:Math.random()*800,y:Math.random()*800,s:Math.random()*1.5+0.5,a:Math.random()*Math.PI*2,sp:Math.random()*0.3+0.1});

// City buildings (generated once, redrawn scaled)
const buildings=[];
for(let i=0;i<20;i++)buildings.push({xFrac:i/20,wFrac:0.04+Math.random()*0.02,hFrac:0.03+Math.random()*0.06,windows:Math.floor(Math.random()*4)+1});

let lightningTimer=0,lightningLines=[];

function drawBG(){
  ctx.fillStyle='#0A0A0F';ctx.fillRect(0,0,W,H);
  // Stars
  for(const s of stars){
    s.a+=s.sp*0.02;
    ctx.globalAlpha=0.2+Math.sin(s.a)*0.25;ctx.fillStyle='#556';
    ctx.beginPath();ctx.arc(s.x/800*W,s.y/800*H,s.s,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // City silhouette
  const baseY=H*0.85;
  buildings.forEach(b=>{
    const bx=b.xFrac*W,bw=b.wFrac*W,bh=b.hFrac*H;
    ctx.fillStyle='#0E0E18';ctx.fillRect(bx,baseY-bh,bw,bh);
    ctx.strokeStyle='#1a1a2a';ctx.lineWidth=0.5;ctx.strokeRect(bx,baseY-bh,bw,bh);
    // Flickering windows
    for(let wi=0;wi<b.windows;wi++){
      if(Math.random()>0.02)continue; // Only occasionally change
      const wx=bx+2+Math.random()*(bw-4),wy=baseY-bh+2+Math.random()*(bh-4);
      ctx.fillStyle=Math.random()>0.5?'rgba(255,200,50,0.3)':'rgba(100,150,255,0.2)';
      ctx.fillRect(wx,wy,2,2);
    }
  });
  // Lightning
  if(lightningTimer>0){
    lightningTimer--;
    ctx.globalAlpha=0.15;ctx.strokeStyle='#8B5CF6';ctx.lineWidth=1.5;
    lightningLines.forEach(l=>{ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();});
    ctx.globalAlpha=1;
  }else if(Math.random()<1/300){
    lightningTimer=2;lightningLines=[];
    let x=Math.random()*W,y=0;
    for(let i=0;i<6;i++){
      const nx=x+(Math.random()-0.5)*40,ny=y+H*0.15;
      lightningLines.push({x1:x,y1:y,x2:nx,y2:ny});x=nx;y=ny;
    }
  }
}

// Levels
const levels=[];
for(let i=0;i<50;i++){
  let speed,preKnives,bombs,knives,reverses,boss;
  if(i<5){
    speed=0.8+i*0.1;preKnives=Math.min(Math.max(0,Math.floor(i*0.5)),3);
    bombs=0;knives=5;reverses=false;boss=false;
  }else if(i<15){
    speed=1.2+(i-5)*0.06;preKnives=Math.min(Math.floor(i*0.8),8);
    bombs=i<8?0:Math.min(1+Math.floor((i-8)*0.5),3);
    knives=5+Math.min(Math.floor((i-5)*0.3),3);reverses=i>=10;boss=false;
  }else if(i<25){
    speed=1.8+(i-15)*0.07;preKnives=7+Math.floor((i-15)*0.3);
    bombs=2+Math.floor((i-15)*0.3);knives=7+Math.floor((i-15)*0.2);reverses=true;boss=i>=20;
  }else if(i<35){
    speed=2.5+(i-25)*0.08;preKnives=9+Math.floor((i-25)*0.4);
    bombs=4+Math.floor((i-25)*0.4);knives=9;reverses=true;boss=i>=30;
  }else if(i<45){
    speed=3.2+(i-35)*0.1;preKnives=12+Math.floor((i-35)*0.3);
    bombs=6+Math.floor((i-35)*0.3);knives=10;reverses=true;boss=i>=40;
  }else{
    speed=4.0+(i-45)*0.15;preKnives=14+Math.floor((i-45)*0.4);
    bombs=8+Math.floor((i-45)*0.4);knives=12;reverses=true;boss=i===49;
  }
  levels.push({speed,preKnives,bombs,knives,reverses,boss});
}

// State
let state='menu',level=0,score=0,highScore=0,combo=0,paused=false;
let discAngle=0,discSpeed=0,discDir=1;
let stuckKnives=[],bombSlots=[],flyingKnife=null,knifeQueue=0;
let shakeTimer=0,flashTimer=0,flashColor='#FF2D55',hitFlash=0;
let sparks=[];
let levelCompleteTimer=0,menuDiscAngle=0;
let impactRings=[],shatterParts=[];
let runeAngle=0;
// Knife trail ghosts
let knifeGhosts=[];
// Gem targets on disc
let gemTargets=[];
// Perfect clear
let failedThisLevel=false;
// Speed bonus
let throwStartTime=0;
let floatingTexts=[];
// Knife skins
const SKINS=[
  {name:'Phantom',color:'#00D4FF',glow:'#00D4FF',trail:'#8B5CF6',unlock:0},
  {name:'Inferno',color:'#FF6B2B',glow:'#FF4500',trail:'#FF8C00',unlock:500},
  {name:'Void',color:'#9B30FF',glow:'#7B1FA2',trail:'#6A0DAD',unlock:1500}
];
let currentSkin=+(localStorage.getItem('pb_skin')||0);
// Scores history
let scoreHistory=[];
try{scoreHistory=JSON.parse(localStorage.getItem('pb_scores')||'[]');}catch(e){}
function saveScoreHistory(){
  scoreHistory.push(score);scoreHistory.sort((a,b)=>b-a);
  if(scoreHistory.length>5)scoreHistory.length=5;
  localStorage.setItem('pb_scores',JSON.stringify(scoreHistory));
}
function isNewRecord(){return scoreHistory.length===0||score>scoreHistory[0];}

try{const s=JSON.parse(localStorage.getItem('pb_save')||'{}');level=s.level||0;highScore=s.highScore||0;score=s.score||0;}catch(e){}
function save(){try{localStorage.setItem('pb_save',JSON.stringify({level,highScore,score}));}catch(e){}}

function togglePause(){if(state!=='playing')return;paused=!paused;document.getElementById('pauseBtn').textContent=paused?'▶':'⏸';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')togglePause();});

function initLevel(){
  const lv=levels[Math.min(level,levels.length-1)];
  discAngle=0;discSpeed=lv.speed;discDir=1;
  stuckKnives=[];bombSlots=[];flyingKnife=null;
  knifeQueue=lv.knives;combo=0;knifeGhosts=[];
  impactRings=[];shatterParts=[];sparks=[];hitFlash=0;paused=false;
  document.getElementById('pauseBtn').textContent='⏸';
  const usedAngles=[];
  for(let i=0;i<lv.preKnives;i++){
    let a;do{a=Math.random()*Math.PI*2;}while(usedAngles.some(u=>Math.abs(angleDiff(u,a))<COLLISION_ANGLE*1.5));
    usedAngles.push(a);stuckKnives.push({angle:a,isPlayer:false});
  }
  for(let i=0;i<lv.bombs;i++){
    let a;do{a=Math.random()*Math.PI*2;}while(usedAngles.some(u=>Math.abs(angleDiff(u,a))<COLLISION_ANGLE*2));
    usedAngles.push(a);bombSlots.push({angle:a,alive:true,pulse:0,crackLevel:0});
  }
  // Gem targets
  gemTargets=[];
  const gemCount=level<10?1:level<20?2:3;
  for(let gi=0;gi<gemCount;gi++){
    let ga;do{ga=Math.random()*Math.PI*2;}while(
      usedAngles.some(u=>Math.abs(angleDiff(u,ga))<COLLISION_ANGLE*2.5)
    );
    usedAngles.push(ga);
    gemTargets.push({angle:ga,alive:true,pulse:0});
  }
  failedThisLevel=false;
  floatingTexts=[];
  document.getElementById('lvlTxt').textContent='Level '+(level+1);
}

function angleDiff(a,b){let d=a-b;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d;}
function throwKnife(){if(flyingKnife||knifeQueue<=0||state!=='playing'||paused)return;flyingKnife={x:W/2,y:H-H*0.13,speed:800};knifeQueue--;throwStartTime=performance.now();}

// Disc drawing with rune effects
function drawDisc(){
  ctx.save();ctx.translate(DISC_X,DISC_Y);ctx.rotate(discAngle);

  // Energy vortex at center
  runeAngle+=0.008;
  const vortexGrad=ctx.createRadialGradient(0,0,0,0,0,DISC_R*0.4);
  vortexGrad.addColorStop(0,'rgba(139,92,246,0.15)');vortexGrad.addColorStop(1,'rgba(139,92,246,0)');
  ctx.save();ctx.rotate(runeAngle*3);
  ctx.fillStyle=vortexGrad;ctx.beginPath();ctx.arc(0,0,DISC_R*0.4,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Main disc body
  const breathe=Math.sin(animFrame*0.04)*0.3;
  ctx.shadowBlur=25+breathe*10;ctx.shadowColor='#8B5CF6';
  ctx.fillStyle='#2D2D3A';ctx.beginPath();ctx.arc(0,0,DISC_R,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Edge pulse glow
  ctx.strokeStyle=`rgba(139,92,246,${0.5+breathe*0.3})`;ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(0,0,DISC_R,0,Math.PI*2);ctx.stroke();

  // Rotating rune lines with gradient
  ctx.save();ctx.rotate(runeAngle);
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3;
    const grad=ctx.createLinearGradient(0,0,Math.cos(a)*DISC_R*0.8,Math.sin(a)*DISC_R*0.8);
    grad.addColorStop(0,'rgba(139,92,246,0.5)');grad.addColorStop(1,'rgba(139,92,246,0.05)');
    ctx.strokeStyle=grad;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*DISC_R*0.8,Math.sin(a)*DISC_R*0.8);ctx.stroke();
  }
  // Rune circles
  ctx.strokeStyle='rgba(139,92,246,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(0,0,DISC_R*0.5,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,DISC_R*0.3,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Center glow
  ctx.fillStyle='#8B5CF6';ctx.shadowBlur=12;ctx.shadowColor='#8B5CF6';
  ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Boss armor ring
  const lv=levels[Math.min(level,levels.length-1)];
  if(lv.boss&&bombSlots.some(b=>b.alive)){
    ctx.strokeStyle='rgba(255,45,85,0.4)';ctx.lineWidth=4;ctx.setLineDash([8,4]);
    ctx.beginPath();ctx.arc(0,0,DISC_R+3,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function drawStuckKnives(){
  for(const k of stuckKnives){
    const a=k.angle+discAngle;
    const tipX=DISC_X+Math.cos(a)*(DISC_R+2),tipY=DISC_Y+Math.sin(a)*(DISC_R+2);
    const endX=DISC_X+Math.cos(a)*(DISC_R+KNIFE_LEN),endY=DISC_Y+Math.sin(a)*(DISC_R+KNIFE_LEN);
    ctx.strokeStyle=k.isPlayer?SKINS[currentSkin].color:'#667';
    ctx.lineWidth=KNIFE_W;
    if(k.isPlayer){ctx.shadowBlur=10;ctx.shadowColor=SKINS[currentSkin].glow;}
    ctx.beginPath();ctx.moveTo(tipX,tipY);ctx.lineTo(endX,endY);ctx.stroke();
    ctx.shadowBlur=0;
    // Handle glow
    ctx.fillStyle=k.isPlayer?SKINS[currentSkin].color:'#444';
    ctx.beginPath();ctx.arc(endX,endY,4,0,Math.PI*2);ctx.fill();
    if(k.isPlayer){
      ctx.shadowBlur=6;ctx.shadowColor='#00D4FF';
      ctx.beginPath();ctx.arc(endX,endY,3,0,Math.PI*2);
      ctx.fillStyle='rgba(0,212,255,0.3)';ctx.fill();ctx.shadowBlur=0;
    }
  }
}

function drawBombs(){
  for(const b of bombSlots){
    if(!b.alive)continue;b.pulse+=0.05;
    const a=b.angle+discAngle;
    const bx=DISC_X+Math.cos(a)*(DISC_R+20),by=DISC_Y+Math.sin(a)*(DISC_R+20);
    ctx.save();ctx.translate(bx,by);ctx.rotate(discAngle*2);
    // Crack effect
    if(b.crackLevel>0){
      ctx.strokeStyle='rgba(255,100,50,0.6)';ctx.lineWidth=1;
      for(let i=0;i<b.crackLevel*3;i++){
        const ca=Math.random()*Math.PI*2,cl=4+Math.random()*6;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(ca)*cl,Math.sin(ca)*cl);ctx.stroke();
      }
    }
    ctx.shadowBlur=15+Math.sin(b.pulse)*5;ctx.shadowColor='#FF2D55';
    ctx.fillStyle='#FF2D55';
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(8,0);ctx.lineTo(0,10);ctx.lineTo(-8,0);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#FF2D5566';ctx.lineWidth=2;
    const pr=12+Math.sin(b.pulse)*4;
    ctx.beginPath();ctx.arc(0,0,pr,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

function drawGemTargets(){
  for(const g of gemTargets){
    if(!g.alive)continue;g.pulse+=0.04;
    const a=g.angle+discAngle;
    const gx=DISC_X+Math.cos(a)*(DISC_R+20),gy=DISC_Y+Math.sin(a)*(DISC_R+20);
    ctx.save();ctx.translate(gx,gy);ctx.rotate(discAngle*1.5);
    // Hexagon
    ctx.beginPath();
    for(let i=0;i<6;i++){const ha=i*Math.PI/3;ctx.lineTo(Math.cos(ha)*14,Math.sin(ha)*14);}
    ctx.closePath();
    ctx.fillStyle=`rgba(16,185,129,${0.3+Math.sin(g.pulse)*0.15})`;ctx.fill();
    ctx.strokeStyle='#10B981';ctx.lineWidth=2;ctx.shadowBlur=10;ctx.shadowColor='#10B981';ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.fillText('💎',0,0);
    ctx.restore();
  }
}
function drawFloatingTexts(dt){
  for(let i=floatingTexts.length-1;i>=0;i--){
    const ft=floatingTexts[i];ft.life-=dt;ft.y-=30*dt;
    if(ft.life<=0){floatingTexts.splice(i,1);continue;}
    ctx.globalAlpha=Math.min(1,ft.life*2);
    ctx.fillStyle=ft.color;ctx.font=`bold ${ft.size}px Segoe UI`;ctx.textAlign='center';
    ctx.shadowBlur=8;ctx.shadowColor=ft.color;
    ctx.fillText(ft.text,ft.x,ft.y);ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}
function drawFlyingKnife(){
  if(!flyingKnife)return;
  const k=flyingKnife;
  // Ghost trails
  for(let i=0;i<knifeGhosts.length;i++){
    const g=knifeGhosts[i];
    const alpha=(i/knifeGhosts.length)*0.35;
    ctx.globalAlpha=alpha;ctx.strokeStyle=SKINS[currentSkin].trail;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(g.x,g.y);ctx.lineTo(g.x,g.y+KNIFE_LEN*0.6);ctx.stroke();
  }
  ctx.globalAlpha=1;
  // Blade with glow
  ctx.shadowBlur=18;ctx.shadowColor=SKINS[currentSkin].glow;
  ctx.strokeStyle=SKINS[currentSkin].color;ctx.lineWidth=KNIFE_W;
  ctx.beginPath();ctx.moveTo(k.x,k.y);ctx.lineTo(k.x,k.y+KNIFE_LEN);ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='#0090AA';ctx.beginPath();ctx.arc(k.x,k.y+KNIFE_LEN-5,5,0,Math.PI*2);ctx.fill();
}

function drawKnifeQueue(){
  for(let i=0;i<knifeQueue;i++){
    const x=W/2,y=H-H*0.04-i*14;
    ctx.globalAlpha=i===0?1:0.35;
    ctx.strokeStyle=SKINS[currentSkin].color;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+10);ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawScore(){
  ctx.fillStyle='#fff';ctx.font='bold 20px Segoe UI';ctx.textAlign='center';
  ctx.fillText('Score: '+score,W/2,H-10);
  if(combo>1){ctx.fillStyle=SKINS[currentSkin].color;ctx.font='bold 18px Segoe UI';ctx.fillText('Combo x'+combo,W/2,DISC_Y+DISC_R+KNIFE_LEN+40);}
}

// Impact rings
function addImpactRing(x,y){impactRings.push({x,y,r:5,maxR:55,life:1});impactRings.push({x,y,r:3,maxR:35,life:0.8});}
function drawImpactRings(){
  for(let i=impactRings.length-1;i>=0;i--){
    const r=impactRings[i];r.r+=(r.maxR-r.r)*0.12;r.life-=0.04;
    if(r.life<=0){impactRings.splice(i,1);continue;}
    ctx.globalAlpha=r.life*0.6;ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.shadowBlur=12;ctx.shadowColor='#00D4FF';
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

// Shatter
function shatterDisc(){
  for(let i=0;i<200;i++){
    const a=Math.random()*Math.PI*2,d=Math.random()*DISC_R;
    const x=DISC_X+Math.cos(a)*d,y=DISC_Y+Math.sin(a)*d;
    const v=Math.random()*250+100;
    shatterParts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-80,life:2,color:Math.random()>0.5?'#8B5CF6':'#00D4FF',size:Math.random()*4+1.5});
  }
}

let animFrame=0,lastTime=performance.now();

// Overlay drawing
function drawOverlay(title,subtitle,btn1,btn2){
  ctx.fillStyle='rgba(10,10,15,0.85)';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.textAlign='center';
  ctx.shadowBlur=20;ctx.shadowColor='#8B5CF6';
  ctx.fillStyle='#8B5CF6';ctx.font=`bold ${Math.max(26,W*0.06)}px Segoe UI`;
  ctx.fillText(title,W/2,H*0.32);ctx.shadowBlur=0;
  ctx.fillStyle='#888';ctx.font=`${Math.max(14,W*0.035)}px Segoe UI`;
  ctx.fillText(subtitle,W/2,H*0.39);
  // Button 1
  const bw=Math.max(160,W*0.4),bh=56,bx=W/2-bw/2,by=H*0.47;
  ctx.shadowBlur=12;ctx.shadowColor='#8B5CF6';
  ctx.strokeStyle='#8B5CF6';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle='#8B5CF6';ctx.font=`bold ${Math.max(20,W*0.05)}px Segoe UI`;
  ctx.fillText(btn1,W/2,by+bh*0.65);
  // Button 2
  if(btn2){
    const b2y=by+bh+15;
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.roundRect(bx,b2y,bw,bh,8);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font=`${Math.max(14,W*0.035)}px Segoe UI`;
    ctx.fillText(btn2,W/2,b2y+bh*0.65);
  }
  ctx.restore();
  PB._btnBounds={bx,by,bw,bh};
}

function handleTap(e){
  e.preventDefault();
  initAudio();
  if(paused){togglePause();return;}
  const rect=C.getBoundingClientRect();
  const tx = e.clientX != null ? e.clientX : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientX : 0);
  const ty = e.clientY != null ? e.clientY : (e.changedTouches && e.changedTouches[0] ? e.changedTouches[0].clientY : 0);
  const x=tx-rect.left;
  const y=ty-rect.top;
  const sx=x*(W/rect.width),sy=y*(H/rect.height);

  if(state==='menu'){
    // Check skin buttons
    if(PB._skinBtns){
      for(const sb of PB._skinBtns){
        if(sb.unlocked&&sx>=sb.x&&sx<=sb.x+sb.w&&sy>=sb.y&&sy<=sb.y+sb.h){
          currentSkin=sb.idx;localStorage.setItem('pb_skin',currentSkin);return;
        }
      }
    }
    const b=PB._btnBounds;
    if(b&&sx>=b.bx&&sx<=b.bx+b.bw&&sy>=b.by&&sy<=b.by+b.bh){
      if(!localStorage.getItem('pb_tutorial_shown')){
        state='tutorial';initLevel();
      }else{
        state='playing';initLevel();
      }
    }
    return;
  }
  if(state==='tutorial'){
    localStorage.setItem('pb_tutorial_shown','1');
    state='playing';return;
  }
  if(state==='playing'){throwKnife();return;}
  if(state==='levelComplete'||state==='fail'){
    const b=PB._btnBounds;if(!b)return;
    if(sx>=b.bx&&sx<=b.bx+b.bw&&sy>=b.by&&sy<=b.by+b.bh){
      // Primary
      if(state==='levelComplete'){level=Math.min(level+1,levels.length-1);state='playing';initLevel();save();}
      else{combo=0;if(score>0)saveScoreHistory();state='playing';initLevel();}
      return;
    }
    const b2y=b.by+b.bh+15;
    if(sx>=b.bx&&sx<=b.bx+b.bw&&sy>=b2y&&sy<=b2y+b.bh){state='menu';return;}
  }
}
let _lastTapTime=0;
C.addEventListener('click',e=>{if(performance.now()-_lastTapTime<300)return;_lastTapTime=performance.now();handleTap(e);});
C.addEventListener('touchstart',e=>{_lastTapTime=performance.now();handleTap(e);},{passive:false});

function update(){
  const now=performance.now(),dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;animFrame++;

  ctx.save();
  if(shakeTimer>0){shakeTimer-=dt;ctx.translate((Math.random()-0.5)*shakeTimer*40,(Math.random()-0.5)*shakeTimer*40);}

  drawBG();

  if(state==='menu'){
    menuDiscAngle+=0.005;
    ctx.save();ctx.translate(W/2,H*0.45);ctx.rotate(menuDiscAngle);
    ctx.globalAlpha=0.12;ctx.fillStyle='#2D2D3A';ctx.beginPath();ctx.arc(0,0,W*0.2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#8B5CF6';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,W*0.2,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.restore();
    // Skin selector
    const skinY=H*0.62;
    const skinBtnW=70,skinGap=10;
    const totalSkinW=SKINS.length*(skinBtnW+skinGap)-skinGap;
    const skinStartX=(W-totalSkinW)/2;
    ctx.textAlign='center';ctx.font='bold 11px Segoe UI';
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText('🗡️ BLADE SKIN',W/2,skinY-12);
    PB._skinBtns=[];
    for(let si=0;si<SKINS.length;si++){
      const sx=skinStartX+si*(skinBtnW+skinGap);
      const s=SKINS[si];const unlocked=score>=s.unlock||highScore>=s.unlock;
      const selected=si===currentSkin;
      ctx.fillStyle=selected?'rgba(139,92,246,0.3)':'rgba(255,255,255,0.08)';
      ctx.beginPath();ctx.roundRect(sx,skinY,skinBtnW,40,6);ctx.fill();
      if(selected){ctx.strokeStyle=s.color;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(sx,skinY,skinBtnW,40,6);ctx.stroke();}
      ctx.fillStyle=unlocked?s.color:'#555';ctx.font='10px Segoe UI';
      ctx.fillText(s.name,sx+skinBtnW/2,skinY+16);
      if(!unlocked){ctx.fillStyle='#888';ctx.font='9px Segoe UI';ctx.fillText('🔒'+s.unlock+'pts',sx+skinBtnW/2,skinY+30);}
      else{
        // Mini knife preview
        ctx.strokeStyle=s.color;ctx.lineWidth=3;ctx.shadowBlur=6;ctx.shadowColor=s.glow;
        ctx.beginPath();ctx.moveTo(sx+skinBtnW/2,skinY+24);ctx.lineTo(sx+skinBtnW/2,skinY+36);ctx.stroke();
        ctx.shadowBlur=0;
      }
      PB._skinBtns.push({x:sx,y:skinY,w:skinBtnW,h:40,idx:si,unlocked});
    }
    drawOverlay('PHANTOM BLADE','Level '+(level+1)+' / 30  |  Best: '+highScore,'▶ PLAY',null);
    // Particles
    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.gravity*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1);}
    for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.maxLife);ctx.fillStyle=p.color;ctx.shadowBlur=6;ctx.shadowColor=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    ctx.restore();requestAnimationFrame(update);return;
  }

  if(state==='tutorial'){
    drawDisc();drawStuckKnives();
    // Draw tutorial overlay
    ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,H);
    const cx=W/2,fs=Math.max(15,W*0.035);
    // Neon border
    ctx.strokeStyle='#8B5CF6';ctx.shadowBlur=15;ctx.shadowColor='#8B5CF6';ctx.lineWidth=2;
    const bx=W*0.08,bby=H*0.15,bw=W*0.84,bh=H*0.65;
    ctx.strokeRect(bx,bby,bw,bh);ctx.shadowBlur=0;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#A78BFA';ctx.font=`bold ${fs*1.4}px "Segoe UI"`;
    ctx.fillText('🗡️ HOW TO PLAY',cx,H*0.25);
    ctx.fillStyle='rgba(139,92,246,0.4)';ctx.fillRect(W*0.2,H*0.3,W*0.6,1);
    const lines=[
      ['👆','Tap / Click — Throw a blade'],
      ['🎯','Hit the disk — Score points'],
      ['💥','Hit a bomb — Bonus explosion'],
      ['⚠️','Hit a blade — FAILED!']
    ];
    ctx.font=`${fs}px "Segoe UI"`;
    lines.forEach((l,i)=>{
      ctx.fillStyle='#E0D4FF';ctx.fillText(l[0]+'  '+l[1],cx,H*0.38+i*fs*2.4);
    });
    ctx.fillStyle='rgba(139,92,246,0.4)';ctx.fillRect(W*0.2,H*0.38+lines.length*fs*2.4+fs,W*0.6,1);
    ctx.fillStyle='rgba(167,139,250,0.6)';ctx.font=`${fs*0.85}px "Segoe UI"`;
    ctx.fillText('[ TAP TO START ]',cx,H*0.75);
    ctx.restore();requestAnimationFrame(update);return;
  }

  if(paused){
    drawDisc();drawStuckKnives();drawBombs();drawKnifeQueue();drawScore();
    ctx.fillStyle='rgba(10,10,15,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(24,W*0.06)}px Segoe UI`;ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2-10);
    ctx.fillStyle='#888';ctx.font=`${Math.max(13,W*0.03)}px Segoe UI`;
    ctx.fillText('Press ESC or ⏸ to resume',W/2,H/2+20);
    ctx.restore();requestAnimationFrame(update);return;
  }

  if(state==='playing'){
    const lv=levels[Math.min(level,levels.length-1)];
    if(lv.reverses&&Math.random()<0.002)discDir*=-1;
    discAngle+=discSpeed*discDir*dt;
    drawDisc();drawStuckKnives();drawBombs();

    if(flyingKnife){
      const k=flyingKnife;
      // Ghost trail (5+ frames)
      knifeGhosts.push({x:k.x,y:k.y});
      if(knifeGhosts.length>10)knifeGhosts.shift();
      k.y-=k.speed*dt;
      const dy=k.y-DISC_Y,dx=k.x-DISC_X,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<=DISC_R+5){
        let na=Math.atan2(dy,dx)-discAngle;
        while(na<0)na+=Math.PI*2;while(na>=Math.PI*2)na-=Math.PI*2;
        let hitBomb=false;
        for(const b of bombSlots){
          if(!b.alive)continue;
          if(Math.abs(angleDiff(na,b.angle))<COLLISION_ANGLE*1.8){
            b.alive=false;hitBomb=true;
            const bx2=DISC_X+Math.cos(b.angle+discAngle)*(DISC_R+20);
            const by2=DISC_Y+Math.sin(b.angle+discAngle)*(DISC_R+20);
            addGravityParticle(bx2,by2,'#FF2D55',55,180,1);
            flashTimer=0.15;flashColor='#FFFFFF';shakeTimer=0.2;
            playBoom();score+=50;combo++;break;
          }
        }
        // Check gem targets
        if(!hitBomb){
          for(const g of gemTargets){
            if(!g.alive)continue;
            if(Math.abs(angleDiff(na,g.angle))<COLLISION_ANGLE*2){
              g.alive=false;score+=100;
              const gx=DISC_X+Math.cos(g.angle+discAngle)*(DISC_R+20);
              const gy=DISC_Y+Math.sin(g.angle+discAngle)*(DISC_R+20);
              addParticle(gx,gy,'#10B981',30,150,0.8);
              addParticle(gx,gy,'#FFD700',20,200,1);
              flashTimer=0.2;flashColor='#FFD700';shakeTimer=0.3;
              floatingTexts.push({text:'💎 GEM!',x:W/2,y:H*0.35,life:2,color:'#FFD700',size:28});
              floatingTexts.push({text:'+100',x:gx,y:gy,life:1.2,color:'#10B981',size:18});
            }
          }
        }
        if(!hitBomb){
          let collided=false;
          for(const sk of stuckKnives){if(Math.abs(angleDiff(na,sk.angle))<COLLISION_ANGLE){collided=true;break;}}
          if(collided){
            state='fail';flyingKnife=null;knifeGhosts=[];failedThisLevel=true;
            playFail();flashTimer=0.6;flashColor='#FF2D55';shakeTimer=0.7;combo=0;
          }else{
            stuckKnives.push({angle:na,isPlayer:true});
            const tipX=DISC_X+Math.cos(na+discAngle)*(DISC_R+2);
            const tipY=DISC_Y+Math.sin(na+discAngle)*(DISC_R+2);
            addImpactRing(tipX,tipY);
            const skin=SKINS[currentSkin];
            addParticle(tipX,tipY,skin.color,10,100,0.5);
            shakeTimer=Math.max(shakeTimer,0.15);hitFlash=0.6;
            for(let si=0;si<10;si++){const sa=Math.random()*Math.PI*2,ss=3+Math.random()*5;sparks.push({x:tipX,y:tipY,vx:Math.cos(sa)*ss,vy:Math.sin(sa)*ss,life:1,color:Math.random()>0.5?'#FFD700':'#FF8C00'});}
            playHit();score+=10+combo*5;combo++;
            // Speed bonus
            const throwTime=(performance.now()-throwStartTime)/1000;
            if(throwTime<0.3){score+=10;floatingTexts.push({text:'⚡LIGHTNING! +10',x:tipX,y:tipY-20,life:1,color:'#FFD700',size:14});}
            else if(throwTime<0.5){score+=5;floatingTexts.push({text:'FAST! +5',x:tipX,y:tipY-20,life:1,color:'#00D4FF',size:13});}
          }
        }
        flyingKnife=null;knifeGhosts=[];
        if(state==='playing'&&knifeQueue<=0&&!flyingKnife){
          // Perfect clear bonus
          if(!failedThisLevel){
            const bonus=50*(level+1);score+=bonus;
            floatingTexts.push({text:'👑 PERFECT! +'+bonus,x:W/2,y:H*0.5,life:2.5,color:'#FFD700',size:28});
          }
          state='levelComplete';levelCompleteTimer=2;shatterDisc();shakeTimer=0.6;flashTimer=0.15;flashColor='#FFFFFF';
          if(score>highScore)highScore=score;save();
        }
      }
    }
    drawGemTargets();drawFlyingKnife();drawKnifeQueue();drawScore();drawFloatingTexts(dt);
  }

  if(state==='levelComplete'){
    // Update shatter
    for(let i=shatterParts.length-1;i>=0;i--){
      const p=shatterParts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;
      if(p.life<=0)shatterParts.splice(i,1);
    }
    for(const p of shatterParts){
      ctx.globalAlpha=Math.max(0,p.life/2);ctx.fillStyle=p.color;ctx.shadowBlur=6;ctx.shadowColor=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    drawScore();drawFloatingTexts(dt);
    // Sweep light
    levelCompleteTimer-=dt;
    const sweepX=(1-(levelCompleteTimer/2))*W;
    ctx.save();ctx.globalAlpha=0.15;
    const sg=ctx.createLinearGradient(sweepX-30,0,sweepX+30,0);
    sg.addColorStop(0,'rgba(0,212,255,0)');sg.addColorStop(0.5,'rgba(0,212,255,1)');sg.addColorStop(1,'rgba(0,212,255,0)');
    ctx.fillStyle=sg;ctx.fillRect(sweepX-30,0,60,H);ctx.restore();

    const gemsTotal=gemTargets.length+(gemTargets.filter(g=>!g.alive).length===0?0:0);
    const gemsCollected=gemTargets.filter(g=>!g.alive).length;
    const gemStr=gemsTotal>0?`  |  💎 ${gemsCollected}/${gemsTotal}`:'';
    const perfectStr=!failedThisLevel?' 👑 PERFECT!':'';
    drawOverlay('LEVEL CLEAR!'+perfectStr,'Score: '+score+gemStr,'Next Level ▶','↩ Main Menu');
  }

  if(state==='fail'){
    drawDisc();drawStuckKnives();drawBombs();drawGemTargets();drawKnifeQueue();drawScore();drawFloatingTexts(dt);
    drawOverlay('FAILED','Score: '+score,'Try Again','↩ Main Menu');
  }

  // Flash
  if(flashTimer>0){
    flashTimer-=dt;ctx.globalAlpha=Math.max(0,flashTimer)*0.4;
    ctx.fillStyle=flashColor;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }

  // Sparks
  if(hitFlash>0){hitFlash-=dt*3;ctx.save();ctx.globalAlpha=Math.max(0,hitFlash)*0.5;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(DISC_X,DISC_Y,DISC_R,0,Math.PI*2);ctx.fill();ctx.restore();}
  for(let i=sparks.length-1;i>=0;i--){const sp=sparks[i];sp.x+=sp.vx;sp.y+=sp.vy;sp.vy+=0.15;sp.life-=0.04;if(sp.life<=0)sparks.splice(i,1);}
  for(const sp of sparks){ctx.globalAlpha=sp.life;ctx.fillStyle=sp.color;ctx.beginPath();ctx.arc(sp.x,sp.y,2,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.gravity*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1);}
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.maxLife);ctx.fillStyle=p.color;ctx.shadowBlur=8;ctx.shadowColor=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  drawImpactRings();

  ctx.restore();
  requestAnimationFrame(update);
}

resize();
state='menu';
requestAnimationFrame(update);

// Expose score to window for testing/debug
Object.defineProperty(window,'score',{get:()=>score});
Object.defineProperty(window,'kills',{get:()=>combo});
// Keyboard: Space = throw knife (in addition to click/tap)
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&state==='playing'&&!paused){e.preventDefault();throwKnife();}
});
return{togglePause,toggleSound,throwKnife,_btnBounds:null,_skinBtns:null,getScore:()=>score,getState:()=>state};
})();
</script>
<script>new Image().src="https://site-analytics.cap.1ktower.com/hit?s=gamezipper.com&p="+encodeURIComponent(location.pathname);</script>
