<body>
<div class="nav">
<a href="https://gamezipper.com">← Back</a>
<span>🎮 Stacker</span>
<span id="soundToggle"></span>
</div>
<canvas id="c"></canvas>
<div id="hud"><span>Score: <b id="sc">0</b></span><span>Level: <b id="lvl">0</b></span><span>Best: <b id="bs">0</b></span></div>
<script src="../game-audio.js?v=9"></script>
<script src="../sound-toggle.js?v=9"></script>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let CW=400,CH=600;
function resize(){
  const maxW=Math.min(window.innerWidth-20,400),maxH=window.innerHeight-80;
  const scale=Math.min(maxW/400,maxH/600);
  canvas.style.width=Math.floor(400*scale)+'px';canvas.style.height=Math.floor(600*scale)+'px';
  canvas.width=CW;canvas.height=CH;
}
resize();window.addEventListener('resize',resize);

var score=0,level=0,bestScore=+(localStorage.getItem('stacker_best')||0);
document.getElementById('bs').textContent=bestScore;
const BLOCK_H=30,BASE_Y=CH-40;
let stack=[],current=null,fallingPieces=[],gameState='menu',perfectFlash=0,particles=[],scorePopups=[];

const PALETTE=['#4488ff','#44cc88','#88cc44','#cccc00','#ffaa00','#ff6644','#ff4488','#cc44ff','#8844ff','#4466ff'];
function colorForLevel(l){return PALETTE[l%PALETTE.length];}
function darken(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`;}

function playPlace(){try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(500,ac.currentTime);o.frequency.exponentialRampToValueAtTime(800,ac.currentTime+0.1);g.gain.setValueAtTime(0.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12);o.start();o.stop(ac.currentTime+0.12)}catch(e){}}
function playPerfect(){try{const ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.setValueAtTime(600,ac.currentTime);o.frequency.exponentialRampToValueAtTime(1200,ac.currentTime+0.2);g.gain.setValueAtTime(0.3,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);o.start();o.stop(ac.currentTime+0.3)}catch(e){}}

function spawnParticles(x,y,color,count=15){
  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*10,
      vy:(Math.random()-0.5)*10-3,
      life:1,
      color,
      size:3+Math.random()*4
    });
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=0.03;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=scorePopups.length-1;i>=0;i--){
    const s=scorePopups[i];
    s.y-=1.5;s.life-=0.02;
    if(s.life<=0)scorePopups.splice(i,1);
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  for(const s of scorePopups){
    ctx.globalAlpha=s.life;
    ctx.fillStyle=s.color;
    ctx.font='bold 20px Arial';
    ctx.textAlign='center';
    ctx.fillText('+'+s.score,s.x,s.y);
  }
  ctx.globalAlpha=1;
}

function startGame(){
  score=0;level=0;stack=[];fallingPieces=[];perfectFlash=0;
  const w=CW*0.6;
  stack.push({x:(CW-w)/2,w:w,y:BASE_Y,color:colorForLevel(0)});
  level=1;spawnBlock();gameState='play';
  document.getElementById('sc').textContent=0;document.getElementById('lvl').textContent=1;
  loop();
}

function spawnBlock(){
  const prev=stack[stack.length-1];
  const speed=Math.min(6,1.5+level*0.15);
  current={x:-prev.w,w:prev.w,y:BASE_Y-level*BLOCK_H,speed,dir:1,color:colorForLevel(level)};
}

function place(){
  if(!current)return;
  const prev=stack[stack.length-1];
  const left=Math.max(current.x,prev.x),right=Math.min(current.x+current.w,prev.x+prev.w);
  const overlap=right-left;
  if(overlap<5){
    gameState='over';
    // 失败粒子效果
    spawnParticles(current.x+current.w/2,current.y+BLOCK_H/2,'#ff4444',25);
    if(score>bestScore){bestScore=score;localStorage.setItem('stacker_best',bestScore);document.getElementById('bs').textContent=bestScore;}
    drawGameOver();return;
  }
  const perfect=Math.abs(current.x-prev.x)<=2;
  if(perfect){
    score+=50;playPerfect();perfectFlash=20;
    // Perfect 粒子 + 分数飘字
    spawnParticles(current.x+current.w/2,current.y+BLOCK_H/2,'#ffd700',20);
    scorePopups.push({x:current.x+current.w/2,y:current.y+BLOCK_H/2,score:50,color:'#ffd700',life:1});
    stack.push({x:prev.x,w:prev.w,y:current.y,color:current.color});
  }
  else{
    score+=10;playPlace();
    // 普通放置粒子 + 分数飘字
    spawnParticles(left+overlap/2,current.y+BLOCK_H/2,current.color,12);
    scorePopups.push({x:left+overlap/2,y:current.y+BLOCK_H/2,score:10,color:current.color,life:1});
    // cut off piece
    if(current.x<prev.x){fallingPieces.push({x:current.x,w:prev.x-current.x,y:current.y,dy:0,color:current.color});}
    if(current.x+current.w>prev.x+prev.w){fallingPieces.push({x:prev.x+prev.w,w:(current.x+current.w)-(prev.x+prev.w),y:current.y,dy:0,color:current.color});}
    stack.push({x:left,w:overlap,y:current.y,color:current.color});
  }
  document.getElementById('sc').textContent=score;
  level++;document.getElementById('lvl').textContent=level;
  if(level>=10&&level%10===0){/* continue */}
  spawnBlock();
}

function loop(){
  if(gameState!=='play')return;
  requestAnimationFrame(loop);
  if(current){current.x+=current.speed*current.dir;if(current.x+current.w>CW){current.dir=-1;}if(current.x<0){current.dir=1;}}
  fallingPieces.forEach(f=>{f.dy+=0.5;f.y+=f.dy;});
  fallingPieces=fallingPieces.filter(f=>f.y<CH+50);
  if(perfectFlash>0)perfectFlash--;
  drawAll();
}

function drawBlock(b,yOff){
  yOff=yOff||0;
  const col=b.color;
  // top face
  ctx.fillStyle=col;ctx.fillRect(b.x,b.y+yOff,b.w,BLOCK_H-4);
  // side face (darker)
  ctx.fillStyle=darken(col,0.6);ctx.fillRect(b.x,b.y+yOff+BLOCK_H-4,b.w,4);
  // left highlight
  ctx.fillStyle=darken(col,1.2);ctx.fillRect(b.x,b.y+yOff,3,BLOCK_H);
}

function drawAll(){
  ctx.fillStyle='#0a1628';ctx.fillRect(0,0,CW,CH);
  // camera offset for tall stacks
  const camY=Math.max(0,(level-8)*BLOCK_H);
  ctx.save();ctx.translate(0,camY);
  stack.forEach(b=>drawBlock(b));
  if(current)drawBlock(current);
  fallingPieces.forEach(f=>drawBlock(f));
  if(perfectFlash>0){ctx.fillStyle=`rgba(255,215,0,${perfectFlash/20*0.4})`;ctx.fillRect(0,0,CW,CH);}
  // particles
  updateParticles();
  drawParticles();
  ctx.restore();
}

function drawMenu(){
  ctx.fillStyle='#0a1628';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#ffd700';ctx.font='bold 40px Arial';ctx.textAlign='center';
  ctx.fillText('🏗️ STACKER',CW/2,CH/2-40);
  ctx.fillStyle='#e0e0e0';ctx.font='20px Arial';
  ctx.fillText('Press SPACE or Tap to Start',CW/2,CH/2+20);
}

function drawGameOver(){
  drawAll();
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#fff';ctx.font='bold 36px Arial';ctx.textAlign='center';
  ctx.fillText('GAME OVER',CW/2,CH/2-40);
  ctx.font='24px Arial';ctx.fillText('Score: '+score,CW/2,CH/2);
  ctx.fillText('Best: '+bestScore,CW/2,CH/2+35);
  ctx.fillStyle='#00ff88';ctx.fillRect(CW/2-70,CH/2+60,140,44);
  ctx.fillStyle='#000';ctx.font='bold 18px Arial';ctx.fillText('PLAY AGAIN',CW/2,CH/2+87);
}

drawMenu();

function handleAction(){
  if(gameState==='menu'||gameState==='over'){startGame();return;}
  if(gameState==='play')place();
}

document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Space'){e.preventDefault();handleAction();}});
canvas.addEventListener('click',handleAction);
canvas.addEventListener('touchstart',e=>{handleAction();},{passive:true});
</script>
