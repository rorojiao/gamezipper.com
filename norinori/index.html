const SAVE_KEY = 'norinori_save_v1';
const PREF_KEY = 'norinori_prefs_v1';

const TIERS = ['Beginner','Easy','Medium','Hard','Expert'];
const TIER_INDEX = {};
TIERS.forEach((t,i)=>TIER_INDEX[t]=i);

let state = {
  levelIndex: 0,
  grid: [],
  regions: [],
  undoStack: [],
  hintsUsed: 0,
  startTime: 0,
  solved: false,
  soundOn: true,
  musicOn: true
};

let audioCtx = null;
let bgmNodes = [];

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function init() {
  loadProgress();
  loadPrefs();
  showTutorial();
  loadLevel(state.levelIndex);
  setupEvents();
  requestAnimationFrame(loop);
}

function loadProgress() {
  try {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (data.v === 1) {
        state.levelIndex = data.levelIndex || 0;
      }
    }
  } catch(e) {}
}

function saveProgress() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      v: 1,
      levelIndex: state.levelIndex
    }));
  } catch(e) {}
}

function loadPrefs() {
  try {
    const saved = localStorage.getItem(PREF_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (data.v === 1) {
        state.soundOn = data.soundOn !== false;
        state.musicOn = data.musicOn !== false;
      }
    }
  } catch(e) {}
  document.getElementById('sound-toggle').classList.toggle('on', state.soundOn);
  document.getElementById('music-toggle').classList.toggle('on', state.musicOn);
}

function savePrefs() {
  try {
    localStorage.setItem(PREF_KEY, JSON.stringify({
      v: 1,
      soundOn: state.soundOn,
      musicOn: state.musicOn
    }));
  } catch(e) {}
}

function showTutorial() {
  const seen = localStorage.getItem('norinori_tutorial_seen');
  if (!seen) {
    showOverlay(`
      <h2>Norinori Rules</h2>
      <p>1. Shade exactly <strong>2 cells per region</strong></p>
      <p>2. All shaded cells must be <strong>orthogonally connected</strong> (each has ≥1 neighbor)</p>
      <p>3. Click/tap cells to toggle shading</p>
      <button class="ui-btn" onclick="closeTutorial();startBGM()">Got it!</button>
    `);
  } else {
    startBGM();
  }
}

function closeTutorial() {
  hideOverlay();
  localStorage.setItem('norinori_tutorial_seen', '1');
}

function loadLevel(idx) {
  const level = LEVELS[idx];
  state.regions = level.regions;
  state.grid = new Array(level.rows * level.cols).fill(0);
  state.undoStack = [];
  state.hintsUsed = 0;
  state.startTime = Date.now();
  state.solved = false;
  
  updateUI();
  resizeCanvas();
}

function resizeCanvas() {
  const level = LEVELS[state.levelIndex];
  const maxSize = Math.min(window.innerWidth - 40, 500);
  const cellSize = Math.floor(maxSize / level.cols);
  canvas.width = cellSize * level.cols;
  canvas.height = cellSize * level.rows;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}

function getRegion(r, c) {
  const level = LEVELS[state.levelIndex];
  return state.regions[r * level.cols + c];
}

function isShaded(r, c) {
  const level = LEVELS[state.levelIndex];
  return state.grid[r * level.cols + c] === 1;
}

function toggleShaded(r, c) {
  if (state.solved) return;
  
  const level = LEVELS[state.levelIndex];
  const idx = r * level.cols + c;
  const oldVal = state.grid[idx];
  state.grid[idx] = oldVal === 1 ? 0 : 1;
  state.undoStack.push({idx, oldVal});
  
  playSFX('click');
  checkWin();
}

function undo() {
  if (state.solved || state.undoStack.length === 0) return;
  const action = state.undoStack.pop();
  state.grid[action.idx] = action.oldVal;
  playSFX('undo');
}

function reset() {
  if (state.solved) return;
  const level = LEVELS[state.levelIndex];
  state.grid.fill(0);
  state.undoStack = [];
  state.hintsUsed = 0;
  playSFX('reset');
  updateUI();
}

function hint() {
  if (state.solved || state.hintsUsed >= 3) return;
  
  const level = LEVELS[state.levelIndex];
  const solution = level.solution;
  
  for (let i = 0; i < solution.length; i++) {
    if (solution[i] === 1 && state.grid[i] === 0) {
      state.grid[i] = 1;
      state.hintsUsed++;
      playSFX('hint');
      checkWin();
      return;
    }
  }
}

function checkWin() {
  const level = LEVELS[state.levelIndex];
  
  // Count shaded per region
  const shadedPerRegion = {};
  for (let i = 0; i < state.grid.length; i++) {
    if (state.grid[i] === 1) {
      const rid = state.regions[i];
      shadedPerRegion[rid] = (shadedPerRegion[rid] || 0) + 1;
    }
  }
  
  // Check each region has exactly 2
  for (const rid in shadedPerRegion) {
    if (shadedPerRegion[rid] !== 2) return;
  }
  
  // Check connectivity
  for (let i = 0; i < state.grid.length; i++) {
    if (state.grid[i] === 1) {
      const r = Math.floor(i / level.cols);
      const c = i % level.cols;
      let hasNeighbor = false;
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < level.rows && nc >= 0 && nc < level.cols) {
          const ni = nr * level.cols + nc;
          if (state.grid[ni] === 1) {
            hasNeighbor = true;
            break;
          }
        }
      }
      if (!hasNeighbor) return;
    }
  }
  
  // Win!
  state.solved = true;
  playSFX('win');
  
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  const score = Math.max(0, 1000 + Math.max(0, level.target_seconds - elapsed) * 10 - state.hintsUsed * 50);
  let stars = 1;
  if (score >= 800) stars = 3;
  else if (score >= 500) stars = 2;
  
  saveProgress();
  
  showOverlay(`
    <h2>Level Complete!</h2>
    <p>Score: ${score}</p>
    <p>Stars: ${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</p>
    <button class="ui-btn" onclick="nextLevel()">Next Level</button>
    <button class="ui-btn" onclick="showLevelSelect()">Level Select</button>
  `);
}

function nextLevel() {
  if (state.levelIndex < LEVELS.length - 1) {
    state.levelIndex++;
    hideOverlay();
    loadLevel(state.levelIndex);
  } else {
    hideOverlay();
    showOverlay(`<h2>All Levels Complete!</h2><p>Thank you for playing!</p><button class="ui-btn" onclick="hideOverlay()">Close</button>`);
  }
}

function showLevelSelect() {
  hideOverlay();
  const container = document.getElementById('level-select');
  container.innerHTML = '';
  container.style.display = 'block';
  
  let currentTier = '';
  for (let i = 0; i < LEVELS.length; i++) {
    const level = LEVELS[i];
    if (level.tier !== currentTier) {
      currentTier = level.tier;
      const header = document.createElement('h3');
      header.textContent = currentTier;
      header.style.color = '#aaddff';
      header.style.margin = '15px 0 10px';
      container.appendChild(header);
    }
    
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    btn.textContent = `Level ${i + 1}`;
    
    if (i > state.levelIndex) {
      btn.classList.add('locked');
    } else {
      btn.onclick = () => {
        container.style.display = 'none';
        state.levelIndex = i;
        loadLevel(i);
      };
    }
    
    container.appendChild(btn);
  }
  
  const closeBtn = document.createElement('button');
  closeBtn.className = 'ui-btn';
  closeBtn.textContent = 'Close';
  closeBtn.style.marginTop = '20px';
  closeBtn.onclick = () => container.style.display = 'none';
  container.appendChild(closeBtn);
}

function updateUI() {
  const level = LEVELS[state.levelIndex];
  document.getElementById('level-info').textContent = `Level ${level.id} (${level.tier})`;
  document.getElementById('hint-btn').textContent = `Hint (${3 - state.hintsUsed})`;
}

function showOverlay(html) {
  document.getElementById('overlay-content').innerHTML = html;
  document.getElementById('overlay').style.display = 'flex';
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

function draw() {
  const level = LEVELS[state.levelIndex];
  const cellSize = canvas.width / level.cols;
  
  // Background
  ctx.fillStyle = '#0f0f24';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw regions
  const regionColors = ['#1a2a3e','#2a3a4e','#1a3a2e','#3a2a2e','#2a1a3e'];
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const rid = getRegion(r, c);
      ctx.fillStyle = regionColors[rid % regionColors.length];
      ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
    }
  }
  
  // Region boundaries
  ctx.strokeStyle = '#4a5a6a';
  ctx.lineWidth = 2;
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const myRid = getRegion(r, c);
      const x = c * cellSize;
      const y = r * cellSize;
      
      // Check right neighbor
      if (c < level.cols - 1 && getRegion(r, c + 1) !== myRid) {
        ctx.beginPath();
        ctx.moveTo(x + cellSize, y);
        ctx.lineTo(x + cellSize, y + cellSize);
        ctx.stroke();
      }
      // Check bottom neighbor
      if (r < level.rows - 1 && getRegion(r + 1, c) !== myRid) {
        ctx.beginPath();
        ctx.moveTo(x, y + cellSize);
        ctx.lineTo(x + cellSize, y + cellSize);
        ctx.stroke();
      }
    }
  }
  
  // Draw shaded cells
  ctx.fillStyle = '#ff6b6b';
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      if (isShaded(r, c)) {
        const padding = 4;
        ctx.fillRect(c * cellSize + padding, r * cellSize + padding, cellSize - padding * 2, cellSize - padding * 2);
      }
    }
  }
  
  // Grid outline
  ctx.strokeStyle = '#6a7a8a';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, canvas.width, canvas.height);
}

let lastTime = 0;
let rafId = null;
function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  
  draw();
  
  rafId = requestAnimationFrame(loop);
}

function setupEvents() {
  canvas.addEventListener('pointerdown', e => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    const level = LEVELS[state.levelIndex];
    const cellSize = canvas.width / level.cols;
    const c = Math.floor(x / cellSize);
    const r = Math.floor(y / cellSize);
    
    if (r >= 0 && r < level.rows && c >= 0 && c < level.cols) {
      toggleShaded(r, c);
    }
  });
  
  document.getElementById('undo-btn').onclick = undo;
  document.getElementById('hint-btn').onclick = hint;
  document.getElementById('reset-btn').onclick = reset;
  
  document.getElementById('sound-toggle').onclick = function() {
    state.soundOn = !state.soundOn;
    this.classList.toggle('on', state.soundOn);
    savePrefs();
  };
  
  document.getElementById('music-toggle').onclick = function() {
    state.musicOn = !state.musicOn;
    this.classList.toggle('on', state.musicOn);
    if (state.musicOn) startBGM();
    else stopBGM();
    savePrefs();
  };
}

// Audio
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playTone(freq, duration, type = 'sine') {
  if (!state.soundOn || !audioCtx) return;
  initAudio();
  
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.type = type;
  osc.frequency.value = freq;
  
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playSFX(type) {
  if (!state.soundOn) return;
  
  switch(type) {
    case 'click':
      playTone(800, 0.1);
      break;
    case 'undo':
      playTone(600, 0.15);
      break;
    case 'reset':
      playTone(400, 0.2);
      break;
    case 'hint':
      playTone(1000, 0.15);
      setTimeout(() => playTone(1200, 0.15), 150);
      break;
    case 'win':
      [523, 659, 784, 1047].forEach((f, i) => {
        setTimeout(() => playTone(f, 0.3, 'triangle'), i * 150);
      });
      break;
  }
}

function startBGM() {
  if (!state.musicOn || bgmNodes.length) return;
  initAudio();
  
  const sr = audioCtx.sampleRate;
  const dur = 16;
  const bufSize = sr * dur;
  const buf = audioCtx.createBuffer(1, bufSize, sr);
  const d = buf.getChannelData(0);
  
  const chords = [[261.63,329.63,392.00],[293.66,369.99,440.00],[329.63,415.30,493.88],[293.66,369.99,440.00]];
  const chordDur = dur / chords.length;
  
  for (let i = 0; i < bufSize; i++) {
    const t = i / sr;
    const ci = Math.min(Math.floor(t / chordDur), chords.length - 1);
    const chord = chords[ci];
    let s = 0;
    for (const f of chord) {
      s += Math.sin(2 * Math.PI * f * t) * 0.06;
      s += Math.sin(2 * Math.PI * f * 2 * t) * 0.015;
      s += Math.sin(2 * Math.PI * f * 0.5 * t) * 0.03;
    }
    const fade = t % chordDur;
    const fadeIn = Math.min(fade / 0.8, 1);
    const fadeOut = Math.min((chordDur - fade) / 0.8, 1);
    s *= fadeIn * fadeOut;
    const lfo = Math.sin(2 * Math.PI * 0.25 * t) * 0.15 + 1;
    d[i] = s * lfo * 0.3;
  }
  
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 800;
  filt.Q.value = 1;
  
  const g = audioCtx.createGain();
  g.gain.value = 0.25;
  
  src.connect(filt);
  filt.connect(g);
  g.connect(audioCtx.destination);
  
  src.start();
  bgmNodes = [src, filt, g];
}

function stopBGM() {
  bgmNodes.forEach(n => {
    try { n.stop(); } catch(e) {}
    try { n.disconnect(); } catch(e) {}
  });
  bgmNodes = [];
}

function hideSettings() {
  document.getElementById('settings').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', init);

// Cleanup
function cleanup() {
  if (rafId) {
    cancelAnimationFrame(rafId);
    rafId = null;
  }
  stopBGM();
  if (audioCtx) {
    audioCtx.close().catch(() => {});
    audioCtx = null;
  }
}
window.addEventListener('beforeunload', cleanup);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopBGM();
  } else if (state.musicOn) {
    startBGM();
  }
});
</script>
</body>
