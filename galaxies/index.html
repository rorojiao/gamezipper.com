      }
    }
  }
}
function handleClick(e) {
  const level = LEVELS[STATE.currentLevel];
  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const c = Math.floor(x/cellSize), r = Math.floor(y/cellSize);
  if (c<0||c>=level.cols||r<0||r>=level.rows) return;
  const edgeX = x%cellSize, edgeY = y%cellSize;
  const nearVert = edgeX < 10 || edgeX > cellSize-10;
  const nearHoriz = edgeY < 10 || edgeY > cellSize-10;
  if (nearVert || nearHoriz) {
    // Vertical edge: between columns c and c+1 at row r (but only internal edges c in 0..cols-2)
    // Use the click's column to disambiguate: if clicked near the RIGHT edge of cell c, the edge is between c and c+1
    if (nearVert) {
      // Determine which vertical edge: left edge of cell c (between c-1 and c) if edgeX<10, or right edge (between c and c+1) if edgeX>cellSize-10
      let vc;
      if (edgeX < 10) vc = c - 1;       // left edge of cell c = between c-1 and c
      else vc = c;                       // right edge of cell c = between c and c+1
      if (vc >= 0 && vc < level.cols-1 && r >= 0 && r < level.rows) {
        const key = `v_${r}_${vc}`;
        const current = localStorage.getItem(key);
        const newVal = current === '1' ? '0' : '1';
        localStorage.setItem(key, newVal);
        STATE.moves.push({type:'border',key,old:current,new:newVal});
        playTone(400, 0.1);
        renderGrid();
      }
    } else {
      // nearHoriz: horizontal edge between rows r-1 and r (top edge) or r and r+1 (bottom edge)
      let hr;
      if (edgeY < 10) hr = r - 1;        // top edge of cell r = between r-1 and r
      else hr = r;                       // bottom edge of cell r = between r and r+1
      if (hr >= 0 && hr < level.rows-1 && c >= 0 && c < level.cols) {
        const key = `h_${hr}_${c}`;
        const current = localStorage.getItem(key);
        const newVal = current === '1' ? '0' : '1';
        localStorage.setItem(key, newVal);
        STATE.moves.push({type:'border',key,old:current,new:newVal});
        playTone(400, 0.1);
        renderGrid();
      }
    }
  }
}
function showHint() {
  if (STATE.hints <= 0) return;
  STATE.hints--;
  updateUI();
  const level = LEVELS[STATE.currentLevel];
  let found = false;
  for (let r=0;!found && r<level.rows;r++) {
    for (let c=0;!found && c<level.cols;c++) {
      const vKey = `v_${r}_${c}`, hKey = `h_${r}_${c}`;
      if (localStorage.getItem(vKey) === '1' || localStorage.getItem(hKey) === '1') continue;
      const i = r*level.cols + c, i2 = r*level.cols + c + 1;
      if (c < level.cols-1 && level.solution[i] !== level.solution[i2]) {
        localStorage.setItem(vKey, '1');
        found = true;
      } else if (r < level.rows-1 && level.solution[i] !== level.solution[i+level.cols]) {
        localStorage.setItem(hKey, '1');
        found = true;
      }
    }
  }
  if (found) {
    playTone(800, 0.15);
    renderGrid();
  }
}
function checkSolution() {
  const level = LEVELS[STATE.currentLevel];
  let correct = true;
  for (let r=0;correct && r<level.rows;r++) {
    for (let c=0;correct && c<level.cols;c++) {
      const vKey = `v_${r}_${c}`, hKey = `h_${r}_${c}`;
      const i = r*level.cols + c, i2 = r*level.cols + c + 1;
      if (c < level.cols-1) {
        const hasBorder = localStorage.getItem(vKey) === '1';
        const shouldBorder = level.solution[i] !== level.solution[i2];
        if (hasBorder !== shouldBorder) correct = false;
      }
      if (r < level.rows-1) {
        const hasBorder = localStorage.getItem(hKey) === '1';
        const shouldBorder = level.solution[i] !== level.solution[i+level.cols];
        if (hasBorder !== shouldBorder) correct = false;
      }
    }
  }
  if (correct) {
    winLevel();
  } else {
    playTone(200, 0.3);
  }
}
function winLevel() {
  stopTimer();
  const time = Math.floor((Date.now() - STATE.startTime)/1000);
  localStorage.setItem('galaxies-save', JSON.stringify({
    currentLevel: STATE.currentLevel + 1,
    soundOn: STATE.soundOn,
    musicOn: STATE.musicOn
  }));
  playTone(600, 0.2);
  setTimeout(()=>playTone(800, 0.2), 200);
  setTimeout(()=>playTone(1000, 0.3), 400);
  document.getElementById('win-time').textContent = formatTime(time);
  const stars = STATE.hints >= 2 ? 3 : STATE.hints >= 1 ? 2 : 1;
  document.getElementById('star-rating').textContent = '★'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('win-modal').style.display = 'flex';
}
function nextLevel() {
  document.getElementById('win-modal').style.display = 'none';
  if (STATE.currentLevel < LEVELS.length - 1) {
    loadLevel(STATE.currentLevel + 1);
  } else {
    showMenu();
  }
}
function undo() {
  if (STATE.moves.length === 0) return;
  const move = STATE.moves.pop();
  localStorage.setItem(move.key, move.old);
  renderGrid();
  playTone(300, 0.1);
}
function resetLevel() {
  for (let r=0;r<LEVELS[STATE.currentLevel].rows;r++) {
    for (let c=0;c<LEVELS[STATE.currentLevel].cols;c++) {
      localStorage.removeItem(`v_${r}_${c}`);
      localStorage.removeItem(`h_${r}_${c}`);
    }
  }
  STATE.moves = [];
  STATE.hints = 3;
  resetTimer();
  renderGrid();
  updateUI();
}
function showMenu() {
  stopTimer();
  showScreen('menu-screen');
  renderLevelSelect();
}
function showScreen(id) {
  document.getElementById('menu-screen').style.display = id === 'menu-screen' ? 'flex' : 'none';
  document.getElementById('game-screen').style.display = id === 'game-screen' ? 'flex' : 'none';
}
function handleKeydown(e) {
  if (document.getElementById('game-screen').style.display === 'none') return;
  if (e.key === '1') STATE.mode = 'border';
  if (e.key === '2') STATE.mode = 'erase';
  if (e.key === 'h' || e.key === 'H') showHint();
  if (e.key === 'r' || e.key === 'R') resetLevel();
  if (e.key === 'Enter') checkSolution();
  if (e.key === 'Escape') showMenu();
  updateUI();
}
function resetTimer() {
  stopTimer();
  STATE.startTime = Date.now();
  STATE.timerInterval = setInterval(() => {
    document.getElementById('timer').textContent = formatTime(Math.floor((Date.now() - STATE.startTime)/1000));
  }, 1000);
}
function stopTimer() {
  if (STATE.timerInterval) {
    clearInterval(STATE.timerInterval);
    STATE.timerInterval = null;
  }
}
function formatTime(s) {
  const m = Math.floor(s/60), ss = s%60;
  return `${m.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
}
function updateUI() {
  document.getElementById('music-status').textContent = STATE.musicOn ? 'ON' : 'OFF';
  document.getElementById('sfx-status').textContent = STATE.soundOn ? 'ON' : 'OFF';
}
function toggleMusic() {
  STATE.musicOn = !STATE.musicOn;
  if (STATE.musicOn) startBGM(); else stopBGM();
  updateUI();
}
function toggleSFX() {
  STATE.soundOn = !STATE.soundOn;
  updateUI();
}
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playTone(freq, dur) {
  if (!STATE.soundOn || !audioCtx) return;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.frequency.value = freq;
  gain.gain.value = 0.1;
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.stop(audioCtx.currentTime + dur);
}
function startBGM() {
  if (!audioCtx || bgmNodes.length) return;
  try {
    const sr = audioCtx.sampleRate, dur = 16, buf = audioCtx.createBuffer(1, sr*dur, sr);
    const d = buf.getChannelData(0);
    const chords = [[261.63,329.63,392.00],[293.66,369.99,440.00],[329.63,415.30,493.88],[293.66,369.99,440.00]];
    const chordDur = dur/chords.length;
    for (let i=0;i<sr*dur;i++) {
      const t = i/sr, ci = Math.min(Math.floor(t/chordDur), chords.length-1);
      const chord = chords[ci];
      let s = 0;
      for (let n=0;n<chord.length;n++) {
        const f = chord[n];
        s += Math.sin(2*Math.PI*f*t)*.06 + Math.sin(2*Math.PI*f*2*t)*.015 + Math.sin(2*Math.PI*f*0.5*t)*.03;
      }
      const fade = t%chordDur;
      const fadeIn = Math.min(fade/0.8,1), fadeOut = Math.min((chordDur-fade)/0.8,1);
      s *= fadeIn*fadeOut*0.5*0.5;
      d[i] = s;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 800; filt.Q.value = 1;
    const gain = audioCtx.createGain();
    gain.gain.value = STATE.musicOn ? 0.25 : 0;
    src.connect(filt).connect(gain).connect(audioCtx.destination);
    src.start();
    bgmNodes = [src,filt,gain];
  } catch(e) {}
}
function stopBGM() {
  bgmNodes.forEach(n => { if (n.stop) n.stop(); });
  bgmNodes = [];
}
function handleVisibility() {
  if (document.hidden) {
    if (bgmNodes.length) bgmNodes[2].gain.value = 0;
  } else {
    if (bgmNodes.length && STATE.musicOn) bgmNodes[2].gain.value = 0.25;
  }
}
function cleanup() {
  stopTimer();
  stopBGM();
  if (audioCtx) audioCtx.close().catch(()=>{});
}
window.onload = init;
</script>
