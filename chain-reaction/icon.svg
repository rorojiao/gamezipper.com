<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="100%" stop-color="#0a0e27"/>
    </radialGradient>
    <radialGradient id="cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#00aacc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#006699" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="magenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00aa" stop-opacity="1"/>
      <stop offset="60%" stop-color="#cc0088" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#880055" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="1"/>
      <stop offset="60%" stop-color="#cc8800" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#885500" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#2a2a4a" stroke-width="1" opacity="0.4">
    <line x1="128" y1="64" x2="128" y2="448"/>
    <line x1="256" y1="64" x2="256" y2="448"/>
    <line x1="384" y1="64" x2="384" y2="448"/>
    <line x1="64" y1="128" x2="448" y2="128"/>
    <line x1="64" y1="256" x2="448" y2="256"/>
    <line x1="64" y1="384" x2="448" y2="384"/>
  </g>

  <!-- Background atoms (low opacity enemy) -->
  <g opacity="0.35">
    <circle cx="192" cy="128" r="22" fill="#ff3366" filter="url(#glow)"/>
    <circle cx="320" cy="384" r="22" fill="#ff3366" filter="url(#glow)"/>
    <circle cx="384" cy="192" r="22" fill="#ff3366" filter="url(#glow)"/>
  </g>

  <!-- Center explosion (focal) -->
  <g filter="url(#glow-strong)">
    <circle cx="256" cy="256" r="64" fill="url(#gold)"/>
    <circle cx="256" cy="256" r="44" fill="#fff8cc" opacity="0.8"/>
    <circle cx="256" cy="256" r="22" fill="#ffffff"/>
  </g>

  <!-- Shockwave rings -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#ffaa00" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ffaa00" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ffaa00" stroke-width="1.5" opacity="0.2"/>

  <!-- Player cyan atoms (chain source) -->
  <g filter="url(#glow)">
    <circle cx="128" cy="256" r="32" fill="url(#cyan)"/>
    <circle cx="128" cy="256" r="20" fill="#00ffff"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="256" cy="128" r="28" fill="url(#cyan)"/>
    <circle cx="256" cy="128" r="16" fill="#00ffff"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="256" cy="384" r="28" fill="url(#cyan)"/>
    <circle cx="256" cy="384" r="16" fill="#00ffff"/>
  </g>

  <!-- Magenta atoms (cascade target) -->
  <g filter="url(#glow)">
    <circle cx="384" cy="256" r="28" fill="url(#magenta)"/>
    <circle cx="384" cy="256" r="16" fill="#ff66cc"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="384" cy="384" r="26" fill="url(#magenta)"/>
    <circle cx="384" cy="384" r="14" fill="#ff66cc"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="128" cy="128" r="24" fill="url(#magenta)"/>
    <circle cx="128" cy="128" r="12" fill="#ff66cc"/>
  </g>

  <!-- Connecting chain lines (faint) -->
  <g stroke="#ffaa00" stroke-width="2" opacity="0.5" stroke-dasharray="6 4">
    <line x1="160" y1="256" x2="208" y2="256"/>
    <line x1="256" y1="160" x2="256" y2="208"/>
    <line x1="256" y1="304" x2="256" y2="352"/>
  </g>

  <!-- Title text -->
  <text x="256" y="468" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="900" fill="#e0e0f0" filter="url(#glow)">CHAIN REACTION</text>
  <text x="256" y="498" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffaa00" letter-spacing="3">CASCADE PUZZLE</text>
</svg>
