function init(){loadSettings();renderMenu();}

function loadSettings(){try{const s=JSON.parse(localStorage.getItem('chocona_settings')||'{}');musicOn=s.music!==false;sfxOn=s.sfx!==false;autoCheck=s.autocheck===true;document.getElementById('toggle-music').classList.toggle('on',musicOn);document.getElementById('toggle-sfx').classList.toggle('on',sfxOn);document.getElementById('toggle-autocheck').classList.toggle('on',autoCheck);}catch(e){}}
function saveSettings(){try{localStorage.setItem('chocona_settings',JSON.stringify({music:musicOn,sfx:sfxOn,autocheck:autoCheck}));}catch(e){}}

function loadProgress(){try{return JSON.parse(localStorage.getItem('chocona_progress')||'{}');}catch(e){return{};}}
function saveProgress(p){try{localStorage.setItem('chocona_progress',JSON.stringify(p));}catch(e){}}

function getStarsForTime(time){if(time<60)return 3;if(time<180)return 2;return 1;}

function renderMenu(){
const tierContainer=document.getElementById('tier-container');
const progress=loadProgress();
tierContainer.innerHTML='';
let totalSolved=0;
for(let t=0;t<5;t++){
const sec=document.createElement('div');sec.className='tier-section';
const label=document.createElement('div');label.className='tier-label';label.textContent=TIER_NAMES[t];
sec.appendChild(label);
const grid=document.createElement('div');grid.className='level-grid';
for(let i=0;i<6;i++){
const li=t*6+i;
const btn=document.createElement('button');btn.className='level-btn';btn.textContent=li+1;
const key=String(li);if(progress[key]){btn.classList.add('solved');const stars=progress[key].stars||1;const starSpan=document.createElement('span');starSpan.className='stars';starSpan.textContent='\u2605'.repeat(stars);btn.appendChild(starSpan);totalSolved++;}
btn.onclick=()=>startLevel(li);
grid.appendChild(btn);}
sec.appendChild(grid);tierContainer.appendChild(sec);}
document.getElementById('menu-stats').textContent=totalSolved+'/30 levels solved';}

function startLevel(idx){
currentLevelIdx=idx;currentLevel=LEVELS[idx];hintsLeft=3;userBlack=new Set();hintCells=new Set();
violationCells=new Set();satisfiedRegions=new Set();
isPlaying=true;
document.getElementById('menu').style.display='none';
document.getElementById('game-view').style.display='flex';
document.getElementById('back-btn').style.display='block';
document.getElementById('level-title').textContent='Level '+(idx+1);
document.getElementById('level-sub').textContent=currentLevel.tier;
document.getElementById('stat-level').textContent='Level '+(idx+1);
document.getElementById('hint-count').textContent='('+hintsLeft+')';
computeRegionData();
resizeCanvas();renderGrid();
startTimer();
if(musicOn)startBGM();
if(window.gzAnalytics)window.gzAnalytics.track('game','start','chocona-level-'+(idx+1));}

function computeRegionData(){
const R=currentLevel.rows,C=currentLevel.cols,reg=currentLevel.regions;
const regionCells={};
for(let r=0;r<R;r++){for(let c=0;c<C;c++){
const rid=reg[r][c];
if(!regionCells[rid])regionCells[rid]=[];
regionCells[rid].push([r,c]);}}
regionCenters={};regionColors={};
for(const rid in regionCells){
const cells=regionCells[rid];
let sr=0,sc=0;for(const[r,c]of cells){sr+=r;sc+=c;}
regionCenters[rid]=[sr/cells.length,sc/cells.length];
regionColors[rid]=REGION_TINTS[rid%REGION_TINTS.length];}}

function resizeCanvas(){
const maxW=Math.min(window.innerWidth-20,520);
const maxH=Math.min(window.innerHeight-280,520);
cellSize=Math.floor(Math.min(maxW/currentLevel.cols,maxH/currentLevel.rows));
cellSize=Math.max(24,cellSize);
canvas.width=cellSize*currentLevel.cols+4;
canvas.height=cellSize*currentLevel.rows+4;
gridOffsetX=2;gridOffsetY=2;}

function renderGrid(){
const R=currentLevel.rows,C=currentLevel.cols,reg=currentLevel.regions,clues=currentLevel.clues;
ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,canvas.width,canvas.height);
/* Draw cells with region tints */
for(let r=0;r<R;r++){for(let c=0;c<C;c++){
const x=gridOffsetX+c*cellSize,y=gridOffsetY+r*cellSize;
const rid=reg[r][c];
const isBlack=userBlack.has(r+','+c);
if(isBlack){
ctx.fillStyle='#1a1a2e';}
else{
ctx.fillStyle=regionColors[rid]||'#f5f0e8';}
ctx.fillRect(x,y,cellSize,cellSize);
/* Violation overlay */
if(violationCells.has(r+','+c)){
ctx.fillStyle='rgba(239,68,68,0.4)';
ctx.fillRect(x,y,cellSize,cellSize);}}}
/* Draw clues */
ctx.font='bold '+Math.floor(cellSize*0.45)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
for(const rid in clues){
const center=regionCenters[rid];if(!center)continue;
const x=gridOffsetX+center[1]*cellSize+cellSize/2;
const y=gridOffsetY+center[0]*cellSize+cellSize/2;
const isSatisfied=satisfiedRegions.has(parseInt(rid));
ctx.fillStyle=isSatisfied?'#22c55e':'#e0e0ff';
ctx.fillText(clues[rid],x,y);}
/* Draw thin grid lines */
ctx.strokeStyle='rgba(136,136,170,0.3)';ctx.lineWidth=1;
for(let r=0;r<=R;r++){ctx.beginPath();ctx.moveTo(gridOffsetX,gridOffsetY+r*cellSize);ctx.lineTo(gridOffsetX+C*cellSize,gridOffsetY+r*cellSize);ctx.stroke();}
for(let c=0;c<=C;c++){ctx.beginPath();ctx.moveTo(gridOffsetX+c*cellSize,gridOffsetY);ctx.lineTo(gridOffsetX+c*cellSize,gridOffsetY+R*cellSize);ctx.stroke();}
/* Draw thick region borders */
ctx.strokeStyle='var(--region-line)';ctx.lineWidth=3;ctx.lineCap='round';
for(let r=0;r<R;r++){for(let c=0;c<C;c++){
const rid=reg[r][c];
/* Right border */
if(c<C-1&&reg[r][c+1]!==rid){
ctx.strokeStyle='#6366f1';ctx.lineWidth=3;
ctx.beginPath();ctx.moveTo(gridOffsetX+(c+1)*cellSize,gridOffsetY+r*cellSize);ctx.lineTo(gridOffsetX+(c+1)*cellSize,gridOffsetY+(r+1)*cellSize);ctx.stroke();}
/* Bottom border */
if(r<R-1&&reg[r+1][c]!==rid){
ctx.strokeStyle='#6366f1';ctx.lineWidth=3;
ctx.beginPath();ctx.moveTo(gridOffsetX+c*cellSize,gridOffsetY+(r+1)*cellSize);ctx.lineTo(gridOffsetX+(c+1)*cellSize,gridOffsetY+(r+1)*cellSize);ctx.stroke();}}}
/* Draw outer border */
ctx.strokeStyle='#6366f1';ctx.lineWidth=3;
ctx.strokeRect(gridOffsetX,gridOffsetY,C*cellSize,R*cellSize);
/* Draw hint cell markers */
for(const hc of hintCells){
const parts=hc.split(',');const r=parseInt(parts[0]),c=parseInt(parts[1]);
const x=gridOffsetX+c*cellSize,y=gridOffsetY+r*cellSize;
ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.setLineDash([4,3]);
ctx.strokeRect(x+2,y+2,cellSize-4,cellSize-4);
ctx.setLineDash([]);}
/* Highlight hovered cell */
if(hoverCell){
const parts=hoverCell.split(',');const r=parseInt(parts[0]),c=parseInt(parts[1]);
const x=gridOffsetX+c*cellSize,y=gridOffsetY+r*cellSize;
ctx.strokeStyle='rgba(99,102,241,0.6)';ctx.lineWidth=2;
ctx.strokeRect(x+1,y+1,cellSize-2,cellSize-2);}}

function getCellAt(mx,my){
const R=currentLevel.rows,C=currentLevel.cols;
const x=mx-gridOffsetX,y=my-gridOffsetY;
if(x<0||y<0||x>=C*cellSize||y>=R*cellSize)return null;
const c=Math.floor(x/cellSize),r=Math.floor(y/cellSize);
if(r<0||r>=R||c<0||c>=C)return null;
return r+','+c;}

canvas.addEventListener('mousemove',e=>{
if(!isPlaying)return;
const rect=canvas.getBoundingClientRect();
const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
const my=(e.clientY-rect.top)*(canvas.height/rect.height);
hoverCell=getCellAt(mx,my);renderGrid();});

canvas.addEventListener('mouseleave',()=>{hoverCell=null;if(isPlaying)renderGrid();});

function toggleCell(cellKey){
if(hintCells.has(cellKey))return;/* Locked hint cells can't be toggled */
if(userBlack.has(cellKey)){userBlack.delete(cellKey);playSFX('unshade');}
else{userBlack.add(cellKey);playSFX('shade');}
renderGrid();
if(autoCheck)checkWin(true);}

if(!isPlaying)return;
const rect=canvas.getBoundingClientRect();
const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
const my=(e.clientY-rect.top)*(canvas.height/rect.height);
const cell=getCellAt(mx,my);
if(!cell)return;
toggleCell(cell);});

const mx=(t.clientX-rect.left)*(canvas.width/rect.width);
const my=(t.clientY-rect.top)*(canvas.height/rect.height);
const cell=getCellAt(mx,my);
if(!cell)return;
toggleCell(cell);},{passive:false});

/* Find connected components of black cells */
function getBlackComponents(){
const R=currentLevel.rows,C=currentLevel.cols;
const visited=new Set();
const components=[];
const blackSet=userBlack;
for(const key of blackSet){
if(visited.has(key))continue;
const parts=key.split(',');const sr=parseInt(parts[0]),sc=parseInt(parts[1]);
const queue=[[sr,sc]];const comp=[];
visited.add(key);
while(queue.length>0){
const[r,c]=queue.shift();comp.push([r,c]);
const neighbors=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
for(const[nr,nc]of neighbors){
if(nr<0||nr>=R||nc<0||nc>=C)continue;
const nkey=nr+','+nc;
if(blackSet.has(nkey)&&!visited.has(nkey)){visited.add(nkey);queue.push([nr,nc]);}}}
components.push(comp);}
return components;}

function isRectangle(comp){
if(comp.length===0)return false;
let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
const cellSet=new Set(comp.map(([r,c])=>r+','+c));
for(const[r,c]of comp){minR=Math.min(minR,r);maxR=Math.max(maxR,r);minC=Math.min(minC,c);maxC=Math.max(maxC,c);}
const expectedH=maxR-minR+1,expectedW=maxC-minC+1;
if(comp.length!==expectedH*expectedW)return false;
for(let r=minR;r<=maxR;r++){for(let c=minC;c<=maxC;c++){
if(!cellSet.has(r+','+c))return false;}}
return true;}

function validateCurrent(){
const R=currentLevel.rows,C=currentLevel.cols,reg=currentLevel.regions,clues=currentLevel.clues;
violationCells=new Set();
satisfiedRegions=new Set();
/* Check clue counts */
const regionBlackCount={};
for(let r=0;r<R;r++){for(let c=0;c<C;c++){
if(userBlack.has(r+','+c)){const rid=reg[r][c];regionBlackCount[rid]=(regionBlackCount[rid]||0)+1;}}}
for(const rid in clues){
const target=clues[rid];const actual=regionBlackCount[rid]||0;
if(actual===target)satisfiedRegions.add(parseInt(rid));}
/* Check rectangles */
const comps=getBlackComponents();
let allRect=true;
for(const comp of comps){
if(!isRectangle(comp)){allRect=false;
for(const[r,c]of comp)violationCells.add(r+','+c);}}
return{cluesOK:satisfiedRegions.size===Object.keys(clues).length,rectsOK:allRect};}

function checkWin(silent){
const result=validateCurrent();
renderGrid();
if(result.cluesOK&&result.rectsOK){
onWin();return true;}
if(!silent){
if(!result.rectsOK){showToast('Some black cells don\'t form rectangles!');playSFX('error');}
else{showToast('Almost there! Check the clue numbers.');playSFX('error');}}
return false;}

function onWin(){
stopTimer();isPlaying=false;playSFX('win');
const time=Math.floor((Date.now()-startTime)/1000);
let stars=getStarsForTime(time);
if(hintsLeft<3)stars=Math.min(stars,2);
if(hintsLeft<2)stars=Math.min(stars,1);
const progress=loadProgress();
const prev=progress[String(currentLevelIdx)];
if(!prev||stars>prev.stars){progress[String(currentLevelIdx)]={stars,time};saveProgress(progress);}
document.getElementById('win-stars').textContent='\u2B50'.repeat(stars)+'\u2606'.repeat(3-stars);
document.getElementById('win-time').textContent='Time: '+Math.floor(time/60)+':'+String(time%60).padStart(2,'0')+' \u2022 Hints used: '+(3-hintsLeft);
document.getElementById('win-overlay').classList.add('show');
launchConfetti();
if(window.gzAnalytics)window.gzAnalytics.track('game','win','chocona-level-'+(currentLevelIdx+1));}

function launchConfetti(){
for(let i=0;i<60;i++){
const el=document.createElement('div');el.className='confetti';
el.style.left=Math.random()*window.innerWidth+'px';el.style.top='-10px';
el.style.background=['#f093fb','#f5576c','#4facfe','#43e97b','#fbbf24','#6366f1'][i%6];
el.style.transform='rotate('+Math.random()*360+'deg)';
document.body.appendChild(el);
const dur=2000+Math.random()*1500;
el.animate([{transform:'translateY(0) rotate(0)',opacity:1},{transform:'translateY('+window.innerHeight+'px) rotate(720deg)',opacity:0}],{duration:dur,easing:'cubic-bezier(0.25,0.46,0.45,0.94)'}).onfinish=()=>el.remove();}}

function useHint(){
if(hintsLeft<=0){showToast('No hints left!');return;}
/* Find a solution cell not yet black */
const sol=currentLevel.solution;
const remaining=sol.filter(([r,c])=>!userBlack.has(r+','+c)&&!hintCells.has(r+','+c));
if(remaining.length===0){showToast('All solution cells revealed!');return;}
const pick=remaining[Math.floor(Math.random()*remaining.length)];
const key=pick[0]+','+pick[1];
userBlack.add(key);hintCells.add(key);hintsLeft--;
document.getElementById('hint-count').textContent='('+hintsLeft+')';
playSFX('hint');renderGrid();showToast('Hint revealed!');
if(autoCheck)checkWin(true);}

function startTimer(){startTime=Date.now();timerInterval=setInterval(()=>{const t=Math.floor((Date.now()-startTime)/1000);document.getElementById('stat-time').textContent=Math.floor(t/60)+':'+String(t%60).padStart(2,'0');},1000);}
function stopTimer(){clearInterval(timerInterval);}

/* Web Audio */
function initAudio(){if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();bgmGain=audioCtx.createGain();bgmGain.gain.value=0.06;bgmGain.connect(audioCtx.destination);}catch(e){}}}
function playSFX(type){
if(!sfxOn)return;initAudio();if(!audioCtx)return;
const now=audioCtx.currentTime;
if(type==='shade'){
const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
osc.connect(gain);gain.connect(audioCtx.destination);
osc.frequency.value=500;osc.type='sine';
gain.gain.setValueAtTime(0.15,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.1);
osc.start(now);osc.stop(now+0.1);}
else if(type==='unshade'){
const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
osc.connect(gain);gain.connect(audioCtx.destination);
osc.frequency.value=350;osc.type='sine';
gain.gain.setValueAtTime(0.12,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.08);
osc.start(now);osc.stop(now+0.08);}
else if(type==='hint'){
[600,800,1000].forEach((f,i)=>{const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
osc.connect(gain);gain.connect(audioCtx.destination);osc.frequency.value=f;osc.type='sine';
gain.gain.setValueAtTime(0.12,now+i*0.06);gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.06+0.15);
osc.start(now+i*0.06);osc.stop(now+i*0.06+0.15);});}
else if(type==='win'){
[523,659,784,1047,1319].forEach((f,i)=>{const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
osc.connect(gain);gain.connect(audioCtx.destination);osc.frequency.value=f;osc.type='sine';
gain.gain.setValueAtTime(0.15,now+i*0.12);gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.3);
osc.start(now+i*0.12);osc.stop(now+i*0.12+0.3);});}
else if(type==='error'){
const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
osc.connect(gain);gain.connect(audioCtx.destination);
osc.frequency.value=180;osc.type='square';
gain.gain.setValueAtTime(0.08,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.2);
osc.start(now);osc.stop(now+0.2);}}

/* BGM: Cmaj7 -> Dm7 -> Am7 -> G */
const CHORDS=[
[261.63,329.63,392,493.88],/* Cmaj7: C E G B */
[293.66,349.23,440,523.25],/* Dm7: D F A C */
[220,261.63,329.63,392],    /* Am7: A C E G */
[196,246.94,293.66,392]     /* G: G B D G */
];
let chordIdx=0;
function startBGM(){initAudio();if(!audioCtx)return;stopBGM();
const playChord=()=>{
if(!musicOn||!isPlaying)return;
const freqs=CHORDS[chordIdx%CHORDS.length];chordIdx++;
freqs.forEach(f=>{const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
osc.connect(gain);gain.connect(bgmGain);osc.frequency.value=f;osc.type='sine';
const now=audioCtx.currentTime;
gain.gain.setValueAtTime(0,now);gain.gain.linearRampToValueAtTime(0.3,now+1.2);gain.gain.linearRampToValueAtTime(0,now+3.5);
osc.start(now);osc.stop(now+3.5);});};
playChord();bgmInterval=setInterval(playChord,3500);}
function stopBGM(){clearInterval(bgmInterval);bgmInterval=null;}

/* UI handlers */
document.getElementById('btn-hint').onclick=useHint;
document.getElementById('btn-check').onclick=()=>checkWin(false);
document.getElementById('btn-clear').onclick=()=>{userBlack.clear();hintCells.clear();violationCells.clear();satisfiedRegions.clear();renderGrid();showToast('Cleared');playSFX('unshade');};
document.getElementById('btn-restart').onclick=()=>{userBlack.clear();hintCells.clear();violationCells.clear();satisfiedRegions.clear();hintsLeft=3;document.getElementById('hint-count').textContent='('+hintsLeft+')';renderGrid();showToast('Restarted');};
document.getElementById('btn-settings').onclick=()=>document.getElementById('settings-panel').classList.toggle('show');
document.getElementById('btn-next').onclick=()=>{
document.getElementById('win-overlay').classList.remove('show');
if(currentLevelIdx<29)startLevel(currentLevelIdx+1);else backToMenu();};
document.getElementById('btn-menu').onclick=()=>{document.getElementById('win-overlay').classList.remove('show');backToMenu();};
document.getElementById('back-btn').onclick=backToMenu;

function backToMenu(){isPlaying=false;stopTimer();stopBGM();
document.getElementById('menu').style.display='flex';
document.getElementById('game-view').style.display='none';
document.getElementById('back-btn').style.display='none';
document.getElementById('settings-panel').classList.remove('show');
renderMenu();}

document.getElementById('toggle-music').onclick=function(){musicOn=!musicOn;this.classList.toggle('on',musicOn);saveSettings();if(musicOn&&isPlaying)startBGM();else stopBGM();};
document.getElementById('toggle-sfx').onclick=function(){sfxOn=!sfxOn;this.classList.toggle('on',sfxOn);saveSettings();};
document.getElementById('toggle-autocheck').onclick=function(){autoCheck=!autoCheck;this.classList.toggle('on',autoCheck);saveSettings();};

document.addEventListener('keydown',e=>{
if(!isPlaying){
if(e.key==='Escape'){document.getElementById('win-overlay').classList.remove('show');}
return;}
const k=e.key.toLowerCase();
if(k==='h')useHint();
else if(k==='enter'||k==='c')checkWin(false);
else if(k==='r'){userBlack.clear();hintCells.clear();violationCells.clear();satisfiedRegions.clear();hintsLeft=3;document.getElementById('hint-count').textContent='('+hintsLeft+')';renderGrid();showToast('Restarted');}
else if(k==='escape')backToMenu();});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

window.addEventListener('resize',()=>{if(isPlaying){resizeCanvas();renderGrid();}});
document.addEventListener('visibilitychange',()=>{if(document.hidden)stopBGM();else if(isPlaying&&musicOn)startBGM();});
window.addEventListener('beforeunload',()=>{stopBGM();if(audioCtx)audioCtx.close();});

init();
</script>
