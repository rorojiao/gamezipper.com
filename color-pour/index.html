// === State ===
var state = {
  level: 0,        // 0-indexed
  tubes: [],       // current tube states (array of arrays)
  emptyTubes: 0,   // number of empty tubes available
  selected: -1,    // selected tube index
  moves: 0,
  history: [],     // undo stack
  hintUsed: 0,
  hintsRemaining: 3,
  isAnimating: false,
  soundOn: true,
  musicOn: true,
  waveOn: true,
  rafId: null,
  bgParticles: []
};

// === Progress (localStorage) ===
var progress = {
  unlocked: 1,
  stars: {},
  soundOn: true,
  musicOn: true,
  waveOn: true
};

function loadProgress() {
  try {
    var saved = localStorage.getItem('colorpour_v1');
    if (saved) {
      var d = JSON.parse(saved);
      if (d.unlocked) progress.unlocked = d.unlocked;
      if (d.stars) progress.stars = d.stars;
      if (typeof d.soundOn === 'boolean') { progress.soundOn = d.soundOn; state.soundOn = d.soundOn; }
      if (typeof d.musicOn === 'boolean') { progress.musicOn = d.musicOn; state.musicOn = d.musicOn; }
      if (typeof d.waveOn === 'boolean') { progress.waveOn = d.waveOn; state.waveOn = d.waveOn; }
    }
  } catch(e) {}
}

function saveProgress() {
  try {
    localStorage.setItem('colorpour_v1', JSON.stringify(progress));
  } catch(e) {}
}

// === Audio (Web Audio API) ===
var audioCtx = null;
var bgmNodes = [];
var timers = [];

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (state.musicOn) startBGM();
  } catch(e) {}
}

function playTone(freq, dur, type, vol) {
  if (!audioCtx || !state.soundOn) return;
  type = type || 'sine';
  vol = vol || 0.15;
  dur = dur || 0.15;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playSFX(type) {
  if (!state.soundOn) return;
  switch(type) {
    case 'select':
      playTone(523, 0.1, 'sine', 0.12);
      break;
    case 'pour':
      playTone(330, 0.15, 'sine', 0.1);
      setTimeout(function(){ playTone(440, 0.12, 'sine', 0.08); }, 80);
      break;
    case 'invalid':
      playTone(200, 0.2, 'sawtooth', 0.1);
      break;
    case 'win':
      var notes = [523, 659, 784, 1047];
      notes.forEach(function(f, i) {
        setTimeout(function(){ playTone(f, 0.2, 'triangle', 0.15); }, i * 120);
      });
      break;
    case 'complete_tube':
      playTone(880, 0.15, 'triangle', 0.1);
      setTimeout(function(){ playTone(1100, 0.15, 'triangle', 0.08); }, 100);
      break;
    case 'hint':
      playTone(700, 0.1, 'square', 0.08);
      break;
  }
}

function startBGM() {
  if (!audioCtx || bgmNodes.length || !state.musicOn) return;
  try {
    var sr = audioCtx.sampleRate;
    var dur = 16;
    var bufSize = sr * dur;
    var buf = audioCtx.createBuffer(1, bufSize, sr);
    var d = buf.getChannelData(0);
    // Ambient chord progression: Cmaj7 - Fmaj7 - Am7 - G
    var chords = [
      [130.81, 164.81, 196.00, 246.94], // Cmaj7
      [174.61, 220.00, 261.63, 329.63], // Fmaj7
      [220.00, 261.63, 329.63, 392.00], // Am7
      [196.00, 246.94, 293.66, 392.00]  // G
    ];
    var chordDur = dur / chords.length;
    for (var i = 0; i < bufSize; i++) {
      var t = i / sr;
      var ci = Math.min(Math.floor(t / chordDur), chords.length - 1);
      var chord = chords[ci];
      var s = 0;
      for (var n = 0; n < chord.length; n++) {
        var f = chord[n];
        s += Math.sin(2 * Math.PI * f * t) * 0.04;
        s += Math.sin(2 * Math.PI * f * 2 * t) * 0.01;
      }
      var fade = t % chordDur;
      var fadeIn = Math.min(fade / 0.8, 1);
      var fadeOut = Math.min((chordDur - fade) / 0.8, 1);
      s *= fadeIn * fadeOut;
      var lfo = Math.sin(2 * Math.PI * 0.25 * t) * 0.12 + 1;
      d[i] = s * lfo * 0.5;
    }
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    var filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 900;
    filt.Q.value = 1;
    var g = audioCtx.createGain();
    g.gain.value = state.musicOn ? 0.22 : 0;
    src.connect(filt);
    filt.connect(g);
    g.connect(audioCtx.destination);
    src.start();
    bgmNodes = [src, filt, g];
  } catch(e) {}
}

function stopBGM() {
  bgmNodes.forEach(function(n) {
    try { if (n.stop) n.stop(); } catch(e) {}
    try { if (n.disconnect) n.disconnect(); } catch(e) {}
  });
  bgmNodes = [];
}

function setMusicVolume(vol) {
  if (bgmNodes.length >= 3) {
    try { bgmNodes[2].gain.value = vol; } catch(e) {}
  }
}

// === Level Logic ===

function loadLevel(idx) {
  idx = Math.max(0, Math.min(LEVELS.length - 1, idx));
  var lv = LEVELS[idx];
  state.level = idx;
  state.tubes = lv.tubes.map(function(t) { return t.slice(); });
  // Add empty tubes
  for (var i = 0; i < lv.empty; i++) {
    state.tubes.push([]);
  }
  state.emptyTubes = lv.empty;
  state.selected = -1;
  state.moves = 0;
  state.history = [];
  state.hintUsed = 0;
  state.hintsRemaining = 3;
  state.isAnimating = false;
  updateUI();
  renderTubes();
}

function getTopColor(tube) {
  if (!tube || tube.length === 0) return -1;
  return tube[tube.length - 1];
}

function countTopColor(tube) {
  if (!tube || tube.length === 0) return 0;
  var top = tube[tube.length - 1];
  var count = 0;
  for (var i = tube.length - 1; i >= 0; i--) {
    if (tube[i] === top) count++;
    else break;
  }
  return count;
}

function canPour(from, to) {
  if (from === to) return false;
  var srcTube = state.tubes[from];
  var tgtTube = state.tubes[to];
  if (srcTube.length === 0) return false;
  if (tgtTube.length >= MAX_LAYERS) return false;
  var srcTop = getTopColor(srcTube);
  var tgtTop = getTopColor(tgtTube);
  if (tgtTube.length === 0) return true;
  return srcTop === tgtTop;
}

function pour(from, to) {
  if (!canPour(from, to)) return false;

  // Save history
  state.history.push({
    tubes: state.tubes.map(function(t) { return t.slice(); }),
    moves: state.moves
  });

  // Move layers from source to target
  var srcTube = state.tubes[from];
  var tgtTube = state.tubes[to];
  var srcTop = getTopColor(srcTube);
  var moveCount = countTopColor(srcTube);
  var space = MAX_LAYERS - tgtTube.length;
  var toMove = Math.min(moveCount, space);

  // Pour layers
  for (var i = 0; i < toMove; i++) {
    srcTube.pop();
    tgtTube.push(srcTop);
  }

  state.moves++;
  state.selected = -1;
  state.isAnimating = true;

  playSFX('pour');

  // Check if target tube just became complete
  if (tgtTube.length === MAX_LAYERS && countTopColor(tgtTube) === MAX_LAYERS) {
    setTimeout(function() { playSFX('complete_tube'); spawnTubeCompleteFX(to); }, 300);
  }

  renderTubes();
  updateUI();

  setTimeout(function() {
    state.isAnimating = false;
    if (checkWin()) {
      onWin();
    }
  }, POUR_DURATION);

  return true;
}

function checkWin() {
  for (var i = 0; i < state.tubes.length; i++) {
    var t = state.tubes[i];
    if (t.length === 0) continue;
    if (t.length !== MAX_LAYERS) return false;
    if (countTopColor(t) !== MAX_LAYERS) return false;
  }
  return true;
}

function onWin() {
  var par = LEVELS[state.level].par;
  var stars = 1;
  if (state.moves <= par) stars = 3;
  else if (state.moves <= Math.ceil(par * 1.3)) stars = 2;

  // Save stars
  var lvKey = String(state.level);
  var prevStars = progress.stars[lvKey] || 0;
  if (stars > prevStars) progress.stars[lvKey] = stars;

  // Unlock next
  if (state.level + 1 >= progress.unlocked) {
    progress.unlocked = Math.min(LEVELS.length, state.level + 2);
  }
  saveProgress();

  playSFX('win');
  spawnConfetti();

  // Show win overlay
  var starHtml = '';
  for (var i = 0; i < 3; i++) {
    starHtml += i < stars ? '<span class="star-filled">&#9733;</span>' : '<span class="star-empty">&#9733;</span>';
  }
  document.getElementById('win-stars').innerHTML = starHtml;
  document.getElementById('overlay-title').textContent = stars === 3 ? 'Perfect!' : (stars === 2 ? 'Great Job!' : 'Level Complete!');
  var msg = 'Completed in ' + state.moves + ' moves';
  if (state.hintUsed > 0) msg += ' (hint used)';
  document.getElementById('overlay-msg').textContent = msg;

  // Show/hide next button
  document.getElementById('btn-next-level').style.display = (state.level < LEVELS.length - 1) ? '' : 'none';

  document.getElementById('overlay').classList.add('show');
}

function undo() {
  if (state.history.length === 0 || state.isAnimating) return;
  var prev = state.history.pop();
  state.tubes = prev.tubes;
  state.moves = prev.moves;
  state.selected = -1;
  renderTubes();
  updateUI();
  playSFX('select');
}

function restart() {
  loadLevel(state.level);
  playSFX('select');
}

// === Hint System ===
function findHintMove() {
  // BFS to find a sequence of moves that leads toward solution
  // For performance, use greedy approach: find a move that reduces "disorder"
  var bestMove = null;
  var bestScore = -Infinity;

  for (var from = 0; from < state.tubes.length; from++) {
    for (var to = 0; to < state.tubes.length; to++) {
      if (from === to) continue;
      if (!canPour(from, to)) continue;

      // Simulate move
      var tubesCopy = state.tubes.map(function(t) { return t.slice(); });
      var srcTop = getTopColor(tubesCopy[from]);
      var moveCount = countTopColor(tubesCopy[from]);
      var space = MAX_LAYERS - tubesCopy[to].length;
      var toMove = Math.min(moveCount, space);
      for (var i = 0; i < toMove; i++) {
        tubesCopy[from].pop();
        tubesCopy[to].push(srcTop);
      }

      // Score: prefer moves that complete tubes, increase uniform color blocks
      var score = 0;
      // Bonus for completing a tube
      for (var j = 0; j < tubesCopy.length; j++) {
        var tt = tubesCopy[j];
        if (tt.length === MAX_LAYERS && countTopColor(tt) === MAX_LAYERS) score += 100;
        // Reward larger uniform blocks at top
        if (tt.length > 0) score += countTopColor(tt) * 2;
        // Penalty for many different colors
      }
      // Penalty for scattering (moving to empty when not necessary)
      if (state.tubes[to].length === 0) score -= 5;

      if (score > bestScore) {
        bestScore = score;
        bestMove = { from: from, to: to };
      }
    }
  }
  return bestMove;
}

function showHint() {
  if (state.hintsRemaining <= 0 || state.isAnimating) return;
  var move = findHintMove();
  if (!move) return;

  state.hintsRemaining--;
  state.hintUsed++;
  playSFX('hint');

  // Highlight tubes
  var tubeEls = document.querySelectorAll('.tube');
  tubeEls.forEach(function(el) { el.classList.remove('hint-source', 'hint-target'); });
  if (tubeEls[move.from]) tubeEls[move.from].classList.add('hint-source');
  if (tubeEls[move.to]) tubeEls[move.to].classList.add('hint-target');

  setTimeout(function() {
    tubeEls.forEach(function(el) { el.classList.remove('hint-source', 'hint-target'); });
  }, 3000);

  updateUI();
}

// === Rendering ===

function renderTubes() {
  var area = document.getElementById('game-area');
  area.innerHTML = '';

  var colorCount = 0;
  for (var i = 0; i < state.tubes.length; i++) {
    var tube = state.tubes[i];
    var el = document.createElement('div');
    el.className = 'tube';
    if (state.selected === i) el.classList.add('selected');
    el.setAttribute('data-idx', i);

    // Rim
    var rim = document.createElement('div');
    rim.className = 'tube-rim';
    el.appendChild(rim);

    // Body
    var body = document.createElement('div');
    body.className = 'tube-body';

    // Liquid container
    var liquidDiv = document.createElement('div');
    liquidDiv.className = 'tube-liquid';

    var layerHeight = 100 / MAX_LAYERS;

    for (var j = 0; j < tube.length; j++) {
      var layer = document.createElement('div');
      layer.className = 'liquid-layer';
      layer.style.height = layerHeight + '%';
      var colorIdx = tube[j];
      var color = COLORS[colorIdx] || '#888';
      layer.style.background = 'linear-gradient(180deg, ' + adjustColor(color, 15) + ', ' + color + ')';
      layer.style.boxShadow = 'inset 0 1px 2px rgba(255,255,255,0.2)';
      liquidDiv.appendChild(layer);
    }

    body.appendChild(liquidDiv);
    el.appendChild(body);

    // Click/touch handler
    (function(idx) {
      el.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        handleTubeClick(idx);
      });
    })(i);

    area.appendChild(el);
  }
}

function adjustColor(hex, percent) {
  var num = parseInt(hex.replace('#', ''), 16);
  var r = Math.min(255, Math.max(0, (num >> 16) + percent));
  var g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + percent));
  var b = Math.min(255, Math.max(0, (num & 0xff) + percent));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

function handleTubeClick(idx) {
  if (state.isAnimating) return;

  initAudio();

  if (state.selected === -1) {
    // Select source
    if (state.tubes[idx].length === 0) return;
    state.selected = idx;
    playSFX('select');
    renderTubes();
  } else if (state.selected === idx) {
    // Deselect
    state.selected = -1;
    playSFX('select');
    renderTubes();
  } else {
    // Try pour
    if (canPour(state.selected, idx)) {
      pour(state.selected, idx);
    } else {
      // Invalid move — check if selecting a new source
      if (state.tubes[idx].length > 0) {
        state.selected = idx;
        playSFX('select');
      } else {
        playSFX('invalid');
      }
      renderTubes();
    }
  }
}

function updateUI() {
  document.getElementById('lv-num').textContent = state.level + 1;
  document.getElementById('move-count').textContent = state.moves;
  document.getElementById('btn-undo').classList.toggle('disabled', state.history.length === 0);
  document.getElementById('btn-hint').textContent = 'Hint (' + state.hintsRemaining + ')';
}

// === Particle FX ===
var fxCanvas, fxCtx;

function initFX() {
  fxCanvas = document.getElementById('fx-canvas');
  fxCtx = fxCanvas.getContext('2d');
  resizeFX();
  window.addEventListener('resize', resizeFX);
}

function resizeFX() {
  fxCanvas.width = window.innerWidth;
  fxCanvas.height = window.innerHeight;
}

var particles = [];

function spawnConfetti() {
  if (!fxCtx) return;
  var cx = window.innerWidth / 2;
  var cy = window.innerHeight / 2;
  for (var i = 0; i < 60; i++) {
    particles.push({
      x: cx,
      y: cy,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12 - 4,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      size: 3 + Math.random() * 5,
      life: 1,
      rotation: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.2
    });
  }
}

function spawnTubeCompleteFX(tubeIdx) {
  if (!fxCtx) return;
  var tubeEls = document.querySelectorAll('.tube');
  if (!tubeEls[tubeIdx]) return;
  var rect = tubeEls[tubeIdx].getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  for (var i = 0; i < 20; i++) {
    particles.push({
      x: cx,
      y: cy,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 2,
      color: '#58a6ff',
      size: 2 + Math.random() * 4,
      life: 1,
      rotation: 0,
      vr: 0
    });
  }
}

function updateParticles() {
  if (!fxCtx) return;
  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.vx *= 0.99;
    p.rotation += p.vr;
    p.life -= 0.015;

    if (p.life <= 0 || p.y > fxCanvas.height + 20) {
      particles.splice(i, 1);
      continue;
    }

    fxCtx.save();
    fxCtx.globalAlpha = p.life;
    fxCtx.translate(p.x, p.y);
    fxCtx.rotate(p.rotation);
    fxCtx.fillStyle = p.color;
    fxCtx.fillRect(-p.size, -p.size, p.size * 2, p.size * 2);
    fxCtx.restore();
  }
}

// === Background Canvas ===
var bgCanvas, bgCtx;

function initBG() {
  bgCanvas = document.getElementById('bg-canvas');
  bgCtx = bgCanvas.getContext('2d');
  resizeBG();
  window.addEventListener('resize', resizeBG);

  // Initialize floating particles
  state.bgParticles = [];
  for (var i = 0; i < 30; i++) {
    state.bgParticles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: 1 + Math.random() * 3,
      color: COLORS[Math.floor(Math.random() * 8)],
      opacity: 0.1 + Math.random() * 0.2
    });
  }
}

function resizeBG() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}

function drawBG() {
  if (!bgCtx) return;

  // Gradient background
  var grad = bgCtx.createRadialGradient(
    bgCanvas.width / 2, bgCanvas.height / 2, 0,
    bgCanvas.width / 2, bgCanvas.height / 2, Math.max(bgCanvas.width, bgCanvas.height) * 0.7
  );
  grad.addColorStop(0, '#1a2332');
  grad.addColorStop(0.5, '#0d1117');
  grad.addColorStop(1, '#06080c');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Floating color orbs
  for (var i = 0; i < state.bgParticles.length; i++) {
    var p = state.bgParticles[i];
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < -10) p.x = bgCanvas.width + 10;
    if (p.x > bgCanvas.width + 10) p.x = -10;
    if (p.y < -10) p.y = bgCanvas.height + 10;
    if (p.y > bgCanvas.height + 10) p.y = -10;

    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    bgCtx.fillStyle = p.color;
    bgCtx.globalAlpha = p.opacity;
    bgCtx.fill();
  }
  bgCtx.globalAlpha = 1;
}

// === Animation Loop ===
function animLoop() {
  drawBG();
  updateParticles();
  state.rafId = requestAnimationFrame(animLoop);
}

// === Level Select ===
function showLevelSelect() {
  var grid = document.getElementById('level-grid');
  grid.innerHTML = '';

  for (var i = 0; i < LEVELS.length; i++) {
    var btn = document.createElement('div');
    var unlocked = i < progress.unlocked;
    var isCurrent = i === state.level;
    btn.className = 'level-btn ' + (unlocked ? 'unlocked' : 'locked') + (isCurrent ? ' current' : '');
    btn.textContent = i + 1;

    if (progress.stars[String(i)]) {
      var stars = progress.stars[String(i)];
      var starDiv = document.createElement('div');
      starDiv.className = 'level-stars';
      var starStr = '';
      for (var s = 0; s < 3; s++) starStr += s < stars ? '\u2605' : '\u2606';
      starDiv.textContent = starStr;
      btn.appendChild(starDiv);
    }

    if (unlocked) {
      (function(idx) {
        btn.addEventListener('pointerdown', function(e) {
          e.preventDefault();
          loadLevel(idx);
          document.getElementById('overlay-levels').style.display = 'none';
        });
      })(i);
    }

    grid.appendChild(btn);
  }

  document.getElementById('overlay-levels').style.display = 'flex';
}

// === Settings ===
function toggleSetting(key) {
  state[key] = !state[key];
  progress[key] = state[key];

  var toggleId = 'toggle-' + key.replace('On', '');
  var el = document.getElementById(toggleId);
  if (el) el.classList.toggle('on', state[key]);

  if (key === 'musicOn') {
    if (state.musicOn) { startBGM(); setMusicVolume(0.22); }
    else { setMusicVolume(0); }
  }

  saveProgress();
}

// === Cleanup ===
function cleanup() {
  if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
  timers.forEach(function(id) { clearTimeout(id); });
  timers = [];
  stopBGM();
  if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; }
}

// === Event Listeners ===
function setupEvents() {
  document.getElementById('btn-undo').addEventListener('pointerdown', function(e) { e.preventDefault(); undo(); });
  document.getElementById('btn-hint').addEventListener('pointerdown', function(e) { e.preventDefault(); showHint(); });
  document.getElementById('btn-restart').addEventListener('pointerdown', function(e) { e.preventDefault(); restart(); });
  document.getElementById('btn-levels').addEventListener('pointerdown', function(e) { e.preventDefault(); showLevelSelect(); });
  document.getElementById('btn-settings').addEventListener('pointerdown', function(e) { e.preventDefault(); document.getElementById('settings-modal').classList.add('show'); });

  document.getElementById('btn-overlay-close').addEventListener('pointerdown', function(e) { e.preventDefault(); document.getElementById('overlay').classList.remove('show'); });
  document.getElementById('btn-next-level').addEventListener('pointerdown', function(e) { e.preventDefault(); document.getElementById('overlay').classList.remove('show'); loadLevel(state.level + 1); });
  document.getElementById('btn-levels-close').addEventListener('pointerdown', function(e) { e.preventDefault(); document.getElementById('overlay-levels').style.display = 'none'; });
  document.getElementById('btn-settings-close').addEventListener('pointerdown', function(e) { e.preventDefault(); document.getElementById('settings-modal').classList.remove('show'); });

  document.getElementById('toggle-sound').addEventListener('pointerdown', function(e) { e.preventDefault(); toggleSetting('soundOn'); });
  document.getElementById('toggle-music').addEventListener('pointerdown', function(e) { e.preventDefault(); toggleSetting('musicOn'); });
  document.getElementById('toggle-wave').addEventListener('pointerdown', function(e) { e.preventDefault(); toggleSetting('waveOn'); });

  // Keyboard support
  document.addEventListener('keydown', function(e) {
    if (state.isAnimating) return;
    var key = e.key;
    if (key >= '1' && key <= '9') {
      var idx = parseInt(key) - 1;
      if (idx < state.tubes.length) handleTubeClick(idx);
    } else if (key === 'u' || key === 'U') {
      undo();
    } else if (key === 'r' || key === 'R') {
      restart();
    } else if (key === 'h' || key === 'H') {
      showHint();
    } else if (key === 'Escape') {
      state.selected = -1;
      renderTubes();
    }
  });

  // Pause rAF when tab hidden
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
    } else {
      if (!state.rafId) { state.rafId = requestAnimationFrame(animLoop); }
    }
  });

  window.addEventListener('beforeunload', cleanup);
}

// === Init ===
function init() {
  loadProgress();
  initBG();
  initFX();
  setupEvents();
  loadLevel(0);

  // Update toggle states
  document.getElementById('toggle-sound').classList.toggle('on', state.soundOn);
  document.getElementById('toggle-music').classList.toggle('on', state.musicOn);
  document.getElementById('toggle-wave').classList.toggle('on', state.waveOn);

  // Start animation loop
  animLoop();

  // Unlock audio on first interaction
  document.addEventListener('pointerdown', function() { initAudio(); }, { once: true });
  document.addEventListener('keydown', function() { initAudio(); }, { once: true });
}

// Start when DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
