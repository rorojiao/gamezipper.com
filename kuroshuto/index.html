let musicGain = null;
let musicOn = true;
let sfxOn = true;
let autoCheck = false;

const STORAGE_KEY = 'kuroshuto_progress';

// === AUDIO ===
function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain();
    musicGain.gain.value = 0.06;
    musicGain.connect(audioCtx.destination);
    startBGM();
  } catch(e) {}
}

function playTone(freq, dur, type='sine', vol=0.15) {
  if (!audioCtx || !sfxOn) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function sfxFill() { playTone(220, 0.08, 'square', 0.12); }
function sfxErase() { playTone(440, 0.06, 'sine', 0.1); }
function sfxHint() { playTone(660, 0.15, 'triangle', 0.15); }
function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'triangle', 0.2), i * 120));
}
function sfxError() { playTone(150, 0.15, 'sawtooth', 0.15); }
function sfxClick() { playTone(800, 0.03, 'square', 0.08); }

let bgmStep = 0;
const bgmChords = [
  [261.63, 329.63, 392, 493.88], // Cmaj7
  [293.66, 349.23, 440, 587.33], // Dm7
  [220, 277.18, 329.63, 440],    // Am7
  [196, 246.94, 293.66, 392],    // G
];
function startBGM() {
  if (!audioCtx || !musicOn) return;
  function playChord() {
    if (!audioCtx || !musicOn) return;
    const chord = bgmChords[bgmStep % bgmChords.length];
    bgmStep++;
    chord.forEach(freq => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 0.5);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3.5);
      osc.connect(gain);
      gain.connect(musicGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 3.5);
    });
    setTimeout(playChord, 3000);
  }
  playChord();
}

// === LEVEL LOADING ===
function loadLevel(idx) {
  currentLevelIdx = idx;
  currentLevel = LEVELS[idx];
  const R = currentLevel.R, C = currentLevel.C;
  grid = Array(R).fill(0).map(() => Array(C).fill(0));
  hintsLeft = 3;
  won = false;
  violations = { adj: [], clue: [], conn: false };
  startTime = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  document.getElementById('info-level').textContent = idx + 1;
  document.getElementById('info-tier').textContent = currentLevel.tier;
  document.getElementById('hint-count').textContent = hintsLeft;
  resizeCanvas();
  draw();
}

function resizeCanvas() {
  if (!currentLevel) return;
  const R = currentLevel.R, C = currentLevel.C;
  const maxW = Math.min(window.innerWidth - 20, 640);
  const maxH = window.innerHeight - 200;
  cellSize = Math.floor(Math.min(maxW / C, maxH / R, 52));
  cellSize = Math.max(28, cellSize);
  canvas.width = C * cellSize;
  canvas.height = R * cellSize;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}

// === DRAWING ===
function draw() {
  if (!currentLevel) return;
  const R = currentLevel.R, C = currentLevel.C;
  const clues = {};
  for (const [k, v] of Object.entries(currentLevel.clues)) {
    const [r, c] = k.split(',').map(Number);
    clues[r + ',' + c] = v;
  }

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const x = c * cellSize, y = r * cellSize;
      const isBlack = grid[r][c] === 1;
      const isMark = grid[r][c] === 2;
      const hasClue = clues[r + ',' + c] !== undefined;

      // Cell background
      if (isBlack) {
        ctx.fillStyle = '#2a2a3e';
        ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
        ctx.fillStyle = '#4a4a5e';
        ctx.beginPath();
        ctx.arc(x + cellSize/2, y + cellSize/2, cellSize * 0.3, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // White cell
        const grad = ctx.createLinearGradient(x, y, x + cellSize, y + cellSize);
        grad.addColorStop(0, '#f0f0f8');
        grad.addColorStop(1, '#e0e0e8');
        ctx.fillStyle = grad;
        ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
      }

      // Mark X
      if (isMark) {
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + cellSize * 0.3, y + cellSize * 0.3);
        ctx.lineTo(x + cellSize * 0.7, y + cellSize * 0.7);
        ctx.moveTo(x + cellSize * 0.7, y + cellSize * 0.3);
        ctx.lineTo(x + cellSize * 0.3, y + cellSize * 0.7);
        ctx.stroke();
      }

      // Clue number
      if (hasClue) {
        const d = clues[r + ',' + c];
        ctx.fillStyle = isBlack ? '#ff6b9d' : '#2a2a4e';
        ctx.font = `bold ${Math.floor(cellSize * 0.5)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(d, x + cellSize/2, y + cellSize/2 + 1);
      }

      // Grid border
      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);
    }
  }

  // Highlight violations
  violations.adj.forEach(([r, c]) => {
    const x = c * cellSize, y = r * cellSize;
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 3;
    ctx.strokeRect(x + 1.5, y + 1.5, cellSize - 3, cellSize - 3);
  });
  violations.clue.forEach(([r, c]) => {
    const x = c * cellSize, y = r * cellSize;
    ctx.strokeStyle = '#ffd166';
    ctx.lineWidth = 3;
    ctx.strokeRect(x + 1.5, y + 1.5, cellSize - 3, cellSize - 3);
  });
}

// === GAME LOGIC ===
function getCellFromXY(px, py) {
  const c = Math.floor(px / cellSize);
  const r = Math.floor(py / cellSize);
  if (r < 0 || r >= currentLevel.R || c < 0 || c >= currentLevel.C) return null;
  return [r, c];
}

function isClueCell(r, c) {
  return currentLevel.clues[r + ',' + c] !== undefined;
}

function handleCellClick(r, c) {
  if (won) return;
  initAudio();
  if (isClueCell(r, c)) {
    // Can't shade clue cell — but can toggle mark
    if (grid[r][c] === 2) { grid[r][c] = 0; sfxErase(); }
    else { grid[r][c] = 2; sfxClick(); }
  } else {
    if (mode === 'fill') {
      if (grid[r][c] === 1) { grid[r][c] = 0; sfxErase(); }
      else { grid[r][c] = 1; sfxFill(); }
    } else {
      if (grid[r][c] === 2) { grid[r][c] = 0; sfxErase(); }
      else { grid[r][c] = 2; sfxClick(); }
    }
  }
  checkViolations();
  draw();
  if (autoCheck) doCheck();
}

function checkViolations() {
  const R = currentLevel.R, C = currentLevel.C;
  violations = { adj: [], clue: [], conn: false };

  // Adjacent blacks
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      if (grid[r][c] !== 1) continue;
      if (r + 1 < R && grid[r+1][c] === 1) {
        violations.adj.push([r, c], [r+1, c]);
      }
      if (c + 1 < C && grid[r][c+1] === 1) {
        violations.adj.push([r, c], [r, c+1]);
      }
    }
  }

  // Clue violations
  for (const [k, d] of Object.entries(currentLevel.clues)) {
    const [r, c] = k.split(',').map(Number);
    const cands = [];
    if (r - d >= 0) cands.push([r-d, c]);
    if (r + d < R) cands.push([r+d, c]);
    if (c - d >= 0) cands.push([r, c-d]);
    if (c + d < C) cands.push([r, c+d]);
    const blackCount = cands.filter(([br, bc]) => grid[br][bc] === 1).length;
    if (blackCount > 1) {
      violations.clue.push([r, c]);
    }
  }
}

function doCheck() {
  if (won) return;
  checkViolations();
  draw();
  if (violations.adj.length > 0 || violations.clue.length > 0) {
    showToast('⚠️ Violations detected');
    sfxError();
    return;
  }

  // Check all clues satisfied (exactly 1 black at distance)
  const R = currentLevel.R, C = currentLevel.C;
  for (const [k, d] of Object.entries(currentLevel.clues)) {
    const [r, c] = k.split(',').map(Number);
    const cands = [];
    if (r - d >= 0) cands.push([r-d, c]);
    if (r + d < R) cands.push([r+d, c]);
    if (c - d >= 0) cands.push([r, c-d]);
    if (c + d < C) cands.push([r, c+d]);
    const blackCount = cands.filter(([br, bc]) => grid[br][bc] === 1).length;
    if (blackCount !== 1) {
      showToast('⚠️ Some clues not satisfied');
      sfxError();
      return;
    }
  }

  // Check connectivity of white cells
  const whiteCells = [];
  for (let r = 0; r < R; r++)
    for (let c = 0; c < C; c++)
      if (grid[r][c] !== 1) whiteCells.push([r, c]);
  if (whiteCells.length === 0) { showToast('⚠️ All cells black!'); sfxError(); return; }
  const visited = new Set([whiteCells[0].join(',')]);
  const q = [whiteCells[0]];
  while (q.length) {
    const [r, c] = q.shift();
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < R && nc >= 0 && nc < C && grid[nr][nc] !== 1) {
        const key = nr+','+nc;
        if (!visited.has(key)) { visited.add(key); q.push([nr, nc]); }
      }
    }
  }
  if (visited.size !== whiteCells.length) {
    showToast('⚠️ White cells not connected');
    sfxError();
    return;
  }

  // WIN!
  won = true;
  clearInterval(timerInterval);
  const time = Math.floor((Date.now() - startTime) / 1000);
  const stars = time < 60 ? 3 : time < 180 ? 2 : 1;
  saveProgress(currentLevelIdx, stars, time);
  sfxWin();
  showWinOverlay(stars, time);
}

function doHint() {
  if (won || hintsLeft <= 0) {
    showToast(hintsLeft <= 0 ? 'No hints left!' : 'Already solved!');
    return;
  }
  initAudio();
  const solution = new Set(currentLevel.solution);
  // Find a cell that's wrong or missing
  const R = currentLevel.R, C = currentLevel.C;
  const wrong = [];
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const shouldBeBlack = solution.has(r+','+c);
      const isBlack = grid[r][c] === 1;
      if (shouldBeBlack && !isBlack) wrong.push([r, c, 'fill']);
      if (!shouldBeBlack && isBlack) wrong.push([r, c, 'erase']);
    }
  }
  if (wrong.length === 0) {
    showToast('Everything looks correct!');
    return;
  }
  const [r, c, action] = wrong[Math.floor(Math.random() * wrong.length)];
  if (action === 'fill') grid[r][c] = 1;
  else grid[r][c] = 0;
  hintsLeft--;
  document.getElementById('hint-count').textContent = hintsLeft;
  sfxHint();
  showToast(`💡 Hint: (${r+1},${c+1}) ${action === 'fill' ? 'should be black' : 'should be white'}`);
  checkViolations();
  draw();
  if (autoCheck) doCheck();
}

function doRestart() {
  const R = currentLevel.R, C = currentLevel.C;
  grid = Array(R).fill(0).map(() => Array(C).fill(0));
  hintsLeft = 3;
  won = false;
  violations = { adj: [], clue: [], conn: false };
  startTime = Date.now();
  document.getElementById('hint-count').textContent = hintsLeft;
  draw();
  showToast('↻ Restarted');
}

// === PROGRESS ===
function saveProgress(idx, stars, time) {
  let progress = {};
  try { progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}
  if (!progress[idx] || stars > progress[idx].stars) {
    progress[idx] = { stars, time, completed: true };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }
}

function getProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}

// === UI ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

function updateTimer() {
  if (won) return;
  const sec = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(sec / 60), s = sec % 60;
  document.getElementById('info-time').textContent = `${m}:${s.toString().padStart(2, '0')}`;
}

function showWinOverlay(stars, time) {
  const m = Math.floor(time / 60), s = time % 60;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <h2>🎉 Solved!</h2>
    <div class="stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <p>Level ${currentLevelIdx+1} completed in ${m}:${s.toString().padStart(2,'0')}</p>
    <div>
      ${currentLevelIdx < LEVELS.length - 1 ? '<button class="btn accent" id="next-btn">Next Level →</button>' : '<button class="btn accent" id="menu-btn2">Level Menu</button>'}
      <button class="btn" id="retry-btn">Retry</button>
    </div>
  `;
  document.getElementById('app').appendChild(overlay);
  document.getElementById('retry-btn').onclick = () => { overlay.remove(); doRestart(); };
  const nb = document.getElementById('next-btn');
  if (nb) nb.onclick = () => { overlay.remove(); loadLevel(currentLevelIdx + 1); };
  const mb = document.getElementById('menu-btn2');
  if (mb) mb.onclick = () => { overlay.remove(); showMenu(); };
}

function showMenu() {
  const progress = getProgress();
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  let html = '<h2>📋 Level Select</h2>';
  const tiers = ['Beginner', 'Easy', 'Medium', 'Hard', 'Expert'];
  tiers.forEach((tier, ti) => {
    html += `<div class="tier-header">${tier}</div><div class="level-grid">`;
    for (let i = ti * 6; i < ti * 6 + 6 && i < LEVELS.length; i++) {
      const p = progress[i];
      const cls = p && p.completed ? 'completed' : (i === currentLevelIdx ? 'current' : '');
      const stars = p && p.completed ? '⭐'.repeat(p.stars) : '';
      html += `<div class="level-cell ${cls}" data-level="${i}">${i+1}<span class="stars-mini">${stars}</span></div>`;
    }
    html += '</div>';
  });
  html += '<button class="btn" id="close-menu" style="margin-top:16px">Close</button>';
  overlay.innerHTML = html;
  document.getElementById('app').appendChild(overlay);
  overlay.querySelectorAll('.level-cell').forEach(cell => {
    cell.onclick = () => {
      const idx = parseInt(cell.dataset.level);
      overlay.remove();
      loadLevel(idx);
    };
  });
  document.getElementById('close-menu').onclick = () => overlay.remove();
}

function showHowTo() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <h2>📖 How to Play</h2>
    <p><strong>Kuroshuto</strong> (クロシュート) is a Nikoli number-distance puzzle.</p>
    <div class="howto-step">Blacken cells in the grid</div>
    <div class="howto-step">A number <strong>N</strong> means exactly <strong>one</strong> cell at distance <strong>N</strong> (up/down/left/right) must be black</div>
    <div class="howto-step">Black cells <strong>cannot touch</strong> orthogonally</div>
    <div class="howto-step">All white cells must form a single <strong>connected area</strong></div>
    <div class="howto-step">Click a cell to shade it, use Erase mode to clear</div>
    <button class="btn accent" id="close-howto" style="margin-top:16px">Got it!</button>
  `;
  document.getElementById('app').appendChild(overlay);
  document.getElementById('close-howto').onclick = () => overlay.remove();
}

function showSettings() {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <h2>⚙ Settings</h2>
    <div class="settings-panel">
      <label>🎵 Music<input type="checkbox" id="set-music" ${musicOn?'checked':''}></label>
      <label>🔊 Sound Effects<input type="checkbox" id="set-sfx" ${sfxOn?'checked':''}></label>
      <label>✓ Auto-check<input type="checkbox" id="set-autocheck" ${autoCheck?'checked':''}></label>
    </div>
    <button class="btn accent" id="close-settings">Close</button>
  `;
  document.getElementById('app').appendChild(overlay);
  document.getElementById('set-music').onchange = (e) => {
    musicOn = e.target.checked;
    if (musicOn) startBGM();
  };
  document.getElementById('set-sfx').onchange = (e) => { sfxOn = e.target.checked; };
  document.getElementById('set-autocheck').onchange = (e) => { autoCheck = e.target.checked; };
  document.getElementById('close-settings').onclick = () => overlay.remove();
}

// === INPUT ===
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  const cell = getCellFromXY(x, y);
  if (cell) handleCellClick(cell[0], cell[1]);
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  const cell = getCellFromXY(x, y);
  if (cell) {
    const [r, c] = cell;
    if (grid[r][c] === 2) grid[r][c] = 0;
    else grid[r][c] = 2;
    initAudio();
    sfxClick();
    draw();
  }
});

// Touch support
let touchTimer = null;
let touchMoved = false;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchMoved = false;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
  touchTimer = setTimeout(() => {
    if (!touchMoved) {
      const cell = getCellFromXY(x, y);
      if (cell) {
        const [r, c] = cell;
        if (grid[r][c] === 2) grid[r][c] = 0;
        else grid[r][c] = 2;
        initAudio(); sfxClick(); draw();
      }
    }
  }, 400);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => { touchMoved = true; clearTimeout(touchTimer); }, { passive: true });
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  clearTimeout(touchTimer);
  if (touchMoved) return;
  const touch = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
  const cell = getCellFromXY(x, y);
  if (cell) handleCellClick(cell[0], cell[1]);
}, { passive: false });

// Mode buttons
document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    sfxClick();
  };
});

document.getElementById('btn-hint').onclick = doHint;
document.getElementById('btn-check').onclick = () => { initAudio(); doCheck(); };
document.getElementById('btn-restart').onclick = doRestart;
document.getElementById('btn-menu').onclick = showMenu;
document.getElementById('btn-howto').onclick = showHowTo;
document.getElementById('btn-settings').onclick = showSettings;

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === '1') { document.querySelector('.mode-btn[data-mode="fill"]').click(); }
  else if (e.key === '2') { document.querySelector('.mode-btn[data-mode="erase"]').click(); }
  else if (e.key.toLowerCase() === 'h') doHint();
  else if (e.key.toLowerCase() === 'r') doRestart();
  else if (e.key === 'Enter') { initAudio(); doCheck(); }
  else if (e.key === 'Escape') {
    document.querySelectorAll('.overlay').forEach(o => o.remove());
  }
});

window.addEventListener('resize', () => { resizeCanvas(); draw(); });

// === INIT ===
window.addEventListener('load', () => {
  loadLevel(0);
  setTimeout(showHowTo, 100);
});
</script>
