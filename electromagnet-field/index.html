{n:18,g:[".........",".N.I.S...",".I.I.I.I.","T.I.I.I.T",".I.I.I.I.",".N.I.S...","........."],par:8,name:"Iron Cross"},
{n:19,g:[".........","N.I.I.I.S",".I.I.I.I.",".T.I.I.T.",".I.I.I.I.","N.I.I.I.S","........."],par:8,name:"Iron Wall"},
{n:20,g:[".........","N.I..I.S.",".I.I.I.I.","T.I.I.I.T",".I.I.I.I.","N.I..I.S.","........."],par:8,name:"Iron Bridge"},

{n:23,g:["...........","N........S.","..N..S.....","...T.I.T...","....N..S...","N........S.","..........."],par:9,name:"Zigzag Field"},
{n:24,g:["...........",".N....S....","N.S..N.S...","..T.I.I.T..","N.S..N.S...",".N....S....","..........."],par:10,name:"Magnetic Web"},
{n:25,g:["...........","N........S.","....N..S...","...T.I.T...","....N..S...","N........S.","..........."],par:9,name:"Focused Field"},
/* Tier 6: Master challenges */
{n:26,g:["...........","N........S.","..N....S...",".I.I.I.I.I.","..T.I.T....",".I.I.I.I.I.","..N....S...","N........S.","..........."],par:10,name:"Iron Tunnel Master"},
{n:27,g:["..........",".N......S.",".I.I.I.I.I","N.S..N.S..",".T.I.I.T..","N.S..N.S..",".I.I.I.I.I",".N......S.",".........."],par:12,name:"Magnetic Maze"},
{n:28,g:["...........","N.I..I...S.",".I.I.I.I.I.","..T.I.I.T..",".I.I.I.I.I.","N.I..I...S.","..........."],par:11,name:"Iron Challenge"},
{n:29,g:["..........","N........S",".I.I.I.I.I","N.S..N.S..",".T.I.I.T..","N.S..N.S..",".I.I.I.I.I","N........S",".........."],par:12,name:"Final Grid"},
{n:30,g:["..........","N..I..I..S",".I.I.I.I.I","N.S..N.S..",".T.I.I.T..","N.S..N.S..",".I.I.I.I.I","N..I..I..S",".........."],par:12,name:"Ultimate Field"}
];

/* ---- State ---- */
var canvas,ctx,cellSize,gridW,gridH,grid,magnets,targets,irons;
var flipCount=0,soundOn=true,musicOn=true;
var audioCtx=null,bgmNodes=[],rafId=null,timers=[];
var curLevel=0,undoStack=[];
var particles=[];

/* ---- Init ---- */
function $(id){return document.getElementById(id)}

function startBGM(){
  if(!audioCtx||bgmNodes.length)return;
  try{
    const sr=audioCtx.sampleRate;
    const dur=16;
    const bufSize=sr*dur;
    const buf=audioCtx.createBuffer(1,bufSize,sr);
    const d=buf.getChannelData(0);
    const chords=[[261.63,329.63,392.00],[293.66,369.99,440.00],[329.63,415.30,493.88],[293.66,369.99,440.00]];
    const chordDur=dur/chords.length;
    for(let i=0;i<bufSize;i++){
      const t=i/sr;
      const ci=Math.min(Math.floor(t/chordDur),chords.length-1);
      const chord=chords[ci];
      let s=0;
      for(let n=0;n<chord.length;n++){
        const f=chord[n];
        s+=Math.sin(2*Math.PI*f*t)*.06;
        s+=Math.sin(2*Math.PI*f*2*t)*.015;
        s+=Math.sin(2*Math.PI*f*0.5*t)*.03;
      }
      const fade=t%chordDur;
      s*=Math.min(fade/0.8,1)*Math.min((chordDur-fade)/0.8,1);
      const lfo=Math.sin(2*Math.PI*0.25*t)*0.15+1;
      d[i]=s*lfo*0.5;
    }
    const src=audioCtx.createBufferSource();
    src.buffer=buf;
    src.loop=true;
    const filt=audioCtx.createBiquadFilter();
    filt.type='lowpass';
    filt.frequency.value=800;
    filt.Q.value=1;
    const g=audioCtx.createGain();
    g.gain.value=0.15;
    src.connect(filt);
    filt.connect(g);
    g.connect(audioCtx.destination);
    src.start();
    bgmNodes=[src,filt,g];
  }catch(e){}
}

function init(){
  canvas=$('cv');ctx=canvas.getContext('2d');
  loadProgress();loadLevel(curLevel);
  setupButtons();
  requestAnimationFrame(loop);
}

/* ---- Level loading ---- */
function loadLevel(idx){
  curLevel=idx;
  var lv=LEVELS[idx];
  var lines=lv.g;
  gridH=lines.length;gridW=lines[0].length;
  grid=[];magnets=[];targets=[];irons=[];
  for(var r=0;r<gridH;r++){
    var row=[];
    for(var c=0;c<gridW;c++){
      var ch=lines[r][c];
      if(ch==='.')row.push(EMPTY);
      else if(ch==='N'){row.push(MAGNET_N);magnets.push({r:r,c:c,p:'N'});}
      else if(ch==='S'){row.push(MAGNET_S);magnets.push({r:r,c:c,p:'S'});}
      else if(ch==='T'){row.push(TARGET);targets.push({r:r,c:c});}
      else if(ch==='I'){row.push(IRON);irons.push({r:r,c:c});}
    }
    grid.push(row);
  }
  flipCount=0;undoStack=[];
  particles=[];
  fitCanvas();updateHUD();
}

function fitCanvas(){
  var wrap=document.querySelector('.wrap');
  var maxW=Math.min(wrap.clientWidth-20,520);
  cellSize=Math.floor(maxW/gridW);
  if(cellSize>56)cellSize=56;
  var dpr=window.devicePixelRatio||1;
  canvas.width=gridW*cellSize*dpr;
  canvas.height=gridH*cellSize*dpr;
  canvas.style.width=(gridW*cellSize)+'px';
  canvas.style.height=(gridH*cellSize)+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

/* ---- Magnetic field calculation ---- */
function calculateField(x,y){
  var bx=0,by=0;
  for(var i=0;i<magnets.length;i++){
    var m=magnets[i];
    var mx=m.c*cellSize+cellSize/2;
    var my=m.r*cellSize+cellSize/2;
    var dx=x-mx,dy=y-my;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<20)dist=20;
    var strength=m.p==='N'?1:-1;
    var mag=strength*5000/(dist*dist);
    bx+=mag*dx/dist;
    by+=mag*dy/dist;
  }
  return{bx:bx,by:by};
}

function traceFieldLine(startMagnet,angleStep,maxSteps){
  var m=startMagnet;
  var x=m.c*cellSize+cellSize/2;
  var y=m.r*cellSize+cellSize/2;
  var points=[{x:x,y:y}];
  var angle=m.p==='N'?angleStep:angleStep+Math.PI;
  var stepSize=8;
  for(var step=0;step<maxSteps;step++){
    var field=calculateField(x,y);
    var fieldMag=Math.sqrt(field.bx*field.bx+field.by*field.by);
    if(fieldMag<0.1)break;
    var dirX=field.bx/fieldMag;
    var dirY=field.by/fieldMag;
    x+=dirX*stepSize;
    y+=dirY*stepSize;
    points.push({x:x,y:y});
    if(x<0||x>canvas.width/dpr||y<0||y>canvas.height/dpr)break;
    for(var i=0;i<magnets.length;i++){
      var om=magnets[i];
      if(om!==m){
        var ox=om.c*cellSize+cellSize/2;
        var oy=om.r*cellSize+cellSize/2;
        var ddx=x-ox,ddy=y-oy;
        if(ddx*ddx+ddy*ddy<(cellSize/2)*(cellSize/2)){
          return{points:points,ended:'magnet',endMagnet:om};
        }
      }
    }
  }
  return{points:points,ended:'out'};
}

/* ---- Rendering ---- */
function loop(){
  if(rafId)rafId=requestAnimationFrame(loop);
  draw();
  updateParticles();
}

function draw(){
  ctx.clearRect(0,0,gridW*cellSize,gridH*cellSize);
  ctx.fillStyle='#0a0818';
  ctx.fillRect(0,0,gridW*cellSize,gridH*cellSize);
  
  for(var r=0;r<gridH;r++){
    for(var c=0;c<gridW;c++){
      var x=c*cellSize,y=r*cellSize;
      ctx.strokeStyle='rgba(50,35,90,0.3)';
      ctx.lineWidth=1;
      ctx.strokeRect(x,y,cellSize,cellSize);
      if(grid[r][c]===IRON){
        ctx.fillStyle='#2a2540';
        ctx.fillRect(x+2,y+2,cellSize-4,cellSize-4);
        ctx.strokeStyle='rgba(100,80,140,0.5)';
        ctx.lineWidth=2;
        ctx.strokeRect(x+2,y+2,cellSize-4,cellSize-4);
      }else if(grid[r][c]===TARGET){
        ctx.strokeStyle='#27e070';
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.arc(x+cellSize/2,y+cellSize/2,cellSize*0.35,0,Math.PI*2);
        ctx.stroke();
        ctx.fillStyle='rgba(39,224,112,0.2)';
        ctx.beginPath();
        ctx.arc(x+cellSize/2,y+cellSize/2,cellSize*0.35,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
  
  drawFieldLines();
  drawMagnets();
  drawParticles();
}

function drawFieldLines(){
  var fieldLinesPerMagnet=8;
  for(var i=0;i<magnets.length;i++){
    var m=magnets[i];
    for(var j=0;j<fieldLinesPerMagnet;j++){
      var angle=(2*Math.PI*j)/fieldLinesPerMagnet;
      var result=traceFieldLine(m,angle,50);
      if(result.points.length<2)continue;
      var gradient=ctx.createLinearGradient(result.points[0].x,result.points[0].y,result.points[result.points.length-1].x,result.points[result.points.length-1].y);
      if(m.p==='N'){
        gradient.addColorStop(0,'#4facfe');
        gradient.addColorStop(1,'rgba(79,172,254,0.1)');
      }else{
        gradient.addColorStop(0,'#f5576c');
        gradient.addColorStop(1,'rgba(245,87,108,0.1)');
      }
      ctx.strokeStyle=gradient;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(result.points[0].x,result.points[0].y);
      for(var k=1;k<result.points.length;k++){
        ctx.lineTo(result.points[k].x,result.points[k].y);
      }
      ctx.stroke();
    }
  }
}

function drawMagnets(){
  for(var i=0;i<magnets.length;i++){
    var m=magnets[i];
    var x=m.c*cellSize+cellSize/2;
    var y=m.r*cellSize+cellSize/2;
    var radius=cellSize*0.4;
    ctx.fillStyle=m.p==='N'?'#4facfe':'#f5576c';
    ctx.beginPath();
    ctx.arc(x,y,radius,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='bold '+Math.floor(cellSize*0.35)+'px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(m.p==='N'?'N':'S',x,y);
  }
}

function drawParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    ctx.fillStyle='rgba('+p.col[0]+','+p.col[1]+','+p.col[2]+','+p.life+')';
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  }
}

/* ---- Particles ---- */
function spawnParticles(x,y,col,count){
  for(var i=0;i<count;i++){
    var ang=Math.random()*Math.PI*2;
    var spd=1+Math.random()*3;
    particles.push({x:x,y:y,dx:Math.cos(ang)*spd,dy:Math.sin(ang)*spd,
      r:2+Math.random()*3,col:col,life:1});
  }
}

function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.dx;p.y+=p.dy;p.dy+=0.08;
    p.life-=0.025;p.r*=0.97;
    if(p.life<=0)particles.splice(i,1);
  }
}

/* ---- Interaction ---- */
canvas.addEventListener('pointerdown',function(e){
  var rect=canvas.getBoundingClientRect();
  var x=e.clientX-rect.left;
  var y=e.clientY-rect.top;
  var c=Math.floor(x/cellSize);
  var r=Math.floor(y/cellSize);
  if(r<0||r>=gridH||c<0||c>=gridW)return;
  for(var i=0;i<magnets.length;i++){
    var m=magnets[i];
    if(m.r===r&&m.c===c){
      undoStack.push(JSON.parse(JSON.stringify(magnets)));
      m.p=m.p==='N'?'S':'N';
      flipCount++;
      ensureAudio();playTone(m.p==='N'?550:400,0.1,'sine');
      spawnParticles(x+cellSize/2,y+cellSize/2,m.p==='N'?[79,172,254]:[245,87,108],8);
      updateHUD();
      break;
    }
  }
});

/* ---- Check win condition ---- */
function checkWin(){
  var hitTargets={};
  var fieldLinesPerMagnet=8;
  for(var i=0;i<magnets.length;i++){
    var m=magnets[i];
    for(var j=0;j<fieldLinesPerMagnet;j++){
      var angle=(2*Math.PI*j)/fieldLinesPerMagnet;
      var result=traceFieldLine(m,angle,50);
      for(var k=0;k<result.points.length;k++){
        var p=result.points[k];
        var c=Math.floor(p.x/cellSize);
        var r=Math.floor(p.y/cellSize);
        if(r>=0&&r<gridH&&c>=0&&c<gridW&&grid[r][c]===TARGET){
          hitTargets[r+','+c]=1;
        }
      }
    }
  }
  var allHit=true;
  for(var i=0;i<targets.length;i++){
    var t=targets[i];
    if(!hitTargets[t.r+','+t.c]){allHit=false;break;}
  }
  if(allHit){
    spawnParticles(canvas.width/2,canvas.height/2,[39,224,112],20);
    ensureAudio();playWinSound();
    saveLevelResult(curLevel,3);
    setTimeout(showWinOverlay,400);
  }else{
    $('fail-msg').textContent='Not all targets are hit by magnetic field lines. Try flipping more magnets!';
    $('ov-fail').classList.add('show');
  }
}

/* ---- HUD ---- */
function updateHUD(){
  $('hud-level').textContent=curLevel+1;
  $('hud-flips').textContent=flipCount;
  $('hud-targets').textContent=targets.length;
}

/* ---- Audio ---- */
function ensureAudio(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
}

function playTone(freq,dur,type){
  if(!soundOn||!audioCtx)return;
  try{
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.type=type||'sine';
    osc.frequency.value=freq;
    gain.gain.setValueAtTime(0.15,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start();osc.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function playWinSound(){
  if(!soundOn)return;
  var notes=[523,659,784,1047];
  notes.forEach(function(f,i){
    timers.push(setTimeout(function(){playTone(f,0.15,'triangle');},i*100));
  });
}

/* ---- Progress (localStorage) ---- */
function loadProgress(){
  try{return JSON.parse(localStorage.getItem('ef_progress')||'{}');}catch(e){return{};}
}
function saveLevelResult(idx,stars){
  var p=loadProgress();
  if(!p[idx]||p[idx].stars<stars)p[idx]={stars:stars};
  try{localStorage.setItem('ef_progress',JSON.stringify(p));}catch(e){}
}

/* ---- Overlays ---- */
function showWinOverlay(){
  var stars=3;
  var starStr='';
  for(var i=0;i<3;i++)starStr+=(i<stars)?'\u2605':'\u2606';
  $('win-stars').textContent=starStr;
  $('win-stars').style.color='#ffd23f';
  $('win-msg').textContent='Solved in '+flipCount+' flips!';
  $('win-title').textContent='Level '+(curLevel+1)+' Complete!';
  $('ov-win').classList.add('show');
  updateHUD();
}

function buildLevelGrid(){
  var container=$('lv-grid-container');
  var progress=loadProgress();
  var html='';
  for(var tier=0;tier<6;tier++){
    html+='<div class="tier-label">Tier '+(tier+1)+'</div><div class="lv-grid">';
    for(var i=0;i<5;i++){
      var idx=tier*5+i;
      if(idx>=LEVELS.length)break;
      var lv=idx+1;
      var stars=progress[idx]?progress[idx].stars:0;
      var cls='lv-cell';
      if(idx===0||progress[idx-1])cls+=' unlocked';
      if(progress[idx])cls+=' solved';
      if(idx===curLevel)cls+=' current';
      var starStr=stars?(' '.repeat(3-stars)+'*'.repeat(stars)):'';
      html+='<div class="'+cls+'" data-idx="'+idx+'">'+lv+(stars?'<div class="mini-stars">'+starStr+'</div>':'')+'</div>';
    }
    html+='</div>';
  }
  container.innerHTML=html;
  container.querySelectorAll('.lv-cell').forEach(function(el){
    el.onclick=function(){
      var idx=parseInt(el.dataset.idx);
      if(idx===0||loadProgress()[idx-1]){
        $('ov-levels').classList.remove('show');
        loadLevel(idx);
      }
    };
  });
}

/* ---- Buttons ---- */
function setupButtons(){
  $('btn-check').onclick=checkWin;
  $('btn-reset').onclick=function(){
    if(undoStack.length>0){
      magnets=undoStack[0];
      undoStack=[];
      flipCount=0;
      particles=[];
      updateHUD();
    }
  };
  $('btn-undo').onclick=function(){
    if(undoStack.length>0){
      magnets=undoStack.pop();
      flipCount--;
      updateHUD();
    }
  };
  $('btn-levels').onclick=function(){buildLevelGrid();$('ov-levels').classList.add('show');};
  $('btn-sound').onclick=function(){
    soundOn=!soundOn;
    $('btn-sound').textContent=soundOn?'Sound':'Muted';
  };
  $('win-next').onclick=function(){
    $('ov-win').classList.remove('show');
    if(curLevel<LEVELS.length-1)loadLevel(curLevel+1);
  };
  $('win-replay').onclick=function(){
    $('ov-win').classList.remove('show');
    flipCount=0;undoStack=[];particles=[];
    updateHUD();
  };
  $('win-levels').onclick=function(){
    $('ov-win').classList.remove('show');
    buildLevelGrid();$('ov-levels').classList.add('show');
  };
  $('fail-retry').onclick=function(){
    $('ov-fail').classList.remove('show');
    flipCount=0;undoStack=[];particles=[];
    updateHUD();
  };
  $('fail-hint').onclick=function(){
    $('ov-fail').classList.remove('show');
    $('fail-msg').textContent='Hint: Make sure all field lines pass through the green target zones.';
    $('ov-fail').classList.add('show');
  };
  $('lv-close').onclick=function(){$('ov-levels').classList.remove('show');};
}

/* ---- Cleanup ---- */
function cleanup(){
  if(rafId)cancelAnimationFrame(rafId);
  timers.forEach(function(t){clearTimeout(t);});
  timers=[];
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
}

window.addEventListener('resize',function(){fitCanvas();});
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
  if(document.hidden){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
  else if(!rafId){rafId=requestAnimationFrame(loop);}
});

init();
</script>
