<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="ballRed" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff8888"/>
      <stop offset="50%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#aa1111"/>
    </radialGradient>
    <radialGradient id="ballBlue" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#88bbff"/>
      <stop offset="50%" stop-color="#4488FF"/>
      <stop offset="100%" stop-color="#1155aa"/>
    </radialGradient>
    <radialGradient id="ballGreen" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#88ff88"/>
      <stop offset="50%" stop-color="#44DD44"/>
      <stop offset="100%" stop-color="#118811"/>
    </radialGradient>
    <radialGradient id="ballYellow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffee88"/>
      <stop offset="50%" stop-color="#FFDD00"/>
      <stop offset="100%" stop-color="#aa8800"/>
    </radialGradient>
    <radialGradient id="ballPurple" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#cc88ff"/>
      <stop offset="50%" stop-color="#BB44FF"/>
      <stop offset="100%" stop-color="#7711aa"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </linearGradient>
    <linearGradient id="glassStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.35)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.08" stroke="#4d96ff" stroke-width="0.5" fill="none">
    <line x1="0" y1="128" x2="512" y2="128"/><line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/><line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/><line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Neon glow lines -->
  <line x1="50" y1="480" x2="462" y2="480" stroke="#4d96ff" stroke-width="1" opacity="0.3" filter="url(#neon)"/>
  <line x1="30" y1="50" x2="200" y2="50" stroke="#ff6b6b" stroke-width="1" opacity="0.4" filter="url(#neon)"/>
  <line x1="312" y1="50" x2="482" y2="50" stroke="#6bcb77" stroke-width="1" opacity="0.4" filter="url(#neon)"/>

  <!-- Tube 1: Red + Blue balls -->
  <g transform="translate(55, 120)">
    <rect x="0" y="0" width="70" height="280" rx="14" fill="url(#glass)" stroke="url(#glassStroke)" stroke-width="1.5"/>
    <ellipse cx="35" cy="252" rx="28" ry="8" fill="rgba(255,255,255,0.08)"/>
    <!-- Balls bottom to top -->
    <circle cx="35" cy="230" r="26" fill="url(#ballRed)" filter="url(#glow)"/>
    <circle cx="35" cy="194" r="26" fill="url(#ballBlue)" filter="url(#glow)"/>
    <circle cx="35" cy="158" r="26" fill="url(#ballRed)" filter="url(#glow)"/>
    <circle cx="35" cy="122" r="26" fill="url(#ballBlue)" filter="url(#glow)"/>
    <!-- highlight -->
    <ellipse cx="24" cy="110" rx="8" ry="5" fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- Tube 2: Green + Yellow balls -->
  <g transform="translate(155, 120)">
    <rect x="0" y="0" width="70" height="280" rx="14" fill="url(#glass)" stroke="url(#glassStroke)" stroke-width="1.5"/>
    <ellipse cx="35" cy="252" rx="28" ry="8" fill="rgba(255,255,255,0.08)"/>
    <circle cx="35" cy="230" r="26" fill="url(#ballGreen)" filter="url(#glow)"/>
    <circle cx="35" cy="194" r="26" fill="url(#ballYellow)" filter="url(#glow)"/>
    <circle cx="35" cy="158" r="26" fill="url(#ballGreen)" filter="url(#glow)"/>
    <circle cx="35" cy="122" r="26" fill="url(#ballYellow)" filter="url(#glow)"/>
    <ellipse cx="24" cy="110" rx="8" ry="5" fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- Tube 3: Purple + Red balls -->
  <g transform="translate(255, 120)">
    <rect x="0" y="0" width="70" height="280" rx="14" fill="url(#glass)" stroke="url(#glassStroke)" stroke-width="1.5"/>
    <ellipse cx="35" cy="252" rx="28" ry="8" fill="rgba(255,255,255,0.08)"/>
    <circle cx="35" cy="230" r="26" fill="url(#ballPurple)" filter="url(#glow)"/>
    <circle cx="35" cy="194" r="26" fill="url(#ballRed)" filter="url(#glow)"/>
    <circle cx="35" cy="158" r="26" fill="url(#ballPurple)" filter="url(#glow)"/>
    <circle cx="35" cy="122" r="26" fill="url(#ballRed)" filter="url(#glow)"/>
    <ellipse cx="24" cy="110" rx="8" ry="5" fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- Tube 4: Blue + Green balls -->
  <g transform="translate(355, 120)">
    <rect x="0" y="0" width="70" height="280" rx="14" fill="url(#glass)" stroke="url(#glassStroke)" stroke-width="1.5"/>
    <ellipse cx="35" cy="252" rx="28" ry="8" fill="rgba(255,255,255,0.08)"/>
    <circle cx="35" cy="230" r="26" fill="url(#ballBlue)" filter="url(#glow)"/>
    <circle cx="35" cy="194" r="26" fill="url(#ballGreen)" filter="url(#glow)"/>
    <circle cx="35" cy="158" r="26" fill="url(#ballBlue)" filter="url(#glow)"/>
    <circle cx="35" cy="122" r="26" fill="url(#ballGreen)" filter="url(#glow)"/>
    <ellipse cx="24" cy="110" rx="8" ry="5" fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- Floating ball (selected/lifted) with strong glow -->
  <circle cx="440" cy="80" r="28" fill="url(#ballYellow)" filter="url(#glow)" opacity="0.9"/>
  <ellipse cx="430" cy="70" rx="9" ry="6" fill="rgba(255,255,255,0.4)"/>

  <!-- Neon accent dots -->
  <circle cx="40" cy="440" r="4" fill="#ff6b6b" filter="url(#neon)" opacity="0.7"/>
  <circle cx="60" cy="450" r="3" fill="#ffd93d" filter="url(#neon)" opacity="0.6"/>
  <circle cx="452" cy="440" r="4" fill="#6bcb77" filter="url(#neon)" opacity="0.7"/>
  <circle cx="472" cy="450" r="3" fill="#4d96ff" filter="url(#neon)" opacity="0.6"/>
  <circle cx="256" cy="440" r="3" fill="#9b59b6" filter="url(#neon)" opacity="0.5"/>

  <!-- App icon rounded rect border -->
  <rect x="8" y="8" width="496" height="496" rx="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <rect x="12" y="12" width="488" height="488" rx="76" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
</svg>
