<script>
// =============================================
// HEX PATH SPIN - Hexagonal Tile Path Puzzle
// =============================================

(function(){
'use strict';

// --- Utility ---
var SAVE_KEY='hexpathspin_v1';
var TUT_KEY='hexpathspin_tut';

function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// --- Hex math (flat-top hex grid) ---
// Axial coordinates (q, r)
// Flat-top hex: 6 edges at angles 0,60,120,180,240,300 degrees
// Edge indices: 0=E, 1=SE, 2=SW, 3=W, 4=NW, 5=NE

function hexToPixel(q,r,size){
  // flat-top hex layout
  var x=size*1.5*q;
  var y=size*(Math.sqrt(3)/2*q+Math.sqrt(3)*r);
  return{x:x,y:y};
}

function pixelToHex(px,py,size){
  var q=(2/3*px)/size;
  var r=(-1/3*px+Math.sqrt(3)/3*py)/size;
  return cubeRound(q,r);
}

function cubeRound(q,r){
  var s=-q-r;
  var rq=Math.round(q),rr=Math.round(r),rs=Math.round(s);
  var dq=Math.abs(rq-q),dr=Math.abs(rr-r),ds=Math.abs(rs-s);
  if(dq>dr&&dq>ds)rq=-rr-rs;
  else if(dr>ds)rr=-rq-rs;
  return{q:rq,r:rr};
}

// Neighbor directions (flat-top): edge i goes to neighbor in direction i
var HEX_DIRS=[
  {q:1,r:0},   // 0: E
  {q:1,r:-1},  // 1: NE-Wait, let me recalculate for flat-top
];
// For flat-top hexagons:
// Edge 0 = East, Edge 1 = NE, Edge 2 = NW, Edge 3 = W, Edge 4 = SW, Edge 5 = SE
// But in axial coords for flat-top:
// E -> (+1, 0) is wrong for flat-top... let me use pointy-top instead
// Actually, let me use POINTY-TOP hexagons which are more natural for path drawing

// POINTY-TOP hex: edges at 30,90,150,210,270,330 degrees
// Edge 0 = NE(upper-right), Edge 1 = N is not an edge... 
// Let me define clearly:
// Pointy-top hexagon vertices at: 30,90,150,210,270,330 degrees
// Edges (between consecutive vertices):
// Edge 0: between vertex 0(30°) and vertex 1(90°) = upper-right (NE)
// Edge 1: between vertex 1(90°) and vertex 2(150°) = upper-left (NW)  
// Edge 2: between vertex 2(150°) and vertex 3(210°) = left (W)
// Edge 3: between vertex 3(210°) and vertex 4(270°) = lower-left (SW)
// Edge 4: between vertex 4(270°) and vertex 5(330°) = lower-right (SE)
// Edge 5: between vertex 5(330°) and vertex 0(30°) = right (E)

// Pointy-top axial neighbor directions:
var POINTY_DIRS=[
  {q:1,r:-1},  // 0: NE (upper-right)
  {q:0,r:-1},  // 1: NW? No...
];

// OK let me be very precise. Pointy-top hex:
// The 6 neighbors in axial coordinates for pointy-top:
// E:  (+1, 0), NE: (+1,-1), NW: (0,-1), W: (-1,0), SW: (-1,+1), SE: (0,+1)
// But for pointy-top, E and W are not direct neighbors! Only NE,NW,SW,SE + N,S
// Actually NO - pointy-top means the top vertex points up.
// The 6 sides face: NE, E, SE, SW, W, NW
// Neighbors: NE(+1,-1), E(+1,0), SE(0,+1), SW(-1,+1), W(-1,0), NW(0,-1)

// Let me just define edges clearly for pointy-top:
// Edge 0 = E (right), connects to neighbor (+1, 0)
// Edge 1 = SE (lower-right), connects to neighbor (0, +1)  
// Edge 2 = SW (lower-left), connects to neighbor (-1, +1)
// Edge 3 = W (left), connects to neighbor (-1, 0)
// Edge 4 = NW (upper-left), connects to neighbor (0, -1)
// Edge 5 = NE (upper-right), connects to neighbor (+1, -1)
// Opposite of edge i is (i+3)%6

var EDGE_DIRS=[
  {q:1,r:0},   // 0: E
  {q:0,r:1},   // 1: SE
  {q:-1,r:1},  // 2: SW
  {q:-1,r:0},  // 3: W
  {q:0,r:-1},  // 4: NW
  {q:1,r:-1},  // 5: NE
];

function pointyHexToPixel(q,r,size){
  var x=size*Math.sqrt(3)*(q+r/2);
  var y=size*1.5*r;
  return{x:x,y:y};
}

function pointyPixelToHex(px,py,size){
  var q=(Math.sqrt(3)/3*px-1/3*py)/size;
  var r=(2/3*py)/size;
  var c=cubeRound(q,r);
  return c;
}

function hexVertex(cx,cy,size,vertexIdx){
  // Pointy-top: vertex at angle 30+60*vertexIdx from horizontal (in degrees)
  var angle=Math.PI/180*(60*vertexIdx-30);
  return{x:cx+size*Math.cos(angle),y:cy+size*Math.sin(angle)};
}

function hexEdgeMidpoint(cx,cy,size,edgeIdx){
  // Edge i connects vertex i to vertex (i+1)%6
  // But we need the midpoint and direction
  // For pointy-top: edges face the 6 cardinal-ish directions
  // Edge direction angles: 0°, 60°, 120°, 180°, 240°, 300°
  var angle=Math.PI/180*(60*edgeIdx);
  return{x:cx+size*Math.cos(angle)*0.92,y:cy+size*Math.sin(angle)*0.92};
}

// --- Path segments on tiles ---
// Each tile has 3 path segments connecting pairs of the 6 edges
// A connection pattern is an array of 3 pairs: [[a1,b1],[a2,b2],[a3,b3]]
// where each value is 0-5 (edge index), and all 6 edges are used exactly once

// Path connection patterns - each defines how the 3 curves connect 6 edges
// A "curve" connects two edges. The 3 curves partition the 6 edges into 3 pairs.
// There are 15 possible pairings, but for visual clarity we use specific patterns

// The 5 rotationally distinct tile types (Entanglement uses these):
// Type A: 3 short curves (each connecting adjacent edges) - 0-1, 2-3, 4-5
// Type B: 2 short + 1 long - 0-1, 2-5, 3-4
// Type C: 1 short + 2 medium - 0-1, 2-4, 3-5
// Type D: 3 medium curves - 0-2, 1-3, 4-5
// Type E: mixing - 0-3, 1-5, 2-4 (3 diameters - straight lines through center)

// For simplicity and good gameplay, let me define a SINGLE tile type:
// Each tile has paths connecting: edge pairs that create curved paths
// Pattern: [[0,1],[2,3],[4,5]] rotated = 3 S-curves
// This is the classic Entanglement tile

// Actually, for good gameplay let me use the most interesting pattern:
// Each tile connects: [0,2], [1,5], [3,4] - curves that wind around
// Or better: [0,4], [1,3], [2,5] - creates interesting winding paths

// I'll use 3 tile types with different connection patterns for variety:
var TILE_PATTERNS=[
  // Type 0: "Curls" - adjacent edges connected (short curves)
  [[0,1],[2,3],[4,5]],
  // Type 1: "Waves" - one-apart edges (medium curves)
  [[0,2],[1,4],[3,5]],
  // Type 2: "Crosses" - mix of short and long
  [[0,1],[2,5],[3,4]],
];

// When a tile is rotated by 60°, edge i becomes edge (i+1)%6
function rotatePattern(pattern,rotations){
  var p=[];
  for(var i=0;i<pattern.length;i++){
    p.push([
      (pattern[i][0]+rotations)%6,
      (pattern[i][1]+rotations)%6
    ]);
  }
  return p;
}

// Given an entry edge on a tile, find which exit edge the path connects to
function tracePath(pattern,entryEdge){
  // entryEdge is the edge the path comes IN from
  // The path connects this edge to its pair
  for(var i=0;i<pattern.length;i++){
    if(pattern[i][0]===entryEdge)return pattern[i][1];
    if(pattern[i][1]===entryEdge)return pattern[i][0];
  }
  return-1; // dead end
}

// The exit edge from this tile, when viewed from the neighbor, is the OPPOSITE edge
// Exit edge i on this tile = entry edge (i+3)%6 on the neighbor
function exitToEntry(edge){return(edge+3)%6;}

// --- Level data ---
// Each level defines:
// - hexes: list of {q, r, type, rotation} for tiles
// - startHex: {q, r, edge} where the path starts
// - target: minimum path length for 1-star
// - star2: path length for 2 stars
// - star3: path length for 3 stars
// - name: level name

// Board shape: hexagonal arrangement centered on (0,0)
// Ring 0: center hex (0,0)
// Ring 1: 6 hexes around center
// Ring 2: 12 hexes
// We'll use different board sizes per tier

// Pre-generate hex grid for a given radius
function genHexRing(radius){
  var hexes=[];
  for(var q=-radius;q<=radius;q++){
    for(var r=-radius;r<=radius;r++){
      var s=-q-r;
      if(Math.abs(s)<=radius){
        hexes.push({q:q,r:r});
      }
    }
  }
  return hexes;
}

// --- Generate levels ---
var LEVELS=[];
(function genLevels(){
  var names=['Warm Up','First Steps','Gentle Path','Open Field','Crossroads',
    'Winding Way','Mirror Lake','Curves Ahead','Twin Spirals','Hex Garden',
    'The Maze','Clockwork','Convergence','Deep Blue','Golden Spiral',
    'Star Pattern','Thunderbolt','Labyrinth','Phoenix','Emerald',
    'Obsidian','Diamond Cut','Infinity','Aurora','Mastermind',
    'Grand Master','Mythic','Legend','Apex','Eternal'];
  
  var tierNames=['Beginner','Easy','Normal','Hard','Expert'];
  
  for(var i=0;i<30;i++){
    var tier=Math.floor(i/6); // 0-4, 6 levels each
    var radius=1+tier; // board radius: 1,1,2,2,3 → let's use: 1,2,2,3,3
    if(tier===0)radius=1; // 7 hexes (1+6)
    else if(tier===1)radius=2; // 19 hexes
    else if(tier===2)radius=2;
    else if(tier===3)radius=3; // 37 hexes
    else radius=3;
    
    var hexes=genHexRing(radius);
    // Assign random tile type and rotation to each hex (seeded)
    var seed=1000+i*37;
    var rng=mulberry32(seed);
    
    var tiles=hexes.map(function(h){
      var type=Math.floor(rng()*TILE_PATTERNS.length);
      var rot=Math.floor(rng()*6);
      return{q:h.q,r:h.r,type:type,rotation:rot};
    });
    
    // Start position: edge of the board
    var startQ=0,startR=-radius;
    var startEdge=4; // NW edge - faces outward from the top of the board
    
    var hexCount=hexes.length;
    // Max achievable path is roughly hexCount (one segment per hex)
    // Set targets at 35%, 55%, 75% of max
    var maxPath=hexCount;
    var target1=Math.max(3,Math.floor(maxPath*0.35));
    var target2=Math.max(5,Math.floor(maxPath*0.55));
    var target3=Math.max(7,Math.floor(maxPath*0.75));
    
    LEVELS.push({
      name:names[i]||('Level '+(i+1)),
      tier:tierNames[tier],
      radius:radius,
      tiles:tiles,
      startQ:startQ,startR:startR,
      startEdge:startEdge,
      target1:target1,
      target2:target2,
      target3:target3,
      hexCount:hexCount
    });
  }
})();

// --- Seeded RNG ---
function mulberry32(a){
  return function(){
    a|=0;a=a+0x6D2B79F5|0;
    var t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  };
}

// --- Star text helper (no emoji) ---
function starStr(n){var s='';for(var i=0;i<n;i++)s+='\u2605';return s;}
function starHTML(n,max){var s='';for(var i=0;i<max;i++){if(i<n)s+='<span style="color:#fbbf24">\u2605</span> ';else s+='<span style="color:#334">\u2605</span> ';}return s;}

// --- Canvas ---
var canvas,ctx;
function initCanvas(){
  canvas=document.getElementById('game-canvas');
  ctx=canvas.getContext('2d');
  resizeCanvas();
}

function resizeCanvas(){
  if(!canvas)return;
  var wrap=document.getElementById('canvas-wrap');
  var rect=wrap.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';
  canvas.style.height=rect.height+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  // Adjust hex size to fit
  var w=rect.width,h=rect.height;
  var r=state.hexRadius;
  // Board diameter = (2*r+1) hexes, each hex width = sqrt(3)*size
  // Plus margin
  var boardW=(2*r+1)*Math.sqrt(3)*1.0;
  var boardH=(2*r+1)*1.5*1.0+0.5;
  state.hexSize=Math.min(w/boardW*0.9,h/boardH*0.9);
  if(state.hexSize<12)state.hexSize=12;
}

// --- Save / Load ---
function saveProgress(){
  try{
    var data={level:state.levelIdx,stars:{},version:1};
    var raw=localStorage.getItem(SAVE_KEY);
    if(raw){var old=JSON.parse(raw);if(old&&old.stars)data.stars=old.stars;}
    // We store stars per level when completing
    if(state.stars>0){
      data.stars[state.levelIdx]=Math.max(data.stars[state.levelIdx]||0,state.stars);
    }
    data.level=Math.max(state.levelIdx,(raw?JSON.parse(raw).level:0)||0);
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
  }catch(e){}
}

function loadProgress(){
  try{
    var raw=localStorage.getItem(SAVE_KEY);
    if(raw){
      var data=JSON.parse(raw);
      return data;
    }
  }catch(e){}
  return{level:0,stars:{},version:1};
}

function getMaxLevel(){
  var d=loadProgress();
  return d.level||0;
}

function getStars(levelIdx){
  var d=loadProgress();
  return(d.stars&&d.stars[levelIdx])||0;
}

function getTotalStars(){
  var d=loadProgress();
  var t=0;
  if(d.stars)for(var k in d.stars)t+=d.stars[k];
  return t;
}

// --- Audio (Web Audio API) ---
var audioCtx=null;
var bgmGain=null;
var bgmNodes=[];
var musicPlaying=false;

function ensureAudio(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  }
  if(audioCtx.state==='suspended')audioCtx.resume();
}

function playTone(freq,duration,type,vol){
  if(!state.soundOn||!audioCtx)return;
  try{
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.type=type||'sine';
    osc.frequency.value=freq;
    var now=audioCtx.currentTime;
    gain.gain.setValueAtTime(0,now);
    gain.gain.linearRampToValueAtTime(vol||0.15,now+0.01);
    gain.gain.exponentialRampToValueAtTime(0.001,now+duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now+duration);
  }catch(e){}
}

function sfxRotate(){
  playTone(400+Math.random()*100,0.08,'sine',0.08);
}
function sfxConnect(){
  playTone(523,0.12,'triangle',0.1);
  setTimeout(function(){playTone(659,0.12,'triangle',0.08);},60);
}
function sfxWin(){
  var notes=[523,659,784,1047];
  notes.forEach(function(n,i){
    setTimeout(function(){playTone(n,0.2,'triangle',0.12);},i*120);
  });
}
function sfxDeadEnd(){
  playTone(200,0.3,'sawtooth',0.06);
}
function sfxStar(){
  playTone(880,0.15,'sine',0.1);
}

function startBGM(){
  if(!state.musicOn||!audioCtx||musicPlaying)return;
  try{
    var sr=audioCtx.sampleRate;
    var dur=12;
    var bufSize=sr*dur;
    var buf=audioCtx.createBuffer(1,bufSize,sr);
    var d=buf.getChannelData(0);
    // Ambient chord progression: Am - F - C - G
    var chords=[[220,261.63,329.63],[174.61,220,261.63],[261.63,329.63,392],[196,246.94,293.66]];
    var chordDur=dur/chords.length;
    for(var i=0;i<bufSize;i++){
      var t=i/sr;
      var ci=Math.min(Math.floor(t/chordDur),chords.length-1);
      var chord=chords[ci];
      var s=0;
      for(var n=0;n<chord.length;n++){
        var f=chord[n];
        s+=Math.sin(2*Math.PI*f*t)*0.04;
        s+=Math.sin(2*Math.PI*f*2*t)*0.01;
      }
      var fade=t%chordDur;
      var fadeIn=Math.min(fade/0.5,1);
      var fadeOut=Math.min((chordDur-fade)/0.5,1);
      s*=fadeIn*fadeOut;
      var lfo=Math.sin(2*Math.PI*0.2*t)*0.1+1;
      d[i]=s*lfo*0.5;
    }
    var src=audioCtx.createBufferSource();
    src.buffer=buf;src.loop=true;
    var filt=audioCtx.createBiquadFilter();
    filt.type='lowpass';filt.frequency.value=600;filt.Q.value=1;
    bgmGain=audioCtx.createGain();
    bgmGain.gain.value=0.18;
    src.connect(filt);filt.connect(bgmGain);bgmGain.connect(audioCtx.destination);
    src.start();
    bgmNodes=[src,filt,bgmGain];
    musicPlaying=true;
  }catch(e){}
}

function stopBGM(){
  if(bgmNodes.length>0){
    try{bgmNodes.forEach(function(n){if(n.stop)n.stop();if(n.disconnect)n.disconnect();});}catch(e){}
    bgmNodes=[];musicPlaying=false;
  }
}

// --- Vibration ---
function vibrate(ms){
  if(state.hapticsOn&&navigator.vibrate)navigator.vibrate(ms);
}

// --- Path tracing ---
function buildTileMap(tiles){
  var map={};
  tiles.forEach(function(t){
    map[t.q+','+t.r]=t;
  });
  return map;
}

function getTileAt(q,r){
  return state.tileMap[q+','+r];
}

function traceFullPath(){
  var level=LEVELS[state.levelIdx];
  var path=[];
  
  var curQ=level.startQ;
  var curR=level.startR;
  // The start "enters" from outside the board
  // We need to figure out which edge of the start hex the path enters from
  // The path starts from outside, heading toward the center
  // Start edge = the edge facing outward from the start hex
  var startTile=getTileAt(curQ,curR);
  if(!startTile){return{segments:[],length:0,reason:'no_start'};}
  
  // Entry edge: the edge from which the path enters the first tile
  // If start is at top of board (r=-radius), path enters from NW edge (4) or NE edge (5)
  var entryEdge=level.startEdge;
  
  // Trace the path
  var visited={};
  var maxIter=200;
  
  for(var iter=0;iter<maxIter;iter++){
    var tile=getTileAt(curQ,curR);
    if(!tile){
      // Path went off the board
      path.push({type:'edge',q:curQ,r:curR,reason:'off_board'});
      return{segments:path,length:path.filter(function(s){return s.type==='segment';}).length,reason:'off_board'};
    }
    
    var key=curQ+','+curR+','+entryEdge;
    if(visited[key]){
      path.push({type:'loop',q:curQ,r:curR});
      return{segments:path,length:path.filter(function(s){return s.type==='segment';}).length,reason:'loop'};
    }
    visited[key]=true;
    
    var pattern=rotatePattern(TILE_PATTERNS[tile.type],tile.rotation);
    var exitEdge=tracePath(pattern,entryEdge);
    
    if(exitEdge===-1){
      // Dead end - shouldn't happen with 3-pair tiles, but handle it
      return{segments:path,length:path.filter(function(s){return s.type==='segment';}).length,reason:'dead_end'};
    }
    
    // Record the path segment from entry edge to exit edge through this tile
    path.push({
      type:'segment',
      q:curQ,r:curR,
      entryEdge:entryEdge,
      exitEdge:exitEdge,
      tileType:tile.type,
      rotation:tile.rotation
    });
    
    // Move to neighbor
    var dir=EDGE_DIRS[exitEdge];
    var nQ=curQ+dir.q;
    var nR=curR+dir.r;
    
    // Check if neighbor exists on the board
    var neighbor=getTileAt(nQ,nR);
    if(!neighbor){
      // Path exits the board through this edge
      path.push({type:'edge',q:nQ,r:nR,exitEdge:exitEdge,reason:'board_edge'});
      return{segments:path,length:path.filter(function(s){return s.type==='segment';}).length,reason:'board_edge'};
    }
    
    curQ=nQ;
    curR=nR;
    entryEdge=exitToEntry(exitEdge);
  }
  
  return{segments:path,length:path.filter(function(s){return s.type==='segment';}).length,reason:'max_iterations'};
}

// --- Level loading ---
function loadLevel(idx){
  state.levelIdx=idx;
  var level=LEVELS[idx];
  state.hexRadius=level.radius;
  
  // Clone tiles so we can modify rotations
  state.tiles=level.tiles.map(function(t){
    return{q:t.q,r:t.r,type:t.type,rotation:t.rotation};
  });
  state.tileMap=buildTileMap(state.tiles);
  
  state.pathSegments=[];
  state.pathLength=0;
  state.pathEnded=false;
  state.pathEndReason='';
  state.score=0;
  state.stars=0;
  state.particles=[];
  state.flashHex=null;
  
  resizeCanvas();
  updateHUD();
  
  // Show tutorial on first level
  if(idx===0){
    var tutShown=false;
    try{tutShown=localStorage.getItem(TUT_KEY)==='1';}catch(e){}
    if(!tutShown){
      showTutorial();
    }
  }
}

// --- HUD ---
function updateHUD(){
  document.getElementById('hud-level').textContent=state.levelIdx+1;
  document.getElementById('hud-score').textContent=state.pathLength;
  var level=LEVELS[state.levelIdx];
  document.getElementById('hud-target').textContent=level.target1+'-'+level.target3;
  document.getElementById('level-name').textContent=level.name+' ('+level.tier+')';
  
  // Calculate current stars
  var s=0;
  if(state.pathLength>=level.target1)s=1;
  if(state.pathLength>=level.target2)s=2;
  if(state.pathLength>=level.target3)s=3;
  document.getElementById('hud-stars').textContent=s>0?starStr(s):'--';
  state.stars=s;
}

// --- Rendering ---
function render(){
  if(!ctx)return;
  var w=canvas.clientWidth,h=canvas.clientHeight;
  var cx=w/2,cy=h/2;
  var size=state.hexSize;
  
  // Clear
  ctx.clearRect(0,0,w,h);
  
  // Draw background grid
  ctx.save();
  ctx.translate(cx,cy);
  
  // Draw hex outlines
  state.tiles.forEach(function(tile){
    var pos=pointyHexToPixel(tile.q,tile.r,size);
    drawHexTile(pos.x,pos.y,size,tile);
  });
  
  // Draw path
  drawPath(cx,cy,size);
  
  // Draw start indicator
  drawStartIndicator(cx,cy,size);
  
  // Draw particles
  state.particles.forEach(function(p){
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  
  ctx.restore();
}

function drawHexTile(cx,cy,size,tile){
  // Draw hex background
  ctx.beginPath();
  for(var i=0;i<6;i++){
    var v=hexVertex(0,0,size,i);
    if(i===0)ctx.moveTo(cx+v.x,cy+v.y);
    else ctx.lineTo(cx+v.x,cy+v.y);
  }
  ctx.closePath();
  
  // Fill
  var grad=ctx.createRadialGradient(cx,cy,0,cx,cy,size);
  grad.addColorStop(0,'rgba(30,30,70,0.8)');
  grad.addColorStop(1,'rgba(15,15,40,0.6)');
  ctx.fillStyle=grad;
  ctx.fill();
  
  // Stroke hex border
  ctx.strokeStyle='rgba(100,120,180,0.2)';
  ctx.lineWidth=1;
  ctx.stroke();
  
  // Draw path lines on tile
  var pattern=rotatePattern(TILE_PATTERNS[tile.type],tile.rotation);
  pattern.forEach(function(pair){
    drawCurve(cx,cy,size,pair[0],pair[1]);
  });
  
  // Highlight on hover/flash
  if(state.flashHex&&state.flashHex.q===tile.q&&state.flashHex.r===tile.r){
    ctx.fillStyle='rgba(0,242,254,0.15)';
    ctx.fill();
  }
}

function drawCurve(cx,cy,size,edgeA,edgeB){
  // Draw a curved path between two edges of the hex
  // The curve bows toward the center but doesn't pass through it
  var ma=hexEdgeMidpoint(0,0,size,edgeA);
  var mb=hexEdgeMidpoint(0,0,size,edgeB);
  
  // Control point: between center and the midpoint of the two edge midpoints
  var midX=(ma.x+mb.x)/2;
  var midY=(ma.y+mb.y)/2;
  // Bow factor: how much the curve bows toward center (0=straight, 1=through center)
  var bow=0.55;
  var ctrlX=midX*(1-bow);
  var ctrlY=midY*(1-bow);
  
  // Determine if it's a short curve (adjacent edges) or long curve (opposite)
  var diff=Math.abs(edgeA-edgeB);
  if(diff>3)diff=6-diff;
  var lineWidth=4;
  var color='#4facfe';
  
  if(diff===1){
    // Adjacent - short curve, tight bow
    color='#5eead4';
    bow=0.35;
  }else if(diff===2){
    // One apart - medium curve
    color='#818cf8';
    bow=0.55;
  }else{
    // Far apart - long curve
    color='#c084fc';
    bow=0.7;
  }
  
  ctrlX=midX*(1-bow);
  ctrlY=midY*(1-bow);
  
  ctx.beginPath();
  ctx.moveTo(cx+ma.x,cy+ma.y);
  ctx.quadraticCurveTo(cx+ctrlX,cy+ctrlY,cx+mb.x,cy+mb.y);
  ctx.strokeStyle=color;
  ctx.lineWidth=lineWidth;
  ctx.lineCap='round';
  ctx.stroke();
  
  // Glow effect
  ctx.shadowColor=color;
  ctx.shadowBlur=6;
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.shadowBlur=0;
}

function drawPath(cx,cy,size){
  if(state.pathSegments.length===0)return;
  
  ctx.save();
  
  var pathColor='#00f2fe';
  var glowColor='#00f2fe';
  
  state.pathSegments.forEach(function(seg,idx){
    if(seg.type!=='segment')return;
    var pos=pointyHexToPixel(seg.q,seg.r,size);
    var absCx=cx+pos.x,absCy=cy+pos.y;
    
    // Re-draw the specific curve for this segment, but brighter/thicker
    var ma=hexEdgeMidpoint(0,0,size,seg.entryEdge);
    var mb=hexEdgeMidpoint(0,0,size,seg.exitEdge);
    var midX=(ma.x+mb.x)/2;
    var midY=(ma.y+mb.y)/2;
    var diff=Math.abs(seg.entryEdge-seg.exitEdge);
    if(diff>3)diff=6-diff;
    var bow=diff===1?0.35:diff===2?0.55:0.7;
    var ctrlX=midX*(1-bow),ctrlY=midY*(1-bow);
    
    // Animated gradient for path
    var alpha=1;
    if(state.pathEnded){
      alpha=0.7;
    }
    
    ctx.beginPath();
    ctx.moveTo(absCx+ma.x,absCy+ma.y);
    ctx.quadraticCurveTo(absCx+ctrlX,absCy+ctrlY,absCx+mb.x,absCy+mb.y);
    ctx.strokeStyle='rgba(0,242,254,'+alpha+')';
    ctx.lineWidth=6;
    ctx.lineCap='round';
    ctx.shadowColor=glowColor;
    ctx.shadowBlur=12;
    ctx.stroke();
    
    // White core
    ctx.beginPath();
    ctx.moveTo(absCx+ma.x,absCy+ma.y);
    ctx.quadraticCurveTo(absCx+ctrlX,absCy+ctrlY,absCx+mb.x,absCy+mb.y);
    ctx.strokeStyle='rgba(255,255,255,'+(alpha*0.6)+')';
    ctx.lineWidth=2;
    ctx.shadowBlur=0;
    ctx.stroke();
  });
  
  // Draw endpoint
  if(state.pathSegments.length>0){
    var lastSeg=state.pathSegments[state.pathSegments.length-1];
    if(lastSeg.type==='segment'){
      var pos=pointyHexToPixel(lastSeg.q,lastSeg.r,size);
      var ep=hexEdgeMidpoint(0,0,size,lastSeg.exitEdge);
      
      // Pulsing dot at path end
      var pulse=0.5+0.5*Math.sin(performance.now()/200);
      ctx.beginPath();
      ctx.arc(cx+pos.x+ep.x,cy+pos.y+ep.y,4+pulse*3,0,Math.PI*2);
      ctx.fillStyle='rgba(0,242,254,'+(0.5+pulse*0.5)+')';
      ctx.shadowColor='#00f2fe';
      ctx.shadowBlur=15;
      ctx.fill();
      ctx.shadowBlur=0;
    }
  }
  
  ctx.restore();
}

function drawStartIndicator(cx,cy,size){
  var level=LEVELS[state.levelIdx];
  var pos=pointyHexToPixel(level.startQ,level.startR,size);
  var ep=hexEdgeMidpoint(0,0,size,level.startEdge);
  // Entry from outside
  var dir=EDGE_DIRS[level.startEdge];
  var outerX=-(dir.q*size*Math.sqrt(3)*0.5);
  var outerY=-(dir.r*size*1.5*0.5);
  
  // Arrow pointing inward
  var pulse=0.5+0.5*Math.sin(performance.now()/300);
  ctx.save();
  ctx.translate(cx+pos.x,cy+pos.y);
  
  // Draw entry arrow
  ctx.strokeStyle='rgba(0,242,254,'+(0.4+pulse*0.4)+')';
  ctx.lineWidth=3;
  ctx.lineCap='round';
  ctx.beginPath();
  var startX=ep.x*1.4,startY=ep.y*1.4;
  ctx.moveTo(startX,startY);
  ctx.lineTo(ep.x*1.05,ep.y*1.05);
  ctx.stroke();
  
  // Arrowhead
  ctx.beginPath();
  ctx.moveTo(ep.x*1.05,ep.y*1.05);
  ctx.lineTo(ep.x*1.2-Math.sin(performance.now()/300)*2,ep.y*1.2+Math.cos(performance.now()/300)*2);
  ctx.stroke();
  
  ctx.restore();
}

// --- Input ---
function handlePointer(e){
  if(state.screen!=='game')return;
  if(state.animating)return;
  e.preventDefault();
  ensureAudio();
  
  var rect=canvas.getBoundingClientRect();
  var x=(e.clientX-rect.left)-rect.width/2;
  var y=(e.clientY-rect.top)-rect.height/2;
  
  var hex=pointyPixelToHex(x,y,state.hexSize);
  
  // Check if this hex is on the board
  var tile=getTileAt(hex.q,hex.r);
  if(!tile)return;
  
  // Rotate the tile
  rotateTile(hex.q,hex.r);
}

function rotateTile(q,r){
  var tile=getTileAt(q,r);
  if(!tile)return;
  
  tile.rotation=(tile.rotation+1)%6;
  sfxRotate();
  vibrate(20);
  
  // Retrace path
  var result=traceFullPath();
  state.pathSegments=result.segments;
  state.pathLength=result.length;
  state.pathEnded=result.length>0;
  state.pathEndReason=result.reason;
  
  // Effects
  if(result.length>0){
    spawnParticles(q,r);
    if(result.reason==='board_edge'||result.reason==='off_board'){
      // Check if target met
      checkWin();
    }
  }
  
  updateHUD();
}

function spawnParticles(q,r){
  var pos=pointyHexToPixel(q,r,state.hexSize);
  for(var i=0;i<6;i++){
    var angle=(Math.PI*2/6)*i+Math.random()*0.3;
    state.particles.push({
      x:pos.x,y:pos.y,
      vx:Math.cos(angle)*1.5,
      vy:Math.sin(angle)*1.5,
      life:1,
      size:2+Math.random()*2,
      color:'#00f2fe'
    });
  }
}

function updateParticles(dt){
  for(var i=state.particles.length-1;i>=0;i--){
    var p=state.particles[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.life-=dt*2;
    p.size*=0.97;
    if(p.life<=0)state.particles.splice(i,1);
  }
}

// --- Win check ---
function checkWin(){
  var level=LEVELS[state.levelIdx];
  if(state.pathLength>=level.target1){
    sfxWin();
    vibrate([50,30,50]);
    
    // Save stars
    var s=1;
    if(state.pathLength>=level.target2)s=2;
    if(state.pathLength>=level.target3)s=3;
    state.stars=s;
    
    // Save progress
    try{
      var data=loadProgress();
      data.level=Math.max(data.level||0,state.levelIdx+1);
      if(state.levelIdx+1<LEVELS.length){
        data.level=Math.max(data.level,state.levelIdx+1);
      }
      if(!data.stars)data.stars={};
      data.stars[state.levelIdx]=Math.max(data.stars[state.levelIdx]||0,s);
      localStorage.setItem(SAVE_KEY,JSON.stringify(data));
    }catch(e){}
    
    // Show win overlay
    var overlay=document.getElementById('win-overlay');
    var starDisplay='';
    for(var i=0;i<3;i++){
      starDisplay+=i<s?'<span style="color:#fbbf24">\u2605</span> ':'<span style="color:#334">\u2605</span> ';
    }
    document.getElementById('win-star-display').innerHTML=starDisplay;
    document.getElementById('win-score-text').textContent='Path length: '+state.pathLength+' segments';
    
    var msg='';
    if(s===3)msg='Perfect! You maximized the path!';
    else if(s===2)msg='Great work! Try to extend the path further!';
    else msg='Level complete! Can you build a longer path?';
    document.getElementById('win-msg-text').textContent=msg;
    
    // Show next button only if there's a next level
    document.getElementById('btn-next').style.display=(state.levelIdx<LEVELS.length-1)?'block':'none';
    
    setTimeout(function(){
      overlay.classList.add('show');
    },400);
  }
}

// --- Tutorial ---
var tutSteps=[
  {title:'Welcome!',body:'The board is made of hexagonal tiles. Each tile has 3 curved path segments connecting its edges.'},
  {title:'Rotate Tiles',body:'Tap or click any hex tile to rotate it 60 degrees clockwise. The curved paths will shift with each rotation.'},
  {title:'Build the Path',body:'Your path starts from the glowing arrow. Rotate tiles so paths connect across the board, creating one continuous winding line.'},
  {title:'Score Stars',body:'Longer paths score more stars! Reach the target length for 1 star. Build even longer for 2 or 3 stars. Avoid sending the path off the board too early!'},
];
var tutIdx=0;

function showTutorial(){
  tutIdx=0;
  showTutStep();
  document.getElementById('tutorial-overlay').classList.add('show');
}

function showTutStep(){
  var s=tutSteps[tutIdx];
  document.getElementById('tut-num').textContent='Step '+(tutIdx+1)+' of '+tutSteps.length;
  document.getElementById('tut-title').textContent=s.title;
  document.getElementById('tut-body').textContent=s.body;
  document.getElementById('tut-next').textContent=tutIdx<tutSteps.length-1?'NEXT':'GOT IT!';
}

document.getElementById('tut-next').addEventListener('click',function(){
  tutIdx++;
  if(tutIdx>=tutSteps.length){
    document.getElementById('tutorial-overlay').classList.remove('show');
    try{localStorage.setItem(TUT_KEY,'1');}catch(e){}
    if(state.musicOn)startBGM();
  }else{
    showTutStep();
  }
});

// --- Animation loop ---
function loop(time){
  if(state.screen==='game'){
    if(!state.lastTime)state.lastTime=time;
    var dt=Math.min((time-state.lastTime)/1000,0.05);
    state.lastTime=time;
    
    updateParticles(dt);
    render();
  }
  state.rafId=requestAnimationFrame(loop);
}

// --- Screen management ---
function showScreen(name){
  state.screen=name;
  document.getElementById('menu-screen').style.display=name==='menu'?'flex':'none';
  document.getElementById('game-screen').style.display=name==='game'?'flex':'none';
  document.getElementById('level-select').style.display=name==='levelselect'?'flex':'none';
  
  if(name==='menu'){
    updateMenuStats();
    stopBGM();
  }
  if(name==='game'){
    if(state.musicOn)startBGM();
    // Bug #9/#18c fix: canvas-wrap has 0×0 rect while #game-screen is display:none.
    // loadLevel() calls resizeCanvas() BEFORE showScreen flips display to flex, so
    // getBoundingClientRect returns {0,0} → canvas stuck at 0×0. Defer resize to next
    // frame after browser reflows the now-visible flex container. (R-tick fix)
    requestAnimationFrame(function(){ resizeCanvas(); render(); });
  }
}

function updateMenuStats(){
  var max=getMaxLevel();
  var total=getTotalStars();
  var completed=0;
  for(var i=0;i<30;i++){if(getStars(i)>0)completed++;}
  var el=document.getElementById('menu-stats');
  el.innerHTML='Levels unlocked: '+Math.min(max+1,30)+'/30 &middot; Stars: '+total+'/90 &middot; Completed: '+completed+'/30';
}

// --- Level select ---
function buildLevelGrid(){
  var grid=document.getElementById('level-grid');
  grid.innerHTML='';
  var maxLevel=getMaxLevel();
  
  for(var i=0;i<30;i++){
    var btn=document.createElement('div');
    btn.className='lvl-btn';
    var stars=getStars(i);
    var locked=i>maxLevel;
    
    if(locked)btn.classList.add('locked');
    if(stars>0)btn.classList.add('completed');
    
    btn.innerHTML='<div>'+(i+1)+'</div>'+
      '<div class="lvl-stars">'+(stars>0?'*'.repeat(stars):locked?'---':'...')+'</div>';
    
    (function(idx){
      btn.addEventListener('click',function(){
        if(idx<=maxLevel){
          loadLevel(idx);
          showScreen('game');
        }
      });
    })(i);
    
    grid.appendChild(btn);
  }
}

// --- Event handlers ---
function bindEvents(){
  // Menu buttons
  document.getElementById('btn-play').addEventListener('click',function(){
    ensureAudio();
    var maxLevel=Math.min(getMaxLevel(),29);
    loadLevel(maxLevel);
    showScreen('game');
  });
  
  document.getElementById('btn-levels').addEventListener('click',function(){
    buildLevelGrid();
    showScreen('levelselect');
  });
  
  document.getElementById('btn-settings-menu').addEventListener('click',function(){
    document.getElementById('settings-overlay').classList.add('show');
  });
  
  // Game controls
  document.getElementById('ctrl-home').addEventListener('click',function(){
    showScreen('menu');
  });
  
  document.getElementById('ctrl-reset').addEventListener('click',function(){
    loadLevel(state.levelIdx);
  });
  
  document.getElementById('ctrl-hint').addEventListener('click',function(){
    // Hint: highlight the start hex
    var level=LEVELS[state.levelIdx];
    state.flashHex={q:level.startQ,r:level.startR};
    setTimeout(function(){state.flashHex=null;},2000);
    sfxConnect();
  });
  
  document.getElementById('ctrl-sound').addEventListener('click',function(){
    state.soundOn=!state.soundOn;
    document.getElementById('ctrl-sound').textContent=state.soundOn?'SOUND':'MUTED';
    document.getElementById('ctrl-sound').classList.toggle('active',state.soundOn);
  });
  
  // Win buttons
  document.getElementById('btn-retry').addEventListener('click',function(){
    document.getElementById('win-overlay').classList.remove('show');
    loadLevel(state.levelIdx);
  });
  
  document.getElementById('btn-next').addEventListener('click',function(){
    document.getElementById('win-overlay').classList.remove('show');
    var next=state.levelIdx+1;
    if(next<LEVELS.length){
      loadLevel(next);
    }
  });
  
  // Level select back
  document.getElementById('ls-back').addEventListener('click',function(){
    showScreen('menu');
  });
  
  // Canvas input
  if(canvas){
    canvas.addEventListener('pointerdown',handlePointer);
    canvas.addEventListener('touchstart',function(e){e.preventDefault();},false);
  }
  
  // Settings
  document.getElementById('set-sfx').addEventListener('click',function(){
    state.soundOn=!state.soundOn;
    this.classList.toggle('on',state.soundOn);
  });
  document.getElementById('set-music').addEventListener('click',function(){
    state.musicOn=!state.musicOn;
    this.classList.toggle('on',state.musicOn);
    if(state.musicOn)startBGM();else stopBGM();
  });
  document.getElementById('set-haptics').addEventListener('click',function(){
    state.hapticsOn=!state.hapticsOn;
    this.classList.toggle('on',state.hapticsOn);
  });
  document.getElementById('set-close').addEventListener('click',function(){
    document.getElementById('settings-overlay').classList.remove('show');
  });
  document.getElementById('set-reset').addEventListener('click',function(){
    try{localStorage.removeItem(SAVE_KEY);}catch(e){}
    updateMenuStats();
    buildLevelGrid();
    document.getElementById('settings-overlay').classList.remove('show');
  });
  
  // Resize
  window.addEventListener('resize',function(){
    if(state.screen==='game')resizeCanvas();
  });
}

// --- Lifecycle cleanup ---
var timers=[];
function cleanup(){
  if(state.rafId){cancelAnimationFrame(state.rafId);state.rafId=null;}
  timers.forEach(function(t){clearInterval(t);});
  timers=[];
  stopBGM();
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
}
window.addEventListener('beforeunload',cleanup);
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    if(state.rafId){cancelAnimationFrame(state.rafId);state.rafId=null;}
    stopBGM();
  }else{
    if(state.screen==='game'){
      state.lastTime=0;
      state.rafId=requestAnimationFrame(loop);
      if(state.musicOn)startBGM();
    }
  }
});

// --- Init ---
function init(){
  initCanvas();
  bindEvents();
  
  // Set sound icon
  document.getElementById('ctrl-sound').classList.add('active');
  
  // Start animation loop
  state.rafId=requestAnimationFrame(loop);
  
  // Show menu
  showScreen('menu');
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}

})();
</script>
