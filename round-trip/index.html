      gain.connect(bgmGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 3.5);
    });
    bgmStep++;
  }, 3500);
}
function stopBGM() {
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

// Colors
const COLORS = {
  bg: '#0a1929',
  grid: '#1e3a5f',
  gridLight: '#2a4a6f',
  cell: '#142640',
  cellHover: '#1a3050',
  cellLoop: '#1a3a5f',
  loop: '#4fc3f7',
  loopGlow: '#29b6f6',
  turn: '#66bb6a',
  cross: '#ff7043',
  text: '#e0e0e0',
  textDim: '#6080a0',
  textBright: '#ffffff',
  accent: '#fbbf24',
  clue: '#fbbf24',
  clueBg: '#0d2030',
  error: '#ef4444',
  hint: '#10b981',
};

// Cell types: 0=empty, 1=H, 2=V, 3=turn
function initLevel(idx) {
  currentLevel = idx;
  const lv = LEVELS[idx];
  state = [];
  for (let r = 0; r < lv.rows; r++) {
    state.push(new Array(lv.cols).fill(0));
  }
  hintsUsed = 0;
  maxHints = 3;
  won = false;
  confetti = [];
  gameState = 'playing';
}

// Drawing
function drawGrid(lv, ox, oy, cs) {
  const R = lv.rows, C = lv.cols;

  // Clue area background
  ctx.fillStyle = COLORS.clueBg;
  ctx.fillRect(ox - cs * 0.6, oy - cs * 0.6, cs * 0.5, cs * (R + 0.2));
  ctx.fillRect(ox + cs * (C + 0.1), oy - cs * 0.6, cs * 0.5, cs * (R + 0.2));
  ctx.fillRect(ox - cs * 0.6, oy - cs * 0.6, cs * (C + 0.2), cs * 0.5);
  ctx.fillRect(ox - cs * 0.6, oy + cs * (R + 0.1), cs * (C + 0.2), cs * 0.5);

  // Cells
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const x = ox + c * cs;
      const y = oy + r * cs;
      ctx.fillStyle = COLORS.cell;
      ctx.fillRect(x, y, cs, cs);
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, cs, cs);
    }
  }

  // Row clues (left and right)
  ctx.font = `bold ${Math.floor(cs * 0.4)}px Inter, Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let r = 0; r < R; r++) {
    const cl = lv.clues;
    // Left clue
    if (cl.row_left[r] > 0) {
      const x = ox - cs * 0.35;
      const y = oy + r * cs + cs / 2;
      // Check if satisfied
      const seg = getNearestHSeg(state, r, C, 'left');
      const satisfied = seg === cl.row_left[r];
      ctx.fillStyle = satisfied ? COLORS.hint : COLORS.clue;
      ctx.fillText(cl.row_left[r], x, y);
    }
    // Right clue
    if (cl.row_right[r] > 0) {
      const x = ox + cs * (C + 0.35);
      const y = oy + r * cs + cs / 2;
      const seg = getNearestHSeg(state, r, C, 'right');
      const satisfied = seg === cl.row_right[r];
      ctx.fillStyle = satisfied ? COLORS.hint : COLORS.clue;
      ctx.fillText(cl.row_right[r], x, y);
    }
  }

  // Column clues (top and bottom)
  for (let c = 0; c < C; c++) {
    const cl = lv.clues;
    // Top clue
    if (cl.col_top[c] > 0) {
      const x = ox + c * cs + cs / 2;
      const y = oy - cs * 0.35;
      const seg = getNearestVSeg(state, c, R, 'top');
      const satisfied = seg === cl.col_top[c];
      ctx.fillStyle = satisfied ? COLORS.hint : COLORS.clue;
      ctx.fillText(cl.col_top[c], x, y);
    }
    // Bottom clue
    if (cl.col_bottom[c] > 0) {
      const x = ox + c * cs + cs / 2;
      const y = oy + cs * (R + 0.35);
      const seg = getNearestVSeg(state, c, R, 'bottom');
      const satisfied = seg === cl.col_bottom[c];
      ctx.fillStyle = satisfied ? COLORS.hint : COLORS.clue;
      ctx.fillText(cl.col_bottom[c], x, y);
    }
  }
}

function getNearestHSeg(grid, r, C, side) {
  let segLen = 0;
  if (side === 'left') {
    for (let c = 0; c < C; c++) {
      if (grid[r][c] === 1 || grid[r][c] === 3) segLen++;
      else if (segLen > 0) break;
    }
  } else {
    for (let c = C - 1; c >= 0; c--) {
      if (grid[r][c] === 1 || grid[r][c] === 3) segLen++;
      else if (segLen > 0) break;
    }
  }
  return segLen;
}

function getNearestVSeg(grid, c, R, side) {
  let segLen = 0;
  if (side === 'top') {
    for (let r = 0; r < R; r++) {
      if (grid[r][c] === 2 || grid[r][c] === 3) segLen++;
      else if (segLen > 0) break;
    }
  } else {
    for (let r = R - 1; r >= 0; r--) {
      if (grid[r][c] === 2 || grid[r][c] === 3) segLen++;
      else if (segLen > 0) break;
    }
  }
  return segLen;
}

function drawLoop(lv, ox, oy, cs) {
  const R = lv.rows, C = lv.cols;
  const lw = cs * 0.18;

  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const t = state[r][c];
      if (t === 0) continue;
      const x = ox + c * cs;
      const y = oy + r * cs;

      ctx.strokeStyle = COLORS.loop;
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';

      // H-straight or turn: draw horizontal line
      if (t === 1 || t === 3) {
        ctx.beginPath();
        ctx.moveTo(x, y + cs / 2);
        ctx.lineTo(x + cs, y + cs / 2);
        ctx.stroke();
      }
      // V-straight or turn: draw vertical line
      if (t === 2 || t === 3) {
        ctx.beginPath();
        ctx.moveTo(x + cs / 2, y);
        ctx.lineTo(x + cs / 2, y + cs);
        ctx.stroke();
      }

      // Turn: draw a small dot at center
      if (t === 3) {
        ctx.fillStyle = COLORS.loop;
        ctx.beginPath();
        ctx.arc(x + cs / 2, y + cs / 2, lw * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawConfetti() {
  confetti.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
}

function updateConfetti() {
  confetti.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
  });
  confetti = confetti.filter(p => p.life > 0);
}

function spawnConfetti() {
  const colors = ['#f44336', '#e91e63', '#9c27b0', '#3f51b5', '#2196f3', '#4caf50', '#ff9800', '#ffc107'];
  for (let i = 0; i < 100; i++) {
    confetti.push({
      x: W / 2 + (Math.random() - 0.5) * 200,
      y: H / 2,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 1) * 10,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 80 + Math.random() * 40
    });
  }
}

// Game logic
function checkWin() {
  const lv = LEVELS[currentLevel];
  const R = lv.rows, C = lv.cols;
  const cl = lv.clues;

  // Check row clues
  for (let r = 0; r < R; r++) {
    const leftSeg = getNearestHSeg(state, r, C, 'left');
    const rightSeg = getNearestHSeg(state, r, C, 'right');
    if (cl.row_left[r] > 0 && leftSeg !== cl.row_left[r]) return false;
    if (cl.row_right[r] > 0 && rightSeg !== cl.row_right[r]) return false;
    if (cl.row_left[r] === 0 && leftSeg > 0) return false;
    if (cl.row_right[r] === 0 && rightSeg > 0) return false;
  }

  // Check column clues
  for (let c = 0; c < C; c++) {
    const topSeg = getNearestVSeg(state, c, R, 'top');
    const botSeg = getNearestVSeg(state, c, R, 'bottom');
    if (cl.col_top[c] > 0 && topSeg !== cl.col_top[c]) return false;
    if (cl.col_bottom[c] > 0 && botSeg !== cl.col_bottom[c]) return false;
    if (cl.col_top[c] === 0 && topSeg > 0) return false;
    if (cl.col_bottom[c] === 0 && botSeg > 0) return false;
  }

  // Check connectivity (all loop cells form single cycle)
  const visited = [];
  for (let r = 0; r < R; r++)
    for (let c = 0; c < C; c++)
      if (state[r][c] > 0) visited.push([r, c]);

  if (visited.length === 0) return false;

  // Build adjacency
  const adj = {};
  visited.forEach(([r, c]) => {
    const key = r * C + c;
    adj[key] = [];
    const t = state[r][c];
    const hasH = t === 1 || t === 3;
    const hasV = t === 2 || t === 3;
    if (hasH && c + 1 < C && (state[r][c+1] === 1 || state[r][c+1] === 3)) adj[key].push(r * C + c + 1);
    if (hasH && c - 1 >= 0 && (state[r][c-1] === 1 || state[r][c-1] === 3)) adj[key].push(r * C + c - 1);
    if (hasV && r + 1 < R && (state[r+1][c] === 2 || state[r+1][c] === 3)) adj[key].push((r+1) * C + c);
    if (hasV && r - 1 >= 0 && (state[r-1][c] === 2 || state[r-1][c] === 3)) adj[key].push((r-1) * C + c);
  });

  // All degree 2
  for (const key in adj) {
    if (adj[key].length !== 2) return false;
  }

  // Single component
  const start = visited[0][0] * C + visited[0][1];
  const comp = new Set([start]);
  const q = [start];
  while (q.length) {
    const n = q.shift();
    for (const nb of (adj[n] || [])) {
      if (!comp.has(nb)) { comp.add(nb); q.push(nb); }
    }
  }

  return comp.size === visited.length;
}

function onWin() {
  if (won) return;
  won = true;
  sfxWin();
  spawnConfetti();
  const lv = LEVELS[currentLevel];
  const key = 'l' + lv.level;
  const earned = Math.max(1, 3 - hintsUsed);
  if (!stars[key] || stars[key] < earned) stars[key] = earned;
  saveProgress();
  setTimeout(() => { gameState = 'won'; }, 1500);
}

function useHint() {
  if (hintsUsed >= maxHints || won) return;
  const lv = LEVELS[currentLevel];
  const sol = lv.grid;
  const R = lv.rows, C = lv.cols;
  const candidates = [];
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      if (state[r][c] !== sol[r][c]) candidates.push([r, c]);
    }
  }
  if (candidates.length === 0) return;
  const [r, c] = candidates[Math.floor(Math.random() * candidates.length)];
  state[r][c] = sol[r][c];
  hintsUsed++;
  sfxHint();
  if (checkWin()) onWin();
}

function clearGrid() {
  const lv = LEVELS[currentLevel];
  for (let r = 0; r < lv.rows; r++)
    for (let c = 0; c < lv.cols; c++)
      state[r][c] = 0;
  sfxErase();
}

// Input handling
function getCellAt(mx, my, lv, ox, oy, cs) {
  const c = Math.floor((mx - ox) / cs);
  const r = Math.floor((my - oy) / cs);
  if (r >= 0 && r < lv.rows && c >= 0 && c < lv.cols) return [r, c];
  return null;
}

let touchStartX = 0, touchStartY = 0;
let isLongPress = false;
let longPressTimer = null;

canvas.addEventListener('pointerdown', (e) => {
  initAudio();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  touchStartX = mx;
  touchStartY = my;
  isLongPress = false;

  if (gameState === 'menu' || gameState === 'won') {
    handleUIClick(mx, my);
    return;
  }

  if (gameState === 'playing') {
    longPressTimer = setTimeout(() => { isLongPress = true; }, 500);
  }
});

canvas.addEventListener('pointerup', (e) => {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (gameState === 'menu' || gameState === 'won') {
    handleUIClick(mx, my);
    return;
  }

  if (gameState === 'playing') {
    handleGameClick(mx, my, isLongPress);
  }
});

canvas.addEventListener('pointermove', (e) => {
  // Could add drag drawing here
});

function handleGameClick(mx, my, longPress) {
  const lv = LEVELS[currentLevel];
  const { ox, oy, cs } = getGridLayout(lv);
  const cell = getCellAt(mx, my, lv, ox, oy, cs);
  if (!cell) {
    handleGameUIClick(mx, my);
    return;
  }
  const [r, c] = cell;
  if (longPress) {
    // Long press: erase
    if (state[r][c] !== 0) {
      state[r][c] = 0;
      sfxErase();
    }
  } else {
    // Cycle: 0->1(H)->2(V)->3(turn)->0
    state[r][c] = (state[r][c] + 1) % 4;
    if (state[r][c] === 0) sfxErase();
    else sfxPlace();
  }

  if (settings.autocheck && checkWin()) onWin();
}

function getGridLayout(lv) {
  const R = lv.rows, C = lv.cols;
  const maxW = W * 0.85;
  const maxH = H * 0.65;
  let cs = Math.min(maxW / (C + 1.5), maxH / (R + 1.5));
  cs = Math.min(cs, 65);
  cs = Math.max(cs, 20);
  const gridW = cs * C;
  const gridH = cs * R;
  const ox = (W - gridW) / 2;
  const oy = (H - gridH) / 2 + cs * 0.2;
  return { ox, oy, cs };
}

function handleGameUIClick(mx, my) {
  // Check buttons at bottom
  const btnY = H - 50;
  const btnW = 80, btnH = 36, gap = 10;
  const totalW = 5 * btnW + 4 * gap;
  let bx = (W - totalW) / 2;

  const buttons = ['Hint', 'Clear', 'Levels', 'Sound', 'Menu'];
  for (let i = 0; i < buttons.length; i++) {
    if (mx >= bx && mx <= bx + btnW && my >= btnY && my <= btnY + btnH) {
      handleButton(buttons[i]);
      return;
    }
    bx += btnW + gap;
  }
}

function handleButton(name) {
  switch(name) {
    case 'Hint': useHint(); break;
    case 'Clear': clearGrid(); break;
    case 'Levels': gameState = 'menu'; break;
    case 'Sound': settings.sound = !settings.sound; saveProgress(); break;
    case 'Music': settings.music = !settings.music; saveProgress(); if (settings.music) startBGM(); else stopBGM(); break;
    case 'Menu': gameState = 'menu'; stopBGM(); break;
  }
}

function handleUIClick(mx, my) {
  // Menu level select
  if (gameState === 'menu') {
    const cols = 5;
    const cardW = Math.min(130, (W - 60) / cols - 10);
    const cardH = 70;
    const gap = 10;
    const startY = 100;

    for (let i = 0; i < LEVELS.length; i++) {
      const row = Math.floor(i / cols);
      const col = i % cols;
      const totalW = cols * cardW + (cols - 1) * gap;
      const startX = (W - totalW) / 2;
      const x = startX + col * (cardW + gap);
      const y = startY + row * (cardH + gap) + levelSelectScroll;

      if (mx >= x && mx <= x + cardW && my >= y && my <= y + cardH) {
        initLevel(i);
        startBGM();
        return;
      }
    }

    // Settings buttons at bottom
    const btnY = H - 50;
    const btnW = 100, btnH = 36;
    let bx = W / 2 - btnW - 5;
    if (mx >= bx && mx <= bx + btnW && my >= btnY && my <= btnY + btnH) {
      settings.sound = !settings.sound; saveProgress(); return;
    }
    bx = W / 2 + 5;
    if (mx >= bx && mx <= bx + btnW && my >= btnY && my <= btnY + btnH) {
      settings.music = !settings.music; saveProgress(); return;
    }
  }

  if (gameState === 'won') {
    // Next level or back to menu
    const btnY = H / 2 + 60;
    const btnW = 120, btnH = 40;
    const nextX = W / 2 - btnW - 10;
    const menuX = W / 2 + 10;

    if (mx >= nextX && mx <= nextX + btnW && my >= btnY && my <= btnY + btnH) {
      const next = (currentLevel + 1) % LEVELS.length;
      initLevel(next);
      return;
    }
    if (mx >= menuX && mx <= menuX + btnW && my >= btnY && my <= btnY + btnH) {
      gameState = 'menu';
      return;
    }
  }
}

// Keyboard
window.addEventListener('keydown', (e) => {
  if (gameState === 'playing') {
    if (e.key === 'h' || e.key === 'H') useHint();
    else if (e.key === 'r' || e.key === 'R') { clearGrid(); }
    else if (e.key === 'Escape') { gameState = 'menu'; stopBGM(); }
    else if (e.key === 'Enter') { if (checkWin()) onWin(); }
  } else if (gameState === 'won') {
    if (e.key === 'Enter' || e.key === ' ') {
      const next = (currentLevel + 1) % LEVELS.length;
      initLevel(next);
    } else if (e.key === 'Escape') {
      gameState = 'menu';
    }
  }
});

// Rendering
function drawMenu() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = COLORS.textBright;
  ctx.font = 'bold 32px Inter, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Round Trip', W / 2, 40);

  ctx.fillStyle = COLORS.textDim;
  ctx.font = '14px Inter, Arial';
  ctx.fillText('Loop Crossing Puzzle', W / 2, 68);

  // Level cards
  const cols = 5;
  const cardW = Math.min(130, (W - 60) / cols - 10);
  const cardH = 70;
  const gap = 10;
  const startY = 100;
  const totalW = cols * cardW + (cols - 1) * gap;
  const startX = (W - totalW) / 2;

  for (let i = 0; i < LEVELS.length; i++) {
    const row = Math.floor(i / cols);
    const col = i % cols;
    const x = startX + col * (cardW + gap);
    const y = startY + row * (cardH + gap) + levelSelectScroll;

    if (y < 80 || y > H - 60) continue;

    const lv = LEVELS[i];
    const tierIdx = lv.tier - 1;
    const tierColor = TIER_COLORS[tierIdx];

    // Card background
    ctx.fillStyle = '#0d2030';
    roundRect(x, y, cardW, cardH, 8);
    ctx.fill();

    // Tier color bar
    ctx.fillStyle = tierColor;
    roundRect(x, y, cardW, 4, 8);
    ctx.fill();

    // Level number
    ctx.fillStyle = COLORS.textBright;
    ctx.font = 'bold 18px Inter, Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ll(i + 1), x + cardW / 2, y + 28);

    // Tier name
    ctx.fillStyle = tierColor;
    ctx.font = '10px Inter, Arial';
    ctx.fillText(lv.tierName, x + cardW / 2, y + 48);

    // Stars
    const starKey = 'l' + lv.level;
    const starCount = stars[starKey] || 0;
    ctx.font = '12px Inter, Arial';
    ctx.fillStyle = COLORS.accent;
    let starStr = '';
    for (let s = 0; s < 3; s++) starStr += s < starCount ? '★' : '☆';
    ctx.fillText(starStr, x + cardW / 2, y + 62);
  }

  // Bottom buttons
  const btnY = H - 50;
  const btnW = 100, btnH = 36;
  ctx.font = 'bold 14px Inter, Arial';

  // Sound toggle
  let bx = W / 2 - btnW - 5;
  ctx.fillStyle = settings.sound ? '#1a3a5f' : '#0d2030';
  roundRect(bx, btnY, btnW, btnH, 6);
  ctx.fill();
  ctx.strokeStyle = COLORS.gridLight;
  ctx.lineWidth = 1;
  roundRect(bx, btnY, btnW, btnH, 6);
  ctx.stroke();
  ctx.fillStyle = settings.sound ? COLORS.textBright : COLORS.textDim;
  ctx.fillText(settings.sound ? '🔊 Sound' : '🔇 Sound', bx + btnW / 2, btnY + btnH / 2);

  // Music toggle
  bx = W / 2 + 5;
  ctx.fillStyle = settings.music ? '#1a3a5f' : '#0d2030';
  roundRect(bx, btnY, btnW, btnH, 6);
  ctx.fill();
  ctx.strokeStyle = COLORS.gridLight;
  roundRect(bx, btnY, btnW, btnH, 6);
  ctx.stroke();
  ctx.fillStyle = settings.music ? COLORS.textBright : COLORS.textDim;
  ctx.fillText(settings.music ? '🎵 Music' : '🎵 Off', bx + btnW / 2, btnY + btnH / 2);
}

function ll(n) { return n < 10 ? '0' + n : '' + n; }

function drawGame() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  const lv = LEVELS[currentLevel];
  const { ox, oy, cs } = getGridLayout(lv);

  // Header
  ctx.fillStyle = COLORS.textBright;
  ctx.font = 'bold 16px Inter, Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(`Level ${lv.level} / 30`, 20, 25);

  ctx.fillStyle = TIER_COLORS[lv.tier - 1];
  ctx.font = 'bold 12px Inter, Arial';
  ctx.textAlign = 'center';
  ctx.fillText(lv.tierName, W / 2, 25);

  // Stars
  const starKey = 'l' + lv.level;
  const starCount = stars[starKey] || 0;
  ctx.fillStyle = COLORS.accent;
  ctx.font = '14px Inter, Arial';
  ctx.textAlign = 'right';
  let starStr = '';
  for (let s = 0; s < 3; s++) starStr += s < starCount ? '★' : '☆';
  ctx.fillText(starStr, W - 20, 25);

  // Hints remaining
  ctx.fillStyle = COLORS.textDim;
  ctx.font = '12px Inter, Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`Hints: ${maxHints - hintsUsed}/${maxHints}`, W / 2, 45);

  // Grid + clues
  drawGrid(lv, ox, oy, cs);
  drawLoop(lv, ox, oy, cs);

  // Bottom buttons
  const btnY = H - 45;
  const btnW = 70, btnH = 32, gap = 8;
  const totalW = 5 * btnW + 4 * gap;
  let bx = (W - totalW) / 2;

  const buttons = [
    { label: '💡 Hint', color: '#1a3a5f' },
    { label: '🗑 Clear', color: '#1a3a5f' },
    { label: '📋 Levels', color: '#1a3a5f' },
    { label: settings.sound ? '🔊' : '🔇', color: '#1a3a5f' },
    { label: '☰ Menu', color: '#1a3a5f' },
  ];

  ctx.font = 'bold 11px Inter, Arial';
  for (const btn of buttons) {
    ctx.fillStyle = btn.color;
    roundRect(bx, btnY, btnW, btnH, 6);
    ctx.fill();
    ctx.strokeStyle = COLORS.gridLight;
    ctx.lineWidth = 1;
    roundRect(bx, btnY, btnW, btnH, 6);
    ctx.stroke();
    ctx.fillStyle = COLORS.textBright;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(btn.label, bx + btnW / 2, btnY + btnH / 2);
    bx += btnW + gap;
  }
}

function drawWon() {
  drawGame();

  // Overlay
  ctx.fillStyle = 'rgba(10, 25, 41, 0.9)';
  ctx.fillRect(0, 0, W, H);

  // Win text
  ctx.fillStyle = COLORS.hint;
  ctx.font = 'bold 36px Inter, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🎉 Solved!', W / 2, H / 2 - 60);

  // Stars earned
  const earned = Math.max(1, 3 - hintsUsed);
  ctx.fillStyle = COLORS.accent;
  ctx.font = '32px Inter, Arial';
  let starStr = '';
  for (let s = 0; s < 3; s++) starStr += s < earned ? '★' : '☆';
  ctx.fillText(starStr, W / 2, H / 2 - 10);

  ctx.fillStyle = COLORS.text;
  ctx.font = '14px Inter, Arial';
  ctx.fillText(`Level ${LEVELS[currentLevel].level} Complete`, W / 2, H / 2 + 20);

  // Buttons
  const btnY = H / 2 + 60;
  const btnW = 120, btnH = 40;

  // Next
  const nextX = W / 2 - btnW - 10;
  ctx.fillStyle = '#1a4a2f';
  roundRect(nextX, btnY, btnW, btnH, 8);
  ctx.fill();
  ctx.strokeStyle = COLORS.hint;
  ctx.lineWidth = 2;
  roundRect(nextX, btnY, btnW, btnH, 8);
  ctx.stroke();
  ctx.fillStyle = COLORS.textBright;
  ctx.font = 'bold 16px Inter, Arial';
  ctx.fillText('Next →', nextX + btnW / 2, btnY + btnH / 2);

  // Menu
  const menuX = W / 2 + 10;
  ctx.fillStyle = '#1a3a5f';
  roundRect(menuX, btnY, btnW, btnH, 8);
  ctx.fill();
  ctx.strokeStyle = COLORS.gridLight;
  ctx.lineWidth = 2;
  roundRect(menuX, btnY, btnW, btnH, 8);
  ctx.stroke();
  ctx.fillStyle = COLORS.textBright;
  ctx.fillText('Menu', menuX + btnW / 2, btnY + btnH / 2);

  drawConfetti();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function render() {
  if (gameState === 'menu') {
    drawMenu();
  } else if (gameState === 'won') {
    updateConfetti();
    drawWon();
  } else {
    if (confetti.length > 0) {
      updateConfetti();
      drawGame();
      drawConfetti();
    } else {
      drawGame();
    }
  }
  requestAnimationFrame(render);
}

render();
</script>
