const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize() {
    DPR = Math.max(1, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// --- Game State ---
const ST_MENU = 0, ST_PLAY = 1, ST_WIN = 2;
let gameState = ST_MENU;
let curLevel = 0;
let grid = [];       // player's cell types: 0=empty, 1=H, 2=V, 3=turn
let cellSize = 0;

let hintMode = false;
let mistakes = [];   // cells with errors
let animTime = 0;
let particles = [];

// --- Audio (Web Audio API) ---
let audioCtx = null;
let masterGain = null;
let bgmPlaying = false;
let bgmTimer = null;
let soundOn = true;

function initAudio() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.15;
        masterGain.connect(audioCtx.destination);
    } catch(e) {}
}

function playTone(freq, dur, type, vol) {
    if (!soundOn || !audioCtx) return;
    type = type || 'sine';
    vol = vol || 0.3;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    osc.stop(now + dur);
}

function playClick() { playTone(600, 0.08, 'square', 0.15); }
function playCorrect() { playTone(523, 0.1, 'sine', 0.3); setTimeout(()=>playTone(784, 0.15, 'sine', 0.3), 100); }
function playError() { playTone(200, 0.15, 'sawtooth', 0.2); }
function playWin() {
    const notes = [523, 659, 784, 1047, 784, 1047];
    notes.forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.3), i * 120));
}

function startBGM() {
    if (!soundOn || !audioCtx || bgmPlaying) return;
    bgmPlaying = true;
    const melody = [330, 392, 440, 494, 440, 392, 330, 294, 262, 294, 330, 392];
    let idx = 0;
    bgmTimer = setInterval(() => {
        if (!soundOn) return;
        playTone(melody[idx % melody.length], 0.3, 'triangle', 0.08);
        idx++;
    }, 400);
}

function stopBGM() {
    bgmPlaying = false;
    if (bgmTimer) clearInterval(bgmTimer);
}

// --- Level Setup ---
function loadLevel(idx) {
    const lv = LEVELS[idx];
    curLevel = idx;
    grid = [];
    for (let r = 0; r < lv.rows; r++) {
        const row = [];
        for (let c = 0; c < lv.cols; c++) row.push(0);
        grid.push(row);
    }
    mistakes = [];
    computeLayout();
}

function computeLayout() {
    const lv = LEVELS[curLevel];
    const R = lv.rows, C = lv.cols;
    const topPad = 90;
    const botPad = 50;
    const sidePad = 50;
    const availW = W - sidePad * 2;
    const availH = H - topPad - botPad;
    cellSize = Math.floor(Math.min(availW / C, availH / R));
    const gw = cellSize * C;
    const gh = cellSize * R;
    gridOX = Math.floor((W - gw) / 2);
    gridOY = Math.floor(topPad + (availH - gh) / 2);
}

// --- Input ---
function getCellFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    let x, y;
    if (e.touches && e.touches.length > 0) {
        x = e.touches[0].clientX - rect.left;
        y = e.touches[0].clientY - rect.top;
    } else if (e.changedTouches && e.changedTouches.length > 0) {
        x = e.changedTouches[0].clientX - rect.left;
        y = e.changedTouches[0].clientY - rect.top;
    } else {
        x = e.clientX - rect.left;
        y = e.clientY - rect.top;
    }
    const c = Math.floor((x - gridOX) / cellSize);
    const r = Math.floor((y - gridOY) / cellSize);
    const lv = LEVELS[curLevel];
    if (r >= 0 && r < lv.rows && c >= 0 && c < lv.cols) return {r, c};
    return null;
}

function handleClick(e) {
    e.preventDefault();
    initAudio();
    if (gameState === ST_MENU) {
        // check Start button
        const bw = 200, bh = 60;
        const bx = W/2 - bw/2, by = H * 0.55;
        if (e.clientX >= bx && e.clientX <= bx+bw && e.clientY >= by && e.clientY <= by+bh) {
            gameState = ST_PLAY;
            loadLevel(0);
            startBGM();
            playClick();
        }
        return;
    }
    if (gameState === ST_WIN) {
        // check Next button or Menu button
        const bw = 180, bh = 50;
        const cx = W/2;
        // Next button
        const ny = H * 0.62;
        if (e.clientX >= cx - bw/2 && e.clientX <= cx + bw/2 && e.clientY >= ny && e.clientY <= ny + bh) {
            if (curLevel < LEVELS.length - 1) {
                loadLevel(curLevel + 1);
                gameState = ST_PLAY;
                playClick();
            } else {
                gameState = ST_MENU;
                stopBGM();
                playClick();
            }
            return;
        }
        // Menu button
        const my = H * 0.62 + 65;
        if (e.clientX >= cx - bw/2 && e.clientX <= cx + bw/2 && e.clientY >= my && e.clientY <= my + bh) {
            gameState = ST_MENU;
            stopBGM();
            playClick();
            return;
        }
        return;
    }
    // ST_PLAY: check UI buttons first
    const btns = getPlayButtons();
    for (const btn of btns) {
        if (e.clientX >= btn.x && e.clientX <= btn.x + btn.w &&
            e.clientY >= btn.y && e.clientY <= btn.y + btn.h) {
            btn.action();
            playClick();
            return;
        }
    }
    // Then check grid cells
    const cell = getCellFromEvent(e);
    if (cell) {
        grid[cell.r][cell.c] = (grid[cell.r][cell.c] + 1) % 4;
        playClick();
        if (checkWin()) {
            gameState = ST_WIN;
            stopBGM();
            playWin();
            spawnParticles();
        } else {
            // Check for mistakes
            const errs = findMistakes();
            mistakes = errs;
            if (errs.length > 0 && grid[cell.r][cell.c] > 0) {
                // Don't play error every time, just visual feedback
            }
        }
    }
}

function getPlayButtons() {
    const btnH = 36;
    const btnY = H - btnH - 8;
    const spacing = 8;
    const labels = [
        {text: '\u25C0', action: () => { if (curLevel > 0) { loadLevel(curLevel-1); } }, w: 44},
        {text: '\u25B6', action: () => { if (curLevel < LEVELS.length-1) { loadLevel(curLevel+1); } }, w: 44},
        {text: 'Clear', action: () => { for(let r=0;r<grid.length;r++) for(let c=0;c<grid[0].length;c++) grid[r][c]=0; mistakes=[]; }, w: 70},
        {text: soundOn ? '\u266B' : '\u2715', action: () => { soundOn = !soundOn; if(soundOn) startBGM(); else stopBGM(); }, w: 44},
        {text: 'Menu', action: () => { gameState = ST_MENU; stopBGM(); }, w: 60},
    ];
    let totalW = labels.reduce((s, b) => s + b.w, 0) + spacing * (labels.length - 1);
    let x = Math.floor((W - totalW) / 2);
    return labels.map(l => {
        const btn = {x, y: btnY, w: l.w, h: btnH, text: l.text, action: l.action};
        x += l.w + spacing;
        return btn;
    });
}

canvas.addEventListener('pointerdown', handleClick);
canvas.addEventListener('touchstart', handleClick, {passive: false});

// --- Validation ---
function checkWin() {
    const lv = LEVELS[curLevel];
    const R = lv.rows, C = lv.cols;
    // Compare grid to solution
    for (let r = 0; r < R; r++) {
        for (let c = 0; c < C; c++) {
            const sol = lv.grid[r][c];
            const player = grid[r][c];
            // Solution 0 => player must be 0
            if (sol === 0 && player !== 0) return false;
            // Solution > 0 => player must match (1,2,3) or be turn(3) for sol 3
            if (sol > 0) {
                if (sol === 1 && player !== 1) return false;
                if (sol === 2 && player !== 2) return false;
                if (sol === 3 && player !== 3) return false;
            }
        }
    }
    return true;
}

function findMistakes() {
    // Check clues against player grid
    const lv = LEVELS[curLevel];
    const R = lv.rows, C = lv.cols;
    const errs = [];
    const cl = lv.clues;

    // For each row, find leftmost and rightmost H/turn segments
    for (let r = 0; r < R; r++) {
        // left segment
        let segLen = 0;
        for (let c = 0; c < C; c++) {
            if (grid[r][c] === 1 || grid[r][c] === 3) segLen++;
            else break;
        }
        if (cl.row_left[r] > 0 && segLen > 0 && segLen !== cl.row_left[r]) {
            // mark cells
            for (let c = 0; c < segLen; c++) errs.push({r, c});
        }
        // right segment
        segLen = 0;
        for (let c = C - 1; c >= 0; c--) {
            if (grid[r][c] === 1 || grid[r][c] === 3) segLen++;
            else break;
        }
        if (cl.row_right[r] > 0 && segLen > 0 && segLen !== cl.row_right[r]) {
            for (let c = C - 1; c >= C - segLen; c--) errs.push({r, c});
        }
    }
    // For each col
    for (let c = 0; c < C; c++) {
        let segLen = 0;
        for (let r = 0; r < R; r++) {
            if (grid[r][c] === 2 || grid[r][c] === 3) segLen++;
            else break;
        }
        if (cl.col_top[c] > 0 && segLen > 0 && segLen !== cl.col_top[c]) {
            for (let r = 0; r < segLen; r++) errs.push({r, c});
        }
        segLen = 0;
        for (let r = R - 1; r >= 0; r--) {
            if (grid[r][c] === 2 || grid[r][c] === 3) segLen++;
            else break;
        }
        if (cl.col_bottom[c] > 0 && segLen > 0 && segLen !== cl.col_bottom[c]) {
            for (let r = R - 1; r >= R - segLen; r--) errs.push({r, c});
        }
    }
    return errs;
}

// --- Particles ---
function spawnParticles() {
    particles = [];
    for (let i = 0; i < 60; i++) {
        particles.push({
            x: W/2, y: H/2,
            vx: (Math.random() - 0.5) * 400,
            vy: (Math.random() - 0.5) * 400,
            life: 1.0,
            color: TIER_COLORS[Math.floor(Math.random() * TIER_COLORS.length)],
            size: 3 + Math.random() * 5
        });
    }
}

function updateParticles(dt) {
    for (const p of particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 200 * dt;
        p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);
}

// --- Rendering ---
function drawCellBg(r, c) {
    const x = gridOX + c * cellSize;
    const y = gridOY + r * cellSize;
    const s = cellSize;
    ctx.fillStyle = '#1b2a3b';
    ctx.fillRect(x, y, s, s);
}

function drawCellContent(r, c) {
    const x = gridOX + c * cellSize;
    const y = gridOY + r * cellSize;
    const s = cellSize;
    const cx = x + s/2, cy = y + s/2;
    const t = grid[r][c];

    if (t === 0) return;

    ctx.strokeStyle = '#5b8def';
    ctx.lineWidth = Math.max(3, cellSize * 0.12);
    ctx.lineCap = 'round';

    const half = s / 2;
    ctx.beginPath();
    if (t === 1) {
        // H-straight
        ctx.moveTo(x, cy);
        ctx.lineTo(x + s, cy);
    } else if (t === 2) {
        // V-straight
        ctx.moveTo(cx, y);
        ctx.lineTo(cx, y + s);
    } else if (t === 3) {
        // Turn
        ctx.arc(x, y, half, 0, Math.PI / 2);
    }
    ctx.stroke();
}

function drawGrid() {
    const lv = LEVELS[curLevel];
    const R = lv.rows, C = lv.cols;

    // Grid background
    ctx.fillStyle = '#16253580';
    ctx.fillRect(gridOX - 2, gridOY - 2, cellSize * C + 4, cellSize * R + 4);

    // Cells
    for (let r = 0; r < R; r++) {
        for (let c = 0; c < C; c++) {
            drawCellBg(r, c);
        }
    }

    // Grid lines
    ctx.strokeStyle = '#2d4a6a';
    ctx.lineWidth = 1;
    for (let r = 0; r <= R; r++) {
        ctx.beginPath();
        ctx.moveTo(gridOX, gridOY + r * cellSize);
        ctx.lineTo(gridOX + C * cellSize, gridOY + r * cellSize);
        ctx.stroke();
    }
    for (let c = 0; c <= C; c++) {
        ctx.beginPath();
        ctx.moveTo(gridOX + c * cellSize, gridOY);
        ctx.lineTo(gridOX + c * cellSize, gridOY + R * cellSize);
        ctx.stroke();
    }

    // Cell content
    for (let r = 0; r < R; r++) {
        for (let c = 0; c < C; c++) {
            drawCellContent(r, c);
        }
    }

    // Highlight mistakes
    for (const m of mistakes) {
        const x = gridOX + m.c * cellSize;
        const y = gridOY + m.r * cellSize;
        ctx.fillStyle = 'rgba(239, 68, 68, 0.15)';
        ctx.fillRect(x, y, cellSize, cellSize);
    }

    // Row clues (left and right)
    ctx.font = 'bold ' + Math.floor(cellSize * 0.35) + 'px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const cl = lv.clues;
    const clueOff = cellSize * 0.65;

    for (let r = 0; r < R; r++) {
        // Left
        const ll = cl.row_left[r];
        if (ll > 0) {
            const x = gridOX - clueOff;
            const y = gridOY + r * cellSize + cellSize/2;
            ctx.fillStyle = '#5b8def';
            ctx.fillText(ll, x, y);
        }
        // Right
        const rr = cl.row_right[r];
        if (rr > 0) {
            const x = gridOX + C * cellSize + clueOff;
            const y = gridOY + r * cellSize + cellSize/2;
            ctx.fillStyle = '#5b8def';
            ctx.fillText(rr, x, y);
        }
    }
    // Col clues (top and bottom)
    for (let c = 0; c < C; c++) {
        // Top
        const ct = cl.col_top[c];
        if (ct > 0) {
            const x = gridOX + c * cellSize + cellSize/2;
            const y = gridOY - clueOff;
            ctx.fillStyle = '#5b8def';
            ctx.fillText(ct, x, y);
        }
        // Bottom
        const cb = cl.col_bottom[c];
        if (cb > 0) {
            const x = gridOX + c * cellSize + cellSize/2;
            const y = gridOY + R * cellSize + clueOff;
            ctx.fillStyle = '#5b8def';
            ctx.fillText(cb, x, y);
        }
    }
}

function drawMenu() {
    // Title
    ctx.fillStyle = '#e0e7ef';
    ctx.font = 'bold 48px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Round Trip', W/2, H * 0.25);

    ctx.font = '18px Inter, sans-serif';
    ctx.fillStyle = '#8899aa';
    ctx.fillText('Draw a single closed loop using edge clues', W/2, H * 0.33);

    // Animated loop preview
    const cx = W/2, cy = H * 0.42;
    const radius = 30;
    ctx.strokeStyle = '#5b8def';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, animTime * 0.5, animTime * 0.5 + Math.PI * 1.8);
    ctx.stroke();

    // Start button
    const bw = 200, bh = 60;
    const bx = W/2 - bw/2, by = H * 0.55;
    ctx.fillStyle = '#5b8def';
    roundRect(bx, by, bw, bh, 12);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px Inter, sans-serif';
    ctx.fillText('Start Puzzle', W/2, by + bh/2);

    // Info
    ctx.font = '14px Inter, sans-serif';
    ctx.fillStyle = '#66778a';
    ctx.fillText('30 Levels | 5 Tiers | Free to Play', W/2, H * 0.75);
    ctx.fillText('Click cells to place H, V, or turn segments', W/2, H * 0.79);
    ctx.fillText('Match all row & column clues to close the loop', W/2, H * 0.83);
}

function drawWin() {
    const lv = LEVELS[curLevel];
    ctx.fillStyle = 'rgba(13, 27, 42, 0.85)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = TIER_COLORS[lv.tier - 1];
    ctx.font = 'bold 36px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Solved!', W/2, H * 0.35);

    ctx.fillStyle = '#e0e7ef';
    ctx.font = '20px Inter, sans-serif';
    ctx.fillText('Level ' + lv.level + ' - ' + lv.tierName, W/2, H * 0.42);

    ctx.font = '14px Inter, sans-serif';
    ctx.fillStyle = '#8899aa';
    const progress = (curLevel + 1) + ' / ' + LEVELS.length;
    ctx.fillText(progress, W/2, H * 0.48);

    // Buttons
    const bw = 180, bh = 50;
    const cx = W/2;
    const ny = H * 0.62;
    const isLast = curLevel >= LEVELS.length - 1;

    // Next / Replay button
    ctx.fillStyle = '#5b8def';
    roundRect(cx - bw/2, ny, bw, bh, 10);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Inter, sans-serif';
    ctx.fillText(isLast ? 'Play Again' : 'Next Level', cx, ny + bh/2);

    // Menu button
    const my = ny + 65;
    ctx.fillStyle = '#1b2a3b';
    ctx.strokeStyle = '#3d5a7a';
    ctx.lineWidth = 2;
    roundRect(cx - bw/2, my, bw, bh, 10);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#8899aa';
    ctx.font = 'bold 16px Inter, sans-serif';
    ctx.fillText('Main Menu', cx, my + bh/2);
}

function drawPlay() {
    // Top bar
    const lv = LEVELS[curLevel];
    ctx.fillStyle = TIER_COLORS[lv.tier - 1];
    ctx.font = 'bold 20px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('Level ' + lv.level + '/' + LEVELS.length, 16, 16);

    ctx.fillStyle = '#8899aa';
    ctx.font = '14px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(lv.tierName, W/2, 20);

    ctx.fillStyle = '#66778a';
    ctx.font = '13px Inter, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('Tap cells to cycle', W - 16, 22);

    // Grid
    drawGrid();

    // Bottom buttons
    const btns = getPlayButtons();
    for (const btn of btns) {
        ctx.fillStyle = '#1b2a3b';
        ctx.strokeStyle = '#3d5a7a';
        ctx.lineWidth = 1.5;
        roundRect(btn.x, btn.y, btn.w, btn.h, 8);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#e0e7ef';
        ctx.font = 'bold 14px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(btn.text, btn.x + btn.w/2, btn.y + btn.h/2);
    }
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

// --- Main Loop ---
let lastTime = 0;
function loop(t) {
    const dt = Math.min(0.05, (t - lastTime) / 1000);
    lastTime = t;
    animTime += dt;

    ctx.clearRect(0, 0, W, H);

    if (gameState === ST_MENU) {
        drawMenu();
    } else if (gameState === ST_PLAY) {
        drawPlay();
    } else if (gameState === ST_WIN) {
        drawPlay();
        drawWin();
        // Particles
        updateParticles(dt);
        for (const p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// Handle resize during play
window.addEventListener('resize', () => {
    resize();
    if (gameState === ST_PLAY || gameState === ST_WIN) {
        computeLayout();
    }
});

</script>
