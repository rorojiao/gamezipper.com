var ac=null;

function snd(type){
if(!sd.sndOn)return;ensureAC();
if(ac.state==="suspended")ac.resume();
var t=ac.currentTime,g=ac.createGain(),o=ac.createOscillator();
o.connect(g);g.connect(ac.destination);
switch(type){

case"powerup":o.type="sine";o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(1320,t+.25);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);break;
case"hit":o.type="sawtooth";o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(60,t+.2);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);break;
case"complete":o.type="sine";o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+.1);o.frequency.setValueAtTime(784,t+.2);o.frequency.setValueAtTime(1047,t+.3);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);break;
case"click":o.type="sine";o.frequency.setValueAtTime(600,t);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);o.start(t);o.stop(t+.06);break;

var pts=[];
function addP(x,y,col,vx,vy,life,sz){pts.push({x:x,y:y,c:col,vx:vx||(Math.random()-.5)*2,vy:vy||(Math.random()-.5)*2,l:life,ml:life,s:sz||3})}
function trail(x,y,col){for(var i=0;i<2;i++)addP(x+(Math.random()-.5)*4,y+(Math.random()-.5)*4,col,(Math.random()-.5)*.5,-Math.random()*1.5,.3+Math.random()*.2,2+Math.random()*2)}
function coinSpark(x,y){for(var i=0;i<6;i++){var a=Math.random()*Math.PI*2;addP(x,y,"#ffd700",Math.cos(a)*3,Math.sin(a)*3,.4+Math.random()*.2,2+Math.random()*2)}}
function deathFx(x,y){for(var i=0;i<30;i++){var a=Math.random()*Math.PI*2,s=2+Math.random()*4;addP(x,y,["#ff4444","#ff8800","#ffcc00"][i%3],Math.cos(a)*s,Math.sin(a)*s,.6+Math.random()*.4,3+Math.random()*4)}}
function confetti(x,y){for(var i=0;i<40;i++){var a=Math.random()*Math.PI*2,s=1+Math.random()*5;addP(x,y,["#ff0066","#00ff88","#0088ff","#ffd700","#ff6600","#cc44ff"][i%6],Math.cos(a)*s,Math.sin(a)*s-2,.8+Math.random()*.6,3+Math.random()*4)}}
function updPts(dt){for(var i=pts.length-1;i>=0;i--){var p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=1.8*dt;p.l-=dt;if(p.l<=0)pts.splice(i,1)}}
function drawPts(){for(var i=0;i<pts.length;i++){var p=pts[i],a=Math.max(0,p.l/p.ml);ctx.globalAlpha=a;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.s*a,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}

/* ===== 3D PROJECTION ===== */
var CAMH=6,CAMD=8;
function proj(wx,wy,wz){
var rz=wz-camZ;if(rz<.1)return null;
var ry=wy-CAMH,rx=wx-ball.x*1.5;
var fov=60*Math.PI/180;
var sc=H/(2*Math.tan(fov/2))/rz;
return{sx:W/2+rx*sc,sy:H/2-ry*sc,sc:sc,rz:rz}
}

var r=Math.max(8,p.sc*.38);
if(actPU){var gc={shield:"rgba(255,221,0,.25)",magnet:"rgba(68,136,255,.25)",boost:"rgba(255,68,68,.25)"}[actPU.t];ctx.fillStyle=gc;ctx.beginPath();ctx.arc(p.sx,p.sy,r*2.5,0,Math.PI*2);ctx.fill()}
if(shieldOn){ctx.strokeStyle="rgba(255,221,0,.55)";ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.sx,p.sy,r*1.5,0,Math.PI*2);ctx.stroke()}
var c1=sk.c1,c2=sk.c2;
if(c1==="rainbow"){var h=(af*3)%360;c1="hsl("+h+",100%,60%)";c2="hsl("+((h+120)%360)+",100%,40%)"}
var grd=ctx.createRadialGradient(p.sx-r*.3,p.sy-r*.3,r*.1,p.sx,p.sy,r);
grd.addColorStop(0,"#ffffff");grd.addColorStop(.3,c1);grd.addColorStop(1,c2);
ctx.fillStyle=grd;ctx.beginPath();ctx.arc(p.sx,p.sy,r,0,Math.PI*2);ctx.fill();
ctx.fillStyle="rgba(255,255,255,.22)";ctx.beginPath();ctx.arc(p.sx-r*.25,p.sy-r*.25,r*.33,0,Math.PI*2);ctx.fill();
if(ball.spd>.5){var tp=proj(0,.4,ball.z-2);if(tp)trail(tp.sx,tp.sy,c1)}
}
function drawFinish(){
var lv=LV[cl],fz=lv.len,rz=fz-camZ;if(rz<0||rz>220)return;
var tw=5;
var a=proj(-tw*1.5,0,fz),b=proj(tw*1.5,0,fz),c=proj(tw*1.5,3,fz),d=proj(-tw*1.5,3,fz);
if(a&&b&&c&&d){
ctx.fillStyle="rgba(0,255,136,.12)";ctx.beginPath();ctx.moveTo(a.sx,a.sy);ctx.lineTo(b.sx,b.sy);ctx.lineTo(c.sx,c.sy);ctx.lineTo(d.sx,d.sy);ctx.fill();
for(var i=0;i<8;i++){var t0=i/8,t1=(i+1)/8;if(i%2===0){
var lx=a.sx+(b.sx-a.sx)*t0,rx=a.sx+(b.sx-a.sx)*t1;
var ly=a.sy+(b.sy-a.sy)*t0,ry=a.sy+(b.sy-a.sy)*t1;
var tlx=d.sx+(c.sx-d.sx)*t0,trx=d.sx+(c.sx-d.sx)*t1;
var tly=d.sy+(c.sy-d.sy)*t0,_ty=d.sy+(c.sy-d.sy)*t1;
ctx.fillStyle="rgba(255,255,255,.45)";ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(rx,ry);ctx.lineTo(trx,_ty);ctx.lineTo(tlx,tly);ctx.fill()}}
var pm=proj(0,3.8,fz);if(pm){ctx.save();ctx.fillStyle="#00ff88";ctx.font="bold "+Math.max(12,pm.sc*.55)+"px Orbitron";ctx.textAlign="center";ctx.textBaseline="middle";ctx.shadowColor="#00ff88";ctx.shadowBlur=12;ctx.fillText("FINISH",pm.sx,pm.sy);ctx.restore()}
}}

/* ===== COLLISION ===== */
function checkCol(){
var lv=LV[cl],bx=ball.x*3,bz=ball.z;
var magR=actPU&&actPU.t==="magnet"?4:0;
for(var i=0;i<lv.cns.length;i++){var cn=lv.cns[i];if(cn.got)continue;
var cx=cn.x*3,dx=bx-cx,dz=bz-cn.z,dist=Math.sqrt(dx*dx+dz*dz);
if(magR>0&&dist<magR){cn.x+=(ball.x-cn.x)*.06}
if(dist<1.2){cn.got=true;lCoins++;lScore+=10;snd("coin");var p=proj(cx,.8,cn.z);if(p)coinSpark(p.sx,p.sy)}}
for(var i=0;i<lv.pw.length;i++){var pu=lv.pw[i];if(pu.got)continue;
var px=pu.x*3,dx=bx-px,dz=bz-pu.z,dist=Math.sqrt(dx*dx+dz*dz);
if(dist<1.5){pu.got=true;snd("powerup");if(pu.t==="shield")shieldOn=true;else actPU={t:pu.t,tl:5};var p=proj(px,1,pu.z);if(p)coinSpark(p.sx,p.sy)}}
if(actPU&&actPU.t==="boost")return;
for(var i=0;i<lv.obs.length;i++){var ob=lv.obs[i];if(Math.abs(bz-ob.z)>3.5)continue;
var ox=ob.x*3;
var hit=false;
switch(ob.t){
case"gap":if(Math.abs(bx-ox)<ob.w*1.1&&Math.abs(bz-ob.z)<2)hit=true;break;
case"wall":if(ob._cx!==undefined&&Math.abs(bz-ob.z)<1.2&&Math.abs(bx-ob._cx)<(ob._hw||ob.w*.8)+.4)hit=true;break;
case"narrow":if(Math.abs(bz-ob.z)<1.5&&Math.abs(bx)>(ob._nw||.6)*3+.4)hit=true;break;
case"barrier":case"pendulum":if(ob._cx!==undefined&&Math.abs(bz-ob.z)<1.2&&Math.abs(bx-ob._cx)<(ob._hw||.8)+.4)hit=true;break;
case"beam":if(ob._x1!==undefined&&Math.abs(bz-ob.z)<1.2){var minBX=Math.min(ob._x1,ob._x2),maxBX=Math.max(ob._x1,ob._x2);if(bx>minBX-.4&&bx<maxBX+.4)hit=true}break;
case"speedpad":if(Math.abs(bx-ox)<1.5&&Math.abs(bz-ob.z)<2)ball.spd=LV[cl].spd*2.2;break;
}
if(hit){if(shieldOn){shieldOn=false;break}killBall();break}
}}

function killBall(){if(!ball.alive)return;ball.alive=false;snd("gameover");var p=proj(0,.5,ball.z);if(p)deathFx(p.sx,p.sy);setTimeout(function(){showP("gameover");updGO()},800)}
function completeLvl(){gs="complete";snd("complete");var p=proj(0,1,ball.z);if(p)confetti(p.sx,p.sy);
var lv=LV[cl],tc=lv.cns.length,coinPct=tc>0?lCoins/tc:1;
var stars=1;if(coinPct>=.5)stars=2;if(coinPct>=.8&&lTime<50)stars=3;
sd.coins+=lCoins;
var ps=sd.stars[cl]||0;sd.stars[cl]=Math.max(ps,stars);
var psc=sd.scores[cl]||0;sd.scores[cl]=Math.max(psc,lScore);
if(cl+1>=sd.unlocked)sd.unlocked=Math.min(25,cl+2);
var lb=sd.lb[cl]||[];lb.push({sc:lScore,d:Date.now()});lb.sort(function(a,b){return b.sc-a.sc});sd.lb[cl]=lb.slice(0,10);
saveSv();showComplete(stars)}

/* ===== PHYSICS ===== */
function updPhys(dt){
if(!ball.alive)return;
var lv=LV[cl],mxSpd=lv.spd||3;
if(!lv.spd)mxSpd=3+Math.floor(cl/5)*.5+cl%5*.15;
var boostMul=actPU&&actPU.t==="boost"?2.4:1;
var maxS=mxSpd*boostMul;
if(keys.up||touchAct)ball.spd=Math.min(ball.spd+5*dt,maxS);
else ball.spd=Math.min(ball.spd+2*dt,maxS*.6);
if(!keys.up&&!touchAct&&ball.spd>maxS*.6)ball.spd=Math.max(maxS*.6,ball.spd-1*dt);
ball.z+=ball.spd*55*dt;
var stSpd=onIce?1.5:4;
if(keys.left)ball.x-=stSpd*dt;
if(keys.right)ball.x+=stSpd*dt;
ball.x+=touchDX*.018;touchDX*=.9;
ball.x=Math.max(-4.2,Math.min(4.2,ball.x));
camZ=ball.z-CAMD;lTime+=dt;
onIce=false;
for(var i=0;i<lv.obs.length;i++){var ob=lv.obs[i];if(ob.t==="icepatch"){var ox=ob.x*3;if(Math.abs(ball.z-ob.z)<2.5&&Math.abs(ball.x*3-ox)<3.5)onIce=true}}
if(actPU){actPU.tl-=dt;if(actPU.tl<=0)actPU=null}
lScore=Math.floor(lCoins*10+ball.z*.5);
if(ball.z>=lv.len)completeLvl();else checkCol();
}

/* ===== UI ===== */
function showP(id){document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active")});document.getElementById("hud").classList.remove("active");var el=document.getElementById(id);if(el)el.classList.add("active");if(id==="hud")document.getElementById("hud").classList.add("active")}
function showMenu(){gs="menu";showP("menu");document.getElementById("bso").textContent="Sound: "+(sd.sndOn?"ON":"OFF")}
function showLvlSel(){gs="lvlsel";showP("lvlsel");document.getElementById("lsc").textContent="Coins: "+sd.coins;
var g=document.getElementById("lgrid");g.innerHTML="";
for(var i=0;i<25;i++){var tn=TH[Math.floor(i/5)].name,ul=i<sd.unlocked,st=sd.stars[i]||0;
var b=document.createElement("div");b.className="lbtn "+(ul?"u":"k")+(i===sd.unlocked-1?" c":"");
var sh="";for(var s=0;s<3;s++)sh+='<span class="star'+(s<st?" on":"")+'">*</span>';
b.innerHTML="<span>"+(i+1)+"</span><span class='ms'>"+sh+'</span><span style="font-size:8px;color:rgba(255,255,255,.35)">'+tn+"</span>";
if(ul)(function(idx){b.onclick=function(){snd("click");startLvl(idx)}})(i);
g.appendChild(b)}}
function showSkinShop(){gs="skinshop";showP("skinshop");document.getElementById("ssc").textContent="Coins: "+sd.coins;
var g=document.getElementById("sgrid");g.innerHTML="";
for(var i=0;i<SK.length;i++){var sk=SK[i],ow=sd.skins.indexOf(sk.n)>=0,eq=sd.eq===sk.n;
var c=document.createElement("div");c.className="scard "+(eq?"eq":ow?"ow":"");
var bs="";if(sk.c1==="rainbow")bs="background:linear-gradient(135deg,#f00,#f80,#ff0,#0f0,#08f,#80f);";
else bs="background:linear-gradient(135deg,"+sk.c1+","+sk.c2+");";
c.innerHTML='<div class="sball" style="'+bs+'"></div><div class="sname">'+sk.n+'</div><div class="scost">'+(sk.cost===0?"Free":sk.cost+" coins")+"</div>"+(eq?'<div style="color:#00e676;font-size:9px">Equipped</div>':"");
(function(s){c.onclick=function(){
if(sd.eq===s.n)return;
if(sd.skins.indexOf(s.n)>=0){sd.eq=s.n;saveSv();snd("click");showSkinShop();return}
if(sd.coins>=s.cost){sd.coins-=s.cost;sd.skins.push(s.n);sd.eq=s.n;saveSv();snd("powerup");showSkinShop()}
else snd("hit");
}})(sk);
g.appendChild(c)}}
function showComplete(stars){showP("complete");
var sh="";for(var i=0;i<3;i++)sh+='<span class="star'+(i<stars?" on":"")+'">*</span>';
document.getElementById("rstars").innerHTML=sh;
document.getElementById("rsc").textContent="Score: "+lScore;
document.getElementById("rco").textContent="+"+lCoins+" coins";
var lb=sd.lb[cl]||[],lbt=lb.length?"Best: "+lb.slice(0,3).map(function(s){return s.sc}).join(", "):"";
document.getElementById("rlb").textContent=lbt;
document.getElementById("bnxt").style.display=cl<24?"block":"none"}
function updGO(){document.getElementById("gsc").textContent="Score: "+lScore}
function updHUD(){
document.getElementById("hl").textContent="Level "+(cl+1);
document.getElementById("hco").textContent=lCoins;
document.getElementById("hsc").textContent="Score: "+lScore;
var pu=document.getElementById("hpu");
if(shieldOn)pu.innerHTML='<span style="color:#ffdd00">SHIELD</span>';
else if(actPU){var c={magnet:"#4488ff",boost:"#ff4444"}[actPU.t];pu.innerHTML='<span style="color:'+c+'">'+actPU.t.toUpperCase()+" "+Math.ceil(actPU.tl)+"s</span>"}
else pu.innerHTML=""}

/* ===== START LEVEL ===== */
function startLvl(idx){
cl=idx;ball={x:0,z:0,spd:0,alive:true};camZ=-CAMD;lCoins=0;lScore=0;lTime=0;actPU=null;shieldOn=false;pts=[];onIce=false;
var lv=LV[cl];
for(var i=0;i<lv.cns.length;i++)lv.cns[i].got=false;
for(var i=0;i<lv.pw.length;i++)lv.pw[i].got=false;
gs="playing";
if(idx===0&&!sd.tutDone){document.getElementById("tut").classList.add("active");document.getElementById("tut").style.display="flex";showP("hud")}
else showP("hud");updHUD();
}

/* ===== GAME LOOP ===== */
function loop(ts){
if(!lt)lt=ts;var dt=Math.min((ts-lt)/1000,.05);lt=ts;af++;
if(gs==="playing"&&ball.alive){updPhys(dt);updHUD()}
updPts(dt);
ctx.clearRect(0,0,W,H);
if(gs==="playing"||gs==="complete"||gs==="gameover"||gs==="paused"||document.getElementById("tut").classList.contains("active")){
drawBg();drawTrack();drawFinish();drawObs();drawCoins();drawPups();if(ball.alive)drawBall();drawPts();
if(gs==="playing"&&ball.alive){var bW=110,bH=7,bX=W/2-bW/2,bY=H-28;
var lv=LV[cl],mxS=lv.spd||3;if(!lv.spd)mxS=3+Math.floor(cl/5)*.5+cl%5*.15;
var pct=ball.spd/mxS/2.4;
ctx.fillStyle="rgba(0,0,0,.35)";ctx.fillRect(bX,bY,bW,bH);
ctx.fillStyle=actPU&&actPU.t==="boost"?"#ff4444":"#00c8ff";ctx.fillRect(bX,bY,bW*Math.min(1,pct),bH)}
}else{drawMenuBg()}
rafId=requestAnimationFrame(loop)}
function drawMenuBg(){
var grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,"#050520");grd.addColorStop(1,"#0a0a3a");
ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
ctx.fillStyle="rgba(255,255,255,.12)";for(var i=0;i<40;i++){var x=(i*173.7+af*.3)%W,y=(i*131.3+af*.15)%H;ctx.beginPath();ctx.arc(x,y,1+Math.sin(af*.02+i)*.5,0,Math.PI*2);ctx.fill()}
var bx=W/2+Math.sin(af*.02)*80,by=H*.7+Math.cos(af*.02)*20,r=18;
ctx.fillStyle="#4488ff";ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();
ctx.fillStyle="rgba(255,255,255,.28)";ctx.beginPath();ctx.arc(bx-r*.25,by-r*.25,r*.33,0,Math.PI*2);ctx.fill()}

/* ===== INPUT ===== */
function onKey(e,v){if(e.key==="ArrowLeft"||e.key==="a")keys.left=v;if(e.key==="ArrowRight"||e.key==="d")keys.right=v;if(e.key==="ArrowUp"||e.key==="w"||e.key===" ")keys.up=v;if(e.key==="Escape"&&v&&gs==="playing"){gs="paused";showP("pause")}}
document.addEventListener("keydown",function(e){onKey(e,true)});
document.addEventListener("keyup",function(e){onKey(e,false)});
cvs.addEventListener("touchstart",function(e){e.preventDefault();var t=e.touches[0];touchSX=t.clientX;touchSY=t.clientY;touchDX=0;touchAct=true},{passive:false});
cvs.addEventListener("touchmove",function(e){e.preventDefault();var t=e.touches[0];touchDX=(t.clientX-touchSX)*.025;touchAct=true},{passive:false});
cvs.addEventListener("touchend",function(e){touchDX=0;touchAct=false});

/* ===== BUTTONS ===== */
document.getElementById("bp").onclick=function(){snd("click");showLvlSel()};
document.getElementById("bs").onclick=function(){snd("click");showSkinShop()};
document.getElementById("bso").onclick=function(){snd("click");sd.sndOn=!sd.sndOn;saveSv();document.getElementById("bso").textContent="Sound: "+(sd.sndOn?"ON":"OFF")};
document.getElementById("bls").onclick=function(){snd("click");showMenu()};
document.getElementById("bres").onclick=function(){snd("click");gs="playing";showP("hud")};
document.getElementById("brst").onclick=function(){snd("click");startLvl(cl)};
document.getElementById("bqu").onclick=function(){snd("click");showMenu()};
document.getElementById("bnxt").onclick=function(){snd("click");if(cl<24)startLvl(cl+1);else showLvlSel()};
document.getElementById("brpl").onclick=function(){snd("click");startLvl(cl)};
document.getElementById("brtr").onclick=function(){snd("click");startLvl(cl)};
document.getElementById("bqgo").onclick=function(){snd("click");showMenu()};
document.getElementById("bss").onclick=function(){snd("click");showMenu()};
document.getElementById("btgo").onclick=function(){snd("click");sd.tutDone=true;saveSv();document.getElementById("tut").classList.remove("active");document.getElementById("tut").style.display="none";gs="playing"};
document.getElementById("pbtn").onclick=function(){snd("click");gs="paused";showP("pause")};

/* ===== CLEANUP ===== */
function cleanup(){if(rafId)cancelAnimationFrame(rafId);document.removeEventListener("keydown",onKey);if(ac){try{ac.close()}catch(e){}}pts=[]}

/* ===== INIT ===== */
showMenu();
rafId=requestAnimationFrame(loop);
</script>
