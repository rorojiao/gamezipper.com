<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="bus" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c030"/>
      <stop offset="100%" style="stop-color:#d4a017"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="32" fill="url(#bg)"/>
  <!-- Bus body -->
  <rect x="56" y="160" width="400" height="220" rx="24" fill="url(#bus)" stroke="#b8860b" stroke-width="3"/>
  <!-- Bus windows -->
  <rect x="80" y="185" width="352" height="40" rx="6" fill="rgba(135,206,250,0.7)"/>
  <!-- Bus wheels -->
  <circle cx="140" cy="390" r="28" fill="#333"/>
  <circle cx="140" cy="390" r="14" fill="#666"/>
  <circle cx="372" cy="390" r="28" fill="#333"/>
  <circle cx="372" cy="390" r="14" fill="#666"/>
  <!-- BUS text -->
  <text x="256" y="280" font-family="Arial,sans-serif" font-weight="bold" font-size="48" fill="#333" text-anchor="middle">BUS JAM</text>
  <!-- Colored passengers -->
  <circle cx="100" cy="460" r="22" fill="#ff4757"/>
  <circle cx="160" cy="460" r="22" fill="#2ed573"/>
  <circle cx="220" cy="460" r="22" fill="#1e90ff"/>
  <circle cx="280" cy="460" r="22" fill="#ffa502"/>
  <circle cx="340" cy="460" r="22" fill="#a855f7"/>
  <circle cx="400" cy="460" r="22" fill="#ff6b81"/>
  <!-- 3D text -->
  <text x="256" y="120" font-family="Arial,sans-serif" font-weight="bold" font-size="64" fill="#fff" text-anchor="middle" text-shadow="0 0 20px rgba(100,100,255,0.5)">Bus Jam 3D</text>
  <!-- Star rating -->
  <text x="256" y="60" font-family="Arial,sans-serif" font-size="32" fill="#ffd700" text-anchor="middle">&#9733; &#9733; &#9733;</text>
</svg>