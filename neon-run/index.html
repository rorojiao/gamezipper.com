<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;overflow:hidden;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#0a0a1f;color:#eee;touch-action:none;user-select:none;-webkit-user-select:none}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:0}
canvas{display:block;width:100%;max-width:800px;touch-action:none}
/* HUD */
#hud{position:fixed;top:0;left:0;right:0;max-width:800px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;pointer-events:none;z-index:10}
.hbox{background:rgba(0,0,0,.55);border:1px solid rgba(0,255,255,.25);border-radius:8px;padding:4px 14px;text-align:center;backdrop-filter:blur(4px)}
.hbox .lbl{font-size:9px;color:#0ff;text-transform:uppercase;letter-spacing:1px}
.hbox .val{font-size:clamp(14px,3vw,20px);font-weight:700;color:#fff;text-shadow:0 0 8px rgba(0,255,255,.6)}
#hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.35);font-size:12px;text-align:center;pointer-events:none;z-index:10;letter-spacing:.5px}
/* Overlays */
.overlay{position:fixed;inset:0;background:rgba(5,5,20,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;backdrop-filter:blur(6px)}
.overlay h2{font-size:clamp(24px,6vw,42px);font-weight:900;color:#0ff;text-shadow:0 0 20px rgba(0,255,255,.8);margin-bottom:8px;letter-spacing:2px}
.overlay .sub{font-size:clamp(12px,2.5vw,16px);color:#aaa;margin-bottom:4px}
.overlay .big{font-size:clamp(40px,10vw,72px);font-weight:900;background:linear-gradient(135deg,#ff0,#0ff,#f0f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:10px 0;text-shadow:none}
.overlay .hs{font-size:clamp(12px,2.5vw,16px);color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,.5);margin-bottom:24px}
.overlay .cta{background:linear-gradient(135deg,#0ff,#00f);border:none;color:#fff;padding:14px 40px;border-radius:50px;font-size:clamp(14px,3vw,18px);font-weight:700;cursor:pointer;letter-spacing:1px;box-shadow:0 0 24px rgba(0,255,255,.4);transition:transform .1s,box-shadow .1s}
.overlay .cta:hover{box-shadow:0 0 36px rgba(0,255,255,.7);transform:scale(1.04)}
.overlay .cta:active{transform:scale(.97)}
.overlay .tip{color:#555;font-size:12px;margin-top:16px}
#game-over h2{color:#f44;text-shadow:0 0 20px rgba(255,68,68,.8)}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hbox"><div class="lbl">Score</div><div class="val" id="sv">0</div></div>
  <div class="hbox"><div class="lbl">Best</div><div class="val" id="bv">0</div></div>
</div>
<div id="hint">SPACE / TAP to jump · double jump available</div>

<!-- Start Screen -->
<div class="overlay" id="start-screen">
  <h2>NEON RUN</h2>
  <p class="sub">Endless Platform Runner</p>
  <div class="big">🌟⚡💀</div>
  <p class="hs" id="start-hs">Best: 0</p>
  <button class="cta" id="start-btn">▶ PLAY</button>
  <p class="tip">Space / Tap / Click to jump · Double jump in air</p>
</div>

<!-- Game Over -->
<div class="overlay hidden" id="game-over">
  <h2>GAME OVER</h2>
  <p class="sub">Score</p>
  <div class="big" id="final-score">0</div>
  <p class="hs" id="game-over-hs">Best: 0</p>
  <button class="cta" id="retry-btn">↻ RETRY</button>
  <p class="tip">New best? You'll see it next time!</p>
</div>

<script src="game.js?v=1"></script>
</body>
