<script>
(function(){
'use strict';
// ===================== CONFIG =====================
var CV=document.getElementById('game');
var ctx=CV.getContext('2d');
var DPR=Math.min(window.devicePixelRatio||1,2);
// Coin colors palette — gold-coin themed
var COLORS=[
  {fill:'#FFD700',edge:'#B8860B',label:'1'},   // Gold
  {fill:'#E8E8E8',edge:'#888888',label:'5'},   // Silver
  {fill:'#CD7F32',edge:'#7A3E12',label:'10'},  // Bronze
  {fill:'#4FC3F7',edge:'#0277BD',label:'25'},  // Blue
  {fill:'#81C784',edge:'#2E7D32',label:'50'},  // Green
  {fill:'#FF8A65',edge:'#BF360C',label:'100'}, // Orange
  {fill:'#BA68C8',edge:'#6A1B9A',label:'200'}, // Purple
  {fill:'#F06292',edge:'#AD1457',label:'500'}  // Pink
];
// Level definitions: [numColors, numStacks, stackDepth, extraEmptyStacks]
// 30 levels, 5 tiers x 6
var LEVELS=[
  // Format: [numColors, numCoinStacks, stackDepth, numEmptyBuffers]
  // Total stacks = numCoinStacks + numEmptyBuffers
  // Win condition: numColors sorted stacks of stackDepth each
  // numCoinStacks = numColors (each final sorted stack)
  // Tier 1: Easy (3 colors)
  [3,3,4,1],[3,3,4,1],[3,3,4,2],[3,3,5,1],[3,3,5,2],[3,3,6,2],
  // Tier 2: Normal (4 colors)
  [4,4,4,1],[4,4,5,1],[4,4,5,2],[4,4,5,2],[4,4,6,2],[4,4,6,2],
  // Tier 3: Hard (5 colors)
  [5,5,4,1],[5,5,5,1],[5,5,5,2],[5,5,6,2],[5,5,6,2],[5,5,7,2],
  // Tier 4: Expert (6 colors)
  [6,6,5,1],[6,6,5,2],[6,6,6,2],[6,6,6,2],[6,6,7,2],[6,6,7,2],
  // Tier 5: Master (7-8 colors)
  [7,7,5,2],[7,7,6,2],[7,7,6,2],[8,8,6,2],[8,8,7,2],[8,8,7,2]
];
var TIER_NAMES=['Easy','Normal','Hard','Expert','Master'];

// ===================== STATE =====================
var state={
  level:0,
  stacks:[],
  numColors:0,
  stackDepth:0,
  maxDepth:0,
  selected:-1,
  animating:false,
  animCoin:null,
  moves:0,
  undoStack:[],
  hintsLeft:3,
  soundOn:true,
  audioCtx:null,
  bgmGain:null,
  bgmNodes:[],
  rafId:null,
  particles:[],
  hintTimer:0,
  hintStack:-1
};

// ===================== SAVE/LOAD =====================
function loadSave(){
  try{
    var d=JSON.parse(localStorage.getItem('coinSort_save')||'{}');
    if(d&&d.v===1){
      state.level=d.level||0;
      state.soundOn=d.soundOn!==false;
    }
  }catch(e){}
}
function saveProgress(){
  try{
    localStorage.setItem('coinSort_save',JSON.stringify({v:1,level:state.level,soundOn:state.soundOn}));
  }catch(e){}
}
function loadStars(){
  try{return JSON.parse(localStorage.getItem('coinSort_stars')||'{}');}catch(e){return {};}
}
function saveStars(level,stars){
  try{
    var s=loadStars();
    if(!s[level]||s[level]<stars){s[level]=stars;localStorage.setItem('coinSort_stars',JSON.stringify(s));}
  }catch(e){}
}

// ===================== AUDIO =====================
function initAudio(){
  if(state.audioCtx)return;
  try{
    state.audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    state.bgmGain=state.audioCtx.createGain();
    state.bgmGain.gain.value=state.soundOn?0.08:0;
    state.bgmGain.connect(state.audioCtx.destination);
    startBGM();
  }catch(e){}
}
function playSFX(type){
  if(!state.audioCtx||!state.soundOn)return;
  var ac=state.audioCtx,now=ac.currentTime;
  var osc=ac.createOscillator(),gain=ac.createGain();
  osc.connect(gain);gain.connect(ac.destination);
  var freq=440,dur=0.1,vol=0.15,wave='sine';
  if(type==='pickup'){freq=660;dur=0.08;vol=0.12;wave='triangle';}
  else if(type==='drop'){freq=440;dur=0.1;vol=0.15;wave='triangle';}
  else if(type==='invalid'){freq=150;dur=0.15;vol=0.1;wave='sawtooth';}
  else if(type==='win'){dur=0.5;vol=0.2;wave='sine';}
  else if(type==='star'){dur=0.2;vol=0.15;wave='sine';}
  else if(type==='hint'){freq=880;dur=0.15;vol=0.1;wave='sine';}
  osc.type=wave;
  if(type==='win'){
    // Win chord: C-E-G-C arpeggio
    [523,659,784,1047].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      o.connect(g);g.connect(ac.destination);
      g.gain.setValueAtTime(0,now+i*0.1);
      g.gain.linearRampToValueAtTime(0.2,now+i*0.1+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,now+i*0.1+0.4);
      o.start(now+i*0.1);o.stop(now+i*0.1+0.5);
    });
    return;
  }
  if(type==='star'){
    freq=[659,784,1047][Math.min(state.winStars||1,2)];
  }
  osc.frequency.setValueAtTime(freq,now);
  if(type==='drop'){
    osc.frequency.exponentialRampToValueAtTime(freq*0.7,now+dur);
  }
  gain.gain.setValueAtTime(0,now);
  gain.gain.linearRampToValueAtTime(vol,now+0.005);
  gain.gain.exponentialRampToValueAtTime(0.001,now+dur);
  osc.start(now);osc.stop(now+dur);
}
function startBGM(){
  if(!state.audioCtx||state.bgmNodes.length)return;
  try{
    var ac=state.audioCtx,sr=ac.sampleRate;
    var dur=12,bufSize=sr*dur;
    var buf=ac.createBuffer(1,bufSize,sr);
    var d=buf.getChannelData(0);
    // Ambient chord progression: Am-F-C-G (vi-IV-I-V)
    var chords=[[220,262,330,440],[174,220,262,349],[262,330,392,523],[196,247,294,392]];
    var chordDur=dur/chords.length;
    for(var i=0;i<bufSize;i++){
      var t=i/sr;
      var ci=Math.min(Math.floor(t/chordDur),chords.length-1);
      var chord=chords[ci];
      var s=0;
      for(var n=0;n<chord.length;n++){
        var f=chord[n];
        s+=Math.sin(2*Math.PI*f*t)*0.04;
        s+=Math.sin(2*Math.PI*f*2*t)*0.008;
      }
      var fade=t%chordDur;
      var fadeIn=Math.min(fade/0.5,1);
      var fadeOut=Math.min((chordDur-fade)/0.5,1);
      s*=fadeIn*fadeOut;
      var lfo=Math.sin(2*Math.PI*0.3*t)*0.1+1;
      d[i]=s*lfo*0.6;
    }
    var src=ac.createBufferSource();
    src.buffer=buf;src.loop=true;
    var filt=ac.createBiquadFilter();
    filt.type='lowpass';filt.frequency.value=1200;
    var g=ac.createGain();
    g.gain.value=state.soundOn?0.5:0;
    src.connect(filt);filt.connect(g);g.connect(state.bgmGain);
    src.start();
    state.bgmNodes=[src,filt,g];
  }catch(e){}
}
function toggleSound(){
  state.soundOn=!state.soundOn;
  if(state.bgmGain){state.bgmGain.gain.value=state.soundOn?0.08:0;}
  if(state.bgmNodes[2]){state.bgmNodes[2].gain.value=state.soundOn?0.5:0;}
  document.getElementById('btn-sound').innerHTML=state.soundOn?'&#128266;':'&#128264;';
  saveProgress();
}

// ===================== LEVEL GEN =====================
function seededRand(seed){
  // Mulberry32 PRNG
  var a=seed|0;
  return function(){
    a|=0;a=a+0x6D2B79F5|0;
    var t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
function generateLevel(idx){
  var def=LEVELS[idx];
  var nc=def[0],ns=def[1],sd=def[2],extra=def[3];
  var rng=seededRand((idx+1)*7919+13);
  // Create coins: nc colors x sd depth each
  var coins=[];
  for(var c=0;c<nc;c++){
    for(var d=0;d<sd;d++)coins.push(c);
  }
  // Shuffle coins
  for(var i=coins.length-1;i>0;i--){
    var j=Math.floor(rng()*(i+1));
    var tmp=coins[i];coins[i]=coins[j];coins[j]=tmp;
  }
  // Distribute into ns coin stacks of depth sd, then add extra empty buffers
  state.stacks=[];
  var idx2=0;
  for(var s=0;s<ns;s++){
    var stack=[];
    for(var k=0;k<sd&&idx2<coins.length;k++,idx2++){
      stack.push(coins[idx2]);
    }
    state.stacks.push(stack);
  }
  // Add extra empty stacks
  for(var e=0;e<extra;e++)state.stacks.push([]);
  state.numColors=nc;
  state.stackDepth=sd;
  state.maxDepth=sd+1; // visual budget — allows temp overflow during solving
  state.selected=-1;
  state.moves=0;
  state.undoStack=[];
  state.hintsLeft=3;
  state.hintStack=-1;
  state.hintTimer=0;
  state.particles=[];
}

// ===================== LAYOUT =====================
function getLayout(){
  var nstacks=state.stacks.length;
  var maxD=state.maxDepth;
  var cw=CV.clientWidth;
  var ch=CV.clientHeight;
  var coinR=Math.min(
    (cw-30)/nstacks/2.7,           // horizontal fit
    (ch-100)/(maxD+2)*0.42,        // vertical fit
    24                               // max radius
  );
  coinR=Math.max(coinR,9);           // min radius for readability
  var stackW=coinR*2.4;
  var gap=Math.max(4,Math.min(12,(cw-30-nstacks*stackW)/(nstacks-1)));
  var stackH=(maxD+1)*coinR*2+coinR;
  var totalW=nstacks*stackW+(nstacks-1)*gap;
  var startX=(cw-totalW)/2;
  var startY=ch-stackH-16;
  return{coinR:coinR,stackW:stackW,stackH:stackH,startX:startX,startY:startY,gap:gap};
}

// ===================== RENDER =====================
function drawCoin(x,y,r,colorIdx,lift){
  var col=COLORS[colorIdx];
  // Shadow
  ctx.beginPath();
  ctx.arc(x+2,y+3,r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fill();
  // Coin body gradient
  var grad=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  grad.addColorStop(0,col.fill);
  grad.addColorStop(0.7,col.fill);
  grad.addColorStop(1,col.edge);
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=grad;
  ctx.fill();
  // Inner ring
  ctx.beginPath();
  ctx.arc(x,y,r*0.75,0,Math.PI*2);
  ctx.strokeStyle=col.edge;
  ctx.lineWidth=1.5;
  ctx.stroke();
  // Highlight
  ctx.beginPath();
  ctx.arc(x-r*0.35,y-r*0.35,r*0.25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fill();
  // Label
  ctx.fillStyle=col.edge;
  ctx.font='bold '+Math.round(r*0.7)+'px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(col.label,x,y+1);
}
function drawStack(idx){
  var L=getLayout();
  var x=L.startX+idx*(L.stackW+L.gap)+L.stackW/2;
  var stack=state.stacks[idx];
  var bottomY=L.startY+L.stackH;
  var isSelected=state.selected===idx;
  var isHint=state.hintStack===idx&&state.hintTimer>0;
  // Stack background tube
  ctx.fillStyle='rgba(255,255,255,0.03)';
  ctx.strokeStyle=isSelected?'rgba(255,215,0,0.8)':(isHint?'rgba(100,255,100,0.6)':'rgba(255,255,255,0.1)');
  ctx.lineWidth=isSelected?3:2;
  var tubeX=x-L.coinR*1.2;
  var tubeY=bottomY-L.stackH;
  var tubeW=L.coinR*2.4;
  var tubeH=L.stackH;
  ctx.beginPath();
  ctx.roundRect(tubeX,tubeY,tubeW,tubeH,L.coinR*1.1);
  ctx.fill();
  ctx.stroke();
  // Draw coins bottom-up
  for(var i=0;i<stack.length;i++){
    var cy=bottomY-L.coinR*1.1-i*L.coinR*2;
    drawCoin(x,cy,L.coinR,stack[i],0);
  }
}
function drawSelectedCoin(){
  if(state.selected<0||!state.animCoin)return;
  var L=getLayout();
  var x=L.startX+state.selected*(L.stackW+L.gap)+L.stackW/2;
  var stack=state.stacks[state.selected];
  if(stack.length===0)return;
  var topCoin=stack[stack.length-1];
  var baseY=L.startY+L.stackH-L.coinR*1.1-(stack.length-1)*L.coinR*2;
  var liftY=baseY-L.coinR*4-L.coinR*Math.sin(performance.now()*0.005)*3;
  drawCoin(x,liftY,L.coinR,topCoin,1);
}
function drawParticles(){
  for(var i=state.particles.length-1;i>=0;i--){
    var p=state.particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.15;
    p.life-=1;
    if(p.life<=0){state.particles.splice(i,1);continue;}
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fill();
    ctx.globalAlpha=1;
  }
}
function render(){
  ctx.clearRect(0,0,CV.width,CV.height);
  // Scale for DPR
  // Draw all stacks
  for(var i=0;i<state.stacks.length;i++)drawStack(i);
  // Draw floating selected coin
  drawSelectedCoin();
  // Draw particles
  drawParticles();
  // Decrement hint timer
  if(state.hintTimer>0){
    state.hintTimer--;
    if(state.hintTimer===0)state.hintStack=-1;
  }
  state.rafId=requestAnimationFrame(render);
}

// ===================== GAME LOGIC =====================
function getStackAt(x,y){
  var L=getLayout();
  for(var i=0;i<state.stacks.length;i++){
    var sx=L.startX+i*(L.stackW+L.gap);
    if(x>=sx&&x<=sx+L.stackW&&y>=L.startY-10&&y<=L.startY+L.stackH+10){
      return i;
    }
  }
  return-1;
}
function canPlace(from,to){
  if(from===to)return false;
  var src=state.stacks[from],dst=state.stacks[to];
  if(src.length===0)return false;
  if(dst.length>=state.maxDepth)return false;
  if(dst.length===0)return true;
  return src[src.length-1]===dst[dst.length-1];
}
function doMove(from,to){
  // Save undo state
  state.undoStack.push(state.stacks.map(function(s){return s.slice();}));
  if(state.undoStack.length>20)state.undoStack.shift();
  var coin=state.stacks[from].pop();
  state.stacks[to].push(coin);
  state.moves++;
  state.selected=-1;
  playSFX('drop');
  checkWin();
  updateUI();
}
function tryMove(idx){
  if(state.animating)return;
  if(state.selected<0){
    // Pick up
    if(state.stacks[idx].length>0){
      // Check if stack is already fully sorted and full
      if(isStackComplete(idx))return;
      state.selected=idx;
      playSFX('pickup');
    }
  }else if(state.selected===idx){
    // Deselect
    state.selected=-1;
    playSFX('pickup');
  }else{
    // Try to place
    if(canPlace(state.selected,idx)){
      doMove(state.selected,idx);
    }else{
      playSFX('invalid');
      // Maybe re-select if target has coins
      if(state.stacks[idx].length>0&&!isStackComplete(idx)){
        state.selected=idx;
        playSFX('pickup');
      }
    }
  }
}
function isStackComplete(idx){
  var s=state.stacks[idx];
  if(s.length===0)return true;
  var c=s[0];
  for(var i=1;i<s.length;i++){if(s[i]!==c)return false;}
  return s.length>=state.stackDepth; // Must be full and sorted
}
function isStackSorted(idx){
  var s=state.stacks[idx];
  if(s.length===0)return true;
  var c=s[0];
  for(var i=1;i<s.length;i++){if(s[i]!==c)return false;}
  return true;
}
function checkWin(){
  // Win condition: all non-empty stacks are sorted AND every color has exactly one stack with full depth
  for(var i=0;i<state.stacks.length;i++){
    if(!isStackSorted(i))return false;
  }
  // Count complete stacks
  var complete=0;
  for(var i=0;i<state.stacks.length;i++){
    if(state.stacks[i].length===state.stackDepth)complete++;
  }
  if(complete>=state.numColors){
    doWin();
  }
  return false;
}
function doWin(){
  state.animating=true;
  // Calculate stars based on move efficiency
  var minMoves=state.numColors*state.stackDepth;
  var efficiency=minMoves/state.moves;
  var stars;
  if(efficiency>=0.7)stars=3;
  else if(efficiency>=0.5)stars=2;
  else stars=1;
  state.winStars=stars;
  saveStars(state.level,stars);
  playSFX('win');
  if(stars>=2)setTimeout(function(){playSFX('star');},600);
  if(stars>=3)setTimeout(function(){playSFX('star');},900);
  // Confetti particles
  var L=getLayout();
  for(var i=0;i<60;i++){
    state.particles.push({
      x:Math.random()*CV.clientWidth,
      y:0,
      vx:(Math.random()-0.5)*6,
      vy:Math.random()*3+2,
      r:Math.random()*4+2,
      life:80+Math.random()*40,
      maxLife:100,
      color:COLORS[Math.floor(Math.random()*state.numColors)].fill
    });
  }
  setTimeout(function(){showWinOverlay(stars);},800);
}
function showWinOverlay(stars){
  var isLast=state.level>=LEVELS.length-1;
  var card=document.getElementById('overlay-card');
  var starHtml='';
  for(var i=0;i<3;i++)starHtml+='<span style="color:'+(i<stars?'#ffd700':'#555')+'">&#9733;</span>';
  card.innerHTML='<h2>'+(['Level Complete!','Well Done!','Perfect!'][stars-1])+'</h2>'+
    '<p>Moves: '+state.moves+' &middot; Stars: '+stars+'/3</p>'+
    '<div class="overlay-stars">'+starHtml+'</div>'+
    (isLast?'<p>Congratulations! You completed all levels!</p>':'')+
    '<button class="overlay-btn primary" id="ov-next">'+(isLast?'Play Again':'Next Level')+'</button>'+
    '<button class="overlay-btn secondary" id="ov-replay">Replay</button>'+
    '<button class="overlay-btn secondary" id="ov-levels">Level Select</button>';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('ov-next').onclick=function(){
    document.getElementById('overlay').classList.remove('show');
    if(!isLast){state.level++;}
    else{state.level=0;}
    startLevel();
  };
  document.getElementById('ov-replay').onclick=function(){
    document.getElementById('overlay').classList.remove('show');
    startLevel();
  };
  document.getElementById('ov-levels').onclick=function(){
    document.getElementById('overlay').classList.remove('show');
    showLevelSelect();
  };
  state.animating=false;
}
function showLevelSelect(){
  var savedStars=loadStars();
  var card=document.getElementById('overlay-card');
  var tierIdx=Math.floor(state.level/6);
  var html='<h2>Select Level</h2>';
  for(var tier=0;tier<5;tier++){
    html+='<p style="color:#ffd700;font-size:13px;margin-top:12px;margin-bottom:4px;font-weight:700">'+TIER_NAMES[tier]+'</p>';
    html+='<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;">';
    for(var lv=tier*6;lv<tier*6+6;lv++){
      var st=savedStars[lv]||0;
      var cur=lv===state.level;
      var lock=lv>state.level&&lv>0&&!savedStars[lv-1]&&lv>tierIdx*6;
      html+='<button class="overlay-btn '+(cur?'primary':'secondary')+'" style="padding:6px;font-size:11px;'+(lock?'opacity:0.3':'')+'" data-lvl="'+lv+'" '+(lock?'disabled':'')+'>'+(lv+1)+'<br><span style="font-size:9px;color:'+(st>=1?'#ffd700':'#555')+'">'+(st>0?'&#9733;'.repeat(st):'&#9734;')+'</span></button>';
    }
    html+='</div>';
  }
  html+='<button class="overlay-btn secondary" id="ov-close" style="margin-top:12px">Close</button>';
  card.innerHTML=html;
  document.getElementById('overlay').classList.add('show');
  var btns=card.querySelectorAll('[data-lvl]');
  for(var i=0;i<btns.length;i++){
    btns[i].onclick=function(){
      var lv=parseInt(this.getAttribute('data-lvl'));
      if(!this.disabled){
        state.level=lv;
        document.getElementById('overlay').classList.remove('show');
        startLevel();
      }
    };
  }
  document.getElementById('ov-close').onclick=function(){
    document.getElementById('overlay').classList.remove('show');
  };
}
function doUndo(){
  if(state.undoStack.length===0||state.animating)return;
  state.stacks=state.undoStack.pop();
  state.moves=Math.max(0,state.moves-1);
  state.selected=-1;
  playSFX('pickup');
  updateUI();
}
function doHint(){
  if(state.hintsLeft<=0||state.animating)return;
  // Find a useful move: a stack with top coin that can be placed on a sorted stack of same color
  var hint=-1;
  // First priority: move to a stack where it completes or extends sorted run
  for(var i=0;i<state.stacks.length;i++){
    if(isStackComplete(i))continue;
    var s=state.stacks[i];
    if(s.length===0)continue;
    var top=s[s.length-1];
    // Find a stack with same color on top
    for(var j=0;j<state.stacks.length;j++){
      if(i===j)continue;
      var t=state.stacks[j];
      if(t.length>0&&t[t.length-1]===top&&t.length<state.maxDepth){
        hint=i;break;
      }
    }
    if(hint>=0)break;
    // Or move to empty
    if(hint<0){
      for(var j=0;j<state.stacks.length;j++){
        if(i!==j&&state.stacks[j].length===0&&canPlace(i,j)){hint=i;break;}
      }
    }
    if(hint>=0)break;
  }
  if(hint>=0){
    state.hintStack=hint;
    state.hintTimer=120; // 2 seconds
    state.hintsLeft--;
    playSFX('hint');
    updateUI();
  }
}
function restart(){
  if(state.animating)return;
  startLevel();
}

// ===================== UI =====================
function updateUI(){
  var tier=Math.floor(state.level/6);
  var lvInTier=(state.level%6)+1;
  document.getElementById('level-info').textContent='Level '+(state.level+1)+' \u2014 '+TIER_NAMES[tier];
  var savedStars=loadStars();
  var st=savedStars[state.level]||0;
  var starEls=document.querySelectorAll('#stars-display .star');
  for(var i=0;i<3;i++){starEls[i].className='star'+(i<st?' earned':'');}
  document.getElementById('btn-undo').disabled=state.undoStack.length===0;
  document.getElementById('btn-hint').disabled=state.hintsLeft<=0;
  if(state.hintsLeft<3){
    document.getElementById('btn-hint').innerHTML='&#128161; Hint ('+state.hintsLeft+')';
  }
}
function startLevel(){
  generateLevel(state.level);
  updateUI();
  state.animating=false;
}
function showTutorial(){
  var card=document.getElementById('tutorial-card');
  card.innerHTML='<h2>Welcome to Coin Sort!</h2>'+
    '<div class="tutorial-icon">&#129689;</div>'+
    '<p><b>Goal:</b> Sort all coins so each stack has only one color.</p>'+
    '<p><b>How:</b> Tap a stack to pick up its top coin, then tap another stack to place it.</p>'+
    '<p><b>Rule:</b> Place coins on empty stacks or on top of the same color.</p>'+
    '<button class="tutorial-btn">Got it!</button>';
  document.getElementById('tutorial').classList.add('show');
  card.querySelector('.tutorial-btn').onclick=function(){
    document.getElementById('tutorial').classList.remove('show');
    try{localStorage.setItem('coinSort_tutorial','1');}catch(e){}
  };
}

// ===================== INPUT =====================
function onPointer(e){
  e.preventDefault();
  if(state.animating)return;
  initAudio();
  var rect=CV.getBoundingClientRect();
  var sx=CV.clientWidth/CV.width;
  var sy=CV.clientHeight/CV.height;
  // Use clientX relative to canvas, mapped to canvas coords
  var x=(e.clientX-rect.left)/rect.width*CV.width;
  var y=(e.clientY-rect.top)/rect.height*CV.height;
  var idx=getStackAt(x,y);
  if(idx>=0)tryMove(idx);
}
CV.addEventListener('pointerdown',onPointer);
CV.addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});

// ===================== RESIZE =====================
function resize(){
  var parent=CV.parentElement;
  var pw=parent.clientWidth;
  var nstacks=state.stacks.length||8;
  // Estimate aspect ratio based on stacks
  var maxD=state.maxDepth||7;
  var targetW=Math.min(pw-8,500);
  // Height: header+controls ~120px, canvas fills rest
  var availH=window.innerHeight-200;
  var targetH=Math.min(availH,560);
  CV.style.width=targetW+'px';
  CV.style.height=targetH+'px';
  CV.width=targetW*DPR;
  CV.height=targetH*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

// ===================== BUTTONS =====================
document.getElementById('btn-restart').onclick=restart;
document.getElementById('btn-undo').onclick=doUndo;
document.getElementById('btn-hint').onclick=doHint;
document.getElementById('btn-levels').onclick=showLevelSelect;
document.getElementById('btn-sound').onclick=function(){initAudio();toggleSound();};

// ===================== INIT =====================
loadSave();
resize();
window.addEventListener('resize',resize);
startLevel();
render();
// First visit tutorial
try{
  if(!localStorage.getItem('coinSort_tutorial'))showTutorial();
}catch(e){}

// ===================== CLEANUP =====================
window.addEventListener('beforeunload',function(){
  if(state.rafId)cancelAnimationFrame(state.rafId);
  if(state.audioCtx)state.audioCtx.close().catch(function(){});
});
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    if(state.rafId){cancelAnimationFrame(state.rafId);state.rafId=null;}
  }else{
    if(!state.rafId)state.rafId=requestAnimationFrame(render);
  }
});
})();
</script>
