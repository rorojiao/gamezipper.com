<script>
(function(){
"use strict";

// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const SAVE_KEY = 'flow-connect-progress';
const COLORS = [
  '#FF6B6B', // red
  '#4ECDC4', // teal
  '#45B7D1', // blue
  '#96CEB4', // sage
  '#FFEAA7', // yellow
  '#DDA0DD', // plum
  '#98D8C8', // mint
  '#F7DC6F', // gold
  '#BB8FCE', // purple
  '#85C1E9', // sky
];

const PACKS = [
  { name: 'Beginner', grid: 5, colors: 4, levels: 20 },
  { name: 'Easy',     grid: 6, colors: 5, levels: 20 },
  { name: 'Medium',   grid: 7, colors: 6, levels: 20 },
  { name: 'Hard',     grid: 8, colors: 7, levels: 20 },
  { name: 'Expert',   grid: 9, colors: 8, levels: 20 },
];

const DIRS = [[0,-1],[1,0],[0,1],[-1,0]]; // up, right, down, left (dx, dy)

// ═══════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }

// ═══════════════════════════════════════════════
// RNG - Mulberry32 (seeded, deterministic)
// ═══════════════════════════════════════════════
function mulberry32(seed) {
  return function() {
    seed |= 0;
    seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ═══════════════════════════════════════════════
// LEVEL GENERATION
// ═══════════════════════════════════════════════

/**
 * Generate a Hamiltonian path through an rows×cols grid using randomized DFS
 * with Warnsdorff's heuristic and backtracking.
 * Returns array of [row, col] pairs.
 */
function generateHamiltonianPath(rows, cols, rng) {
  const total = rows * cols;
  const visited = Array.from({length: rows}, () => new Uint8Array(cols));
  const path = [];

  // Shuffle starting positions and try each
  const starts = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      starts.push([r, c]);
  // Shuffle
  for (let i = starts.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [starts[i], starts[j]] = [starts[j], starts[i]];
  }

  for (const [sr, sc] of starts) {
    const result = tryHamiltonian(rows, cols, sr, sc, rng);
    if (result) return result;
  }
  // Fallback: simple row-by-row snake
  const snake = [];
  for (let r = 0; r < rows; r++) {
    if (r % 2 === 0) for (let c = 0; c < cols; c++) snake.push([r, c]);
    else for (let c = cols - 1; c >= 0; c--) snake.push([r, c]);
  }
  return snake;
}

function tryHamiltonian(rows, cols, startR, startC, rng) {
  const total = rows * cols;
  const visited = Array.from({length: rows}, () => new Uint8Array(cols));
  const path = [[startR, startC]];
  visited[startR][startC] = 1;

  function countNeighbors(r, c) {
    let count = 0;
    for (const [dx, dy] of DIRS) {
      const nr = r + dy, nc = c + dx;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc]) count++;
    }
    return count;
  }

  function getWarnsdorffOrder(r, c) {
    const neighbors = [];
    for (const [dx, dy] of DIRS) {
      const nr = r + dy, nc = c + dx;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc]) {
        neighbors.push({r: nr, c: nc, deg: countNeighbors(nr, nc)});
      }
    }
    // Sort by degree (Warnsdorff) with random tie-breaking
    neighbors.sort((a, b) => a.deg - b.deg || rng() - 0.5);
    return neighbors;
  }

  // Iterative with backtracking using recursion limit
  const stack = [];
  let current = {r: startR, c: startC};
  let neighbors = getWarnsdorffOrder(current.r, current.c);
  let ni = 0;

  const MAX_STEPS = total * total * 2; // safety limit
  let steps = 0;

  while (path.length < total) {
    steps++;
    if (steps > MAX_STEPS) return null;

    if (ni < neighbors.length) {
      const next = neighbors[ni];
      ni++;
      // Try this neighbor
      visited[next.r][next.c] = 1;
      path.push([next.r, next.c]);
      stack.push({r: current.r, c: current.c, ni, neighbors});

      current = next;
      neighbors = getWarnsdorffOrder(current.r, current.c);
      ni = 0;
    } else {
      // Backtrack
      if (stack.length === 0) return null;
      const prev = stack.pop();
      visited[current.r][current.c] = 0;
      path.pop();
      current = {r: prev.r, c: prev.c};
      neighbors = prev.neighbors;
      ni = prev.ni;
    }
  }

  return path;
}

/**
 * Generate puzzle data from seed.
 * Returns { rows, cols, numColors, endpoints: [[r1,c1,r2,c2], ...], solution: [[[r,c],...], ...] }
 */
function generatePuzzle(seed, rows, cols, numColors) {
  const rng = mulberry32(seed);
  const path = generateHamiltonianPath(rows, cols, rng);
  if (!path) return null;

  const total = rows * cols;
  const segLen = Math.floor(total / numColors);

  const endpoints = [];
  const solution = [];

  for (let i = 0; i < numColors; i++) {
    const start = i * segLen;
    const end = (i === numColors - 1) ? total - 1 : (i + 1) * segLen - 1;
    const seg = path.slice(start, end + 1);
    endpoints.push([seg[0][0], seg[0][1], seg[seg.length - 1][0], seg[seg.length - 1][1]]);
    solution.push(seg);
  }

  return { rows, cols, numColors, endpoints, solution };
}

function getLevelSeed(packIndex, levelIndex) {
  return packIndex * 100 + levelIndex;
}

function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

// ═══════════════════════════════════════════════
// AUDIO - Web Audio API procedural sounds
// ═══════════════════════════════════════════════
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type, vol, rampTo) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  if (rampTo) osc.frequency.exponentialRampToValueAtTime(rampTo, ctx.currentTime + duration);
  gain.gain.setValueAtTime(vol || 0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

const Audio = {
  draw() { playTone(600, 0.08, 'sine', 0.1, 800); },
  connect() {
    playTone(523, 0.15, 'sine', 0.15);
    setTimeout(() => playTone(659, 0.15, 'sine', 0.15), 80);
    setTimeout(() => playTone(784, 0.2, 'sine', 0.15), 160);
  },
  win() {
    playTone(523, 0.2, 'sine', 0.12);
    setTimeout(() => playTone(659, 0.2, 'sine', 0.12), 120);
    setTimeout(() => playTone(784, 0.2, 'sine', 0.12), 240);
    setTimeout(() => playTone(1047, 0.4, 'sine', 0.15), 360);
  },
  error() { playTone(150, 0.2, 'sawtooth', 0.08, 100); },
  undo() { playTone(400, 0.1, 'sine', 0.08, 300); },
};

// ═══════════════════════════════════════════════
// BACKGROUND MUSIC - Ambient pad via Web Audio API
// ═══════════════════════════════════════════════
const backgroundMusic = {
  _ctx: null,
  _masterGain: null,
  _lfoGain: null,
  _lfo: null,
  _oscillators: [],
  _driftInterval: null,
  _isPlaying: false,
  _initialized: false,

  // C major chord pad voicing (warm, low register)
  _voices: [
    { freq: 130.81, type: 'sine',     gain: 0.030 },  // C3
    { freq: 196.00, type: 'triangle', gain: 0.020 },  // G3
    { freq: 261.63, type: 'sine',     gain: 0.025 },  // C4
    { freq: 392.00, type: 'triangle', gain: 0.015 },  // G4
  ],

  _init() {
    if (this._initialized) return;
    // Share the existing audio context
    this._ctx = getAudioCtx();
    if (!this._ctx) return;

    // Master gain for overall volume (starts silent)
    this._masterGain = this._ctx.createGain();
    this._masterGain.gain.setValueAtTime(0, this._ctx.currentTime);
    this._masterGain.connect(this._ctx.destination);

    // LFO for subtle volume breathing (~0.15 Hz, very gentle)
    this._lfoGain = this._ctx.createGain();
    this._lfoGain.gain.setValueAtTime(0.012, this._ctx.currentTime); // modulation depth
    this._lfo = this._ctx.createOscillator();
    this._lfo.type = 'sine';
    this._lfo.frequency.setValueAtTime(0.15, this._ctx.currentTime);
    this._lfo.connect(this._lfoGain);
    this._lfoGain.connect(this._masterGain.gain);
    this._lfo.start();

    // Create layered oscillators
    this._voices.forEach(v => {
      const osc = this._ctx.createOscillator();
      osc.type = v.type;
      osc.frequency.setValueAtTime(v.freq, this._ctx.currentTime);

      const gain = this._ctx.createGain();
      gain.gain.setValueAtTime(v.gain, this._ctx.currentTime);

      osc.connect(gain);
      gain.connect(this._masterGain);
      osc.start();

      this._oscillators.push({ osc, gain, baseFreq: v.freq });
    });

    // Organic drift: slowly shift one oscillator's frequency every 4-8 seconds
    this._driftInterval = setInterval(() => {
      if (!this._isPlaying || this._oscillators.length === 0) return;
      const idx = Math.floor(Math.random() * this._oscillators.length);
      const voice = this._oscillators[idx];
      const drift = (Math.random() - 0.5) * 4; // ±2 Hz
      const newFreq = voice.baseFreq + drift;
      voice.osc.frequency.linearRampToValueAtTime(newFreq, this._ctx.currentTime + 2);
      // Drift back after a moment
      setTimeout(() => {
        if (this._ctx && this._ctx.state !== 'closed') {
          voice.osc.frequency.linearRampToValueAtTime(voice.baseFreq, this._ctx.currentTime + 3);
        }
      }, 4000);
    }, 5000);

    this._initialized = true;
  },

  start() {
    this._init();
    if (!this._initialized) return;
    if (this._isPlaying) return;
    this._isPlaying = true;
    const ctx = this._ctx;
    if (ctx.state === 'suspended') ctx.resume();
    // Fade in over 1.5 seconds
    this._masterGain.gain.cancelScheduledValues(ctx.currentTime);
    this._masterGain.gain.setValueAtTime(this._masterGain.gain.value, ctx.currentTime);
    this._masterGain.gain.linearRampToValueAtTime(1, ctx.currentTime + 1.5);
  },

  stop() {
    if (!this._initialized || !this._isPlaying) return;
    this._isPlaying = false;
    const ctx = this._ctx;
    if (!ctx || ctx.state === 'closed') return;
    // Fade out over 1 second
    this._masterGain.gain.cancelScheduledValues(ctx.currentTime);
    this._masterGain.gain.setValueAtTime(this._masterGain.gain.value, ctx.currentTime);
    this._masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
  },

  toggle() {
    if (this._isPlaying) {
      this.stop();
    } else {
      this.start();
    }
    return this._isPlaying;
  },

  get isPlaying() { return this._isPlaying; }
};

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
let progress = { completedLevels: {}, hints: 3 };

function loadProgress() {
  try {
    const data = localStorage.getItem(SAVE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      progress.completedLevels = parsed.completedLevels || {};
      progress.hints = parsed.hints !== undefined ? parsed.hints : 3;
    }
  } catch(e) {}
}

function saveProgress() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(progress)); } catch(e) {}
}

function getLevelId(packIdx, lvlIdx) { return `${packIdx}-${lvlIdx}`; }

function isLevelUnlocked(packIdx, lvlIdx) {
  if (packIdx === 0 && lvlIdx === 0) return true;
  if (lvlIdx === 0) {
    // First level of a pack: need at least 1 star on any level of previous pack
    const prevId = getLevelId(packIdx - 1, 0);
    return !!progress.completedLevels[prevId];
  }
  const prevId = getLevelId(packIdx, lvlIdx - 1);
  return !!progress.completedLevels[prevId];
}

function isDailyUnlocked() {
  // Daily is always available
  return true;
}

// ═══════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════
let canvas, ctx;
let currentPack = 0;
let currentLevel = 0;
let isDaily = false;
let puzzle = null;
let grid = []; // grid[r][c] = colorIndex or -1
let paths = {}; // colorIndex -> [[r,c], ...]
let drawing = null; // { colorIndex, path: [[r,c], ...] }
let moveCount = 0;
let totalMoves = 0;
let startTime = 0;
let timerInterval = null;
let gameWon = false;
let undoStack = [];
let particles = [];
let animFrame = null;
let dotPulse = 0;

// Hint state
let hintCells = []; // [{r, c, colorIndex}]

function initGrid() {
  grid = Array.from({length: puzzle.rows}, () => new Array(puzzle.cols).fill(-1));
  paths = {};
  drawing = null;
  moveCount = 0;
  totalMoves = 0;
  gameWon = false;
  undoStack = [];
  hintCells = [];
  particles = [];

  // Place endpoints
  for (let i = 0; i < puzzle.numColors; i++) {
    const [r1, c1, r2, c2] = puzzle.endpoints[i];
    // endpoints stored in grid but with a special marker
    // We use colorIndex as value - paths will also use colorIndex
  }
}

function isEndpoint(r, c) {
  for (let i = 0; i < puzzle.numColors; i++) {
    const [r1, c1, r2, c2] = puzzle.endpoints[i];
    if ((r === r1 && c === c1) || (r === r2 && c === c2)) return i;
  }
  return -1;
}

function getEndpointColor(r, c) {
  return isEndpoint(r, c);
}

function isConnected(colorIndex) {
  const path = paths[colorIndex];
  if (!path || path.length < 2) return false;
  const [r1, c1, r2, c2] = puzzle.endpoints[colorIndex];
  const start = path[0];
  const end = path[path.length - 1];
  return ((start[0] === r1 && start[1] === c1) && (end[0] === r2 && end[1] === c2)) ||
         ((start[0] === r2 && start[1] === c2) && (end[0] === r1 && end[1] === c1));
}

function checkWin() {
  // All colors must be connected
  for (let i = 0; i < puzzle.numColors; i++) {
    if (!isConnected(i)) return false;
  }
  // All cells must be covered
  for (let r = 0; r < puzzle.rows; r++) {
    for (let c = 0; c < puzzle.cols; c++) {
      if (grid[r][c] === -1) return false;
    }
  }
  return true;
}

function countFilledCells() {
  let count = 0;
  for (let r = 0; r < puzzle.rows; r++)
    for (let c = 0; c < puzzle.cols; c++)
      if (grid[r][c] !== -1) count++;
  return count;
}

function clearPathFromGrid(colorIndex) {
  for (let r = 0; r < puzzle.rows; r++)
    for (let c = 0; c < puzzle.cols; c++)
      if (grid[r][c] === colorIndex) grid[r][c] = -1;
}

function applyPathToGrid(colorIndex, path) {
  for (const [r, c] of path) {
    grid[r][c] = colorIndex;
  }
}

function saveUndo() {
  const snapshot = {
    paths: {},
    grid: grid.map(row => [...row]),
    moveCount,
  };
  for (const k in paths) {
    snapshot.paths[k] = paths[k].map(p => [...p]);
  }
  undoStack.push(snapshot);
  if (undoStack.length > 50) undoStack.shift();
}

function doUndo() {
  if (undoStack.length === 0 || gameWon) return;
  Audio.undo();
  const snapshot = undoStack.pop();
  paths = {};
  for (const k in snapshot.paths) {
    paths[k] = snapshot.paths[k].map(p => [...p]);
  }
  grid = snapshot.grid;
  moveCount = snapshot.moveCount;
  updateUI();
  render();
}

function resetLevel() {
  initGrid();
  moveCount = 0;
  totalMoves = 0;
  startTime = Date.now();
  updateUI();
  render();
}

// ═══════════════════════════════════════════════
// HINT SYSTEM
// ═══════════════════════════════════════════════
function useHint() {
  if (progress.hints <= 0 || gameWon) return;
  // Find an unconnected color
  for (let i = 0; i < puzzle.numColors; i++) {
    if (!isConnected(i)) {
      progress.hints--;
      saveProgress();
      // Reveal a cell from the solution that isn't already filled correctly
      const sol = puzzle.solution[i];
      let revealed = false;
      for (const [r, c] of sol) {
        if (grid[r][c] !== i) {
          hintCells.push({r, c, colorIndex: i, alpha: 1});
          revealed = true;
          break;
        }
      }
      if (!revealed) {
        // All cells are correct, reveal nothing
        progress.hints++;
      }
      updateUI();
      render();
      break;
    }
  }
}

// ═══════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════
function calculateScore() {
  const filled = countFilledCells();
  const baseScore = filled * 10;
  const elapsed = (Date.now() - startTime) / 1000;
  const timeBonus = Math.max(0, Math.floor((300 - elapsed) * 5));
  // Perfect bonus: all cells filled (which is guaranteed on win)
  const perfectBonus = 500;
  return { baseScore, timeBonus, perfectBonus, total: baseScore + timeBonus + perfectBonus, elapsed };
}

function calculateStars(elapsed) {
  if (elapsed < 60) return 3;
  if (elapsed < 120) return 2;
  return 1;
}

// ═══════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════
function calcCellSize() {
  const maxW = Math.min(window.innerWidth - 16, 520);
  const maxH = window.innerHeight - 160;
  const maxDim = Math.min(maxW, maxH);
  return Math.floor(maxDim / Math.max(puzzle.rows, puzzle.cols));
}

function render() {
  if (!canvas || !puzzle) return;
  const cellSize = calcCellSize();
  const w = cellSize * puzzle.cols;
  const h = cellSize * puzzle.rows;

  // Resize canvas if needed
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }

  ctx.clearRect(0, 0, w, h);

  // Draw background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, w, h);

  // Draw grid lines
  ctx.strokeStyle = '#1a1a3a';
  ctx.lineWidth = 1;
  for (let r = 0; r <= puzzle.rows; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * cellSize);
    ctx.lineTo(w, r * cellSize);
    ctx.stroke();
  }
  for (let c = 0; c <= puzzle.cols; c++) {
    ctx.beginPath();
    ctx.moveTo(c * cellSize, 0);
    ctx.lineTo(c * cellSize, h);
    ctx.stroke();
  }

  // Draw hint cells
  for (const hint of hintCells) {
    if (hint.alpha <= 0) continue;
    ctx.globalAlpha = hint.alpha * 0.4;
    ctx.fillStyle = COLORS[hint.colorIndex];
    ctx.fillRect(hint.c * cellSize + 2, hint.r * cellSize + 2, cellSize - 4, cellSize - 4);
    ctx.globalAlpha = 1;
  }

  // Draw paths
  for (let i = 0; i < puzzle.numColors; i++) {
    drawPath(i);
  }

  // Draw current drawing path
  if (drawing) {
    drawPathLine(drawing.path, COLORS[drawing.colorIndex], 0.6);
  }

  // Draw dots
  for (let i = 0; i < puzzle.numColors; i++) {
    const [r1, c1, r2, c2] = puzzle.endpoints[i];
    const connected = isConnected(i);
    const pulseScale = 1 + Math.sin(dotPulse + i * 0.7) * 0.05;
    drawDot(c1, r1, COLORS[i], cellSize, connected, pulseScale);
    drawDot(c2, r2, COLORS[i], cellSize, connected, pulseScale);
  }

  // Draw particles
  drawParticles();
}

function drawPath(colorIndex) {
  const path = paths[colorIndex];
  if (!path || path.length < 1) return;
  const connected = isConnected(colorIndex);
  const alpha = connected ? 1.0 : 0.7;
  drawPathLine(path, COLORS[colorIndex], alpha);
}

function drawPathLine(path, color, alpha) {
  if (path.length < 1) return;
  const cellSize = calcCellSize();
  const half = cellSize / 2;
  const lineW = cellSize * 0.4;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = lineW;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Glow effect
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;

  ctx.beginPath();
  ctx.moveTo(path[0][1] * cellSize + half, path[0][0] * cellSize + half);
  for (let i = 1; i < path.length; i++) {
    ctx.lineTo(path[i][1] * cellSize + half, path[i][0] * cellSize + half);
  }
  ctx.stroke();
  ctx.restore();
}

function drawDot(col, row, color, cellSize, connected, pulseScale) {
  const half = cellSize / 2;
  const x = col * cellSize + half;
  const y = row * cellSize + half;
  const radius = cellSize * 0.35 * pulseScale;

  ctx.save();
  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = connected ? 15 : 10;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();

  // Inner highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(x - radius * 0.2, y - radius * 0.2, radius * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════
function spawnParticles() {
  const cellSize = calcCellSize();
  const cx = (canvas.width) / 2;
  const cy = (canvas.height) / 2;
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.01 + Math.random() * 0.02,
      color: COLORS[Math.floor(Math.random() * puzzle.numColors)],
      size: 2 + Math.random() * 4,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1; // gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════════
function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  const cellSize = calcCellSize();
  const col = Math.floor(x / cellSize);
  const row = Math.floor(y / cellSize);
  if (row < 0 || row >= puzzle.rows || col < 0 || col >= puzzle.cols) return null;
  return { row, col };
}

function onPointerDown(e) {
  if (gameWon) return;
  e.preventDefault();
  const cell = getCellFromEvent(e);
  if (!cell) return;

  const { row, col } = cell;
  const epColor = isEndpoint(row, col);

  if (epColor >= 0) {
    // Start drawing from this endpoint
    saveUndo();
    // Clear existing path for this color
    clearPathFromGrid(epColor);
    delete paths[epColor];
    drawing = { colorIndex: epColor, path: [[row, col]] };
    grid[row][col] = epColor;
    Audio.draw();
    render();
    return;
  }

  // Check if clicking on existing path of same color - start redrawing from that point
  const existingColor = grid[row][col];
  if (existingColor >= 0) {
    const path = paths[existingColor];
    if (path) {
      // Find the closest endpoint to the clicked cell in the path
      const idx = path.findIndex(p => p[0] === row && p[1] === col);
      if (idx >= 0) {
        saveUndo();
        const colorIdx = existingColor;
        clearPathFromGrid(colorIdx);
        // Keep path up to clicked point (or from start to clicked)
        const newPath = path.slice(0, idx + 1);
        paths[colorIdx] = newPath;
        applyPathToGrid(colorIdx, newPath);
        drawing = { colorIndex: colorIdx, path: [...newPath] };
        Audio.draw();
        render();
        return;
      }
    }
  }
}

function onPointerMove(e) {
  if (!drawing || gameWon) return;
  e.preventDefault();
  const cell = getCellFromEvent(e);
  if (!cell) return;

  const { row, col } = cell;
  const last = drawing.path[drawing.path.length - 1];
  if (last[0] === row && last[1] === col) return;

  // Check adjacency
  const dr = row - last[0];
  const dc = col - last[1];
  if (Math.abs(dr) + Math.abs(dc) !== 1) return;

  // Check if cell is occupied by another color
  const cellColor = grid[row][col];

  // If we're stepping back onto our own path, truncate
  if (cellColor === drawing.colorIndex) {
    const idx = drawing.path.findIndex(p => p[0] === row && p[1] === col);
    if (idx >= 0) {
      // Remove cells after idx from grid
      for (let i = drawing.path.length - 1; i > idx; i--) {
        const [pr, pc] = drawing.path[i];
        if (isEndpoint(pr, pc) !== drawing.colorIndex) {
          grid[pr][pc] = -1;
        }
      }
      drawing.path = drawing.path.slice(0, idx + 1);
      paths[drawing.colorIndex] = [...drawing.path];
      render();
      return;
    }
  }

  // Can't enter another color's cell
  if (cellColor >= 0 && cellColor !== drawing.colorIndex) {
    // Check if it's our matching endpoint
    const epColor = isEndpoint(row, col);
    if (epColor !== drawing.colorIndex) {
      return; // blocked
    }
  }

  // Check if this endpoint belongs to another color
  const epColor = isEndpoint(row, col);
  if (epColor >= 0 && epColor !== drawing.colorIndex) {
    return; // Can't enter another color's endpoint
  }

  // Valid move
  drawing.path.push([row, col]);
  grid[row][col] = drawing.colorIndex;
  moveCount++;
  Audio.draw();

  // Check if we reached the matching endpoint
  const [er1, ec1, er2, ec2] = puzzle.endpoints[drawing.colorIndex];
  const start = drawing.path[0];
  const end = drawing.path[drawing.path.length - 1];
  const reachedEnd =
    ((start[0] === er1 && start[1] === ec1) && (end[0] === er2 && end[1] === ec2)) ||
    ((start[0] === er2 && start[1] === ec2) && (end[0] === er1 && end[1] === ec1));

  if (reachedEnd) {
    paths[drawing.colorIndex] = [...drawing.path];
    Audio.connect();
    drawing = null;

    // Check win
    if (checkWin()) {
      onWin();
    }
  }

  updateUI();
  render();
}

function onPointerUp(e) {
  if (!drawing) return;
  // Save the drawing path
  if (drawing.path.length >= 1) {
    paths[drawing.colorIndex] = [...drawing.path];
  }
  drawing = null;
  render();
}

function onPointerCancel(e) {
  if (drawing && drawing.path.length >= 1) {
    paths[drawing.colorIndex] = [...drawing.path];
  }
  drawing = null;
  render();
}

// ═══════════════════════════════════════════════
// WIN HANDLING
// ═══════════════════════════════════════════════
function onWin() {
  gameWon = true;
  clearInterval(timerInterval);

  const { baseScore, timeBonus, perfectBonus, total, elapsed } = calculateScore();
  const stars = calculateStars(elapsed);

  // Save progress
  let levelId;
  if (isDaily) {
    levelId = 'daily-' + getDailySeed();
  } else {
    levelId = getLevelId(currentPack, currentLevel);
  }

  const prev = progress.completedLevels[levelId];
  if (!prev || stars > prev.stars) {
    progress.completedLevels[levelId] = {
      stars,
      bestScore: Math.max(total, prev ? prev.bestScore : 0),
      bestTime: Math.min(elapsed, prev ? prev.bestTime : Infinity),
    };
  } else {
    progress.completedLevels[levelId].bestScore = Math.max(total, prev.bestScore);
    progress.completedLevels[levelId].bestTime = Math.min(elapsed, prev.bestTime);
  }

  // Earn hints back for 3-star
  if (stars === 3) {
    progress.hints = Math.min(progress.hints + 1, 99);
  }
  saveProgress();

  // Show win modal
  showWinModal(stars, total, elapsed);
  spawnParticles();
  Audio.win();
}

function showWinModal(stars, score, elapsed) {
  const starsHtml = [1, 2, 3].map((s, i) =>
    `<span class="star ${s <= stars ? 'filled star-pop' : 'star-pop'}" style="animation-delay:${i * 0.15}s">★</span>`
  ).join('');
  $('result-stars').innerHTML = starsHtml;
  $('result-moves').textContent = `Moves: ${moveCount} | Time: ${formatTime(elapsed)}`;
  $('result-score').textContent = `Score: ${score}`;
  $('win-title').textContent = isDaily ? 'Daily Complete!' : 'Level Complete!';

  // Hide next button for daily or last level
  if (isDaily || (currentPack === 4 && currentLevel === 19)) {
    hide($('btn-next'));
  } else {
    show($('btn-next'));
  }

  show($('win-modal'));
}

// ═══════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateUI() {
  $('move-count').textContent = moveCount;
  $('hint-count').textContent = `(${progress.hints})`;
}

function updateTimer() {
  if (gameWon) return;
  const elapsed = (Date.now() - startTime) / 1000;
  $('timer').textContent = formatTime(elapsed);
}

function showScreen(screenId) {
  ['title-screen', 'level-select', 'game-screen'].forEach(id => {
    hide($(id));
  });
  show($(screenId));
}

// ═══════════════════════════════════════════════
// LEVEL SELECT
// ═══════════════════════════════════════════════
let selectedPack = 0;

function buildPackTabs() {
  const container = $('pack-tabs');
  container.innerHTML = '';
  PACKS.forEach((pack, i) => {
    const btn = document.createElement('button');
    btn.className = 'pack-tab' + (i === selectedPack ? ' active' : '');
    btn.textContent = pack.name;
    btn.onclick = () => {
      selectedPack = i;
      buildPackTabs();
      buildLevelGrid();
    };
    container.appendChild(btn);
  });
}

function buildLevelGrid() {
  const container = $('level-grid');
  container.innerHTML = '';
  const pack = PACKS[selectedPack];

  for (let i = 0; i < pack.levels; i++) {
    const btn = document.createElement('button');
    const unlocked = isLevelUnlocked(selectedPack, i);
    const levelId = getLevelId(selectedPack, i);
    const data = progress.completedLevels[levelId];

    btn.className = 'level-btn';
    btn.disabled = !unlocked;
    btn.innerHTML = `${i + 1}<div class="stars">${data ? '★'.repeat(data.stars) + '☆'.repeat(3 - data.stars) : ''}</div>`;

    if (unlocked) {
      btn.onclick = () => startLevel(selectedPack, i);
    }
    container.appendChild(btn);
  }
}

function showLevelSelect() {
  buildPackTabs();
  buildLevelGrid();
  showScreen('level-select');
}

// ═══════════════════════════════════════════════
// START LEVEL
// ═══════════════════════════════════════════════
function startLevel(packIdx, lvlIdx) {
  currentPack = packIdx;
  currentLevel = lvlIdx;
  isDaily = false;

  const pack = PACKS[packIdx];
  const seed = getLevelSeed(packIdx, lvlIdx);
  puzzle = generatePuzzle(seed, pack.grid, pack.grid, pack.colors);

  if (!puzzle) {
    // Fallback: try with one fewer color
    puzzle = generatePuzzle(seed, pack.grid, pack.grid, Math.max(2, pack.colors - 1));
  }

  initGrid();
  startTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);

  $('level-title').textContent = `${pack.name} ${lvlIdx + 1}`;
  showScreen('game-screen');
  updateUI();
  render();
}

function startDaily() {
  isDaily = true;
  const seed = getDailySeed();
  puzzle = generatePuzzle(seed, 7, 7, 6);

  if (!puzzle) {
    puzzle = generatePuzzle(seed, 7, 7, 5);
  }

  initGrid();
  startTime = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);

  const d = new Date();
  const dateStr = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
  $('level-title').textContent = `Daily ${dateStr}`;
  showScreen('game-screen');
  updateUI();
  render();
}

// ═══════════════════════════════════════════════
// TITLE SCREEN ANIMATION
// ═══════════════════════════════════════════════
function animateTitle() {
  const tc = $('title-canvas');
  const tctx = tc.getContext('2d');
  const w = tc.width, h = tc.height;

  function drawFrame() {
    tctx.clearRect(0, 0, w, h);
    const t = Date.now() / 1000;

    // Draw animated flowing lines
    for (let i = 0; i < 6; i++) {
      tctx.save();
      tctx.strokeStyle = COLORS[i % COLORS.length];
      tctx.globalAlpha = 0.4;
      tctx.lineWidth = 3;
      tctx.shadowColor = COLORS[i % COLORS.length];
      tctx.shadowBlur = 8;
      tctx.lineCap = 'round';
      tctx.beginPath();
      const yBase = 20 + i * 18;
      for (let x = 0; x < w; x += 2) {
        const y = yBase + Math.sin(x * 0.03 + t * 2 + i * 1.2) * 12;
        if (x === 0) tctx.moveTo(x, y);
        else tctx.lineTo(x, y);
      }
      tctx.stroke();
      tctx.restore();
    }

    // Draw some dots
    for (let i = 0; i < 5; i++) {
      const x = 30 + i * 65;
      const y = h / 2 + Math.sin(t * 1.5 + i) * 15;
      tctx.save();
      tctx.fillStyle = COLORS[i];
      tctx.shadowColor = COLORS[i];
      tctx.shadowBlur = 12;
      tctx.beginPath();
      tctx.arc(x, y, 6, 0, Math.PI * 2);
      tctx.fill();
      tctx.restore();
    }

    requestAnimationFrame(drawFrame);
  }
  drawFrame();
}

// ═══════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════
function gameLoop() {
  dotPulse += 0.05;
  updateParticles();

  // Fade hint cells
  for (let i = hintCells.length - 1; i >= 0; i--) {
    hintCells[i].alpha -= 0.005;
    if (hintCells[i].alpha <= 0) hintCells.splice(i, 1);
  }

  if (puzzle && !$('game-screen').classList.contains('hidden')) {
    render();
  }

  animFrame = requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════
// EVENT BINDINGS
// ═══════════════════════════════════════════════
function bindEvents() {
  // Canvas input
  canvas = $('game-canvas');
  ctx = canvas.getContext('2d');

  canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
  canvas.addEventListener('pointermove', onPointerMove, { passive: false });
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointerleave', onPointerUp);
  canvas.addEventListener('pointercancel', onPointerCancel);

  // Prevent default touch behavior on canvas
  canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

  // Navigation
  $('btn-play').onclick = () => showLevelSelect();
  $('btn-daily').onclick = () => startDaily();
  $('btn-levels-back').onclick = () => showScreen('title-screen');
  $('btn-back').onclick = () => {
    clearInterval(timerInterval);
    showLevelSelect();
  };
  $('btn-restart').onclick = () => resetLevel();
  $('btn-undo').onclick = () => doUndo();
  $('btn-hint').onclick = () => useHint();

  $('btn-next').onclick = () => {
    hide($('win-modal'));
    if (currentLevel < 19) {
      startLevel(currentPack, currentLevel + 1);
    } else if (currentPack < 4) {
      startLevel(currentPack + 1, 0);
    }
  };

  $('btn-win-levels').onclick = () => {
    hide($('win-modal'));
    clearInterval(timerInterval);
    showLevelSelect();
  };

  // Sound toggle
  $('sound-toggle').onclick = () => {
    soundEnabled = !soundEnabled;
    $('sound-toggle').textContent = `Sound: ${soundEnabled ? 'ON' : 'OFF'}`;
  };

  // Music toggle (separate from sound effects)
  $('music-toggle').onclick = () => {
    const playing = backgroundMusic.toggle();
    $('music-toggle').textContent = playing ? '♪ Music: ON' : '♪ Music: OFF';
    $('music-toggle').classList.toggle('active', playing);
  };

  // Tutorial
  const tutShown = localStorage.getItem('flow-connect-tutorial');
  if (!tutShown) {
    show($('tutorial-overlay'));
  }
  $('btn-tutorial-ok').onclick = () => {
    hide($('tutorial-overlay'));
    localStorage.setItem('flow-connect-tutorial', '1');
  };

  // Resize
  window.addEventListener('resize', () => {
    if (puzzle && !$('game-screen').classList.contains('hidden')) render();
  });
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
loadProgress();
bindEvents();
animateTitle();
gameLoop();

})();
</script>
