<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Crankshaft Linkage — Slider-Crank Mechanism Puzzle</title>
<meta name="description" content="Rotate crankshafts to drive connecting rods and align every slider to its target. 30 mechanical linkage puzzles with unique solutions. Free HTML5 puzzle game.">
<link rel="icon" href="icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0e17;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
canvas{display:block;touch-action:none}
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:480px;padding:16px}
.screen.active{display:flex}
h1{font-size:1.6rem;text-align:center;margin:8px 0;background:linear-gradient(90deg,#ffa726,#ff7043);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#888;font-size:.85rem;text-align:center;margin-bottom:12px}
.btn{background:linear-gradient(135deg,#ff7043,#f4511e);color:#fff;border:none;padding:14px 32px;border-radius:12px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:transform .1s,box-shadow .2s;width:100%;margin:6px 0}
.btn:active{transform:scale(.96)}
.btn.sec{background:linear-gradient(135deg,#37474f,#263238)}
.btn:disabled{opacity:.4;cursor:default}
#level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;margin-top:8px}
.lvl-btn{aspect-ratio:1;background:#1a2332;border:2px solid #2a3548;border-radius:10px;color:#ffa726;font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.lvl-btn:active{transform:scale(.92)}
.lvl-btn.locked{opacity:.3;cursor:default}
.lvl-btn.done{background:linear-gradient(135deg,#1b5e20,#2e7d32);border-color:#4caf50;color:#a5d6a7}
.lvl-btn .stars{position:absolute;bottom:2px;font-size:.5rem;letter-spacing:-1px}
#game-canvas{background:#0d1320;border-radius:12px;border:1px solid #1a2a3a;margin:8px 0;max-width:100%}
.hud{display:flex;justify-content:space-between;width:100%;padding:4px 8px;font-size:.85rem;color:#aaa}
.hud span{color:#ffa726;font-weight:600}
.controls{display:flex;gap:8px;width:100%;margin-top:6px;flex-wrap:wrap}
.crank-ctrl{flex:1;min-width:100px;background:#152030;border:1px solid #2a3a50;border-radius:10px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:4px}
.crank-ctrl .label{font-size:.75rem;color:#888}
.crank-ctrl .row{display:flex;gap:6px}
.crank-ctrl button{width:38px;height:34px;border-radius:8px;border:none;background:#1a2a3e;color:#ffa726;font-size:1.1rem;font-weight:700;cursor:pointer}
.crank-ctrl button:active{transform:scale(.9);background:#2a3a50}
.crank-ctrl .pos{font-size:.7rem;color:#4fc3f7}
.win-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,10,20,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.win-overlay.active{display:flex}
.win-overlay h2{font-size:2rem;background:linear-gradient(90deg,#ffd54f,#ffa726);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.win-overlay .stars{font-size:2.5rem;margin:12px}
.win-overlay .par{color:#aaa;margin-bottom:16px}
.top-bar{display:flex;justify-content:space-between;width:100%;align-items:center;margin-bottom:4px}
.top-bar .back{background:none;border:none;color:#888;font-size:1.2rem;cursor:pointer;padding:4px 8px}
</style>
</head>
<body>
<div id="menu-screen" class="screen active">
<div class="top-bar"><span style="width:32px"></span><h1>🔧 Crankshaft Linkage</h1><span style="width:32px"></span></div>
<p class="subtitle">Rotate crankshafts → drive rods → align sliders. 30 mechanical puzzles.</p>
<canvas id="menu-preview" width="440" height="140"></canvas>
<div style="height:12px"></div>
<button class="btn" id="play-btn">▶ Play</button>
<button class="btn sec" id="levels-btn">📋 Levels</button>
<div id="level-grid"></div>
</div>

<div id="game-screen" class="screen">
<div class="top-bar">
<button class="back" id="menu-back">‹ Menu</button>
<h1 style="font-size:1.1rem" id="level-title">Level 1</h1>
<button class="back" id="reset-btn">↻</button>
</div>
<div class="hud"><span>Steps: <span id="step-count">0</span>/<span id="par-display">3</span></span><span>Aligned: <span id="align-count">0</span>/<span id="total-cranks">2</span></span></div>
<canvas id="game-canvas" width="440" height="320"></canvas>
<div class="controls" id="crank-controls"></div>
<div style="height:8px"></div>
<button class="btn sec" id="next-btn" style="display:none">Next →</button>
</div>

<div id="win-overlay" class="win-overlay">
<h2 id="win-title">Solved!</h2>
<div class="stars" id="win-stars">⭐⭐⭐</div>
<p class="par" id="win-par"></p>
<button class="btn" id="win-next">Next Level →</button>
<button class="btn sec" id="win-menu">Menu</button>
</div>

<script>
const LEVELS = [{"n":2,"p":6,"r":80,"t":[80.0,-80.0],"s":[0,3],"par":3},{"n":2,"p":6,"r":80,"t":[80.0,-80.0],"s":[0,3],"par":3},{"n":2,"p":6,"r":80,"t":[80.0,-80.0],"s":[0,3],"par":3},{"n":2,"p":6,"r":80,"t":[80.0,-80.0],"s":[0,3],"par":3},{"n":2,"p":6,"r":80,"t":[80.0,80.0],"s":[0,0],"par":0},{"n":3,"p":8,"r":90,"t":[90.0,-90.0,90.0],"s":[0,4,0],"par":4},{"n":3,"p":8,"r":90,"t":[-90.0,-90.0,-90.0],"s":[4,4,4],"par":12},{"n":3,"p":8,"r":90,"t":[90.0,90.0,-90.0],"s":[0,0,4],"par":4},{"n":3,"p":8,"r":90,"t":[90.0,-90.0,90.0],"s":[0,4,0],"par":4},{"n":3,"p":8,"r":90,"t":[90.0,90.0,90.0],"s":[0,0,0],"par":0},{"n":4,"p":8,"r":100,"t":[100.0,100.0,100.0,100.0],"s":[0,0,0,0],"par":0},{"n":4,"p":8,"r":100,"t":[-100.0,100.0,-100.0,100.0],"s":[4,0,4,0],"par":8},{"n":4,"p":8,"r":100,"t":[100.0,-100.0,100.0,-100.0],"s":[0,4,0,4],"par":8},{"n":4,"p":8,"r":100,"t":[100.0,100.0,-100.0,100.0],"s":[0,0,4,0],"par":4},{"n":4,"p":8,"r":100,"t":[100.0,-100.0,100.0,100.0],"s":[0,4,0,0],"par":4},{"n":5,"p":10,"r":110,"t":[110.0,110.0,110.0,-110.0,-110.0],"s":[0,0,0,5,5],"par":10},{"n":5,"p":10,"r":110,"t":[-110.0,110.0,110.0,110.0,-110.0],"s":[5,0,0,0,5],"par":10},{"n":5,"p":10,"r":110,"t":[-110.0,-110.0,-110.0,-110.0,-110.0],"s":[5,5,5,5,5],"par":25},{"n":5,"p":10,"r":110,"t":[110.0,-110.0,110.0,-110.0,110.0],"s":[0,5,0,5,0],"par":10},{"n":5,"p":10,"r":110,"t":[110.0,110.0,-110.0,-110.0,110.0],"s":[0,0,5,5,0],"par":10},{"n":6,"p":10,"r":120,"t":[120.0,120.0,-120.0,-120.0,-120.0,-120.0],"s":[0,0,5,5,5,5],"par":20},{"n":6,"p":10,"r":120,"t":[120.0,-120.0,-120.0,120.0,120.0,-120.0],"s":[0,5,5,0,0,5],"par":15},{"n":6,"p":10,"r":120,"t":[120.0,120.0,120.0,120.0,120.0,-120.0],"s":[0,0,0,0,0,5],"par":5},{"n":6,"p":10,"r":120,"t":[-120.0,-120.0,120.0,-120.0,120.0,-120.0],"s":[5,5,0,5,0,5],"par":20},{"n":6,"p":10,"r":120,"t":[120.0,-120.0,-120.0,120.0,120.0,120.0],"s":[0,5,5,0,0,0],"par":10},{"n":6,"p":12,"r":130,"t":[-130.0,130.0,130.0,130.0,-130.0,130.0],"s":[6,0,0,0,6,0],"par":12},{"n":6,"p":12,"r":130,"t":[-130.0,130.0,130.0,130.0,-130.0,130.0],"s":[6,0,0,0,6,0],"par":12},{"n":6,"p":12,"r":130,"t":[-130.0,130.0,130.0,130.0,-130.0,130.0],"s":[6,0,0,0,6,0],"par":12},{"n":6,"p":12,"r":130,"t":[-130.0,-130.0,-130.0,-130.0,-130.0,130.0],"s":[6,6,6,6,6,0],"par":30},{"n":6,"p":12,"r":130,"t":[-130.0,-130.0,-130.0,-130.0,-130.0,130.0],"s":[6,6,6,6,6,0],"par":30}];
const RADIUS_SCALE = 0.9;

// ===== Audio =====
var actx = null;
function audioInit(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function beep(freq, dur, type, vol){
  type = type||'sine'; vol = vol||0.08;
  if(!actx) return;
  var o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime + dur);
}
function sfxRotate(){ beep(220, 0.08, 'square', 0.06); setTimeout(function(){beep(280,0.06,'square',0.05);},40); }
function sfxAlign(){ beep(660, 0.12, 'sine', 0.08); }
function sfxWin(){ [523,659,784,1047].forEach(function(f,i){setTimeout(function(){beep(f,0.2,'sine',0.1);},i*100);}); }

// ===== Progress =====
function loadProgress(){
  try { return JSON.parse(localStorage.getItem('crankshaft_progress')||'{}'); }
  catch(e){ return {}; }
}
function saveProgress(p){
  try { localStorage.setItem('crankshaft_progress', JSON.stringify(p)); } catch(e){}
}

// ===== Slider position (matches gen_levels.py) =====
function sliderX(angleIdx, nPos, radius){
  var ang = angleIdx * 2 * Math.PI / nPos;
  return Math.round(radius * Math.cos(ang) * 10) / 10;
}

// ===== State =====
var currentLevel = 0;
var crankAngles = [];
var steps = 0;
var gameData = null;

function showScreen(id){
  var screens = document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function startGame(){
  audioInit();
  var p = loadProgress();
  var start = 0;
  for(var i=0;i<LEVELS.length;i++){ if(p[i] && p[i].done) start = i+1; }
  currentLevel = Math.min(start, LEVELS.length-1);
  loadLevel(currentLevel);
  showScreen('game-screen');
}

function renderLevelGrid(){
  var grid = document.getElementById('level-grid');
  var p = loadProgress();
  grid.innerHTML='';
  var unlocked = 1;
  for(var i=0;i<LEVELS.length;i++){ if(p[i]&&p[i].done) unlocked = i+2; }
  for(var i=0;i<LEVELS.length;i++){
    var btn = document.createElement('div');
    btn.className = 'lvl-btn';
    var locked = i >= unlocked;
    if(locked){ btn.classList.add('locked'); btn.textContent = '🔒'; }
    else if(p[i] && p[i].done){ btn.classList.add('done'); btn.innerHTML = (i+1)+'<span class="stars">'+'★'.repeat(p[i].stars||1)+'</span>'; }
    else { btn.textContent = (i+1); }
    if(!locked){
      (function(idx){ btn.onclick = function(){ audioInit(); currentLevel=idx; loadLevel(idx); showScreen('game-screen'); }; })(i);
    }
    grid.appendChild(btn);
  }
}

function loadLevel(idx){
  currentLevel = idx;
  gameData = LEVELS[idx];
  crankAngles = [];
  for(var c=0;c<gameData.n;c++) crankAngles.push(0);
  steps = 0;
  document.getElementById('level-title').textContent = 'Level ' + (idx+1);
  document.getElementById('par-display').textContent = gameData.par;
  document.getElementById('total-cranks').textContent = gameData.n;
  document.getElementById('next-btn').style.display = 'none';
  renderControls();
  renderGame();
  updateHUD();
}

function renderControls(){
  var cont = document.getElementById('crank-controls');
  cont.innerHTML = '';
  for(var c=0;c<gameData.n;c++){
    var div = document.createElement('div');
    div.className = 'crank-ctrl';
    div.innerHTML = '<div class="label">Crank '+(c+1)+'</div>'+
      '<div class="row"><button id="cc-'+c+'-l">‹</button>'+
      '<button id="cc-'+c+'-r">›</button></div>'+
      '<div class="pos" id="pos-'+c+'">pos 0</div>';
    cont.appendChild(div);
    (function(ci){
      document.getElementById('cc-'+ci+'-l').onclick = function(){ rotateCrank(ci,-1); };
      document.getElementById('cc-'+ci+'-r').onclick = function(){ rotateCrank(ci,1); };
    })(c);
  }
}

function rotateCrank(c, dir){
  audioInit();
  crankAngles[c] = (crankAngles[c] + dir + gameData.p) % gameData.p;
  steps++;
  sfxRotate();
  var targetX = sliderX(gameData.s[c], gameData.p, gameData.r);
  var currX = sliderX(crankAngles[c], gameData.p, gameData.r);
  if(Math.abs(currX - targetX) < 0.5) sfxAlign();
  document.getElementById('pos-'+c).textContent = 'pos '+crankAngles[c];
  renderGame();
  updateHUD();
  checkWin();
}

function updateHUD(){
  document.getElementById('step-count').textContent = steps;
  var aligned = 0;
  for(var c=0;c<gameData.n;c++){
    var tx = sliderX(gameData.s[c], gameData.p, gameData.r);
    var cx = sliderX(crankAngles[c], gameData.p, gameData.r);
    if(Math.abs(tx - cx) < 0.5) aligned++;
  }
  document.getElementById('align-count').textContent = aligned;
}

function checkWin(){
  var allAligned = true;
  for(var c=0;c<gameData.n;c++){
    var tx = sliderX(gameData.s[c], gameData.p, gameData.r);
    var cx = sliderX(crankAngles[c], gameData.p, gameData.r);
    if(Math.abs(tx - cx) >= 0.5){ allAligned = false; break; }
  }
  if(!allAligned) return;
  sfxWin();
  var stars = steps <= gameData.par ? 3 : steps <= gameData.par*1.5 ? 2 : 1;
  var p = loadProgress();
  if(!p[currentLevel] || (p[currentLevel].stars||0) < stars){
    p[currentLevel] = {done:true, stars:stars};
    saveProgress(p);
  }
  document.getElementById('win-stars').textContent = '⭐'.repeat(stars);
  document.getElementById('win-par').textContent = 'Steps: '+steps+' / Par: '+gameData.par;
  document.getElementById('win-overlay').classList.add('active');
}

function nextLevel(){
  document.getElementById('win-overlay').classList.remove('active');
  if(currentLevel < LEVELS.length-1) loadLevel(currentLevel+1);
  else goMenu();
}

function goMenu(){
  document.getElementById('win-overlay').classList.remove('active');
  showScreen('menu-screen');
  renderLevelGrid();
  drawMenuPreview();
}

function resetLevel(){ loadLevel(currentLevel); }

// ===== Canvas =====
function renderGame(){
  var cv = document.getElementById('game-canvas');
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  ctx.fillStyle = '#0d1320';
  ctx.fillRect(0,0,W,H);
  var n = gameData.n;
  var radius = gameData.r * RADIUS_SCALE;
  var trackY = H - 50;
  var crankCX = W/2;
  var spacing = Math.min(60, (W - 80) / n);
  var startX = crankCX - (spacing*(n-1))/2;
  for(var c=0;c<n;c++){
    var cx = startX + c*spacing;
    var cy = trackY - radius - 30;
    ctx.strokeStyle = '#1a2a3a'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(cx - radius - 10, trackY); ctx.lineTo(cx + radius + 10, trackY); ctx.stroke();
    var targetX = cx + sliderX(gameData.s[c], gameData.p, gameData.r);
    ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 3; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(targetX, trackY - 14); ctx.lineTo(targetX, trackY + 14); ctx.stroke();
    ctx.setLineDash([]);
    var sliderXpos = cx + sliderX(crankAngles[c], gameData.p, gameData.r);
    var crankPinX = cx + radius * Math.cos(crankAngles[c]*2*Math.PI/gameData.p);
    var crankPinY = cy + radius * Math.sin(crankAngles[c]*2*Math.PI/gameData.p);
    ctx.strokeStyle = '#78909c'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(crankPinX, crankPinY); ctx.lineTo(sliderXpos, trackY); ctx.stroke();
    ctx.strokeStyle = '#37474f'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, 2*Math.PI); ctx.stroke();
    ctx.strokeStyle = '#ffa726'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(crankPinX, crankPinY); ctx.stroke();
    ctx.fillStyle = '#546e7a'; ctx.beginPath(); ctx.arc(cx, cy, 5, 0, 2*Math.PI); ctx.fill();
    ctx.fillStyle = '#ff7043'; ctx.beginPath(); ctx.arc(crankPinX, crankPinY, 6, 0, 2*Math.PI); ctx.fill();
    var aligned = Math.abs(sliderX(crankAngles[c], gameData.p, gameData.r) - sliderX(gameData.s[c], gameData.p, gameData.r)) < 0.5;
    ctx.fillStyle = aligned ? '#4caf50' : '#42a5f5';
    ctx.fillRect(sliderXpos - 12, trackY - 10, 24, 20);
    ctx.strokeStyle = aligned ? '#a5d6a7' : '#90caf9'; ctx.lineWidth = 2;
    ctx.strokeRect(sliderXpos - 12, trackY - 10, 24, 20);
    ctx.fillStyle = '#888'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('C'+(c+1), cx, cy + radius + 16);
  }
}

function drawMenuPreview(){
  var cv = document.getElementById('menu-preview');
  if(!cv) return;
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  ctx.fillStyle = '#0d1320'; ctx.fillRect(0,0,W,H);
  var radius = 35, positions = [0,2,4], spacing = W/4, trackY = H - 25;
  for(var c=0;c<3;c++){
    var cx = spacing*(c+1), cy = trackY - radius - 20;
    ctx.strokeStyle='#1a2a3a'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(cx-radius-8,trackY); ctx.lineTo(cx+radius+8,trackY); ctx.stroke();
    var ang = positions[c]*2*Math.PI/6;
    var pinX = cx+radius*Math.cos(ang), pinY = cy+radius*Math.sin(ang);
    var slX = cx + Math.round(35*Math.cos(ang)*10)/10;
    ctx.strokeStyle='#78909c'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(pinX,pinY); ctx.lineTo(slX,trackY); ctx.stroke();
    ctx.strokeStyle='#37474f'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,radius,0,2*Math.PI); ctx.stroke();
    ctx.strokeStyle='#ffa726'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(pinX,pinY); ctx.stroke();
    ctx.fillStyle='#42a5f5'; ctx.fillRect(slX-10,trackY-8,20,16);
  }
}

// ===== Event listeners =====
document.getElementById('play-btn').onclick = startGame;
document.getElementById('levels-btn').onclick = function(){ renderLevelGrid(); showScreen('menu-screen'); };
document.getElementById('menu-back').onclick = goMenu;
document.getElementById('reset-btn').onclick = resetLevel;
document.getElementById('next-btn').onclick = nextLevel;
document.getElementById('win-next').onclick = nextLevel;
document.getElementById('win-menu').onclick = goMenu;

drawMenuPreview();
renderLevelGrid();
</script>
</body>
</html>
