// MONETAG ADS
const MONETAG_ZONES = {
  banner: 110120,
  native: 110121,
  interstitial: 110122
};

// Initialize
function init() {
  renderLevelGrid();
  loadProgress();
  setupKeyboard();
  showInterstitial();
}

function renderLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  const progress = JSON.parse(localStorage.getItem('snake-pit-progress') || '{}');
  
  for (let i = 0; i < LEVELS.length; i++) {
    const btn = document.createElement('button');
    btn.className = 'level-btn' + (progress[i]?.completed ? ' completed' : '');
    btn.textContent = i + 1;
    btn.onclick = () => startLevel(i);
    grid.appendChild(btn);
  }
}

function showInterstitial() {
  if (state.moves > 0 && state.currentLevel % 5 === 4) {
    // Trigger Monetag interstitial zone 110122
    console.log('Interstitial ad zone', MONETAG_ZONES.interstitial);
  }
}

function startLevel(idx) {
  state.currentLevel = idx;
  state.moves = 0;
  state.timer = 0;
  state.history = [];
  state.activeSnakeId = 1;
  // R323 fix: init userGrid (all 0 = unset) based on this level
  const level = LEVELS[idx];
  state.userGrid = new Array(level.rows * level.cols).fill(0);
  
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('win-modal').style.display = 'none';
  document.getElementById('level-num').textContent = idx + 1;
  
  renderGrid();
  renderPalette();
  attachCanvasInput();
  startTimer();
}

// Derive unique snake IDs from the solution grid (each distinct value = one snake)
function getLevelSnakeLengths() {
  const level = LEVELS[state.currentLevel];
  const ids = new Set();
  for (const v of level.solution) if (v > 0) ids.add(v);
  return Array.from(ids).sort((a, b) => a - b);
}

function renderPalette() {
  const palette = document.getElementById('palette');
  palette.innerHTML = '';
  const ids = getLevelSnakeLengths();
  // Create one palette button per snake ID
  ids.forEach((id) => {
    const btn = document.createElement('button');
    btn.className = 'palette-btn' + (id === state.activeSnakeId ? ' active' : '');
    btn.style.background = snakeColor(id);
    btn.textContent = id;
    btn.title = `Paint cells of snake ${id}`;
    btn.onclick = () => { state.activeSnakeId = id; renderPalette(); };
    palette.appendChild(btn);
  });
  // erase button
  const erase = document.createElement('button');
  erase.className = 'palette-btn erase' + (state.activeSnakeId === 0 ? ' active' : '');
  erase.textContent = '✕';
  erase.title = 'Erase (set cell to unset)';
  erase.onclick = () => { state.activeSnakeId = 0; renderPalette(); };
  palette.appendChild(erase);
}

// stable per-ID color
function snakeColor(id) {
  if (id === 0) return '#1a1a3e';
  const hues = [140, 200, 30, 280, 0, 60, 320, 180, 100, 240, 350, 20];
  const h = hues[(id - 1) % hues.length];
  return `hsl(${h}, 60%, 45%)`;
}

let _inputAttached = false;
function attachCanvasInput() {
  if (_inputAttached) return;
  const canvas = document.getElementById('grid-canvas');
  const ptHandler = (ev, isDown) => {
    if (ev.type === 'pointerdown') state.drawing = true;
    if (ev.type === 'pointerup' || ev.type === 'pointerleave') { state.drawing = false; state.lastPaintCell = null; return; }
    if (ev.type === 'pointermove' && !state.drawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = ev.clientX - rect.left;
    const y = ev.clientY - rect.top;
    const c = Math.floor(x / state.cellSize);
    const r = Math.floor(y / state.cellSize);
    const level = LEVELS[state.currentLevel];
    if (r < 0 || r >= level.rows || c < 0 || c >= level.cols) return;
    const key = r + ',' + c;
    if (state.lastPaintCell === key) return; // dedupe drag
    state.lastPaintCell = key;
    paintCell(r, c);
  };
  canvas.addEventListener('pointerdown', e => { e.preventDefault(); ptHandler(e, true); });
  canvas.addEventListener('pointermove', e => ptHandler(e, false));
  canvas.addEventListener('pointerup', e => ptHandler(e, false));
  canvas.addEventListener('pointerleave', e => ptHandler(e, false));
  canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; ptHandler({type:'pointerdown', clientX:t.clientX, clientY:t.clientY}, true); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; ptHandler({type:'pointermove', clientX:t.clientX, clientY:t.clientY}, false); }, {passive:false});
  canvas.addEventListener('touchend', e => ptHandler({type:'pointerup'}, false));
  _inputAttached = true;
}

function paintCell(r, c) {
  const idx = r * LEVELS[state.currentLevel].cols + c;
  const prev = state.userGrid[idx];
  const next = state.activeSnakeId;
  if (prev === next) return;
  state.history.push({idx, prev}); // for undo
  state.userGrid[idx] = next;
  state.moves++;
  if (state.sfxOn) try { playSFX('click'); } catch(e) {}
  renderGrid();
}

function renderGrid() {
  const level = LEVELS[state.currentLevel];
  const canvas = document.getElementById('grid-canvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('grid-container');
  
  // R323: fit canvas to viewport, max 320px
  const maxDim = Math.min(320, window.innerWidth - 40);
  const cellSize = Math.floor(Math.min(maxDim / level.cols, maxDim / level.rows));
  state.cellSize = cellSize;
  canvas.width = level.cols * cellSize;
  canvas.height = level.rows * cellSize;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
  
  container.innerHTML = '';
  
  // Draw cells: fill by userGrid assignment, grid lines on top
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const x = c * cellSize;
      const y = r * cellSize;
      const idx = r * level.cols + c;
      const sid = state.userGrid[idx] || 0;
      ctx.fillStyle = snakeColor(sid);
      ctx.fillRect(x, y, cellSize, cellSize);
      // border between different snake IDs (the "walls")
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, cellSize - 1, cellSize - 1);
    }
  }
  
  // Draw thick borders between cells of DIFFERENT snake IDs (the snake boundaries)
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.lineCap = 'square';
  function diff(r1, c1, r2, c2) {
    if (r2 < 0 || r2 >= level.rows || c2 < 0 || c2 >= level.cols) return true; // grid edge
    const a = state.userGrid[r1 * level.cols + c1] || 0;
    const b = state.userGrid[r2 * level.cols + c2] || 0;
    return a !== b;
  }
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const x = c * cellSize, y = r * cellSize;
      // top edge
      if (diff(r, c, r-1, c)) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); ctx.stroke(); }
      // bottom edge
      if (diff(r, c, r+1, c)) { ctx.beginPath(); ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); ctx.stroke(); }
      // left edge
      if (diff(r, c, r, c-1)) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); ctx.stroke(); }
      // right edge
      if (diff(r, c, r, c+1)) { ctx.beginPath(); ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); ctx.stroke(); }
    }
  }
  
  // Draw clues as DOM overlays
  for (const [key, clue] of Object.entries(level.clues)) {
    const [r, c] = key.split(',').map(Number);
    const x = c * cellSize + cellSize / 2;
    const y = r * cellSize + cellSize / 2;
    
    if (clue.type === 'circle') {
      const circle = document.createElement('div');
      circle.className = 'clue-circle';
      circle.style.left = (x - cellSize * 0.3) + 'px';
      circle.style.top = (y - cellSize * 0.3) + 'px';
      circle.style.width = (cellSize * 0.6) + 'px';
      circle.style.height = (cellSize * 0.6) + 'px';
      circle.style.position = 'absolute';
      circle.style.borderRadius = '50%';
      circle.style.border = '3px solid #fff';
      circle.style.background = 'transparent';
      circle.style.pointerEvents = 'none';
      container.appendChild(circle);
    } else if (clue.type === 'number') {
      const num = document.createElement('div');
      num.className = 'clue-number';
      num.textContent = clue.val;
      num.style.left = (x - 12) + 'px';
      num.style.top = (y - 14) + 'px';
      num.style.color = '#fff';
      num.style.fontWeight = '900';
      num.style.fontSize = '20px';
      num.style.textShadow = '0 0 6px #000, 0 0 6px #000';
      num.style.position = 'absolute';
      num.style.pointerEvents = 'none';
      container.appendChild(num);
    }
  }
}

function checkSolution() {
  const level = LEVELS[state.currentLevel];
  const R = level.rows, C = level.cols;
  const grid = state.userGrid;
  const DIRS4 = [[-1,0],[1,0],[0,-1],[0,1]];
  const DIAGS = [[-1,-1],[-1,1],[1,-1],[1,1]];

  // Rule 1: no unset cells (every cell must be assigned to a snake)
  for (let i = 0; i < grid.length; i++) {
    if (!grid[i] || grid[i] === 0) {
      alert('Some cells are not assigned to a snake yet. Keep painting!');
      return;
    }
  }

  // Collect snakes: map snake-id -> list of cell indices
  const snakeCells = {};
  for (let i = 0; i < grid.length; i++) {
    const id = grid[i];
    if (!snakeCells[id]) snakeCells[id] = [];
    snakeCells[id].push(i);
  }

  // Helper: orth neighbours of a cell index within the same snake
  function orthSame(r, c, id) {
    let n = 0;
    const out = [];
    for (const [dr, dc] of DIRS4) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= R || nc < 0 || nc >= C) continue;
      if (grid[nr * C + nc] === id) { n++; out.push([nr, nc]); }
    }
    return { count: n, cells: out };
  }

  // Rule 2: each snake is a valid one-cell-wide simple path (length >= 2,
  // connected, max orth-degree 2, exactly 2 endpoints, no 2x2 self-block,
  // no diagonal self-touch without orth bridge).
  for (const id in snakeCells) {
    const cells = snakeCells[id];
    if (cells.length < 2) {
      alert(`Snake ${id} has fewer than 2 cells. Snakes must be at least 2 cells long.`);
      return;
    }
    // degree check + count endpoints
    let endpoints = 0;
    const cellSet = new Set(cells);
    for (const idx of cells) {
      const r = Math.floor(idx / C), c = idx % C;
      const { count } = orthSame(r, c, parseInt(id));
      if (count > 2) {
        alert(`Snake ${id} branches at row ${r+1}, col ${c+1}. Snakes must be one-cell-wide paths (max 2 neighbours).`);
        return;
      }
      if (count === 1) endpoints++;
    }
    if (endpoints !== 2) {
      alert(`Snake ${id} has ${endpoints} endpoints. A snake must have exactly 2 endpoints.`);
      return;
    }
    // 2x2 check
    for (const idx of cells) {
      const r = Math.floor(idx / C), c = idx % C;
      for (const [dr, dc] of [[-1,-1],[-1,0],[0,-1],[0,0]]) {
        const rr = r + dr, cc = c + dc;
        let allIn = true;
        for (let a = 0; a < 2; a++) {
          for (let b = 0; b < 2; b++) {
            if (rr + a < 0 || rr + a >= R || cc + b < 0 || cc + b >= C || !cellSet.has((rr + a) * C + (cc + b))) {
              allIn = false;
            }
          }
        }
        if (allIn) {
          alert(`Snake ${id} has a 2x2 block at row ${r+1}, col ${c+1}. Snakes must be one cell wide.`);
          return;
        }
      }
    }
    // diagonal self-touch check (no fold-back)
    for (const idx of cells) {
      const r = Math.floor(idx / C), c = idx % C;
      for (const [dr, dc] of DIAGS) {
        const ar = r + dr, ac = c + dc;
        if (ar < 0 || ar >= R || ac < 0 || ac >= C) continue;
        if (grid[ar * C + ac] !== parseInt(id)) continue;
        // diagonal neighbour of same snake: need orth bridge at (r,ac) or (ar,c)
        if (!cellSet.has(r * C + ac) && !cellSet.has(ar * C + c)) {
          alert(`Snake ${id} folds back on itself near row ${r+1}, col ${c+1}. Snakes may not touch themselves even diagonally.`);
          return;
        }
      }
    }
  }

  // Rule 3: number clues — a cell with a number clue N must belong to a snake
  // whose length equals N.
  for (const key in level.clues) {
    const clue = level.clues[key];
    if (clue.type !== 'number') continue;
    const [r, c] = key.split(',').map(Number);
    const id = grid[r * C + c];
    const len = snakeCells[id] ? snakeCells[id].length : 0;
    if (len !== clue.val) {
      alert(`The cell at row ${r+1}, col ${c+1} has clue ${clue.val} but its snake has ${len} cells.`);
      return;
    }
  }

  // Rule 4: circle clues must be at snake endpoints (exactly 1 same-snake orth neighbour)
  for (const key in level.clues) {
    const clue = level.clues[key];
    if (clue.type !== 'circle') continue;
    const [r, c] = key.split(',').map(Number);
    const id = grid[r * C + c];
    const { count } = orthSame(r, c, id);
    if (count !== 1) {
      alert(`The circle at row ${r+1}, col ${c+1} is not at a snake endpoint. Circles mark endpoints (exactly 1 same-snake neighbour required).`);
      return;
    }
  }

  // Rule 5: two snakes of the SAME length may not touch orthogonally.
  // Build length -> set of snake-ids, and cell -> snake-id map.
  const byLen = {};
  for (const id in snakeCells) {
    const L = snakeCells[id].length;
    if (!byLen[L]) byLen[L] = [];
    byLen[L].push(parseInt(id));
  }
  for (const L in byLen) {
    const ids = byLen[L];
    if (ids.length < 2) continue;
    const idSet = new Set(ids);
    for (const id of ids) {
      for (const idx of snakeCells[id]) {
        const r = Math.floor(idx / C), c = idx % C;
        for (const [dr, dc] of DIRS4) {
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= R || nc < 0 || nc >= C) continue;
          const nid = grid[nr * C + nc];
          if (nid !== id && idSet.has(nid)) {
            alert(`Two snakes of length ${L} touch orthogonally. Same-length snakes may not share an edge.`);
            return;
          }
        }
      }
    }
  }

  // All rules pass
  clearInterval(state.timerInterval);
  if (state.sfxOn) try { playSFX('win'); } catch(e) {}
  showWin();
}

function showWin() {
  const modal = document.getElementById('win-modal');
  modal.style.display = 'flex';
  
  document.getElementById('win-time').textContent = formatTime(state.timer);
  document.getElementById('win-moves').textContent = state.moves;
  
  // Calculate stars based on time
  const level = LEVELS[state.currentLevel];
  const parTime = level.cols * level.rows * 10;
  let stars = 3;
  if (state.timer > parTime * 2) stars = 2;
  if (state.timer > parTime * 3) stars = 1;
  
  document.getElementById('star-rating').textContent = '★'.repeat(stars) + '☆'.repeat(3 - stars);
  
  // Save progress
  saveProgress(stars);
  
  // Play win sound
  if (state.sfxOn) playSFX('win');
  
  // Show interstitial
  showInterstitial();
}

function nextLevel() {
  if (state.currentLevel < LEVELS.length - 1) {
    startLevel(state.currentLevel + 1);
  } else {
    showMenu();
  }
}

function showMenu() {
  clearInterval(state.timerInterval);
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('win-modal').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
  renderLevelGrid();
}

function undo() {
  if (state.history.length === 0) return;
  const last = state.history.pop();
  state.userGrid[last.idx] = last.prev;
  state.moves = Math.max(0, state.moves - 1);
  renderGrid();
  if (state.sfxOn) try { playSFX('click'); } catch(e) {}
}

function resetLevel() {
  const level = LEVELS[state.currentLevel];
  state.userGrid = new Array(level.rows * level.cols).fill(0);
  state.history = [];
  state.moves = 0;
  state.timer = 0;
  renderGrid();
}

function showHint() {
  // R323 fix: reveal one correct cell from the embedded solution
  const level = LEVELS[state.currentLevel];
  const sol = level.solution;
  const candidates = [];
  for (let i = 0; i < state.userGrid.length; i++) {
    if (state.userGrid[i] !== sol[i]) candidates.push(i);
  }
  if (candidates.length === 0) {
    alert('All cells already match the solution!');
    return;
  }
  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  state.history.push({idx: pick, prev: state.userGrid[pick]});
  state.userGrid[pick] = sol[pick];
  state.moves++;
  renderGrid();
  if (state.sfxOn) try { playSFX('click'); } catch(e) {}
}

function startTimer() {
  state.timerInterval = setInterval(() => {
    state.timer++;
    document.getElementById('timer').textContent = formatTime(state.timer);
  }, 1000);
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function toggleMusic() {
  state.musicOn = !state.musicOn;
  document.getElementById('music-status').textContent = state.musicOn ? 'ON' : 'OFF';
  if (state.musicOn) {
    startBGM();
  } else {
    stopBGM();
  }
}

function toggleSFX() {
  state.sfxOn = !state.sfxOn;
  document.getElementById('sfx-status').textContent = state.sfxOn ? 'ON' : 'OFF';
}

function saveProgress(stars) {
  const progress = JSON.parse(localStorage.getItem('snake-pit-progress') || '{}');
  if (!progress[state.currentLevel] || stars > (progress[state.currentLevel].stars || 0)) {
    progress[state.currentLevel] = {completed: true, stars};
    localStorage.setItem('snake-pit-progress', JSON.stringify(progress));
  }
}

function loadProgress() {
  // Load from localStorage
}

function setupKeyboard() {
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') showMenu();
    if (e.key === 'z' && e.ctrlKey) undo();
    if (e.key === 'h' && e.ctrlKey) showHint();
  });
}

// AUDIO
let audioCtx = null;
let bgmNodes = [];

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function startBGM() {
  initAudio();
  if (bgmNodes.length) return;
  
  try {
    const sr = audioCtx.sampleRate;
    const dur = 16;
    const bufSize = sr * dur;
    const buf = audioCtx.createBuffer(1, bufSize, sr);
    const d = buf.getChannelData(0);
    
    const chords = [
      [261.63, 329.63, 392.00, 493.88],
      [293.66, 349.23, 440.00, 523.25],
      [220.00, 261.63, 329.63, 392.00],
      [196.00, 246.94, 293.66, 349.23]
    ];
    
    const chordDur = dur / chords.length;
    
    for (let i = 0; i < bufSize; i++) {
      const t = i / sr;
      const ci = Math.min(Math.floor(t / chordDur), chords.length - 1);
      const chord = chords[ci];
      
      let s = 0;
      for (let n = 0; n < chord.length; n++) {
        const f = chord[n];
        s += Math.sin(2 * Math.PI * f * t) * 0.05;
        s += Math.sin(2 * Math.PI * f * 2 * t) * 0.015;
      }
      
      const tInChord = t % chordDur;
      const fadeIn = Math.min(tInChord / 1.0, 1);
      const fadeOut = Math.min((chordDur - tInChord) / 1.0, 1);
      s *= fadeIn * fadeOut * 0.4;
      
      const lfo = Math.sin(2 * Math.PI * 0.25 * t) * 0.15 + 1;
      d[i] = s * lfo;
    }
    
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 800;
    filt.Q.value = 1;
    
    const gain = audioCtx.createGain();
    gain.gain.value = state.musicOn ? 0.25 : 0;
    
    src.connect(filt);
    filt.connect(gain);
    gain.connect(audioCtx.destination);
    
    src.start();
    bgmNodes = [src, filt, gain];
    
  } catch (e) {}
}

function stopBGM() {
  if (bgmNodes.length) {
    try {
      const gain = bgmNodes[2];
      gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
      setTimeout(() => {
        bgmNodes[0].stop();
        bgmNodes = [];
      }, 200);
    } catch (e) {
      bgmNodes = [];
    }
  }
}

function playSFX(type) {
  if (!state.sfxOn || !audioCtx) return;
  
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    const freqs = {win: 523, click: 800, error: 220};
    osc.type = type === 'error' ? 'sawtooth' : 'sine';
    osc.frequency.value = freqs[type] || 440;
    
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (type === 'win' ? 0.5 : 0.1));
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + (type === 'win' ? 0.5 : 0.1));
  } catch (e) {}
}

// START
init();
</script>
