}

/* ====== Game Logic ====== */
function loadLevel(idx){
  const L=LEVELS[idx];
  state.tubes=L.tubes.map(t=>t.slice());
  state.capacity=L.capacity;
  state.par=L.par;
  state.moves=0;
  state.history=[];
  state.selected=-1;
  state.dragBall=null;
  state.hintTube=-1;
  state.hintTimer=0;
  state.animBalls=[];
  state.processingDrop=false;
  state.tubesAdded=0;
  state.hintsRemaining=3;
  state.hintOnCooldown=0;
  state.revealAnim=0;
  state.winAnim=0;
  updateHud();
}
function tubeFull(t){return t.length>=state.capacity}
function isMonochromeOrEmpty(t){
  if(t.length===0)return true;
  const c=t[0];
  return t.every(b=>b===c);
}
function isWin(){
  return state.tubes.every(t=>isMonochromeOrEmpty(t)&&t.length>0||t.length===0);
}
function canMove(fromIdx,toIdx){
  if(fromIdx===toIdx)return false;
  const from=state.tubes[fromIdx];
  const to=state.tubes[toIdx];
  if(from.length===0)return false;
  if(to.length>=state.capacity)return false;
  if(to.length===0)return true;
  return to[to.length-1]===from[from.length-1];
}
function tryMove(fromIdx,toIdx){
  if(!canMove(fromIdx,toIdx))return false;
  state.history.push(state.tubes.map(t=>t.slice()));
  const ball=state.tubes[fromIdx].pop();
  state.tubes[toIdx].push(ball);
  state.moves++;
  state.selected=-1;
  return true;
}
function undo(){
  if(state.history.length===0){toast('Nothing to undo');return}
  state.tubes=state.history.pop();
  state.moves=Math.max(0,state.moves-1);
  state.selected=-1;
  playSfx('undo');
  updateHud();
}
function resetLevel(){
  loadLevel(state.currentLevel);
  playSfx('reset');
  updateHud();
}

/* ====== BFS solver (used by hint) ====== */
function findHint(){
  // Find a winning move
  const target=state.tubes.findIndex(t=>t.length>0&&!isMonochromeOrEmpty(t));
  if(target<0)return null;
  for(let i=0;i<state.tubes.length;i++){
    if(i===target)continue;
    if(canMove(i,target)){
      // Confirm the resulting state has fewer "bad" tubes
      return{from:i,to:target};
    }
  }
  // Heuristic: any move that reduces bad balls
  for(let i=0;i<state.tubes.length;i++){
    for(let j=0;j<state.tubes.length;j++){
      if(i===j)continue;
      if(canMove(i,j)){
        // try and undo
        const ball=state.tubes[i].pop();
        state.tubes[j].push(ball);
        const reduced=state.tubes.reduce((acc,t,idx)=>acc+(isMonochromeOrEmpty(t)?0:1),0);
        state.tubes[j].pop();
        state.tubes[i].push(ball);
        if(reduced<state.tubes.reduce((acc,t,idx)=>acc+(isMonochromeOrEmpty(t)?0:1),0)){
          return{from:i,to:j};
        }
      }
    }
  }
  return null;
}

/* ====== BFS solver for level validation ====== */
function bfsSolve(level){
  const start=level.tubes.map(t=>t.slice());
  if(start.every(t=>isMonochromeOrEmpty(t)&&t.length>0||t.length===0))return 0;
  const visited=new Set();
  const stack=[[start,0]];
  visited.add(start.map(t=>t.join(',')).join('|'));
  const cap=level.capacity;
  function isWinState(s){return s.every(t=>isMonochromeOrEmpty(t)&&t.length>0||t.length===0)}
  let best=Infinity;
  while(stack.length){
    const[s,d]=stack.shift();
    if(d>best)continue;
    if(isWinState(s)){best=Math.min(best,d);continue}
    if(d>Math.min(60,level.par*3))continue;
    for(let i=0;i<s.length;i++){
      if(s[i].length===0)continue;
      for(let j=0;j<s.length;j++){
        if(i===j)continue;
        if(s[j].length>=cap)continue;
        if(s[j].length>0&&s[j][s[j].length-1]!==s[i][s[i].length-1])continue;
        const ns=s.map(t=>t.slice());
        const b=ns[i].pop();
        ns[j].push(b);
        const key=ns.map(t=>t.join(',')).join('|');
        if(visited.has(key))continue;
        visited.add(key);
        stack.push([ns,d+1]);
      }
    }
  }
  return best;
}

/* ====== Audio (Web Audio API procedural) ====== */
let audioCtx=null;
let masterGain=null;
let bgmGain=null;
let sfxGain=null;
let bgmNodes=[];
let sfxBus={};
function ensureAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=state.soundOn?0.7:0;
    masterGain.connect(audioCtx.destination);
    bgmGain=audioCtx.createGain();
    bgmGain.gain.value=0.16;
    bgmGain.connect(masterGain);
    sfxGain=audioCtx.createGain();
    sfxGain.gain.value=0.7;
    sfxGain.connect(masterGain);
  }catch(e){audioCtx=null}
}
function setSoundOn(on){
  state.soundOn=on;
  document.getElementById('btnSound').textContent=on?'🔊':'🔇';
  if(masterGain)masterGain.gain.value=on?0.7:0;
  if(audioCtx&&on&&audioCtx.state==='suspended')audioCtx.resume();
  if(!on&&bgmNodes.length){
    bgmNodes.forEach(n=>{try{n.stop()}catch(e){}});
    bgmNodes=[];
  }else if(on){
    startBgm();
  }
  saveProgress();
}
function playNote(freq,dur,type,gain,when,attack,destination){
  if(!audioCtx)return;
  const t0=audioCtx.currentTime+(when||0);
  const osc=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc.type=type||'sine';
  osc.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(gain||0.3,t0+(attack||0.005));
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  osc.connect(g);
  g.connect(destination||sfxGain);
  osc.start(t0);
  osc.stop(t0+dur+0.05);
}
function playSfx(kind){
  if(!audioCtx)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  switch(kind){
    case'drop':{
      playNote(420,0.10,'sine',0.45,0,0.005);
      playNote(280,0.08,'sine',0.30,0.04,0.005);
      break}
    case'success':{
      [523,659,784].forEach((f,i)=>playNote(f,0.18,'sine',0.35,i*0.06,0.005));
      break}
    case'fail':{
      playNote(180,0.18,'square',0.25,0,0.005);
      playNote(140,0.22,'square',0.20,0.06,0.005);
      break}
    case'undo':{
      playNote(520,0.06,'triangle',0.30,0,0.005);
      playNote(380,0.10,'triangle',0.25,0.04,0.005);
      break}
    case'reset':{
      playNote(300,0.12,'sine',0.30,0,0.005);
      playNote(220,0.10,'sine',0.22,0.06,0.005);
      break}
    case'hint':{
      playNote(700,0.10,'sine',0.32,0,0.005);
      playNote(900,0.12,'sine',0.30,0.05,0.005);
      break}
    case'click':{
      playNote(560,0.04,'square',0.22,0,0.003);
      break}
    case'levelclear':{
      [523,659,784,1047].forEach((f,i)=>playNote(f,0.30,'sine',0.40,i*0.08,0.01));
      break}
    case'tierclear':{
      [523,659,784,988,1175].forEach((f,i)=>playNote(f,0.40,'triangle',0.45,i*0.10,0.01));
      break}
  }
}
function startBgm(){
  if(!audioCtx||!state.soundOn)return;
  if(bgmNodes.length)return;
  // Lo-fi warm BGM: arpeggio + pad
  const scale=[220,261.63,293.66,329.63,392.00,440,523.25];
  let t=audioCtx.currentTime+0.1;
  for(let i=0;i<32;i++){
    const f=scale[i%scale.length]*(i%8<4?1:0.5);
    playNote(f,0.45,'triangle',0.18,i*0.6,0.05,bgmGain);
  }
  // Soft pad
  for(let i=0;i<4;i++){
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type='sine';
    o.frequency.value=110*Math.pow(2,i*0.25);
    g.gain.value=0;
    g.gain.linearRampToValueAtTime(0.04,audioCtx.currentTime+0.3);
    g.gain.linearRampToValueAtTime(0.04,audioCtx.currentTime+19.0);
    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+19.5);
    o.connect(g);
    g.connect(bgmGain);
    o.start();
    o.stop(audioCtx.currentTime+20);
    bgmNodes.push(o);
  }
  setTimeout(()=>{bgmNodes=[];if(state.soundOn)startBgm()},20000);
}

/* ====== Confetti ====== */
function spawnConfetti(amount){
  const w=confettiCanvas.width=window.innerWidth*DPR;
  const h=confettiCanvas.height=window.innerHeight*DPR;
  const colors=['#e85d75','#ffb347','#ffd966','#7dd87d','#7ec8e3','#b39ddb','#fff','#fc5c7d'];
  for(let i=0;i<amount;i++){
    state.confetti.push({
      x:window.innerWidth/2+(Math.random()-0.5)*200,
      y:window.innerHeight/2-100,
      vx:(Math.random()-0.5)*8,
      vy:-(Math.random()*8+2),
      g:0.18,
      r:Math.random()*Math.PI*2,
      vr:(Math.random()-0.5)*0.3,
      c:colors[i%colors.length],
      s:Math.random()*8+4,
      life:1
    });
  }
  cctx.scale(DPR,DPR);
}
function updateConfetti(dt){
  for(let i=state.confetti.length-1;i>=0;i--){
    const p=state.confetti[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=p.g;
    p.r+=p.vr;
    p.life-=0.004;
    if(p.life<=0||p.y>window.innerHeight+20)state.confetti.splice(i,1);
  }
  cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  for(const p of state.confetti){
    cctx.save();
    cctx.translate(p.x,p.y);
    cctx.rotate(p.r);
    cctx.globalAlpha=Math.max(0,p.life);
    cctx.fillStyle=p.c;
    cctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);
    cctx.restore();
  }
}

/* ====== Render ====== */
function tubeX(i){
  const n=state.tubes.length;
  const w=canvas.width;
  const totalW=w*0.85;
  const startX=(w-totalW)/2;
  const gap=totalW/(n);
  return startX+gap*(i+0.5);
}
function tubeWidth(){
  return Math.max(36,Math.min(72,canvas.width*0.7/state.tubes.length));
}
function ballYInTube(tubeIdx,ballIdx){
  const tH=canvas.height*0.62;
  const startY=canvas.height*0.10+tH;
  const ballH=ballRadius()*2+2;
  return startY-ballIdx*ballH;
}
function ballRadius(){
  const tw=tubeWidth();
  return Math.max(13,Math.min(20,tw*0.32));
}
function drawBall(cx,cy,colorIdx,scale){
  const r=ballRadius()*(scale||1);
  const col=TUBE_COLORS[colorIdx];
  // outer shadow
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx+1,cy+2,r);
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fill();
  // main ball radial gradient
  const grad=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.1,cx,cy,r);
  grad.addColorStop(0,col.hi);
  grad.addColorStop(0.45,col.hex);
  grad.addColorStop(1,col.shadow);
  ctx.beginPath();
  ctx.arc(cx,cy,r);
  ctx.fillStyle=grad;
  ctx.fill();
  // outline
  ctx.strokeStyle=col.shadow;
  ctx.lineWidth=1.2;
  ctx.stroke();
  // yarn texture
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.arc(cx,cy,r*0.7,0,Math.PI*1.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx,cy,r*0.45,Math.PI*0.5,Math.PI*2);
  ctx.stroke();
  // highlight
  ctx.beginPath();
  ctx.arc(cx-r*0.35,cy-r*0.4,r*0.22,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fill();
  ctx.restore();
}
function drawTube(i,opts){
  const t=state.tubes[i];
  const x=tubeX(i);
  const w=tubeWidth();
  const tH=canvas.height*0.62;
  const startY=canvas.height*0.10;
  const isSelected=state.selected===i;
  const isHint=state.hintTube===i;
  const empty=t.length===0;
  ctx.save();
  // back glow if selected/hint
  if(isSelected||isHint){
    ctx.shadowColor=isSelected?'#fff':(isHint?'#ffd966':'transparent');
    ctx.shadowBlur=20;
  }
  // tube body
  const grad=ctx.createLinearGradient(x-w/2,startY,x+w/2,startY);
  grad.addColorStop(0,'rgba(255,255,255,0.12)');
  grad.addColorStop(0.5,'rgba(255,255,255,0.04)');
  grad.addColorStop(1,'rgba(255,255,255,0.16)');
  ctx.fillStyle=grad;
  roundRect(ctx,x-w/2,startY,w,tH,12);
  ctx.fill();
  ctx.shadowBlur=0;
  // tube outline
  ctx.strokeStyle=isSelected?'rgba(255,255,255,0.85)':(isHint?'rgba(255,217,102,0.9)':'rgba(255,255,255,0.30)');
  ctx.lineWidth=isSelected?3:2;
  roundRect(ctx,x-w/2,startY,w,tH,12);
  ctx.stroke();
  // rim ellipse
  ctx.beginPath();
  ctx.ellipse(x,startY,w/2,7,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fill();
  ctx.strokeStyle=isSelected?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.35)';
  ctx.lineWidth=1.5;
  ctx.stroke();
  // bottom shadow
  ctx.beginPath();
  ctx.ellipse(x,startY+tH,w/2-4,5,0,0,Math.PI);
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fill();
  // balls (skip the top if it's being dragged)
  const dragFromTube=state.dragBall&&state.dragBall.from===i;
  const dragCount=dragFromTube?1:0;
  const topIdx=t.length-1;
  for(let b=0;b<t.length;b++){
    if(dragFromTube&&b===topIdx)continue;
    const cy=ballYInTube(i,b);
    drawBall(x,cy,t[b],1);
  }
  // capacity hint dots
  if(t.length<state.capacity){
    const freeSlots=state.capacity-t.length;
    const by=ballYInTube(i,state.capacity-1);
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.10)';
    ctx.setLineDash([3,4]);
    ctx.beginPath();
    ctx.moveTo(x-w/2+8,by-2);
    ctx.lineTo(x+w/2-8,by-2);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}
function drawDragBall(){
  if(!state.dragBall)return;
  const{color,x,y}=state.dragBall;
  drawBall(x,y,color,1.1);
  // ring under cursor
  ctx.save();
  ctx.beginPath();
  ctx.arc(x,y,ballRadius()*1.4,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.35)';
  ctx.setLineDash([3,4]);
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.restore();
}
function drawBackground(){
  const w=canvas.width,h=canvas.height;
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'rgba(60,40,110,0.35)');
  grad.addColorStop(1,'rgba(20,12,48,0.55)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);
  // soft stars
  for(let i=0;i<25;i++){
    const sx=(i*97)%w;
    const sy=(i*53)%h*0.85;
    ctx.beginPath();
    ctx.arc(sx,sy,1,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.05+((i*13)%7)/100})`;
    ctx.fill();
  }
  // footer shelf
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(0,h*0.85,w,h*0.15);
}
function render(){
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  drawBackground();
  for(let i=0;i<state.tubes.length;i++){
    drawTube(i);
  }
  drawDragBall();
  // win overlay
  if(state.winAnim>0){
    const t=state.winAnim;
    const a=Math.min(1,t*2);
    ctx.save();
    ctx.fillStyle=`rgba(8,5,28,${a*0.45})`;
    ctx.fillRect(0,0,w,h);
    ctx.restore();
  }
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ====== Update Loop ====== */
function update(dt){
  if(state.hintTube>=0){
    state.hintTimer-=dt;
    if(state.hintTimer<=0)state.hintTube=-1;
  }
  if(state.winAnim>0){
    state.winAnim-=dt;
    if(state.winAnim<=0){
      onLevelWin();
    }
  }
  if(state.revealAnim>0){
    state.revealAnim-=dt;
  }
  if(state.hintOnCooldown>0)state.hintOnCooldown-=dt;
  updateConfetti(dt);
}

/* ====== Game Loop ====== */
function loop(t){
  const now=t/1000;
  let dt=now-state.lastTime;
  if(!isFinite(dt)||dt<=0)dt=0;
  if(dt>0.1)dt=0.1;
  state.lastTime=now;
  if(!state.paused){
    update(dt);
    render();
  }
  requestAnimationFrame(loop);
}

/* ====== Input ====== */
function getTubeAtPoint(x,y){
  const w=canvas.width/DPR,h=canvas.height/DPR;
  for(let i=0;i<state.tubes.length;i++){
    const tx=tubeX(i);
    const tw=tubeWidth();
    const startY=canvas.height*0.10;
    const tH=canvas.height*0.62;
    if(x>=tx-tw/2&&x<=tx+tw/2&&y>=startY-10&&y<=startY+tH+10)return i;
  }
  return-1;
}
function eventXY(e){
  const rect=canvas.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX);
  const cy=(e.touches?e.touches[0].clientY:e.clientY);
  const sx=canvas.width/rect.width;
  const sy=canvas.height/rect.height;
  return{x:(cx-rect.left)*sx,y:(cy-rect.top)*sy};
}
canvas.addEventListener('pointerdown',(e)=>{
  e.preventDefault();
  ensureAudio();
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  const{x,y}=eventXY(e);
  state.mouseX=x;state.mouseY=y;
  const idx=getTubeAtPoint(x,y);
  if(idx<0){state.selected=-1;return}
  if(state.tubes[idx].length===0){state.selected=-1;return}
  // start drag
  state.dragBall={
    from:idx,
    color:state.tubes[idx][state.tubes[idx].length-1],
    x:tubeX(idx),
    y:ballYInTube(idx,state.tubes[idx].length-1),
    offsetX:x-tubeX(idx),
    offsetY:y-ballYInTube(idx,state.tubes[idx].length-1)
  };
  state.selected=idx;
  playSfx('click');
  try{canvas.setPointerCapture(e.pointerId)}catch(_){}
});
canvas.addEventListener('pointermove',(e)=>{
  const{x,y}=eventXY(e);
  state.mouseX=x;state.mouseY=y;
  if(state.dragBall){
    state.dragBall.x=x;
    state.dragBall.y=y;
    // highlight target tube
    const idx=getTubeAtPoint(x,y);
    state.hintTube=(idx>=0&&canMove(state.dragBall.from,idx))?idx:-1;
  }
});
canvas.addEventListener('pointerup',(e)=>{
  if(!state.dragBall)return;
  const{x,y}=eventXY(e);
  const idx=getTubeAtPoint(x,y);
  if(idx>=0&&idx!==state.dragBall.from&&canMove(state.dragBall.from,idx)){
    // animate drop then commit
    const fromIdx=state.dragBall.from;
    const ballColor=state.dragBall.color;
    const fromTubeCount=state.tubes[fromIdx].length;
    const anim={
      x:state.dragBall.x,
      y:state.dragBall.y,
      tx:tubeX(idx),
      ty:ballYInTube(idx,state.tubes[idx].length),
      color:ballColor,
      t:0,
      onDone:()=>{
        tryMove(fromIdx,idx);
        state.processingDrop=false;
        playSfx(state.moves>state.par*1.5?'drop':'drop');
        updateHud();
        if(isWin()){
          state.winAnim=0.6;
          state.revealAnim=0.4;
          playSfx('levelclear');
        }
      }
    };
    state.animBalls.push(anim);
    state.processingDrop=true;
    state.dragBall=null;
    state.hintTube=-1;
    state.selected=-1;
  }else{
    state.dragBall=null;
    state.hintTube=-1;
    state.selected=-1;
  }
  try{canvas.releasePointerCapture(e.pointerId)}catch(_){}
});
canvas.addEventListener('pointercancel',()=>{
  state.dragBall=null;
  state.hintTube=-1;
  state.selected=-1;
});

/* ====== Animation tick for drop balls ====== */
function tickAnims(dt){
  for(let i=state.animBalls.length-1;i>=0;i--){
    const a=state.animBalls[i];
    a.t+=dt*4.2;
    if(a.t>=1){
      a.onDone&&a.onDone();
      state.animBalls.splice(i,1);
    }
  }
  // render anim balls on top
  if(state.animBalls.length){
    for(const a of state.animBalls){
      const t=a.t;
      const ease=t<0.5?2*t*t:-1+(4-2*t)*t;
      const cx=a.x+(a.tx-a.x)*ease;
      const cyArc=Math.sin(t*Math.PI)*40;
      const cy=a.y+(a.ty-a.y)*ease-cyArc;
      drawBall(cx,cy,a.color,1.05);
    }
  }
}
const _origRender=render;
function renderAll(){
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  drawBackground();
  for(let i=0;i<state.tubes.length;i++){
    drawTube(i);
  }
  drawDragBall();
  tickAnims(0);
  if(state.winAnim>0){
    const t=state.winAnim;
    const a=Math.min(1,(0.6-t)*2);
    ctx.save();
    ctx.fillStyle=`rgba(8,5,28,${a*0.45})`;
    ctx.fillRect(0,0,w,h);
    ctx.restore();
  }
}
function loop2(t){
  const now=t/1000;
  let dt=now-state.lastTime;
  if(!isFinite(dt)||dt<=0)dt=0;
  if(dt>0.1)dt=0.1;
  state.lastTime=now;
  if(!state.paused){
    update(dt);
    tickAnims(dt);
    renderAll();
  }
  requestAnimationFrame(loop2);
}

/* ====== HUD ====== */
function updateHud(){
  document.getElementById('lvlNum').textContent=(state.currentLevel+1);
  document.getElementById('moveCount').textContent=state.moves;
  document.getElementById('parCount').textContent=state.par;
  document.getElementById('hintCount').textContent=state.hintsRemaining;
  const stars=state.totalStars[state.currentLevel]||0;
  document.getElementById('starCount').textContent=stars>0?('★'.repeat(stars)+'☆'.repeat(3-stars)):'—';
}

/* ====== Level Win ====== */
function computeStars(){
  if(state.moves<=state.par)return 3;
  if(state.moves<=state.par*1.5)return 2;
  return 1;
}
function onLevelWin(){
  const stars=computeStars();
  const prev=state.totalStars[state.currentLevel]||0;
  if(stars>prev)state.totalStars[state.currentLevel]=stars;
  saveProgress();
  spawnConfetti(70);
  showLevelWinModal(stars);
  if((state.currentLevel+1)%10===0&&state.currentLevel+1<LEVELS.length){
    setTimeout(()=>{playSfx('tierclear')},500);
  }
  if(state.currentLevel+1>=LEVELS.length&&(prev<stars||!prev)){
    setTimeout(()=>{showAllCompleteModal()},1800);
  }
}
function showLevelWinModal(stars){
  const isLastLevel=state.currentLevel===LEVELS.length-1;
  const isTierEnd=((state.currentLevel+1)%10===0)&&!isLastLevel;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="modal">
      <h1>${isLastLevel?'🧶 Master Tailor!':'✨ Level Cleared!'}</h1>
      <p>Sorted in <strong>${state.moves}</strong> moves (par ${state.par})</p>
      <div class="stars-row">
        <span class="s ${stars>=1?'on':''}">★</span>
        <span class="s ${stars>=2?'on':''}">★</span>
        <span class="s ${stars>=3?'on':''}">★</span>
      </div>
      <p style="font-size:.85rem">Earn 3 stars for par, 2 for 1.5×par, 1 for any clear.</p>
      <div class="row">
        <button class="btn ghost" id="modalReplay">↻ Replay</button>
        <button class="btn" id="modalNext">${isLastLevel?'🏆 Finish':isTierEnd?'Next Tier →':'Next →'}</button>
      </div>
    </div>`;
  ov.style.display='flex';
  document.getElementById('modalReplay').onclick=()=>{hideOverlay();resetLevel()};
  document.getElementById('modalNext').onclick=()=>{
    hideOverlay();
    if(isLastLevel){
      // already at end; can replay or go to menu
      state.currentLevel=0;
      loadLevel(0);
      updateHud();
      showLevelSelect();
    }else{
      state.currentLevel++;
      loadLevel(state.currentLevel);
      updateHud();
    }
  };
}
function showAllCompleteModal(){
  const ov=document.getElementById('overlay');
  const totalStars=Object.values(state.totalStars).reduce((a,b)=>a+(b||0),0);
  const maxStars=LEVELS.length*3;
  ov.innerHTML=`
    <div class="modal">
      <h1>🧶🪡 Master Tailor!</h1>
      <p>You sorted every yarn ball across all 3 tiers!</p>
      <div class="tier-stats">
        <div class="tier-stat"><div class="v">${totalStars}/${maxStars}</div><div class="l">Stars</div></div>
        <div class="tier-stat"><div class="v">30</div><div class="l">Levels</div></div>
        <div class="tier-stat"><div class="v">${Math.round(totalStars/maxStars*100)}%</div><div class="l">Complete</div></div>
      </div>
      <div class="row">
        <button class="btn ghost" id="modalReplayAll">Replay</button>
        <button class="btn" id="modalLevelSel">Level Select</button>
      </div>
    </div>`;
  ov.style.display='flex';
  document.getElementById('modalReplayAll').onclick=()=>{
    state.currentLevel=0;loadLevel(0);updateHud();hideOverlay();
  };
  document.getElementById('modalLevelSel').onclick=()=>{
    hideOverlay();showLevelSelect();
  };
}
function showTierCompleteModal(tierNum){
  const ov=document.getElementById('overlay');
  const tierStars=Object.entries(state.totalStars)
    .filter(([k])=>Math.floor(parseInt(k)/10)===tierNum-1)
    .reduce((a,[,v])=>a+(v||0),0);
  const tierName=['Beginner Knitter','Apprentice Weaver','Master Tailor'][tierNum-1];
  ov.innerHTML=`
    <div class="modal">
      <h1>🧶 ${tierName} cleared!</h1>
      <p>You finished tier ${tierNum} with ${tierStars} of 30 stars.</p>
      <p style="font-size:.85rem;color:var(--text-dim)">Next: ${{1:'Apprentice Weaver',2:'Master Tailor',3:'All complete!'}[tierNum]}</p>
      <div class="row">
        <button class="btn" id="modalContinue">Continue →</button>
      </div>
    </div>`;
  ov.style.display='flex';
  document.getElementById('modalContinue').onclick=()=>{
    hideOverlay();
    if(state.currentLevel+1<LEVELS.length){
      state.currentLevel++;
      loadLevel(state.currentLevel);updateHud();
    }
  };
}

/* ====== Level Select ====== */
function showLevelSelect(){
  const ov=document.getElementById('overlay');
  const tierNames=['Beginner Knitter (1-10)','Apprentice Weaver (11-20)','Master Tailor (21-30)'];
  let grid='';
  for(let i=0;i<LEVELS.length;i++){
    const stars=state.totalStars[i]||0;
    const current=i===state.currentLevel;
    const locked=i>state.currentLevel+1;
    const starsStr=stars>0?`<span class="micro">${'★'.repeat(stars)}</span>`:'';
    grid+=`<button class="lvl-btn ${current?'current':''}" data-idx="${i}" ${locked?'disabled':''}>${i+1}${starsStr}</button>`;
  }
  ov.innerHTML=`
    <div class="modal" style="max-width:480px">
      <h1>📋 Level Select</h1>
      <p>Pick any unlocked level. Beat it in par moves for 3 stars.</p>
      <div class="level-grid">${grid}</div>
      <div class="tier-card"><h3>🧶 30 Levels · 3 Tiers</h3>
        <div class="meta">${tierNames.map((t,i)=>`Tier ${i+1}: ${t}`).join(' · ')}</div>
      </div>
      <div class="row">
        <button class="btn ghost" id="modalReset">Reset progress</button>
        <button class="btn" id="modalClose">Continue</button>
      </div>
    </div>`;
  ov.style.display='flex';
  ov.querySelectorAll('.lvl-btn').forEach(b=>{
    b.onclick=()=>{
      const idx=parseInt(b.getAttribute('data-idx'));
      state.currentLevel=idx;
      loadLevel(idx);updateHud();
      hideOverlay();
    };
  });
  document.getElementById('modalReset').onclick=()=>{
    if(confirm('Reset all progress? Stars and level progress will be lost.')){
      resetProgress();
      state.currentLevel=0;loadLevel(0);updateHud();
      hideOverlay();
      showLevelSelect();
    }
  };
  document.getElementById('modalClose').onclick=()=>{hideOverlay()};
}
function showTutorial(){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="modal">
      <h1>🧶 How to Play</h1>
      <p><strong>1.</strong> Tap any tube to pick up the top yarn ball.</p>
      <p><strong>2.</strong> Tap another tube to drop it in. The tube must be empty, have space, or share the same color on top.</p>
      <p><strong>3.</strong> Sort every ball so each tube has only one color.</p>
      <p><strong>4.</strong> Beat par moves for 3 stars. Use Undo and Hints freely.</p>
      <p style="font-size:.8rem;color:var(--text-dim)">Tip: plan two moves ahead. The empty tube is your lifeline.</p>
      <div class="row">
        <button class="btn" id="tutStart">Let's Knit →</button>
      </div>
    </div>`;
  ov.style.display='flex';
  document.getElementById('tutStart').onclick=()=>{hideOverlay()};
}
function hideOverlay(){
  const ov=document.getElementById('overlay');
  ov.style.display='none';
  ov.innerHTML='';
}

/* ====== Toast ====== */
let toastT=0;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),1700);
}

/* ====== Hint ====== */
function useHint(){
  if(state.hintsRemaining<=0){toast('No hints left! Watch a quick ad to get more.');return}
  if(state.hintOnCooldown>0){toast(`Wait ${Math.ceil(state.hintOnCooldown)}s`);return}
  if(state.dragBall||state.processingDrop){toast('Finish current move first');return}
  const h=findHint();
  if(!h){toast('No hint available - try Undo?');return}
  state.hintsRemaining--;
  state.hintTube=h.to;
  state.hintTimer=2.5;
  state.hintOnCooldown=30;
  playSfx('hint');
  updateHud();
  toast('Drop the top ball into the glowing tube');
}

/* ====== Add Tube ====== */
function addTube(){
  if(state.tubesAdded>=2){toast('Already added max tubes (2)');return}
  if(state.currentLevel<20){toast('Tube power-up unlocks at Tier 3');return}
  if(state.dragBall||state.processingDrop){toast('Finish current move first');return}
  state.tubes.push([]);
  state.tubesAdded++;
  playSfx('success');
  toast('New empty tube added!');
  // animate: brief flash
  state.revealAnim=0.4;
}

/* ====== Buttons ====== */
document.getElementById('btnSound').onclick=()=>{
  ensureAudio();
  setSoundOn(!state.soundOn);
};
document.getElementById('btnLevels').onclick=()=>{showLevelSelect()};
document.getElementById('btnHelp').onclick=()=>{showTutorial()};
document.getElementById('btnUndo').onclick=()=>{undo()};
document.getElementById('btnReset').onclick=()=>{
  if(confirm('Reset this level?'))resetLevel();
};
document.getElementById('btnHint').onclick=()=>{useHint()};
document.getElementById('btnAdd').onclick=()=>{addTube()};

/* ====== Keyboard ====== */
document.addEventListener('keydown',(e)=>{
  if(e.key==='z'||e.key==='Z')undo();
  else if(e.key==='r'||e.key==='R')resetLevel();
  else if(e.key==='h'||e.key==='H')useHint();
  else if(e.key==='Escape'){state.dragBall=null;state.selected=-1;state.hintTube=-1}
});

/* ====== Lifecycle ====== */
function resizeCanvas(){
  const maxW=520;
  const wrap=document.getElementById('game-wrap');
  const w=wrap.clientWidth-28;
  const widthPx=Math.max(280,Math.min(maxW,w));
  const aspect=560/520;
  const heightPx=widthPx*aspect;
  canvas.style.width=widthPx+'px';
  canvas.style.height=heightPx+'px';
  canvas.width=520;
  canvas.height=560;
  DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));
  confettiCanvas.width=window.innerWidth*DPR;
  confettiCanvas.height=window.innerHeight*DPR;
  confettiCanvas.style.width=window.innerWidth+'px';
  confettiCanvas.style.height=window.innerHeight+'px';
  cctx.setTransform(1,0,0,1,0,0);
  cctx.scale(DPR,DPR);
}
window.addEventListener('resize',resizeCanvas);
window.addEventListener('orientationchange',resizeCanvas);

function cleanup(){
  try{
    if(audioCtx)audioCtx.close();
  }catch(e){}
  audioCtx=null;
  bgmNodes=[];
  state.confetti=[];
  state.animBalls=[];
}
window.addEventListener('pagehide',cleanup);
window.addEventListener('beforeunload',cleanup);

/* ====== Bootstrap ====== */
function init(){
  resizeCanvas();
  const saved=loadProgress();
  if(saved){
    state.soundOn=saved.soundOn!==false;
    state.totalStars=saved.totalStars||{};
    state.currentLevel=Math.max(0,Math.min(LEVELS.length-1,saved.currentLevel||0));
  }
  document.getElementById('btnSound').textContent=state.soundOn?'🔊':'🔇';
  loadLevel(state.currentLevel);
  updateHud();
  // tutorial on first play
  if(!saved||!saved.currentLevel){
    setTimeout(()=>{showTutorial()},400);
  }
  // start loop
  state.lastTime=performance.now()/1000;
  requestAnimationFrame(loop2);
  // pre-fill user gesture: try resume audio on first interaction
  const resume=()=>{
    ensureAudio();
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume().then(()=>{if(state.soundOn)startBgm()}).catch(()=>{});
    if(state.soundOn)startBgm();
    document.removeEventListener('pointerdown',resume);
    document.removeEventListener('keydown',resume);
  };
  document.addEventListener('pointerdown',resume);
  document.addEventListener('keydown',resume);
}
init();

/* expose for debugging */
window.__woolSort={state,LEVELS,bfsSolve,loadLevel};
})();
